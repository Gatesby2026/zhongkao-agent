# ================================================================
#  北京中考真题
# ================================================================
beijing_zhongkao:
  description: 北京市统一中考数学真题
  importance: 最高（一切训练的终极参考标准）
  years_available: 2018-2025

  collection:
    - year: 2025
      full_score: 100
      questions: 28
      source:
        - platform: 学科网
          url: https://www.zxxk.com/
          access: 付费下载
        - platform: 菁优网
          url: https://www.jyeoo.com/
          access: VIP可查看解析
        - platform: 中考网
          url: https://www.zhongkao.com/
          access: 免费下载
      notes: 2025年为新中考改革后第一年100分制

    - year: 2024
      full_score: 120
      questions: 28
      source: 同上
      notes: 120分制最后一年

    - year: 2023
      full_score: 100
      questions: 28
      source: 同上

    - year: 2022
      full_score: 100
      questions: 28
      source: 同上
      notes: 2022新课标发布后的首次中考

    - year: 2021
      full_score: 100
      questions: 28
      source: 同上

  usage_guide:
    L0_student: 暂不做真题，先补基础
    L1_student: 只做选择题前6题+填空题前5题+解答第17-18题
    L2_student: 做全卷，但压轴题只做前两问
    L3_student: 限时120分钟完整做全卷

# ================================================================
#  北京各区模拟题（一模/二模）
# ================================================================
beijing_mock_exams:
  description: 各区教研部门命制的模拟考试
  importance: 极高（仅次于中考真题）

  districts:
    - name: 海淀区
      difficulty: 最高
      value: 区分度大，适合高水平学生自测
      timing:
        一模: 每年4月中旬
        二模: 每年5月下旬
      source:
        - platform: 学科网（考后1-2天上传）
        - platform: 微信公众号"海淀教育""北京中考在线"
      how_to_use: |
        海淀一模通常比中考难，成绩会偏低，不要因此丧失信心。
        用海淀一模做"天花板测试"——如果海淀一模能做好，中考没问题。

    - name: 西城区
      difficulty: 中等偏上
      value: 题目规范，最贴近中考风格
      timing:
        一模: 每年4月中旬
        二模: 每年5月下旬
      source:
        - platform: 学科网
        - platform: 微信公众号"西城教育""北京中考在线"
      how_to_use: |
        西城模拟题最推荐作为日常训练用卷。
        难度适中，与中考最为接近。

    - name: 东城区
      difficulty: 中等偏上
      value: 偶有创新题型
      timing: 同上
      source: 学科网/公众号

    - name: 朝阳区
      difficulty: 中等
      value: 2025年率先试行25题模式，关注新题型
      timing: 同上
      source: 学科网/公众号
      notes: 朝阳一模是观察未来改革方向的窗口

  usage_guide:
    模考前: 不要提前做本区一模二模（留着考试用）
    模考后: 做其他区的一模二模作为补充练习
    recommended_order: 先做西城（难度适中）→ 再做东城 → 最后做海淀（最难）

# ================================================================
#  真题使用的整体策略
# ================================================================
overall_strategy:

  phase_1_基础期:
    timing: 初三上学期（9-12月）
    focus: 不做整套卷，只做分类真题
    method: |
      把近5年真题按知识模块拆开，哪个模块在学就做哪个模块的真题。
      例：正在补函数，就把5年真题中所有函数题集中做一遍。
    resource: 五三·中考真题分类训练 或 菁优网按知识点筛选

  phase_2_一模前:
    timing: 初三下学期（1-3月）
    focus: 开始做整套卷，但不限时
    method: |
      做2-3套往年中考真题和外区一模（不是自己区的）。
      重点不是分数，而是找出还有哪些模块有漏洞。

  phase_3_一模后:
    timing: 一模后（4-5月）
    focus: 限时做套卷
    method: |
      严格按中考时间（120分钟）做整套卷。
      每周做1-2套，包括：中考真题+各区一模二模。
      做完必须对答案+分析错因+整理错题。

  phase_4_考前冲刺:
    timing: 中考前两周（6月初）
    focus: 回归错题，不再做新题
    method: |
      翻看错题本，重做之前做错的题。
      再做1-2套模拟卷保持手感，但不追求新题量。
      保持信心和节奏。

# ================================================================
#  获取真题的注意事项
# ================================================================
acquisition_notes:
  - 真题PDF的来源优先级：菁优网（有解析）> 学科网（覆盖全）> 中考网（免费）
  - 模拟题时效性强，一模考后当天到一周内是获取窗口期
  - 部分模拟题通过微信公众号/家长群传播，注意及时保存
  - 购买纸质版真题汇编（如天利38套、万唯真题）是最省心的方式
  - 注意区分"真题"和"模拟题"——真题是官方出的，模拟题是各区出的
