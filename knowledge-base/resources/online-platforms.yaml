# ============================================================
# 资源库：在线平台与视频资源
# ============================================================
# 最后更新：2026-04-11

category: 在线平台

# ================================================================
#  官方/免费平台
# ================================================================
free_platforms:

  - id: smart_edu
    name: 国家中小学智慧教育平台
    url: https://www.smartedu.cn/
    type: 教学视频+资源
    cost: 免费
    recommend_level: A
    description: |
      教育部官方平台，覆盖所有学科的教学视频，按课标章节组织。
      视频由各地优秀教师录制，质量有保障。
    math_resources:
      - 同步课堂视频（按教材章节，七至九年级全覆盖）
      - 专题复习视频
      - 作业活动资源
    how_to_use: |
      适用场景：
      1. L0-L1学生回顾某个知识点时，先看对应视频再做题
      2. 自学新知识点（如请假落课后补习）
      3. 每个视频看完后暂停，自己复述核心结论，再做2-3题巩固
    limitations:
      - 没有题库功能
      - 视频是标准教学节奏，不适合快速复习

# ================================================================
#  题库/知识点平台（付费）
# ================================================================
paid_platforms:

  - id: jyeoo
    name: 菁优网
    url: https://www.jyeoo.com/
    type: 结构化题库
    cost: VIP约200元/年
    recommend_level: A（知识库建设核心数据源）
    description: |
      最接近"结构化题库"的平台。每道题标注：
      - 知识点（多级分类）
      - 难度等级
      - 来源（年份/地区/学校）
      - 详细解析
    key_features:
      - 知识点树状浏览（免费可见，做题需VIP）
      - 按知识点/难度/年份/地区筛选题目
      - 在线组卷
      - 错题本
    our_usage: |
      对本项目的价值：
      1. 知识点体系的参考模板
      2. 真题的知识点标注和权重统计
      3. 诊断测试题的选取来源
      4. 过关测试题的选取来源

  - id: zxxk
    name: 学科网
    url: https://www.zxxk.com/
    type: 教育资源库
    cost: 会员约298元/年
    recommend_level: A（真题/模拟题获取的主要来源）
    description: |
      国内最大的基础教育资源网。
      覆盖面最广，更新最快，几乎所有地区的真题和模拟题都能找到。
    key_features:
      - 试卷/课件/教案下载
      - 组卷系统 https://zujuan.zxxk.com/
      - 按章节/知识点/年份/地区筛选
    sub_site:
      name: 学科网组卷系统
      url: https://zujuan.zxxk.com/
      description: 可按知识点/难度/题型自动组卷

  - id: zhongkao_com
    name: 中考网
    url: https://www.zhongkao.com/
    type: 综合信息+真题
    cost: 大部分免费
    recommend_level: B
    description: |
      学而思旗下，按城市分类整理中考政策和真题。
      政策信息更新快，真题收录较全。
    key_features:
      - 按城市分类的中考政策
      - 真题下载（大部分免费）
      - 中考资讯

  - id: edu21
    name: 21世纪教育网
    url: https://www.21cnjy.com/
    type: 教育资源库
    cost: 免费+付费混合
    recommend_level: C
    description: 资源量大但质量参差，作为补充来源

# ================================================================
#  考生直接使用的学习工具
# ================================================================
student_tools:

  - id: geogebra
    name: GeoGebra
    url: https://www.geogebra.org/
    type: 数学可视化工具
    cost: 免费
    recommend_level: A
    description: |
      强大的数学图形工具，特别适合函数学习。
      可以动态调整参数观察图象变化。
    usage_scenarios:
      - L0-L1学生学函数时，用来画图观察a,b,c对图象的影响
      - 几何学习时辅助画图理解
      - 动态几何的直观感受
    how_to_access: 网页版直接使用，无需安装

# ================================================================
#  不推荐/需谨慎的平台
# ================================================================
caution_platforms:

  - name: 各类短视频平台的数学讲解
    reason: 质量参差不齐，容易浪费时间看与考试无关的内容
    recommendation: 如需视频资源，优先用国家智慧教育平台

  - name: AI生成的练习题
    reason: 数学题的准确性无法保证，可能有错误答案
    recommendation: 做题只用正规题库（菁优网/学科网/教辅书）的题目

  - name: 各类付费1对1网课
    reason: 价格高且效果因人而异，无法统一推荐
    recommendation: 如果经济条件允许且学生自律性差，可以考虑；否则教辅+免费视频够用
