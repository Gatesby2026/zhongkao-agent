  stem: 某小组研究了不同温度对葡萄酒发酵速率的影响。当发酵时间为 $x$（单位：h，$1 \leq x \leq 36$）时，小组成员分别记录了 $35^\circ\mathrm{C}$
    下的发酵速率 $y_1$（单位：mL/min），$30^\circ\mathrm{C}$ 下的发酵速率 $y_2$（单位：mL/min），部分数据如下：\n\n|
    $x$/h | 1   | 5   | 9   | 10  | 11  | 14  | 17  | 19  | 23  | 26  | 29  | 32  |
    36  |\n|--------|-----|-----|-----|-----|-----|-----|-----|-----|-----|-----|-----|-----|-----|\n|
    $y_1$/（mL/min） | 0.50 | 0.70 | 0.90 | 0.89 | 0.88 | 0.86 | 0.81 | 0.75 | 0.58
    | 0.50 | 0.44 | 0.38 | 0.32 |\n| $y_2$/（mL/min） | 0.05 | 0.45 | 0.85 | 0.87 |
    0.88 | 0.87 | 0.84 | 0.80 | 0.71 | 0.64 | 0.58 | 0.52 | 0.41 |\n\n(1) 当 $1 \leq
    x \leq 9$ 时，$35^\circ\mathrm{C}$ 下的发酵速率每小时增加 $a$ mL/min（$a$ 为常数），$a$ 的值为______；\n\n(2)
    通过分析数据，发现可以用函数刻画 $y_1$ 与 $x$、$y_2$ 与 $x$ 之间的关系。在给出的平面直角坐标系中，画出了函数 $y_2$ 的图象，描出了
    $y_1$ 与 $x$ 各对应值为坐标的点，补全函数 $y_1$ 的图象；\n\n[图]\n\n(3) 根据以上数据与函数图象，解决下列问题：\n\n① 当发酵时间为______
    h 时，$35^\circ\mathrm{C}$ 下的发酵速率等于 $30^\circ\mathrm{C}$ 下的发酵速率；\n\n② 若发酵速率不低于 $0.5$
    mL/min，葡萄酒的发酵效果较好。$35^\circ\mathrm{C}$ 下的发酵速率不低于 $0.5$ mL/min 的持续时间为 $t_1$（单位：h），$30^\circ\mathrm{C}$
    下的发酵速率不低于 $0.5$ mL/min 的持续时间为 $t_2$（单位：h），则 $t_1$ 的值为______，$t_2 - t_1$ 的值约为______（结果保留小数点后一位）。
