  stem: 小明观察到一个水龙头因损坏而不断地向外滴水，为探究其漏水造成的浪费情况，小明用一个带有刻度的量筒放在水龙头下面装水，每隔一分钟记录量筒中的总水量，但由于操作延误，开始计时的时候量筒中已经有少量水，因而得到如下表的一组数据：\n\n|
    时间 $t$（单位：分钟） | 1 | 2 | 3 | 4 | 5 | … |\n|------------------|---|---|---|---|---|----|\n|
    总水量 $y$（单位：毫升） | 7 | 12 | 17 | 22 | 27 | … |\n\n(1) 通过分析数据，发现可以用函数 $y = kt + b$（$k,
    b$ 为常数）刻画总水量 $y$ 与时间 $t$ 之间的关系，画出这个函数的图象；\n(2) 根据以上数据与函数图象，解决下列问题：\n① 请你估计小明在第
    20 分钟测量时量筒中的总水量；\n② 一个人一天大约饮用 1 500 毫升水，请你估算这个水龙头一个月（按 30 天计）的漏水量可供一人饮用多少天。
  answer: ''
