  stem: 乒乓球被誉为中国国球，不仅承载着民族自豪感，更成为展现中国体育精神的文化符号。发球机成为乒乓球爱好者的热门训练器。如图，是乒乓球台的示意图，乒乓球台长
    $OB$ 为 274 cm，球网 $CD$ 高 15.25 cm。发球器采用“直发式”模式，球从发球机出口到第一次接触球台的运行轨迹近似为抛物线的一部分。\n\n[图]\n\n某次训练，发球机从球台边缘
    $O$ 点正上方 28.75 cm 的高度 $A$ 处发球（即 $OA$ 的长为 28.75 cm），乒乓球到球台的竖直高度记为 $y$（单位：cm），乒乓球运行的水平距离记为
    $x$（单位：cm），测得几组数据如下：\n\n| 水平距离 $x$/cm | 0 | 10 | 50 | 90 | 130 | 170 | 230 |\n|-----------------|---|----|----|----|-----|-----|-----|\n|
    竖直高度 $y$/cm | 28.75 | 33 | 45 | 49 | $n$ | 33 | 0 |\n\n根据以上数据，解决下列问题：\n(1) 当乒乓球第一次落在对面球台上时，球到起始点的水平距离是
