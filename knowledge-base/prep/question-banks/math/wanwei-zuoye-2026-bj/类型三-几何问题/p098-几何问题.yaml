- id: 10
  type: 解答
  difficulty: 能力
  source: ''
  stem: 如图①，$AB$为半圆$O$的直径，$AB=6\\text{ cm}$，点$P$为$\widehat{AB}$上一动点，连接$BP$，点$M$为$BP$的中点，点$N$为$OB$的中点，连接$AP$，$MN$，$PN$。设线段$BP$的长为$x\\text{
    cm}$，线段$MN$的长为$y_1\\text{ cm}$，线段$PN$的长为$y_2\\text{ cm}$。\n\n[图]\n\n小西根据学习函数的经验，分别对函数$y_1$，$y_2$随自变量$x$的变化而变化的规律进行了探究。下面是小西的探究过程，请补充完整：\n\n(1)按照下表中自变量$x$的值进行取点、画图、测量，分别得到了$y_1$，$y_2$与$x$的几组对应值：\n\n|
    $x/\\text{cm}$ | 0.00 | 1.00 | 2.00 | 3.00 | 4.00 | 5.00 | 6.00 |\n|----------------|------|------|------|------|------|------|------|\n|
    $y_1/\\text{cm}$ | 1.50 | 1.50 | 1.50 | 1.50 | 1.50 | 1.50 | 1.50 |\n| $y_2/\\text{cm}$
    | 1.50 | 1.66 | 2.06 | 2.60 | 3.20 | 3.84 | $m$ |\n\n则$m$的值为______；\n\n(2)由表格中的数据可知，无论点$P$在什么位置，$MN$的长总是$1.5\\text{
    cm}$，请说明理由；\n\n(3)如图②，在平面直角坐标系$xOy$中，分别画出函数$y_1$，$y_2$的图象；\n\n[图]\n\n(4)结合画出的函数图象，解决问题：当线段$BP$是线段$PN$长的$\\dfrac{5}{4}$倍时，$BP$的长度约为______$\\text{cm}$。
  answer: ''
