  stem: 《九章算术》中记载，浮箭漏出现于汉武帝时期，如图，它由供水壶和箭壶组成，箭壶内装有箭尺，水匀速地从供水壶流到箭壶，箭壶中的水位逐渐上升，箭尺匀速上浮，可通过读取箭尺读数计算时间。某学校学习小组仿制了一套浮箭漏，通过观察，每2小时记录一次箭尺读数，得到表格如表。\n\n|
    供水时间 $x$（小时） | 0 | 2 | 4 | 6 | 8 |\n|-------------------|---|---|---|---|---|\n|
    箭尺读数 $y$（厘米） | 6 | 18 | 30 | 42 | 54 |\n\n那么箭尺读数 $y$ 和供水时间 $x$ 最可能满足的函数关系是
  options:
    A: 正比例函数关系
    B: 一次函数关系
    C: 二次函数关系
    D: 反比例函数关系
