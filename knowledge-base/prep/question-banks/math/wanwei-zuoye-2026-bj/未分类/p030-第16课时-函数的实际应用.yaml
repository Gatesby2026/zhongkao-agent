- id: 6
  type: 填空
  difficulty: 基础
  source: ''
  stem: 弹簧秤是根据胡克定律并利用物体的重力来测量物体质量的。胡克定律为：在弹性限度内，弹簧弹力 $F$ 的大小与弹簧伸长（或压缩）的长度 $x$ 成正比，即
    $F = kx$，其中 $k$ 为常数，是弹簧的劲度系数；质量为 $m$ 的物体重量为 $mg$，其中 $g$ 为常数。如图，一把弹簧秤在不挂任何物体时弹簧的长度为
    6 厘米。在其弹性限度内：当所挂物体的质量为 0.5 千克时，弹簧长度为 6.5 厘米，那么，当弹簧长度为 6.8 厘米时，所挂物体的质量为 ______
    千克。
  answer: ''
  has_figure: true
  note: ''
  figure_page_ref: .cache/pages/page-030.png
