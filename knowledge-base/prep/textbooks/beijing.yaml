# ------ 北京版目录（简要，与人教版章节对照）------
北京版:

  notes: |
    知识点范围与人教版完全一致（统一课标），但章节编排顺序不同。
    主要差异：北京版将部分内容合并/拆分，例如把一次函数提前到八上。
    使用北京版的学生做人教版教辅时，注意按知识点而非章节顺序选做。

  volumes:
    - id: bjb-7a
      name: 北京版·数学·七年级上册
      publisher: 北京出版社
      key_topics: 有理数、整式加减、一元一次方程、线段与角

    - id: bjb-7b
      name: 北京版·数学·七年级下册
      publisher: 北京出版社
      key_topics: 二元一次方程组、不等式、实数、三角形初步

    - id: bjb-8a
      name: 北京版·数学·八年级上册
      publisher: 北京出版社
      key_topics: 全等三角形、整式乘除与因式分解、分式、一次函数

    - id: bjb-8b
      name: 北京版·数学·八年级下册
      publisher: 北京出版社
      key_topics: 二次根式、勾股定理、平行四边形、数据分析

    - id: bjb-9a
      name: 北京版·数学·九年级上册
      publisher: 北京出版社
      key_topics: 一元二次方程、二次函数、旋转、圆

    - id: bjb-9b
      name: 北京版·数学·九年级下册
      publisher: 北京出版社
      key_topics: 反比例函数、相似三角形、锐角三角函数、投影与视图、概率

# ------ 两版对照核心差异 ------
version_comparison:
  notes: |
    中考不区分教材版本，试题覆盖课标所有知识点。
    两版的核心差异在于章节顺序，不在于知识点范围。
  key_differences:
    - topic: 一次函数
      人教版: 八年级下册（第十九章）
      北京版: 八年级上册
    - topic: 勾股定理
      人教版: 八年级下册（第十七章）
      北京版: 八年级下册
    - topic: 反比例函数
      人教版: 九年级下册（第二十六章）
      北京版: 九年级下册
    - topic: 相似三角形
      人教版: 九年级下册（第二十七章）
      北京版: 九年级下册
    - topic: 概率
      人教版: 九年级上册（第二十五章）
      北京版: 九年级下册
