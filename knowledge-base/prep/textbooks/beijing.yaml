# ============================================================
# 资源库：教材信息
# ============================================================
# 最后更新：2026-04-11
# 说明：北京地区初中数学教材版本（按区分配）
# 数据来源：北京中考在线、北京小升初网、各区教委公告
#
# 重要：北京初中数学只有"人教版"和"北京版（课改版）"两种，
# 不使用北师大版（北师大版仅用于部分区的小学阶段）。
# 中考为全市统一命题，不区分教材版本。

category: 教材

# ------ 教材版本总览 ------
versions:

  人教版:
    full_name: 人民教育出版社·义务教育教科书·数学
    publisher: 人民教育出版社
    short: 人教版
    notes: |
      北京主城区主流版本，使用人数最多。
      五三、万唯等主流教辅目录体系与人教版对齐。
    districts:
      - 海淀区
      - 西城区
      - 东城区
      - 朝阳区
      - 丰台区
      - 大兴区
      - 怀柔区
      - 燕山区

  北京版:
    full_name: 北京出版社·义务教育教科书·数学（课改版）
    publisher: 北京出版社
    short: 北京版（课改版）
    notes: |
      部分郊区使用，与人教版知识点覆盖一致但章节编排不同。
      做教辅时注意章节对应关系。
    districts:
      - 石景山区
      - 通州区
      - 顺义区
      - 昌平区
      - 门头沟区
      - 延庆区
      - 房山区

