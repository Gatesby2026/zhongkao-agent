# ============================================================
# 快速测评题库 — 10 道精选题，5 分钟定位 7 模块水平
# ============================================================
# 设计原则：
# 1. 每个错误选项都标注了对应的知识缺陷（错因追踪）
# 2. 题目从易到难：Q1-3 基础、Q4-7 中档、Q8-10 较难
# 3. 高权重模块（函数22分）给 2 题，其他各 1 题
# 4. 每题限时 60 秒，超时视为不会

version: "1.0"
total_questions: 10
time_limit_per_question: 60  # 秒
target_modules:
  - numbersAndExpressions
  - equationsAndInequalities
  - functions
  - triangles
  - circles
  - statisticsAndProbability
  - geometryComprehensive

questions:
  # ── Q1：数与式（基础）──────────────────────────
  - id: 1
    module: numbersAndExpressions
    difficulty: 基础
    sub_topic: 因式分解
    question: "因式分解：$x^2 - 4$ 的结果是？"
    options:
      A: "$(x-2)^2$"
      B: "$(x+2)(x-2)$"
      C: "$(x+4)(x-4)$"
      D: "不会做"
    correct: B
    diagnosis_map:
      A:
        level_signal: L1
        weakness: "平方差公式与完全平方混淆"
        sub_topic: "因式分解-公式法"
      C:
        level_signal: L0
        weakness: "平方差公式记错，4不是4²"
        sub_topic: "因式分解-公式法"
      D:
        level_signal: L0
        weakness: "因式分解基础概念缺失"
        sub_topic: "因式分解"
      timeout:
        level_signal: L0
        weakness: "基础运算速度不足"
    correct_signal: L2

  # ── Q2：方程（基础）──────────────────────────
  - id: 2
    module: equationsAndInequalities
    difficulty: 基础
    sub_topic: 一元二次方程
    question: "一元二次方程 $x^2 - 5x + 6 = 0$ 的解是？"
    options:
      A: "$x_1 = 2, x_2 = 3$"
      B: "$x_1 = -2, x_2 = -3$"
      C: "$x_1 = 1, x_2 = 6$"
      D: "不会做"
    correct: A
    diagnosis_map:
      B:
        level_signal: L1
        weakness: "因式分解后符号搞反"
        sub_topic: "一元二次方程-因式分解法"
      C:
        level_signal: L1
        weakness: "分解因式时凑数错误（1×6≠5）"
        sub_topic: "一元二次方程-因式分解法"
      D:
        level_signal: L0
        weakness: "一元二次方程解法未掌握"
        sub_topic: "一元二次方程"
      timeout:
        level_signal: L0
        weakness: "一元二次方程不熟练"
    correct_signal: L2

  # ── Q3：统计与概率（基础）──────────────────────────
  - id: 3
    module: statisticsAndProbability
    difficulty: 基础
    sub_topic: 中位数
    question: "数据 3, 5, 2, 8, 7, 1 的中位数是？"
    options:
      A: "5"
      B: "4"
      C: "4.5"
      D: "不会做"
    correct: B
    diagnosis_map:
      A:
        level_signal: L1
        weakness: "未排序直接取中间数"
        sub_topic: "中位数-排序"
      C:
        level_signal: L1
        weakness: "排序正确但取值方法错（取了3和5的平均而非2和5的平均）"
        sub_topic: "中位数-偶数个数据"
      D:
        level_signal: L0
        weakness: "中位数概念不理解"
        sub_topic: "统计基础"
      timeout:
        level_signal: L0
        weakness: "统计基础概念缺失"
    correct_signal: L2

  # ── Q4：函数（中档）──────────────────────────
  - id: 4
    module: functions
    difficulty: 中档
    sub_topic: 一次函数图象
    question: "一次函数 $y = -2x + 3$ 的图象经过哪些象限？"
    options:
      A: "一、二、三象限"
      B: "一、二、四象限"
      C: "一、三、四象限"
      D: "不会做"
    correct: B
    diagnosis_map:
      A:
        level_signal: L1
        weakness: "k<0图象从左上到右下但截距判断错"
        sub_topic: "一次函数-k和b的几何意义"
      C:
        level_signal: L0
        weakness: "k和b的正负对图象影响不理解"
        sub_topic: "一次函数-图象与性质"
      D:
        level_signal: L0
        weakness: "一次函数图象基础缺失"
        sub_topic: "一次函数"
      timeout:
        level_signal: L0
        weakness: "函数图象判断不熟练"
    correct_signal: L2

  # ── Q5：三角形（中档）──────────────────────────
  - id: 5
    module: triangles
    difficulty: 中档
    sub_topic: 全等三角形
    question: "在 $\\triangle ABC$ 和 $\\triangle DEF$ 中，已知 $AB=DE$，$\\angle A=\\angle D$，还需补充一个条件使 $\\triangle ABC \\cong \\triangle DEF$，下列不能补充的是？"
    options:
      A: "$AC = DF$"
      B: "$\\angle B = \\angle E$"
      C: "$BC = EF$"
      D: "不会做"
    correct: C
    diagnosis_map:
      A:
        level_signal: L1
        weakness: "SAS判定理解不牢（A是正确条件却选了它）"
        sub_topic: "全等三角形-判定条件"
      B:
        level_signal: L1
        weakness: "ASA判定理解不牢（B是正确条件却选了它）"
        sub_topic: "全等三角形-判定条件"
      D:
        level_signal: L0
        weakness: "全等三角形判定条件未掌握"
        sub_topic: "全等三角形"
      timeout:
        level_signal: L0
        weakness: "全等三角形判定不熟练"
    correct_signal: L2

  # ── Q6：方程应用（中档）──────────────────────────
  - id: 6
    module: equationsAndInequalities
    difficulty: 中档
    sub_topic: 分式方程
    question: "解分式方程 $\\frac{1}{x-1} = \\frac{2}{x^2-1}$，下列哪个是正确的解？"
    options:
      A: "$x = 3$"
      B: "$x = 1$"
      C: "$x = -1$"
      D: "不会做"
    correct: A
    diagnosis_map:
      B:
        level_signal: L1
        weakness: "解出x=1但未验根（x=1使分母为0，是增根）"
        sub_topic: "分式方程-验根"
      C:
        level_signal: L1
        weakness: "因式分解错误导致解错"
        sub_topic: "分式方程-去分母"
      D:
        level_signal: L0
        weakness: "分式方程解法未掌握"
        sub_topic: "分式方程"
      timeout:
        level_signal: L1
        weakness: "分式方程运算速度不足"
    correct_signal: L2

  # ── Q7：圆（中档）──────────────────────────
  - id: 7
    module: circles
    difficulty: 中档
    sub_topic: 切线性质
    question: "如图，PA 是圆 O 的切线，A 为切点，PO 交圆 O 于点 B，若 PA=8，PB=4，则圆 O 的半径是？"
    options:
      A: "6"
      B: "5"
      C: "4"
      D: "不会做"
    correct: A
    diagnosis_map:
      B:
        level_signal: L1
        weakness: "知道用勾股但列式错误"
        sub_topic: "切线-勾股定理"
      C:
        level_signal: L0
        weakness: "切线⊥半径性质未建立，直接猜PB=半径"
        sub_topic: "切线性质"
      D:
        level_signal: L0
        weakness: "圆的切线相关知识缺失"
        sub_topic: "圆"
      timeout:
        level_signal: L0
        weakness: "圆的计算不熟练"
    correct_signal: L2

  # ── Q8：函数（较难）──────────────────────────
  - id: 8
    module: functions
    difficulty: 较难
    sub_topic: 二次函数顶点
    question: "抛物线 $y = 2x^2 - 8x + 5$ 的顶点坐标是？"
    options:
      A: "$(2, -3)$"
      B: "$(2, 5)$"
      C: "$(-2, 29)$"
      D: "不会做"
    correct: A
    diagnosis_map:
      B:
        level_signal: L1
        weakness: "配方法过程中常数项计算错误"
        sub_topic: "二次函数-配方法"
      C:
        level_signal: L0
        weakness: "顶点公式 x=-b/2a 符号搞反"
        sub_topic: "二次函数-顶点坐标"
      D:
        level_signal: L1
        weakness: "配方法/顶点公式不熟练"
        sub_topic: "二次函数"
      timeout:
        level_signal: L1
        weakness: "二次函数计算速度不足"
    correct_signal: L3

  # ── Q9：几何综合（较难）──────────────────────────
  - id: 9
    module: geometryComprehensive
    difficulty: 较难
    sub_topic: 动态几何
    question: "正方形 ABCD 中，E 是 BC 上一点，将 $\\triangle ABE$ 绕点 B 顺时针旋转 $90°$ 得 $\\triangle CBF$，连接 EF。若 $AB=4$，$BE=3$，则 $EF$ 的长度是？"
    options:
      A: "$3\\sqrt{2}$"
      B: "$5$"
      C: "$4$"
      D: "不会做"
    correct: A
    diagnosis_map:
      B:
        level_signal: L1
        weakness: "未识别旋转后的等腰直角三角形，用勾股定理直接算"
        sub_topic: "旋转-等腰直角三角形"
      C:
        level_signal: L0
        weakness: "旋转变换性质不理解"
        sub_topic: "旋转变换"
      D:
        level_signal: L0
        weakness: "几何综合题无思路"
        sub_topic: "几何综合"
      timeout:
        level_signal: L1
        weakness: "旋转类题目分析速度不足"
    correct_signal: L3

  # ── Q10：函数综合（较难）──────────────────────────
  - id: 10
    module: functions
    difficulty: 较难
    sub_topic: 函数综合应用
    question: "已知一次函数 $y_1 = x + 1$ 和反比例函数 $y_2 = \\frac{k}{x}$ 的图象交于点 A(2, 3)，则 $y_1 > y_2$ 的 x 取值范围是？"
    options:
      A: "$x < -3$ 或 $0 < x < 2$"
      B: "$x > 2$ 或 $x < 0$"
      C: "$-3 < x < 0$ 或 $x > 2$"
      D: "不会做"
    correct: C
    diagnosis_map:
      A:
        level_signal: L1
        weakness: "图象交点找对了但不等号方向反了"
        sub_topic: "函数图象-不等式"
      B:
        level_signal: L1
        weakness: "只考虑了x>0的部分，忽略了第三象限交点"
        sub_topic: "反比例函数-象限"
      D:
        level_signal: L1
        weakness: "函数综合方法不熟练"
        sub_topic: "函数综合"
      timeout:
        level_signal: L1
        weakness: "函数综合分析速度不足"
    correct_signal: L3
