# ============================================================
# 北京2026中考英语 考前冲刺清单
# 笔试60分 + 听力口语40分 = 总分100分
# ============================================================

subject: 英语
region: 北京
exam_year: 2026
total_score: 100
written_exam: 60
listening_speaking_score: 40
last_updated: "2026-04-13"
timing: 考前14天
principle: "词汇每天背，语法规则过一遍，写作模板烂熟于心"

# ============================================================
# 一、笔试必拿分（基本盘40分）
# ============================================================
must_score_items:
  - id: MS-01
    item: "单选Q1-Q7（7分）"
    topics: [时态标志词, 代词指代, 介词固定搭配, 连词辨析, 比较级最高级]
    action: "每天做一组10道语法单选，错题归类到语法本"
    common_trap: "since/for+现在完成时标志词混淆；it/one/that代词选错"
    target_score: 7

  - id: MS-02
    item: "完形填空（4-5分）"
    topics: [上下文线索, 词义辨析, 固定搭配, 逻辑连贯]
    action: "每两天做一篇完形，先通读全文再逐空填写"
    common_trap: "只看单句不看全文语境；近义词辨析忽略搭配"
    target_score: 5

  - id: MS-03
    item: "阅读A篇+B篇（12-14分）"
    topics: [细节定位, 主旨归纳, 词义猜测, 推理判断]
    action: "每天做一篇阅读，练习在原文中划线定位关键词"
    common_trap: "细节题不回原文验证就选；被干扰选项的个别词迷惑"
    target_score: 14

  - id: MS-04
    item: "邮件回复（6-7分）"
    topics: [格式规范, 逐问回答, 适当拓展]
    action: "背熟邮件格式（称呼+正文+结尾），练习回答+拓展一句"
    common_trap: "漏掉对方某个提问没回答；开头结尾格式不完整"
    target_score: 7

  - id: MS-05
    item: "听口朗读+听后回答（20-22分）"
    topics: [朗读流畅度, 听力关键信息捕捉, 简短回答]
    action: "每天跟读课文15分钟，练习听后快速记关键词"
    common_trap: "朗读卡顿重读扣分；听后回答只说一个词不成句"
    target_score: 22

# ============================================================
# 二、拔高得分（40→50分）
# ============================================================
stretch_score_items:
  - id: ST-01
    item: "单选Q8-Q10（3分）"
    topics: [宾语从句语序, 定语从句关系词, 情景交际]
    action: "专项刷宾语从句+定语从句各20题"
    common_trap: "宾语从句用疑问语序而非陈述语序"
    target_score: 2

  - id: ST-02
    item: "阅读C篇（4分）"
    topics: [议论文结构, 作者观点, 推断题]
    action: "每两天做一篇C篇难度阅读，练习段落主旨概括"
    common_trap: "混淆作者观点和文中引用他人观点"
    target_score: 3

  - id: ST-03
    item: "完形满分（6分）"
    topics: [情感态度词, 转折后信息, 首尾呼应]
    action: "重做错过的完形，总结命题人设陷阱的位置"
    common_trap: "转折词but/however后面才是正确答案线索"
    target_score: 6

  - id: ST-04
    item: "听口转述+短文朗读满分（30-32分）"
    topics: [听后转述要点, 语音语调, 意群停顿]
    action: "每天做一套听口模拟题，录音回放检查"
    common_trap: "转述时漏掉数字/时间等关键信息"
    target_score: 32

# ============================================================
# 三、冲刺满分（50→58+分）
# ============================================================
top_score_items:
  - id: TP-01
    item: "阅读D篇还原句子（6分）"
    topics: [篇章逻辑, 指代关系, 过渡衔接]
    action: "专练还原句子题型，关注代词this/these/such指代"
    common_trap: "不看上下句的逻辑连接词就凭感觉选"
    target_score: 5

  - id: TP-02
    item: "命题作文高分（9-10分）"
    topics: [审题立意, 逻辑分段, 高级表达, 书写工整]
    action: "每三天写一篇作文，用模板框架+2-3个亮点句"
    common_trap: "跑题偏题；通篇简单句没有从句或连接词"
    target_score: 9

  - id: TP-03
    item: "听口满分冲刺（38-40分）"
    topics: [口语流利度, 发音准确, 内容完整]
    action: "考前一周每天做两套完整听口模拟"
    common_trap: "紧张导致语速过快吞音"
    target_score: 38

# ============================================================
# 四、容易丢分的坑
# ============================================================
easy_to_lose:
  - trap: "时态题不看时间状语"
    fix: "先找时间标志词（yesterday/since/next week），再定时态"
    frequency: 极高

  - trap: "阅读题选项偷换概念"
    fix: "选项中出现绝对词（all/never/must）要警惕，回原文核实"
    frequency: 高

  - trap: "邮件回复漏答"
    fix: "数对方问了几个问题，逐个标号回答"
    frequency: 高

  - trap: "作文字数不够或超格"
    fix: "平时练习就数字数，目标60-80词（命题作文）"
    frequency: 中

  - trap: "完形填空首尾没看"
    fix: "完形第一句和最后一句通常是理解全文的关键"
    frequency: 中

  - trap: "还原句子只看内容不看衔接"
    fix: "重点看空格前后的代词、连词、逻辑关系"
    frequency: 高

  - trap: "听口朗读断句错误"
    fix: "按意群停顿，不要逐词读，注意升降调"
    frequency: 中

# ============================================================
# 五、词汇冲刺策略
# ============================================================
vocabulary_sprint:
  core_718: "718高频核心词每天过100个，7天完成一轮"
  cd_extra: "阅读CD篇常见纲外词重点背（约50个高频词）"
  method: "看英文说中文 → 不会的标记 → 第二天优先重背标记词"
  daily_routine:
    - "早起15分钟：背新词50个"
    - "午休10分钟：复习上午标记词"
    - "睡前15分钟：背新词50个+快速过当天全部"
  high_freq_topics:
    - "情感态度：excited/nervous/proud/disappointed/grateful"
    - "学校生活：activity/competition/volunteer/experience"
    - "社会话题：environment/pollution/technology/tradition"
    - "健康运动：exercise/habit/balance/pressure"

# ============================================================
# 六、语法最后梳理
# ============================================================
grammar_review:
  must_review:
    - topic: "一般现在时/一般过去时/一般将来时"
      key_point: "三大基础时态标志词必须秒判"
    - topic: "现在完成时"
      key_point: "since+时间点，for+时间段，already/yet/ever/never"
    - topic: "被动语态"
      key_point: "be+done结构，注意时态变化在be上体现"
    - topic: "宾语从句语序"
      key_point: "从句必须用陈述语序（主+谓），if/whether引导一般疑问"
    - topic: "定语从句关系代词"
      key_point: "who指人，which指物，that都可以，whose表所属"
    - topic: "比较级与最高级"
      key_point: "than前用比较级，the+最高级+in/of范围"
  quick_check: "每天5题语法辨析，计时2分钟完成"

# ============================================================
# 七、写作准备
# ============================================================
writing_prep:
  email_template:
    structure: "称呼 → 回应开头 → 逐问回答（每问1-2句）→ 结尾祝好 → 署名"
    opening:
      - "Thanks for your email. I'm glad to hear from you."
      - "I'm happy to tell you about..."
    closing:
      - "I hope this helps. Looking forward to your reply."
      - "If you have any questions, please let me know."
    sample_frame: |
      Dear xxx,
        Thanks for your email. [回应对方话题一句]
        [回答问题1，拓展一句] [回答问题2，拓展一句]
        [回答问题3或补充建议一句]
        I hope... / Looking forward to...
      Yours,
      Li Hua

  essay_template:
    structure: "三段式：开头点题 → 中间展开2-3点 → 结尾总结升华"
    opening:
      - "In my opinion, ... is very important in our daily life."
      - "As a middle school student, I think..."
    body_connectors:
      - "First of all, ... Secondly, ... What's more, ..."
      - "On one hand, ... On the other hand, ..."
      - "For example, ... / Take ... for example."
    closing:
      - "In a word, ... I believe that if we..., we will..."
      - "All in all, ... Let's take action from now on."
    sample_frame: |
      [开头句引出话题，表达观点]
      First of all, [论点1+举例或解释].
      Secondly, [论点2+举例或解释].
      What's more, [论点3或补充].
      In a word, [总结观点]. I believe [升华一句].

  useful_sentences:
    - "It is important for us to develop good habits."
    - "Not only can it help us..., but also..."
    - "As the saying goes, 'Practice makes perfect.'"
    - "I strongly suggest that we should..."
    - "Only by working hard can we achieve our dreams."
    - "There is no doubt that... plays an important role in..."

# ============================================================
# 八、听口备考（40分）
# ============================================================
listening_speaking:
  score_structure:
    听后选择: "5题×1分=5分"
    听后回答: "5题×2分=10分"
    听后转述: "5分"
    短文朗读: "10分"
    回答问题: "10分"
  strategies:
    - type: "听后选择"
      tip: "预读选项，听时抓关键词（时间/地点/人物/数字）"
    - type: "听后回答"
      tip: "回答要完整成句，不要只蹦单词"
    - type: "听后转述"
      tip: "速记关键词（who/when/where/what），转述时用第三人称"
    - type: "短文朗读"
      tip: "先快速浏览全文，注意生词发音和意群停顿"
    - type: "回答问题"
      tip: "听清问题类型（what/why/how），回答至少两句话"
  daily_practice: "每天30分钟听口训练：跟读15分钟+模拟题15分钟"

# ============================================================
# 九、14天冲刺计划
# ============================================================
daily_plan:
  - day: 1
    focus: "摸底+词汇启动"
    tasks:
      - "做一套完整笔试真题，计时60分钟"
      - "批改后统计各题型正确率，定位薄弱环节"
      - "开始背核心词汇第1-100个"

  - day: 2
    focus: "语法梳理（时态）"
    tasks:
      - "复习三大基础时态+现在完成时规则"
      - "做20道时态专项单选"
      - "背核心词汇第101-200个"

  - day: 3
    focus: "阅读AB篇专练"
    tasks:
      - "做2篇AB篇难度阅读，练定位关键词"
      - "整理阅读错题，分析错因"
      - "背核心词汇第201-300个"

  - day: 4
    focus: "完形填空+语法（从句）"
    tasks:
      - "做2篇完形填空"
      - "复习宾语从句+定语从句语法规则"
      - "背核心词汇第301-400个"

  - day: 5
    focus: "写作（邮件回复）"
    tasks:
      - "背熟邮件模板框架"
      - "练写3封邮件回复，每封计时8分钟"
      - "背核心词汇第401-500个"

  - day: 6
    focus: "阅读CD篇专练"
    tasks:
      - "做1篇C篇+1组D篇还原句子"
      - "总结CD篇常见纲外高频词"
      - "背核心词汇第501-600个"

  - day: 7
    focus: "听口集中训练"
    tasks:
      - "做两套完整听口模拟题"
      - "录音回放，标记发音不准的词"
      - "背核心词汇第601-718个，完成第一轮"

  - day: 8
    focus: "第二套真题+查漏"
    tasks:
      - "做第二套完整笔试真题，计时60分钟"
      - "对比第一套，检查薄弱项是否改善"
      - "词汇第二轮启动：重背第一轮标记词"

  - day: 9
    focus: "语法综合+单选冲刺"
    tasks:
      - "被动语态+比较级专项各10题"
      - "完整做一组10道单选，目标9分+"
      - "词汇第二轮继续"

  - day: 10
    focus: "写作（命题作文）"
    tasks:
      - "背熟作文三段式模板"
      - "练写2篇命题作文，每篇计时15分钟"
      - "对照评分标准自评，修改升级表达"

  - day: 11
    focus: "全题型模拟"
    tasks:
      - "做一套完整笔试模拟，严格计时"
      - "做一套听口模拟"
      - "统计总分，记录各题型得分"

  - day: 12
    focus: "错题回顾+薄弱项补强"
    tasks:
      - "翻看所有错题本，重做错题"
      - "针对最薄弱的1-2个题型加练"
      - "默写写作常用句型10句"

  - day: 13
    focus: "考前最后模拟"
    tasks:
      - "上午做最后一套笔试模拟（保持手感）"
      - "下午做一套听口模拟"
      - "晚上快速过一遍核心词汇标记词"

  - day: 14
    focus: "考前调整"
    tasks:
      - "不做新题，只翻看错题本和笔记"
      - "默背邮件模板+作文模板各一遍"
      - "听口跟读课文15分钟保持语感"
      - "早睡，准备好考试用具"

# ============================================================
# 十、笔试考场时间分配
# ============================================================
time_allocation:
  total: "90分钟"
  单选: "5分钟（30秒/题，不确定的先跳过）"
  完形: "8分钟（先通读再填空）"
  阅读: "40分钟（AB篇各8分钟，C篇10分钟，D篇14分钟）"
  写作: "30分钟（邮件10分钟+作文20分钟）"
  检查: "7分钟（重点检查涂卡和作文拼写）"

# ============================================================
# 十一、考试日提醒
# ============================================================
exam_day_tips:
  - "提前30分钟到考场，熟悉环境，调整心态"
  - "带好2B铅笔（涂卡）、黑色签字笔（写作）、橡皮"
  - "拿到试卷先浏览全卷，心中有数"
  - "单选不纠结，不确定的标记后跳过，最后回来做"
  - "完形一定先通读全文，不要边读边填"
  - "阅读题先看题目再读文章，带着问题找答案"
  - "D篇还原句子注意前后句的代词和逻辑词"
  - "邮件回复先数清对方几个问题，逐个回答不遗漏"
  - "作文先列提纲（2分钟），再动笔写，注意书写工整"
  - "最后5-7分钟检查涂卡是否正确，作文有无低级拼写错误"
  - "听口考试保持冷静，没听清不要慌，根据上下文推断"
  - "全程保持卷面整洁，字迹清楚，给阅卷老师好印象"
