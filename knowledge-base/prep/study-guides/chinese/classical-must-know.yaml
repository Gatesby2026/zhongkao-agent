# ============================================================
# 北京2026中考 · 古诗文默写必背速查手册
# 语文100分，古诗文默写约4分（直接默写）+ 理解性默写散布于阅读题
# ============================================================

subject: 语文
region: 北京
exam_year: 2026
total_score: 100
classical_score: "约4分（直接默写）+ 散布在阅读题中（理解性默写）"
last_updated: "2026-04-13"

# ============================================================
# 一、考试题型说明
# ============================================================
exam_format:
  直接默写:
    description: "给上句写下句，或给下句写上句"
    分值: "约4空，每空1分，共4分"
    难度: 低
    策略: "死记硬背，重点防易错字"
  理解性默写:
    description: "给语境描述，写出对应名句"
    分值: "散布在古诗文阅读题中"
    难度: 中
    策略: "理解诗句含义、情感主题，能根据描述反向定位"
  情景型默写:
    description: "给出生活场景，联想对应名句"
    难度: 高
    策略: "熟悉每句的主题标签，练习举一反三"

