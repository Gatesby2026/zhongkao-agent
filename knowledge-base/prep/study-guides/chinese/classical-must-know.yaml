# ============================================================
# 三、高频考句（按主题分类）
# ============================================================
high_freq_lines:

  - theme: 爱国报国
    description: "家国情怀、舍身取义、保家卫国"
    lines:
      - source: 过零丁洋（文天祥）
        line: "人生自古谁无死，留取丹心照汗青"
        prompt_keywords: [视死如归, 以死明志, 民族气节, 舍生取义]
        易错字: "'汗青'不是'汉青'；'丹心'不是'单心'"
      - source: 破阵子·为陈同甫赋壮词以寄之（辛弃疾）
        line: "了却君王天下事，赢得生前身后名"
        prompt_keywords: [建功立业, 报效国家, 壮志豪情]
        易错字: "'赢'不是'嬴'（秦始皇姓嬴）"
      - source: 江城子·密州出猎（苏轼）
        line: "持节云中，何日遣冯唐"
        prompt_keywords: [希望得到重用, 渴望报效朝廷]
        易错字: "'遣'不是'遗'"
      - source: 江城子·密州出猎（苏轼）
        line: "会挽雕弓如满月，西北望，射天狼"
        prompt_keywords: [杀敌报国, 豪迈气概]
        易错字: "'雕'不是'凋'"
      - source: 满江红·小住京华（秋瑾）
        line: "身不得，男儿列，心却比，男儿烈"
        prompt_keywords: [巾帼不让须眉, 女性觉醒]
        易错字: "'烈'不是'列'——两字均出现，注意区分"
      - source: 出师表（诸葛亮）
        line: "受任于败军之际，奉命于危难之间"
        prompt_keywords: [临危受命, 忠心耿耿]
        易错字: "'际'不是'计'"

  - theme: 志向抱负
    description: "远大理想、自强不息、乐观自信"
    lines:
      - source: 行路难（其一）（李白）
        line: "长风破浪会有时，直挂云帆济沧海"
        prompt_keywords: [追求理想, 坚定信念, 乐观自信, 不畏困难]
        易错字: "'沧'不是'苍'；'济'不是'计'"
      - source: 望岳（杜甫）
        line: "会当凌绝顶，一览众山小"
        prompt_keywords: [不畏艰难, 勇攀高峰, 俯视一切]
        易错字: "'凌'不是'临'"
      - source: 左迁至蓝关示侄孙湘（韩愈）
        line: "欲为圣明除弊事，肯将衰朽惜残年"
        prompt_keywords: [不惧贬谪, 忠贞不屈]
        易错字: "'弊'不是'蔽'"

  - theme: 忧国忧民
    description: "心系苍生、济世情怀、悲悯民生"
    lines:
      - source: 茅屋为秋风所破歌（杜甫）
        line: "安得广厦千万间，大庇天下寒士俱欢颜"
        prompt_keywords: [广济苍生, 博爱胸怀, 忧民疾苦]
        易错字: "'庇'不是'蔽'；'俱'不是'具'"
      - source: 岳阳楼记（范仲淹）
        line: "先天下之忧而忧，后天下之乐而乐"
        prompt_keywords: [济世胸怀, 以天下为己任, 忧乐观]
        易错字: 无特殊易错字
      - source: 岳阳楼记（范仲淹）
        line: "居庙堂之高则忧其民，处江湖之远则忧其君"
        prompt_keywords: [无论身处何地都忧国忧民]
        易错字: "'庙堂'不是'苗堂'"
      - source: 卖炭翁（白居易）
        line: "可怜身上衣正单，心忧炭贱愿天寒"
        prompt_keywords: [底层百姓疾苦, 矛盾心理]
        易错字: "'愿'不是'怨'"

  - theme: 思乡怀人
    description: "游子思乡、羁旅愁绪、怀念亲友"
    lines:
      - source: 次北固山下（王湾）
        line: "乡书何处达？归雁洛阳边"
        prompt_keywords: [思乡之情, 归心似箭]
        易错字: "'雁'不是'燕'"
      - source: 天净沙·秋思（马致远）
        line: "夕阳西下，断肠人在天涯"
        prompt_keywords: [游子思乡, 漂泊之苦, 秋思]
        易错字: "'涯'不是'崖'"
      - source: 水调歌头（苏轼）
        line: "但愿人长久，千里共婵娟"
        prompt_keywords: [对亲人的美好祝愿, 思念远方亲人]
        易错字: "'婵娟'不是'蝉涓'"
      - source: 水调歌头（苏轼）
        line: "人有悲欢离合，月有阴晴圆缺"
        prompt_keywords: [人世聚散离合, 自然规律, 豁达胸襟]
        易错字: 无特殊易错字
      - source: 月夜忆舍弟（杜甫）
        line: "露从今夜白，月是故乡明"
        prompt_keywords: [思念家乡, 战乱中思亲]
        易错字: "'舍'读shè，不读shě"
      - source: 春夜洛城闻笛（李白）
        line: "此夜曲中闻折柳，何人不起故园情"
        prompt_keywords: [听到笛声思乡, 折柳送别]
        易错字: "'园'不是'原'"

  - theme: 哲理感悟
    description: "蕴含人生道理、辩证思维、处世智慧"
    lines:
      - source: 酬乐天扬州初逢席上见赠（刘禹锡）
        line: "沉舟侧畔千帆过，病树前头万木春"
        prompt_keywords: [乐观进取, 新事物必将取代旧事物, 豁达]
        易错字: "'畔'不是'伴'"
      - source: 游山西村（陆游）
        line: "山重水复疑无路，柳暗花明又一村"
        prompt_keywords: [困境中看到希望, 峰回路转, 绝处逢生]
        易错字: 无特殊易错字
      - source: 陋室铭（刘禹锡）
        line: "斯是陋室，惟吾德馨"
        prompt_keywords: [安贫乐道, 品德高尚]
        易错字: "'馨'不是'鑫'；'惟'不是'唯'（此处用'惟'）"
      - source: 爱莲说（周敦颐）
        line: "出淤泥而不染，濯清涟而不妖"
        prompt_keywords: [高洁品格, 不与世俗同流合污, 洁身自好]
        易错字: "'濯'不是'浊'；'涟'不是'莲'"
      - source: 饮酒（其五）（陶渊明）
        line: "采菊东篱下，悠然见南山"
        prompt_keywords: [恬淡自然, 归隐田园, 悠闲心境]
        易错字: "'篱'不是'蓠'"
      - source: 醉翁亭记（欧阳修）
        line: "醉翁之意不在酒，在乎山水之间也"
        prompt_keywords: [寄情山水, 别有深意]
        易错字: 无特殊易错字
      - source: 鱼我所欲也（《孟子》）
        line: "二者不可得兼，舍鱼而取熊掌者也"
        prompt_keywords: [取舍, 舍生取义]
        易错字: "'兼'不是'间'"
      - source: 论语十二章
        line: "三人行，必有我师焉"
        prompt_keywords: [谦虚好学, 向他人学习]
        易错字: "'焉'不能丢"

  - theme: 写景抒情
    description: "山水之美、自然风光、借景生情"
    lines:
      - source: 观沧海（曹操）
        line: "日月之行，若出其中；星汉灿烂，若出其里"
        prompt_keywords: [博大胸襟, 气吞山河, 想象宏伟]
        易错字: "'沧'不是'苍'"
      - source: 钱塘湖春行（白居易）
        line: "几处早莺争暖树，谁家新燕啄春泥"
        prompt_keywords: [早春生机, 春意盎然]
        易错字: "'莺'不是'鹰'；'啄'不是'琢'"
      - source: 使至塞上（王维）
        line: "大漠孤烟直，长河落日圆"
        prompt_keywords: [塞外风光, 壮美奇观, 雄浑辽阔]
        易错字: 无特殊易错字
      - source: 黄鹤楼（崔颢）
        line: "晴川历历汉阳树，芳草萋萋鹦鹉洲"
        prompt_keywords: [登楼远眺, 景色明丽]
        易错字: "'萋萋'不是'凄凄'；'鹦鹉'二字笔画多注意"
      - source: 三峡（郦道元）
        line: "自非亭午夜分，不见曦月"
        prompt_keywords: [山高水深, 峡谷幽深]
        易错字: "'曦'不是'希'或'羲'"
      - source: 记承天寺夜游（苏轼）
        line: "庭下如积水空明，水中藻、荇交横"
        prompt_keywords: [月色如水, 空灵澄澈]
        易错字: "'藻荇'的'荇'不是'杏'"
      - source: 野望（王绩）
        line: "树树皆秋色，山山唯落晖"
        prompt_keywords: [秋景萧瑟, 田园秋色]
        易错字: "'晖'不是'辉'"
      - source: 望岳（杜甫）
        line: "造化钟神秀，阴阳割昏晓"
        prompt_keywords: [泰山神奇秀丽, 大自然的鬼斧神工]
        易错字: "'钟'不是'终'"

  - theme: 友情送别
    description: "惜别之情、豁达送别、深厚友谊"
    lines:
      - source: 送杜少府之任蜀州（王勃）
        line: "海内存知己，天涯若比邻"
        prompt_keywords: [真挚友情, 豁达送别, 天下知己]
        易错字: 无特殊易错字
      - source: 闻王昌龄左迁龙标遥有此寄（李白）
        line: "我寄愁心与明月，随君直到夜郎西"
        prompt_keywords: [对友人的关切, 借月寄情]
        易错字: "'郎'不是'朗'"
      - source: 白雪歌送武判官归京（岑参）
        line: "忽如一夜春风来，千树万树梨花开"
        prompt_keywords: [以春景喻冬雪, 想象奇特]
        易错字: "'梨'不是'离'"
      - source: 白雪歌送武判官归京（岑参）
        line: "山回路转不见君，雪上空留马行处"
        prompt_keywords: [依依惜别, 目送远去]
        易错字: 无特殊易错字
      - source: 送友人（李白）
        line: "浮云游子意，落日故人情"
        prompt_keywords: [送别友人, 离情依依]
        易错字: 无特殊易错字
      - source: 己亥杂诗（龚自珍）
        line: "落红不是无情物，化作春泥更护花"
        prompt_keywords: [奉献精神, 虽离职仍心系国家]
        易错字: "'红'在此处指花，不要写成'虹'"

  - theme: 品格修养
    description: "高洁品格、安贫乐道、淡泊名利"
    lines:
      - source: 爱莲说（周敦颐）
        line: "予独爱莲之出淤泥而不染，濯清涟而不妖"
        prompt_keywords: [不同流合污, 洁身自好]
        易错字: "'予'不是'余'（此处原文用'予'）"
      - source: 陋室铭（刘禹锡）
        line: "苔痕上阶绿，草色入帘青"
        prompt_keywords: [陋室环境清幽, 安贫乐道]
        易错字: "'苔'不是'台'"
      - source: 饮酒（其五）（陶渊明）
        line: "问君何能尔？心远地自偏"
        prompt_keywords: [心境淡泊, 超脱世俗]
        易错字: "'尔'不是'耳'"
      - source: 无题（李商隐）
        line: "春蚕到死丝方尽，蜡炬成灰泪始干"
        prompt_keywords: [无私奉献, 至死不渝]
        易错字: "'蜡炬'不是'蜡烛'（原文用'炬'）"

# ============================================================
# 四、易错字总表（Top 30高频易错）
# ============================================================
易错字总表:
  - { correct: 雎, wrong: 睢, source: 关雎, 辨析: "雎(jū)鸠——'且'旁，不是'隹'旁的'睢'" }
  - { correct: 窈窕, wrong: 杳兆, source: 关雎, 辨析: "都是穴字头" }
  - { correct: 好逑, wrong: 好求, source: 关雎, 辨析: "'逑'有走之旁" }
  - { correct: 沧海, wrong: 苍海, source: "行路难/观沧海", 辨析: "'沧'三点水——与水有关" }
  - { correct: 赢得, wrong: 嬴得, source: 破阵子, 辨析: "'赢'是贝字底（与利益相关）" }
  - { correct: 汗青, wrong: 汉青, source: 过零丁洋, 辨析: "'汗'——竹简烤出水分叫汗青" }
  - { correct: 濯清涟, wrong: 浊清莲, source: 爱莲说, 辨析: "'濯'是洗涤；'涟'是水纹" }
  - { correct: 馨, wrong: 鑫, source: 陋室铭, 辨析: "'馨'香字头——品德芬芳" }
  - { correct: 婵娟, wrong: 蝉涓, source: 水调歌头, 辨析: "'婵娟'都是女字旁——形容月色美" }
  - { correct: 萋萋, wrong: 凄凄, source: 黄鹤楼, 辨析: "'萋'草字头——形容草木茂盛" }
  - { correct: 曦, wrong: 晞, source: 三峡, 辨析: "'曦'——日+羲，指阳光" }
  - { correct: 荇, wrong: 杏, source: 记承天寺夜游, 辨析: "'荇'草字头——水生植物" }
  - { correct: 凌, wrong: 临, source: 望岳, 辨析: "'凌'两点水——凌驾于顶" }
  - { correct: 畔, wrong: 伴, source: 酬乐天, 辨析: "'畔'田字旁——河畔、侧畔" }
