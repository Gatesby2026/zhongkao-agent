# 2026北京中考物理 · 考前冲刺清单
# 满分80分 | 闭卷 | 90分钟
# 试卷: 单选12×2=24 | 多选3×3=9 | 实验~5题~27 | 计算2题~10 | 科普阅读1题~10
# 权重: 力学~35% | 电学~35% | 光热声~20% | 实验方法~10%

meta:
  subject: 物理
  city: 北京
  year: 2026
  total_score: 80
  duration_minutes: 90
  exam_type: 闭卷

# 一、基本盘（稳拿50分）
must_score_items:
  target: 50分
  单选题_基础:
    target: 20/24分（错2题以内）
    items:
      - topic: 声音三特征（音调/响度/音色）
        tip: 音调看频率，响度看振幅，音色看波形
      - topic: 光的反射/折射/直线传播
        tip: 倒影是反射，筷子弯折是折射，影子是直线传播
      - topic: 物态变化判断（六种变化）
        tip: 画环形图，吸热在上放热在下
      - topic: 凸透镜成像定性判断
        tip: 一焦分虚实，二焦分大小，实倒虚正
      - topic: 力的作用效果
        tip: 运动状态改变包括速度和方向
      - topic: 惯性与牛顿第一定律
        tip: 惯性只与质量有关，不说受到惯性
      - topic: 电路识别（串联/并联）
        tip: 去掉电压表看通路，电流无分叉为串联
      - topic: 安全用电常识
        tip: 开关接火线，三孔插座上接地
  多选题:
    target: 5/9分
    strategy: 不确定坚决不选，少选得1分，多选得0分
    items:
      - 每题至少选出1个确定选项（保底1分×3=3分）
      - 有把握再多选，宁少选拿1分也不多选拿0分
  实验题_基础:
    target: 15/27分
    items:
      - topic: 器材读数（天平/量筒/电流表/电压表）
        tip: 先看量程再看分度值，估读到下一位
      - topic: 控制变量法识别
        tip: 模板——控制___不变，改变___，观察___
  计算题_基础:
    target: 5/10分
    tip: 密度/速度/压强直接代入，规范书写
  科普阅读:
    target: 5/10分
    tip: 圈出数据和物理量，对应题目找答案

# 二、进阶提升（50→65分）
stretch_score_items:
  target: 从50提到65分
  力学进阶:
    - topic: 浮力综合（称重法/阿基米德原理）
      tip: F浮=G-F示 和 F浮=ρ液gV排 灵活切换
    - topic: 压强综合（固体+液体对比）
      tip: 固体从F和S入手，液体从ρ和h入手
    - topic: 简单机械效率
      tip: η=W有用/W总，注意有用功和额外功区分
    - topic: 功和功率综合
      tip: 力的方向和运动方向一致才做功
  电学进阶:
    - topic: 欧姆定律综合计算
      tip: 画等效电路图是关键，先判断串并联
    - topic: 电功率计算（额定/实际）
      tip: 额定是铭牌值，实际要看实际电压
    - topic: 电路故障分析
      tip: 断路无电流，短路无电压
    - topic: 家庭电路（电能/电费）
      tip: W=Pt, 1度=1kWh=3.6e6J
  实验进阶:
    - topic: 数据分析与图像绘制
      tip: 描点连线用直尺，异常点标注说明
    - topic: 误差分析
      tip: 推导哪个量偏大/偏小导致结果偏大/偏小
    - topic: 方案评价与改进
      tip: 从多次测量、控制变量、减小误差三角度答

# 三、冲刺高分（65→75+分）
top_score_items:
  target: 从65冲到75+分
  力学难题:
    - topic: 浮力与密度综合（切割/液面升降）
      tip: 画受力分析图，列方程组
    - topic: 杠杆动态平衡分析
      tip: 力臂随角度变化是难点
    - topic: 压强切割问题
      tip: 横切F变S不变，竖切S变F不变
  电学难题:
    - topic: 动态电路分析（滑动变阻器）
      tip: R变→I变→U变，列表格分析
    - topic: 多状态电学综合
      tip: 不同开关组合对应不同电路，分别列方程
    - topic: 电功率最值/比值
      tip: 串联分压比=电阻比，并联分流比=电阻反比
  科普阅读难题:
    - topic: 知识迁移应用
      tip: 用材料新概念+已学公式解决新问题

# 四、容易丢分陷阱
easy_to_lose:
  审题陷阱:
    - trap: 正确/错误看反了
      fix: 用笔圈出关键词，做完检查
    - trap: 质量和重力混淆
      fix: kg是质量，N是力
    - trap: 增大(人为操作)和变大(结果)混淆
      fix: 答题时区分主动操作和被动变化
  计算陷阱:
    - trap: 单位换算出错（cm²→m²忘记换两次）
      fix: 1m²=1e4cm², 写换算过程
    - trap: 不写公式直接算
      fix: 必须先写字母公式再代入，否则扣过程分
    - trap: 结果不带单位或单位错误
      fix: 每个结果都检查单位
  实验陷阱:
    - trap: 电表读数不估读
      fix: 电流表0.02A一格要估读，电压表0.1V一格要估读
    - trap: 连接电路时开关未断开/变阻器未调最大
      fix: 这是操作第一步，答题也要写
    - trap: 密度实验先测体积后测质量
      fix: 正确顺序是先质量后体积，避免残留水
  多选陷阱:
    - trap: 多选一个变0分
      fix: 严格执行不确定不选策略

# 五、公式速查表
formula_review:
  力学:
    - { name: 速度, formula: "v=s/t", unit: m/s }
    - { name: 密度, formula: "ρ=m/V", unit: kg/m³ }
    - { name: 重力, formula: "G=mg", unit: N, note: g取10N/kg }
    - { name: 压强, formula: "p=F/S", unit: Pa }
    - { name: 液体压强, formula: "p=ρgh", unit: Pa }
    - { name: 浮力_阿基米德, formula: "F浮=ρ液gV排", unit: N }
    - { name: 浮力_称重法, formula: "F浮=G-F示", unit: N }
    - { name: 杠杆平衡, formula: "F1L1=F2L2" }
    - { name: 功, formula: "W=Fs", unit: J }
    - { name: 功率, formula: "P=W/t=Fv", unit: W }
    - { name: 机械效率, formula: "η=W有用/W总×100%" }
  热学:
    - { name: 热量, formula: "Q=cmΔt", unit: J, note: c是比热容 }
    - { name: 热值, formula: "Q=mq", unit: J, note: 完全燃烧 }
    - { name: 热机效率, formula: "η=W有用/Q总×100%" }
  电学:
    - { name: 欧姆定律, formula: "I=U/R", unit: A }
    - { name: 电功, formula: "W=UIt", unit: J, note: 1kWh=3.6e6J }
    - { name: 电功率, formula: "P=UI=I²R=U²/R", unit: W }
    - { name: 焦耳定律, formula: "Q=I²Rt", unit: J }
    - { name: 串联, formula: "I总=I1=I2; U总=U1+U2; R总=R1+R2" }
    - { name: 并联, formula: "U总=U1=U2; I总=I1+I2; 1/R总=1/R1+1/R2" }

# 六、必考实验清单
experiment_review:
  测量密度:
    器材: 天平(含砝码)、量筒、水、细线、待测物
    步骤:
      - 先用天平测质量m
      - 再用量筒排水法测体积V
      - 计算密度ρ=m/V
    易错:
      - 必须先质量后体积，避免残留水使质量偏大
      - 天平游码归零后再调平衡螺母
      - 量筒读数视线与凹液面最低处平齐
    拓展: 测液体密度用差量法（总质量减空杯质量）

  欧姆定律:
    器材: 电源、开关、电流表、电压表、定值电阻(多个)、滑动变阻器
    步骤:
      - 探究I与U关系：控制R不变，用变阻器改变U
      - 探究I与R关系：控制U不变(调变阻器保持电压表读数不变)，换不同R
    易错:
      - 闭合开关前变阻器要调到最大阻值
      - 换电阻后必须调变阻器使电压不变
      - 电压表并联在定值电阻两端

  测小灯泡电功率:
    器材: 电源、开关、电流表、电压表、小灯泡(含灯座)、滑动变阻器
    步骤:
      - 使灯泡分别在额定电压、高于额定、低于额定下工作
      - 记录每次U和I，算P=UI
    易错:
      - 灯泡电阻随温度变化，不能用一组数据算R后代入
      - 变阻器作用：保护电路+调节灯泡两端电压
      - 灯泡不亮不一定断路，可能电压太低

  凸透镜成像:
    器材: 光具座、凸透镜、蜡烛、光屏
    步骤:
      - 平行光聚焦法测焦距
      - 蜡烛放在u>2f/u=2f/f<u<2f/u<f各位置
      - 移动光屏找清晰像，记录大小正倒虚实
    易错:
      - 三心共线（焰心、光心、屏心同一高度）
      - u<f时光屏找不到像(虚像)，要从光屏侧透过透镜看
      - 遮住透镜一半仍能成完整像，只是变暗
    规律:
      - "u>2f → 倒立缩小实像（照相机）"
      - "u=2f → 倒立等大实像"
      - "f<u<2f → 倒立放大实像（投影仪）"
      - "u<f → 正立放大虚像（放大镜）"

  杠杆平衡:
    器材: 杠杆、铁架台、钩码、弹簧测力计
    步骤:
      - 无钩码时调杠杆水平平衡（调平衡螺母）
      - 挂钩码记录F1、L1、F2、L2
      - 多次实验验证F1L1=F2L2
    易错:
      - 实验前调平是为了让重力力臂为零
      - 力臂是支点到力的作用线距离，非支点到挂点距离
      - 多次实验是为得出普遍规律，不是减小误差

  探究浮力:
    器材: 弹簧测力计、金属块、水、盐水、量筒
    步骤:
      - 称重法：测G和F示，算F浮=G-F示
      - 验证阿基米德原理：F浮=ρ液gV排
    易错:
      - 浮力大小与物体密度无关，与液体密度和V排有关
      - 浸没后继续下压，浮力不变（V排不变）
      - 物体缓慢放入液体，避免晃动影响读数

# 七、14天冲刺计划（每天1.5-2小时）
daily_plan:
  第01天: { 主题: 声光热基础, 任务: 整理三特征+三现象+物态变化+做10题选择 }
  第02天: { 主题: 力学基础, 任务: 力三要素+牛一定律+惯性+二力平衡+做15题 }
  第03天: { 主题: 压强专题, 任务: 固体液体大气压强+做5道计算 }
  第04天: { 主题: 浮力专题, 任务: 阿基米德+称重法+浮沉条件+做5道综合 }
  第05天: { 主题: 机械+功能, 任务: 杠杆+滑轮组+功率+机械效率+做5道计算 }
  第06天: { 主题: 电学基础, 任务: 串并联+电表使用+电阻因素+画5个电路图 }
  第07天: { 主题: 欧姆定律, 任务: 公式变形+串并联计算+动态电路+做8题 }
  第08天: { 主题: 电功率, 任务: 电功电功率电热辨析+额定vs实际+做8题 }
  第09天: { 主题: 实验突破上, 任务: 默写测密度+欧姆定律实验+做3套真题 }
  第10天: { 主题: 实验突破下, 任务: 默写测电功率+凸透镜+杠杆浮力+做3套真题 }
  第11天: { 主题: 科普阅读, 任务: 做4篇真题+总结信息提取技巧+练知识迁移 }
  第12天: { 主题: 模拟卷一, 任务: 限时90分钟完整模拟+对答案+整理错题 }
  第13天: { 主题: 模拟卷二+补缺, 任务: 再做一套+针对薄弱点强化+重做错题 }
  第14天: { 主题: 考前梳理, 任务: 公式30分钟+易错点30分钟+实验流程30分钟+早睡 }

# 八、考场时间分配
time_allocation:
  total: 90分钟
  plan:
    - { phase: 单选12题, time: 15分钟, tip: 每题1分钟不会先跳 }
    - { phase: 多选3题, time: 9分钟, tip: 每题3分钟不确定不选 }
    - { phase: 实验~5题, time: 30分钟, tip: 最重要题型给足时间 }
    - { phase: 计算2题, time: 16分钟, tip: 公式→代入带单位→结果→答 }
    - { phase: 科普阅读1题, time: 12分钟, tip: 先读题再读材料 }
    - { phase: 检查, time: 8分钟, tip: 查计算单位+涂卡+多选 }

# 九、考试当天提醒
exam_day_tips:
  考前准备:
    - 带2B铅笔、黑色签字笔(至少2支)、直尺、橡皮
    - 北京中考不允许带计算器
    - 提前15分钟到考场稳定情绪
  答题策略:
    - 拿到试卷先浏览全卷了解难度
    - 先易后难，不在难题上死耗
    - 选择题做完立刻涂卡
    - 多选题执行不确定不选铁律
    - 实验题要完整(目的→原理→步骤→数据→结论)
    - 计算题必须有解字和答字
  书写规范:
    - "计算格式: 解→公式→代入数据(带单位)→结果→答"
    - 作图题铅笔画好后签字笔描
    - 字迹工整卷面整洁
  心态调整:
    - 难题深呼吸先跳过
    - 不被旁边翻卷声影响
    - 做完不提前交卷利用时间检查
    - 80分制拿到65+就是好成绩
