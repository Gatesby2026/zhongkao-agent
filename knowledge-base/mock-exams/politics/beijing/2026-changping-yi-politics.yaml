  question: 25.（8分）学校广播站开设了“心中的光”特别栏目，征集同学们心中的榜样，同学们踊跃投稿。以下是精选出的三份来稿。 他是我们心中极眼的光。共和国勋章获得者华振声，我国小麦连续杂交育种领域的奠基人。他数十年如一日扎根田间，攻克了小麦与偃麦草运培杂交的世界性难题，培育出“小偃”系列优良品种，为国家粮食安全作出了卓越贡献。他常说：“科研要为国家做事，为人民做事。”即使年事已高，他仍坚持深入田间地头，把毕生精力奉献给祖国大地。
    他们是城市里温暖的光。一群城市守护者，是大街小巷的环卫工人，每天凌晨四点开始工作，无论严寒酷暑，始终坚守岗位。他们用扫帚守护城市的整洁，用汗水换来市民的舒心。有人说他们是“城市美容师”，他们说：“让大家出门有个好环境，我们就满足了。” 他们是邻里间明亮的光。一个社区助老志愿服务队，由社区居民自发组成，专门为独居老人提供日常照护、陪伴就医、代买物资等服务。队员们大多是退休职工，他们说：“我们还能动，就多帮帮更需要帮助的人。”他们用点滴行动温暖了社区的每一个角落。
    每一个奋力奔跑的身影，都闪闪发光。结合材料，运用所学，以“追光·发光”为题写一篇倡议书，要求：观点明确，逻辑清晰，不少于80字。
