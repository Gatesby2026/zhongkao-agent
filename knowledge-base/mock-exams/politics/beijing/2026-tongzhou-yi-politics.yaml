    多人次提出的 2 万多条意见, 持续优化草案细节。 || 生态环境法典草案提请十四届全国人大四次会议审议。根据各代表团的审议意见和有关方面的意见, 又作了 100 余处实质性修改。最后审议表决通过。 || (1)运用所学,谈谈你对这部法典立法过程的理解。(4分) ||
  answer: '(1) 生态环境法典立法过程体现了党的领导、人民当家作主和依法治国的有机统一。党领导立法, 全国人民代表大会具有国家立法权, 发扬民主, 科学立法。也可以体现人民代表大会制度是我国的根本政治制度。（4 分）"(2) 宪法（1 分）, 依据: 宪法是根本法, 是其他法律的立法基础和立法依据。（2 分）"(3)实行良法之治,依法护绿、惩恶扬善,符合公平正义的要求。“刚”是为了守护底线,让恶意违法者付出代价,震慑潜在的违法行为;“柔”是为了给悔改者回头的机会,鼓励人们主动修复生态环境。法治与德治相辅相成、相得益彰。法律的刚性守住底线,法律的柔性传递温度,二者共同构建起既有力度、又有温度的法治社会。(4分)'
