  question: 25.（10分）2026年是中国工农红军长征胜利90周年。某校九年级学生制作板报，进行宣传。">">长征铸丰碑">">| 长征场景 | 材料详情 |">">| --- | --- |">">| “江河·奔腾的意志”：四渡赤水、巧渡金沙江，在绝境中开辟生路。 | “水湍急，山峭耸。雄关险，豺狼凶。健儿巧渡金沙江，兄弟民族夹道迎。安顺场边孤舟勇，踩波踏浪歼敌兵。”">">出处：《长征组歌》（节选）（萧华）
    |">">| “草地·潜伏的希望”：穿越“生命禁区”草地，在泥泞沼泽中前行。 | “雪皑皑，野茫茫。高原寒，炊断粮。红军都是钢铁汉，千锤百炼不怕难。雪山低头迎远客，草毯泥毡扎营盘。风雨侵衣骨更硬，野菜充饥志越坚。官兵一致同甘苦，革命理想高于天。”">">出处：《长征组歌》（节选）（萧华） |">">| “重山·不屈的丰碑”：冲破娄山关、大凉山、乌蒙山、腊子口、六盘山等险关要隘。 | “化林坪在四千五百米特之高山顶上。此时已阳历六月初，但当晚气候极寒，明晨出发时，则四望皆系雪山，盖昨夜已下大雪矣。此时气候骤寒，而赤军军士之棉衣早于云南丢掉，但赤军士兵虽在严寒之下，依旧人人面有喜色而毫无怨言。”">">出处：《随军西行见闻录》（节选）（陈云）
    |">">精神永传承">">伟大长征精神跨越时空、历久弥新，在新时代发展实践中展现持久生命力。">">南仁东放弃国外优厚待遇，毅然回国，潜心天文事业，奋斗至生命最后一刻，为“中国天眼”500米口径球面射电望远镜工程顺利落成发挥了关键作用。一代代优秀科学家在艰苦卓绝的环境中创造出一项项令中华民族扬眉吐气的科技成果，在航天、深海、芯片等关键领域突破“卡脖子”技术，让长征精神在科技报国的征程中熠熠生辉。">">黄文秀放弃大城市的工作机会，回到家乡，到贫困村担任第一书记。她把双脚扎进泥土，为群众脱贫攻坚殚精竭虑，30岁的生命永远定格在了扶贫路上，生动诠释了共产党员的初心使命。广大党员干部以黄文秀为榜样，与时代同步伐、与人民共命运，在新时代的长征路上谱写新的华章。">">新时代，我们还有许多“雪山”“草地”需要跨越，还有许多“娄山关”“腊子口”需要征服。结合材料，运用所学，请以“走好新时代的长征路”为题，撰写一篇发言稿。">">要求：观点明确，条理清晰，不少于100字。
