  question: 24.（10分）某校开展“宪法在我心中”主题活动。 \\\ 活动一：阅读新闻，感受宪法力量 \\\ 立：有依 \\\ 2025年4月和9月，十四届全国人大常委会对《中华人民共和国国家发展规划（草案）》先后进行了两次审议依照宪法规定对草案结构作了适当调整。 \\\ 2026年3月，十四届全国人大四次会议审议通过《中华人民共和国国家发展规划》。该法第一条规定：为了规范国家发展规划的制定……根据宪法，制定本法。
