  question: 23.(8分)某校学生会开展“在这里读懂全过程人民民主”主题系列活动。 \newline][图] \newline]结合材料,运用所学,从活动中任选两个参加,并说明理由。
  answer: 我选择参加活动一和活动二。人民代表大会制度是人民行使国家权力的根本途径,全国两会彰显人民当家作主,汇聚民智、凝聚共识。居委会是基层群众自治组织,居民通过民主选举、民主协商等方式参与社区治理,直接行使民主权利。参加这两个活动,能让我切实体会全过程人民民主是最广泛、最真实、最管用的民主,激励我增强民主意识,行使民主权利,参与民主生活。
