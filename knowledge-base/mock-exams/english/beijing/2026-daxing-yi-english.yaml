  question: '38. 从下面两个题目中任选一题, 根据所给的中文和英文提示, 完成一篇不少于 50 词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。\0.5em] 题目① \0.5em] 假设你是李华, 你校将举办以“如何利用碎片化时间”为主题的英文演讲比赛。请你用英语写一篇演讲稿, 谈谈你对碎片化时间的看法, 并介绍你的做法及原因。
    \0.5em] 提示词语: meaningful, relax, improve, habit, progress \0.5em] 内容提示: \0.5em] $\cdot$ What do you think of pockets of time? \0.5em] $\cdot$ What do you usually do in your pockets of time and why?
    \0.5em] Hello, everyone! \0.5em] Thank you for listening. \0.5em] 题目② \0.5em] 假设你是李华, 你校英语公众号发布了以“健康第一 (Health First)”为主题的征文活动。请你用英语写一篇短文投稿, 介绍你的体育运动习惯, 并谈谈你的收获。 \0.5em] 提示词语: run, do sit-ups, improve,
    physical health, energetic \0.5em] 内容提示: \0.5em] $\cdot$ Introduce your good exercise habits. \0.5em] $\cdot$ How can you benefit from these habits? \0.5em] I''m glad to share my good exercise habits
    with all of you.'
  answer: '题目一: Hello, everyone! I think pockets of time are very meaningful for students. We can do many small but useful things in our pockets of time. In my pockets of time, I usually read English words
