  solution: I'd like to share my experience of improving myself. Last term, I found my English listening and speaking were not good enough. I was worried and decided to work harder. Every day, I listened
    to English dialogues from textbooks and read after them carefully. I also talked with my English teacher and practiced with my classmates in the morning reading. Thanks to my hard work, I have got full
    marks in the listening and speaking test. I have learned that keeping trying is the key to success. As long as I never give up, I will become better and better.
  knowledge_points:
  - 词汇的一词多义与词义辨析
  - 构词法——前缀（un-, dis-, re-, im-/in-）
  - 构词法——后缀（-tion, -ment, -ful, -less, -ly, -er/-or）
  module: 词汇
  difficulty: 能力
  recommended_for:
  - L2
  - L3
