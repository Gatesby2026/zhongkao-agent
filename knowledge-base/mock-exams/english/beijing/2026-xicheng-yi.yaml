  question: '38. 从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于 50 词的英语文段写作。文中已给出内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。 \5pt]\5pt]题目① \5pt]\5pt]你校正在举办主题为 “Wisdom From Great Minds” 的英文演讲比赛。假设你是李华，你参加了比赛并抽到初赛题目（如下图）。请你根据抽到的名人名言，用英文写一篇演讲稿，阐释你对它的理解以及它对你的影响。
    \5pt]\5pt]Books are the ladder of human progress. —Maxim Gorky \5pt]\5pt]书籍是人类进步的阶梯。 ——马克西姆·高尔基 \5pt]\5pt]提示词语：step, discovery, grow, wise, strength \5pt]\5pt]内容提示：How do you understand the saying?
    \5pt]\5pt]What influence does the saying have on you? \5pt]\5pt]The famous saying I''d like to talk about is from Maxim Gorky: "Books are the ladder of human progress." \5pt]\5pt]Thank you for listening.
    \5pt]\5pt]题目② \5pt]\5pt]当第一双眼睛仰望星空，当第一只手掌伸向火焰，人类的探索便已悄然发生。好奇，始终是人类突破认知边界的原动力。某英文网站正在开展以“好奇”为主题的征文活动。假设你是李华，请你用英文写一篇短文投稿，讲述让你好奇的事物、你出于对它的好奇做过的事情以及你的收获。 \5pt]\5pt]提示词语：wonder, join, interest, value, explore
