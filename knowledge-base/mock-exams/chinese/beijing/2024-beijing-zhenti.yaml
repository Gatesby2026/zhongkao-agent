# ============================================================
# 2024年北京市中考语文真题 — 结构概要
# ============================================================
# 说明: 本文件仅记录试题结构、知识点与模块映射，不含原题文本
# 满分：100分  时长：150分钟

year: 2024
district: 北京市
exam_type: 真题
subject: 语文
full_score: 100
duration_minutes: 150
total_questions: 25
structure: 基础·运用(14分) + 古诗文阅读(17分) + 名著阅读(5分) + 现代文阅读(24分) + 写作(40分)

questions:
# === 一、基础·运用 (共14分) ===
- id: 1
  type: 选择
  score: 2
  description: 字音字形辨析——考查易读错、易写错的常用汉字
  knowledge_points: [字音辨析, 字形辨析]
  module: basicUsage
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 2
  type: 选择
  score: 2
  description: 词语/成语使用——辨析近义词语或判断成语使用是否恰当
  knowledge_points: [词语运用, 成语辨析]
  module: basicUsage
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 3
  type: 选择
  score: 2
  description: 语病辨析与修改——辨别搭配不当、成分残缺等语病类型
  knowledge_points: [病句辨析, 语病修改]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

- id: 4
  type: 综合
  score: 4
  description: 综合性学习——以社会实践活动为载体，完成拟写、概括等语言运用任务
  knowledge_points: [语言运用, 活动方案, 综合性学习]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

- id: 5
  type: 综合
  score: 4
  description: 书法欣赏与文化常识——比较不同书体风格，考查传统文化基础知识
  knowledge_points: [书法鉴赏, 文化常识, 传统文化]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

# === 二、古诗文阅读 (共17分) ===
- id: 6
  type: 填空
  score: 4
  description: 古诗文默写——涵盖课内必背篇目，含上下句填写和情境式默写
  knowledge_points: [古诗文默写, 名句积累]
  module: classicalReading
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 7
  type: 简答
  score: 2
