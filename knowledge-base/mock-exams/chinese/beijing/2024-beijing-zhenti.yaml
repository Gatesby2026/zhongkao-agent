# === 三、名著阅读 (共5分) ===
- id: 14
  type: 简答
  score: 2
  description: 名著知识考查——辨识必读名著中的经典情节或人物关系
  knowledge_points: [名著情节, 人物关系]
  module: masterpieceReading
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 15
  type: 简答
  score: 3
  description: 名著专题探究——围绕某一主题整合多部名著内容进行比较分析
  knowledge_points: [专题探究, 比较阅读]
  module: masterpieceReading
  difficulty: 中档
  recommended_for: [L1, L2, L3]

