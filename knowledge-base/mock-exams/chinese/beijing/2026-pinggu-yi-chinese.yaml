  question: 16. 伏笔是文学创作中一种铺垫式的写作手法，作者在文章前文通过细微的情节、人物言行、环境细节或道具等，为后文关键情节、人物命运、作品主题提供相关的暗示或线索，兼具串联情节、塑造人物、深化主题的作用。请结合《骆驼祥子》《简·爱》《水浒传》等名著，选一处伏笔，结合具体情节分析其作用。（不少于100字）
  answer: 祥子初到北平拉车时, 反复念叨“要靠自己买一辆属于自己的车”, 这是一处关键伏笔。它为后文祥子 “三起三落”的买车情节做了核心铺垫, 正因这份执念, 才有了祥子拼命攒钱买第一辆车、被大兵抢走后再度奋斗、凑钱买车又被孙侦探敲诈、最终车梦彻底破碎的完整情节链, 让故事的情节推进连贯自然, 没有丝毫突兀之感, 也让读者能顺着这份执念理解祥子的每一次选择。
