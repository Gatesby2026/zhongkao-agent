  answer: 风格相通：二者都追求疏朗清淡、简省笔墨，绘画简静淡雅、重留白写意；文学情节淡化、语言简练，同样讲究留白。取材一致：都取材日常平凡事物，绘画多画花鸟草木等小物，文学多写市井百姓、寻常儿女，充满生活温情。表现手法相融：文学创作文中有画、画面感极强，他将绘画的写意手法、虚实相生的意境融入文字，实现文与画的美学统一。
