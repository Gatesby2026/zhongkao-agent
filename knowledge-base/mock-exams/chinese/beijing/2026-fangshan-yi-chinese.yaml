  question: 从下面两个题目中任选一题，按要求写一篇作文。\n（1）“班超联赛”是近年兴起的全员参与型校园体育赛事。赛场上有心照不宣的默契，有逆风翻盘时的欢呼，有赛场失利时的彼此慰藉……请你以“我们的班超联赛”为题，写一篇作文。文体不限，诗歌除外。\n（2）课堂内外的日常里有乐趣，奔赴热爱的旅途中有欢乐，并肩同行的时光里有快乐……这份“乐”，是从始至终伴你左右的美好。请将题目“乐在……中”补充完整，写一篇作文。文体不限，诗歌除外。
  answer: 汪曾祺的画风和文风相同，均追求简约凝练、重留白。（1分）；文章与绘画创作皆以日常为素材，借笔墨抒写真性情、传递生活温情（1分）；文与画在表现手法上也是融通的，他带着诗意去作画，将绘画的写意融入文学，让作品的画面感极强（1分）。
