  question: 15. 联系上面《鱼我所欲也》及下面的材料，在后面语段的横线处填写恰当的内容。（3分）\n【材料一】\n子墨子曰：“万事莫贵于义。今谓人曰：‘予\textcircled{1}子\textcircled{2}冠履\textcircled{3}，而断子之手足，子为之乎？’必不为。何故？则冠履不若手足之贵也。又曰：‘予子天下，而杀子之身，子为之乎？’必不为。何故？则天下不若身之贵也。争一言\textcircled{4}以相杀，是贵义于其身也。故曰：万事莫贵于义也。”\n（取材于《墨子・贵义》）\n【材料二】\n至潮阳，见弘范\textcircled{5}，左右命之拜，不拜，弘范遂以容礼见之，与俱入崖山，使为书招\textcircled{6}张世杰\textcircled{7}。天祥曰：“吾不能捍父母，乃教人叛父母，可乎？”索之固\textcircled{8}，乃以书《过零丁洋》诗与之。崖山破，弘范遣使护送天祥至京师。天祥在燕凡三年，上知天祥终不屈也，召入谕之曰：“汝何愿？”天祥对曰：“天祥受宋恩，为宰相，安事二姓？愿赐之一死足矣。”天祥临刑殊\textcircled{9}从容，南乡拜而死，年四十七。\n（取材于《宋史・文天祥传》）
