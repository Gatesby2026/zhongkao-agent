  question: '26. 潜标是海洋科学观测中用于长期获取水下环境数据的重要装备，可将观测设备置于海面以下，通过多层传感器实现全海深多要素同步观测。它主要由主浮体、观测设备、若干浮球和释放器组成，将它们用缆绳串联，并通过重块锚定在海底。回收时通过释放器与重块脱离，在主浮体和浮球共同作用下，使整体设备浮出海面。在某次深海科学观测时，工作人员需要投放一套潜标，其简化模型如图所示，其中主浮体重4000N，体积为0.8
    m³，位于海面以下50m的位置；观测设备（分布在缆绳上的不同位置）总重3000N，总体积为0.1 m³；15个浮球、缆绳和释放器总重6000N，每个浮球的体积为0.05 m³；释放器位于深度3000m的位置；缆绳和释放器的体积忽略不计。g取10 N/kg，海水的密度取1.0×10³ kg/m³。求：


    （1）释放器所受海水的压强。


    （2）重块对释放器的拉力。


    主浮体


    观测设备


    15个浮球


    缆绳


    释放器


    亚块'
  answer: '(1) $p = \rho \times g \times h = 1.0 \times 10^3 \, \text{kg/m}^3 \times 10 \, \text{N/kg} \times 3000 \, \text{m} = 3 \times 10^7 \, \text{Pa}$ (2) 对潜标整体受力分析如右图 潜标受到的总浮力: $F_{\text{浮}} = \rho
    \times g \times V_{\text{排}} = 1.0 \times 10^3 \, \text{kg/m}^3 \times 10 \, \text{N/kg} \times (0.8 \, \text{m}^3 + 0.1 \, \text{m}^3)$ $= 0.05 \, \text{m}^3 \times 15 = 1.65 \times 10^4 \, \text{N}$
    潜标受到的总重力 $G_{\text{标}}$: $G_{\text{标}} = G_{\text{甲}} + G_{\text{乙}} = 4000 \, \text{N} + 3000 \, \text{N} + 6000 \, \text{N} = 13000 \, \text{N}$ $F_{\text{拉}} = F_{\text{浮}} - G_{\text{标}} = 1.65
    \times 10^4 \, \text{N} - 1.3 \times 10^4 \, \text{N} = 3.5 \times 10^3 \, \text{N}$'
