    \times 10^4 \text{ Pa}$$ $$F_{\text{吸}}' = (p_0 - p_{\text{内}}')S_{\text{E}} = (1.0 \times 10^5 \text{ Pa} - 0.2 \times 10^5 \text{ Pa}) \times 0.04 \text{ m}^2 = 6.4 \times 10^4 \text{ N}$$ $$G_{\text{E}}
