  question: 23. 小东设计实验测量盐水的密度，主要实验步骤如下： \\ (1) 在两端开口且粗细均匀的玻璃管一端蒙上薄橡皮膜并用细线扎紧，此时橡皮膜与管口相平。向管内倒入适量的水，橡皮膜向下凸起，如图甲所示。 \\ (2) 在烧杯中装入适量的盐水，将玻璃管缓慢浸入其中，直至橡皮膜再次与管口相平，如图乙所示。用刻度尺测出玻璃管中水面到下管口的距离，记为 $h_1$，用刻度尺测出盐水液面到下管口的距离，记为
    $h_2$。忽略橡皮膜的质量及体积，则盐水密度表达式 $\rho_{\text{盐}} = \boxed{\frac{h_1}{h_2}}$（用 $\rho_{\text{水}}$、$h_1$、$h_2$ 表示），请从力的角度分析并写出推导过程。
  answer: 以橡皮膜为研究对象, 受力分析见答图 2 设管口处橡皮膜的面积为 S $$F_{\text{盐}} = \rho_{\text{盐}} g h_2 S = \rho_{\text{水}} g h_1 S$$ $$\rho_{\text{盐}} = \frac{\rho_{\text{水}} h_1}{h_2}$$
  solution: 以橡皮膜为研究对象, 受力分析见答图 2 设管口处橡皮膜的面积为 S $$F_{\text{盐}} = \rho_{\text{盐}} g h_2 S = \rho_{\text{水}} g h_1 S$$ $$\rho_{\text{盐}} = \frac{\rho_{\text{水}} h_1}{h_2}$$
