  question: 26. 如图甲所示是一台真空吸盘悬臂吊吊起水平放置的玻璃板的情境。抽出吸盘内部的空气，使吸盘内部气压减小，在玻璃板被吸盘覆盖区域的上下表面形成气压差，从而产生垂直于玻璃板的吸附力。玻璃板所受气压作用的示意图如图乙所示。该装置在竖直方向上吊起水平放置的玻璃板时，为保证吊装过程安全可靠，规定允许吊起物体的最大重力为总吸附力的三分之一。已知该装置下方装有 6 个完全相同的圆形真空吸盘，每个吸盘的有效面积（玻璃板被吸盘覆盖区域的面积）为
    $0.04 \, \text{m}^2$。外界大气压强 $p_0 = 1.0 \times 10^5 \, \text{Pa}$，吸盘工作时内部气体压强的范围为 $2.0 \times 10^4 \, \text{Pa} \leq p_{\text{吸}} \leq 6.0 \times 10^4 \, \text{Pa}$。假设装置工作时 6 个吸盘内的气压均相同。求： \\ (1) 当每个吸盘内部的气体压强为
    $3 \times 10^4 \, \text{Pa}$ 时，单个吸盘可以使玻璃板受到的吸附力。 \\ (2) 装置在安全使用的前提下，能够吊起的玻璃板所受的最大重力。 \\ (3) 若想增大此装置可吊起玻璃板的最大重力，请写出一种改进方法。
