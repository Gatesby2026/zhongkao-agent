  question: 23. 某同学在实践活动中利用轻质细杆、容积为V的塑料桶、质量为m的钩码、细线等，制成了一个测量液体密度的“杆秤密度计”，如图所示。在塑料桶内装满液体，移动钩码的位置，当细杆在水平位置平衡时，通过钩码所在位置的刻度线直接读出液体密度的数值。“杆秤密度计”上有密度值为ρ1和ρ2的两条刻度线(ρ1<ρ2)，两刻度线之间的距离为△1，该同学发现△1很小。若想增大△1，分析说明应该增加还是减少塑料桶的容积。
    [图
  answer: 设杆秤密度计塑料桶的质量为$m$桶，提纽到塑料桶悬挂位置间的距离为$l_0$，塑料桶装满$\rho_1$液体杆秤密度计水平平衡时，提纽到钩码所在位置的刻线为$l_1$，依据杠杆平衡条件有 $(\rho_1 gV + m_{\text{桶}} g) \cdot l_0 = l_1 \cdot m g$ 解得 $l_1 = \frac{(\rho_1 V + m_{\text{桶}})
    \cdot l_0}{m}$。塑料桶装满$\rho_2$液体杆秤密度计水平平衡时，提纽到钩码所在位置的刻线为$l_2$，依据杠杆平衡条件有 $(\rho_2 gV + m_{\text{桶}} g) \cdot l_0 = l_2 \cdot m g$ 解得 $l_2 = \frac{(\rho_2 V + m_{\text{桶}}) \cdot l_0}{m}$。由于$\rho_1 < \rho_2$，因此$l_1
    < l_2$。$\rho_1$、$\rho_2$刻线间距$\Delta l = l_2 - l_1 = \frac{(\rho_2 V + m_{\text{桶}})}{m} \cdot l_0 - \frac{(\rho_1 V + m_{\text{桶}})}{m} \cdot l_0 = \frac{(\rho_2 - \rho_1) \cdot V l_0}{m}$。m,l_0,P_1,P_2不变，若想增大$\Delta
    l$，即应增大塑料桶的容积V。(其它答案合理即可得分)
  solution: 设杆秤密度计塑料桶的质量为$m$桶，提纽到塑料桶悬挂位置间的距离为$l_0$，塑料桶装满$\rho_1$液体杆秤密度计水平平衡时，提纽到钩码所在位置的刻线为$l_1$，依据杠杆平衡条件有 $(\rho_1 gV + m_{\text{桶}} g) \cdot l_0 = l_1 \cdot m g$ 解得 $l_1 = \frac{(\rho_1 V + m_{\text{桶}})
    \cdot l_0}{m}$。塑料桶装满$\rho_2$液体杆秤密度计水平平衡时，提纽到钩码所在位置的刻线为$l_2$，依据杠杆平衡条件有 $(\rho_2 gV + m_{\text{桶}} g) \cdot l_0 = l_2 \cdot m g$ 解得 $l_2 = \frac{(\rho_2 V + m_{\text{桶}}) \cdot l_0}{m}$。由于$\rho_1 < \rho_2$，因此$l_1
    < l_2$。$\rho_1$、$\rho_2$刻线间距$\Delta l = l_2 - l_1 = \frac{(\rho_2 V + m_{\text{桶}})}{m} \cdot l_0 - \frac{(\rho_1 V + m_{\text{桶}})}{m} \cdot l_0 = \frac{(\rho_2 - \rho_1) \cdot V l_0}{m}$。m,l_0,P_1,P_2不变，若想增大$\Delta
    l$，即应增大塑料桶的容积V。(其它答案合理即可得分)
