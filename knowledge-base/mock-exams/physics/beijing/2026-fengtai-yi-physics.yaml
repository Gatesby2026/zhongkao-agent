  question: '25. 某电火锅的铭牌信息如下表所示，其内部简化电路如图所示，$R_1$、$R_2$为阻值一定的电热丝，且 $R_1 < R_2$。通过控制开关 $S_1$、$S_2$ 的闭合或断开状态，可以让电火锅在不同档位工作。 | 额定电压 | 220V | | --- | --- | | 额定功率 | 低温档 500W 中温档 1000W 高温档 1500W | (1) 求 $R_1:
    R_2$。 (2) 若家庭电路的电压为220V，某插座允许通过的最大电流为5A，用该插座仅给电火锅供电，从安全用电和加热快这两个角度综合考虑，应选择哪个档位？说明理由。'
  answer: '解: (1)由电路图可知: 当S1闭合、S2断开时, 只有R1工作, 为中温档, 等效电路如图甲, 功率 \(P_1=1000\text{W}\); 当S2闭合、S1断开时, 只有R2工作, 为低温档, 等效电路如图乙, 功率 \(P_2=500\text{W}\). 由 \(P=\frac{U^2}{R}\), 可得 \(R=\frac{U^2}{P}\) 因为U=220V不变,
    所以 \(\frac{R_1}{R_2}=\frac{P_2}{P_1}=\frac{500\text{W}}{1000\text{W}}=1:2\) (2)该插座允许的最大功率为 \(P_{\text{最大}}=UI_{\text{最大}}=220\text{V}\times5\text{A}=1100\text{W}\) 低温档: \(500\text{W} < 1100\text{W}\),
    安全但加热慢; 中温档: \(1000\text{W} < 1100\text{W}\), 安全且加热较快; 高温档: \(1500\text{W}>1100\text{W}\), 超过该插座允许的最大功率, 不安全。所以, 从安全用电和加热快这两个角度综合考虑, 应选择中温档。 (其它解法正确的, 均可相应得分)'
