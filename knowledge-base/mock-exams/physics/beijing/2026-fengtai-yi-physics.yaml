  question: 26. 图甲为我国某单柱半潜式深海渔场，其正常作业时简化模型如图乙所示。半潜式深海渔场主要由柱形容器、养殖网箱、铸铁块三部分组成。中央的柱形容器是一个由镀锌铁皮制成的空心圆柱体，忽略侧壁的厚度，其横截面积为 $5 \, \text{m}^2$，高度为40m，柱形容器的上端有气阀，下端开口与海水相通，通过气阀的充气或放气，可以控制进入柱形容器内海水量的大小，使整个渔场按要求在海面上进行升降；养殖网箱高度为12m，固定在柱形容器周围，与海水相通，是养鱼的空间，其底部与柱形容器最下端齐平；养殖网箱的底部挂有质量为30t的铸铁块，它不与海底接触，主要起稳定整个渔场的作用。已知柱形容器、养殖网箱和绳索的总质量为20t，养殖网箱、绳索和铸铁块能够排开海水的最大体积为
    $25 \, \text{m}^3$，海水的密度取 $1.0 \times 10^3 \, \text{kg/m}^3$，柱形容器内气体的质量忽略不计，g取10N/kg，求： (1) 正常作业时，整个渔场所受的总浮力。 (2) 如遇风暴渔场下降，当网箱底部在海面下30m处静止时，柱形容器内海水的高度。
  answer: '解: (1) \(m_{\text{盐}}=20t+30t=5\times10^4\text{kg}\) \(G_{\text{盐}}=m_{\text{盐}}g=5\times10^4\text{kg}\times10\text{N/kg}=5\times10^5\text{N}\) 正常工作时, 渔场处于漂浮状态 \(F_{\text{浮}}=G_{\text{盐}}=5\times10^5\text{N}\)
    (2) \(V_{\text{水}}=\frac{F_{\text{浮}}}{\rho_{\text{海水}}g}=\frac{5\times10^5\text{N}}{1.0\times10^3\text{kg/m}^3\times10\text{N/kg}}=50\text{m}^3\) 因为养殖网箱、绳索和铸铁块能够排开海水的最大体积为\(25\text{m}^3\), 所以空心圆柱体排开海水的体积
    \(V_1=50\text{m}^3-25\text{m}^3=25\text{m}^3\) 当养殖网箱的底部下降至海面的距离为30m时, 柱形容器内海水的 体积 \(V_2=Sh_{\text{水}}=5\text{m}^2\times30\text{m}=125\text{m}^3\) \(h_{\text{海水}}=\frac{V_2}{S}=\frac{125\text{m}^3}{5\text{m}^2}=25\text{m}\)
    (其它解法正确的, 均可相应得分)'
