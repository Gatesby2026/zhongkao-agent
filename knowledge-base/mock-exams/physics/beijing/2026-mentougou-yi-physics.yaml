  question: 23. 如图 23 所示，细线的一端固定在杯底，另一端拴住小球 A。向杯内缓慢注酒精，小球 A 逐渐上浮。当小球 A 露出液面的体积为总体积的二分之一时，细线对小球的拉力为 2N；当小球 A 浸没在酒精中时，细线对小球的拉力为 6N。已知 g=10N/kg，ρ酒精=0.8×10³kg/m³。求： (1) 小球 A 浸没到酒精中受到的浮力为多少？ (2) 小球的密度为多少？
  answer: '(1) 增大 (1 分)

