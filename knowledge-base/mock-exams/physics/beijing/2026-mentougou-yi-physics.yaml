  question: 17. 如图 14 甲，小勇用标有“等高线”的球形玻璃罩装置进行“光的反射实验”探究。 (1) 将一小块平面镜放在一个能转动的水平圆台上。用固定放置的红色激光笔，发出一束垂直射向平面镜的光，记为 NO；用另一支绿色激光笔，斜射向 O 点发出一束光，记为 AO；AO 经平面镜反射后沿 OE 方向射出，E 点恰好落在 A 点所在的等高线上，如图 14 乙。 (2) 将绿色激光笔固定在玻璃罩上后，缓慢转动圆台，当整个装置旋转到某一位置，可以看到光线
    OE 恰好把光线 NO 和光线 AO 挡住。这说明光的反射现象中，反射光线、入射光线和光线 NO 在 _。 (3) 保持入射角度不变，让绿色激光笔继续沿 A 点所在的等高线顺时针转动，使入射光始终射向 O 点，如图 14 丙，发现反射光线将 _（选项：“顺时针”或“逆时针”）转动，且所有的反射光线都经过这条等高线。
