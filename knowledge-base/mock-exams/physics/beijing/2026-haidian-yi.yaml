  question: 23. 盛有盐水的薄壁杯子静止在水平桌面上，杯子上宽下窄、杯口直径大于杯底直径、底面积为 S。如图所示，将一个鸡蛋轻放入杯内的盐水中（盐水未溢出），鸡蛋悬浮。与放入鸡蛋前相比，鸡蛋悬浮时，盐水对杯底的压力增大了 $\Delta F_1$，杯子对桌面的压力增大了 $\Delta F_2$。请分析并判断 $\Delta F_1$ 与 $\Delta F_2$ 的大小关系。
  answer: 设鸡蛋所受的重力为G，鸡蛋悬浮时，排开盐水的体积为$V_{\text{排}}$，杯内液面上升的高度为$\Delta h$\\由于液面上升，导致杯底压强增加：$\Delta p = \rho_{\text{水}} g \Delta h$\\盐水对杯底压力的增加量：$\Delta F_1 = \Delta p S = \rho_{\text{水}} g \Delta h S$\\杯子对桌面压力的增加量：$\Delta
    F_2 = G = F_{\text{排}} = \rho_{\text{水}} g V_{\text{排}}$\\由于杯子上宽下窄，所以$\Delta h S < V_{\text{排}}$\\因此，$\Delta F_1 < \Delta F_2$
