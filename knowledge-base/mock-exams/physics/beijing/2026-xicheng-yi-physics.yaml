  question: 25. 小萱把一个装有适量水的柱形容器放在水平桌面上，将一个空的薄壁玻璃杯放在水面，如图所示，当杯子和容器中的水静止时，水面到容器底的距离为 $h_1$；她将杯口倾斜，从容器中舀取一些水到杯中，然后松开手，当杯子和容器中的水静止时，她观察到装水的杯子仍漂浮在水面，此时容器中水面到容器底的距离为 $h_2$。请利用力学知识分析推理判断：前、后两次容器中水面到容器底的距离 $h_1$
    与 $h_2$ 的大小关系。
  answer: '因为杯子前、后两次均漂浮: 所以: \(F_{\text{浮1}}=G_{\text{空杯}}, F_{\text{浮2}}=G_{\text{空杯}}+G_{\text{杯内水}}\) 因此\(\triangle F_{\text{浮}}=G_{\text{杯内水}}\) 又因为: \(\triangle F_{\text{浮}}=\rho \times g \triangle
    V_{\text{排}}\) 则: \(G_{\text{杯内水}}=\rho \times g V_{\text{排内水}}=\rho \times g \triangle V_{\text{排}}\), 因此 \(V_{\text{排内水}}=\triangle V_{\text{排}}\) 即: 容器中水减少的体积 \(V_{\text{杯内水}}\) 与后来杯子增加的排水体积 \(\triangle
    V_{\text{排}}\) 相等。又因为: \(h_{1}=\frac{V_{\text{排1}}+V_{\text{总水}}}{S}, h_{2}=\frac{V_{\text{排1}}+\triangle V_{\text{排}}+V_{\text{总水}}-V_{\text{杯内水}}}{S}=\frac{V_{\text{排1}}+V_{\text{总水}}}{S}\) 因此可以判断:
    前、后两次容器中的水面到容器底的距离 \(h_{1}=h_{2}\)。'
