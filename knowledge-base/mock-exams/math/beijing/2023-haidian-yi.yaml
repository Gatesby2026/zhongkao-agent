  question: '在平面直角坐标系xOy中，点$A(x_{0},\ m),\ B(x_{0}+4,\ n)$在抛物线$y=x^{2}-2bx+1$上．

    （1）当$b = 5,\ x_0 = 3$时，比较m与n的大小，并说明理由；

    （2）若对于$3 \leq x_{0} \leq 4$，都有$m<n<1$，求b的取值范围．'
  answer: （1）$m = n$ （2）$4<b<5$
  solution: '【小问1详解】

    解：$m = n$．

    理由：当$b = 5,\ x_0 = 3$时，抛物线解析式为$y=x^{2}-10x+1$，点$A(3,\ m),\ B(7,\ n)$，

    将$A(3,\ m),\ B(7,\ n)$代入$y=x^{2}-10x+1$，

    得：$m=3^{2}-10\times3+1=-20$，$n=7^{2}-10\times7+1=-20$，

    ∴$m = n$；

    【小问2详解】

    解：∵该函数解析式$[公式]$$y=x^{2}-2bx+1$，

    ∴其图象开口向上，对称轴为直线$x = \frac{-2b}{-2} = b$，

    ∴在对称轴左侧，y随x的增大而减小，在对称轴右侧，y随x的增大而增大．

    ∵$A(x_{0},\ m),\ B(x_{0}+4,\ n)$，

    ∴点B在点A右侧．

    ∵对于$3 \leq x_{0} \leq 4$，都有$m<n<1$，

    ∴$7\leq x_{0}+4\leq8$，

    ∴当$x=8$时，$y<1$，即$8^2-16b+1<1$，

    解得：$b > 4$．

    ∵对于$3 \leq x_{0} \leq 4$，都有$m<n<1$，

    ∴$\left|x_{n}-b\right|<x_{n}+4-b$，

    两边平方，得：$(x_{0}-b)^{2}<(x_{0}+4-b)^{2}$，

    整理，得：$b < x_0 + 2$，

    ∴$b<3+2=5$．

    综上可知$4<b<5$．'
