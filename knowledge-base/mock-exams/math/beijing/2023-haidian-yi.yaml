  question: '如图，在四边形$ABCD$中，$\angle A=\angle C=90^{\circ}$，过点B作$BE \parallel AD$交CD于点E，点F为AD边上一点，$AF = BE$，连接EF．

    [图]

    （1）求证：四边形$ABEF$为矩形；

    （2）若$AB = 6,\ BC = 3,\ CE = 4$，求ED的长．'
  answer: （1）见解析（2）10
  solution: '【小问1详解】

    证明：∵$BE \parallel AD$，即$BE \parallel AF$，$AF = BE$，

    ∴四边形$ABEF$为平行四边形．

    ∵$\angle A = 90^{\circ}$，

    ∴四边形$ABEF$为矩形；

    【小问2详解】

    解：∵$BE \parallel AD$，

    ∴$\angle BEC = \angle D$．

    ∵四边形$ABEF$为矩形，

    ∴$\angle C=\angle EFD=90^{\circ}$，$EF = AB = 6$，

    ∴$\triangle BEC\sim\triangle EDF$，

    ∴$\frac{CE}{DF} = \frac{BC}{EF}$，即$\frac{4}{DF} = \frac{3}{6}$，

    解得：$DF = 8$，

    ∴$DE=\sqrt{EF^{2}+DF^{2}}=10$．

