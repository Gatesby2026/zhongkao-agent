  question: '下面是小明同学证明定理时使用的两种添加辅助线的方法，选择其中一种，完成证明．

    定理：在直角三角形中，如果一个锐角等于$30^\circ$，那么它所对的直角边等于斜边的一半．已知：如图，在$\triangle ABC$中，$\angle C=90^{\circ},\ \angle A=30^{\circ}$．

    求证：$BC=\frac{1}{2}AB$．

    [图]

    方法一

    证明：如图，延长BC到点D，使得$CD = BC$，连接AD．

    [图]

    方法二

    证明：如图，在线段AB上取一点D，使得$BD = BC$，连接CD．

    [图]'
  answer: 证明见解析
  solution: '证明：方法一：如图，延长BC到点D，使得$CD = BC$，连接AD，

    ∵$\angle C=90^{\circ},\ \angle A=30^{\circ}$，

    ∴$\angle ACB=\angle ACD=90^{\circ}$，$\angle B=60^{\circ}$，

    在$\triangle ACB$和$\triangle ACD$中，

    $\begin{aligned}

    &BC = DC \\

    &\angle ACB = \angle ACD = 90^\circ \\

    &AC = AC

    \end{aligned}$，

    ∴$\triangle ABC \cong \triangle ACD (SAS)$，

    ∴$AB = AD$，

    ∴$\triangle ABD$是等边三角形，

    ∴$AB = BD$，

    ∴$AB = BC + CD + 2BC$，即$BC=\frac{1}{2}AB$；

    方法二：如图，在线段AB上取一点D，使得$BD = BC$，连接CD，

    ∵$\angle C=90^{\circ},\ \angle A=30^{\circ}$，

    ∴$\angle B=60^{\circ}$，

    ∵$BD = BC$，

    ∴$\triangle BCD$是等边三角形，

    ∴$BC = CD = BD$，$\angle BCD = 60^\circ$，

    ∴$\angle DCA = 30^\circ$，

    ∴$\angle DCA = \angle A$，

    ∴$CD = AD$，

    ∴$BC = BD = AD$，

    ∴$BC=\frac{1}{2}AB$．'
