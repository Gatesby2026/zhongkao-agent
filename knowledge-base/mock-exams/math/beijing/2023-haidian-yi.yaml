  question: '如图，AB为$\odot\odot$的直径，C为$\odot\odot$上一点，D为$\widehat{BC}$的中点，$DE \perp AC$交AC的延长线于点E．

    [图]

    （1）求证：直线DE为$\odot\odot$的切线；

    （2）延长$AB,ED$交于点F．若$BF = 2, \sin \angle AFE = \frac{1}{3}$，求AC的长．'
  answer: （1）证明见解析 （2）$\frac{2}{3}$
  solution: '【小问1详解】

    证明：连接BC，连接OD交BC于点F．

    ∵AB是$\odot\odot$的直径，

    ∴$\angle ACB=90^\circ$，

    ∵点D是$\widehat{BC}$的中点，

    ∴$OD \perp BC$，

    又∵$DE \perp AC$，

    ∴四边形$CEDF$是矩形，

    ∴$\angle ODE=90^{\circ}$，

    ∴$OD \perp DE$，

    又∵OD是$\odot\odot$的半径，

    ∴DE是$\odot\odot$的切线．

    [图]【小问2详解】

    解：设$\odot\odot$的半径为r，则$OF=2+r,\ OD=r$，

    在$\mathrm{Rt}\triangle ODF$中，$\sin \angle OFD = \frac{OD}{OF} = \frac{1}{3}$，

    ∴$\frac{r}{r+2}=\frac{1}{3}$，

    ∴$r = 1$，

    ∴$AB = 2r = 2$，

    ∵$\angle A+\angle F=90^{\circ}=\angle A+\angle ABC$，

    ∴$\angle ABC = \angle AFE$，

    ∴$\sin\angle ABC=\sin\angle AFE$，

    在$Rt\triangle ABC$中，$\sin \angle ABC = \frac{AC}{AB} = \frac{1}{3}$，

    ∴$AC = \frac{2}{3}$．

