  question: '“兔飞猛进”谐音成语“突飞猛进”．在自然界中，野兔善于奔跑跳跃，“兔飞猛进”名副其实．野兔跳跃时的空中运动路线可以看作是抛物线的一部分．

    [图]

    （1）建立如图所示的平面直角坐标系．

    通过对某只野兔一次跳跃中水平距离x（单位：m）与竖直高度y（单位：m）进行的测量，得到以下数据：

    水平距离$x/m$

    0

    $0.4$

    1

    $1.4$

    2

    $2.4$

    $2.8$

    竖直高度$y/m$

    0

    $0.48$

    $0.9$

    $0.98$

    $0.8$

    $0.48$

    0

    根据上述数据，回答下列问题：

    ①野兔本次跳跃的最远水平距离为_________m，最大竖直高度为_________m；

    ②求满足条件的抛物线的解析式；

    （2）已知野兔在高速奔跑时，某次跳跃的最远水平距离为$3m$，最大竖直高度为$1m$．若在野兔起跳点前方$2m$处有高为$0.8m$的篱笆，则野兔此次跳跃_________（填“能”或“不能”）跃过篱笆．'
  answer: （1）①$2.8$，$0.98$；②$y = -0.5(x - 1.4)^2 + 0.98 \, (0 \leq x \leq 2.8)$ （2）能
  solution: '【小问1详解】

    解：①由表格中的数据可知，当$x = 2.8$时，$y = 0$，

    ∴野兔本次跳跃的最远水平距离为$2.8m$，

    ∴满足题意的抛物线对称轴为直线$x=\frac{0+2.8}{2}=1.4$，

    ∵抛物线开口向下，

    ∴当$x=1.4$，y最大，

    ∴由表格数据可知最大竖直高度为$0.98m$，

    故答案为：$2.8$，$0.98$；

    ②由①可知抛物线顶点坐标为$(1.4,0.98)$，

    ∴可设抛物线解析式为$y = a(x - 1.4)^2 + 0.98$，

    ∴$a(0-1.4)^{2}+0.98=0$，

    ∴$a = -0.5$，

    ∴抛物线解析式为$y = -0.5(x - 1.4)^2 + 0.98 \, (0 \leq x \leq 2.8)$

    【小问2详解】

    解：∵某次跳跃的最远水平距离为$3m$，最大竖直高度为$1m$，

    ∴此时满足题意的抛物线顶点坐标为$(1.5,1)$，

    同理可求出此时抛物线的解析式为$y = -\frac{4}{9}(x - 1.5)^2 + 1$，

    当$x=2$时，$y=-\frac{4}{9}(2-1.5)^{2}+1=\frac{8}{9}$，

    ∵$\frac{8}{9}>0.8$，

    ∴野兔此次跳跃能跃过篱笆，

    故答案为：能．'
