  question: 分式方程$\frac{1}{x}=\frac{2}{x+3}$的解为________．
  answer: $x=3$
  solution: '解：$\frac{1}{x}=\frac{2}{x+3}$，

    方程两边都乘以$x(x+3)$约去分母得：$x+3=2x$，

    解这个整式方程得$x=3$，

    检验：当$x=3$时，$x(x+3)\neq0$，

    ∴$x=3$是原分式方程的解．

    故答案为：$x=3$．'
