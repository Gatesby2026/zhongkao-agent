  question: '在平面直角坐标系xOy中，一次函数$y=kx+b$的图象过点$(1,3),(2,2)$．

    （1）求这个一次函数的解析式；

    （2）当$x>2$时，对于x的每一个值，一次函数$y = mx$的值大于一次函数$y=kx+b$的值，直接写出m的取值范围．'
  answer: （1）一次函数的解析式$y = -x + 4$； （2）$m\ 1$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b$的图象过点$(1,3),(2,2)$，

    ∴把$(1,3),(2,2)$代入得：$\left\{ \begin{array} { l } { k + b = 3 } \\ { 2 k + b = 2 } \end{array} \right.$，

    解得：$\left\{

    \begin{array}{l}

    k = -1 \\

    b = 4

    \end{array}

    \right.$，

    ∴一次函数的解析式$y = -x + 4$；

    $[公式]$小问2详解】

    解：由（1）得：一次函数的解析式$y = -x + 4$，

    当$x=2$时，$y=2$，

    当$x>2$时，对于x的每一个值，一次函数$y = mx$的值大于一次函数$y=kx+b$的值，

    把$x=2$代入$y = mx$得：$y = 2m$，

    ∴$2m-2$，

    解得：$m\ 1$．'
