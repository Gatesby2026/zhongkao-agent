  question: 已知$2x^{2}+x-1=0$，求代数式$(2x+1)^{2}-2(x-3)$的值．
  answer: '9'
  solution: '解：∵$2x^{2}+x-1=0$，

    ∴$2x^{2}+x=1$，

    ∴$(2x+1)^{2}-2(x-3)$

    $=4x^{2}+4x+1-2x+6$

    $=4x^{2}+2x+7$

    $=2(2x^{2}+x)+7$

    $=9$．'
