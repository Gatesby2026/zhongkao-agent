  question: '如图，菱形$ABCD$的对角线交于点O，点M为AB的中点，连接OM．若$AC = 4,\ BD = 8$，则OM的长为_________．

    [图]'
  answer: $\sqrt{5}$
  solution: '解：∵四边形$ABCD$为菱形，

    ∴$OB - OD = \frac{1}{2}BD = 4$，$OC = OA + \frac{1}{2}AC = 2$，$AC \perp BD$，

    ∴$BC = \sqrt{OB^{2} + OC^{2}} = 2\sqrt{5}$．

    ∵点M为AB的中点，

    ∴$OM=\frac{1}{2}BC=\sqrt{5}$．

