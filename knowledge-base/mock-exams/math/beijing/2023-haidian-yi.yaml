  question: 在平面直角坐标系xOy中，反比例函数$y=\frac{2}{x}$的图象与正比例函数$y = mx$的图象交于A，B两点，点A的坐标为$(l,\ a)$，则点B的坐标为_________．
  answer: $(-1,-2)$
  solution: '解：把$A(1,\ a)$代入反比例函数解析式中得$a=\frac{2}{1}$，解得$a = 2$，

    ∴$A(1,2)$，

    把$A(1,2)$代入正比例函数解析式中得$m = 2$，

    ∴正比例函数解析式为$y=2x$，

    联立$\left\{ \begin{array}{l} y = 2x \\ y = \dfrac{2}{x} \end{array} \right.$，解得$\left\{\begin{array}{l}x=-1\\y=-2\end{array}\right.$或$\left\{

    \begin{array}{l}

    x = 1 \\

    y = 2

    \end{array}

    \right.$（舍去），

    ∴$B(-1,-2)$，

    故答案为：$(-1,-2)$．'
