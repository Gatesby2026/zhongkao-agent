  question: '某校举办“歌唱祖国”演唱比赛，十位评委对每位同学的演唱进行现场打分，对参加比赛的甲、乙、丙三位同学得分的数据进行整理、描述和分析，下面给出了部分信息．

    a．甲、乙两位同学得分的折线图：

    [图]

    b．丙同学得分：

    10，10，10，9，9，8，3，9，8，10

    c．甲、乙、丙三位同学得分的平均数：

    | 同学 | 甲 | 乙 | 丙 |

    | --- | --- | --- | --- |

    | 平均数 | 8.6 | 8.6 | m |

    根据以上信息，回答下列问题：

    （1）求表中m的值；

    （2）在参加比赛的同学中，如果某同学得分的10个数据的方差越小，则认为评委对该同学演唱的评价越一致．据此推断：甲、乙两位同学中，评委对_________的评价更一致（填“甲”或“乙”）；

    （3）如果每位同学的最后得分为去掉十位评委打分中的一个最高分和一个最低分后的平均分，最后得分越高，则认为该同学表现越优秀．据此推断：在甲、乙、丙三位同学中，表现最优秀的是_________（填“甲”“乙”或“丙”）．'
  answer: （1）$8.6$ （2）甲 （3）丙
  solution: '【小问1详解】

    解：丙的平均数：$\frac{10+10+10+9+8+3+9+8+10}{10}=8.6$，

    则$m = 8.6$．

    【小问2详解】

    $S_{1}^{2}=\frac{1}{10}\left[2\times(8.6-8)^{2}+4\times(8.6-9)^{2}+2\times(8.6-7)^{2}+2\times(8.6-10)^{2}\right]=1.04$，

    $S_{x}^{2}=\frac{1}{10}\left[4\times(8.6-7)^{2}+4\times(8.6-10)^{2}+2\times(8.6-9)^{2}\right]=1.84$，

    $\therefore S_{\parallel}^{2}<S_{\angle}^{2}$，

    ∴甲、乙两位同学中，评委对甲的评价更一致，

    故答案为：甲．

    【小问3详解】

    由题意得，去掉一个最高分和一个最低分后的平均分为：

    甲：$\frac{8+8+9+7+9+9+9+10}{8}=8.625$，

    乙：$7+7+7+9+9+10+10+10=8.625$，

    丙：$\frac{10+10+9+8+8+9+8+10}{8}=9.125$，

    ∵去掉一个最高分和一个最低分后丙的平均分最高，

    因此最优秀的是丙，

    故答案为：丙．'
