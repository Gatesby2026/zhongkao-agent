  question: 已知$x^{2}+2x-2=0$，求代数式$x(x+2)+(x+1)^{2}$的值．
  answer: ５
  solution: '解：∵$x^{2}+2x-2=0$，

    ∴$x^{2}+2x=2$，

    ∴$x(x+2)+(x+1)^{2}$

    $x^{2}+2x+x^{2}+2x+1$

    $=2x^{2}+4x+1$

    $=2(x^{2}+2x)+1$

    $=2\times2+1$

    $= 5$'
