  question: '甲工厂将生产$[公式]$I号、II号两种产品共打包成5个不同的包裹，编号分别为A，B，C，D，E，每个包裹的重量及包裹中I号、II号产品的重量如下：

    | 包裹编号 | I 号产品重量 / 吨 | II 号产品重量 / 吨 | 包裹的重量 / 吨 |

    | --- | --- | --- | --- |

    | A | 5 | 1 | 6 |

    | B | 3 | 2 | 5 |

    | C | 2 | 3 | 5 |

    | D | 4 | 3 | 7 |

    | E | 3 | 5 | 8 |

    甲工厂准备用一辆载重不超过19.5吨的货车将部分包裹一次运送到乙工厂．

    （1）如果装运的I号产品不少于9吨，且不多于11吨，写出一种满足条件的装运方案________（写出要装运包裹的编号）；

    （2）如果装运的I号产品不少于9吨，且不多于11吨，同时装运的II号产品最多，写出满足条件的装运方案________（写出要装运包裹的编号）．'
  answer: ①.ABC（或ABE或AD或ACD或BCD） ②.ABE或BCD
  solution: '解：（1）根据题意，

    选择ABC时，装运的I号产品重量为：$5+3+2=10$（吨），总重$6+5+5=16<19.5$（吨），符合要求；

    选择ABE时，装运的I号产品重量为：$5+3+3=11$（吨），总重$6.5+8<19.5$（吨），符合要求；

    选择AD时，装运的I号产品重量为：$5+4=9$（吨），总重$6+7=13<19.5$（吨），符合要求；

    选择ACD时，装运的I号产品重量为：$5+2+4=11$（吨），总重$6+5+7=18<19.5$（吨），符合要求；

    选择BCD时，装运的I号产品重量为：$3+2+4=9$（吨），总重$5+5\cdot7<19.5$（吨），符合要求；

    选择DCE时，装运的I号产品重量为：$4+2+3=9$（吨），总重$7+5+8=20>19.5$（吨），不符合要求；

    选择BDE时，装运的I号产品重量为：$3 + 4 + 3 = 10$（吨），总重$5 + 7 + 8 = 20 > 19.5$（吨），不符合要求；

    综上，满足条件的装运方案有ABC或ABE或AD或ACD或BCD．

    故答案为：ABC（或ABE或AD或ACD或BCD）．

    （2）选择ABC时，装运的II号产品重量为：$1+2+3=6$（吨）；

    选择ABE时，装运的II号产品重量为：$1+2+5=8$（吨）；

    选择AD时，装运的II号产品重量为：$1+3=4$（吨）；

    选择ACD时，装运的II号产品重量为：$1+3+3=7$（吨）；

    选择BCD时，装运的II号产品重量为：$2+3+3=8$（吨）；

    故答案为：ABE或BCD．'
