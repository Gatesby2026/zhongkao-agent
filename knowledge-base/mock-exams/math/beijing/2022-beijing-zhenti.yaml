  question: '在平面直角坐标系xOy中，函数$y=kx+b(k\neq0)$$[公式]$图象经过点$(4,3)$，$(-2,0)$，且与y轴交于点A．

    （1）求该函数的解析式及点A的坐标；

    （2）当$x > 0$时，对于x的每一个值，函数$y = x + n$的值大于函数$y=kx+b(k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$y=\frac{1}{2}x+1$，$(0,1)$ （2）$n\ 1$
  solution: '【小问1详解】

    解：将$(4,3)$，$(-2,0)$代入函数解析式得，

    $\left\{\begin{array}{l}3-4k+b\\0=-2k+b\end{array}\right.$，解得$\left\{

    \begin{array}{l}

    k = \dfrac{1}{2} \\

    b = 1

    \end{array}

    \right.$，

    ∴函数的解析式为：$y=\frac{1}{2}x+1$，

    当$x = 0$时，得$y = 1$，

    ∴点A的坐标为$(0,1)$．

    【小问2详解】

    由题意得，

    $x + \pi > \frac{1}{2}x + 1$，即$x > 2 - 2n$，

    又由$x > 0$，得$2-2n\leq0$，

    解得$n\ 1$，

    ∴n的取值范围为$n\ 1$．'
