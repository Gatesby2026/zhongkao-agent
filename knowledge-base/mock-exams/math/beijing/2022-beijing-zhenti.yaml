  question: '在平面直角坐标系xOy中，点$(1,m),(3,n)$在抛物线$y=ax^{2}+bx+c(a>0)$上，设抛物线的对称轴为$x = t.$

    （1）当$c = 2, m = n$时，求抛物线与y轴交点的坐标及t的值；

    （2）点$(x_0,m)(x_0\neq1)$在抛物线上，若$m < n < c,$求t的取值范围及$x_0$的取值范围．'
  answer: （1）（0，2）；2 （2）t的取值范围为$\frac{3}{2}<t<2$，$x_0$的取值范围为$2 < x_0 < 3$
  solution: '【小问1详解】

    解：当$c = 2$时，$y = ax^2 + bx + 2$，

    ∴当x=0时，y=2，

    ∴抛物线与y轴交点的坐标为（0，2）；

    ∵$m = n$，

    ∴点$(1,m),(3,n)$关于对称轴为$x = t$对称，

    ∴$t=\frac{1+3}{2}=2$；

    【小问2详解】

    解：当x=0时，y=c，

    ∴抛物线与y轴交点坐标为（0，c），

    ∴抛物线与y轴交点关于对称轴$x = t$的对称点坐标为（2t，c），

    ∵$a > 0$，

    ∴当$x \leq t$时，y随x的增大而减小，当$x > t$时，y随x的增大而增大，

    当点$(1,m)$，点$(3,n)$，（2t，c）均在对称轴的右侧时，$t < 1$，

    ∵$m < n < c,$1＜3，

    ∴2t＞3，即$t>\frac{3}{2}$（不合题意，舍去），

    当点$(1,m)$在对称轴的左侧，点$(3,n)$，（2t，c）均在对称轴的右侧时，点$(x_0,m)$在对称轴的右侧，$1<t<3$，

    此时点$(3,n)$到对称轴$x = t$的距离大于点$(1,m)$到对称轴$x = t$的距离，

    ∴$t-1<3-t$，解得：$t<2$，

    ∵$m < n < c,$1＜3，

    ∴2t＞3，即$t>\frac{3}{2}$，

    ∴$\frac{3}{2}<t<2$，

    ∵$(x_0,m)$，$(1,m)$，对称轴为$x = t$，

    ∴$t = \frac{x_0 + 1}{2}$，

    ∴$\frac{3}{2}<\frac{x_{0}+1}{2}<2$，解得：$2 < x_0 < 3$，

    ∴t的取值范围为$\frac{3}{2}<t<2$，$x_0$的取值范围为$2 < x_0 < 3$．'
