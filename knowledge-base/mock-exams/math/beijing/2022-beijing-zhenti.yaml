  question: '在$\triangle ABC$中，$\angle ACB=90^{\circ}$，D为$\triangle ABC$内一点，连接BD，DC，延长DC到点E，使得$CE = DC.$

    [图][图]

    （1）如图1，延长BC到点F，使得$CF = BC$，连接AF，EF，若$AF \perp EF$，求证：$BD \perp AF$；

    （2）连接AE，交BD的延长线于点H，连接CH，依题意补全图2，若$AB^{2}=AE^{2}+BD^{2}$，用等式表示线段CD与CH的数量关系，并证明．'
  answer: （1）见解析 （2）$CD = CH$；证明见解析
  solution: '【小问1详解】

    证明：在$\triangle FCE$和$\triangle BCD$中，

    $CE = CD \\

    \angle FCE = \angle BCD \\

    CF = CB$，

    ∴$\triangle FCE \cong \triangle BCD (SAS)$，

    ∴$\triangle CFE \cong \triangle CBD$，

    ∴$EF \parallel BD$，

    ∵$AF \perp EF$，

    ∴$BD \perp AF$．

    【小问2详解】

    解：补全后的图形如图所示，$CD = CH$，证明如下：

    [图]

    延长BC到点M，使CM＝CB，连接EM，AM，

    ∵$\angle ACB=90^{\circ}$，CM＝CB，

    ∴AC垂直平分BM，

    ∴$AB = AM$，

    在$\triangle MEC$和$\triangle BDC$中，

    $CM = CB \\

    \angle MCE = \angle BCD \\

    CE = CD$，

    ∴$\triangle MEC \cong \triangle BDC (SAS)$，

    ∴$ME=BD$，$\triangle CME \cong \triangle CBD$，

    ∵$AB^{2}=AE^{2}+BD^{2}$，

    ∴$AM^{2}=AE^{2}+ME^{2}$，

    ∴$\angle AEM = 90^\circ$，

    ∵$\triangle CME \cong \triangle CBD$，

    ∴$BH \parallel EM$，

    ∴$\text{BHE} \diamondsuit \text{EM} \quad 90$，即$\angle DHE=90^\circ$，

    ∵$CF - CD = \frac{1}{2}DE$，

    ∴$CH = \frac{1}{2} DE$，

    ∴$CD = CH$．'
