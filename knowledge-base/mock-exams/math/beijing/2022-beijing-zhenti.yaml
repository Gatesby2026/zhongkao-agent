  question: '如图，在$\Box ABCD$中，$AC, BD$交于点O，点$E, F$在AC上，$AE = CF$．

    [图]

    （1）求证：四边形$EBFD$是平行四边形；

    （2）若$\angle BAC = \angle DAC,$求证：四边形$EBFD$是菱形．'
  answer: （1）见解析 （2）见解析
  solution: '【小问1详解】

    证明：∵四边形ABCD为平行四边形，

    ∴$AO = CO$，$BO = DO$，

    ∵$AE = CF$，

    ∴$AO\cdot AE=CO\cdot CF$，

    即$EO = FO$，

    ∴四边形$EBFD$是平行四边形．

    【小问2详解】

    ∵四边形ABCD为平行四边形，

    ∴$AB \parallel CD$，

    ∴$\angle DCA = \angle BAC$，

    ∵$\angle BAC = \angle DAC,$

    ∴$\angle DCA = \angle DAC$，

    ∴$DA = DC$，

    ∴四边形ABCD为菱形，

    ∴$AC \perp BD$，

    即$EF \perp BD$，

    ∵四边形$EBFD$是平行四边形，

    ∴四边形$EBFD$是菱形．'
