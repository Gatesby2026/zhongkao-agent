  question: '4月24日是中国的航天日．为了激发全民尤其是青少年崇尚科学、勇于创新的热情，某学校在七、八年级进行了一次航天知识竞赛．现从七、八年级参加该活动的学生的成绩中各随机抽取20个数据，分别对这20个数据进行整理、描述和分析，下面给出了部分信息：

    a．七年级参加活动的20名学生成绩的数据的频数分布直方图如下（数据分成5组：$50 \leq x < 60$，$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x \leq 100$）；

    [图]

    b．七年级参加活动的20名学生成绩的数据在$80 \leq x < 90$这一组的是：

    84  85  85  86  86  88  89

    c．八年级参加活动的20名学生成绩的数据如下：

    | 分数 | 73 | 81 | 82 | 85 | 88 | 91 | 92 | 94 | 96 | 100 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | 人数 | 1 | 3 | 2 | 3 | 1 | 3 | 1 | 4 | 1 | 1 |

    根据以上信息，解答下列问题：

    （1）补全a中频数分布直方图；

    （2）七年级参加活动的20名学生成绩的数据的中位数是______；八年级参加活动的20名学生成绩的数据的众数是______；

    （3）已知七八两个年级各有300名学生参加这次活动，若85分（含85分）以上算作优秀，估计这两个年级共有多少人达到了优秀．'
  answer: （1）见解析 （2）88.5；94 （3）435
  solution: '【小问1详解】

    解：成绩为$70 \leq x < 80$的学生人数为$20-1-1-7-9=2$（人），

    补全的频数分布直方图如图所示：

    [图]【小问2详解】

    将七年级参加活动的20名学生成绩按从小到大的顺序排列，中位数是$\frac{88+89}{2}=88.5$（分）

    八年级参加活动的20名学生成绩的数据的众数是94；

    故答案为：88.5；94；

    【小问3详解】

    $300\times\frac{6+9}{20}+300\times\frac{14}{20}-435$（人）

    答：估计这两个年级共有435人达到了优秀．'
