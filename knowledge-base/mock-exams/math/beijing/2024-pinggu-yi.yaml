  question: '正多边形每个内角都是120°，则它的边数为（）

    A.5

    B.6

    C.7

    D.8'
  answer: B
  solution: '解：设所求正多边形边数为n，

    ∵正n边形的每个内角都等于120°，

    ∴正n边形的每个外角都等于180°-120°=60°．

    又因为多边形的外角和为360°，

    即60°•n=360°，

    ∴n=6．

    故选：B'
