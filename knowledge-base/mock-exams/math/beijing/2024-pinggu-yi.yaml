  question: '在平面直角坐标系xOy中，抛物线$y = x^2 - 2bx$．

    （1）当抛物线过点$(2,0)$时，求抛物线的解析式；

    （2）若抛物线上存在两点$A(x_1,y_1)$和$B\left(x_{2},y_{2}\right)$，若对于$1 \leq x_{1} \leq 2$，$x_2 = b + 2$，都有$y_{1}\cdot y_{2}<0$，求b的取值范围．'
  answer: （1）$y = x^2 - 2x$ （2）$1<b<2$或$b<-2$
  solution: '【小问1详解】

    解：∵抛物线过点$(2,0)$

    ∴$4 - 4b = 0$，解得：$b = 1$

    ∴抛物线的解析式为$y = x^2 - 2x$

    【小问2详解】

    解：∵抛物线的对称轴为$x = b$，

    当$y = 0$时

    $x^2 - 2bx = 0$解得$x_1=0,x_2=2b$

    故与x轴的交点为$(0,0),(2b,0)$

    情况1：当原点位于对称轴的左侧时，

    [图]

    要满足对于$1 \leq x_{1} \leq 2$，$x_2 = b + 2$，都有$y_{1}\cdot y_{2}<0$，

    此时，有$\begin{cases} b+2>2b \\ 2<2b \end{cases}$解得$1<b<2$

    情况2：当原点位于对称轴的右侧时

    [图]

    要满足对于$1 \leq x_{1} \leq 2$，$x_2 = b + 2$，都有$y_{1}\cdot y_{2}<0$，

    此时，有$2b < b + 2 < 0$，解得$\left\{\begin{array}{l}b<2\\ b<-2\end{array}\right.$，解得$b<-2$

    综上，$1<b<2$或$b<-2$'
