  question: 我国古代数学著作《九章算术》里记载了这样一个有趣的问题：“今有善行者行100步，不善行者60步．今不善行者先行100步，善行者追之，问几何步追之？”其意思是：走路快的人走100步时，走路慢的人只走了60步，现在走路慢的人先走100步，走路快的人去追他，问走路快的人走多少步能够追上他？请你解决该问题．
  answer: 250步
  solution: '解：设走路快$[公式]$人走了x步追上走路慢的人．

    由题意得，$x=\frac{60}{100}x+100$

    解得：$x=250$，

    答：走路快的人250步追上走路慢的人'
