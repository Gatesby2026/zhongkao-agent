  question: 已知$x^{2}+x-5=0$，求代数式$(x+1)(x-1)+x(x+2)$的值．
  answer: $9$
  solution: '解：$(x+1)(x-1)+x(x+2)$

    $=x^{3}-1+x^{2}+2x$

    $=2x^{2}+2x-1$

    $=2(x^{2}+x)-1$

    $x^{2}+x-5=0$

    $\therefore x^{2}+x=5$

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原式$=2\times5-1=9$．'
