    B、$-x > 0$，则$x<0$，故该选项正确，不符合题意；

    C、$-x>1$，则$x<-1$，故该选项错误，符合题意；

    D、$x+1>0$，则$x > -1$，故该选项正确，不符合题意；

    故选：C．'
