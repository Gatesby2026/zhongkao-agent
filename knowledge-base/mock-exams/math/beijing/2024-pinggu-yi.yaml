  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\ (k\neq0)$的图象由函数$y=x$的图象平移得到，且经过点$(0,3)$．

    （1）求这个一次函数的解析式；

    （2）当$x > 0$时，对于x的每一个值，一次函数$y = \frac{1}{2}x + n$的值小于函数$y=kx+b\ (k\neq0)$的值且大于0，直接写出n的取值范围．'
  answer: （1）$y = x + 3$ （2）$0 \leq n \leq 3$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\,(k\neq0)$的图象由函数$y=x$的图象平移得到，

    ∴$k = 1$，

    ∴$y=x+b$．

    ∵该一次函数经过点$(0,3)$，

    ∴$3 = 0 + b$，即$b=3$，

    ∴这个一次函数的解析式为$y = x + 3$；

    【小问2详解】

    解：如图，

    [图]

    由图可知当$0 \leq n \leq 3$时，当$x > 0$时，对于x的每一个值，一次函数$y = \frac{1}{2}x + n$的值小于函数$y = x + 3$的值且大于0，

    ∴n的取值范围是$0 \leq n \leq 3$．'
