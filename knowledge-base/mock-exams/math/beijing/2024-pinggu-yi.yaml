  question: '某工艺坊加工一件艺术品，完成该任务共需A，B，C，D，E，F六道工序，其中A，B是前期准备阶段，C，D，E是中期制作阶段，F为最后的扫尾阶段，三个阶段不能改变顺序，也不能同时进行，但各阶段内的几个工序可以同时进行，完成各道工序所需时间如下表所示：

    | 阶段 | 准备阶段 | 中期制作阶段 | 扫尾阶段 |  |  |  |

    | --- | --- | --- | --- | --- | --- | --- |

    | 工序 | A | B | C | D | E | F |

    | 所需时间 / 分钟 | $11$ | $15$ | $20$ | $17$ | $6$ | $3$ |

    | 加工时间每缩短一分钟需要增加投入费用 / 元 | $100$ | $70$ | $100$ | $80$ | $50$ | 不能缩短 |

    在不考虑其它因素的前提下，加工该件艺术品最少需要______分钟；现因情况有变，需将加工时间缩短到$30$分钟．每道工序加工时间每缩短一分钟需要增加投入费用如上表，则所增加的投入最少是______元．'
  answer: ①.$38$ ②.$750$
  solution: '解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$一共有三个阶段，各阶段内的几个工序可以同时进行，

    则加工该件艺术品最少需要：$15+20+3=38$（分钟）；

    需将加工时间缩短到$30$分钟，则共需要缩短$8$分钟，

    在准备阶段若缩短$4$分钟，则需要投入$4 \times 70 = 280$（元），

    在制作阶段若缩短$3$分钟，则需要投入$3\times100=300$（元），

    还要$1$分钟，在准备阶段缩短$1$分钟需要投入$100+70=170$（元），在制作阶段缩短$1$分钟需要投入$100+80=180$（元），$170<180$，

    综上，最少投入为：$289+300+176=750$（元），

    故答案为：$38$，$750$．'
