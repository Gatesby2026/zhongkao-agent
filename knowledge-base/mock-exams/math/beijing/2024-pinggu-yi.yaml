  question: '已知两组数据（1）$3005$，$3005$，$3003$，$3000$，$2994$；（2）$5$，$5$，$3$，$0$，$-6$．设第一组数据的平均值为$\overline{x_{1}}$，方差为$S_{1}^{2}$，设第二组数据的平均值为$\overline{x}_{2}$，方差为$s_{2}^{2}$，下列结论正确的是（    ）

    A.$\overline{x}_{1}>\overline{x}_{2}$，$s_{1}^{2}<s_{2}^{2}$

    B.$\overline{x}_{1}>\overline{x}_{2}$，$s_{1}^{2}>s_{2}^{2}$

    C.$\overline{x_{1}}=\overline{x_{2}}$，$s_{1}^{2}=s_{2}^{2}$

    D.$\overline{x}_{1}>\overline{x}_{2}$，$s_{1}^{2}=s_{2}^{2}$'
  answer: D
  solution: '解：（1）的平均数为：$\frac{3005\times2+3003+3000+2994}{5}=3001.4$，

    方差是：$\frac{1}{5}\left[\left(3005-3001.4\right)^2\times2+\left(3003-3001.4\right)^2+\left(3000-3001.4\right)^2+\left(2994-3001.4\right)^2\right]=17.04$，

    （2）的平均数是：$\frac{5x+2+3+0-6}{5}=1.4$，

    方差是：$\frac{1}{5}\left[(5-1.4)^2\times2+(3-1.4)^2+(0-1.4)^2+(-6-1.4)^2\right]=17.04$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\overline{x}_{1}>\overline{x}_{2}$，$s_{1}^{2}=s_{2}^{2}$，

    故选：D．'
