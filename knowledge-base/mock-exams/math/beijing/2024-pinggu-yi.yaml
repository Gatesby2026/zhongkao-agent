  question: '如图，$Rt\triangle ABC$中，$\angle ACB=90^\circ$，点D、E分别是$BC、AB$边的中点，连接DE并延长，使$EF=2DE$，连接$AF、CE$．

    [图]

    （1）求证：四边形$ACEF$是平行四边形；

    （2）若$\angle B=30^{\circ}$，求证：四边形$ACEF$是菱形．'
  answer: （1）见解析 （2）见解析
