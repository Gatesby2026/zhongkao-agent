  question: '如图，$\triangle ABC$内接于$\odot\odot$，$\angle ACB = 45^\circ$，连接OA，过B作$\odot\odot$的切线交AC的延长线于点D．

    [图]

    （1）求证：$\angle D=\angle OAD$；

    （2）若$BC = 4\sqrt{2}$，$\tan D = \frac{3}{4}$，求$\odot\odot$半径的长．'
  answer: （1）见解析 （2）20
  solution: '【小问1详解】

    证明：连接OB，

    [图]

    ∵BD是$\odot\odot$的切线，

    $\therefore \angle OBD = 90^\circ$，

    $\angle ACB = 45^\circ$，

    $\angle AOB = \angle OBD = 90^{\circ}$，

    $\therefore OA \parallel BD$，

    ∴$\angle D=\angle OAD$；

    【小问2详解】

    解：过点B作$BH \perp AD$于点H，

    [图]

    $\angle AHB = \angle DHB = 90^\circ$，

    ∵$\angle ACB = 45^\circ$，$BC = 4\sqrt{2}$，

    $\angle ACB=\angle HBC$，

    $\therefore BH = HC$，$BH^{2}+HC^{2}=BC^{2}$，

    $BH = HC = 4$，

    $\angle LBM + \angle BMH = 90^\circ$，

    $\angle OAM+\angle AMO=90^\circ$，$\angle BMH = \angle AMO$，

    $\angle MBH = \angle OAM = \angle D$，

    $\because\tan D=\frac{3}{4}$，

    $\angle MBH = \frac{3}{4}$，

    $\ldots MA = 3,\ BM = 5$，

    设$\odot\odot$的半径为x，

    $OM = x - 5$，

    $\tan\angle OAM=\frac{OM}{OA}=\frac{x-5}{x},\tan D=\frac{3}{4}$，

    解得$x = 20$，

    $\therefore \odot O$半径的长$20$．'
