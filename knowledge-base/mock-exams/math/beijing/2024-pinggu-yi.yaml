    ∴$DE \parallel AC$，且$DE=\frac{1}{2}AC$，

    ∵$EF=2DE$，

    ∴$EF = AC$，

    ∴四边形$ACEF$是平行四边形；

    【小问2详解】

    证明：$Rt\triangle ABC$中，$\angle ACB=90^\circ$，E$[公式]$AB中点，

    ∴$CE = \frac{1}{2} AB - AE$，

    ∵$\angle B=30^{\circ}$，

    ∴$\angle BAC = 60^\circ$，

    ∴$\triangle AEC$是等边三角形，

    ∴$AC = EC$，

    ∴四边形$ACEF$是菱形．'
