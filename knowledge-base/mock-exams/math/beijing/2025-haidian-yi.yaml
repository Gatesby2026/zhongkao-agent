  question: '图1是半径为$1\mathrm{cm}$的圆形硬币，点M是硬币外沿上的一定点．图2为四个轨道（厚度不计），分别记为轨道①、②、③和④，它们的形状分别为圆、长宽比为$2:1$的矩形、正方形和正六边形，周长均为$6\pi\mathrm{cm}$，对称中心均记为点P．点N为轨道上一定点（除轨道①外，N均为AB的中点）．将硬币放置在轨道外侧，使硬币与轨道在同一个平面内，且点M与N重合．若硬币沿轨道顺时针无滑动地滚动，当点M第一次回到轨道上时，记轨道上该处位置为$N''$，则四个轨道中，$\angle
    LPN''$最大的是（）

    [图]

    A.轨道①

    B.轨道②

    C.轨道③

    D.轨道④'
  answer: B
  solution: '解：∵圆形硬币的半径为$1\mathrm{cm}$，

    ∴圆形硬币的周长为$2\pi cm$，

    ∴硬币沿轨道顺时针无滑动地滚动，当点M第一次回到轨道上时，点M的运动路径长为$2\pi cm$；

    当沿着轨道①滚动时，则$\widehat{NN''}$的长为$2\pi cm$，

    ∴$\angle NPN''=360^{\circ}\times\frac{2\pi}{6\pi}=120^{\circ}$；

    [图]

    当沿着轨道②滑动时，

    ∵四边形$ABCD$是长宽比为$2:1$的矩形，

    ∴$AD = BC = 2AB = 2CD$，

    ∵四边形$ABCD$$[公式]$周长为$6\pi\mathrm{cm}$，

    ∴$AB = CD = \pi\,\text{cm},\ AD = BC = 2\,\text{cm}$，

    ∵点N为AB的中点，

    ∴$AN=\frac{1}{2}AB=\frac{\pi}{2}cm$，

    ∴$AN''=2\pi-\frac{\pi}{2}=\frac{3}{2}\pi\mathrm{cm}$；

    如图所示，过点P作$PH \perp AD$于H，连接$PA, PB, PN, PN'', PD$，

    ∵点P为矩形$ABCD$的对称中心，

    ∴$PA = PB = PD$，

    ∴$PN \perp AB$，$AH = BH = \frac{1}{2}AB - \pi cm$，

    又∵$PH \perp AD$，$\angle NAH = 90^\circ$，

    ∴四边形$ANPH$是矩形，

    ∴$PH = AN = \frac{\pi}{2} \text{ cm},\ \angle NPH = 90^\circ$，

    ∵$NH = AN - AH = \frac{\pi}{12} cm$，

    ∴$HP = HN''$，

    ∴$\triangle HPN''$是等腰直角三角形，

    ∴$\angle HP'
