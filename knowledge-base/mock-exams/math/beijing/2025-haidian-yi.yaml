  question: '如图，点P是正方形$ABCD$对角线BD上的一点，$PE \perp AB$于点E．连接AP并延长交BC于点F，连接PC．若$PC = \sqrt{10}$，$PE = 1$，则BF的长为______．

    [图]'
  answer: $\frac{4}{3}$
  solution: '解：∵四边形$ABCD$是正方形，BD是四边形$ABCD$的对角线，

    ∴$AB = BC$，$\angle ABP = \angle CBP = 45^{\circ}$，$\angle ABC = 90^\circ$，

    又∵$BP = BP$，

    ∴$\triangle ABC\cong\triangle CBP(SAS)$，

    ∴$AP = PC = \sqrt{10}$，

    ∵$PE \perp AB$，

    即$\angle PEB = 90^\circ$，

    又∵$\angle ABP = 45^\circ$，

    ∴$\triangle BEP$是等腰直角三角形，

    ∴$BE=EP=1$，

    在$Rt_{\triangle}APE$中，$AE = \sqrt{AP^{2} - PE^{2}} = \sqrt{(\sqrt{10})^{2} - 1} = 3$，

    ∴$AB=AE+EB=4$，

    ∵$\angle PEB = 90^\circ$，$\angle ABC = 90^\circ$，

    ∴$PE \parallel BF$，

    ∴$\triangle AEP \sim \triangle ABF$，

    ∴$\frac{AE}{AB} = \frac{EP}{BF}$，

    即$\frac{3}{4}=\frac{1}{BF}$，

    ∴$BF = \frac{4}{3}$．

    故答案为：$\frac{4}{3}$．'
