  question: 在平面直角坐标系xOy中，函数$y=\frac{k}{x}(k\neq0)$与$y=2x$的图象交于A，B两点．若点A的坐标是$(1,a)$，则点B的坐标为______．
  answer: $(-1,-2)$
  solution: '解：把点$(1,a)$代入$y=2x$得，

    $a = 2$，

    ∴$A(1,2)$；

    把点$A(1,2)$代入$y = \frac{k}{x}$，得，

    ∴$k=2$，

    ∴反比例函数的解析式为$y=\frac{2}{x}$；

    联立方程组得$\left\{ \begin{array}{l} y = 2x \\ y = \dfrac{2}{x} \end{array} \right.$，

    解得$\left\{

    \begin{array}{l}

    x = 1 \\

    y = 2

    \end{array}

    \right.$或$\left\{\begin{array}{l}x=-1\\y=-2\end{array}\right.$，经检验符合题意；

    ∵$A(1,2)$，

    ∴$B(-1,-2)$；

    故答案为：$(-1,-2)$．'
