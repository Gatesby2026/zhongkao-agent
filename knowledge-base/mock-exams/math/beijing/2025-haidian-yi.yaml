  question: '如图，在$V_{ABC}$中，$AB = AC$，$\angle ABC=\alpha(0^{\circ}<\alpha<45^{\circ})$，$AD \perp BC$于D，将射线BA绕点B顺时针旋转$45^\circ$得到射线BM，过点C作BM的垂线交BM于点E，交射线BA于点F，连接ED．

    [图]

    （1）依题意补全图形，并求$\angle EDC$的大小（用含$\alpha$的式子表示）；

    （2）在DC上取点G，使$DG = AD$，连接EG．用等式表示线段$EG, AF$与CF的数量关系，并证明．'
