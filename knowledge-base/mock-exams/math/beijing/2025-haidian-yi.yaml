  answer: （1）$\left\{\begin{array}{l}k=2\\b=-4\end{array}\right.$ （2）$-1\leq n\leq 1$且$n \neq 0$
  solution: '【小问1详解】

    解：函数$y=kx+b$$(k \neq 0)$与$y = -x + k$的图象交于点$(2,0)$，

    ∴$\begin{cases}

    2k + b = 0 \\

    -2 + k = 0

    \end{cases}$，

    解得$\left\{\begin{array}{l}k=2\\b=-4\end{array}\right.$；

    【小问2详解】

    解：由（1）得：$y=2x-4$，$y=-x+2$，

    如图，记$Q(1,1)$，

    当$x = 1$时，$y = -1 + 2 = 1$，即$Q(1,1)$在$y=-x+2$的图象上，

    [图]

    当$y = nx$过$Q(1,1)$时，$n = 1$，

    要满足当$x<1$时，对于x的每一个值，函数$y = nx (n \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值，且小于函数$y = -x + k$的值，即函数$y = nx (n \neq 0)$与$y=-x+2$的交点在Q点及Q点左侧，

    即$n \leq 1$，

    如图，当函数$y = nx (n \neq 0)$的图象平行函数$y = -x + k$的图象时，$n=k=-1$，

    [图]

    此时满足：当$x<1$时，对于x的每一个值，函数$y = nx (n \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值，且小于函数$y = -x + k$的值，

    综上：当$x<1$时，对于x$[公式]$每一个值，函数$y = nx (n \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值，且小于函数$y = -x + k$的值，n的取值范围为：$-1\leq n\leq 1$且$n \neq 0$．'
