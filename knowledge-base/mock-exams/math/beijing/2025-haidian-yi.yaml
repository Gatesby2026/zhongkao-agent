  question: '某公司设有三个充电桩，分别为一个快充桩和两个慢充桩．每个充电桩在同一时间仅为一辆车提供充电服务，且每辆车充电完成前，充电过程不得中断．现有五辆车待充电，每辆车的充电需求如下表：

    | 车辆序号 | A | B | C | D | E |

    | --- | --- | --- | --- | --- | --- |

    | 快充桩充电时间（分钟） | 70 | 40 | 无法使用 | 90 | 60 |

    | 慢充桩充电时间（分钟） | 210 | 120 | 150 | 无法使用 | 170 |

    车辆充电交接时间忽略不计，请回答下列问题：

    （1）若其中的四辆车完成充电的总用时不超过150分钟，则这四辆车的序号可以为______（写出一种即可）；

    （2）这五辆车完成充电总用时最短为______分钟．'
  answer: ①.$ABCE$（答案不唯一） ②.200
  solution: '解：（1）要使其中的四辆车完成充电的总用时不超过150分钟，可安排如下：快充桩可依次提供给$A,E$充电，两个慢充桩可分别提供给$B,C$充电，

    故答案为：$ABCE$（答案不唯一）；

    （2）要使五辆车完成充电总用时最短，可安排如下：快充桩可依次提供给$A,B,D$充电，共需要$70+40+90-200$（分钟），两个慢充桩可分别提供给$C,E$充电，其中C充电完成需要150分钟，E充电完成需要170分钟，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

