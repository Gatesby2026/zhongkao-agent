  question: '已知：如图，四边形$ABCD$是平行四边形，点E为AD上的一点（不与点A、D重合），连接CE．

    求作：点F，使得点F在BC上，且$AF \parallel CE$．

    甲、乙、丙三名同学的尺规作图方法如下：

    甲：以点C为圆心，AE的长为半径画弧，交BC于点F，连接AF；

    乙：以点A为圆心，CE的长为半径画弧，交BC于点F，连接AF；

    丙：以点B为圆心，DE的长为半径画弧，交BC于点F，连接AF．

    上述三名同学的作法一定正确的是（）

    [图]

    A.甲、乙

    B.乙、丙

    C.甲、丙

    D.甲、乙、丙'
  answer: C
  solution: '解：

    [图]

    甲：如图所示，此时$AE=CF, AE\parallel CF$，

    ∴四边形$AFCE$是平行四边形，

    ∴$AF \parallel CE$，

    故甲作法正确，符合题意；

    [图]

    乙：如图所示，此时$AF = CE, AF_1 = CE$，

    四边形$AF_{2}CE$不是平行四边形，

    ∴$AF_{2}$与CE不平行，

    故乙作法错误，不符合题意；

    [图]

    丙：如图所示，此时$BF = DE$，

    ∴$BC\cdot BF=AD-DE$，

    即$AE=CF, AE\parallel CF$，

    ∴四边形$AFCE$是平行四边形，

    ∴$AF \parallel CE$，

    故丙作法正确，符合题意；

    故选：C．'
