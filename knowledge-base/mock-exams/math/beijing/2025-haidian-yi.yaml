  question: '实数a，b在数轴上的对应点的位置如图所示，下列结论中正确的是（）

    $\begin{tikzpicture}

    \draw[->, thick] (-4,0) -- (4,0);

    \draw[thick] (-3,-0.2) -- (-3,0.2);

    \draw[thick] (-1,-0.2) -- (-1,0.2);

    \draw[thick] (1,-0.2) -- (1,0.2);

    \draw[thick] (3,-0.2) -- (3,0.2);

    \filldraw (-3,0) circle (3pt);

    \filldraw (1,0) circle (3pt);

    \node at (-3.5, -0.8) {$a$};

    \node at (-2.5, -0.8) {$-1$};

    \node at (-1, -0.8) {$0$};

    \node at (1.5, -0.8) {$b$};

    \node at (3, -0.8) {$1$};

    \end{tikzpicture}$

    A.$a-b>0$

    B.$\left| a \right| < 1$

    C.$\frac{b}{a}>0$

    D.$-b > a$'
  answer: D
  solution: '解：根据题意可得：$a<-1$，$0<b<1$，

    故$\left| a \right| > 1$，B选项结论错误，不符合题意；

    故$a-b<0$，A选项结论错误，不符合题意；

    故$\frac{b}{a}<0$，C选项结论错误，不符合题意；

    则$-1 < -b < 0$，

    故$-b > a$，D选项结论正确，符合题意；

    故选：D．'
