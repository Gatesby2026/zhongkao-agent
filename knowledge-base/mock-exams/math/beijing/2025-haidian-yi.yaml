  question: 3月14日为“国际数学日”，某校在这一天开展数学主题活动，活动分为“智趣挑战”和“巧手闯关”两个项目．若学生参加两个项目得分之和不低于100分，且“智趣挑战”得分不低于55分，则可获得一份校园文创奖品．参加活动时，在正式计分前可先体验一次．小明在体验两个项目时共得90分；在正式计分时，“智趣挑战”项目的得分比体验时增加了$20\%$，“巧手闯关”项目的得分比体验时增加了$10\%$，共得104分．请判断小明是否可以获得校园文创奖品，并说明理由．
  answer: 小明可以获得校园文创奖品，见解析
  solution: '判断：小明可以获得校园文创奖品．

    理由：设在体验环节中，小明在“智趣挑战”项目中得到了x分，在“巧手闯关”项目中得到了y分．

    依题意，得$\begin{cases}

    x + y = 90 \\

    (1 + 20\%)x + (1 + 10\%)y = 104

    \end{cases}$

    解得$\left\{\begin{array}{l}x=50\\y=40\end{array}\right.$

    ∴在体验环节中，小明分别在“智趣挑战”和“巧手闯关”这两个项目中得到了50分和40分．

    ∴在正式计分时，小明在“智趣挑战”中得到了$50\times(1-20\%)=60$分．

    ∴小明的得分满足得分之和不低于100分，且“智趣挑战”得分不低于55分．

    答：小明可以获得校园文创奖品．'
