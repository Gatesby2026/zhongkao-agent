  question: '在平面直角坐标系xOy中，点$A(x_0,m)$，$B(3,n)$在抛物线$y=ax^{2}+bx+c(a>0)$上，设抛物线的对称轴为$x = t$．

    （1）当$x_0 = 1$，$m = n$时，求t的值；

    （2）当$t>1$时，若对于$1-t<x_{0}<t-1$，都有$m > n$，求t的取值范围．'
  answer: （1）$t=2$ （2）$2\leq t\leq4$
  solution: '【小问1详解】

    解：当$x_0 = 1$时，点A的坐标为$(1,m)$，

    ∵点$A(1,m)$，$B(3,n)$在抛物线$y=ax^{2}+bx+c(a>0)$上，

    ∴$m = a + b + c$，$n=9a+3b+c$．

    又∵$m = n$，

    ∴$a+b+c=9a+3b+c$．

    即$4a + b = 0$，

    ∵抛物线的对称轴为$x = t = -\frac{b}{2a}$，

    故$t=2$．

    【小问2详解】

    解：分两种情况：

    情况1：当抛物线的对称轴在点B的左侧时，即$1<t<3$时，

    点$B(3,n)$关于$x = t$对称的点为$B''(2t-3,n)$，

    根据抛物线的对称性可得点$B''$也在抛物线上，

    则$2t-3<t<3$；

    ∵$a > 0$，

    ∴抛物线开口向上，

    故当$x \leq t$时，y随x的增大而减小．

    ∵$m > n$，

    ∴点A在$B''$的左侧，

    即$x_{0}<2t-3$，

    ∵$1-t<x_{0}<t-1$时，都有$m > n$成立，

    ∴$t-1\leq2t-3$，

    解得$t^{2}$；

    又∵$1<t<3$，

    故t的取值范围是$2\leq t<3$；

    情况2：当抛物线的对称轴在点B的右侧时，即$t^{3}$时，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$$a > 0$，

    ∴抛物线开口向上，

    故当$x \leq t$时，y随x的增大而减小，

    ∵$m > n$，

    ∴点A在B的左侧，

    即$x_0 < 3$，

    ∵$1-t<x_{0}<t-1$时，都有$m > n$成立，

    ∴$t-1\Diamondsuit 3$，

    解得$t \leq 4$，

