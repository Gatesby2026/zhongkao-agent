  solution: '【小问1详解】

    解：如图所示：

    [图]

    如图，∵射线BA绕点B顺时针旋转$45^\circ$得到射线BM，

    ∴$\angle ABM=45^\circ$

    $\angle DBM = \angle ABM - \angle ABD = 45^\circ - \alpha$．

    $\because AB = AC$，$AD \perp BC$于D．

    ∴$BD = DC$．

    ∵$CE \perp BM$于E，

    ∴$\angle BEC = 90^\circ$．

    ∴$ED=\frac{1}{2}BC-BD$．

    ∴$\angle EDC = \angle DBM + \angle DEB = 2\angle DBM$．

    ∵$\angle DBM=45^{\circ}-\alpha$，

    ∴$\angle EDC=90^{\circ}-2\alpha$．

    【小问2详解】

    线段$EG, AF$和CF的数量关系为$AE=EG+\frac{\sqrt{2}}{2}CF$．

    证明：过点C作$CH \perp BF$于H，连接DH，如图所示．

    [图]

    ∵$CH \perp BF$于H，

    ∴$\angle CHB=\angle CHF=90^\circ$．

    ∵$BD = DC$，

    ∴$DH=\frac{1}{2}BC-BD$．

    ∵由（1），$BD = DE$，

    ∴$PH = BD = DE$．

    $\therefore B$，E，H在以D为圆心，BD为半径的圆上．

    ∴$\angle HDE=2\angle ABE=90^{\circ}$．

    ∵$\angle ADC = 90^\circ$．

    ∴$\angle ADC = \angle HDE$．

    ∴$\angle ADC = \angle HDC = \angle HDE - \angle HDC$．

    ∴$\angle ADH = \angle GDE$'
