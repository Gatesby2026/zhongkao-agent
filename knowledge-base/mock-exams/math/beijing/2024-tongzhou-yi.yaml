  question: '如图，在菱形$ABCD$中，$\angle ABC = 60^\circ$，点P和点Q分别在边CD和AD上运动（不与A、C、D重合），满足$DP = AQ$，连接AP、cQ交于点E，在运动过程中，则下列四个结论正确的是（

    ）

    ①$AP = CQ$；②$\angle AEC$的度数不变；③$\angle APD+\angle CQD=180^\circ$；④$CP^{2}=AP\cdot EP$．

    [图]

    A.①②B.③④C.①②④D.①②③④'
  answer: D
  solution: '解：∵$ABCD$是菱形，$\angle ABC = 60^\circ$，$DP = AQ$，

    ∴$\angle ACP=\angle D=60^{\circ}\vee\angle CD$是等边三角形，

    ∴$AC = CD$，

    ∴$\triangle ACP \cong \triangle CDQ$，

    ∴$\angle APC = \angle CQP$，$\angle PAC = \angle DCQ$，$AP = CQ$，故①正确；

    ∵$\angle APC+\angle APC=180^{\circ}$，

    ∴$\angle APD+\angle CQD=180^\circ$，故②正确；

    ∵$\angle D=60^\circ,\angle APD+\angle CQD=180^\circ$，

    ∴$\angle QLP=120^{\circ}$，

    ∴$\angle AEC=\angle QEP-120^{\circ}$，故③正确；

    ∵$\angle PAC = \angle DCQ$，$\angle APC = \angle EPC$，

    ∴$\triangle APC \sim \triangle CPE$，

    ∴$\frac{AP}{CP}=\frac{CP}{EP}$，

    ∴$CP^{2}=AP\cdot EP$，故④正确；

    故选：D．'
