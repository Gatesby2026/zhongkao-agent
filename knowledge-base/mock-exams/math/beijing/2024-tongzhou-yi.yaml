  answer: （1）证明见解析 （2）$AD = 2\sqrt{5}$
  solution: '【小问1详解】

    证明：∵点D为AB边中点，

    ∴$AD = BD$，

    ∵$DF=ED$，

    ∴四边形$AEBF$是平行四边形，

    ∵$EF \perp AB$，

    ∴四边形$AEBF$是菱形；

    【小问2详解】

    解：如图，过点E作$EG\parallel AF$于点G，

    [图]

    ∵四边形$AEBF$是菱形，

    ∴$BE = AE = 5, AF \parallel BC$，

    ∴$EG \perp BC$，

    ∴$\angle GEC = 90^\circ$，

    ∴$\angle CEG=\angle GEC=\angle ACB=90^{\circ}$，

    ∴四边形$ACEG$是矩形，

    ∴$AC = EG, CE = AG$，

    ∵$\sin \angle EAF = \frac{EG}{AE} = \frac{4}{5}$，

    ∴$EG=\frac{4}{5}AE=\frac{4}{5}\times5=4$，

    在$Rt\triangle AGE$中，由勾股定理得：$AG =$$\sqrt{AE^{2}-EG^{2}}=\sqrt{5^{2}-4^{2}}=3$，

    $\therefore AC=EG=4,CE=AG=3$，

    $\therefore BC=BE+CE=5+3=8$，

    在$Rt\triangle ABC$中，由勾股定理得：$AB =$$\sqrt{AC^{2}+BC^{2}}=\sqrt{4^{2}+8^{2}}=4\sqrt{5}$，

    ∵点D$[公式]$AB边中点，

    $\cdot AD-\frac{1}{2}AB=\frac{1}{2}\times4\sqrt{5}=2\sqrt{5}$．'
