  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图象经过点$A(0,-1)$和$B(4,3)$，与过点$(0,-3)$且平行于x轴的直线交于点C．

    （1）求该函数的表达式及点C的坐标；

    （2）当$x > -2$时，对于x的每一个值，函数$y = mx \, (m \neq 0)$的值大于函数$y=kx+b\,(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=x-1$，$C(-2,-3)$ （2）$1 \leq m \leq \frac{3}{2}$
  solution: '【小问1详解】

    解：将$A(0,-1)$、$B(4,3)$代入函数表达式$y=kx+b$可得：

    $\left\{\begin{array}{l}b=-1\\4k+b=3\end{array}\right.$，

    解得$\left\{\begin{array}{l}k=1\\b=-1\end{array}\right.$，

    则函数的表达式为$y=x-1$，

    依题得，过点$(0,-3)$且平行于x轴的直线为$y = -3$，

    $\therefore C$是该函数与过点$(0,-3)$且平行于x轴的直线的交点，

    $\therefore x-1=-3$，

    解得$x = -2$，$y = x - 1 = -2 - 1 = -3$，

    即$C(-2,-3)$．

    【小问2详解】

    解：当直线$y = mx$过点C时，

    即把$(-2,-3)$代入$y = mx$，

    得$-2m = -3$，

    $m = \frac{3}{2}$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$当$x > -2$时，对于x的每一个值，$y = mx \, (m \neq 0)$的值大于$y=x-1$的值，

    $A=-2m-2-1$，

    解得$m \leq \frac{3}{2}$，

    当$y = mx$与直线$y=x-1$平行时，$m = 1$，

    此时，满足条件，

    且当$m < 1$时，不满足条件，

    即$1 \leq m \leq \frac{3}{2}$．'
