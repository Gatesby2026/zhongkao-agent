  question: '我国魏晋时期数学家刘徽在《九章算术注》中提出了著名的“割圆术”．所谓“割圆术”，是用圆内接正多边形的面积去无限逼近圆面积，并以此求取圆周率$\pi$的方法，刘徽指出“割之弥细，所失弥少．割之又割，以至于不可割，则与圆周合体，而无所失矣”．例如，$\odot\odot$的半径为1，运用“割圆术”，以圆内接正六边形面积估计$\odot\odot$的面积，$S_{\triangle
    ABC} = 6 \times 1 \times \frac{\sqrt{3}}{2} = \frac{3\sqrt{3}}{2}$，所以$\odot\odot$的面积近似为$\frac{3\sqrt{3}}{2}$，由此可得$\pi$的估计值为$\frac{3\sqrt{3}}{2}$，若用圆内接正十二边形估计$\odot\odot$的面积，可得$\pi$的估计值为________．

    [图]'
  answer: '3'
  solution: '如图，AB是正十二边形的一条边，点O是正十二边形的中心，设$\odot\odot$的半径为1，

    过A作$AM \perp OB$于M，

    [图]

    $[公式]$正十二边形中，

    $\angle AOB=360^{\circ}\div12=30^{\circ}$，

    $\therefore AM=\frac{1}{2}OA=\frac{1}{2}$

    $\cdots S_{\triangle ABC}=\frac{1}{2}\cdot OP\cdot AM=2\times \frac{1}{2}\times \frac{1}{4}$

    ∴正十二边形的面积为$12\times\frac{1}{4}=3$,

    $\therefore 3=1^{2}\times\pi$，

    $\therefore \pi = 3$,

    $\therefore \pi$的近似值为3，

    故答案为：3．'
