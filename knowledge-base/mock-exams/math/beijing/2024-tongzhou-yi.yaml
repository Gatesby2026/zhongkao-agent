  question: 分式方程$\frac{2}{x+3}=\frac{1}{2x}$的解是$x =$______．
  answer: '1'
  solution: '解：$\frac{2}{x+3}=\frac{1}{2x}$

    方程两边同乘$2x(x+3)$，得$4x = x + 3$，

    移项，得$3x=3$，

    系数化为1，得$x = 1$，

    检验：当$x = 1$时，$2x(x+3)=0$，

    ∴原分式方程的解为$x = 1$，

    故答案为：1．'
