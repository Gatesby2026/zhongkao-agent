    $\therefore k = \frac{1}{3}$，

    $\therefore y=\frac{1}{3}x+b$，

    将$A(3,2)$代入$y=\frac{1}{3}x+b$得，

    $2=\frac{1}{3}\times3+b$

    解得$b = 1$；

    【小问2详解】

    解：由（1）得$y=kx+b$的解析式为$y=\frac{1}{3}x+1$，$y = x + m$的解析式为$y=x-1$，

    [图]

    如图所示，当$x>3$时，对于x的每一个值，函数$y = nx$（$n \neq 0$）的值既大于函数$y=\frac{1}{3}x+1$的值，也大于函数$y=x-1$的值，

    则$n\ 1$．'
