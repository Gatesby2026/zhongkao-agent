    （1）求桥拱$DGD''$所在抛物线的解析式及OC的长；

    （2）BE和$BE''$为支撑斜坡的立柱，其高都为4米，相应的AB和$A''B''$为两个方向的行人及非机动车通行区，直接写出宽AB的长度；

    （3）按规定，汽车通过该桥下时，载货最高处和桥拱之间的距离不得小于$0.4$米．今有一大型运货汽车，装载某大型设备后，其宽为4米，车载大型设备的顶部与地面的距离均为7米．它能否从桥下区域安全通过？请说明理由．'
  answer: （1）$y = -\frac{1}{90}x^2 + 8$，37米 （2）6米（3）该大型货车可以从桥下区域安全通过，理由见详解
  solution: '【小问3详解】

