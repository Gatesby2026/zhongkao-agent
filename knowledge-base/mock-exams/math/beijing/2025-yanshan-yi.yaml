  solution: '解：（1）设A型洗衣机的售价为x元，B型洗衣机的售价为y元

    根据题意，得$\begin{cases}

    13\%(x+y)=351\\

    y-x=500

    \end{cases}$解得$\begin{cases}

    x = 1100 \\

    y = 1600

    \end{cases}$

    所以A、B型洗衣机的售价分别为1100元和1600元.

    （2）1100-1100×13%=957（元），1600-1600×13%=1392（元）

    所以小李购买洗衣机除财政补贴外实际付款957元，小王购买洗衣机除财政补贴外实际付款1392元.

