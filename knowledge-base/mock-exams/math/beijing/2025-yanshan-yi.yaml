  question: '实数a，b在数轴上的对应点的位置如图所示，下列结论中正确的是（）

    $\begin{tikzpicture}

    \draw[->] (-2,0) -- (4,0);

    \foreach \x in {-1,0,1,2,3}

    \draw (\x,-0.1) -- (\x,0.1) node[below] {\x};

    \filldraw (-0.5,0) circle (2pt) node[above] {a};

    \filldraw (2.5,0) circle (2pt) node[above] {b};

    \end{tikzpicture}$

    A.$a+b<0$B.$ab > 0$C.$\left| a \right| < \left| b \right|$D.$a<-1$'
  answer: C
  solution: '解：由数轴可知$a<0<b$，且$\left| a \right| < \left| b \right|$

    A．$a+b>0$，该选项错误，故不符合题意；

    B．$ab < 0$，该选项错误，故不符合题意；

    C．$\left| a \right| < \left| b \right|$，该选项正确，故符合题意；

    D．$a > -1$，该选项错误，故不符合题意；

    故选：C．'
