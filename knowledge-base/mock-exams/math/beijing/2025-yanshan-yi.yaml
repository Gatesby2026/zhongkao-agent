  question: '如图，在△ABC中，$\angle ACB=90^\circ$，点D在AB上，以AD为直径作$\odot\odot$与BC相切于点E，连接DE并延长交AC的延长线于点F．

    [图]

    （1）求证：$\angle F=\angle ODE$；

    （2）若$\tan \angle ADE = 2$，$CF = 2$，求$\odot\odot$的半径的长．'
  answer: （1）证明见详解 （2）5
  solution: '【小问1详解】

    证明:∵BC是$\odot\odot$的切线，

    $\therefore OE \perp BC$，

    $\angle OEB = 90^\circ$，

    $\angle OEB=\angle ACB=90^{\circ}$，

    $\ldots AF \parallel OE$，

    $\angle F = \angle OED$，

    $\because OE = OD$，

    $\angle OED = \angle ODE$，

    $\angle F=\angle ODE$；

    【小问2详解】

    解：如图所示，连接AE，则$\angle AED=\angle AEF=90^{\circ}$，

    [图]

    由（1）得$\angle F=\angle ODE$，

    $\tan\angle F=\tan\angle ADE=2=\frac{CF}{CE}$，

    $\therefore CE = 4$，

    在$Rt_{\triangle}ECF$中，由勾股定理得：$EF=\sqrt{CF^{2}+CE^{2}}=2\sqrt{5}$，

    在$Rt\triangle AEF$中，$\tan\angle F=\frac{AE}{EF}=2$，

    $\therefore AE = 4\sqrt{5}$，

    在$Rt\triangle ADE$中，$\tan \angle ADE = \frac{AE}{ED} = 2$，

    $\therefore ED=2\sqrt{3}$，

    在$Rt\triangle ADE$中，由勾股定理得：$AD=\sqrt{AE^{2}+ED^{2}}=10$，

    $\therefore \odot O$的半径长为5．'
