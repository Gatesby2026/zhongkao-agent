  question: 方程$\frac{2}{x-3}+\frac{1}{x}=0$的解为__________．
  answer: $x = 1$
  solution: '解：$\frac{2}{x-3}+\frac{1}{x}=0$

    方程两边同时乘以$x(x-3)$得，$2x + (x - 3) = 0$，

    解得：$x = 1$，

    检验，当$x = 1$时，$x(x-3)\neq0$，

    ∴$x = 1$时原方程的解，

    故答案为：$x = 1$．'
