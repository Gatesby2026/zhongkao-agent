    （2）以$A''$为圆心，AC长为半径画弧，以$B''$为圆心，BC长为半径画弧，两弧交于点$C''$；

    （3）连接$A''C''$，$B''C''$，

    则$\triangle A''B''C''\cong\triangle ABC$．

    [图]

    上述判定$\triangle A''B''C''\cong\triangle ABC$的依据是（）

    A.三边分别相等的两个三角形全等

    B.两边及其夹角分别相等的两个三角形全等

    C.两角及其夹边分别相等的两个三角形全等

    D.两角分别相等且其中一组等角的对边相等的两个三角形全等'
  answer: A
  solution: '解：由作图可知，$\overrightarrow{AB}=AB$，$A''C''=AC$，$B''C''=BC$，

    ∴$\triangle A''B''C''\cong\triangle ABC$（三边分别相等的两个三角形全等）

