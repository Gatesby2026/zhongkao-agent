  question: '在平面直角坐标系xOy中，抛物线$y = ax^2 + bx + c$$(a \neq 0)$经过点$A(2,c)$．

    （1）求该抛物线的对称轴；

    （2）点$M\left(1-2a,\,y_{1}\right)$，$N(a+2,y_{2})$在抛物线上．若$c < y_1 < y_2$，求a的取值范围'
  answer: （1）$x = 1$ （2）$-\frac{1}{2}<a<-\frac{1}{3}$或$\frac{1}{2}<a<1$．
  solution: '【小问1详解】

    解：∵$y = ax^2 + bx + c$经过点$A(2,c)$，

    ∴$4a+2b+c=c$，

    整理得：$b = -2a$，

    ∴抛物线的对称轴为直线$x = \frac{b}{2a} = \frac{-2a}{2a} = -1$；

    【小问2详解】

    当$a > 0$时，抛物线开口向上．

    点$M\left(1-2a,y_{1}\right)$到对称轴$x = 1$的距离$d_{1} \cdot |-2a-1|=2a$．

    点$N(a+2,y_{2})$到对称轴$x = 1$的距离$d_{x}=a+2-|a+1|$．

    ∵$c < y_1 < y_2$，且抛物线开口向上时，离对称轴越远函数值越大，

    ∴$a+1>2a$，同时$1-2a<0$

    解不等式组$\left\{\begin{array}{l}1-2a<0 \\ a+1>2a\end{array}\right.$

    解得$\frac{1}{2}<a<1$；

