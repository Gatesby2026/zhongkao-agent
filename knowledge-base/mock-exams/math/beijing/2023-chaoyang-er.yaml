  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图像经过点$(1,-1)$，$(2,0)$，与y轴交于点A．

    （1）求该函数的表达式及点A的坐标；

    （2）当$x > 0$时，对于x的每一个值，函数$y = mx - 2 (m \neq 0)$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=x-2$，$A(0,-2)$ （2）$m > 1$
  solution: '【小问1详解】

    解：把$(1,-1)$，$(2,0)$代入$y=kx+b\ (k\neq0)$中得：$\begin{cases}

    k + b = -1 \\

    2k + b = 0

    \end{cases}$，

    ∴$\left\{\begin{array}{l}k=1\\b=-2\end{array}\right.$，

    ∴该函数解析式为$y=x-2$，

    在$y=x-2$中，当$x = 0$时，$y = -2$，

    ∴$A(0,-2)$；

    【小问2详解】

    解：$7\pi x - 2 > x - 2$，

    ∴$(m-1)x>0$，

    当$m-1=0$时，$0 > 0$不成立，不符合题意；

    当$m-1>0$，即$m > 1$时，则$x > 0$；

    当$m-1<0$，即$m < 1$时，则$x<0$；

    ∵当$x > 0$时，对于x的每一个值，函数$y = mx - 2 (m \neq 0)$的值大于函数$y=kx+b\ (k\neq0)$的值，

    ∴$x > 0$是不等式$7\pi x - 2 > x - 2$的一个解集，

    ∴$m > 1$．'
