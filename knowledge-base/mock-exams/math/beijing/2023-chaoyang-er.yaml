  question: '如图，AB为$\odot\odot$的直径，C为$\odot\odot$上一点，$AE \perp CE$，直线CE与直线AB相交于点H，AC平分$LEAH$．

    [图]

    （1）求证：EH是$\odot\odot$的切线；

    （2）AE与$\odot\odot$的交点为F，连接FO并延长与$\odot\odot$相交于点D，连接CD．若F为$\overline{AC}$中点，求证：$\angle D=\angle H$．'
  answer: （1）见解析（2）见解析
  solution: '【小问1详解】

    证明：连接OC，

    ∵AC平分$LEAH$，

    ∴$\angle EAC = \angle CAH$，

    ∵$OA = OC$，

    ∴$\angle CAO = \angle ACO$，

    ∴$\angle EAC = \angle ACO$，

    ∴$AE \parallel OC$，

    ∵$AE \perp CE$，

    ∴$OC \perp CE$，

    ∵OC是$\odot\odot$的半径，

    ∴EH是$\odot\odot$的切线；

    [图]【小问2详解】

    证明：如图，连接OC，

    ∵AC平分$LEAH$，

    ∴$\angle EAC = \angle CAH$，

    ∴$\widehat{FC}=\widehat{CB}$，

    ∵F为$\overline{AC}$中点，

    ∴$\overline{AF} = \overline{FC}$，

    ∴$\overline{AF} = \overline{FC} = \overline{CB}$，

    ∴$\angle AOC=\angle FOC=\angle COB=60^{\circ}$，

    ∴$\angle D=\frac{1}{2}\angle FOC=30^{\circ}$，

    由（1）知$OC \perp EH$，即$\angle OCH = 90^\circ$，

    ∴$\angle H=90^{\circ}-\angle COB=30^{\circ}$，

    ∴$\angle D=\angle H$．

