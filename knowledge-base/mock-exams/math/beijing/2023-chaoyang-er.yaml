  question: '图1是一块铁皮材料的示意图，线段AB长为$4dm$，曲线是抛物线的一部分，顶点C在AB的垂直平分线上，且到AB的距离为$4dm$．以AB中点O为原点，建立如图2所示的平面直角坐标系．

    [图]

    （1）求图2中抛物线的表达式（不要求写出自变量的取值范围）；

    （2）要从此材料中裁出一个矩形，使得矩形有两个顶点在AB上，另外两个顶点在抛物线上，求满足条件的矩形周长的最大值．'
  answer: （1）$y = -x^2 + 4$ （2）10
  solution: '【小问1详解】

    解：由题意得抛物线顶点C的坐标为$(0,4)$，A的坐标为$(-2,0)$，

    设抛物线解析式为$y=ax^{2}+4$，

    ∴$4a + 4 = 0$，

    解得$a = -1$，

    ∴抛物线解析式为$y = -x^2 + 4$；

    【小问2详解】

    解：如图所示，∵四边形$EFGH$是矩形，

    ∴$EF \parallel GH$，

    ∵E、F都在x轴上，

    ∴$GH \parallel x$轴，

    ∴$G、H$关于抛物线对称轴对称，

    ∴E、F关于抛物线对称轴对称，

    设点F的坐标为$(m,0)$，则$G\left(m,-m^{2}+4\right)$，

    ∴$E(-m,0)$，$H\left(-m,-m^{2}+4\right)$，

    ∴$EF=2m,\ GF=-m^{2}+4$，

    ∴矩形$EFGH$的周长$=2EF+2GF$

    $=-2m^{2}+8+4m$

    $-2(m-1)^{2}+10$，

    ∵$-2 < 0$，

    ∴当$m = 1$时，矩形$EFGH$的周长有最大值10．

    [图]【点睛】本题主要考查了二次函数的实际应用，矩形的性质，正确理解题意并熟练掌握二次函数的相关知识是解题的关键．'
