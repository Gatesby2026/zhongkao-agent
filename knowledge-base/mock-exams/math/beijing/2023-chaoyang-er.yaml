  question: '在平面直角坐标系xOy中，对于图形M给出如下定义；将M上的一点$(a,b)$变换为点$(a-b,a+b)$，M上所有的点按上述变换后得到的点组成的图形记为N，称N为M的变换图形．

    （1）①点$(3,0)$的变换点的坐标为______；

    ②直线$y=x+1$的变换图形上任意一点的横坐标为______；

    （2）求直线$y=2x+1$的变换图形与y轴公共点的坐标；

    （3）已知⊙O的半径为1，若$\odot\odot$的变换图形与直线$y=kx+2k(k\neq0)$有公共点，直接写出k的取值范围．'
  answer: （1）①$(3,3)$；②$-1$； （2）$(0,-2)$； （3）$-1 \leq k \leq 1$且$k \neq 0$．
  solution: '【小问1详解】

    解：①按定义操作：$3-0=3$，$3+0=3$，

    ∴点$(3,0)$的变换点的坐标为$(3,3)$，

    故答案为：$(3,3)$；

    ②设直线$y=x+1$的图像上任意一点坐标为$(x,x+1)$，

    按定义操作：$x-(x+1)=-1$，

    ∴直线$y=x+1$的变换图形上任意一点的横坐标为$-1$，

    故答案为：$-1$；

    【小问2详解】

    解：设直线$y=2x+1$的图像上任意一点坐标为$(a,2a+1)$，

    则该点的变换点坐标为$(-a-1,3a+1)$，

    令$\left\{ \begin{array} { l } { x = - a - 1 \textcircled { 1 } } \\ { y = 3 a + 1 \textcircled { 2 } } \end{array} \right.$，

    $\textcircled{1}\times3+\textcircled{2}$得：$3x+y=-2$，

    ∴$y = -3x - 2$，

    当$x = 0$时，$y=-3x-2=-2$，

    ∴直线$y=2x+1$$[公式]$变换图形与y轴公共点的坐标为$(0,-2)$；

    【小问3详解】

    解：设⊙O上点的坐标为$(x, y)$，

    ∵⊙O的半径为1，

    ∴点$(x, y)$到原点的距离为1，

    ∴$x^2 + y^2 = 1$，

    ∵⊙O上的点$(x, y)$的变换点坐标为$(x-y,x+y)$，

    ∴其变换点到原点的距离为：$\sqrt{(x-y)^{2}+(x+y)^{2}}=\sqrt{x^{2}-2xy+y^{2}+x^{2}+2xy+y^{2}}=\sqrt{2(x^{2}+y^{2})}=\sqrt{2}$，

    ∴$\odot\odot$的变换图形是以原点为圆心，半径为$\sqrt{2}$的圆，

    又∵直线$y=kx+2k=k(x+2)$，

    ∴直线$y=kx+2k$恒过'
