  question: '在平面直角坐标系xOy中，点$(-1,y_{1})$在抛物线$y=x^{2}-ax$上．

    （1）求$y_{1}$的值（用含a的式子表示）；

    （2）若$a<-1$，试说明：$y_{1}<0$；

    （3）点$(1,y_{2})$，$(a-2,y_{3})$在该抛物线上，若$y_{1}$，$y_{2}$，$y_{3}$中只有一个为负数，求α的取值范围．'
  answer: （1）$y_{1}=a+1$ （2）见解析（3）$a<-1$或$1<a\leq2$
  solution: '【小问1详解】

    解：把$(-1,y_{1})$代入$y=x^{2}-ax$中得：$x_{1}=\left(-1\right)^{n}+a=ak+1$；

    【小问2详解】

    解：由（1）得$y_{1}=a+1$，

    ∵$a<-1$，

    ∴$a+1<0$，

    ∴$y_{1}<0$；

    【小问3详解】

    解：∵点$(1,y_{2})$，$(a-2,y_{3})$在该抛物线上，

    ∴$y_{2}=1-a,\ y_{3}=(a-2)^{2}-a(a-2)=4-2a$；

    当$a<-1$时，$y_{1}<0<y_{2}<y_{3}$，符合题意；

    当$a = -1$时，$y_{1}<0<y_{2}<y_{3}$，不符合题意；

    当$-1 < a < 0$时，$0 < y_1 < y_2 < y_3$，不符合题意；

    当$a = 0$时，$0 < y_1 - y_2 < y_3$，不符合题意；

    当$0<a<1$时，$\lambda_{1}>0,\ \lambda_{2}>0,\ \lambda_{3}>0$，不符合题意；

    当$a = 1$时，$x_{1}>0,\ y_{2}=0,\ x_{3}>0$，不符合题意；

    当$1<a<2$时，$y_{1}>0,\ y_{2}<0,\ y_{3}>0$，符合题意；

    当$a = 2$时，$\lambda_{1}>0,\ \lambda_{2}<0,\ \lambda_{3}=0$，符合题意；

    当$a > 2$时，$\lambda_{1}>0,\ \lambda_{2}<0,\ \lambda_{3}<0$，不符合题意；

    综上所述，$a<-1$或$1<a\leq2$．'
