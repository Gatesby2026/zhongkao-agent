  question: '方程$\frac{1}{x-2}=\frac{2}{5+x}$的解是（）

    A.$x=-1$B.$x=5$C.$x=7$D.$x=9$'
  answer: D
  solution: '解：$\frac{1}{x-2}=\frac{2}{5+x}$，

    方程两边都乘$(x-2)(5+x)$，得$5+x=2(x-2)$，

    解得：$x=9$，

    检验：当$x=9$时，$(x-2)(5+x)=0$，

    所以$x=9$是分式方程的解，

    故选：D．'
