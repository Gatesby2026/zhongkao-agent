  question: '如图，在四边形$ABCD$中，$AD \parallel BC$，$AB = BC = AE = \frac{1}{2}AD$．

    [图]

    （1）求证：四边形$ABCE$为菱形；

    （2）若$\tan \angle ACB = \frac{3}{4}$，$AC = 8$，求CD的长．'
  answer: （1）证明见解析 （2）6
  solution: '【小问1详解】

    证明：∵$AD \parallel BC$，

    ∴$AE \parallel BC$，

    ∵$BC = AE$，

    ∴四边形$ABCE$为平行四边形，

    又∵$AB = BC$，

    ∴平行四边形$ABCE$为菱形；

    【小问2详解】

    解：∵$BC = AE = \frac{1}{2} AD$，

    ∴$AE = CE = DE = \frac{1}{2}AD$，

    ∴$\angle EAC = \angle ECA$，$\angle EDC = \angle ECD$，

    ∵$\angle EAC + \angle ECA + \angle EDC + \angle ECD = 180^\circ$，

    ∴$\angle ECA+\angle BCD=90^{\circ}$，

    ∴$\angle ACD=90^\circ$，

    ∵$AD \parallel BC$，

    ∴$\angle DAC = \angle ACB$，

    ∴$\tan \angle DAC = \tan \angle ACB = \frac{3}{4}$，

    在$Rt\triangle ADC$中，$\tan\angle DAC=\frac{CD}{AC}=\frac{3}{4}$，

    ∴$CD=\frac{3}{4}AC=\frac{3}{4}\times8=6$．'
