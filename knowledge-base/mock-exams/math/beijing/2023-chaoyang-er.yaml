  question: '甲、乙两个商家销售某款电子产品，原价都$[公式]$100元/件．

    甲商家的促销方式为：

    购买件数（单位：件）

    1～5

    6～10

    11～15

    16～20

    20以上

    每件价格（单位：元）

    95

    90

    85

    80

    75

    乙商家的促销方式为：

    购买件数（单位：件）

    1～8

    9～16

    17～24

    20以上

    每件价格（单位：元）

    90

    85

    80

    75

    若A公司在甲商家一次性购买10件该款电子产品，则购买的总费用为______元；

    若B公司分三次购买该款电子产品共35件，且每次至少购买5件，则购买的总费用最少为______元．'
  answer: ①.900②.2775
  solution: '解：由题意得，A公司在甲商家一次性购买10件该款电子产品，则购买的总费用为$90\times10=900$元；

    由题意得，所有促销方式中，单价最低为$75$元每件，因此要想总费用最小，那么再保证三次购买该款电子产品共35件，且每次至少购买5件的前提下，以$75$元每件购买的件数要尽可能的多，

    ∴以75元购买的件数为$35-5-5=25$件，然后剩下10件分两次购买，每次购买5件，

    ∴购买的总费用最少为$75\times25+2\times5\times90=2775$，

    故答案为：900，2775．'
