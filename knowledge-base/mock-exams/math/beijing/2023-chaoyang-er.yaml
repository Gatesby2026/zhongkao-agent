  question: 已知$a^{2}+b^{2}-3=0$，求代数式$(a+b)^{2}-2b(a-b)+2a^{2}$的值．
  answer: '9'
  solution: '解：∵$a^{2}+b^{2}-3=0$，

    ∴$a^{2}+b^{2}=3$，

    ∴$(a+b)^{2}-2b(a-b)+2a^{2}$

    $a^{2}+2ab+b^{2}-2ab+2b+2a^{2}$

    $=3a^{2}+3b^{2}$

    $=3\left(a^{2}+b^{2}\right)$

    $=3\times3$

    $=9$．'
