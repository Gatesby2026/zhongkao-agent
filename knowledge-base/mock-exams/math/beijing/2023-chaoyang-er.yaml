  question: '在$\triangle ABC$中，$AC = BC$，$\angle ACB=90^\circ$，点D在BC边上（不与点B，C重合），将线段AD绕点A顺时针旋转$90^\circ$，得到线段AE，连接DE．

    [图]

    （1）根据题意补全图形，并证明：$\angle EAC = \angle ADC$；

    （2）过点C作AB的平行线，交DE于点F，用等式表示线段EF与DF之间的数量关系，并证明．'
  answer: （1）补全图形见解析，证明见解析； （2）$EF = DF$，证明见解析．
  solution: '【小问1详解】

    补全的图形如图所示：

    [图]

    证明：∵$\angle ACB=90^\circ$，

    ∴$\angle CAD + \angle ADC = 90^\circ$，

    由旋转的性质可知$\angle EAD = 90^\circ$，即$\angle CAD + \angle EAC = 90^\circ$，

    ∴$\angle EAC = \angle ADC$；

    【小问2详解】

    $EF = DF$；

    证明：如图，作$EM \perp AC$于点M，与直线CF交于点N，

    [图]

    ∴$\angle EMA = \angle ACB = 90^\circ$，

    由旋转的性质可知$AE = AD$，

    由（1）可知$\angle EAM = \angle ADC$，

    ∴$\triangle EAM \cong$$\triangle ADC (AAS)$，

    ∴$AM = CD$，$EM = AC$，

    ∵$AC = BC$，

    ∴$\angle CAB=45^\circ$，

    ∵$CN \parallel AB$，

    ∴$\angle NCM = \angle CAB = 45^{\circ}$，

    ∴$MN = MC$，

    ∴$EN = AM$，

    ∴$EN = CD$，

    ∵$\angle EMC = \angle ACB$

    ∴$EN \parallel CD$，

    ∴$\angle ENF = \angle DCF$，$\angle NEF = \angle CDF$，

    ∴$\triangle ENF \cong \triangle DCP (ASA)$，

    ∴$EF = DF$．'
