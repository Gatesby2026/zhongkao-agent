  question: '某校为了解本校学生每天在校体育锻炼时间的情况，随机抽取了若干名学生进行调查，获得了他们每天在校体育锻炼时间的数据（单位：$\min$），并对数据进行了整理，描述，部分信息如下：

    a．每天在校体育锻炼时间分布情况：

    每天在校体育锻炼时间x（$\min$）

    频数（人）

    百分比

    $60 \leq x < 70$

    14

    $14\%$

    $70 \leq x < 80$

    40

    m

    $80 \leq x < 90$

    35

    $35\%$

    $x\ 90$

    n

    $11\%$

    b．每天在校体育锻炼时间在$80 \leq x < 90$这一组的是：

    80

    81  81  81  82  82  83  83  84  84  84  84  84  85  85  85  85  85

    85  85  85  86  87  87  87  87  87  88  88  88  89  89  89  89  89

    根据以上信息，回答下列问题：

    （1）表中$m =$______，$n =$______；

    （2）若该校共有1000名学生，估计该校每天在校体育锻炼时间不低于80分钟的学生的人数；

    （3）该校准备确定一个时间标准p（单位：$\min$），对每天在校体育锻炼时间不低于p的学生进行表扬．若要使$25\%$的学生得到表扬，则p的值可以是______．'
  answer: （1）$40\%$，$11$ （2）$460$人 （3）86（答案不唯一）
  solution: '【小问1详解】

    解：由题意得，$m=1-14\%-35\%-11\%=40\%$，

    $14 \div 14\% = 100$人，

    ∴这次参与调查的学生人数为100人，

    ∴$n = 100 \times 11\% = 11$，

    故答案为：$40\%$，$11$；

    【小问2详解】

    解：$1000\times(11\%-35\%)=460$人，

    ∴估计该校每天在校体育锻炼时间不低于80分钟的学生的人数为$460$人；

    【小问3详解】

    解：把每天在校体育锻炼时间从低到高排列，处在第75名和第76名的锻炼时间分别为$85\min .86\min$，

    ∵要使$25\%$的学生得到表扬，

    ∴$85<p\leq86$，

    ∴p的值可以为86，

    故答案为：86（答案不唯一）．'
