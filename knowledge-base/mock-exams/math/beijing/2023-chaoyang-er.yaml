  question: '已知点$(x_1,y_1)$，$\left(x_{2},y_{2}\right)$，$\left(x_{3},y_{3}\right)$在反比例函数$y=\frac{k}{x}(k<0)$的图象上，$x_{1}<x_{2}<x_{3}$，有下面三个结论：

    ①若$x_{1}x_{2}<0$，则$y_{2}>y_{3}$；

    ②若$x_{2}x_{3}<0$，则$y_{1}y_{3}<0$；

    ③若$x_{1}x_{3}>0$，则$y_{2}<y_{3}$．

    所有正确结论的序号是（）

    A.①②B.②③C.①③D.①②③'
  answer: B
  solution: '解：∵$k < 0$，

    ∴反比例函数$y=\frac{k}{x}(k<0)$的图象经过第二、四象限，在每个象限内y随x增大而增大，

    $1$∵$x_{1}<x_{2}<x_{3}$，$x_{1}x_{2}<0$，

    ∴$x_{1}<0<x_{2}<x_{3}$，

    ∴$y_{2}<y_{3}$，故①错误；

    $\textcircled{2}$∵$x_{1}<x_{2}<x_{3}$，$x_{2}x_{3}<0$，

    ∴$x_{1}<x_{2}<0<x_{3}$，

    ∴$y_{1}>0>y_{3}$，

    ∴$y_{1}y_{3}<0$，故②正确；

    $3$∵$x_{1}<x_{2}<x_{3}$，$x_{1}x_{3}>0$，

    ∴$0 < x_{c} \ll x_{2} < x_{3}$或$x_1 < x_2 < x_3 < 0$，

    当$0 < x_{c} \ll x_{2} < x_{3}$时，$y_{2}<y_{3}$；

    当$x_1 < x_2 < x_3 < 0$时，$y_{2}<y_{3}$；

    ∴若$x_{1}x_{3}>0$，则$y_{2}<y_{3}$，故③正确；

    故选B．'
