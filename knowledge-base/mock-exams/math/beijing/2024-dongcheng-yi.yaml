  question: 已知$2x - y - 9 = 0$，求代数式$\frac{6x-3y}{4x^{2}-4xy+y^{2}}$的值．
  answer: $\frac{1}{3}$
  solution: '解：∵$2x - y - 9 = 0$，

    ∴$2x - y = 9$，

    ∴$\frac{6x-3y}{4x^{2}-4xy+y^{2}}$

    $=\frac{3(2x-y)}{(2x-y)^{2}}$

    $=\frac{3}{2x-y}$

    $= \frac{3}{9}$

    $=\frac{1}{3}$．'
