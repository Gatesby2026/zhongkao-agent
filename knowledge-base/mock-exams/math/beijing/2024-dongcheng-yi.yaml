  question: '在平面直角坐标系xOy中，已知线段$\overline{PQ}$和直线$\ell_{1}$，$l_2$，线段$\overline{PQ}$关于直线$\ell_{1}$，$l_2$$[公式]$“垂点距离”定义如下：过点P作$PM \perp l_{1}$于点M，过点Q作$QN \perp l_{2}$于点N，连接MN，称MN的长为线段$\overline{PQ}$关于直线$\ell_{1}$和$l_2$的“垂点距离”，记作d．

    [图]

    （1）已知点$P(2,1)$，$Q(1,2)$，则线段$\overline{PQ}$关于x轴和y轴的“垂点距离”d为______；

    （2）如图1，线段$\overline{PQ}$在直线$y=-x+3$上运动（点P的横坐标大于点Q的横坐标），若$PQ=\sqrt{2}$，则线段$\overline{PQ}$关于x轴和y轴的“垂点距离”d的最小值为______；

    （3）如图2，已知点$A\left(0,2\sqrt{3}\right)$，$\odot A$的半径为1，直线$y = -\frac{\sqrt{3}}{3}x + b$与$\odot A$交于P，Q两点（点P的横坐标大于点Q的横坐标），直接写出线段$\overline{PQ}$关于x轴和直线$y = -\sqrt{3}x$的“垂点距离”d的取值范围．'
  answer: （1）$2\sqrt{2}$ （2）$2\sqrt{2}$ （3）$\frac{\sqrt{21}}{2}<d\leq\sqrt{21}$
