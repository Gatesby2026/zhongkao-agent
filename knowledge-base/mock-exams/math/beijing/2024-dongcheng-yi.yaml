  question: '在平面直角坐标系xOy中，$M(x_1,y_1)$，$N(x_{2},y_{2})$是抛物线$y=ax^{2}+bx+1(a>0)$上任意两点，设抛物线的对称轴为直线$x = t$．

    [图]

    （1）若点$(2,1)$在该抛物线上，求t的值；

    （2）当$t \leq 0$时，对于$x_{2}>2$，都有$y_1 < y_2$，求$x_{1}$的取值范围．'
  answer: （1）$t = 1$ （2）$-2 \leq x_1 \leq 2$
  solution: '【小问1详解】

    解：∵抛物线$y=ax^{2}+bx+1(a>0)$经过点$(2,1)$，

    ∴$4a + 2b + 1 = 1$，

    ∴$b = -2a$，

    ∴抛物线对称轴为直线$x = -\frac{b}{2a} = 1$，

    ∴$t = 1$；

    【小问2详解】

    解：∵$a > 0$，

    ∴抛物线开口向上，

    ∴当$x > t$时，y随x增大而增大，当$x < t$时，y随x增大而减小，且离对称轴越远函数值越大；

    当$0 \leq x_{1} \leq 2$时，

    ∵$1 \leq x_{1} < x_{2}$，

    ∴此时满足$y_1 < y_2$；

    当$-2 \leq x_{1} \leq 0$时，

    ∵$t \leq 0$，

    ∴点M到对称轴的距离小于点N到对称轴的距离，

    ∴此时满足$y_1 < y_2$；

    当$x_{1}>2$时，一定会有$x_2$的值满足$x_{1}>x_{2}$，即此时$y_{1}>y_{2}$，不符合题意；

    当$x_{1}<-2$时，若$t = 0$，且$x_{1}=-x_{2}$时，此时$y_{1}=y_{2}$，不符合题意；

    综上所述，$-2 \leq x_1 \leq 2$；'
