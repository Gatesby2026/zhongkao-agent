- id: 16
  type: 填空
  score: 2
  question: '简单多面体的顶点数（V）、面数（F）、棱数（E）之间存在一定的数量关系，称为欧拉公式．

    （1）四种简单多面体的顶点数、面数、棱数如下表：

    | 名称 | 图形 | 顶点数（ V ） | 面数（ F ） | 棱数（ E ） |

    | --- | --- | --- | --- | --- |

    | 三棱锥 | [图] | 4 | 4 | 6 |

    | 长方体 | [图] | 8 | 6 | 12 |

    | 五棱柱 | [图] | 10 | 7 | 15 |

    | 正八面体 | [图] | 6 | 8 | 12 |

    在简单多面体中，V，F，E之间的数量关系是______；

    （2）数学节期间，老师布置了让同学们自制手工艺品进行展示的任务，小张同学计划做一个如图所示的简单多面体作品．该多面体满足以下两个条件：①每个面的形状是正三角形或正五边形；②每条棱都是正三角形和正五边形的公共边．

    小张同学需要准备正三角形和正五边形的材料共______个．

    [图]'
  answer: ①.$V + F - E = 2$ ②.32
  solution: '解（1）$4+4-6=2$，

    $8+6-12=2$，

    $10+7-15=2$，

    $6+8-12=2$，

    ……，

    以此类推可得$V + F - E = 2$，

    故答案为：$V + F - E = 2$；

    （2）设小张同学需要准备正三角形和正五边形材料各x个，y个，

    ∵每个顶点有4条棱，且每个顶点在四个面里面，

    ∴一共有$\frac{3x+5y}{4}$个顶点，

    ∴一共有$\frac{3x+5y}{4}+4=2-\frac{3x+5y}{2}$条棱，

    ∵$V + F - E = 2$，

    ∴$\frac{3x+5y}{4}+x+y-\frac{3x+5y}{2}=2$，

    ∴$x-y=8$；

    ∵每个正三角形与三个五边形相邻，而每个五边形与五个正三角形相邻，

    ∴$y=\frac{3x}{5}$，

    ∴$x-\frac{3}{5}x=8$，

    ∴$x = 20$，

    ∴$y = 12$，

    ∴$x + y = 32$，

    ∴小张同学需要准备正三角形和正五边形的材料共32个，

    故答案为：32．'
