  question: '解不等式组：$\begin{cases}

    x+2<6 \\

    \dfrac{5x+1}{3}-1>\dfrac{x-6}{2}

    \end{cases}$．'
  answer: $-2 \leq x < 4$
  solution: '$\left\{\begin{array}{l}x+2<6(1)\\ \left|\dfrac{5x+1}{3}-1\right|-\dfrac{x-6}{2}\geqslant 2\end{array}\right.$

    解不等式①得，$x<4$

    解不等式②得，$x^{-2}$

    ∴不等式组的解集为：$-2 \leq x < 4$．'
