  answer: C
  solution: '解：设点D的坐标为$(m,n)$，

    由平行四边形对角线中点坐标相同可得$\frac{\theta+2}{2}=-1+m \\

    \frac{2+\theta}{2}=\frac{\theta+n}{2}$，

    ∴$\left\{

    \begin{array}{l}

    m = 3 \\

    n = 2

    \end{array}

    \right.$，

    ∴点D的坐标为$(3,2)$，

    故选：C．'
