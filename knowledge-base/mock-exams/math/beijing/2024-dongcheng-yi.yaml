  question: '某校初三年级两个班要举行韵律操比赛．两个班各选择8名选手，统计了他们的身高（单位：cm），数据整理如下：

    a．1班168   171   172   174   174   176   177   179

    2班168   170   171   174   176   176   178   183

    b．每班8名选手身高的平均数、中位数、众数如下：

    | 班级 | 平均数 | 中位数 | 众数 |

    | --- | --- | --- | --- |

    | 1 班 | 173.875 | 174 | 174 |

    | 2 班 | 174.5 | m | n |

    根据以上信息，回答下列问题：

    （1）写出表中m，n的值；

    （2）如果某班选手的身高的方差越小，则认为该班选手的身高比较整齐．据此推断：在1班和2班的选手中，身高比较整齐的是______班（填“1”或“2”）；

    （3）1班的6位首发选手的身高分别为171，172，174，174，176，177．如果2班已经选出5位首发选手，身高分别为171，174，176，176，178，要使得2班6位首发选手的平均身高不低于1班6位首发选手的平均身高，且方差尽可能小，则第六位选手的身高是______cm．'
  answer: （1）175、176． （2）1（3）170
  solution: '【小问1详解】

    2班数据从小到大排列为168、170、171、174、176、176、178、183

    从中可以看出一共八个数，第四个数据为174、第五个数据为176，所以这组数据的中位数为：$(174+176)\div2=175$，故$m = 175$；

    其中176出现的次数最多，所以这组数的众数为176，故$n = 176$；

    故答案为：175、176．

    【小问2详解】

    根据方差的定义可以知道，方差越大，一组数据的波动越大，离散程度越大，稳定性也越小，反之亦然．

    1班的身高分布于$168-179$，2班的身高分布于$168-183$，

    从中可以看出，1班的数据较2班的数据波动较小，更加稳定，所以1班的选手身高比较整齐，

    故答案为：1．

    【小问3详解】

    $(171+172+174+174+176+177)\div6=174$（厘米）

    设2班第六位选手的身高为x厘米，

    则$(171+174+176+176+178+x)\div6=174$，

    $x \quad 169$，

    据此，第六位可选的人员身高为170、183，

    若为170时，2班的身高数据分布于$170-178$，若为183时，2班的身高数据分布于$171-183$，

    从中可以看出当身高为170时的数据波动更小，更加稳定，

    所以第六位选手的身高应该是170厘米，

    故答案为：170．'
