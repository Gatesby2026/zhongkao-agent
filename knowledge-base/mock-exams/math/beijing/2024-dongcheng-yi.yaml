    [图]

    ∵$P(2,1)$，$Q(1,2)$，

    ∴$M(2,0)$，$N(0,2)$，

    ∴$d = MN = \sqrt{(2 - 0)^2 + (0 - 2)^2} = 2\sqrt{2}$，

    故答案为：$2\sqrt{2}$，

    【小问2详解】

    解：设点$M(m,0)$，$N(0,n)$，

    ∵点P，Q在直线$y=-x+3$上，$PM \perp x$轴，$\overline{QN} \perp y$轴，

    ∴$P(m,-m+3)$，

    将$y = n$代入$y=-x+3$，得：$n = -x + 3$，解得：$x=3-\pi$，

    ∴$Q(3-a,n)$，

    ∴$PQ=\sqrt{(m-3+n)^{2}+(-m+3-n)^{2}}=\sqrt{2}$，整理得：$n=4-m$，

    ∴$N(0,4-m)$，

    ∴$d=MN=\sqrt{(m-0)^{2}+(0-4+m)^{2}}=\sqrt{2(m-2)^{2}+8}$，

    ∵$2(m-2)^{2}0$，

    ∴$d=MN=\sqrt{2(m-2)^{2}+8}=\sqrt{0+8}=2\sqrt{2}$，

    故答案为：$2\sqrt{2}$，

