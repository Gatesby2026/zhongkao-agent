  question: '阅读材料：

    如图，已知直线l及直线l外一点P．

    按如下步骤作图：

    ①在直线l上任取两点A，B，作射线AP，以点P为圆心，PA长为半径画弧，交射线AP于点C；

    ②连接BC，分别以点B，C为圆心，大于$\frac{1}{2}BC$的长为半径画弧，两弧分别交于点M，N，作直线MN，交BC于点Q；

    ③作直线$\overline{PQ}$．

    回答问题：

    [图]

    （1）由步骤②得到的直线MN是线段BC的______；

    （2）若$\triangle CPQ$与$\triangle CAB$的面积分别为$S_1$，$S_{2}$，则$S_{1}:S_{2}=$______．'
  answer: ①.垂直平分线 ②.$\frac{1}{4}$
  solution: '解：（1）由作图过程可知，步骤②得到的直线MN是线段BC的垂直平分线．

    故答案为：垂直平分线．

    （2）由作图过程可知，$AP = CP$，

    $\because MN$是线段BC的垂直平分线，

    $\therefore CQ = BQ$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\frac{CP}{AC}=\frac{CQ}{BC}=\frac{1}{2}$，

    $\angle PCQ = \angle ACB$，

    $\triangle PCQ \sim \triangle ACB$，

    $\therefore S_{1}:S_{2}=\left(\frac{1}{2}\right)^{2}=\frac{1}{4}$．

    故答案为：$\frac{1}{4}$．'
