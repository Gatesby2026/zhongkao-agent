  question: '如图，正方形$ABCD$中，点E为CD边上的点（点E不与点C、D重合），以CE为边作正方形$CEFG$，连接AF，设$AB = a$，$CE = b$，$AF = c$，给出下面三个结论：

    ①$\sqrt{a^{2}+b^{2}}<c$；

    ②$2a > c$；

    ③$2(a^{2}+b^{2})=c^{2}$；上述结论中，所有正确结论的序号是（）

    [图]

    A.①②

    B.①③

    C.②③

    D.①②③'
  answer: D
  solution: '如图，延长FE交AB于点H，

    [图]

    ∵点E为CD边上的点（点E不与点C、D重合），以CE为边作正方形$CEFG$，

    ∴$EF \perp CD$，B，C，G三点共线，$AB \parallel CD$，

    ∴$FH \perp AB$，

    ∴$AH = a - b$，$FH = a + b$，

    ∴$AF^{2}=AH^{2}+FH^{2}$，即$c^{2}=(a-b)^{2}+(a+b)^{2}$，

    ∴$2(a^{2}+b^{2})=c^{2}$，故③正确，符合题意；

    ∵$a^{2}+b^{2}>0$，$c^{2}>0$，

    ∴$\sqrt{a^{2}+b^{2}}=\frac{\sqrt{c^{2}}}{2}=\frac{\sqrt{2}}{2}c<c$，故①正确，符合题意；

    在$\triangle AHF$中，

    ∵$AH + FH > AF$，

    ∴$a-b+a+b>c$，

    ∴$2a > c$，故②正确，符合题意；

    故选：D．'
