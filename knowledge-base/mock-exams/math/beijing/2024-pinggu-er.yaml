    \bullet \quad \bullet \\

    \bullet

    \end{array}$关于x的一元二次方程$x^{2}+2x-k=0$有两个实数根

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$b^2 - 4ac \quad 0$

    $\because a = 1$，$b = 2$，$c = -k$

    $\ldots 4-4\times1\times(-k)\quad0$

    $\therefore k-1$

    故选：D．'
