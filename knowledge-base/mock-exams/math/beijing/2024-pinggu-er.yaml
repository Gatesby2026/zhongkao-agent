  question: '如图，正方形$ABCD$$[公式]$边长为3，点E为AD边的中点，连接$BD、CE$，BD与CE相交于点F，则DF的长为______．

    [图]'
  answer: $\sqrt{2}$
  solution: '解：∵正方形$ABCD$，

    ∴$AD = BC = 3$，$AD \parallel BC$，$\angle CBD = 45^\circ$，$\angle BCD = 90^\circ$，

    ∴$BD=\frac{BC}{\cos 45^{\circ}}=3\sqrt{2}$，

    ∵$AD \parallel BC$，

    ∴$\angle EDF = \angle CBF$，$\angle DEF = \angle BCF$，

    ∴$\triangle DEF \sim \triangle BCF$，

    ∴$\frac{DF}{BF} = \frac{DE}{BC}$，即$\frac{DF}{3\sqrt{3}-DF}=\frac{3}{2}$，

    解得，$DF = \sqrt{2}$，

    故答案为：$\sqrt{2}$．'
