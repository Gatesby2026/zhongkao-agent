  question: '如图，BD平分$\angle ABF$，点A是射线BM上一点，过点A作$AD \parallel BN$交BG于点D，过A作$AE \perp BN$，过点D作$DF \perp BN$．

    [图]

    （1）求证：四边形$AEFD$是矩形；

    （2）在BF上取点C使得$CF = BE$，连接AC、CD．求证：$AC \perp BD$．'
  answer: （1）证明见解析； （2）见解析．
  solution: '【小问1详解】

    ∵$AE \perp BN$，$DF \perp BN$，

    ∴$AE \parallel DF$，

    ∵$AD \parallel EF$，

    ∴四边形$AEFD$是平行四边形，

    ∵$AE \perp BN$，

    ∴四边形$AEFD$是矩形；

    【小问2详解】

