  question: '为了了解本年级的学生的身高情况，数学小组的同学从校医务室随机调取了一个班39人的身高数据，（单位：cm），以下是甲、乙、丙三个小组对数据整理的结果：

    甲：39名学生的身高频数分布图（数据分成4组：$150<x\leq160$，$160<x\leq170$，$170<x\leq180$，$180<x\leq190$）：

    [图]

    其中，身高的数值在$160<x\leq170$这一组的是：

    161，161，162，162，162，163，163，163，163，

    164，165，166，167，167，168，168，168，170．

    乙：该班有20名女生和19名男生，女生和男生的身高数据的折线图：

    [图]

    丙：39名学生的身高的平均数、中位数、众数：

    | 平均数 | 中位数 | 众数 |

    | --- | --- | --- |

    | 167 | m | n |

    （1）写出表中m和n的值；

    （2）在男女两组学生中，身高数据更均匀的是________（填“男生”或“女生”）；

    （3）现需要从该班男、女生中各抽调6名学生参加该校运动会开幕式仪仗队，已知抽调的女生身高分别为166，168，168，171，172，173．男生已经确定的四名成员的身高数据为168，170，171，173，为了使被抽调的男生身高比女生身高的平均值略大，且仪仗队身高整体比较均匀，则选出的另外两名男生的身高分别为________和________．'
  answer: （1）$m = 167$，$n = 174$； （2）女生； （3）167，174．
  solution: '【小问1详解】

    因为样本数量是39，将这39人身高从低到高排列，中位数是第20位学生的身高，

    根据甲的统计数据，可以知道，第20位学生的身高落在$160<x\leq170$组，

    因为$150<x\leq160$有6个人，

    所以第20位学生位于$160<x\leq170$的第14个，

    其中，身高的数值在$160<x\leq170$这一组的是：

    161，161，162，162，162，163，163，163，163，

    164，165，166，167，167，168，168，168，170．

    所以中位数为167；

    根据乙的统计数据，可以知道174出现的次数最多，

    所以众数为174；

    故答案为：$m = 167$，$n = 174$

    【小问2详解】

    根据乙的折线统计图，可知女生的数据波动小一些，

    所以女生的数据更均匀一些；

    故答案为：女生．

    【小问3详解】

    已知抽调的女生身高分别为166，168，168，171，172，173．

    此时，女生的平均身高为：$(166+168+168+171+172+173)\div6=169.5$

    男生已经确定的四名成员的身高数据为168，170，171，173，

    那么这四个男生的平均身高为$(168+170+171+173)\div4=170.5$

    为了使被抽调的男生身高比女生身高的平均值略大，且仪仗队身高整体比较均匀，

    那么另外两个男生的身高应选择$167$和$174$；

    故答案为：167，174．'
