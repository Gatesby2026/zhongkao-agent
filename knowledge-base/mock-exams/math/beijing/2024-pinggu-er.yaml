  question: 方程$\frac{7}{x+13}=\frac{1}{2x}$的解为________．
  answer: $x = 1$
  solution: '解：$\frac{7}{x+13}=\frac{1}{2x}$，

    方程两边都乘$2x(x+13)$，得：$14x=x+13$，

    移项，得：$14x - x = 13$

    合并得，$13x=13$，

    解得，$x = 1$，

    检验：当$x = 1$时，$2x(x+13)=28\neq0$，

    所以分式方程的解是$x = 1$．

    故答案为：$x = 1$．'
