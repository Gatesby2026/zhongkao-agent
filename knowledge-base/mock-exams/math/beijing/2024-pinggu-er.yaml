  question: '在平面直角坐标系xOy中，$M(x_1,\ y_1)$，$N(x_{2},\ y_{2})$是抛物线$y = x^2 - 2mx + m^2 - 1$上任意两点．

    （1）求抛物线的对称轴（用含m的式子表示）；

    （2）若$x_2 = x_1 + n(n > 0)$，点$M、N$中至少有一个点位于x轴的上方，直接写出n的范围；

    （3）若对于$-1 < x < 2,\; x_3 = m + 2$时，都有$y_1 < y_2$，求m的取值范围．'
  answer: （1）$x = m$； （2）$n^{2}$； （3）$0<m<1$．
  solution: '【小问1详解】

    解：$y = x^2 - 2mx + m^2 - 1 = (x - m)^2 - 1$，

    抛物线的对称轴为$x = m$，

    【小问2详解】

    由（1）可得，抛物线的顶点坐标为$(m,-1)$，

    令$y = 0$，得到$x = m - 1$或$x = m + 1$，

    ∴抛物线与x轴的两个交点为$A(m-1,0),B(m+1,0)$，

    $AB=2$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$若点$M、N$中至少有一个点位于x轴的上方

    只需$n^{2}$；

    【小问3详解】

    ∵抛物线的对称轴为$x = m$，

    ∴$(m+2,y_{2})$点一定位于对称轴的右侧，

    它的对称点为$(m-2,y_{2})$，

    [图]

    又∵对于$-1 < x < 2,\; x_3 = m + 2$时，都有$y_1 < y_2$，

    ∴$\left\{\begin{array}{l} m-2<-1 \\ m+2>2 \end{array}\right.$，

    解得$0<m<1$．'
