    [图]

    ∵四边形$AEFD$是矩形

    ∴$AD \parallel EF$，$AD = EF$，

    ∵$BE = CF$，

    ∴$BC = EF$

    ∴$AD \parallel BC$，$AD = BC$，

    ∴四边形$ABCD$是平行四边形，

    ∵BD平分$\angle ABC$，

    ∴$\angle ABD = \angle DBC$，

    ∵$AD \parallel BC$，

    ∴$\angle ADB = \angle DBC$，

    ∴$\angle ABD = \angle ADB$，

    ∴$AD = AB$，

    ∴四边形$ABCD$是菱形，

