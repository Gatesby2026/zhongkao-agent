  question: '在数学活动课上，同学们分组测量学校旗杆的高度，经过交流、研讨及测量给出如下两种方案，请你选择一种方案求出旗杆的高度．

    方案一：在某一时刻，借助太阳光线，测得小华的身高DE为$1.8$米，他的影长EF为$0.9$米，同时测得旗杆AB的影长BC为$6$米．

    [图]

    方案二：利用“光在反射时，反射角等于入射角”的规律，小丽在她的脚下C点放了一面小镜子，然后向后退$1.2$米到达点E，恰好在小镜子中看到旗杆的顶端A，此时旗杆底端B到点C的距离BC为$9$米，小丽的眼睛点D到地面的距离DE为$1.6$米．

    [图]'
  answer: $12m$
  solution: '方案一：

    解：由题意得，$\angle DEF=\angle ABC=90^{\circ}$，$DF \parallel AC$．

    $\angle LDF = \angle ACB$．

    $\triangle DEF\sim\triangle ABC$．

    $\therefore \frac{DE}{AB} = \frac{EF}{BC}$．

    $\because DE = 1.8$，$EF = 0.9$，$BC = 6$，

    $\frac{1.8}{AB}=\frac{0.9}{6}$

    $\therefore AB = 12$．

    答：旗杆高度为$12m$．

    方案二：

    解：由题意得，$\angle DEC = \angle ABC = 90^\circ$，$\angle DCE = \angle ACB$，

    $\triangle DEC \sim \triangle ABC$．

    $\therefore \frac{DE}{AB} = \frac{EC}{BC}$．

    $\therefore DE = 1.6$，$EC = 1.2$，$BC = 9$，

    $\therefore\frac{1.6}{AB}=\frac{1.2}{9}$．

    $\therefore AB = 12$．

    答：旗杆高度为$12m$．'
