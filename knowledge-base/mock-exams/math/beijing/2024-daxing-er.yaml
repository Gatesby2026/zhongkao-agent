  question: '如图，AB是$\odot\odot$的直径，CD是$\odot\odot$的一条弦，$AB \perp CD$，连接AC，OD．若$\angle CAB=30^\circ$，$OA = 2$，则CD的长是______．

    [图]'
  answer: $2\sqrt{3}$
  solution: '解：连接OC，如图所示，

    [图]

    ∵$\angle CAB=30^\circ$，

    ∴$\angle COE=2\angle ACB=60^\circ$，

    ∵$AB \perp CD$，AB是直径，

    ∴$\angle OCE=90^{\circ}-60^{\circ}=30^{\circ}$，$CD = 2CE$，

    ∴$OE=\frac{1}{2}OC=1$，

    ∴$CE=\sqrt{2^{2}-1^{2}}=\sqrt{3}$，

    ∴$CD=2CE=2\sqrt{3}$，

    故答案为：$2\sqrt{3}$．'
