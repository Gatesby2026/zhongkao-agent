  question: '某校有A，B两个合唱队，每队各10名学生，测量并获取了所有学生身高（单位：cm）的数据，并对数据进行整理、描述和分析，下面给出了部分信息：

    a．A队学生的身高：

    165167168170170170171172173174

    b．B队学生身高的频数分布直方图如下（数据分成4组：$167\leq x<169$，$169\pi\times4=171$，$171\leq x<173$，$173 \leq x \leq 175$）：

    [图]

    c．B队学生身高的数据在$169\pi\times4=171$这一组的是：

    169169169170

    d．A，B两队学生身高数据的平均数、中位数、众数、方差如下：

    平均数

    中位数

    众数

    方差

    A队

    170

    170

    m

    $6.8$

    B队

    170

    n

    169

    $3.4$

    根据以上信息，回答下列问题：

    （1）写出表中m，n的值；

    （2）对于不同队的学生，若学生身高的方差越小，则认为该队舞台呈现效果越好．据此推断：A，B两队舞台呈现效果更好的是______（填“A队”或“B队”）；

    （3）A队要选5名学生参加比赛，已确定3名学生参赛，他们的身高分别为170，170，173，他们的身高的方差为2，下列推断合理的是______（填序号）．

    ①另外选2名学生的身高为171和172时，5名学生身高的平均数大于171，方差小于2；

    ②另外选2名学生的身高为168和170时，5名学生身高的平均数小于171，方差小于2．'
  answer: （1）$m=170$，$n=169.5$ （2）B队（3）①
  solution: '【小问1详解】

    解：∵A队学生身高出现最多的是170，

    ∴$m=170$，

    ∵将B队学生身高从小到大进行排序，排在中间位置的两个数为169，170，

    ∴中位数$n = \frac{169 + 170}{2} = 169.5$．

    【小问2详解】

    解：∵A队学生身高的方差为$6.8$，A队学生身高的方差为$3.4$，且$6.8>3.4$，

    ∴A，B两队舞台呈现效果更好的是B队；

    【小问3详解】

    解：①此时5名学生身高的平均数为：

    $\frac{170+170+173+171+172}{5}=171.2$，

    此时5名学生身高的方差为：

    $S^{2}=\frac{1}{5}\left[2(171.2-170)^{2}+(171.2-171)^{2}+(171.2-173)^{2}+(171.2-172)^{2}\right]=1.36$，

    ∴5名学生身高的平均数大于171，方差小于2，推断合理；

    ②此时5名学生身高的平均数为：

    $\frac{170+170+173+168+170}{5}=170.2$，

    此时5名学生身高的方差为：

    $S^{2}=\frac{1}{5}\left[3(70.2-170)^{2}+(170.2-168)^{2}+(170.2-173)^{2}\right]=2.56$，

    ∴5名学生身高的平均数大于171，方差大于2，推断不合理．

    故答案为：①'
