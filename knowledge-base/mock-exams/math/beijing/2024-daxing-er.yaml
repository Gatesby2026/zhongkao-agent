  question: '综合实践活动课上，老师给每位同学准备了一张边长为$30cm$的正方形硬纸板，要求在4个角上剪去相同的小正方形（如图1），这样可制作一个如图2所示的无盖的长方体纸盒．设剪去的小正方形的边长为xcm（$1\leq x\leq 14$），则纸盒的底面边长为$(30-2x)\mathrm{cm}$．

    [图]

    a．甲同学研究无盖纸盒的底面积，得到：

    无盖纸盒的底面积$y_{1}$与剪去小正方形的边长x的函数表达式为$y=(30-2x)^{2}$；

    b．乙同学研究无盖纸盒的侧面积（四个侧面面积之和），得到：

    无盖纸盒的侧面积$y_{2}$与剪去小正方形的边长x的函数表达式为$y=4x(30-2x)$；

    c．丙同学研究无盖纸盒的体积，得到：

    无盖纸盒$[公式]$体积$y_{3}$与剪去小正方形的边长x的函数表达式为$y_{3}=-x(30-2x)^{2}$．

    $y_{3}$与x的几组对应值如下表：

    x（cm）

    1

    2.5

    5

    7.5

    10

    12.5

    14

    y3（cm3）

    754

    1562.5

    2000

    1687.5

    1000

    312.5

    56

    如图3，在平面直角坐标系xOy中，描出了表中各组数值所对应的点（x，y3），并用平滑曲线连接这些点，得到了函数y3＝x（30−2x）2（1≤x≤14）的图象．

    [图]

    根据以上信息，解决下列问题：

    （1）当剪去小正方形的边长x为$10cm$时，则无盖纸盒的底面积$y_{1}$为______$\mathrm{cm}^{2}$；

    （2）当无盖纸盒的侧面积$y_{2}$取最大值时，求剪去小正方形的边长x的值；

    （3）下列推断合理的是______（填序号）；

    ①当$1\leq x\leq 14$时，无盖纸盒的体积$y_{1}$随着剪去小正方形的边长x的增大而减小；

    ②当剪去的小正方形的边长x为$1\,\text{cm}$时，无盖纸盒的体积$y_{3}$小于$1000\mathrm{cm}^3$；

    ③当无盖纸盒的体积$y_{3}$为$1000\mathrm{cm}^3$时，剪去的小正方形的边长x只能为10cm．

    （4）当无盖纸盒的体积$y_{3}$为$2000\mathrm{cm}^3$时，无盖纸盒的侧面积$y_{2}$为______$\mathrm{cm}^{2}$．'
  answer: （1）100（2）$\frac{15}{2}$cm （3）②（4）400
  solution: '【小问1详解】

    当剪去小正方形的边长x为10cm时，$y_{1}=(30-2x)^{2}=(30-2\times10)^{2}=10^{2}=100\left(\mathrm{cm}^{2}\right)$

    故答案为：100；

    【小问2详解】

    解：∵$y_{3}=4x(30-2x)=-8x^{2}+120x=-8\left(x-\frac{15}{2}\right)^{2}+450$，$-8 < 0$，

    当$x = \frac{15}{2}$时，$y_{2}$取最大值，最大值为$450$，

    即当无盖纸盒的侧面积$y_{2}$取最大值时，剪去小正方形的边长x的值为$\frac{15}{2}$；

    【小问3详解】

    ①∵$x_{1}=(30-2x)^{2}=4(x-15)^{2}$，$4 > 0$，

    ∴当$1\leq x\leq 15$时，$y_{1}$随着剪去小正方形的边长x的增大而减小；

    故①不合理，

    ②由$y_{2}=x(30-2x)^{2}$的图象可知，当剪去的小正方形的边长x为$1\,\text{cm}$时，无盖纸盒的体积$y_{3}$小于$1000\mathrm{cm}^3$，故②合理；

    ③由$y_{2}=x(30-2x)^{2}$的图象可知，当无盖纸盒的体积$y_{3}$为$1000\mathrm{cm}^3$时，剪去的小正方形的边长x除了10cm，还有一个值在1和2之间．

    故③不合理；

    故选：②；

    【小问4详解】

    由图象可知，当无盖纸盒的体积$y_{3}$为$2000\mathrm{cm}^3$时，即$x = 5\mathrm{cm}$，

    此时$v_{2}=4\times(30-2x)\times4=5\times(30-2\times5)=400\mathrm{cm}^{2}$，

    故答案$[公式]$：400．'
