    （1）如图，平移线段AB 得到$\odot\odot$ 的长度为1的弦$P_{1}P_{2}$ 和$P_{3}P_{4}$ ，则这两条弦的位置关系是__________；在点$P_{1}$ ，$P_{2}$ ，$P_3$ ，$P_{4}$ 中，连接点A 与点________的线段的长度等于线段AB 到$\odot\odot$ 的“平移距离”；

    [图]

    （2）若点$A,B$ 都在直线$y=\sqrt{3}x+2\sqrt{3}$ 上，记线段AB 到$\odot\odot$ 的“平移距离”为$d_{1}$ ，求$d_{1}$ 的最小值；

    （3）若点A 的坐标为$\left(2,\frac{3}{2}\right)$ ，记线段AB 到$\odot\odot$ 的“平移距离”为$d_{2}$ ，直接写出$d_{2}$ 的取值范围.

    参考答案

    | 1 | 2 | 3 | 4 | 5 | 6 | 7 | 8 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | D | C | A | D | B | B | C | B |'
