  question: 已知$a+b-1=0$，求代数式$\left(\frac{2ab+b^{2}}{a}+a\right)\div\frac{2a+2b}{a}$的值．
  answer: $\frac{a+b}{2}$，$\frac{1}{2}$．
  solution: '解：∵$a+b-1=0$，

    ∴$a+b=1$，

    ∴$\left(\frac{2ab+b^{2}}{a}+a\right)\div\frac{2a+2b}{a}$

    $= \frac{(a+b)^{2}}{a} - \frac{a}{2(a+b)}$

    $=\frac{a+b}{2}$

    $=\frac{1}{2}$．'
