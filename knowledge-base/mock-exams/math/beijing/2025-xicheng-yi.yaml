  question: 为设计一类推理型模型，某公司计划投入2200万元购进A、B两种型号的芯片共1000片，其中A型芯片至少800片．已知购进2片A型芯片和1片B型芯片共需6万元，购进1片A型芯片和3片B型芯片共需6.5万元．为了满足基本需求，请判断该公司计划投入的资金是否够用，并说明理由．
  answer: 该公司计划投入的资金够用，理由见解析．
  solution: '解：该公司计划投入的资金够用，理由如下：

    设该公司购进1片A型芯片需x万元，购进1片B型芯片需y万元．

    由题意可知，$\begin{cases}

    2x + y = 6 \\

    x + 3y = 6.5

    \end{cases}$，

    解得$\left\{ \begin{array} { l } { x = 2 . 3 } \\ { y = 1 . 4 } \end{array} \right.$，

    设购进A型芯片m片，则购进B型芯片$(1000-m)$片，

    ∴$2.3m+1.4(1000-m)\leq 2200$，

    解得$m \leqslant 888 \frac{8}{9}$，

    ∴投入的资金最多购进A型芯片888片，

    ∵$800<888\frac{8}{9}$，

    ∴该公司计划投入的资金够用．'
