  question: '某地区计划通过面试从报名参加文化推广的人员中选出“文化志愿者”．现收集了所有30名报名者的面试成绩（百分制，取整数），并对这30个数据进行了整理、描述和分析．下面给出了部分信息：

    a．30个数据的频数分布直方图如下（数据分5组：$45 \leq x < 55$，$55\leqslant x<65$，$65 \leq x < 75$，$75\leq x<85$，$85 \leq x < 95$）；

    [图]

    b．30个数据在$65 \leq x < 75$这一组的是：65

    66  66  67  69  71  72  72  73  73  73  74

    根据以上信息，回答下列问题：

    （1）频数分布直方图中m的值是______，这30个数据的中位数是______；

    （2）本次面试平均成绩约为______（同一组数据用该组的组中值作代表，结果四舍五入取整数）：

    （3）将本次面试成绩从高到低排序，面试成绩在前30%的报名者可以被录用为“文化志愿者”．若一名报名者的面试成绩为75分，判断他能否被录用，并说明理由．'
  answer: （1）6，70； （2）69；（3）能被录用，理由见解析．
  solution: '【小问1详解】

    解：$m=30-2-8-12-2=6$，

    中位数在第15，16两位人员成绩的平均数，

    ∴$\frac{69+71}{2}=70$，

    故答案为：$6,70$；

    【小问2详解】

    第一组的组中值为：$\frac{45+55}{2}=50$，

    第二组的组中值为：$\frac{55+65}{2}=60$，

    第三组的组中值为：$\frac{65+75}{2}=70$，

    第四组的组中值为：$\frac{75+85}{2}=80$，

    第五组的组中值为：$\frac{85+95}{2}=90$，

    ∴平均成绩为$\frac{50\times2+60\times8+70\times12+80\times6+90\times2}{30}\approx69$

    故答案为：$69$；

    【小问3详解】

    解：能被录用，理由如下，

    成绩从高到低排序，面试成绩在前30%的报名者可以被录用为“文化志愿者”，

    ∴$30\times30\%=9$（人），

    ∵$85-95$的有2人，$75-85$的有6人，

    ∴$65-75$中最高分的74能被录到，

    ∴面试成绩为75分的必然被录用．'
