  question: '某单位有A，B两条生产线生产同一种产品．为了解两条生产线产品质量的稳定性，要在两条生产线的产品中随机抽取一定数量的样品进行调查．在两条生产线的产品中每次各抽取100个样品，共抽取五次．已知在五次抽取中，A，B两条生产线合格产品的数量（单位：个）如下：

    A：89

    91  92  93  95

    B：88

    91  92  93  96

    则五次抽取的样品中产品质量更为稳定的生产线是______．'
  answer: A
  solution: '解：甲生产线的平均数为$\frac{1}{5}(89+91+92+93+95)=92$，

    甲生产线的方差为$\frac{1}{5}\left((92-89)^{2}+(92-91)^{2}+(92-92)^{2}+(92-93)^{2}+(92-95)^{2}\right)=4$，

    乙生产线的平均数为$\frac{1}{5}(88+91+92+93+96)=92$，

    乙生产线的方差为$\frac{1}{5}\left[(92-88)^{2}+(92-91)^{2}+(92-92)^{2}+(92-93)^{2}+(92-96)^{2}\right]=6.8$

    ∵$4<6.8$，

    ∴质量更为稳定的生产线是A，

    故答案为：A．'
