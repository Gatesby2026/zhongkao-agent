  question: 方程$\frac{x-1}{x-2}-\frac{3}{x-2}=3$的解为______．
  answer: $x = 1$
  solution: '解：$\frac{x-1}{x-2}-\frac{3}{x-2}=3$，

    $\frac{x-1}{x-2}-3=3$，

    $\frac{x-4}{x-2}=3$，

    去分母得，$x-4=3(x-2)$，

    去括号得，$x-4=3x-6$，

    移项得，$x - 3x = -6 + 4$，

    合并同类项得，$-2x = -2$，

    系数化为1得，$x = 1$，

    检验，当$x = 1$时，原分式方程的分母不为0，

    ∴原分式方程的解为$x = 1$，

    故答案为：$x = 1$．'
