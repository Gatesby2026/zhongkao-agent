  question: '如图，在矩形$ABCD$中，点E，F分别在边$BC, DC$上，且$AE \perp EF$．若$AB = 2$，$AD = 4$，$BE = 1$，则EF的长为______．

    [图]'
  answer: $\frac{3\sqrt{5}}{2}$
  solution: '解：∵四边形$ABCD$是矩形，

    ∴$\angle B=\angle C=90^{\circ}$，$BC = AD = 4$，

    ∴$EC = BC - BE = 4 - 1 = 3$，$AE = \sqrt{AB^{2} + BE^{2}} = \sqrt{5}$，

    ∵$\angle B=\angle C=90^{\circ}$，

    ∴$\angle BAE + \angle AEB = 90^\circ$，

    ∵$AE \perp EF$，

    ∴$\angle AEB+\angle CEE=90^{\circ}$，

    ∴$\angle BAE = \angle CEF$，

    ∴$\triangle ABE \sim \triangle ECF$，

    ∴$\frac{AE}{EF} = \frac{AB}{EC}$，即$\frac{\sqrt{5}}{EF}=\frac{2}{3}$，解得：$EC = \frac{3\sqrt{5}}{2}$．

    故答案为：$\frac{3\sqrt{5}}{2}$．'
