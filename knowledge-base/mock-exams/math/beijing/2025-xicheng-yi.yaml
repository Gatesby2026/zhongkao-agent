  question: '某公园有四处景点需要修复，修复每个景点需要一定数量的工人连续数天完成（每名工人每天的工作量相同）．修复每个景点所需的工人数（单位：人）和天数（单位：天）如下：

    景点

    A

    B

    C

    D

    工人数

    4

    3

    2

    5

    天数

    3

    4

    5

    2

    公园计划聘用m人，用n天的时间完成所有修复工作．

    （1）若$m=7$，则n的最小值是______；

    （2）假设每名工人每天的工资为a元，且一旦聘用，在完成所有景点修复工作前，每天无论是否工作都要支付工资，不得中途辞退，则支付给工人的工资总额最少为______元（用含a的式子表示）．'
  answer: ①.8②.$50a$
  solution: '（1）解：景点D：第1-2天，使用5人，

    景点C：第1-5天，使用2人，

    景点B：第3-6天，使用3人，

    景点A：第6-8天，使用4人，

    每天的人数安排如下：

    第1-2天，D（5人）+C（2人）=7人，

    第3-5天，B（3人）+C（2人）=5人，

    第6天，B（3人）+A（4人）=7人，

    第7-8天，A（4人）=4人，

    所有景点在第8天完成，因此n的最小值为8天，

    故答案为：8

    （2）为了找到支付给工人的工资总额的最小值，需要安排四个景点的修复工作，使得在n天内完成，并且每天所需的工人数m尽可能小，从而使得$m\cdot n\cdot a$最小．

    每个景点的修复需求如下：

    景点A：4人，3天

    景点B：3人，4天

    景点C：2人，5天

    景点D：5人，2天

    通过分析，我们可以找到一种最优的安排方式：

    景点D在第1-2天进行，需要5人；

    景点B在第1-4天进行，需要3人；

    景点C在第1-5天进行，需要2人；

    景点A在第3-5天进行，需要4人．

    这样安排后，每天的工人需求如下：

    第1-2天：5（D）+

    3（B）+

    2（C）=

    10人；

    第3-4天：3（B）+

    4（A）+

    2（C）=

    9人；

    第5天：4（A）+

    2（C）=

    6人．

    总天数n=5天，最大工人数m=10人．因此，工资总额为$m\cdot n\cdot a=10\times 5\times a=50a$元．'
