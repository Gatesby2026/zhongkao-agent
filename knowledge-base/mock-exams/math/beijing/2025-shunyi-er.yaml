    ∴$\angle DEA = \angle DAE$，

    ∴$AD = DE$，

    ∴四边形$ABED$为菱形；

    【小问2详解】

    解：依题意，如图所示：

    [图]

    由（1）得四边形$ABED$为菱形，

    ∴$AE \perp BD$，$DO = OB$，

    ∵$DB \perp BC$，

    ∴$AE \parallel BC$，

    ∴$\frac{DE}{EC} = \frac{DO}{OB}$，

    ∵$DO = OB$，

    ∴$\frac{DE}{EC}=\frac{DO}{OB}=1$，

    ∵$EC = 3$，

    ∴$ED = 3$，$DC=3+3=6$

    ∴在$Rt\triangle DOE$中，$\sin\angle AED=\frac{DO}{DE}=\frac{2}{3}$，

    ∴$DO = 2, BD = 4$，

    ∵$DB \perp BC$，

    ∴在$\mathrm{Rt}\triangle DBC$中，$BC = \sqrt{DC^{2} - DB^{2}} = \sqrt{36 - 16} = 2\sqrt{5}$．'
