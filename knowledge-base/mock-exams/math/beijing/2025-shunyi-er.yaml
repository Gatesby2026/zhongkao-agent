  question: 《中国居民膳食指南（2022）》推荐每人烹调油摄入量为$25-30$克/天，烹调盐摄入量低于5克/天．2000年该地区居民的烹调油和盐人均摄入总量为65克/天，2025年的人均摄入总量为50.5克/天．2025年与2000年相比，平均每人每天烹调油的摄入量降低了$20\%$，烹调盐的摄入量降低了$30\%$．请判断2025年该地区居民的平均每人每天烹调油摄入量是否符合标准，并说明理由．
  answer: 2025年该地区居民的平均每人每天烹调油摄入量不符合标准，理由见解析
  solution: '解：2025年该地区居民的平均每人每天烹调油摄入量不符合标准，理由如下：

    设2000年该地区居民的平均每人每天烹调油摄入量为x克/天，烹调盐摄入量为y克/天，

    根据题意：$\begin{cases}

    x + y = 65 \\

    (1 - 20\%)x + (1 - 30\%)y = 50.5

    \end{cases}$，

    解得：$\left\{\begin{array}{l}x=50\\y=15\end{array}\right.$，

    则2025年该地区居民的平均每人每天烹调油摄入量为$50\times(1-20\%)=40$（克/天），烹调盐摄入量为$15\times(1-30\%)=10.5$（克/天），

    ∵$40 > 30, 10.5 > 5$，

    ∴2025年该地区居民的平均每人每天烹调油摄入量不符合标准．'
