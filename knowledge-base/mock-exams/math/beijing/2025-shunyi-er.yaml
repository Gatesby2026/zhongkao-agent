    再将$(1,-1)$代入$y=2x+b$，

    则$2+b=-1$，

    解得：$b = -3$；

    【小问2详解】

    解：由（1）得$y=2x-3$，

    [图]

    可得$A(1,4)$，当$x-1, y=2-3=-1$，

    ∴$B(1,-1)$，

    当直线$y = x + n$经过$A(1,4)$时，$1 + n = 4$，

    解得：$n = 3$；

    当直线$y = x + n$经过$B(1,-1)$时，$1+n=-1$，

    解得：$n = -2$，

    ∴当$x<1$时，对于x的每一个值，函数$y = x + n$的值大于函数$y=kx+b$的值且小于4，

    由图象可得：$-2\leq n\leq 3$．'
