  question: '某生态农场有三项任务需要完成，如下表：

    任务

    每轮任务耗时（小时）

    需完成轮数

    每轮需要工人数

    A．有机肥料运输

    $1.5$

    2

    3

    B．智能系统调试

    2

    1

    1

    C．温室环境监测

    $0.8$

    3

    2

    不同类型任务切换需0.2小时准备时间，相同任务的不同轮次可以同时进行，且每轮任务一旦开始不能中途停止．农场现有3名工人，请回答下列问题：

    （1）若需要先完成A任务，再完成剩余的两项任务，请判断：这3名工人___________（填“能”或“不能”）在$5.2$小时内完成全部三项任务；

    （2）为了加快完成任务，现增加2名工人，则这5名工人完成全部三项任务的最短用时为___________小时．'
  answer: ①.不能②.4
  solution: '解：（1）A任务每轮耗时$1.5$小时，需完成$2$轮，且$3$名工人刚好满足每轮需求，

    ∴A任务总耗时为$1.5\times2=3$小时．

    完成A任务后切换到其他任务，有两次任务切换，每次准备时间$0.2$小时，

    ∴准备时间共$0.2\times2=0.4$小时．

    B任务每轮耗时$2$小时，需$1$轮，$1$名工人即可；C任务每轮耗时$0.8$小时，需$3$轮，每轮$2$名工人．

    ∴$3$名工人可同时进行B和C任务（$1$人做B，$2$人做C），C任务$3$轮共$0.8\times3=2.4$小时，B任务$2$小时，以耗时较长的C任务为准，B和C任务同时进行最短耗时$2.4$小时．

    三项任务总耗时为$3+0.4+2.4=5.8$小时，$5.8>5.2$，

    ∴$3$名工人不能在$5.2$小时内完成全部三项任务．

    故答案为：不能；

    （2）增加$2$名工人后共$5$名工人．可安排$2$人同时进行C任务的$3$轮，耗时$0.8\times3=2.4$小时；$1$人进行B任务，耗时$2$小时；同时安排$2$人进行A任务的$2$轮，耗时$1.5\times2=3$小时．

    ∵$2.4<3$，

    ∴在A任务进行到第$2.4$小时时，B和C任务完成，此时剩下A任务还需$3-2.4=0.6$小时，A任务这$0.6$小时不需要额外准备时间（前面任务进行时已包含准备时间）．

    总耗时为$2.4+1.6=4$小时．

    故答案为：4．'
