  question: '若$2a^{2}+4a-3=0$，则代数式$a(a+4)+(x+1)(a-1)$的值为（）

    A.2B.$-2$C.4D.$-4$'
  answer: A
  solution: '解：$a(a+4)+(x+1)(a-1)$

    $a^{2}+4a+a^{2}-1$

    $=2a^{3}+4a-1$，

    ∵$2a^{2}+4a-3=0$，

    ∴$2a^{2}+4a=3$，

    ∴原式$=3-1=2$，

    故选：A．'
