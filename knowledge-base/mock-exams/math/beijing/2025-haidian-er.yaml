  question: '若$a+b>0$，且$a > b$，则下列结论中一定正确的是（）

    A.$a < 0$B.$b>0$C.$ab > 0$D.$\left| a \right| > \left| b \right|$'
  answer: D
  solution: '解：∵$a+b>0$，$a > b$，

    ∴$a > 0$，$b>0$或$a > 0$，$b<0$，

    当$a > 0$，$b>0$时，则$a>b>0$，

    ∴$\left| a \right| > \left| b \right|$；

    当$a > 0$，$b<0$时，∵$a+b>0$，

    ∴$\left| a \right| > \left| b \right|$，

    综上分析可知：$\left| a \right| > \left| b \right|$．

    故选：D．'
