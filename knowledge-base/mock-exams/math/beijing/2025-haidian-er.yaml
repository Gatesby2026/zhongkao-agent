  question: '图1是有一个内角为$60^\circ$的平行四边形透明纸片，它的邻边的长分别为$2m,2n(m<n)$．沿对边中点所连的虚线将其剪成四个四边形，按图2的方式叠放在同一平面内．给出下面四个结论：

    ①$\triangle ABG$是等边三角形；

    ②四边形$GTSH$为菱形；

    ③六边形$ABCDEF$是轴对称图形，不是中心对称图形；

    ④存在$m, n$，使四边形$GTSH$的面积与$\triangle ABG$的面积之比为$1:2$．

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①②B.②④C.①③D.①②④'
  answer: D
  solution: '解：由题意得，$\angle ABG=\angle BAG=60^\circ$，

    ∴$\triangle ABG$是等边三角形，故①正确；

    ∴$AG = BG$，

    由平行四边形的性质可得$AT = BH$，

    ∴$AT\cdot AG=BH-BG$，即$GT = GH$，

    同理可证明$GH + GT = TS = HS$，

    ∴四边形$GTSH$为菱形，故②正确；

    六边形$ABCDEF$是轴对称图形，也是中心对称图形，故③错误；

    由题意得，$AB = m,\ AT = AG + TG = n$，

    如图所示，分别过点A和点T作BH的垂线，垂足分别为P、Q，

    ∴$AP = AB \cdot \sin \angle ABP = \frac{\sqrt{2}}{2} m, \quad TQ = TG \cdot \sin \angle TGQ = \frac{\sqrt{3}}{2}(n - m)$，

    ∵四边形$GTSH$的面积与$\triangle ABG$的面积之比为$1:2$，

    ∴$\frac{\sqrt{3}}{2}(n-m)^{2}\cdot\frac{1}{2}m\cdot\frac{\sqrt{3}}{2}m=1:2$，

    ∴$4(n-m)^{2}=m^{2}$，

    ∴$(2n-2m+m)(2n-2n-m)=0$，

    ∴$(2n-m)(2n-3m)=0$，

    ∵$n > m$，

    ∴$2n - 3m = 0$，

    ∴$2n = 3m$，

    ∴当$2n = 3m$时，满足四边形$GTSH$的面积与$\triangle ABG$的面积之比为$1:2$，故④正确；

    故选：D．

    [图]'
