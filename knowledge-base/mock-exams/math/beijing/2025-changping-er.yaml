  question: '如图，一个三角形纸片$\triangle ABC, AD$为BC边上的高，折叠纸片使得点A与D重合，折痕为MN．若$V_{ABC}$的面积为8，则$\triangle AMN$的面积为____________．

    [图]'
  answer: '2'
  solution: '解：设$AD,MN$交于点E，

    [图]

    ∵折叠，

    ∴MN垂直平分AD，

    ∴$AE = \frac{1}{2}AD$，

    ∵AD为BC边上的高，

    ∴$AD \perp BC$，

    ∴$MN \parallel BC$，

    ∴$\triangle AMN \sim \triangle ABC$，

    ∴$\frac{S_{\triangle AMN}}{S_{\triangle ABN}} = \left( \frac{AE}{AD} \right)^2 = \frac{1}{4}$，

    ∵$V_{ABC}$的面积为8，

    ∴$\triangle AMN$的面积为2；

    故答案为：2．'
