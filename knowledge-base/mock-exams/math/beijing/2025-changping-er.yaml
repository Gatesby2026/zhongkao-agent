    $\because AB = 6$，

    $\therefore AD=BD=3$．

    在$Rt\triangle OBD$中，

    $\angle ODB = 90^\circ$，

    $BD^{2}+CD^{2}=OB^{2}$．

    $...r^{2}+r^{2}=(r+1)^{2}$．

    解得：$r = 4$．

    $\because MN$为$\odot\odot$的弦，

    $\ldots MG = NG$．

    $\angle A=\angle ADO=\angle AGO=90^{\circ}$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$四边形$ADOG$为矩形．

    $OG = AD = 3$．

    在$\mathrm{Rt}\triangle OGN$中，

    $\angle OGN = 90^\circ$，

    $\therefore GN=\sqrt{NO^{2}-OG^{2}}=\sqrt{7}$．

    $\therefore MN = 2\sqrt{7}$．'
