  question: '某木材加工厂配备有M型和N型两款木材切割机，两款切割机每次可加工的木材尺寸和数量如下表所示：

    | 木材尺寸 切割机型号 | 大尺寸 | 中尺寸 | 小尺寸 |

    | --- | --- | --- | --- |

    | M | 2 块／次 | 4 块／次 | 8 块／次 |

    | N | 不能加工 | 3 块／次 | 6 块／次 |

    其中加工1块大尺寸木材的位置，可以替换为加工2块中尺寸木材或4块小尺寸木材，加工1块中尺寸木材的位置可以替换为加工2块小尺寸木材．例如：M型切割机可以一次加工2块大尺寸木材，也可以一次加工1块大尺寸、1块中尺寸和2块小尺寸木材．某批次木材共有3块大尺寸，7块中尺寸，12块小尺寸木材．

    （1）加工这批木材，M款切割机至少要使用____________次；

    （2）若M型切割机加工一次费用为50元，N型切割机加工一次费用为35元，则加工完这批木材所需费用最少____________元．'
  answer: ①.2 ②.235
  solution: '解：∵需要加工3块大尺寸木材，且只有M款切割机可加工大尺寸木材，

    设加工这批木材，M款切割机使用x次，

    则$2x\quad3$，解得：$x-\frac{3}{2}$，

    ∵x为正整数，

    ∴加工这批木材，M款切割机至少使用2次，

    故答案为：2；

    （2）∵某批次木材共有3块大尺寸，7块中尺寸，12块小尺寸木材．

    全部转化为小尺寸木材，

    则需要加工小尺寸木材$=3\times2\times2+7\times2+12=38$块，

    设M款切割机需要用m次，N款切割机需要用n次，

    则$8m + 6n = 38$，即$4m+3n=19$，

    ∵$m \geqslant 2$，$m,n$均为正整数，

    ∴有以下方案：$m=2,n=4$，此时加工成本为$2x \times 50 + 4x \times 35 = 240$元；

    $m = 3, n = 3$，此时加工成本为$3\times50+3\times35=255$元；

    $m=4,n=1$，此时加工成本为$4\times50+1\times35=235$元；

    $m=5,n=0$，此时加工成本为$5\times50+0.35=250$元；

    ∴加工这批木材成本最低为$235$元，

    故答案为：235．'
