  question: 某徒步团队由七人组成，每个人的负重为：21，17，16，20，19，13，17（单位：$\mathrm{kg})$，此时七人负重数据的方差为$s_{1}^{2}$．出发时又为每位成员补充了$2\mathrm{kg}$饮用水，补充饮用水后负重数据的方差为$S_{2}^{2}$，则$s_{1}^{2}$______$S_{2}^{2}$（填“>”，“=”或“<”）．
  answer: ＝
  solution: '∵每个人的负重为：21，17，16，20，19，13，17，出发时又为每位成员补充了$2\mathrm{kg}$饮用水，

    ∴相当于每个数据都加上$2$．

    设原数据$x_1,x_2,\cdots,x_7$，平均数为$\overline{x}$，方差为$S_{1}^{2}$；

    ∴新数据$y_{i}=x_{i}+2$，新数据平均数$\bar{y}=x+2$．

    新数据方差$s_{j}^{2}=\frac{1}{7}\left[\left(x_{1}-\bar{x}\right)^{2}+\left(x_{2}-\bar{x}\right)^{2}+\cdots+\left(x_{7}-\bar{x}\right)^{2}\right]$

    $=\frac{1}{2}\left\{\left[x_{1}+2-(\bar{x}+2)\right]^{2}+\left[x_{2}+2-(\bar{x}+2)\right]^{2}+\cdots+\left[x_{n}+2-(\bar{x}+2)\right]^{2}\right\}$．

    $=\frac{1}{k}\left[(x_{1}-\overline{x})^{2}+(x_{2}-\overline{x})^{2}+\cdots+(x_{k}-\overline{x})^{2}\right]$

    $= s_{1}^{2}$；

    ∴$S_{1}^{2}=S_{2}^{2}$．

    故答案为：$=$．'
