  answer: 《三国演义》每本$25$元，《红楼梦》每本$30$元
  solution: '解：设《三国演义》每本x元，《红楼梦》每本y元

    根据题意列方程组，得：$\begin{aligned}

    &4x + 3y = 190 \quad \text{(1)} \\

    &3x + 6y = 255 \quad \text{(2)}

    \end{aligned}$，

    由$①\times2$得：$8x+6y=380$③，

    由$③-②$得：$5x=125$，

    解得：$x = 25$，

    把$x = 25$代入①，得$4\times25+3y=190$

    解得：$y = 30$．

    答：《三国演义》每本$25$元，《红楼梦》每本$30$元．'
