  question: '已知实数a，b，c在数轴上对应的点如图所示，则下列式子正确的是（）

    $\begin{tikzpicture}

    \draw[->] (-3,0) -- (3,0);

    \draw[thick] (-2.5,0.1) -- (-2.5,-0.1) node[below] {$c$};

    \draw[thick] (-1.5,0.1) -- (-1.5,-0.1) node[below] {$b$};

    \draw[thick] (0,0.1) -- (0,-0.1) node[below] {$0$};

    \draw[thick] (2,0.1) -- (2,-0.1) node[below] {$a$};

    \end{tikzpicture}$

    A.$cb > ab$B.$ac > ab$C.$a+b<ac$D.$c+b>a+b$'
  answer: A
  solution: '解：由题意可得：$c < b < 0 < a$，$|b| < |a|$，

    ∴$cb > ab$，$ac < ab$，$c+b<a+b$，

    故选项A正确，选项B、D错误，

    ∵$a+b>0,ac<0$，

    ∴$a+b>ac$，故选项C错误；

    故选：A.'
