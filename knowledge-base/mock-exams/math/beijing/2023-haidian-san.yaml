  question: '为了迅速算出学生的学期总评成绩，一位同学创造了一张奇妙的算图．如图，y轴上动点M的纵坐标$y_{m}$表示学生的期中考试成绩，直线$x = 10$上动点N的纵坐标$y_n$表示学生的期末考试成绩，线段MN与直线$x = 6$的交点为P，则点P的纵坐标$y_p$就是这名学生的学期总评成绩．有下面几种说法：①若某学生的期中考试成绩为70分，期末考试成绩为80分，则他的学期总评成绩为75分：②甲同学的期中考试成绩比乙同学高10分，但期末考试成绩比乙同学低10分，那么甲的学期总评成绩比乙同学低；③期中成绩占学期总评成绩的60%．结合这张算图进行判断，其中正确的说法是__________．（填写序号）

    [图]'
  answer: ②
  solution: '解：如图所示：

    ①中，与$x = 6$的交点大于75，故错误；

    ②中，乙与$x = 6$的交点大于甲与$x = 6$的交点，所以期末总评成绩乙大于甲，故正确；

    ③中，假设某学生的期中考试成绩为70分，期末考试成绩为80分，图象如图所示的①，

    设①的函数关系式为$y=kx+b$，

    将（0，70）和（10，80）代入，得：

    $\left\{ \begin{array} { l } { b = 70 } \\ { 10 k + b = 80 } \end{array} \right.$，

    解得：$\left\{

    \begin{array}{l}

    k = 1 \\

    b = 70

    \end{array}

    \right.$，

    ∴$y = x + 70$，

    当$x = 6$时，$y=76$，

    ∴该学生的总评成绩为76分，

    若期中成绩占学期总评成绩的60%，则该学生的总评成绩为70×60%＋80×（1－60%）＝74（分），

    ∵76≠74，

    ∴③错误；

    故答案为：②．

    [图]'
