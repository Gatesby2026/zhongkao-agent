  question: '植物研究者在研究某种植物1~5年内的植株高度时，将得到的数据用下图直观表示．现要根据这些数据选用函数模型来描述这种植物在1~5年内的生长规律．

    [图]

    若选择$y=ax^{2}+bx+c$，

    则a______0，b______0；

    若选择函数$y=\frac{a}{x}+b$，

    则a______0，b______0；

    依次填入的不等号为（　　）

    A.<，>，<，>B.<，>，>，<C.>，<，<，>D.>，>，<，<'
  answer: A
  solution: '解：若选择$y=ax^{2}+bx+c$，

    由函数图象可知，此抛物线的开口向下，对称轴$x = -\frac{b}{2a} > 0$，

    $\ldots a < 0, b > 0$；

    若选择函数$y=\frac{a}{x}+b$，

    由函数图象可知，将反比例函数$y=\frac{a}{x}(a<0)$的图象从第四象限向上平移b个单位即可得到函数$y=\frac{a}{x}+b$的图象，

    $\ldots a < 0, b > 0$；

    则依次填入的不等号为$\langle x\rangle,\langle y\rangle$，

    故选：A．'
