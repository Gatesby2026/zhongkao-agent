  question: '如图，在矩形ABCD中，AB＝3，BC＝10，点E在边BC上，DF⊥AE，垂足为F，若DF＝6，则线段EF的长为_____．

    [图]'
  answer: '3'
  solution: '解：∵四边形ABCD为矩形，

    ∴AB＝CD＝3，BC＝AD＝10，$AD \parallel BC$，

    ∴∠AEB＝∠DAF，

    ∴△AFD∽△EBA，

    ∴$\frac{AF}{BE}=\frac{AD}{AE}=\frac{DF}{AB}$，

    ∵DF＝6，

    ∴$AF = \sqrt{AD^{2} - DF^{2}} = \sqrt{100 - 36} = 8$，

    ∴$\frac{8}{BE} = \frac{10}{AE} = \frac{6}{3}$，

    ∴AE＝5，

    ∴EF＝AF－AE＝8－5＝3，

    故答案为：3．'
