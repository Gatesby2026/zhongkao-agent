  question: '在平面直角坐标系xOy中，抛物线$y=x^{2}-6mx+n-2$经过点$\left(m,4m^{2}-2\right)$．

    （1）求该抛物线的顶点坐标（用含m的式子表示）；

    （2）$P(x_{\alpha},y_{\alpha})$是抛物线上的点，$m \leq x_n \leq m + (l > 0)$

    ①当$m = 0$，$t=2$时，求$y_0$的取值范围；

    ②若无论m为何值，都有满足$y_{0}^{2}$的点P，求t的取值范围．'
  answer: （1）$(3m,-2)$ （2）①$-2 \leq y_{0} \leq 2$；②$t^{4}$
  solution: '【小问1详解】

    解：将点$\left(m,4m^{2}-2\right)$代入$y=x^{2}-6mx+n-2$得：$m^{2}-6m^{2}+n+2=4m^{2}-2$，

    解得$n = 9m^2$，

    则$y=x^{2}-6mx+9m^{2}-2=(x-3m)^{2}-2$，

    所以该抛物线的顶点坐标为$(3m,-2)$．

    【小问2详解】

    解：①当$m = 0$时，$y=x^{2}-2$，

    当$m = 0$，$t=2$时，$0 \leq x_{0} \leq 2$，

    当$x = 0$时，$y = -2$；当$x=2$时，$y=2^{2}-2=2$，

    在$0 \leq x_{0} \leq 2$内，y随x的增大而增大，

    所以$-2 \leq y_{0} \leq 2$；

    ②将点$P(x_{\alpha},y_{\alpha})$代入函数$y=(x-3m)^{2}-2$得：$y_{0}=\left(x_{0}-3m\right)^{2}-2$，

    当$y_{0}^{2}$时，$\left(x_{n}-3m\right)^{2}<2$，即$(x_{n}-3m)^{2}-4=0$，

    解方程$(x_{n}-3m)^{2}+4=0$得：$x_0 = 3m - 2$或$x_0 = 3m + 2$，

    画出函数$s=(x_{0}-3m)^{2}-4$的大致图象如下：

    [图]

    由函数图象可知，在$m \leq x_n \leq m + (l > 0)$内，要使无论m为何值，都有满足$y_{0}^{2}$（即$s\quad 0$）的点P，

    则$m+1-m\quad 3m+2-(3m-2)$，

    解得$t^{4}$．'
