  question: '下面是小明同学证明定理时使用的两种添加辅助线的方法，选择其中一种，完成证明．

    定理：在直角三角形中，斜边中线等于斜边的一半．

    已知：如图，在$\triangle ABC$中，$\angle ACB=90^\circ$，$BD = AD$，连接CD．

    [图]

    求证：$CD=\frac{1}{2}AB$．

    方法一

    证明：如图，延长BC到点E，使得$CE = BC$，连接AE

    [图]

    方法二

    证明：如图，延长CD到点F，使得$DF = CD$，连接BF，AF．

    [图]'
  answer: 证明见解析
  solution: '证明：方法一：$\because CE = BC$，$\angle ACB=90^\circ$，

    $\therefore AC$垂直平分BE，

    $\therefore AE = AB$，

    又$\because CE = BC$，$BD = AD$，

    $\therefore CD=\frac{1}{2}AE$，

    $\therefore CD=\frac{1}{2}AB$．

    方法二：在$\triangle ACD$和$\triangle BFD$中，$AD = BD \\

    \angle ADC = \angle BDO \\

    CD = FD$，

    $\triangle ACD\cong\triangle BFD(SAS)$，

    $AC = BF, \angle ACD = \angle BFD$，

    $\ldots AC \parallel BF$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$四边形$ACBF$是平行四边形，

    又$\angle ACB = 90^\circ$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$四边形$ACBF$是矩形，

    $\therefore AB = CF$，

    又$\because DF = CD$，

    $\therefore CD=\frac{1}{2}CF$，

    $\therefore CD=\frac{1}{2}AB$．'
