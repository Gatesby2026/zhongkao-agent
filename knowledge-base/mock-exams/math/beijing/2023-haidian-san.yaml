  question: 分式方程$\frac{1}{x-3}=\frac{2}{x}$的解为______．
  answer: $x = 6$
  solution: '$\frac{1}{x-3}=\frac{2}{x}$

    解：方程两边同时乘以x（x-3）得：x=2(x-3)，

    去括号得：$x=2x-6$，

    移项，合并同类项得：-x=-6，

    即x=6，

    检验：当x=6时，x（x－3）≠0，

    所以x=6是原分式方程的解．

    故答案为：x=6．'
