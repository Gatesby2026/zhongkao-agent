  question: '已知关于x的二次函数$y = x^2 - 2mx - 3$．

    （1）当抛物线过点（2，-3）时，求抛物线的表达式，并求它与y轴的交点坐标；

    （2）求这个二次函数的对称轴（用含m的式子表示）；

    （3）若抛物线上存在两点$A(a,a)$和$B(b,-b)$，当$a<0,b>0$时，总有$a+b>0$，求m的取值范围．

    [图]'
  answer: （1）$y=x^{2}-2x-3$，与y轴交点$(0,-3)$；（2）对称轴$x = m$；（3）$m > 0$．
  solution: '（1）解：∵抛物线过点$(2,-3)$，

    ∴$-3 = 4 - 4m - 3$，

    解得：$m = 1$，

    ∴抛物线的表达式为：$y=x^{2}-2x-3$，

    当$x = 0$时，$y=-3$，

    ∴与y轴的交点坐标为$(0,-3)$，

    （2）∵$y = x^2 - 2mx - 3$，

    ∴$y=(x-m)^{2}-(m^{2}+3)$，

    ∴$x = m$时，$y=-(m^{2}+3)$，

    故对称轴为$x = m$，

    （3）由函数表达式$y = x^2 - 2mx - 3$可知函数开口向上，

    ∵$a+b>0$，

    ∴$|b|>|a|$，$a > -b$，

    ∴$m-a>b-m$，

    即$2m > a + b > 0$'
