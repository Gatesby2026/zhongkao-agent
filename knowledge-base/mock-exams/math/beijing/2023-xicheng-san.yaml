  question: '兴寿镇草莓园是北京最大的草莓基地，通过一颗颗小草莓，促进了农民增收致富，也促进了农旅融合高质量发展．小梅家有一个草莓大棚，大棚的一端固定在离地面高$1m$的墙体A处，另一端固定在离地面高$1m$的墙体B处，记大棚的截面顶端某处离A的水平距离为xm，离地面的高度为ym，测量得到如下数值：

    $x / m$

    0

    1

    2

    4

    5

    $y/m$

    1

    $\frac{8}{3}$

    $\frac{11}{3}$

    $\frac{11}{3}$

    $\frac{8}{3}$

    [图]

    小梅根据学习函数的经验，发现y是x的函数，并对y随x的变化而变化的规律进行了探究．

    下面是小梅的探究过程，请补充完整：

    （1）在下边网格中建立适当的平面直角坐标系，描出表中各组数值所对应的点$(x, y)$，并画出函数的图象；

    [图]

    解决问题：

    （2）结合图表回答，大棚截面顶端最高处到地面的距离高度为___________m；此时距离A的水平距离为___________m；

    （3）为了草莓更好的生长需要在大棚内安装补光灯，补光灯采用吊装模式悬挂在顶部，已知补光灯在距离地面$1,5m$时补光效果最好，若在距离A处水平距离$1,5m$的地方挂补光灯，为使补光效果最好补光灯悬挂部分的长度应是多少m？（灯的大小忽略不计）'
  answer: （1）见解析（2）4；3 （3）为使补光效果最好补光灯悬挂部分的长度应是$1.75m$．
  solution: '【小问1详解】

    解：描点，连线，函数的图象如图所示，

    [图]；

    【小问2详解】

    解：根据图表知，大棚截面顶端最高处到地面的距离高度为$4m$；此时距离A的水平距离为$3m$；

    故答案为：4；3；

    【小问3详解】

    解：设抛物线的解析式为$y=ax^{2}+bx+c$，

    把$(0,1)$，$\left(1,\frac{8}{3}\right)$，$\left(2,\frac{11}{3}\right)$，代入得，$\begin{aligned}

    & c = 1 \\

    & a + b + c = \frac{8}{3} \\

    & 4a + 2b + c = \frac{11}{3}

    \end{aligned}$，

    解得$\left\{ \begin{array} { l } { a = - \frac { 1 } { 3 } } \\ { b = 2 } \\ { c = 1 } \end{array} \right.$，

    ∴抛物线的解析式为$y = -\frac{1}{3}x^2 + 2x + 1$，

    令$x = 1.5$，则$y=-\frac{1}{3}\times\left(\frac{3}{2}\right)^{2}+2\times\frac{3}{2}+1=\frac{13}{4}=3.25$，

    $3.25-1.5=1.75(\mathrm{m})$，

    答：为使补光效果最好补光灯悬挂部分的长度应是$1.75m$．'
