  question: '如果$a^{2}-ab-1=0$，.那么代数式$\frac{a^{2}}{a-b}\cdot\left(a+\frac{b^{2}-2ab}{a}\right)$的值是（）

    A.-1B.1C.-3D.3'
  answer: B
  solution: '解：$\frac{a^{2}}{a-b}\cdot\left(a+\frac{b^{2}-2ab}{a}\right)$

    $\frac{a^{2}-ab^{2}+b^{2}-2ab}{a^{2}-b^{2}}$$\frac{a^{2}}{a-b}-\frac{(a-b)^{2}}{a}$$=a(a-b)=a^{2}-ab$，

    $\therefore a^{2}-ab-1=0$，

    $a^{2}-ab=1$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原式$=1$，

    故选B．'
