  question: '如图，在正方形$ABCD,BE$平分$\angle CBD, EF \perp BD$于点F，若$DE = \sqrt{2}$，则BC的长为（）

    [图]

    A.2B.$\sqrt{2}$C.$\sqrt{2}+1$D.1'
  answer: C
  solution: '解：∵正方形$ABCD,$

    ∴$BC = CD$，$\angle C=90^{\circ}$，$\angle BDC = 45^\circ$

    ∵BE平分$\angle CBD, EF \perp BD$于点F，

    ∴$FE = EC$，$FE = DF$，

    ∵$DE = \sqrt{2}$，

    ∴$\sqrt{DF^{2}+EF^{2}}=\sqrt{2}$，

    ∴$DF = EF = EC = 1$，

    ∴$BC = CD = \sqrt{2} + 1$

    故选：C．'
