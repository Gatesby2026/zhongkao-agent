  question: '如图，$AB,CD$（非直径）为$\odot\odot$的两条弦，AB与CD交于点M，请从①AB为$\odot\odot$直径；②M为CD中点；③B为$\overline{CD}$中点；中选择两个作为题设，余下的一个作为结论组成一个真命题，并完成证明．

    [图]'
  answer: 见解析
  solution: '（1）知①，②推③：如图，连接$OC, OD$，

    [图]

    $\because OC=OD,M$为CD中点，

    $\therefore OM \perp CD$，

    $\therefore AB$为CD中垂线，

    ∵AB为$\odot\odot$直径，

    ∴$\widehat{BC}=\widehat{BD}$,

    所以B为弧CD中点,

    （2）知①③推②：如图，连接$OC, OD, BC, BD$，

    [图]

    $\because B$为$\overline{CD}$中点,

    $\therefore BC = BD$,

    又$\because OC = OD$,

    $\therefore OB$为CD的中垂线,

    $\therefore M$为CD中点

    （3）知②③推①：如图，连接$OC, OD, BC, BD$，

    [图]

    ∵B为$\overline{CD}$中点，

    ∴$\widehat{BC}=\widehat{BD}$,

    $\therefore BC = BD$,

    ∵M为CD中点，

    ∴$AB \perp CD$，

    $\therefore BA$为CD中垂线,

    即AB为圆O直径.'
