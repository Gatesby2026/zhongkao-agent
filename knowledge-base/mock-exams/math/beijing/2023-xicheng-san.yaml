  question: '已知，关于x的一元二次方程$x^{2}+ax-a-1=0$．

    （1）求证：方程总有两个实数根；

    （2）若该方程有一个根是负数，求a的取值范围．'
  answer: （1）见解析；（2）$a > -1$
  solution: '（1）证明：$QV=a^{2}-4\times(-a-1)=(a+2)^{2}$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$无论a为何值，方程总有两个实数根；

    （2）∵$x^{2}+ax-a-1=0$，

    ∴$(x-1)(x+1+a)=0$，

    ∴$x_{1}=1$，$x_{2}=-a-1$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$方程有一个根是负数，

    $\therefore -a-1 < 0$，

    解得，$a > -1$．

    $\therefore a$的取值范围为$a > -1$．'
