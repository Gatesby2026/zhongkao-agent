  question: '如图，要测量楼高MN，在距MN为$15m$的点B处竖立一根长为$5.5m$的直杆AB，恰好使得观测点E、直杆顶点A和高楼顶点N在同一条直线上．若$DB=5m,DE=1.5m$，则楼高MN是__________．

    [图]'
  answer: $17.5m$
  solution: '解：依题意，四边形$\angle CBOE,\angle MDE,\angle FMB\angle C$都是矩形，

    ∴$FM=CB=ED=1.5m$，$EC = DB = 5\,\text{m}$，$FC = BM = 15\,\text{cm}$，

    ∵$AB=5.5\mathrm{m}$

    ∴$AC = AB - BC = 5.5 - 1.5 = 4(\mathrm{m})$,

    ∵$AC \parallel MF$

    ∴$\triangle AEC\sim\triangle NEF$

    ∴$\frac{AC}{NF}=\frac{EC}{EF}$

    即$\frac{4}{NF}=\frac{5}{5+15}$

    解得：$NF = 16m$

    ∴$MN = MK + FN = 16 + 1.5 = 17.5\,(\text{m})$，

    故答案为：$17.5m$．'
