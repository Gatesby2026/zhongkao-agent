  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(2,-1)$，且与函数$y = x$的图象交于点$B(1,a)$．

    （1）求a的值及函数$y=kx+b\ (k\neq0)$的表达式；

    （2）当$x \leq 0$时，对于x的每一个值，函数$y = x + m$的值小于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: (1)60；(2)证明见解析；(3)$\sqrt{6}$.
  solution: '解：(1)如图1，连接OD，AD

    [图]

    ∵AB是⊙O的直径，CD⊥AB

    ∴AB垂直平分CD

    ∵M是OA的中点，

    ∴OM＝$\frac{1}{2}$OA＝$\frac{1}{2}$OD

    ∴cos∠DOM＝$\frac{OM}{OD}$＝$\frac{1}{2}$，

    ∴∠DOM＝60°

    又：OA＝OD

    ∴△OAD是等边三角形

    ∴∠OAD＝60°

    故答案为60°

    (2)∵CD⊥AB，AB是⊙O的直径，

    ∴CM＝MD．

    ∵M是OA的中点，

    ∴AM＝MO．

    又∵∠AMC＝∠DMO，

    ∴△AMC≌△OMD．

    ∴∠ACM＝∠ODM．

    ∴CA∥OD．

    ∵DE⊥CA，

    ∴∠E＝90°．

    ∴∠ODE＝180°﹣∠E＝90°．

    ∴DE⊥OD．

    ∴DE与⊙O相切．

    (3)如图2，连接CF，CN，

    [图]

    ∵OA⊥CD于M，

    ∴M是CD中点．

    ∴NC＝ND．

    ∵∠CDF＝45°，

    ∴∠NCD＝∠NDC＝45°．

    ∴∠CND＝90°．

    ∴∠CNF＝90°．

    由(1)可知∠AOD＝60°．

    ∴∠ACD=$\frac{1}{2}$∠AOD=30°．

    在Rt△CDE中，∠E＝90°，∠ECD＝30°，DE＝3，

    ∴CD=$\frac{DE}{\sin 30^{\circ}}=6$，

    在Rt△CND中，∠CND＝90°，∠CDN＝45°，CD＝6，

    ∴CN=CD·sin45°=3$\sqrt{2}$．

    由(1)知∠CAD＝2∠OAD＝120°，

    ∴∠CFD＝180°﹣∠CAD＝60°．

    在Rt△CNF中，∠CNF＝90°，∠CFN＝60°，CN=3$\sqrt{2}$，

    ∴FN=$\frac{CN}{\tan 60^{\circ}}=\sqrt{6}$．'
