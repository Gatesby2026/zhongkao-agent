  question: '如图，圆柱的侧面积为10m2．记圆柱的底面半径为xm，底面周长为lm，高为hm．当x在一定范围内变化时．l和h都随x的变化而变化，则l与x，h与x满足的函数关系分别是（）

    [图]

    A.一次函数关系，二次函数关系B.反比例函数关系，二次函数关系

    C.正比例函数关系，反比例函数关系D.正比例函数关系，一次函数关系'
  answer: C
  solution: '解：由圆柱的底面的周长公式：底面周长＝2×半径×$\pi$，

    可得：$l = 2\pi x$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$l与x的关系为：正比例函数关系，

    根据圆柱的侧面积公式：圆柱的侧面积＝底面周长×高，

    可得：$10=2\pi r\cdot h$，

    $\therefore h = \frac{5}{\pi x}$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$h与x的关系式为：反比例函数关系，

    故选：C．'
