  question: '某医院医生为了研究该院某种疾病的诊断情况，需要调查来院就诊的病人的两个生理指标x，y，于是他分别在这种疾病的患者和非患者中，各随机选取20人作为调查对象，将收集到的数据整理后，绘制统计图如图：

    [图]

    注“●”表示患者，“▲”表示非患者．

    根据以上信息，回答下列问题：

    （1）在这40名被调查者中，

    ①指标y低于0.4的有人；

    ②将20名患者$[公式]$指标x的平均数记作$\overline{x_{1}}$，方差记作s12，20名非患者的指标x的平均数记作$\overline{x_{2}}$，方差记作s22，则$\overline{x_{1}}$$\overline{x_{2}}$，s12s22（填“＞”，“＝”或“＜”）；

    （2）来该院就诊的500名未患这种疾病的人中，估计指标x低于0.3的大约有人；

    （3）若将“指标x低于0.3，且指标y低于0.8”作为判断是否患有这种疾病的依据，则发生漏判的有人．'
  answer: （1）①9；②＜；＞ （2）100（3）125
  solution: '【小问1详解】

    解：①根据图象，可得指标y低于0．4的有9人．

    故答案为：9；

    ②将20名患者的指标x的平均数记作$\overline{x_{1}}$，方差记作S12，20名非患者的指标x的平均数记作$\overline{x}_{2}$，方差记作S22，则

    $\overline{x_{1}}<\overline{x_{2}}$，S12＞S22．

    故答案为：＜，＞；

    【小问2详解】

    解：500$\times\frac{4}{20}=$100（人）．

    故答案为：100；

    【小问3详解】

    解：根据图象，可知“指标x低于0．3，且指标y低于0．8”的有15人，而患者有20人，

    则发生漏判的概率是：1$-\frac{15}{20}=\frac{1}{4}$，

    发生漏判的有：500$\times\frac{1}{4}=$125（人），

    故答案为：125．'
