  question: '如图，在四边形ABCD中，AB//CD，AB＝BC＝2CD，E为对角线AC的中点，F为边BC的中点，连接DE，EF．

    [图]

    （1）求证：四边形CDEF为菱形；

    （2）连接DF交EC于G，若DF＝2，CD$=\frac{5}{3}$，求AD的长．'
  answer: （1）见详解（2）$\sqrt{17}$
  solution: '【小问1详解】

    证明：∵E为对角线AC的中点，F为边BC的中点，

    ∴EF=$\frac{1}{2}$AB，EF∥AB，

    ∵AB∥CD，

    ∴AB∥CD∥EF，

    ∵AB=BC=2CD，

    ∴EF=CF=CD，

    ∴四边形DEFC是平行四边形，且EF=CF，

    ∴四边形CDEF为菱形；

    【小问2详解】

    解：如图，DF与EC交于点G，

    [图]

    ∵四边形CDEF为菱形，DF=2，

    ∴DG=1，DF⊥CE，EG=GC，

    ∴EG=GC=$\sqrt{DC^{2}-DG^{2}}=\frac{4}{3}$，

    ∴AE=CE=2EG=$\frac{8}{3}$，

    ∴AG=AE+EG=4，

    ∴AD=$\sqrt{AG^{2}+DG}=\sqrt{17}$．'
