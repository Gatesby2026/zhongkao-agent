  question: '在平面直角坐标系xOy中，已知点$M(m,n)$，我们将点M的横纵坐标交换位置得到点$N(n,m)$．给出如下定义：对于平面上的点C，若满足$NC = 1$，则称点C为点M的“对炫点”．

    [图][图]

    （1）已知点$A(2,0)$，

    ①下列各点：$Q_{1}(0,1)$，$Q_2(1,1)$，$Q_3(-1,2)$中为点A的“对炫点”的是______；

    ②点P是直线$y=x+2$上一点，若点A是点P的对炫点，求出点P的坐标；

    （2）设点$A(a,b)$是第一象限内一点，点P是直线$y=x+b$上一点，至少存在一个点P，使得点A的对炫点也是点P的对炫点，求a、b的取值范围．'
  answer: （1）①$Q_1$，$Q_3$；②$P\left(\frac{\sqrt{2}}{2}, 2+\frac{\sqrt{2}}{2}\right)$或$P\left(-\frac{\sqrt{2}}{2}, 2-\frac{\sqrt{2}}{2}\right)$ （2）$0 < a \leq 2\sqrt{2}$，$b>0$
  solution: '【小问1详解】

    解：①已知点$A(2,0)$，将其横纵坐标对换得到$B(0,2)$，易得$Q_{1}B=1,Q_{2}B=1$

    故A的“对炫点”的是$Q_1$，$Q_3$；

    故答案为$Q_1$，$Q_3$；

    ②设点P的坐标为$(m,m+2)$，则将其横纵坐标对换得到$P''(m+2,m)$，

    由题意可得$AP'' = 1$，即$(m+2-2)^{2}+(m-0)^{2}=1$，解得：$m = \pm \frac{\sqrt{2}}{2}$．

    所以点P的坐标为$\frac{\sqrt{2}}{2} \cdot 2 + \frac{\sqrt{2}}{2}$或$\left(-\frac{\sqrt{2}}{2}, 2, \frac{\sqrt{2}}{2}\right)$．

    【小问2详解】

    解：如图，点$A(a,b)$的所有对炫点在以$B(b,a)$为圆心半径为1的圆上，点$P(a,a+b)$的所有对炫点在与直线$y=x+b$距离为1且互相平行的$\ell_{1}$、$l_2$两条直线上，所以满足条件的时刻即为圆B与$\ell_{1}$、$l_2$两条直线有交点即可

    如图1：$BC = CD = 1, \angle EBD = 45^\circ, BD \perp ED$

    所以$BD=BE=2$

    所以$BE=\sqrt{2^{2}+2^{2}}=2\sqrt{2}$，即$a \leq 2\sqrt{2}$；

    [图]

    如图2：当$a>2\sqrt{2}$时，圆与$\ell_{1}$、$l_2$两条直线无交点，即没有“对炫点”，

    [图]

    ∵点$A(a,b)$是第一象限内一点，

    ∴$a>0,b>0$，

    ∴$0 < a \leq 2\sqrt{2}$，$b>0$．'
