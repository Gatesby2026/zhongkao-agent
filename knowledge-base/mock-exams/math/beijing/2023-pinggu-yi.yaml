  question: '如图所示，某农场的小麦收割机正在收割小麦，脱离后的谷粒沿着喷射管道飞出，飞行路线可以看作是抛物线的一部分，建立如图所示的平面直角坐标系，谷粒从喷射出到着陆的过程中，谷粒的竖直高度y（单位：m）与距离喷射口的水平距离x（单位：m）近似满足函数关系$y = a(x - h)^2 + k \, (a < 0)$．

    [图]

    （1）谷粒距离喷射口的水平距离x（单位：m）与竖直高度y（单位：m）的几组数据如下：

    水平距离$x/m$

    0

    2

    3

    4

    5

    竖直高度$y/m$

    3.5

