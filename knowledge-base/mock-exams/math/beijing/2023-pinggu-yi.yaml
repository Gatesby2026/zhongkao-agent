    4.4

    4.3

    4.0

    根据上述数据，若用货车接运谷粒，保证和喷射口在同一平面的情况下，谷粒落下过程中恰好落到车厢的中心点．若货车车厢的中心点距地面1.9米，则货车车厢的中心点应距离喷射口几米？

    （2）谷粒喷出的同时石子等较重的杂质会跟随谷粒一起在重力作用下沿抛物线①被分离出来，谷皮和颗粒等较轻的杂质也会跟着谷粒一起沿抛物线②被分离出来，若已知两条抛物线的解析式分别为A：$y = -0.09(x - 3.2)^2 + 4.42$；B：$y = -0.12(x - 2.8)^2 + 4.44$，则A、B对应的抛物线分别为A：______；B：______（写①或②即可）．'
  answer: （1）8米（2）②；①
  solution: '【小问1详解】

    解：由表可知，抛物线的顶点坐标为$(3,4.4)$，

    ∴抛物线的解析式为$y = a(x - 3)^2 + 4.4$，

    ∵抛物线过点$(0,3.5)$，

    $9a+4.4=3.5$，

    解得$a = -0.1$，

    ∴$y=0.1(x-3)^{2}+4.4$，

    当$y=1.9$时，$-0.1(x-3)+4.4=1.9$，

    解得$x=8$或$x=-2<0$（不符合题意，舍去），

    所以货车车厢的中心点应距离喷射口8米．

    【小问2详解】

    解：由函数图象可知，从抛物线的开口大小看，抛物线①的小于抛物线②的，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$抛物线$A: y = -0.09(x - 3.2)^2 + 4.42$的开口大于抛物线$B:y=-0.12(x-2.8)^{2}+4.44$的开口，

    所以A、B对应的抛物线分别为$A:$②；$B:$①，

    故答案为：②；①．'
