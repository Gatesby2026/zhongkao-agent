  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$(-1,0)$，$(0,1)$

    （1）求该函数的解析式；

    （2）当$x > -2$时，对于x的每一个值，函数$y=2x+n$的值大于函数$y=kx+b\ (k\neq0)$的值，求n的取值范围．'
  answer: （1）$y=x+1$ （2）$n\ 3$
  solution: '【小问1详解】

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$一次函数$y=kx+b\ (k\neq0)$的图象经过点$(-1,0)$和$(0,1)$，将坐标代入得$\left\{\begin{array}{l} -k + b = 0 \\ b = 1 \end{array}\right.$，解得$\left\{\begin{array}{l}k=1\\b=1\end{array}\right.$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$y=x+1$．

    【小问2详解】

    由$y=x+1$可知$k=1>0$，由$y=2x+n$可知$k=2>0$，所以当$x > -2$时y随x增大而增大，

    当$x = -2$时，$y=x+|-2+x|-|x|$，

    当$x = -2$时，$y=2x+n=4+n$，

    根据题意$x > -2$时对于x的每一个值，函数$y=2x+n$的值大于函数$y=x+1$的值，

    可得$-4+n-1$，解得$n\ 3$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$n\ 3$时结论成立．

    故n的取值范围为$n\ 3$．'
