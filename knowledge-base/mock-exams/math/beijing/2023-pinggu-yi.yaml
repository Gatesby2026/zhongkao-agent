  question: '如图，在$Y_{ABCD}$中，点E是BC中点．点F是AD中点．连接$AE, CF, EF, EE$平分$\angle AEC$．

    [图]

    （1）求证：四边形$AECF$是菱形：

    （2）连接AC，与EF交于点O，连接OD．若$AF = 5$，$\sin\angle FAC=\frac{3}{5}$，求OD的长．'
  answer: （1）见解析（2）$2\sqrt{13}$
  solution: '【小问1详解】

    证明：∵四边形ABCD是平行四边形

    ∴$AD \parallel BC$，$AD = BC$

    ∵F是AD中点，E是BC中点

    ∴$AF \parallel EC$，$AF = EC$

    ∴四边形AECF是平行四边形

    ∵EF平分∠AEC

    ∴$\angle AEF = \angle FEC$

    ∵$AF \parallel EC$

    ∴$\angle AFE=\angle FEC=\angle AEF$

    ∴$AE = AF$

    ∴四边形AECF是菱形

    【小问2详解】

    解：∵四边形AECF是菱形

    ∴$AO = OC$，$EO = FO$，$\angle AOF = 90^\circ$

    ∵$AF = 5$，$\sin\angle FAC=\frac{3}{5}$，

    ∴$OF = 3$

    ∴$AO = CO = \sqrt{5^{2} - 3^{2}} = 4$，

    过点O作$OG \perp AB$于点G，

    ∵$\frac{1}{2}OA\cdot OF=\frac{1}{2}AF\cdot OG$，

    即$\frac{1}{2}x+4=\frac{x}{2}\times5\ GG$

    ∴$OG = \frac{12}{5}$，

    ∵$GF=\sqrt{OF^{2}-OG^{2}}=\sqrt{3^{2}-\left(\frac{12}{5}\right)^{2}}=\frac{9}{5}$

    ∴$GD=\frac{9}{5}+5=\frac{34}{5}$，

    ∴$OD = \sqrt{GD^{2} + OG^{2}} = \sqrt{\left(\frac{34}{5}\right)^{2} + \left(\frac{12}{5}\right)^{2}} = 2\sqrt{13}$

    [图]'
