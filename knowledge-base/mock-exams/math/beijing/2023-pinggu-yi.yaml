    （2）记A城市3月1号至10号的日最高气温的方差为$S_{1}^{2}$，B城市3月1号至10号的日最高气温的方差为$s_{2}^{2}$，则$S_{1}^{2}$______$s_{2}^{2}$（填“＞”“＜”或“=”）；

    （3）如果你是明明，请根据以上统计数据，对A、B两个城市3月1号至10号的日最高气温情况做简单的分析．（至少从两个方面做出分析）'
  answer: （1）$m = 12.5$，$n = 14$，$z = 15$ （2）＞（3）见解析
  solution: '【小问1详解】

    解：将B城市3月1号至10号的日最高气温（℃）从小到大排列：

    9，9，11，11，12，13，14，14，14，17

    $c.m=\frac{(12+13)}{2}=12.5$；

    B城市3月1号至10号的日最高气温（℃）出现最多次数的温度是14℃，

    $\therefore n = 14$；

    A城市3月1号至10号的日最高气温（℃）中最高温度是26℃，最低温度是11℃，

    $z = 26 - 11 = 15$，

    故答案为：$m = 12.5$，$n = 14$，$z = 15$．

    【小问2详解】

    根据方差公式得：

    $s_{1}^{2}=\frac{1}{10}\left[\left(11-17.5\right)^{2}+\left(13-17.5\right)^{2}+\cdots+\left(21-17.5\right)^{2}+\left(26-17.5\right)^{2}\right]$

    $=\frac{1}{10}(42.25+20.25+\cdots+12.25+72.25)$

    $\frac{1}{10}\times160.5$

    $=16.05$

    $s_{3}^{2}=\frac{1}{10}\left[\left(12-12.4\right)^{2}+\left(11-12.4\right)^{2}+\cdots+\left(14-12.4\right)^{2}+\left(17-12.4\right)^{2}\right]$

    $\frac{1}{10}(0.16+1.96+\cdots+0.36+21.16)$

    $\frac{1}{10}\times54.2$

    $= 5.42$

    $\therefore s_{1}^{2}>s_{2}^{2}$

    故答案为：$\gt$．

    【小问3详解】

    A城市3月1日至10日日平均气温的平均值更高，极差较大，温度波动较'
