  question: 某货运公司临时接到一个任务，从工厂同时运送A、B两种货物各20箱到展馆，货运公司调派甲货车运送A种货物，乙货车运送B种货物，A种货物每箱80千克，B种货物每箱70千克，因为两种货物包装箱完全一样，装运工人一时疏忽两车虽然所装货物数量正确，但部分货物却装混了．运送途中安检时，两车过地秤，发现甲车比乙车的货物重160千克，则甲、乙两车各有______箱货物装错，到达展馆，为了尽快把货物区分开，乙车司机借来了一台最多可以称300千克的秤精选最优称重方案，根据被错装货物出现的所有可能情况，最多需要称______次就能把乙车上装错的货物区分出来．
  answer: ①.2②.8
  solution: '解：设甲、乙两车各有x箱货物装错，根据题意得：

    $80x(20-x)+70x-[70x(20-x)+80x]=160$

    解得：$x=2$，

    将乙车上的货物平均分为5堆，每堆4箱，将5堆货物最多称4次，其中重量为280千克的堆里没有装错，可以判断出错误的堆数；装错的货物可以在1堆里，也可以在2堆里；如果装错的货物可以在1堆里，先称两箱，如果这个两箱质量和为140或160千克，则可判断哪两箱是装错的，若这个两箱质量和为150千克，再选择这两箱中其中一箱称重量，就可以哪一箱是装错的，另两箱也同操作即可，最多称3次可以将装错的2箱货物区分出来；如果装错的货物可以在2堆里，每一堆都先称两箱，判断装错的在哪两箱中，然后在这两箱中称其中一箱就可以判断了，最多称4次可以将装错的2箱货物区分出来，所以最多需要称8次就能把乙车上装错的货物区分出来，

    故答案为：2，8．'
