  question: '在平面直角坐标系xOy中，$M(x_{1},y_{1})$，$N(x_{2},y_{2})$是抛物线$y = mx^2 - m^2 \quad (m \ne 0)$上任意两点．

    （1）求抛物线的对称轴（用含m的式子表示）；

    （2）若对于$-1 < x_1 < 2m$，$2m < x_2 < 6$，都有$y_{1}<y_{2}$，求m的取值范围．'
  answer: （1）$x = \frac{m}{2}$ （2）m的取值范围是$1 \leq m < 3$
  solution: '【小问1详解】

    解：∵$y = mx^2 - m^2 \quad (m \ne 0)$，

    ∴抛物线的对称轴为直线$x = -\frac{m^3}{2m} = \frac{1}{2}m$；

    【小问2详解】

    解：当$m > 0$时，抛物线开口向上，在对称轴的右侧y随x的增大而增大，

    ∵对于$-1 < x_1 < 2m$，$2m < x_2 < 6$，都有$y_{1}<y_{2}$，

    ∴$\frac{1}{2}m\leq\frac{-1+2m}{2}$，

    解得$m\ 1$，

    ∵$-1 < x_1 < 2m$，$2m < x_2 < 6$，

    ∴$-\frac{1}{2}<m<3$，

    ∴$1 \leq m < 3$；

    当$m < 0$时，抛物线开口向下，在对称轴$[公式]$左侧y随x的增大而增大，

    ∵对于$-1 < x_1 < 2m$，$2m < x_2 < 6$，都有$y_{1}<y_{2}$，

    ∴$\frac{1}{2}m-\frac{2m+6}{2}$，

    解得$m \leq -6$，

    ∵$-\frac{1}{2}<m<3$，

    ∴这种情况不存在．

    综上，m的取值范围是$1 \leq m < 3$．'
