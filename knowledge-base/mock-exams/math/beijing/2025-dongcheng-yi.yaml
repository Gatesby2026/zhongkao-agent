    ∵$OF \parallel CD$，

    ∴$OF \parallel AB$．

    ∴$\angle OFE = \angle BAE$．

    ∵E为OB的中点，

    ∴$OE = BE$．

    又∵$\angle OEF = \angle BEA$，

    ∴$\triangle OEF \cong \triangle BEA$．

    ∴$AE = EF$．

    ∴四边形$OABF$是平行四边形．

    【小问2详解】

    在矩形$ABCD$中，

    $AC=BD,OA=OC,OB=OD$，

    ∴$OA = OB$．

    又∵$OA = AB$，四边形$OABF$是平行四边形，

    ∴$\triangle OAB$是等边三角形．四边形$OABF$是菱形

    ∴$\angle ABO=60^{\circ}$，$\angle BAE = 30^\circ$，$AF = 2AE$，

    在$Rt\triangle ABE$和$Rt\triangle ABC$中，

    ∵$AB = 6$，

    ∴$AE = AB \cdot \cos 30^\circ = 3\sqrt{3}$，$AG=\frac{AB}{\cos30^\circ}=4\sqrt{3}$．

    ∴$AF = 6\sqrt{3}$．

    ∴$FG=AF-AG=2\sqrt{3}$．'
