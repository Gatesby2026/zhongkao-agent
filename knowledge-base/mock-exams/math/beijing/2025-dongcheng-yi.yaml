  question: '在平面直角坐标系xOy中，对于点P、点M、点Q，给出如下定义：点P绕点M逆时针旋转$90^\circ$得到点$P''$，点N为线段MQ的中点（点N不与点$P''$重合），则称线段$P''N$的长为点P关于点M及点Q的“垂中距”，记为$d(P,M,Q)$．

    [图]

    （1）已知点$A(-1,0),B(2,0)$．

    ①若点$C(0,2)$，则$d(A,C,B)$为______________；

    ②若点C为y轴上一动点，则$d(A,C,B)$的最小值为______________．

    （2）若$OA=2,OC=1$，直接写出$d(A,C,O)$的取值范围．'
  answer: （1）①1．②$\frac{\sqrt{5}}{5}$ （2）$\frac{4-\sqrt{3}}{2}\leq d(A,C,O)\leq\frac{4+\sqrt{3}}{2}$
  solution: '【小问2详解】

    ∵$OA=2,OC=1$，

    ∴点A在以点O为圆心，以2为半径的圆上运动，点C在以点O为圆心，以1为半径的圆上运动，

    将点O绕点C逆时针旋转$90^\circ$至点$O''$，由新定义可知，点$A''$在以以点$O''$为圆心，以2为半径的圆上运动，

    在1为半径的圆O上取点C，在2为半径的圆O上取点A，点A绕点C旋转90度至点$A''$，

    [图]

    ∵由旋转的性质得，$OC = OC, AC = AC, \angle OCO'' = \angle ACA'' = 90^\circ$，

    ∴$\angle OCA + \angle ACO = 90^\circ$，$\angle OCA+\angle ACO''=90^{\circ}$，

    ∴$\angle OCA = \angle OCA$，

    ∴$\triangle CAD\cong\triangle ACD(SAS)$，

    ∴$OC = O''C = 1$，$C''A''=OA=2$，

    取OC的中点N，连接$O''N$，则$CN=\frac{1}{2}$，

    ∴$O''N=\sqrt{CN^{2}+OC^{2}}=\frac{\sqrt{2}}{2}$，

    在$\triangle A''NO''$中，

    ∵$OA-ON\leq AN\leq OA+ON$，

    ∴$\frac{4-\sqrt{3}}{2} \leq A''N \leq \frac{4+\sqrt{3}}{2}$，即$\frac{4-\sqrt{5}}{2}\leq d(A,C,O)\leq\frac{4+\sqrt{5}}{2}$．'
