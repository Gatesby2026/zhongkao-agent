  question: '如图，在由边长为1的小正方形组成的网格中，点$A, B, C$都在格点上，以点A为圆心，AB长为半径画弧，交AC于点D，则扇形ABD的面积为________．

    [图]'
  answer: $\frac{5}{8}\pi$
  solution: '解：如图，连接BC，

    由题意得$AB = AD = \sqrt{1^{2} + 2^{2}} = \sqrt{5}$，$BC = \sqrt{1^{2} + 2^{2}} = \sqrt{5}$，$AC=\sqrt{3^{2}+1^{2}}=\sqrt{10}$，

    $\therefore AB^{2}=BC^{2}=5$，$AC^{2}=10$，$AB = BC$，

    $AB^{2}+BC^{2}=AC^{2}$，

    $\therefore \triangle ABC$是直角三角形，$\angle ABC = 90^\circ$，

    $\angle BAC = 45^\circ$，

    $\therefore S_{\triangle O_1O_2AB}=\frac{45\pi\cdot AB^2}{360}=\frac{5}{8}\pi$，

    故答案为：$\frac{5}{8}\pi$．

    [图]'
