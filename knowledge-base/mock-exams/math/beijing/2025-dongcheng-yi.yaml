    （2）若$\odot\odot$的半径为2，$OE = 6$，求BC的长．'
  answer: （1）见解析（2）$BC = \frac{8\sqrt{2}}{3}$
  solution: '【小问1详解】

    证明：$\because OD \perp BC$，垂足为D，

    $\angle ODB=90^\circ$，

    $\because AE$与$\odot\odot$相切于点A，

    $\therefore AE \perp OA$，

    $\angle OAE = 90^\circ$，

    $\therefore \angle B+\angle BOA=90^{\circ}$，$\angle E+\angle AOE=90^{\circ}$，且$\angle DOB = \angle AOE$，

    $\angle B = \angle E$．

    【小问2详解】

    解：$\therefore \odot O$的半径为2，$OE = 6$，

    $\cdot OA = OB = 2$，

    $\angle ODB=\angle OAE=90^{\circ}$，$\angle B = \angle E$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\frac{BD}{OD}=\cos B=\cos E=\frac{AE}{OE}$，

    $AE=\sqrt{OE^{2}-OA^{2}}=\sqrt{6}-2=4\sqrt{2}$，

    $\therefore CD=BD=\frac{OB\cdot AE}{OE}=\frac{2\times4\sqrt{2}}{6}=\frac{4\sqrt{2}}{3}$，

    $\therefore BC=2CD=\frac{8\sqrt{2}}{3}$，

    $\therefore BC$的长是$\frac{8\sqrt{2}}{3}$．'
