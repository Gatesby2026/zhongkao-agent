  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\,(k\neq0)$的图象由函数$y=x$的图象平移得到，且经过点$(2,1)$．

    （1）求这个一次函数的解析式；

    （2）若函数$\hat{y}=mx(m\neq0)$与一次函数$y=kx+b\,(k\neq0)$的图象的交点位于直线$x = -1$的右侧，直接写出m的取值范围．'
  answer: （1）$y=x-1$ （2）$m < 0$或$0<m<1$或$m > 2$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\,(k\neq0)$的图象由函数$y=x$的图象平移得到，

    ∴$k = 1$，

    ∴$y=x+b$，

    把$(2,1)$代入，得：$1=2+b$，解得：$b = -1$，

    ∴$y=x-1$；

    【小问2详解】

    令$mx = x - 1$，

    ∴$(1-m)x=1$，

    ∵图象有交点，

    ∴$1 - m \neq 0$，

    ∴$x = \frac{1}{1 - m}$，

    ∵函数$\hat{y}=mx(m\neq0)$与一次函数$y=kx+b\,(k\neq0)$的图象的交点位于直线$x = -1$的右侧，

    ∴$\frac{1}{1-m} > -1$，

    当$1 - m > 0$，即：$m < 1$时，不等式恒成立；

    当$1-m<0$，即：$m > 1$时，$1 < m - 1$，解得：$m > 2$，

    又∵$m \neq 0$，

    ∴m的取值范围为：$m < 0$或$0<m<1$或$m > 2$．'
