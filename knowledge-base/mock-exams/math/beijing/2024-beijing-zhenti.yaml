  question: '若关于x的一元二次方程$x^{2}-4x+c=0$有两个相等的实数根，则实数c的值为（）

    A.$-16$

    B.$-4$

    C.4

    D.16'
  answer: C
  solution: '∵方程$x^{2}-4x+c=0$，$a=1,b=-4,c=c$，

    ∴$\Delta=b^{2}-4ac=(-4)^{2}-4\times1\times c=0$，

    ∴$4c=16$，

    解得$c = 4$．

    故选C．'
