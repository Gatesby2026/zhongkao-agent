  question: '如图，AB是$\odot\odot$的直径，点C，D在$\odot\odot$上，OD平分$\angle AOC$.

    [图]

    （1）求证：$OD \parallel BC$；

    （2）延长DO交$\odot\odot$于点E，连接CE交OB于点F，过点B作$\odot\odot$的切线交DE的延长线于点P.若$\frac{OF}{BF} = \frac{5}{6}$，$PE = 1$，求$\odot\odot$半径的长.'
  answer: （1）见解析 （2）$\frac{3}{2}$
  solution: '【小问1详解】

    根据题意，得$\angle AOC=\angle B+\angle C$，

    ∵$OB = OC$，

    ∴$\angle B = \angle C$，

    ∴$\angle AOC = 2\angle B$，

    ∵OD平分$\angle AOC$，

    ∴$\angle AOC=2\angle AOD$，

    ∴$\angle B=\angle AOD$，

    ∴$OD \parallel BC$；

    【小问2详解】

    ∵$\frac{OF}{BF} = \frac{5}{6}$，$PE = 1$，

    不妨设$OE=3x,BF=6x$，则$OB=OF+BF=||x=OC=OE$，

    ∴$OP=OE+PE=11x+1$，

    ∵$OD \parallel BC$，

    ∴$\triangle OFE \sim \triangle BFC$，$\angle OBM = \angle POB$，

    ∴$\frac{OE}{BC}=\frac{OF}{BF}=\frac{5}{6}$，

    ∴$\frac{11x}{BC}=\frac{5}{6}$，

    解得$BC = \frac{66x}{5}$，

    取BC的中点M，连接OM，

    则$BM = \frac{33x}{5}$

    ∵$OB = OC$，

    ∴$OM \perp BC$，

    ∴$\cos\angle OBM=\frac{BM}{OB}=\frac{3}{5}$，

    ∴$\cos\angle POB=\frac{3}{5}$，

    ∵PB是$\odot\odot$的切线，

    ∴$OB \perp PB$，

    ∴$\cos\angle POB=\frac{3}{5}=\frac{OB}{OP}=\frac{OB}{OE+PE}=\frac{OB}{OB+1}$，

    解得$OB = \frac{3}{2}$，

    故$\odot\odot$半径的长为$\frac{3}{2}$.

