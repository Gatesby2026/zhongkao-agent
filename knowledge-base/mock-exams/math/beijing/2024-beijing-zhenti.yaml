  question: '如图，直线AB和CD相交于点O，$OE \perp OC$，若$\angle AOC = 58^\circ$，则$\angle EOB$的大小为（）

    [图]

    A.$29^\circ$

    B.$32^\circ$

    C.$45^\circ$

    D.$58^\circ$'
  answer: B
  solution: '解：∵$OE \perp OC$，

