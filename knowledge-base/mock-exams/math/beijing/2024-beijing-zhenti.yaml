- id: 16
  type: 填空
  score: 2
  question: '联欢会有A，B，C，D四个节目需要彩排.所有演员到场后节目彩排开始。一个节目彩排完毕，下一个节目彩排立即开始.每个节目的演员人数和彩排时长（单位：min）如下：

    | 节目 | A | B | C | D |

    | --- | --- | --- | --- | --- |

    | 演员人数 | 10 | 2 | 10 | 1 |

    | 彩排时长 | 30 | 10 | 20 | 10 |

    已知每位演员只参演一个节目.一位演员的候场时间是指从第一个彩排的节目彩排开始到这位演员参演的节目彩排开始的时间间隔（不考虑换场时间等其他因素）。

    若节目按“$A-B-C-D$”的先后顺序彩排，则节目D的演员的候场时间为____________min；

    若使这23位演员的候场时间之和最小，则节目应按___________的先后顺序彩排'
  answer: ①.60 ②.$C-A-B-D$
  solution: '解：①节目D的演员的候场时间为$30+10+20=60\mathrm{mm}$，

    故答案为：60；

    ②由题意得节目A和C演员人数一样，彩排时长不一样，那么时长长的节目应该放在后面，那么C在A的前面，B和D彩排时长一样，人数不一样，那么人数少的应该往后排，这样等待时长会短一些，那么B在D前面，

    ∴①按照$C-B-A-D$顺序，则候场时间为：$(10+2+1)\times20+(10+1)\times10+1\times30=400$分钟；

    ②按照$C-B-D-A$顺序，则候场时间为：$(10+2+1)\times20+(10+1)\times10+10\times10=470$分钟；

    ③按照$C-A-B-D$顺序，则候场时间为：$(10+2+1)\times20+(2+1)\times30+1\times10=360$分钟；

    ④按照$B-C-A-D$顺序，则候场时间为：$(10+10+1)\times(10+(10+1))\times20-1\times30=460$分钟；

    ⑤按照$B-C-D-A$顺序，则候场时间为：$(10+10+1)\times10+(10+1)\times20+10\times10=530$分钟；

    ⑥按照$B-D-C-A$顺序，则候场时间为：$(10+10+1)\times10+(10+10)\times10+10\times20=610$分钟．

    ∴按照$C-A-B-D$顺序彩排，候场时间之和最小，

    故答案为：$C-A-B-D$．

    解答应写出文字说明、演算步骤或证明过程.'
