  question: '如图，在菱形$ABCD$中，$\angle BAD = 60^\circ$，O为对角线的交点.将菱形$ABCD$绕点O逆时针旋转$90^\circ$得到菱形$A''B''C''D''$，两个菱形的公共点为E，F，G，H.对八边形$BFB''GDHD''E$给出下面四个结论：

    ①该八边形各边长都相等；

    ②该八边形各内角都相等；

    ③点O到该八边形各顶点的距离都相等；

    ④点O到该八边形各边所在直线的距离都相等。

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①③

    B.①④

    C.②③

    D.②④'
  answer: B
  solution: '向两方分别延长BD，连接OH，

    根据菱形$ABCD$，$\angle BAD = 60^\circ$，则$\angle BAO = \angle DAO = 30^\circ$，$\angle AOD=\angle AOB=90^{\circ}$，

    ∵菱形$ABCD$绕点O逆时针旋转$90^\circ$得到菱形$A''B''C''D''$，

    ∴点$A'',D'',B'',C''$一定在对角线$AC,BD$上，且$OD=OD''=OB=OB''$，$\overline{OA}=\overline{OA''}=\overline{OC}=\overline{OC''}$，

    ∴$AD'' = C''D$，$\angle D^{\prime}AH = \angle DC^{\prime}H = 30^{\circ}$，

    ∵$\angle DHA = \angle DHC$，

    ∴$\triangle ADH \cong \triangle CDH$，

    ∴$D''H=DH$，$C''H = AH$，同理可证$DE=BE,BF=BF,BG=DG$，

    ∵$\angle EAB=\angle HCD=30^\circ,AB=CD,\angle ABE=\angle CDH=120^\circ$，

    ∴$\triangle ABE \cong \triangle CDH$，

    ∴$DH = BE$，

    ∴$DH = BE = D''H'' = D''E'' = BP = FP'' = B''G'' = DG$，

    ∴该八边形各边长都相等，

    故①正确；

    根据角的平分线的性质定理，得点O到该八边形各边所在直线的距离都相等，

    ∴④正确；

    根据题意，得$\angle ED''H = 120^\circ$，

    ∵$\angle D''OD = 90^\circ$，$\angle ODH=60^{\circ}$，

    ∴$\angle D''HD=150^{\circ}'
