  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$与$y = -kx + 3$的图象交于点$(2,1)$.

    （1）求k，b的值；

    （2）当$x>2$时，对于x的每一个值，函数$\hat{y}=mx(m\neq0)$的值既大于函数$y=kx+b$的值，也大于函数$y = -kx + 3$的值，直接写出m的取值范围.'
  answer: （1）$k=1,b=-1$ （2）$m\ 1$
  solution: '【小问1详解】

    解：由题意得将$(2,1)$代入$y = -kx + 3$得：$-2k+3=1$，

    解得：$k = 1$，

    将$k = 1$，$(2,1)$，代入函数$y=kx+b\,(k\neq0)$中，

    得：$\left\{\begin{array}{l}2k+b=1\\ k-1\end{array}\right.$，

    解得：$\left\{

    \begin{array}{l}

    k = 1 \\

    b = -1

    \end{array}

    \right.$，

    ∴$k=1,b=-1$；

    【小问2详解】

    解：∵$k=1,b=-1$，

    ∴两个一次函数的解析式分别为$y = -k, y = x + 3$，

    当$x>2$时，对于x的每一个值，函数$y = mx \, (m \neq 0)$的值既大于函数$y=x-1$的值，也大于函数$y=-x+3$的值，

    即当$x>2$时，对于x的每一个值，直线$y = mx \, (m \neq 0)$的图像在直线$y=x-1$和直线$y=-x+3$的上方，则画出图象为：

    [图]

    由图象得：当直线$y = mx \, (m \neq 0)$与直线$y=x-1$平行时符合题意或者当$y = mx \, (m \neq 0)$与x轴的夹角大于直线$y = mx \, (m \neq 0)$与直线$y=x-1$平行时的夹角也符合题意，

    ∴当直线$y = mx \, (m \neq 0)$与直线$y=x-1$平行时，$m = 1$，

    ∴当$x>2$时，对于x的每一个值，直线$y = mx \, (m \neq 0)$的图像在直线$y=x-1$和直线$y=-x+3$的上方时，$m\ 1$，

    ∴m的取值范围为$m\ 1$．'
