  question: '如图，在正方形$ABCD$中，点E在AB上，$AF \perp DE$于点F，$CG \perp DE$于点G．若$AD = 5$，$CG = 4$，则$\triangle AEF$$[公式]$面积为___________．

    [图]'
  answer: $\frac{27}{8}$
  solution: '解：根据正方形的性质，得$AD = 5 = DC$，$CD \parallel AB$，

    ∴$\angle CDG = \angle AEK$，

    ∵$CG = 4$，

    ∴$DC=\sqrt{DC^{2}-CG^{2}}=3$,

    $\sin\angle CDG=\sin\angle ABF=\frac{CG}{5}=\frac{4}{5}$，

    $\tan \angle CDG = \tan \angle AEP = \frac{CG}{DG} = \frac{AD}{AE} = \frac{4}{3}$，

    ∴$AE = \frac{15}{4}$，

    ∴$AJ''=\frac{4}{5}\times\frac{15}{4}=3$，

    ∴$EF = \frac{9}{4}$，

    ∴$\triangle AEF$的面积为$\frac{1}{2}EF\cdot AF=\frac{27}{8}$；

    故答案为：$\frac{27}{8}$．'
