  question: '如图，在四边形$ABCD$中，E是AB的中点，DB，CE交于点F，$DF = FB$，$AF \parallel DC$.

    [图]

    （1）求证：四边形$AFCD$为平行四边形；

    （2）若$\angle EFB=90^{\circ}$，$\tan \angle FEB = 3$，$EF = 1$，求BC的长.'
  answer: （1）见详解 （2）$\sqrt{13}$
  solution: '【小问1详解】

    证明：∵E是AB的中点，$DF = FB$，

    ∴$EF \parallel AD$，

    ∵$AF \parallel DC$，

    ∴四边形$AFCD$为平行四边形；

    【小问2详解】

    解：∵$\angle EFB=90^{\circ}$，

    ∴$\angle CFB=180^{\circ}-90^{\circ}=90^{\circ}$，

    在$\mathrm{Rt}\triangle EFB$中，$\tan \angle FEB = \frac{FB}{FE} = 3$，$EF = 1$，

    ∴$FB=3$，

    ∵E是AB的中点，$DF = FB$

    ∴$AD=2EF=2$，

    ∵四边形$AFCD$为平行四边形，

    ∴$CF = AD = 2$，

    ∴在$\mathrm{Rt}\triangle CFB$中，由勾股定理得$CB = \sqrt{CF^{2} + FB} = \sqrt{13}$．'
