    ∴$BP+CP=3=AB=CD$，

    此时$D,F$重合，

    过P作$PI \parallel CD$交AD于J，交AC于I，

    [图]

    ∵$AB \parallel CD$，

    ∴$AB \parallel PI \parallel CD$，

    ∴$\frac{CI}{AI}=\frac{CP}{BP}=1$，$\triangle PIE \cong \triangle DCE$，

    ∴$AI = CI = \frac{1}{2}AC$，$PI = \frac{1}{2} AB + \frac{1}{2} CD$，

    ∵$AB = 3$，$BC = 6$，

    ∴$AC = \sqrt{3^{2} + 6^{2}} = 3\sqrt{5}$，

    ∴$AI=CI=\frac{3\sqrt{5}}{2}$，

    ∵$\triangle PIE \cong \triangle DCE$，

    ∴$\frac{IE}{CE} = \frac{PI}{CD} = \frac{1}{2}$，

    ∴$CE = \sqrt{5} \approx 2.2$；

