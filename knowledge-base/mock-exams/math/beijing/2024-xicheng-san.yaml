  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象由函数$y=2x$的图象平移得到，且经过点$(1,5)$．

    （1）求这个函数的表达式；

    （2）当$x<-1$时，对于x的每一个值，函数$y = mx (m \ne 0)$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=2x+3$ （2）$m \leq -1$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\,(k\neq0)$的图象由函数$y=2x$的图象平移得到，

    ∴$k=2$，

    ∴$y=2x+b$，

    把点$(1,5)$代入$y=2x+b$得

    $5=2+b$，

    解得$b=3$，

    ∴这个一次函数的解析式是$y=2x+3$；

    【小问2详解】

    解：由题意，得$x<-1$时直线$y = mx (m \ne 0)$在直线$y=2x+3$的上方，

    当$x=-1$时，$y = 2 \times (-1) + 3 = 1$，

    把$(-1,1)$代入$y = mx$，得$1 = -m$，解得$m = -1$，

