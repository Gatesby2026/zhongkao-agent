  question: 已知$x-y-5=0$，求代数式$\left(\frac{x^{2}+y^{2}}{x-y}\right)^{2}y-\frac{x-y}{2x}$的值．
  answer: $10$
  solution: '解：$\left(\frac{x^{2}+y^{2}}{x-y}\right)^{2}y-\frac{x-y}{2x}$

    $=\left(\frac{x+y}{x}-\frac{2xy}{x^{2}}\right)\div\frac{2x}{x-y}$

    $= \left( x^{2} + y^{2} - 2xy \right) - \frac{2x}{x - y}$

    $=\frac{(x-y)^{2}}{x}-\frac{2x}{x-y}$

    $=2(x-y)$．

    ∵$x-y-5=0$，

    ∴$x-y=5$，

    ∴原式$=2(x-y)=0$．'
