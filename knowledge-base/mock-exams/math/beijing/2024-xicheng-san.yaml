  question: '如图，在$Y_{ABCD}$中，点E，F分别在AB，CD上，且$AE = CF$，DB平分$\angle EDF$．

    [图]

    （1）求证：四边形$BEDF$是菱形；

    （2）若$AB = 8$，$BC = 4$，$CF = 3$，求证：$Y_{ABCD}$是矩形．'
  answer: （1）见解析（2）见解析
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$AB = CD$，$AB \parallel CD$．

    ∴$\angle ABD = \angle BDC$．

    ∵$AE = CF$．

    ∴$BE = DF$．

    ∴四边形$BEDF$是平行四边形．

    ∵DB平分$\angle EDF$，

    ∴$\angle BDC = \angle EDB$．

    ∴$\angle EDB = \angle ABD$．

    ∴$DE = BE$．

    ∴四边形$BEDF$是菱形．

    【小问2详解】

    ∵$CD = AB = 8$，$CF = 3$，

    ∴$DF = 5$．

    ∴$BF = DF = 5$．

    ∵$BC = 4$，

    ∴$BF^{2}=BC^{2}+CF^{2}$．

    ∴$\angle C=90^{\circ}$．

    ∴$\Box ABCD$是矩形．'
