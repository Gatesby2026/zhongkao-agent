  solution: '【小问1详解】

    解：在BP，CE，CF的长度这三个量中，确定BP的长度是自变量，CE的长度和CF的长度都是这个自变量的函数；

    【小问2详解】

    ①如图，当$BP = 3$时，而$AB=CD=3$，$AD = BC = 6$，

