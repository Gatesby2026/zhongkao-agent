  question: '如图，在菱形$ABCD$中，$BE \perp AD$于E，$DF \perp BC$于F．

    [图]

    （1）求证：四边形$BEDF$是矩形；

    （2）连接BD，如果$\tan \angle BDE = 2$，$BF = 1$，求AB的长．'
  answer: （1）见解析 （2）AB的长为$2.5$．
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是菱形，

    ∴$DA \parallel BC$，

    ∵$BE \perp AD$，

    ∴$\angle DEB=\angle EBF=90^{\circ}$，

    ∵$DF \perp BC$，

    ∴$\angle BFD = 90^\circ$，

    ∴四边形$BEDF$是矩形；

    【小问2详解】

    解：设AB的长为x，

    ∵四边形$ABCD$是菱形，

    ∴$AB = AD = x$，

    ∵四边形$BEDF$是矩形，

    ∴$DE = BF = 1$，

    ∵$\tan \angle BDE = 2$，

    ∴$\frac{BE}{DE}=2$，

    ∴$BE = 2$，

    在$Rt\triangle ABE$中，$AB = x$，$AE = x - 1$，$BE = 2$，

    由勾股定理得$x^{2}=(x-1)^{2}+2^{2}$，

    解得$x=2.5$，

    ∴AB的长为$2.5$．'
  knowledge_points:
  - 勾股定理
  - 矩形
