  question: '“双减”政策颁布后，某区为了解学生每天完成书面作业所需时长的情况，从甲，乙两所学校各随机抽取50名学生进行调查，获取他们每天完成书面作业所需时长（单位：分钟）的数据，并对数据进行了整理、描述和分析，下面给出了部分信息．

    a．甲，乙两所学校学生每天完成书面作业所需时长的数据的频数分布直方图及扇形统计图如下（数据分成5组：$15\leq x<30$，$30 \leq x < 45$，$45\leq x<60$，$60 \leq x < 75$，$75 \leq x \leq 90$）：

    [图]

    b．甲校学生每天完成书面作业所需时长的数据在$45\leq x<60$这一组的是；

    | 45 | 46 | 50 | 51 | 51 | 52 | 52 | 53 | 55 | 56 | 59 | 59 |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    c．甲，乙两所学校学生每天完成书面作业所需时长的数据的平均数、中位数如下：

    |  | 平均数 | 中位数 |

    | --- | --- | --- |

    | 甲校 | 49 | m |

    | 乙校 | 50 | 54 |

    根据以上信息，回答下列问题：

    （1）$m =$______；

    （2）乙校学生每天完成书面作业所需时长的数据的扇形统计图中表示$45\leq x<60$这组数据的扇形圆心角的度数是______°；

    （3）小明每天完成书面作业所需时长为53分钟，在与他同校被调查的学生中，有一半以上的学生每天完成书面作业所需时长都超过了小明，那么小明是______校学生（填“甲”或“乙”），理由是______．

    （4）如果甲，乙两所学校各有200人，估计这两所学校每天完成书面作业所需时长低于60分钟的学生共有______人．'
  answer: （1）51（2）108 （3）乙，53分钟低于中位数54分钟 （4）272
  solution: '【小问1详解】

    解：甲校50名学生每天完成书面作业的中位数是第25、26个数，都是51，

    ∴$m=\frac{51+51}{2}=51$，

    故答案为：51；

    【小问2详解】

    解：乙校学生每天完成书面作业所需时长的数据的扇形统计图中表示$45\leq x<60$这组数据的扇形圆心角的度数是$360^{\circ}\times(1-14\%-26\%-26\%-4\%)=108^{\circ}$，

    故答案为：108；

    【小问3详解】

    解：甲校中位数是51，乙校中位数是54，

    而小明每天完成书面作业所需时长为53分钟，在与他同校被调查的学生中，有一半以上的学生每天完成书面作业所需时长都超过了小明，

    ∴小明是乙校学生，因为53分钟低于中位数54分钟；

    故答案为：乙，53分钟低于中位数54分钟；

    【小问4详解】

    解：样本中，甲校每天完成书面作业所需时长低于60分钟的学生有$9+12+12=33$人，

    乙校每天完成书面作业所需时长低于60分钟的学生有$50\times(1-26\%-4\%)=35$人，

    ∴甲校200名学生每天完成书面作业所需时长低于60分钟的学生有$200\times\frac{33}{50}=132$人，

    乙校200名学生每天完成书面作业所需时长低于60分钟的学生有$200\times\frac{35}{50}=140$人，

    ∴估计这两所学校每天完成书面作业所需时长低于60分钟的学生共有$132 + 140 = 272$人．

    故答案为：272．'
