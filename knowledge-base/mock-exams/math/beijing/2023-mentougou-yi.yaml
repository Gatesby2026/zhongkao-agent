  question: '如图，AB是$\odot\odot$的直径，点D在$\odot\odot$上，连接AD并延长到C，使$AC = AB$，连接BC交$\odot\odot$于E、过点B作$\odot\odot$的切线交OE的延长线于点F．

    [图]

    （1）求证：$OE \parallel AC$；

    （2）如果$AB = 10$，$AD = 6$，求EF的长．'
  answer: （1）见解析 （2）$\frac{10}{3}$
  solution: '【小问1详解】

    证明：∵$AB = AC$

    ∴$\angle C = \angle ABC$

    又∵$OB = OE$

    ∴$\angle OBE = \angle OLB$

    ∴$\angle OEB = \angle C$

    ∴$OE \parallel AC$

    【小问2详解】

    解：连接BD，则$\triangle ABD$为直角三角形，

    [图]

    ∵$OE \parallel AC$

    ∴$\angle BAD = \angle FOB$

    又∵BF为切线，

    ∴$\angle OBF = 90^\circ$

    则有$\angle OBF = \angle ADB$

    ∴$\triangle ADB$∽$\triangle OBF$

    ∴$\frac{AD}{OB} = \frac{AB}{OF}$，即$\frac{6}{5} = \frac{10}{OF}$

    ∴$OF = \frac{25}{3}$

    ∴$EF = OF - OE = \frac{25}{3} - 5 = \frac{10}{3}$

    故EF的长是$\frac{10}{3}$．'
