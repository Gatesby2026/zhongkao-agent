  question: '如图，在平面直角坐标系xOy中，一次函数$y=kx+b\ (k\neq0)$的图象经过点$A(-1,0)$，且与函数$y=2x$的图象交于点$B(1,m)$．

    [图]

    （1）求m的值及一次函数$y=kx+b\ (k\neq0)$的表达式；

    （2）当$x>1$时，对于x的每一个值，函数$y = -x + n$的值小于一次函数$y=kx+b\ (k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$m=2;y=x+1$ （2）$n \leq 3$
  solution: '【小问1详解】

    ∵一次函数$y=kx+b\ (k\neq0)$与函数$y=2x$的图象交于点$B(1,m)$，

    ∴把点$B(1,m)$代入$y=2x$得，

    $\therefore m=2\times1$

    $\therefore m = 2,$

    $\therefore B(1,2)$

    把$A(-1,0),B(1,2)$代入$y=kx+b\ (k\neq0)$得，

    $\left\{\begin{array}{l} -k-b=0 \\ k+b=2 \end{array}\right.$

    解之得$\left\{

    \begin{array}{l}

    k = 1 \\

    b = 1

    \end{array}

    \right.$

    ∴一次函数为$y=x+1.$

    【小问2详解】

    解不等式$-x+m<x+1$

    $\therefore x > \frac{n-1}{2}$

    ∵$x>1$时，对于x的每一个值，函数$y = -x + n$的值小于一次函数$y=kx+b\ (k\neq0)$的值，

    $\therefore \frac{n-1}{2} \leq 1,$

    $\therefore n \leq 3,$

    ∴n的取值范围$n \leq 3.$'
