  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}-2ax+a-4(a\neq 0)$．

    [图]

    （1）求该抛物线的顶点坐标；

    （2）当抛物线$y=ax^{2}-2ax+a-4(a\neq 0)$经过点$(3,0)$时，

    ①求此时抛物线的表达式；

    ②点$M(n-2,\ y)$，$N(2a+3,\ y_{2})$在抛物线上，且位于对称轴的两侧，当$y_{1}>y_{2}$时，求n的取值范围．'
  answer: （1）该抛物线的顶点坐标为$(1, -4)$； （2）①此时抛物线的表达式为$y=(x-1)^{2}-4$；②$-1 < n < \frac{1}{3}$
  solution: '【小问1详解】

    解：$y=ax^{2}+2ax+a-4=a(x-1)^{2}-4$，

    ∴该抛物线的顶点坐标为$(1, -4)$；

    【小问2详解】

    解：①将点$(3,0)$代入$y=a(x-1)^{2}-4$，得$0=a(3-1)^{2}-4$，

    解得$a = 1$，

    此时抛物线$[公式]$表达式为$y=(x-1)^{2}-4$；

    ②若点$M(n-2,\ y)$在对称轴直线$x = 1$的左侧，点$N(2a+3,\ y_{2})$在对称轴直线$x = 1$的右侧时，

    由题意可得$\left\{\begin{array}{l}n-2<1\\2n+3>1\\1-(n-2)>2n+3-1\end{array}\right.$，

    ∴$-1 < n < \frac{1}{3}$；

    若点$N(2a+3,\ y_{2})$在对称轴直线$x = 1$的左侧，点$M(n-2,\ y)$在对称轴直线$x = 1$的右侧时，

    由题意可得$\left\{\begin{array}{l} n-2>1 \\ 2n+3<1 \\ 1-(2n+3)>n-2-1 \end{array}\right.$，

    ∴不等式组无解．

    综上所述：$-1 < n < \frac{1}{3}$．'
