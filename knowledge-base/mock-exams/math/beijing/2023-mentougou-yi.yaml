  question: '甲，乙两名同学进行羽毛球比赛，羽毛球发出后的飞行路线可以看作是抛物线的一部分．如图建立平面直角坐标系，羽毛球从O点的正上方发出，飞行过程中羽毛球的竖直高度y（单位：m）与水平距离x（单位：m）之间近似满足函数关系$y = a(x - h)^2 + k \, (a < 0)$．比赛中，甲同学连续进行了两次发球．

    [图]

    （1）甲同学第一次发球时，羽毛球的水平距离x与竖直高度y的七组对应数据如下：

    | 水平距离 x / m | 0 | 1 | 2 | 3 | 4 | 5 | 6 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 竖直高度 y / m | 1 | 2 . 4 | 3 . 4 | 4 | 4 . 2 | 4 | 3 . 4 |

    根据以上数据，回答下列问题：

    ①当羽毛球飞行到最高点时，水平距离是______m；

    ②在水平距离5m处，放置一个高1.55m的球网，羽毛球______（填“是”或“否”）可以过网；

    ③求出满足的函数关系$y = a(x - h)^2 + k \, (a < 0)$；

    （2）甲同学第二次发球时，羽毛球的竖直高度y与水平距离x之间近似满足函数关系$y=0.1(x-5)^{2}+3.3$．乙同学在两次接球中，都是原地起跳后使得球拍达到最大高度$2.4m$时刚好接到球，记乙同学第一次接球的起跳点的水平距离为$d_{1}$，第二次接球的起跳点的水平距离为$d_{2}$，则$d_{1}-d_{2}$______0（填“$\gt$”“$\gt$”或“$=$”）'
  answer: （1）①4；②是；③函数关系式为$y=-0.2(x-4)^{2}+4.2$； （2）$\gt$
  solution: '【小问1详解】

    解：①∵$(3,4),(5,4)$的纵坐标相同，

    ∴函数$y = a(x - h)^2 + k \, (a < 0)$中，$h=\frac{3+5}{2}=4$，

    ∴观察表格，顶点坐标为$(4,4.2)$，

    当羽毛球飞行到最高点时，水平距离是$4m$；

    故答案为：4；

    ②当在水平距离$5m$时，竖直高度为$4m$，

    $4 > 1.55$，

    ∴羽毛球是可以过网的，

    故答案为：是；

    ③∵顶点坐标为$(4,4.2)$，∴$y = a(x - 4)^2 + 4.2$，

    将点$(0,1)$代入得$1=a(0-4)^{2}+2$，

    解得$a = -0.2$，

    ∴函数关系式为$y=-0.2(x-4)^{2}+4.2$；

    【小问2详解】

    解：当$y = 2.4$时，$2.4=-0.2(x-4)^{2}+4.2$，解得$x_{1}=7$，$x_{2}=1$（舍去），

    即乙同学第一次接球的起跳点的水平距离为$d_{1}=7$，

    当$y = 2.4$时，$2.4=-0.1(x-5)^{2}+3.3$，解得$x_{1}=8$，$x_2 = 2$（舍去），

    即乙同学第一次接球的起跳点的水平距离为$d_{2}=8$，

    ∴$d_{1}-d_{2}=7-8=-1<0$，

    故答案为：$\gt$．'
