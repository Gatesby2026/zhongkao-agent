  question: 已知$m^{2}-m-1=0$，求代数式$(2m+1)(2m-1)+(m-2)^{2}=m^{2}$的值．
  answer: '7'
  solution: '解：∵$m^{2}-m-1=0$，

    ∴$m^{2}-m=1$，

    ∴$(2m+1)(2m-1)+(m-2)^{2}=m^{2}$

    $=4m^{2}-1+m^{2}-4m+4-m^{2}$

    $=4m^{2}-4m+3$

    $=4(m^{2}-m)+3$

    $=4\times1+3$

    $=7$．'
