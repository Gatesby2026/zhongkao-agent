  question: '在平面直角坐标系xOy中，抛物线$G: y = ax^2 + 2x + c \, (a \ne 0)$经过点$(1,2t+c-1)$，点$A(t-1,y_{1})$，$B(t+2,y_{2})$在抛物线G上．

    （1）求a的值；

    （2）将抛物线G向右平移2个单位长度得到抛物线$G''$，点$C(2t+2,y_{2})$在抛物线$G''$上，且总有$y_{2}<y_{3}<y_{1}$，求t的取值范围．'
  answer: （1）$a = -1$； （2）$-2 < t < -1$或$1<t<2$．
  solution: '【小问1详解】

    解：将点$(1,2t+c-1)$代入抛物线G中，

    得：$a + 2t + c = 2t + c - 1$，

    解得：$a = -1$；

    【小问2详解】

    解：将C点向左平移2个单位长度即在抛物线G上，记为$C''(2t,y_{3})$，

    对称轴：$x = \frac{2t}{-2(-1)} = t$，

    点A关于对称轴的对称点为$A''(t+1,y_1)$，

    点B关于对称轴的对称点为$B''(t+2,y_{2})$，

    ①当$t\ 0$时，在对称轴右侧y随x的增大而减小，

    $r_{1} > r_{2} > \cdots > r_{n}$，

    $t+1<2t\leq t+2$，

    解得：$1<t<2$；

    ②当$t \leq 0$时，在对称轴左侧y随x的增大而增大，

    $r_{1} > r_{2} > \cdots > r_{n}$，

    $\therefore-2<2t<t-1$，

    解得：$-2 < t < -1$；

    综上所述，$-2 < t < -1$或$1<t<2$．

    [图]'
