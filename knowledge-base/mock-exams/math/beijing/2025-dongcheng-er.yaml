  answer: （1）$2\alpha$； （2）$BF = \sqrt{2}AD$，证明见解析．
  solution: '【小问1详解】

    解：$\because \angle A = 45^\circ$，$\angle ABC=\alpha(0^{\circ}<\alpha<45^{\circ})$

    $\angle BDC = \angle A + \angle ABD = 45^\circ + \alpha$

    $\because BC = BD$，

    $\angle BCD = \angle BDC = 45^\circ + \alpha$，

    $\angle DBC = 180^\circ - 2\angle BCD = 90^\circ - 2\alpha$，

    $\because CE \perp BD$，

    $\angle BEC = 90^\circ$，

    $\angle BCF = 90^\circ - \angle DBC = 2\alpha$；

    【小问2详解】

    解：$BF = \sqrt{2}AD$，证明如下

    如图，过点D作AB的对称点G，连接AG、BG，则$BD = BG$，$AD = AG$，

    $\because \angle ABD = \alpha$，

    $\angle GBD = 2\alpha = \angle BCF$，$\angle BFC = \angle FBC = \angle ABD + \angle DBC = 90^\circ - \alpha$，

    $\therefore BC = CF = BD = BG$，

    $\triangle BDG\cong\triangle CFB(SAS)$，

    $\therefore BF = DG$，

    $\angle BAD = 45^\circ$，

    $\therefore \angle GAD = 2\angle BAD = 90^\circ$，

    $.BF=DG=\sqrt{2}AD$．

    [图]'
