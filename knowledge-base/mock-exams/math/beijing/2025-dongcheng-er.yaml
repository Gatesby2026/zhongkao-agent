  question: 解不等式$\frac{2x-1}{3}-\frac{3x+2}{4}=-1$，并写出其非负整数解．
  answer: $x \leq 2$，非负整数解为：0，1，2
  solution: '解：$\frac{2x-1}{3}-\frac{3x+2}{4}=-1$

    去分母得，$4(2x-1)=3(3x+2)-12$，

    去括号得，$8x-4\quad 9x+6=12$，

    移项得，$8x-9x-6+4$，

    合并同类项得，$-x\quad-2$，

    系数化为1得，$x \leq 2$，

    ∴非负整数解为：0，1，2．'
