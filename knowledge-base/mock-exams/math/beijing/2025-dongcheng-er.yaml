  question: '在平面直角坐标系xOy中，一次函数$y_{1}=kx+b(k\neq 0)$的图象过点$(0,2)$和$(1,3)$．

    （1）求k，b的值；

    （2）当$x>1$时，对于x的每一个值，函数$y_{1}=kx+b$的值与函数$y_{x}=mx(m\neq0)$的值之和都大于6，直接写出m的取值范围．'
  answer: （1）$k = 1$，$b = 2$ （2）$m^{3}$
  solution: '【小问1详解】

    解：∵一次函数$y_{1}=kx+b(k\neq 0)$的图象过点$(0,2)$和$(1,3)$，

    ∴$\begin{cases}

    k + b = 3 \\

    b = 2

    \end{cases}$，

    解得$k = 1, b = 2$．

    【小问2详解】

    解：由（1）可知，$y_{1}=x+2$，

    ∴$y_{1}$随x的增大而增大，

    当$x = 1$时，$y_{1}=1+2=3$，

    ∴当$x>1$时，$y_1 > 3$，

    要使得当$x>1$时，对于x的每一个值，函数$y_{1}=kx+b$的值与函数$y_{x}=mx(m\neq0)$的值之和都大于6，

    则$y_{2}$随x的增大而增大，且当$x = 1$时，$y_{2}=6-3$，即$y_{2}^{3}$，

    ∴$m^{3}$．'
