  question: '《海岛算经》是中国古代测量术的代表作，原名《重差》，这本著作建立了从直接测量到间接测量的桥梁，直至近代，重差测量法仍有借鉴意义．某实践小组利用重差法测量海岛上一座山峰AB的高度，分别在C，D两点观察山顶点A，测得仰角分别为$45^\circ$，$26.5^\circ$，同时测得CD长为200米，则山峰AB的高度约为_____米．($\sin26.5^{\circ}\approx0.45$，$\cos
    26.5^\circ \approx 0.89$，$\tan26.5^{\circ}\approx0.50$)

    [图]'
  answer: '200'
  solution: '解：由题意得$AB \perp BC$，

    ∵在C，D两点观察山顶点A，测得仰角分别为$45^\circ$，$26.5^\circ$，

    ∴$\angle ACB = 45^\circ$，$\angle ADB=26.5^\circ$，

    ∴$\tan\angle ACB=\frac{AB}{BC}=1$，$\tan \angle ADB = \frac{AB}{BD} = 0.50$，

    ∴$AB = BC$，$BD=2AB$

    ∴$CD=BD-BC=AB$

    ∴AB的高度约为$200$m．

    故答案为：200．'
