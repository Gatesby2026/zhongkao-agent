  question: '如图，在矩形$ABCD$中，$AB = 9$，$AD=15$，点E是CD边上的一点，连接AE，将$\mathrm{V}_{ADE}$沿AE翻折，使点D恰好落在BC边上的点F处，则$\frac{S_{\triangle ECF}}{S_{\triangle FBA}} =$___________．

    [图]'
  answer: $\frac{1}{9}$
  solution: '解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$四边形$ABCD$是矩形，

    $\therefore DC = AB,\ AD = BC,\ \angle B = \angle C = 90^\circ$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$将$\mathrm{V}_{ADE}$沿AE翻折，使点D恰好落在BC边上的点F处，

    $AF = AD = 15$，

    $.BF=\sqrt{AF^{2}-AB^{2}}=12$，

    $\therefore FC = BC - BF = 3$，

    设$CE = x$，则$EF = DE = 9 - x$，根据$EF^{2}=FC^{2}+EC^{2}$，可得方程$(9-x)^{2}=3^{2}+x^{2}$，

    解得$x = 4$，即$CE = 4$，

    $\frac{S_{BCH}}{S_{ABC}}=\frac{3\times4+2}{9\times12+2}=\frac{1}{9}$．'
