  question: '如图，在$V_{ABC}$中，$\angle A=45^{\circ}$，D为AC上一点，$BC = BD$，$\angle ABC=\alpha(0^{\circ}<\alpha<45^{\circ})$，过点C作$CE \perp BD$于点E，交AB于点F．

    [图]

