  question: '某气象站对四月份30天的气温（单位：$^\circ\mathrm{C}$）进行了监测，数据分为上旬（4月1日—10日）、中旬（4月11日—20日）和下旬（4月21日—30日）三部分．

    a．上旬10天的日平均气温如下：

    21  23  24  25  26  26  26  27  27  28

    b．中下旬20天的日平均气温频数分布直方图如下（数据分为5组：第1组$15\leq x<20$，第2组$20 \leq x < 25$，第3组$25 \leq x < 30$，第4组$30 \leq x < 35$，第5组$35 \leq x < 40$）；

    [图]

    c．上旬、中旬、下旬日平均气温的平均数、众数、中位数如下表：

    |  | 平均数 | 众数 | 中位数 |

    | --- | --- | --- | --- |

    | 上旬 | 25.3 | 26 | m |

    | 中旬 | 24.6 | 26 | 24.5 |

    | 下旬 | 27.5 | 26 | 27 |

    根据以上信息，回答下列问题：

    （1）m的值为_____；

    （2）4月份30天的日平均气温的平均数是_____，气温为$25^\circ\mathrm{C}$及以上的天数为_____天；

    （3）根据《气候季节划分》的规定，立夏之后，若连续五天日平均气温不低于$22^\circ\mathrm{C}$，则视为入夏．立夏之后，某地连续五天的日平均气温的数据满足如下条件，则一定能断定这个地区人夏的是_____．

    A．平均数为25，中位数为22B．平均数为23，众数为25

    C．中位数为23，众数为25D．平均数为25，方差$\leq 1$'
  answer: （1）26； （2）25.8；20； （3）D．
  solution: '【小问1详解】

    解：根据排序后的数据可得：$m = \frac{26 + 26}{2} - 26$

    【小问2详解】

    解：4月份30天的日平均气温的平均数是$\frac{25.3\times10+24.6\times10+27.5\times10}{30}=25.8$，

    气温为$25^\circ\mathrm{C}$及以上的天数为$7+8+4+1=20$(天)

    【小问3详解】

    解：A、平均数为25，中位数为22，

    这组数据为$x_{1}\le x_{2}\le x_{3}\le x_{4}\le x_{5}$，中位数$x_{3}=22$，

    平均数$\frac{x_{1}+x_{2}+x_{3}+x_{4}+x_{5}}{5}=25$，

    ∴$x_{1}+x_{2}+x_{3}+x_{4}+x_{5}=125$，

    即$x_{1}+x_{2}+22+x_{4}+x_{5}=125$，

    ∴$x_{1}+x_{2}+x_{3}+x_{4}+x_{5}=103$，

    ∴有可能$x_{1}<22$或$x_{2}<22$，不满足连续五天日平均气温不低于$22^\circ\mathrm{C}$，不能判定入夏，故A选项不符合题意．

    B．平均数为23，众数为25

    设这组数据为$x_{1}\le x_{2}\le x_{3}\le x_{4}\le x_{5}$，众数是25，则至少有2个25

    平均数$\frac{x_{1}+x_{2}+x_{3}+x_{4}+x_{5}}{5}=23$，

    ∴$x_{1}+x_{2}+x_{3}+x_{4}+x_{5}=115$，

    假设$x_{3}=25$，$x_{4}=25$

    即$x_{1}+x_{2}+x_{3}=-65$，

    ∴有可能$x_{1}<22$，$x_{2}<22$，不满足连续五天日平均气温不低于$22^\circ\mathrm{C}$，不能判定入夏，故B'
