  question: 某地区防风林工程种植乔木和灌木，要求乔木种植面积占比不超过$10\%$．今年已种植乔木、灌木的面积共1000公顷；计划明年种植乔木和灌木的面积共1450公顷；其中乔木的面积比今年减少$40\%$，灌木的面积比今年增加$60\%$．判断经过今明两年种植后该地区乔木面积占比是否符合防风林工程要求，并说明理由．
  answer: 符合要求，理由见解析．
  solution: '解：符合要求，理由如下：

    设今年种植乔木的面积为x公顷，则今年种植灌木的面积为$(1000-x)$公顷，

    由题意可得：$x(1-40\%)+(1000-x)(1+60\%)=1450$，

    解得：$x=150$，

    则今明两年种植乔木的面积为：$x+x(1-40\%)=240$，

    按照防风林工程要求种植面积不超过：$(1000+1450)\times10\%=245$，

    $\because 240<245$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$今明两年终止后该地区乔木面积占比符合防风林工程要求．'
