  question: '关于x的一元二次方程$x^{2}+3x+1-m=0$有两个不相等的实数根．

    （1）求m的取值范围；

    （2）给出一个满足条件的m的值，并求出此时方程的根．'
  answer: （1）$m > -\frac{5}{4}$； （2）取$m = 1$，此时$x_{1}=0$，$x_{2}=-3$．（答案不唯一）
  solution: '【小问1详解】

    解：依题意，得$\Delta=3^{2}-4(1-m)$．

    ∵该方程有两个不相等的实数根，

    ∴$\triangle > 0$．

    即$3^{2}-4(1-m)>0$．

    ∴$m > -\frac{5}{4}$．

    【小问2详解】

    取$m = 1$．

    此时方程为$x^2 + 3x = 0$

    解得$x_{1}=0$，$x_{2}=-3$．'
