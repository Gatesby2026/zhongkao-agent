  question: '在平面直角坐标系xOy中，函数$y=ax+b(a\ne0)$的图象经过点$(-1,4)$，与函数$y=2x$的图象交于点$(1,m)$．

    （1）求m的值和函数$y=ax+b(a\ne0)$的解析式；

    （2）当$x>1$时，对于x的每一个值，函数$y=kx-k+2(k\neq0)$的值大于函数$y=ax+b$的值，且小于函数$y=2x$的值，直接写出k的取值范围．'
  answer: （1）$m = 2$，函数$y=ax+b$的解析式为$y=-x+3$； （2）$-1 < k < 2$且$k \neq 0$．
  solution: '【小问1详解】

    解：∵函数$y=2x$的图象经过点$(1,m)$，

    ∴$m = 2$．

    ∵函数$y=ax+b$的图象经过点$(-1,4)$，$(1,2)$，

    ∴$\left\{\begin{array}{l} -a+b=-4 \\ a+b=2 \end{array}\right.$

    解得$\begin{cases} a = -1 \\ b = 3 \end{cases}$

    ∴函数$y=ax+b$的解析式为$y=-x+3$．

    【小问2详解】

    解：∵当$x>1$时，对于x的每一个值，函数$y=kx-k+2(k\neq0)$的值大于函数$y=ax+b$的值，且小于函数$y=2x$的值，

    ∴$-1 < k < 2$且$k \neq 0$．'
