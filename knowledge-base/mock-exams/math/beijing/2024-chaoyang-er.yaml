  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+(1-a)x-1(a\neq 0)$的对称轴为直线$x = t$．

    （1）①$t =$____________（用含a的式子表示）；

    ②当$t = 1$时，求该抛物线与x轴的公共点的坐标；

    （2）已知点$(3, y_{1})$，$\left(\frac{1}{2}, y_{2}\right)$，$-\left(\frac{3}{2a}-2,y_{1}\right)$在该抛物线上，若$a > 0$，比较$y_{1}$，$y_{2}$，$y_{3}$的大小，并说明理由．'
  answer: （1）①$\frac{a-1}{2a}$；②$(1,0)$； （2）$y_{2}<y_{1}<y_{3}$，理由见解析．
  solution: '【小问1详解】

    ①对称轴为直线$x = t = \frac{a - 1}{2a}$；

    ②∵$t = 1$，

    ∴$\frac{a-1}{2a}=1$，

    ∴$a = -1$，

    ∴抛物线解析式为$y = -x^2 + 2x - 1$，

    ∴令$y = 0$，得$0=-x^{2}+2x-1$，

    解得$x = 1$，

    ∴抛物线与x轴的公共点的坐标为$(1,0)$．

    【小问2详解】

    ∵$a > 0$，

    ∴当$x\quad t$时，y随x的增大而增大；当$x \leq t$时，y随x的增大而减小．

    ∵$t = \frac{a - 1}{2a} - \frac{1}{2} + \frac{1}{2a}$，

    ∴$t<\frac{1}{2}$，

    ∵$t < \frac{1}{2} < 3$，

    ∴$y_{2}<y_{1}$，

    ∵$-\left(\frac{3}{2a}-2,y_{1}\right)$关于$x = t$的对称点为$(3+\frac{1}{2a},y_{2})$，

    ∴$t<3<3+\frac{1}{2a}$，

    ∴$y_1 < y_3$，

    ∴$y_{2}<y_{1}<y_{3}$．'
