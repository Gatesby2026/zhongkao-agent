    b．七年级学生的成绩在$80 \leq x < 90$这一组的是：

    80

    82    84    85    86    87    87    87    87    87    89

    c．七、八年级成绩的平均数、中位数、众数如下：

    平均数

    中位数

    众数

    七年级

    84.2

    m

    n

    八年级

    84.6

    87.5

    88

    根据以上信息，回答下列问题：

    （1）写出表中m，n的值；

    （2）估计七、八两个年级成绩在$90 \leq x \leq 100$的人数一共为______；

    （3）把七年级抽取的20名学生的成绩由高到低排列，记排名第5的学生的成绩为$p_1$，把八年级抽取的20名学生的成绩由高到低排列，记排名第5的学生的成绩为$p_{2}$，比较$p_1$，$p_{2}$的大小，并说明理由．'
  answer: （1）86$[公式]$5，87； （2）126；（3）$p_{1}<p_{2}$，理由见解析．
  solution: '【小问1详解】

    ∵一共抽取20名学生

