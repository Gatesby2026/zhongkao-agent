  question: '已知$2x^{2}+x-2=0$，则代数式$(x+1)^{2}+(x+1)(x-1)+2x^{2}$的值为（）

    A.4B.2C.1D.0'
  answer: A
  solution: '解：∵$2x^{2}+x-2=0$，

    ∴$2x^{2}+x=2$，

    又$(x+1)^{2}+(x+1)(x-1)+2x^{2}$

    $x^{2}+2x+1+x^{2}-1=2x^{2}$

    $=4x^{2}+2x$

    $=2\left(2x^{2}+x\right)$

    $=2\times2$

    $= 4$．

    故选：A．'
