  question: '如图1，在菱形$ABCD$中，$\angle B=60^{\circ}$，P是菱形内部一点，动点M从顶点B出发，沿线段BP运动到点P，再沿线段PA运动到顶点A，停止运动．设点M运动的路程为x，$\frac{MA}{MC}=y$，表示y与x的函数关系的图象如图2所示，则菱形$ABCD$的边长是（）

    [图]

    A.$4\sqrt{3}$B.4C.$2\sqrt{3}$D.2'
  answer: C
  solution: '如图所示，

    [图]

    由图象可得，

    当x从0到4时，$\frac{MA}{MC}-y=1$

    ∴$MA = MC$

    ∵四边形$ABCD$是菱形

    ∴点P在对角线BD上

    ∴由图象可得，$BP = 4$，$BP+AP=6$

    ∴$AP = 2$

    ∵在菱形$ABCD$中，$\angle B=60^{\circ}$，

    ∴$\angle ABD = 30^\circ$，$AC \perp BD$

    ∴设$AO = x$，则$AB = 2AO = 2x$

    ∴$PO = BP - BO = 4 - \sqrt{3}x$

    ∴$BO=\sqrt{AB^{2}-AO^{2}}=\sqrt{3}x$

    ∴在$Rt\triangle APO$中，$AP^{2}=AO^{2}+PO^{2}$

    ∴$2^{x}=x^{2}+(4-\sqrt{3}x)^{2}$

    解得$x = \sqrt{3}$，负值舍去

    ∴$AB = 2x = 2\sqrt{3}$

    ∴菱形$ABCD$的边长是$2\sqrt{3}$．

    故选：C．'
