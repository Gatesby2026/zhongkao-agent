  question: 甲、乙、丙三个同学做游戏，他们同时从写有整数$a, b, c$（$0 < a < b < c$）的三张卡片中各拿一张，获得与卡片上的数字相同数量的糖果后完成一次游戏，然后再按照此方式继续进行这个游戏．如果他们做了$n(n-2)$次游戏后，甲共获得$25$颗糖果，乙共获得$15$颗糖果，丙共获得$11$颗糖果，并且知道在最后一次游戏中，丙拿到的是写有整数c的卡片，那么n的值为____________；第一次游戏时，乙拿到的卡片上写有的整数是____________．（填“a”，“b”或“c”）
  answer: ①.$3$②.b
  solution: '解：根据题意得，$n(a+b+c)=25+15+11=51$，

    ∴$a + b + c = \frac{51}{n}$，

    ∵$0 < a < b < c$，

    ∴$a+b+c>3a$，

    ∴$\frac{51}{n}>3a$，即$n < \frac{51}{3a} - \frac{17}{a}$，

    ∵$n^{2}$，

    ∴$2 \leq n < \frac{17}{a}$，且n为正整数，

    当$n=2$时，$a+b+c=\frac{51}{2}$，不符合题意；

    当$n = 3$时，$a+b+c=\frac{51}{3}=17$，

    ∵$a, b, c$是正整数，

    ∴$a+b+c$为正整数，

    ∴当$n = 3$时，$a+b+c=17$，

    ∵丙共获得$11$颗糖果，且丙的卡片上写的是正数，

    ∴丙在前两次获得的糖果为$(11-c)$颗，

    ∵甲共获得$25$颗，乙共获得$15$颗，

    ∴前两次中，甲共获得$(25-c)$颗，乙获得$(15-c)$颗，

    ∴前两次丙比乙多获得的糖果数为$11-c-(15-c)=-4$（颗），

    ∵丙第一次获得糖果数至少为$1$，

    ∴第一次乙获得糖果数至少为$1+4=5$（颗），即$b\ 5$，

    ∵乙三次共获得$15$颗，

    ∴乙第一次获得糖果数至少为$15-3\times4=3$，即$b \leq 3$，

    ∴乙第一次获得糖果数为$3$，

    故答案为：$3,\ b$．'
