  question: '如图，AB是$\odot\odot$的直径，点C在$\odot\odot$上，$\angle BAC$的平分线交$\odot\odot$于点D，过点D的直线$EF \parallel BC$，分别交AB，AC的延长线于点E，F．

    [图]

    （1）求证：直线EF是$\odot\odot$的切线；

    （2）若$\sin \angle ABC = \frac{3}{5}$，$BE = 2$，求BC的长．'
  answer: （1）见解析； （2）$BC = \frac{24}{5}$．
  solution: '【小问1详解】

    证明：如图，连接OD．

    ∵$OA = OD$，

    ∴$\angle OAD = \angle ODA$．

    ∵AD平分$\angle BAC$，

    ∴$\Diamond OAD \cong \Diamond DAC$．

    ∴$\angle ODA = \angle DAC$．

    ∴$AC \parallel OD$．

    ∴$\angle ODE = \angle F$．

    ∵AB是$\odot\odot$的直径，

    ∴$\angle ACB=90^\circ$．

    ∵$EF \parallel BC$，

    ∴$\angle F = \angle ACB = 90^\circ$．

    ∴$\angle ODE=90^{\circ}$．

    即$OD \perp EF$．

    ∴直线EF是$\odot\odot$的切线．

    [图]【小问2详解】

    解：∵$BE = 2$，

    设$\odot\odot$的半径为r，则$OE=r+2$．

    ∵$EF \parallel BC$，

    ∴$\angle ABC = \angle E$．

    ∵$\sin \angle ABC = \frac{3}{5}$，

    在$Rt\triangle VOED$中，$\sin \angle E = \frac{OD}{OE} = \frac{3}{5}$．

    即$\frac{r}{r+2}=\frac{3}{5}$．

    ∴$r=3$．

    ∴$AB = 6$．

    ∴$AC = AB \sin \angle ABC = \frac{18}{5}$．

    在$Rt\triangle ABC$中，由勾股定理得$BC = \frac{24}{5}$．'
