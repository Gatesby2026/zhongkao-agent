  question: '方程组$\begin{cases}

    2x + y = -3 \\

    x - 2y = 1

    \end{cases}$的解为____________．'
  answer: $\left\{ \begin{array} { l } { x = - 1 , } \\ { y = - 1 } \end{array} \right.$
  solution: '解：$\begin{cases}

    2x + y = -3 \text{①} \\

    x - 2y = 1 \text{②}

    \end{cases}$，

    $\textcircled{1}\times 2+\textcircled{2}$得，$2(2x+y)+x-2y=-6+1$，

    $5x = -5$，

    $x = -1$，

    把$x = -1$代入①得，$2x(-1)+y=-3$，

    $y=-1$，

    ∴原方程组的解为$\left\{

    \begin{array}{l}

    x = -1 \\

    y = -1

    \end{array}

    \right.$，

    故答案为：$\left\{

    \begin{array}{l}

    x = -1 \\

    y = -1

    \end{array}

    \right.$．'
