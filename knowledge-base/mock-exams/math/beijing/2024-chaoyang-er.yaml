  question: '某校举办中华传统文化知识大赛，该校七年级共240名学生和八年级共260名学生都参加了比赛．为了解答题情况，进行了抽样调查，从这两个年级各随机抽取20名学生，获取了他们的成绩（百分制），并对数据（成绩）进行了整理、描述和分析．下面给出了部分信息．

    a．七、八两个年级学生成绩的频数分布直方图如下（数据分成4组：$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x \leq 100$）：

