    ∴$\angle DBE=45^{\circ}$．

    ∴$BE=DE=\frac{\sqrt{2}}{2}BD$．

    ∵$\angle BAD = \alpha$，

    ∴$\angle ABE = \angle ABD = \angle DBE = 45^\circ, \frac{\alpha}{2} = \angle ACD$．

    ∴$V_{\triangle ABE}=V_{\triangle ACE}$．

    ∴$AE = AF$，$BE=CF=\frac{\sqrt{2}}{2}BD$．

    ∴$EF = \sqrt{2}AE$．

    ∴$CD=DE+EF+CF$

    $=\sqrt{2}BD+\sqrt{2}AE$．'
