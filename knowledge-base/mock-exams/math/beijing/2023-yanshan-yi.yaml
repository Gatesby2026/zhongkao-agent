  question: '在平面直角坐标系xOy中、$\odot\odot$的半径为1，M为$\odot\odot$上一点，点$N(0,-2)$．对于点P给出如下定义：将点P绕点M顺时针旋转$90^\circ$，得到点$P''$，点$P''$关于点N的对称点为Q，称点Q为点P的“对应点”．

