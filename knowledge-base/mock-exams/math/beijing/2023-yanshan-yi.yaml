  question: '如图，在矩形$ABCD$中，点E在边AD上，$EF \perp BD$于点F．若$\frac{AB}{BC}=\frac{1}{2}$，$EF = 1$，则DE的长为__________．

    [图]'
  answer: $\sqrt{5}$
  solution: '解：∵四边形$ABCD$是矩形，

    ∴$BC = AD$，$\angle BAD = 90^\circ$，

    ∵$\frac{AB}{BC}=\frac{1}{2}$，

    ∴$\frac{AB}{AD}=\tan\angle ADB=\frac{1}{2}$，

    ∵$EF \perp BD$，

    ∴$\tan\angle ADB=\frac{EF}{DF}=\frac{1}{2}$，

    ∵$EF = 1$，

    ∴$DF=2$，

    ∴$DE=\sqrt{EF^{2}+DF^{2}}=\sqrt{1^{2}+2^{2}}=\sqrt{5}$，

    故答案为：$\sqrt{5}$．'
