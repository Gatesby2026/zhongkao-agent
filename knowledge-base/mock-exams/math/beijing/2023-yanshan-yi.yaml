- id: 20
  type: 解答
  score: 5
  question: '下面是证明三角形中位线定理的两种添加辅助线的方法，选择其中一种，完成证明．

    | 三角形中位线定理：三角形的中位线平行于三角形的第三边，并且等于第三边的一半． 已知：如图，在 $\triangle ABC$ 中，点 D ， E 分别是 AB ， AC 边的中点．求证： $DE \parallel BC$ ，且 $DE=\frac{1}{2}BC$ ． [图] |  |

    | --- | --- |

    | 方法一： 证明：如图，延长 DE 到点 F ，使 $EF = DE$ ，连接 FC ， DC ， AF ． [图] | 方法二： 证明：如图，取 BC 中点 G ，连接 GE 并延长到点 F ，使 $EF = GE$ ，连接 AF ． [图] |'
  answer: 证明见解析
  solution: '方法一：证明：如图，延长DE到点F，使$EF = DE$，连接FC，DC，AF，

    ∵E是AC的中点，

    ∴$AE = CE$，

    又∵$DE = FE,\ \angle AED = \angle CEF$，

    ∴$\triangle AED\cong\triangle CEF(SAS)$，

    ∴$AD = CF, \angle ADE = \angle CFE$，

    ∴$AD\parallel CF$，

    ∵D是AB的中点，

    ∴$AD = BD = CF$，

    ∴四边形$BCFD$是平行四边形，

    ∴$DF=BC,\ DF\parallel BC$，

    ∵$DE = FE$，

    ∴$DE=\frac{1}{2}DF-\frac{1}{2}BC$，

    ∴$DE \parallel BC$，且$DE=\frac{1}{2}BC$．

    方法二：证明：如图，取BC中点G，连接GE并延长到点F，使$EF = GE$，连接AF．

    同理可证$\triangle AEF\cong\triangle CEG$，

    ∴$CG = 4F, \angle AFE = \angle CGB$，

    ∴$AF \parallel CG$，

    ∵G是BC中点，

    ∴$BG = CG = AF$，

    ∴四边形$ABGF$是平行四边形，

    ∴$AB = GF$，

    ∵$D, E$分别是$AB,\ GF$的中点，

    ∴$BD=\frac{1}{2}AB=GE=\frac{1}{2}GF$，

    ∴$BD = GE$，

    又∵$BD\parallel GE$，

    ∴四边形$BDEG$是平行四边形，

    ∴$DE\parallel BG,\ DE=BG$，

    ∴$DE \parallel BC$且$DE=\frac{1}{2}BC$．'
