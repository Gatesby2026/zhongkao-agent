  solution: '【小问1详解】

    解：①如图所示，点Q即为所求；

    ②如图所示，过点$P''$作$P''T\perp y$轴于T，

    由旋转的性质可得$P''M = MP, \angle PMP'' = 90^\circ$，

    ∴$\angle TMP + \angle TPM = 90^\circ = \angle TMP'' + \angle OMP$，

    ∴$\angle TPM = \angle OMP$，

    又∵$\angle MTP=\angle POM=90^{\circ}$，

    ∴$\triangle MTP \cong \triangle POM \ (AAS)$，

    ∴$P''T = OM,\ MT = OP$，

    ∵$M(0,1),\ P(4,0)$，

    ∴$P''T = OM = 1,\ MT = OP = 4$，

    ∴$OT = 3$，

    ∴$P''(-1,-3)$，

    ∵$P''(-1,-3)$关于点$N(0,-2)$的对称点为Q，

    ∴$Q(1,-1)$，

    ∴$\partial Q=\sqrt{1^{2}+1^{2}}=\sqrt{2}$，

    ∵$OM = 1$，

    ∴$OQ = \sqrt{2}OM$；

    [图]【小问2详解】

    解：如图1所示，取$O_1(0,-t)$，连接$PP'',\ PO_{1},\ P''O_{1}$，

    ∴$OP = OO_{1}$，

    ∴$\angle OPO_{1}=45^{\circ},OP=\frac{\sqrt{2}}{2}$，

    ∵$P''M = MP, \angle PMP'' = 90^\circ$，

    ∴$\angle MPP=45^{\circ},\frac{MP}{PP}=\frac{\sqrt{2}}{2}$，$\frac{OP}{O_{1}P}=\frac{MP}{PP''}=\frac{\sqrt{2}}{2}$，

    ∴$\angle MPO = \angle P''PO_1$'
