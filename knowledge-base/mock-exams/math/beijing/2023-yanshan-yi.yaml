  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\ (k\neq0)$的图象由函数$y=2x$的图象平移得到，且经过点$A(2,0)$．

    （1）求该一次函数的解析式；

    （2）当$x>2$时，对于x的每一个值，函数$y = x + n$的值小于一次函数$y=kx+b(k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$y=2x-4$ （2）$n \leq -2$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\ (k\neq0)$的图象由函数$y=2x$的图象平移得到，

    ∴$k=2$，

    ∵一次函数$y=2x+b\,(k\neq0)$的图象经过$A(2,0)$，

    ∴$4+b=0$，

    解得$b = -4$，

    ∴一次函数解析式为$y=2x-4$；

    【小问2详解】

    解：由题意得，$x>2$是不等式$x+n<2x-4$的解集的一部分或是其解集，

    解不等式$x+n<2x-4$得$x>4+n$，

    ∴$4+n\leq2$，

    ∴$n \leq -2$．'
