  question: '某数学兴趣小组设计了一个弹珠投箱游戏：将无盖正方体箱子放在水平地面上，弹珠从箱外投入箱子，弹珠的飞行轨迹可以看作是抛物线的一部分．建立如图所示的平面直角坐标系（正方形$ABCD$为箱子正面示意图，x轴经过箱子底面中心，并与其一组对边平行）．某同学将弹珠从点P处抛出，弹珠的竖直高度y（单位：dm）与水平距离x（单位：dm）近似满足函数关系$y = a(x - h)^2 + k
    (a < 0)$．

    [图]

    下面是弹珠的水平距离x与竖直高度y的几组数据：

    | 水平距离 $x / \mathrm{dm}$ | 0 | 1 | 2 | 3 | 4 | 5 | 6 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 竖直高度 $y / dm$ | $2.50$ | $4.25$ | $5.50$ | $6.25$ | $6.50$ | $6.25$ | $5.50$ |

    （1）直接写出弹珠竖直高度的最大值，并求出满足的函数关系$y = a(x - h)^2 + k \, (a < 0)$；

    （2）若点B的坐标为$(8,0)$，$BC = 2\,\text{dm}$，则该同学抛出的弹珠__________投入箱子（填“能”或“不能”）．'
  answer: （1）$6.5\mathrm{dm}$，$y = -0.25(x - 4)^2 + 6.5$ （2）能
  solution: '【小问1详解】

    解：∵当$x=3$和$x = 4$时，y的值相同，

    ∴抛物线的对称轴为直线$x=\frac{3+5}{2}=4$，

    ∵$y = a(x - h)^2 + k \, (a < 0)$，

    ∴弹珠竖直高度的最大值为$6.5\mathrm{dm}$，

    ∴$y = a(x - 4)^2 + 6.5$，

    把$(0,2.5)$代入$y = a(x - 4)^2 + 6.5$中得：$2.5=a(0-4)^{2}+6.5$，

    解得$a = -0.25$，

    ∴$y = -0.25(x - 4)^2 + 6.5$

    【小问2详解】

    解：∵$B(8,0)$，

    ∴$OB = 8\,\text{dm}$

    由题意得，$CD = BC = 2\,\text{dm}$，

    ∴$OC = 10\,\text{dm}$，

    当$y=2$时，则$-0.25(x+4)^{2}+6.5=2$，解得$x=4\sqrt{2}$，

    ∵$8<4+3\sqrt{2}<10$，

    ∴该同学抛出的弹珠能投入箱子，

    故答案为：能．'
