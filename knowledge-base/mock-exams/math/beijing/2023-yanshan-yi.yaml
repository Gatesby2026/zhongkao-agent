  question: '甲、乙两名射击爱好者5次射击测试成绩（单位：环）的统计图如图所示．记甲、乙两人这5次测试成绩数据的平均数分别为$x_{\text{甲}}$，$\overline{x_{乙}}$，方差分别为$S_{\text{甲}}^{2}$，$S_{\mathrm{乙}}^{2}$，则$x_{\text{甲}}$__________$\overline{x_{乙}}$，$S_{\text{甲}}^{2}$__________$S_{\mathrm{乙}}^{2}$（填“﹥”，“﹤”或“=”）．

    [图]'
  answer: ①.$\gt$ ②.$=$
  solution: '解：甲的平均数是：$x_{\text{甲}}$$=(9.9+8.8)+(0+8)+5=8.8×3$；

    乙的平均数是：$\overline{x_{乙}}$$=(8+8+7+9+7)\div5=7.8$；

    ∴$\overline{x}_{甲}>\overline{x}_{乙}$

    甲的方差是：$s^{2}=\frac{1}{5}[(9-8.8)^{2}+(9-8.8)^{2}+(8-8.8)^{2}+(10-8.8)^{2}+(8-8.8)^{2}]=0.56$；

    乙的方差是：$S^{2}=\frac{1}{5}\left[\left(8-7.8\right)^{2}+\left(8-7.8\right)^{2}+\left(7-7.8\right)^{2}+\left(9-7.8\right)^{2}+\left(7-7.8\right)^{2}\right]=0.56$；

    $\therefore S_{\mathrm{p}}^{2}=0.56$，$S_{\angle}^{2}=0.56$，

    $\therefore S_{\mathrm{~s~e~t~}}^{2}=S_{\angle}^{2}$，

    故答案为：$>,=$'
