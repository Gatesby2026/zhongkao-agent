  question: '某工厂用甲、乙两种原料制作A，B，C三种型号的工艺品，三种型号工艺品的重量及所含甲、乙两种原料的重量如下：

    | 工艺品型号 | 含甲种原料的重量 $/kg$ | 含乙种原料的重量 $/kg$ | 工艺品的重量 $/kg$ |

    | --- | --- | --- | --- |

    | A | 3 | 4 | 7 |

    | B | 3 | 2 | 5 |

    | C | 2 | 3 | 5 |

    现要用甲、乙两种原料共$3\,\mathrm{kg}$，制作5个工艺品，且每种型号至少制作1个．

    （1）若$3\,\mathrm{kg}$原料恰好全部用完，则制作A型工艺品的个数为__________个；

    （2）若使用甲种原料不超过$13kg$，同时使用乙种原料最多，则制作方案中A，B，C三种型号的工艺品的个数依次为__________．'
  answer: ①.3 ②.1，1，3
  solution: '解：（1）设制作A、B、C三种类型的工艺品分别为x个，y个，z个，

    由题意得，$\begin{cases}

    7x + 8y + 5z = 31 \\

    x + y + z = 5

    \end{cases}$，

    解得$x=3$，

    ∴制作A型工艺品的个数为3个，

    故答案为：3；

    （2）设制作A、B、C三种类型的工艺品分别为a个，b个，c个，

    由题意得，$\begin{cases}

    3a+3b+2c\leq13\\

    a+b+c=5

    \end{cases}$，

    ∴$3a+3(5-a-c)+2c\leq13$，

    ∴$c^{2}$，

    ∴$2 \leq c \leq 3$

    ∵使用乙种原料最多，

    ∴A、B的个数要尽可能的少，B的个数要尽可能的多，

    ∴$c=3,\ a=1,\ b=1$，

    故答案为：1，1，3．'
