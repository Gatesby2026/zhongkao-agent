  question: '在第四个国际数学日（2023年3月14日）到来之际，燕山地区举办了“数学节”，通过数学素养竞赛、数学创意市集、数学名师讲座等活动，展现数学魅力、传播数学文化．为了解学生数学素养竞赛的答题情况，从甲、乙两校各随机抽取了20名学生成绩（单位：分）的数据，并对数据进行整理、描述和分析．下面给出了部分信息：

    [图]

    a．乙校学生成绩数据的频数分布直方图如下图所示

    （数据分为四组：$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x \leq 100$）

    b．乙校学生成绩数据在$80 \leq x < 90$这一组的是：

    80  81  81  82  85  86  88  88

    c．甲、乙两校学生成绩数据的平均数、中位数、众数如下：

    | 学校 | 平均数 | 中位数 | 众数 |

    | --- | --- | --- | --- |

    | 甲 | $79.2$ | 79 | 78 |

    | 乙 | $79.7$ | m | 76 |

    根据以上信息，回答下列问题：

    （1）写出表中m的值；

    （2）在甲、乙两校抽取的学生中，记成绩高于各自学校平均分的人数分别为p，q，则p__________q（填“$\gt$”，“$\gt$”或“$=$”），理由是____________________．

    （3）若乙校共有160名学生参加了该数学素养竞赛，且成绩不低于80分的学生可获得“学生之星”的称号，估计乙校获得“数学之星”称号的学生有__________人．'
  answer: （1）$80.5$ （2）$\gt$，理由见解析 （3）$88$
  solution: '【小问1详解】

    解：由题意得，乙校一共有$3+6+8+3=20$人，

    将乙校学生成绩按照从低到高排列，处在第10名和第11名的成绩分别为80，81，

    ∴乙校学生的中位数$m=\frac{80+31}{2}=80.5$；

    $[公式]$小问2详解】

    解：$p<q$，理由如下：

    ∵甲校成绩的中位数为79，低于其平均数$79.2$，而乙校的中位数为$80.5$，高于其平均成绩$79.7$，

    ∴乙校高于平均成绩的人数更多，即$p<q$；

    【小问3详解】

    解：$160\times\frac{8+3}{20}=88$人，

    ∴估计乙校获得“数学之星”称号的学生有$88$人，

    故答案为：$88$．'
