  question: 已知$x^{2}+3x-5=0$，求代数式$(x+3)^{2}+3x(x+2)$的值．
  answer: $29$
  solution: '解：∵$x^{2}+3x-5=0$，

    ∴$x^2 + 3x = 5$，

    ∴$(x+3)^{2}+3x(x+2)$

    $x^{3}+6x+9+3x^{2}+6x$

    $=4x^{2}+12x+9$

    $=4(x^{2}+3x)+9$

    $=4\times5+9$

    $=29$．'
