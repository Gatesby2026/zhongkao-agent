    B．$(x-1)^2=x^2-2x+1$，故该选项不正确，不符合题意；

    C．$\sqrt{(-2)^2} = 2$，故该选项不正确，不符合题意；

    D．$\frac{x-1}{x+1}+\frac{2}{x+1}=\frac{x+1}{x+1}$，故该选项正确，符合题意；

    故选D'
