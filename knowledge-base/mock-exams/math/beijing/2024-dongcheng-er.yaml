  answer: $3$或$-1$
  solution: '解：设方程的两个根为$x_{1}$，$x_2$，

    由题意得：$x_{+}+x_{-}=m+1$，$x_{1}x_{2}=m$，$x_{1}-x_{2}=2$，

    $\gamma(x_1+x_2)^2=(x_1-x_2)^2+4x_1\cdot x_2$，

    $\left(1.m+1\right)^{2}=2^{2}+4m$，

    解得：$m = 3$或$m = -1$，

    当$m = 3$时，$\Delta = \left[ -(m+1) \right]^2 - 4m = 16 - 12 = 4 > 0$，符合题意；

    当$m = -1$时，$\Delta = \left[ - (m + 1) \right]^2 - 4m = 0 - (-4) = 4 > 0$，符合题意，

    综上所述，实数m的值是$3$或$-1$，

    故答案为：$3$或$-1$．'
