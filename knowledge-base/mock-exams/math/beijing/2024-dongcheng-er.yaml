    [图]'
  answer: 一块八边形地砖的面积为$700\mathrm{cm}^2$，黑色正方形地砖的面积为$200\mathrm{cm}^2$
  solution: '解：设等腰直角三角形直角边长为xcm，则斜边度为$\sqrt{2}x\mathrm{cm}$，根据题意得，

    $4\left(30^{\circ}-4\times\frac{1}{2}x\right)^{2}+\left(\sqrt{2}x\right)^{2}=3000$，

    $4\left(900-2x^{2}\right)+\left(\sqrt{2}x\right)^{2}=3000$

    $6x^2 = 600$

    解得，$x = \pm 10$，

    ∵$x > 0$

    ∴$x = 10$

    ∴黑色正方形地砖的面积$\sqrt{2}\times\pi\times10=200\mathrm{cm}^{2}$；

    则一块八边形地砖的面积$\frac{3600-200}{4}=700\mathrm{cm}^{2}$，

    答：一块八边形地砖的面积为$700\mathrm{cm}^2$，黑色正方形地砖的面积为$200\mathrm{cm}^2$．'
