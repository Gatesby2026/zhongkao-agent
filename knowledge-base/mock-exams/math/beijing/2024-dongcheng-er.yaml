  question: 若$m^{2}+m-5=0$，则代数式$\left(\frac{1}{m}-\frac{1}{m^{2}}\right)\div\frac{m-1}{10m}$的值为________．
  answer: $2$
  solution: '解：$m^{2}+m-5=0$，

    $m^{2}+m=5$，

    $\left(-\frac{1}{m}-\frac{1}{m^{2}}\right)\cdot\frac{m^{2}-1}{10m}$

    $=\frac{m-1}{m^{2}}+\frac{(m+1)(m-1)}{10m}$

    $\frac{m-1}{m^{2}}-\frac{10m}{(m+1)(m-1)}$

    $=\frac{10}{m(m+1)}$

    $\frac{10}{m^{2}+m}$

    $=\frac{10}{5}$

    $=2$，

    故答案为：$2$．'
