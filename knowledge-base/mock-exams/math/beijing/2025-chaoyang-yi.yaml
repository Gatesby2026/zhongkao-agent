    $\cdot CE \parallel AD$，$CE = 2AD$，

    ∵延长DA至点F，使$AF = AD$，

    $\therefore DF = 2AD$，

    $\therefore CE = DF$，

    ∴四边形$CDFE$是平行四边形；

    【小问2详解】

