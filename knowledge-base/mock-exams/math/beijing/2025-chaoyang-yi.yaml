  - id: 19
    type: 解答
    score: 5
    question: "已知2x+y-3=0，求代数式 [2(x-2y)+3y]/(4x²-y²) 的值。"
    answer: "1/3"
    solution: |
      原式 = (2x-4y+3y)/(4x²-y²) = (2x-y)/((2x+y)(2x-y)) = 1/(2x+y)
      由2x+y-3=0得2x+y=3
      原式 = 1/3
    knowledge_points: [分式化简求值, 因式分解]
    module: numbersAndExpressions
    difficulty: 基础
    recommended_for: [L0, L1, L2, L3]

