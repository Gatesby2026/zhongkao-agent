      小明搭飞机产生碳排放530kg，决定从开私家车改为公交或骑车上下学来抵消。
      私家车0.27kg/km，公交0.20kg/km，骑车0。每天往返20km，100天内最多几天可以乘公交？
    answer: "最多2天"
    solution: |
      设x天乘公交，则(100-x)天骑车
      减少的碳排放：20×0.27×100 - 20×0.20×x ≥ 530
      540 - 4x ≥ 530 → x ≤ 2.5
      最多2天
    knowledge_points: [一元一次不等式, 实际问题]
    module: equationsAndInequalities
    difficulty: 中档
