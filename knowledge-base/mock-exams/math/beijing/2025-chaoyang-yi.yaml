  question: '某工厂生产的一种产品由A，B两种零件各一个组装而成（组装时间忽略不计），该工厂有$4$条流水线生产这两种零件，一天的生产数量如下（单位：个）：

    | 零件 | 流水线 $1$ | 流水线 $2$ | 流水线 $3$ | 流水线 $4$ |

    | --- | --- | --- | --- | --- |

    | A | $80$ | $90$ | $70$ | $60$ |

    | B | $100$ | $120$ | $110$ | $70$ |

    程序需要提前设定，所以每条流水线一天只能生产同一种零件，第二天可以更换．

    （1）如果只开通其中一条流水线，$7$天最多生产该产品______件；

    （2）如果$4$条流水线都开通，$7$天最多生产该产品______件．'
  answer: ①.$360$ ②.$1250$
  solution: '解：（$1$）如果只开通一条流水线，比较可知，开通流水线$2$最合适，零件A生产$4$天共$360$个，零件B生产$3$天共$360$个，$7$天正好可以生产$360$个，

    故答案为：$360$；

    （$2$）整体比较各条流水线的产能，$\frac{100}{80}=1.25$$\frac{120}{90}=1.31$，$\frac{110}{70}\approx1.56$，$\frac{70}{60}=1.16$，

    流水线$4$只生成A最合适，$7$天生成$420$个A；

    流水线$3$只生成B最合适，$7$天生成$770$个A；

    流水线$1$只生成A最合适，$7$天生成$560$个A；

    产能最高的流水线B，负责调配差额，讨论可得，$3$天生产$270$个A，$4$天生成$480$个B，

    综上可得，$7$天共生成$1250$个零件，

    故答案为：$1250$．'
