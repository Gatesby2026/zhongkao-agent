  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图象经过点$A(1,2)$和$B(0,-1)$．

    （1）求该函数的表达式；

    （2）当$x>1$时，对于x的每一个值，函数$y = x + n$的值小于函数$y=kx+b\,(k\neq0)$的值且大于0，直接写出n的取值范围．'
  answer: （1）$y=3x-1$ （2）$-1\leq n\leq 1$
  solution: '【小问1详解】

    解：由题意得：将点$A(1,2)$和$B(0,-1)$代入$y=kx+b\,(k\neq0)$中得：

    $\left\{ \begin{array} { l } { k + b = 2 } \\ { b = - 1 } \end{array} \right.$，

    解得：$\left\{\begin{array}{l}k=3\\b=-1\end{array}\right.$，

    ∴该函数解析式为：$y=3x-1$；

    【小问2详解】

    解：当$x = 1$时，代入$y=3x-1$得：$y=2$，

    在平面直角坐标系中画出直线$y=3x-1$和满足条件的直线$y = x + n$，如图：

    [图]

    ∵当$x>1$时，对于x的每一个值，函数$y = x + n$的值小于函数$y=kx+b\,(k\neq0)$的值，

    ∴当$y = x + n$过$(1,2)$时满足题意，

    ∴$1+n=2$，$n = 1$，

    ∵当$x>1$时，对于x的每一个值，函数$y = x + n$的值大于0，

    ∴当$y = x + n$过$(1,0)$时满足题意，

    ∴$1+n=0$，$n = -1$，

    综上：满足条件的n的取值范围为：$-1\leq n\leq 1$．'
