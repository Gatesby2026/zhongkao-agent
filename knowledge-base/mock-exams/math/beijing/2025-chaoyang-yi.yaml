  question: 方程$\frac{2}{x+3}+\frac{1}{x}=0$的解为___________．
  answer: $x = -1$
  solution: '解：$\frac{2}{x+3}+\frac{1}{x}=0$

    去分母得：$2x+x+3=0$，

    移项得：$x+2x=-3$，

    合并同类项得：$3x = -3$，

    系数化为1得：$x = -1$，

    检验，当$x = -1$时，$x(x+3)\neq0$，

    ∴$x = -1$是原方程的解，

    故答案为：$x = -1$．'
