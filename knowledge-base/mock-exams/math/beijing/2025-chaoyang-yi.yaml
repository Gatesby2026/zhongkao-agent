  question: '实数a，b在数轴上的对应点的位置如图所示，下列结论中错误的是（）

    [图]

    A.$a > -3$

    B.$|a| > 3$

    C.$b-a>4$

    D.$a+b<0$'
  answer: A
  solution: '解：由数轴可知$-4 < a < -3$，$1<b<2$，

    A、从数轴上看，a在$-3$左侧，所以$a < -3$，而不是$a > -3$，原说法错误，故该选项符合题意；

    B、因为$-4 < a < -3$，所以$3<|a|<4$，故原说法正确，该选项不符合题意；

    C、因为$-4 < a < -3$，$1<b<2$，那么$b-a=b+(-a)$，$-a > 3$，$b>1$，所以$b-a>1+3$故原说法正确，该选项不符合题意；

    D、因为$-4 < a < -3$$a < -3$，$1<b<2$，所以$\left|b\right|>\left|a\right|$，故$a+b<0$，原说法正确，该选项不符合题意；

    故选：A．'
