  question: '“端午节”是中国的一个传统节日，某粽子厂为迎接端午的到来，组织了“浓情端午，长粽叶飘香”的包粽子比赛，规定粽子质量为$(160\pm3)$克时都符合标准，其中质量$(160\pm1)$为优秀产品．现从甲、乙两位员工所包粽子中各随机抽取10个进行评测，数据如下（单位：克）：

    甲

    157

    157

    159

    159

    160

    161

    161

    161

    162

    163

    乙

    158

    158

    159

    159

    159

    159

    161

    162

    162

    163

    甲、乙两名员工所包粽子质量的平均数、众数、中位数如下：

    员工

    平均数

    中位数

    众数

    甲

    160

    160.5

    a

    乙

    160

    b

    159

    根据以上信息，回答下列问题：

    （1）上表中的$a =$_______，$b =$_______；

    （2）如果从甲、乙两名员工中，选取一位包粽子质量稳定的员工给奖，这名员工是______；

    （3）在此次比赛中，在相同时间内，甲员工共包了100个粽子，乙员工共包了104个粽子，估计两位员工各自所包粽子质量属于“优秀产品”的个数，并判断如果以优秀率作为评奖标准时，哪位员工能获奖？并说明理由．'
  answer: （1）$161,159$（2）乙 （3）甲的优秀品的个数为$60$个，乙的优秀品的个数为$52$个，甲能获奖，理由见详解
  solution: '【小问1详解】

    解：甲的数据中，161出现的次数最多，

    ∴$a=161$，

    乙数据的中位数为$b=\frac{159+159}{2}=159.$，

    故答案为：$161,159$；

    【小问2详解】

    解：$s_{n}^{2}=\frac{1}{10}\left[(157-160)^{2}\times 2+(159-160)^{2}\times 2+\cdots\right]$$(160-160)^2+(161-160)^2\times3+(162-160)^2+(163-160)^2$

    $=3.6$，

    $s_{2}^{2}=\frac{1}{10}[(158-160)^{2}\times 2+(159-160)^{2}\times 3+$$(161-160)^{2}+(162-160)^{2}\times 2+(163-160)^{2}$

    $=3$，

    ∵$s_{甲}^{2}>s_{乙}^{2}$，

    ∴乙包粽子质量更稳定，

    故选：乙；

    【小问3详解】

    解：甲的优秀品的个数为$60$个，乙的优秀品的个数为$52$个，甲能获奖，理由如下，

    ∵质量$(160\pm1)$为优秀产品，

    ∴优秀品的质量范围为：$159 \sim 161$，

    ∴甲的优秀品的个数为：$100\times\frac{6}{10}=60$个，优秀率为：$\frac{6}{10}\times100\%=60\%$，

    乙的优秀品的个数为：$104\times\frac{5}{10}=52$个，优秀率为：$\frac{5}{10}\times100\%=50\%$，

    ∵$60\%>50\%$，

    ∴以优秀率作为评奖标准时，甲能获奖．'
