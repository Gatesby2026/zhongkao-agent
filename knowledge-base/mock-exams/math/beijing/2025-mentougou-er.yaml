  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\,(k\neq0)$的图象由函数$y = -x$的图象平移得到，且经过点$(2,1)$．

    （1）求这个一次函数的表达式；

    （2）当$x<2$时，对于x的每一个值，函数$y = mx - 1 \, (m \neq 0)$的值小于一次函数$y=kx+b$的值，直接写出m的取值范围．'
  answer: （1）$y=-x+3$； （2）$-1\leq m\leq 1$且$m \neq 0$．
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b(k\neq0)$的图像由函数$y = -x$的图象平移得到的，

    ∴$k = -1$．

    将点$(2,1)$代入$y=kx+b$，得$b=3$，

    ∴一次函数的表达式是$y=-x+3$；

    【小问2详解】

    解：∵将$x = 0$代入函数$y = mx - 1 \, (m \neq 0)$，则$y=-1$，

    ∴函数$y = mx - 1 \, (m \neq 0)$的图象过定点$(0,-1)$，

    将$(2,1)$代入$y = mx - 1$中，解得$m = 1$，

    如图，

    [图]

    ∵当$x<2$时，对于x的每一个值，函数$y = mx - 1 \, (m \neq 0)$的值小于一次函数$y=-x+3$的值，

    ∴$-1\leq m\leq 1$且$m \neq 0$．'
