  question: '已知关于x的一元二次方程$x^{2}+2x+2k-4=0$有两个不相等的实数根．

    （1）求k的取值范围；

    （2）若k为正整数，且该方程的根都是整数，求k的值．'
  answer: （1）k＜$\frac{5}{2}$；（2）2
  solution: '解：（1）∵关于x的一元二次方程$x^{2}+2x+2k-4=0$有两个不相等的实数根，

    ∴$\Delta=2^{2}-4(2k-4)=20-8k>0$．

    解得：k＜$\frac{5}{2}$；

    （2）∵k为正整数，

    ∴k=1或2．

    当k=1时，方程为$x^{2}+2x-2=0$，两根为$\frac{-2+\sqrt{4+8}}{2}-1=\sqrt{3}$，非整数，不合题意；

    当k=2时，方程为$x^{2}+2x=0$，两根为$x = 0$或$x = -2$，都是整数，符合题意．

    ∴k的值为2．'
