  question: '某商店购进600个旅游纪念品，进价为每个6元，第一周以每个10元的价格售出200个，第二周若按每个10元的价格销售仍可售出200个，但商店为了适当增加销量，决定降价销售（根据市场调查，单价每降低1元，可多售出50个，但售价不得低于进价），单价降低x元销售一周后，第三周商店对剩余旅游纪念品清仓处理，以每个4元的价格全部售出．

    （1）用含x的代数式表示第二周旅游纪念品销售数量为______个，第三周旅游纪念品销售数量为______个；

    （2）如果这批旅游纪念品共获利1250元，问第二周每个旅游纪念品的销售价格为多少元？'
  answer: （1）$200 + 50x$，$200-50x$ （2）9元
  solution: '【小问1详解】

    解：单价降低x元，由题意可得第二周的销售数量为$(200 + 50x)$个；

    则第三周的销售量为：$600-200-(200+50x)=300-50x$个．

    故答案为：$200 + 50x$，$200-50x$．

    【小问2详解】

    解：由题意可得：$200\times10+(200+50x)(10-x)+4(200-50x)-600\times6=1250$，

    整理得：$x^{2}-2x+1=0$，解得：$x = 1$，

    所以第二周每个旅游纪念品的销售价格为$10-x=10-1=9$元．'
