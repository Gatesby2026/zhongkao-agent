  question: '在平面直角坐标系xOy中，点$(2,n)$在抛物线$y = x^{2} + (k - 2)x + 4k$上，且它的对称轴为直线$x = t$．

    （1）当$n = 0$时，求t的值；

    （2）如果点$A(t+k,y_{1})$，$B(t-2k,y_{2})$在抛物线上，当$k<0$时，比较$y_{1}$和$y_{2}$$[公式]$大小，并说明理由．'
  answer: （1）$t = 1$ （2）$y_{2}>y_{1}$
  solution: '【小问1详解】

    解：当$n = 0$时，把$(2,0)$代入$y = x^{2} + (k - 2)x + 4k$，

    则$4+2(k-2)+4k=0$，

    解得：$k = 0$，

    ∴抛物线为：$y = x^2 - 2x$，

    ∴$t = \frac{-2}{2 \times 1} = 1$；

    【小问2详解】

    解：∵$k<0$，

    ∴$t+k<t$，$t - 2k > t$，

    ∴点$A(t+k,y_{1})$在对称轴左侧，点$B(t-2k,y_{2})$在对称轴右侧，

    ∴点$B(t-2k,y_{2})$关于对称轴直线$x = t$的对称点为：$B''(l+2k,y_{2})$，

    ∵$k<0$，

    ∴$t+2k<t+k$，

    ∵抛物线开口向上，

    ∴在对称轴左侧y随x增大而减小，

    ∴$y_{2}>y_{1}$．'
