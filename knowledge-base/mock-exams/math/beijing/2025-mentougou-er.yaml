  question: '如图，AB是$\odot\odot$直径，$CD \perp AB$于E，连接BC、BD和OD，如果$\angle CBA=25^{\circ}$，那么$\angle ODC =$_______度．

    [图]'
  answer: $40$
  solution: '解：∵AB是$\odot\odot$直径，$CD \perp AB$于E，

    ∴$CE = DE$，$\angle CEB=\angle DEB=90^\circ$，

    ∵$CE=DE,\angle CEB=\angle DEB,BE=BE$，

    ∴$\angle CEP \cong \angle DEB (SAS)$，

    ∴$\angle ABD=\angle ABC=25^{\circ}$，

    ∵$\overset{\diamondsuit}{AD}$所对的圆周角为$\angle ABD$，所对的圆心角为$\angle AOD$，

    ∴$\angle AOD=2\angle ABD=50^{\circ}$，

    在$Rt\triangle ODE$中，$\angle ODC=90^{\circ}-\angle AOD=90^{\circ}-50^{\circ}=40^{\circ}$，

    故答案为：$40$．'
