  question: '如图，在矩形$ABCD$中，$AB=4$，$BC=6$，若点E是边CD的中点，连接AE，过点B作$BF \perp AE$于点F，则BF的长为____________________．

    [图]'
  answer: $\frac{6\sqrt{10}}{5}$
  solution: '解：∵四边形$ABCD$是矩形，

    $\ldots CD-AB-4$，$AD=BC=6$，$AB\parallel CD$，

    $\angle BAF = \angle AED$，

    ∵E是边CD的中点，

    $\therefore DE=\frac{1}{2}CD=2$，

    $AE=\sqrt{AD^{2}+DE^{2}}=\sqrt{6^{2}+2^{2}}=2\sqrt{10}$，

    $\because BF \perp AE$，

    $\angle BFA=90^{\circ}=\angle D$，

    $\triangle ABF \sim \triangle EAD$，

    $\therefore \frac{AB}{AE} = \frac{BF}{AD}$，

    即$\frac{4}{2\sqrt{10}}=\frac{BF}{6}$，

    解得：$BF = \frac{6\sqrt{10}}{5}$，

    故答案为：$\frac{6\sqrt{10}}{5}$．'
