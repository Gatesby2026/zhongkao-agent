  question: '射门是足球比赛$[公式]$重要得分手段，运动员踢出的足球在空中的飞行路线可以看作是抛物线的一部分．如图所示建立平面直角坐标系xOy，足球在空中的飞行过程中，足球距离地面OA的竖直高度y（单位：米）与距离球门OB的水平距离x（单位：米）近似满足函数关系$y = a(x - h)^2 + k \, (a < 0)$．

    [图]

    （1）小明第一次射门时，记录了水平距离x与竖直高度y的几组数据如下：

    水平距离x/米

    1

    2

    3

    4

    5

    6

    竖直高度y/米

    $\frac{35}{12}$

    3

    $\frac{35}{12}$

    $\frac{8}{3}$

    $\frac{9}{4}$

    $\frac{5}{3}$

    根据上述数据，回答下列问题：

    ①求函数关系式$y = a(x - h)^2 + k \, (a < 0)$；

    ②如果球门高$OB = 2.44$米，在没有守门员情况下，判断该球______（填“能”或“不能”）射进球门（忽略足球大小及其它因素影响）；

    （2）点C为OB上一点，$OC = 2.25$米，现在小明从原有位置带球向正后方移动n米再射门，如果足球在空中飞行路线的形状与最大高度均保持不变，当足球射进区域OC（含点O和C）时，忽略足球大小及其它因素的影响，直接写出n的取值范围．'
  answer: （1）①$y = -\frac{1}{12}(x - 2)^2 + 3$；②不能 （2）$1 \leq n \leq 4$
  solution: '【小问1详解】

    解：①由表格得：抛物线的顶点为$(2,3)$，且过点$\left(4,\frac{8}{3}\right)$，

    ∴$y=a(x-2)^{2}+3$，

    ∴$\frac{8}{3}-a(4-2)^{2}+3$，

    解得：$a = -\frac{1}{12}$，

    ∴y与x之间的函数关系式为$y = -\frac{1}{12}(x - 2)^2 + 3$；

    ②当$x = 0$时，$y=-\frac{1}{12}(0-2)^{2}+3$，

    解得：$y=\frac{8}{3}+2.67>2.44$，

    ∴球不能射进球门；

    【小问2详解】

    解：依题意，小明带球向正后方移动n米，则移动后的抛物线为$y = -\frac{1}{12}(x - 2 - n)^2 + 3$，

    把点$(0.25)$代入$y = -\frac{1}{12}(x - 2 - n)^2 + 3$，得：$2.25=-\frac{1}{12}(0-2-n)+3$，

    解得$n = -5$（舍去）或$n = 1$，

    把点$(0,0)$代入$y = -\frac{1}{12}(x - 2 - n)^2 + 3$，得：$0 = -\frac{1}{12}(0 - 2 - \pi)^2 + 3$，

    解得$n = -8$（舍去）或$n = 4$，

    即$1 \leq n \leq 4$．'
