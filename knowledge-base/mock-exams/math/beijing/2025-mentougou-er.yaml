  question: '某快递公司因天气原因需将五种货物进行延迟配送，每名配送员每次只能配送一种货物，从配送开始起进行计时，每延迟一分钟需赔付1元，忽略其它因素的影响，五种货物的配送时间如下表：

    货物

    A

    B

    C

    D

    E

    配送时间（分钟）

    5

    8

    9

    7

    10

    （1）如果由一名配送员进行配送，那么下列三个配送顺序：①$D \to B \to E \to A \to C$；②$D \to A \to C \to E \to B$；③$C \to A \to E \to B \to D$中，赔付最少的是_______（填序号）；

    （2）如果由两名配送员同时进行配送，最少需要赔付_______元．'
  answer: ①.②②.64
  solution: '解：（1）①总赔付：$5\times7+4\times8+3\times10+2\times5+9=116$（元），

    ②总赔付：$5\times7+4\times5+3\times9+2\times10+8=110$（元），

    ③总赔付：$5\times9+4\times5+3\times10+2\times8+7=118$（元），

    ∴赔付最少的是②，

    故答案为：②；

    （2）解：因为赔付最少，就要使配送的时间尽量短，显然先配送时间短的，所以先配送A和D时间短的；然后再配送剩下的时间的短的，最后一名配送员配送时间最长的，

    一名配送员按$A, B, E$的顺序送，另一名配送员按$D, C$的顺序送，配送最少，

    $A, B, E$配送赔付：$5\times3+8\times2+10\times1$（元），

    $D, C$配送赔付：$7\times2+9$（元），

    共需要最少赔付：$5\times3+8\times2+10\times1+7\times2+9=64$（元），

    故答案为：64．'
