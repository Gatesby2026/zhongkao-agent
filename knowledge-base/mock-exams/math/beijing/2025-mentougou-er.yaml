  question: '如图，在$V_{ABC}$中，$AB = AC$，以AB为直径的$\odot\odot$与边BC、AC分别交于D、E两点，$DF \perp AC$于点F．

    [图]

    （1）求证：DF与$\odot\odot$的切线；

    （2）若$\sin C = \frac{4}{5}$，$CF = 9$，求BD和AE的长．'
  answer: （1）详见解析 （2）$BD = 15$，$AE = 7$，详见解析
  solution: '【小问1详解】

    连接OD，AD，

    [图]

    ∵AB是$\odot\odot$的直径，

    ∴$\angle ADB=90^\circ$，

    又∵$AB = AC$，

    ∴$BD = CD$，

    又∵$OB = OA$，

    ∴$OD \parallel AC$，

    ∵$DF \perp AC$，

    ∴$OD \perp DF$，

    又∵OD为$\odot\odot$的半径，

    ∴DF为$\odot\odot$的切线．

    【小问2详解】

    连接BE，DA，

    [图]

    ∵在$\mathrm{Rt}\triangle DFC$中，$\sin C = \frac{4}{5}$，

    ∴$DF=\frac{4}{5}DC$，$DF^{2}+CF^{2}=DC^{2}$，

    ∵$CF = 9$，

    ∴$\left(\frac{4}{5}DC\right)^{2}+9^{2}=DC^{2}$，

    ∴$DC = 15$，$DF = 12$，

    ∴$BD = DC = 15$，

    ∴$BC = 2CD = 30$，

    ∵AB为直径，$DF \perp AC$，

    ∴$\angle BDA=\angle BEA=\angle DFC=90^{\circ}$，

    ∴$DF \parallel BE$，

    ∴$\frac{CD}{BD}=\frac{CF}{EF}=1$

    ∴$CF = EF = 9$，

    ∴$AB = AC = AE + EF + CE = AE + 9 + 9 = AE + 18$，$CE = 9 + 9 = 18$，

    在$Rt\triangle BEC$中，由勾股定理得：$BE=\sqrt{30^{2}-18^{2}}=24$，

    在$Rt\triangle BAE$中，由勾股定理得：$AE^{2}+24^{2}=(AE+18)^{2}$，

    解得：$AE = 7$．'
