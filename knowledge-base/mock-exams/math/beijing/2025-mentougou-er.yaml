  question: 已知$x + 2y - 1 = 10$，求代数式$\frac{2x+4y}{x^{2}+4xy+4y^{2}}$的值．
  answer: $\frac{2}{x+2}y^{2}11$
  solution: '解：$\frac{2x+4y}{x^{2}+4xy+4y^{2}}$

