  question: '已知：在平面直角坐标系xOy中，一次函数$y=kx-4k$的图象与x轴交于点A，抛物线$y = ax^{2} + bx + c$经过O、A两点。

    （1）试用含a的代数式表示b；

    （2）设抛物线的顶点为D，以D为圆心，DA为半径的圆被x轴分为劣弧和优弧两部分。若将劣弧沿x轴翻折，翻折后的劣弧落在⊙D内，它所在的圆恰与OD相切，求⊙D半径的长及抛物线的解析式；

    （3）设点B是满足（2）中条件的优弧上的一个动点，抛物线在x轴上方的部分上是否存在这样的点P，使得$\angle POA=\frac{4}{3}\angle OBA$？若存在，求出点P的坐标；若不存在，请说明理由。

    （1）解法一：∵一次函数$y=kx-4k$的图象与x轴交于点A

    ∴点A的坐标为（4，0）

    ∵抛物线$y = ax^{2} + bx + c$经过O、A两点

    $\ldots c=0,\ 16a+4b=0$

    $\therefore b = -4a$ ………………1分

    解法二：∵一次函数$y=kx-4k$的图象与x轴交于点A

    ∴点A的坐标为（4，0）

    ∵抛物线$y = ax^{2} + bx + c$经过O、A两点

    ∴抛物线的对称轴为直线$x=2$

    $\therefore x=-\frac{b}{2a}=2$

    $\therefore b = -4a$ ………………1分

    （2）解：由抛物线的对称性可知，DO＝DA

    ∴点O在⊙D上，且∠DOA＝∠DAO

    又由（1）知抛物线的解析式为$y = ax^2 - 4ax$

    ∴点D的坐标为（$2,\ -4a$）

    ①当$a>0$时，

    $\angle D''OA = \angle DOA$

    如图1，设⊙D被x轴分得的劣弧为$\overset{\frown}{OmA}$，它沿x轴翻折后所得劣弧为$\widehat{O n A}$，显然$\widehat{O n A}$所在的圆与⊙D关于x轴对称，设它的圆心为D''

    ∴点D''与点D也关于x轴对称

    ∵点O在⊙D''上，且⊙D与⊙D''相切

    ∴点O为切点………………2分

    ∴D''O⊥OD

    ∴∠DOA＝∠D''OA＝45°

    ∴△ADO为等腰直角三角形

    $\therefore OD = 2\sqrt{2}$ ………………3分

    ∴点D的纵坐标为$-2$

    $\therefore -4a = -2 \\

    \therefore a = \frac{1}{2},\quad b = -4a = -2$

    ∴抛物线的解析式为$y=\frac{1}{2}x^{2}-2x$………………4分

    ②当$a < 0$时，

    同理可得：$OD = 2\sqrt{2}$

    抛物线的解析式为$y = -\frac{1}{2}x^2 + 2x$………………5分

    综上，⊙D半径的长为$2\sqrt{2}$，抛物线的解析式为$y=\frac{1}{2}x^{2}-2x$或$y = -\frac{1}{2}x^2 + 2x$

    （3）解答：抛物线在x轴上方的部分上存在点P，使得$\angle POA=\frac{4}{3}\angle OBA$

    设点P的坐标为（x，y），且y＞0

    ①当点P在抛物线$y=\frac{1}{2}x^{2}-2x$上时（如图2）

    $\angle PAB = \angle PBA$

    ∵点B是⊙D的优弧上的一点

    $\angle OBA=\frac{1}{2}\angle ADO=45^{\circ}$

    $\angle POA=\frac{4}{3}\angle OBA=60^{\circ}$

    过点P作PE⊥x轴于点E

    $\begin{aligned}

    &1. \tan \angle POE = \frac{EP}{OE} \\

    &2. \frac{y}{x} = \tan 60^\circ \\

    &3. y = \sqrt{3}x

    \end{aligned}$

    由$\begin{cases}

    y = \sqrt{3}x \\

    y = \dfrac{1}{2}x^2 - 2x

    \end{cases}$解得：$\left\{\begin{array}{l}x_{1}=4+2 \sqrt{5} \\ y_{1}=6+4 \sqrt{5}\end{array}\right.\left\{\begin{array}{l}x_{2}=0 \\ y_{2}=0\end{array}\right.$（舍去）

    ∴点P的坐标为$\left(4+2\sqrt{3},\ 6+4\sqrt{3}\right)$………………7分

    ②当点P在抛物线$y = -\frac{1}{2}x^2 + 2x$上时（如图3）

    $\angle AOB = 90^\circ$

    同理可得，$y=\sqrt{3}x$

    由$\begin{aligned}

    & y = \sqrt{3}x \\

    & y = -\frac{1}{2}x^2 + 2x

    \end{aligned}$解得：$\left\{\begin{array}{l}x_{1}=4-2 \sqrt{3} \\ y_{1}=-6+4 \sqrt{3}\end{array}\right.,\left\{\begin{array}{l}x_{2}=0 \\ y_{2}=0\end{array}\right.$（舍去）

    ∴点P的坐标为$(1-2\sqrt{3}, -6+4\sqrt{3})$………………9分

    综上，存在满足条件的点P，点P的坐标为

    $\left(4+2\sqrt{3},\ 6+4\sqrt{3}\right)$或$(1-2\sqrt{3}, -6+4\sqrt{3})$'
