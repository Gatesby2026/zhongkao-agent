  question: 方程$\frac{3}{x+2}-\frac{2}{x-1}=0$的解为______．
  answer: $x=7$
  solution: '解：$\frac{3}{x+2}-\frac{2}{x-1}=0$，

    方程两边都乘$(x-1)(x+2)$，得$3(x-1)-2(x+2)=0$，

    解得：$x=7$，

    检验：当$x=7$时，$(x-1)(x+2)\neq0$，

    所以分式方程的解是$x=7$．

    故答案为：$x=7$．'
