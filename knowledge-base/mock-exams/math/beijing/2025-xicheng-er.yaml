  question: '一组对边平行且另一组对边不平行的四边形称为梯形．若梯形中不平行的两边相等，则称这样的梯形为等腰梯形．如图，点E，F，G，H分别是等腰梯形$ABCD$各边的中点，顺次连接E，F，G，H得到四边形$EFGH$．点K，L，M，N分别是四边形$EFGH$各边的中点，顺次连接K，L，M，N得到四边形$KLMN$．以下四个结论：

    ①四边形$EFGH$是菱形；

    ②连接FH，则$2FH=AD+BC$；

    ③四边形$EFGH$的面积等于四边形$KLMN$面积的$4$倍；

    ④四边形$KLMN$周长的平方不小于梯形$ABCD$面积的$4$倍．

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①④

    B.②③

    C.①②④

    D.①②③④'
  answer: C
  solution: '解：连接等腰梯形$ABCD$的对角线AC、BD．

    [图]

    ∵点E，F，G，H分别是等腰梯形$ABCD$各边的中点，

    ∴$EF=\frac{1}{2}BD$，$EH=\frac{1}{2}AC$，

    ∵等腰梯形的对角线相等，

    ∴$AC = BD$，

    ∴$EF = EH$．

    同理$EF = EH = HG = GF$，

    ∴四边形$EFGH$是菱形，结论①正确．

    取BD的中点Q，连接FQ，QH，

    [图]

    ∵F，H分别是AB，CD的中点，

    ∴$FO/AD, FO = \frac{1}{2}AD$$\text{，}$$QH \parallel BC, QH = \frac{1}{2}BC$

    ∵$AD \parallel BC$

    ∴$FQ \parallel BC$

    ∴点F，Q，H三点共线，

    ∴$FH=\frac{1}{2}AD+\frac{1}{2}BC$即$2FH=AD+BC$，结论②正确．

    连接EG、FH，

    [图]

    ∵四边形$EFGH$是菱形，

    ∴$EG \perp FH$，

    ∴$\angle FOG=90^\circ$

    ∵点K，L，M，N分别是四边形$EFGH$各边的中点，

    ∴$KL // EG, KL = \frac{1}{2}EG$，$FH \parallel LM$

    ∴$\triangle FKL \cong \triangle FEG$，$\angle KLM=\angle OPM=\angle FOG=90^{\circ}$，四边形$KLMN$是平行四边形，

    ∴$\frac{S_{\text{KEL}}}{S_{\text{PBG}}} = \left( \frac{KL}{EG} \right)^2 = \frac{1}{4}$，四边形$KLMN$是矩形，

    同理可得$\frac{S_{\triangle CEC''}}{S_{\triangle ABC}}=\frac{'
