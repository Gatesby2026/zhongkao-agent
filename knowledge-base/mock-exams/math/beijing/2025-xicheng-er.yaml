    （2）若$AD = 1$，求BC的长．'
  answer: （1）详见解析 （2）$\sqrt{2}$
  solution: '【小问1详解】

    证明：设$\angle ABC = \alpha$，则$\angle AOC=2\alpha$，

    ∵$OA = OC$，

    ∴$\angle OAC = \angle OCA$，

    ∴$\angle OAC=90^\circ-\alpha$，

    ∵AD是$\odot\odot$的切线，

    ∴半径$OA \perp AD$，

    ∴$\angle OAD = 90^\circ$，

    ∴$\angle DAE = \alpha$，

    ∵$\angle AOC=2\angle AED$，

    ∴$\angle AED = \alpha$，

    ∴$\angle DAE = \angle AED$．

    【小问2详解】

    解：延长AO交BC于F，则$\angle FAD = 90^\circ$，

    [图]

    ∵点A为BAC的中点，

    ∴$AB = AC$，

    ∵$OA=OA$，$OB = OC$，

    ∴$\triangle ABO \cong \triangle ACO$，

    ∴$\angle BAO = \angle CAO$，

    ∴$AF \perp BC$，

    ∴$\angle AFB = \angle FAD = 90^\circ$，

    ∴$AD \parallel BC$，

    ∴$\angle ADO = \angle OBC$，

    ∵$\angle OEC=\angle AED=\angle DAE$，$\angle OCA-\angle OAC=90^\circ-\angle DAE$，

    ∴$\angle COE=\angle COB=90^{\circ}$，

    ∴$\angle OBC = \angle OCB = \angle ADO = \angle AOD = 45^\circ$，

    ∴$\overline{OB}=\overline{OC}=\overline{OA}+\overline{AD}$'
