  question: '在平面直角坐标系xOy中，函数$y=2x+m$和函数$\hat{y}=mx(m\neq0)$的图象相交于点A．

    （1）当$m = 4$时，求点A的坐标；

    （2）当$x<2$时，对于x的每一个值，函数$y=2x+m$的值都大于函数$\hat{y}=mx(m\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$(2,8)$ （2）$2<m\leq4$
  solution: '【小问1详解】

    解：当$m = 4$时，函数$y=2x+4$，$y=4x$．

    联立方程组$\left\{ \begin{array} { l } { y = 2 x + 4 } \\ { y = 4 x } \end{array} \right.$，

    解得$\left\{ \begin{array} { l } { x = 2 } \\ { y = 8 } \end{array} \right.$，

    ∴点A的坐标为$(2,8)$．

    【小问2详解】

    解：联立$\begin{cases} y = 2x + m \\ y = mx \end{cases}$，

    ∴$2x + m = mx$，

    解得$x = \frac{m}{m - 2}$（$m \neq 2$）．

    当$x<2$时，$y=2x+m$的值都大于$y = mx$的值，且当$x=2$时，若两函数值相等，则

    $2\times2+m=2m$，

    解得$m = 4$．

    又∵当$x<2$时，$y = mx \, (m \neq 0)$在$y=2x+m$的下方，

    ∴m要大于$2$，

    ∴$2<m\leq4$．'
