  question: '如图，数轴上的点A，B表示的数分别是a，b．如果$ab < 0$，那么下列结论中一定正确的是（）

    [图]

    A.$a+b=0$

    B.$\left| a \right| > \left| b \right|$

    C.$b-2a>0$

    D.$\frac{1}{a}>\frac{1}{b}$'
  answer: C
  solution: '解：由数轴可得，$a < b$，

    ∵$ab < 0$，

    ∴$a<0<b$，

    ∴$\frac{1}{a}<0<\frac{1}{b}$，故D错误；

    令$a = -1$，$b=5$，则$a + b = 4 > 0$，$\left|a<b\right|$，故$A、B$错误；

    令$a = -5$；

    ∵$a<0<b$，

    ∴$b - a > 0, -a > 0$

    ∴$b-2a>0$，故C正确；

    故选：C．'
