  question: '在平面直角坐标系xOy中，抛物线$y = ax^2 - 2ax$经过点$A(3,3)$．

    （1）求抛物线的顶点坐标；

    （2）已知$M\left(x_{n},m\right)\left(x_{n}>0\right)$和$N(m,n)$是抛物线上的两个点，且$n > m$总成立，求$x_0$的取值范围．'
  answer: （1）$(1,-1)$ （2）$0<x_{0}<2$或$x_0 > 3$
  solution: '【小问1详解】

    解：∵抛物线$y = ax^2 - 2ax$过点$A(3,3)$，

    ∴$9a-6a=3$，

    ∴$a = 1$，

    ∴抛物线为$y = x^2 - 2x$，

    ∵$y=x^{2}-2x=(x-1)^{2}-1$，

    ∴抛物线的顶点坐标为$(1,-1)$；

    【小问2详解】

    解：∵$M\left(x_{0},m\right)$在抛物线$y = x^2 - 2x$上，

    ∴$m=x_{0}^{2}+2x_{n}=(x_{n}-1)^{2}-1=-1$，

    ∵$N(m,n)$在抛物线$y = x^2 - 2x$上，

    ∴$n=m^{2}-2m$，

    令$m = n$，则$m^{2}-2m=m$，

    ∴$m = 0$或$m = 3$，

    ∴当$n > m$时，结合函数$y = x^2 - 2x$的图象可得$-1 \leq m < 0$或$m>3$，

    当$-1 \leq m < 0$时，结合函数$m = x_{\phi}^{2} - 2x_{n}$$[公式]$图象可得$0<x_{0}<2$，

    当$m>3$时，结合函数$m = x_{\phi}^{2} - 2x_{n}$的图象可得$x_0<-1$或$x_0 > 3$，

    ∵$x_0 > 0$，

    ∴$x_0 > 3$，

    综上所述，$x_0$的取值范围是$0<x_{0}<2$或$x_0 > 3$．'
