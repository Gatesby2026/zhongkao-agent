  question: '如图，$\odot\odot$为$V_{ABC}$的外接圆，点A为$\widehat{BAC}$的中点，$\odot\odot$的切线AD交BO的延长线于点D，BD交AC于点E．连接OA，OC，且$\angle AOC=2\angle AED$．

    [图]

