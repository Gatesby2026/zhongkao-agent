  question: '如图，在$\Box ABCD$中，点E是BC上一点，延长AE，DC交于点F．若$AD = 3CE$，$\triangle ECF$的面积为6，则$\triangle ABE$的面积为______．

    [图]'
  answer: '24'
  solution: '解：∵四边形$ABCD$是平行四边形，

    ∴$AB \parallel DC$，即$AB \parallel CF$．

    ∴$\angle BAE=\angle CFE$，$\angle ABE=\angle FCE$．

    ∴$\triangle ABE \sim \triangle FCE$．

    ∵四边形$ABCD$是平行四边形，

    ∴$AD = BC$．

    ∵$AD = 3CE$，

    ∴$BC = 3CE$，

    ∴$BE = BC - CE = 3CE - CE = 2CE$．

    ∵$\triangle ABE \sim \triangle FCE$．

    ∴$\frac{BE}{CE}=\frac{2CE}{CE}=2$．

    ∴$\frac{S_{\triangle ABC}}{S_{\triangle ECF}}=\left(\frac{BE}{CE}\right)^{2}=2^{2}=4$．即$\frac{S_{\triangle ABE}}{6}=4$，

    ∴$S_{\triangle ABE}=4\times6=24$

    故答案为：$24$．'
