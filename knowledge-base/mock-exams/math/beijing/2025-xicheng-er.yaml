  question: '如图，在$Rt\triangle ABC$中，$\angle ACB=90^\circ$，$\angle BAC$的平分线交BC于点D，过点D作$DE \parallel AC$，交AB于点E，点F是AC上一点，且$CF = AE$，连接EF．

    [图]

    （1）求证：四边形$CDEF$是矩形；

    （2）连接DF，若$AF = 3$，$\sin B=\frac{3}{5}$，求DF的长．'
  answer: （1）详见解析 （2）$\sqrt{41}$
  solution: '【小问1详解】

    证明：∵$\angle BAC$的平分线交BC于点D，

    ∴$\angle CAD = \angle BAD$．

    ∵$DE \parallel AC$，

    ∴$\angle CAD = \angle ADE$．

    ∴$\angle BAD = \angle ADE$．

    ∴$AE = DE$．

    ∵$CF = AE$，

    ∴$DE = CF$．

    ∴四边形$CDEF$为平行四边形．

    ∵$\angle ACB=90^\circ$，

    ∴四边形$CDEF$为矩形．

    【小问2详解】

    解：如图所示，

    [图]

    ∵在矩形$CDEF$中，$EF \parallel CD$，

    ∴$\angle AEF = \angle B$，$\angle AFE = \angle ACB = 90^\circ$．

    ∵$\sin B=\frac{3}{5}$，

    ∴$\sin\angle AEP=\frac{3}{5}$．

    ∵在$Rt\triangle AFE$中，$AF = 3$，

    ∴$AE = 5$，$EF=\sqrt{5^{2}-3^{2}}=4$．

    ∴$DE = AE = 5$．

    ∵在矩形$CDEF$中，$\angle DEF = 90^\circ$，

    ∴在$Rt\triangle DEF$中，$DF=\sqrt{DE^{2}+EF^{2}}=\sqrt{41}$．'
