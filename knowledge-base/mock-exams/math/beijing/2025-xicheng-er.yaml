  question: '小林驾车去某地办事，目的地附近有甲、乙两个停车场．已知小林停车时间不超过24小时．甲停车场收费标准是：

    | 停车时长 t （单位：小时） | $0<t\leq1$ | $1<t\leq3$ | $3<t\leq6$ | $6<t\leq9$ | $9<t\leq12$ | $12 < r \leq 24$ |

    | --- | --- | --- | --- | --- | --- | --- |

    | 收费标准（单位：元） | 免费 | 5 | 10 | 15 | 18 | 24 |

    乙停车场收费标准是；每小时2元（不足1小时按1小时收费）．

    （1）若小林10点25分将车停入甲停车场，当天18点45分将车开出，则小林需交的停车费是______元；

    （2）若小林将车停到乙停车场，且停车费比停在甲停车场更优惠，则小林停车时间最长为______小时，'
  answer: ①.15 ②.7
  solution: '解：（1）∵小林10点25分将车停入甲停车场，当天18点45分将车开出，

    ∴$18-10=8,45-25=20$，

    ∴在甲停车场停了8小时20分钟，

    ∴由表格得收费15元，

    故答案为：15；

    （2）若$0<t\leq1$时，知甲免费，乙至少花费2元，不合题意；

    若$1<t\leq3$时，要使得乙停车费少，则乙最多2小时4元；

    若$3<t\leq6$时，要使得乙停车费少，则乙最多4小时8元；

    若$6<t\leq9$时，要使得乙停车费少，则乙最多7小时14元；

    若$9<t\leq12$时，乙至少花费20元，不合题意；

    若$12 < r \leq 24$时，乙至少26元，不合题意，

    ∴小林停车时间最长为7小时，

    故答案为：7．'
