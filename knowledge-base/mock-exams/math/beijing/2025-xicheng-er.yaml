  question: 已知$x-2y-3=0$，求代数式$x(x-2y)+y(2x-4y)++2y$的值．
  answer: '3'
  solution: '解：$x(x-2y)+y(2x-4y)++2y$

    $= x(x - 2) + y(2x - 4y) \\

    = x - 2y$

    $=(x+2y)(x-2y)$

    $=x-2y$．

    ∵$x-2y-3=0$，

    ∴$x - 2y = 3$．

    ∴原式$=3$'
