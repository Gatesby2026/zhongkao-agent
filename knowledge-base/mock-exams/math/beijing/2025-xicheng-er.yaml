  question: '关于x的方程$x^{2}+4x+2m-3=0$．

    （1）若方程有实数根，求m的取值范围；

    （2）若方程的两个根都是整数，求正整数m的值．'
  answer: （1）$m \leq \frac{7}{2}$ （2）3
  solution: '【小问1详解】

    解：∵方程有实数根，

    ∴$\triangle 0$．

    ∴$4^{2}-4\times1\times(2m-3)=0$．

    解得$m \leq \frac{7}{2}$．

    即m的取值范围是$m \leq \frac{7}{2}$．

    【小问2详解】

    解：解方程，得$x = -4 \pm 2\sqrt{7 - 2m} = -2 \pm \sqrt{7 - 2m}$．

    ∵$m \leq \frac{7}{2}$，

    ∴正整数m的值为1，2，3．

    当$m = 1$时，$\sqrt{7}-2m=\sqrt{5}$，不合题意，所以$m = 1$舍去；

    当$m = 2$时，$\sqrt{7}-2m=\sqrt{3}$，不合题意，所以$m = 2$舍去；

    当$m = 3$时，$\sqrt{7-2m}=1$，得到方程的根为$x_{1}=-1$，$x_{2}=-3$，都是整数．

    ∴正整数m的值是3．'
