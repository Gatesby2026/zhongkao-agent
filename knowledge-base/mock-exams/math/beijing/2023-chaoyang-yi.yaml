  question: '某校为了解读书月期间学生平均每天阅读时间，在该校七、八、九年级学生中各随机抽取了15名学生，获得了他们平均每天阅读时间（单位：min），并对数据进行了整理、描述，给出部分信息．

    a．七、八年级学生平均每天阅读时间统计图：

    [图][图]

    b．九年级学生平均每天阅读时间：21

    22  25  33  36  36  37  37  39  39  41  42  46  48  50

    c．七、八、九年级学生平均每天阅读时间的平均数：

    年级

    七

    八

    九

    平均数

    26.4

    35.2

    36.8

    根据以上信息，回答下列问题：

    （1）抽取的15名九年级学生平均每天阅读时间的中位数是；

    （2）求三个年级抽取的45名学生平均每天阅读时间的平均数；

    （3）若七、八、九年级抽取的学生平均每天阅读时间的方差分别为$s_{1}^{2},s_{2}^{2},s_{3}^{2}$，则$s_{1}^{2},s_{2}^{2},s_{3}^{2}$之间的大小关系为．'
  answer: （1）37（2）32.8 （3）$s_{2}^{2}<s_{1}^{2}<s_{3}^{2}$
  solution: '【小问1详解】

    解：由中位数是第8位上$[公式]$数可知，中位数为37，

    故答案为：37；

    【小问2详解】

    解：由题意知，三个年级抽取的45名学生平均每天阅读时间的平均数为$15\times26.4+15\times35.2+15\times36.8=32.8$，

    ∴三个年级抽取的45名学生平均每天阅读时间的平均数为32.8；

    【小问3详解】

    解：由方差越大，数据的波动程度越大，方差越小，数据的波动程度越小，

    观察七、八年级的统计图以及九年级的数据可知，九年级的数据波动最大、八年级的数据波动最小，

    ∴$s_{2}^{2}<s_{1}^{2}<s_{3}^{2}$，

    故答案为：$s_{2}^{2}<s_{1}^{2}<s_{3}^{2}$．'
