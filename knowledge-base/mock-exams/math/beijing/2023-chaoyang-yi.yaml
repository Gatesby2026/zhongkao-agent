  question: '在平面直角坐标系xOy中，一次函数$y=kx+b(k\neq0)$的图象经过点$(0,1)$，$(-2,2)$，与x轴交于点A．

    （1）求该一次函数的表达式及点A的坐标；

    （2）当$x^{2}$时，对于x的每一个值，函数$y=2x+m$的值大于一次函数$y=kx+b(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=-\frac{1}{2}x+1$，$A(2,0)$ （2）$m > -4$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b(k\neq0)$的图象经过点$(0,1)$，$(-2,2)$，

    ∴$\left\{ \begin{array}{l} b = 1 \\ -2k + b = 2 \end{array} \right.$，

    解得$\left\{ \begin{array}{l} k = -\dfrac{1}{2} \\ b = 1 \end{array} \right.$，

    ∴该一次函数的表达式为$y=-\frac{1}{2}x+1$，

    令$y = 0$，得$x=2$，

    ∴$A(2,\ 0)$；

    【小问2详解】

    解：由题意得：当$x^{2}$时，$(2x+m)-\left(-\frac{1}{2}x+1\right)>0$，

    化简得：$x > \frac{2}{5}(1 - m)$，

    ∵$x^{2}$时，不等式$x > \frac{2}{5}(1 - m)$要一直成立，

    ∴$\frac{2}{5}(1-m)$要小于x的最小值，

    ∴$\frac{2}{5}(1-m)<2$，

    ∴$m > -4$.'
