  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+(2m-6)x+1$经过点$(1,2m-4)$．

    （1）求a的值；

    （2）求抛物线的对称轴（用含m的式子表示）；

    （3）点$(-m, y_1)$，$\left(m,y_{2}\right)$，$(m+2,y_{3})$在抛物线上，若$y_{2}<y_{3}\leqslant y_{1}$，求m的取值范围．'
  answer: （1）1（2）$x=3-m$ （3）$1 < m \leq 2$
  solution: '【小问1详解】

    解：∵抛物线$y=ax^{2}+(2m-6)x+1$经过点$(1,\ 2m-4)$，

    ∴$2m-4=a+(2m-6)+1$，

    ∴$a = 1$；

    【小问2详解】

    由（1）得抛物线的表达式为$y=x^{2}+(2m-6)x+1$，

    即$y=\left[x+(m-3)\right]^{2}+1-(m-3)^{2}$，

    ∴抛物线的对称轴为$x=3-m$；

    【小问3详解】

    ①当$m > 0$时，

    可知点$(-m, y_1)$，$\left(m,\,y_{2}\right)$，$(m+2,\ y_{3})$从左至右分布，

    根据$y_{2}<y_{3}$可得$3-m<\frac{m+n+2}{2}$，

    ∴$m > 1$，

    根据$y_{3} \leq y_{1}$可得$3. m^{2}-2m+n+2=2$，

    ∴$m \leq 2$，

    ∴$1 < m \leq 2$；

    ②当$m \leq 0$时，即$\begin{bmatrix} -m & 0 \end{bmatrix}$，

    ∵$m \leq -m < -m + 3$，

    ∴$y_{2}\quad y_{1}$，不符合题意.

    综上，m的取值范围为$1 < m \leq 2$．'
