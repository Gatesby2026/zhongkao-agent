  question: '一个33人的旅游团到一家酒店住宿，酒店的客房只剩下4间一人间和若干间三人间，住宿价格是一人间每晚100元，三人间每晚130元（说明：男士只能与男士同住，女士只能与女士同住，三人间客房可以不住满，但每间每晚仍需支付130元）．

    （1）若该旅游团一晚的住宿房费为1530元，则他们租住了_______间一人间；

    （2）若该旅游团租住了3间一人间，且共有19名男士，则租住一晚的住宿房费最少为______元．'
  answer: ①.1②.1600
  solution: '解：（1）设它们租住了x间1人间，y间三人间，且x、y均为自然数，

    根据题意有：$\begin{aligned}

    &0 \leq x \leq 4 \\

    &x + 3y = 33 \\

    &100x + 130y = 1530

    \end{aligned}$，解得：$x \leq \frac{30}{17}$，

    ∵且x、y均为自然数，

    ∴x可以取0和1，

    当$x = 0$时，$y = \frac{153}{13}$，不为自然数，舍去，

    当$x = 1$时，$y=11$，即他们租住了1间一人间．

    故答案为：1．

    （2）33人中共有19名男士，则女士有14名，

    ∵$19\div3=6\cdots\cdots1$，$14\div3=4\cdots2$，该团已经租住了3间1人间，

    ∴安排2名女士和1名男士住1人间，剩下的18名男士和12名女士住三人间，即可最节省，

    即：$\left(\frac{18}{3}+\frac{12}{3}\right)\times130+100\times3=1600$（元）．

    故答案为：1600．'
