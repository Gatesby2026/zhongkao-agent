  question: '如图，在平行四边形$ABCD$中，对角线$AC,BD$相交于点O，点E，F在BD上，$AE \parallel CF$，连接$AF,CE$．

    [图]

    （1）求证：四边形$AECF$为平行四边形；

    （2）若$\angle EAO+\angle CFD=180^{\circ}$，求证：四边形$AECF$是矩形．'
  answer: （1）见解析（2）见解析
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$OA = OC$．

    ∵$AE \parallel CF$，

    ∴$\angle EAO = \angle FCO$．

    ∵$\angle AOE = \angle COF$，

    ∴$\triangle AEO\cong\triangle CFO(ASA)$．

    ∴$OE = OF$．

    ∴四边形$AECF$为平行四边形．

    【小问2详解】

    ∵$\angle EAO+\angle CFD=180^\circ,\angle CFO+\angle CFD=180^\circ$，

    ∴$\angle EAO = \angle CFO$．

    ∵$\angle EAO = \angle FCO$，

    ∴$\angle FCO = \angle CFO$．

    ∴$OC = OF$．

    ∴$AC = EF$．

    ∴四边形$AECF$是矩形．'
