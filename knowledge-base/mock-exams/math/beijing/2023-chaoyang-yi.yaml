  question: '下面是证明“等腰三角形的两个底角相等”的两种添加辅助线的方法，选择其中一种，完成证明．

    已知：如图，在$\triangle ABC$中，$AB = AC$．

    求证：$\angle B = \angle C$．

    [图]

    方法一

    证明：如图，作$\triangle ABC$的中线AD．

    [图]

    方法二

    证明：如图，作$\triangle ABC$的角平分线AD．

    [图]'
  answer: 见解析
  solution: '解：方法一，

    证明：如图，取BC中点D，连接AD，

    则$BD = CD$，

    [图]

    在$\triangle ABD$和$\triangle ACD$中，

    $\left\{ \begin{array}{l} AB = AC \\ AD = AD \\ BD = CD \end{array} \right.$，

    $\triangle ABD\cong\triangle ACD(SSS)$，

    $\angle B=\angle C$；

    方法二：

    证明：如图，作$\angle BAC$的角平分线，交BC于点D．

    [图]

    $\angle BAD = \angle CAD$，

    在$\triangle ABD$和$\triangle ACD$中，

    $AB = AC \\

    \angle BAD = \angle CAD \\

    AD = AD$，

    $\triangle ABD \cong \triangle ACD(SAS)$，

    $\angle B=\angle C$．'
