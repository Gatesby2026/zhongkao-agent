  question: '下面的三个问题中都有两个变量：

    ①矩形的面积一定，一边长y与它的邻边x；

    ②某村的耕地面积一定，该村人均耕地面积S与全村总人口n；

    ③汽车的行驶速度一定，行驶路程S与行驶时间t．

    其中，两个变量之间的函数关系可以用如图所示的图象表示的是（）

    [图]

    A.①②B.①③C.②③D.①②③'
  answer: A
  solution: '解：由函数图象可知，这两个变量之间成反比例函数关系，

    ①矩形的面积$=x\cdot y$，因此矩形的面积一定时，一边长y与它的邻边x可以用形如$y=\frac{k}{x}(k\neq0)$的式子表示，即满足所给的函数图象；

    ②耕地面积$= S \cdot n$，因此耕地面积一定时，该村人均耕地面积S与全村总人口n可以用形如$y=\frac{k}{x}(k\neq0)$的式子表示，即满足所给的函数图象；

    ③汽车的行驶速度$= \frac{S}{t}$，因此汽车的行驶速度一定，行驶路程s与行驶时间t不可以用形如$y=\frac{k}{x}(k\neq0)$的式子表示，即不满足所给的函数图象；

    综上可知：①②符合要求，

    故选A．'
