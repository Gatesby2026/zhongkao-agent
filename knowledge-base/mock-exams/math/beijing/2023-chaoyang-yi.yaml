  question: '如图，AB是$\odot\odot$的弦，过点O作$OC \perp AB$，垂足为C，过点A作$\odot\odot$的切线，交OC的延长线于点D，连接OB．

    [图]

    （1）求证：$\angle B = \angle D$；

    （2）延长BO交$\odot\odot$于点E，连接AE，CE，若$AD = 2\sqrt{5}$，$\sin B = \frac{\sqrt{5}}{5}$，求CE的长．'
  answer: （1）见解析（2）$2\sqrt{2}$
  solution: '【小问1详解】

    证明：如图，连接OA，

    [图]

    ∵AD为$\odot\odot$的切线，

    ∴$\angle OAD = 90^\circ$

    ∴$\angle CAD+\angle OAB=90^\circ$，

    ∵$OC \perp AB$，

    ∴$\angle ACD=90^\circ$，

    ∴$\angle CAD+\angle D=90^{\circ}$，

    ∴$\angle OAB = \angle D$，

    ∵$OA = OB$，

    ∴$\angle OAB = \angle B$，

    ∴$\angle B = \angle D$；

    【小问2详解】

    解：延长BO交$\odot\odot$于点E，连接AE，CE，如图所示，

    [图]

    在$Rt\triangle ACD$中，$AD = 2\sqrt{5}$，$\sin D = \sin B = \frac{\sqrt{5}}{5}$，

    可得$AC = AD \cdot \sin D = 2$，

    ∵$OC \perp AB$，

    ∴$AB = 2AC = 4$，

    根据勾股定理，得$CD=\sqrt{AD^{2}+AC^{2}}=\sqrt{\left(2\sqrt{5}\right)^{2}-2^{2}}=4$，

    ∴$\tan B = \tan D = \frac{1}{2}$，

    ∵BE为$\odot\odot$的直径，

    ∴$\angle EAB = 90^\circ$，

    在$Rt\triangle ABE$中，$AE\cdot AB\cdot\tan B=2$，

    在$Rt\triangle ACE$中，根据勾股定理，得$CE=\sqrt{AC^{2}+AE^{2}}=2\sqrt{2}$．'
