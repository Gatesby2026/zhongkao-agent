  question: '如图，在$Y_{ABCD}$中，$AE \perp BC$于点E，点F在BC的延长线上，且$CF = BE$，连接DF．

    [图]

    （1）求证：四边形$AEFD$是矩形；

    （2）连接DE，若$\tan\angle ABC = 2$，$BE = 1$，$AD = 4$，求DE的长．'
  answer: （1）见解析（2）$2\sqrt{5}$
  solution: '【小问1详解】

    证明：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$四边形$ABCD$是平行四边形，

    $\therefore AD \parallel BC$，$AD = BC$，

    $\because CF = BE$，

    $CF + EC = BB + EC$，即$BC = EF$，

    $\therefore AD = EF$且$AD \parallel EF$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$四边形$AEFD$是平行四边形，

    $\because AE \perp BC$，

    $\angle AEF = 90^\circ$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$四边形$AEFD$是矩形．

    【小问2详解】

    解：连接DE，

    [图]

    在$Rt\triangle ABE$中，$\angle AEB = 90^\circ$，$BE = 1$，

    $\tan\angle ABC=\frac{AE}{BE}=2$，

    $AE=2BE-2$，

    在$Rt\triangle ADE$中，$\angle DAE=90^\circ$，$AD = 4$，

    $DE=\sqrt{AE^{2}+AD^{2}}=\sqrt{2^{2}+4^{2}}=2\sqrt{5}$．'
