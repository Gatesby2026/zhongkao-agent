  question: '如图，AB是$\odot\odot$$[公式]$直径，点$C,D$在$\odot\odot$上，且$\angle COD=90^\circ$，连接AD并延长到点F，连接BF，若$\angle F=\frac{1}{2}\angle AOD$．

    [图]

    （1）求证：BF是$\odot\odot$的切线；

    （2）若$BF = \frac{4}{3}\sqrt{5},\ \angle BCD = 30^\circ$，求BC的长．'
  answer: （1）见解析（2）$\sqrt{6}+\sqrt{2}$
  solution: '【小问1详解】

    证明：如图1，连接BD，

    [图]

    图1

    ∵AB是$\odot\odot$的直径，

    ∴$\angle ADB=90^\circ$，

    ∴$\angle BDF = 90^\circ$，$\angle DBF+\angle F=90^\circ$，

    ∵$\widehat{AD}=\widehat{AD}$，

    ∴$\angle ABD = \frac{1}{2} \angle AOD = \angle F$，

    ∴$\angle DBF+\angle ABD=90^{\circ}$，即$OB \perp BE$，

    又∵OB是半径，

    ∴BF是$\odot\odot$的切线．

    【小问2详解】

    解：∵$\widehat{BD}=\widehat{BD}$，

    ∴$\angle BAD=\angle BCD=30^{\circ}$，

    ∴$\frac{AB}{\tan 30^{\circ}}=4$，$BD = AB \sin 30^{\circ} = 2$，

    ∵$\widehat{CD}=\widehat{CD}$，

    ∴$\angle CBD=\frac{1}{2}\angle COD=45^\circ$，

    如图2，过点D作$DG \perp BC$于点G，

    [图]

    图2

    ∴$DG=BD\cdot\sin45^{\circ}=\sqrt{2}$，$BG=BD\cdot\cos45^{\circ}=\sqrt{2}$，

    ∴$CG=\frac{DG}{\tan 30^{\circ}}=\sqrt{6}$，

    ∴$BC = CG + BG = \sqrt{6} + \sqrt{2}$，

    ∴BC的长度为$\sqrt{6}+\sqrt{2}$．'
