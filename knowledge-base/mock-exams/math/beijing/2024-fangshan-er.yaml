  question: '已知关于x的一元二次方程$x^{2}-(m+1)x+m=0$．

    （1）求证：该方程总有两个实数根；

    （2）若$m < 0$，且该方程的两个实数根的差为3，求m的值．'
  answer: （1）见解析（2）$m = -2$
  solution: '【小问2详解】

    解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$原方程可化为$(x-m)(x-1)=0$，

    $\ldots x_{1}=m, x_{2}=1$，（也可用求根公式求出两根）

    $\therefore m<0$，

    $\therefore 1 > m$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$该方程的两个实数根的差为3，

    $\therefore 1-m=3$．

