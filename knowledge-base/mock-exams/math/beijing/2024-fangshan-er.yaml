  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\,(k\neq0)$的图像经过点$(4,1)$和$(0,-1)$．

    （1）求这个一次函数的解析式；

    （2）当$x > -2$时，对于x的每一个值，函数$y = mx \, (m \neq 0)$的值大于一次函数$y=kx+b\,(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=\frac{1}{2}x-1$ （2）$\frac{1}{2} \leq m \leq 1$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\,(k\neq0)$的图象经过$(4,1)$，$(0,-1)$，

    ∴$\begin{cases}

    4k + b = 1 \\

    0k + b = -1

    \end{cases}$，

    ∴$\left\{

    \begin{array}{l}

    k = \dfrac{1}{2} \\

    b = -1

    \end{array}

    \right.$，

    ∴一次函数解析式为$y=\frac{1}{2}x-1$；

    【小问2详解】

    解：把$x = -2$代入$y=\frac{1}{2}x-1$，求得$y = -2$，

    ∴函数$y = mx \, (m \neq 0)$与一次函数$y=\frac{1}{2}x-1$的交点为$(-2,-2)$，

    把点$(-2,-2)$代入$y = mx \, (m \neq 0)$，求得$m = 1$，

    当两直线平行时，$m = \frac{1}{2}$，

    如图，

    [图]

    ∵当$x > -2$时，对于x的每一个值，函数$y = mx \, (m \neq 0)$的值大于一次函数$y=\frac{1}{2}x-1$的值，

    ∴$\frac{1}{2} \leq m \leq 1$．'
