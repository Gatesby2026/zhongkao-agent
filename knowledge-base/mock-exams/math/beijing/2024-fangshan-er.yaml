  question: '在平面直角坐标系xOy中，对于两点$M,N$和直线l，过点M作直线l的垂线，垂足为点P，若点N关于点P的对称点为点H，则称点H为点M关于直线l和点N的“垂足对称关联点”．已知点$A(4,0),B(0,2)$．

    （1）①点$(1,3)$关于x轴和点A的“垂足对称关联点”的坐标为______；

    ②点B为点A关于直线l和点$(6,-2)$的“垂足对称关联点”，则点A到直线l的距离为______；

    （2）如图，点C在线段AB上，点D在x轴下方，且满足$OD = 1$，若直线$y=x+b$上存在点C关于x轴和点D的“垂足对称关联点”，求b的取值范围．

    [图]'
  answer: （1）①$(-2,0)$；②1 （2）$-9 < b \leq \sqrt{2}$
  solution: '【小问1详解】

    解：①如图，过点$(1,3)$作x轴的垂线，则垂足B所表示的数为$(1,0)$，

    ∵$A(4,0)$，

    ∴点$(1,3)$关于x轴和点A的“垂足对称关联点”的坐标为$(-2,0)$，

    [图]

    故答案为：$(-2,0)$；

    ②∵$B(0,2)$，点$(6,-2)$，

    ∴它们$[公式]$中点的坐标为$\frac{0+6}{2}-\frac{2-2}{2}$，即$(3,0)$，

    ∵点B为点A关于直线l和点$(6,-2)$的“垂足对称关联点”，

    ∴点A到直线l的距离为1，

    故答案为：1．

    【小问2详解】

    [图]

    ①如图，以点O为圆心，OD为半径作圆，当直线$y=x+b$与圆O相切时，b最大，此时，过点O作直线$y=x+b$的垂线，则$\angle EOB=45^\circ$，且$OE = 1$，

    ∵点D与点E$[公式]$中点为O，

    ∴点C与点B重合，

    ∵$\angle OEF=90^\circ,\ \angle EOF=45^\circ,\ OE=1$，

    ∴$OF = \sqrt{2}$,

    ∴$b = \sqrt{2}$；

    ②当点D与点$R(-1,0)$重合时，点G关于点A的对称点H最远，此时b最小，如图，

    [图]

