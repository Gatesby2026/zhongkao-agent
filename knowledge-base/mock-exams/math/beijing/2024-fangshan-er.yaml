  question: '如图，在菱形$ABCD$中，点E在边AD上，BE与AC交于点F．若$AB = 4$，$\angle ABC=60^\circ, AF=1$，则$\frac{AE}{BC}$的值为______．

    [图]'
  answer: $\frac{1}{3}$
  solution: '解：∵四边形$ABCD$是菱形，

    ∴$AB=BC,AD\parallel BC$

    ∵$\angle ABC = 60^\circ$

    ∴$\triangle ABC$是等边三角形，

    ∴$AC = AB = 4$，

    ∵$AF = 1$，

    ∴$CF = AC - AF = 4 - 1 = 3$

    ∵$AD \parallel BC$

    ∴$\triangle AEF \sim \triangle CBF$

    ∴$\frac{AE}{BC}=\frac{AF}{CF}=\frac{1}{3}$

    故答案为：$\frac{1}{3}$'
