  question: '3月22日是世界水日，世界水日的宗旨是唤起公众的节水意识、加强水资源保护．某校为提倡节约用水、增强节约用水意识，在全校开展了节约用水知识竞赛活动．七、八、九年级各有200名学生参加了知识竞赛活动，为了解三个年级的竞赛答题情况，从三个年级各随机抽取了20名学生的成绩进行调查分析，下面给出了部分信息：

    a．七年级学生的成绩整理如下（单位：分）：

    60

    67

    69

    75

    75

    75

    77

    77

    78

    78

    80

    80

    80

    80

    86

    86

    88

    88

    89

    96

    b．八年级成绩的频数分布直方图如下（数据分成四组：$60\leq x<70,70\leq x<80,80\leq x<90,90\leq x\leq100$）：

    [图]

    其中成绩在$80 \leq x < 90$的数据如下（单位：分）：$81\ 81\ 81\ 82\ 83\ 84\ 85\ 86\ 87\ 89$

    c．三组样本数据的平均数、中位数、众数如下表所示：

    年级

    平均数

    中位数

    众数

    七年级

    79.2

    79

    m

    八年级

    80.3

    n

    78

    九年级

    79.5

    79

    81

    根据所给信息，解答下列问题：

    （1）$m =$______，$n =$______；

    （2）估计______年级学生的成绩高于本年级平均分的人数更多；

    （3）若成绩达到80分及以上为优秀，九年级抽出的20名学生中有10人优秀，估计三个年级此次竞赛成绩优秀的总人数．'
  answer: （1）80，81 （2）八（3）310名
  solution: '【小问1详解】

    根据七年级的成绩可知，出现次数最多的是80，所以$m = 80$，

    由题意知，八年级学生的成绩中第10、第11位分别是81，81，

    ∴$n=\frac{81+81}{2}=81$；

    【小问2详解】

    由题意知，七年级成绩在平均分以上的有10人，占总数的$\frac{10}{20}=\frac{1}{2}$，

    ∴估计七年级学生的成绩高于平均分的人数为$200\times\frac{x}{2}=100$（人）；

    八年级成绩在平均分以上的有11人，占总数的$\frac{11}{20}$，

    ∴估计八年级学生的成绩高于平均分的人数为$200\times\frac{11}{20}=110$（人），

    ∵九年级成绩得平均数为79.5，中位数为79

    ∴九年级成绩大于平均数的人数小于10人，

    ∴估计九年级学生的成绩高于平均分的人数小于$200\times\frac{x}{2}=100$（人），

    ∵$100<110$，

    ∴估计八年级学生的成绩高于平均分的人数更多；

    【小问3详解】

    由题意知，七年级成绩优秀的人数占比为$\frac{10}{20}=\frac{1}{2}$，八年级成绩优秀的人数占比为$\frac{11}{20}$，九年级成绩优秀的人数占比为$\frac{10}{20}=\frac{1}{2}$，

    ∴估计三个年级此次竞赛成绩优秀的总人数$200\times\frac{1}{2}+200\times\frac{11}{20}+200\times\frac{1}{2}=310$（人）．

    答：估计三个年级此次竞赛成绩优秀的总人数为310人．'
