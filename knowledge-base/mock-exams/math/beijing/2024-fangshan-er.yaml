  question: '如图，AB，AC，AD分别是直径为AE的$\odot\odot$的内接正六边形、正方形、等边三角形的一边．若$AB=2$，给出下而四个结论：①$\odot\odot$的直径为4；②$AC = 2\sqrt{2}$；③$\overline{BC}=\overline{CD}$；④连接CD，则$\triangle ACD$的面积是$\sqrt{6}$．上述结论中，所有正确结论的序号是（）

    [图]

    A.①③B.②④C.①②③D.①②③④'
  answer: C
  solution: '解：连接OB，OC，OD

    [图]

    ∵AB，AC，AD分别是直径为AE的$\odot\odot$的内接正六边形、正方形、等边三角形的一边

    ∴$\angle AOB=60^\circ$，$\angle AOC=90^{\circ}$，$\angle AOD=120^\circ$

    ∴$\angle BOC=\angle AOC-\angle AOB=30^{\circ}$，$\angle COD=\angle AOD-\angle AOC=30^\circ$

    ∴$\angle BOC = \angle COD$，

    即$\overline{BC}=\overline{CD}$

    故③正确；

    ∵$OA = OB = OC = OD$

    ∴$\triangle AOB$是等边三角形，$\triangle AOC$是等腰直角三角形

    ∴$AE=2OA=2AB=4$

    故①正确；

    由勾股定理可得，$AC = \sqrt{OA^{2} + OC^{2}} = 2\sqrt{2}$

    故②正确；

    过点A作$AF \perp DC$交DC延长线于点F，过点D作$DG \perp AE$交AE于点E

    [图]

    ∵$\angle COD=30^\circ$，$OC = OD$

    ∴$\angle OCD = \angle ODC = \frac{1}{2} \times (180^\circ - 30^\circ) = 75^\circ$

    ∵$\angle AOD=120^\circ$，$OA = OD$

    ∴$\angle OAD=\angle ODA=\frac{1}{2}\times(180^{\circ}-120^{\circ})=30^{\circ}$，$\angle DOG=60^{\circ}$

    ∴$DC=\sin 60^{\circ}\cdot OD=\frac{\sqrt{3}}{2}\times'
