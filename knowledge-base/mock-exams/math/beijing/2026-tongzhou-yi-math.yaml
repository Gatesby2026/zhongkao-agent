    BDG = \angle BCA$ 交线段 $AB$ 于点 $G$。 \\ (1) 如图 1，当 $BC = AB$ 时，求证：$DG$ 平分 $\angle ADB$； \\ (2) 如图 2，当 $BC < AB$ 时，如图，在 $BD$ 上取一点 $F$，使 $DF = BC$，连结 $AF$ 交 $DG$ 于点 $M$。用等式表示线段 $MD$ 和 $AC$ 之间的数量关系，并证明。
