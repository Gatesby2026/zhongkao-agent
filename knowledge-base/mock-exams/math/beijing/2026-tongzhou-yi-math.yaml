  question: '26. 在平面直角坐标系 $xOy$ 中，已知抛物线 $C_1: y = ax^2 + bx + c (a \neq 0)$ 经过原点 $O$ 和点 $A(2, 2a)$，抛物线 $C_2: y = -ax^2 (a \neq 0)$。 \\ (1) 求 $c$ 的值，并用含 $a$ 的式子表示 $b$； \\ (2) 过点 $P(t, 0)$ 作 $x$ 轴的垂线，交 $C_1$
    于点 $M$，交 $C_2$ 于点 $N$（点 $M$ 与点 $N$ 不重合）。 \\ ① 当 $a = 1, t = 3$ 时，求 $MN$ 的长； \\ ② 若点 $P$ 从点 $S(a, 0)$ 运动到点 $T(2a, 0)$ 的过程中，$MN$ 的长随 $OP$ 的长的增大而增大，求 $a$ 的取值范围。'
  answer: '(1) $\because$ 抛物线 $C_1: y = ax^2 + bx + c$ ($a \neq 0$) 经过原点 O 和点 A(2,2a), 分别代入得: $c = 0$, $b = -a$. 2分 (2) ① 当 $a = 1$ 时, 抛物线 $C_1: y = x^2 - x$, 抛物线 $C_2: y = -x^2$. $\because$ 过点 P(t,0) 作
    x 轴的垂线, 交 $C_1$ 于点 M, 交 $C_2$ 于点 N. $\therefore$ 当 $t = 3$ 时, 点 M(3,6), N(3,-9). $\therefore MN = 15$. ② $\because$ 点 P(t,0), $\therefore$ 点 M(t, $at^2 - at$), 点 N(t, $-at^2$). $\therefore MN = |2at^2
    - at| = |at(2t - 1)|$. 当 $a>0$ 时，$MN=a|t(2t-1)|$，$\therefore$ 当 $0<t\leqslant\frac{1}{4}$ 或 $t>\frac{1}{2}$ 时，$MN$ 随 $t$ 的增大而增大。$\because$ 点 $P$ 从点 $S(a,0)$ 运动到点 $T(2a,0)$ 的过程中，$MN$ 的长随 $OP$ 的长的增大而增大，$\therefore
    0<2a\leqslant\frac{1}{4}$ 或 $a>\frac{1}{2}$。即 $0<a\leqslant\frac{1}{8}$ 或 $a>\frac{1}{2}$。当 $a<0$ 时，$P$ 从点 $S(a,0)$ 运动到点 $T(2a,0)$ 的过程中，$MN$ 的长随 $OP$ 的长的增大而增大，符合题意。综上：$a<0$ 或 $0<a\leqslant\frac{1}{8}$
    或 $a>\frac{1}{2}$。'
