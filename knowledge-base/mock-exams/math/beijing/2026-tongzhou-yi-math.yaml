    \angle GDB=\frac{\alpha}{2}$。$\because$ 将线段 AB 绕点 A 逆时针旋转 $180^\circ-2\alpha$ 得到线段 AD，$\therefore AB=AD$。$\therefore \triangle ABD$ 中，$\angle ABD=\angle ADB=a$。$\therefore \angle ADB=2\angle GDB$。$\therefore
