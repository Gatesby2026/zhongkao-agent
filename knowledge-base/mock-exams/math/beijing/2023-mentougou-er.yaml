  question: '“端午节”是中国的传统佳节，为了传承中华民族传统文化．某学校组织“端午”知识测试．测试的试题由6道判断题组成，被测试人员只要画“√”或画“×”表示出对各题的正误判断即可，每小题判断正确得1分，判断错误得0分．现有甲，乙，丙，丁四位同学对6道试题的判断与得分的结果如下：

    |  | 第 1 题 | 第 2 题 | 第 3 题 | 第 4 题 | 第 5 题 | 第 6 题 | 得分 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 甲 | √ | × | × | √ | × | × | 4 分 |

    | 乙 | × | √ | × | × | √ | × | 4 分 |

    | 丙 | × | √ | √ | √ | × | √ | 4 分 |

    | 丁 | × | × | × | √ | × | × | ？ |

    根据以上结果，可以推断丁的得分是______分．'
  answer: '5'
  solution: '解：知识测试共有6道题目，每题判断正确得1分，判断错误得0分，甲、乙$[公式]$得分都是4分，则甲、乙至少有2道题目的结果相同且为正确答案，不难发现，甲、乙的第3道题和第6道题判断相同，所以第3道题和第6道题的正确答案均为“×”，

    所以丙的第3道题和第6道题判断错误，而丙也得了4分，说明丙其余题目全部判断正确，

    所以这6道题目的正确答案是：1×，2√，3×，4√，5×，6×，

    所以丁做对了5道，得了5分，

    故答案为：5．'
