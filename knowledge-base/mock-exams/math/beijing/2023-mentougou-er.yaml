  question: 如果$a+b=\sqrt{2}$，那么代数式$\left(\frac{a^{2}}{b}-b\right)\cdot\frac{b}{a-b}$的值是_______．
  answer: $\sqrt{2}$
  solution: '解：$\left(\frac{a^{2}}{b}-b\right)\cdot\frac{b}{a-b}$

    $=\frac{a^{2}-b^{2}}{b}\cdot\frac{b}{a-b}$

    $=(a+b)(a-b)-\frac{a-b}{a-b}$

    $=a+b$，

    $\because a+b=\sqrt{2}$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原式$=\sqrt{2}$．'
