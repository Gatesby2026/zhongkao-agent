  question: '已知关于x的一元二次方程$x^{2}-2kx+k^{2}-1=0$．

    （1）求证：方程有两个不相等的实数根；

    （2）如果此方程的一个根为1，求k的值．'
  answer: （1）见解析 （2）0或2
  solution: '【小问1详解】

    解：∵$a = 1$，$b = -2k$，$c=k^{2}-1$，

    ∴$\Delta=b^{2}-4ac=(-2k)^{2}-4\times1\times(k^{2}-1)=4>0$

    ∴方程有两个不相等的实数根．

    【小问2详解】

    解：把$x = 1$代入方程$x^{2}-2kx+k^{2}-1=0$，得

    $1-2k+k^{2}-1=0$，即$k^{2}-2k=0$，

    解得：$k_{1}=0$，$k_{2}=2$．

    ∴k的值为0或2．'
