  question: '如果数据$x_{1},x_{2},x_{3},x_{4}$的平均数为10，那么数据$x_{1}+1,x_{2}+2,x_{3}+4$的平均数是（）

    A.$10$

    B.$11$

    C.$12.5$

    D.$13$'
  answer: C
  solution: '解：∵$x_{1},x_{2},x_{3},x_{4}$的平均数为10，

    ∴$\frac{1}{4} \times (x_{1} + x_{2} + x_{3} + x_{4}) = 10$，

    $x_{1}+x_{2}+x_{3}+x_{4}=40$，

    则$x_{1}+1,x_{2}+2,x_{3}+4$的平均数为：

    $\frac{1}{4}\times(x_{1}+1+x_{2}+2+x_{3}+3+x_{4}+4)$

    $-\frac{1}{4}\times(40+10)$

    $\frac{1}{4}\times50$

    $=12.5$，

    故选：C．'
