  question: '方程组$\begin{cases}

    x + y = 5 \\

    2x - y = 1

    \end{cases}$的解为（）

    A.$\left\{

    \begin{array}{l}

    x=2 \\

    y=3

    \end{array}

    \right.$

    B.$\left\{ \begin{array} { l } { x = 3 } \\ { y = 2 } \end{array} \right.$

    C.$\left\{\begin{array}{l}x=1\\y=4\end{array}\right.$

    D.$\left\{\begin{array}{l}x=4\\y=1\end{array}\right.$'
  answer: A
  solution: '解：$\begin{cases}

    x + y = 5\text{(1)}\\

    2x - y = 1\text{(2)}

    \end{cases}$，

    $① + ②$得：$3x=6$，

    $\therefore x=2$，

    把$x=2$代入$1$得：$y=3$，

    ∴方程组的解为：$\left\{

    \begin{array}{l}

    x=2 \\

    y=3

    \end{array}

    \right.$

    故选：A．'
