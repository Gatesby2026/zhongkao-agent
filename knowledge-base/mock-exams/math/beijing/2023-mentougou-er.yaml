    ∴$m=1+1=2$，

    ∴$A(1,2)$，

    ∴$2 = \frac{k}{1}$，

    ∴$k=2$，

    ∴反比例函数的解析式为：$y=\frac{2}{x}$．

    【小问2详解】

    如下图：

    ∵过点$P(0,n)$作平行于x轴的直线l，

    ∴点C，点D的纵坐标为：n，

    ∵直线l与一次函数$y=x+1$交于点$C(x_1,y_1)$，

    ∴$x_1 = n - 1$，

    ∵直线l与反比例函数$y=\frac{k}{x}(k\neq0)$的图象交于点$D(x_{2},y_{2})$，

    ∴$x_{2}=\frac{2}{n}$，

    ∵$x_{1}<x_{2}$，

    ∴$n-1<\frac{2}{n}$，

    ∴$0<n<2$或$n<-1$．

