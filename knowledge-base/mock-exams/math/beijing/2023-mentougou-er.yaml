  question: '如图，在$Y_{ABCD}$中，$AE \perp BC$于E，$AF \perp CD$于F，且$BE = DF$．

    [图]

    （1）求证：$Y_{ABCD}$是菱形；

    （2）连接AC，BD交于点O，当$\cos\angle ACB=\frac{3}{5}$，$AC = 6$时，求$Y_{ABCD}$的面积．'
  answer: （1）见详解 （2）24
  solution: '【小问1详解】

    证明：在$Y_{ABCD}$中，$\angle ABE = \angle ADF$，

    $\because AE \perp BC$于E，$AF \perp CD$于F，且$BE = DF$，

    $\angle AEB = \angle AFD = 90^\circ$，

    ∴$\triangle AEB \cong \triangle AFD (ASA)$，

    $\therefore AB = AD$，

    ∴$Y_{ABCD}$是菱形；

    【小问2详解】

    解：

    [图]

    $\therefore \square ABCD$是菱形，$AC = 6$，

    $\therefore OC=\frac{1}{2}AC=3$，$AC \perp BD$，

    $\cos\angle ACB=\frac{OC}{BC}=\frac{3}{5}$

    $\therefore BC = 5$，

    在$Rt\triangle BOC$中，$BO = \sqrt{(BC)^2 - (OC)^2} = \sqrt{5^2 - 3^2} = 4$，

    $BD = 2BO = 8$，

    $Y_{ABCD}$的面积为$\frac{1}{2}AC\times BD=\frac{1}{2}\times6\times8=24$．'
