  question: '如图，在四边形$ABCD$中，$AD \parallel BC$，$AB = BC$，E是AB的中点，F是对角线AC的中点，$DF \parallel AB$．

    [图]

    （1）求证：四边形$AEFD$为菱形；

    （2）连接DE交AC于点G，若$DE=2$，$\sin \angle ACD = \frac{1}{4}$，求AF的长．'
  answer: （1）见解析（2）$AF = \frac{2\sqrt{15}}{3}$
  solution: '【小问1详解】

    证明：∵E是AB的中点，F是对角线AC的中点，

    ∴$AE = \frac{1}{2} AB$，EF是$V_{ABC}$的中位线，

    ∴$EF \parallel BC$，$EF=\frac{1}{2}BC$，

    ∵$AB = BC$，

    ∴$AE = EF$．

    ∵$AD \parallel BC$，

    ∴$AD \parallel EF$．

    ∵$DF \parallel AB$，

    ∴四边形$AEFD$是平行四边形．

    ∴$\Box A E F D$是菱形．

    【小问2详解】

    解：∵四边形$AEFD$是菱形$DE=2$，

    [图]

    ∴$AF \perp DE$，$GF=\frac{1}{2}AF$，$DG=\frac{1}{2}DE$，

    ∴$\angle DGF=90^{\circ}$，$DG = 1$．

    又在$\triangle DGC$中，$\sin \angle ACD = \frac{1}{4}$，

    ∴$CD=\frac{DG}{\sin \angle ACD}=\frac{1}{4}=4$，

    ∴$GC = \sqrt{CD^{2} - DG^{2}} = \sqrt{15}$，

    ∵F为AC中点，

    ∴$AF = FC$，

    ∴$GF=\frac{1}{2}FC$，

    ∴$GF=\frac{1}{2}GC=\frac{\sqrt{15}}{3}$，

    ∴$AF = \frac{2\sqrt{15}}{3}$．'
