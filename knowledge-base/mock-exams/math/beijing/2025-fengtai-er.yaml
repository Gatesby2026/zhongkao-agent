  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图象经过点$(2,1)$和$(0,-1)$，与过点$(0,3)$且垂直于y轴的直线交于点A．

    （1）求该函数的解析式及点A的坐标；

    （2）当$x<4$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值大于函数$y=kx+b\,(k\neq0)$的值且小于3，直接写出n的值．'
  answer: （1）函数的解析式为$y=x-1$，$A(4,3)$ （2）1
  solution: '【小问1详解】

    解：把点$(2,1)$和$(0,-1)$代入$y=kx+b\,(k\neq0)$得：

    $\left\{\begin{array}{l}2k+b=1\\b=-1\end{array}\right.$，

    解得：$\left\{\begin{array}{l}k=1\\b=-1\end{array}\right.$，

    ∴该函数的解析式为$y=x-1$，

    由题意知点A的纵坐标为3，

    当$y=x-1=3$时，

    解得：$x = 4$，

    ∴$A(4,3)$；

    【小问2详解】

    解：由（1）知：当$x = 4$时，$y=x-1=3$，

    因为当$x<4$时，函数$y = \frac{1}{2}x + n$的值大于函数$y=x-1$的值且小于3，

    所以当$y = \frac{1}{2}x + n$过点$(4,3)$时满足题意，

    代入$(4,3)$得：$3=\frac{1}{2}\times4+n$，

    解得：$n = 1$．'
