  answer: （1）见解析（2）$OF = \frac{25}{3}$
  solution: '【小问1详解】

    证明：∵$OD \perp BC$于点$E_{2}OD$是$\odot\odot$的半径，

    ∴$\overline{CD}=\overline{BD}$．

    ∴$\angle CBD = \angle BAD$．

    【小问2详解】

    解：∵$OD \perp BC$于点E，OD是$\odot\odot$的半径，$BC = 8$，

    ∴$BE=CE=4$，$\angle BED=\angle BEO=90^{\circ}$．

    ∵$\angle CBD = \angle BAD$，$\tan \angle BAD = \frac{1}{2}$，

    ∴$\tan \angle CBD = \tan \angle BAD = \frac{1}{2}$．

    在$Rt\triangle BED$中，$\tan \angle CBD = \frac{DE}{BE}$．

    ∴$DE = 2.$

    设$\odot\odot$的半径为r．

    ∴$OE = r - 2$．

    在$\mathrm{Rt}\triangle OEB$中，$OE^{2}+BE^{2}=OB^{2}$．

    ∴$(r-2)^{2}+4^{2}=r^{2}$．

    ∴$r = 5$．

    ∴$OE = 3$．

    ∵AF是$\odot\odot$的切线，

    ∴$AF \perp OA$．

    ∴$\angle FAO = 90^\circ$，

    ∴$\angle FAO = \angle BEO$．

    又∵$\angle FOA = \angle BOE$，

    ∴$\triangle FOD\sim\triangle BOE$．

    ∴$\frac{OF}{OB}=\frac{OA}{OE}$，

    ∴$OF = \frac{25}{3}$．

