  question: '如图，在矩形$ABCD$中，$AD=2AB$，O为对角线的交点．将矩形$ABCD$绕点O逆时针旋转$90^\circ$得到矩形$A''B''C''D''$，连接$AD''$，$BA''$，$CB''$，$DC''$，给出下面三个结论：

    ①连接$OC''$，则$\angle AOC = 90^\circ$；

    ②点O到AB的距离小于点O到$AD''$的距离；

    ③若$AB = a$，则八边形$ABA''B''CDC''D''$的面积为$\frac{7}{2}a^{2}$．

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①②B.①③C.②③D.①②③'
  answer: D
  solution: '解：如图，

    [图]

    ∵将矩形$ABCD$绕点O逆时针旋转$90^\circ$得到矩形$A''B''C''D''$，

    ∴点C的对应点是$C''$，

    ∴$\angle COC''=90^\circ$，

    ∴$\angle AOC = 90^\circ$，故①正确；

    如图，

    [图]

    ∵将矩形$ABCD$绕点O逆时针旋转$90^\circ$得到矩形$A''B''C''D''$，

    ∴AD的对应边是$A''D''$，BC的对应边是$B''C''$，AB的对应边是$A''B''$，BC的对应边是$B''C''$，CD的对应边是$C''D''$，

    ∴$AD \perp A''D''$，$BC \perp B''C''''$，$AB = AB$，$BC = B''C''$，$CD = C''D''$，$\overline{AD}=\overline{A''D''}$，

    ∴$\angle AEH = 90^\circ$，

    ∵四边形$ABCD$是矩形，

    ∴$\angle EAB = \angle ABH = 90^\circ$，$AB = CD$，

    ∴四边形$ABHE$是矩形，

    ∴$AB = HE$，$AE = BH$，

    同理可得：四边形$A''B''GH$是矩形，四边形$CDFG$是矩形，四边形$D''C''EF$是矩形，

    ∴$A''B''=GH$，$A''H=B''G$，$CD = FG$，$CG = DF$，$D''C''=EF$，$DE=CF$，

    ∵$AB = CD$，$AE = BH$，$CG = DF$，

    ∴$BH+GH+GC=AE+EF+FD$，

    ∴$GH = EF$，

    同理可得：$EH = FG$，

    ∵$AB = AB$，$AB = HE$，$A''B''=GH$，

    ∴$GH = EF = EH = FG$，

    ∵$\angle AEH = 90^\circ$，

    ∴$\angle FEH = 90^\circ$，

    ∴四边形$EFGH$是正方形，

    ∴正方形$EFGH$绕'
