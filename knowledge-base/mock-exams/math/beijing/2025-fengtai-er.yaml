  question: '如图，在正方形$ABCD$中，点E在CD上，AE，BD相交于点F，$DF = DE$．若$AB = 1$，则CE的长为______．

    [图]'
  answer: $2-\sqrt{2}$
  solution: '解：在正方形$ABCD$中，$AB = 1$

    ∴$AB = AD = CD = 1, \angle BAD = 90^\circ$$AB \parallel CD$，

    ∴$BD = \sqrt{AB^{2} + AD^{2}} = \sqrt{2}$，$\angle DEF = \angle BAF$，

    ∵$DF = DE$，

    ∴$\angle DEF = \angle DFE$，

    ∴$\angle BAF = \angle DFE$，

    ∵$\angle DFE = \angle AFB$，

    ∴$\angle AFB = \angle BAF$，

    ∴$BF = AB = 1$，

    ∴$DF=BD-FB=\sqrt{2}-1$，

    ∴$DE = \sqrt{2} - 1$，

    ∴$CE=CD-DE=2-\sqrt{2}$．

    故答案为$2-\sqrt{2}$．'
