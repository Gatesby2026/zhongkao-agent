  question: '如图，PA，PB是$\odot\odot$的切线，A，B是切点．若$\angle AOB=130^{\circ}$，则$\angle APO =$______°．

    [图]'
  answer: '25'
  solution: '解：∵$PA,PB$是$\odot\odot$的切线，

    ∴$\angle OAP = \angle OBP = 90^\circ$．

    ∵$OP=OP,AO=BO$，

    ∴$\triangle AOP \cong \triangle BOP$，

    ∴$\angle AOP = \angle BOP$．

    ∵$\angle AOB=130^{\circ}$，

    ∴$\angle AOP = \angle BOP = \frac{130^\circ}{2} = 65^\circ$，

    ∴$\angle APO=90^{\circ}-65^{\circ}+25^{\circ}$．

    故答案为：25．'
