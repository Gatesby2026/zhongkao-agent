  question: '某小组设计了一款自动浇花装置，小组同学调节浇花装置出水管，使其沿水平方向．水滴从出水点水平喷出后的运动路线可以看作是抛物线的一部分．从水滴离开出水点到落地点的过程中，水滴距离地面的竖直高度为y（单位：m），水平距离为x（单位：m），建立如图1所示的平面直角坐标系．

    [图]

    a．通过仪器测量，小组同学记录了水滴离开出水点后的运动时间为t（单位：S）时的多组数据，其中几组数据如下：

    时间$t / s$

    0

    0.10

    0.20

    0.30

    水平距离$x / m$

    0

    0.10

    0.20

    0.30

    竖直线高度$y/m$

    h

    0.75

    0.60

    0.35

    b．小组同学通过学习知道，水滴运动时，水平距离x与时间t的关系为$[公式]$（$\nu$为水滴离开出水点时的速度，单位$\mathrm{m/s}$）

    根据以上信息，解决下列问题：

    （1）$\nu$的值是______；

    （2）h的值是______，水滴从离开出水点到落在落地点，需要经过______S；

    （3）将如图2所示的一个高为$0.2m$的花盆放置在地面上，使花盆底面中心N在图1所示的x轴上，且$ON = 0.4\,\text{m}$．若该装置可以调节出水点的高度（出水管保持水平），要使水滴运动时恰好经过花盆顶端中心M（不考虑其他因素），则需要将出水点向______（填“上”或“下”）平移______m．'
  answer: （1）1；（2）0.8，0.4； （3）上，0.2
  solution: '【小问1详解】

    解：由题意得，$v=0.1C+0.10=1$；

    【小问2详解】

    解：设抛物线解析式为$y = ax^2 + bx + c$，

    把$(0.10, 0.75), (0.20, 0.60), (0.30, 0.35)$代入到$y = ax^2 + bx + c$中得

    $\begin{aligned}

    0.01a + 0.1b + c &= 0.75 \\

    0.04a + 0.2b + c &= 0.60 \\

    0.09a + 0.3b + c &= 0.35

    \end{aligned}$，

    解得$\begin{aligned}

    a &= -5 \\

    b &= 0 \\

    c &= 0.8

    \end{aligned}$，

    ∴抛物线解析式为$y = -5x^{2} + 0.8$，

    在$y = -5x^{2} + 0.8$中，当$x = 0$时，$y=-5x^{2}+0.8=0.8$，

    ∴$h = 0.8$；

    在$y = -5x^{2} + 0.8$中，当$y-5x^{2}+0.8=0$时，解得$x = 0.4$或$x = -0.4$（舍去），

    ∴水滴从离开出水点到落在落地点，需要经过$0.4+1=0.4s$；

    【小问3详解】

    解：设平移后的抛物线解析式为$y = -5x^2 + 0.8 + f$，

    由题意得，抛物线$y = -5x^2 + 0.8 + f$经过点$(0.4,0.2)$，

    ∴$0.2=-5\times 0.4^{2}+0.8+f$，

    解得$f = 0.2$，

    ∴要使水滴运动时恰好经过花盆顶端中心M（不考虑其他因素），则需要将出水点向上平移$0.2m$．'
