  question: 27. 在 △ABC 中，∠BAC = α，AB = AC，CD ⊥ AB 于点 D，过点 B 作 BM // AC，P 是线段 DB 上一点，连接 CP，作 ∠CAQ = ∠APC，交射线 BM 于点 Q。 \\ (1) 如图 1，当 ∠CAQ = 2α（36° < α < 60°）时，求 ∠BCP 的度数（用含 α 的式子表示）； \\ (2) 如图 2，点 E 为 AP
    中点，用等式表示 DE 与 BQ 的数量关系，并证明。
  answer: '(1) 解: \(\because AB=AC,

    \therefore \angle ABC=\angle ACB.

    \because \angle BAC=\alpha,

    \therefore \angle ABC=\frac{180^\circ-\angle BAC}{2}=\frac{90^\circ-\frac{\alpha}{2}}{2}.

    \because \angle CAQ = \angle APC, \angle CAQ = 2\alpha,

    \therefore \angle BCP = \angle APC - \angle ABC = \frac{5\alpha}{2} - 90^\circ.\)

    (2) BQ 与 DE 的数量关系为：BQ = 2DE.

    证明：如图，在 AD 上取点 N，使得 DN = DP，连接 CN.

    \(\because CD \perp AB,

    \therefore CP = CN.

    \therefore \angle CNP = \angle APC.

    \because \angle CAQ = \angle APC,

    \therefore \angle CNP = \angle CAQ.

    \because AC \parallel BM,

    \therefore \angle CAB = \angle ABM, \angle AQM = \angle CAQ.

    \therefore \angle AQB = \angle CNA.

    \because AB = AC,

    \therefore \triangle CNA \cong \triangle AQB.

    \therefore AN = BQ.

    \because E 是 AP 的中点,

    \therefore AP = 2PE.

    \because PN = 2PD,

    \therefore AN = AP - PN = 2PE - 2PD = 2DE.

    \therefore BQ = 2DE.\)'
