  question: 20. 如图，在四边形 $ABCD$ 中，$\angle ABC = \angle ADC = 90^\circ$，对角线 $AC$ 平分 $\angle BAD$，过点 $B$ 作 $BE \parallel CD$ 的延长线于点 $E$，过点 $B$ 作 $BF \parallel ED$，交 $AC$ 于点 $G$，交 $AD$ 于点 $F$。 \\ （1）求证：四边形
    $BEDF$ 是矩形； \\ （2）若点 $F$ 是 $AD$ 的中点，$DE = 9$，求 $AB$ 的长。
  answer: '(1) 证明: \(\because BE \perp CD,

    \therefore \angle BED = 90^{\circ}

    \because BF \parallel ED,

    \therefore \angle BFD + \angle ADC = 180^{\circ}

    \because \angle ADC = 90^{\circ},

    \therefore \angle BFD = 90^{\circ}

    \therefore 四边形 BEDF 是矩形.\)

    (2) 解: \(\because 点 F 是 AD 的中点,

    \therefore AD = 2AF

    \because AC 平分 \angle BAD,

    \therefore \angle BAC = \angle DAC

    \because \angle ABC = \angle ADC = 90^{\circ}, AC = AC,

    \therefore \triangle ABC \cong \triangle ADC

    \therefore AB = AD = 2AF

    \because 在 Rt\triangle ABF 中, \angle AFB = 90^{\circ},

    \therefore \angle ABF = 30^{\circ}

    \because 在矩形 BEDF 中, DE = 9,

    \therefore BF = DE = 9

    \because \cos \angle ABF = \frac{BF}{AB},

    \therefore AB = 6\sqrt{3}.\)'
  solution: '(1) 证明: \(\because BE \perp CD,

    \therefore \angle BED = 90^{\circ}

    \because BF \parallel ED,

    \therefore \angle BFD + \angle ADC = 180^{\circ}

    \because \angle ADC = 90^{\circ},

    \therefore \angle BFD = 90^{\circ}

    \therefore 四边形 BEDF 是矩形.\)

    (2) 解: \(\because 点 F 是 AD 的中点,

    \therefore AD = 2AF

    \because AC 平分 \angle BAD,

    \therefore \angle BAC = \angle DAC

    \because \angle ABC = \angle ADC = 90^{\circ}, AC = AC,

    \therefore \triangle ABC \cong \triangle ADC

    \therefore AB = AD = 2AF

    \because 在 Rt\triangle ABF 中, \angle AFB = 90^{\circ},

    \therefore \angle ABF = 30^{\circ}

    \because 在矩形 BEDF 中, DE = 9,

    \therefore BF = DE = 9

    \because \cos \angle ABF = \frac{BF}{AB},

    \therefore AB = 6\sqrt{3}.\)'
