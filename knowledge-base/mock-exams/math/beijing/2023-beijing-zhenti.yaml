  question: '如图，在$Y_{ABCD}$中，点E，F分别在BC，AD上，$BE = DF$，$AC = EF$．

    [图]

    （1）求证：四边形$AECF$是矩形；

    （2）$AE = BE$，$AB=2$，$\tan \angle ACB = \frac{1}{2}$，求BC的长．'
  answer: （1）见解析 （2）$3\sqrt{2}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$AD = BC$，$AD \parallel BC$，

    ∵$BE = DF$，

    ∴$AF = EC$，

    ∴四边形$AECF$是平行四边形，

    ∵$AC = EF$，

    ∴平行四边形$AECF$是矩形；

    【小问2详解】

    解：由（1）知四边形$AECF$是矩形，

    ∴$\angle AEC = \angle AEB = 90^\circ$，

    ∵$AE = BE$，$AB=2$，

    ∴$\triangle ABE$是等腰直角三角形，

    ∴$AE = BE = \frac{\sqrt{2}}{2} AB = \sqrt{2}$，

    又∵$\tan\angle ACB=\frac{AE}{EC}=\frac{1}{2}$，

    ∴$\frac{\sqrt{2}}{EC}=\frac{1}{2}$，

    ∴$EC = 2\sqrt{2}$，

    ∴$BC = BE + EC = \sqrt{2} + 2\sqrt{2} = 3\sqrt{2}$．'
