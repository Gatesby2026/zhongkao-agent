  question: '某校舞蹈队共16名学生，测量并获取了所有学生的身高（单位：cm），数据整理如下：

    a.16名学生的身高：

    161，162，162，164，165，165，165，166，

    166，167，168，168，170，172，172，175

    b.16名学生的身高的平均数、中位数、众数：

    | 平均数 | 中位数 | 众数 |

    | --- | --- | --- |

    | 166.75 | m | n |

    （1）写出表中m，n的值；

    （2）对于不同组的学生，如果一组学生的身高的方差越小，则认为该组舞台呈现效果越好．据此推断：在下列两组学生中，舞台呈现效果更好的是______（填“甲组”或“乙组”）；

    | 甲组学生的身高 | 162 | 165 | 165 | 166 | 166 |

    | --- | --- | --- | --- | --- | --- |

    | 乙组学生的身高 | 161 | 162 | 164 | 165 | 175 |

    （3）该舞蹈队要选五名学生参加比赛．已确定三名学生参赛，他们的身高分别为168，168，172，他们的身高的方差为$\frac{32}{9}$．在选另外两名学生时，首先要求所选的两名学生与已确定的三名学生所组成的五名学生的身高的方差小于$\frac{32}{9}$，其次要求所选的两名学生与已确定的三名学生所组成的五名学生的身高的平均数尽可能大，则选出的另外两名学生的身高分别为______和______．'
  answer: （1）$m = 166$，$n = 165$； （2）甲组 （3）170，172
  solution: '【小问1详解】

    解：将这组数据按照从小到大的顺序排列为：161，162，162，164，165，165，165，166，166，167，168，168，170，172，172，175，

    出现次数最多的数是165，出现了3次，即众数$n = 165$，

    16个数据中的第8和第9个数据分别是166，166，

    ∴中位数$m=\frac{166+166}{2}=166$，

    ∴$m = 166$，$n = 165$；

    【小问2详解】

    解：甲组身高的平均数为$\frac{1}{5}(162+165+165+166+166)=164.8$，

    甲组身高的方差为$\frac{1}{5}\left[(162-164.8)^{2}+(165-164.8)^{2}+(165-164.8)^{2}+(166-164.8)^{2}+(166-164.8)^{2}\right]=2.16$

    乙组身高的平均数为$\frac{1}{5}(161+162+164+165+175)=165.4$，

    乙组身高的方差为$\frac{1}{5}\left[(161-165.4)^2+(162-165.4)^2+(164-165.4)^2+(165-165.4)^2+(175-165.4)^2\right]=25.04$，

    ∵$25.04 > 2.16$

    ∴舞台呈现效果更好的是甲组，

    故答案为：甲组；

    【小问3详解】

    解：168，168，172的平均数为$\frac{1}{3}(68+68+72)=169\frac{1}{3}$

    ∵所选的两名学生与已确定的三名学生所组成的五名学生的身高的方差小于$\frac{32}{9}$，

    ∴数据的差别较小，数据才稳定，

    可供选择的有：170，172，

    且选择170，172时，平均数会增大，

    故答案为：170，172．'
