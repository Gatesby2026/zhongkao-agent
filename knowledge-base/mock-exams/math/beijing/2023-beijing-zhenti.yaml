  question: '如图，点A、B、C在同一条线上，点B在点A，C之间，点D，E在直线AC同侧，$AB < BC$，$\angle A=\angle C=90^{\circ}$，$\triangle EAB\cong\triangle BCD$，连接DE，设$AB = a$，$BC = b$，$DE = c$，给出下面三个结论：①$a+b<c$；②$a+b\sqrt{a^{2}+b^{2}}$；③$\sqrt{2}(a+b)>c$；

    [图]

    上述结论中，所有正确结论的序号是（）

    A.①②

    B.①③

    C.②③

    D.①②③'
  answer: D
  solution: '解：如图，过D作$DF \perp AE$于F，则四边形$ACDF$是矩形，

    [图]

    ∴$DF = AC = a + b$，

    ∵$DF < DE$，

    ∴$a+b<c$，①正确，故符合要求；

    ∵$\triangle EAB\cong\triangle BCD$，

    ∴$BE = BD$，$CD = AB = a$，$AE = BC = b$，$\angle ABE = \angle CDB$，

    ∵$\angle CBD+\angle CDB=90^{\circ}$，

    ∴$\angle CBD + \angle ABE = 90^\circ$，$\angle EBD=90^\circ$，

    ∴$\triangle BDE$是等腰直角三角形，

    由勾股定理得，$BE = \sqrt{AB^{2} + AE^{2}} = \sqrt{a^{2} + b^{2}}$，

    ∵$AB + AE > BE$，

    ∴$a+b\sqrt{a^{2}+b^{2}}$，②正确，故符合要求；

    由勾股定理得$DE^{2}=BD^{2}+BE^{2}$，即$c^{2}=2\left(a^{2}+b^{2}\right)$，

    ∴$c=\sqrt{2}\times\sqrt{a^{2}+b^{2}}<\sqrt{2}(a+b)$，③正确，故符合要求；

    故选：D．'
