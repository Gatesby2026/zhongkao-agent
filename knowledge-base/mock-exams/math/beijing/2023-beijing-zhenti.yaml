  question: '在平面直角坐标系xOy中，$M(x_{1},y_{1})$，$N(x_{2},y_{2})$是抛物线$y=ax^{2}+bx+c(a>0)$上任意两点，设抛物线的对称轴为$x = t$．

    （1）若对于$x_{1}=1$，$x_2 = 2$有$y_{1}=y_{2}$，求t的值；

    （2）若对于$0 < x_{1} < 1$，$1<x_{2}<2$，都有$y_1 < y_2$，求t的取值范围．'
  answer: （1）$t = \frac{3}{2}$ （2）$t \leqslant \frac{1}{2}$
  solution: '【小问1详解】

    解：∵对于$x_{1}=1$，$x_2 = 2$有$y_{1}=y_{2}$，

    ∴抛物线的对称轴为直线$x=\frac{x_{1}+x_{2}}{2}=\frac{3}{2}$，

    ∵抛物线的对称轴为$x = t$．

    ∴$t = \frac{3}{2}$；

    【小问2详解】

    解：∵当$0 < x_{1} < 1$，$1<x_{2}<2$，

    ∴$\frac{1}{2}<\frac{x_{1}*x_{2}}{2}<\frac{3}{2}$，$x_{1}<x_{2}$，

    ∵$y_1 < y_2$，$a > 0$，

    ∴$(x_1,y_1)$离对称轴更近，$x_{1}<x_{2}$，则$(x_1,y_1)$与$\left(x_{2},y_{2}\right)$的中点在对称轴的右侧，

    ∴$\frac{x_{1}+x_{2}}{2}>t$，

    即$t \leqslant \frac{1}{2}$．'
