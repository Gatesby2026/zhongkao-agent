    ∵BD平分$\angle ABC$，

    ∴$\angle ABD = \angle CBD$，

    ∴$\widehat{AD}=\widehat{CD}$，

    ∴$\overrightarrow{AB}+\overrightarrow{AD}=\overrightarrow{BC}+\overrightarrow{CD}$，即$\widehat{BAD}=\widehat{BCD}$，

    ∴BD是直径，

    ∴$\angle BAD = 90^\circ$；

    【小问2详解】

    解：∵$\angle BAD = 90^\circ$，$CF \parallel AD$，

    ∴$\angle F+\angle BAD=180^\circ$，则$\angle F = 90^\circ$．

    ∵$\widehat{AD}=\widehat{CD}$，

    ∴$AD = DC$．

    ∵$AC = AD$，

    ∴$AC = AD = CD$，

    ∴$\triangle ADC$是等边三角形，则$\angle ADC = 60^\circ$．

    ∵BD平分$\angle ADC$，

    ∴$\angle CDB=\frac{1}{2}\angle ADC=30^\circ$．

    ∵BD是直径，

    ∴$\angle BCD = 90^\circ$，则$BC=\frac{1}{2}BD$．

    ∵四边形$ABCD$是圆内接四边形，

    ∴$\angle ADC + \angle ABC = 180^\circ$，则$\angle ABC = 120^\circ$，

    ∴$\angle FBC = 60^\circ$，

    '
