  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(0,1)$和$B(1,2)$，与过点$(0,4)$且平行于x轴的线交于点C．

    （1）求该函数的解析式及点C的坐标；

    （2）当$x<3$时，对于x的每一个值，函数$y=\frac{2}{3}x+n$的值大于函数$y=kx+b\ (k\neq0)$的值且小于4，直接写出n的值．'
  answer: （1）$y=x+1$，$C(3,4)$； （2）$n=2$．
  solution: '【小问1详解】

    解：把点$A(0,1)$，$B(1,2)$代入$y=kx+b\ (k\neq0)$得：$\begin{cases}

    b = 1 \\

    k + b = 2

    \end{cases}$，

    解得：$\left\{\begin{array}{l}k=1\\b=1\end{array}\right.$，

    ∴该函数的解析式为$y=x+1$，

    由题意知点C的纵坐标为4，

    当$y = x + 1 = 4$时，

    解得：$x=3$，

    ∴$C(3,4)$；

    【小问2详解】

    解：由（1）知：当$x=3$时，$y = x + 1 = 4$，

    因为当$x<3$时，函数$y=\frac{2}{3}x+n$的值大于函数$y=x+1$的值且小于4，

    所以如图所示，当$y=\frac{2}{3}x+n$过点$(3,4)$时满足题意，

    代入$(3,4)$得：$4=\frac{2}{3}\times 3+n$，

    解得：$n=2$．

    [图] 【点睛】本题考查了一次函数的图象和性质，待定系数法的应用，一次函数图象上点的坐标特征，利用数形结合的思想是解题的关键．'
