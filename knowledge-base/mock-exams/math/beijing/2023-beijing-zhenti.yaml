  question: '如图，直线AD，BC交于点O，$AB \parallel EF \parallel CD$.若$AO = 2$，$OF = 1$，$FD=2$.则$\frac{BE}{EC}$的值为______．

    [图]'
  answer: $\frac{3}{2}$
  solution: '$\because AB \parallel EF \parallel CD$，$AO = 2$，$OF = 1$，

    $\therefore \frac{BO}{OE} = \frac{AO}{OF} = \frac{2}{1}$，

    $\therefore BO = 2OE$，

    $\because \frac{OE}{EC}=\frac{OF}{FD}=\frac{1}{2}$，

    $EC = 2OE$，

    $\frac{BE}{EC}=\frac{2OE+OE}{2OE}=\frac{3}{2}$；

    故答案为：$\frac{3}{2}$.'
