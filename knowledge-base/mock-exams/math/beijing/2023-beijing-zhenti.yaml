  question: '对联是中华传统文化的瑰宝，对联装裱后，如图所示，上、下空白处分别称为天头和地头，左、右空白处统称为边．一般情况下，天头长与地头长的比是$6:4$，左、右边的宽相等，均为天头长与地头长的和的$\frac{1}{10}$．某人要装裱一幅对联，对联的长为$100cm$，宽为$27\mathrm{cm}$．若要求装裱后的长是装裱后的宽的4倍，求边的宽和天头长．（书法作品选自《启功法书》）

    [图]'
  answer: 边的宽为$4\mathrm{cm}$，天头长为$24cm$
  solution: '解：设天头长为xcm，

    由题意天头长与地头长的比是$6:4$，可知地头长为$\frac{2}{3}x\mathrm{cm}$，

    边的宽为$\frac{1}{10}\left(x+\frac{2}{3}\right)\cdot\sin\frac{\pi}{6}\cdot x\mathrm{cm}$，

    装裱后的长为$\left(\frac{2}{3}x+x+109\right)\text{cm}-\left(\frac{2}{3}x+100\right)\text{cm}$，

    装裱后的宽为$\left(\frac{1}{6}x^{2}+\frac{1}{3}x+27\right)\mathrm{cm}-\left(\frac{1}{3}x+27\right)\mathrm{cm}$，

    由题意可得：$\frac{5}{3}x+100=\left(\frac{1}{3}x+27\right)\times4$

    解得$x = 24$，

    ∴$\frac{1}{6}x = 4$，

    答：边的宽为$4\mathrm{cm}$，天头长为$24\mathrm{cm}$．'
