  question: 先化简，再求值：已知$3x^{2}+x+1=0$，求$(x+1)(x-2)-(3+2x)(2x-3)$的值．
  answer: '8'
  solution: '解：$(x+1)(x-2)-(3+2x)(2x-3)$

    $=x^{2}-x-2-(4x^{2}-9)$

    $x^{2}-x-2-4x^{2}+9$

    $=-3x^{2}-x+7$

    $=-(3x^{2}+x)+7$

    ∵$3x^{2}+x+1=0$

    ∴$3x^2 + x = -1$

    ∴$-\left(3x^{2}+x\right)+7=-(-1)+7=8$'
