  question: '如图，$\triangle ABC$是圆内接三角形，过圆心O作$OF \perp AC$，连接$OA,OC$，过点C作$CD \parallel AO$，交BA的延长线于点D，$\angle COF=45^\circ$．

    [图]

    （1）求证：DC是$\odot\odot$的切线；

    （2）如果$BC \cdot CE = 8$，求$\odot\odot$半径的长度．'
  answer: （1）证明见解析 （2）$\odot\odot$半径的长度为$2$
  solution: '【小问1详解】

    解：∵$\angle COF=45^\circ$，$OA = OC$，$OF \perp AC$，

    ∴$\angle AOC=2\angle COF=90^\circ$，$\angle OMC=\frac{1}{2}(180^\circ-90^\circ)=45^\circ$，

    ∵$CD \parallel AO$，

    ∴$\angle OCD=180^{\circ}-\angle AOC=90^{\circ}$，

    即$CD\perp OC$，

    ∵OC是$\odot\odot$的半径，

    ∴DC是$\odot\odot$的切线．

    【小问2详解】

    由（1）可知$\angle AOC=90^\circ$，$\angle OAC = 45^\circ$，

    ∴$\angle ABC = \frac{1}{2} \angle AOC + 45^\circ$，

    ∴$\angle ABC=\angle OAC=45^{\circ}$，

    ∵$\angle BCA = \angle ACE$，

    ∴$\triangle ABC \sim \triangle EAC$，

    ∴$\frac{BC}{AC}=\frac{AC}{CE}$，即$AC^{2}=BC\cdot CE$，

    ∵$BC \cdot CE = 8$，

    ∴$AC^{2}=8$，

    ∴由勾股定理得$2OC^{2}=AC^{2}=8$，

    解得：$OC = 2$（负值舍去），

    ∴$\odot\odot$半径的长度为$2$．'
