  answer: '4500'
  solution: '解：第1组的花生种子的萌发率为：$\frac{186}{200}\times100\%=93\%$，

    第2组的花生种子的萌发率为：$\frac{180}{200}\times100\%=90\%$，

    第3组的花生种子的萌发率为：$\frac{180}{200}\times100\%=90\%$，

    第4组的花生种子的萌发率为：$\frac{176}{200}\times100\%=88\%$，

    第5组的花生种子的萌发率为：$\frac{178}{200}\times100\%=89\%$，

    ∴花生种子的萌芽率的平均值为：$\frac{1}{5}(93\%+90\%+90\%+88\%+86\%)=90\%$，

    ∴在温度25℃的条件下，将5000粒种子浸种24小时，萌发量大致为$5000\times90\%=4500$；

    故答案为：4500；'
