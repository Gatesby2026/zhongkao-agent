  question: '如图，平面直角坐标系xOy中，一次函数$y = -\frac{1}{2}x + 3$的图象$\ell_{1}$分别与x，y轴交于A，B两点，正比例函数$y = kx$的图象$l_2$与$\ell_{1}$交于点$C(m,4)$．

    [图]

    （1）求m的值及$l_2$的表达式；

    （2）一次函数$y=nx+1$的图象为$l_{3}$，且$l_1,l_2,l_3$三条直线不能围成三角形，直接写出所有满足条件的n的值．'
  answer: （1）$m = -2$，$y = -2x$ （2）$n = -\frac{1}{2}$或$n = -\frac{3}{2}$或$n = -2$
  solution: '【小问1详解】

    解：∵$l_2$与$\ell_{1}$交于点$C(m,4)$，

    ∴$4 = -\frac{1}{2}m + 3$，

    ∴$m = -2$，

    ∴$C(-2,4)$，

    ∴$4 = -2k$，

    ∴$k = -2$，

    ∴$l_2$的表达式为：$y = -2x$；

    【小问2详解】

    解：∵$l_1,l_2,l_3$三条直线不能围成三角形，

    ①当$l_{3}$过点C时，三条直线交于一点，满足题意，

    此时：$4 = -2n + 1$，解得：$n = -\frac{3}{2}$；

    ②当$l_3 \parallel l_1$时，满足题意，此时$n = -\frac{1}{2}$；

    ③当$l_3 \parallel l_2$时，满足题意，此时$n = -2$；

    综上：$n = -\frac{1}{2}$或$n = -\frac{3}{2}$或$n = -2$．'
