  question: '在平面直角坐标系xOy中，已知点$(-1,n),(2,p)$在二次函数$y = -x^2 + bx + 2$的图象上．

    （1）当$n = p$时，求b的值；

    （2）当$(2-n)(n-p)>0$，求b的取值范围．'
  answer: （1）$b = -1$ （2）$-1 < b < 1$
  solution: '【小问1详解】

    解：点$(-1,n),(2,p)$在二次函数$y = -x^2 + bx + 2$的图象上，当$n = p$时，$(-1,n)$和$(2,p)$关于对称轴对称，

    则：抛物线的对称轴为直线：$x = -\frac{b}{2a} = \frac{-1 + 2}{2} = \frac{1}{2}$，

    ∴$b = -1$；

    【小问2详解】

    解：∵$y = -x^2 + bx + 2$，$a = -1 < 0$，对称轴为直线$x=\frac{b}{2}$，

    ∴当$x<\frac{b}{2}$时，y随x的增大而增大，当$x>\frac{b}{2}$时，y随x的增大而减小，抛物线上的点离对称轴越远，函数值越小；

    ∵$x = 0$时，$y=2$，

    ∴抛物线过点$(0,2)$，

    当$n=2$时，$\frac{b}{2} = -\frac{1}{2}$，即$b = -1$；

    ∵$(2-n)(n-p)>0$，

    ①当$2>n$时，$n > p$，如图：

    [图]

    ∵$-1<2$，$n > p$，

    ∴$\left|\frac{b}{2}+1\right|<2-\frac{b}{2}\\

    \frac{b}{2}>-\frac{1}{2}$，

    解得：$-1 < b < 1$；

    ②当$2<n$时，此时对称轴在y轴的左侧，点$(-1,n)$离抛物线的对称轴近，

    ∴$n > p$，$(2-n)(n-p)<0$不满足题意；

    综上：$-1 < b < 1$．'
