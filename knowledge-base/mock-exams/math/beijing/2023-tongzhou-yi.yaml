  question: '如图，在四边形$ABCD$中，$AB\parallel CD,AB=BD=2CD$，E为AB的中点，请你用无刻度的直尺在图中画$\triangle ABD$的边AD上的高线，小蕊的画法如下．请你按照小蕊的画法完成画图，并填写证明的依据．

    [图]

    | 画法： ① 连接 ED ， ② 连接 CE ，交 BD 于点 F ， ③ 连接 AF ，交 DE 于点 P ④ 作射线 BP ，交 AD 于点 H ， ∴ BH 即为所求 $\triangle ABD$ 的边 AD 上的高线 证明： ∵ $AB = 2CD$ ， E 为 AB 的中点， ∴ $BE = CD$ ． ∵ $AB \parallel CD$ ， ∴ 四边形 $EBCD$ 是平行四边形．
    ___________________________ ． ∴ 点 F 是 BD 中点． ____________________________ ． ∴ $AF、DE$ 是 $\triangle ABD$ 的中线 ∴ BH 是 $\triangle ABD$ 的中线 ∵ $AB = BD$ ∴ BH 是 AD 边上的高线． ______________________________ ． |

    | --- |'
  answer: 见解析
  solution: '[图]

    ∵$AB = 2CD$，E为AB的中点，

    ∴$BE = CD$．

    ∵$AB \parallel CD$，

    ∴四边形$EBCD$是平行四边形．（一组对边平行且相等的四边形是平行四边形），

    ∴点F是BD中点．（平行四边形对角线互相平分），

    ∴$AF、DE$是$\triangle ABD$的中线，

