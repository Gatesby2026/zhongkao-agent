  question: 某校需要更换部分体育器材，打算用1800元购买足球和篮球，并且把1800元全部花完.已知每个足球60元，每个篮球120元，根据需要，购买的足球数要超过篮球数，并且足球数不超过篮球数的2倍，写出一种满足条件的购买方案__________________.
  answer: 购买8个篮球，14个足球（或购买9个篮球，12个足球）
  solution: '解：设购买篮球x个，则购买足球的个数为：$\frac{1800-120x}{69}=36-2x$（个），

    依题意得：$\begin{cases}

    30-2x>x \\

    30-2x\leq 2x

    \end{cases}$，解得：$\frac{15}{2} \leq x < 10$，

    又∵x，$30 - 2x$均为正整数，

    ∴x可以取8，9．

    ∴当$x=8$时，$30 - 2x = 14$；当$x=9$时，$30-2x=12$；

    故答案为：购买8个篮球，14个足球（或购买9个篮球，12个足球）．'
