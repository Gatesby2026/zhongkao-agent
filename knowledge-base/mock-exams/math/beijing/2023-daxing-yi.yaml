  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$(1,1)$，$(2,3)$．

    （1）求该函数的解析式；

    （2）当$x > -1$时，对于x的每一个值，函数$\hat{y}=mx(m\neq0)$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=2x-1$ （2）$2\leq m\leq 3$．
  solution: '【小问1详解】

    解：将点$(1,1)$，$(2,3)$代入一次函数$y=kx+b$

    得$\left\{ \begin{array} { l } { k + b = 1 } \\ { 2 k + b = 3 } \end{array} \right.$，解得$\left\{\begin{array}{l}k=2\\b=-1\end{array}\right.$

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$次函数解析式：$y=2x-1$；

    【小问2详解】

    解：$\begin{array}{c}

    \bullet \\

