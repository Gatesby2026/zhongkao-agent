  question: '如图，在菱形$ABCD$中，对角线AC，BD交于点O，延长CB到点E，使得$BE = BC$.连接AE.过点B作$BF \parallel AC$，交AE于点F，连接OF

    [图]

    （1）求证：四边形$AFBO$是矩形；

    （2）若$\angle ABC = 60^\circ$，$BF = 1$，求OF的长'
  answer: （1）见解析（2）2
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是菱形，

    ∴$AC \perp BD$，$AO = OC$，即：$\angle AOB=90^\circ$，O为AC的中点，

    ∵$BE = BC$，即B为EC的中点，

    ∴BO为$\triangle ACE$$[公式]$中位线，

    ∴$BO \parallel AE$，

    又∵$BF \parallel AC$，

    ∴四边形$AFBO$是平行四边形，

    又∵$\angle AOB=90^\circ$，

    ∴四边形$AFBO$是矩形；

    【小问2详解】

    解：由（1）可知，$AO = OC$，四边形$AFBO$是矩形，

    ∴$AO = OC = BF = 1$，则$AC = 2$，

    ∵$BF \parallel AC$，

    ∴四边形$BCOF$是平行四边形，

    ∴$OF = BC$，

    ∵四边形$ABCD$是菱形，

    ∴$AB = BC$，

    ∵$\angle ABC = 60^\circ$，

    ∴$\triangle ABC$是等边三角形，

    ∴$BC = AC = 2$，

    ∴$OF = 2$．'
