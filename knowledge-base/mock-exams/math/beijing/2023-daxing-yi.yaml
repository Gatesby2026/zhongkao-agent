  question: 已知$x^2 + x - 1 = 0$，求代数式$(2x+1)(2x-1)-x(x-3)$的值．
  answer: '2'
  solution: '解：$(2x+1)(2x-1)-x(x-3)$

    $=4x^{2}-1-x^{2}+3x$

    $=3x^{2}+3x-1$

    $=3(x^{2}+x)-1$，

    ∵$x^2 + x - 1 = 0$，

    ∴$x^{2}+x=1$，

    当$x^{2}+x=1$时，原式$=3\times1-1=2$．'
