  question: '羽毛球作为国际球类竞技比赛的一种，发球后羽毛球的飞行路线可以看作是抛物线的一部分.建立如图所示的平面直角坐标系，羽毛球从发出到落地的过程中竖直高度y（单位：m）与水平距离x（单位：m）近似满足函数关系$y = a(x - h)^2 + k \, (a \ne 0)$.

    [图]

    某次发球时，羽毛球的水平距离x与竖直高度y的几组数据如下：

    水平距离$x / m$

    0

    2

    4

    6

    8

    …

    竖直高度$y/m$

    1

    $\frac{3}{2}$

    $\frac{5}{3}$

    $\frac{3}{2}$

    1

    …

    请根据上述数据，解决问题：

    （1）直接写出羽毛球飞行过程中竖直高度的最大值，并求出满足的函数关系$y = a(x - h)^2 + k \, (a \ne 0)$；

    （2）已知羽毛球场的球网高度为$1.55\mathrm{m}$，当发球点距离球网$5m$时，羽毛球_________（填“能”或“不能”）越过球网.'
  answer: （1）羽毛球飞行过程中竖直高度的最大值为$\frac{5}{3}m$；$y = -\frac{1}{24}(x - 4)^2 + \frac{5}{3}$ （2）能
  solution: '【小问1详解】

    解：根据表格中的数据可知，当$x=2$时，$y = \frac{3}{2}$，当$x = 6$时，$y = \frac{3}{2}$，

    ∴$\left(2,\frac{3}{2}\right)$与$\left(6,\frac{3}{2}\right)$关于对称轴对称，

    ∴抛物线的对称轴为直线$x=\frac{2+6}{2}=4$，

    根据表格中的数据可知，当$x = 4$时，$y=\frac{5}{3}$，

    ∴抛物线的顶点坐标为$\left(4,\frac{5}{3}\right)$，

    即羽毛球飞行过程中竖直高度的最大值为$\frac{5}{3}m$；

    抛物线的关系式为$y = a(x - h)^2 + k = a(x - 4)^2 + \frac{5}{3}$，

    把$x = 0$时，$y = 1$代入得：$1 = a(0 - 4)^2 + \frac{5}{3}$，

    解得：$a = -\frac{1}{24}$，

    ∴抛物线的关系式为$y = -\frac{1}{24}(x - 4)^2 + \frac{5}{3}$．

    【小问2详解】

    解：把$x=5$代入$y = -\frac{1}{24}(x - 4)^2 + \frac{5}{3}$得：

    $y = -\frac{1}{24}(5 - 4)^2 + \frac{5}{3} = 1.625$，

    ∵$1.625 > 1.55$，

    ∴羽毛球能越过球网．

    故答案为：能．'
