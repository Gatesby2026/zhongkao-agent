  question: '下面的三个问题中都有两个变量：（）

    ①面积一定的等腰三角形，底边上的高y与底边长x；

    ②将泳池中的水匀速放出，直至放完，泳池中的剩余水量y与放水时间x；

    ③计划从A地到B地铺设一段铁轨，每日铺设长度y与铺设天数x.

    其中，变量y与变量x满足反比例函数关系的是

    A.①②B.①③C.②③D.①②③'
  answer: B
  solution: '解：①面积S一定的等腰三角形时，

    则底边上的高y与底边长x的关系为：$y=\frac{2S}{x}$，是反比例函数，故①符合题意；

    ②设泳池原有体积为V，放水速度为$\nu$，

    则泳池中的剩余水量y与放水时间x的关系为：$y=V-vx$，是一次函数，故②不符合题意；

    ③设轨道总长为L，

    则每日铺设长度y与铺设天数x$[公式]$关系为：$y=\frac{L}{x}$，是反比例函数，故③符合题意；

    故选：B．'
