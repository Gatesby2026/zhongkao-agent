  question: '在平面直角坐标系xOy中，点$(-2,\,y_{1})$，$(2, y_{2})$，$\left(3,y_{3}\right)$在抛物线$x^{2}-2tx+t^{2}+1$上.

    （1）抛物线的对称轴是直线__________（用含t的式子表示）；

    （2）当$y_{1}=y_{2}$时，求t的值；

    （3）点$(m, y), (m \neq 3)$在抛物线上.若$y_{2}<y_{3}<y_{1}$，求t的取值范围及m的取值范围.'
  answer: （1）$x = t$ （2）0（3）$\frac{1}{2}<t<\frac{5}{2}$，$-2 < m < 2$
  solution: '【小问1详解】

    解：$y=x^{2}-2bx+x^{2}+1=(x-t)^{2}+1$，

    ∴抛物线的对称轴是直线$x = t$，

    故答案为：$x = t$；

    【小问2详解】

    ∵$y_{1}=y_{2}$，

    ∴$4+4t+t^{2}+1=4-4t+t^{2}+1$，

    解得：$t = 0$，

    【小问3详解】

    由题意可得$x_{1}=4+4t+t^{2}+1$，$y_{2}=4-4x+x^{2}+1$，$\beta_{3}=9-6t+t^{2}+1$，

    ∵$y_{2}<y_{3}<y_{1}$，

    即：$4-4t+t^{2}+1<9-6t+t^{2}+1<4+4t+t^{2}+1$，

    解得：$\frac{1}{2}<t<\frac{5}{2}$；

    ∵$(m, y), (m \neq 3)$在抛物线上，则$\left(m,y_{3}\right)$与$\left(3,y_{3}\right)$关于抛物线对称轴直线$x = t$对称，

    ∴$\frac{m+3}{2}=t$，即$m = 2t - 3$，

    当$t = \frac{1}{2}$时，$m = -2$，当$t = \frac{5}{2}$时，$m = 2$，

    ∵$\frac{1}{2}<t<\frac{5}{2}$，

    ∴$-2 < m < 2$．'
