  question: '下面是用面积关系证明勾股定理的两种拼接图形的方法，选择其中一种，完成证明．

    勾股定理：在直角三角形中，两直角边的平方和等于斜边的平方．

    已知：如图，直角三角形的直角边长分别为a，b，斜边长为c．

    [图]

    求证：$a^{2}+b^{2}=c^{2}$．

    方法一

    如图，大正方形的边长为$(a+b)$，小正方形的边长为c．

    [图]

    证明

    方法二

    如图，大正方形的边长为c，小正方形的边长为$(b-a)$．

    [图]

    证明'
  answer: 见解析
  solution: '证明：方法一：由图可得：$(a+b)^{y}=4x+\frac{1}{2}ab+c^{2}$

    $a^{2}+2ab+b^{2}=2ab+c^{2}$

    ∴$a^{2}+b^{2}=c^{2}$；

    方法二：由图可得：$4+\frac{1}{2}ab+(b-a)^{2}=c^{2}$，

    $2ab + c^{2} - 2ab + b^{2} = c^{2}$

    ∴$a^{2}+b^{2}=c^{2}$．'
