  question: '如图，在矩形$ABCD$中，E是AD边上一点，且$AE = 2DE$，连接CE交对角线BD于点F．若$BD = 10$，则DF的长为__________．

    [图]'
  answer: $\frac{5}{2}$
  solution: '解：∵四边形$ABCD$是矩形，

    ∴$AD = BC$，$AD \parallel BC$，

    ∴$\angle EDF = \angle CBF$，$\angle DEF = \angle BCF$，

    ∴$\triangle BCF \sim \triangle DEE$，则$\frac{BC}{DE} = \frac{BF}{DF}$

    ∵$AE = 2DE$，

    ∴$AD=AE+ED=3ED$，则$\frac{AD}{DE}=\frac{BC}{DE}=\frac{3}{1}$，

    ∴$\frac{BF}{DF} = \frac{BC}{DE} = \frac{3}{1}$，

    ∵$BD = 10$，即$BD = BF + DF = 4DF = 10$，

    ∴$DF = \frac{5}{2}$，

    故答案为：$\frac{5}{2}$．'
