  question: '如图，在四边形$ABCD$中，$AD \parallel BC, \angle A = 90^\circ$，点E在AB上，DE平分$\angle ADC$，CE平分$\angle DCB$．给出下面三个结论：

    [图]

    ①$\angle DEC=90^\circ$；②$AE = EB$；③$AD\cdot BC=AE\cdot EB$．上述结论中，所有正确结论的序号是（）

    A.①②B.②③C.①③D.①②③'
  answer: D
  solution: '解：∵$AD \parallel BC$，

    ∴$\angle ABC + \angle BCD = 180^\circ$，

    ∵DE平分$\angle ADC$，CE平分$\angle DCB$，

    ∴$\angle CBE=\frac{1}{2}\angle ADC,\angle DCE=\frac{1}{2}\angle BCD$，

    ∴$\angle CBE+\angle DCE=\frac{1}{2}(\angle ADC+\angle BCD)=90^{\circ}$，

    ∴$\angle DEC=90^\circ$，故①正确；

    如图，过点E作$EF \perp CD$于点F，

    [图]

    ∵$AD \parallel BC$，

    ∴$\angle A+\angle B=180^{\circ}$，

    ∵$\angle A = 90^{\circ}$，

    ∴$\sqrt{3} \times 90$，

    ∵DE平分$\angle ADC$，CE平分$\angle DCB$，

    ∴$AE = EF$，$BE = EF$，

    ∴$AE = BE$，故②正确；

    ∵$\angle DEC=90^\circ$，$\angle A = 90^{\circ}$，

    ∴$\angle AED + \angle BEC = \angle AED + \angle ADE = 90^\circ$，

    ∴$\angle BEC = \angle ADE$，

    ∵$\angle A=\angle B=90^{\circ}$，

    ∴$\triangle ADE \sim \triangle BEC$，

    ∴$\frac{AD}{BE} = \frac{AE}{BC}$，

    ∴$AD\cdot BC=AE\cdot EB$，故③正确；

    故选：D．'
