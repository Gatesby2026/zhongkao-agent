  question: '在平面直角坐标系xOy中，$M(m,y_{1})$，$N(m+2,y_{2})$是抛物线$y=ax^{2}+bx+c(a>0)$上两点．设该抛物线的对称轴为$x = t$．

    （1）若对于$m = 1$，有$y_{1}=y_{2}$，求t的值；

    （2）若对于$1<m<2$，都有$y_1 < y_2$，求t的取值范围．'
  answer: （1）$2$ （2）$t \leq 2$
  solution: '【小问1详解】

    解：∵对于$m = 1$，有$y_{1}=y_{2}$，

    ∴点$M(m,y_{1})$，$N(m+2,y_{2})$关于直线$x = t$对称，

    ∴$t-1=3-t$，

    ∴$t=2$．

    【小问2详解】

    解：∵$a > 0$，

    ∴当$x\quad t$时，y随x增大而增大，当$x < t$时，y随x增大而减小．

    ①当$t \leq 1$时，

    ∵$1<m<2$，

    ∴$3 < m + 2 < 4$，

    ∴$1 < m < m + 2$，

    ∴$y_1 < y_2$，符合题意；

    ②当$1<t\leq2$时，

    （i）当$t\sin m<2$时，

    ∵$3 < m + 2 < 4$，

    ∴$1 \leq m < m + 2$，

    ∴$y_1 < y_2$，符合题意；

    （ii）当$m < t \leq 2$时，

    设点$M(m,y_{1})$关于$x = t$的对称点为$M''$，则点$M''$的坐标为$M''(2i-m,y_{1})$，

    ∵$1 < m < t \leq 2$，

    ∴$m < 2t - m < 3$.

    ∵$3 < m + 2 < 4$，

    ∴$2t-m<m+2$，

    ∴$y_1 < y_2$，符合题意；

    ③当$2<t<3$时，令$m = t - 1$，则$m+2=t+1$，

    ∴$y_{1}=y_{2}$，不符合题意；

    ④当$t^{3}$时，令$m = \frac{3}{2}$，则$m+2=\frac{7}{2}$，

    ∴$y_{1}>y_{2}$，不符合题意；

    综上所述，t的取值范围是$t \leq 2$．'
