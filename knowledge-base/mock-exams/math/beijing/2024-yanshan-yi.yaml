  question: '如图，在菱形$ABCD$中，对角线AC与BD相交于点O，E为CD的中点，连接OE并延长到点F，使得$OE = EF$，连接$CF,DF$．

    [图]

    （1）求证：四边形$OCFD$是矩形；

    （2）若$AB = 5$，$\sin \angle DOF = \frac{3}{5}$，求BD的长．'
  answer: （1）见解析（2）8
  solution: '【小问1详解】

    ∵点E为CD的中点，

    ∴$DE = CE$，

    又∵$OE = EF$，

    ∴四边形$OCFD$是平行四边形，

    ∵菱形$ABCD$，

    ∴$OC \perp OD$，

    ∴$\angle COD=90^\circ$，

    ∴平行四边形$OCFD$是矩形；

    【小问2详解】

    ∵菱形$ABCD$，

    ∴$AB=CD=3,BD=2OD$．

    ∵矩形$OCFD$，

    ∴$OF = CD = 5$，$\angle ODF=90^{\circ}$．

    在$\mathrm{Rt}\triangle ODF$中，$\sin \angle DOF = \frac{DF}{OF} = \frac{3}{5}$，

    ∴$DF = 3$，

    ∴$OD=\sqrt{OF^{2}-DF^{2}}=4$，

    ∴$BD = 8$．'
