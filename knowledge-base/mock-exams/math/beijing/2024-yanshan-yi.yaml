  question: '在平面直角坐标系xOy中，对于$\circ G$和线段AB给出如下定义：如果线段AB上存在点P，Q，使得点P在⊙G内，且点Q在$\circ G$外，则称线段AB为$\circ G$的“交割线段”．

    [图]

    （1）如图，$\odot\odot$的半径为2，点$A(0,2),\ B(2,2),\ C(-1,0)$．

    ①在$\triangle ABC$的三条边$AB, BC, AC$中，$\odot\odot$的“交割线段”是；

    ②点M是直线OB上的一个动点，过点M作$MN\perp x$轴，垂足为N，若线段MN是$\odot\odot$的“交割线段”，求点M的横坐标m的取值范围；

    （2）已知三条直线$y=3$，$y = -x$，$y = -2x + 3$分别相交于点D，E，F，$\mathrm{e}T$的圆心为$(0,\ t)$，半径为2，若$\triangle DEF$的三条边中有且只有两条是$\mathrm{e}T$的“交割线段”，直接写出t的取值范围．'
  answer: （1）①BC；②当$-2 < m < -\sqrt{2}$或$\sqrt{2}<m<2$ （2）$3-2\sqrt{5}<t\leq1$或$2\sqrt{2}\leq l<5$
  solution: '【小问1详解】

    解：∵$A(0,2),\ B(2,2)$，

    ∴$OA=2,\ OA\perp AB$，

    ∴点A在$\odot\odot$上，

    ∴$\odot\odot$与AB相切，

    ∴线段AB上没有点在$\odot\odot$外，

    ∴线段AB不是$\odot\odot$的“交割线段”，

    ∵$OC=1<2,\ OB=\sqrt{2^{2}+2^{2}}=2\sqrt{2}>2$，

    ∴点C在$\odot\odot$内，点B在$\odot\odot$外，

    ∴线段AC上没有点在$\odot\odot$外，线段BC上有点在$\odot\odot$内，也有点在$\odot\odot$内，

    ∴线段AC不是$\odot\odot$的“交割线段”，线段BC是$\odot\odot$的“交割线段”，

    故答案为：BC；

    [图]

    ②如图所示，设直线OB在x轴上方与$\odot\odot$交于T，过点T和点B分别作x轴的垂线，垂足分别为G、H，设$T(t,\ t)$，

    ∴$OH = BH = 2$，$OG = TG = t$，

    ∴此时点H刚好在$\odot\odot$上，且此时BH与$\odot\odot$相切；

    ∵$\odot\odot$的半径为2，

    ∴$OT = 2$，

    ∴$t^{2}+t^{2}=2^{2}$，

    解得$t = \sqrt{2}$或$t = -\sqrt{2}$（舍去），

    ∴由函数图象可知，当点M在BT之间（不包括端点），即$\sqrt{2}<m<2$时，线段MN是$\odot\odot$的“交割线段”；

    由对称性可得当$-2 < m < -\sqrt{2}$时，线段MN是$\odot\odot$的“交割线段”；

    综上所述，当$-2 < m < -\sqrt{2}$或$\sqrt{2}<m<2$时，线段MN是$\odot\odot$的“交割线段”；

    [图]【小问2详解】

    解：联立'
