  question: '如图，AB为$\odot\odot$的直径，弦$CD \perp AB$，过点A作$\odot\odot$的切线交BC的延长线于点E．

    [图]

    （1）求证：$\angle BAD = \angle E$；

    （2）若$\odot\odot$的半径为5，$AD = 6$，求CE的长．'
  answer: （1）见详解（2）$\frac{9}{2}$
  solution: '【小问1详解】

    证明：∵AE是$\odot\odot$的切线，AB为$\odot\odot$的直径，

    [图]

    ∴$\angle EAB = 90^\circ$，

    ∵$CD \perp AB$，

    ∴$\angle A=\angle AB=90^{\circ}$，

    ∴$AE \parallel CD$，

    ∴$\angle BCD = \angle E$，

    ∵$\widehat{BD}=\widehat{BD}$，

    ∴$\angle BAD = \angle BCD$，

    ∴$\angle BAD = \angle E$．

    【小问2详解】

    解：如图，连接AC，

    [图]

    ∵AB为$\odot\odot$的直径，$CD \perp AB$，

    ∴$AC = AD = 6$，$\angle ACB=\angle ACE=90^\circ$，

    ∵半径为5

    ∴$AB = 10$，

    ∴$BC=\sqrt{AB^{2}-AC^{2}}=8$，

    ∵$\angle ACE = \angle EAB = 90^\circ$，

    ∴$\angle E+\angle EAC=\angle EAC+\angle CAB=90^{\circ}$，

    ∴$\angle E=\angle CAB$，

    在$Rt\triangle EAC$和$\mathrm{Rt}\triangle ACB$中，

    $\angle ACE = \angle BCA = 90^{\circ}$，$\angle E=\angle CAB$，

    ∴$\triangle EAC \sim \triangle ABC$，

    ∴$\frac{EC}{AC} = \frac{AC}{BC}$，

    ∴$\frac{AC}{BC}=\frac{36}{8}=\frac{9}{2}$．'
