  question: '科研人员为了研究弹射器的某项性能，利用无人机测量小钢球竖直向上运动的相关数据．无人机上升到距离地面$20m$处开始计时，此时，在地面用弹射器（高度不计）竖直向上弹射一个小钢球（忽略空气阻力）．记无人机和小钢球距离地面的高度分别为$y_{1}$，$y_{2}$（单位：m），科研人员收集了$y_{1}$，$y_{2}$随时间x（单位：s）变化的数据，并分别绘制在平面直角坐标系中，如图所示．

    [图]

    （1）根据$y_{1}$，$y_{2}$随x的变化规律，从

    ①$y = mx + n$$(m = 0)$；②$y=ax^{2}+bx$（$a < 0$）；③$y = \frac{k}{x}$$(k \neq 0)$中，选择适当的函数模型，分别求出$y_{1}$，$y_{2}$满足的函数关系式；

    （2）当$0<x<5$时，小钢球和无人机的高度差最大是m．'
  answer: （1）$y_{1}=5x+20$；$y = -5x^2 + 35x$； （2）$25$．
  solution: '【小问1详解】

    设$y_{1}$关于x的函数关系式为$y_{1}=mx+n(m\neq 0)$，

    将点$(0,20)$，$(1,25)$的坐标代入$y_{1}=mx+n(m\neq 0)$得$\left\{ \begin{array} { l } { 20 = n } \\ { 25 = m + n } \end{array} \right.$，

    解得$\left\{\begin{array}{l}m=5\\n=20\end{array}\right.$，

    ∴$y_{1}$关于x的函数关系式为$y_{1}=5x+20$

    设$y_{2}$关于x的函数关系式为$y_{2}=ax^{2}+bx(a\lt 0)$

    将点$(1,30)$，$(2,50)$，坐标代入$y_{2}=ax^{2}+bx(a\lt 0)$，得$\begin{aligned}

    30 &= a + b \\

    50 &= 4a + 2b

    \end{aligned}$

    解得$\left\{ \begin{array}{l} a = -5 \\ b = 35 \end{array} \right.$，

    ∴$y_{2}$关于x的函数关系式为$y = -5x^2 + 35x$；

    【小问2详解】

    由（$1$）得$y_{1}=5x+20$，$y = -5x^2 + 35x$，

    ∴$y_{2}-y_{1}=-5x^{2}+35x-\left(5x+20\right)=-5x^{2}+30x-20=-5\left(x-3\right)^{2}+25$，

    ∴当$x=3$时，小钢球和无人机$[公式]$高度差最大是$25$m，

    故答案为：$25$．'
