  question: '为了考査甲、乙两种水稻的长势，农业科技人员从一块试验田中分别随机抽取甲、乙两种水稻的稻穗各$20$株，获取了每株稻穗的谷粒数（单位：颗），数据整理如下：

    a．甲种水稻稻穗谷粒数：

    $170$，$172$，$176$，$177$，$178$，$182$，$184$，$193$，$196$，$202$，

    $206$，$206$，$206$，$206$，$208$，$208$，$214$，$215$，$216$，$219$

    b．乙种水稻稻穗谷粒数的折线图：

    [图]

    c．甲、乙两种水稻稻穗谷粒数的平均数、中位数、众数：

    平均数

    中位数

    众数

    甲

    $196.7$

    m

    $206$

    乙

    $196.8$

    $195$

    n

    根据以上信息，回答下列问题：

    （1）写出表中m，n的值；

    （2）若水稻稻穗谷粒数的方差越小，则认为水稻产量的稳定性越好．据此推断，甲、乙两种水稻中，产量更稳定的是（填“甲”或“乙”）；

    （3）若单株稻穗的谷粒数不低于$200$颗的水稻视为优良水稻，则从水稻优良率分析，应推荐种植种水稻（填“甲”或“乙”）；若该试验田中有甲、乙两种水稻各$4000$株，据此估计，优良水稻共有株．'
  answer: （1）m的值为$204$，n的值为$195$ （2）乙（3）甲；$3800$
  solution: '【小问1详解】

    解：中位数为$m=\frac{202+206}{2}=204$，

    根据乙种水稻稻穗谷粒数的折线图可以发现，每株稻穗的谷粒数为$195$出现的次数最多，

    也就是说这组数据的众数为$195$，所以$n = 195$．

    【小问2详解】

    解：根据表格可得乙的平均数、中位数、众数都比较接近，故乙更稳定，

    故答案为：乙．

    【小问3详解】

    解：甲的水稻优良率为：$\frac{11}{20}\times100\%=55\%$，

    乙的水稻优良率为：$\frac{8}{20}\times100\%=40\%$，

    故从水稻优良率分析，应推荐种植甲种水稻；

    若该试验田中有甲、乙两种水稻各$4000$株，则甲的优良水稻有$4000\times5.5\%=2200$株，

    则乙的优良水稻有$4000\times40\%=1600$株，

    共有$2200+1460=3800$株，

    故答案为：甲，$3800$．'
