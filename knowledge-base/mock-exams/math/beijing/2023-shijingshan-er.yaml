  question: '如图，在$\mathrm{Rt}\triangle ACB$中，$\angle ACB=90^\circ$，$CA = CB = 10$．点P是CB边上一动点（不与C，B重合），过点P作$PQ \perp CB$交AB于点Q．设$CP = x$，BQ的长为y，$\angle BPQ$的面积为S，则y与x，S与x满足的函数关系分别为（）

    [图]

    A.一次函数关系，二次函数关系B.反比例函数关系，二次函数关系

    C.一次函数关系，反比例函数关系D.反比例函数关系，一次函数关系'
  answer: A
  solution: '解：∵在$\mathrm{Rt}\triangle ACB$中，$\angle ACB=90^\circ$，$CA = CB = 10$，

    ∴$\angle A=\angle B=45^{\circ}$，

    ∵$CP = x$，

    ∴$BP = BC - CP = 10 - x$，

    ∵$PQ \perp CB$，

    ∴$\angle QPB=90^{\circ}$，

    在$Rt\triangle BPQ$中，$PQ = BP \cdot \tan \beta = 10 - x$，$BO=\frac{BP}{\cos B}=\sqrt{2}(10-x)$，

    ∴$y=\sqrt{2}(10-x)-\sqrt{2}x+10\sqrt{2}$，$S = \frac{1}{2} BP \cdot PQ = \frac{1}{2}(10 - x)^2$，

    ∴y与x，S与x满足的函数关系分别为一次函数关系，二次函数关系，

    故选A．'
