  question: '某社区通过公益讲座的方式普及垃圾分类知识．为了了解居民对相关知识的了解情况及讲座效果，请居民在讲座前和讲座后分别回答了一份垃圾分类知识问卷，从中随机抽取20名居民的两次问卷成绩（百分制），并对数据（成绩）进行整理、描述和分析．下面给出了部分信息．

