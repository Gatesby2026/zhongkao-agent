  question: '一组数据：1，2，5，0，2，若添加一个数据2，则发生变化的统计量是（）

    A.平均数B.中位数C.众数D.方差'
  answer: D
  solution: '解：A、发生变化前的平均数：$x_{1}=\frac{1+2+5-0+2}{5}=2$，发生变化后的平均数：$x_{-}=\frac{1+2+5+0+2+2}{6}=2$，，没有变化，故该选项不符合题意；

    B、发生变化前的中位数：$2$，发生变化后的中位数：$\frac{2+2}{2}=2$，没有变化，故该选项不符合题意；

    C、发生变化前的众数：2，发生变化前的众数：2，没有变化，故该选项不符合题意；

    D、发生变化前的方差：$v_{1}^{2}=\frac{2\times(2-2)^{2}+(0-2)^{2}+(1-2)^{2}+(5-2)^{2}}{5}=2.8$，发生变化后的方差：$y_{2}^{2}=\frac{3\times(2-2)\times(0-2)\times(-4-2)\times(5-2)}{6}\times\frac{7}{3}$，发生变化，故该选项符合题意；

    故选：D．'
