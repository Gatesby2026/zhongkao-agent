  answer: （1）证明见解析 （2）3
  solution: '【小问1详解】

    证明：由题意得，$\Delta =(-2m)^{2}-4\times1\times(m^{2}-1)$

    $=4m^{2}-4m^{2}+4$

    $=4>0$，

    ∴关于x的一元二次方程$x^{2}-2mx+m^{2}-1=0$总有两个不相等的实数根；

    【小问2详解】

    解：设方程的两个根分别为$s、2s$，

    ∴$\left\{ \begin{array} { l } { s + 2 s = 2 m } \\ { s ^ { 2 } \cdot 2 s = m ^ { 2 } - 1 } \end{array} \right.$，

    ∴$s = \frac{2}{3}m$，

    ∴$2\times\left(\frac{2}{3}m\right)^{2}=m^{2}-1$，

    ∴$\frac{8}{9}m^{2}=m^{2}-1$，

    解得$m = \pm 3$，

    又∵$m > 1$，

    ∴$m = 3$．'
