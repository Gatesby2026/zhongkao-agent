  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图像过点$A(3,-1)$，$B(0,-2)$．

    （1）求该函数的解析式；

    （2）当$x > -3$时，对于x的每一个值，函数$y=2x+m$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=\frac{1}{3}x-2$ （2）$m^{3}$
  solution: '【小问1详解】

    解：把$A(3,-1)$，$B(0,-2)$代入$y=kx+b\ (k\neq0)$中得：$\begin{cases}

    3k + b = -1 \\

    b = -2

    \end{cases}$，

    ∴$\left\{

    \begin{array}{l}

    k = \dfrac{1}{3} \\

    b = -2

    \end{array}

    \right.$，

    ∴函数$y=kx+b\ (k\neq0)$的结束为$y=\frac{1}{3}x-2$；

    【小问2详解】

    解：当函数$y=2x+m$的值大于函数的$y=\frac{1}{3}x-2$值时，则$2x+m>\frac{1}{3}x-2$，

    解得$x > \frac{-6 - 3m}{5}$，

    ∵当$x > -3$时，对于x的每一个值，函数$y=2x+m$的值大于函数$y=kx+b\ (k\neq0)$的值，

    ∴$-3-\frac{-6-3m}{5}$，

    ∴$m^{3}$．'
