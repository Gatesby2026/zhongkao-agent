  question: '如图，在$\triangle ABC$中，$AB = AC$，$\angle ACB=2\alpha$，BD平分$\angle ABC$交AC于点E，点F是ED上一点且$\angle EAF = \alpha$．

    [图]

    （1）求$\angle AFB$的大小（用含$\alpha$的式子表示）；

    （2）连接FC，用等式表示线段FC与FA的数量关系，并证明．'
  answer: （1）$2\alpha$ （2）$FA = FC$，证明见解析
  solution: '【小问1详解】

    解：∵$AB = AC$，$\angle ACB=2\alpha$，

    ∴$\angle ABC = \angle ACB = 2\alpha$，

    ∵BD平分$\angle ABC$，

    ∴$\angle CBE=\angle ABE=\frac{1}{2}\angle ABC=\alpha$，

    ∴$\angle AEB = \angle ACB + \angle CBE = 3a$，

    ∵$\angle EAF = \alpha$，

    ∴$\angle AFB = \angle AEB - \angle EAF = 2\alpha$；

    【小问2详解】

    解：$FA = FC$，证明如下：

    如图所示，在BD上取一点G，使得$AG = AF$，连接AG，

    ∴$\angle AGF = \angle AFG = 2\alpha$，

    ∴$\angle BAG = \angle AGF - \angle ABF = \alpha$，

    ∴$\angle BAG=\angle ABG=\alpha$，

    ∴$BG = AG$，

    在$\triangle ABG$和$\triangle ACF$中，

    $AB = AC \\

    \angle B = \angle CAF = \alpha \\

    AG = AF$，

    ∴$\triangle ABC \cong \triangle ACE (SAS)$，

    ∴$CF = BG = AG$，

    又∵$AG = AF$，

    ∴$FA = FC$．

    [图]'
