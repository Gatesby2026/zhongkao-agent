  question: 如果$3x^{2}-x-1=0$，那么代数式$(2x+3)(2x-3)-x(x+1)$的值为_________．
  answer: $-8$
  solution: '解：∵$3x^{2}-x-1=0$，

    ∴$3x^2 - x = 1$

    ∴$(2x+3)(2x-3)-x(x+1)$

    $=4x^{2}-9-x^{2}-x$

    $=3x^{2}-x-9$

    $=1-9$

    $= -8$，

    故答案为：$-8$．'
