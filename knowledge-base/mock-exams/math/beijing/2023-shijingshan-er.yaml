  question: '如图，AB是$\odot\odot$的直径，弦$CD \perp AB$于点E，过点D作$DH \perp CB$交CB的延长线于点H，点F是DH延长线上一点，$CF = CD$．

    [图]

    （1）求证：CF是$\odot\odot$的切线；

    （2）若$\tan \angle DCB = \frac{1}{2}$，$CF = 8$，求$\odot\odot$半径的长．'
  answer: （1）见解析 （2）5
  solution: '【小问1详解】

    证明：连接OC，如图所示：

    [图]

    ∵$CF = CD$，$CH \perp DF$，

    ∴CH平分$\angle DCF$，

    ∴$\angle DCH = \angle FCH$，

    ∵$CO = BO$，

    ∴$\angle OCB=\angle OBC$，

    ∵$CD \perp AB$，

    ∴$\angle BCE + \angle OBC = 90^\circ$，

    ∴$\angle OCB+\angle HCF=90^{\circ}$，即$\angle OCF = 90^\circ$，

    ∴$OC \perp CF$，

    ∵OC为$\odot\odot$的半径，

    ∴CF是$\odot\odot$的切线；

    【小问2详解】

    ∵$CF = 8$，$CF = CD$，

    ∴$CD = 8$，

    ∵$CD \perp AB$，

    ∴$CE = DE = 4$，

    ∵$\tan \angle DCB = \frac{1}{2}$，

    ∴$\frac{BE}{CE} = \frac{1}{2}$，

    ∴$BE = 2$，

    设$\odot\odot$半径的长为r，则$OE = r - 2$，

    ∵$OE^{2}+CE^{2}=OC^{2}$，

    ∴$(r-2)^{2}+4^{2}=r^{2}$，

    解得：$r=5$，

    ∴$\odot\odot$半径的长为5．'
