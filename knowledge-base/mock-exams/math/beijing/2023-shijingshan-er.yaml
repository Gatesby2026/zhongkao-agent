  question: '如图，在$\mathrm{Rt}\triangle ACB$中，$\angle ACB=90^\circ$，AD平分$\angle CAB$交BC于点D．若$\angle B=30^{\circ}$，$CD = 1$，则$\triangle DAB$的面积为_________．

    [图]'
  answer: $\sqrt{3}$
  solution: '解：如图所示，过点D作$DE \perp AB$于E，

    ∵$\angle ACB=90^\circ$，$\angle B=30$，

    ∴$\angle BAC = 60^\circ$，

    ∵AD平分$\angle CAB$，

    ∴$\angle DAB = \angle CAD = 30^\circ, \quad DE = CD = 1$，

    ∴$AE = BE = \sqrt{3}DE - \sqrt{3}$，

    ∴$AB = AE + BE = 2\sqrt{3}$，

    ∴$S_{\triangle OAB}=\frac{1}{2}AB\cdot DE=\sqrt{3}$，

    故答案为：$\sqrt{3}$．

    [图]【点睛】本题主要考查了角平分线的性质和定义，勾股定理，含30度角的直角三角形的性质，勾股定理等等，正确作出辅助线是解题的关键．'
