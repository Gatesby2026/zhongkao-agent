  question: '在平面直角坐标系xOy中，已知抛物线$y = x^2 - 2mx + m$．

    （1）当$m = 1$时，求该抛物线与y轴交点坐标；

    （2）已知$P(x_1,y_1)$，$Q(x_2,y_2)$为该抛物线上的两点，若对于$x_{1}=m+1$，$x_{2}=2-m$，都有$y_{1}<m<y_{2}$，求m的取值范围．'
  answer: （1）$(0,1)$ （2）$m > 2$或$m<-1$
  solution: '【小问1详解】

    解：当$m = 1$时，则抛物线为$y=x^{2}-2x+1$．

    令$x = 0$，则$\psi=x^{2}-2x+1=1$，

    ∴该抛物线与y轴交点坐标为$(0,1)$；

    【小问2详解】

    解：∵抛物线$y = x^2 - 2mx + m$，对于$x_{1}=m+1$，$x_{2}=2-m$，都有$y_{1}<m<y_{2}$，

    ∴$y_1 - m < 0$且$y_{2}-m>0$，

    则$(m+1)^{2}-2m(m+1)+m-m<0$，即$(m+1)(m+1-2m)<0$，$(m+1)(m-1)>0$，

    解得：$m > 1$或$m<-1$；

    $(2-m)^{2}-2m(2-m)+m+m>0$，即$(m-2)(m-2+2m)>0$，$(m-2)(3m-2)>0$，

    解得：$m > 2$或$m<\frac{2}{3}$；

    综上，$m > 2$或$m<-1$．'
