  question: '小瑞同学打开一盒全新的扑克牌，里面有54张普通牌和一张广告牌．他要用这些牌玩一个游戏，先将所有的牌随机分成五堆，清点后分别为6张，11张，16张，13张，9张，将每堆牌的张数由小到大排序后用有序数组记为（6，9，11，13，16）．接下来开始进行第一次操作：从每堆牌中分别抽取一张，抽出的牌组成新的一堆牌，这时将每堆牌的张数由小到大进行排序，记录下新的有序数组（若在某次操作中某一堆牌抽取后剩余牌的张数为0时，此时0不写入该有序数组，该堆自动消失）．重复上述方法进行第二次操作，第三次操作……

