  question: '在平面直角坐标系xOy中，将函数$y = kx (k \neq 0)$的图象向上平移2个单位得到的直线$y=kx+b(k\neq0)$经过点$A(1,3)$．

    （1）求k与b的值；

    （2）当$x>1$时，对于x的每一个值，函数$y = kx + 1 (k \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$k = 1, b = 2$ （2）$n^{2}$
  solution: '【小问1详解】

    解：∵将函数$y = kx (k \neq 0)$的图象向上平移2个单位得到的直线$y=kx+b(k\neq0)$，

    ∴$b = 2$，

    ∵一次函数$y=kx+2$的图象经过点$A(1,3)$，

    ∴$k+2=3$，

    ∴$k = 1$．

    【小问2详解】

    解：把$x = 1$代入$y=x+2$，得$y=3$，

    把点$(1,3)$代入$y=nx+1$，得$n=2$．

    ∵当$x>1$时，对于x的每一个值，函数$y = kx + 1 (k \neq 0)$的值大于函数$y=x+2$的值，

    ∴n的取值范围是$n^{2}$．'
