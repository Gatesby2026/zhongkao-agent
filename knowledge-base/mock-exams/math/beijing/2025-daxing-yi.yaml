  question: '如图，在$Rt\triangle ABC$中，$\angle ACB=90^\circ$，$AC = BC = 5$．当$CD = 2CE$时，正方形$DEFG$恰好有三个顶点落在$Rt\triangle ABC$的边上，则正方形$DEFG$的面积为__________．

    [图]'
  answer: '5'
  solution: '解：过点G作$GH \perp AC$，则：$\angle AHG = \angle GHD = 90^\circ$，

    [图]

    ∴$\angle DGH + \angle HDG = 90^\circ$，

    ∵正方形$DEFG$，

    ∴$DG = DE, \angle GDE = 90^\circ$，

    ∴$\angle HDG + \angle CDE = 90^\circ$，

    ∴$\angle HGD = \angle CDE$，

    ∵$\angle C+\angle GHD=90^\circ$，

    ∴$\triangle GHD \cong \triangle DCE$，

    ∵$\angle ACB=90^\circ$，$AC = BC = 5$，

    ∴$\angle A=\angle B=45^{\circ}$，

    ∴$\angle AGH = 45^\circ = \angle A$，

    ∴$AH = HG$，

    设$CE = x$，则：$CD = 2CE = 2x$，

    ∴$HD=CE=x$，$GH = CD = 2x$，

    ∴$AH=5-x-2x=5-3x$，$GH = CD = 2x$，

    ∴$5-3x=2x$，

    解得：$x = 1$，

    ∴$CE = 1, CD = 2$，

    ∴$DE = \sqrt{1^{2} + 2^{2}} = \sqrt{5}$，

    ∴正方形$DEFG$的面积为5，

    故答案为：5．'
