  question: '如图，在菱形$ABCD$中，对角线$AC, BD$相交于点O，延长BC至点E，使$CE=\frac{1}{2}BC$，连接OE交CD于点F，M是CD中点，连接$OM, EM$．

    [图]

    （1）求证：四边形OCM是平行四边形；

    （2）若$AB = 5$，$\tan \angle OBC = \frac{1}{2}$，求$\triangle OCE$的面积．'
  answer: （1）见解析（2）$\frac{5}{2}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是菱形，

    ∴$BC = CD$，$OD = OB$，$AC \perp BD$，

    ∵$OD = OB$，

    ∴O为BD$[公式]$中点，

    又M是CD中点，

    ∴OM为$\triangle DBC$中位线，

    ∴$OM \parallel CE$；

