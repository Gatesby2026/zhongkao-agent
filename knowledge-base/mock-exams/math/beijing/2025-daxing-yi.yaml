  question: '已知边长为a的正方形$OABC$，过点B的直线分别交$OA, OC$的延长线于点D，E，设$AD = b$，$CE = c$，$\triangle ABD$，$\triangle BCE$，正方形$OABC$的面积分别为$S_1$，$S_{2}$，$S_3$．给出下面三个结论：

    [图]

    ①$a^{2}=bc$；②$b+c\quad 2a$；③$S_{1}+S_{2}\leq S_{3}$．

    上述结论中，所有正确结论的序号是（）

    A.①②B.①③C.②③D.①②③'
  answer: A
  solution: '解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$四边形$OABC$为正方形，

    $\angle DAB = \angle BCE = \angle O = 90^\circ$，

    $\angle ODE+\angle OED=\angle ODE+\angle DBA$，即$\angle DBA = \angle BEC$，

    $\triangle DBA \cong \triangle BEC$，

    $\frac{DA}{BC}=\frac{AB}{CE}$，即$\frac{b}{a}=\frac{a}{c}$，

    $\therefore a^{2}=bc$，故①正确；

    $\left(b+c\right)^{2}-4bc=\left(b-c\right)^{2}0$，当且仅当$b = c$时，取等号，

    $\ldots(b+c)^{2}-4a^{2} \quad 0$，

    $\therefore(b+c)^{2}=4a^{2}$，

    $\because a,b,c>0$，

    $\ldots b + c \quad 2a$，故②正确；

    $S_{1}+S_{2}=\frac{1}{2}ab+\frac{1}{2}ac=\frac{1}{2}a(b+c)$，

    $\because b+c=2a$，

    $\therefore S_{1}+S_{2}=a^{2}$，即$S_1 + S_2 \quad S_3$，

    故③错误；

    则正确结论为①②，

    故选：A．'
