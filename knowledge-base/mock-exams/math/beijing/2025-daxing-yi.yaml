  question: 已知$a^{2}-2a-5=0$，求代数式$\frac{2}{a-1}+\frac{a+5}{a^{2}-2a+1}+\frac{1}{a+1}$的值．
  answer: $\frac{3}{a^{2}-2a+1}$；$\frac{1}{2}$
  solution: '解：∵$a^{2}-2a-5=0$，

    ∴$a^2-2a=5$，

    ∴$\frac{2}{a-1}+\frac{a+5}{a^{2}-2a+1}+\frac{1}{a+1}$

    $=\left(\frac{2}{a-1}+\frac{a+5}{(a-1)^{2}}\right)\cdot\frac{1}{a+1}$

    $=\frac{2(a-1)+a+5}{(a-1)^{2}}-\frac{1}{a+1}$

    $\frac{3(a+1)}{(a-1)^2} \cdot \frac{1}{a+1}$

    $\frac{3}{a^{2}-2a+1}$，

    ∵$a^2-2a=5$，

    ∴原式$\frac{3}{5+1}=\frac{1}{2}$．'
