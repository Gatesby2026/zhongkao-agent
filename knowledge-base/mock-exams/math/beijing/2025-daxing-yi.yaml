  question: '将一个量角器与一把无刻度透明直尺如图所示摆放，直尺的边与量角器分别交于点A，B，C，D，点C，点D分别对应量角器的刻度为120，60，若量角器的直径EF的长为$8cm$，则点O到CD的距离为__________cm．

    [图]'
  answer: $2\sqrt{3}$
  solution: '解：如图：连接$OC,OD$，过点O作$OH \perp CD$于点H，

    [图]

    ∵点C，点D分别对应量角器的刻度为120，60，

    ∴$\angle DOC = 60^\circ$，

    ∵$OC = OD$，

    ∴$\triangle OCD$为等边三角形，

    ∵直径EF的长为$8cm$，

    ∴$CD=OC=OD=4\mathrm{cm}$，

    ∵$OH \perp CD$，

    ∴$CH=HD=\frac{1}{2}CD=2\mathrm{cm}$，

    ∴$OH = \sqrt{ON^{2} - DH^{2}} = \sqrt{4^{2} - 2^{2}} = 2\sqrt{3} (cm)$，

    ∴点O到CD的距离为$2\sqrt{3}\mathrm{cm}$，

    故答案为：$2\sqrt{3}$．'
