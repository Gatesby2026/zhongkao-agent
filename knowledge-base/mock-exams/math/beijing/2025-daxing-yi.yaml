  question: '列方程解应用题

    小华一家驾驶某款新能源汽车外出游玩，去时选择普通公路，返回时选择高速公路．走普通公路比高速公路的路程多60公里，这款新能源汽车在普通公路上行驶平均每百公里耗电20度，在高速公路上行驶比普通公路上行驶平均每百公里耗电增加$20\%$，该车选择的充电站充电综合电费均为$1.5$元/度．最终发现走普通公路的电费比高速公路的电费少15元，求返回时所走高速公路的路程．'
  answer: 所走高速公路的路程为550公里
  solution: '解：设所走高速公路的路程为x公里，则普通公路的路程为$(x+60)$公里，

    根据题意得：$\frac{x}{100}\times20\times(1+20\%)\times1.5-\frac{x+60}{100}\times20\times1.5=15$，

    解得$x=550$，

    ∴所走高速公路的路程为550公里．'
