  question: '在平面直角坐标系xOy中，$\odot\odot$的半径为1．对于$\odot\odot$的弦AB和$\odot\odot$外一点C给出如下定义：若直线CA，CB都是$\odot\odot$的切线，则称点C是弦AB的“关联点”．

    [图]

    （1）如图，点$A(-1,0)$，$B_{1}\left(\frac{1}{2},\frac{\sqrt{3}}{2}\right)$，$B_{1}\left(-\frac{1}{2},-\frac{\sqrt{3}}{2}\right)$．

    ①在点$C_{1}(-1,1)$，$C_{2}\left(-1,\sqrt{3}\right)$，$C_{3}\left(0,\sqrt{3}\right)$中，弦$AB_{1}$的“关联点”是；

    ②若点C是弦$AB_{2}$的“关联点”，直接写出AC，OC的长．

    （2）已知直线$y = -\sqrt{3}x + 2\sqrt{3}$与x轴，y轴分别交于点M，N，对于线段MN上一点T，存在$\odot\odot$的弦$\overline{PQ}$，使得点T是弦$\overline{PQ}$的“关联点”，记四边形$\mathrm{O} \mathrm{P} \mathrm{T} \mathrm{Q}$的面积为S，当点T在线段MN上运动时，直接写出S的最小值和最大值，以及相应的$\overline{PQ}$长．'
  answer: （1）①$C_{2}$；②$AC = \frac{\sqrt{3}}{3}$，$OC = \frac{2\sqrt{3}}{3}$ （2）S的最小值为$\sqrt{2}$，$PQ = \frac{2\sqrt{6}}{3}$；S的最大值为$\sqrt{11}$，$PQ = \frac{\sqrt{33}}{3}$
  solution: '【小问1详解】

    ①∵点$C_{1}(-1,1)$，$C_{2}\left(-1,\sqrt{3}\right)$，$C_{3}\left(0,\sqrt{3}\right)$,点$A(-1,0)$，$B_{1}\left(\frac{1}{2},\frac{\sqrt{3}}{2}\right)$，

    $\angle AOC_{3}=90^{\circ}$

    ∴$\angle C_{3}AO\lt 90^{\circ}$，

    ∴$C_{3}A$不可能是$\odot\odot$的切线，

    故$C_{3}\left(0,\sqrt{3}\right)$不是弦$AB_{1}$的“关联点”，

    设$M(-1,n)$，

    根据题意，得$OM^{2}=OB^{2}+MB^{2}$，

    ∴$1+n^{2}=1+\left(\frac{1}{2}+n\right)^{2}+\left(\frac{\sqrt{3}}{2}-n\right)^{2}$，

    解得$n = \sqrt{3}$，

    ∴$M\left(-1,\sqrt{3}\right)$．

    故$C_{2}\left(-1,\sqrt{3}\right)$符合题意，$C_{1}(-1,1)$不符合题意，

    故答案为：$C_{2}\left(-1,\sqrt{3}\right)$．

    ②根据$A(-1,0)$，$AC_{2}\perp OA$，点C是弦$AB_{2}$的“关联点”，

    ∴点C一定在直线$AC_{2}$上，设$C(-1,m)$，$B_{1}\left(-\frac{1}{2},-\frac{\sqrt{3}}{2}\right)$,

    ∴$OC^{2}=OB^{2}+CB^{2}$，

    ∴$1+m^{2}=1+\left(-\frac{1}{2}+1\right)^{2}+\left(\frac{\sqrt{3}}{2}+m\right)^{2}$'
