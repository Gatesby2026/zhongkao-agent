  question: '如图，在$\mathrm{Rt}_{\triangle ABC}$中，$\angle ACB=90^\circ$，D为AB的中点，连接CD，过点A作$AE \parallel DC$，过点C作$CE \parallel DA$，AE与CE相交于点E．

    [图]

    （1）求证：四边形$ADCE$是菱形；

    （2）连接BE，若$AE = \sqrt{5}$，$BC = 4$，求BE的长．'
  answer: （1）见解析（2）$\sqrt{37}$
  solution: '【小问1详解】

    证明：∵$AE \parallel DC$，$CE \parallel DA$，

    ∴四边形$AECD$$[公式]$平行四边形，

    ∵在$\mathrm{Rt}_{\triangle ABC}$中，$\angle ACB=90^\circ$，D为AB的中点，

    ∴$CD = AD$，

    ∴四边形$AECD$是菱形．

    【小问2详解】

    解：如图，作$EF \perp BC$，交BC的延长线于点F．

    [图]

    ∵菱形$ADCE$，

    ∴$AD = AE = EC = \sqrt{5}$．

    ∵D为AB的中点，

    ∴$AB-2AD=2\sqrt{5}$．

    在$Rt_{\triangle}ACB$中，$\angle ACB=90^\circ$，

    $BC = 4$，$AB = 2\sqrt{5}$，

    ∴$AC = \sqrt{AB^{2} - BC^{2}} = 2$．

    ∵$CE \parallel DA$，

    ∴$\angle ECF=\angle ABC$．

    ∴$Rt\triangle ECF\cong Rt\triangle ABC$，

    ∴$\frac{EF}{EC}$$=$$\frac{AC}{AB}$，

    ∴$EF = 1$，

    ∴$CF=\sqrt{CE^{2}-EF^{2}}=2$．

    在$Rt\triangle EFB$中，$\angle EFB=90^{\circ}$，$BE = BC - CF = 6$，$EF = 1$，

    ∴$BE=\sqrt{BF^{2}+EF^{2}}=\sqrt{37}$．'
