  question: '如图，AB是半圆O的直径，C是半圆周上的动点(与A，B不重合），$CD \perp AB$于点D，连接OC．设$AD = a,\ BD = b,\ CD = h$，给出下面三个结论：①$h \leq \frac{a + b}{2}$；②$\left|\frac{a-b}{2}\right|\leq h$；③$\frac{a+b}{2}\geq\sqrt{ab}$．上述结论中，所有正确结论的序号是（

    ）

    [图]

    A.①②B.②③C.①③D.①②③'
  answer: C
  solution: '解：∵AB是半圆O的直径，

    ∴$\angle ACB=90^\circ$，

    ∵点O是AB中点，

    ∴$CO=\frac{1}{2}AB$，

    ∵$CD \perp AB$，$AD = a,\ BD = b,\ CD = h$，

    ∴$CD\leq CO$，$CO = AO - BO = \frac{1}{2}AB = \frac{1}{2}(AD + BD) = \frac{a + b}{2}$，

    即$h \leq \frac{a + b}{2}$，故①正确；

    ∵C是半圆周上的动点(与A，B不重合），

    ∴$OD < AO$，$CD < DO$，

    ∴$DO = |BD - BO| = \left| b - \frac{a + b}{2} \right| = \left| \frac{b - a}{2} \right| = \frac{|a - b|}{2}$，

    ∴$\left|\frac{a-b}{2}\right|<h$，故②错误；

    $\because DC \perp AB$，$\angle ACB=90^\circ$，

    $\angle ADC = \angle BDC = 90^\circ$，

    $\angle DAC + \angle ACD = 90^\circ$，$\angle DCB+\angle DCB=90^\circ$，

    $\angle DAC = \angle DCB$

    $\therefore Rt\triangle ADC\cong Rt\triangle CDB$，

    $\frac{AD}{CD}=\frac{CD}{DB}$，

    ∴$\frac{a}{h}=\frac{h}{b}$，

    ∴$h^{2}=ab$，

    ∴$h = \sqrt{ab}$，

    ∵$h \leq \frac{a + b}{2}$，

    ∴$\sqrt{ab} \leq \frac{a+b}{2}$'
