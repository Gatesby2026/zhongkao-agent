  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+bx+c$($a \neq 0$)的对称轴为$x = t$．

    （1）若$3a+2b=0$，求t的值；

    （2）已知点$(-1,\ y_{1})$，$(2,\ y_{2})$，$(3,\ y_{3})$在该抛物线上．若$a>c>0$，且$3a + 2b + c = 0$，比较$y_{1}$，$y_{2}$，$y_{3}$的大小，并说明理由．'
  answer: （1）$t = \frac{3}{4}$ （2）$y_{2}$$\gt$$y_{1}$$\gt$$y_{3}$，理由见解析
  solution: '【小问1详解】

    ∵$3a+2b=0$，

    ∴$b = -\frac{3a}{2}$，

    ∴$t = -\frac{b}{2a} = \frac{3}{4}$，

    即$t = \frac{3}{4}$．

    【小问2详解】

    ∵$3a + 2b + c = 0$，

    ∴$b=-\frac{3a+c}{2}$，

    ∴$t = \frac{b}{2a} + \frac{3a + c}{4a} - \frac{3}{4} + \frac{c}{4a}$．

    ∵$a>c>0$，

    ∴$0 < \frac{c}{4a} < \frac{3}{4}$，

    ∴$\frac{3}{4}<t<1$．

    ∵点$(-1,\ y_{1})$关于直线$x = t$的对称点的坐标是$(2t+1,\ y_1)$，

    ∴$\frac{5}{2}<2t+1<3$．

    ∴$t<2<2t+1<3$．

    ∵$a > 0$，抛物线$y=ax^{2}+bx+c$开口向上，

    ∴当$x\quad t$时，y随x增大而增大，

    ∴$y_{2}$$\gt$$y_{1}$$\gt$$y_{3}$．'
