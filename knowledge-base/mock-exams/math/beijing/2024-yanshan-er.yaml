  question: '某跳高集训队对16名队员进行了一次跳高测试，对测试成绩数据(单位：cm)进行整理、描述和分析，下面给出了部分信息．

    a．测试成绩的频数分布直方图（数据分为四组：$150 \leq x < 155$，$155 \leq x < 160$，$160 \leq x < 165$，$165 \leq x \leq 170$）：

    [图]

    b．测试成绩在$160 \leq x < 165$这一组的是：162

    163   163   164   164  164

    c．测试成绩的平均数、中位数、众数：

    平均数

    中位数

    众数

    162

    m

    164

    （1）写出表中m的值；

    （2）队员小锐的成绩是$163\mathrm{cm}$，他认为“$163\mathrm{cm}$高于测试成绩的平均数，所以我的成绩高于集训队一半队员的成绩”，他的说法（填“正确”或“不正确”），理由是；

    （3）有两名请假的队员进行了补测，成绩分别为$153cm$，$17\mathrm{cm}$．将这两名队员的成绩与原16名队员成绩并成一组新数据，记新数据的中位数为n，方差为$S_{18}^{2}$，原数据的方差为$S_{16}^{2}$，则mn，$S_{18}^{2}$$S_{16}^{2}$（填“$\gt$”，“$\gt$”或“$=$”）．'
  answer: （1）$m=163.5$ （2）不正确，理由：平均数不能反映一组数据中居于中间位置的数，利用中位数进行判断比较合理．由于中位数是$163.5\mathrm{cm}$，小锐的成绩是$163\mathrm{cm}$，所以他的成绩低于集训队一半队员的成绩（答案不唯一） （3）$m = n$，$S_{18}^{2}$＞$S_{16}^{2}$
  solution: '【小问1详解】

    解：在测试成绩数据中居于中间的两个数为163，164，

    ∴中位数$m=\frac{163+164}{2}=163.5$，

    故答案为：$163.5$；

    【小问2详解】

    不正确，

    理由：平均数不能反映一组数据中居于中间位置的数，利用中位数进行判断比较合理．由于中位数是$163.5\mathrm{cm}$，小锐的成绩是$163\mathrm{cm}$，所以他的成绩低于集训队一半队员的成绩；

    【小问3详解】

    解：∵$153<163<164<171$，

    ∴中位数$n=163.5$，

    故$m = n$；

    又∵$153cm$，$17\mathrm{cm}$是极端值，与平均数$162\mathrm{cm}$偏差大，故波动性比原数的大，

    ∴$S_{18}^{2}>S_{16}^{2}$，

    故答案为：$=$，$\gt$．'
