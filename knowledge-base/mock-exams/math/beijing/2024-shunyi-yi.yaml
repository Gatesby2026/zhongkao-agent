  question: '小明观看了纸牌魔术表演，非常感兴趣，并做了如下实验和探究：

    将几张纸牌摞起来（从上面分别记为第1张，第2张，第3张），先将第1张牌放到整摞牌的下面，再去掉第2张牌；继续将第3张牌放在整摞牌的下面，再去掉第4张牌……如此循环往复，最终到只留下一张纸牌为止．例如，若将4张纸牌摞起来，按上述规则操作，陆续去掉第2张，第4张，第3张，最终留下第1张纸牌．将8张纸牌摞起来，按上述规则操作，最终留下的是第________张纸牌；将m张纸牌摞起来，按上述规则操作，若最终留下的是第1张纸牌，则$m
    =$________（用含n的代数式表示，其中n为自然数）．'
  answer: ①.1②.$2^n$
  solution: '解：8张纸牌顺序从上到下为，(将1张牌放到牌底，去掉下一张视为一轮)，1，2，3，4，5，6，7，8，

    前四轮去掉了2，4，6，8，

    还剩下4张纸牌从上至下为1，3，5，7，

    再经过2轮去掉3，7，

    还利2张纸牌、从上至下为1，5，

    再经过1轮，去掉5，

    最终剩下的是原来的第1张纸牌；

    由条件中4张纸牌，按上述规则操作后，最后留下的第1张纸牌，

    将m张纸牌摞起来，按上述规则操作，若最终留下的是第1张纸牌，

    ∴$m = 2^n$；

    故答案为：1；$2^n$．'
