  question: 方程$\frac{1}{x-1}=\frac{2}{x}$的解为________．
  answer: $x=2$
  solution: '解：$\frac{1}{x-1}=\frac{2}{x}$

    去分母得：$x=2(x-1)$，

    去括号得：$x=2x-2$，

    移项得：$x-2x=-2$，

    合并同类项得：$-x = -2$，

    系数化为1得：$x=2$，

    检验，当$x=2$时，$x(x-1)\neq0$，

    ∴原方程的解为$x=2$，

    故答案为：$x=2$．'
