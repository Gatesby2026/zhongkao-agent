  question: '在平面直角坐标系xOy中，$M(x_{1},y_{1})$，$N(x_{2},y_{2})$是抛物线$y=ax^{2}+bx+c(a>0)$上任意两点，设抛物线的对称轴为$x = t$．

    （1）当$x_{1}=2$，$y_{1}=c$时，求抛物线的对称轴；

    （2）若对于$1-t<x_{1}<2-t$，$t<x_{2}<t+2$，都有$y_{1}>y_{2}$，求t的取值范围．'
  answer: （1）抛物线的对称轴$x = 1$ （2）$t \leq -\frac{1}{2}$或$t^{2}$
  solution: '【小问1详解】

    解：由题意得$4a+2b+c=c$，解得$b = -2a$，

    ∵$x = \frac{b}{2a} = \frac{-2a}{2a} = -1$

    ∴抛物线的对称轴$x = 1$；

    【小问2详解】

    ∵抛物线的对称轴为$x = t$，$t<x_{2}<t+2$，

    ∴$x_2$在对称轴右侧，

    ∵$a > 0$

    ∴在对称轴右侧y随x的增大而增大，

    ①当$x_{1}$在对称轴右侧，

    ∵$y_{1}>y_{2}$，

    ∴$x_{1}>x_{2}$，

    则$\begin{cases}

    t < 1 - t \\

    t + 2 \leq 1 - t

    \end{cases}$，解得$\left\{

    \begin{array}{l}

    t < \dfrac{1}{2} \\

    t \leq -\dfrac{1}{2}

    \end{array}

    \right.$，故$t \leq -\frac{1}{2}$；

    ②当$x_{1}$在对称轴左侧，

    设$M(x_1,y_1)$关于对称轴的点为$M''(k,y_1)$，

    ∵抛物线$[公式]$对称轴为$x = t$，

    ∴$2t = h + x_{1}$，解得$h=2t-x_{1}$，

    ∵$1-t<x_{1}<2-t$，

    ∴$3t-2<h<3t-1$，

    ∴$\begin{cases}

    2-t < t \\

    t+2 \leq 3t-2

    \end{cases}$，解得$t^{2}$；

    故答案为：$t \leq -\frac{1}{2}$或$t^{2}$．'
