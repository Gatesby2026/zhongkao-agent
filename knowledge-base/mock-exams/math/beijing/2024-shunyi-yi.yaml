  question: '如图，AB是$\odot\odot$的直径，$\widehat{AC}=\widehat{AD}$，CD与AB交于点E，$\odot\odot$的切线BF交AD的延长线于点F．

    [图]

    （1）求证：$CD \parallel BF$；

    （2）连接FO并延长，交DC的延长线于点G．若E为AO的中点，$\odot\odot$的半径为4，求CG的长．'
  answer: （1）证明见解析 （2）$2\sqrt{3}$
  solution: '【小问1详解】

    证明：∵$\widehat{AC}=\widehat{AD}$，

    ∴$OA \perp CD$，

    ∵$\odot\odot$的切线BF交AD的延长线于点F，

    ∴$OB \perp BF$，

    ∵AB是$\odot\odot$的直径，

    ∴$A, O, B$三点共线，

    ∴$CD \parallel BF$；

    【小问2详解】

    解：如图所示，连接OD，

    ∵$OA \perp CD$，

    ∴$DE=CE,\ \angle OED=90^\circ$，

    ∵E为AO的中点，$\odot\odot$的半径为4，

    ∴$OE=\frac{1}{2}OA=2$，$OD = 4$，

    ∴$\cos\angle EOD=\frac{OE}{OD}=\frac{1}{2}$，

    ∴$\angle EOD = 60^\circ$，

    ∴$DE=OD\cdot\sin\angle EOD=2\sqrt{3}$，

    ∴$CE = DE = 2\sqrt{3}$；

    ∵$OA = OD$，

    ∴$\triangle AOD$是等边三角形，

    ∴$\angle A = 60^\circ$，

    ∴$BF=AB\cdot\cos A=8\sqrt{3}$，

    ∵$CD \parallel BF$，

    ∴$\triangle OEG \sim \triangle OBE$，

    ∴$\frac{EG}{BF} = \frac{OE}{OB}$，即$\frac{EG}{8\sqrt{3}}=\frac{2}{4}$，

    ∴$EG=4\sqrt{3}$，

    ∴$CG=EG-CE=2\sqrt{3}$．

    [图]'
