  question: '杆秤是我国度量衡“三大件（尺斗秤）”正要组成都分，是中华民族衡重的基本量具．杆秤依据杠杆原理制作而成，一般由秤钩（秤盘）、秤杆和秤砣三部分组成，秤杆上的刻度叫做“秤星”，古时候秤杆叫做“权”，秤砣叫做“衡”，“权衡”一词就来源于此．

    [图]

    下图是小阳同学利用自制杆秤称重的示意图，使用时将货物放在秤盘上，用手提起B（相当于支点）处的秤纽，在秤杆上移动秤砣的位置，当秤杆水平平衡时，可根据秤砣在秤杆上的位置送出货物的质量如图1所示，称量货物甲时，秤砣在C处秤杆平衡，此时可读出货物甲的质量是$40g$；如图2所示，称量货物乙时，秤砣在D处秤杆平衡，此时可读出货物乙的质量是$60g$．根据图中所给数据，求这把杆秤的秤星E对应的刻度是多少克．'
  answer: 这把杆秤的秤星E对应的刻度是100克．
  solution: '解：设A处未挂物体时重a克，秤砣重b克，

    根据题意得：$\begin{aligned}

    2.5(a+40)&=11b\\

    2.5(a+60)&=16b

    \end{aligned}$，

    解得：$\left\{

    \begin{array}{l}

    a = 4 \\

    b = 10

    \end{array}

    \right.$，

    设这把杆秤的秤星E对应的刻度是x克，

    ∴$2.5(x+4)=26\times10$，

    解得：$x=100$，

    ∴这把杆秤的秤星E对应的刻度是100克．'
