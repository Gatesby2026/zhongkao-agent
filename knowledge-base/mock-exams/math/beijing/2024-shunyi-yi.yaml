  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(4,5)$和$B(0,-1)$，与过点$(2,0)$且平行于y轴的直线交于点C．

    （1）求该函数的表达式及点C的坐标；

    （2）当$x<2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值大于函数$y=kx+b\ (k\neq0)$的值且小于3，直接写出n的取值范围．'
  answer: （1）$y=\frac{3}{2}x-1$，$C(2,2)$ （2）$1\leq n\leq 2$
  solution: '【小问1详解】

    解：∵函数$y=kx+b\,(k\neq0)$的图象经过点$A(4,5)$和$B(0,-1)$，

    ∴$\left\{\begin{array}{l}4k+b=5\\b=-1\end{array}\right.$，

    ∴$\left\{\begin{array}{l}k=\dfrac{3}{2}\\b=-1\end{array}\right.$，

    ∴该函数解析式为$y=\frac{3}{2}x-1$，

    在$y=\frac{3}{2}x-1$中，当$x=2$时，$y=2$，

    ∴$C(2,2)$；

    【小问2详解】

    解：当$\frac{1}{2}x-1 < -x+n<3$时，

    解得$\left\{\begin{array}{l}x<6-2n\\ x<1+n\end{array}\right.$，

    ∵当$x<2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值大于函数$y=kx+b\,(k\neq0)$的值且小于3，

    ∴$\frac{6-2n}{1+n}-\frac{2}{2+2n}=\frac{6-2n}{2+2n}$，

    ∴$1 \leqslant n \leqslant 2$．'
