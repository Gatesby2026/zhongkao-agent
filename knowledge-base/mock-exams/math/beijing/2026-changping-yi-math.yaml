  question: 27. 已知，如图 $\triangle ABC$，$\angle B = a$，点 $E$ 是 $AB$ 上的点，连接 $CE$，点 $B$ 关于直线 $CE$ 的对称点为点 $F$，连接 $CF$，$EF$，将射线 $CF$ 绕点 $C$ 逆时针旋转 $180^\circ - a$ 得到 $CG$，在射线 $CG$ 上取一点 $P$，使 $\angle CPF = \angle
    CAB$，延长 $PC$ 交 $AB$ 于点 $D$。 (1) 求证：$\angle DCE = \angle DEC$； (2) 连接 $DF$，若 $\angle DFE = 2\angle B$，用等式表示 $CP$，$AD$，$DF$ 三者之间的数量关系，并证明。
  answer: (1) 由题意得, $\angle PCF = 180^\circ - a$, $\therefore \angle DCF = \alpha = \angle B$. $\triangle CBE \cong \triangle CFE$. $\therefore \angle FCE = \angle BCE$. 设 $\angle FCE = \angle BCE = \beta$.
    $\therefore \angle DCE = \angle DCF + \angle FCE = \alpha + \beta$. $\therefore \angle DCE = \angle DEC$. $\therefore \angle DEC = \angle B + \angle BCE = \alpha + \beta$, $\therefore \angle DCE = \angle
    DEC$. (2) $AD = CP + DF$. 在线段 $AB$ 上取一点 $Q$ 使得 $CQ = CB$, $\therefore \angle CQB = \angle B = \alpha$. 则 $\angle AQC = 180^\circ - \alpha$, $\therefore \angle AQC = \angle PCF$. $\because$ 点 $B$ 关于直线
    $CE$ 的对称点为点 $F$, $\therefore CF = CB$. $\therefore CQ = CB$.
