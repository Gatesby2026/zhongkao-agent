  question: 26. 在平面直角坐标系 xOy 中，抛物线 $y_1 = ax^2 + bx + 1$ ($a \neq 0$)，经过点 (2, 1)。 (1) （1）用含 $a$ 的式子表示 $b$； (2) （2）过点 $P(t, 0)$ 作 x 轴的垂线，交抛物线 $y_1 = ax^2 + bx + 1$ 于点 $M$，交抛物线 $y_2 = \frac{1}{4}ax^2 + 1$
    于点 $N$。 ① 若 $a = 1$，$t = 2$，则 $MN = _$； ② 已知点 $A(a, 0)$，$B(2a, 0)$，在点 $P$ 从点 $A$ 运动到点 $B$ 的过程中，$MN$ 的长随 $AP$ 的长增大而增大，求 $a$ 的取值范围。
  answer: '(1) $\because$ 抛物线 $y_1 = ax^2 + bx + 1$ (a $\neq$ 0), 经过点 (2, 1), 所以 $1 = 4a + 2b + 1$. 因此 $b = -2a$. (2) (1) 1; (2) $M(t, at^2 - 2at + 1), N(t, \frac{1}{4}at^2 + 1)$. 分两种情况: 情况 1: 当 a > 0 时,
    (i) 当 $0 < t \leq \frac{8}{3}$ 时, $at^2 - 2at + 1 < \frac{1}{4}at^2 + 1$, $MN = -\frac{3}{4}at^2 + 2at$. 函数 $y = -\frac{3}{4}at^2 + 2at$ 的图象开口向下, 对称轴为 $t = \frac{4}{3}$, 当 $t \leq \frac{4}{3}$ 时, y
    随 t 的增大而增大, 当 $t > \frac{4}{3}$ 时, y 随 t 的增大而减小. 因此当 $0 < a < 2a \leq \frac{4}{3}$ 时符合题意, $\frac{4}{3} < 2a \leq \frac{8}{3}$ 时不符合题意. 因此 $0 < a \leq \frac{2}{3}$. (ii) 当 $t > \frac{8}{3}$ 时, $at^2 -
    2at + 1 > \frac{1}{4}at^2 + 1$, $MN = \frac{3}{4}at^2 - 2at$. 函数 $y = \frac{3}{4}at^2 - 2at$ 的图象开口向上, 对称轴为 $t = \frac{4}{3}$, 当 $t \leq \frac{4}{3}$ 时, y 随 t 的增大而减小, 当 $t > \frac{4}{3}$ 时, y 随 t 的增大而增大.
    因此当 $a \geq \frac{8}{3}$ 时符合题意. 因此 $a \geq \frac{8}{3}$. 情况 2: 当 $a<0$ 时, $2a \leq t < 0$, $at^2 - 2at + 1 < \frac{1}{4}at^2 + 1$. $MN = -\frac{3}{4}at^2 + 2at$, 函数 $y = -\frac{3}{4}at^2 + 2at$ 的图象开口向上,
    对称轴为 $t = \frac{4}{3}$, 当 $t \leq \frac{4}{3}$ 时, y 随 t 的增大而减小, 当 $t > \frac{4}{3}$ 时, y 随 t 的增大而增大. 当 $t < 0$ 时, 即 $MN$ 的长随 $AP$ 的长的增大而增大. 因此当 $a < 0$ 时符合题意. 综上所述, $a$ 的取值范围是 $a < 0$ 或 $0 < a \leq
    \frac{2}{3}$ 或 $a \geq \frac{8}{3}$.'
