- id: 15
  type: 填空
  score: 2
  question: '小云在学习了勾股定理后，尝试制作了四个全等直角三角形纸板，并拼出一个新图形如图所示，其中四边形$ABCD$是正方形．如果$EF = 1$，四边形$ABCD$的面积为25，那么GH的长为_____．

    [图]'
  answer: '7'
  solution: '解：$\triangle AFB\cong\triangle DGC\cong\triangle CHB\cong\triangle DEA$，

    $\therefore AE = BF = BH = GC$，$AF = CH$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$正方形$ABCD$的面积为25，

    $\therefore AB = 5$，

    设$AE = BF = x$，则$AF = x + 1$，

    $AC^{2}+BC^{2}=AB^{2}$，

    $\ldots(x+1)^{2}+x^{2}=5^{2}$，

    解得：$x_{1}=3,\ x_{2}=-4$（舍），

    $\ldots CH=AF=x+1=4$，$GC = BF = 3$，

    $\therefore GH = GC + CH = 7$，

    故答案为：7．'
