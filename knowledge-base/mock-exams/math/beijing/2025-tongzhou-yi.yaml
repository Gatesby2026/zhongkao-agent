  question: '如图，在$V_{ABC}$中，$\angle ACB=90^\circ$，$AC = BC$，将线段CB绕点C顺时针旋转$\alpha(0^{\circ}<\alpha<90^{\circ})$，得到线段CD，连接BD，过点A作$AE \perp BD$交BD的延长线于点E，连接AD，那么$\angle DAE$的度数（）

    [图]

    A.随着a的增大而增大

    B.随着a的增大而减小

    C.不变

    D.随着a的增大，先增大后减小'
  answer: C
  solution: '解：∵将线段CB绕点C顺时针旋转$a(0^{\circ}<a<90^{\circ})$，得到线段CD，

    ∴$BC = CD = AC$，

    ∴$\angle CBD=\angle CDB,\angle ADC=\angle CAD$，

    ∴$\angle BDC+\angle CDA=\frac{1}{2}(360^\circ-\angle ACB)-135^\circ=\angle BDA$，

    ∵$\angle BDA=\angle AED+\angle DAE=135^\circ$，

    ∴$\angle DAE = \angle BDA - \angle AED = 45^\circ$，

    ∴$\angle DAE$的度数是定值，不变

    故选：C．'
