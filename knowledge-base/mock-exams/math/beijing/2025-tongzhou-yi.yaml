  question: 某水稻实验基地防治病害虫有无人机喷洒和人工打药两种方式．在一次作业中，一架无人机工作2小时和一名工人工作8小时，共完成了340亩的打药任务（不重复作业），通过测量对比发现无人机每小时作业的面积恰好是人工的6倍．请问一架无人机和一名工人共同作业8小时能否完成960亩的打药任务，并说明理由．
  answer: 无人机和人工共同作业8小时不能完成960亩的打药任务，理由见解析
  solution: '解：设人工每小时作业面积是x亩，无人机每小时作业面积是y亩，

    根据题意得：$\begin{cases}

    8x + 2y = 340 \\

    y = 6x

    \end{cases}$，

    解得：$\begin{cases}

    x = 17 \\

    y = 102

    \end{cases}$，

    $8(x+y)=8\times(17+102)-952=960.$

    所以无人机和人工共同作业8小时不能完成960亩的打药任务．'
