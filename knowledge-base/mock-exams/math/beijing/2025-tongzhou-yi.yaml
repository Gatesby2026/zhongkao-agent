    （2）如图3，点$q(0,1),M(-1,2),N(2,2)$．若线段MN上存在点P，使点P为$\odot\odot$的“赋能点”，直接写出t的取值范围．'
  answer: （1）①$P_{1},P_{3}$；②$-\sqrt{2} \leq b \leq 2 + \sqrt{2}$ （2）$1 \leq t \leq 2 + \frac{\sqrt{2}}{2}$
