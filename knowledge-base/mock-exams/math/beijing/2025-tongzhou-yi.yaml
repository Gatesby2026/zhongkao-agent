  answer: （1）见解析 （2）3
  solution: '【小问1详解】

    证明：∵点D是$\widehat{CB}$的中点，

    $\therefore CD = DB$，

    $\angle CAD = \angle DAB$．

    ∵$OA = OD$，

    $\angle ADO = \angle DAB$．

    $\angle CAD = \angle ADO$，

    $\therefore AC \parallel OD$．

    【小问2详解】

    解：如图，

    [图]

    ∵$AC \parallel OD$，

    $\triangle ACE \sim \triangle DFE$，

    $\frac{DF}{AC}=\frac{DE}{AE}=\frac{1}{2}$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$设$DF = x, AC = 2x$，

    ∵AB是$\odot\odot$的直径，

    $\angle ACB = 90^\circ$，

    ∵$AC \parallel OD$，

    $\therefore OD \perp CB$于点F，

    $\therefore CF = FB$，

    $\therefore OF$是$\triangle ACB$的中位线，

    $\therefore AC=2OE=2x$，

    $OB = OD = 2x$，

    ∵BG是$\odot\odot$的切线，

    $\angle GBO = 90^\circ$，

    $\cos\angle GOB=\frac{OB}{OG}=\frac{OF}{OB}$，

    ∵$DG = 3$，

    $\frac{2x}{2x+3}=\frac{x}{2x+3}$，

    ∴$\odot\odot$半径的长为3．'
