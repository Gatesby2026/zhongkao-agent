    ∴知识问答成绩为80分的学生，在八年级排名更靠前，

    故答案为：八，该学生的成绩大于八年级成绩的中位数，而小于七年级成绩的中位数

    【小问4详解】

    解：估计七年级$300$名学生成绩的平均数为$77$分，八年级$200$名学生成绩的平均数为$79.5$分，

    所以估计校七、八年级所有学生本次知识问答的平均分为：$77\times300+79.5\times200=78300+200$（分）．'
