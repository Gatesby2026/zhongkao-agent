  question: 已知$3x^{2}+2x-1=0$，求代数式$(x+1)^{2}-(x+2)(x-2)+3x^{2}$的值．
  answer: '6'
  solution: '解：$(x+1)^{2}-(x+2)(x-2)+3x^{2}$

    $=x^{2}+2x+1-(x-4)+3x^{2}$

    $x^{2}+2x+1-x^{2}+4+3x$

    $=3x^{2}+2x+5$，

    $3x^{2}+2x-1=0$，

    $3x^{2}+2x=1$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原式$=1+5=6$．'
