  question: '如图所示，在长为11、宽为10的矩形内部，沿平行于矩形各边的方向割出三个完全相同的小矩形，求每个小矩形的面积．

    [图]'
  answer: '12'
  solution: '解：设每个小矩形的长为x，宽为y，

    根据题意可得：$\begin{cases}

    x + 2y = 10 \\

    2x + y = 11

    \end{cases}$，解得：$\left\{

    \begin{array}{l}

    x = 4 \\

    y = 3

    \end{array}

    \right.$，

    ∴每个小矩形的面积$=3\times4=12$．'
