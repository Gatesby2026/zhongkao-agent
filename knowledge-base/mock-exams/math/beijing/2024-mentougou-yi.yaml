  question: '在平面直角坐标系xoy中，点$A(x,m)$，$B(x_2,n)$在抛物线$y=ax^{2}+bx+4(a>0)$上，设抛物线的对称轴为直线$x = h$．

    [图]

    （1）如果抛物线经过点$(2,4)$，求h的值；

    （2）如果对于$x_{1}=h-4$，$x_{2}=3h$，都有$m > n$，求h取值范围；

    （3）如果对于$h-4\leq x_{1}\leq h+2$，$x_{2}\leq 1$或$x_{2} \quad 12$，存在$m > n$，直接写出h的取值范围．'
  answer: （1）$1$； （2）$-2<h<2$； （3）$h<5$或$h>8$．
  solution: '【小问1详解】

    解：∵抛物线经过点$(2,4)$，

    ∴$4a+2b+4=4$，

    ∴$b = -2a$，

    ∴$h = -\frac{b}{2a} = 1$；

    【小问2详解】

    解：∵$a > 0$，

    ∴抛物线$y=ax^{2}+bx+4(a>0)$开口向上，

    当$3h \leq h$，即$h \leq 0$时，都有$m > n$，

    则$h-4<3h$，

    解得$h > -2$，

    ∴$-2<h\leq0$；

    当$3h > h$，即$h > 0$时，都有$m > n$，

    则$\frac{h-4+3k}{2}<h$，

    解得$h<2$，

    ∴$0<h<2$；

    综上所述，$-2<h<2$；

    【小问3详解】

    解：由（1）知，$h = -\frac{b}{2a}$

    ∴$b = -2ah$，

    ∴二次函数的解析式为：$y=ax^{2}-2ahx+4$，

    ∵$h-4\leq x_{1}\leq h+2$，

    ∴$ah^2-2ah^2+4\leq m\leq a(h-4)^2-2ah(h-4)+4$，

    即$4-ah^{2}\leq m\leq16a+4-ah^{2}$，

    当$h \leq 1$或$h\ 12$时，n最小值为$ah^{2}-2ah^{2}+4=4-ah^{2}$，

    ∴一定存在$m > n$，

    当$1<h<12$时，当$x_2$取1或者12时n有最小值，

    即n的最小值为$a-2ah+4$或$144a-24ah+4$，

    ∵存在$m > n$，

    ∴$a-2ah+4<16a+4-ah^{2}$或$144a-24ah+4<16a+4\cdot ah^{2}$，

    ∴$ah^{2}-2ah-15a<0$或$ah^{2}-24ah+128<0$，

    ∵$a > 0$，

    ∴$(k-5)(k+3)<0$或$(h-8)(h-16)<0$，

    ∴$-3<h<5$或$8<h<16$，

    综上所述，$h<5$或$h>8$．'
