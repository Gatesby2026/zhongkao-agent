  question: '如图，在四边形$ABCD$中，$AD \parallel BC$，$\angle A = 90^{\circ}$，$BD = BC$，点E为CD中点，射线BE交AD的延长线于点F，连接CF．

    [图]

    （1）求证：四边形$BCFD$是菱形；

    （2）若$AD = 1$，$CF = 2$，求BF的长．'
  answer: （1）见解析 （2）$2\sqrt{3}$
  solution: '【小问1详解】

    证明：∵$AD \parallel BC$，

    ∴$DF \parallel BC$，

    ∴$\angle DFE=\angle CBE,\angle FDE=\angle BCE$，

    ∵点E为CD中点，

    ∴$CE = DE$，

    在$\triangle DEF$和$\triangle CEB$中，

    $\angle DFE = \angle CBE \\

    \angle DFE = \angle BCE \\

    CE = DE$，

    ∴$\triangle DEF\cong\triangle CEB(AAS)$，

    ∴$DF = BC$，

    ∴四边形$BCFD$是平行四边形，

    ∵$BD = BC$，

    ∴四边形$BCFD$是菱形；

    【小问2详解】

    解：∵四边形$BCFD$是菱形，$CF = 2$，

    ∴$BD = DF = CF = 2$，

    ∵$AD = 1$，$\angle A = 90^{\circ}$，

    ∴$AF = AD + CF = 3, AB = \sqrt{BD^2 - AD^2} = \sqrt{3}$，

    ∴$BF = \sqrt{AB^{2} + AF^{2}} = 2\sqrt{5}$．'
