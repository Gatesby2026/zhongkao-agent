  question: '如图，在等边三角形ABC中，有一点P，连接PA、PB、PC，将BP绕点B逆时针旋转$60^\circ$得到BD，连接PD、AD，有如下结论：①$\triangle BPC \cong \triangle BDA$；②$\triangle BDP$是等边三角形；③如果$\angle BPC=150^{\circ}$，那么$PA^{2}=PB^{2}+PC^{2}$．以上结论正确的是（）

    [图]

    A.①②

    B.①③

    C.②③

    D.①②③'
  answer: D
  solution: '解：①∵$\triangle ABC$是等边三角形，

    ∴$AB = BC$，$\angle ABC = 60^\circ$，

    ∵BP绕点B逆时针旋转$60^\circ$得到BD，

    ∴$BD = BP, \angle DBP = 60^\circ$，

    ∴$\angle ABC-\angle ABP=\angle DBP-\angle ABP$，即$\angle ABD = \angle CBP$，

    ∵$AB = BC, \angle ABD = \angle CBP, BD = BP$，

    ∴$\triangle BPC \cong \triangle BDA$，故①正确，符合题意；

    ②∵BP绕点B逆时针旋转$60^\circ$得到BD，

    ∴$BD = BP, \angle DBP = 60^\circ$，

    ∴$\triangle BDP$是等边三角形，故②正确，符合题意；

    ③∵$\triangle BDP$是等边三角形，

    ∴$\angle BDP = 60^\circ$

    ∵$\triangle BPC \cong \triangle BDA$，$\angle BPC=150^{\circ}$，

    ∴$\angle ADB=150^{\circ}$，

    ∴$\angle ADP = \angle ADB - \angle BDP = 90^\circ$，

    ∴$PA^{2}=PB^{2}+PC^{2}$，故③正确，符合题意；

    综上：正确的有①②③，

    故选：D．'
