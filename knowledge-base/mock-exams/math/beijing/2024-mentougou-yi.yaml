    | 5 | 香菇油菜 | 素菜 | 911 | 11 | 7 |

    | 6 | 家常豆腐 | 素菜 | 1020 | 16 | 13 |

    | 7 | 清炒冬瓜 | 素菜 | 564 | 7 | 1 |

    | 8 | 韭菜炒豆芽 | 素菜 | 49 | 12 | 3 |

