  question: '在$\triangle ABC$中，$\angle C=90^{\circ}$，$AB = 3$，$AC = 2$，点P在线段BC上（不与B、C两点重合），如果AP的长度是个无理数，则AP的长度可以是______．（写出一个即可）

    [图]'
  answer: $\sqrt{5}$（答案不唯一）
  solution: '解：∵$\angle C=90^{\circ}$，$AC = 2$，

    ∴$AP > 2$，

    ∵$AB = 3$，

    ∴$AP<3$，

    则$2<AP<3$

    ∴$4 < AP^{2} < 9$，

    ∴AP的长度可以是$\sqrt{5}$，

    故答案为：$\sqrt{5}$（答案不唯一，$\sqrt{6},\sqrt{7},2\sqrt{3},\ldots$）'
