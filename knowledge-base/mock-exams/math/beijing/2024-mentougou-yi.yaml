  question: 已知一元二次方程$x^{2}+ax+b=0$，有两个根，两根之和为正数，两根之积是负数，写出一组符合条件的a、b的值_________．
  answer: $a = -1$，$b = -2$（答案不唯一）
  solution: '解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$一元二次方程$x^{2}+ax+b=0$有两个根，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\Delta = a^{2} - 4b \quad 0$，

    $\therefore 4b \leq a^{2}$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$两根之和为正数，两根之积是负数，

    ∴$x_{1}+x_{2}=-a>0$，$x_{1}x_{2}=b<0$，

    $\therefore a<0$，

    令$a = -1$，$b = -2$．

    故答案为：$a = -1$，$b = -2$（答案不唯一）．'
