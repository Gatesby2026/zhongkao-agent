  question: '如图，BD是$\triangle ABC$的角平分线，$DE \perp BC$于点E．若$BE = 3$，$\triangle BDE$的面积为$1.5$，则点D到边AB的距离为_________．

    [图]'
  answer: '1'
  solution: '解：过D作$DF \perp AB$交AB延长线于F，

    ∵BD是$\triangle ABC$的角平分线，$DE \perp BC$于点E．

    ∴$DF = DE$，

    ∵$BE = 3$，$\triangle BDE$的面积为$1.5$，

    ∴$\frac{1}{2}DE\cdot BE=1.5$，即$\frac{1}{2}\times3DE=1.5$，解得：$DE = 1$，

    ∴$DF = 1$，即点D到边AB的距离为1．

    故答案为1．

    [图]'
