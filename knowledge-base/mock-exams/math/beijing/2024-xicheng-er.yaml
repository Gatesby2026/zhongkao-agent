  question: 已知$x^{2}+x-3=0$，求代数式$\left(1+\frac{3}{x-1}\right)\cdot\frac{3}{x^{2}+4x+4}$的值．
  answer: $3$
  solution: '解：$\left(1+\frac{3}{x-1}\right)\cdot\frac{3}{x^{2}+4x+4}$

    $\frac{36}{x-1}+\frac{3}{x-1}\cdot\frac{3}{(x+2)^{2}}$

    $=\frac{35}{x-1}+\frac{3}{(x+2)^{2}}$

    $=\frac{x+2}{x-1}\diamondsuit\frac{3}{(x+2)^{2}}$

    $\frac{3}{(x-1)(x+2)}$

    $\frac{3}{x^{2}+x-2}$，

    ∵$x^{2}+x-3=0$，

    ∴$x^2 + x = 3$，

    ∴代数式$\left(1+\frac{3}{x-1}\right)\cdot\frac{3}{x^{2}+4x+4}$的值$\frac{3}{x^{2}+x-2}-\frac{3}{x-1}=3$．'
