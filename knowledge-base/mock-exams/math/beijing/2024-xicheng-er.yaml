  question: '如图，AB与$\odot\odot$相切于点C．点$D,E$分别在OA，OB上，四边形$ODCE$为正方形，若$OA = 2$，则$DE =$_________．

    [图]'
  answer: $\sqrt{2}$
  solution: '解：如图：

    [图]

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$四边形$ODCE$为正方形，

    $\angle AOC=\angle BOC=45^{\circ}$，$\angle AOB=90^\circ$，$OF = CF$，$OC \perp DE$，

    $\therefore AB$与$\odot\odot$相切于点C，

    ∴$OC \perp AB$，

    ∴$\angle A=\angle B=90^{\circ}-45^{\circ}=45^{\circ}$，

    ∴$OA = OB$，

    ∵$OC \perp AB$，$OC \perp DE$，

    $\therefore DE \parallel AB$，

    ∴$\frac{OD}{AD}=\frac{OE}{EB}=\frac{OF}{FC}=1$，

    $\ldots AD = OD$，$BE = OE$，

    $\therefore DE$是$\triangle OAB$的中位线，

    $\therefore DE=\frac{1}{2}AB$，

    在$Rt_{\triangle OAB}$中，$\overrightarrow{AB}^{2}-\overrightarrow{OA}\cdot\overrightarrow{OB}=8$，

    $\therefore AB = 2\sqrt{2}$，

    $\therefore DE = \sqrt{2}$．

    故答案为：$\sqrt{2}$．'
