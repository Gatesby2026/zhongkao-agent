    $\angle DCH = \angle DCF - \angle DCH = 20^\circ$，

    $\angle ACF = 70^\circ$，

    $\angle ACF+\angle BCE=110^{\circ}$，

    $\therefore \angle ACF$与$\angle BCE$不互余，

    $\angle ACF+\angle BCF=180^\circ$，

    $\angle ECF+\angle BCF=180^{\circ}$，

