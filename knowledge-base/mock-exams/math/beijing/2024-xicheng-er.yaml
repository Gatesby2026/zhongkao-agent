  question: '不透明的袋子里装有3个完全相同的小球，上面分别标有数字4，5，6．随机从中摸出一个小球不放回，再随机摸出另一个小球．第一次摸出小球上的数字大于第二次摸出小球上的数字的概率是（）

    A.$\frac{1}{2}$

    B.$\frac{1}{3}$

    C.$\frac{2}{3}$

    D.$\frac{4}{9}$'
  answer: A
  solution: '解：列表如下：

    |  | 4 | 5 | 6 |

    | --- | --- | --- | --- |

    | 4 |  | （ 4 ， 5 ） | （ 4 ， 6 ） |

    | 5 | （ 5 ， 4 ） |  | （ 5 ， 6 ） |

    | 6 | （ 6 ， 4 ） | （ 6 ， 5 ） |  |

    共有6种等可能的结果，其中第一次摸出小球上的数字大于第二次摸出小球上的数字的结果有：（5，4），（6，4），（6，5），共3种，

    ∴第一次摸出小球上的数字大于第二次摸出小球上的数字的概率是$\frac{3}{6}=\frac{1}{2}$．

    故选：A．'
