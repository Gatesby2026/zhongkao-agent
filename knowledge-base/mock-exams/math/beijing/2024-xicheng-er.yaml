  question: 方程组$\begin{cases} 2x + y = 5 \\ x + 2y = 4 \end{cases}$的解为_________．
  answer: $\left\{\begin{array}{l}x=2\\y=1\end{array}\right.$
  solution: '解：$\begin{cases}

    2x + y = 5 \textcircled{1} \\

    x + 2y = 4 \textcircled{2}

    \end{cases}$，

    $①\times2$得：$4x + 2y = 10 \quad \text{③}$，

    $(3)-2$得：$3x=6$，

    解得：$x=2$，

    把$x=2$代入①得：$4+y=5$，

    解得：$y = 1$，

    ∴方程组$\begin{cases} 2x + y = 5 \\ x + 2y = 4 \end{cases}$的解为$\left\{\begin{array}{l}x=2\\y=1\end{array}\right.$，

    故答案为：$\left\{\begin{array}{l}x=2\\y=1\end{array}\right.$．'
