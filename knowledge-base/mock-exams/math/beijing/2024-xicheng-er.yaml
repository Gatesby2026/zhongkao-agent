  question: '如图，$A(2,m)$，$B(3,2)$两点在反比例函数$y=\frac{k}{x}(x>0)$的图象上．若将横、纵坐标都是整数的点称为整点，则线段OA，OB及反比例函数图象上A，B两点之间的部分围成的区域（不含边界）中，整点的坐标为_________．

    [图]'
  answer: $(1,1)$和$(2,2)$
  solution: '解：∵$A(2,m)$，$B(3,2)$两点在反比例函数$y=\frac{k}{x}(x>0)$的图象上，

    ∴$k=3\times2=6$，反比例函数解析式为$y=\frac{6}{x}(x>0)$，

    ∴$m = \frac{6}{2} = 3$，

    ∴$A(2,3)$，

    ∵$O(0,0)$，

    ∴设直线OA解析式为$y_{OA}=k_{1}x$，

    把$A(2,3)$代入$y_{OA}=k_{1}x$得：$2k_{1}=3$，

    解得：$k_{1}=\frac{3}{2}$，

    ∴直线OA解析式为$y_{OA} = \frac{3}{2}x$，

    设直线OB解析式为$y_{OB}=k_{2}x$，

    把$B(3,2)$代入$y_{OB}=k_{2}x$得：$3k_{2}=2$，

    解得：$k_{2}=\frac{2}{3}$，

    ∴直线OB解析式为$y_{OB} = \frac{2}{3}x$，

    ∵当$x = 1$时，$x_{\text{总}} = \frac{3}{2} \times 1 - \frac{3}{2}$，$y_{\text{OB}} = \frac{2}{3} \times 1 - \frac{2}{3}$，$\frac{2}{3}<1<\frac{3}{2}$，

    ∴整点$(1,1)$在线段OA，OB及反比例函数图象上A，B两点之间的部分围成的区域（不含边界）中，

    ∵$A(2,3)$，当$x=2$时，$y_{\text{on}} = \frac{2}{3} \sqrt{2} - \frac{4}{3}$，$\frac{4}{3}<2<3$，

    ∴整点$(2,2)$在线段OA，OB及反比例函数图象上A，B两点之间的部分围成的区域（不含边界）中，

    综上所述，线段OA，OB及反比例函数图象上A，B两点之间的部分围成的区域（不含边界）中，整点的坐标为$(1,1)$和$(2,2)$，

    '
