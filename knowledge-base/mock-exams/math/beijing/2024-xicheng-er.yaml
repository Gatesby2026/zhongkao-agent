  question: 解不等式组$\left\{\begin{array}{l}3x-2< x+4\\ x<\dfrac{2x-3}{5}\end{array}\right.$，写出它的所有整数解．
  answer: $-1 \leq x < 3$，$-1$，0，1，2
  solution: '解：$\begin{cases}

    3x-2=x+4\text{①} \\

    x=\dfrac{2x-5}{5}\text{②}

    \end{cases}$

    解不等式①，

    $3x - x < 4 + 2$

    $2x<6$

    得：$x<3$，

    解不等式②，

    $5x\quad 2x-3$

    $3x-3$

    得：$x^{-1}$，

    所以不等式组的解集是$-1 \leq x < 3$，

    所以不等式组的整数解是$-1$，0，1，2．'
