  question: '如图，$\triangle ABC$中，$AB = AC = 5$，$BC = 6$，AD平分$\angle BAC$交BC于点D，分别以点A和点C为圆心，大于$\frac{1}{2}AC$的长为半径作弧，两弧相交于点M和点N，作直线MN，交AD于点E，则DE的长为______．

    [图]'
  answer: $\frac{7}{8}$
  solution: '解:∵$\triangle ABC$中，$AB = AC = 5$，$BC = 6$，AD平分$\angle BAC$

    ∴$DC=\frac{1}{2}BC=3$，且$AD \perp BC$，（等腰三角形“三线合一”）

    ∴$AD=\sqrt{AC^{2}-CD^{2}}=\sqrt{5^{2}-3^{2}}=4$，

    由分别以点A和点C为圆心，大于$\frac{1}{2}AC$$[公式]$长为半径作弧，两弧相交于点M和点N，作直线MN，可知，MN垂直平分AC，

    如图，连接CE，

    ∴$AE = CE$，

    ∴$CE = AE = AD - DE = 4 - DE$，

    在$Rt\triangle EDC$中，$CE^{2}=DE^{2}+CD^{2}$，

    ∴$(4DE)^2=DE^2+3^2$，

    解得：$DE=\frac{7}{8}$；

    ∴DE的长为$\frac{7}{8}$；

    故答案为：$\frac{7}{8}$．

    [图]'
