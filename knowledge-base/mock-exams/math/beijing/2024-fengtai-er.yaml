  answer: A型充电桩的单价为0.9万元，B型充电桩的单价为1.2万元
  solution: '解：设B型充电桩的单价为x万元，

    则A型充电桩的单价为$(x-0.3)$万元.

    由由题意得：$\frac{18}{x-0.3}=\frac{24}{x}$

    解得$x=1.2$

    经检验：$x=1.2$是原分式方程的解，$x - 0.3 = 0.9$.

    答：则A型充电桩的单价为0.9万元，

    则B型充电桩的单价为1.2万元；'
