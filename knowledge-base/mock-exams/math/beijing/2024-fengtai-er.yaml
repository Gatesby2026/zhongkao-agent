  question: '在平面直角坐标系xOy中，已知$A(x_1,y_1)$，$B\left(x_{2},y_{2}\right)$，$C(x_3,y_3)$是抛物线$y = ax^2 - 2ax - 2 \quad (a > 0)$上的三个点．

    （1）求该抛物线的对称轴；

    （2）若对于$-2 < x_1 < -1$，$2<x_{2}<3$，都有$y_1y_2<0$，求证：$3a-2=0$；

    （3）若对于$2<x_{2}<3$，$m < x_3 < m + 1$，都有$y_{3}>y_{2}$，求m的取值范围．'
  answer: （1）抛物线的对称轴$x = 1$ （2）见解析 （3）$m \leq -2$或$m^{3}$
  solution: '【小问1详解】

    ∵二次函数解析式为$y=ax^{2}-2ax-2$$(a>0)$，

    ∴抛物线的对称轴$x=\frac{-2a}{2a}=1$．

    $[公式]$小问2详解】

    证明：设点$B\left(x_{2},y_{2}\right)$关于对称轴的对称点为$B''\left(x_{2}'',y_{2}\right)$，

    ∵抛物线的对称轴$x = 1$，$2<x_{2}<3$，

    ∴$-1 < x_2'' < 0$，

    ∵点A，$B''$在对称轴左侧，$a>0$，且$-2 < x_1 < -1 < x_2 < 0$，

    根据二次函数性质，$x<1$时，y随x的增大而减小，

    ∴$y_{1}>y_{2}$，

    ∵$y_1y_2<0$，

    ∴$y_{1}>0$，$y_{2}<0$，

    ∴当$x=-1$时，$y = 0$，

    把$(-1,0)$代入函数解析式得$3a-2=0$．

    【小问3详解】

    ∵抛物线的对称轴$x = 1$，$2<x_{2}<3$，

    ∴点$B\left(x_{2},y_{2}\right)$$[公式]$对称轴右侧，

    ①当点C在对称轴右侧时，

    ∵$m < x_3 < m + 1$时，$y_{3}>y_{2}$，

    根据二次函数性质，$x>1$时，y随x的增大而增大，

    ∴$m^{3}$，

    ②当点C在对称轴左侧时，

    设点C关于对称轴的对称点为$C''(x_3'',y_3)$，

    ∵$m < x_3 < m + 1$，

    ∵$x_{3}^{''}-1=1-m$，$x_{3}^{2}-1=-(m+1)$，

    ∴$-m+1 < x_1'' < -m+2$，

    根据二次函数性质，$x>1$时，y随x的增大而增大，

    ∴$-m+1\quad3$，则$m \leq -2$，

    综上可知，$m \leq -2$或$m^{3}$．'
