  question: '在平面直角坐标系xOy中，一次函数$y=kx+b$$(k \neq 0)$的图象由函数$y=2x$的图象平移得到，且经过点$(1,1)$．

    （1）求该一次函数的解析式；

    （2）当$x>-1$时，对于x的每一个值，函数$y = mx + 2$$(m \ne 0)$的值大于一次函数$y=kx+b$$(k \neq 0)$的值，直接写出m的取值范围．'
  answer: （1）$y=2x-1$ （2）$2\leq m\leq 5$
  solution: '【小问1详解】

    解：∵一次函数的图象$y=kx+b$由函数$y=2x$的图象平移得到，

    ∴$k=2$，则$y=2x+b$，

    ∵一次函数过点$(1,1)$，

    ∴把$x = 1$，$y = 1$代入$y=2x+b$可得：$1=2+b$，

    解得：$b = -1$，

    ∴一次函数解析式为：$y=2x-1$；

    【小问2详解】

    解：把$x=-1$代入$y=2x-1$，得：$y=-3$，

    把$x=-1$，$y=-3$代入$y = mx + 2$可得：$-3 = -m + 2$，

    解得：$m = 5$，

    ∵当$x > -1$时，函数$y = mx + 2$的值大于一次函数$y=kx+b$的值，

    ∴$2\leq m\leq 5$．'
