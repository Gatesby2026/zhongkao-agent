  question: '在$Rt\triangle ABC$中，$\angle BAC = 90^\circ$，D是BC的中点，过点A作$AE \parallel BC$，且$AE = BD$，连接BE．

    [图]

    （1）求证：四边形$ADBE$是菱形；

    （2）连接CE，若$AB=2$，$\angle AEB = 60^\circ$，求CE的长．'
  answer: （1）见解析 （2）$2\sqrt{7}$
  solution: '【小问1详解】

    ∵$AE \parallel BC$且$AE = BD$，

    ∴四边形$ADBE$是平行四边形．

    ∵在$Rt\triangle ABC$中，$\angle BAC = 90^\circ$，

    D是BC的中点，

    ∴$AD = BD = DC = \frac{1}{2}BC$．

    ∴四边形$ADBE$是菱形．

    【小问2详解】

    过点E作$EF \perp CB$交CB的延长线于点F

    [图]

    ∵四边形$ADBE$是菱形，

    ∴$AE = BE$，

    ∵$\angle AEB = 60^\circ$，

    ∴$\triangle AEB$为等边三角形，

    ∵$AB=2$，

    ∴$BE = AB = 2$，

    ∴$BD = DC = BE = 2$，

    ∵$AE \parallel BC$，

    ∴$\angle EBF=\angle AEB=60^{\circ}$，

    在$Rt\triangle BEF$中，$\angle F=90^{\circ}$，$\angle EBF = 60^\circ$，$BE = 2$，

    ∴$\angle BEF=90^{\circ}-60^{\circ}+30^{\circ}$，

    ∴$BF=\frac{1}{2}BE=1$，

    ∴$EF=\sqrt{EB^{2}-BF^{2}}=\sqrt{2^{2}-1^{2}}=\sqrt{3}$，

    ∵$CF=BD+DC+FB=5$，

    ∴在$Rt\triangle CEF$中，$CE=\sqrt{CI^{2}+EF^{2}}=\sqrt{5^{2}+\left(\sqrt{3}\right)^{2}}=2\sqrt{7}$．'
