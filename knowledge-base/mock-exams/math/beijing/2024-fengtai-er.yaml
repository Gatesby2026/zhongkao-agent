  question: '“机动车行驶到斑马线要礼让行人”等交通法规实施后，某校数学课外实践小组对这些交通法规的了解情况在全校随机调查了部分学生，调查结果分为四种：A．非常了解，B．比较了解，C．基本了解，D．不太了解，实践小组把此次调查结果整理并绘制成如图所示的条形统计图和扇形统计图．若该校共有$3000$名学生，结合图中的信息，估计全校“非常了解”交通法规的有_____人．

    [图]'
  answer: $1200$
  solution: '解：∵C种调查人数为$15$，占调查总人数百分比为$25\%$，

    ∴调查总人数为$15\div25\%=60$（人），

    ∵A种调查人数为$24$，该校共有$3000$名学生，

    ∴估计全校“非常了解”交通法规的有$3000\times\frac{24}{60}=1200$（人），

    故答案为：$1200$．'
