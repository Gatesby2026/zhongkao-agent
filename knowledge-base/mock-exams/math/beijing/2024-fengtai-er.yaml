  question: '实数a，b在数轴上的对应点的位置如图所示，下列结论中正确的是（　　）

    $\begin{tikzpicture}

    \draw[->, thick] (-4,0) -- (4,0);

    \draw[thick] (-3,-0.2) -- (-3,0.2) node[below] {$a$};

    \draw[thick] (0,-0.2) -- (0,0.2) node[below] {$0$};

    \draw[thick] (2,-0.2) -- (2,0.2) node[below] {$b$};

    \end{tikzpicture}$

    A.$-a > -b$

    B.$\left| a \right| < \left| b \right|$

    C.$\frac{1}{a} > \frac{1}{b}$

    D.$a^{2}<b^{2}$'
  answer: A
  solution: '解：根据题意，得$a<0$，$b>0$，$\left| a \right| > \left| b \right|$，

    ∴$-a > -b$，

    ∴$\frac{1}{a}<\frac{1}{b}$，$a^{2}>b^{2}$，

    ∴选项A正确，选项B、C、D错误．

    故选：A．'
