  question: 已知$2a^{2}-3a-6=0$，求代数式$(1+2a)(x-2a)-3a(x-2a)$的值．
  answer: '7'
  solution: '$(1+2a)(x-2a)-3a(x-2a)$

    $1-4a^{2}-3a+6a^{3}$，

    $= 2a^2 - 3a + 1$．

    ∵$2a^{2}-3a-6=0$，

    ∴$2a^{2}-3a=6$．

    ∴原式$=6+1=7$．'
