    $\because$ 旋转，

    $\therefore \angle DCE=a$，$CE=CD=BC$，

    $\therefore \angle CED=\angle CDE=\frac{1}{2}(180^\circ-a)=90^\circ-\frac{1}{2}a$，

    $\angle BCE=\angle BCD+\angle DCE=90^\circ+a$，

    $\therefore \angle CBE=\angle CEB=\frac{1}{2}(180^\circ-\angle BCE)=45^\circ-\frac{1}{2}a$，

    $\therefore \angle BED=\angle CED-\angle BEC=90^\circ-\frac{1}{2}a-45^\circ+\frac{1}{2}a=45^\circ$；'
