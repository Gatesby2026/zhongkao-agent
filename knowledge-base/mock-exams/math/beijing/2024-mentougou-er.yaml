  question: “谁知盘中餐，粒粒皆辛苦”知农爱农，珍惜粮食，传承美德，从校园做起．为响应此号召学校举办“减少舌尖上的浪费”宣传活动，参加活动的共60人，其中有校领导，教师代表，七年级学生代表，八年级学生代表和九年级学生代表．已知校领导和教师代表的总人数是七年级学生代表和八年级学生代表总人数的四分之一，校领导和七年级学生代表的总人数是教师代表和八年级学生代表总人数的七倍，则参加这次活动的九年级学生代表有______人．
  answer: '20'
  solution: '解：设参加这次活动的校领导有x人，教师代表有y人，七年级学生代表有z人，则参加这次活动的八年级学生代表有$\left[4(x+y)-z\right]$人，九年级学生代表有$\left[60-5(x+y)\right]$人，

    根据题意得：$x-z=7\left[4+4(x+y)-z\right]$，

    整理得：$27x+35y=8z$，

    ∴$27(x+y)=8(z-y)$．

    ∵x，y，z均为正整数，且27和8互质，

    ∴$x+y$是8的倍数，

    又∵$60-5(x+y)>0$，

    ∴$x + y < 12$，

    ∴$x+y=8$，

    ∴$60-5(x+y)=60-5\times8=20$（人），

    ∴参加这次活动的九年级学生代表有20人．

    故答案为：20．'
