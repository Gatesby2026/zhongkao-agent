  question: '啦啦操是一项展现青春活力的运动项目，北京市多所学校都选择以啦啦操为载体，让更多的学生在训练的过程中收获了健康与快乐．某校啦啦操学员共16名，测量并获取了所有学员的身高（单位：cm），数据整理如下：

    a．16名学生的身高：

    | 153 | 153 | 157 | 158 | 159 | 160 | 160 | 161 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 164 | 164 | 164 | 164 | 167 | 169 | 169 | 169 |

    b．16名学生$[公式]$身高的平均数、中位数、众数：

    | 平均数 | 中位数 | 众数 |

    | --- | --- | --- |

    | 161.94 | m | n |

    （1）写出表中m，n的值；

    （2）教练将学员分组进行PK赛，如果一组学员的身高的方差越小，则认为该舞台呈现效果越好，据此推断：下列两组学员中，舞台呈现效果更好的是______（填“A组”或“B组”）；

    | A 组学员的身高 | 157 | 158 | 159 | 160 | 161 |

    | --- | --- | --- | --- | --- | --- |

    | B 组学员的身高 | 161 | 164 | 164 | 164 | 167 |

    （3）该啦啦操队要选五名学生，已确定三名学员参赛，她们的身高分别为：160，160，164，她们的身高的方差为$\frac{32}{9}$．在选另外两名学员时，首先要求所选的两名学员与已确定的三名学员所组成的五名学员的身高的方差小于$\frac{32}{9}$，其次要求所选的两名学员与已确定的三名学员所组成的五名学员的身高的平均数尽可能的大，则选出的另外两名学员的身高分别为______和______．'
  answer: （1）$m = 162.5$，$n = 164$ （2）A组 （3）161，164
  solution: '【小问1详解】

    解：将这组数据按照从小到大的顺序排列为：$153$，$153$，$157$，$158$，$159$，$160$，$160$，$161$，$164$，$164$，$164$，$164$，$167$，$169$，$169$，$169$，

    出现次数最多的数是$164$，出现了4次，即众数$n = 164$，

    16个数据中的第8和第9个数据分别是$161$，$164$，

    ∴中位数$m=\frac{161+164}{2}=162.5$，

    ∴$m = 166$，$n = 165$；

    【小问2详解】

    解：A组身高的平均数为$\frac{1}{5}(57+58+59+60+61)=159$，

    A组身高的方差为$\frac{1}{5}\left((157-159)^2+(158-159)^2+(159-159)^2+(160-159)^2+(161-159)^2\right)-2$

    B组身高的平均数为$\frac{1}{5}(61+164+164+164+67)=164$，

    B组身高的方差为$\frac{1}{5}\left[(161-164)^{2}+3(164-164)^{2}+(167-164)^{2}\right]=3.6$，

    ∵$3.6>2$

    ∴舞台呈现效果更好的是A组，

    故答案为：A组；

    【小问3详解】

    解：160，160，164的平均数为$\frac{1}{3}(60+60+64)=161\frac{1}{3}$

    ∵所选的两名学生与已确定的三名学生所组成的五名学生的身高的方差小于$\frac{32}{9}$，

    ∴数据的差别较小，数据才稳定，

    可供选择的有：$161$，$164$，

    且选择$161$，$164$时，平均数会增大，

    故答案为：$161$，$164$．'
