  question: '对于关于x的一次函数$y=kx+b\,(k\neq0)$，我们称函数$y(n)=\left\{\begin{array}{l} kx+b(x<n), \\ -kx-b(x>n). \end{array}\right.$为一次函数$y=kx+b\,(k\neq0)$的n级衍生函数（其中n为常数）．

    [图][图]

    例如，$y=-4x+1$的$3$级衍生函数为：当$x<3$时，$y.\left\{x\right\}=-4x+1$；当$x\ 3$时，$y\left\{x\right\}=4x-1$．

    （1）如果$y=x+1$的$4$级衍生函数为$y\{4\}$，

    ①当$x=3$时，$y\{4\} =$______；

    ②当$y\{4\}=-\frac{1}{2}$时，$x =$______．

    （2）如果$y=2x+1$的$-2$级衍生函数为$y\{-2\}$，求双曲线$y = -\frac{3}{x}$与$y\{-2\}$的图像的交点坐标；

    （3）如果以点$A(0,t)$为圆心，$2$为半径的$\odot A$与$y=-x+2$的$-1$级衍生函数$y\{-1\}$的图像有交点，直接写出t的取值范围．'
  answer: （1）①4；②$-\frac{3}{2}$ （2）$\left(-\frac{3}{2},2\right)$和$(1,-3)$ （3）$-3-\sqrt{3}\leq s\leq 2\sqrt{2}-2$或$3-\sqrt{5}<1<2\sqrt{2}+2$
  solution: '【小问1详解】

    解：∵$y=x+1$的$4$级衍生函数为$y\{4\}$，

    ∴$y(4)=\left\{\begin{array}{l}x+1(x<4),\\-x-1(x\geq4).\end{array}\right.$，

    ①当$x=3$时，$x\cdot\{4\}=3+1=4$，

    故答案为：$4$；

    ②当$y\{4\}=-\frac{1}{2}$时，

    当$x<4$时，得：$x + 1 = -\frac{1}{2}$，解得：$x = -\frac{3}{2}$，

    当$x\ 4$时，得：$-x-1=-\frac{1}{2}$，解得：$x = -\frac{1}{2}$（舍去），

    故答案为：$-\frac{3}{2}$；

    【小问2详解】

    ∵$y=2x+1$的$-2$级衍生函数为$y\{-2\}$，

    ∴$y(-2)=\begin{cases}2x+1(x<-2),\\-2x-1(x\geq-2).\end{cases}$

    当$x<-2$时，

    联立方程组$\left\{

    \begin{array}{l}

    y = 2x + 1 \\

    y = -\dfrac{3}{x}

    \end{array}

    \right.$，

    ∴$2x^{2}+x+3=0$，

    ∵$\Delta=(-1)^{2}-4\times2\times3=-23<0$，

    ∴方程无解，即方程组无解，

    此时两个函数图像之间没有交点；

    当$x^{-2}$时，

    联立方程组$\left\{

    \begin{array}{l}

    y = -2x - 1 \\

    y = \dfrac{3}{x}

    \end{array}

    \right.$，

    解得：$\begin{cases}

    x = -\dfrac{3}{2} \\

    y = 2

    \end{cases}$或$\left\{\begin{array}{l}x=1\\y=-3\end{array}\r'
