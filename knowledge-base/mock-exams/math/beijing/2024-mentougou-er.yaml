    ∴$y_{2}-x_{1}=9-3.4=5.6$，

    当每毫升血液中含药量相等时，即$y_{1}=y_{2}$，在图象上找到$y_{1}$、$y_{2}$交点所对应的x即为两位病人大约服药时间，即x的值约为$0.5$或$2.1$，

    故答案为：5.6；0.5或2.1；

    【小问3详解】

    解：当$y=2$时，$y_{1}$所对应的x的值约为0.7，4，

    ∴甲种药物持续的时间为$4-0.7=3.3$

    同理乙种药物持续的时间为$2.5-0.7=1.8$，

    ∵$3.3-1.8=1.5$，

    ∴每毫升血液中含药量不少于2微克时对治疗疾病有效，则两种药物中甲种药的药效持续时间较长，药效大约相差1.5小时，

    故答案为：甲，1.5．'
