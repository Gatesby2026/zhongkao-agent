  question: '在平面直角坐标系xOy中，反比例函数$y=\frac{k}{x}(k\neq0)$的图象过点$A(1,1)$．

    [图]

    （1）求k的值；

    （2）一次函数$y=ax+b(a\neq0)$的图象过$A(0,3)$，与$y=\frac{k}{x}(x>0)$的图象交于两点，两函数图象交点之间的部分组成的封闭图形称作图象“G”，该图象内横纵坐标均为整数的点称为“G区域点”（不含边界）；

    ①当一次函数图象过$(3,1)$时，存在______个“G区域点”；

    ②如果“G区域点”的个数为3个，画出示意图，直接写出a的取值范围．'
  answer: （1）$k = 1$ （2）①2个；②见解析，$-\frac{2}{3}<a\leq-\frac{1}{2}$
  solution: '【小问1详解】

    ∵反比例函数$y=\frac{k}{x}(k\neq0)$的图象过点$A(1,1)$，

    ∴$k=1\times1=1$；

    ∴k的值为1；

    【小问2详解】

    ①一次函数$y=ax+b(a\neq0)$的图象过$(0,3)$，$(3,1)$，

    ∴$\begin{cases}

    b = 3 \\

    3k + b = 1

    \end{cases}$，解得$\left\{

    \begin{array}{l}

    k = -\dfrac{2}{3} \\

    b = 3

    \end{array}

    \right.$，

    ∴直线l的解析式为$y=-\frac{2}{3}x+3$，

    画出图形，如图所示，

    [图]

    区域G内的整点有$(1,2)$和$(2,1)$共两个；

    故存在2个“G区域点”；

    故答案为：2；

    ②如图，直线l：$y=ax+3$过$(3,1)$时，$1=3a+3$，

    解得$a = -\frac{2}{3}$，

    [图]

    直线l：$y=ax+3$过$(4,1)$时，$1=4a+3$，

    解得$a = -\frac{1}{2}$，

    观察图象可知：“G区域点”的个数为3个时，a的取值范围是$-\frac{2}{3}<a\leq-\frac{1}{2}$．'
