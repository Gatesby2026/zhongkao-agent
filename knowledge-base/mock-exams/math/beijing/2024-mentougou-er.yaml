  question: 解分式方程$\frac{x}{x+1}-\frac{6}{x^{2}-1}=1$
  answer: $x = -5$
  solution: '解：$\frac{x}{x+1}-\frac{6}{x^{2}-1}=1$，

    方程两边乘以$(x+1)(x-1)$得：$x(x-1)-6=(x+1)(x-1)$，

    去括号：$x^2 - x - 6 = x - 1$，

    移项：$x^{2}-x^{2}=-1+6$，

    合并同类项：$-x = 5$，

    系数化1：$x = -5$．

    经检验：$x = -5$是原方程的解．

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原方程的解是$x = -5$．'
