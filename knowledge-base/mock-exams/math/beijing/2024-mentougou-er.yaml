  answer: $\frac{x-2y}{x+y}$，$-\frac{1}{2}$
  solution: '解：$\frac{x-2y}{x^{2}+2xy+y^{2}}\cdot(x+y)$

    $=\frac{x-2y}{(x+y)^{2}}\cdot(x+y)$

    $=\frac{x-2y}{x+y}$，

    ∵$x-y=0$，

    ∴$x = y$，

    ∴原式$\frac{x-2x}{x+x}=-\frac{1}{2}$．'
