  question: '某个正多边形的一个内角是它的外角的2倍，则该正多边形是（    ）

    A.正方形

    B.正五边形

    C.正六边形

    D.正七边形'
  answer: C
  solution: '解：设这个多边形的边数是n，

    ∵一个内角是它的外角的2倍，

    ∴该正多边形内角和是其外角和的2倍，

    ∴$(n-2)\times180^{\circ}=2\times360^{\circ}$，

    解得：$n = 6$，

    即这个多边形是六边形．

    故选：C．'
