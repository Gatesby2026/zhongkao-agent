  question: '已知：如图，在$Y_{ABCD}$中，过点D作$DE \perp AB$于E，点F在边CD上，$DF=BE$，连接AF和BF．

    [图]

    （1）求证：四边形$BFDE$$[公式]$矩形；

    （2）如果AF平分$\angle DAB$，$BF = 4$，$\sin C = \frac{4}{5}$，求CD的长．'
  answer: （1）见解析 （2）8
  solution: '【小问1详解】

    ∵$Y_{ABCD}$，

    ∴$AB \parallel CD$，

    ∴$DF \parallel BE$，

    ∵$DF=BE$，

    ∴四边形$BFDE$为平行四边形，

    ∵$DE \perp AB$，

    $\angle DEB = 90^\circ$，

    ∴四边形$BFDE$为矩形；

    【小问2详解】

    由（1）可得四边形$BFDE$为矩形，

    ∴$\angle BFC = 90^\circ$，

    在$Rt\triangle ABC$中，$BF = 4$，$\sin C=\frac{4}{5}=\frac{BF}{BC}$，

    $\therefore BC = 5$，

    由勾股定理得$FC = 3$，

    ∵四边形$ABCD$是平行四边形，

    ∴$AD = BC = 5$，

    ∵AF平分$\angle DAB$，

    ∴$\angle DAF = \angle FAB$.

    又$\because AB \parallel CD$，

    ∴$\angle DFA = \angle FAB$，

    ∴$\angle DAF = \angle DPA = \angle FAB$，

