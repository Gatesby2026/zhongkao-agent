  question: '医学院某药物研究所研发了甲，乙两种新药，据监测，如果成人按规定的剂量服用，服药后的时间x（小时），服用甲种药物后每毫升血液中的含药量$y_{1}$（微克），服用乙种药物后每毫升血液中的含药量$y_{2}$（微克），记录部分实验数据如下：

    | x | 0 | 0.20 | 0.40 | 1.00 | 1.53 | 2.26 | 2.52 | 3.38 | 4.53 | 5.44 | … |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | $y_{1}$ | 0 | 0.68 | 1.36 | 3.40 | 3.21 | 2.77 | 2.65 | 2.31 | 1.92 | 1.65 | … |

    | $y_{2}$ | 0 | 0.18 | 0.36 | 9.00 | 5.03 | 2.26 | 1.70 | 0.66 | 0.19 | 0.07 | … |

    对以上数据进行分析，补充完成以下内容．

    （1）可以用函数刻画$y_{1}$与x，$y_{2}$与x之间的关系，在同一平面直角坐标系xOy中，已经画出$y_{1}$与x的函数图象，请画出$y_{2}$与x的函数图象；

    [图]

    （2）如果两位病人在同一时刻分别服用这两种药物，服药1小时后两位病人每毫升血液中含药量相差______微克；两位病人大约服药后______小时每毫升血液中含药量相等；（结果保留小数点后一位）

    （3）据测定，每毫升血液中含药量不少于2微克时对治疗疾病有效，则两种药物中______种药的药效持续时间较长，药效大约相差______小时（结果保留小数点后一位）．'
  answer: （1）见解析 （2）5.6；0.5或2.1 （3）甲，1.5
  solution: '【小问1详解】

    解：如图，根据对应x和$y_{2}$的值在图上描点，然后用光滑的曲线连接即可．

    [图] 【小问2详解】

