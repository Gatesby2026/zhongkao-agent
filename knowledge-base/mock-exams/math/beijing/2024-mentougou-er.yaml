  question: '如图，AB是$\odot\odot$的直径，弦$CD \perp AB$于点E，$AC = CD$，如果$AC = 2\sqrt{3}$则$\odot\odot$的半径长为______．

    [图]'
  answer: '2'
  solution: '解：如图，连接AD，OC，

    [图]

    ∵AB是$\odot\odot$的直径，弦$CD \perp AB$，

    ∴$CE = DE$，$AC = AD$，

    ∵$AC = CD$，

    ∴$AC = CD = AD$，

    ∴$\triangle ABC$为等边三角形，

    ∴$\angle ACD = 60^\circ$，$\angle CAE=90^{\circ}-60^{\circ}+30^{\circ}$，

    ∴$CE=\frac{1}{2}AC=\sqrt{3}$，

    ∵$OA = OC$，

    ∴$\angle OCA = \angle OAC = 30^\circ$，

    ∴$\angle OCE=60^{\circ}-30^{\circ}=30^{\circ}$，

    ∴$CO = \frac{CE}{\cos 30^\circ} = \frac{\sqrt{3}}{\frac{\sqrt{3}}{2}} = 2$，

    故答案为：$2$'
