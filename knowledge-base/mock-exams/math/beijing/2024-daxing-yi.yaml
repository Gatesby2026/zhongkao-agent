  question: '在平面直角坐标系xOy中，函数$y=kx+b(k\neq0)$的图象经过点$A(1,3)$和$B(-1,-1)$，与过点$(-2,0)$且平行于y轴的直线交于点C．

    （1）求该函数的表达式及点C的坐标；

    （2）当$x<-2$时，对于x的每一个值，函数$y = nx (n \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值且小于$-2$，直接写出n的取值范围．'
  answer: （1）$y=2x+1$；$(-2, -3)$ （2）$1 \leq n \leq \frac{3}{2}$
  solution: '【小问1详解】

    解：∵函数$y=kx+b(k\neq0)$的图象经过点$A(1,3)$和$B(-1,-1)$，

    ∴将点$A(1,3)$和$B(-1,-1)$代入$y=kx+b(k\neq0)$中，

    $\begin{cases}

    k + b = 3 \\

    -k + b = -1

    \end{cases}$，解得：$\left\{ \begin{array}{l} k = 2 \\ b = 1 \end{array} \right.$，

    ∴该函数的表达式为：$y=2x+1$，

    ∵与过点$(-2,0)$且平行于y轴的直线交于点C，

    ∴将$x = -2$代入$y=2x+1$中，得$y=-3$，

    ∴$C(-2,-3)$；

    【小问2详解】

    解：∵当$x<-2$时，对于x的每一个值，函数$y = nx (n \neq 0)$的值大于函数$y=kx+b(k\neq0)$的值且小于$-2$，

    [图]，

    通过图象可知，当$y = nx (n \neq 0)$的函数值小于$-2$时，即将$H(-2,-2)$代入$y = nx (n \neq 0)$中，$n = 1$，

    当$y = nx (n \neq 0)$的函数值大于函数$y=kx+b(k\neq0)$的值将$C(-2,-3)$代入$y = nx (n \neq 0)$中，$n = \frac{3}{2}$，

    ∴n的取值范围为：$1 \leq n \leq \frac{3}{2}$．'
