    （2）随机抽取的这20块试验田每公顷产量的中位数为______．

    （3）下列推断合理的是______（填序号）；

    ①20块试验田的每公顷产量数据中，每公顷产量低于$7.50t$的试验田数量占试验田总数的$25\%$；

    ②3号试验田每公顷产量在20块试验田的每公顷产量数据中从高到低排第5名．

    （4）$1 \sim 10$号试验田使用的是甲种种子，11~20号试验田使用的是乙种种子，已知甲、乙两种种子的每公顷产量的平均数分别为$7.537\pi$及$7.545t$，若某种种子在各试验田每公顷产量的10个数据的方差越小，则认为这种种子的产量越稳定．据此推断：甲、乙两种种子中，这个地区比较适合种植的种子是______（填“甲”或“乙”）．'
  answer: （1）4（2）7.55 （3）①（4）乙
  solution: '【小问1详解】

    解：$m=20-3-2-6-5=4$

    【小问2详解】

    解：随机抽取的这20块试验田每公顷产量的中位数是$7.55\leq x<7.60$这一组的第1个和第2个数据，即：7.55和7.55，

    故中位数为：$\frac{7.55+7.55}{2}=7.55$，

    故答案为：7.55；

    【小问3详解】

    解：20块试验田的每公顷产量数据中，每公顷产量低于$7.50t$的试验田数量有5块，

    所以，占试验田总数的百分数为$\frac{5}{20}\times100=25\%$，故①正确；

    3号试验田每公顷产量在20块试验田的每公顷产量数据中从高到低排第4名，故②错误，

    故答案为：①

    【小问4详解】

    解：从20块试验田每公顷产量的统计图中可看出甲种种子每公顷产量波动大，乙种种子每公顷产量波动小，据此推断：甲、乙两种种子中，这个地区比较适合种植的种子是乙；

    故答案为：乙'
