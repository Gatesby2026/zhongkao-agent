  question: '如图，在$\triangle ABC$中，$\angle BAC = 90^\circ$，$AD \perp BC$于点D，设$BD = a$，$DC = b$，$AD = c$，给出下面三个结论：①$c^{2}=ab$；②$a+b\quad 2c$；③若$a > b$，则$a > c$．上述结论中，所有正确结论的序号是（）

    [图]

    A.①②B.①③C.②③D.①②③'
  answer: D
  solution: '解：∵$\angle BAC = 90^\circ$，$AD \perp BC$，

    ∴$\angle BAD+\angle CAD=90^{\circ}$，$\angle BAD + \angle ABD = 90^\circ$，$\angle BAD = \angle ADC = 90^\circ$，

    ∴$\angle CAD = \angle ABD$，

    ∴$\triangle ABD \sim \triangle CAD$，

    ∴$\frac{BD}{AD}=\frac{AD}{DC}$即：$\frac{a}{c} = \frac{c}{b}$，整理得：$c^{2}=ab$，故①正确，

    ∵$(a-b)^{2}=a^{2}+b^{2}-2ab$，即：$a^{2}+b^{2}=(a-b)^{2}+2ab$，

    ∴$(a+b)^{2}=a^{2}+b^{2}+2ab=(a-b)^{2}+4ab=(a-b)^{2}+4ac^{2}$，

    ∵$\left(a-b\right)^{2}0$，

    ∴$(a+b)^{2}-4a^{2}$，

    ∵$a > 0$、$b>0$、$c > 0$，

    ∴$a+b\quad 2c$，故②正确，

    ∵$a > b$，$b=\frac{c^{2}}{a}$，

    ∴$a>\frac{c^{2}}{a}$，

    ∵$a > 0$，

    ∴$a^{2}>c^{2}$，

    ∴$a > c$，故③正确，

    综上所述，①②③正确，

    故选：D．'
