    ∵$\angle DOF=\angle COE=\alpha$，

    ∴在$\triangle OET$中，$\angle COE+\angle OEF+\angle OTE=180^{\circ}$，

    ∴$\alpha + 45^{\circ} + \angle OTE = 180^{\circ}$，

    ∴$\angle OTE=135^{\circ}-\alpha'
