    ∴$OD = OC$，$OD\perp OC$，$\angle ODF=\angle OCE=\angle OCD=45^{\circ}$，

    ∴$\angle DOP+\angle FOC=90^\circ$，

    ∵四边形$OMPN$是正方形，

    ∴$ON = OM$，$\angle NOM = 90^\circ$，

    ∴$\angle COE+\angle FOC=90^{\circ}$，

    ∴$\angle DOF=\angle COE$，

    在$\triangle DOF$和$\triangle COE$中，

    $\angle DOF = \angle OCE \\

    OD = OC \\

    \angle DOF = \angle COE$，

    ∴$\triangle DOF\cong\triangle COE(ASA)$，

