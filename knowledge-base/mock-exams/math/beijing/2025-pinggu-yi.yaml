  question: '在平面直角坐标系xOy中，点$A(-a,\ y_1),B(m,\ y_2)$是抛物线$y=ax^{2}+2a^{2}x+c(a\neq 0)$上的两个不同点．

    （1）当$a = 1$时，有$y_{1}=y_{2}$，求m的值；

    （2）当$2<m<4$时，都有$y_{2}<y_{1}$，求a的取值范围．'
  answer: （1）$m = 3$ （2）$a\quad\frac{4}{3}$或$-2 \leq a < 0$
  solution: '【小问1详解】

    解：当$a = 1$时，$y = x^2 - 2x + c$，对称轴为直线$x=\frac{-2}{2\times1}=1$

    ∵$y_{1}=y_{2}$，

    ∴点$A(-a,\ y_1),B(m,\ y_2)$关于直线$x = 1$对称.

    ∴$\frac{-1+m}{2}=1$，

    ∵$m = 3$；

    【小问2详解】

    ∵点$A(-a,\ y_1),B(m,\ y_2)$是抛物线$y=ax^{2}-2a^{2}x+c(a\neq 0)$上的两个不同点．

    ∴$\psi_{c}=a^{4}+2a^{3}+c=3a^{2}+c$，$y_{3}=am^{2}-2a^{2}m+c$，

    ∵当$2<m<4$时，都有$y_{2}<y_{1}$

    ∴$am^{2}-2a^{2}m+c<3a^{2}+c$即$am^{2}-2a^{3}m<3a^{3}$在$2<m<4$时恒成立，

    当$a > 0$时，不等式化简为$m^{2}-2am-3a^{2}<0$，

    则$(m-3a)(m+a)<0$，

    解得$-a < m < 3a$，

    ∴$\left\{\begin{array}{l}-a \leq 2 \\ 3a \quad 4\end{array}\right.$，解得$a\quad\frac{4}{3}$，

    当$a < 0$时，不等式化简为$m^{2}-2am-3a^{2}>0$，

    解得$m < 3a$或$m > -a$，

    ∴$-a \leq 2$，解得$a^{-2}$，

    ∴$-2 \leq a < 0$，

    综上可知，a的取值范围是$a\quad\frac{4}{3}$或$-2 \leq a < 0$．'
