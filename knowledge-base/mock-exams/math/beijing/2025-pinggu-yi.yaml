  question: '在菱形$ABCD$中，$AD=5, AE \perp BC$于点$E, EC = 2$，连接BD交AE于点F，则AF的长为___________．

    [图]'
  answer: $\frac{5}{2}$
  solution: '解：∵在菱$ABCD$中，$AD \parallel BC$，且$AD = BC = AB = 5$，$EC = 2$，$AE \perp BC$，

    $\because \triangle BEF \sim \triangle DAF,\ BE = 5 - 2 = 3,\ AE = \sqrt{AB^{2} - BE^{2}} = 4$，

    $\therefore \frac{EF}{AF}=\frac{BE}{DA}=\frac{3}{5}$，

    $\therefore AF=\frac{5}{3}EF=\frac{5}{8}AE=\frac{5}{8}\times 4=\frac{5}{2}$，

    故答案为：$\frac{5}{2}$．'
