  question: '清明假期，明明和妹妹都参加了某网络平台发起的“阅读悦听”活动，该平台为了鼓励孩子们阅读，推出两种打卡领取听书时长的奖励方式：

    方式一：每天打卡可领取相同分钟的听书时长；

    方式二：第一天打卡可领取一些分钟的听书时长，之后每天打卡领取的听书时长比前一天增加50%．

    明明选择了方式一，妹妹选择了方式二，他们发现：打卡第2天时，明明和妹妹打卡领取的听书时长相同，打卡第3天时，妹妹打卡领取的听书时长比明明打卡领取的听书时长多15分钟，求第一天明明和妹妹领取的时长分别为多少分钟？'
  answer: 第一天明明和妹妹领取的时长分别为$7.5$分钟和$6$分钟．
  solution: '解：设第一天明明和妹妹领取的时长分别为x分钟和y分钟，

    则$\left\{

    \begin{array}{l}

    2x = y + (1 + 50\%)y \\

    y + (1 + 50\%)y + \left[y + (1 + 50\%)y\right](1 + 50\%) - 3x = 15

    \end{array}

    \right.$，

    即$\begin{aligned}

    2x &= 2.5y \\

    6.25y - 3x &= 15

    \end{aligned}$，

    解得$\left\{ \begin{array} { l } { x = 7 . 5 } \\ { y = - 6 } \end{array} \right.$，

    答：第一天明明和妹妹领取的时长分别为$7.5$分钟和$6$分钟．'
