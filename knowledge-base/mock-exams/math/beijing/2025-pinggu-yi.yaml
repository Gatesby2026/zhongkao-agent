  question: '学校的科技社团承担了该校科技节的展示任务，该任务共包含A，B，C，D，E五个节目，有些节目一个人就可以独立完成，有些节目需要几个人共同合作才能完成，考虑到展示人员的身体状况及展示器材的准备需要，每个人在展示完成后至少要休息一次，已知节目名称和需要合作的人数如下表所示：

    若该社团想圆满的完成此次展示任务，最少需要___________个人；如果用最少的人数完成此次任务且A节目最先展示，则符合条件的展示顺序共有___________种不同的情况．'
  answer: ①. 6    ②. 2
  solution: '解：∵每个人在展示完成后至少要休息一次，

    ∴将人数多的节目中间用人数少的隔开可以使总人数减小，

    ∴相邻两节目的人数之和越小，总人数越少，

    ∵节目所需人数最多为5人，

    ∴总人数一定要大于5，

    ∴人数和最少为或，即最少需要6人；

    例如：让节目最先展示，然后接人数最少的节目，此时节目的人进行休息，然后再接节目，中的4个人可以上节目，此时节目中剩余1人，节目的人休息，再接节目，正好用到之前剩余的2人，此时节目的4人休息，再接节目，节目中上3人即可，此时用人最少，即组和组人数之和为6；

    ∵用最少的人数完成此次任务且A节目最先展示，故A节目后面必须接节目，

    ∴后续排列的可能性为：，相邻人数和分别为，满足题意；或，相邻和依次为6、4、5、6，符合要求；

    其它情况均不符合要求；

    故符合条件的展示顺序共有2种不同的情况；

    故答案为：6，2．'
