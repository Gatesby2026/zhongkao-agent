  question: '矩形$ABCD$中，点E是DC上一点，连接$AE、BE$，过点A作BE的平行线，过点B作AE的平行线，两条平行线交于点$F_{1} \angle DAE - \angle BEC$．

    [图]

    （1）求证：四边形$AFBE$是矩形；

    （2）连接EF，若$\angle DAE=30^\circ$，$DE = 1$，求EF的长．'
  answer: （1）见详解（2）4
  solution: '【小问1详解】

    解：∵过点A作BE的平行线，过点B作AE的平行线，两条平行线交于点$F,$．

    ∴$AF \parallel BE$，$BF \parallel AE$，

    ∴四边形$AFBE$是平行四边形，

    ∵四边形$ABCD$是矩形，

    ∴$\angle D=90^\circ$，

    ∵$\angle DAE = \angle BEC$，

    ∴$\angle AED + \angle BEC = \angle AED + \angle DAE = 90^{\circ}$，

    ∴$\angle AEB=180^{\circ}-(\angle AED+\angle BEC)=90^{\circ}$，

    ∴四边形$AFBE$是矩形．

    【小问2详解】

    解：连接EF，

    [图]

    ∵$\angle DAE=30^\circ$，$\angle BAD=\angle AEB=\angle D=90^{\circ}$$, DE = 1$，

    ∴$\angle ABE = 90^\circ - \angle BAE = \angle DAE = 30^\circ$，

    ∵$AE = 2DE = 2,$

    ∴$AB = 2AE = 4,$

    ∵四边形$AFBE$是矩形，

    ∴$EF = AB = 4$，

    ∴EF的长为4'
