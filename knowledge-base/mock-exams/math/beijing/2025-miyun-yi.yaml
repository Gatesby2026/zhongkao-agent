  question: '甲、乙、丙三人进行乒乓球比赛赛前训练，每局两人进行比赛，第三个人做裁判，每一局都要分出胜负，胜方和原来的裁判进行新一局的比赛，输方转做裁判，依次进行．半天训练结束时，发现A共当裁判9局．

