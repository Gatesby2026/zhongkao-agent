    ∴$\angle AGO = \angle LEGO$，

    ∵$\angle A G O + \angle E G O = 180^{\circ}$，

    ∴$\angle AGO = 90^\circ$，

    ∴$CD \perp AE$，

    ∴$\overline{AC}=\overline{EC}$,

    ∴$\angle ADC = \angle EDC$，

    又$\angle AOC=2\angle ADC$，

    ∴$\angle AOC=2\angle CDE$；

    【小问2详解】

    解：由（1）知$CD \perp AE$，

