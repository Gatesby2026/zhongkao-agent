    ∵DH是$\odot\odot$的切线，CD是$\odot\odot$的直径，

    ∴$CD \perp DH$，

    又$CD \perp AE$，

    ∴$AE \parallel DH$，

    ∴$\triangle DOH \sim \triangle GOA$，$\triangle DHF \sim \triangle EAF$，

    ∴$\frac{DH}{GA} = \frac{OH}{OA}$，$\frac{DH}{EA}=\frac{FH}{FA}$，

    即$\frac{DH}{\sqrt{2}}=\frac{5k+BH}{5k}$，$\frac{DH}{2\sqrt{2}}=\frac{2k+BH}{8k}$'
