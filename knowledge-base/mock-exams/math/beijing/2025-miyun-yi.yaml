  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图像由函数$y=x$的图像平移得到，且经过点$(1,3)$．

    （1）求k，b的值；

    （2）当$x<1$时，对于x的每一个值，函数$\hat{y}=mx(m\neq0)$的值大于函数$y = 2x - \frac{3}{2}$的值且小于函数$y=kx+b$的值，直接写出m的取值范围．'
  answer: （1）$k = 1$，$b = 2$ （2）$\frac{1}{2} \leq m \leq 3$
  solution: '【小问1详解】

    解：∵函数$y=kx+b\,(k\neq0)$的图像由函数$y=x$的图像平移得到

    ∴$k = 1$，

    又∵平移后的直线经过点$(1,3)$，

    ∴将点$(1,3)$代入直线$y=x+b$，

    可得$3=1+b$，解得$b = 2$；

    【小问2详解】

    由题意，结合（1）可得$y=kx+b$为$y=x+2$，在同一坐标系中画出$y=x+2$，$y = 2x - \frac{3}{2}$的图像，如下图所示，

    [图]

    对于直线$y=x+2$，令$x = 1$，可得$y=3$，即$C(1,3)$，

    对于直线$y = 2x - \frac{3}{2}$，令$x = 1$，可得$y = \frac{1}{2}$，即$D\left(1,\frac{1}{2}\right)$，

    当$x<1$时，对于x的每一个值，函数$y = mx$的值大于函数$y = 2x - \frac{3}{2}$的值，

    即有$m-\frac{3}{2}=\frac{1}{2}$，

    当$x<1$时，对于x的每一个值，函数$y = mx$的值小于函数$y=x+2$的值，

    即有$m \leq 1 + 2 = 3$，

    ∴结合图像可知，m的取值范围为$\frac{1}{2} \leq m \leq 3$．'
