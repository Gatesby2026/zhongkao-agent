  question: '如图，在菱形$ABCD$中，对角线$AC、BD$相交于点O，点E为CD的中点，连接OE并延长至点F，使$OE = EF$，连接$CF、DF$．

    [图]

    （1）求证：四边形$OCFD$是矩形；

    （2）若$BD = 16$，菱形$ABCD$的周长为40，求$\sin \angle DEF$的值．'
  answer: （1）见详解（2）$\frac{24}{25}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$为菱形，

    ∴$AC \perp BD$，即$\angle COD=90^\circ$，

    ∵点E为CD的中点，

    ∴$ED = EC$，

    又∵$OE = EF$，

    ∴四边形$OCFD$为平行四边形，

    ∵$\angle COD=90^\circ$，

    ∴四边形$OCFD$是矩形；

    【小问2详解】

    如下图，过点D作$DH \perp OF$于点H，

    [图]

    ∵四边形$ABCD$为菱形，且周长为40，

    ∴$AD = CD = BC = AB - \frac{40}{4} = 10$，

    ∵$BD = 16$，

    ∴$OD=\frac{1}{2}BD=8$，

    ∴在$\mathrm{Rt}\triangle OCD$中，可有$OC = \sqrt{CD^{2} - OD^{2}} = \sqrt{10^{2} - 8^{2}} = 6$，

    ∵四边形$OCFD$是矩形，

    ∴$\angle ODF=90^{\circ}$，$DF = OC = 6$，$OF = CD = 10$，$DE=\frac{1}{2}CD=5$，

    ∵$S_{\triangle AOM} = \frac{1}{2} OB \cdot DF - \frac{1}{2} OF \cdot DH$，

    ∴$\frac{1}{2}\times8\times6=\frac{1}{2}\times10DH$，解得$DH = 4.8$，

    ∴在$\mathrm{Rt}\triangle DEH$中，可有$\sin\angle DEF=\frac{DH}{DE}=\frac{4.8}{5}=\frac{24}{25}$．'
