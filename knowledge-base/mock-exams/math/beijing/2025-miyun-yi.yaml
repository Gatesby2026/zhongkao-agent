    故$2a^{2}+b=0$即$b = -2a^2$，

    故抛物线的对称轴为：直线$x = \frac{b}{2a} - \frac{-2a^2}{2a} = a$．

    【小问2详解】

    解：根据题意，得$x_{1}=2a-1$，$1-a<x_{2}<4-a$，

    ∴$\left| -a+2a-1 \right| < x_1 + x_2 < 4-a+2a-1$

    解得$a < x_1 + x_2 < a + 3$，

    ∴$\frac{a}{x}=\frac{x+3}{2}=\frac{a+3}{2}$，

    ∵$A(x_1,y_1)$，$B\left(x_{2},y_{2}\right)$是抛物线$y=ax^{2}+bx+1$上两点，且对称轴为直线$x = a$，

    ∴$x_{1}=ax_{2}^{2}+bx+c$，$y_{2}=a x_{2}^{2}+b x_{2}+c$，

    ∴$y_{1}-y_{2}=ax_{1}^{2}+bx_{1}+c-\left(ax_{2}^{2}+bx_{2}+c\right)$

    $=a(x_{i}^{2}+x_{j}^{2})+b(x_{i}-x_{j})$

    $=a(x_{1}-x_{2})(x_{1}+x_{2})+b(x_{1}-x_{2})$

    $=(x_{1}-x_{2})[a(x_{1}+x_{2})+b]$

    $=(x_{1}-x_{2})\left[a(x_{1}+x_{2})-2a\right]$

    $=(a(x_{1}-x_{2}))(x_{1}+x_{2}-2a)$，

    ∵$y_{1}<y_{2}$，

    ∴$a(x_{1}-x_{2})(x_{1}+x_{2}-2a)<0$，

    当$a>0$，且$x_{1}<x'
