  question: 某校组织科技节活动，计划投入4000元购进A、B两种型号展板共100块，其中A型展板至少50块．已知购进2块A型展板和3块B型展板共需210元，购进3块A型展板和1块B型展板共需140元．为了满足基本需求，请判断该校计划投入的资金是否够用，并说明理由．
  answer: 该校计划投入的资金够用，理由见解析
  solution: '解：该校计划投入$[公式]$资金够用，理由如下：

    设购进1块A型展板需要x元，1块B型展板需要y元，

    由题意得，$\begin{cases}

    2x + 3y = 210 \\

    3x + y = 140

    \end{cases}$，

    解得：$\left\{

    \begin{array}{l}

    x = 30 \\

    y = 50

    \end{array}

    \right.$，

    设购进A型展板m块，则购进B型展板$(100-m)$块，

    由题意得，$30m+50(100-m)\leq4000$，

    解得：$m\ 50$，

