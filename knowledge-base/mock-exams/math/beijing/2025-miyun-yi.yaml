  question: '如图，等边三角形$V_{ABC}$的边长为a，分别以A，B，C为圆心，以AB长为半径作弧，得到三段相等的弧$\overline{AB}$，$\widehat{BC}$，$\overline{AC}$，将$\overline{AB}$，$\widehat{BC}$，$\overline{AC}$组成的图形称为“洛尔三角形”．设$V_{ABC}$的中心为O．下列说法中：

    ①“洛尔三角形”上任意一点到O的距离相等；

    ②将“洛尔三角形”绕点O按逆时针方向旋转$120^\circ$后与原“洛尔三角形”重合；

    ③“洛尔三角形”的周长等于以A为圆心，AB长为半径的半圆的周长；

    ④若P是“洛尔三角形”上一个定点，Q是“洛尔三角形”上一个动点，则$\overline{PQ}$的最大值是a．

    所有正确说法的序号是（）

    [图]

    A.①②③B.①②④C.②③④D.①②③④'
  answer: C
  solution: '解：∵$\overline{AB}$是以点C为圆心，$V_{ABC}$的中心为O，

    ∴点O为AB的垂直平分线上的点与点C为不同的点，

    ∴$\overline{AB}$上的点到点O的距离不相等，故①错误；

    ∵$\overline{AB}$绕点O按逆时针方向旋转$120^\circ$后与$\widehat{BC}$重合，

    $\widehat{BC}$绕点O按逆时针方向旋转$120^\circ$后与$\overline{AC}$重合，

    ∴将“洛尔三角形”绕点O按逆时针方向旋转$120^\circ$后与原“洛尔三角形”重合，故②正确；

    ∵“洛尔三角形”的周长等于$60\pi\times AB\times3=AB\pi\times180$，AB长为半径的半圆的周长为$\frac{1}{2} \times 2\pi \times AB = AB\pi$，

    ∴“洛尔三角形”的周长等于以A为圆心，AB长为半径的半圆的周长，故③正确；

    ∵$\overline{AB}$，$\widehat{BC}$，$\overline{AC}$都是以a为半径的圆弧，P是“洛尔三角形”上一个定点，Q是“洛尔三角形”上一个动点，

    ∴“洛尔三角形”任一边的圆心到这一边的最远距离为a，

    ∴$\overline{PQ}$的最大值是a，故④正确．

    综上所述，正确说法的序号是②③④．

    故选：C．'
