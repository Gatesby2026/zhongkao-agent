  question: '如图，矩形$ABCD$中，$DE \perp AC$垂足为E，延长DE交AB于F，$AE = 2$，$DE = 4$，则CD的长为_______．

    [图]'
  answer: $4\sqrt{5}$
  solution: '解：∵$DE \perp AC$，∴$\angle DEA = 90^\circ$，

    ∵$AE = 2$，$DE = 4$，

    ∴$AD=\sqrt{AE^{2}+DE^{2}}=\sqrt{2^{2}+4^{2}}=2\sqrt{5}$，

    ∵矩形$ABCD$，

    ∴$\angle ADC = 90^\circ$，

    ∵$\angle AED = \angle ADC = 90^\circ$，$\angle DAE = \angle CAD$，

    ∴$\triangle DAE \sim \triangle CAD$，

    ∴$\frac{CD}{DE}=\frac{AD}{AE}$，即$\frac{CD}{4}=\frac{2\sqrt{5}}{2}$，

    解得$CD = 4\sqrt{5}$，

    故答案为：$4\sqrt{5}$．'
