  question: '在平面直角坐标系xOy中，已知$A(x_1,y_1)$，$B\left(x_{2},y_{2}\right)$是抛物线$y=ax^{2}+bx+1$上两点，且抛物线经过$(2a,1)$．

    （1）求抛物线的对称轴；

