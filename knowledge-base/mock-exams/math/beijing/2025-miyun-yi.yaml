  question: 方程$\frac{1}{x-3}+\frac{2}{x}=0$的解为________．
  answer: $x=2$
  solution: '解：$\frac{1}{x-3}+\frac{2}{x}=0$，

    等号两边同时乘以$x(x-3)$，得$x + 2(x - 3) = 0$，

    去括号，得$x+2x-6=0$，

    移项、合并同类项，得$3x=6$，

    系数化为1，得$x=2$，

    经检验，$x=2$是该分式方程的解，

    ∴方程$\frac{1}{x-3}+\frac{2}{x}=0$的解为$x=2$．

    故答案为：$x=2$．'
