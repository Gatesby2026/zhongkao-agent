  question: 已知$a-b-2=0$，求代数式$\left(\frac{b^{2}-2ab}{a}+a\right)\div\frac{2a-2b}{a}$的值．
  answer: '1'
  solution: '解：原式$=\left(\frac{b^{2}-2ab}{a}+\frac{a^{2}}{a}\right)\times\frac{a}{2a-2b}$

    $= \frac{a^{2} - 2ab + b^{2}}{a} \times \frac{a}{2(a - b)}$

    $= \frac{(a + b)^{2}}{a} \times \frac{a}{2(a - b)}$

    $=\frac{a-b}{2}$，

    ∵$a-b-2=0$，

    ∴$a-b=2$，

    ∴原式$= \frac{2}{2} = 1$．'
