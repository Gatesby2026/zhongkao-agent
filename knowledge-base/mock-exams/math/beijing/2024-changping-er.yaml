  question: '实数a，b在数轴上的对应点的位置如图所示，则下列结论中正确的是（）

    $\begin{tikzpicture}

    \draw[->] (-4.5,0) -- (4.5,0);

    \foreach \x in {-4,-3,-2,-1,0,1,2,3,4}

    \draw (\x cm,3pt) -- (\x cm,-3pt) node[anchor=north] {\x};

    \draw[fill=black] (-2.8,0) circle (2pt) node[above] {$a$};

    \draw[fill=black] (3.2,0) circle (2pt) node[above] {$b$};

    \end{tikzpicture}$

    A.$b = \sqrt{7}$

    B.$a < -b$

    C.$\left| b \right| < -a$

    D.$a+b>0$'
  answer: D
  solution: '解：由数轴可知，$-3 < a < -2$，$b>3$，

    A、$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$$\sqrt{7}<\sqrt{9}=3$，$\therefore b > \sqrt{7}$，故本选项不符合题意；

    B、$\because -3 < a < -2$，$b>3$，$\therefore -b < -3$，$\therefore a > -b$，故本选项不符合题意；

    C、$\because -3 < a < -2$，$b>3$，$2 < -a < 3$，$|b|>3$，$\therefore |b| > -a$，故本选项不符合题意；

    D、$\because -3 < a < -2$，$b>3$，$\therefore a+b>0$，故本选项符合题意；

    故选：D．'
