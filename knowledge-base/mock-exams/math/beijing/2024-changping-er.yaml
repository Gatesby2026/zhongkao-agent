  question: '通常把脏衣服用洗衣液清洗后会进行拧干，但由于不可能拧净衣服上的全部污水，所以还需要用清水进行多次漂洗，不断降低衣服中污水的含量．如：把一件存留1斤污水的衣服用10斤清水漂洗后，拧干到仍然存留1斤污水，则漂洗后衣服中存有的污物是原来的$\frac{1}{11}$．

    某小组决定使用20斤清水，对某件存留1斤污水衣服分别进行漂洗，且每次拧干后的衣服上都存留约1斤的污水．

    （1）该小组设计了如下两个方案，请你完善方案内容：

    方案一：采用一次漂洗的方式.

    将20斤清水一次用掉，漂洗后该衣服中存有的污物是原来的__________；

    方案二：采用两次漂洗的方式.

    若第一次用14斤清水，第二次用6斤清水，漂洗后该衣服中存有的污物是原来的__________；若在第一次用$x(0<x<20)$斤清水，第二次用$(20-x)$斤清水，漂洗后该衣服中存有的污物是原来的__________（用含有x的代数式表示）；

    通过计算分析，方案__________（“一”或“二”）的漂洗效果更好.

    （2）若采用方案二，第一次用__________斤清水，漂洗效果最好，二次漂洗后该衣服中存有的污物是原来的__________．'
  answer: （1）$\frac{1}{21}$；$\frac{1}{105}$；$\frac{1}{x^{2}-20x-21}$；二 （2）10；$\frac{1}{121}$
  solution: '【小问1详解】

    解：方案一：采用一次漂洗的方式．

    将20斤清水一次用掉，漂洗后该衣服中存有的污物是原来的$\frac{1}{20+1}=\frac{1}{21}$；

    方案二：采用两次漂洗的方式．

    若第一次用14斤清水，第二次用6斤清水，漂洗后该衣服中存有的污物是原来的$\frac{1}{14} + \frac{1}{6} + \frac{1}{105}$，

    若在第一次用$x(0<x<20)$斤清水，第二次用$(20 - x)$斤清水，漂洗后该衣服中存有的污物是原来的$\frac{x}{x+1}-\frac{20-x}{20-x+1}=\frac{(x+1)(21-x)}{(x+1)(20-x)}-x^{2}-20x-21$

    $\frac{1}{21}-\frac{5}{105}>\frac{1}{105}$，方案二效果更好；

    故答案为：$\frac{1}{21}$，$\frac{1}{105}$，$\frac{1}{x^{2}-20x-21}$；二；

    【小问2详解】

    解：$x(20-x)=-(x^{2}-20x)=-(x-10)^{2}+100$，

    当$x = 10$时有最大值，分母越大，分数值最小，漂洗效果最好，

    第一次用10斤清水，漂洗效果最好，

    二次漂洗后该衣服中存有$[公式]$污物是原来的$10+1\times10+1=121$

    故答案为：二，$\frac{1}{121}$．'
