  question: '如图，AB为半圆O的直径，C，D是直径AB上两点，且$AC = BD$，过点D作AB的垂线交半圆于点E，$CD = 2DE$．设$AD = a$，$AC = b$，$DE = c$，给出下面三个结论：①$a-b=2c$；②$\frac{c}{a}=\frac{b}{c}$；③$a+b=2\sqrt{2}c$．所有正确结论的序号是（）

    [图]

    A.①②

    B.①③

    C.②③

    D.①②③'
  answer: D
  solution: '解：由题意知，$BD = AC = b$，$CD=AD-AC=a-b$，

    ∵$CD = 2DE$，

    ∴$a-b=2c$，①正确，故符合要求；

    如图，连接$AE, BE$，

    [图]

    ∵AB为半圆O的直径，

    ∴$\angle AEB = 90^\circ$，

    ∵$\angle AED + \angle BED = 90^\circ = \angle AED + \angle EAD$，

    ∴$\angle BED = \angle EAD$，

    又∵$\angle BDE=90^{\circ}=\angle EDA$，

    ∴$\triangle BED \sim \triangle EAD$，

    ∴$\frac{DE}{AD} = \frac{BD}{DE}$，即$\frac{c}{a}=\frac{b}{c}$，②正确，故符合要求；

    ∴$ab = c^2$，

    ∴$(a+b)^{2}=(a-b)^{2}+4ab=(2c^{2})+4c^{2}=8c^{2}$，

    ∴$a+b=2\sqrt{2}c$，③正确，故不符合要求；

    故选：D．'
