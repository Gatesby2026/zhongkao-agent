  question: '光线在不同介质中的传播速度是不同的，因此光线从水中射向空气时，要发生折射．由于折射率相同，所以在水中平行的光线，在空气中也是平行的．如图，$\angle1=45^{\circ},\angle2=120^{\circ}$，则$\angle3+\angle4=$（）

    [图]

    A.$165^\circ$

    B.$155^\circ$

    C.$105^\circ$

    D.$90^\circ$'
  answer: C
  solution: '解：如图所示，$AB \parallel CD$，光线在空气中也平行，

    [图]

    $\angle 1 = \angle 3$，$\angle2+\angle4=180^\circ$.

    $\angle1=45^{\circ},\angle2=120^{\circ}$，

    $\angle3=45^\circ$，$\angle 4=180^{\circ}-120^{\circ}=60^{\circ}$.

    $\angle 3+\angle 4=45^{\circ}+60^{\circ}=105^{\circ}$.

    故选：C.'
