  question: '在平面直角坐标系xOy中，一次函数y＝kx＋b（k≠0）的图象是由函数y＝2x的图象平移得到，且经过点（1，3）．

    （1）求这个一次函数的表达式；

    （2）当x＞1时，对于x的每一个值，函数y＝mx（m≠0）的值大于一次函数y＝kx＋b（k≠0）的值，直接写出m的取值范围．'
  answer: （1）y=2x+1；（2）m≥3
  solution: '解：（1）∵一次函数y=kx+b（k≠0）的图象由函数y=2x的图象平移得到，

    ∴k=2．

    ∵一次函数y=2x+b的图象过点（1，3），

    ∴3=2×1+b．

    ∴b=1．

    ∴这个一次函数的表达式为y=2x+1．

    （2）把点（1，3）代入y=mx，求得m=3，

    ∵当x＞1时，对于x的每一个值，函数y=mx（m≠0）的值大于一次函数y=2x+1的值，

    ∴m≥3．'
