  question: '在不透明的袋子里有三个除颜色外其它都相同的小球，两个红球，一个黄球，从中随机同时取出两个小球，其中取到一个红球一个黄球的概率为（）

    A.$\frac{2}{3}$

    B.$\frac{5}{6}$

    C.$\frac{1}{2}$

    D.1'
  answer: A
  solution: '解：列表把所有等可能结果表示出来，两个红球分别表示为红1，红2，

    |  | 红 1 | 红 2 | 黄 |

    | --- | --- | --- | --- |

    | 红 1 | -------- | 红 1 ，红 2 | 红 1 ，黄 |

    | 红 2 | 红 2 ，红 1 | ---------- | 红 2 ，黄 |

    | 黄 | 黄，红 1 | 黄，红 2 | --------- |

    共有6种等可能结果，其中一个红球一个黄球的结果有4种，

    ∴取到一个红球一个黄球的概率为$\frac{4}{6}=\frac{2}{3}$，

    故选：A．'
