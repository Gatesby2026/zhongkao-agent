  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+bx+c(a>0)$的对称轴为$x = t$，点$A\left(\frac{1}{2}t,m\right)$，$B(2t,n)$，$C(x_0,y_0)$在抛物线上．

    （1）当$t=2$时，直接写出m与n的大小关系；

    （2）若对于$6<x_{0}<7$，都有$m < y_0 < n$，求t的取值范围．'
  answer: （1）$m < n$ （2）$t\ 14$或$\frac{7}{2}\leq t\leq 4$
  solution: '【小问1详解】

    解：∵$y=ax^{2}+bx+c(a>0)$，

    ∴图象开口向上，则抛物线上的点离对称轴越远，函数值越大，

    当$t=2$时，对称轴为$x=2$，$A(1,m)$，$B(4,n)$，

    ∵$4-2>2-1$，

    ∴$m < n$；

    【小问2详解】

    解：当$t<0$时，如图1，

    [图]

    ∴$A\left(\frac{1}{2}t,m\right)$在NP上，$B(2t,n)$在MN上，$C(x_0,y_0)$在$\overline{PQ}$上，

    ∵对于$6<x_{0}<7$，都有$m < y_0 < n$，

    ∴$t-2t\quad7-t$且$6-t-\frac{1}{2}t-t$，此时无解；

    当$t > 0$时，如图2，

    [图]

    ∴$A\left(\frac{1}{2}t,m\right)$在MN上，$B(2t,n)$在NP上，

    当$C(x_0,y_0)$在MN上时，

    ∵对于$6<x_{0}<7$，都有$m < y_0 < n$，

    ∴$t-7\quad t-\frac{1}{2}t$且$t-6\leq 2t-t$，

    解得，$t\ 14$；

    当$C(x_0,y_0)$在NP上时，

    ∵对于$6<x_{0}<7$，都有$m < y_0 < n$，

    ∴$6-t-\frac{1}{2}t$且$7-t\leq2t-t$，

    解得，$\frac{7}{2}\leq t\leq 4$；

    综上所述，t的取值范围为$t\ 14$或$\frac{7}{2}\leq t\leq 4$．'
