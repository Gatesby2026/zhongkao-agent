  question: '如图，点A，B，C，D在一条直线上，$AB = BC = CD$，$AE = EC$，四边形$ECDF$是平行四边形．

    [图]

    （1）求证：四边形$EBCF$是矩形；

    （2）若$AD=12$，$\cos A = \frac{4}{5}$，求BF的长．'
  answer: （1）见解析（2）5
  solution: '【小问1详解】

    证明：∵四边形$ECDF$是平行四边形，

    ∴$EF \parallel CD,\ EF = CD$，

    ∵$BC = CD$，

    ∴$BC = EF$，

    ∵$BC \parallel EF$，

    ∴四边形$EBCF$是平行四边形，

    ∵$AE=EC,\ AB=BC$，

    ∴$EB \perp BC$，

    ∴$\angle EBC = 90^\circ$，

    ∴四边形$EBCF$是矩形；

    【小问2详解】

    解：∵$AD=12$，$AB = BC = CD$，

    ∴$AB = 4$，

    在$Rt\triangle ABE$中，$\angle ABE = 90^\circ$，$\cos A = \frac{4}{5}$，

    ∴$\frac{AB}{AE}=\frac{4}{5}$，

    ∴$AE = 5$，

    ∵四边形$EBCF$是矩形，

    ∴$BE=EC=AE=5$．'
