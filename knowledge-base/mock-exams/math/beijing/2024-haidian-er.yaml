  question: '在$\triangle ABC$中，D为边AB的中点，E为边AC上一点，连接DE．给出下面三个命题：

    ①若$AE = EC$，则$DE=\frac{1}{2}BC$；

    ②若$DE=\frac{1}{2}BC$，则$DE \parallel BC$；

    ③若$DE \parallel BC$，则$AE = EC$．

    上述命题中，所有真命题的序号是__________．'
  answer: ①③##③①
  solution: '解：∵D是AB的中点，

    ∴$AD = DB$，

    命题①，若$AE = EC$，则点E是AC的中点

    ∴$AE = EC,\ DE = \frac{1}{2}BC$，故命题①真命题；

    命题②，若$DE=\frac{1}{2}BC$，

    ∴$\frac{DE}{BC}=\frac{1}{2}$，$\frac{AD}{AB}=\frac{1}{2}$，

    当$\angle ADE = \angle B$时，$\triangle ADE \sim \triangle ABC$，可得$DE \parallel BC$，故命题②假命题；

    命题③，若$DE \parallel BC$，

    ∴$\angle ADE=\angle B,\ \angle AED=\angle C$，

    ∴$\triangle ADE \sim \triangle ABC$，

    ∴$\frac{AD}{AB}=\frac{AE}{AC}=\frac{1}{2}$，

    ∴点E为AC中点，则$AE = EC$，故命题③真命题；

    综上所述，真命题的序号为①③，

    故答案为：①③．'
