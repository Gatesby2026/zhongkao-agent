  question: 我国古代著作《管子·地员篇》中介绍了一种用数学运算获得“宫商角徵羽”五音的方法．研究发现，当琴弦的长度比满足一定关系时，就可以弹奏出不同的乐音．例如，三根弦按长度从长到短排列分别奏出乐音“$do, mi, so$”，需满足相邻弦长的倒数差相等．若最长弦为$15$个单位长，最短弦为$10$个单位长，求中间弦的长度．
  answer: $12$
  solution: '解：根据相邻弦长的倒数差相等，设中间弦的长度为x，

