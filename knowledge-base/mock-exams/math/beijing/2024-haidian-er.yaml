  question: '生活垃圾水解法是一种科学处理生活垃圾的技术．有研究表明，在生活垃圾水解过程中添加一些微生物菌剂能够加快原料的水解．某小组为研究微生物菌剂添加量对某类生活垃圾水解率的影响，设置了六组不同的菌剂添加量，分别为$0\%$，$2\%$，$4\%$，$6\%$，$8\%$，$10\%$，每隔$12h$测定一次水解率，部分实验结果如下：

    a．不同菌剂添加量的生活垃圾，在水解$48h$时，测得的实验数据如下图所示：

    [图]

    为提高这类生活垃圾在水解$48h$时的水解率，在这六组不同的菌剂添加量中，最佳添加量为__________$\%$；

    b．当菌剂添加量为$p\%$时，生活垃圾水解率随时间变化的部分实验数据记录如下：

    时间$t(h)$

    0

    12

    24

    36

    48

    60

    72

    84

    96

    108

    120

    水解率$y(\%)$

    0

    $28.0$

    $35.1$

    $39.4$

    $42.5$

    $44.9$

    $46.8$

    $48.5$

    $50.0$

    $51.2$

    $52.3$

    通过分析表格中的数据，发现当菌剂添加量为$p\%$时，可以用函数刻画生活垃圾水解率y和时间t之间的关系，在平面直角坐标系中画出此函数的图象．结合实验数据，利用所画的函数图象可以推断，当水解$132h$时，生活垃圾水解率__________超过$54\%$（填“能”或“不能”）．

    [图]

    根据以上实验数据和结果，解决下列问题：

    （1）直接写出p$[公式]$值；

    （2）当菌剂添加量为$6\%$时，生活垃圾水解率达到$50\%$所需的时间为$t_{0}$小时，当菌剂添加量为$p\%$时，生活垃圾水解$\left(t_{0}+48\right)$小时的水解率__________$50\%$（填“大于”“小于”或“等于”）．'
  answer: $a:6\%$，$b:$作图见详解，不能，（1）$p = 4$，（2）等于
  solution: '解：a：根据水解率的大小可得，菌剂添加量为$6\%$时最佳，

    故答案为：$6\%$；

    b：根据表格信息，描点，作函数图像得，

    [图]

    时间的变化情况为：每次增加量为$12$小时；水解率的变化情况：$35.1-28=7.1$，$39.4-35.1=4.3$，$42.5-39.4=3.1$，$44.9-42.5=2.4$，$46.8-44.9=1.9$，$48.5-46.8=1.7$，$50.0-48.5=1.5$，$51.2-50=1.2$，$52.3-51.2=1.1$，

    ∴随着时间的增加，水解率的增加量逐渐减小，

    ∴当水解时间为$132h$时，生活垃圾水解率不能超过$54\%$，

    故答案为：不能；

    （1）根据表格信息可知，时间为$48h$时，水解率为$42.5\%$，

    ∴$p\%=4\%$，即$p = 4$；

    （2）当菌剂添加量为$6\%$时，生活垃圾水解率达到$50\%$所需的时间为$t_{0}$小时，

    ∴$t_{0}=48$，

    ∴当菌剂添加量为$p\%=4\%$时，水解$(i_{n}+48)=96$小时的水解率为$50\%$，即等于$50\%$，

    故答案为：等于．'
