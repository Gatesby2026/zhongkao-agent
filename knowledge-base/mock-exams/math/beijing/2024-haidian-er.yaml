  question: 已知$m^{2}-n^{2}-3=0$，求代数式$(m+n)^{2}-2m(m+n)$的值．
  answer: '3'
  solution: '解：$m^{2}-n^{2}-3=0$，

    即$m^{2}-n^{2}=3$，

