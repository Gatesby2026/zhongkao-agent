  question: '一本图鉴中的照片由1开始连续编号，由于装订线脱落，照片散落一地．小云想利用统计学知识估计照片总数，于是从中随机抽取20张照片，将其编号作为样本，数据整理如下：

    a．20张照片的编号：

    4，8，15，25，34，39，41，48，68，79，85，86，89，91，102，104，110，121，144，147

    b．20张照片编号的最小值、最大值、平均数和中位数：

    最小值

    最大值

    平均数

    中位数

    4

    147

    72

    m

    （1）写出表中m的值；

    （2）设照片总数为n，所有照片编号分别为1，2，…，n，这n个数的平均数和中位数均为$\frac{n+1}{2}$．

    ①利用样本平均数估计全体平均数，可估算出照片的总数$n_{1}$为__________．

    ②利用样本中位数估计全体中位数，可估算出照片的总数$n_{2}$为__________，

    小云发现，有一个估算结果不合理，这个不合理的结果是__________（填“$n_{1}$”或“$n_{2}$”）；

    （3）小云想到还可使用样本数据的“平均间隔长度”进行估计．在下面的示意图中，用$x_{1},x_{2},\cdots,x_{2n}$表示随机抽取的20张照片编号从小到大排序，则从0到$x_{20}$的平均间隔长度为$\frac{x_{20}}{20}$，从$0$到n的平均间隔长度为$\frac{n}{21}$，直接写出此时估算出照片的总数$n_{3}$（结果取整数）．

    [图]'
  answer: （1）$82$ （2）$143$，$163$，$n_{1}$ （3）$n_{3}=154$
  solution: '【小问1详解】

    解：20张照片的编号是第10，11张照片的编号的平均数，

    ∴$\frac{79+85}{2}=82$，

    ∴m的值为$82$；

    【小问2详解】

    解：①20张照片编号的平均数为$72$，$n_{1}$个数的平均数为$\frac{n_{1}+1}{2}$，

    ∴$\frac{m_{1}+1}{2}=72$，

    解得，$n_{1}=143$；

    ②20张照片编号的中位数为$82$，$n_{2}$个数的中位数为$\frac{n_{2}+1}{2}$，

    ∴$\frac{n_{2}+1}{2}=82$，

    解得，$n_{2}=163$；

    ∵20张照片编号的最大值为$147$，且$n_{1}=143<n_{2}=163$，

    ∴不合理的结果是$n_{1}$，

    故答案为：$143$，$163$，$n_{1}$；

    【小问3详解】

    解：从0到$x_{20}$的平均间隔长度为$\frac{x_{20}}{20}$，从$0$到n的平均间隔长度为$\frac{n}{21}$，

    根据题意，20张照片的编号中$x_{20}=147$，

    ∴$\frac{n}{21}=\frac{147}{20}$，

    解得，$n=\frac{3087}{20} \approx 154.35 \approx 154$，

    ∴估算出照片的总数$n_{3}=154$．'
