  question: '在平面直角坐标系xOy中，一次函数$y=kx+b(k\neq0)$的图象由函数$y=\frac{1}{2}x$的图象平移得到，且经过点$(2,4)$．

    （1）求这个一次函数的解析式；

    （2）当$x>2$时，对于x的每一个值，函数$y = x + n$的值与一次函数$y=kx+b(k\neq0)$的值的差大于$1$，直接写出n的取值范围．'
  answer: （1）$y=\frac{1}{2}x+3$ （2）$n\ 3$
  solution: '【小问1详解】

    解：根据图象平移可得$k = \frac{1}{2}$，且经过点$(2,4)$，

    ∴$4=\frac{1}{2}\times 2+b$，

    解得，$b=3$，

    ∴一次函数图象的解析式为$y=\frac{1}{2}x+3$；

    $[公式]$小问2详解】

    解：根据题意，$x+\left(\frac{1}{2}x+3\right)\geq 1$，

    解得，$n > -\frac{1}{2}x + 4$，

    ∵$x>2$，

    ∴$n>3$，

    当$n = 3$时，$x+3-\left(\frac{1}{2}x+3\right)-\frac{1}{2}x>1$，

    $n\ 3$．'
