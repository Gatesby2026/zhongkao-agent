  question: 一组数据$3,2,4,2,6,5,6$的平均数为$4$，方差为$S_{0}^{2}$．再添加一个数据$4$，得到一组新数据．若记这组新数据的方差为$S_{1}^{2}$，则$S_{1}^{2}$__________$S_{0}^{2}$（填“$\gt$”“$=$”或“$\gt$”）．
