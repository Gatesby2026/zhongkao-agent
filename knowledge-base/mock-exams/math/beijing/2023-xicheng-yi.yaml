  question: 方程$\frac{1}{2x}=\frac{1}{x-1}$的解为__________．
  answer: $x=-1$
  solution: '解：$\frac{1}{2x}=\frac{1}{x-1}$

    去分母得：$x-1=2x$

    移项、合并同类项得：$-x=1$

    系数化为1得：$x=-1$，

    检验：把$x=-1$代入$2x(x-1)$得：$2x(-1)(-1-1)=-2x(-2)=4\neq0$，

    ∴$x=-1$是原方程的解，

    故答案为：$x=-1$．'
