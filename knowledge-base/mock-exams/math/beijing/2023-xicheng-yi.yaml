  question: '在$\triangle ABC$中，AD是BC边上的中线，点E在线段AD上，点F在线段AD的延长线上，$CE \parallel FB$，连接BE，CF．

    [图]

    （1）如图1，求证：四边形$BFCE$是平行四边形．

    （2）若$\angle ABC = \angle ACB$，

    ①依题意补全图2；

    ②求证：四边形$BFCE$为菱形.'
  answer: （1）见解析 （2）①见解析；②见解析
  solution: '【小问1详解】

    证明：∵$CE \parallel FB$，

    ∴$\angle BFE = \angle CEF$，

    ∵AD是BC边上的中线，

    ∴$BD = DC$，

    ∵$\angle BDF=\angle CDE$，

    ∴$\triangle BDF\cong\triangle CDE$，

    ∴$FB = CE$，

    ∴四边形$BFCE$是平行四边形．

    【小问2详解】

    解：①依题意补全图2，如图；

    [图]

    ②证明：∵$\angle ABC = \angle ACB$，

    ∴$AB = AC$，

    ∵AD是BC边上的中线，

    ∴$AD \perp BC$，

    由（1）证明方法可得四边形$BFCE$是平行四边形，

    ∴四边形$BFCE$为菱形．'
