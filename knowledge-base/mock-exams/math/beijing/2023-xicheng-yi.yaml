  question: '在平面直角坐标系xOy中，一次函数$y=ax+b(a\ne0)$的图象由函数$y=\frac{1}{2}x$的图象平移得到，且经过点$(-2,1)$．

    （1）求这个一次函数的解析式：

    （2）当$x>2$时，对于x的每一个值，一次函数$y=ax+b$的值小于函数$y = x + m$的值，直接写出m的取值范围．'
  answer: （1）$y=\frac{1}{2}x+2$ （2）$m\ 1$
  solution: '【小问1详解】

    解：∵一次函数$y=ax+b$的图象由函数$y=\frac{1}{2}x$的图象平移得到，

    ∴$a = \frac{1}{2}$，得到一次函数的解析式为$y=\frac{1}{2}x+b$．

    ∵一次函数$y=\frac{1}{2}x+b$的图象过点$(-2,1)$，

    ∴$\frac{1}{2} \times (-2) + b = 1$，得到$b = 2$．

    ∴一次函数$y=ax+b$的解析式为$y=\frac{1}{2}x+2$．

    【小问2详解】

    解：当$x>2$时，对于x的每一个值，一次函数$y=ax+b$的值小于函数$y = x + m$的值，

    ∴$\frac{1}{2}x+2<x+m$，

    解得$x>4-2m$，

    ∵当$x>2$时总是成立，

    ∴$4-2m\leq2$，

    ∴$m\ 1$，

    即m的取值范围是$m\ 1$．'
