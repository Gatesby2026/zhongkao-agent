  question: '如图1，利用喷水头喷出的水对小区草坪进行喷灌作业是养护草坪的一种方法，如图2，点O处由一个喷水头，距离喷水头8m的M处有一棵高度是2.3m的树，距离这棵树10m的N处有一面高2.2m的围墙，建立如图所示的平面直角坐标系，已知某次浇灌时，喷水头喷出的水柱的竖直高度y（单位：m）与水平距离x（单位：m）近似满足函数关系$y=ax^{2}+bx+c(a<0)$．

    [图]

    （1）某次喷水浇灌时，测得x与y的几组数据如下：

    | x | 0 | 2 | 6 | 10 | 12 | 14 | 16 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | y | 0 | 0.88 | 2.16 | 2.80 | 2.88 | 2.80 | 2.56 |

    ①根据上述数据，求这些数据满足的函数关系；

    ②判断喷水头喷出的水柱能否越过这棵树，并说明理由．

    （2）某次喷水浇灌时，已知喷水头喷出的水柱的竖直高度y与水平距离x近似满足函数关系$y = -0.04x^2 + bx$，假设喷水头喷出的水柱能够越过这棵树，且不会浇到墙外，下面有四个关于b的不等式：

    A.$-0.04\times8^{2}+8h>2.3$；B.$-0.04\times18^{2}+18b\geq2.2$；

    C.$-0.04\times18^{2}+18b<2.2$；D.$\frac{b}{2\times0.04}>13$．

    其中正确的不等式是__________．（填上所有正确的选项）'
  answer: （1）①$y=-0.02x^{2}+0.48x$；②喷水头喷出的水柱能够越过这棵树，理由见解析 （2）A，C
  solution: '【小问1详解】

    ①由题意可设所求的的函数关系式为$y=a(x-12)^{2}+2.88(a<0)$．

    ∵点（0，0）在该函数的图像上，

    ∴$144a+2.88=0$．

    解得$a = -0.02$．

    故求的的函数关系为$y=-0.02(x-12)^{2}+2.88$．

    即$y=-0.02x^{2}+0.48x$．

    ②喷水头喷出的水柱能够越过这棵树．理由如下：

    ∵当$x=8$时的函数值与当$x = 16$时的函数值相等，

    ∴当$x=8$时，$y = 2.56 > 2.3$．

    ∴喷水头喷出的水柱能够越过这棵树．

    【小问2详解】

    根据题意，得到当$x=8$时，$y>2.3$，当$x = 18$，$y<2.2$，

    ∵$y = -0.04x^2 + bx$

    ∴$-0.04\times8^{2}+8h>2.3$，$-0.04\times18^{2}+18b<2.2$，

    故选A，C，

    故答案为：A，C．'
