  question: 已知a是方程$x^{2}+2x-1=0$的一个根，求代数式$(a+1)^{2}+a(a+2)$的值．
  answer: $2a^{2}+4a+1$，3
  solution: '解：$(a+1)^{2}+a(a+2)$

    $a^{2}+2a+1+a^{2}+2a$

    $=2a^{3}+4a+1$，

    ∵a是方程$x^{2}+2x-1=0$的一个根，

    ∴$a^{2}+2a-1=0$，

    即$a^2 + 2a = 1$．

    ∴原式$=2(a^{2}+2a)+1$$=2\times1+1=3$．'
