  question: '如图，AB是$\odot\odot$的直径，C是$\odot\odot$上一点，$\angle ACB$的平分线交$\odot\odot$于点D，过点D作$\odot\odot$的切线交CB的延长线于点E．

    [图]

    （1）求证：$DE \parallel AB$；

    （2）若$OA=5$，$\sin A = \frac{3}{5}$，求线段DE的长．'
  answer: （1）见解析 （2）$\frac{35}{4}$
  solution: '【小问1详解】

    证明：连接OD，如图1．

    ∵DE是$\odot\odot$的切线，切点是D，

    ∴$OD \perp DE$．

    ∴$\angle ODE=90^{\circ}$．

    ∵AB是$\odot\odot$的直径，

    ∴$\angle ACB=90^\circ$．

    ∵$\angle ACB$的平分线交$\odot\odot$于点D，

    ∴$\angle ACD=\angle BCD=45^{\circ}$．

    ∴$\angle AOD=90^{\circ}$．

    ∴$\angle AOD = \angle ODE$．

    ∴$DE \parallel AB$．

    [图]【小问2详解】

    解：作$BH \perp DE$于H，如图2．

    ∴$\angle BHD=\angle BHE=90^\circ$．

    ∵$OD \perp DE$，$\angle AOD=90^{\circ}$，

    ∴$\angle BOD=\angle ODH=90^{\circ}$．

    ∴四边形$OBHD$是矩形．

    ∵$OA=OB=OD=5$，

    ∴四边形$OBHD$是正方形．

    ∴$BH=OD=DH=5$．

    ∵在$Rt\triangle ABC$中，$\sin A = \frac{3}{5}$，

    ∴$\tan A = \frac{3}{4}$．

    ∵$\angle ACB=90^\circ$，

    ∴$\angle A-\angle ABC=90^{\circ}$．

    ∵$\angle EBH+\angle ABC=90^{\circ}$，

    ∴$\angle A=\angle EBH$．

    ∴$\tan\angle EBH=\tan A=\frac{3}{4}$．

    ∴$HE=BH\ \tan\angle EBH=5\times\frac{3}{4}=\frac{15}{4}$．

    ∴$DE=HE+DH=\frac{35}{4}$．

    '
