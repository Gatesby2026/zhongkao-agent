    ∴$\angle ENH = \angle EMK$．

    记ME与OC的交点为P，

    ∴$\angle EPN=\angle OPM$．

    ∴$\angle MEN = \angle AOC$．

    【小问2详解】

    （2）$OM=NF+OG$．

    证明：在线段OM上截取$OG_{1}=OG$，连接EG1，如图．

    [图]

    ∵OE是$\angle BOC$的平分线，

    ∴$\angle EON=\angle EOB$．

    ∵$\angle MOF = \angle DOB$，

    ∴$\angle EOM=\angle EOD$．

    ∵$OE = OE$，

    ∴$\triangle EOG\cong\triangle EOG$．

    ∴$EG_{1}=EG$，$\angle EGQ = \angle EGF$．

