  question: '设备每年都需要检修，该设备使用年数n（单位：年，n为正整数且$1 \leq n \leq 10$）与第1年至第n年该设备检修支出的费用总和y（单位：万元）满足关系式$y = 1.4n - 0.5$，下列结论正确的是（）

    A.从第2年起，每年的检修费用比上一年增加$1.4$万元

    B.从第2年起，每年的检修费用比上一年减少$0.5$万元

    C.第1年至第5年平均每年的检修费用为$3.7$万元

    D.第6年至第10年平均每年的检修费用为$1.4$万元'
  answer: D
  solution: '由题意得，

    前n年支出总费用为$y = 1.4n - 0.5$万元，

    前$n+1$年支出总费用为：$y=1.4(n+1)-0.5=1.4n+0.9$万元；

    前$n+2$年支出总费用为：$y=1.4(n+2)-0.5=1.4n+2.3$万元；

    易知，前n年和前$n+1$年差值为$1.4$万元，前$n+1$年和$n+2$年差值为$1.4$万元，

    故第二年起，每年检修费比上一年保持不变，故A , B错误；

    第一到第五年总支出费用为$y=1.4\times5-0.5=6.5$万元，

    故平均每年检修费用为$6.5\div5=1.3$万元，故C错误．

    $1-5$年总支出为$6.5$万元，

    $1-10$年总支出为$y=1.4\times10-0.5=13.5$万元，

    所以$6-10$年平均每年检测费用为$(13.5-6.3)\div5=1.4$万元，故D正确．

    故选D．'
