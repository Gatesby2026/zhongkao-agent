    ∴$\angle EFG=\angle EG_{1}O$．

    ∴$\angle EPN = \angle EG_{1}M$．

    ∵$\angle ENF = \angle EMG_1$．

    ∴$\triangle ENF \cong \triangle EMG$．

    ∴$NF=MG_{1}$．

