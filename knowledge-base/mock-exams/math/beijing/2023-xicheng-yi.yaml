  question: '下面是解答一道几何题时两种添加辅助线的方法，选择其中一种，完成证明．

    | 已知：如图， $AB \parallel CD$ ． 求证： $\angle ABC = \angle A + \angle C$ [图] |  |

    | --- | --- |

    | 方法一 证明：如图，过点 E 作 $MN \parallel AB$ [图] | 方法二 证明：如图，延长 AE ，交 CD 于点 F ． [图] |'
  answer: 答案不唯一，见解析
  solution: '方法一

    证明：如图，过点E作$MN \parallel AB$，

    ∴$\angle A=\angle AEM$．

    ∵$AB \parallel CD$，

    ∴$MN \parallel CD$，

    ∴$\angle C=\angle CEM$．

    ∵$\angle AC+\angle AEM+\angle CEM$，

    ∴$\angle ABC = \angle A + \angle C$．

    [图]

    方法二证明：如图，延长AE，交CD于点F，

    ∵$AB \parallel CD$，

    ∴$\angle A=\angle AFC$．

    ∵$\angle AEC = \angle AFC + \angle C$，

    ∴$\angle ABC = \angle A + \angle C$．

    [图]'
