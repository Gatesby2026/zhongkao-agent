  question: '将1，2，3，4，5，…，37这37个连续整数不重不漏地填入37个空格中．要求：从左至右，第1个数是第2个数的倍数，第1个数与第2个数之和是第3个数的倍数，第1，2，3个数之和是第4个数的倍数，…，前36个数的和是第37个数的倍数．若第1个空格填入37，则第2个空格所填入的数为______，第37个空格所填入的数为______．

    37'
  answer: ①.1②.19
  solution: '解：∵第1个空格填入37，第1个数是第2个数的倍数，

    ∴第2个空格所填入的数为1，

    ∵前36个数的和是第37个数的倍数，

    ∴这37个数的和也是第37个数的倍数，

    又∵$1+2+3+\cdots+37$

    $=(1+37)+(2+36)+\cdots+(18+20)+19$

    $=38\times18+19$

    $=703$

    $=37\times19$，

    ∴第37个空格所填入的数为19，

    故答案为：1，19．'
