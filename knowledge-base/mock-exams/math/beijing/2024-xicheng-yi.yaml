  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(3,5),B(-2,0)$，且与y轴交于点C．

    （1）求该函数的解析式及点C的坐标；

    （2）当$x<2$时，对于x的每一个值，函数$y = -3x + n$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）函数的解析式为$y=x+2$，点C的坐标为$(0,2)$ （2）$n\geqslant10$
  solution: '【小问1详解】

    解：将$A(3,5),B(-2,0)$，代入函数解析式得，

    $\begin{cases}

    3k + b = 5 \\

    -2k + b = 0

    \end{cases}$，解得$\left\{\begin{array}{l}k=1\\b=2\end{array}\right.$，

    ∴函数的解析式为：$y=x+2$，

    当$x = 0$时，$y=2$，

    ∴点C的坐标为$(0,2)$．

    【小问2详解】

    解：由题意得，$-3x + n > x + 2$，

    即$x < \frac{n - 2}{4}$，

    又$x<2$，

    ∴$\frac{n-2}{4} \cdot 2$，

    解得：$n\geqslant10$，

    ∴n的取值范围为$n\geqslant10$．'
