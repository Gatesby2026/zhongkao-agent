  solution: '解：设购买x套围棋，y套象棋，假设所购买围棋的套数能是所购买象棋套数的2倍，

    依题意得，$\left\{

    \begin{array}{l}

    40x + 30y = 1900 \\

    x = 2y

    \end{array}

    \right.$，

    解得，$y=\frac{100}{11}$，

    ∵y不为正整数，

    ∴不合题意．

    答：所购买围棋的套数不能是所购买象棋套数的2倍．'
