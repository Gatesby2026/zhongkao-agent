  question: '已知：如图，点P和$\odot\odot$．

    [图]

    求作：直线PA，使得PA与$\odot\odot$相切于点A．

    作法：（1）连接OP，分别以点O和点P为圆心，大于$\frac{1}{2}OP$的长为半径作弧，两弧交于$C,D$两点；

    （2）作直线CD，交OP于点B；

    （3）以点B为圆心，以OB长为半径作$\odot B$，与$\odot\odot$相交，其中一个交点为点A；

    （4）作直线PA．

    直线PA即为所求作．

    （1）使用直尺和圆规，依作法补全图形（保留作图痕迹）；

    （2）完成下面的证明．

    证明：由作法可知，点B为线段OP的中点．连接OA．

    ∵OP为$\odot B$的直径，

    ∴$\angle OAP =$_________$\text{o}$（_________）（填推理的依据）．

    ∴$OA \perp PA$．

    ∵点A在$\odot\odot$上，

    ∵PA是$\odot\odot$的切线（_________）（填推理的依据）．'
  answer: （1）见解析（2）$90$；直径所对的圆周角是直角；切线的判定定理
  solution: '【小问1详解】

    解：如图所示，即为所求；

    [图]【小问2详解】

    证明：由作法可知，点B为线段OP的中点．连接OA．

    ∵OP为$\odot B$的直径，

    ∴$\angle OAP = 90^\circ$（直径所对的圆周角是直角）．

    ∴$OA \perp PA$．

    ∵点A在$\odot\odot$上，

    ∵PA是$\odot\odot$的切线（切线的判定定理）．

    故答案为：$90$；直径所对的圆周角是直角；切线的判定定理．

    [图]【点睛】本题主要考查了切线的判定定理，圆周角定理，线段垂直平分线的尺规作图等等，灵活运用所学知识是解题的关键．'
