  question: '如图，在菱形$ABCD$中，$\angle BAD = 60^\circ$，E是AB边上一点（不与A，B重合），点F与点A关于直线DE对称，连接DF．作射线CF，交直线DE于点P，设$\angle ADP = \alpha$．

