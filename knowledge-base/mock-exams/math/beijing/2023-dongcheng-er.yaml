  question: '将15个编号为1~15的小球全部放人甲、乙、丙三个盘子内，每个盘子里的小球不少于4个，甲盘中小球编号的平均值为3．

    （1）写出一种甲盘中小球的编号是_________；

    （2）若乙、丙盘中小球编号的平均值分别为8，13，则乙盘中小球的个数可以是_________．'
  answer: ①.1号，2号，3号，6号（答案不唯一）②.7或5
  solution: '解：（1）∵每个盘子里的小球不少于4个，甲盘中小球的平均值为3，且$\frac{1+2+3+6}{4}=3$，

    ∴甲盘中小球的编号可能是：1号，2号，3号，6号；

    故答案为1号，2号，3号，6号（答案不唯一）；

    （2）设甲盘中有x个球，乙盘有y个球，丙盘中有z个球（x、y、z都是不小于4的正整数），由题意得：

    $\left\{

    \begin{aligned}

    3x + 8y + 13z &= 1 + 2 + 3 + \ldots + 15 \\

    x + y + z &= 15

    \end{aligned}

    \right.$，

    消去x得：$5y + 10z = 75$，即$y+2z=15$，

    ∴当$z = 4$时，则$y=7$，此时$x = 4$符合题意；

    当$z = 5$时，则$y = 5$，此时$x=5$符合题意；

    当$z = 6$时，则$y=3$，此时$x = 6$不符合题意，舍去；

    ∴乙盘中小球的个数可以是7或5；

    故答案为7或5．'
