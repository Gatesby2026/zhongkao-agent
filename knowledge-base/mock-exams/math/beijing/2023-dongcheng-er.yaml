  question: '下列正多边形中，一个内角为$120^\circ$的是（）

    A.[图]B.[图]C.[图]D.[图]'
  answer: C
  solution: '解：A、正方形的一个外角为$360^{\circ} \div 4 = 90^{\circ}$，所以其内角为$180^{\circ}-90^{\circ}=90^{\circ}$，故不符合题意；

    B、正五边形的一个外角为$360^\circ \div 5 = 72^\circ$，所以其内角为$180^{\circ}-72^{\circ}=108^{\circ}$，故不符合题意；

    C、正六边形的一个外角为$360\div6=60^\circ$，所以其内角为$180^{\circ}-60^{\circ}=120^{\circ}$，故符合题意；

    D、正八边形的一个外角为$360^{\circ} \div 8 = 45^{\circ}$，所以其内角为$180^{\circ}-45^{\circ}=135^{\circ}$，故不符合题意；

    故选C．'
