  question: '如图，在$\triangle ABC$中，$BD \perp AC$于点D，$CE \perp AB$于点$E,BD$和CE交于点O，则下列结论不正确的是（）

    [图]

    A.$\angle1=\angle2$B.$\angle 1+\angle 5=90^\circ$C.$\angle 3=\angle 4$D.$\angle5=\angle3+\angle4$'
  answer: C
  solution: '解：∵$BD \perp AC$，$CE \perp AB$，

    ∴$\angle BEC=\angle BDC=90^{\circ}$，

    ∴$\angle1+\angle5=\angle2+\angle DOC=90^{\circ}$，

    ∵$\angle 5=\angle DOC$，

    ∴$\angle1=\angle2$，故A、B正确；

    由三角形外角的性质可知$\angle5=\angle3+\angle4$，故D正确；

    题干中并未给出$\angle ABC = \angle ACB$，所以无法得出$\angle 3=\angle 4$；故C错误；

    故选C．'
