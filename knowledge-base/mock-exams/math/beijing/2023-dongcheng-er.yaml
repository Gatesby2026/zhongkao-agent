  question: '已知线段$\overline{PQ}$是$\circ G$的弦，点K在直线$\overline{PQ}$上．对于弦$\overline{PQ}$和点K，给出如下定义：若将弦$\overline{PQ}$绕点K逆时针旋转$\alpha(0^{\circ}<\alpha<180^{\circ})$得到线段$P''Q''$，恰好也是$\circ G$的弦，则称弦$\overline{PQ}$关于点K中心映射，点K叫做映射中心，$\alpha$叫做映射角度．

    [图][图]

    （1）如图1，点G是等边$\triangle ABC$的中心，作$\circ G$交AB于点$P,Q$．在$A,B,C$三点中，弦$\overline{PQ}$关于点_________中心胦射；

    （2）如图2，在平面直角坐标系xOy中，直线$y=-\frac{3}{4}x+3$与x轴交于点E，与y轴交于点F，$\angle OEF$的角平分线交y轴于点D．若$\odot D$与线段EF相交所得的弦关于点E中心映射，直接写出$\odot D$的半径r的取值范围；

    （3）在平面直角坐标系xOy中，$\odot\odot$的半径为2，线段MN是$\odot\odot$的弦．对于每一条弦MN，都有相应的点H，使得弦MN关于点H中心映射，且映射角度为$60^\circ$．设点H到点O的距离为d，直接写出d的取值范围．'
  answer: （1）A（2）$\frac{5}{3}p > \frac{4}{3}$ （3）$0 \leq d < 4$
  solution: '【小问1详解】

    根据中心映射的定义，

    若将弦$\overline{PQ}$绕点K逆时针旋转$\alpha(0^{\circ}<\alpha<180^{\circ})$得到线段$P''Q''$，恰好也是$\circ G$的弦，则称弦$\overline{PQ}$关于点K中心映射，点K叫做映射中心．由于$\triangle ABC$是等边三角形，因此直线$\overline{PQ}$绕A点逆时针旋转$\alpha=60^\circ$$\left(0^{\circ}<\alpha<180^{\circ}\right)$，可使弦$\overline{PQ}$落在弦$P''Q''$上．但直线$\overline{PQ}$绕B点、C点逆时针旋转$\alpha$$\left(0^{\circ}<\alpha<180^{\circ}\right)$后，弦$\overline{PQ}$无法与$\circ
    G$再相交成弦．

    故只有点A符合映射中心的条件，如下图．

    [图]【小问2详解】

    如下图，$\angle OEF$的角平分线交y轴于点D，过D作$DG \perp EF$，垂足为G．

    [图]

    则$\odot D$与线段EF相交所得的弦关于点E中心映射，此时$\odot D$的半径r的取值范围是$DF\cdot r > DG$．

    在$\triangle OEF$中，EF平分$\angle OEF$，过D作x轴的平行线，与EF交于H，

    则$\angle HDE-\angle DEO$，又$\angle BED=\angle DEQ$，

    所以$\angle HDE-\angle HED$，则$HD=HE$．

    由$DH \parallel OE$得，$\triangle FDH \sim \triangle FCE$，所以$\frac{DF}{DE}=\frac{PH}{HE}=\frac{HD}{HD}=\'
