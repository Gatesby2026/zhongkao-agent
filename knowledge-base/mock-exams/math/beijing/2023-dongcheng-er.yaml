  question: '如图，$\odot\odot$的直径AB与弦CD相交于点E，且$CE = DE$，点F在AB的延长线上，连接$OC,DF,\angle F=\angle C$．

    [图]

    （1）求证：DF是$\odot\odot$的切线；

    （2）若$OE=2BE,BF=2$，求$\odot\odot$半径的长．'
  answer: （1）见详解（2）4
  solution: '【小问1详解】

    证明：连接OD，如图所示：

    [图]

    ∵$CE = DE$，AB是$\odot\odot$的直径，

    ∴$AB \perp CD$，

    ∴$\angle DEF = 90^\circ$，

    ∴$\angle F+\angle EDF=90^\circ$，

    ∵$OC = OD$，

    ∴$\angle OCD = \angle ODC$，

    ∵$\angle F = \angle C$，

    ∴$\angle F=\angle ODC$，

    ∴$\angle QDC+\angle EDF=90^{\circ}$，即$\angle ODF=90^{\circ}$，

    ∵OD是$\odot\odot$的半径，

    ∴DF是$\odot\odot$的切线；

    【小问2详解】

    解：由题意可设$OE = 2x, BE = x$，则$OD = OB = 3x$，

    ∴$\cos\angle EOD=\frac{OE}{OD}=\frac{2}{3}$，$OF = 3x + 2$，

    ∴在$\mathrm{Rt}\triangle ODF$中，$\cos\angle FOD=\frac{OD}{OF}=\frac{3x}{2x+2}=\frac{2}{3}$，

    解得：$x=\frac{4}{3}$，

    ∴$OD = 4$，

    即$\odot\odot$的半径为4．'
