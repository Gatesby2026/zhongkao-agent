    当$x=3$时，$y=9a+3b+1$$-9a+3x(-6a)+1$$=-9a+1$，

    ∴抛物线$y=ax^{2}+bx+1(a\neq 0)$的顶点坐标是$(3,-9a+1)$；

    【小问2详解】

    ∵$y=ax^{2}+bx+1(a>0)$，

    ∴抛物线开口向上，

    ∴距离抛物线对称轴越远，函数值越大，

    点$(3-t,y)$距离对称轴$x=3$的距离为：$|3-t-3|=t$，

    点$(3-2t,y_{2})$距离对称轴$x=3$的距离为:$|3-2x-3|=-21=21$，

    ∵$t > 0$，

    ∴$2t > t$，

    ∴$(3-2t,y_{2})$距离对称轴$x=3$比$(3-t,y)$距离对称轴$x=3$更远，

    ∴$y_1 < y_2$，

    故填：$\gt$；

    【小问3详解】

    ∵$b = -6a$，

    ∴$y=ax^{2}-6ax+1(a\neq 0)$，

    当$a < 0$时，

    ∵抛物线$y=ax^{2}-6ax+1(a\neq 0)$的对称轴是直线$x=3$，且该抛物线与线段AB恰有一个公共点，

    故顶点为$(3,3)$，

    把$(3,3)$代入$y=ax^{2}-6ax+1(a\neq 0)$得：$9a-18a+1=3$，

    ∴$a = -\frac{2}{9}$；

    当$a > 0$时，

    ∵当$x = 0$时，$y = 1$，

    ∴抛物线$y=ax^{2}-6ax+1$过$(0,1)$，

    ∵抛物线$y=ax^{2}-6ax+1(a\neq 0)$的对称轴是直线$x=3$，

    ∴抛物线$y=ax^{2}-6ax+1$过$(6,1)$，

    ∴抛物线$y=ax^{2}-6ax+1$与$y=3$的交点一个在y轴的左侧，一个在$x = 6'
