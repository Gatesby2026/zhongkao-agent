  question: 先化简，再求值：$\left(1-\frac{a}{a+2}\right)\div\frac{a^{2}-4}{a^{2}+4a+4}$，其中$a = 4$．
  answer: $\frac{2}{a-2}$；1
  solution: '解：$\left(1-\frac{a}{a+2}\right)\div\frac{a^{2}-4}{a^{2}+4a+4}$

    $=\left(\frac{a+2}{a+2}-\frac{a}{a+2}\right)+\frac{(a+2)(a-2)}{(a+2)^{2}}$

    $\frac{2}{a+2}\times\frac{(a+2)^{2}}{(a+2)(a-2)}$

    $=\frac{2}{a-2}$；

    当$a = 4$时，原式$\frac{2}{4-2}=1$．'
