  question: '某校学生参加学农实践活动时，计划围一个面积为4平方米的矩形围栏．设矩形围栏周长为m米，对于m的最小值问题，小明尝试从“函数图象”的角度进行探究，过程如下．

    请你补全探究过程．

    [图]

    （1）建立函数模型：

    设矩形相邻两边的长分别为$x,y$．由矩形的面积为4，得$xy = 4$，即$y = \frac{4}{x}$；由周长为m，得$2(x+y)=m$，即$y = -x + \frac{m}{2}$．满足要求的$(x, y)$应是两个函数图象在第_________象限内交点的坐标；

    （2）画出函数图象：

    函数$y=\frac{4}{x}(x>0)$的图象如图所示，而函数$y = -x + \frac{m}{2}$的图象可由直线$y = -x$平移得到．请在同一平面直角坐标系xOy中画出直线$y = -x$；

    （3）平移直线$y = -x$，观察函数图象：

    当直线平移到与函数$y=\frac{4}{x}(x>0)$的图象有唯一交点$(2,2)$时，直线$y = -x + \frac{m}{2}$与y轴交点的纵坐标为_________；

    （4）得出结论：

    若围出面积为4平方米的矩形围栏，则周长m的最小值为_________米，此时矩形相邻两边的长分别为_________米、_________米．'
  answer: （1）一（2）见解析 （3）直线$y = -x + \frac{m}{2}$与y轴交点的纵坐标为$y = 4$； （4）周长m的最小值为8米；矩形相邻两边的长分别为2米、2米；
  solution: '【小问1详解】

    解：∵x，y是矩形的边长，都是正数，

    所以点$(x, y)$在第一象限；

    【小问2详解】

    解：当$x = 0$时，$y = -x = 0$，

    当$x = 1$时，$y = -x = -1$，

    ∴$y = -x$图像如图所示：

    [图]【小问3详解】

    解：将点$(2,2)$代入$y = -x + \frac{m}{2}$得：$2 = -2 + \frac{m}{2}$，

    解得：$m=8$，

    即$y=-x+4$，

    当$x = 0$时，$y = 4$，

    ∴直线$y = -x + \frac{m}{2}$与y轴交点$[公式]$纵坐标为$y = 4$；

    【小问4详解】

    解：联立$y = \frac{4}{x}$和$y = -x + \frac{m}{2}$并整理得：$x^{2}-\frac{1}{2}mx+4=0$，

    ∴$\Delta=b^{2}-4ac=\left(-\frac{1}{2}m\right)^{2}-4\times1\times4\quad0$时，两个函数有交点，

    解得：$m\ 8$，

    ∴周长m的最小值为8米，

    可得$\left\{\begin{array}{l}xy=4\\x+y=4\end{array}\right.$，解得$\left\{\begin{array}{l}x=2\\y=2\end{array}\right.$，

    ∴矩形相邻两边的长分别为2米、2米；'
