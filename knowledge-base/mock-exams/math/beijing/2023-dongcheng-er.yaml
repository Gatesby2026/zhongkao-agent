  question: '如图，在$\triangle ABC$中，$AB = AC$，点D为BC中点，过点$A,C$分别作$BC,AD$的平行线，相交于点E．

    [图]

    （1）求证：四边形$ADCE$为矩形；

    （2）连接$BE,DE$，若$\tan \angle CBE = \frac{4}{3}, CD = 3$，求AB的长．'
  answer: （1）见详解（2）$\sqrt{73}$
  solution: '【小问1详解】

    证明：由题意得$AE \parallel CD, AD \parallel CE$，

    四边形$ADCE$是平行四边形，

    $AB = AC$，点D为BC中点，

    $\therefore AD \perp BC$，即$\angle ADC = 90^\circ$，

    四边形$ADCE$为矩形；

    【小问2详解】

    解：∵四边形$ADCE$为矩形，

    $\angle BCE = \angle ADB = 90^\circ$，

    ∵点D为BC中点，

    $\therefore BC=2CD=6,BD=3,$

    在$Rt_{\triangle}BCE$中，$\tan\angle CBE=\frac{CE}{BC}=\frac{CE}{6}=\frac{4}{3}$，

    解得：$CE = 8,$$AD=CE-8,$

    在$Rt\triangle ADB$中，$AB = \sqrt{AD^{2} + BD^{2}} = \sqrt{8^{2} + 3^{2}} = \sqrt{73}$，

    故AB的长为$\sqrt{73}$．'
