  question: '如图，函数$y=\frac{m}{x}(x>0)$的图像G与直线$y=\frac{1}{2}x+1$交于点P，点P的纵坐标为4，$PA\perp x$轴，垂足为点A．

    [图]

    （1）求m的值；

    （2）点M是图像G上一点，过点M作$MB \perp AP$于点B，若$\frac{PB}{BM}=\frac{1}{2}$，求点M的坐标．'
  answer: （1）$m = 24$ （2）$M(8,3)$
  solution: '【小问1详解】

    ∵点P的纵坐标为4，

    ∴$4=\frac{1}{2}x+1$，

    解得$x = 6$，

    ∴$P(6,4)$，

    把$P(6,4)$代入$y=\frac{m}{x}(x>0)$，

    解得：$m = 24$．

    【小问2详解】

    ∵$\frac{PB}{BM}=\frac{1}{2}$，

    ∴设$PB = n$，则$BM = 2n$，

    当M在点P的右侧时，

    ∵$P(6,4)$，

    ∴$B(6,4-n)$，

    ∴$M(6+2n,4-n)$，

    把$M(6+2n,4-n)$代入

    $y=\frac{24}{x}(x>0)$，

    解得$n_{1}=1$，$n_{2}=0$（舍去），

    ∴$M(8,3)$

    当M在点P的左侧时，

    ∵$P(6,4)$，

    ∴$B(6,4+n)$，

    ∴$M(6-2n,4+n)$，

    把$M(6-2n,4+n)$代入

    $y=\frac{24}{x}(x>0)$，

    解得$n_{1}=-1$（舍去），$n_{2}=0$（舍去），

    ∴此种情况不存在，

    ∴点M的坐标为$M(8,3)$'
