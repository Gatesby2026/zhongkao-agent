  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+bx+1(a\neq 0)$的对称轴是直线$x=3$．

    （1）求出该抛物线的顶点坐标（用含a的式子表示）；

    （2）当$a > 0$时，对于任意的正数t，若点$(3-x_{1},y_{1})(3-2x_{2},y_{2})$在该抛物线上，则$y_{1}$_________$y_{2}$（填“>”“<”或“=”）；

