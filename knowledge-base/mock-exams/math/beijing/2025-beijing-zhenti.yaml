  question: '如图，在正方形$ABCD$中，点E在边CD上，$CF \perp BE$，垂足为F．若$AB = 1$，$\angle EBC = 30^\circ$，则$\triangle ABF$的面积为_______．

    [图]'
  answer: $\frac{3}{8}$##0.375
  solution: '解：过点F分别作$FM \perp BC, FN \perp AB$，垂足为M，N，连接AM，则$\angle FMC = 90^\circ$，

    [图]

    ∵四边形$ABCD$为正方形，

    ∴$\angle ABC = 90^\circ$，

    ∴$\angle ABC=\angle FMC$，

    ∴$AB \parallel FM$，

    ∴$FN = BM$，

    ∵$S_{\triangle ABM}=\frac{1}{2}AB\cdot FN,S_{\triangle BAM}=\frac{1}{2}AB\cdot BM$,

    ∴$S_{\triangle ABP}=S_{\triangle ABQ}$，

    ∵$CF \perp BE$，垂足为F，$AB=1=BC$，$\angle EBC = 30^\circ$，

    ∴$\angle BFC=90^\circ,CF=\frac{1}{2}BC=\frac{1}{2}$，

    ∴$\angle CFM=90^{\circ}-\angle BCF=30^{\circ}$，

    ∴$CM = \frac{1}{2}CF = \frac{1}{4}$，

    ∴$BM = BC - CM = \frac{3}{4}$，

    ∴$S_{\triangle ABC}=S_{\triangle ABN2}=\frac{1}{2}\times 1\times \frac{3}{4}=\frac{3}{8}$，

    故答案为：$\frac{3}{8}$．'
