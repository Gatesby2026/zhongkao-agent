  question: 方程$\frac{2}{x-6}+\frac{1}{x}=0$的解为_______．
  answer: $x=2$
  solution: '解：$\frac{2}{x-6}+\frac{1}{x}=0$

    去分母得：$2x+x-6=0$，

    移项，合并同类项得：$3x=6$，

    系数化为1得：$x=2$，

    检验，当$x=2$时，$x(x-6)-2\times(2-6)-8\times0$，

    ∴$x=2$是原方程的解，

    故答案为：$x=2$．'
