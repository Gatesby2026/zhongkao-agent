    （3）新员工小云和小腾刚刚完成理论学习，接下来进行模拟练习和试制．

    ①若新员工单日制成不少于45个合格品即可获得“优秀学员”证书，根据上述函数关系，小云最早在完成理论学习后的第_______日可获得“优秀学员”证书；

