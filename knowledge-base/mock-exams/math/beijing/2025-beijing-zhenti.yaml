  question: '如图，在$V_{ABC}$中，D，E分别为$AB, AC$的中点，$DF \perp BC$，垂足为F，点G在DE的延长线上，$DG = FC$．

    [图]

    （1）求证：四边形$DFCG$是矩形；

    （2）若$\angle B=45^{\circ}$，$DF = 3$，$DG = 5$，求BC和AC的长．'
  answer: （1）见解析 （2）$BC = 8,\ AC = 2\sqrt{10}$
  solution: '【小问1详解】

    证明：∵D，E分别为$AB, AC$的中点，

    ∴DE是$V_{ABC}$的中位线，

    ∴$DE \parallel CF$，即$DG \parallel CF$，

    ∵$DG = FC$，

    ∴四边形$DFCG$是平行四边形，

    又∵$DF \perp BC$，

    ∴平行四边形$DFCG$是矩形；

    【小问2详解】

    解：∵$DG = 5$，

    ∴$CF=DG=5$；

    ∵$DF \perp BC$，

    ∴$\angle DFB=90^\circ$，

    在$\mathrm{Rt}\triangle BDF$中，$\angle B=45^{\circ}$，$DF = 3$，

    ∴$BD = \frac{DF}{\sin B} = \frac{3}{\sin 45^\circ} = 3\sqrt{2}, \quad BF = \frac{DF}{\tan B} = \frac{3}{\tan 45^\circ} = 3$，

    ∴$BC = BF + CF = 8$；

    ∵点D为AB的中点，

    ∴$AB=2BD=6\sqrt{2}$；

    如图所示，过点A作$AH \perp BC$于H，

    [图]

    在$\mathrm{Rt}\triangle ABH$中，$AH = AB \cdot \sin B = 6\sqrt{2} \cdot \sin 45^\circ = 6,\ BH = AB \cdot \cos B = 6\sqrt{2} \cdot \cos 45^\circ = 6$，

    ∴$CH = BC - BH = 2$，

    在$Rt\triangle AHC$中，由勾股定理得$AC^{2}=\sqrt{AH^{2}+CH^{2}}=\sqrt{6^{2}+2^{2}}=2\sqrt{10}$．'
