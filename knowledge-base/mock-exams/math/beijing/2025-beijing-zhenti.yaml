  question: '校田径队教练选出甲、乙、丙、丁四名运动员参加100米比赛．对这四名运动员最近10次100米跑测试成绩（单位：s）的数据进行整理、描述和分析．下面给出了部分信息．

    a．甲、乙两名运动员10次测试成绩的折线图：

    [图]

    b．丙运动员10次测试成绩：12.4  12.4  12.5  12.7  12.8  12.8  12.8  12.8  12.9  12.9

    c．四名运动员10次测试成绩的平均数、中位数、方差：

    |  | 甲 | 乙 | 丙 | 丁 |

    | --- | --- | --- | --- | --- |

    | 平均数 | 12.5 | 12.5 | p | 12.5 |

    | 中位数 | m | 12.5 | 12.8 | 12.45 |

    | 方差 | 0.056 | n | 0.034 | 0.056 |

    （1）表中m的值为_______；

    （2）表中n_______0.056（填“>”“=”或“<”）；

    （3）根据这10次测试成绩，教练按如下方式评估这四名运动员的实力强弱：首先比较平均数，平均数较小者实力更强；若平均数相等，则比较方差，方差较小者实力更强；若平均数、方差分别相等，则测试成绩小于平均数的次数较多者实力更强．

    评估结果：这四名运动员按实力由强到弱依次为_______．'
  answer: （1）$12.5$ （2）$\gt$ （3）乙、丁、甲、丙
  solution: '【小问1详解】

    解：甲的10次测试成绩排列为：$12.1,12.1,12.5,12.5,12.5,12.5,12.7,12.7,12.9$，

    ∴中位数$m=\frac{12.4+12.5}{2}=12.5$，

    故答案为：$12.5$；

    【小问2详解】

    解：乙的10次测试成绩平均数为：$\frac{12.6+12.6+12.3+12.5+12.5+12.7+12.5+12.7+12.4+12.2}{10}=12.5$，

    ∴方差为：$n=\frac{1}{10}\left[(12.6-12.5)^{2}\times 2+(12.3-12.5)^{2}+(12.5-12.5)^{2}\times 3+(12.7-12.5)^{2}\times 2+(12.4-12.5)^{2}+(12.2-12.5)^{2}\right]=0.024$

    ∴$n<0.056$，

    故答案为：$\gt$；

    【小问3详解】

    解：丙的平均数$p=\frac{12.4+12.4+12.5+12.7+12.8+12.8+12.8+12.8+12.9+12.9}{10}=12.7$，

    ∴丙的平均数最大，则实力最弱，

    ∵方差$0.024<0.034<0.056$，

    ∴乙实力最强，

    ∵丁的测试成绩中位数为$12.45$，

    ∴第$5,6$次成绩和为$24.9$，

    ∴前5次测试成绩小于平均数，

    ∵甲测试成绩小于平均数12.5的次数有2次，

    ∴丁比甲强，

    ∴这四名运动员按实力由强到弱依次为：乙、丁、甲、丙，

    故答案为：乙、丁、甲、丙．'
