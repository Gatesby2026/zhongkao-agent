  question: '如图，在平面直角坐标系xOy中，A，B分别是横、纵轴正半轴上的动点，四边形$OACB$是矩形，函数$y=\frac{1}{x}(x>0)$的图象与边AC交于点M，与边BC交于点N（M，N不重合）．给出下面四个结论：

    [图]

    ①$\triangle COM$与$\triangle CON$的面积一定相等；

    ②$\triangle MON$与$\triangle MCN$的面积可能相等；

    ③$\triangle MON$一定是锐角三角形；

    ④$\triangle MON$可能是等边三角形．

    上述结论中，所有正确结论的序号是（）

    A.①③

    B.①④

    C.②③

    D.②④'
  answer: B
  solution: '解：∵四边形$OACB$是矩形，

    ∴$S_{\triangle OBC}=S_{\triangle ABC}$

    又∵$M,N$是反比例函数$y=\frac{1}{x}(x>0)$图象上的动点，$BN \perp y$轴，$MA \perp x$轴，

    ∴$S_{\text{阴影}} = S_{\text{扇形}} = \frac{1}{2}$

    ∴$S_{\triangle OBC}-S_{\triangle OBM}=S_{\triangle MOC}-S_{\triangle AOM}$，即$\triangle COM$与$\triangle CON$的面积一定相等；故①正确，

    由①可得$S_{\text{阴影}} = S_{\text{扇形}} = \frac{1}{2}$

    当$\triangle MON$与$\triangle MCN$的面积相等时，如图，连接AB，BM

    [图]

    ∴$S_{\triangle NQ M}+S_{\triangle O M N}=S_{\triangle B H N}+S_{\triangle O B N}=\frac{1}{2} S_{\text {四边形 } B H Q N}=S_{\triangle A H N}=S_{\triangle A H U}$

    ∴N在直线BM上，则$M,N$重合，

    ∴$\triangle MON$与$\triangle MCN$的面积不可能相等；

    ∵等边三角形和反比例函数都是轴对称图形，当对称轴为直线$y=x$，$\triangle MON$可能是等边三角形，故④正确．

    如图

    [图]

    当$M,N$在$y=x$的同侧时，$\triangle MON$可能是钝角三角形，故③错误

    [图]

    综上，①④正确、②③错误，

    故选：B．'
