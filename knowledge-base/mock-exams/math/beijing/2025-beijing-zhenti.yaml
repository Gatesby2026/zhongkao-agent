  solution: '解：设胸腹高为xcm，则单根膀条长为$5\mathrm{cm}$，门条AD的长度为$(5x-10)\mathrm{cm}$，$BC=\frac{5}{9}(5x-10)\mathrm{cm}$，$AB=CD=x$，头部高为x，尾部高为$2x$，这只风筝的骨架的总高为$4x$，

