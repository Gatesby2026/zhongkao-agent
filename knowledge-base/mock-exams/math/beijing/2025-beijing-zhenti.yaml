  question: '在$V_{ABC}$中，$\angle ACB=90^\circ$，$\angle ABC = \alpha$，点D在射线BC上，连接AD，将线段AD绕点A逆时针旋转$180^\circ-2\alpha$得到线段AE（点E不在直线AB上），过点E作$EF \parallel AB$，交直线BC于点F．

