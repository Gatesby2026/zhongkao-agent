  question: '如图，以菱形$ABCD$的边AD为直径作$\odot\odot$交AB于点E，连接DB交$\odot\odot$于点$M, F$是BC上的一点，且$BF = BE$，连接DF．

    [图]

    （1）求证：$DM = BM$；

    （2）求证：DF是$\odot\odot$的切线．'
  answer: （1）见解析； （2）见解析
  solution: '【小问1详解】

    解：连接AM，

    ∵AD为$\odot\odot$的直径，

    ∴$\angle AMD = 90^\circ$，

    ∴$AM \perp BD$，

    ∵四边形$ABCD$是菱形，

    ∴$AD = AB$，

    ∴点M是BD的中点，

    ∴$DM = BM$；

    [图]【小问2详解】

    解：连接DE，

    [图]

    ∵四边形$ABCD$是菱形，

    ∴$\angle DBE=\angle DBF$，$\angle DAB + \angle ABC = 180^\circ$，

    ∴在$\triangle DBE$和$\triangle DBF$，

    $\begin{aligned}

    &BE=BF\\

    &\angle DBE=\angle DBF\\

    &BD=BD

    \end{aligned}$，

    ∴$\triangle D B E \cong \triangle D B F (S A S)$，

    ∴$\angle DEB = \angle DFB$，

    ∵AD是$\odot\odot$的直径，

    ∴$\angle AED = \angle DEB = 90^\circ$，

    ∴$\angle BFD=\angle DEB=90^{\circ}$，

    ∵$\angle DAB + \angle ABC = 180^\circ$，

    ∴在四边形$ABFD$中，$\angle ADP + \angle BPE = 180^\circ$，

    ∴$\angle ADF = 90^\circ$，

    ∴$AD \perp DF$，

    ∴DF是$\odot\odot$的切线．'
