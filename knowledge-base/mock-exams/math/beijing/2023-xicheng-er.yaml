  question: '下面的三个问题中都有两个变量：

    ①京沪铁路全程为$1463km$，某次列车的平均速度y(单位：km/h)与此次列车的全程运行时间x(单位：h)；

    ②已知北京市的总面积为$1.68\times10^{4}\mathrm{km}^{2}$，人均占有面积y(单位：$\mathrm{km}^{2}$/人)与全市总人口x(单位：人)；

    ③某油箱容量是$50L$的汽车，加满汽油后开了$200km$时，油箱中汽油大约消耗了$\frac{1}{4}$．油箱中的剩油量yL与加满汽油后汽车行驶的路程xkm．

    其中，变量y与变量x之间的函数关系可以用如图所示的图象表示的是()

    [图]

    A.①②B.①③C.②③D.①②③'
  answer: A
  solution: '解：①由平均速度等于路程除以时间得：$y=\frac{1463}{x}$，符合题意；

    ②由人均面积等于总面积除以总人口得：$y=\frac{1.68\times10^{4}}{x}$，即$y=\frac{16800}{x}$，符合题意；

    ③由加满汽油后开了$200km$时，油箱中汽油大约消耗了$\frac{1}{4}$，可知每公里油耗为：$\frac{1}{4} \times 50 + 200 = \frac{1}{16}(L)$，再由油箱中的剩油量等于油箱容量减去耗油量，耗油量等于每公里油耗乘以加满汽油后汽车行驶的路程得：$y=50-\frac{1}{16}x$，不符合题意；

    综上分析可知，变量y与变量x之间的函数关系可以用该图象表示的是①②．

    故选：A．'
