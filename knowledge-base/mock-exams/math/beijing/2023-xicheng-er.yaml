  question: '实数a在数轴上的位置如图所示，则a，$-a$，$a^2$，$\frac{1}{a}$中最大的是()

    $\begin{tikzpicture}

    \draw[->] (-3,0) -- (3,0);

    \draw (-2,0) -- (-2,-0.1);

    \draw (-1,0) -- (-1,-0.1);

    \draw (0,0) -- (0,-0.1);

    \draw (1,0) -- (1,-0.1);

    \draw (2,0) -- (2,-0.1);

    \node at (-2,-0.5) {$-1$};

    \node at (0,-0.5) {$0$};

    \node at (1,-0.5) {$1$};

    \fill (0.5,0) circle (2pt);

    \node at (0.5,0.4) {$a$};

    \end{tikzpicture}$

    A.aB.$-a$C.$a^2$D.$\frac{1}{a}$'
  answer: D
  solution: '解：由数轴可知：$0<a<1$，

    ∴$-a < 0$，$\frac{1}{a}>1$．

    又∵$0<a<1$，

    ∴两边乘以a得：$0<a^{2}<a$，

    ∴$-a<0<\alpha^{2}<a<1\leq\frac{1}{a}$，

    ∴a，$-a$，$a^2$，$\frac{1}{a}$中，最大的是$\frac{1}{a}$．

    故选：D'
