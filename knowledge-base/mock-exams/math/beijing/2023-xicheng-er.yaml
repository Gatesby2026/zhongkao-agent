  answer: （1）见解析（2）$OE = \sqrt{37}$
  solution: '【小问1详解】

    ∵四边形$ABCD$是矩形，

    ∴$AC=BD,\ AD\parallel BC$，

    又∵$DE \parallel AC$，

    ∴四边形$ADEC$是平行四边形，

    ∴$AC = DE$，

    ∴$BD = DE$；

    【小问2详解】

    如图，过点O作$OF \perp CD$于点F，

    [图]

    ∵四边形$ABCD$是矩形，

    ∴$AC = BD,$点O是$AC,BD$$[公式]$中点，$AD = BC - 4,$

    ∴$OC=\frac{1}{2}AC,OB=\frac{1}{2}BD,$

    ∴$OC = OB,$

    ∴$CF-BF=\frac{1}{2}BC=2$，

    ∴F点是BC的中点，

    ∴OF是$\triangle BCD$的中位线，

    ∴$OF=\frac{1}{2}CD=1,$

    又∵四边形$ADEC$是平行四边形，

    ∴$CE = AD = 4,$．

    ∴$EF+CF+CE=2+4=6$．

    在$\mathrm{Rt}\triangle OEF$中，由勾股定理可得：$OE=\sqrt{OF^{2}+EF^{2}}=\sqrt{1^{2}+6^{2}}=\sqrt{37}$．'
