  question: '方程组$\begin{cases}

    x + y = 3, \\

    3x - y = 5

    \end{cases}$的解是（　　）

    A.$\left\{

    \begin{array}{l}

    x = \dfrac{1}{2} \\

    y = \dfrac{5}{2}

    \end{array}

    \right.$B.$\left\{

    \begin{array}{l}

    x = \dfrac{5}{2} \\

    y = -\dfrac{1}{2}

    \end{array}

    \right.$C.$\left\{\begin{array}{l}x=2,\\y=1\end{array}\right.$D.$\left\{

    \begin{array}{l}

    x=1,\\

    y=2

    \end{array}

    \right.$'
  answer: C
  solution: '解：$\begin{aligned}

    x + y &= 3 \quad (1) \\

    3x - y &= 5 \quad (2)

    \end{aligned}$，

    $1+2$得，$4x=8,$

    解得，$x = 2,$

    把$x=2$代入①得，$2+y=3,$

    解得，$y = 1,$

    ∴方程组的解为：$\left\{\begin{array}{l}x=2,\\y=1\end{array}\right.$

    故选：C'
