  question: '在平面直角坐标系xOy中，点$(x_{1},y_{1})$，$(x_{2},y_{2})$都在抛物线$y = ax^2 - 2ax + 8 \, (a < 0)$上，且$-1<x_{1}<2$，$1-m<x_{1}<m+7$．

    （1）当$m = -2$时，比较$y_{1}$，$y_{2}$的大小关系，并说明理由；

    （2）若存在$x_1$，$x_2$，满足$y_{1}=y_{2}$，求m的取值范围．'
  answer: （1）$y_{1}>y_{2}$，理由见解析 （2）$m > -2$
  solution: '【小问1详解】

    解：$y_{1}>y_{2}$，理由如下，

    ∵$y=ax^{2}-2ax+8=a(x-1)^{2}+8-a$，

    ∴抛物线的对称轴是直线$x = 1$，二次函数图像的开口向下，在对称轴的左边y随x的增大而增大，在对称轴的右边y随x的增大而减小，

    ∵当$-1<x_{1}<2$时，$x=-1$时，$y_{1}$的值最小，

    ∴$x_{1}=a\times(-1)^{2}-2a\times(-1)+8$，即$y_{1}>3a+8$，

    当$m = -2$时，$3 < x_{2} < 5$，

    则当$3 < x_{2} < 5$时，$x=3$时，$y_{2}$有最大值，

    ∴$y_{1}=ax^{3}-2ax+3-8$，即$y_{2}<3a+8$，

    ∴当$-1<x_{1}<2$时的最小值大于$3 < x_{2} < 5$时的最大值，

    ∴$y_{1}>y_{2}$．

    【小问2详解】

    解：∵$1-m<x_{1}<m+7$，

    ∴$1 - m < m + 7$，

    ∴$m > -3$，

    ∵存在$x_1$，$x_2$，满足$y_{1}=y_{2}$，且$-1<x_{1}<2$，

    ∴$1-m<3$，

    ∴$m > -2$，

    综上所述，m的取值范围$m > -2$．'
