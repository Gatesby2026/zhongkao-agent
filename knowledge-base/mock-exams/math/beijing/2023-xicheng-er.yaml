  question: 已知$a^{2}+a-5=0$，求代数式$\left(a-\frac{1}{a}\right)+\frac{a-1}{a^{2}}$的值．
  answer: 化简为：$a^{2}+a$，结果值为：5
  solution: '解：$\left(a-\frac{1}{a}\right)+\frac{a-1}{a^{2}}$

    $= \frac{a^{2}-1}{a} \times \frac{a^{2}}{a-1}$

    $\frac{(a+1)(a-1)}{a}\times\frac{a^{2}-1}{a}$

    $= a^{2} + a$，

    $x^{2}-a x+a-5=0$

    $a^{2}+a=\pi$

    $\left(a-\frac{1}{a}\right)+\frac{a-1}{a^{2}}=a^{2}+a=5$．'
