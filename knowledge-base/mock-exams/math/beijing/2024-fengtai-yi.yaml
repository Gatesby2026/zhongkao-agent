  question: '在平面直角坐标系xOy中，$M(2,y_{1})$，$N(5,y_{2})$是抛物线$y = x^2 - 2ax$上的两点．

    （1）直接写出一个a的值，使得$y_1 < y_2$成立；

    （2）$P(x_1,y_3)$是抛物线$y = x^2 - 2ax$上不同于M，N的点，若对于$0 < x_{3} \leq 1$，都有$y_{1}<y_{3}<y_{2}$，求a的取值范围．'
  answer: （1）$a = 3$（答案不唯一） （2）$\frac{3}{2}<a\leq\frac{5}{2}$
  solution: '【小问1详解】

    解：根据抛物线$y = x^2 - 2ax$可得，

    该抛物线开口向上，对称轴为：$x=\frac{-2a}{2}=a$，

    若使得$y_1 < y_2$成立，

    则M点要比N点离对称轴比较近，或者M点和N点都在对称轴右侧，

    $M(2,y_{1})$，$N(5,y_{2})$中点的横坐标为：$\frac{2+5}{2}=3.5$，

    ∴$a<3.5$，

    ∴$a = 3$（答案不唯一）；

    【小问2详解】

    解：∵二次函数解析式为$y = x^2 - 2ax$，

    ∴函数图像开口向上，对称轴为$x = a$，

    ①当$a \leq x_{3}$时，

    ∴点P，M，N均在对称轴右侧，

    ∴由二次函数性质，必有$y_{3}<y_{1}<y_{2}$，不符题意舍去；

    ②当$x_{3} \leq a < 2$时，

    ∵点P在对称轴左侧，设P点关于$x = a$的对称点为$P''$，

    则点$P''$的坐标为$(2a-x_{2},y_{1})$，

    ∵点$P''$，M，N在对称轴右侧，且$y_{1}<y_{3}<y_{2}$，

    ∴$2<2a-x_{3}$，

    ∴$\frac{3}{2}<a<2$；

    ③当$2 \leq a \leq 5$时，

    ∵点P和M在对称轴左侧，由函数性质，有$y_1 < y_3$，

    ∵点$P''$，N在对称轴右侧，且$y_{3}<y_{2}$，

    ∴$2a - x_{3} < 5$，

    ∴$[公式]$；

    ④当$a > 5$时，

    ∴点P，M，N均在对称轴左侧，

    ∴由二次函数性质，必有$y_{3}>y_{1}>y_{2}$，不符题意舍去；

    由①②③④可知，$\frac{3}{2}<a\leq\frac{5}{2}$．'
