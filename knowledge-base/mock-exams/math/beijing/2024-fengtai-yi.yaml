  question: '如图，在$Rt\triangle ABC$中，$\angle C=90^{\circ}$，延长CB至D，使得$BD = CB$，过点A，D分别作$AE \parallel BD$，$DE \parallel BA$，AE与DE交于点E，连接BE．

    [图]

    （1）求证：四边形$ACBE$是矩形；

    （2）连接AD，若$AD = 5\sqrt{2}$，$\tan \angle BAC = \frac{2}{3}$，求AC的长．'
  answer: （1）见解析（2）$3\sqrt{2}$
  solution: '【小问1详解】

    证明：（1）∵$AE \parallel BD$，$DE \parallel BA$，

    ∴四边形$ABDE$是平行四边形．

    ∴$AE = BD$．

    ∵$BD = CB$，

    ∴$AE = CB$．

    ∵$AE \parallel BD$，

    ∴四边形$ACBE$是平行四边形．

    ∵$\angle C=90^{\circ}$，

    ∴四边形$ACBE$是矩形．

    【小问2详解】

    ∵在$Rt\triangle ABC$中，$\angle C=90^{\circ}$，$\tan\angle BAC=\frac{BC}{AC}=\frac{2}{3}$，

    ∴设$BC = 2x$，$AC = 3x$，

    ∴$BD = BC = 2x$，

    ∴$DC = 4x$，

    在$Rt\triangle ADC$中，$\angle C=90^{\circ}$，$AD = 5\sqrt{2}$，

    ∵$AC^{2} + DC^{2} = AD^{2}$，

    ∴$(3x)^{*}+(4x)^{y}=(5\sqrt{2})^{2}$，

    解得，$x = \sqrt{2}$，

    ∴$AC = 3x = 3\sqrt{2}$．'
