  question: '车间里有五台车床同时出现故障．已知第一台至第五台修复的时间如下表：

    车床代号

    A

    B

    C

    D

    E

    修复时间（分钟）

    15

    8

    29

    7

    10

    若每台车床停产一分钟造成经济损失10元，修复后即可投入生产．

    （1）若只有一名修理工，且每次只能修理一台车床，则下列三个修复车床的顺序：

    ①$D \to B \to E \to A \to C$；②$D \to A \to C \to E \to B$；③$C \to A \to E \to B \to D$中，经济损失最少的是______（填序号）；

    （2）若由两名修理工同时修理车床，且每台车床只由一名修理工修理，则最少经济损失为______元．'
  answer: ①.①②.1010
  solution: '解：（1）①总停产时间：$5\times7+4\times8+3\times10+2\times15+29=156$分钟，

