  question: '如图，在正方形$ABCD$中，点E，F分别是$AD, AB$边上的点，$AE = AF$，且$0 < AE < ED$，过点E作$EH \perp BC$于点H，过点F作$FG\perp CD$于点G，$EH, FG$交于点D，连接$OB, OD, BD.$设$AE = a$，$ED = b$，$BD = c$，给出下面三个结论：

    ①$a+b\sqrt{a^{2}+b^{2}}$；②$2\sqrt{a^{2}+b^{2}}>c$；③$a+b>\frac{\sqrt{2}}{2}c$．

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①②B.①③C.②③D.①②③'
  answer: A
  solution: '解：∵四边形$ABCD$是正方形，

    ∴$AB = AD, BD = \sqrt{AB^{2} + AD^{2}} = \sqrt{2}AD$

    ∴$AD = AE + ED = \frac{\sqrt{2}}{2}BD$

    即：$a+b=\frac{\sqrt{2}}{2}c$，故③错误；

    ∵$EH \perp BC$，$FG\perp CD$，

    ∴四边形$AEHB, AFGD, AFQE$均是矩形

    ∵$AE = AF$，

    ∴四边形$AFOE$是正方形

    ∴$AE = AF = OE = OF = a$

    ∴$OD = \sqrt{DE^{2} + OE^{2}} = \sqrt{a^{2} + b^{2}}$

    ∵$OE + DE > DO$

    ∴$a+b\sqrt{a^{2}+b^{2}}$，故①正确；

    ∵$AD = AB, AE = AF$,

    ∴$DE = BF$

    ∵$\angle DEO=\angle BFO=90^\circ,OE=OF,$

    ∴$\triangle DEO\cong\triangle BFO$

    ∴$OD=BO=\sqrt{a^{2}+b^{2}}$

    ∵$BO + DO > BD$

    ∴$2\sqrt{a^{2}+b^{2}}>c$，故②正确；

    故选：A'
