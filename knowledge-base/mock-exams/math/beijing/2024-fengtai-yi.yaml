  question: '小刚对诗仙李白的诗作《早发白帝城》中“朝辞白帝彩云间，千里江陵一日还”的说法产生疑问：李白真能在一日之内从白帝城到达江陵吗?小刚经过查阅资料得知，白帝城是现今的重庆奉节，而江陵是现今的湖北荆州．假设李白乘坐的轻舟从奉节到宜昌的速度约为$14\mathrm{km/h}$，从宜昌到荆州的速度约为$10\,\text{km/h}$．从奉节到荆州的水上距离约为$350km$．经过分析资料，小刚发现从奉节到宜昌的时间比从宜昌到荆州多$1h$．根据小刚的假设，回答下列问题：

    [图]

    （1）奉节到宜昌的水上距离是多少km？

    （2）李白能在一日（$24h$）之内从白帝城到达江陵吗？说明理由．'
  answer: （1）奉节到宜昌的水上距离为$210km$ （2）李白不能在一日之内从白帝城到达江陵，见解析．
  solution: '【小问1详解】

    解：（1）设奉节到宜昌的水上距离是xkm．

    根据题意得：$\frac{x}{14}-\frac{350-x}{10}=1$，解得$x=210$．

    答：奉节到宜昌的水上距离为$210km$．

    【小问2详解】

    ∵$\frac{210}{14} - \frac{350 - 210}{10} = 15 + 14 = 29 > 24$，

    ∴李白不能$[公式]$一日之内从白帝城到达江陵．'
