  question: '如图，四边形$ABCD$是$\odot\odot$的内接四边形，AB是直径，C是$\widehat{BD}$的中点，过点C作$\odot\odot$的切线CE交AD的延长线于点E．

    [图]

    （1）求证：$CE \perp AE$；

    （2）连接BD，若$BC = 6$，$AC = 8$，求BD的长．'
  answer: （1）见解析（2）$BD=9.6$
  solution: '【小问1详解】

    连接OC，

    ∵CE为$\odot\odot$的切线，

    ∴$OC \perp CE$．

    ∴$\angle OCE=90^{\circ}$．

    ∵C是$\widehat{BD}$的中点，

    ∴$\widehat{CB}=\widehat{CD}$，

    ∴$\angle EAC = \angle CAO$．

    ∵$OA = OC$，

    ∴$\angle CAO = \angle ACO$，

    ∴$\angle EAC = \angle ACO$．

    ∴$CO \parallel AE$，

    ∴$\angle E+\angle OCE=180^{\circ}$，

    ∴$\angle E=90^{\circ}$，

    ∴$CE \perp AE$．

    [图]【小问2详解】

    ∵AB为直径，

    ∴$\angle ACB=\angle ADB=90^{\circ}$．

    ∵$BC = 6$，$AC = 8$，

    ∴$AB = 10$．

    ∵$\angle EAC = \angle CAO$，$\angle E=\angle ACB$，

    ∴$\triangle ACE \sim \triangle ABC$．

    ∴$\frac{CE}{BC} = \frac{AC}{AB}$．

    ∴$CE = 4.8$．

    ∵$\angle E=\angle BDE=\angle ECO=90^{\circ}$，

    ∴四边形$EDFC$是矩形．

    ∴$DF = EC = 4.8$，$OC \perp BD$，

    ∴$OF \parallel AD$，

    ∴$\frac{BD}{DF}=\frac{AB}{AO}=2$，

    ∴$BD = 2DF = 9.6$．'
