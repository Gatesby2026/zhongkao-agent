    ③总停产时间：$5\times29+4\times15+3\times10+2\times8+7=258$分钟，

    故答案为：①；

    （2）一名修理工修按D，E，C的顺序修，另一名修理工修按B，A的顺序修，

    $7\times5+1\times4+9\times3+6\times2+23=101$分钟，

    $161\times10=1610$（元）

    故答案为：1010．'
