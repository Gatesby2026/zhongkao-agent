  question: '为了增强学生体质，某校九年级举办了小型运动会．其中男子立定跳远项目初赛成绩前$10$名的学生直接进入决赛．现将进入决赛的$10$名学生的立定跳远成绩（单位：厘米），数据整理如下：

    a．$10$名学生立定跳远成绩：$244,243,241,240,240,238,238,238,237,236$

