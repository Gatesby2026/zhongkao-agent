  question: '已知实数a，b满足$a > b - 1$，则下列结论正确的是（）

    A.$a > b$B.$a < b$C.$a+2>b+1$D.$a+2<b+1$'
  answer: C
  solution: '解：A．当$a = 1, b = 1.1$，满足$a > b - 1$，但$a < b$，故A不正确；

    B．当$a = 1, b = 0$，满足$a > b - 1$，但$a > b$，故B不正确；

    C．∵$a > b - 1$，∴$a+2>b-1+2$，∴$a+2>b+1$，故C正确；

    D∵$a > b - 1$，∴$a+2>b-1+2$，∴$a+2>b+1$，故D不正确．

    故选C．'
