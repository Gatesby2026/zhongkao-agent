    ∵$237.6 < 239$，

    ∴乙、丙的成绩更高，

    由题意知，乙的成绩分布为$235-244$，丙的成绩分布为$237-242$，

    ∴丙的数据波动较小，具有更好的稳定性，

    故答案为：$240$，丙．'
