  answer: （1）$m = 239$，$n = 238$ （2）①$240$；②丙
  solution: '【小问1详解】

    解：将成绩从小到大依次排序为$236,237,238,238,238,240,240,241,243,244$，

    ∴中位数为第5、6位数的平均数为$m = \frac{238 + 240}{2} = 239$，

    众数为$n = 238$，

    ∴$m = 239$，$n = 238$；

    【小问2详解】

    ①解：设第5次测试成绩为x，

    依题意得，$236+238+240+237+x=238\times5$，

    解得，$x>239$，

    ∴第5次测试成绩至少为$240$，

    故答案$[公式]$：$240$；

