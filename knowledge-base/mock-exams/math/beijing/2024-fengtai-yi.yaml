  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(2,1)$和$B(0,-1)$．

    （1）求该函数解析式；

    （2）当$x > -2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值小于函数$y=kx+b\ (k\neq0)$的值且大于$-4$，直接写出n的取值范围．'
  answer: （1）$y=x-1$ （2）$-3 \leq n \leq -2$
  solution: '【小问1详解】

    解：由题意得：将点$A(2,1)$和$B(0,-1)$代入$y=kx+b\,(k\neq0)$中得：

    $\left\{ \begin{array} { l } { 2 k + b = 1 } \\ { b = - 1 } \end{array} \right.$，解得：$\left\{\begin{array}{l}k=1\\b=-1\end{array}\right.$，

    ∴该函数解析式为：$y=x-1$；

    $[公式]$小问2详解】

    解：当$x = -2$时，代入$y=x-1$得：$y=-3$，

    在平面直角坐标系中画出直线$y=x-1$和满足条件的直线$y = \frac{1}{2}x + n$，如图：

    [图]

    ∵当$x > -2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值小于函数$y=kx+b\,(k\neq0)$的值，

    ∴当$y = \frac{1}{2}x + n$过$(-2, -3)$时满足题意

    ∴$\frac{1}{2} \times (-2) + n = -3$，$n = -2$，

    ∵当$x > -2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值大于$-4$，

    ∴当$y = \frac{1}{2}x + n$过$(-2,-4)$时满足题意，

    ∴$\frac{1}{2} \times (-2) + n = -4$，$n = -3$，

    综上：满足条件的n的取值范围为：$-3 \leq n \leq -2$．'
