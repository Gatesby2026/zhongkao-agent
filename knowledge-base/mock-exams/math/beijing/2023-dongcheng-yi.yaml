  answer: （1）证明见解析 （2）$55^\circ$，$2\sqrt{5}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$AD \parallel BC$，

    ∴$\angle ADB = \angle CBD$，

    ∵BD平分$\angle ABC$，

    ∴$\angle ABD = \angle CBD$，

    ∴$\angle ABD = \angle ADB$，

    ∴$AB = AD$，

    ∴平行四边形$ABCD$是菱形；

    【小问2详解】

    解：∵四边形$ABCD$是菱形，

    ∴$AB\parallel CD,\ \angle DOC=90^{\circ},\ BD=2OD$，

    ∴$\angle DCE = \angle ABC = 70^\circ$，$\angle BCD=180^{\circ}-\angle ABC=110^{\circ}$；

    ∵$\angle CEM = 15^\circ$，

    ∴$\angle DCM=\angle DCB-\angle CEM=55^{\circ}$；

    ∵四边形$ABCD$是菱形，

    ∴$\angle ACD = \frac{1}{2} \angle BCD = 55^\circ$，

    ∴$\angle ACD = \angle MCD$，

    又∵$OD \perp AC, DF \perp CM$，

    ∴$OD = DF = \sqrt{5}$，

    ∴$BD=2OD=2\sqrt{5}$．'
