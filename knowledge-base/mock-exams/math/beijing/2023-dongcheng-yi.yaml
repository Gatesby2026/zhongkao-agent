  answer: C
  solution: '解：假设$AB = 1$，则$BP-AB-AP=1-x$，

    ∴$y=S_{\triangle ABD}-S_{\triangle ABC}-S_{\triangle BCD}$

    $=\frac{\pi}{2}\times\left(\frac{1}{2}\right)^{2}-\frac{\pi}{2}\times\left(\frac{x}{2}\right)^{2}-\frac{\pi}{2}\times\left(\frac{1-x}{2}\right)^{2}$

    $\frac{\pi}{8}-\frac{xx^{2}}{8}-\frac{\pi\left(x^{2}-2x+1\right)}{8}$

    $=-\frac{\pi}{4}x^{2}+\frac{\pi}{4}x$，

    故选C．'
