  question: '如图，动点P在线段AB上（不与点A，B重合），分别以$AB,\ AP,\ BP$为直径作半圆，记图中所示的阴影部分面积为y，线段AP的长为x．当点P从点A移动到点B时，y随x的变化而变化，则表示y与x之间关系的图象大致是（）

