  question: '如图，AB是$\odot\odot$的直径，点C，D在$\odot\odot$上，点D为$\overline{AC}$的中点，$\odot\odot$的切线DE交BA的延长线于点E，连接$AC, BC, CD$．

    [图]

    （1）求证：$\angle E=\angle BAC$；

    （2）若$\odot\odot$的半径长为5，$\cos E = \frac{4}{5}$，求CD和DE的长．'
  answer: （1）见解析 （2）$CD=2\sqrt{5}$；$DE = \frac{20}{3}$．
  solution: '【小问1详解】

    证明：∵点D为$\overline{AC}$的中点，

    ∴$OD \perp AC$，

    [图]

    ∵DE是$\odot\odot$的切线，

    ∴$OD \perp DE$，

    ∴$DE \parallel AC$，

    ∴$\angle E=\angle BAC$；

    【小问2详解】

    解：由（1）得$OD \perp AC$，$\cos\angle OAP=\cos E=\frac{4}{5}$，

    ∵$\odot\odot$的半径长为5，$\cos\angle OAP=\frac{AF}{AO}=\frac{4}{5}$，

    ∴$AF = 4$，$OF=\sqrt{OA^{2}-AP^{2}}=3$，

    ∴$DF=OD-OF=2$，

    在$Rt\triangle ADF$中，由勾股定理得$AD=\sqrt{DF^{2}+AF^{2}}=2\sqrt{5}$，

    ∵点D为$\overline{AC}$的中点，

    ∴$CD = AD = 2\sqrt{5}$；

    ∵$DE \parallel AC$，

    ∴$\triangle OAF \cong \triangle OED$，

    ∴$\frac{OF}{OD} = \frac{AF}{DE}$，即$\frac{3}{5}=\frac{4}{DE}$，

    ∴$DE = \frac{20}{3}$．'
