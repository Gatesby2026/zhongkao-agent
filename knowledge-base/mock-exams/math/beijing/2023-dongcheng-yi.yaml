  question: '已知抛物线$y=ax^{2}-2ax(a\neq 0)$．

    （1）求该抛物线的顶点坐标（用含a的式子表示）；

    （2）当$a > 0$时，抛物线上有两点$(-1,s)$，$(k,t)$，若$s > t$时，直接写出k的取值范围；

    （3）若$A(m-1,y_{1})$，$B(m,y_{2})$，$C(m+3,y_{2})$都在抛物线上，是否存在实数m，使得$x_1 < y_1 < y_2 \leq -a$恒成立？若存在，求出m的取值范围；若不存在，请说明理由．'
  answer: （1）$(1,-a)$ （2）$-1 < k < 3$ （3）$-\frac{1}{2} < m < 0$
  solution: '【小问1详解】

    解：∵$y = ax^{2} - 2ax = a(x - 1)^{2} - a$，

    ∴该抛物线的顶点坐标为：$(1,-a)$．

    【小问2详解】

    解：$a > 0$时，抛物线的开口向上，且对称轴为直线$x = 1$，

    ∴离对称轴越远函数值越大，

    ∴要使$s > t$，则$\left|k-1\right|<1-\left(-1\right)$，

    ∴此时k的取值范围是；

    综上分析可知，k的取值范围是$-1 < k < 3$．

    【小问3详解】

    解：∵抛物线解析式为$y = ax^{2} - 2ax = a(x - 1)^{2} - a$，

    ∴抛物线对称轴为直线$x = 1$，顶点坐标为$(l,\ a)$，

    当$a > 0$时，抛物线开口向上，则抛物线此时有最小值$-a$，不可能满足$x_1 < y_1 < y_2 \leq -a$；

    当$a<0$时，则离对称轴越远函数值越小，

    ∵$x_1 < y_1 < y_2 \leq -a$，

    ∴$|m-1|-|m+3|>|m-1|$，即$|m-2|>m+2>|m-1|$,

    ∴$m^{2}-4m+4> m^{2}+4m+4> m^{2}-2m+1$，

    ∴$-\frac{1}{2} < m < 0$．'
