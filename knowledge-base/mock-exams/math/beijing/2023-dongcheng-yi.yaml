  question: '一枚质地均匀的骰子放在棋盘上，骰子的六个面上分别刻有$1$到$6$的点数，相对两个面上的点数之和为$7.$骰子摆放的初始位置如图所示$\cdot$骰子由初始位置翻滚一次，点数为$1$的面落在$1$号格内；再从$1$号格翻滚一次，点数为$5$的面落在$2$号格内；继续这样翻滚$[公式]$

    [图]

    （1）当骰子翻滚到$2$号格时，朝上一面的点数为______；

    （2）依次翻滚$6$次到$6$号格，每次翻滚后骰子朝上一面的点数之和为______．'
  answer: ①.$2$ ②.$21$
  solution: '解：（1）根据题意可知，$1$的对面为$6$，3的对面是$4$，5的对面是$2$，

    骰子由初始位置翻滚一次，点数为$1$的面落在$1$号格内；则朝上一面的点数为$6$，

    再从$1$号格翻滚一次，点数为$5$的面落在$2$号格内；则朝上一面的点数为$2$；

    故答案为：2；

    （2）再从$2$号格翻滚一次，点数为$6$的面落在$3$号格内；则朝上一面的点数为$1$，

    再从$3$号格翻滚一次，点数为$3$的面落在$4$号格内；则朝上一面的点数为$4$，

    再从$4$号格翻滚一次，点数为$2$的面落在$5$号格内；则朝上一面的点数为$5$，

    再从$5$号格翻滚一次，点数为$4$的面落在$6$号格内；则朝上一面的点数为$3$，

    每次翻滚后骰子朝上一面的点数之和为$6+2+1+4+5+3=21$；

    故答案为：$21$．'
