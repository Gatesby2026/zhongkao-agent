  question: '某校开展了“学习二十大”的知识竞赛（百分制），七、八年级学生参加了本次活动．为了解两个年级的答题情况，该校从每个年级各随机抽取了30名学生的成绩，并对数据（成绩）进行了整理、描述和分析．下面给出了部分信息．

    a．七年级成绩的频数分布直方图如下

    （数据分成五组：$50 \leq x < 60$，$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x \leq 100$）；

    [图]

    b．七年级成绩在$80 \leq x < 90$的数据如下（单位：分）：

    80    81    85    85    85    85    85    85    85    85    88    89

    c．七、八年级各抽取的30名学生成绩的平均数、中位数、众数、方差如下表：

    | 年级 | 平均数 | 中位数 | 众数 | 方差 |

    | --- | --- | --- | --- | --- |

    | 七年级 | 80.4 | m | n | 141.04 |

    | 八年级 | 80.4 | 83 | 84 | 86.10 |

    根据以上信息，回答下列问题：

    （1）表中$m =$______，$n =$______；

    （2）下列推断合理的是______；

    ①样本中两个年级数据的平均数相同，八年级数据的方差较小，由此可以推断该校八年级学生成绩的波动程度较小；

    ②若八年级小明同学的成绩是84分，可以推断他的成绩超过了该校八年级一半以上学生的成绩．

    （3）竞赛成绩80分及以上记为优秀，该校七年级有600名学生，估计七年级成绩优秀的学生人数．'
  answer: （1）83，85 （2）①② （3）340
  solution: '【小问1详解】

    解：由题意知，七年级成绩的中位数为第15、16位数的平均数，

    ∵$3+3+7=13$，$3+3+7+12=25$，

    ∴中位数m为$\frac{81+85}{2}=83$，

    由题意知，85出现8次，次数最多，

    ∴众数n为85，

    故答案为：83，85；

    【小问2详解】

    解：由题意知样本中两个年级数据的平均数相同，八年级数据的方差较小，由此可以推断该校八年级学生成绩的波动程度较小；推断合理，故①符合要求；

    若八年级小明同学的成绩是84分，因为$84 > 83$，所以可以推断他的成绩超过了该校八年级一半以上学生的成绩，推断合理，故②符合要求，

    故答案为：①②．

    【小问3详解】

    解：由题意知$600\times\frac{12-s}{30}=340$（名），

    ∴估计七年级成绩优秀的学生人数为340．'
