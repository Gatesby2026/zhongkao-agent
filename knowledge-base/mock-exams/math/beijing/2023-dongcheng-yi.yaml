  type: 解答
  score: 5
  question: '下面是证明三角形中位线定理的两种添加辅助线的方法，选择其中一种，完成证明．

    | 三角形中位线定理：三角形的中位线平行于三角形的第三边，并且等于第三边的一半． 已知：如图，点 D ， E 分别是 $\triangle ABC$ 的边 $AB, AC$ 的中点． 求证： $DE \parallel BC$ ，且 $DE=\frac{1}{2}BC$ ． [图] |  |

    | --- | --- |

    | 方法一 证明：如图，过点 C 作 $CF \parallel AB$ ，交 DE 的延长线于点 F ． [图] | 方法二 证明：如图，延长 DE 到点 F ，使得 $EF = DE$ ，连接 $FC, DC, AF$ ． [图] |'
  answer: 证明见解析
  solution: '方法一，证明：∵点D，E分别是$\triangle ABC$的边$AB, AC$的中点，

    ∴$AE = CE$，$AD = BD$，

    ∵$CF \parallel AB$，

    ∴$\angle A=\angle FCE$，

    ∵$\angle A=\angle FCE$，$AE = CE$，$\angle AED = \angle CEF$，

    ∴$\triangle AED\cong\triangle CEF(ASA)$，

    ∴$DE = EF$，$CF = AD$，

    ∴$DE=\frac{1}{2}DF$，$CF = BD$，

    ∴四边形$BCFD$是平行四边形，

    ∴$DF \parallel BC$，$DF = BC$，

    ∴$DE \parallel BC$，$DE=\frac{1}{2}BC$；

    方法二，证明：∵点D，E分别是$\triangle ABC$的边$AB, AC$的中点，

    ∴$AE = CE$，$AD = BD$，

    ∵$AE = CE$，$\angle AED = \angle CEF$，$AD = BD$，

    ∴$\triangle AED\cong\triangle CEF(SAS)$，

    ∴$CF = AD$，$\angle CFE = \angle ADE$，

