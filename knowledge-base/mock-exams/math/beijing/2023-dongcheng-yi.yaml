    ∴$EM = DG$，$\angle EMB=\angle DGC$，

    ∵$\angle EMB+\angle EMF=180^{\circ}=\angle EFM+\angle DFM$，

    ∴$\angle EMF = \angle EPM$，

    ∴$EM = EF$

    ∴$EF = DG$．

    [图]'
