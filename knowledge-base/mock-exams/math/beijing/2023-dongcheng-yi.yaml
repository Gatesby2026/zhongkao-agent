  question: '如图，$\angle AOB=40^\circ$，按下列步骤作图：①在OA边上取一点C，以点O为圆心、OC长为半径画弧，交OB于点D，连接CD；②以点C为圆心、OC长为半径画弧，交OB于点E，连接CE，则$\angle DCE$的度数为（）

    [图]

    A.$20^\circ$

    B.$30^\circ$

    C.$40^\circ$

    D.$50^\circ$'
  answer: B
  solution: '解：由作法得$OC = OD$，$CO = CE$，

    ∵$OC = OD$，

    ∴$\angle OCD=\angle ODC=\frac{1}{2}\times(180^\circ-\angle AOB)=\frac{1}{2}\times(180^\circ-40^\circ)=70^\circ$，

    ∵$CO = CE$，

    ∴$\angle CEO = \angle COE = 40^\circ$，

    ∵$\angle ODC=\angle DCE+\angle CEO$，

    ∴$\angle DCE = \angle ODC - \angle CEO = 70^\circ - 40^\circ = 30^\circ$．

    故选：B．'
