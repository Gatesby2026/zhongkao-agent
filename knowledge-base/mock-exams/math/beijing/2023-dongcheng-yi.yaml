  question: '已知乒乓球桌的长度为$274cm$，某人从球桌边缘正上方高$18cm$处将乒乓球向正前方抛向对面桌面，乒乓球的运动路线近似是抛物线的一部分.

    [图]

    （1）建立如图所示$[公式]$平面直角坐标系，从乒乓球抛出到第一次落在球桌的过程中，乒乓球的竖直高度y（单位：cm）与水平距离x（单位：cm）近似满足函数关系$y = a(x - h)^2 + k (a < 0)$.

    [图]

    乒乓球$[公式]$水平距离x与竖直高度y的几组数据如下表所示.根据表中数据，直接写出乒乓球竖直高度的最大值，并求出满足的函数关系式；

    | 水平距离 x / cm | $0$ | $40$ | $80$ | $120$ | $160$ |

    | --- | --- | --- | --- | --- | --- |

    | 竖直高度 y / cm | $18$ | $42$ | $50$ | $42$ | $18$ |

    （2）乒乓球第一次落在球桌后弹起，它的竖直高度y与水平距离x近似满足函数关系$y = -0.005(x - h)^2 + 8$，判断乒乓球再次落下时是否仍落在球桌上，并说明理由．'
  answer: （1）乒乓球竖直高度的最大值为$50$，$y=-0.005(x-80)^{2}+50(a<0)$ （2）乒乓球再次落下时仍落在球桌上，理由见解析
  solution: '【小问1详解】

    根据表格数据可知$(0,18)$与$(160,18)$关于对称轴$x = 80$对称，

    则当$x = 80$时，$y = 50$，即乒乓球竖直高度的最大值为$50$，

    ∴$y = a(x - 80)^2 + 50(a < 0)$，

    将点$(180,0)$代入得，$0=100^{2}a+50$，

    解得：$a = -0.005$，

    ∴$y=-0.005(x-80)^{2}+50(a<0)$；

    【小问2详解】

    解：乒乓球再次落下时仍落在球桌上，理由如下，

    由$y=-0.005(x-80)^{2}+50(a<0)$，令$y = 0$，

    即$-0.005(x-80)^2+50=0$，

    解得：$x=180$或$x = -20$（舍去）

    依题意，$y = -0.005(x - h)^2 + 8$，

    将点$(180,0)$代入得，$O=-0.005(180-h_{2})^{2}+8$

    解得：$h_{2}=220$或$h_{2}=140$（舍去）

    ∴解析式为$y = -0.005(x - 229)^2 + 8$

    当$y = 0$时，$-0.005(x-220)^{2}+8=0$，

    解得：$x_{1}=-260,x_{2}=-180$（舍去）

    ∵$260<274$，

    ∴乒乓球再次落下时仍落在球桌上．'
