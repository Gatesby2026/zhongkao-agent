  question: 已知$x^{2}+x-3=0$，求代数式$(2x+3)(2x-3)\cdot x(x-3)$的值．
  answer: '0'
  solution: '解：$(2x+3)(2x-3)\cdot x(x-3)$

    =$(2x)^{3}-3^{2}-(x^{2}-3x)$

    =$4x^{2}-9-x^{2}+3x$

    =$3x^2 + 3x - 9$

    =$3(x^{2}+x-3)$

    ∵$x^{2}+x-3=0$

    ∴原式=0

    即代数式$(2x+3)(2x-3)\cdot x(x-3)$的值为0．'
