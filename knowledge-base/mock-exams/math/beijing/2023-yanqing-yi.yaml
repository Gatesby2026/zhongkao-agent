  question: '原地正面掷实心球是北京市初中学业水平考试体育现场考试的选考项目之一，实心球被掷出后的运动路线可以看作是抛物线的一部分，如图所示，建立平面直角坐标系xOy，实心球从出手到落地的过程中，它的竖直高度y(单位：m)与水平距离x(单位：m)近似满足函数关系$y = a(x - h)^2 + k \quad (a < 0)$．

    [图]

    小明训练时，实心球的水平距离x与竖直高度y的几组数据如下：

    水平距离x/m

    $0$

    $1$

    $2$

    $3$

    $4$

    $5$

    竖直高度y/m

    1.8

    2.43

    2.88

    3.15

    3.24

    3.15

    根据上述数据，解决下列问题：

    （1）直接写出实心球竖直高度的最大值是______；

    （2）求出满足的函数关系$y = a(x - h)^2 + k \quad (a < 0)$；

    （3）求实心球从出手到落地点的水平距离．'
  answer: （1）$3.24$； （2）$y = -0.09(x - 4)^2 + 3.24$； （3）10米；
  solution: '【小问1详解】

    解：由表格数据可得当$x=3$和$x=5$时，其函数值y相同，

    ∴二次函数的对称轴为$x=\frac{3+5}{2}=4$，

    ∵函数$y=(ax-h)^{2}+k(a\lt 0)$的开口方向向下，

    ∴函数顶点坐标为$(4,3.24)$，

    ∴实心球竖直高度的最大值是$3.24$；

    故答案为：$3.24$

    【小问2详解】

    解：∵抛物线的顶点坐标为$(4,3.24)$，

    ∴设抛物线的表达式为$y=a(x-4)^{2}+3.24(a<0)$，

    将点$(0,1.8)$代入，得$1.8=16a+3.24$，

    解得$a = -0.09$，

    ∴抛物线的表达式为$y = -0.09(x - 4)^2 + 3.24$；

    【小问3详解】

    解：令$y = 0$，

    则$-0.09(x-4)^{2}+3.24=0$，

    解得：$x_{1}=10$，$x_{2}=-2$（不符合题意舍去），

    答：实心球从出手到落地点的水平距离为10米．'
