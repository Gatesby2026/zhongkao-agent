  question: '在平面直角坐标系xOy中，点$A(4,m)$，在抛物线$y=x^{2}-2bx+1$上．

    [图]

    （1）当$m = 1$时，求b的值；

    （2）点$(x_0,n)$在抛物线上，若存在$0 < x_0 < b$，使得$m = n$，直接写出b的取值范围．'
  answer: （1）$b = 2$ （2）$2<b<4$
  solution: '【小问1详解】

    解：当$m = 1$时，则$A(4,1)$，

    把$A(4,1)$代入$y=x^{2}-2bx+1$，得

    $1=4^{2}-2b\cdot 4+1$，解得：$b = 2$；

    【小问2详解】

    解：∵抛物线$y=x^{2}-2bx+1$的对称轴为直线$x = \frac{-2b}{2 \times 1} = b$，

    当$m = n$时，点$(x_0,n)$与点$A(4,1)$关于直线$x = b$对称，

    ∴$b=\frac{x_{0}+4}{2}$，

    ∴$x_{0}=2b-4$，

    ∵$0 < x_0 < b$，

    ∴$0 < 2b - 4 < b$，

    ∴$2<b<4$．'
