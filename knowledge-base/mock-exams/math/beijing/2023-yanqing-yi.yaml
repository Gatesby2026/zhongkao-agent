  question: '为了增强同学们的消防安全意识，普及消防安全知识，提高自防自救能力，某中学开展了形式多样的培训活动，为了解培训效果，该校组织七、八年级全体学生参加了消防知识竞赛（百分制），并规定90分及以上为优秀，$80 \sim 89$分为良好，$60 \sim 79$分为及格，59分及以下为不及格，学校随机抽取了七、八年级各20名学生的成绩进行了整理与分析，下面给出了部分信息．

    a.抽取七年级20名学生的成绩如下：

    66

    87   57   96   79   67   89   97   77   100

    80

    69   89   95   58   98   69   78   80   89

    b.抽取七年级20名学生成绩的频数分布直方图如下：

    （数据分成5组：$50 \leq x < 60$，$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x \leq 100$）

    [图]

    c.抽取八年级20名学生成绩的扇形统计图：

    [图]

    d.七年级、八年级各抽取的20名学生成绩的平均数、中位数如下表：

    年级

    平均数

    中位数

    七年级

    81

    a

    八年级

    82

    81

    请根据以上信息，完成下列问题：

    （1）补全七年级20名学生成绩的频数分布直方图，写出表中a的值；

    （2）该校八年级有学生200人，估计八年级测试成绩达到优秀的学生有多少人？

    （3）在七年级抽取的学生成绩中，高于他们平均分的学生人数记为m；在八年级抽取的学生成绩中，高于他们平均分的学生人数记为n．比较m，n的大小，并说明理由．'
  answer: （1）图见解析，80 （2）60人（3）$m < n$，理由见解析
  solution: '【小问1详解】

    解：七年级$60 \leq x < 70$的人数为4人，

    补全频数分布直方图如下

    [图]

    将七年级20名学生的成绩按从高到低排序，第10名和第11名都是80分，因此中位数是80，

    表中a的值为80．

    【小问2详解】

    解：抽取的八年级20名学生成绩的优秀率为$\frac{180-72}{360}\times100\%=30\%$，

    此次八年级测试成绩达到优秀的学生为$200\times30\%=60$（人）．

    【小问3详解】

    解：由抽取的七年级20名学生成绩的数据可知，$m=9$．

    由抽取的八年级20名学生成绩的扇形统计图可知，80分及以上的学生有10人．

    把八年级20名学生的成绩由高到低排列，

    设第十名的成绩为x，第十一名的成绩为$80-b$（b是正数）．

    ∵抽取的八年级20名学生成绩的中位数是81，

    ∴$x+60=81\times2$．

    ∴$x=82+b$．

    ∵抽取的八年级20名学生成绩的平均数是82，

    ∴第十名$[公式]$成绩高于他们的平均分，第十一名的成绩低于他们的平均分．

    ∴$n = 10$．

    ∴$m < n$．'
