  question: '方程组$\begin{cases}

    x + y = -1 \\

    2x - 3y = 8

    \end{cases}$的解为_________．'
  answer: $\left\{ \begin{array}{l} x = 1 \\ y = -2 \end{array} \right.$
  solution: '$\begin{aligned}

    x + y &= -1 \quad \text{(1)} \\

    2x - 3y &= 8 \quad \text{(2)}

    \end{aligned}$，

    由①得，$y = -x - \sqrt{3}$，

    ③代入②得，$2x-3(-x-1)=8$，

    解得$x = 1$，

    把$x = 1$代入③得，$y = -1 - 1 = -2$，

    所以，方程组的解是$\left\{

    \begin{array}{l}

    x = 1 \\

    y = -2

    \end{array}

    \right.$；

    故答案为：$\left\{

    \begin{array}{l}

    x = 1 \\

    y = -2

    \end{array}

    \right.$．'
