  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\ (k\neq0)$的图象由正比例函数$y=\frac{1}{2}x$的图象平移得到，且经过点$(2,3)$．

    （1）求k，b的值；

    （2）当$x<2$时，对于x的每一个值，函数$y = mx - 2 (m \neq 0)$的值小于一次函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$k = \frac{1}{2}$，$b = 2$； （2）$0.5 \leq m \leq 2.5$．
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\ (k\neq0)$的图象由正比例函数$y=\frac{1}{2}x$的图象平移得到，

    ∴$k = \frac{1}{2}$．

    ∵一次函数$y=kx+b\ (k\neq0)$的图象经过点$(2,3)$，

    ∴$3=\frac{1}{2}x_{2}+b$．

    ∴$b = 2$；

    【小问2详解】

    解：由（1）一次函数$y=kx+b$的解析式为$y=\frac{1}{2}x+2$，

    当$x=2$时，$y=\frac{1}{2}\times 2+2=3$，

    把点$(2,3)$代入$y = mx - 2$，得$3=2m-2$，

    解得$m = 2.5$，

    ∵当$x<2$时，对于x的每一个值，函数$y = mx - 2 (m \neq 0)$的值小于一次函数$y=kx+b\ (k\neq0)$的值，

    [图]

    ∴$0.5 \leq m \leq 2.5$．'
