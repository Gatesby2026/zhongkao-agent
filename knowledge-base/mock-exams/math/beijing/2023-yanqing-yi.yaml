  question: '已知关于x的一元二次方程$x^{2}+mx+m-1=0$．

    （1）求证：方程总有两个实数根；

    （2）如果方程有一个根为正数，求m的取值范围．'
  answer: （1）见解析（2）$m < 1$
  solution: '【小问1详解】

    证明：$\Delta=m^{2}-4(m-1)=(m-2)^{2}$

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$无论m取何值，$(m-2)^{2}\quad0$，

    ∴方程总有两个实数根．

    【小问2详解】

    解：由原方程得：$(x+1)(x+m-1)=0$，

    解得$x_{1}=-1$，$x_{2}=1-m$，

    ∵方程有一个根为正数，$-1<0$，

    $\therefore 1-m>0$，

    $\therefore m<1$．'
