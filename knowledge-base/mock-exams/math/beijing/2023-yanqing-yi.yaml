  question: '如图，在平行四边形$ABCD$中，连接AC，$\angle BAC = 90^\circ$，点M为边AD的中点，连接CM并延长，交BA的延长线于点E，连接DE．

    [图]

    （1）求证：四边形$ACDE$是矩形；

    （2）若$BE = 10$，$DE = 12$，求四边形$BCDE$的面积．'
  answer: （1）见解析； （2）90．
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$BA \parallel CD$，$BA = CD$．

    ∴$\angle AEC = \angle DCE$，$\angle EAD = \angle CDA$．

    ∵点M为边AD的中点，

    ∴$AM = DM$．

    ∴$\triangle EAM \cong \triangle CDM$．

    ∴$ME = MC$．

    ∴四边形$ACDE$是平行四边形．

    ∵$\angle BAC = 90^\circ$，

    ∴$\angle EAC = 90^\circ$．

    ∴平行四边形$ACDE$是矩形．

    【小问2详解】

    解：∵四边形$ACDE$是矩形，

    ∴$AE = CD$，$DE = AC$．

    ∴$AE = AB$．

    ∵$BE = 10$，

    ∴$AE = AB = 5$．

    ∵$DE = 12$，

    ∴$AC = 12$．

    ∴$S_{\text{四边形 } ACDE} = AE \cdot DE \cdot \sin 120^\circ = 60$，

    $S_{\triangle \text{ABC}} = \frac{1}{2} AB \cdot AC \cdot \sin \angle BAC = \frac{5}{2} \times 1.2 = 3.0$．

    ∴$S_{\text{四边形}ABCD}=S_{\triangle ABC}+S_{\triangle ADC}=60+30=90$．'
