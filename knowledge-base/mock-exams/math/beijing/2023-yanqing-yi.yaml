  question: '如图，$\odot\odot$是$\triangle ABC$的外接圆，AB是直径，$OD\perp OC$，且$\angle ADO = \angle BOC$．

    [图]

    （1）求证：AD是$\odot\odot$的切线；

    （2）若$\tan \angle BAC = \frac{1}{2}$，$AD = 3$，求$\odot\odot$的半径．'
  answer: （1）见解析； （2）4．
  solution: '【小问1详解】

    证明：∵$OD\perp OC$，

    ∴$\angle DOC = 90^\circ$．

    ∴$\angle AOB+\angle BOC=90^{\circ}$．

    ∵$\angle ADO=\angle BOC.$

    ∴$\angle AOD+\angle ADO=90^{\circ}$．

    ∴$\angle DAO = 90^\circ$．

    ∵AB是$\odot\odot$的直径，

    ∴AD是$\odot\odot$的切线．

    【小问2详解】

    解：∵AB是⊙O的直径，

    ∴$\angle ACB=90^\circ$．

    ∴$\angle BAC+\angle B=90^{\circ}$．

    过点C作$CE \perp AB$于点E，

    [图]

    ∴$\angle ECB+\angle B=90^{\circ}$．

    ∴$\angle BAC = \angle ECB$．

    ∵$\tan \angle BAC = \frac{1}{2}$，

    ∴$\tan \angle ECB = \frac{1}{2}$．

    设$BE = a$（$a > 0$），则$CE = 2a$，$BC = \sqrt{5}a$．

    ∴$AC = 2\sqrt{5}a$，$AB = 5a$．

    ∴$OA=OB=\frac{5}{2}a$．

    ∴$OE=\frac{3}{2}a$．

    ∵$\angle DAO=\angle OEC=90^\circ$，$\angle ADO = \angle BOC$，

    ∴$\triangle ADO \sim \triangle EOC$，

    ∴$\frac{AD}{AO}=\frac{OE}{EC}$．

    ∴$\frac{AD}{AO}=\frac{1.5a}{2a}=\frac{3}{4}$．

    ∵$AD = 3$，

    ∴$OA = 4$．

    ∴$\odot\odot$的半径为4．'
