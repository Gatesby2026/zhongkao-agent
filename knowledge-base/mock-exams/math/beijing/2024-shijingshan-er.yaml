  question: 'a，b，c是实数．若$a-b=c^{2}-2c+1$，$a+b=3c^{2}+8c+11$，则a，b，c之间的大小关系是（）

    A.$a\quad b>c$B.$a\quad c>b$C.$c>a\ b$D.$b\quad a>c$'
  answer: A
  solution: '解：∵$a-b=c^{2}-2c+1=(c-1)^{2}$，

    ∴$a\quad b$，

    ∵$a-b-(a+b)=c^{2}-2c+1-(3c^{2}+8c+11)$，

    ∴$-2b=-2c^{2}-10c-10$，

    则$b = c^2 + 5c + 5$，

    ∵$b-c=c^{2}+4c+5=(c+2)^{2}+1>0$，

    ∴$b > c$，

    ∴$a\quad b>c$，

    故选：A．'
