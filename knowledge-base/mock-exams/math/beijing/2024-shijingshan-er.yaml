  question: '已知关于x的一元二次方程$x^{2}-6mx+9m^{2}-1=0$．

    （1）求证：方程有两个不相等的实数根；

    （2）设此方程的两个根分别为$x_1$，$x_2$，且$x_{1}<x_{2}$．若$x_{2}=2x_{1}-3$，求m的值．'
  answer: （1）见解析（2）$2$
  solution: '【小问1详解】

    证明：依题意，得$\Delta=(-6m)^{2}-4(9m^{2}-1)=36m^{2}-36m^{2}+4=4>0$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$此方程有两个不相等的实数根；

    【小问2详解】

    解：$x^{2}-6mx+9m^{2}-1=0$，

    $\left(x-3m\right)^{2}=1$，

    解得$x=3m\pm1$，

    ∵$x_{1}<x_{2}$，

    $\therefore x_{1}=3m-1$，$x_{2}=3m+1$，

    $\therefore x_{2}=2x_{1}-3$，

    $3m+1=2(3m-1)-3$，

    $\therefore m=2$．'
