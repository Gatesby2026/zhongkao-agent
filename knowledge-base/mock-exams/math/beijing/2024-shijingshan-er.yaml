  question: '在平面直角坐标系xOy中，一次函数$y=kx+b(k\neq0)$的图象由函数$y = -2x$的图象平移得到，且经过点$A(1,-3)$，与过点$(0,3)$且平行于x轴的直线交于点B．

    （1）求该函数的解析式及点B的坐标；

    （2）当$x > -2$时，对于x的每一个值，函数$y = -x + n$的值大于$y=kx+b(k\neq0)$的值且小于$5$，直接写出n的取值范围．'
  answer: （1）$y = -2x - 1$，点B的坐标为$(-2,3)$ （2）$1\leq n\leq 3$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b(k\neq0)$的图象由函数$y = -2x$的图象平移得到，

    ∴$k = -2$，

    ∵一次函数$y=kx+b(k\neq0)$的图象过点$A(1,-3)$，

    ∴$-2 + b = -3$，

    解得：$b = -1$，

    ∴该函数的解析式为$y = -2x - 1$，

    ∵一次函数$y = -2x - 1$的图象与过点$(0,3)$且平行于x轴的直线交于点B，

    ∴把$y=3$代入$y = -2x - 1$得：$3=-2x-1$，

    解得：$x = -2$，

    ∴点B的坐标为$(-2,3)$．

    【小问2详解】

    如图所示：

    [图]

    把$(-2,3)$代入$y = -x + n$得$2+n=3$，

    解得：$n = 1$，

    把$(-2,5)$代入$y = -x + n$得$2+n=5$，

    解得：$n = 3$，

    ∵$x > -2$时，对于x的每一个值，函数$y = -x + n$的值大于$y=kx+b(k\neq0)$的值且小于$5$，

    ∴n的取值范围为$1\leq n\leq 3$．'
