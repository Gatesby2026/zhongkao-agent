  question: '列方程解应用题．

    某工程队承担了750米长的道路改造任务，工程队在施工完210米道路后，引进了新设备，每天的工作效率比原来提高了20％，结果共用22天完成了任务．求引进新设备前工程队每天改造道路多少米？'
