  question: '用尺规“三等分任意角”是数学史上一个著名难题，它已经被数学家伽罗瓦用《近世代数》和《群论》证明是不可能的．但对于特定度数的已知角，如$90^\circ$角，$45^\circ$角等，是可以用尺规进行三等分的．下面是小明的探究过程：

    已知：如图1，$\angle AOB=90^\circ$．

    求作：射线$OE,OG$三等分$\angle AOB$．

    [图]

    作法：如图2，

    ①在射线OB上取任一点C；

    ②分别以$O,C$为圆心，OC长为半径画弧，两弧在OB上方交于点E，在OB下方交于点F，连接CE；

    ③作直线EF交OC于点D；

    ④以D为圆心，OD长为半径作圆，交线段CE于点G（点G不与点C重合）；

    ⑤作射线$OG,OE$．

    所以射线$OG,OE$即为所求射线．

    （1）利用直尺和圆规，依作法补全图形（保留作图痕迹）；

    （2）完成下面的证明．

    证明：$\because OE = OC = CE$，

    $\therefore \triangle COE$为等边三角形．

    $\angle COE = 60^\circ$．

    $\angle AOE = \angle AOB - \angle COE = 30^\circ$．

    $\because OC$为$\odot D$的直径，

    $\angle CGO =$___________$\text{o}$．

    又$\colon OE=OC,\ OG\perp EC$，

    $\therefore OG$平分$\angle EOC$（　　）（填推理的依据）．

    $\angle COG = \angle EOG = \frac{1}{2} \angle COE = 30^\circ$．

    $\angle AOE = \angle COG = \angle EOG$．

    即射线$OE,OG$三等分$\angle AOB$．'
  answer: （1）见解析（2）$90$，等腰三角形三线合一
  solution: '【小问1详解】

    如图所示，

    [图]【小问2详解】

    证明：$\because OE = OC = CE$，

    $\therefore \triangle COE$为等边三角形．

    $\angle COE = 60^\circ$．

    $\angle AOE = \angle AOB - \angle COE = 30^\circ$．

    $\because OC$为$\odot D$的直径，

    $\angle CGO = 90^\circ$．

    又$\colon OE=OC,\ OG\perp EC$，

    $\therefore OG$平分$\angle EOC$（等腰三角形三线合一）（填推理的依据）．

    $\angle COG = \angle EOG = \frac{1}{2} \angle COE = 30^\circ$．

    $\angle AOE = \angle COG = \angle EOG$．

    即射线$OE,OG$三等分$\angle AOB$．

    故答案为：$90$，等腰三角形三线合一．'
