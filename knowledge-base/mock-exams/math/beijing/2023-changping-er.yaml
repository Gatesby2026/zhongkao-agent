  question: '关于x的一元二次方程$x^{2}-kx+k-1=0$．

    （1）求证：方程总有两个实数根；

    （2）若方程有一个根小于0，求k的取值范围．'
  answer: （1）见解析（2）$k<1$
  solution: '【小问1详解】

    解：$\Delta=(-k)^2-4\times1\times(-k-1)$，

    $=k^{2}-4k+4$，

    $=(k-2)^{2}0$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$方程总有两个实数根；

    【小问2详解】

    解：$x=\frac{k\pm\sqrt{(k-2)^{2}}}{2\times1}$，

    $\therefore x=\frac{k\pm(k-2)}{2}$，

    $\ldots x_{k}=1, x_{k-1}=k-1$，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$方程有一根小于0，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$k-1<0$，

    $\therefore k<1$．'
