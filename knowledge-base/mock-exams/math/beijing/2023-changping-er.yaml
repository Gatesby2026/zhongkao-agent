  question: '某旅店的客房有两人间和三人间两种，两人间每间200元，三人间每间250元，某学校50人的研学团到该旅店住宿，租住了若干客房.其中男生27人，女生23人.若要求男女不能混住，且所有租住房间必须住满.

    （1）要想使花费最少，需要___________间两人间；

    （2）现旅店对两人间打八折优惠，且仅剩15间两人间，此时要想花费最少，需要___________间三人间.'
  answer: ①.1②.8
  solution: '解：（1）由题意知，两人间每间200元，平均每人100元，三人间每间250元，平均每人$\frac{250}{3}$元，

    因此要想花费最少，则应尽可能多租三人间，

    花费最少时，27个男生租9个三人间，23个女生可以租7个三人间和1个两个间，

    故答案为：1；

    （2）两人间打八折优惠，则160元，平均每人80元，

    此时，要想花费最少，则应尽可能多租两人间，

    设27个男生租x个两个间，y个三个间，23个女生租m个两个间，n个三个间，

    则$2x+3y=27$，$2m+3n=23$，

    当$x = 12$，$y = 1$时，满足$2x+3y=27$，

    因此27个男生租12个两个间，1个三个间，

    此时还剩两人间：$15-12=3$（个），

    因此m可以取3，2，1，0，

    当$m = 3$时，女生需要租三人间$n=\frac{23-3\times2}{3}=\frac{17}{3}$个，不合题意；

    当$m = 2$时，女生需要租三人间$n=\frac{23-2\times2}{3}=\frac{19}{3}$个，不合题意；

    当$m = 1$时，女生需要租三人间$n=\frac{23-1\times2}{3}=7$个，符合题意；

    因此需要租三人间：$y+n=1+7=8$（个），

    故答案为：8．'
