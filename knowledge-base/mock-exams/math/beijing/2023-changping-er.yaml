  question: '某餐厅计划推出一个新菜品，在菜品研发阶段研制出$A\cdot B$两种味道，为测试哪种味道更符合当地人口味，随机抽取餐厅内的5位当地顾客分别为两种味道的菜品打分，打分情况如下表，下列关系全部正确的是（　　）

    口味

    顾客1

    顾客2

    顾客3

    顾客4

    顾客5

    A

    7

    9

    8

    6

    10

    B

    5

    6

    10

    10

    9

    A.$\bar{x}_{1}>\bar{x}_{2},\quad S_{1}^{2}=S_{2}^{2}$B.$\overline{x}_{1}=\overline{x}_{2},\ S_{1}^{2}>S_{2}^{2}$

    C.$\overline{x}_{1}=\overline{x}_{2},\ S_{1}^{2}\leq S_{2}^{2}$D.$\bar{x}_{1}<\bar{x}_{2},\ S_{1}^{2}>S_{2}^{2}$'
  answer: C
  solution: '$\bar{x}_{s}=\frac{1}{5}\times(7+9+8+6+10)=8$，

    $\bar{x}_{p}=\frac{1}{5}(5+6+10+10+9)=8$，

    $S_{1}^{2}=\frac{1}{5}\times\left[\left(7-8\right)^{2}+\left(9-8\right)^{2}+\left(8-8\right)^{2}+\left(6-8\right)^{2}+\left(10-8\right)^{2}\right]=2$，

    $S_{c}^{2}=\frac{1}{5}\left[\left(5-8\right)^{2}+\left(6-8\right)^{2}+\left(10-8\right)^{2}+\left(10-8\right)^{2}+\left(9-8\right)^{2}\right]=4.4$，

    ∴$\overline{x}_{1}=\overline{x}_{2},\ S_{1}^{2}\leq S_{2}^{2}$．

    故选：C．'
