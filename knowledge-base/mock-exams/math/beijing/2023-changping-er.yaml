  answer: （1）见解析（2）$\frac{40}{3}$
  solution: '【小问1详解】

    ∵AB是$\odot\odot$直径，

    ∴$\angle C=90^{\circ}$，

    ∴$\angle CAB+\angle B=90^{\circ}$，

    ∵$\angle PAC = \angle ABC$，

    ∴$\angle CAB+\angle PAC=90^\circ$，

    ∴$PA \perp AB$，

    ∵AB是$\odot\odot$直径，

    ∴PA是$\odot\odot$的切线；

    【小问2详解】

    如图所示，

    [图]

    ∵$\cos\angle PAC=\frac{4}{5}$，

    ∴$\cos \angle B = \frac{4}{5}$，

    ∵$BC = 8$，

    ∴$AB=\frac{BC}{\cos \angle B}=\frac{8}{\frac{4}{5}}=10$，

    ∴$OA = OB = OD = 5$，

    ∵点D是弧BC中点，

    ∴$OD \perp BC$，

    ∵$\angle C=90^{\circ}$，

    ∴$AC \parallel DF$，

    ∴$\angle PAC = \angle AFD$，

    ∴$\cos\angle FPD-\cos\angle PAC=\frac{4}{5}$，

    ∴$\sin \angle AFD = \frac{3}{5}$，即$\frac{5}{OF} = \frac{3}{5}$，

    ∴解得$OF = \frac{25}{3}$，

    ∴$DF=OF+OD=\frac{25}{3}+5=\frac{40}{3}$．'
