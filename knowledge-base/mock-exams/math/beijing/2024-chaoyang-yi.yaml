  question: '列方程解应用题

    无人配送以其高效、安全、低成本等优势，正在成为物流运输行业的新趋势．某物流园区使用1辆无人配送车平均每天配送的包裹数量是1名快递员平均每天配送包裹数量的5倍．要配送6000件包裹，使用1辆无人配送车所需时间比4名快递员同时配送所需时间少2天，求1名快递员平均每天可配送包裹多少件？'
  answer: $150$件
  solution: '解：设1名快递员平均每天配送包裹x件．则1辆无人配送车平均每天配送的包裹$5x$，

