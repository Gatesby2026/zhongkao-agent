  question: '如图，在四边形$ABCD$中，$\angle ACB=\angle CAD=90^{\circ}$，点E在BC上，$AE\parallel DC, EF \perp AB$，垂足为F．

    [图]

    （1）求证：四边形$AECD$是平行四边形；

    （2）若AE平分$\angle BAC, BE = 5, \cos B = \frac{4}{5}$，求BF和AD$[公式]$长．'
  answer: （1）见详解；（2）$BF = 4$，$AD = 3$
  solution: '（1）证明：∵$\angle ACB=\angle CAD=90^{\circ}$，

    ∴AD∥CE，

    ∵$AE\parallel DC$，

    ∴四边形$AECD$是平行四边形；

    （2）解：由（1）可得四边形$AECD$是平行四边形，

    ∴$CE = AD$，

    ∵$EF \perp AB$，AE平分$\angle BAC$，$\angle ACB=90^\circ$，

    ∴$EF = CE$，

    ∴EF=CE=AD，

    ∵$BE=5,\cos B=\frac{4}{5}$，

    ∴$BF = BE \cdot \cos B = 5 \cdot \frac{4}{5} = 4$，

    ∴$EF=\sqrt{BE^{2}-BP^{2}}=3$，

    ∴$AD=EF=3$．'
