  question: '如图，在$\triangle ABC$中，$AB = AC$，$\angle BAC=2\alpha(45^{\circ}<\alpha<90^{\circ})$，D是BC的中点，E是BD的中点，连接AE．将射线AE绕点A逆时针旋转$\alpha$得到射线AM，过点E作$EF \perp AE$交射线AM于点F．

    [图]

    （1）①依题意补全图形；

    ②求证：$\angle B = \angle AFE$；

    （2）连接CF，DF，用等式表示线段CF，DF之间的数量关系，并证明．'
  answer: （1）①见解析；②见解析 （2）$CF = DF$
  solution: '【小问1详解】

    解：①如图所示，

    [图]

    ②连接AD，

    [图]

    ∵$AB = AC$，D是BC的中点，

    ∴$AD \perp BC$于点D，AD平分$\angle BAC$，

    ∵$\angle BAC=2\alpha(45^{\circ}<\alpha<90^{\circ})$

    ∴$\angle BAD = \alpha$，$\angle B=90^{\circ}-\alpha$，

    ∵$EF \perp AE$，

    ∴$\angle AEF=90^\circ$，$\angle AFE = 90^\circ - \alpha$，

    ∴$\angle B = \angle AFE$；

    【小问2详解】

    $CF = DF$；证明如下，

    延长FE至点H，使得$EH = EF$，连接$BH,AH$，CF，

    [图]

    ∵E为BD的中点，E为HF的中点

    ∴$EH = EF, EB = ED$，

    又$\angle HEB = \angle FED$，

    ∴$\triangle HBE \cong \triangle FDE$$(SAS)$，

    ∴$BH = FD$，

    ∵$AE \perp HF$，$EH = EF$，

    ∴$\triangle AHF$是等腰三角形，则$AH = AF$，$\angle HAE = \angle FAE = \alpha$，，

    ∵$\angle BAC = \angle HAF = 2\alpha$，

    ∴$\angle HAF-\angle BAF=\angle BAC-\angle BAF$，

    即$\angle BAH = \angle CAF$，

    ∴$\triangle AHB \cong \triangle AFC$$(SAS)$，

    ∴$CF = BH$，

    ∴$CF = FD$．'
