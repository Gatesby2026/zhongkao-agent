  question: '在平面直角坐标系xOy中，点$M(x_{1},y_{1})$，$N(x_{2},y_{2})$是抛物线$y=ax^{2}-2ax+c$（$a > 0$）上任意两点．

    （1）直接写出抛物线的对称轴；

    （2）若$x_{1}=a+1$，$x_{2}=a+2$，比较$y_{1}$与$y_{2}$的大小，并说明理由；

    （3）若对于$m < x_1 < m + 1$，$m+1<x<m+2$，总有$y_1 < y_2$，求m的取值范围．'
  answer: （1）抛物线的对称轴为直线$x = 1$ （2）$y_1 < y_2$ （3）$m>\frac{1}{2}$
  solution: '【小问1详解】

    解：抛物线$y=ax^{2}-2ax+c$（$a > 0$）的对称轴为：$x=\frac{-2a}{2a}=1$，

    ∴抛物线的对称轴为直线$x = 1$；

    【小问2详解】

    ∵$a > 0$，抛物线开口向上，对称轴为直线$x = 1$，$x_{1}=a+1,x_{2}=a+2$，

    ∴$M(x_1,y_1)$，$N(x_{2},y_{2})$都在对称轴右侧，

    ∵当$x>1$时，y随x的增大而增大，且$x_{1}<x_{2}$，

    ∴$y_1 < y_2$；

    【小问3详解】

    ∵$m < x_1 < m + 1$，$m+1<x<m+2$，

    ∵$y_1 < y_2, a > 0$，

    ∴$M(x_1,y_1)$距离对称轴更近，$x_{1}<x_{2}$，则MN的中点在对称轴的右侧，

    ∴$\frac{m+n+1}{2}>1$，

    解得：$m > \frac{1}{2}$．'
