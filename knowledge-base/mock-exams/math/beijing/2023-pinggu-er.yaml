  question: '如图所示，某工厂生产镂空$[公式]$铝板雕花造型，造型由A（绣球花）、B（祥云）两种图案组合而成，因制作工艺不同，A、B两种图案成本不同，厂家提供了如下几种设计造型，造型1的成本64元，造型2的成本42元，则造型3的成本为______元；若王先生选定了一个造型1作为中心图形，6个造型2分别位于中心图形的四周，其余部分用n个造型3填补空缺，若整个画面中，图案B个数不多于图案A数的2倍，且王先生的整体设计费用不超过500元，写出一个满足条件的n值______．

    [图]'
  answer: ①.22②.6（答案不唯一，6，7，8均可）
  solution: '解：设A种图案成本每个x元，B种图案成本每个y元，根据题意，得

    $\begin{cases}

    2x + 4y = 64 \\

    x + 3y = 42

    \end{cases}$，解得：$\begin{cases}

    x = 12 \\

    y = 10

    \end{cases}$，

    ∴$x + 12 + 10 = 22$(元)，

    即造型3的成本为22元；

    故答案为：22；

    根据题意得：$\begin{cases}

    4+6\times3+n\leq2(6+n)\\

    64+42\times6+22n\leq500

    \end{cases}$，

    解得：$6 \leq n \leq \frac{4}{11}$，

    ∵n为整数，

    ∴$n = 6$，7，8，

    故答案为：6（答案不唯一，6，7，8均可）．'
