  question: '直径为10分米的圆柱形排水管，截面如图所示．若管内有积水（阴影部分），水面宽AB为8分米，则积水的最大深度CD为______分米．

    [图]'
  answer: '2'
  solution: '解：连接OA，如图所示：

    [图]

    ∵$\odot\odot$的直径为$10$分米，

    ∴$OA=5$分米，

    由题意得：$OD \perp AB$，$AB = 8$分米，

    ∴$AC = BC = \frac{1}{2}AB = 4$分米，

    ∴$OC = \sqrt{OA^{2} - AC^{2}} = \sqrt{5^{2} - 4^{2}} = 3$（分米），

    ∴积水的最大深度$CD=OD-OC=5-3=2$（分米），

    故答案为：2．'
