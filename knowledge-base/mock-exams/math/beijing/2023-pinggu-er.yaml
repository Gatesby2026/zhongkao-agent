    （1）求A、B点坐标；

    （2）点A关于y轴的对称点为点C，将直线BC沿y轴向上平移$t(t>0)$个单位，得到直线l，当$x > -2$时都有直线l的值大于直线$y = -x + 1$的值，求t的取值范围．'
  answer: （1）$A(1,0),\ B(0,1)$ （2）$t^{4}$
