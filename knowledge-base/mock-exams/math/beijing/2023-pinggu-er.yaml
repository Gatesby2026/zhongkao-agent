    【小问2详解】

    解：∵点A关于y轴的对称点为点C，

    ∴$C(-1,0)$，

    设直线BC解析式为$y=kx+b$，

    ∴$\left\{\begin{array}{l} -k + b = 0 \\ b = 1 \end{array}\right.$，

    ∴$\left\{\begin{array}{l}k=1\\b=1\end{array}\right.$，

    ∴直线BC的解析式为$y=x+1$

    ∵将直线BC沿y轴向上平移t（t＞0）个单位，得到直线l，

    ∴直线l的解析式为$y=x+1+t$；

    解不等式$x+1+t>-x+1$得$x > -\frac{t}{2}$，

    ∵当$x > -2$时，都有直线l的值大于直线$y = -x + 1$的值，

    ∴$x > -2$是不等式$x+1+t>-x+1$的一个解集，

    ∴$-2-\frac{t}{2}$，

    ∴$t^{4}$．'
