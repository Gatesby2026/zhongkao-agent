  question: '某公园有一座漂亮的五孔桥，如图所示建立平面直角坐标系，主桥洞$L_1$与两组副桥洞分别位于y轴的两侧成轴对称摆放，每个桥洞的形状近似的可以看作抛物线，主桥洞$L_1$上，y与x近似满足函数关系$y=ax^{2}+c(a\neq 0)$．经测量在主桥洞$L_1$上得到x与y的几组数据：

    [图]

    x(米)

    $-1.4$

    $-1$

    $0$

    $1$

    $1.4$

    y(米)

    $1.02$

    $1.5$

    $2$

    $1.5$

    $1.02$

    根据以上数据回答下列问题：

    （1）求主桥洞$L_1$的函数表达式；

    （2）若$L_{2}$的表达式：$y_{2}=-0.5(x-h)^{2}+0.98$，$L_3$的表达式：$y_{3}=-0.5\left(x-h_{2}\right)^{2}+0.5$，求五个桥洞的总跨度AB的长．'
  answer: （1）$y=-0.5x^{2}+2$ （2）五个桥洞的总跨度AB的长为$13.6$米
  solution: '【小问1详解】

    由表可知，抛物线$L_1$的顶点坐标为$(0,2)$

    ∴抛物线$L_1$的解析式为$y=ax^{2}+2$

    ∵抛物线过点$(1,1.5)$．解得$a = -0.5$

    $y = -0.5x^2 + 2$

    【小问2详解】

    令$y = 0$，$-0.5x^{2}+2=0$

    解得：$x_{1}=-2,\ x_{2}=2$，

    $\therefore MN = 4$；

    ∵$L_{2}$的表达式：$y_{2}=-0.5(x-h)^{2}+0.98$，$L_3$的表达式：$y_{3}=-0.5\left(x-h_{2}\right)^{2}+0.5$

    由题意抛物线$L_{2}$与抛物线$L_1$上EF之间的部分重合，

    即将$y=-0.5x^{2}+2$向下移动$2-0.98=1.02$

    当$y=1.02$时，$-0.5x^{2}+2=1.02$

    解得：$x_{1}=-1.4,\ x_{2}=1.4$，

    $\therefore EF = 2.8$；

    由题意抛物线$L_3$与抛物线$L_1$上CD之间的部分重合，

    即将$y=-0.5x^{2}+2$向下移动$2-0.5=1.5$，

    当$y=1.5$时，$-0.5x^{2}+2=1.5$

    解得：$x_{1}=-1,\ x_{2}=1$，

    ∴$CD = 2$

    $4+2\times2.8+2\times2=13.6$

    ∴五个桥洞的总跨度AB的长为$13.6$米．

    [图]【点睛】本题考查的是二次函数的实际应用，画二次函数的图像，理解题意，灵活的运用抛物线的对称性解题是关键．'
