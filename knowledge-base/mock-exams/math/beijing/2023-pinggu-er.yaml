  question: '如图，AB为$\odot\odot$的直径，C为$\odot\odot$上一点，过点B作$\odot\odot$的切线，交AC的延长线于点E，F为AE的中点，连结BF并延长交$\odot\odot$于点D，连结CD．

    [图]

    （1）求证：$\angle D = \angle EBC$；

    （2）若$\tan \angle D=\frac{1}{2}$，$BC = 2$，求BF的长．'
  answer: （1）见解析（2）$BF = 2.5$
  solution: '【小问1详解】

    证明：∵BE为$\odot\odot$的切线，

    ∴$\angle ABE = 90^\circ$，

    ∴$\angle ABC+\angle EBC=90^{\circ}$，

    ∵AB是直径，

    ∴$\angle ACB=90^\circ$，

    ∴$\angle A+\angle ABC=90^{\circ}$，

    ∴$\angle A=\angle EBC$，

    ∵$\overrightarrow{CB} = \overrightarrow{CB}$，

    ∴$\angle D=\angle A$，

    ∴$\angle D = \angle EBC$；

    【小问2详解】

    解：∵$\tan \angle D=\frac{1}{2}$，

    ∴$\tan\angle EBC=\frac{1}{2}$，

    ∵$\angle ACB=90^\circ$，$BC = 2$，

    ∴$CE = 1$，

    ∵$\angle D=\angle A$，

    ∴$\tan \angle A = \frac{1}{2}$，

    ∴$AC = 4$，

    ∴$AE = 5$，

    $Rt_{\triangle AEB}$中，∵F是AE的中点，$\angle ABE = 90^\circ$，

    ∴$BV=\frac{1}{2}AK=2.5$．'
