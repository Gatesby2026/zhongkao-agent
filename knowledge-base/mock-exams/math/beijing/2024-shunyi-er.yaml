  question: '在平面直角坐标系xOy中，函数$y=\frac{k}{x}(x>0)$的图象G与函数$y = x + b (x > 0)$的图象H交于点$A(1,3)$

    （1）求k，b的值；

    （2）已知直线$y = nx (n \neq 0)$与图象$G、H$分别交于点$P(x_{1},x_{2}),Q(x_{2},y_{2})$若$y_{1}>y_{2}$结合函数图象，直接写出n的取值范围．'
  answer: （1）$k = 3, b = 2$ （2）$n>3$
  solution: '【小问1详解】

    解：把$A(1,3)$代入$y = \frac{k}{x}$，得$k=1\times3=3$；

    把$A(1,3)$代入$y=x+b$，得$3=1+b$，

    解得：$b = 2$；

    【小问2详解】

    解：设过点$A(1,3)$的正比例函数解析式为$y = mx$，

    把$A(1,3)$代入$y = mx$，得$3 = m$，

    ∴过点$A(1,3)$的正比例函数解析式为$y = 3x$，如图，

    [图]

    由图可得：直线$y = nx (n \neq 0)$与图象$G、H$分别交于点$P(x_{1},x_{2}),Q(x_{2},y_{2})$若$y_{1}>y_{2}$则$n>3$．'
