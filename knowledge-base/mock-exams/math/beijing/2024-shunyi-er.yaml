  question: '已知方程组的解为$\left\{

    \begin{array}{l}

    x=2 \\

    y=3

    \end{array}

    \right.$，写出一个满足条件的二元一次方程组______．'
  answer: $\begin{cases} x + y = 5 \\ x - y = -1 \end{cases}$(答案不唯一)
  solution: '解：先围绕$\left\{

    \begin{array}{l}

    x=2 \\

    y=3

    \end{array}

    \right.$列一组算式，

    如$2+3=5$，$2-3=-1$，

    然后用x、y代换，

    得$\begin{cases}

    x + y = 5 \\

    y - x = 1

    \end{cases}$等，

    答案不唯一，符合题意即可．

    故答案为：$\begin{cases}

    x + y = 5 \\

    y - x = 1

    \end{cases}$(答案不唯一)．'
