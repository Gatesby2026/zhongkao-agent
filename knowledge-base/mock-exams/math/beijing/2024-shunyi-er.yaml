  question: '如图，在$\triangle ABC$中，$\angle C=90^\circ,AC=BC,D$是BC边上一动点（不与B，C重合），$DE \perp AB$于点E．设$CD = a, BD = b, AE = c.$给出下面三个结论：

    ①$a+b>c$②$\sqrt{2}(a+b)>c$③$2a+b=\sqrt{2}c.$

    上述结论中，所有正确结论的序号是（）

    [图]

    A.①③B.②③C.②D.①②③'
  answer: B
  solution: '解：连接AD，

    [图]

    当AD平分$\angle BAC$，即$\angle CAD = \angle EAD$时，

    ∵$\angle CAD = \angle EAD$，$\angle C=\angle AED=90^{\circ}$，$AD = AD$，

    ∴$\triangle ACD\cong\triangle AED(AAS)$，

    ∴$AE = AB$，

    ∵$AC = BC$，

    ∴$AE = BC$即$c=a+b$；

    若$\angle CAD > \angle EAD$时，$AE > AC$，即$c>a+b$，

    若$\angle CAD < \angle BAD$时，$AE < AC$，即$c<a+b$，

    故①错误；

    ∵$AC = BC$，$\angle C=90^{\circ}$，

    ∴$AB = \sqrt{2}BC$，即$AB=\sqrt{2}(a+b)$，

    ∵$AB > AE$，

    ∴$\sqrt{2}(a+b)>c$，

    故正确；

    ∵$AC = BC$，$\angle C=90^{\circ}$，

    ∴$AB=\sqrt{2}BC=\sqrt{2}(a+b)$，$\angle A=\angle B=45^{\circ}$，

    ∵$DE \perp AB$，

    ∴$\angle BDE=\angle B=45^{\circ}$，

    ∴$BE = DE$，

    ∴$BE=\frac{\sqrt{2}}{2}BD=\frac{\sqrt{2}}{2}h$，

    ∵$AB=\sqrt{2}(a+b)$，

    ∴$c = \frac{\sqrt{2}}{2}m - \sqrt{2}(a + b)$，

    ∴$\sqrt{2}c=2a+b$，

    故③正确；

    故选：B．'
