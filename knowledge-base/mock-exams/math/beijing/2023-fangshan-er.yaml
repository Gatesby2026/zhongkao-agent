  question: '下面是晓彤在证明“平行四边形的对角相等”这个性质定理时使用的三种添加辅助线的方法，请你选择其中一种，完成证明．

    平行四边形性质定理：平行四边形的对角相等．

    [图]

    已知：如图，$Y_{ABCD}$．

    求证：$\angle BAD = \angle BCD$，$\angle ABC = \angle ADC$．

    方法一：

    证明：如图，连接AC．

    [图]

    方法二：

    证明：如图，延长BC至点E．

    [图]

    方法三：

    证明：如图，连接AC、BD，AC与BD交于点O．

    [图]'
  answer: 见解析
  solution: '方法一：

    证明：∵$Y_{ABCD}$，

    [图]

    ∴$AD \parallel BC,\ AB \parallel CD$

    ∴$\angle DAC = \angle ACB, \angle BAC = \angle ACD$

    ∴$\angle DAC+\angle BAC=\angle ACB+\angle ACD$

    即$\angle BAD = \angle BCD$

    在△ACD与△CAB中

    $\angle DAC = \angle ACB \\

    \angle DCA = \angle BAC$

    ∴$\triangle ACD \cong \triangle CAB$

    ∴$\angle D = \angle B$

    方法二：

    证明：∵$Y_{ABCD}$，

    ∴$AD \parallel BC,\ AB \parallel CD$

    ∴$\angle D=\angle DCE,\ \angle B=\angle DCE$

    [图]

    ∴$\angle B = \angle D$

    又∵$\angle D+\angle BCD=180^{\circ}$，$\angle A+\angle B=180^{\circ}$

    ∴$\angle A=\angle BCD$

    方法三：

    证明：∵$Y_{ABCD}$，

    [图]

    ∴$AD \parallel BC,\ AB \parallel CD$

    ∴$\angle DAC = \angle ACB, \angle ADB = \angle DBC$

    $\angle BAC = \angle ACD, \angle ABD = \angle BDC$

    ∴$\angle DAC+\angle BAC=\angle ACB+\angle ACD$，$\angle ADB + \angle BDC = \angle DBC + \angle ABD$

    即$'
