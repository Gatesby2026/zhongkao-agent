  question: '如图，点O为$Y_{ABCD}$的对角线AC的中点，直线l绕点O旋转，当$l \perp AC$时，与边$AB,\ CD$分别交于点E，F，连接$AF, CE$．

    [图]

    （1）求证：四边形$AECF$是菱形；

    （2）若$\angle BAC=15^\circ,\ BE=1,\ EC=2$，求$Y_{ABCD}$的面积．'
  answer: （1）见解析（2）3
  solution: '【小问1详解】

    ∵四边形$ABCD$是平行四边形，

    ∴$AB \parallel DC$，

    ∴$\angle EAO = \angle FCO, \angle AEO = \angle CFO.$

    ∵O为AC的中点，

    ∴$OA = OC,$

    在$\triangle AEO$和$\triangle CFO$中，

    $\angle EAO = \angle FCO \\

    \angle AEO = \angle CFO \\

    AO = CO$，

    ∴$\triangle AOE \cong \triangle COF$

    ∴$OE = OF$

    ∴四边形$AECF$是平行四边形，

    ∵$l \perp AC,$

    ∴四边形$AECF$是菱形，

    【小问2详解】

    过点C作$CH \perp AB$交AB于点H，

    [图]

    ∴$\angle AHC = 90^\circ$°，

    ∵四边形$AECF$是菱形，

    ∵$AE = EC = 2,\ \angle BAC = \angle ACE = 15^\circ$，

    ∴$\angle HEC = \angle EAC + \angle ACE = 30^\circ$，

    ∴$CH = \frac{1}{2}EC = 1$，

    ∵$BE = 1$，

    ∴$AB=AE+EB=2+1=3$，

    ∴$\boxed{\square}$$ABCD$的面积$S = AB \times CH = 3 \times 1 = 3$'
