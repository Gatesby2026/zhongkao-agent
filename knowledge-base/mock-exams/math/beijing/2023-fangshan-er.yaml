  question: '平面直角坐标系xOy中，抛物线$y=ax^{2}-4x+3a$的对称轴为直线$x = n$．

    （1）若抛物线经过点$(1,0)$，求a和n的值；

    （2）若抛物线上存在两点$A(x_{1},m)$和$B(x_2,m+1)$，$x_1 = n$．

    ①判断抛物线的开口方向，并说明理由；

    ②若$\left|x_{2}-x_{1}\right|\leq1$，求a的取值范围．'
  answer: （1）$a = 1$，$n=2$ （2）①开口向上，理由见解析；②$a\ 1$
  solution: '【小问1详解】

    解：把$(1,0)$代入$y=ax^{2}-4x+3a$得

    $0 = a - 4 + 3a$，

    ∴$a = 1$，

    ∴$y=x^{2}-4x+3=(x-2)^{2}-1$，

    ∵抛物线的对称轴为直线$x = n$，

    ∴$n=2$．

    【小问2详解】

    解：①开口向上．

    ∵当$x_1 = n$，又对称轴为$x = n$，

    ∴$A(n,m)$是抛物线的顶点，

    ∵$B(x_2,m+1)$，且$m+1>m$，

    ∴点B在顶点A的上方，

    ∴抛物线开口向上，

    ②设$\left|x_{2}-x_{1}\right|=1$，

    ∵$x_1 = n,$

    ∴$x_{2}=n+1$或$x_{2}=n-1$，

    将抛物线平移，使其顶点$A(n,m)$落在坐标原点，

    平移a的值不变，平移后抛物线表达式为$y = ax^2$，

    此时$A(0,0)$，

    ∴$B(1,1)$或$B(-1,1)$，

    将$B(1,1)$或$B(-1,1)$代入$y = ax^2$得$a = 1$，

    ∵$\left|x_{2}-x_{1}\right|\leq1$，结合图象，

    ∴a的取值范围为$a\ 1$．'
