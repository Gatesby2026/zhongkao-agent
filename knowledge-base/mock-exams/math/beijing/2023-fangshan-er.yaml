  question: '如图，$\angle BAC = 90^\circ$，$AB = AC$，点D是BA延长线上一点，连接DC，点E和点B关于直线DC对称，连接BE交AC于点F，连接$EC,ED,DF$．

    [图]

    （1）依题意补全图形，并求$\angle DEC$的度数；

    （2）用等式表示线段$EC,ED$和CF之间的数量关系，并证明．'
  answer: （1）图见解析，$45^\circ$ （2）$ED+CF=\sqrt{2}EC$，证明见解析
  solution: '【小问1详解】

    解：补全图形，如图所示：

    [图]

    连接CB，

    ∵$\angle BAC = 90^\circ$，$AB = AC$

    ∴$\angle ABC = 45^\circ$

    ∵点E和点B关于直线DC对称

    ∴$EC = BC,\ ED = BD$

    ∵$DC = DC$

    ∴$\angle EDC = \angle BDC (\text{SSS})$，

    ∴$\angle DEC = \angle DBC = 45^\circ$；

    [图]【小问2详解】

    $ED+CF=\sqrt{2}EC$，证明如下：

    ∵点E、B关于直线CD对称

    ∴$EB \perp CD$，设垂足为H

    则$\angle CHF=90^{\circ}=\angle BAC$

    ∵$\angle HFC=\angle AFB$

    [图]

    ∴$\angle1=\angle2$

    ∵$AC = AB,\ \angle DAC = \angle FAB = 90^\circ$

    ∴$\triangle DAC \cong \triangle FAB$

    ∴$AD = AF$

    ∴$ED=BD=AD+AB=AF+AC=AC-CF+AC=2AC-CF$

    ∵$AC = \cos 45^\circ \cdot BC = \frac{\sqrt{2}}{2} \cdot BC = \frac{\sqrt{2}}{2} \cdot EC$

    ∴$ED = 2 \times \frac{\sqrt{2}}{2} EC - CF = \sqrt{2} EC - CF$

    即$ED+CF=\sqrt{2}EC$．'
