  question: 方程$\frac{5}{x}=\frac{7}{x+2}$的解为___________．
  answer: $x=5$
  solution: '解：方程两边同时乘以$x(x+2)$，得

    $5(x+2)=7x$，

    解得：$x=5$，

    检验：把$x=5$代入$x(x+2)$，得$5(5+2)=35\neq0$，

    ∴原分式方程的解为$x=5$，

    故答案为：$x=5$．'
