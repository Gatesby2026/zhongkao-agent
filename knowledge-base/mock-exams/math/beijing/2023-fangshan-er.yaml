  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$A(2,-1)$，且与函数$y = x$的图象交于点$B(1,a)$．

    （1）求a的值及函数$y=kx+b\ (k\neq0)$的表达式；

    （2）当$x \leq 0$时，对于x的每一个值，函数$y = x + m$的值小于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$a=1,y=-2x+3$ （2）$m<3$
  solution: '【小问1详解】

    解：把点$B(1,a)$代入$y=x$中，

    ∴$a = 1$

    ∴$B(1,1)$，

    把点$A(2,-1)$，$B(1,1)$代入$y=kx+b\ (k\neq0)$中，

    $\left\{\begin{array}{l}k+b=1\\2k+b=0\end{array}\right.$

    解得$\left\{ \begin{array} { l } { k = - 2 } \\ { b = 3 } \end{array} \right.$

    ∴一次函数的表达式为$y = -2x + 3$；

    【小问2详解】

    根据题意得：$x+m<-2x+3$，即$x<\frac{3-m}{3}$，

    ∵当$x \leq 0$时，对于x的每一个值，函数$y = x + m$的值小于函数$y=kx+b\ (k\neq0)$的值，

    ∴$\frac{3-m}{3}>0$，

    ∴$m<3$．'
