  question: '青少年的健康素质是全民族健康素质的基础．某校为了解学生寒假参加体育锻炼的情况，从七、八、九年级学生中各随机抽取了该年级学生人数的$5\%$，调查了他们平均每周参加体育锻炼的时长，并对这些数据进行整理、描述和分析，下面给出部分信息．

    a．七、八年级学生平均每周参加体育锻炼时长数据的折线图如下：

    [图]

    b．九年级学生平均每周参加体育锻炼的时长：

    7，8，8，11，9，7，6，8

    c．七、八、九年级学生平均每周参加体育锻炼时长的平均数、中位数、众数：

    年级

    平均数

    中位数

    众数

    七年级

    7．1

    7

    6，10

    八年级

    7

    m

    n

    九年级

    p

    8

    8

    根据所给信息，回答下列问题：

    （1）表中m的值是___________，n的值是___________，p的值是___________；

    （2）设七、八、九三个年级学生参加体育锻炼时长的方差分别是$S_{1}^{2}$，$s_{2}^{2}$，$S_{3}^{2}$，直接写出$S_{1}^{2}$，$s_{2}^{2}$，$S_{3}^{2}$之间的大小关系___________（用“<”连接）；

    （3）估计全校九年级所有学生中，共有___________名学生参加体育锻炼的时长不少于9小时．'
  answer: （1）$6.5$，9，8 （2）$S_{1}^{2}<S_{2}^{2}<S_{1}^{2}$ （3）40
  solution: '【小问1详解】

    解：八年级学生平均每周参加体育锻炼时长的数据为：4，5，5，6，6，7，9，9，9，10；

    ∴中位数$m=\frac{6+7}{2}=6.5$，众数$n = 9$，

    九年级学生平均每周参加体育锻炼时长的平均数$p=7\times2+6+8\times3+9+1=88$，

    故答案为：$6.5$，9，8；

    【小问2详解】

    解：七年级学生平均每周参加体育锻炼时长的数据波动最大，

    九年级学生平均每周参加体育锻炼时长的数据波动最小，

    ∴$S_{1}^{2}<S_{2}^{2}<S_{1}^{2}$；

    【小问3详解】

    解：全校九年级的学生总人数为$8\div5\%=160$（人），

    $160\times\frac{2}{8}=40$（人），

    答：估计全校九年级所有学生中，共有40名学生参加体育锻炼的时长不少于9小时．

    故答案为：40．'
