  question: '如图，A，B，C三点在$\odot\odot$上，直径BD平分$\angle ABC$，过点D作$DE \parallel AB$交弦BC于点E，在BC的延长线上取一点F，使得$\angle BFD = \angle ADB$．

    [图]

    （1）求证：DF是$\odot\odot$的切线；

    （2）若$AD = 4$，$DE = 5$，求DF的长．'
  answer: （1）见解析（2）$2\sqrt{5}$
  solution: '【小问1详解】

    证明：如图，

    [图]

    ∵BD平分$\angle ABC$，

    ∴$\angle1=\angle2$，

    ∵BD是$\odot\odot$的直径，

    ∴$\angle A=90^{\circ}$，

    ∴$\angle 1+\angle ADB=90^\circ$，

    ∵$\angle F=\angle ADB$，$\angle1=\angle2$，

    ∴$\angle 2+\angle F=90$°，

    ∴$\angle ADB=90^\circ$

    ∴$OD \perp DF$，

    ∵OD是$\odot\odot$的半径，

    ∴DF是$\odot\odot$的切线．

    【小问2详解】

    解：连接DC，

    [图]

    ∵BD是$\odot\odot$的直径，

    ∴$\angle DCB=90^{\circ}$，

    ∵BD平分$\angle ABC$，$AD = 4$，

    ∴$DC = DA = 4$，

    ∵$DE = 5$，

    ∴$CE = \sqrt{DE^{2} - DC^{2}} = 3$，

    ∵$DE \parallel AB$

    ∴$\angle1=\angle3$

    ∵$\angle1=\angle2$，

    ∴$\angle 3=\angle 2$，

    ∴$EB = DE = 5$，

    ∴$CB = 3 + 5 = 8.$

    ∴$DB=\sqrt{DC^{2}+CB^{2}}=\sqrt{4^{2}+8^{2}}=4\sqrt{5}$，

    又$\angle FDB=\angle DCB=90^\circ$，$\angle 2=\angle 2$，

    ∴$\triangle FDB\sim\triangle DCB$

    ∴$\frac{DF}{DC} = \frac{DB}{CB}$

    即$\frac{DF}{4}=\frac{4\sqrt{5}}{8}$

    ∴$DF=2\sqrt{5}$'
