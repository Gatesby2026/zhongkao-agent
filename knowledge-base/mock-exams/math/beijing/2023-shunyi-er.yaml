  question: '如图，在$\triangle ABC$中，AD，BD分别是$\angle BAC$，$\angle ABC$的平分线，过点D作$EF \parallel AB$，分别交AC，BC于点E，F．若$AE = 4$，$BF = 6$，则EF的长为______．

    [图]'
  answer: '10'
  solution: '解：∵AD平分$\angle BAC$，BD平分$\angle ABC$，

    ∴$\angle BAD = \angle CAD$，$\angle ABD = \angle CBD$，

    ∵$EF \parallel AB$，

    ∴$\angle BAD = \angle ADE$，$\angle ABD = \angle BDF$，

    ∴$\angle CAD = \angle ADE$，$\triangle CBD \cong \triangle BDF$，

    ∴$DE = AE = 4$，$DF = BF = 6$，

    ∴$EF=DE+DF=4+6=10$，

    故答案为：10．'
