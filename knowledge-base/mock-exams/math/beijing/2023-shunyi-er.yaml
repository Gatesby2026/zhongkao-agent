  question: '已知关于x的方程$x^{2}-bx+2b-4=0$．

    （1）求证：方程总有两个实数根；

    （2）若b为正整数，且方程有一个根为负数，求b的值．'
  answer: （1）证明见解析 （2）$1$
  solution: '【小问2详解】

    解：$x^{2}-bx+2b-4=0$，

    $(x^{2}-4)-b(x-2)=0$，

    $(x+2)(x-2)-b(x-2)=0$，

    $(x-2)(x+2-b)=0$，

    解得：$x_{1}=2$，$x_{2}=b-2$，

    ∵b为正整数，且方程有一个根为负数，

    ∴$\left\{\begin{array}{l}b-2<0\\ b>0\end{array}\right.$，

    ∴$0<b<2$，

    ∴$b = 1$，

    ∴b的值为$1$．'
