  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\ (k\neq0)$的图象由$y = -2x$的图象平移得到，且过点$(2,-1)$．

    （1）求这个一次函数的解析式；

    （2）当$x>2$时，对于x的每一个值，函数$\hat{y}=mx(m\neq0)$的值大于函数$y=kx+b\ (k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y = -2x + 3$ （2）$m-\frac{1}{2}$，且$m \neq 0$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b\ (k\neq0)$的图象由$y = -2x$的图象平移得到，

    ∴$k = -2$

    ∵一次函数$y=kx+b\ (k\neq0)$的图象过点$(2,-1)$

    ∴$-2\times2+b=-1$

    ∴$b=3$

    ∴这个一次函数的解析式$y = -2x + 3$；

    【小问2详解】

    由$y = -2x + 3$，当$x=2$时，$y=-1$，

    将$(2,-1)$代入$\hat{y}=mx(m\neq0)$

    即$-1 = 2m$

    解得：$m = -\frac{1}{2}$

    ∵$x>2$时，对于x的每一个值，函数$\hat{y}=mx(m\neq0)$的值大于函数$y = -2x + 3$的值，

    ∴$m-\frac{1}{2}$，且$m \neq 0$

    [图]【点睛】本题考查了一次函数的平移，待定系数法求解析式，根据一次函数交点求不等式的解集，熟练掌握一次函数的性质是解题的关键．'
