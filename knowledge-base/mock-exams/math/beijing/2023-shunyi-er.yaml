  question: '在平面直角坐标系xOy中，已知点P，直线l与图形G．连接点P与图形G上任意一点Q，取$\overline{PQ}$的中点M，点M关于直线l的对称点为N，所有的对称点组成的图形W称为图形G关于点P及直线l的“对应图形”．

