  question: '在平面直角坐标系xOy中，已知抛物线$y=ax^{2}-2a^{2}x-3(a\neq 0)$．

    （1）求该抛物线的对称轴（用含a的式子表示）；

    （2）若$a = 1$，当$-2 < x < 3$时，求y的取值范围；

    （3）已知$A(2a-1,y_{1})$，$B(a,y_{2})$，$C(a+2,y_{3})$为该抛物线上的点，若$y_{1}<y_{3}<y_{2}$，求a的取值范围．'
  answer: （1）直线$x = a$ （2）$-4 \leq y < 5$ （3）$a<-1$
  solution: '【小问1详解】

    解：抛物线$y=ax^{2}-2a^{2}x-3(a\neq 0)$的对称轴为直线$x=\frac{-2a^{2}}{2a}=-a$；

    【小问2详解】

    解：∵$a = 1$，

    ∴抛物线解析式为$y=x^{2}-2x-3$，对称轴为直线$x = 1$，开口向上，

    ∵$-2 < x < 3$，$x = -2$比$x=3$距离对称轴远，

    ∴$x = 1$时，y的最小值为$1-2-3=-4$，

    当$x = -2$时，$y = 5$，

    ∴当$-2 < x < 3$时，求y的取值范围为$-4 \leq y < 5$；

    【小问3详解】

    解：∵$y_{1}<y_{3}<y_{2}$，$B(a,y_{2})$，对称轴为直线$x = a$，

    ∴$B(a,y_{2})$为抛物线的顶点，$a<0$，$C(a+2,y_{3})$在对称轴的右侧，

    当$A(2a-1,y_{1})$在对称轴的左侧时，$a-(2a-1)>(a+2)-a$

    ∴$a<-1$

    当$A(2a-1,y_{1})$在对称轴的右侧时，$2a-1>a+2$

    ∴$a>3$，不合题意，舍去

    ∴$a<-1$．'
