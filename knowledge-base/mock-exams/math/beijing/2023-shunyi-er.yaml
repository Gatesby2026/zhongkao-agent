    作$\odot T''$关于$x=-1$的对称的圆$\odot M$，则此圆是以$\left(-\frac{t}{2}-5,2\right)$为圆心的圆，半径为1，

    [图]

    ∵点$A(4,0)$，$B(0,4)$，$C(-4,0)$，

    ∴直线BC的解析式为$y=x+4$，当$y=2$时，$x = -2$，

    直线AB的解析式为$y=-x+4$，当$y=2$时，$x=2$，

    ∵$\odot M$与$\triangle ABC$'
