  question: '某架飞机着陆后滑行的距离y（单位：m）与滑行时间x（单位：S）近似满足函数关系$y=ax^{2}+bx(a\neq 0)$．由电子监测获得滑行时间x与滑行距离y的几组数据如下：

    滑行时间x/s

    $0$

    $2$

    $4$

    $6$

    $8$

    $10$

    滑行距离y/m

    $0$

    $114$

    $216$

    $306$

    $384$

    $450$

    （1）根据上述数据，求出满足的函数关系式$y=ax^{2}+bx(a\neq 0)$；

    （2）飞机着陆后滑行多远才能停下来？此时滑行的时间是多少？'
  answer: （1）$y = -\frac{3}{2}x^2 + 60x$ （2）飞机着陆后滑行$600m$才能停下来，此时滑行的时间是$20s$
  solution: '【小问1详解】

    解：根据表格可以得出函数图像过点$(2,114)$，$(4,216)$，

    ∴$\begin{aligned}

    4a + 2b &= 114 \\

    16a + 4b &= 216

    \end{aligned}$，

    解得：$\left\{

    \begin{array}{l}

    a = -\dfrac{3}{2} \\

    b = 60

    \end{array}

    \right.$，

    ∴函数关系式为：$y = -\frac{3}{2}x^2 + 60x$．

    【小问2详解】

    根据题意，飞机着陆后滑行一段距离停下来，此时滑行距离y取得最大值，

    ∵函数关系式为$y = -\frac{3}{2}x^2 + 60x$，且$-\frac{3}{2}<0$，

    当$x-\frac{60}{2\times\left(-\frac{3}{2}\right)}=20$时，最大值$y = \frac{3}{2} \times 20^2 + 60 \times 20 = 600$，

    ∴飞机着陆后滑行$600m$才能停下来，此时滑行的时间是$20s$．'
