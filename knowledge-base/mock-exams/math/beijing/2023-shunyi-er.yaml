  question: '如图，在$\triangle ABC$中，$AB = AC$，点A关于BC的对称点为D，连接BD，CD．

    [图]

    （1）求证：四边形$ABDC$是菱形；

    （2）过点A作$AE \perp BD$于E，且交BC于点F，若$AB = 6$，$BE = 4$，求AF的长．'
  answer: （1）见解析（2）$\frac{6\sqrt{5}}{5}$
  solution: '【小问1详解】

    证明：∵A关于BC的对称点为D，

    ∴$AB = BD$，$AC = CD$，

    ∵$AB = AC$，

    ∴$AB=BD=AC=CD$，

    ∴四边形$ABDC$是菱形；

    【小问2详解】

    解：∵$AE \perp BD$，$AB = 6$，$BE = 4$

    ∴$\angle AEB = 90^\circ$，

    ∴$AE = \sqrt{AB^{2} - BE^{2}} = \sqrt{6^{2} - 4^{2}} = 2\sqrt{5}$，

    ∵四边形$ABDC$是菱形，

    ∴$BD \parallel AC$，$AC = AB = 6$，

    ∴$\triangle BEF \sim \triangle CAF$，

    ∴$\frac{BE}{AC} = \frac{EE}{AF}$，

    ∴$\frac{EF}{AF}=\frac{4}{6}=\frac{2}{3}$，

    设$EF = 2x$，$AF = 3x$，有$2x + 3x = 2\sqrt{5}$，

    ∴$x = \frac{2}{5} \sqrt{5}$，

    ∴$AF=3x=\frac{6\sqrt{5}}{5}$．

    [图]【点睛】本题考查了菱形的性质与判定，相似三角形的性质与判定，勾股定理，熟练掌握是菱形的性质与判定解题的关键．'
