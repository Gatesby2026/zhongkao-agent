  question: 解不等式组：$\frac{3-4x+2-3x}{5} > -1$
  answer: $-2<x<1$
  solution: '解：$\begin{aligned}

    &3+4x>2-3x\quad\text{(1)}\\

    &\frac{4x+3}{5}>-1\quad\text{(2)}

    \end{aligned}$

    $3-4x>2-3x$

    整理得$x<1$；

    $\frac{4x+3}{5} > -1$

    去分母得$4x+3>-5$

    整理得$x > -2$；

    故原不等式组的解集为：$-2<x<1$．'
