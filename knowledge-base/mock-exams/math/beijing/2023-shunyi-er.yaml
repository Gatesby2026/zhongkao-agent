    ∴$E''(1,0)$，$F''(2,-2)$

    设直线$E''F''$的解析式为$y=k(x-1)$，

    ∴$-2 = k(2 - 1)$

    解得：$k = -2$

    ∴直线$E''F''$的解析式为$y = -2x + 2$，

    设直线$E''F''$关于$l: x = a$的对称直线与x轴的交点为H，

