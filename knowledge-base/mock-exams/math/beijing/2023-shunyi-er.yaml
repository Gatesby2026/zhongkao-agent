  question: '如图，PA，PB分别与$\odot\odot$相切于A，B两点，AC是$\odot\odot$的直径．

    [图]

    （1）求证：$\angle BAC=\frac{1}{2}\angle APB$

    （2）连接PO交$\odot\odot$于点D，若$AC = 6$，$\cos\angle BAC=\frac{4}{5}$，求PD的长．'
  answer: （1）证明见解析 （2）$2$
  solution: '【小问1详解】

    证明：如图，连接PO，交AB于点E．

    ∵PA、PB为$\odot\odot$的切线，

    ∴$PA = PB$，$\angle 1-\angle 2=\frac{1}{2}\angle APB$，$\angle PAO = 90^\circ$，

    ∴$PE \perp AB$，$\angle 3+\angle BAC=90^{\circ}$，

    ∴$\angle PEA=90^\circ$，

    ∴$\angle 1+\angle 3=90^{\circ}$，

    ∴$\angle BAC = \angle 1$，

    ∴$\angle BAC=\frac{1}{2}\angle APB$．

    [图]【小问2详解】

    解：∵AC是$\odot\odot$$[公式]$直径，

    ∴$\angle ABC = 90^\circ$，

    ∵$AC = 6$，$\cos\angle BAC=\frac{4}{5}$，

    ∴$AB\cdot AC\cos\angle BAC=6\times\frac{4}{5}=\frac{24}{5}$，

    ∴$BC=\sqrt{AC^{2}-AB^{2}}=\sqrt{6^{2}-\left(\frac{24}{5}\right)^{2}}=\frac{18}{5}$，

    ∴$\sin\angle BAC=\frac{BC}{AC}=\frac{5}{6}=\frac{3}{5}$，

    ∴$\sin \angle 1 = \frac{3}{5}$，

    ∵$\angle PAO = 90^\circ$，$AC = 6$，

    ∴$DO = AO = \frac{1}{2}AC = 3$，

    ∴$PD=\frac{AO}{\sin\angle1}=\frac{3}{\frac{1}{5}}=5$，

    ∴$PD-PO-DO=5-3=2$，

    ∴PD的长为$2$．

    [图]【点睛】本题考查切'
