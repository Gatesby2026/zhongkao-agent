  question: '已知：线段AB及射线AM．

    求作：等腰$\triangle ABC$，使得点C在射线AM上．

    [图]

    作法一：如图1，以点B为圆心，BA长为半径作弧，交射线AM于点C（不与点A重合），连接BC．

    作法二：如图2．

    ①在AB上取一点D，以点A为圆心，AD长为半径作弧，交射线AM于点E，连接DE；

    ②以点B为圆心，AD长为半径作弧，交线段BA于点F；

    ③以点F为圆心，DE长为半径作弧，交前弧于点G；

    ④作射线BG交射线AM于点C．

    作法三：如图3，

    ①分别以点A，B为圆心，大于$\frac{1}{2}AB$的同样长为半径作弧，两弧分别交于点P，Q；

    ②作直线$\overline{PQ}$，交射线AM于点C，连接BC．根据以上三种作法，填空：

    由作法一可知：______$= AB$，

    ∴$\triangle ABC$是等腰三角形．

    由作法二可知：$\angle$______$= \angle BAM$，

    ∴$CA = CB$（__________________）（填推理依据）．

    ∴$\triangle ABC$是等腰三角形．

    由作法三可知；$\overline{PQ}$是线段AB的______．

    ∴$CA = CB$（__________________）（填推理依据）．

    ∴$\triangle ABC$是等腰三角形．'
  answer: CB；ABG；等角对等边；垂直平分线；线段垂直平分线上的点与线段两个端点的距离相等
  solution: '由作法一可知：CB$= AB$，

    ∴$\triangle ABC$是等腰三角形．

    由作法二可知：$\angle$ABG$= \angle BAM$，

    ∴$CA = CB$（等边对等角）

    ∴$\triangle ABC$是等腰三角形．

    由作法三可知；$\overline{PQ}$是线段AB的垂直平分线．

    ∴$CA = CB$（线段垂直平分线上的点与线段两个端点的距离相等）'
