  question: '党的二十大报告提出“深化全民阅读活动”．某校开展了“书香浸润心灵

    阅读点亮人生”读书系列活动．为了解学生的课外阅读情况，随机选取了某班甲、乙两组学生一周的课外阅读时间（单位：小时）进行统计，数据如下：

    甲组

    $6$

    $7$

    $8$

    $8$

    $8$

    $9$

    $10$

    乙组

    $4$

    $7$

    $8$

    $8$

    $8$

    $9$

    $12$

    两组数据的众数分别为$M_{\text{甲}}$，$M_{\mathrm{乙}}$，方差分别为$S_{\text{甲}}^{2}$，$S_{\mathrm{乙}}^{2}$，则（）

    A.$M_{\parallel}=M_{\angle}$，$s_{甲}^{2}<s_{乙}^{2}$B.$M_{\parallel}=M_{\angle}$，$S_{甲}^{2}=S_{乙}^{2}$

    C.$M_{\parallel}=M_{\angle}$，$S_{甲}^{2}>S_{乙}^{2}$D.$M_{\parallel}>M_{\mathrm{乙}}$，$s_{甲}^{2}<s_{乙}^{2}$'
  answer: A
  solution: '解：由题意得，

    甲组的平均数为$M_{\mu}=\frac{1}{7}(6+7+8+8+8+9+10)=8$，

    ∴$s_{n}^{2}=\frac{1}{7}\left[(6-8)^{2}+(7-8)^{2}+3\times(8-8)^{2}+(9-8)^{2}+(10-8)^{2}\right]=\frac{10}{7}$；

    乙组的平均数为$M_{Z}=\frac{1}{4}(4+7+8+8+8+9+12)=8$，

    ∴$s_{c}^{2}=\frac{1}{7}\left[\left(4-8\right)^{2}+\left(7-8\right)^{2}+3\times\left(8-8\right)^{2}+\left(9-8\right)^{2}+\left(12-8\right)^{2}\right]=\frac{34}{7}$，

    ∴$s_{甲}^{2}<s_{乙}^{2}$．

    故选：A．'
