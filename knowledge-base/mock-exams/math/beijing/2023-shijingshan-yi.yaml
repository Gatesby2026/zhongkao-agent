  question: '在平面直角坐标系xOy中，一次函数$y=kx+b(k\neq0)$的图像由函数$y=x$的图像平移得到，且经过点$A(1,3)$．

    （1）求这个一次函数的解析式；

    （2）当$x<1$时，对于x$[公式]$每一个值，函数$y = mx (m \ne 0)$的值小于函数$y=kx+b(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=x+2$ （2）$1 \leq m \leq 3$
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b(k\neq0)$的图像由函数$y=x$的图像平移得到，

    ∴$k = 1$．

    ∵一次函数$y=x+b$的图像经过点$A(1,3)$，

    ∴$1+b=3$．

    ∴$b = 2$．

    ∴这个一次函数的解析式为$y=x+2$．

    【小问2详解】

    解：由题意，得：$x<1$时直线$y = mx (m \ne 0)$在直线$y=x+2$的下方，

    如图：当直线$y = mx (m \ne 0)$在$l_{1},l_{2}$之间时，满足题意：

    [图]

    当$y = mx (m \ne 0)$与$y=x+2$平行时，$m = 1$，

    当$y = mx (m \ne 0)$过点$A(1,3)$时：$m = 3$，

    ∴当$1 \leq m \leq 3$时，对于$x<1$的每一个值，函数$y = mx (m \ne 0)$的值小于函数$y=kx+b(k\neq0)$的值．'
