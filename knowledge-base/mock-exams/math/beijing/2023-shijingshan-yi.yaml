  question: '$2022$年$10$月$12$日，“天宫课堂”第三课在中国空间站的问天实验舱开讲，“太空教师”陈冬、刘洋、蔡旭哲为广大青少年带来一场精彩的太空科普课．为了激发学生的航天兴趣，弘扬科学精神，某校甲、乙两个校区的八年级所有学生（两个校区八年级各有$200$名学生）参加了“格物致知叩问苍穹”为主题的太空科普知识竞赛．为了解八年级学生的科普知识掌握情况，调查小组进行了抽样调查，过程如下，请补充完整．

    收集数据：调查小组计划从两个校区的八年级共选取$40$名学生的竞赛成绩（百分制）作为样本，下面的抽样方法中，合理的是（填字母）．

    A．从每个校区八年级的科技小组中分别选取$20$名学生的竞赛成绩组成样本；

    B．从每个校区八年级分别选取$20$名男生的竞赛成绩组成样本；

    C．从每个校区八年级分别随机选取$10$名男生、$10$名女生的竞赛成绩组成样本．

    抽样方法确定后，调查小组抽取得到两个校区的样本数据，其中乙校区的样本数据如下：$66$$88$$84$$79$$92$$83$$95$$89$$100$$91$

    $91$$97$$74$$77$$99$$98$$89$$94$$100$$100$

    整理、描述数据：按如下分数段整理、描述两个校区的样本数据，其中乙校区的情况如下：

    人数成绩x

    校区

    $65 \leq x < 80$

    $80 \leq x < 85$

    $85 \leq x < 90$

    $90 \leq x < 95$

    $95 \leq x \leq 100$

    乙校区

    $2$

    $3$

    $7$

    分析数据：两个校区样本数据的平均数、中位数、方差如下表所示：

    校区

    平均数

    中位数

    方差

    甲校区

    $89.3$

    $88.5$

    $42.6$

    乙校区

    $89.3$

    $87.2$

    得出结论：

    a．对于抽取的八年级学生竞赛成绩，高于本校区平均分的人数更多的是校区，成绩更稳定的是校区（填“甲”或“乙”）；

    b．抽样调查中，两个校区共有$30\%$的学生竞赛成绩不低于$95$分．该校计划从两个校区选派成绩不低于$95$分的学生参加全区的竞赛，估计参赛的八年级学生中，甲校区有人．'
  answer: 收集数据：C；整理、描述数据：4，$4$；分析数据：$91$；得出结论：a．乙，甲；b．$50$
  solution: '解：收集数据：根据抽取样本要保证总体的每一个对象有同等的被抽取到的可能性，并要求它们之间都是独立的，即可选择C；

    整理、描述数据：由题中所给数据可知，乙校区成绩在$65 \leq x < 80$的有4人，$90 \leq x < 95$的也有4人；

    分析数据：将乙校区成绩按从小到大排列为：

    $66$$74$$77$$79$$83$$84$$88$$89$$89$$91$$91$$92$$94$$95$$97$$98$$99$$100$$100$$100$

    ∴中位数为$91$；

    得出结论：a．由表格可知对于抽取的八年级学生竞赛成绩，高于本校区平均分的人数更多的是乙校区，成绩更稳定的是甲校区．

    故答案为：乙，甲；

    b．∵抽样调查中，两个校区共有$30\%$的学生竞赛成绩不低于$95$分，

    ∴两个校区共有$30\%\times40=12$人．

    ∵抽样中乙校区成绩不低于$95$分的人数为7人，

    ∴抽样中甲校区成绩不低于$95$分的人数为$12-7=5$人，

    ∴甲校区成绩不低于$95$分的人数所占百分比为$\frac{5}{20}=25\%$，

    ∴该校计划从两个校区选派成绩不低于$95$分的学生参加全区的竞赛，估计参赛的八年级学生中，甲校区有$200\times25\%=50$人．

    故答案为：50．'
