  question: '如图，在$\triangle ABC$中，$\angle ACB=90^\circ$，过点C作$EF \parallel AB$．若$\angle ECA=55^{\circ}$，则$\angle B$的度数为（）

    [图]

    A.$55^\circ$B.$45^\circ$C.$35^\circ$D.$25^\circ$'
  answer: C
  solution: '解：∵$EF \parallel AB$，$\angle ECA=55^{\circ}$，

    ∴$\angle A=\angle ECA=55^{\circ}$，

    ∵在$\triangle ABC$中，$\angle A=55^{\circ}$，$\angle ACB=90^\circ$，

    ∴$\angle B = 180^{\circ} - \angle A - \angle ACB = 180^{\circ} - 55^{\circ} - 90^{\circ} = 35^{\circ}$．

    故选：C．'
