  question: '方程组$\begin{cases}

    x - y = 7 \\

    2x + y = 5

    \end{cases}$的解为_______．'
  answer: $\left\{ \begin{array}{l} x = 4 \\ y = -3 \end{array} \right.$
  solution: '解：$\begin{aligned}

    &x - y = 7 \quad \text{(1)} \\

    &2x + y = 5 \quad \text{(2)}

    \end{aligned}$，

    $① + ②$得，$3x=12$，解得，$x = 4$，

    把$x = 4$代入$1$得，$4 - y = 7$，解得，$y=-3$，

    ∴原方程组的解为$\left\{

    \begin{array}{l}

    x = 4 \\

    y = -3

    \end{array}

    \right.$．'
