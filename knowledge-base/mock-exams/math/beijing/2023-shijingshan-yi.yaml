    ③某工程队匀速铺设一条地下管道，铺设剩余任务y与施工时间x．

    其中，变量y与变量x之间的函数关系可以用如图所示的图象表示的是（）

    [图]

    A.①②③B.①②C.①③D.②③'
  answer: D
  solution: '解：由图象可知：图象为一次函数的图象，且y随x的增大而减小；

    ①圆的面积y随着半径x的增大而增大，不符合题意；

    ②将游泳池中的水匀速放出，直至放完，游泳池中的剩余水量y随着放水时间x的增大而减小，而且是匀速减小，符合题意；

    ③某工程队匀速铺设一条地下管道，铺设剩余任务y随着施工时间x的增大而减小，且匀速减小，符合题意．

    综上，符合题意的是②③；

    故选D．'
