  question: '如图，在$\triangle ABC$中，$BC = 2AB$，D，E分别为BC，AC的中点，过点A作$AF \parallel BC$交DE的延长线于点F．

    [图]

    （1）求证：四边形$ABDF$是菱形；

    （2）若$AB=2$，$\angle B=60^{\circ}$，求AE的长．'
  answer: （1）见解析（2）$\sqrt{3}$
  solution: '【小问1详解】

    证明：∵D，E分别为BC，AC的中点，

    ∴$BD=\frac{1}{2}BC$，$ED \parallel AB$，$ED=\frac{1}{2}AB$．

    又∵$AF \parallel BC$，

    ∴四边形$ABDF$是平行四边形．

    ∵$BC = 2AB$，

    ∴$AB = \frac{1}{2}BC$．

    ∴$AB = BD$．

    ∴四边形$ABDF$是菱形．

    【小问2详解】

    解：连接AD，如图．

    ∵四边形$ABDF$是菱形，

    ∴$\angle F=\angle B=60^{\circ}$，$AF = DF - AB = 2$．

    [图]

    ∴$\triangle ADF$是等边三角形．

    ∵$ED=\frac{1}{2}AB+\frac{1}{2}DF$，

    ∴$EF = ED$．

    ∴$AE \perp DF$．

    在$Rt\triangle AEF$中，$\angle F=60^{\circ}$，$AF = 2$，

    ∴$AE\cdot AF\cdot\sin F-2x\frac{\sqrt{3}}{2}=\sqrt{3}$．'
