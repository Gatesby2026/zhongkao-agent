  question: 已知$x^{2}-x-5=0$，求代数式$\frac{x^{2}+1}{x}-2-\frac{x-1}{x^{2}}$的值．
  answer: $x^{2}-x$，5
  solution: '解：原式=$\frac{x^{2}+1-2x}{x}\cdot\frac{x^{2}}{x-1}$

    =$\frac{(x-1)^{2}}{x}\cdot\frac{x^{2}}{x-1}$

    =$x(x-1)$

    =$x^{2}-x$，

    ∵$x^{2}-x-5=0$，

    ∴$x^{2}-x=5$．

    ∴原式$= 5$．'
