  question: '如图，AB是$\odot\odot$的直径，点D是弦AC延长线上一点，过点D作$DE \perp AB$于点E，过点C作$\odot\odot$的切线，交DE于点F．

    [图]

    （1）求证：$FC = FD$；

    （2）若E是OB的中点，$\sin D = \frac{3}{5}$，$OA = 2$，求FD的长．'
  answer: （1）见解析（2）$\frac{13}{8}$
  solution: '【小问1详解】

    证明：连接OC，如图1．

    [图]

    ∵CF是⊙O的切线，OC是⊙O的半径，

    ∴$OC \perp CF$，

    ∴$\angle 1+\angle 2=90^{\circ}$，

    ∵$DE \perp AB$，

    ∴$\angle D+\angle 3=90^{\circ}$，

    ∵$OA = OC$，

    ∴$\angle2=\angle3$．

    ∴$\angle 1=\angle D$，

    ∴$FC = FD$；

    【小问2详解】

    解：连接OF，如图2．

    [图]

    ∵$OB = OA = 2$，E是OB的中点，

    ∴$OE = 1$，$AE = 3$，

    在$\mathrm{Rt}\triangle AED$中，$\sin D=\frac{AE}{AD}=\frac{3}{5}$，

    ∴$AD = 5$，

    ∴$DE = \sqrt{AD^{2} - AE^{2}} = 4$，

    设$FD = FC = x$，则$EF=4-x$，

    在$\mathrm{Rt}\triangle FCO$中，$OF^{2}=FC^{2}+OC^{2}=x^{2}+4+4$．

    在$\mathrm{Rt}\triangle FEO$中，$OE^{2}=EF^{2}+OE^{2}=(4-x)^{2}+1^{2}$．

    ∴$x^{2}+4=(4-x)+1$，解得$x=\frac{13}{8}$．

    即FD的长为$\frac{13}{8}$．'
