  question: '篮球是学生非常喜爱的运动项目之一．篮圈中心距离地面的竖直高度是$3.05m$，小石站在距篮圈中心水平距离$6.5m$处的点A练习定点投篮，篮球从小石正上方出手到接触篮球架的过程中，其运行路线可以看作是抛物线的一部分．当篮球运行的水平距离是x（单位：m）时，球心距离地面的竖直高度是y（单位：m）．在小石多次的定点投篮练习中，记录了如下两次训练：

    [图]

    （1）第一次训练时，篮球的水平距离x与竖直高度y的几组数据如下：

    水平距离$x / m$

    $0$

    $1$

    $2$

    $3$

    $4$

    $5$

    $6$

    竖直高度$y/m$

    $2.0$

    $2.7$

    $3.2$

    $3.5$

    $3.6$

    $3.5$

    $3.2$

    ①在平面直角坐标系xOy中，描出以上表中各对对应值为坐标的点，并用平滑的曲线连接；

    ②结合表中数据或所画图象，直接写出篮球运行的最高点距离地面的竖直高度，并求y与x满足的函数解析式；

    ③小石第一次投篮练习没能投进，请说明理由；

    （2）第二次训练时，小石通过调整出手高度的方式将球投进．篮球出手后运行路线的形状与第一次相同，达到最高点时，篮球的位置恰好在第一次的正上方，则小石的出手高度是m．'
  answer: （1）①见解析；②$3.6m$，$y=-0.1(x-4)^{2}+3.6$；③见解析 （2）$2.075$
  solution: '【小问1详解】

    解：①如图所示，即为所求．

    [图]

    ②∵当$x=3$和$x=5$时，都有$y = 3.5$，

    ∴抛物线对称轴为直线$x=\frac{3+5}{2}=4$，

    又∵由函数图象可知，抛物线开口向下，

    ∴当$x = 4$时，y有最大值，即篮球运行的最高点距离地面的竖直高度为$3.6m$．

    依题意，设y与x的函数解析式为$y=a(x-4)^{2}+3.6(a\neq 0)$．

    ∵当$x = 0$时，$y = 2.0$，

    ∴$a(0-4)^2+3.6=2.0$．

    解得$a = -0.1$．

    ∴y与x的函数解析式为$y=-0.1(x-4)^{2}+3.6$．

    ③∵当$x = 6.5$时，$y=-0.1\times(6.5-4)^{2}+3.6=2.975<3.05$．

    ∴小石第一次投篮练习不可能投进；

    【小问2详解】

    解：由题意得第二次出手的抛物线可以看作第一次出手的抛物线向上平移得到的，设这个平移距离为t个单位长度，

    ∴第二次出手的抛物线解析式为$y=-0.1(x-4)^{2}+3.6+t$，

    ∵第二次出手能投进，

    ∴在$y=-0.1(x-4)^{2}+3.6+t$中，当$x = 6.5$时，$y = 3.05$，

    ∴$-0.1\times(6.5-4)^{2}+3.6+t=3.05$，

    ∴$t = 0.075$，

    ∴第二次出手的抛物线解析式为$y=-0.1(x-4)^{2}+3.6+0.075=-0.1(x-4)^{2}+3.675$，

    在$y=-0.1(x-4)^{2}+3.675$中，当$x = 0$时，$y = 2.075$，

    ∴小石的出手高度是$2.075m$，

    故答案为：$2.075$．'
