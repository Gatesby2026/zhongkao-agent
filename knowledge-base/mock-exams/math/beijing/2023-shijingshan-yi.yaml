    ②如图2，若直线$y=\frac{1}{3}x+b$上存在点P，使点P为线段AB的“关联点”，求b的取值范围；

    （2）图形W是以$T(t,0)$为圆心，$1$为半径的$\bigcirc$T．已知点$M(6,0)$，$N(0,2\sqrt{3})$．若线段MN上存在点P，使点P为$\bigcirc$T的“关联点”，直接写出t的取值范围．'
  answer: （1）①$P_{2}$，$P_3$②$-2 \leq b \leq 5$ （2）$4-2\sqrt{2}\leq x\leq 7+\sqrt{2}$
  solution: '【小问1详解】

    解：①依题意，线段AB的“关联点”P在如图所示的阴影部分（含外边缘线段，不含线段AB），其中点$C(0,5)$，$D(3,5)$，$E(3,-1)$，$F(0,-1)$，点G是线段AD与BC的交点，点H是线段AE与BF的交点．

