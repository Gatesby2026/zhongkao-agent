  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}+bx+c\left(a>0\right)$的对称轴为$x = t$，两个不同的点$(3,m)$，$(t+1,n)$在抛物线上．

    （1）若$m = n$，求t的值；

    （2）若$n<m<c$，求t的取值范围．'
  answer: （1）4（2）$\frac{3}{2}<t<2$或$t>4$
  solution: '【小问1详解】

    解：∵点$(3,m)$，$(t+1,n)$在抛物线$y=ax^{2}+bx+c(a>0)$上，且$m = n$，

    ∴$t=\frac{3+(t+1)}{2}$．

    解得：$t = 4$；

    【小问2详解】

    解：由题意，点$(t+1,n)$在对称轴$x = t$的右侧，点$(0,c)$在对称轴的左侧，

    点$(3,m)$不在对称轴上．

    ①当点$(3,m)$在对称轴$x = t$$[公式]$左侧时，

    点$(t+1,n)$关于对称轴$x = t$的对称点为$(t-1,n)$．

    ∵$a > 0$且$n<m<c$，

    ∴$t-1>3$．

    ∴$t>4$．

    ②当点$(3,m)$在对称轴$x = t$的右侧时，

    点$(0,c)$关于对称轴$x = t$的对称点为$(2t,c)$．

    ∵$a > 0$且$n<m<c$，

    ∴$t+1<3<2t$．

    ∴$\frac{3}{2}<t<2$．

    综上所述，t$[公式]$取值范围是$\frac{3}{2}<t<2$或$t>4$．'
