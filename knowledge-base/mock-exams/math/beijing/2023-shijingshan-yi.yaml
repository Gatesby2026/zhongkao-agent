    ②若直线$y=\frac{1}{3}x+b$过点$E(3,-1)$，可得$b = -2$；

    若直线$y=\frac{1}{3}x+b$过点$C(0,5)$，可得$b=5$.

    结合函数图象，可得b的取值范围是$-2 \leq b \leq 5$．

