  question: '为了解$A, B, C$三款轮胎的最远行驶里程，分别从这三款轮胎中各随机抽取了8个轮胎，在相同条件下进行最远行驶里程测试，并对测试的数据进行整理、描述和分析，下面给出了部分信息．

    a．$A, B$两款轮胎的最远行驶里程的折线统计图如下：

    [图]

    b．C款轮胎的最远行驶里程：

    $161\quad90\quad108\quad103\quad97\quad94\quad104\quad95$

    c．$A, B, C$三款轮胎最远行驶里程的平均数、中位数如下：

    轮胎

    A

    B

    C

    平均数

    100

    100

    m

    中位数

    n

