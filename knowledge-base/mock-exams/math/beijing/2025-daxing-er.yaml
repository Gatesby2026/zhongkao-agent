  question: '列方程（组）解应用题：

    五一期间，在“国家补贴+商场直降”双重优惠推动下，消费者家电换新需求得到充分激活．国家补贴政策是购买$A,B$两款空调均可享受原价$20\%$的国家补贴；商场促销规则是购买空调的原价不低于4000元时，享受国家补贴后商场再直降500元，购买空调原价低于4000元时，只享受国家补贴．已知A款空调原价（高于4000元）比B款空调原价（低于4000元）的2倍少300元．若按此销售规则购买一台A款空调比一台B款空调多花1500元，购买一台A款空调和一台B款空调与原价比共节省多少元？'
  answer: 购买一台A款空调和一台B款空调与原价比共节省2120元
  solution: '解：设一台B款空调的原价为x元，则一台A款空调的原价为$(2x-300)$元，

    由题意可知，

    $(1-20\%)(2x-300)-500=(1-20\%)x+1500$．

    解得：$x=2800$，

    $2x-300=5300$，

    所以，$20\%\times(5300+2800)+500=2120$

    答：购买一台A款空调和一台B款空调与原价比共节省2120元．'
