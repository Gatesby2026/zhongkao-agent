    ∴$\frac{S_{2}}{S_{\triangle AOC}}=\left(\frac{AP}{AO}\right)^{2}=\left(\frac{x}{2}\right)^{2}$，

    ∵$h = 4\text{cm}$，

    ∴$S_{\triangle ABC}=\frac{1}{2}AO\cdot h=\frac{1}{2}\times 2\times 4=4$，

    即$\frac{S_{2}}{4}=\left(\frac{1}{2}\right)^{2}$，

    则$S_{2}=b=1$；

