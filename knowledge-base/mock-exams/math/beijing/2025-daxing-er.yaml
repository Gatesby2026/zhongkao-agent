  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\,(k\neq0)$的图象经过点$(-1,0)$，$(0,2)$．

    （1）求该一次函数的表达式；

    （2）当$x > -2$时，对于x的每一个值，函数$y = x + n$的值大于$-3$且小于一次函数$y=kx+b\,(k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$y=2x+2$ （2）$-1 \leq n \leq 0$
  solution: '【小问1详解】

    解：把点$(-1,0)$，$(0,2)$代入$y=kx+b\,(k\neq0)$中，

    得$\left\{ \begin{array} { l } { - k + b = 0 } \\ { b = 2 } \end{array} \right.$，

    解得$\left\{\begin{array}{l}k=2\\b=2\end{array}\right.$，

    ∴一次函数的表达式为$y=2x+2$；

    【小问2详解】

    解：由题意，在同一坐标系中画出直线$y=2x+2$，$y = x + n$如下．

    [图]

    由题意，当$x = -2$时，$y = x + y = -3$，

    则$-2+n=-3$，故$n = -1$．

    又∵当$x = -2$时，$y = 2x + 2 = -2$，

    ∴令$y = x + n = -2$，则$-2+n=-2$，故$n = 0$．

    ∵当$x > -2$时，对于x的每一个值，函数$y = x + n$的值大于$-3$且小于一次函数$y=kx+b\,(k\neq0)$的值，

    ∴$-1 \leq n \leq 0$．'
