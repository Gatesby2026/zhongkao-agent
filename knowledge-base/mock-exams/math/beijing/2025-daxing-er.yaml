  question: '已知：如图，在$Rt\triangle ABC$中，$\angle A=90^{\circ},AB=AC$，点$D,E,F$分别在$AB,AC,BC$上，且均不与$V_{ABC}$各顶点重合，$\angle FDE=90^{\circ},DF=DE,\triangle BFD,\triangle CEF$的面积分别为$S_1,S_2$．给出下面三个结论：

    [图]

    ①$CE = 2AD$；

    ②$\angle AED = \angle EFC$；

    ③$S_2 = 2S_1$．

    上述结论中，所有正确结论的序号是（）

    A.①②B.①③C.②③D.①②③'
  answer: D
  solution: '解：如图：

    [图]

    ∵$\angle FDE=90^{\circ},DF=DE$，$\angle A=90^{\circ},AB=AC$

    ∴$\angle DEF=\angle DFE=45^{\circ}=\angle C=\angle B$，

    ∴$\cos\angle DFE=\frac{DF}{EF}=\frac{\sqrt{2}}{2}$，

    ∵$\angle AEF=\angle AED+\angle DEF=\angle EFC+\angle C$，

    ∴$\angle AED = \angle EFC$，故②正确；

    ∵$\angle DFE=45^{\circ}=\angle B$，

    ∴同理可得：$\angle BDF = \angle EFC$，

    ∴$\triangle BDF \sim \triangle CFE$，

    ∴$\frac{S_{1}}{S_{2}}=\left(\frac{DF}{EF}\right)^{2}=\left(\frac{1}{\sqrt{2}}\right)^{2}=\frac{1}{2}$，即$S_2 = 2S_1$，故③正确；

    过点F作$FH \perp AB$于点H，则$\angle FHD=\angle A=90^{\circ}$，

    ∵$\angle BDF = \angle EFC$，$\angle AED = \angle EFC$，

    ∴$\angle BDF = \angle AED$，

    ∵$DF = DE$，

    ∴$\triangle HDF\cong\triangle AED(AAS)$，

    ∴$HF = AD$，$AE = DH$，

    ∵$\angle B=45^{\circ}$，$FH \perp AB$，

    ∴$\triangle BHF$$[公式]$等腰直角三角形，$BH = FH$，

    ∴$BH = FH = AD$'
