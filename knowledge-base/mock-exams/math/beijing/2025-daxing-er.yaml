  type: 解答
  score: 5
  question: '如图，在$Rt\triangle ABC$中，$\angle ACB=90^\circ$，D是AB中点，$CE \parallel AB$，DE是$\angle CDB$的角平分线，连接$AE、BE$．

    [图]

    （1）求证：四边形$CDBE$是菱形；

    （2）若$AC = AD = 2$，求AE的长．'
  answer: （1）见解析（2）$2\sqrt{3}$
  solution: '【小问1详解】

    证明：∵$CE \parallel AB$，

    ∴$\angle BDE = \angle CED$，

    ∵DE是$\angle CDB$的角平分线，

    ∴$\angle BDE = \angle CDE$，

    ∴$\angle CED = \angle CDE$，

    ∴$CD = CE$，

    ∵$\angle ACB=90^\circ$，D是AB中点，

    ∴$CD = DB = AD = \frac{1}{2} AB$，

    ∴$CE = DB$，

    ∵$CE \parallel AB$，

    ∴四边形$CDBE$是平行四边形，

    ∵$CD = DB$，

    ∴四边形$CDBE$是菱形；

    【小问2详解】

    解：∵$AC = AD = 2$，

    又∵$CD = AD$，

    ∴$CD = AD = CD$，

    ∴$\triangle ACD$是等边三角形，

    ∴$\angle CDA = 60^\circ$，

    ∵四边形$CDBE$是菱形，

    ∴$CD \parallel EB$，

    ∴$\angle CDA=\angle EBD=60^\circ$，

    ∵$BD = BE$，

    ∴$\triangle EBD$是等边三角形，

    ∴$\angle BCD = \angle BDC = 60^\circ$，$DE=BD=AD=BE=2$，

    ∴$\angle ADE=120^{\circ}$，

    ∴$\angle DAE = \angle AED = 30^\circ$，

    ∴$\angle AEB = 90^\circ$，

    在$Rt_{\triangle AEB}$中，$AE^{2}-AB^{2}-BE^{2}$，

    ∴$AE^2 = 4^2 - 2^2$，

    ∴$AE = 2\sqrt{3}$．'
  knowledge_points:
  - 平行线
  - 勾股定理
  - 平行四边形
  - 菱形
