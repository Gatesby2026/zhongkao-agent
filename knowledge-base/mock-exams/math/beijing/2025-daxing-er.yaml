  solution: '解：∵点$A(x_1,y_1)$，$B\left(x_{2},y_{2}\right)$都在反比例函数$y=\frac{k-3}{x}$的图象上，

    ∴当$x_{1}<0<x_{2}$时，两点只能在第一、三象限或二、四象限，

    又∵当$x_{1}<0<x_{2}$时，有$y_1 > y_2$，

    ∴函数图象在第二、四象限，

    ∴$k-3<0$，

