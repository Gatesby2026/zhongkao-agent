    100

    根据以上信息，回答下列问题：

    （1）$m =$___________，$n =$___________；

    （2）$A, B, C$三款轮胎最远行使里程的平均数越大轮胎质量越好；若最远行使里程的平均数相同，则方差越小轮胎的质量越好．$A, B, C$三款轮胎中质量最好的是___________；若该企业引进质量最好的这款轮胎8000个，则最远行驶里程不低于95（单位：$10^{3}\mathrm{km}$）的轮胎约有___________个．'
  answer: （1）99，99 （2）B，6000
  solution: '【小问1详解】

    解：C款轮胎的最远行驶里程的平均数$m = \frac{1}{8} \left( 101 + 99 + 108 + 103 + 97 + 74 + 104 + 95 \right) = 99$；

    A款轮胎的最远行驶里程的中位数$n=\frac{98+100}{2}=99$．

    故答案为：99，99；

    【小问2详解】

    解：A，B两款轮胎最远行驶里程的平均数相同，且比C款大，所以A，B两款轮胎质量较好，又因为B款轮胎的波动比A款小，即B款轮胎的方差比A款轮胎的方差小，所以B款轮胎的质量最好；

    $8000\times\frac{6}{8}=6000$（个），

    即最远行驶里程不低于95（单位：$10^{3}\mathrm{~km})$的轮胎约有6000个．

    故答案为：B，6000．'
