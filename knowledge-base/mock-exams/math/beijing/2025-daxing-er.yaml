  question: '学校团委组织37名团员去西柏坡红色教育基地进行为期两天的参观学习，其中女团员18名，男团员19名．在办理入住时，所有女团员办理完成后，再安排男团员办理．房间价目表如下（说明：客房未住满的房间按原价收费）：

    房型

    单人间

    双人间

    三人间

    房价（元/天）

    120

    150

    200

    （1）所有女团员每天住宿的费用最少为___________元；

    （2）所有男团员每天住宿的费用最少为___________元．'
  answer: ①.1200②.1300
  solution: '解：（1）单人间120元/人$\cdot$天；双人间75元/人$\cdot$天；三人间$\frac{200}{3}$元/人$\cdot$天；

    $120 > 75 > \frac{200}{3}$，

    则要使每天住宿的费用最少，尽量选择三人间，

    女团员18名，$18\div3=6$，

    $6\times200=1200$元，

    所有女团员每天住宿的费用最少为1200元；

    故答案为：1200；

    （2）男团员19名，$19\div3=6$余1人，

    方案1：6个三人间，1个单人间，$6\times200+120=1320$元，

    方案2：5个三人间，2个双人间，$5\times200+2\times150-300$元，

    $1320 > 1300$，

    所有男团员每天住宿的费用最少为1300元；

    故答案为：1300．'
