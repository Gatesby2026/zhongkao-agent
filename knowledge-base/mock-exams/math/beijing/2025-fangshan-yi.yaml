  question: '如图，$AE \parallel BF$，AC平分$\angle BAE$，交BF于点C．BD平分$\angle ABF$，交AE于点D，连接CD，$DG \perp BD$于点D，交BF于点G．

    [图]

    （1）求证：四边形$ABCD$是菱形；

    （2）若$BC = \sqrt{5}$，$BD = 4$，求DG的长．'
  answer: （1）见解析 （2）$DG=2$
  solution: '【小问1详解】

    ∵$AE \parallel BF$

    ∴$\angle ADB = \angle DBC, \angle DAC = \angle ACB$；

    ∵AC平分$\angle BAE$，BD平分$\angle ABF$，

    ∴$\angle DAC = \angle BAC, \angle ABD = \angle DBC$，

    $\angle ADB = \angle ABD, \angle ACB = \angle BAC$，

    ∴$AB=AD,\ AB=BC$

    ∴$AD = BC$；

    ∵$AE \parallel BF$，

    ∴四边形$ABCD$是平行四边形，

    ∵$AB = AD$，

    ∴四边形$ABCD$是菱形；

    【小问2详解】

    解：设$AC, BD$交于点O，如图；

    ∵四边形$ABCD$是菱形，

    ∴$\angle BOC=90^\circ,\ OB=OD,\ BC=CD$，

    ∴$\angle DBC = \angle BDC$；

    ∵$DG \perp BD$，

    ∴$\angle BDC+\angle CDG=\angle DBC+\angle CGD=90^\circ$，

    ∴$\angle CDG = \angle CGD$，

    ∴$CD = CG$，

    ∴$BC = CG$，

    即点C是GB的中点，

    ∴$BG = 2BC = 2\sqrt{5}$；

    在$Rt\triangle BDG$中，$BG = 2\sqrt{5}$，$BD = 4$，

    由勾股定理得：$DG = \sqrt{BG^{2} - BD^{2}} = \sqrt{20 - 16} = 2$．

    [图]'
