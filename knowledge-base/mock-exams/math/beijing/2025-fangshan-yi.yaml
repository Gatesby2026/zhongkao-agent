  question: '在平面直角坐标系xOy中，已知抛物线$y=2ax^{2}+a''x(a\neq0)$．

    （1）当$a = 1$时，求抛物线的对称轴；

    （2）已知$M(a,y_{1})$，$N(b,y_{2})$是抛物线上的两点．若对于$2\leq b\leq 3$，都有$y_1 > y_2$，求a的取值范围．'
  answer: （1）$x = -\frac{1}{4}$ （2）$a>3$或$-\frac{4}{3}<a<0$．
  solution: '【小问1详解】

    解：当$a = 1$时，则：$y = 2x^2 + x$，

    ∴对称轴为直线$x = -\frac{1}{2 \times 2} = -\frac{1}{4}$；

    【小问2详解】

    ∵$y=2ax^{2}+a''x(a\neq0)$，

    ∴抛物线的对称轴为：$x = \frac{a^{3}}{2 \times 2a} - \frac{a}{4}$，

    当$a > 0$时，抛物线开口向上，抛物线上的点离对称轴越远，函数值越大，

    ∵$M(a,y_{1})$，$N(b,y_{2})$是抛物线上的两点，且对于$2\leq b\leq 3$，都有$y_1 > y_2$，

    ∴$a>3$；

    当$a < 0$时，抛物线的开口向下，抛物线上的点离对称轴越远，函数值越小，

    ∵抛物线的对称轴为直线$x = -\frac{a}{4}$，

    ∴$M(a,y_{1})$关于$x = -\frac{a}{4}$的对称点为：$\left(-\frac{3}{2}ax\right)$，

    ∵$M(a,y_{1})$，$N(b,y_{2})$是抛物线上$[公式]$两点，且对于$2\leq b\leq 3$，都有$y_1 > y_2$，

    ∴$-\frac{3}{2}a < 2$，

    ∴$-\frac{4}{3}<a<0$，

    综上：$a>3$或$-\frac{4}{3}<a<0$．'
