  answer: B
  solution: '解：由题意，列表如下：

    |  | 白 | 白 | 红 |

    | --- | --- | --- | --- |

    | 白 | （白，白） | （白，白） | （白，红） |

    | 白 | （白，白） | （白，白） | （白，红） |

    | 红 | （红，白） | （红，白） | （红，红） |

    共9种等可能的结果，其中两次摸出的都是红球的结果为1种，

    ∴$P = \frac{1}{9}$；

    故选B．'
