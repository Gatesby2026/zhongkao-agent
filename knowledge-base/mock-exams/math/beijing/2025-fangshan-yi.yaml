  question: 已知$x-y-1=0$，求代数式$\left(\frac{x-2y}{x^{2}+xy}-\frac{2}{x}\right)\left(x^{2}-y^{2}\right)$的值．
  answer: $3(x-y)$，3
  solution: '解：∵$x-y-1=0$，

    ∴$x-y=1$，

    ∴$\left(\frac{x-2y}{x^{2}+xy}-\frac{2}{x}\right)\left(x^{2}-y^{2}\right)$

    $=\frac{x-2y+2(x+y)}{x(x+y)}(x+y)(x-y)$

    $\frac{3x}{x}\cdot(x-y)$

    $=3(x-y)$

    $=3\times1$

    $=3$'
