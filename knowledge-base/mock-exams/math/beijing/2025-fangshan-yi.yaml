  question: '如图，AB是$\odot\odot$直径，点D是$\odot\odot$上一点，DC是$\odot\odot$切线，连接CO交AD于点E，$\angle DCO=2\angle DAB$．

    [图]

    （1）求证：$CO \perp AB$；

    （2）若$AE = \sqrt{10}$，$\tan \angle DAB = \frac{1}{3}$，求AD的长．'
  answer: （1）见解析 （2）$\frac{9\sqrt{10}}{5}$
  solution: '【小问1详解】

    证明：∵CD是$\odot\odot$切线，

    ∴$OD \perp CD$，

    ∴$\angle COD+\angle DCO=90^{\circ}$，

    ∵$\angle DOB=2\angle DAB$，$\angle DCO=2\angle DAB$，

    ∴$\angle DCO = \angle DOB$，

    ∴$\angle COD+\angle DOB=90^\circ$，

    ∴$\angle BOC = 90^\circ$，

    ∴$CO \perp AB$；

    【小问2详解】

    ∵$CO \perp AB$，

    ∴$\angle AOE = 90^\circ$，

    ∴$\tan\angle DAB=\frac{OE}{OA}=\frac{1}{3}$，

    ∴$OA=3OE$，

    ∴$AE = \sqrt{OA^{2} + OE^{2}} = \sqrt{10}OE = \sqrt{10}$，

    ∴$OE = 1$，

    ∴$OA=3$，

    ∴$AB = 2OA = 6$，

    连接BD，则：$\angle ADB=90^\circ$，

    ∴$\cos\angle DAB=\frac{AD}{AB}=\frac{OA}{AE}=\frac{3\sqrt{10}}{10}$，

    ∴$AD=\frac{3\sqrt{10}}{10},\ AB=\frac{3\sqrt{10}}{10}\times6=\frac{9\sqrt{10}}{5}$．

    [图]'
