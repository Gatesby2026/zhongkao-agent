  question: '为进一步推动阳光体育运动，提高学生身体素质，某校举行健美操比赛．最终有甲、乙、丙三个班级进入团体决赛，团体决赛需要分别进行五个单项比赛．单项比赛和团体决赛的计分规则如下表：

    | 单项比赛计分规则 | 五名裁判打分，去掉一个最高分和一个最低分，剩下三个有效分的平均数即为该项得分． |

    | --- | --- |

    | 团体决赛计分规则 | 各单项比赛得分之和为团体最终成绩，最终成绩较高的班级排序靠前，若最终成绩相同，则整体发挥稳定性较好的班级排序靠前． |

    现将参加比赛的甲、乙、丙三个班级的得分数据进行整理、描述和分析，并绘制统计图表，部分信息如下：

    a．甲班五个单项得分和乙班四个单项得分$[公式]$折线图：

    [图]

    b．丙班五个单项得分表：

    | 项目 | 一 | 二 | 三 | 四 | 五 |

    | --- | --- | --- | --- | --- | --- |

    | 得分 | 88 | m | 94 | 90 | 92 |

    根据以上信息，回答下列问题：

    （1）甲班五个单项得分的中位数为：________；

    （2）已知丙班第二个单项比赛中，五名裁判的打分分别为80，84，86，83，82，则丙班第二个单项的得分$m =$________；

    （3）甲班与丙班相比较，排名比较靠前的是________班（填“甲”或“丙”）；

    （4）若最终的比赛结果乙班排名居中，则乙班第五个项目的得分可能为________（得分为整数）．'
  answer: （1）92（2）83 （3）丙 （4）98
  solution: '【小问1详解】

    解：由折线统计图知，甲班得分按由低到高排列为80，83，92，93，98，则中间位置的分数是92，即中位数为92；

    故答案为：92；

    【小问2详解】

    解：在80，84，86，83，82中，去掉最高分86，去掉最低分80，

    则$m = \frac{84 + 83 + 82}{3} = 83$；

    故答案为：83；

    【小问3详解】

    解：甲班的团体得分为：$80+83+92+93+98=446$，

    丙班的团体得分为：$88+83+94+90+92=447$，

    则丙班更靠前；

    故答案为：丙；

    【小问4详解】

    解：由（3）知，乙的团体得分为446，则$446-(84+88+93+86)=98$，

    则可能得分为98分；

    故答案为：98．'
