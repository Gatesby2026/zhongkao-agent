  question: '如图，在$V_{ABC}$中，$AB > BC$，O是AB边的中点．按下列要求作图：

    | （ 1 ）以点 B 为圆心，小于 BO 长度为半径画弧，分别交 BA ， BC 于点 D ， E ； （ 2 ）以点 O 为圆心， BD 长为半径画弧，交 OA 于点 F ；以点 F 为圆心， DE 长为半径画弧，两弧交于点 G ，点 G 与点 C 在直线 AB 同侧； （ 3 ）作直线 OG ，交 AC 于点 M ． [图] |

    | --- |

    根据上面作图，下列结论错误的是（）

    A.$\angle AOM = \angle B$

    B.$\triangle BDE \cong \triangle OFG$

    C.$OM=\frac{1}{2}AB$

    D.$AM = CM$'
  answer: C
  solution: '解：由作图过程可知，$\angle AOM = \angle B$，故A选项正确，不符合题意；

    由作图过程可知，$BD=BE=OF=OG$，$DE = FG$，

    ∴$\triangle BDE\cong\triangle OFG(SSS)$，故B选项正确，不符合题意；

    ∵$\angle AOM = \angle B$，

    ∴$OM \parallel BC$，

    ∴$\triangle AOM \sim \triangle ABC$，

    ∴$\frac{OM}{BC} = \frac{AO}{AB}$

    ∵O是AB边的中点，

    ∴$AO = BO = \frac{1}{2} BC$，

    ∵$AB > BC$，

    ∴$OM=\frac{1}{2}AB$，故C选项不正确，符合题意，

    ∵$OM \parallel BC$，

    ∴$\frac{AM}{CM}=\frac{AO}{BO}=1$，

    ∴$AM = CM$，D选项正确，不符合题意．

    故选：C．'
