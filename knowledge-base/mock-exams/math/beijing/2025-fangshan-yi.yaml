  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图象经过点$A(0,1)$和$B(1,3)$，与过点$(0,5)$且平行于x轴的直线交于点C．

    （1）求该函数的解析式及点C的坐标．

    （2）当$x<2$时，对于x的每一个值，函数$y = \frac{1}{2}x + n$的值大于函数$y=kx+b\,(k\neq0)$的值且小于5，直接写出n的值．'
  answer: （1）$y=2x+1$；点C的坐标为$(2,5)$ （2）$n = 4$
  solution: '【小问1详解】

    解：把A、B两点坐标代入$y=kx+b\,(k\neq0)$中，得：$\begin{cases}

    b = 1 \\

    k + b = 3

    \end{cases}$，

    解得：$\left\{\begin{array}{l}k=2\\b=1\end{array}\right.$，

    即函数解析式为$y=2x+1$；

    由于$y=2x+1$与过点$(0,5)$且平行于x轴的直线交于点C，则$5=2x+1$，

    解得：$x=2$，

    即点C的坐标为$(2,5)$；

    【小问2详解】

    解：把点C的坐标代入$y = \frac{1}{2}x + n$中，即$\frac{1}{2}x + 2 + \pi = 5$，

    ∴$n = 4$，

    如图所示，当$x<2$时，对于x的每一个值，函数$y = \frac{1}{2}x + 4$的值大于函数$y=2x+1$的值且小于5．

    [图]'
