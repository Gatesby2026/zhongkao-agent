  question: '如图，在等边$V_{ABC}$中，点D，E分别是边AB、BC上的动点，且$BD = 2CE$．以DE为边作等边$\triangle DEF$．使点A与点F在直线DE同侧．DF交AC于点G．EF交AC于点H．给出下面四个结论：

    [图]

    ①$\angle BED = \angle ARF$；

    ②$AD\cdot DF=BE\cdot DG$；

    ③若$ED \perp AB$，则$DF \perp AC$；

    ④若$CE:BE=1.2$，则四边形DBF是菱形．

    上述结论中，所有正确结论的序号是（）

    A.①②

    B.③④

    C.①②③

    D.①②③④'
  answer: D
  solution: '解：∵$\triangle ABC, \triangle DEF$都是等边三角形，

    ∴$\angle A=\angle B=\angle C=\angle DEF=\angle EDF=60^{\circ}$，

    ∴$\angle BED + \angle HEC = \angle HEC + \angle BHC = 120^{\circ}$，

    ∴$\angle BED = \angle EHC$，

    ∵$\angle AHP = \angle EHC$，

    ∴$\angle BED = \angle ARF$，故①正确；

    ∵$\angle A=\angle B=\angle EDF=60^{\circ}$，

    ∴$\angle BED=180^\circ-\angle B-\angle BDE=120^\circ-\angle BDE=\angle ADG$，

    ∴$\triangle BDE \sim \triangle AGD$，

    ∴$\frac{BE}{AD} = \frac{DE}{DG}$，即$AD\cdot DE=BE\cdot DG$；

    ∵$\triangle DEF$是等边三角形，

    ∴$DF = DE$，

    ∴$AD\cdot DF=BE\cdot DG$，故②正确；

    ∵$ED \perp AB$，

    ∴$\angle EDB=90^\circ$；

    ∵$\triangle BDE \sim \triangle AGD$，

    ∴$\angle DGA = \angle EDB = 90^\circ$，

    即$DF \perp AC$，故③正确；

    当$CE:BE=1.2$时，即$BE = 2CE$；

    ∵$BD = 2CE$，

    ∴$BD = BE$，

    ∵$\angle B=60^{\circ}$，

    ∴$\angle BDE$是等边三角形，

    ∴$BD = DE = BE$，

    ∵$'
