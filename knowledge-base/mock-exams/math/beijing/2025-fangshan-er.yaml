  question: '小明观察到一个水龙头因损坏而不断地向外滴水，为探究其漏水造成的浪费情况，小明用一个带有刻度的量筒放在水龙头下面装水，每隔一分钟记录量筒中的总水量，但由于操作延误，开始计时的时候量筒中已经有少量水，因而得到如下表的一组数据：

    | 时间 t （单位：分钟） | $1$ | $2$ | $3$ | $4$ | $5$ | $\cdots$ |

    | --- | --- | --- | --- | --- | --- | --- |

    | 总水量 y （单位：毫升） | $7$ | $12$ | $17$ | $22$ | $27$ | $\cdots$ |

    （1）通过分析数据，发现可以用函数$y = kt + b$（$k,b$为常数）刻画总水量y与时间t之间的关系，画出这个函数的图象；

    （2）根据以上数据与函数图象，解决下列问题：

    ①请你估计小明在第$20$分钟测量时量筒中的总水量；

    ②一个人一天大约饮用$1500$毫升水，请你估算这个水龙头一个月（按$30$天计）$[公式]$漏水量可供一人饮用多少天．'
  answer: （1）图象见解析 （2）①$102$毫升；②$144$天
  solution: '【小问1详解】

    描点，连线，如图，

    [图]【小问2详解】

    ①解：观察表格，可发现前一分钟比后一分钟少5毫升的水，故可得$y = kt + b$能正确反映总水量y与时间t的函数关系，

    把$\left\{

    \begin{array}{l}

    t = 1 \\

    y = 7

    \end{array}

    \right.$，$\left\{

    \begin{array}{l}

    t = 2 \\

    y = 12

    \end{array}

    \right.$代入$y = kt + b$，

    可得$\begin{cases}

    7 = k + b \\

    12 = 2k + b

    \end{cases}$，

    解得$\left\{

    \begin{array}{l}

    k = 5 \\

    b = 2

    \end{array}

    \right.$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$y关于t的表达式$y=5t+2$；

    当$t = 20$时，$y=5\times20+2=102$，

    故小明在第20分钟测量时量筒的总水量是102毫升，

    答：小明在第20分钟测量时量筒的总水量是102毫升．

    ②由解析式可知，每分钟的滴水量为$5$毫升，

    30天$=(30\times24\times60)$分钟$=43200$分钟，

    可供一人饮水天数$\frac{43200\times5}{1500}=144$天，

    答：这个水龙头一个月（按30天计）的漏水量可供一人饮用144天．'
