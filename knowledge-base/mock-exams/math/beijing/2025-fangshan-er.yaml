  question: '某校九年级有370名师生要去参加社会实践活动，学校计划租用甲、乙、丙三种型号的客车前往．每种型号客车的载客量及租金如下表所示：

    | 客车型号 | 甲 | 乙 | 丙 |

    | --- | --- | --- | --- |

    | 每辆客车载客量 / 人 | $25$ | $35$ | $45$ |

    | 每辆客车的租金 / 元 | $800$ | $1000$ | $1200$ |

    如果甲、乙、丙三种型号的客车分别租用7辆，3辆，2辆，那么租车的总费用为______元；如果使租车的总费用最低，那么总费用最低为______元．'
  answer: ①.$11000$ ②.$10200$
  solution: '解：依题意得$800\times\pi+1000\times3.4+1200\times2=11000$(元)；

    设甲，乙，丙三种型号客车的租用数量分别是a，b，c，

    则$25a+35b+43=370$，即$5a+7b+9c\quad74$，

    整理得$\frac{74-7b-5a}{9}$

    $\frac{800}{25}=32,\frac{1000}{35}=28.6,\frac{1200}{45}=26.7$

    ∴c车人均价格最低，当c取得最大整数解时，租车费用最低，

    ∵a，b，c都是正整数，

    ∴$c = 7$，$7b+5a=12$

    ∴$a = 1$，$b = 1$

    此时最低费用为$1+800\times1+1000+7\times1200=10200$（元）

    故答案为：$11000$，$10200$．'
