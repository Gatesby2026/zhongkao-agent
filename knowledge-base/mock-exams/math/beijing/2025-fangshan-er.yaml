  question: '如图，AB为$\odot\odot$的直径，点在$\odot\odot$上，且$\angle CAB=22.5^\circ$，过点作$\odot\odot$的切线DE交AB的延长线于点．若$DE=DA,\ CD=5$，连接OE，则OE的长为__________．

    [图]'
  answer: $5\sqrt{3}$
  solution: '解：连接OC，如图，

    [图]

    ∵DE为圆的切线，且点为切点，

    ∴$OC \perp DE$，

    即$\angle OCE=\angle OCD=90^{\circ}$；

    ∵$\angle CAB=22.5^\circ$，$\widehat{BC}=\widehat{BC}$，

    ∴$\angle DOC=2\angle CAB=45^{\circ}$，

    ∴$\angle DOC=\angle D=45^{\circ}$，

    ∴$OC = CD = 5$，

    由勾股定理得$OD=\sqrt{OC^{2}+OD^{2}}=5\sqrt{2}$，

    ∵$DE = DA$，$OA = OC = CD = 5$，

    即$CD\cdot CE=OD+OA$，

    ∴$CE = OD = 5\sqrt{2}$，

    在$Rt_{\triangle}OCE$中，由勾股定理得$OE=\sqrt{OC^{2}+CE^{2}}=\sqrt{25+50}=5\sqrt{3}$．

    故答案为：$5\sqrt{3}$．'
