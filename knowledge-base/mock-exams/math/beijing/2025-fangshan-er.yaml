    ∴$\triangle GCD$是等腰直角三角形，

    ∴$\angle EGA = 90^\circ$，$2GH = CD$

    ∵$\angle A=45^{\circ}$

    ∴$\triangle AEG$是等腰直角三角形，

    又∵F是AE的中点，

    ∴$FG \perp AE$

    ∴$\angle GFB = \angle ABC = \angle BHG = 90^\circ$，

    ∴四边形$FGHB$是矩形，

    ∴$GH = FB$，

