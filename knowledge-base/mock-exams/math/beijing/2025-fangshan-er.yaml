  question: '如图，已知$\odot\odot$为$V_{ABC}$的外接圆，AB为$\odot\odot$的直径，D是$\widehat{BC}$的中点，弦$DE \perp AB$于点F，P是$\sqrt{2}AE$上一点，连接$CP,BP$．

    [图]

    （1）求证：$BC = DE$；

    （2）若$AC = 6, BF = 2$，求$\tan \angle BPC$．'
  answer: （1）证明见解析 （2）$\frac{4}{3}$
  solution: '【小问1详解】

    解：∵D是$\widehat{BC}$的中点，

    ∴$\overline{CD}=\overline{BD}$，

    ∵$DE \perp AB$且AB为$\odot\odot$的直径，

    ∴$\widehat{BE}=\widehat{BD}$，

    ∴$BC=DL$，

    ∴$BC = DE$；

    【小问2详解】

    解：连接OD，

    [图]

    ∵$\overline{CD}=\overline{BD}$，

    ∴$\angle CAB = \angle DOB$，

    ∵AB为$\odot\odot$的直径，

    ∴$\angle ACB=90^\circ$，

    ∵$DE \perp AB$，

    ∴$\angle DFO = 90^\circ = \angle ACB$，

    ∴$\triangle ACB \sim \triangle OFD$，

    ∴$\frac{AC}{AB}=\frac{OF}{OD}$，

    设$\odot\odot$的半径为r，则$\frac{6}{2r}=\frac{r-2}{r}$，

    解得$r = 5$，

    ∴$AB=2\pi=10$，

    ∴$BC=\sqrt{AB^{2}-AC^{2}}=8$，

    ∴$\tan\angle CAB=\frac{BC}{AC}=\frac{4}{6}=\frac{2}{3}$，

    ∵$\angle BPC = \angle CAB$，

    ∴$\tan\angle BPC=\frac{4}{3}$．'
