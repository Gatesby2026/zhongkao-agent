  question: '在平面直角坐标系xOy中，一次函数$y=kx+b\,(k\neq0)$的图象由函数$y=\frac{1}{3}x$的图象平移得到，且经过点$(3,3)$．

    （1）求这个一次函数的解析式；

    （2）当$x>3$时，对于x的每一个值，函数$y=nx+2$的值与一次函数$y=kx+b\,(k\neq0)$的值之差的绝对值大于1，直接写出n的取值范围．'
  answer: （1）$y=\frac{1}{3}x+2$ （2）$n\quad \frac{2}{3}$或$n \leq 0$
  solution: '【小问1详解】

    .解：∵函数$y=kx+b\,(k\neq0)$的图象由函数$y=\frac{1}{3}x$的图象平移得到，

    ∴$k = \frac{1}{3}$，

    ∵函数$y=\frac{1}{3}x+b$过点$(3,3)$，

    ∴$1+b=3$，

    解得：$b = 2$

    ∴函数解析式为$y=\frac{1}{3}x+2$

    【小问2详解】

    解：$x=3$时，$y=3n+2$，$y=kx+b$$\frac{1}{3}\times3+2=3$

    ∵当$x>3$时，对于x的每一个值，函数$y=nx+2$的值与一次函数$y=kx+b\,(k\neq0)$之差的绝对值差大于1，

    ∴$\left|3\pi+2-3\right|$

    ∴$3n+2-3\mid1$或$3n+2-3\leq-1$

    解得：$n\quad \frac{2}{3}$或$n \leq 0$'
