  question: '4月23日是世界读书日，某校初一、初二两个年级的学生进行了“青春飞扬”读书演讲比赛．为了解比赛情况，现从两个年级各随机抽取了20名学生的比赛成绩，并对数据进行收集、整理、描述和分析．下面给出了部分信息：

    a．初二年级20名学生的分数数据如下：

    | $77$ | $82$ | $85$ | $88$ | $76$ | $87$ | $69$ | $93$ | $66$ | $84$ |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | $90$ | $88$ | $67$ | $88$ | $91$ | $96$ | $68$ | $97$ | $59$ | $88$ |

    b．初一年级20名学生分数的频数分布直方图如下（数据分5组：第1组$50 \leq x < 60$，第2组$60 \leq x < 70$，第3组$70 \leq x < 80$，第4组$80 \leq x < 90$，第5组$90 \leq x < 100$）：

    [图]

    c．样本数据的平均数、众数、方差如下：

    |  | 平均数 | 众数 | 方差 |

    | --- | --- | --- | --- |

    | 初一年级 | $81.95$ | $85$ | $185.30$ |

    | 初二年级 | $81.95$ | a | $115.25$ |

    根据以上信息，回答下列问题：

    （1）表格中a的值为______；

    （2）抽取的初一年级20名学生的中位数位于第_____组；

    （3）可以推断出______（填“初一”或“初二”）年级学生在本次比赛中发挥比较稳定；

    （4）初二年级共有学生600人，如果前120名学生将被推荐参加区级比赛，请你估计，成绩至少达到____分才能参加区级比赛．'
  answer: （1）$88$ （2）$4$ （3）初二 （4）$91$
  solution: '【小问1详解】

    解：根据表格可得初二年级学生分数中，$88$出现次数最多，则$a = 88$，

    故答案为：$88$．

    【小问2详解】

    解：根据初一年级20名学生分数的频数分布直方图可得第$10$和第$11$个数据在第4组$80 \leq x < 90$，

    故答案$[公式]$：$4$．

    【小问3详解】

