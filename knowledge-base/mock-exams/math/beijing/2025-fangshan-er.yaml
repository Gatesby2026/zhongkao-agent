    ②∵$A(-1,0),B(1,0)$，点$M(t,2)$，以M为圆心，1为半径作圆．若点C为$\odot M$上任意一点时，都有$5 \leq d(W) \leq 8$，

    ∴当$d(W)$$=8$时，点A或B到$\odot M$上的点距离最大为$8$，最小值为$5$

    当$t<0$时，如图，

