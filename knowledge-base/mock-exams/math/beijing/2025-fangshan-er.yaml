  question: '在平面直角坐标系xOy中，已知抛物线$y=ax^{2}-4ax+1(a\neq 0)$．

    （1）求抛物线$[公式]$对称轴；

    （2）当$a < 0$时，对于任意的正数t，若$M(2-t,y),N(2+3t,y)$是抛物线上的两点，则$y_{1}$_____$y_{2}$（填“$\gt$”“$\gt$”“$=$”）；

    （3）已知直线：$l:y=-\frac{1}{2}x+\frac{5}{2}$上两点$A, B$，其中点A的横坐标为1，点B的纵坐标为$\frac{1}{2}$，若抛物线与线段AB恰有一个公共点，结合函数图象，求a的取值范围．'
  answer: （1）直线$x=2$ （2）$\gt$ （3）$a > 0$或$-\frac{1}{3} \leq a < 0$
  solution: '【小问1详解】

    解：∵$y=ax^{2}-4ax+1(a\neq 0)$

    ∴抛物线对称轴为直线$x=\frac{-4a}{2a}=2$，

    【小问2详解】

    解：∵抛物线的对称轴为直线$x=2$，$t > 0$

    $M(2-t,y_{1})$关于对称轴的对称点为$(2+t,y_{1})$

    ∵$a < 0$，抛物线开口向下，

    当$x>2$时，y随x的增大而减小，

    又∵$t < 2 + t < 2 + 3t$

    ∴$y_1 > y_2$

    故答案为：$\gt$．

    $[公式]$小问3详解】

    ①当$a > 0$时，抛物线过点$(0,1)$，$(0,1)$关于$x=2$的对称点为$(4,1)$

    直线：$l:y=-\frac{1}{2}x+\frac{5}{2}$上两点$A, B$，其中点A的横坐标为1，点B的纵坐标为$\frac{1}{2}$，

    如图

    [图]

    ∵B$\left(4,\frac{1}{2}\right)$，$1>\frac{1}{2}$

    ∴当$a > 0$时，由图象可知，抛物线与线段AB恒有一个公共点.

    ∴当$a > 0$时，抛物线与线段AB恒有一个公共点.

    ②当$a < 0$时，

    ∵点A的横坐标为1，则$y=-\frac{1}{2}+\frac{5}{2}=2$，即$A(1,2)$

    把$(1,2)$代入$y=ax^{2}-4ax+1(a\neq 0)$得$y = a - 4a + 1$

    [图]

    ∵抛物线与线段AB恰有一个公共点，

    ∴$a-4a+1\leq2$

    解得：$a-\frac{1}{3}$

    综上所述，$a > 0$或$-\frac{1}{3} \leq a < 0$时，抛物线与线段AB恰有一个公共点，'
