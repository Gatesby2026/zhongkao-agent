  question: '在平面直角坐标系xOy中，点$A,B,C$的坐标分别为$\left(\frac{2}{3}\right)\cdot(4,1),(3,9)$，点P是线段B上的动点，连接PC，过点P作$\overline{PQ} \perp \overline{PC}$，交y轴于点Q．则点Q纵坐标t的取值范围是（）

    [图]

    A.$-\frac{5}{4} \leq t \leq 5$

    B.$-1 \leq t \leq 5$

    C.$-\frac{1}{4} \leq t \leq 5$

    D.$-\frac{1}{2} \leq t \leq 5$'
  answer: A
  solution: '解：设$P(a,1)$，过点P作$PF \perp x$轴，延长BA交y轴于点E，设$\overline{PQ}$交x轴于点D

    当$\frac{3}{2} \leq a < 3$时，如图，

    [图]

    ∵$\overline{PQ} \perp \overline{PC}$，$PF \perp AB$

    ∴$\angle CPF = \angle QPE$

    ∴$\tan \angle CPF = \tan \angle QPE$

    ∴$\frac{3-a}{1}=\frac{1-t}{a}$

    ∴$t=a^{2}-3a+1$

    当$3<a\leq4$时，如图，同理可得$\angle CPF = \angle QPE$

    [图]

    ∴$\tan \angle CPF = \tan \angle QPE$

    ∴$\frac{a-3}{1}=\frac{t-1}{a}$

    ∴$t=a^{2}-3a+1$

    当$a = 3$时，$P(3,1)$，$C,F$重合，则$E,Q$重合，此时$t = 1$，

    ∴当$a = 3$时，$t=a^{2}-3a+1$也成立

    ∴$\frac{3}{2}sas4$，$t=a^{2}-3a+1$

    ∵$t=a^{2}-3a+1-\left(a-\frac{3}{2}\right)^{2}-\frac{5}{4}$

    当$a = \frac{3}{2}$时，t取得最小值为$-\frac{5}{4}$

    当$a = 4$时，t取得最大值为$\left(4-\frac{3}{2}\right)^{2}-\frac{5}{4}=5$

    ∴$-\frac{5}{4} \leq t \leq 5$

    故选：A．'
