  question: 为增强学生的劳动意识，养成良好的劳动习惯和品质，某校组织学生到劳动基地参加“耕读累德”实践活动，计划组织学生种植甲、乙两种作物．如果种植3亩甲作物和2亩乙作物需要27名学生，种植4亩甲作物和1亩乙作物需要26名学生．问：种植1亩甲作物和1亩乙作物一共需要多少名学生．
  answer: 11名
  solution: '解：设种植1亩甲作物需要x名学生，种植1亩乙作物需要y名学生．

    依题意得：

    $\begin{cases}

    3x + 2y = 27 \\

    4x + y = 26

    \end{cases}$，解得$\left\{ \begin{array} { l } { x = 5 } \\ { y = 6 } \end{array} \right.$，

    ∴$x + y = 11$．

    答：种植1亩甲作物和1亩乙作物一共需要11名学生．'
