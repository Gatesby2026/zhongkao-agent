  question: '在平面直角坐标系xOy中，函数$y=kx+b\,(k\neq0)$的图象过点$(-1,3)$和点$(1,-1)$．

    （1）求k，b的值；

    （2）当$x \leq 2$时，对于x的每一个值，函数$y = -\frac{1}{2}x + n$的值都小于$y=kx+b$的值且大于$-4$，求n的取值范围．'
  answer: （1）$\left\{ \begin{array}{l} k = -2 \\ b = 1 \end{array} \right.$ （2）$-3 < n < -2$
  solution: '【小问1详解】

    解：把$(-1,3)$和$(1,-1)$代入到$y=kx+b\,(k\neq0)$中得$\begin{cases}

    -k + b = 3 \\

    k + b = -1

    \end{cases}$，

    解得$\left\{ \begin{array}{l} k = -2 \\ b = 1 \end{array} \right.$；

    【小问2详解】

    解：由（1）得函数$y=kx+b$的解析式为$y = -2x + 1$

    ∵在$y = -\frac{1}{2}x + n$中，$-\frac{1}{2}<0$，

    ∴在$y = -\frac{1}{2}x + n$中，y随x增大而减小，

    ∵当$x \leq 2$时，对于x的每一个值，函数$y = -\frac{1}{2}x + n$的值都大于$-4$，

    ∴当$x=2$时，$y = -\frac{1}{2}x + n = -\frac{1}{2}x + n > -4$，

    ∴$n > -3$；

    当$\frac{1}{2}x+n<-2x+1$时，解得$x<\frac{2-2n}{3}$，

    ∵当$x \leq 2$时，对于x的每一个值，函数$y = -\frac{1}{2}x + n$的值都小于$y=kx+b$的值，

    ∴$\frac{2-2n}{3}>2$，

    ∴$n<-2$，

    综上所述，$-3 < n < -2$．'
