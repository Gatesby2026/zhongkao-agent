  question: '如图，在$V_{ABC}$中，$AB=AC$，$BD \perp AC$于点D，O为AB的中点，作点D关于点O的对称点E，连接DE，AE，BE．

    [图]

    （1）求证：四边形$AEBD$是矩形；

    （2）若$\tan\angle DEB=\frac{3}{4}$，$CD=2$，求BC的长．'
  answer: （1）见解析（2）$2\sqrt{10}$
  solution: '【小问1详解】

    证明：∵点D关于点O的对称点为点E，

    ∴ED必过点O且$OE = OD$．

    ∵O为AB的中点，

    ∴$OA = OB$．

    ∴四边形$AEBD$是平行四边形．

    ∵$BD \perp AC$于D，

    ∴$\angle ADB=90^\circ$．

    ∴四边形$AEBD$是矩形．

    【小问2详解】

    ∵四边形$AEBD$是矩形，

    ∴$\angle EBD=90^\circ$，$AD = BE$，$AB = ED$．

    在$Rt\triangle DBE$中，$\tan \angle DEB = \frac{BD}{EB} = \frac{3}{4}$．

    设$BD=3x$，则$EB = 4x$，$ED=5x$．

    ∴$AD = 4x$，$AC = AB = ED = 5x$．

    ∴$CD = x - 2$．

    ∴在$Rt\triangle BDC$中，$BC = \sqrt{BD^{2} + CD^{2}} = \sqrt{10}x = 2\sqrt{10}$．'
