  question: 某科技公司正在研发两款神经形态计算机，一款是基于传统半导体工艺的A型计算机，另一款是基于新兴材料的B型计算机．在一次图像识别测试任务中，A型计算机处理$1000$张图像需要的时间比B型计算机处理同样数量的图像多5分钟．已知两款计算机处理图像的速度恒定，B型计算机处理图像的速度是A型计算机的8倍．现有$20000$张图像要紧急处理，若使用B型计算机，判断能否在$15$分钟内处理完，并说明理由．
  answer: 使用B型计算机，能在$15$分钟内处理完$20000$张图像；见解析
  solution: '解：使用B型计算机，能在$15$分钟内处理完，理由如下：

    设A型计算机处理图像的速度是x张/分钟，则B型计算机处理图像的速度是$8x$张/分钟．

    由题意可知，$\frac{1000}{x}=\frac{1000}{8x}+5$．

    解得$x = 175$．

    经检验：$x = 175$是原方程的解且符合实际意义．

    所以$8x=8\times175=1400$．

    因为$20000\div1400=14\frac{2}{7}$，$14\frac{2}{7}<15$，

    所以使用B型计算机，能在$15$分钟内处理完$20000$张图像．'
