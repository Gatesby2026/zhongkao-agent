  question: '如图，四边形$ABCD$内接于$\odot\odot$，$\widehat{AC}=\widehat{BD}$．

    [图]

    （1）求证：$AB \parallel DC$；

    （2）作直径AE，交CD于点F，连接BE，交CD于点G．若$AF = 2OF$，$AD=2$，$BE = 3\sqrt{3}$．求DF的长．'
  answer: （1）见解析（2）$DF = \frac{8}{3}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$内接于$\odot\odot$，$\widehat{AC}=\widehat{BD}$，

    ∴$\angle D = \angle C$，$\angle C+\angle A=180^\circ$．

    ∴$\angle D+\angle A=180^{\circ}$．

    ∴$AB \parallel DC$；

    【小问2详解】

    解：依题意，连接OC，CE，过点A作$AH \perp CD$于点H．

    [图]

    ∵$\widehat{AC}=\widehat{BD}$，

    ∴$BC = AD$．

    ∴$BC = AD = 2$

    ∵AE是$\odot\odot$直径，

    ∴$\angle ABE = 90^\circ$．

    ∵$AB \parallel DC$，$AF = 2OF$，

    ∴$\angle EGC = \angle CGB = \angle ABE = 90^\circ$，$\frac{BG}{GE}=\frac{AP}{EF}=\frac{1}{2}$．

    ∵$BE = 3\sqrt{3}$，$BG + GE = BE$，

    ∴$BG = \sqrt{3}$，$GE = 2\sqrt{3}$．

    ∵$[公式]$$Rt\triangle CGB$中，$\cos\angle CBG=\frac{BG}{BC}=\frac{\sqrt{3}}{2}$，

    ∴$\angle CBE = 30^\circ$，$CG = 1$，

    ∴$CE=\sqrt{GE^{2}+CG^{2}}=\sqrt{13}$，$\angle COE=2\angle CBE=60^{\circ}$．

    ∵$OE = OC$，

    ∴$\triangle OEC$是等边三角形．

    ∴$OA=OB=CE=\sqrt{13}$，

    ∵$AF = 2OF$

    ∴$AF = \frac{2\sqrt{13}}'
