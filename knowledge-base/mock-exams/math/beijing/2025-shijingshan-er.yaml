  question: '在平面直角坐标系中，已知$A(-2,y_{1})$，$B(1,y_{2})$，$C(4-t,y_{3})$，$D(2t-1,y_{4})$是抛物线$y = -x^2 + 2tx \ (t \neq 0)$上的四个点，且任意两点都不重合．

    （1）直接写出抛物线$y = -x^2 + 2tx \ (t \neq 0)$与x轴的交点坐标（可用含t的代数式表示）；

    （2）将抛物线在点A，B之间的部分（含A，B）所有点的纵坐标的最小值记为m，并将抛物线在C，D之间的部分（含C，D）所有点的纵坐标的最小值记为n，若$m < n$，求t的取值范围．'
  answer: （1）$(0,0)$，$(2t,0)$ （2）$\frac{2}{3}<t<6$且$t \neq 1$且$t \neq \frac{5}{3}$且$t \neq 3$
  solution: '【小问1详解】

    解：令$x^{2}+2\alpha=0$，即$x(x-2t)=0$，

    解得：$x_{1}=0, x_{2}=2t$，

    ∴抛物线$y = -x^2 + 2tx \ (t \neq 0)$与x轴的交点坐标为$(0,0)$，$(2t,0)$；

    【小问2详解】

    解：抛物线$y = -x^2 + 2tx$的对称轴为直线$x = t$．

    由题意，点$A(-2,y_{1})$在点$B(1,y_{2})$的左侧，点$B(1,y_{2})$与$D(2t-1,y_{4})$关于对称轴$x = t$对称，$y_{2}=y_{4}$．

    ∵A，B，$C(4-t,y_{3})$，$D(2t-1,y_{4})$四点中，任意两点不重合，

    ∴$t \neq 1$且$t \neq \frac{5}{3}$且$t \neq 3$且$t \neq 6$．

    ∵$a = -1 < 0$，

    ∴当$x \leq t$时，y随x的增大而增大，当$x\quad t$时，y随x的增大而减小．

    ①当$t \leq -2$时，

    ∵$-2<1$，

    ∴$y_1 > y_2$．

    ∴$m = y_{2}$．

    由$y_{2}=y_{4}$知，不符合题意．

    ②当$t > -2$时，点A在对称轴的左侧．

    点$A(-2,y_{1})$关于直线$x = t$的对称点为$A''(2i+2,y)$．

    ∵$m < n$，

    ∴$m = y_{1}$．

    ∴$-2<4-t<2t+2$且$2t-1>-2$．

    ∴$\frac{2}{3}<t<6$．

    综上所述，t的取值范围是$\frac{2}{3}<t<6$且$t \neq 1$且$t \neq \frac{5}{3}$且$t \neq 3$．'
