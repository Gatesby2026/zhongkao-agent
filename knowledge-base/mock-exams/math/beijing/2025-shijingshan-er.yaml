  question: '如图，在$V_{ABC}$中，$AD \perp BC$于点D，AD平分$\angle CAB$，$DE \perp AC$于点E，$CF \perp AB$于点F．若$DE = 3$，则CF的长为_________．

    [图]'
  answer: '6'
  solution: '解：∵$AD \perp BC$于点D，AD平分$\angle CAB$，

    ∴$\angle ADB = \angle ADC = 90^\circ, \angle BAD = \angle CAD$，

    ∵$AD = AD$，

    ∴$\triangle ABD \cong \triangle ACD$，

    ∴$AB = AC$，$DB = CD$

    $\therefore AD$是$V_{ABC}$的中线，

    $S_{\triangle DHC}=2S_{\triangle AED}=2\times\frac{1}{2}\times DE\cdot AC=DE\cdot AC$，

    $S_{\triangle ABC}=\frac{1}{2}AB\cdot CF$，

    $\frac{1}{2}AB\cdot CF=DE\cdot AC$，

    $\because AC = AB$，

    $\frac{1}{2}CF=DE$，

    $\because DE = 3$，

    $\therefore CF = 6$，

    故答案为：6．'
