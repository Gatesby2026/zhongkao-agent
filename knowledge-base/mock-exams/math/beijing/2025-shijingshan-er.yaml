  question: '乒乓球被誉为中国国球，不仅承载着民族自豪感，更成为展现中国体育精神的文化符号．发球机成为乒乓球爱好者的热门训练器．如图，是乒乓球台的示意图，乒乓球台长OB为$274cm$，球网CD高$15.25\mathrm{cm}$．发球器采用“直发式”模式，球从发球机出口到第一次接触球台的运行轨迹近似为抛物线的一部分．

    [图]

    某次训练，发球机从球台边缘O点正上方$28.75\mathrm{cm}$的高度A处发球（即OA的长为$28.75\mathrm{cm}$），乒乓球到球台的竖直高度记为y（单位：cm），乒乓球运行的水平距离记为x（单位：cm），测得几组数据如下：

    水平距离$x / \mathrm{cm}$

    0

    10

    50

    90

    130

    170

    230

    竖直高度$y/\mathrm{cm}$

    $28.75$

    33

    45

    49

    n

    33

    0

    根据以上数据，解决下列问题：

    （1）当乒乓球第一次落在对面球台上时，球到起始点的水平距离是______cm，表格中n的值为______；

    （2）求出满足条件的函数表达式；

    （3）若发球机的发球高度增加$15\mathrm{cm}$，其他所有条件均不变，则乒乓球从发球机出口发出后______落到对面球台上（填“能”或“不能”）．'
  answer: （1）230，45 （2）$y = -\frac{1}{400}(x - 90)^2 + 49$ （3）能
  solution: '【小问1详解】

    解：∵当乒乓球的竖直高度为0时，水平距离为$230\mathrm{cm}$，

    ∴当乒乓球第一次落在对面球台上时，球到起始点的水平距离是$230\mathrm{cm}$；

    ∵当$x = 10$和当$x=170$时的函数值相同，

    ∴对称轴为直线$x=\frac{10+170}{2}=90$，

    ∴当$x=130$时的函数值与当$x=\frac{90\times2-130}{2}=50$的函数值相同，

    ∴$n = 45$；

    【小问2详解】

    解：设$y = 4(x - 96)^2 + 49$，

    把$(230,0)$代入$y = 4(x - 96)^2 + 49$中得$\theta = \alpha (230 - 90) \div 49$，解得$a = -\frac{1}{400}$，

    ∴满足条件的函数表达式为$y = -\frac{1}{400}(x - 90)^2 + 49$；

    【小问3详解】

    解：当发球机的发球高度增加$15\mathrm{cm}$时，则此时抛物线解析式为$y=-\frac{1}{400}(x-90)^{2}+49+15=-\frac{1}{400}(x-90)^{2}+64$，

    在$y = -\frac{1}{400}(x - 90)^2 + 64$中，当$y-\frac{1}{400}(x-90)^{2}+64=0$时，解得$x=250$或$x = -70$，

    ∵$250\mathrm{cm}<274\mathrm{cm}$，

    ∴乒乓球从发球机出口发出后能落到对面球台上．'
