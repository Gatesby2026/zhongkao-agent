  answer: 11或17（写出一个即可）
  solution: '解：法一，∵甲组的每个数据之间相差$1$，而乙组除了a外，每个数据之间也是相差$1$，

    又∵甲、乙两组病人康复时间的方差相同，

    ∴乙组按照顺序排列：a、12、13、14、15、16或者12、13、14、15、16、a，两组数据都是连续$[公式]$相差只有1，

    ∴$a = 11$或者$a = 17$；

    法二，甲组：$\bar{x}=\frac{1}{6}\times(10+11+12+13+14+15)=\frac{25}{2}$，

    ∴$s^{2}=\frac{1}{6}\left[\left(10-\frac{25}{2}\right)^{2}+\left(11-\frac{25}{2}\right)^{2}+\left(12-\frac{25}{2}\right)^{2}+\left(13-\frac{25}{2}\right)^{2}+\left(14-\frac{25}{2}\right)^{2}+\left(15-\frac{25}{2}\right)^{2}\right]=\frac{35}{12}$，

    乙组：$\bar{x}=\frac{1}{6}(12+13+14+16+15+a)=\frac{70+a}{6}$，

    ∴$s^{2}=\frac{1}{6}\left[\left(12-\frac{70+a}{6}\right)^{2}+\left(13-\frac{70+a}{6}\right)^{2}+\left(14-\frac{70+a}{6}\right)^{2}+\left(16-\frac{70+a}{6}\right)^{2}+\left(15-\frac{70+a}{6}\right)^{2}+\left(a-\frac{70+a}{6}\right)^{2}\right]=\frac{35}{12}$，

    解得$a = 11$或$a = 17$，'
