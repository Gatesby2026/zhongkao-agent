  question: '某工厂根据现有条件可选择A，B，C三种产品中的一种、两种或三种进行生产，每种产品生产一个分别需要的钢材（单位：吨）、工时（单位：小时）、获得利润（单位：万元）如下表所示：

    项目

    种类

    所需钢材（吨）

    工时（小时）

    利润（万元）

    A

    2

    3

    3

    B

    3

    5

    4

    C

    5

    7

    5

    （1）现有钢材60吨，可安排工时100小时，工厂利润最大时，需生产A种产品_________个；

    （2）若生产一个产品B所需工时由5小时缩减到3小时，现有钢材60吨，可安排工时81小时，则工厂能获得的最大利润为_________万元．'
  answer: ①.30②.$87$
  solution: '解：（1）由表格可知$\frac{3}{2}>\frac{4}{3}>\frac{5}{5}$，可知A种类产品钢材每吨的利润最大，

    ∴A种类产品生产的越多，利润越大，

    即当生产A种产品数量为$\frac{60}{2}=30$个时，所需时间为$3\times30=90$小时$<100$小时，

    故答案为：$30$；

    （2）解：设生产A产品a个，B产品b个，C产品c个，利润为W元，

    则$\begin{cases}

    2a+3b+4c\leq60 \\

    3a+5b+3c\leq81

    \end{cases}$，即$a + c = \frac{5}{3}b + 27$，

    ∴$W = 3a + 4b + 5c - (2a + 3b + 4c) + a + b + c \leq 60 + b + \left( \frac{5}{3}b - 27 \right) - \frac{2}{3}b + 87$，

    即当$b = 0$时，W最大为$87$，

    故答案为：$87$．'
