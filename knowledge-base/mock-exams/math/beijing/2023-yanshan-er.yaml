  question: '如果$a-b=1$，那么代数式$\left(\frac{b^{2}}{a}-a\right)\cdot\frac{2a}{a+b}$的值为（）．

    A.2B.1C.$-1$D.$-2$'
  answer: D
  solution: '解：$\left(\frac{b^{2}}{a}-a\right)\cdot\frac{2a}{a+b}$，

    $=\frac{b^{2}}{a}-\frac{a^{2}}{a}-\frac{2a}{a+b}$，

    $=\frac{b^{2}-a^{2}}{a}\cdot\frac{2a}{a+b}$，

    $\frac{(a+b)(b-a)}{a}+\frac{2a}{a+b}$，

    $=2(b-a)$，

    $-2(a-b)$，

    $=-2$．

    故选D．'
