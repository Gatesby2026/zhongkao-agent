  question: '魏晋时期，数学家刘徽利用如图所示的“青朱出入图”证明了勾股定理，其中四边形$ABCD$，$AFLJ$和$BFGH$都是正方形．如果图中$\triangle BCE$与$\sqrt{FDE}$的面积比为$\frac{16}{9}$，那么$\tan \angle GFI$的值为________．

