  answer: （1）证明见解析 （2）$\frac{3}{2}$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$AC = 2AO,\ BD = 2BO$．

    ∵$AO = BO$，

    ∴$AC = BD$，

    ∴平行四边形$ABCD$为矩形．

    【小问2详解】

    解：如图，过点E作$EF \perp BD$于点F．

    [图]

    ∵四边形$ABCD$是矩形，

    ∴$\angle DAB = 90^\circ$，

    ∴$EA\perp AD$．

    ∵DE为$\angle ADB$的角平分线，

    ∴$EF=EA,\ DF=DA$．

    ∵$AD = 3,\ AB = 4$，

    ∴$BD = \sqrt{AD^{2} + AB^{2}}$$\sqrt{3^{2}+4^{2}}=5$．

    ∵$DF = DA = 3$，

    ∴$BF=BD-DF=2$．

    在$\triangle BEF$中，$\angle BFE = 90^\circ$，设$EF=EA=x$，则$BE = 4 - x$，

    由$\sin\angle FBE=\frac{EF}{BE}$$\frac{x}{4-x}$$=\frac{3}{5}$，

    解得$x=\frac{3}{2}$，

    ∴$AE =$$\frac{3}{2}$．'
