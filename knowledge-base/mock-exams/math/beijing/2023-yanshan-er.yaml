  question: '如图，某小区有一块三角形绿地ABC，其中$\angle B=90^{\circ}, AB=BC$．计划在绿地上建造一个矩形的休闲书吧$PMBN$，使点P，M，N分别在边$AC, BC, AB$上．记$PM = xm, PN = ym$，图中阴影部分的面积为$Sm^{2}$．当x在一定范围内变化时，y和S都随x的变化而变化，则y与x，S与x满足的函数关系分别是（）

    [图]

    A.一次函数关系，二次函数关系B.一次函数关系，反比例函数关系

    C.二次函数关系，一次函数关系D.反比例函数关系，二次函数关系'
  answer: A
  solution: '解：∵$\angle B=90^{\circ}, AB=BC$，

    ∴$\angle A=\angle C=45^{\circ}$，

    ∵四边形$PMBN$是矩形，

    ∴$\angle PMB=\angle PMC=\angle PNB=\angle PNA=90^{\circ}$，$PN = BM$，

    ∴$\triangle PCM, \triangle APN$都是等腰直角三角形，

    ∴$CM\cdot PM,\ AN=PN=BM$，

    ∴$PM + PM = CM + BM = BC$，即$x+y=BC$，

    ∴$y = -x + BC$，$S = \frac{1}{2}PM \cdot CM + \frac{1}{2}PN \cdot AN = \frac{1}{2}x^2 + \frac{1}{2}(BC - x)^2$

    ∴$S = \frac{1}{2}PM \cdot CM + \frac{1}{2}PN \cdot AN = \frac{1}{2}x^2 + \frac{1}{2}(BC - x)^2$，

    ∴y与x，S与x满足的函数关系分别是一次函数关系，二次函数关系，

    故选A．'
