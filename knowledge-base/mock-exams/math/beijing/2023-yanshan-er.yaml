  question: '在平面直角坐标系xOy中，一次函数$y=kx+b$(k＞0)与反比例函数$y = \frac{m}{x}$(m≠0)的图象交于点A(1，6)和点B．

    （1）若点B(－6，－1)，求该一次函数和反比例函数的解析式；

    （2）当$x \leq -3$时，对于x的每一个值，函数$y = \frac{m}{x}$(m≠0)的值大于一次函数$y=kx+b$(k＞0)的值，直接写出k的取值范围．'
  answer: （1）$y=x+5$．$y=\frac{6}{x}$ （2）$k^{2}$
  solution: '【小问1详解】

    解：将点A(1，6)，B(－6，－1)的坐标分别代入$y=kx+b$中，

    得$\begin{aligned}

    x + b &= 6, \\

    -6k + b &= -1.

    \end{aligned}$

    解得$\left\{

    \begin{array}{l}

    k = 1, \\

    b = 5,

    \end{array}

    \right.$

    ∴一次函数的解析式$y=x+5$．

    将点A(1，6)的坐标代入$y = \frac{m}{x}$中，

    得m＝6，

    ∴反比例函数的解析式$y=\frac{6}{x}$．

    【小问2详解】

    解：由点A(1，6)在一次函数$y=kx+b$和反比例函数$y = \frac{m}{x}$的图像上，

    ∴$b=6-k$，$y=\frac{6}{x}$，

    令$\frac{6}{x}=kx+6-k$，

    ∴$(kx+6)(x-1)=0$；

    ∴$x_{1}=1$，$x_{2}=-\frac{6}{k}$，

    ∵当$x \leq -3$时，对于x的每一个值，不等式都成立，

    ∴$-\frac{6}{k} \leq -3$，

    ∴$k^{2}$；'
