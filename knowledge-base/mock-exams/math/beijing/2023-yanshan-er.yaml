    ∴$FG \parallel CD$，

    ∵将线段AE绕点A逆时针旋转$90^\circ$得到线段AF，

    ∴$AF = AE$，$\angle FAE = 90^\circ$，

    ∴$\angle FAG+\angle EAD=90^{\circ}$，$\angle PAG+\angle GPA=90^\circ$，

    ∴$\angle GFA = \angle LAD$，

    ∴$Rt\triangle CAC \cong Rt\triangle AED (AAS)$，

    ∴$GA = ED$，$FG = AD = CD$，

    ∴四边形$FGDC$为矩形，

