  question: '在平面直角坐标系xOy中，抛物线$y=ax^{2}-4a^{2}x$$(a \neq 0)$．

    （1）求抛物线与x轴的交点坐标及抛物线的对称轴(用含a的式子表示)；

    （2）已知点$P(a-1,y_{1})$，$Q(a+5,y_{2})$在该抛物线上，若$y_{1}\cdot y_{2}<0$，求a的取值范围．'
  answer: （1）$(0,0)$；$(4a,0)$；$x = 2a$ （2）$1 < a < \frac{5}{3}$或$-5 < a < -\frac{1}{3}$．
  solution: '【小问1详解】

    解：$y=ax^{2}-4a^{2}x=ax(x-4a)$，

    当$y = 0$时，$ax(x-4a)=0$，解得$x_{1}=0$，$x_{2}=4a$，

    所以抛物线与x轴交于点$(0,0)$和$(4a,0)$，抛物线的对称轴为直线$x=\frac{-4a^{2}}{2a}=2a$．

    【小问2详解】

    解：抛物线与x轴交于点$(0,0)$和$(4a,0)$

    当$a > 0$，由$y_{1}\cdot y_{2}<0$，

    ∴$\begin{aligned}

    &0 < a - 1 < 4, \\

    &a + 5 > 4a.

    \end{aligned}$或$\begin{aligned}

    &|a-1|<0, \\

    &0<a+5<4a.

    \end{aligned}$解得$1 < a < \frac{5}{3}$或无解；

    当$a<0$，由$y_{1}\cdot y_{2}<0$，

    ∴$\begin{cases}

    4a < a - 1 < 0, \\

    a + 5 > 0.

    \end{cases}$或$\begin{aligned}

    &|a-1|<4a, \\

    &4a<a+5<0.

    \end{aligned}$解得$-5 < a < -\frac{1}{3}$或无解．

    综上，$1 < a < \frac{5}{3}$或$-5 < a < -\frac{1}{3}$．'
