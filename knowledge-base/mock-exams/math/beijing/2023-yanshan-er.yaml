    解：由题意得：

    $\triangle=4^{2}-4\times(m+2)$

    $=16-4m-8$

    $=8-4m$，

    ∵该方程有两个不相等的实数根，

    ∴$8-4m>0$，

    ∴$m<2$．

    【小问2详解】

    解：∵m为正整数，且$m<2$，

    ∴$m = 1$，

    此时，方程为$x^{2}+4x+3=0$，

    解得$x_{1}=-3$，$x_{2}=-1$．'
