  question: '在平面直角坐标系xOy中，一次函数$y = kx + b(k \ne 0)$的图象由函数$y=\frac{1}{2}x$的图象向下平移1个单位长度得到．

    （1）求这个一次函数的解析式；

    （2）当$x > -2$时，对于x的每一个值，函数$y = mx (m \neq 0)$的值大于一次函数$y = kx + b$的值，直接写出m的取值范围．'
  answer: （1）$y=\frac{1}{2}x-1$；（2）$\frac{1}{2} \leq m \leq 1$
  solution: '解：（1）由一次函数$y = kx + b(k \neq 0)$的图象由函数$y=\frac{1}{2}x$的图象向下平移1个单位长度得到可得：一次函数的解析式为$y=\frac{1}{2}x-1$；

    （2）由题意可先假设函数$y = mx (m \neq 0)$与一次函数$y = kx + b$的交点横坐标为$-2$，则由（1）可得：

    $-2m = \frac{1}{2} \times (-2) - 1$，解得：$m = 1$，

    函数图象如图所示：

    [图]

    ∴当$x > -2$时，对于x的每一个值，函数$y = mx (m \neq 0)$的值大于一次函数$y = kx + b$的值时，根据一次函数的k表示直线的倾斜程度可得当$m = \frac{1}{2}$时，符合题意，当$\angle AOC = 90^\circ$时，则函数$y = mx (m \neq 0)$与一次函数$y = kx + b$的交点在第一象限，此时就不符合题意，

    综上所述：$\frac{1}{2} \leq m \leq 1$．'
