  question: '有甲､乙两组数据，如表所示：

    | 甲 | 11 | 12 | 13 | 14 | 15 |

    | --- | --- | --- | --- | --- | --- |

    | 乙 | 12 | 12 | 13 | 14 | 14 |

    甲､乙两组数据的方差分别为$s_{甲}^{2},s_{乙}^{2}$，则$s_{\text{甲}}^{2}$______________$s_{乙}^{2}$（填“＞”，“＜”或“＝”）．'
  answer: ＞
  solution: '解：由题意得：

    $\overline{x}_{\text{甲}}=\frac{11+12+13+14+15}{5}=13$，$\overline{x_{乙}}=\frac{12+12+13+14+14}{5}=13$，

    ∴$s_{\text{甲}}^2 = \frac{\left[(11-13)^2 + (12-13)^2 + (13-13)^2 + (14-13)^2 + (15-13)^2\right]}{5} = 2$，

    $s_{\mathrm{Z}}^{2}=\frac{\left[(12-13)^{2}+(12-13)^{2}+(13-13)^{2}+(14-13)^{2}+(14-13)^{2}\right]}{5}=\frac{4}{5}$，

    ∴$2>\frac{4}{5}$，

    ∴$s_{\text{甲}}^{2}>s_{\text{乙}}^{2}$；

    故答案为＞．'
