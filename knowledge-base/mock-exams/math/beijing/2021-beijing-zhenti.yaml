  question: '如图，在$\triangle ABC$中，$AB = AC, \angle BAC = \alpha, M$为BC的中点，点D在MC上，以点A为中心，将线段AD顺时针旋转$\alpha$得到线段AE，连接$BE, DE$．

    [图]

    （1）比较$\angle BAE$与$\angle CAD$的大小；用等式表示线段$BE,BM,MD$之间的数量关系，并证明；

    （2）过点M作AB的垂线，交DE于点N，用等式表示线段NE与ND的数量关系，并证明．'
  answer: （1）$\angle BAE = \angle CAD$，$BM = BE + MD$，理由见详解；（2）$DN = EN$，理由见详解．
  solution: '（1）证明：∵$\angle BAC = \angle EAD = \alpha$，

    ∴$\angle BAE + \angle BAD = \angle BAD + \angle CAD = \alpha$，

    ∴$\angle BAE = \angle CAD$，

    由旋转的性质可得$AE = AD$，

    ∵$AB = AC$，

    ∴$\triangle ABE\cong\triangle ACD(SAS)$，

    ∴$BE = CD$，

    ∵点M为BC的中点，

    ∴$BM = CM$，

    ∵$CM = MD + CD = MD + BE$，

    ∴$BM = BE + MD$；

    （2）证明：$DN = EN$，理由如下：

    过点E作EH⊥AB，垂足为点Q，交AB于点H，如图所示：

    [图]

    ∴$\angle EQB = \angle HQB = 90^\circ$，

    由（1）可得$\triangle ABE\cong\triangle ACD$，

    ∴$\angle ABE = \angle ACD$，$BE = CD$，

    ∵$AB = AC$，

    ∴$\angle ABC = \angle C = \angle ABE$，

    ∵$BQ = BQ$，

    ∴$\triangle BQE \cong \triangle BQH \ (ASA)$，

    ∴$BH = BE = CD$，

    ∵$MB = MC$，

    ∴$HM = DM$，

    ∵$MN \perp AB$，

    ∴$MN\parallel EH$，

    ∴$\triangle DMN \sim \triangle DHE$，

    ∴$\frac{DM}{DH}=\frac{DN}{DE}=\frac{1}{2}$，

    ∴$DN = EN$．'
