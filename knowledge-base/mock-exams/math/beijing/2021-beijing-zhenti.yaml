  question: '如图，$00$是$\triangle ABC$的外接圆，AD是$00$的直径，$AD \perp BC$于点E．

    [图]

    （1）求证：$\angle BAD = \angle CAD$；

    （2）连接BO并延长，交AC于点F，交$00$于点G，连接GC．若$00$的半径为5，$OE = 3$，求GC和OF的长．'
  answer: （1）见详解；（2）$GC = 6$，$OF = \frac{25}{11}$
  solution: '（1）证明：∵AD是$00$的直径，$AD \perp BC$，

    ∴$\widehat{BD} = \widehat{CD}$，

    ∴$\angle BAD = \angle CAD$；

    （2）解：由题意可得如图所示：

    [图]

    由（1）可得点E为BC的中点，

    ∵点O是BG的中点，

    ∴$OE =\frac{1}{2}CG,OE//CG$，

    ∴$\triangle AOF \sim \triangle CGF$，

    ∴$\frac{OA}{CG}=\frac{OF}{GF}$，

    ∵$OE = 3$，

    ∴$CG = 6$，

    ∵$00$的半径为5，

    ∴$OA = OG = 5$，

    ∴$\frac{5}{6} = \frac{OF}{GF}$，

    ∴$OF = \frac{5}{11}OG = \frac{25}{11}$．'
