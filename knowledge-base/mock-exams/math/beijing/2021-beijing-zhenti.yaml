  question: '为了解甲､乙两座城市的邮政企业4月份收入的情况，从这两座城市的邮政企业中，各随机抽取了25家邮政企业，获得了它们4月份收入（单位：百万元）的数据，并对数据进行整理､描述和分析．下面给出了部分信息．

    a．甲城市邮政企业4月份收入的数据的频数分布直方图如下（数据分成5组：$6 \leq x < 8, 8 \leq x < 10, 10 \leq x < 12, 12 \leq x < 14, 14 \leq x \leq 16$）：

    [图]

    b．甲城市邮政企业4月份收入的数据在$10 \leq x < 12$这一组的是：10.0，10.0，10.1，10.9，11.4，11.5，11.6，11.8

    c．甲､乙两座城市邮政企业4月份收入的数据的平均数､中位数如下：

    |  | 平均数 | 中位数 |

    | --- | --- | --- |

    | 甲城市 | 10.8 | m |

    | 乙城市 | 11.0 | 11.5 |

    根据以上信息，回答下列问题：

    （1）写出表中m的值；

    （2）在甲城市抽取的邮政企业中，记4月份收入高于它们的平均收入的邮政企业的个数为$p_1$．在乙城市抽取的邮政企业中，记4月份收入高于它们的平均收入的邮政企业的个数为$p_2$．比较$p_1,p_2$的大小，并说明理由；

    （3）若乙城市共有200家邮政企业，估计乙城市的邮政企业4月份的总收入（直接写出结果）．'
  answer: （1）$m = 10.1$；（2）$p_{1}<p_{2}$，理由见详解；（3）乙城市的邮政企业4月份的总收入为2200百万元．
  solution: '解：（1）由题意可得m为甲城市的中位数，由于总共有25家邮政企业，所以第13家邮政企业的收入作为该数据的中位数，

    ∵$6 \leq x < 8$有3家，$8 \leq x < 10$有7家，$10 \leq x < 12$有8家，

    ∴中位数落在$10 \leq x < 12$上，

    ∴$m = 10.1$；

    （2）由（1）可得：甲城市中位数低于平均数，则$p_1$最大为12个；乙城市中位数高于平均数，则$p_2$至少为13个，

    ∴$p_{1}<p_{2}$；

    （3）由题意得：

    $200\times11=2200$（百万元）；

    答：乙城市的邮政企业4月份的总收入为2200百万元．'
