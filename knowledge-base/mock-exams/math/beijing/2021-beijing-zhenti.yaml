  question: '在平面直角坐标系xOy中，点$(1,m)$和点$(3,n)$在抛物线$y = ax^2 + bx (a > 0)$上．

    （1）若$m = 3, n = 15$，求该抛物线的对称轴；

    （2）已知点$(-1,y_{1}),(2,y_{2}),(4,y_{3})$在该抛物线上．若$mn < 0$，比较$y_1,y_2,y_3$的大小，并说明理由．'
  answer: （1）$x = -1$；（2）$y_{2}<y_{1}<y_{3}$，理由见解析
  solution: '解：（1）当$m = 3, n = 15$时，则有点$(1,3)$和点$(3,15)$，代入二次函数$y = ax^2 + bx (a > 0)$得：

    $\left\{

    \begin{array}{l}

    a + b = 3 \\

    9a + 3b = 15

    \end{array}

    \right.$，解得：$\left\{

    \begin{array}{l}

    a = 1 \\

    b = 2

    \end{array}

    \right.$，

    ∴抛物线解析式为$y = x^2 + 2x$，

    ∴抛物线的对称轴为$x = -\frac{b}{2a} = -1$；

    （2）由题意得：抛物线$y = ax^2 + bx (a > 0)$始终过定点$(0,0)$，则由$mn < 0$可得：

    ①当$m > 0, n < 0$时，由抛物线$y = ax^2 + bx (a > 0)$始终过定点$(0,0)$可得此时的抛物线开口向下，即$a < 0$，与$a > 0$矛盾；

    ②当$m < 0, n > 0$时，

    ∵抛物线$y = ax^2 + bx (a > 0)$始终过定点$(0,0)$，

    ∴此时抛物线的对称轴的范围为$\frac{1}{2}<x<\frac{3}{2}$，

    ∵点$(-1,y_{1}),(2,y_{2}),(4,y_{3})$在该抛物线上，

    ∴它们离抛物线对称轴的距离的范围分别为$\frac{3}{2}<x-(-1)<\frac{5}{2},\frac{1}{2}<2-x<\frac{3}{2},\frac{5}{2}<4-x<\frac{7}{2}$，

    ∵$a > 0$，开口向上，

    ∴由抛物线的性质可知离对称轴越近越小，

    ∴$y_{2}<y_{1}<y_{3}$．'
