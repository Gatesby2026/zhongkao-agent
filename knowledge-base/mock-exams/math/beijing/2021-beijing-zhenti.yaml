  question: '在平面直角坐标系xOy中，$00$的半径为1，对于点A和线段BC，给出如下定义：若将线段BC绕点A旋转可以得到$00$的弦$B''C''$（$B'',C''$分别是$B,C$的对应点），则称线段BC是$00$的以点A为中心的“关联线段”．

    [图]

    （1）如图，点$A,B_1,C_1,B_2,C_2,B_3,C_3$的横､纵坐标都是整数．在线段$B_1C_1,B_2C_2,B_3C_3$中，$00$的以点A为中心的“关联线段”是______________；

    （2）$\triangle ABC$是边长为1的等边三角形，点$A(0,t)$，其中$t \neq 0$．若BC是$00$的以点A为中心的“关联线段”，求t的值；

    （3）在$\triangle ABC$中，$AB = 1, AC = 2$．若BC是$00$的以点A为中心的“关联线段”，直接写出OA的最小值和最大值，以及相应的BC长．'
  answer: （1）$B_{2}C_{2}$；（2）$t = \pm\sqrt{3}$；（3）当$OA_{\min} = 1$时，此时$BC = \sqrt{3}$；当$OA_{\max} = 2$时，此时$BC = \frac{\sqrt{6}}{2}$．
  solution: '解：（1）由题意得：

    [图]

    通过观察图象可得：线段$B_{2}C_{2}$能绕点A旋转90°得到$00$的“关联线段”，$B_1C_1,B_3C_3$都不能绕点A进行旋转得到；

    故答案为$B_{2}C_{2}$；

    （2）由题意可得：当BC是$00$的以点A为中心的“关联线段”时，则有$\triangle AB''C''$是等边三角形，且边长也为1，当点A在y轴的正半轴上时，如图所示：

    [图]

    设$B''C''$与y轴的交点为D，连接$OB''$，易得$B''C'' \perp y$轴，

    ∴$B''D = DC'' = \frac{1}{2}$，

    ∴$OD = \sqrt{OB''^2 - B''D^2} = \frac{\sqrt{3}}{2}$，$AD = \sqrt{AB''^2 - B''D^2} = \frac{\sqrt{3}}{2}$，

    ∴$OA = \sqrt{3}$，

    ∴$t = \sqrt{3}$；

    当点A在y轴的正半轴上时，如图所示：

    [图]

    同理可得此时的$OA = \sqrt{3}$，

    ∴$t = -\sqrt{3}$；

    （3）由BC是$00$的以点A为中心的“关联线段”，则可知$B'',C''$都在$00$上，且$AB'' = AB = 1, AC'' = AC = 2$，则有当以$B''$为圆心，1为半径作圆，然后以点A为圆心，2为半径作圆，即可得到点A的运动轨迹，如图所示：

    [图]

    由运动轨迹可得当点A也在$00$上时为最小，最小值为1，此时$AC''$为$00$的直径，

    ∴$\angle AB''C'' = 90^\circ$，

    ∴$\angle AC''B'' = 30^\circ$，

    ∴$BC = B''C'' = AC'' \cdot \cos 30^\circ = \sqrt{3}$；

    由以上情况可知当点$A,B'',O$三点共线时，OA的值为最大，最大值为2，如图所示：

    [图]

    连接'
