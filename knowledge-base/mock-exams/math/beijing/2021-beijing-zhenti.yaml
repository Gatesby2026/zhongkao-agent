  question: 某企业有$A,B$两条加工相同原材料的生产线．在一天内，A生产线共加工a吨原材料，加工时间为$(4a+1)$小时；在一天内，B生产线共加工b吨原材料，加工时间为$(2b+3)$小时．第一天，该企业将5吨原材料分配到$A,B$两条生产线，两条生产线都在一天内完成了加工，且加工时间相同，则分配到A生产线的吨数与分配到B生产线的吨数的比为______________．第二天开工前，该企业按第一天的分配结果分配了5吨原材料后，又给A生产线分配了m吨原材料，给B生产线分配了n吨原材料．若两条生产线都能在一天内加工完各自分配到的所有原材料，且加工时间相同，则$\frac{m}{n}$的值为______________．
  answer: ①.2∶3 ②.$\frac{1}{2}$
  solution: '解：设分配到A生产线的吨数为x吨，则分配到B生产线的吨数为（5-x）吨，依题意可得：

    $4x+1=2(5-x)+3$，解得：$x = 2$，

    ∴分配到B生产线的吨数为5-2=3（吨），

    ∴分配到A生产线的吨数与分配到B生产线的吨数的比为2∶3；

    ∴第二天开工时，给A生产线分配了$(2+m)$吨原材料，给B生产线分配了$(3+n)$吨原材料，

    ∵加工时间相同，

    ∴$4(2+m)+1=2(3+n)+3$，

    解得：$m = \frac{1}{2}n$，

    ∴$\frac{m}{n}=\frac{1}{2}$；

    故答案为$2:3$，$\frac{1}{2}$．'
