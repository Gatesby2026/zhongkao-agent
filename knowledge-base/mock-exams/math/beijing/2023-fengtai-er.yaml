  question: 解方程：$\frac{x}{x-1}+\frac{1}{x+1}=1$
  answer: $x = 0$
  solution: '解：$\frac{x}{x-1}+\frac{1}{x+1}=1$

    去分母得：$x(x+1)+(x-1)=(x-1)(x+1)$，

    去括号并合并同类项得：$2x = 0$，

    解得：$x = 0$，

    经检验，$x = 0$是方程的根，

    ∴原方程的解为$x = 0$．'
