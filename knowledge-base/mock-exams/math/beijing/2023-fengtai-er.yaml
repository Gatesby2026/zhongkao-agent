  question: '在平面直角坐标系xOy中，点$(4,3)$在抛物线$y=ax^{2}+bx+3(a\neq 0)$上．

    （1）求抛物线的对称轴；

    （2）若点$(x_{1},5),(x_{2},-3)$在抛物线上，求a的取值范围；

    （3）若点$(m, y_1), (m+1, y_2)$在抛物线上，对于任意的$m^{3}$，都有$\left|y_{2}-y_{1}\right|\ 3$，直接写出a的取值范围．'
  answer: （1）直线$x=2$ （2）$a\frac{3}{2}$或$a \leq -\frac{1}{2}$ （3）$a\ 1$或$a \leq -1$
  solution: '【小问1详解】

    ∵点$(4,3)$在抛物线$y=ax^{2}+bx+3(a\neq 0)$上，

    ∴$16a+4b+3=3$．

    ∴$b = -4a$．

    ∴$x = -\frac{b}{2a} = -\frac{-4a}{2a} = 2$．

    ∴抛物线的对称轴为直线$x=2$．

    【小问2详解】

    ∵抛物线的对称轴为直线$x=2$，$b = -4a$，

    ∴$y=4a-2b+3=4a-8a+3=3-4a$．

    ∴抛物线顶点坐标为$(2,3-4a)$．

    ∵点$(x_{1},5),(x_{2},-3)$在抛物线上，，

    ∴当$a > 0$时，$3-4a\leq-3$，解得$a\frac{3}{2}$；

    当$a<0$时，$3-4a\quad5$，解得$a \leq -\frac{1}{2}$．

    综上所述，$a\frac{3}{2}$或$a \leq -\frac{1}{2}$．

    【小问3详解】

    当$x = m$时，$y_{1}=am^{2}-4am+3$，

    当$x = m + 1$时，$y_{2}=a(m+1)^{2}-4a(m+1)+3=am^{2}-2am-3a+3$，

    ∴$\left|y_{2}-y_{3}\right|=\left|am^{2}-2am-3a+3\right|-\left(am^{2}-4am+3\right)=\left|a\left(2m-3\right)\right|$．

    ∵$m^{3}$，

    ∴$2m-3\quad 3$．

    ∴当$a > 0$时，$|y_2-y_1|=|a(2m-3)-a(2m-3)|=3$．

    ∴$a\ 1$．

    ∴当$a<0$时，$|y_{2}-v|=|a(2m-3)|=-a(2m-3)\quad 3$．

    ∴$a \leq -1$．

    ∴$a\ 1$或$a \leq -1$．'
