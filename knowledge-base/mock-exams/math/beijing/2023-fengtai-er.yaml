  question: '已知关于x的一元二次方程$x^{2}-2mx+m^{2}-4=0$．

    （1）求证：该方程总有两个不相等的实数根；

    （2）选择一个m的值，使得方程至少有一个正整数根，并求出此时方程的根．'
  answer: （1）证明见解析 （2）当$m = 0$时，方程的根是$x_{1}=2,x_{2}=-2$（答案不唯一）
  solution: '【小问1详解】

    ∵$\Delta =(-2m)^{2}-4\times1\times(m^{2}-4)=4m^{2}-4m^{2}+16=16>0$，

    ∴该方程总有两个不相等的实数根．

    【小问2详解】

    ∵$\Delta=(-2m)^{2}-4\times1\times(m^{2}-4)=4m^{2}-4m^{2}+16=16$，

    ∴$\frac{2m+\sqrt{16}}{2}-\frac{2m-4}{2}=m\leq 4$．

    ∵方程至少有一个正整数根，

    ∴$m+4>0$．

    ∴$m > -4$．

    当$m = 0$时，一元二次方程$x^{2}-2mx+m^{2}-4=0$可化为$x^{2}-4=0$，

    解得：$x_{1}=2,x_{2}=-2$．'
