    ∴OD是AC的中位线，

    ∴$OD \parallel AC$，$OD = \frac{1}{2}AC = \frac{5}{2}$，

    ∴$OF \parallel AC$，

    ∴$\frac{OF}{AC}=\frac{OE}{AE}$，

    ∵$\sin E = \frac{2}{3}$，EC是$\odot\odot$的切线，

