  question: '在平面直角坐标系xOy中，一次函数$y=kx+b$的图象经过点$(2,0),(3,1)$．

    （1）求这个一次函数的表达式；

    （2）当$x > m$时，对于x的每一个值，正比例函数$y = mx$的值大于一次函数$y=kx+b$的值，直接写出m的取值范围．'
  answer: （1）一次函数的解析式$y=x-2$； （2）$m\ 1$．
  solution: '【小问1详解】

    解：∵一次函数$y=kx+b$的图象过点$(2,0),(3,1)$，

    ∴把$(2,0),(3,1)$代入得：$\begin{cases}

    2k + b = 0 \\

    3k + b = 1

    \end{cases}$，

    解得：$\left\{

    \begin{array}{l}

    k = 1 \\

    b = -2

    \end{array}

    \right.$，

    ∴一次函数的解析式$y=x-2$；

    【小问2详解】

    解：由（1）得：一次函数的解析式$y=x-2$，

    当$x = m$时，$y = m - 2$，

    当$x > m$时，对于x的每一个值，正比例函数$y = mx$的值大于一次函数$y=kx+b$的值，

    ∴$m\ 1$，

    把$x = m$代入$y = mx$得：$y = m^2$，

    ∴$m^{2}>m-2$，即$\left(m-2\right)^{\frac{1}{2}}>\frac{7}{4}$，

    无论m取何值，不等式均成立，

    ∴$m\ 1$.'
