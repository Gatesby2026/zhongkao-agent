    以FG的中点为坐标原点，建立如图2所示的平面直角坐标系xOy，通过研究发现，抛物线满足函数关系$y = -\frac{1}{4}x^2 + |(-2 \leq x \leq 2)|$．设矩形$EFGH$的面积为$Sm^{2}$，FG的长为am，则另一边HG的长为_______m（用含a的代数式表示），得到S与a的关系式为：_________$(0<a<4)$；

    （2）探究函数：

    列出S与a的几组对应值：

    | $a / m$ | … | 0.5 | 1.0 | 1.5 | 2.0 | 2.5 | 3.0 | 3.5 | … |

    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | $S / m^2$ | … | 0.49 | 0.94 | 1.29 | 1.50 | 1.52 | 1 $[公式]$ 31 | 0.82 | … |

    在下面的平面直角坐标系中，描出表中各组数值对应的点，并画出该函数的图象；

    [图]

    （3）解决问题：

    结合函数图象得到，FG的长约为__________m时，矩形面积最大．'
  answer: （1）$\left(-\frac{1}{16}a^{2}+1\right)$；$S = -\frac{1}{16}a^3 + a$ （2）图象见解析 （3）$2.3$
  solution: '【小问1详解】

    ∵$FG = a$，

    ∴$OG = \frac{1}{2}a$．

    当$x = \frac{1}{2}a$时，$y=-\frac{1}{4}\times\left(\frac{1}{2}a\right)^{2}+1=-\frac{1}{16}a^{2}+1$，

