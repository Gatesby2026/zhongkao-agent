    A.$\left\{ \begin{array}{l} x - y = 5 \\ y - \dfrac{1}{2}x = 5 \end{array} \right.$

    B.$\left\{ \begin{array}{l} x - y = 5 \\ \frac{1}{2}x - y = 5 \end{array} \right.$

    C.$\left\{ \begin{array} { l } { x - y = 5 } \\ { x - 2 y = 5 } \end{array} \right.$

    D.$\left\{ \begin{array} { l } { x - y = 5 } \\ { y - 2 x = 5 } \end{array} \right.$'
  answer: A
  solution: '设绳索长为x尺，竿长为y尺，

    根据题意列方程组：

    $\left\{ \begin{array}{l} x - y = 5 \\ y - \dfrac{1}{2}x = 5 \end{array} \right.$，

    故选A．'
