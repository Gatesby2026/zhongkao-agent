- id: 16
  type: 填空
  score: 2
  question: '甲地组织20辆汽车装运食品、药品、生活用品三种物资共100吨到乙地．每辆汽车可装运物资的运载量和每吨所需运费如下表．

    | 物资种类 | 食品 | 药品 | 生活用品 |

    | --- | --- | --- | --- |

    | 每辆汽车运载量 / 吨 | 6 | 5 | 4 |

    | 每吨所需运费 / 元 | 120 | 160 | 100 |

    如果20辆汽车都要装运，每辆汽车只能装运同一种物资且必须装满，每种物资至少装运1辆车，那么总运费最少的车辆安排方案为：装运食品、药品、生活用品的汽车辆数依次是_______，此时总运费为____元．'
  answer: ①.$9,2,9$ ②.$11680$
  solution: '解：设x辆汽车装运食品，y辆汽车装运药品，则装运生活用品的车辆数为$(20-x-y)$，

    由题意，得：$6x+5y+4(20-x-y)=100$，

    ∴$y = -2x + 20$．

    ∴$20-x-y=20-x-(-2x+20)=x$．

    ∵每种物资至少装运1辆车，

    ∴$\begin{pmatrix}

    x & 1 \\

    -2x+20 & 1

    \end{pmatrix}$．

    解得：$1 \leq x \leq \frac{19}{2}$，

    设总费用为w，则

    $w=120\times6x+160\times5\left(-2x+20\right)+100\times4x=-480x+16000$，

    ∵$k = -480 < 0$，

    ∴w随x的增大而减小．

    ∵$1 \leq x \leq \frac{19}{2}$，且为整数，

    ∴当$x=9$时，总费最少，最少费用为$w=-480\times9+16000-11680$元．

    此时$y = -2x + 20 = 2$．

    故答案为：$9,2,9$；$11680$．'
