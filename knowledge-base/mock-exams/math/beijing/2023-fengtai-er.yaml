    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |

    | A 品种花生仁粒数 | 5 | 10 | 6 | 7 | 2 | 0 | 0 | 0 | 0 | 0 |

    | B 品种花生仁粒数 | 0 | 0 | 2 | 3 | 6 | 4 | 5 | 4 | 4 | 2 |

    b.两种花生仁的长轴长度的平均数、中位数、众数、方差如下：

    |  | 平均数 | 中位数 | 众数 | 方差 |

    | --- | --- | --- | --- | --- |

