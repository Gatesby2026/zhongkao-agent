    ∴$OH = OI = 3$，此时$t=3$；

    ②当直线与$\odot F$相切时，设切点为J，交y轴于点K，

    ∵$OJ=1+\sqrt{2}$，

    ∴$OK=\sqrt{2}OJ=\sqrt{2}+2$，此时$t=-\sqrt{2}-2$，

    综上所述，$-\sqrt{2}-2\leq t\leq 3$．

