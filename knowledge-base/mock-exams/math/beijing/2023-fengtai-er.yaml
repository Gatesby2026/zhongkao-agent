  question: '学校新建的体育器材室的一面外墙如图1所示，它的轮廓由抛物线和矩形$ABCD$构成．数学兴趣小组要为器材室设计一个矩形标牌$EFGH$，要求矩形$EFGH$的顶点E，H在抛物线上，顶点F，G在矩形$ABCD$的边AD上．为了设计面积最大的矩形$EFGH$，兴趣小组对矩形$EFGH$的面积与它的一边FG的长之间的关系进行研究．

    [图]

