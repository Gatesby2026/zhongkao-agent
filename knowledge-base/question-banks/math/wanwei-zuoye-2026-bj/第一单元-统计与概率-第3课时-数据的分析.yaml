  source: 2025房山区一模
  stem: 为进一步推动阳光体育运动, 提高学生身体素质, 某校举行健美操比赛. 最终有甲、乙、丙三个班级进入团体决赛, 团体决赛需要分别进行五个单项比赛. 单项比赛和团体决赛的计分规则如表:\n\n|
    单项比赛计分规则 | 五名裁判打分, 去掉一个最高分和一个最低分, 剩下三个有效分的平均数即为该项得分. |\n|--------------------|------------------------------------------------------------|\n|
    团体决赛计分规则 | 各单项比赛得分之和为团体最终成绩, 最终成绩较高的班级排序靠前, 若最终成绩相同, 则整体发挥稳定性较好的班级排序靠前. |\n\n现将参加比赛的甲、乙、丙三个班级的得分数据进行整理、描述和分析,
    并绘制统计图表, 部分信息如下:\n\na. 甲班五个单项得分和乙班四个单项得分的折线图:\n\n[图]\n\nb. 丙班五个单项得分表:\n\n| 项目
    | 一 | 二 | 三 | 四 | 五 |\n|------|---|---|---|---|---|\n| 得分 | 88 | $m$ | 94 | 90
    | 92 |\n\n根据以上信息, 回答下列问题:\n(1) 甲班五个单项得分的中位数为______;\n(2) 已知丙班第二个单项比赛中, 五名裁判的打分分别为80,
    84, 86, 83, 82, 则丙班第二个单项的得分$m=$______;\n(3) 甲班与丙班相比较, 排名比较靠前的是______班(填“甲”或“丙”);\n(4)
    若最终的比赛结果乙班排名居中, 则乙班第五个项目的得分可能为______(得分为整数).
  answer: ''
