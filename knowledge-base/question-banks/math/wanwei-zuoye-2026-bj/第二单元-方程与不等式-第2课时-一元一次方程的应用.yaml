  source: 2025平谷区二模
  stem: 随着信息技术的发展，慕课已成为技术赋能教育的典范，它让优质资源跨越地域的局限，承载“知识无边界”的理想。北京作为政治文化的中心，在教育模式的创新方面的引领作用尤为明显。2023
    年北京地区慕课已占全国慕课的四分之一，2024 年全国慕课增加了 4 750 门，北京地区的慕课增长了 19%，北京慕课占全国慕课的 28%，求 2023
    年北京地区的慕课为多少门。
