  stem: '某校礼堂舞台正上方有一个长为 1 800 cm 的长方形电子显示屏，如图所示。每次活动都会在电子显示屏显示主题活动的标题。由于每次活动的主题不同，标题字数也就不等，为了显示时方便美观，工作人员对有关数据作出了如下规定：边空宽
    : 字宽 : 字距 = 3 : 4 : 1。每个字的字宽相等，每个字之间的字距相等。若某次主题活动的标题字数为 17 个字，求字距是多少 cm。[图]'
