    $EG$ 为 $FH$ 的垂直平分线，则 $S_{\text{四边形}AFOE} = \dfrac{1}{4}S_{\text{正方形}ABCD}$；\n④如果
    $EG$ 与 $FH$ 相互垂直且平分，则 $AE+AF=CD$；\n所有正确结论的序号是
  options:
