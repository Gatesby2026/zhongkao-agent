- id: 3
  type: 选择
  difficulty: 基础
  source: 2025海淀区期中
  stem: 我国古代数学名著《张丘建算经》中记载：“今有清酒一斗直粟十斗，醑酒一斗直粟三斗，今持粟三斛，得酒五斗，问清、醑酒各几何？”意思是：现在一斗清酒价值10斗谷子，一斗醑酒价值3斗谷子。现拿30斗谷子，共换了5斗清、醑酒各几斗。设醑酒x斗，清酒y斗，则可列方程组为
  options:
    A: $\\left\\{\\begin{array}{l}x+y=30\\\\ \\dfrac{x}{3}+\\dfrac{y}{10}=5\\end{array}\\right.$
    B: $\\left\\{\\begin{array}{l}x+y=5\\\\ \\dfrac{x}{3}+\\dfrac{y}{10}=30\\end{array}\\right.$
    C: $\\left\\{\\begin{array}{l}x+y=5\\\\ 10x+3y=30\\end{array}\\right.$
    D: $\\left\\{\\begin{array}{l}x+y=5\\\\ 3x+10y=30\\end{array}\\right.$
  answer: ''
  has_figure: false
  note: ''
