  stem: 如图，将正五边形纸片沿着虚线剪开，记阴影部分Ⅰ，Ⅱ，Ⅲ的面积分别为 $S_Ⅰ$，$S_Ⅱ$，$S_Ⅲ$。给出以下结论：\n①Ⅰ和Ⅱ合在一起（无重叠部分）能拼成一个等腰三角形；\n②Ⅰ，Ⅱ，Ⅲ合在一起（无重叠部分）能拼成一个等腰梯形；\n③$S_Ⅰ+S_Ⅲ=4S_Ⅱ$；\n④Ⅰ中最大内角的度数是最小内角度数的3倍。\n上述结论中，所有正确结论的序号是（
    ）
  options:
