    $A_1,B_1,C_1,D_1$ 分别是正方形 $ABCD$ 的四条边的中点，将四边形 $A_1B_1C_1D_1$ 绕正方形 $ABCD$ 的中心顺时针旋转
    $45^\circ$，可以得到四边形 $A_2B_2C_2D_2$，$EL,FG,HI,JK$ 分别经过点 $A_2,B_2,C_2,D_2$，且平行于 $A_1D_1$，$A_1B_1,B_1C_1,C_1D_1$。给出下面四个结论：\n①$E,F$
