  source: 2025西城区二模
  stem: 一组对边平行且另一组对边不平行的四边形称为梯形。若梯形中不平行的两边相等，则称这样的梯形为等腰梯形。如图，点 $E,F,G,H$ 分别是等腰梯形 $ABCD$
    各边的中点，顺次连接 $E,F,G,H$ 得到四边形 $EFGH$。点 $K,L,M,N$ 分别是四边形 $EFGH$ 各边的中点，顺次连接 $K,L,M,N$
    得到四边形 $KLMN$。以下四个结论：\n①四边形 $EFGH$ 是菱形；\n②连接 $FH$，则 $2FH=AD+BC$；\n③四边形 $EFGH$ 的面积等于四边形
    $KLMN$ 面积的4倍；\n④四边形 $KLMN$ 周长的平方不小于梯形 $ABCD$ 面积的4倍。\n上述结论中，所有正确结论的序号是（ ）
  options:
    A: ①④
    B: ②③
    C: ①②④
    D: ①②③④
  answer: ''
  has_figure: true
  note: ''
