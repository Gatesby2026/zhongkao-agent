    $1:2$；\n②$c<a+b<\sqrt{2}c$；\n③$\triangle ABC$ 与 $\triangle CDE$ 的面积和为 $\dfrac{1}{4}(a+b)^2$。\n上述结论中，所有正确结论的序号是（
    ）
