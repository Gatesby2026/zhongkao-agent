  stem: '[项目式学习] 数学研究性学习小组在老师的指导下，利用课余时间进行测量活动。\n\n| 活动主题 | 测算某水池中雕塑底座的底面积 |\n|----------|-------------------------------|\n|
    测量工具 | 皮尺、测角仪、计算器等       |\n| 模型抽象 | 某休闲广场的水池中有一雕塑，其底座的底面为矩形 $ ABCD $，其示意图如下：\n[图]\n|\n|
    活动过程 | \n| 测绘过程与数据信息 | \n① 在水池外取一点 $ E $，使得点 $ C, B, E $ 在同一条直线上；\n② 过点 $ E $
    作 $ GH \perp CE $，并沿 $ EH $ 方向前进到点 $ F $，用皮尺测得 $ EF $ 的长为 4 米；\n③ 在点 $ F $ 处用测角仪测得
    $ \angle CFG = 60.3^\circ $，$ \angle BFG = 45^\circ $，$ \angle AFG = 21.8^\circ
    $；\n④ 用计算器计算得：$ \\sin 60.3^\circ \\approx 0.87 $，$ \\cos 60.3^\circ \\approx 0.50
    $，$ \\tan 60.3^\circ \\approx 1.75 $，$ \\sin 21.8^\circ \\approx 0.37 $，$ \\cos
    21.8^\circ \\approx 0.93 $，$ \\tan 21.8^\circ \\approx 0.40 $。\n\n请根据表格中提供的信息，解决下列问题（结果保留整数）：\n(1)
    求线段 $ CE $ 和 $ BC $ 的长度；\n(2) 求底座的底面 $ ABCD $ 的面积。'
  options: {}
  answer: ''
  has_figure: true
  note: ''
  figure_page_ref: .cache/pages/page-041.png
