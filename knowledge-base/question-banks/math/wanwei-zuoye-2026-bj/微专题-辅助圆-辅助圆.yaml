- id: 6
  type: 解答
  difficulty: 能力
  source: ''
  stem: 如图，在矩形 $ABCD$ 中，$AB=6$，$BC=8$，$E$ 为 $AD$ 边上的动点，以每秒 3 个单位长度从点 $A$ 向点 $D$ 运动，$F$
    为 $CD$ 边上的动点，以每秒 4 个单位长度从点 $D$ 向点 $C$ 运动，点 $E$ 与点 $F$ 同时运动，且当点 $F$ 到达点 $C$ 时，两点同时停止运动，连接
    $BE, AF$ 交于点 $N$，点 $M$ 为 $AD$ 边的中点，连接 $MN$，求 $MN$ 的最小值。
  answer: ''
  has_figure: true
  note: ''
  figure_page_ref: .cache/pages/page-059.png
