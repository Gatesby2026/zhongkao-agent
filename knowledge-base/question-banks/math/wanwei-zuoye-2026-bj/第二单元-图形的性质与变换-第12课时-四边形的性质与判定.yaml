  stem: 图①是有一个内角为 $60^\\circ$ 的平行四边形透明纸片，它的邻边的长分别为 $2m$，$2n$ ($m < n$)。沿对边中点所连的虚线将其剪成四个四边形，按图②的方式叠放在同一平面内。给出下面四个结论：\n①
    $\\triangle ABG$ 是等边三角形；\n② 四边形 $GTSH$ 为菱形；\n③ 六边形 $ABCDEF$ 是轴对称图形，不是中心对称图形；\n④
    存在 $m, n$，使四边形 $GTSH$ 的面积与 $\\triangle ABG$ 的面积之比为 $1:2$。\n上述结论中，所有正确结论的序号是
  options:
