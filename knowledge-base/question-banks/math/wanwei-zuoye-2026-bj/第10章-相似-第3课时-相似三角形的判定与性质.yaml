- id: 14
  type: 选择
  difficulty: 能力
  source: 2025东城区一模
  stem: 如图, 在 $\triangle ABC$ 中, $P$ 是边 $AC$ 的中点. 按下列步骤作图:\n①以点 $B$ 为圆心, 适当长为半径画弧,
    交线段 $AB$ 于点 $D$, 交线段 $BC$ 于点 $E$; ②以点 $P$ 为圆心, $BD$ 长为半径画弧, 交线段 $AP$ 于点 $F$; ③以点
    $F$ 为圆心, $DE$ 长为半径画弧, 交前一条弧于点 $G$; ④作直线 $PG$, 交线段 $AB$ 于点 $Q$. 以下结论不一定成立的是
  options:
    A: $\angle APQ = \angle B$
    B: $\angle BQP + \angle C = 180^\circ$
    C: $\triangle APQ$ 与 $\triangle ABC$ 的相似比为 $1:2$
    D: $\triangle ABC \sim \triangle APQ$
  answer: ''
  has_figure: true
  note: ''
  figure_page_ref: .cache/pages/page-043.png
