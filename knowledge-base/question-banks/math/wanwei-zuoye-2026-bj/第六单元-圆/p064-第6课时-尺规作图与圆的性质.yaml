  stem: 下面是“经过直线 $l$ 外一点 $A$ 作这条直线的垂线”的尺规作图方法。\n(1) 任意取一点 $B$, 使点 $B$ 和点 $A$ 在 $l$
    的两旁；\n(2) 以点 $A$ 为圆心, $AB$ 长为半径作弧, 交 $l$ 于点 $C$ 和点 $D$；\n(3) 分别以点 $C$ 和点 $D$ 为圆心,
    大于 $\dfrac{1}{2}CD$ 的同样长为半径作弧, 两弧在 $l$ 的同一侧相交于点 $E$；\n(4) 作直线 $AE$。\n则直线 $AE$
    就是所求作的垂线。\n根据以上尺规作图过程（如图），给出下面四个结论：① 点 $A$ 到 $C,B,E,D$ 四点的距离一定都相等；② 点 $C$ 与点 $D$
    一定关于直线 $AE$ 对称；③ 点 $A$ 与点 $E$ 一定关于直线 $l$ 对称；④ 连接 $AC,CE,AD,ED$, 一定有 $\triangle
    ACE \cong \triangle ADE$。上述结论中，正确结论的序号是
  options:
    A: ①②
    B: ①③
    C: ②③
    D: ②④
  answer: ''
  has_figure: true
  note: ''
