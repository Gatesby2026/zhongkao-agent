    $D$ 在 $\triangle ABC$ 内，且 $\angle ADB = \dfrac{1}{2}\angle BDC$。\n下面是小华的解答过程，请补充完整：\n(1)
    使用直尺和圆规，依作法补全图形（保留作图痕迹）。\n① 作线段 $BC$ 的垂直平分线 $PQ$ 交 $BC$ 于点 $E$；\n② 以点 $A$ 为圆心,
    $AB$ 长为半径作弧, 与直线 $PQ$ 在 $\triangle ABC$ 内交于点 $D$, 点 $D$ 就是所求作的点。\n(2) 完成下面的证明。\n证明：连接
    $DA, DB, DC$。\n∵ 点 $D$ 在线段 $BC$ 的垂直平分线上，\n∴ $DB = DC$（________）（填推理的依据），\n$DE
    \perp BC$，\n∴ $\angle BDE = \angle CDE = \dfrac{1}{2}\angle BDC$, $\angle ABE
    = \angle BED = 90^\circ$，\n∴ $AB // DE$，\n∴ $\angle ABD = \angle BDE$。\n∴ ________,\n∴
    $\angle ADB = \angle$ ________,\n∴ $\angle ADB = \angle BDE = \dfrac{1}{2}\angle
    BDC$。
