  stem: 下面是“过圆外一点作圆的切线”的作图过程。\n如图①，已知：$\odot O$ 和 $\odot O$ 外一点 $P$。\n求作：过点 $P$ 的
    $\odot O$ 的切线。\n作法：如图②，\n(1) 连接 $OP$；\n(2) 作线段 $OP$ 的中点 $A$, 以 $A$ 为圆心, 以 $AO$
    为半径作 $\odot A$, 与 $\odot O$ 交于两点 $Q$ 和 $R$；\n(3) 作直线 $PQ, PR$。\n直线 $PQ$ 和直线 $PR$
    是 $\odot O$ 的两条切线。\n证明：连接 $OQ, OR$。\n∵ $OP$ 是 $\odot A$ 的直径, 点 $Q$ 在 $\odot A$
    上,\n∴ $\angle OQP =$ ________°。\n∴ $OQ \perp PQ$。\n又∵ 点 $Q$ 在 $\odot O$ 上,\n∴
    直线 $PQ$ 是 $\odot O$ 的切线（________）\n（填推理的依据）。\n同理可证直线 $PR$ 是 $\odot O$ 的切线。
  answer: ''
