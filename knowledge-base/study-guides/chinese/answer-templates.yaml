# ============================================================
# 北京2026中考语文答题模板大全
# 科目: 语文 | 满分: 100分 | 时长: 150分钟 | 闭卷
# ============================================================

subject: 语文
region: 北京
exam_year: 2026
total_score: 100
exam_duration: "150分钟"
exam_format: 闭卷
last_updated: "2026-04-13"

paper_structure:
  - section: 基础·运用
    score: "约15分"
    formats: "选择+填空，含书法鉴赏2-3分"
  - section: 古诗文阅读
    score: "约18分"
    breakdown: "默写4分 + 古诗赏析4-5分 + 文言文阅读9-10分"
  - section: 名著阅读
    score: "约5分"
  - section: 现代文阅读
    score: "约22分"
    breakdown: "议论文/说明文8-10分 + 记叙文/散文12分"
  - section: 写作
    score: "40分"

# ============================================================
# 一、基础·运用（约15分）
# ============================================================

question_types:

  # ----------------------------------------------------------
  # 1.1 字音字形辨析
  # ----------------------------------------------------------
  - type: 基础·运用-字音字形
    typical_score: "2分"
    question_pattern: "下列词语中加点字的读音/书写完全正确的一项是"
    template:
      steps:
        - "第一步：逐项通读，先排除自己确定有错的选项"
        - "第二步：对拿不准的字，回忆课文原文或组词验证"
        - "第三步：注意多音字语境义（如'供不应求'的'供gōng'vs'供品'的'供gòng'）"
        - "第四步：形近字重点看偏旁（如'急躁'vs'干燥'）"
      formula: "排除法 → 回忆课文 → 多音字辨语境 → 形近字看偏旁"
      scoring_notes:
        - "选择题无踩分点，选对即满分"
        - "常考范围：课标附录中的常用字表、课文注释中的生字词"
      good_example:
        question: "下列加点字注音全部正确的一项是"
        answer: "选B。A项'哺育'应读bǔ而非pǔ；C项'粗犷'应读guǎng而非kuàng；D项'殷红'应读yān而非yīn。"
        analysis: "逐项排除，抓住常见易错读音"
      bad_example:
        answer: "选B"
        problem: "没有说明排除理由，考场上容易因粗心选错无法自查"
      common_traps:
        - "多音字：行háng/xíng、间jiān/jiàn、载zǎi/zài"
        - "易错声调：氛fēn围、侮wǔ辱、惩chéng罚"
        - "易错字形：锲而不舍（非'契'）、再接再厉（非'励'）、鸠占鹊巢（非'雀'）"

  # ----------------------------------------------------------
  # 1.2 成语/病句判断
  # ----------------------------------------------------------
  - type: 基础·运用-成语病句
    typical_score: "2分"
    question_pattern: "下列句子中成语使用恰当/没有语病的一项是"
    template:
      steps:
        - "第一步（成语题）：确定成语本义，判断语境是否匹配"
        - "第二步：注意感情色彩（褒贬误用）、使用对象（如'鳞次栉比'只形容建筑）"
        - "第三步（病句题）：缩句找主干，看主谓宾是否搭配"
        - "第四步：检查常见语病类型——成分残缺、搭配不当、语序不当、重复赘余"
      formula: "成语：义→色彩→对象→语境 | 病句：缩主干→查搭配→看语序→找赘余"
      scoring_notes:
        - "成语重点：望文生义、褒贬误用、对象错配"
        - "病句六类：成分残缺、搭配不当、语序不当、重复赘余、表意不明、不合逻辑"
      good_example:
        question: "下列句中加点成语使用恰当的一项是"
        answer: "选A。B项'首当其冲'意为最先受到冲击，不能用于'第一个发言'；C项'不以为然'是不认为对，应改为'不以为意'；D项'巧夺天工'形容人工精巧，不能形容自然景观。"
        analysis: "每项均点明错因，分析清晰"
      bad_example:
        answer: "选A，因为其他选项成语用错了"
        problem: "未具体指出错误原因，缺乏分析过程"

  # ----------------------------------------------------------
  # 1.3 书法鉴赏
  # ----------------------------------------------------------
  - type: 基础·运用-书法鉴赏
    typical_score: "2-3分"
    question_pattern: "判断书体/欣赏书法作品，说说该作品的书法特点"
    template:
      steps:
        - "第一步：判断书体——篆书/隶书/楷书/行书/草书"
        - "第二步：用对应书体的专业术语描述特征"
        - "第三步：从笔画、结构、章法三个角度评价"
      formula: "判断书体 + 专业术语描述特征 + 审美评价"
      scoring_notes:
        - "书体判断1分，特征描述1-2分"
        - "必须使用书法专业术语，不能用日常口语"
      font_identification:
        篆书: "线条匀称圆转，结构对称修长，古朴典雅"
        隶书: "横画蚕头雁尾，字形扁阔宽博，庄重沉稳"
        楷书: "横平竖直，笔画规范，结构端正匀称"
        行书: "笔画连带流畅，收放自如，兼具楷书的规范和草书的灵动"
        草书: "笔势连绵飞动，简省变化多端，气势奔放"
      evaluation_vocabulary:
        笔画: "刚劲有力、圆润流畅、轻重有致、提按分明"
        结构: "疏密得当、重心平稳、收放自如、顾盼生姿"
        章法: "行气贯通、布局匀称、错落有致、浑然一体"
      good_example:
        question: "下面是颜真卿《勤礼碑》局部，请从笔画和结构两方面欣赏"
        answer: "这是楷书作品。笔画上，横细竖粗，撇捺舒展，提按分明，刚劲有力；结构上，字形宽博端庄，外紧内松，重心平稳，体现了颜体雄浑大气的风格特点。"
        analysis: "先判断书体，再分笔画、结构两个角度，使用专业术语"
      bad_example:
        answer: "这个字写得很好看，很工整"
        problem: "缺乏书体判断，没有专业术语，过于笼统"

  # ----------------------------------------------------------
  # 1.4 语段综合（修辞/关联词/语序）
  # ----------------------------------------------------------
  - type: 基础·运用-语段综合
    typical_score: "4-6分"
    question_pattern: "在语段中填写关联词/排列语序/辨识修辞手法及作用"
    template:
      steps:
        - "第一步（关联词）：判断句间逻辑关系——并列/递进/转折/因果/条件/假设"
        - "第二步（语序）：找中心句→按逻辑排列（时间/空间/递进）→检查衔接词"
        - "第三步（修辞）：判断修辞手法→分析表达效果"
      formula: "关联词：判断逻辑→选词填入→通读验证 | 语序：定首尾→找关联→排中间 | 修辞：判手法→析效果"
      scoring_notes:
        - "关联词每空1分，须成对使用（如'虽然…但是'）"
        - "语序排列要关注指示代词（这、那）和关联词（首先、其次）"
        - "修辞分析必须结合具体内容，不能空说套话"
      rhetoric_formulas:
        比喻: "运用比喻，将A比作B，生动形象地写出了……的特点，表达了……的情感"
        拟人: "运用拟人，赋予……以人的动作/情感，生动地表现了……，表达了……"
        排比: "运用排比，句式整齐，节奏感强，增强了语势，强调了……"
        夸张: "运用夸张，突出了……的特点，给读者留下深刻印象"
        反问: "运用反问，加强语气，强调了……，发人深省"
        设问: "运用设问，自问自答，引发读者思考，突出了……"
      good_example:
        question: "请判断画线句使用的修辞手法，并分析其表达效果"
        answer: "画线句运用了比喻的修辞手法，将春雨比作细丝，生动形象地写出了春雨细密轻柔的特点，营造出清新温润的氛围，表达了作者对春天的喜爱之情。"
        analysis: "点明手法→结合内容分析→归纳情感，三步完整"
      bad_example:
        answer: "用了比喻，写得很生动"
        problem: "没有指出本体喻体，没有结合文本内容，缺乏具体分析"

# ============================================================
# 二、古诗文阅读（约18分）
# ============================================================

  # ----------------------------------------------------------
  # 2.1 古诗文默写
  # ----------------------------------------------------------
  - type: 古诗文默写
    typical_score: "4分"
    question_pattern: "直接默写/理解性默写"
    template:
      steps:
        - "第一步：审题——区分直接默写（给上句写下句）和理解性默写（给提示写诗句）"
        - "第二步：准确回忆原文，在脑中默念完整诗句"
        - "第三步：逐字书写，注意易错字（通假字按原文写）"
        - "第四步：写完检查——重点看同音字、形近字是否写对"
      formula: "审题型 → 忆原文 → 逐字写 → 查错字"
      scoring_notes:
        - "每空1分，错一字该空不得分"
        - "添字、漏字、错字均不得分"
        - "通假字必须写原文用字，不能写本字"
      frequently_wrong_characters:
        - "海日生残夜（非'升'）"
        - "长风破浪会有时（非'长风破浪终有时'）"
        - "学而不思则罔（非'网'），思而不学则殆（非'怠'）"
        - "出淤泥而不染（非'污'）"
        - "山重水复疑无路（非'山穷水尽'）"
        - "醉翁之意不在酒（'翁'不要少一点）"
      good_example:
        question: "杜甫《望岳》中表达不畏困难、勇于攀登的诗句是：____，____。"
        answer: "会当凌绝顶，一览众山小。"
        analysis: "理解性默写需准确理解题目提示语，'不畏困难、勇于攀登'对应的是这两句"
      bad_example:
        answer: "会当临绝顶，一览众山小。"
        problem: "'凌'误写为'临'，该空0分"

  # ----------------------------------------------------------
  # 2.2 古诗词赏析
  # ----------------------------------------------------------
  - type: 古诗词赏析
    typical_score: "4-5分"
    question_pattern: "赏析诗句/分析手法/体会情感"
    template:
      steps:
        - "第一步：判断手法——修辞手法（比喻、拟人、夸张）、表现手法（借景抒情、动静结合、虚实相生、对比、用典）、描写手法（白描、细描、视听结合）"
        - "第二步：结合诗句内容具体分析——手法体现在哪些词语/意象上"
        - "第三步：点明情感/主旨——抒发了什么情感或表达了什么志向"
      formula: "手法 + 内容分析 + 情感/主旨"
      scoring_notes:
        - "手法判断1分，内容分析1-2分，情感1-2分"
        - "必须结合具体诗句分析，不能脱离文本空谈"
        - "情感要准确，注意知人论世（结合诗人经历和写作背景）"
      common_techniques:
        借景抒情: "通过描写……景物，营造了……的氛围，抒发了……的情感"
        动静结合: "……是动景，……是静景，动静结合，相互映衬，描绘出……的画面"
        虚实相生: "实写……，虚写（想象/回忆）……，虚实结合，丰富了诗歌意境，表达了……"
        对比: "将……与……对比，突出了……，表达了……"
        用典: "化用……的典故，借以表达……的情感/志向"
        炼字: "……字用得精妙，写出了……的状态/特点，传达出……"
      good_example:
        question: "请赏析'感时花溅泪，恨别鸟惊心'这两句诗"
        answer: "这两句运用了拟人（或'移情于物'）的手法，赋予花、鸟以人的情感。诗人看到盛开的花朵反而落泪，听到鸟鸣反而心惊，以乐景写哀情，反衬出诗人在安史之乱中忧国思家的深沉悲痛。"
        analysis: "先点明手法（拟人/移情），再分析具体内容（花溅泪、鸟惊心），最后归纳情感（忧国思家）"
      bad_example:
        answer: "用了拟人手法，表达了诗人的悲伤"
        problem: "未结合诗句具体内容分析，情感概括过于笼统"

  # ----------------------------------------------------------
  # 2.3 文言文实词/虚词
  # ----------------------------------------------------------
  - type: 文言文-实词虚词
    typical_score: "2-3分"
    question_pattern: "解释加点词的意思/选出加点词意义相同的一项"
    template:
      steps:
        - "第一步：回忆该词在课文中的常见义项"
        - "第二步：将义项代入原文语境，检验是否通顺"
        - "第三步：注意词类活用（名词作动词、形容词作名词等）和古今异义"
        - "第四步：一词多义题需逐项代入验证"
      formula: "忆义项 → 代入验证 → 查活用 → 辨古今异义"
      scoring_notes:
        - "解释词语必须精准到义项，不能笼统解释"
        - "词类活用需说明活用类型"
      key_virtual_words:
        之: "代词(他/它)、助词(的)、动词(到/去)、取消句子独立性、宾语前置标志"
        而: "表并列(和/又)、表递进(而且)、表转折(但是/却)、表修饰(地)、表承接(然后)"
        以: "介词(用/凭借/因为)、连词(来/用来/以致)、动词(认为)"
        其: "代词(他的/它的/那个)、语气词(表反问/表推测/表期望)"
        于: "介词(在/到/从/对于/比)"
      good_example:
        question: "解释'策之不以其道'中'策'的意思"
        answer: "'策'，名词用作动词，意为'用鞭子打（驱赶）'。原义为马鞭（名词），此处活用为动词。"
        analysis: "准确指出词类活用现象，给出本义和活用义"
      bad_example:
        answer: "'策'是策略的意思"
        problem: "脱离语境，错误理解词义"

  # ----------------------------------------------------------
  # 2.4 文言文翻译
  # ----------------------------------------------------------
  - type: 文言文-翻译
    typical_score: "2-3分"
    question_pattern: "翻译画线句子"
    template:
      steps:
        - "第一步：逐字对译——每个实词都要落实，不能跳过"
        - "第二步：调整语序——把倒装句（宾语前置、状语后置、定语后置）调回正常语序"
        - "第三步：补充省略——补出省略的主语、宾语、介词"
        - "第四步：通读检查——是否通顺、是否符合现代汉语习惯"
      formula: "逐字对译 → 调语序 → 补省略 → 通读润色"
      scoring_notes:
        - "关键实词每个0.5-1分（如'走'译为'跑'而非'走'）"
        - "句式特点需体现（如判断句、被动句）"
        - "信达雅三原则：首先求'信'（准确），再求'达'（通顺）"
      translation_principles:
        留: "保留专有名词、年号、地名、人名不翻译"
        换: "将单音节词换为双音节词（如'亡'→'逃跑'）"
        调: "倒装句调回正常语序"
        补: "补出省略成分"
        删: "删去无实义的虚词（如句末语气词）"
      good_example:
        question: "翻译'醉翁之意不在酒，在乎山水之间也'"
        answer: "醉翁的情趣不在于喝酒，而在于欣赏山水之间的美景。'意'译为'情趣'，'乎'译为'于'，补出'欣赏'使句意完整。"
        analysis: "关键词'意''乎'准确翻译，句意完整通顺"
      bad_example:
        answer: "醉翁的意思不在酒，在山水之间"
        problem: "'意'译为'意思'不准确，应为'情趣'；整句过于直译，不够通顺"

  # ----------------------------------------------------------
  # 2.5 文言文内容理解
  # ----------------------------------------------------------
  - type: 文言文-内容理解
    typical_score: "3-4分"
    question_pattern: "概括文章内容/分析人物形象/理解作者观点"
    template:
      steps:
        - "第一步：通读全文，划分层次（按事件发展或论证思路）"
        - "第二步：逐层概括，提炼关键信息"
        - "第三步：结合题目要求，有针对性地组织答案"
        - "第四步：用原文关键词句作为依据"
      formula: "分层概括 + 原文依据 + 针对性作答"
      scoring_notes:
        - "概括要全面，不能遗漏关键信息"
        - "分析必须有原文依据，不能凭空推断"
        - "用自己的话概括，适当引用原文关键词"
      good_example:
        question: "结合选文，说说邹忌是如何劝谏齐王的"
        answer: "邹忌采用类比说理（以小见大）的方式进行劝谏。他先讲述自己与徐公比美的经历，指出妻、妾、客因各自立场不同而没有说实话；然后类比推理，指出齐王身边的人同样因各种原因不会直言进谏，从而'王之蔽甚矣'。这种委婉劝谏的方式让齐王欣然接受。"
        analysis: "先概括劝谏方式（类比），再具体分析过程，最后点明效果"
      bad_example:
        answer: "邹忌用比美的事劝齐王"
        problem: "过于简略，未分析劝谏的逻辑和方式"

# ============================================================
# 三、名著阅读（约5分）
# ============================================================

  # ----------------------------------------------------------
  # 3.1 人物分析
  # ----------------------------------------------------------
  - type: 名著阅读-人物分析
    typical_score: "2-3分"
    question_pattern: "分析某人物的性格特点/结合具体情节分析人物形象"
    template:
      steps:
        - "第一步：回忆该人物的2-3个关键事件"
        - "第二步：从每个事件中提炼性格特征"
        - "第三步：组织答案——事件+性格+评价"
      formula: "在……（事件）中，表现出……（性格特征），可见他是一个……的人"
      scoring_notes:
        - "必须有具体情节支撑，不能空谈性格"
        - "性格特征用四字词语概括更精炼"
        - "至少分析2个方面的性格特点"
      good_example:
        question: "请结合《西游记》中的具体情节，分析孙悟空的性格特点"
        answer: "在'三打白骨精'中，孙悟空不顾师父误解和紧箍咒的惩罚，坚持打杀妖怪，表现出嫉恶如仇、忠心耿耿的性格；在'大闹天宫'中，他反抗天庭的不公封赏，体现了桀骜不驯、追求自由的精神。可见孙悟空是一个勇敢正义、敢于反抗而又忠诚的英雄形象。"
        analysis: "两个情节对应两个性格特点，最后总结人物形象"
      bad_example:
        answer: "孙悟空很勇敢，很厉害，神通广大"
        problem: "没有具体情节支撑，性格分析空泛"

  # ----------------------------------------------------------
  # 3.2 情节概括
  # ----------------------------------------------------------
  - type: 名著阅读-情节概括
    typical_score: "2分"
    question_pattern: "用简洁的语言概括某个情节"
    template:
      steps:
        - "第一步：确定情节涉及的人物和事件"
        - "第二步：按'谁+做了什么+结果如何'的结构组织"
        - "第三步：控制字数，突出关键转折"
      formula: "谁 + 在什么情况下 + 做了什么 + 结果如何"
      scoring_notes:
        - "人物、事件、结果三要素缺一不可"
        - "语言要简洁，一般不超过50字"
        - "不要加入个人评价，只客观叙述"
      good_example:
        question: "请简要概括'武松打虎'的情节"
        answer: "武松在景阳冈酒店连饮十八碗酒后，不顾店家劝阻执意过冈。途中遇到猛虎扑来，他躲闪后用拳头将老虎打死，一举成名。"
        analysis: "包含起因（饮酒过冈）、经过（遇虎搏斗）、结果（打死老虎），简洁完整"
      bad_example:
        answer: "武松把老虎打死了"
        problem: "缺少起因和经过，过于简略"

  # ----------------------------------------------------------
  # 3.3 阅读体会
  # ----------------------------------------------------------
  - type: 名著阅读-阅读体会
    typical_score: "2-3分"
    question_pattern: "谈谈你对某个人物/情节/主题的理解和感悟"
    template:
      steps:
        - "第一步：亮明观点——用一句话概括你的理解"
        - "第二步：引用原著依据——具体情节或人物言行"
        - "第三步：联系个人理解或现实意义，深化认识"
      formula: "观点 + 原著依据 + 个人理解/现实意义"
      scoring_notes:
        - "观点要明确，不能含糊其辞"
        - "原著依据必须准确，不能张冠李戴"
        - "个人理解要有深度，不能泛泛而谈"
      good_example:
        question: "读完《朝花夕拾》中的《藤野先生》，你有怎样的感悟？"
        answer: "我深切感受到藤野先生超越国界的师者风范。他不因鲁迅是中国人而歧视，反而认真为他修改讲义、纠正解剖图，体现了对学术的严谨和对学生的平等关爱。这让我认识到，真正的教育者应当以知识和品德影响学生，不带任何偏见。藤野先生的精神在今天依然值得每一位教育工作者学习。"
        analysis: "先表明感受，再引用具体细节（改讲义、纠正解剖图），最后上升到现实意义"
      bad_example:
        answer: "读完后我觉得藤野先生是个好老师，很令人感动"
        problem: "没有具体依据，感悟过于空泛"

# ============================================================
# 四、现代文阅读（约22分）
# ============================================================

  # ----------------------------------------------------------
  # 4.1 议论文-论点提取
  # ----------------------------------------------------------
  - type: 现代文阅读-议论文-论点提取
    typical_score: "2分"
    question_pattern: "本文的中心论点是什么"
    template:
      steps:
        - "第一步：看标题——标题本身可能就是论点"
        - "第二步：看开头——开篇第一段常提出论点"
        - "第三步：看结尾——结尾段常总结论点"
        - "第四步：若以上都不明显，找反复出现的核心观点句"
      formula: "查标题 → 查首段 → 查尾段 → 找核心句"
      scoring_notes:
        - "论点必须是完整的判断句（有主语有谓语）"
        - "论点≠论题（论题是讨论的话题，论点是明确的主张）"
        - "用原文语句作答最保险"
      good_example:
        question: "请概括本文的中心论点"
        answer: "本文的中心论点是：读书应该做到'眼到、口到、心到'，只有三到齐备才能真正理解书中的道理。（见第一段末句）"
        analysis: "准确找到中心论点句，且为完整判断句"
      bad_example:
        answer: "本文讲的是读书方法"
        problem: "这是论题而非论点，缺少明确的判断和主张"

  # ----------------------------------------------------------
  # 4.2 议论文-论证方法分析
  # ----------------------------------------------------------
  - type: 现代文阅读-议论文-论证方法
    typical_score: "3分"
    question_pattern: "指出论证方法并分析其作用"
    template:
      steps:
        - "第一步：判断论证方法——举例论证、道理论证、对比论证、比喻论证"
        - "第二步：结合文本内容具体分析"
        - "第三步：点明论证了什么观点（所在段落的分论点或中心论点）"
      formula: "运用了……论证方法 + 具体分析 + 有力地论证了……的观点"
      scoring_notes:
        - "论证方法判断1分，具体分析1分，作用1分"
        - "分析必须结合文本具体内容"
        - "最终要落到'论证了什么观点'上"
      method_templates:
        举例论证: "举了……的例子，具体有力地论证了……的观点，使论证更有说服力"
        道理论证: "引用了……的名言/理论，有力地论证了……的观点，使论证更具权威性"
        对比论证: "将……和……进行对比，突出强调了……的观点，使论证更加鲜明"
        比喻论证: "将……比作……，生动形象地论证了……的观点，使深奥的道理浅显易懂"
      good_example:
        question: "第③段运用了什么论证方法？有什么作用？"
        answer: "运用了举例论证的方法。列举了司马迁忍辱负重写成《史记》的事例，具体有力地论证了'逆境能够磨炼人的意志'这一分论点，增强了文章的说服力。"
        analysis: "方法判断准确，结合具体事例分析，明确指出论证的观点"
      bad_example:
        answer: "用了举例论证，论证了中心论点"
        problem: "没有说明举了什么例子，也没有指出具体论证了什么观点"

  # ----------------------------------------------------------
  # 4.3 议论文-补写论据
  # ----------------------------------------------------------
  - type: 现代文阅读-议论文-补写论据
    typical_score: "2分"
    question_pattern: "请为本段观点补充一个事实论据/道理论据"
    template:
      steps:
        - "第一步：明确所在段落的分论点"
        - "第二步（事实论据）：选取众所周知的名人事例，按'人物+事件+结果'组织"
        - "第二步（道理论据）：选取名人名言或经典理论，注明出处"
        - "第三步：检查论据是否能直接支持该段论点"
      formula: "事实论据：人物+事件+结果（与论点一致） | 道理论据：名言+出处+与论点的关联"
      scoring_notes:
        - "论据必须真实准确，不可编造"
        - "论据必须与论点一致，不能偏离"
        - "事实论据要简洁概括，一般2-3句话"
      good_example:
        question: "请为'勤奋是成功的基石'补写一个事实论据"
        answer: "例如，王羲之从小刻苦练习书法，日复一日在池边洗笔，将一池清水染成墨色（'墨池'的典故），最终成为'书圣'。这正说明了勤奋是通向成功的必由之路。"
        analysis: "人物（王羲之）+事件（刻苦练字）+结果（成为书圣），与论点高度吻合"
      bad_example:
        answer: "爱迪生发明灯泡很不容易"
        problem: "过于笼统，缺少具体事件描述，也未与论点显性关联"

  # ----------------------------------------------------------
  # 4.4 说明文-说明方法及作用
  # ----------------------------------------------------------
  - type: 现代文阅读-说明文-说明方法
    typical_score: "2-3分"
    question_pattern: "指出说明方法并分析其作用"
    template:
      steps:
        - "第一步：判断说明方法——举例子、列数字、作比较、打比方、分类别、下定义、作诠释、摹状貌、引资料"
        - "第二步：结合文本具体分析"
        - "第三步：说明了事物的什么特征"
      formula: "运用了……的说明方法 + 具体分析 + 准确/生动地说明了……的特征"
      scoring_notes:
        - "说明方法判断1分，分析作用1-2分"
        - "作用要落实到'说明了什么特征'"
      method_templates:
        举例子: "举了……的例子，具体真实地说明了……的特征，使说明更具体，读者更容易理解"
        列数字: "用……的数字，准确具体地说明了……的特征，使说明更有说服力"
        作比较: "将……和……进行比较，突出说明了……的特征，使读者印象深刻"
        打比方: "将……比作……，生动形象地说明了……的特征，使说明更加生动有趣"
        分类别: "将……分为……几类，条理清楚地说明了……的特征"
        下定义: "用简明科学的语言揭示了……的本质特征，使说明更加准确严密"
      good_example:
        question: "第④段画线句使用了什么说明方法？有何作用？"
        answer: "使用了列数字和作比较的说明方法。用'长约6300公里'的数字准确说明了长江的长度，又将其与黄河对比，突出说明了长江是我国第一长河的特点，使读者对长江的规模有更直观的认识。"
        analysis: "两种方法并列分析，结合具体数据，落实到说明对象的特征"
      bad_example:
        answer: "用了列数字，让读者更清楚"
        problem: "未引用具体数字，也未指出说明的是什么特征"

  # ----------------------------------------------------------
  # 4.5 说明文-语言准确性
  # ----------------------------------------------------------
  - type: 现代文阅读-说明文-语言准确性
    typical_score: "2分"
    question_pattern: "加点词能否删去？为什么？"
    template:
      steps:
        - "第一步：表态——不能删去"
        - "第二步：解释该词的含义/作用"
        - "第三步：分析删去后句意会发生什么变化"
        - "第四步：总结——该词体现了说明文语言的准确性和严密性"
      formula: "不能删 + 词义 + 删后变化 + 体现语言准确性"
      scoring_notes:
        - "几乎所有此类题答案都是'不能删'"
        - "分析要对比删前删后的语义差别"
        - "结尾必须扣'体现说明文语言的准确性'"
      common_words:
        - "约/大约/近：表示估计，说明数据并非绝对精确"
        - "之一：说明不止一个，删去后变成唯一，不符合事实"
        - "主要：说明是最重要的原因但非唯一原因"
        - "大多数/一般：表示普遍情况，不排除特殊例外"
        - "目前/迄今为止：限定时间范围，不排除将来的变化"
      good_example:
        question: "'我国是世界上最早发明纸的国家之一'中'之一'能否删去？"
        answer: "不能删去。'之一'表示我国是最早发明纸的国家中的一个，说明还有其他国家也较早使用了纸。如果删去'之一'，就变成我国是唯一最早发明纸的国家，与事实不符，过于绝对。'之一'体现了说明文语言的准确性和严密性。"
        analysis: "四步完整：表态→词义→删后变化→体现准确性"
      bad_example:
        answer: "不能删，删了意思就变了"
        problem: "没有解释词义和删后的具体变化，分析不充分"

  # ----------------------------------------------------------
  # 4.6 记叙文/散文-赏析句子
  # ----------------------------------------------------------
  - type: 现代文阅读-记叙文-赏析句子
    typical_score: "3-4分"
    question_pattern: "请从修辞/描写/词语运用等角度赏析画线句"
    template:
      steps:
        - "第一步：确定赏析角度——修辞手法 / 描写手法 / 词语运用"
        - "第二步：点明具体手法（如比喻、拟人；动作描写、心理描写；叠词、动词等）"
        - "第三步：结合句子内容具体分析手法的运用"
        - "第四步：概括表达效果——写出了什么 + 表达了什么情感"
      formula: "手法 + 内容分析 + 表达效果（内容+情感）"
      scoring_notes:
        - "角度判断1分，内容分析1-2分，效果1分"
        - "修辞角度最常考，其次是描写角度"
        - "表达效果必须落实到人物情感或文章主题"
      angle_templates:
        修辞手法: "运用了……修辞手法，将/把……（内容），生动形象地写出了……（特点），表达了……（情感）"
        描写手法: "运用了……描写（动作/神态/心理/环境/细节），刻画了……（形象/场景），表现了……（情感/性格）"
        词语运用: "……（词语）一词，原指……，这里指……，生动/准确地写出了……，表达了……"
      good_example:
        question: "请从修辞角度赏析'那声音仿佛是朵朵浪花，涌到我的心间'"
        answer: "运用了比喻的修辞手法，将声音比作朵朵浪花，化听觉为视觉和触觉（通感），生动形象地写出了声音给'我'带来的强烈感动和心灵震撼，表达了'我'内心深处被触动后的温暖与感动之情。"
        analysis: "点明手法（比喻/通感）→分析内容（声音比作浪花）→归纳效果（感动、温暖）"
      bad_example:
        answer: "用了比喻，写得很生动形象"
        problem: "未分析本体喻体，未结合内容，效果过于笼统"

  # ----------------------------------------------------------
  # 4.7 记叙文/散文-段落作用
  # ----------------------------------------------------------
  - type: 现代文阅读-记叙文-段落作用
    typical_score: "2-3分"
    question_pattern: "分析某段在文中的作用"
    template:
      steps:
        - "第一步：确定段落位置——开头/中间/结尾"
        - "第二步：从内容和结构两方面分析"
        - "第三步：套用对应位置的模板"
      formula: "内容上 + 结构上"
      scoring_notes:
        - "必须从内容和结构两个方面回答"
        - "每个方面1-2分"
      position_templates:
        开头段:
          内容: "开篇写……，交代了……（背景/起因），奠定了……的感情基调"
          结构: "开篇点题/设置悬念，引起读者阅读兴趣；引出下文对……的叙述/描写；为下文……做铺垫"
        中间段:
          内容: "写了……，表现了……（人物特点/情感变化）"
          结构: "承上启下——承接上文……，引出下文……；推动情节发展"
        结尾段:
          内容: "写了……，深化了文章……的主题，表达了……的情感"
          结构: "总结全文/首尾呼应/点明主旨/戛然而止留下回味/卒章显志"
      good_example:
        question: "文章开头段描写暴风雨的场景有什么作用？"
        answer: "内容上，描写了暴风雨来临前的压抑场景，渲染了紧张沉闷的气氛，奠定了全文沉重的感情基调。结构上，为下文父亲冒雨送伞的情节做了铺垫，同时以恶劣天气衬托父爱的伟大，引起读者的阅读兴趣。"
        analysis: "内容和结构两方面都分析，结合具体文本内容"
      bad_example:
        answer: "为下文做铺垫"
        problem: "只说了结构作用，缺少内容分析；'为下文做铺垫'太笼统，没说为什么做铺垫"

  # ----------------------------------------------------------
  # 4.8 记叙文/散文-人物形象
  # ----------------------------------------------------------
  - type: 现代文阅读-记叙文-人物形象
    typical_score: "3分"
    question_pattern: "分析文中某人物的形象/性格特点"
    template:
      steps:
        - "第一步：梳理人物在文中的主要言行事件"
        - "第二步：从每个事件/细节中提炼性格特征"
        - "第三步：用'事件→特征'的格式逐条列举"
        - "第四步：最后用一句话总结人物整体形象"
      formula: "从……（事件/细节）中，可以看出他……（性格特征）"
      scoring_notes:
        - "至少分析2-3个方面的性格特征"
        - "每个特征都要有文本依据"
        - "性格特征用形容词概括，如'勤劳朴实、善良无私、坚强乐观'"
      good_example:
        question: "请分析文中母亲的人物形象"
        answer: "从母亲每天天不亮就起来做饭、下地干活可以看出她勤劳能干；从她省吃俭用把好的留给孩子可以看出她无私奉献、充满母爱；从她面对困难时从不抱怨、总是微笑以对可以看出她坚强乐观。母亲是一个勤劳朴实、无私奉献、坚强乐观的伟大女性形象。"
        analysis: "三个方面，每个都有事件支撑，最后一句总结"
      bad_example:
        answer: "母亲是个好人，很伟大"
        problem: "没有具体事件支撑，性格分析笼统空泛"

  # ----------------------------------------------------------
  # 4.9 记叙文/散文-标题含义
  # ----------------------------------------------------------
  - type: 现代文阅读-记叙文-标题含义
    typical_score: "2-3分"
    question_pattern: "分析标题的含义/谈谈你对标题的理解"
    template:
      steps:
        - "第一步：分析表层含义——标题字面意思，指代什么具体事物"
        - "第二步：分析深层含义——象征意义 / 暗示的主题 / 比喻义"
        - "第三步：分析标题的作用——线索/悬念/点明主题/一语双关"
      formula: "表层含义（字面义） + 深层含义（象征义/主题义） + 标题作用"
      scoring_notes:
        - "表层和深层各1分，作用1分"
        - "深层含义要联系全文主题"
        - "常见的标题作用：作为线索贯穿全文、设置悬念、揭示主题、一语双关"
      good_example:
        question: "文章以'那盏灯'为题有什么含义？"
        answer: "表层含义：指文中父亲在深夜为'我'留的那盏灯。深层含义：'那盏灯'象征父亲深沉温暖的爱，在'我'人生迷茫时给予的指引和力量。标题作用：'那盏灯'是全文的线索，贯穿始终；同时一语双关，由实到虚，深化了父爱如灯的主题。"
        analysis: "表层（实物灯）→深层（父爱的象征）→作用（线索+点题），层次分明"
      bad_example:
        answer: "标题写了一盏灯，与文章有关"
        problem: "只有表层含义，缺少深层分析和作用分析"

  # ----------------------------------------------------------
  # 4.10 记叙文/散文-主题理解
  # ----------------------------------------------------------
  - type: 现代文阅读-记叙文-主题理解
    typical_score: "3-4分"
    question_pattern: "概括文章主题/谈谈你对文章主旨的理解"
    template:
      steps:
        - "第一步：概括文章主要内容——写了什么事/什么人"
        - "第二步：分析作者的情感态度——赞美/批判/怀念/反思"
        - "第三步：提炼主题——由浅入深，从个人层面到社会层面"
        - "第四步：用完整的语句表达主题"
      formula: "文章通过记叙/描写……，表现了/赞美了/揭示了……，表达了作者……的情感/思考"
      scoring_notes:
        - "主题概括要完整，不能只说一半"
        - "如果有多层主题，要由浅入深分层表达"
        - "关注文章结尾的议论抒情句，常直接点明主题"
      good_example:
        question: "请概括本文的主题"
        answer: "文章通过记叙'我'回忆童年时与祖母在老屋共度时光的往事，描写了祖母的慈爱与勤劳，表现了祖孙之间深厚的亲情。同时借老屋的破旧衰败，表达了对逝去时光的追忆和对传统生活方式消逝的感伤，引发读者对亲情与故乡的珍视。"
        analysis: "先概括内容，再分层揭示主题：亲情→怀旧→对生活方式消逝的思考"
      bad_example:
        answer: "本文写了祖母的故事，表达了对祖母的想念"
        problem: "过于简略，只有表层情感，缺乏深层主题挖掘"

# ============================================================
# 五、写作（40分）
# ============================================================

  # ----------------------------------------------------------
  # 5.1 审题模板
  # ----------------------------------------------------------
  - type: 写作-审题
    typical_score: "审题是拿高分的前提"
    question_pattern: "命题作文/半命题作文/材料作文"
    template:
      steps:
        - "第一步：圈关键词——划出题目中的核心词和限定词"
        - "第二步：确定体裁——记叙文为主（北京中考95%考记叙文）"
        - "第三步：确定写作范围——时间、人物、事件的限定"
        - "第四步：选择素材——从自身经历中选取最有真情实感的材料"
        - "第五步：确定立意——从素材中提炼出深层主题"
      formula: "圈关键词 → 定体裁 → 明范围 → 选素材 → 立意"
      scoring_notes:
        - "审题失误是作文最大失分项，跑题直接降到三类文以下"
        - "关键词要抓全，如'那一刻，我长大了'的关键词是'那一刻'（时间点）和'长大'（主题）"
        - "半命题作文补题时选自己最擅长写的词"
      topic_analysis_examples:
        - topic: "那一刻，我长大了"
          keywords: "'那一刻'限定一个具体时间节点；'我'限定第一人称；'长大'不是生理成长，是心智成熟"
          pitfall: "不能写成长篇流水账，必须聚焦一个瞬间"
        - topic: "____让我如此美丽"
          keywords: "'如此美丽'不一定是外表，更应是精神层面的美；需要补出让自己美丽的事物"
          pitfall: "补题避免太大太空（如'生活''世界'），宜小而具体（如'那本书''奶奶的手'）"
      good_example:
        question: "以'走在____的路上'为题写一篇作文"
        answer: "审题分析：补题为'走在成长的路上'。'走'暗示过程，'路'可实可虚——实路（上学路/回家路）引向虚路（成长之路）。应选取成长中有触动的具体事件，通过叙事展现成长感悟。立意可以是'成长需要勇气''成长中学会了感恩'等。"
        analysis: "从关键词到选材到立意，审题步骤完整"
      bad_example:
        answer: "写走路的故事就行了"
        problem: "理解过于字面化，没有分析深层含义"

  # ----------------------------------------------------------
  # 5.2 作文结构
  # ----------------------------------------------------------
  - type: 写作-结构
    typical_score: "结构影响全文得分档次"
    template:
      steps:
        - "第一步：构思框架——采用'凤头、猪肚、豹尾'结构"
        - "第二步：凤头（开头）——简洁入题，吸引阅卷老师（3-5行）"
        - "第三步：猪肚（主体）——详写核心事件，善用描写（占全文60-70%）"
        - "第四步：豹尾（结尾）——点题升华，干净利落（3-5行）"
        - "第五步：检查——首尾呼应、段落匀称、详略得当"
      formula: "凤头（精彩开头） + 猪肚（充实主体） + 豹尾（有力结尾）"
      structure_template:
        第一段: "开头——场景切入或点题（3-5行）"
        第二段: "背景交代/事件起因（3-5行）"
        第三段: "事件经过——略写铺垫部分（5-8行）"
        第四段: "事件高潮——详写核心场景，大量运用描写（10-15行，全文最长段）"
        第五段: "事件结果/我的感受（3-5行）"
        第六段: "结尾——升华主题，呼应开头（3-5行）"
      scoring_notes:
        - "全文600-800字，6-8段为宜"
        - "详略得当：核心事件详写，其余略写"
        - "段落不宜过长，每段最多15行"
        - "避免'三段式'（开头+中间一大段+结尾），阅卷体验极差"

  # ----------------------------------------------------------
  # 5.3 开头模板
  # ----------------------------------------------------------
  - type: 写作-开头
    typical_score: "好的开头影响阅卷第一印象"
    template:
      approaches:
        - name: 场景式开头
          description: "用一个画面感强的场景直接切入"
          formula: "环境描写/动作定格 + 引出事件"
          example: "冬日的阳光透过窗户洒在书桌上，我翻开那本泛黄的相册，目光停在一张照片上——照片中，奶奶正笑盈盈地看着年幼的我，她围裙上还沾着面粉。"
          advantage: "画面感强，阅卷老师容易被带入情境"
        - name: 引用式开头
          description: "引用名言、诗句或歌词，引出主题"
          formula: "引用名句 + 联系主题 + 引出事件"
          example: "'谁言寸草心，报得三春晖。'每当读到孟郊的这句诗，我便想起母亲在昏黄灯光下为我缝补衣服的身影。"
          advantage: "展示文学积累，提升文章文化品位"
        - name: 设问式开头
          description: "用问句开篇，引发思考"
          formula: "提出疑问 + 简要回应 + 引出正文"
          example: "什么是真正的勇气？是面对危险时的无所畏惧，还是明知困难重重却依然选择前行？那年夏天的一次经历，让我找到了答案。"
          advantage: "设置悬念，激发阅读兴趣"
      scoring_notes:
        - "开头不超过5行，不要啰嗦"
        - "必须与正文内容和结尾呼应"
        - "避免大段引用名言或抄题目导语"
      bad_openings:
        - type: "大而空"
          example: "在人生的道路上，有许多值得回忆的事情……"
          problem: "空洞无物，缺乏吸引力"
        - type: "抄导语"
          example: "看到这个题目，我想到了很多……"
          problem: "暴露缺乏构思，阅卷老师印象差"

  # ----------------------------------------------------------
  # 5.4 结尾模板
  # ----------------------------------------------------------
  - type: 写作-结尾
    typical_score: "好的结尾决定作文的最终印象"
    template:
      approaches:
        - name: 升华式结尾
          description: "从事件上升到人生感悟或哲理"
          formula: "回顾事件 + 提炼感悟 + 上升主题"
          example: "那一刻，我终于明白，所谓成长，不是身高的增加，而是学会在跌倒后擦干眼泪重新站起来。那个雨天，我长大了。"
          advantage: "深化主题，提升立意高度"
        - name: 呼应式结尾
          description: "回扣开头场景或关键意象，形成闭环"
          formula: "重现开头意象 + 赋予新的理解"
          example: "我合上相册，阳光依旧温暖地洒在桌面上。可我知道，那些有奶奶的日子，比任何阳光都要温暖得多。"
          advantage: "结构完整，首尾圆合，阅卷老师最喜欢"
        - name: 留白式结尾
          description: "以一个画面或动作结束，留下回味空间"
          formula: "定格画面/动作 + 戛然而止"
          example: "我转过身，大步走进了考场。身后，父亲的目光穿过人群，一如既往地温暖而坚定。"
          advantage: "含蓄蕴藉，给读者想象空间"
      scoring_notes:
        - "结尾不超过5行"
        - "必须点题——出现标题中的关键词"
        - "避免喊口号（'我一定要好好学习'）"
        - "避免画蛇添足，该收就收"
      bad_endings:
        - type: "口号式"
          example: "这件事告诉我们，只要努力就能成功！让我们一起加油吧！"
          problem: "空喊口号，缺乏真情实感"
        - type: "总结式"
          example: "这就是我最难忘的一件事，它让我受益匪浅"
          problem: "生硬刻板，缺乏文采"

  # ----------------------------------------------------------
  # 5.5 评分标准拆解
  # ----------------------------------------------------------
  - type: 写作-评分标准
    typical_score: "40分"
    template:
      grading_tiers:
        一类文:
          score_range: "36-40分"
          criteria:
            - "立意深刻新颖，有独到见解"
            - "选材典型真实，有真情实感"
            - "结构严谨完整，详略得当"
            - "语言流畅生动，有文采（善用修辞、描写细腻）"
            - "书写工整规范，卷面整洁"
          key_difference: "有真情实感+语言有文采+立意有深度"
        二类文:
          score_range: "30-35分"
          criteria:
            - "立意正确，较为明确"
            - "选材恰当，内容较充实"
            - "结构完整，条理清楚"
            - "语言通顺，偶有亮点"
            - "书写较工整"
          key_difference: "规规矩矩但缺乏亮点，语言平淡"
        三类文:
          score_range: "24-29分"
          criteria:
            - "立意基本正确但不够突出"
            - "选材一般，内容单薄"
            - "结构基本完整但不够紧凑"
            - "语言基本通顺，有少量语病"
            - "书写较潦草"
          key_difference: "流水账、记叙平淡、缺乏描写"
        不及格:
          score_range: "24分以下"
          criteria:
            - "跑题或偏题严重"
            - "内容空洞或抄袭"
            - "结构混乱"
            - "语病较多"
            - "字数严重不足（不足400字）"
      scoring_notes:
        - "一类文和二类文的核心区别：有没有打动阅卷老师的细节描写"
        - "卷面分虽然只有2-3分，但整洁的卷面会让阅卷老师整体印象加分"
        - "字数要求600-800字，不足600字每少50字扣1分"

  # ----------------------------------------------------------
  # 5.6 避坑指南
  # ----------------------------------------------------------
  - type: 写作-避坑指南
    typical_score: "避免常见失分陷阱"
    template:
      common_pitfalls:
        - name: 跑题
          symptoms:
            - "写着写着偏离了题目关键词"
            - "素材与主题关联不紧密"
            - "半命题作文补题后发现不好写，勉强凑"
          prevention:
            - "每写两段回头看一次题目"
            - "开头和结尾必须出现标题关键词"
            - "选素材时先想好如何扣题"
          formula: "写前审题3分钟 + 每段扣题 + 首尾点题"
        - name: 流水账
          symptoms:
            - "事无巨细全部交代，没有详略"
            - "只有叙述没有描写"
            - "从头到尾平铺直叙，没有波澜"
          prevention:
            - "核心场景用描写（动作、语言、心理、环境），至少10行"
            - "非核心部分一句话带过"
            - "加入适当的情节波折（误会、转折、对比）"
          formula: "略写铺垫 + 详写高潮 + 描写代替叙述"
        - name: 空喊口号
          symptoms:
            - "大量使用'我们要……''我们应该……'"
            - "结尾堆砌排比但缺乏真实感受"
            - "引用大段名人名言充字数"
          prevention:
            - "用具体画面代替抽象说教"
            - "写自己真实看到的、感受到的"
            - "少用'应该''必须'，多用'我看到''我感受到'"
          formula: "用画面说话 + 以小见大 + 真情实感"
      scoring_notes:
        - "跑题：直接降到三类文以下（24分以下）"
        - "流水账：最高二类文下（30-32分）"
        - "口号式：缺乏真情实感，一般二类文中下（30-33分）"
      good_example:
        description: "用细节描写代替空洞叙述的对比"
        bad_version: "妈妈很辛苦，每天都为我操劳，我很感动"
        good_version: "灶台前，妈妈弓着背，额前的碎发被蒸汽打湿，贴在脸上。她用袖子擦了擦汗，转头看见我，笑了一下：'饿了吧？马上就好。'那一刻，灯光把她的影子拉得很长很长。"
        analysis: "好的版本有动作（弓着背、擦汗、转头）、神态（笑了一下）、语言（饿了吧？）、环境（灯光/影子），画面感十足，读者自然被打动"

# ============================================================
# 附录：高频考点速查表
# ============================================================

appendix:
  exam_time_allocation:
    基础运用: "15-20分钟"
    古诗文阅读: "20-25分钟"
    名著阅读: "5-8分钟"
    现代文阅读: "30-35分钟"
    写作: "50-60分钟（含审题构思10分钟）"
    检查: "5-10分钟"

  answer_length_guide:
    选择题: "不需要写过程"
    简答题2分: "2-3句话，40-60字"
    简答题3分: "3-4句话，60-100字"
    简答题4分: "4-5句话，80-120字"
    赏析题: "先手法后分析后效果，80-120字"
    写作: "600-800字"

  universal_answer_framework:
    是什么: "判断/定义（如：这是比喻的修辞手法）"
    为什么: "分析/解释（如：将A比作B，写出了……）"
    怎么样: "效果/评价（如：表达了作者……的情感）"
