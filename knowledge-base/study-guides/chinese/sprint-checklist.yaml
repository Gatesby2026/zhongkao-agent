# ============================================================
# 北京2026中考语文 · 考前冲刺清单（考前14天）
# 科目: 语文 | 满分: 100分 | 时长: 150分钟 | 闭卷
# ============================================================

subject: 语文
region: 北京
exam_year: 2026
total_score: 100
exam_duration: "150分钟"
last_updated: "2026-04-13"
timing: 考前14天
principle: "默写背诵不能停，阅读模板要熟练，作文素材要备好"

paper_structure:
  - section: 基础·运用
    score: "约15分"
    note: "含书法鉴赏2-3分"
  - section: 古诗文阅读
    score: "约18分"
    breakdown: "默写4分 + 古诗赏析4-5分 + 文言文阅读9-10分"
  - section: 名著阅读
    score: "约5分"
  - section: 现代文阅读
    score: "约22分"
    breakdown: "议论文/说明文8-10分 + 记叙文12分"
  - section: 写作
    score: "40分"

# ============================================================
# 一、必拿分项目（基本盘约65分）
# ============================================================

must_score_items:
  - id: MS-01
    item: "基础·运用-字音字形（2分）"
    action: "每天复习10个易错字词，出声朗读+默写"
    common_trap: "多音字在具体语境中的读音，如'供不应求'的'供'读gōng"
    target: "2分全拿"

  - id: MS-02
    item: "古诗文默写（4分）"
    action: "每天默写5首必背篇目，逐字检查易错字"
    common_trap: "'雎'写成'睢'、'窈窕'笔画出错、'逑'写成'求'、'燕'写成'雁'"
    target: "4分全拿"

  - id: MS-03
    item: "书法鉴赏（2-3分）"
    action: "熟记楷隶行草篆五种字体特征，背诵常考书法家及代表作"
    common_trap: "混淆行书与草书，忽略题目要求的'结合具体笔画分析'"
    target: "2分"

  - id: MS-04
    item: "病句修改/语言运用（3-4分）"
    action: "每天做5道病句辨析题，归纳六大病句类型"
    common_trap: "搭配不当和语序不当是高频考点，注意'不仅…而且'的递进关系"
    target: "3分"

  - id: MS-05
    item: "古诗赏析-内容理解（2分）"
    action: "梳理24首必考古诗词的主旨、意象、情感"
    common_trap: "把诗人情感答得太笼统，缺少结合诗句的具体分析"
    target: "2分"

  - id: MS-06
    item: "文言文-实词翻译（2-3分）"
    action: "回归课内16篇文言文，重点标注120个常考实词"
    common_trap: "古今异义词，如'走'(跑)、'去'(离开)、'汤'(热水)"
    target: "2分"

  - id: MS-07
    item: "文言文-句子翻译（3-4分）"
    action: "练习直译为主、意译为辅，关键字词必须落实"
    common_trap: "漏译省略成分，如主语省略、介词省略"
    target: "3分"

  - id: MS-08
    item: "名著阅读-基础识记（2-3分）"
    action: "复习9部必考名著的人物、情节、主题，每部整理5个核心考点"
    common_trap: "张冠李戴，如把林冲的情节安到武松身上"
    target: "2分"

  - id: MS-09
    item: "写作-基本分（30分）"
    action: "保证审题准确、结构完整、字迹工整、字数达标（600字以上）"
    common_trap: "偏题跑题、字数不足、没有结尾、书写潦草"
    target: "30分"

  - id: MS-10
    item: "现代文阅读-信息提取（3-4分）"
    action: "练习快速定位关键信息，用原文语句组织答案"
    common_trap: "答非所问，没有回扣题目关键词"
    target: "3分"

# ============================================================
# 二、拔高项目（65→80分）
# ============================================================

stretch_score_items:
  - id: ST-01
    item: "古诗赏析-手法分析（2-3分）"
    action: "熟练掌握8大常考手法：借景抒情、托物言志、对比、用典等"
    template: "手法+诗句分析+情感效果，三步缺一不可"
    target: "额外拿2分"

  - id: ST-02
    item: "文言文-内容理解与评价（3-4分）"
    action: "练习文言文主观题，注意结合文本+联系现实"
    template: "观点+原文依据+现实联系"
    target: "额外拿2-3分"

  - id: ST-03
    item: "议论文/说明文阅读（8-10分）"
    action: "背熟论证方法和说明方法的答题模板"
    template: "使用了XX方法+具体内容+作用效果"
    target: "额外拿3-4分"

  - id: ST-04
    item: "记叙文阅读-赏析题（4-5分）"
    action: "练习从修辞、描写、词语运用三个角度赏析句子"
    template: "角度+具体分析+表达效果（人物情感/主题深化）"
    target: "额外拿3分"

  - id: ST-05
    item: "名著阅读-理解分析（2-3分）"
    action: "准备名著人物评价和主题分析的答题框架"
    template: "人物+具体情节+性格特点/主题意义"
    target: "额外拿2分"

  - id: ST-06
    item: "写作-内容充实（5分）"
    action: "准备3类万能素材，练习细节描写"
    template: "开头引人+中间有细节+结尾有升华"
    target: "额外拿5分"

# ============================================================
# 三、冲刺项目（80→90+分）
# ============================================================

top_score_items:
  - id: TP-01
    item: "古诗赏析-深层理解"
    action: "对比阅读训练，分析同一意象在不同诗中的含义差异"
    difficulty: "需要积累和悟性"
    tip: "答题时展现对诗歌深层情感的理解，超越表面释义"

  - id: TP-02
    item: "记叙文阅读-主旨探究"
    action: "练习从多个维度解读文章主旨，形成个人见解"
    difficulty: "开放题，言之有理即可得分"
    tip: "结合社会现实或自身体验，答出深度"

  - id: TP-03
    item: "写作-立意出彩（5分）"
    action: "练习从小切口写大主题，以小见大"
    difficulty: "需要平时积累和思维训练"
    tip: "避免空洞说教，用具体场景传达真情实感"

  - id: TP-04
    item: "基础·运用-综合实践题（3-4分）"
    action: "练习语境写话、图表转文字、活动方案设计"
    difficulty: "题型灵活，不好套模板"
    tip: "看清题目要求的字数和格式，注意逻辑连贯"

  - id: TP-05
    item: "写作-语言表达（5分）"
    action: "积累好词好句，练习修辞运用和句式变化"
    difficulty: "短期提升有限但可以靠背"
    tip: "准备5个精彩句子片段，考场灵活嵌入"

# ============================================================
# 四、容易丢分的陷阱
# ============================================================

easy_to_lose:
  - trap: "默写会背但写错字"
    lost_score: "1-2分"
    solution: "默写后逐字对照原文检查，重点关注形近字"
    high_risk_words:
      - "'雎鸠'的'雎'（不是'睢'）"
      - "'窈窕'的笔画（女字旁）"
      - "'长河落日圆'不要写成'园'"
      - "'悠然见南山'的'见'不要写成'现'"

  - trap: "阅读理解答题不规范"
    lost_score: "2-4分"
    solution: "严格按照'方法+分析+效果'三步走答题"
    common_mistakes:
      - "只写手法名称不结合原文分析"
      - "赏析题没有写表达效果"
      - "概括段意太笼统或太具体"

  - trap: "文言文翻译漏关键词"
    lost_score: "1-2分"
    solution: "翻译时用笔在原文圈出得分关键词，逐一落实"
    common_mistakes:
      - "省略主语未补出"
      - "古今异义词按现代意思翻译"
      - "虚词'之''而'处理不当"

  - trap: "作文审题偏差"
    lost_score: "5-10分"
    solution: "花3分钟审题，圈出题目关键词，确定写作方向后再动笔"
    common_mistakes:
      - "半命题作文补题太大或太偏"
      - "材料作文没有紧扣材料核心"
      - "写到一半发现跑题，慌张涂改"

  - trap: "时间分配失控"
    lost_score: "3-8分"
    solution: "严格按照时间分配表答题，阅读题不要纠结太久"
    common_mistakes:
      - "在一道阅读题上花15分钟以上"
      - "作文时间不足50分钟导致虎头蛇尾"
      - "没有留检查时间"

  - trap: "名著题张冠李戴"
    lost_score: "2-3分"
    solution: "考前一周每天过一部名著的核心情节线"
    common_mistakes:
      - "人物和情节对应错误"
      - "记混不同名著中相似情节"
      - "只记大概不记细节"

# ============================================================
# 五、作文专项准备（40分，占比最大）
# ============================================================

writing_prep:
  素材库:
    - category: 成长类
      usable_for: [自我认知, 挫折成长, 突破自我]
      prepared_material: "准备2个万能素材：一段亲身经历（如第一次独立完成某事）+ 一个名人事例（如苏轼被贬后的豁达）"
    - category: 亲情类
      usable_for: [亲情感悟, 理解父母, 家庭温暖]
      prepared_material: "准备2个细节场景：一个日常小事中的感动 + 一次冲突后的和解"
    - category: 社会观察类
      usable_for: [责任担当, 传统文化, 城市记忆]
      prepared_material: "准备1个北京本地素材（胡同/老字号/节日习俗）+ 1个时代变化素材"
    - category: 自然感悟类
      usable_for: [生命启示, 哲理思考, 审美体验]
      prepared_material: "准备1个四季景物描写片段 + 1个由景入情的感悟"

  开头模板:
    - type: 场景式
      example: "以一个生动的场景画面开头，迅速带入情境"
      tip: "用环境描写或动作描写切入，不要超过3行"
    - type: 引用式
      example: "引用一句诗词或名言，自然过渡到主题"
      tip: "引用要贴切，不要为引用而引用"
    - type: 设问式
      example: "以一个问题开头，引发读者思考"
      tip: "问题要与主题紧密相关，文末呼应作答"

  结尾模板:
    - type: 升华式
      example: "从个人经历上升到人生感悟或社会意义"
      tip: "升华要自然，不要突然拔高"
    - type: 呼应式
      example: "回扣开头的场景或意象，形成首尾圆合"
      tip: "最稳妥的结尾方式，阅卷老师印象好"
    - type: 留白式
      example: "以一个未完的动作或画面收束，余味悠长"
      tip: "适合散文化的题目，不适合议论性题目"

  审题checklist:
    - "圈出题目中的关键词（限定词+核心词）"
    - "确定写作对象：写谁？写什么事？"
    - "确定情感基调：积极/感悟/反思？"
    - "确定文体：记叙文为主还是夹叙夹议？"
    - "想好中心事件和至少2个细节点"
    - "半命题作文：补题要小而具体，如'那一刻，我懂了____'"
    - "检查：我的立意是否积极向上？是否能体现真情实感？"

# ============================================================
# 六、14天每日计划
# ============================================================

daily_plan:
  week_1:
    focus: "默写巩固 + 阅读答题模板 + 作文素材整理"
    daily_tasks:
      - "Day1: 默写5首+整理议论文说明文模板+列3类作文素材提纲"
      - "Day2: 默写5首+做1篇议论文真题+写成长类素材片段300字"
      - "Day3: 默写5首+做1篇说明文真题+写亲情类素材片段300字"
      - "Day4: 默写5首+整理记叙文赏析模板+练3种作文开头"
      - "Day5: 默写5首(滚动复习)+做1篇记叙文真题+练3种作文结尾"
      - "Day6: 文言文16篇核心实词复习+文言文真题+限时作文1篇(60min)"
      - "Day7: 错题回顾重做+默写24首自测+整理名著9部核心考点"

  week_2:
    focus: "套卷模拟 + 作文限时练 + 查漏补缺"
    daily_tasks:
      - "Day8: 全真模拟卷1套(150min计时)+逐题分析丢分原因"
      - "Day9: 默写纠错篇目+补强薄弱题型+限时作文1篇(55min)"
      - "Day10: 全真模拟卷1套(重点关注时间分配)"
      - "Day11: 默写滚动查漏+手写复习全部答题模板+修改润色2篇作文"
      - "Day12: 最后一套全真模拟卷+对照分析记录进步点"
      - "Day13: 上午默写收尾/下午翻阅作文素材/晚上速览名著"
      - "Day14(考前): 浏览错题本和模板(不做新题)+检查考试用品+早睡"

# ============================================================
# 七、考场时间分配（总计150分钟）
# ============================================================

time_allocation:
  基础运用:
    time: "15分钟"
    strategy: "选择题快速完成，书法题注意审题"
  古诗文:
    time: "20分钟"
    strategy: "默写快写快检查，赏析题和文言文按模板答"
  名著阅读:
    time: "8分钟"
    strategy: "识记题秒答，分析题简明扼要"
  现代文阅读:
    time: "35分钟"
    strategy: "先通读全文再看题，答题紧扣原文"
  写作:
    time: "60分钟"
    breakdown: "审题构思5分钟 + 写作50分钟 + 通读检查5分钟"
    strategy: "构思阶段确定好中心和结构，写的时候不要大段涂改"
  检查:
    time: "12分钟"
    strategy: "重点检查默写错字、选择题涂卡、作文字数和错别字"

# ============================================================
# 八、考试当天提醒
# ============================================================

exam_day_tips:
  - "带齐考试用品：黑色签字笔（至少2支）、2B铅笔、橡皮、直尺"
  - "带准考证和身份证，提前30分钟到考场"
  - "早餐正常吃，不要吃太饱或太油腻"
  - "拿到试卷先通览一遍，了解整体题量和难度"
  - "按顺序做题，遇到不会的先跳过做标记"
  - "字迹工整，分点作答，序号清晰"
  - "答案写在指定区域内，修改用单线划掉"
  - "遇到难题深呼吸——难题大家都难"
  - "作文写不出来时回忆准备的素材，从具体场景切入"
  - "最后10分钟不要改作文大结构，只检查错别字"
  - "默写题一定要检查一遍再往下走，这4分最不该丢"
  - "作文千万不要少于600字，宁可多写不要少写"
  - "交卷前确认姓名和准考证号已填写"
