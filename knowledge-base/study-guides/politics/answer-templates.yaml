# ============================================================
# 第一部分：开卷考翻书策略（道法独有，极其重要）
# ============================================================
open_book_strategy:
  principle: "开卷≠抄书，翻书是为了找准确表述，不是现场学新知识"
  core_rule: "脑子里有框架，书里找原话"

  book_prep:
    - step: 考前便签标记法
      detail: |
        每本教材贴10-15个彩色便签，按主题分色标记：
        - 红色：法律类（宪法、权利义务、法治）
        - 蓝色：政治类（民主制度、人大、政协）
        - 绿色：经济/生态类（新发展理念、双碳）
        - 黄色：文化类（文化自信、传统文化、社会主义核心价值观）
        - 橙色：个人成长类（挫折、自律、责任）
      scoring_notes: 标签上写关键词，不要写大段文字，目的是快速定位
      good_example: "便签写'P45-公民基本权利'，一翻就到"
      bad_example: "便签上密密麻麻抄了半页笔记，考场上根本看不清"

    - step: 目录索引熟记
      detail: |
        记住核心考点对应的课次和页码范围：
        - 七上：成长的节拍、友谊、生命
        - 七下：青春、情绪、法律
        - 八上：社会生活、网络、权利义务
        - 八下：宪法、公民权利、国家机构
        - 九上：富强、民主、文明、和谐
        - 九下：世界舞台、和平发展
      scoring_notes: 不需要背页码，但要知道"宪法在八下""创新在九上"这种级别的定位

    - step: 高频考点速查表
      detail: |
        在教材空白处用铅笔标注该页涉及的高频设问方向：
        如"为什么要依法治国→P32""怎样做负责任的公民→P78"
      scoring_notes: 这相当于给自己建了一个考场专用索引

  翻书原则:
    - rule: 先答后翻
      detail: 先用自己的知识写出答案框架，不确定时再翻书确认教材原话
      scoring_notes: 阅卷老师看到教材原话表述会给更高分
    - rule: 翻书只为确认表述
      detail: 翻书是为了把"大概意思"替换成"教材准确表述"，不是现场找答案
      scoring_notes: 如果一个知识点你完全没印象，翻书也很难在短时间内找到
    - rule: 30秒原则
      detail: 每次翻书不超过30秒，超时立刻放下书继续答题
      scoring_notes: 翻书时间不能超过答题时间，否则做不完
    - rule: 标记待查
      detail: 遇到不确定的先写上大致答案并做标记，最后有时间再翻书修正
      scoring_notes: 保证做完全卷比某一题完美更重要

  time_management:
    选择题: "25分钟（平均每题1分钟，含翻书确认时间）"
    材料分析题: "60分钟（平均每题10分钟：2分钟读题+6分钟答题+2分钟翻书确认）"
    检查: "5分钟（重点检查选择题有无涂错、分析题有无漏答）"

  time_traps:
    - trap: 一道选择题翻书超过2分钟
      solution: 先凭直觉选一个，做个标记，最后回来检查
    - trap: 材料分析题逐字逐句抄书
      solution: 只抄关键术语和核心表述，用自己的话串联
    - trap: 在不熟悉的知识点上反复翻书
      solution: 写一个大方向不错的答案，拿部分分，继续做下一题

# ============================================================
# 第二部分：选择题答题模板（40分）
# ============================================================
question_types:
  - type: 选择题
    total_score: 40
    count: 20
    score_each: 2
    time_limit: 25分钟

    strategies:
      - name: 政治正确原则
        steps:
          - 读完四个选项，先排除明显消极、悲观、违背主旋律的选项
          - 如果某选项否定党的领导、否定社会主义制度、否定改革开放，直接排除
          - 涉及国家主权、领土完整的表述必须用"坚决""不可侵犯"等绝对化表述
        formula: "选项基调积极向上 + 符合社会主义核心价值观 = 大概率正确"
        scoring_notes: 道法是政治学科，政治立场不能错
        good_example: "题目问'面对网络谣言我们应该'→选'依法举报，不信谣不传谣'"
        bad_example: "选了'网络信息太多管不了，不用理会'→消极立场，必错"

      - name: 绝对化词语识别
        steps:
          - 看到"一定""完全""只要…就…""所有""任何时候都"等词语时高度警惕
          - 道法选择题中绝对化表述通常是错误选项
          - 但注意例外：涉及宪法地位、国家主权等确实用绝对化表述的情况
        formula: "绝对化表述 + 非原则性问题 = 大概率错误"
        scoring_notes: |
          注意区分：
          - "公民都有受教育的权利和义务"→正确（宪法原文）
          - "只要努力就一定能成功"→错误（过于绝对）
        good_example: "看到'所有法律的制定都必须以宪法为依据'→正确，这是宪法地位的准确表述"
        bad_example: "看到'只要有法律就能解决一切社会问题'→绝对化错误，但误选了"

      - name: 关键词匹配法
        steps:
          - 圈出题干中的关键词
          - 将关键词对应到教材知识模块
          - 在选项中找与该模块最匹配的表述
        formula: "题干关键词 → 定位知识模块 → 匹配最准确选项"
        scoring_notes: |
          常见关键词对应：
          - "根本制度"→社会主义制度
          - "根本政治制度"→人民代表大会制度
          - "基本国策"→对外开放、计划生育、节约资源保护环境
          - "基本方略"→依法治国
          - "发展战略"→科教兴国、人才强国、创新驱动发展
        good_example: "题干出现'根本政治制度'→立刻定位到人民代表大会制度"
        bad_example: "把'根本制度'和'根本政治制度'混为一谈"

      - name: 混淆项辨析
        steps:
          - 识别选项中容易混淆的概念对
          - 回忆或翻书确认两个概念的区别
          - 对照题干要求选择准确的那个
        formula: "找出混淆点 → 明确区别 → 精准匹配题干"
        scoring_notes: |
          高频混淆概念：
          - 权利 vs 义务（权利可以放弃，义务必须履行）
          - 民主 vs 法治（民主是制度，法治是方式）
          - 国策 vs 战略（基本国策和发展战略的区分）
          - 人大 vs 政协（权力机关 vs 参政议政）
          - 主要矛盾 vs 基本国情（发展不平衡不充分 vs 社会主义初级阶段）
        good_example: "题目问'建言献策'→选政协（参政议政职能），而非人大"
        bad_example: "把政协的参政议政和人大的立法权搞混"

      - name: 时政题应对
        steps:
          - 注意题目中提到的具体年份和事件
          - 将时政事件与教材知识点关联
          - 注意选项中对时政事件的概括是否准确
        formula: "准确识别时政事件 + 对接教材考点 = 正确答案"
        scoring_notes: 时政题通常考的是教材知识在现实中的应用，不会考纯时事记忆
        good_example: "题目给出'嫦娥六号'新闻→对接'科技创新''科教兴国战略'"
        bad_example: "只关注新闻本身，没有联系教材知识模块"

  # ============================================================
  # 第三部分：材料分析题——原因/意义类
  # ============================================================
  - type: 材料分析题-原因意义类
    description: "问'为什么''有什么意义''有什么作用'"
    frequency: 每年必考
    avg_score: 6-8分

    steps:
      - 审题：明确问的是"原因"还是"意义"（原因偏向前因，意义偏向后果/影响）
      - 找教材依据：翻书找到对应知识点的准确表述
      - 多角度展开：从个人、社会、国家三个层面思考
      - 联系材料：每个知识点后面加一句对材料的分析
      - 分点作答：用①②③编号，通常答3-4个点

    formula: |
      答题公式：
      ①教材知识点1 + 材料中的具体信息分析
      ②教材知识点2 + 材料中的具体信息分析
      ③教材知识点3 + 材料中的具体信息分析
      【注意】每个点 = 教材原话 + 材料联系，缺一不可

    万能句式:
      - "有利于……"
      - "促进了……"
      - "体现了……"
      - "是……的必然要求"
      - "是……的重要举措"
      - "有助于……"

    角度展开:
      个人层面: "有利于提高公民素质/保障公民权利/促进个人全面发展"
      社会层面: "有利于维护社会公平正义/促进社会和谐稳定/营造良好社会风尚"
      国家层面: "有利于推进法治建设/促进国家富强/实现中华民族伟大复兴"

    scoring_notes: |
      评分标准通常是：
      - 知识点正确且准确使用教材术语：2分/点
      - 有联系材料分析：1分/点
      - 只写教材知识不联系材料：扣一半分
      - 角度重复只算一个点
    good_example: |
      问：我国大力推进科技创新有什么意义？
      答：①科技创新是引领发展的第一动力。大力推进科技创新，
      有利于提高我国自主创新能力，实现科技自立自强。（国家层面）
      ②创新是推动人类社会向前发展的重要力量。推进科技创新，
      有利于推动经济高质量发展，培育新质生产力。（经济层面）
      ③科教兴国战略要求把科技摆在优先发展的位置。推进科技创新，
      有利于建设创新型国家，增强综合国力。（战略层面）
    bad_example: |
      答：科技创新很重要。国家要发展就要搞科技。
      科技好了经济就好了。我们要努力学习科学知识。
      →问题：没有教材术语，没有分点，没有联系具体材料，
      表述口语化，阅卷老师找不到给分点。

  # ============================================================
  # 第四部分：材料分析题——做法/建议类
  # ============================================================
  - type: 材料分析题-做法建议类
    description: "问'怎么做''有什么建议''应该如何'"
    frequency: 每年必考
    avg_score: 6-8分

    steps:
      - 审题：明确问的是谁的做法（国家/社会/个人/青少年）
      - 主体分析：如果没有指定主体，默认从多主体角度回答
      - 翻书找措施：找到对应章节中"怎么做"的相关表述
      - 措施要具体：不能空喊口号，要有可操作性
      - 分点作答：每个主体1-2条措施

    formula: |
      主体分析法答题公式：
      ①国家/政府：加强立法/完善制度/加大投入/严格执法……
      ②社会：营造氛围/加强监督/完善服务……
      ③学校：加强教育/开展活动/完善管理……
      ④家庭：言传身教/关心引导/创造环境……
      ⑤个人/青少年：提高意识/积极行动/依法维权/努力学习……

    主体措施模板:
      国家:
        - "完善相关法律法规，为……提供法律保障"
        - "加大财政投入，支持……事业发展"
        - "加强执法力度，严厉打击……行为"
        - "深化改革，完善……制度体系"
      社会:
        - "营造良好的社会氛围，弘扬……"
        - "发挥舆论监督作用，曝光……行为"
        - "社会组织积极参与，提供……服务"
      学校:
        - "加强……教育，提高学生……意识"
        - "开展……主题活动，引导学生……"
        - "完善校规校纪，规范……"
      家庭:
        - "家长以身作则，为孩子树立……的榜样"
        - "关注孩子成长，及时沟通引导"
        - "营造良好家风，培养孩子……品质"
      青少年:
        - "树立……意识，增强……观念"
        - "努力学习科学文化知识，提高自身素质"
        - "积极参加……实践活动"
        - "遇到……时，依法维护自身合法权益"

    scoring_notes: |
      评分要点：
      - 主体明确：每条措施要明确是谁做的
      - 措施具体：不能只写"要重视""要加强"
      - 角度多元：如果题目没有限定主体，至少写3个主体
      - 联系材料：措施要针对材料中的具体问题
    good_example: |
      问：为保护未成年人健康成长，请提出建议。
      答：①国家应完善未成年人保护法律体系，加大对侵害
      未成年人权益行为的惩处力度，为未成年人成长提供法律保障。
      ②学校应加强法治教育和心理健康教育，开展自我保护
      主题班会，提高学生的安全防范意识和自我保护能力。
      ③家长应履行监护职责，关注孩子身心健康，营造温馨
      和睦的家庭环境，及时发现并解决孩子遇到的问题。
      ④青少年自身应增强自我保护意识，学会用法律武器
      维护自身合法权益，遇到侵害时及时向老师、家长或有关部门求助。
    bad_example: |
      答：国家要管好，学校要教好，家长要看好，自己要学好。
      →问题：过于笼统，没有具体措施，没有教材术语，
      阅卷老师无法给分。

  # ============================================================
  # 第五部分：材料分析题——辨析/评析类
  # ============================================================
  - type: 材料分析题-辨析评析类
    description: "给出一个观点，问'你怎么看''请评析'"
    frequency: 常考
    avg_score: 6-8分

    steps:
      - 审题：判断观点是正确、错误还是片面的
      - 表态：先明确表达自己的判断
      - 分析正确部分：如果有合理之处，先肯定并说明理由
      - 分析错误部分：指出问题所在并说明理由
      - 总结：给出完整正确的观点
      - 翻书确认：用教材原话支撑你的分析

    formula: |
      辨析题标准结构：
      第一步-表态：这种观点是片面的/正确的/错误的。
      第二步-析对：该观点认为……，这是正确的，因为……（教材依据）
      第三步-析错：但该观点忽视了……/认为……是错误的，因为……（教材依据）
      第四步-总结：因此，我们既要……也要……/正确的做法应该是……

    常见辨析题型:
      - type: 片面型（最常考）
        example_statement: "有法可依就能实现法治"
        answer_structure: |
          片面。①有法可依是实现法治的前提，这是正确的。
          ②但法治还需要有法必依、执法必严、违法必究，
          需要全面推进科学立法、严格执法、公正司法、全民守法。
          ③因此，仅有法可依不足以实现法治，需要多方面共同推进。
      - type: 绝对型
        example_statement: "受教育只是公民的权利"
        answer_structure: |
          错误。①受教育是公民的一项基本权利，这是正确的。
          ②但受教育同时也是公民的一项基本义务。
          ③我国宪法规定公民有受教育的权利和义务，二者统一。
      - type: 混淆型
        example_statement: "遵纪守法就是有道德"
        answer_structure: |
          片面。①遵纪守法是有道德的基本要求，法律是最低限度的道德。
          ②但道德的要求高于法律，有道德不仅要遵纪守法，
          还要追求更高的道德境界，如助人为乐、见义勇为等。
          ③因此，遵纪守法是有道德的必要条件但不是充分条件。

    scoring_notes: |
      评分要点：
      - 表态准确（1分）：判断正确/错误/片面要准确
      - 分析有理有据（3-4分）：引用教材知识，逻辑清晰
      - 总结到位（1-2分）：给出完整正确的观点
      - 最忌讳：只说"对"或"错"没有分析过程
    good_example: |
      观点："网络是把双刃剑，所以青少年不应该上网。"
      答：这种观点是片面的。
      ①网络确实是把双刃剑，这是正确的。网络在给我们带来
      便利的同时，也存在信息安全、沉迷网络等问题。
      ②但因此就认为青少年不应该上网是错误的。网络是我们
      学习和生活的重要工具，合理使用网络有利于开阔视野、
      获取信息、促进学习。
      ③正确的做法是学会理性参与网络生活，提高媒介素养，
      增强自我保护意识，做到合理利用网络而非完全远离网络。
    bad_example: |
      答：我觉得这个说法不太对，上网也有好处的。
      →问题：没有明确表态，没有分层分析，没有教材术语，
      没有总结正确观点。

  # ============================================================
  # 第六部分：材料分析题——认识/启示类
  # ============================================================
  - type: 材料分析题-认识启示类
    description: "问'你有什么认识''得到什么启示''谈谈感想'"
    frequency: 常考
    avg_score: 6-8分

    steps:
      - 审题：明确是"认识"还是"启示"（认识偏理论，启示偏行动）
      - 是什么：材料反映了什么问题/现象
      - 为什么：为什么会这样/为什么这很重要
      - 怎么做：我们应该怎么做/作为中学生我应该怎么做
      - 落脚点：最后一定要回到"作为中学生"的角度

    formula: |
      认识/启示类答题公式：
      ①是什么：材料反映了……（概括材料核心内容）
      ②为什么：这说明了……/这体现了……（联系教材知识分析）
      ③怎么做：这启示我们应该……（提出做法）
      ④落脚点：作为中学生，我要……（回到自身角度）

    万能句式:
      是什么层面:
        - "材料反映了……的现象/问题"
        - "材料体现了……"
        - "材料表明……"
      为什么层面:
        - "这说明……在……中具有重要作用"
        - "这体现了……的重要性"
        - "这是因为……"
      怎么做层面:
        - "这启示我们要……"
        - "我们应该……"
        - "这要求我们……"
      中学生落脚:
        - "作为中学生，我要树立……意识"
        - "作为中学生，我要努力学习……"
        - "作为中学生，我要积极参与……"
        - "作为中学生，我要从身边小事做起……"

    scoring_notes: |
      评分要点：
      - "是什么"概括准确（1-2分）
      - "为什么"有教材知识支撑（2-3分）
      - "怎么做"具体可行（1-2分）
      - 有中学生落脚点（1分）
      - 三个层次缺一不可，缺少任何一层都会丢分
    good_example: |
      材料：某社区开展垃圾分类志愿活动，居民参与度不断提高。
      问：请谈谈你的认识。
      答：①材料反映了我国公民积极参与社会公共事务、
      践行生态文明理念的良好现象。
      ②这体现了建设美丽中国需要每个人的参与。保护环境
      是我国的基本国策，绿色发展理念要求我们坚持人与
      自然和谐共生，走绿色低碳的发展道路。
      ③这启示我们要增强环保意识，积极参与环保行动，
      为建设美丽中国贡献力量。
      ④作为中学生，我要从身边小事做起，坚持垃圾分类，
      绿色出行，节约资源，并积极参加环保志愿活动，
      用实际行动践行绿色发展理念。
    bad_example: |
      答：垃圾分类很好，大家都应该参与。我以后也要分类。
      →问题：没有"是什么"的概括，没有教材知识，
      没有层次感，得分极低。

  # ============================================================
  # 第七部分：时政热点题
  # ============================================================
  - type: 时政热点题
    description: "以近期时政新闻为背景的综合性题目"
    frequency: 选择题和材料分析题中都会出现
    avg_score: 不固定

    热点方向_2025_2026:
      - topic: 高质量发展与新质生产力
        对接教材: "创新驱动发展战略、科教兴国、经济高质量发展"
        常见设问: "发展新质生产力有什么意义/我国应如何推动高质量发展"
      - topic: 全过程人民民主
        对接教材: "人民当家作主、人民代表大会制度、社会主义民主政治"
        常见设问: "为什么说人民民主是全过程的/如何保障人民当家作主"
      - topic: 法治中国建设
        对接教材: "全面依法治国、宪法权威、法治与德治"
        常见设问: "为什么要坚持全面依法治国/法治与德治的关系"
      - topic: 文化自信与中华优秀传统文化
        对接教材: "中华文化、文化自信、社会主义核心价值观"
        常见设问: "如何增强文化自信/如何传承中华优秀传统文化"
      - topic: 科技自立自强
        对接教材: "创新精神、科技强国、自主创新"
        常见设问: "为什么要实现科技自立自强/我国科技成就体现了什么"
      - topic: 生态文明与双碳目标
        对接教材: "绿色发展、可持续发展、人与自然和谐共生"
        常见设问: "为什么要推进生态文明建设/如何实现碳达峰碳中和"
      - topic: 乡村振兴与共同富裕
        对接教材: "共享发展理念、社会公平、城乡协调发展"
        常见设问: "乡村振兴有什么意义/如何实现共同富裕"

    steps:
      - 识别热点：明确材料涉及哪个热点方向
      - 对接教材：将热点与教材知识模块关联
      - 多角度分析：从是什么、为什么、怎么做多角度思考
      - 翻书确认：找到对应章节确认教材表述

    formula: |
      时政热点答题公式：
      ①识别热点属于哪个教材知识模块
      ②用教材知识解读热点（"这体现了……""这说明了……"）
      ③根据设问类型套用对应的答题模板
      ④结合材料中的具体信息进行分析

    scoring_notes: |
      时政热点题的核心是"透过热点考教材"，阅卷老师看的
      不是你对新闻了解多少，而是你能否用教材知识分析时政。
      - 不要大段复述新闻内容
      - 重点在于教材知识与时政的对接
      - 开卷考试中可以翻书找到相关教材表述
    good_example: |
      材料涉及"新质生产力"→
      答：①材料体现了我国坚持创新驱动发展战略，加快发展
      新质生产力，推动经济高质量发展。
      ②创新是引领发展的第一动力，发展新质生产力有利于
      增强我国自主创新能力，实现科技自立自强，提升国际竞争力。
      ③这要求我们深入实施科教兴国战略和人才强国战略，
      加大科研投入，培养创新人才，推动科技成果转化。
    bad_example: |
      答：新质生产力就是新的生产力，是习主席提出的。
      →问题：没有教材知识对接，只是复述概念名称。

# ============================================================
# 第八部分：答题通用规范
# ============================================================
answer_format_rules:
  - rule: 字迹工整
    detail: |
      开卷考试不代表可以潦草。阅卷老师批量阅卷，
      字迹清楚可以获得更好的印象分。建议使用0.5mm黑色签字笔。
    scoring_notes: 字迹潦草会影响阅卷老师识别给分点，间接丢分

  - rule: 分点标号
    detail: |
      所有主观题必须用①②③或（1）（2）（3）分点作答。
      每个序号后面对应一个完整的给分点。
      不要把所有内容写成一大段。
    scoring_notes: 分点清晰方便阅卷老师找给分点，不分点可能漏判

  - rule: 术语准确
    detail: |
      开卷考试最大的优势就是可以翻书确认教材原话。
      答题时必须使用教材中的规范表述，不能用大白话替代。
      例如："依法治国"不能写成"用法律管理国家"。
    scoring_notes: 教材术语是给分关键词，阅卷老师按关键词给分

  - rule: 材料联系
    detail: |
      不能只写教材知识不联系材料。正确做法是：
      教材知识 + "材料中……"/"题目中……" + 具体分析
      每个要点都要与材料建立联系。
    scoring_notes: 只写教材知识不联系材料，通常只能得一半分

  - rule: 审题圈画
    detail: |
      拿到试卷先通读一遍，然后用笔圈出：
      - 设问中的关键限定词（"原因""意义""做法""启示"）
      - 设问中的主体限定（"国家""青少年""公民"）
      - 材料中的关键信息
    scoring_notes: 审题不清是丢分第一大原因

  - rule: 答题量控制
    detail: |
      - 6分题：答3个要点，每点2行左右
      - 8分题：答4个要点，每点2行左右
      - 不要贪多：写太多反而浪费时间，答不到点上也没有分
      - 宁可精准答3点，不要泛泛写6点
    scoring_notes: 答题点数 ≈ 分值÷2，这是估计要答几个点的经验法则

# ============================================================
# 第九部分：考前翻书演练计划
# ============================================================
pre_exam_drill:
  description: "考前一周每天练习翻书速度"
  schedule:
    - day: 考前7天
      task: "整理所有教材便签，检查标记是否完整"
    - day: 考前6天
      task: "练习翻书速查-法律类知识点（宪法、权利义务、法治）"
    - day: 考前5天
      task: "练习翻书速查-政治制度类（人大、政协、民主）"
    - day: 考前4天
      task: "练习翻书速查-经济发展类（新发展理念、高质量发展）"
    - day: 考前3天
      task: "练习翻书速查-文化生态类（文化自信、绿色发展）"
    - day: 考前2天
      task: "做一套完整模拟卷，严格计时90分钟，练习翻书节奏"
    - day: 考前1天
      task: "只看便签和目录索引，不翻具体内容，强化定位记忆"

  翻书速度标准:
    目标: "任意一个核心考点，30秒内翻到对应页面"
    方法: "让家长随机报考点名称，自己计时翻书定位"
    达标: "10个考点平均翻书时间在25秒以内即为达标"
