question_types:

  # ============================================================
  # 一、选择题（8题×2分＝16分）
  # ============================================================
  - type: 选择题
    score: "16分（8题×2分）"
    time_budget: "16分钟（每题约2分钟）"
    techniques:
      - name: 排除法
        when: 不确定正确答案但能排除明显错误项
        steps:
          - "通读四个选项，先排除与已知条件矛盾的选项"
          - "利用特殊值或极端情况排除不合理选项"
          - "剩余选项逐一验证，选出正确答案"
        example:
          question: "若a<0，则下列各式一定成立的是：A. a²>0  B. 2a>0  C. -a<0  D. a³>0"
          good_answer: "a<0，则2a<0排除B，-a>0排除C，a³<0排除D，故选A"
          bad_answer: "直接猜A（缺少推理过程，虽选择题不写过程但思维要清晰）"

      - name: 特值法
        when: 题目含字母参数或条件宽泛时
        steps:
          - "选取满足条件的特殊值（如0、1、-1等）"
          - "将特殊值代入各选项逐一验证"
          - "注意：特值法只能排除错误项，不能完全证明正确"
        example:
          question: "若|a|=|b|，则下列一定成立的是：A. a=b  B. a²=b²  C. a=-b  D. a+b=0"
          good_answer: "取a=1,b=-1，排除A；取a=1,b=1，排除C和D；B恒成立，选B"

      - name: 图形验证法
        when: 涉及函数图像、几何图形的判断题
        steps:
          - "根据题意快速画出草图"
          - "在图上标注关键信息（交点、对称轴等）"
          - "借助图形直观判断选项正误"

      - name: 逆推法
        when: 由结论反推条件更容易时
        steps:
          - "假设某个选项正确"
          - "从该选项出发反推，看是否与题目条件一致"
          - "若矛盾则排除，若一致则为答案"

    common_traps:
      - trap: "绝对值去括号忘记讨论正负"
        how_to_avoid: "看到|x|先想分类：x≥0和x<0"
      - trap: "二次根式忘记被开方数≥0"
        how_to_avoid: "遇到√(expr)立刻写出expr≥0"
      - trap: "函数图像平移方向搞反（左加右减）"
        how_to_avoid: "口诀：括号里加左减右，括号外加上减下"

  # ============================================================
  # 二、填空题（5题×2分＝10分）
  # ============================================================
  - type: 填空题
    score: "10分（5题×2分）"
    time_budget: "10分钟（每题约2分钟）"
    techniques:
      - name: 特值法
        when: 含参数的一般性结论
        steps:
          - "选取最简特殊值代入计算"
          - "验证答案合理性"
          - "注意单位和精度要求"

      - name: 画图辅助
        when: 几何或函数相关填空
        steps:
          - "根据题意画出准确图形"
          - "标注已知量和未知量"
          - "利用图形关系列方程求解"

      - name: 规律探究（列举前几项）
        when: 数列规律、图形变化规律题
        steps:
          - "依次写出前4-5项或前4-5个图形的数据"
          - "观察相邻项之间的关系（差、比、递推等）"
          - "归纳通项公式并验证"
        example:
          question: "观察规律：1, 3, 7, 15, 31, …，第n个数为____"
          good_answer: "各项依次为2¹-1, 2²-1, 2³-1, 2⁴-1, 2⁵-1，故第n个数为2ⁿ-1"
          bad_answer: "63（只写了下一项，没写通项公式）"

    common_traps:
      - trap: "结果未化简到最简形式"
        how_to_avoid: "分式要约分、根式要化简、多项式要合并同类项"
      - trap: "几何填空漏掉多解情况"
        how_to_avoid: "想一想图形是否有多种位置关系"
      - trap: "单位丢失"
        how_to_avoid: "题目问长度写cm/m，问面积写cm²/m²"

  # ============================================================
  # 三、解答题（Q14-Q28，共74分）
  # ============================================================

  # --- Q14-Q16 为基础解答题(各5分)，此处从Q17开始给出详细模板 ---

  - type: "解答题-实数混合运算(Q17)"
    question_number: 17
    score: 5分
    time_budget: 5分钟
    template:
      steps:
        - "审题：识别运算类型（绝对值、零指数幂、负整数指数幂、三角函数值）"
        - "化简各项：|a|→具体值，a⁰→1，a⁻ⁿ→1/aⁿ，三角函数→具体值"
        - "按运算顺序（先乘除后加减）逐步计算"
        - "写出最终结果并检查"
      format_requirements:
        - "每一步变换单独一行，用等号连接"
        - "绝对值、指数、三角函数要先单独化简再代入"
        - "中间过程不能跳步，尤其是符号变化要写清楚"
      scoring_notes:
        - "每个子项化简正确各1分"
        - "最终计算正确1分"
        - "跳步但结果正确可能扣1-2分"
    example:
      question: "计算：|−3| + (π−3)⁰ − 2⁻¹ + tan45°"
      good_answer: |
        原式 = 3 + 1 − 1/2 + 1
             = 4 − 1/2 + 1
             = 4.5
             = 9/2
      bad_answer: |
        = 3 + 1 − 2 + 1 = 3
        （错误：2⁻¹=1/2而非2）

  - type: "解答题-方程组/不等式组(Q18)"
    question_number: 18
    score: 5分
    time_budget: 6分钟
    template:
      steps:
        - "方程组：编号①②→加减消元或代入消元→解出一个未知数→回代求另一个→写解集"
        - "不等式组：分别解各不等式→画数轴→取交集→写解集"
      format_requirements:
        - "方程组要给每个方程编号①②"
        - "消元过程要写明'①−②得'或'将①代入②得'"
        - "最终用大括号写出解：x=_, y=_"
        - "不等式组要画数轴标注，写出'解集为…'"
      scoring_notes:
        - "消元过程正确2分"
        - "求解正确2分"
        - "解集书写规范1分"
        - "不等式组漏画数轴不扣分但不规范"
    example:
      question: "解方程组：2x+y=5 ①，x−y=1 ②"
      good_answer: |
        ①+②得：3x = 6
        ∴ x = 2
        将x=2代入②得：2−y = 1，∴ y = 1
        ∴ 方程组的解为 x=2, y=1
      bad_answer: |
        x=2, y=1
        （缺少解题过程，无法得分）

  - type: "解答题-统计与概率(Q19)"
    question_number: 19
    score: 5分
    time_budget: 6分钟
    template:
      steps:
        - "统计部分：读取图表数据→补全统计图/计算统计量（平均数、中位数、众数、方差）"
        - "概率部分：判断等可能事件→用列举法或树状图列出所有等可能结果→计算P=m/n"
      format_requirements:
        - "补全统计图要标数据"
        - "树状图要画完整，不能缺少分支"
        - "列举法用表格呈现，行列标清楚"
        - "概率结果用分数表示"
      scoring_notes:
        - "统计量计算各1分"
        - "列举法/树状图完整2分"
        - "概率计算正确1分"
        - "树状图缺分支即使结果对也扣分"
    example:
      question: "袋中有2个红球1个白球，随机取2个，求取到2个红球的概率"
      good_answer: |
        设红球为红₁、红₂，白球为白。
        列举所有等可能结果：(红₁,红₂)(红₁,白)(红₂,白)
        共3种等可能结果，取到2个红球有1种。
        ∴ P(2个红球) = 1/3

  - type: "解答题-几何证明基础(Q20)"
    question_number: 20
    score: 5分
    time_budget: 6分钟
    template:
      steps:
        - "读题画图：标注已知条件到图形上"
        - "分析目标：要证什么（平行、全等、相等等）"
        - "选择定理：平行→同位角/内错角/同旁内角；全等→SSS/SAS/ASA/AAS/HL"
        - "用∵…∴…格式书写证明"
      format_requirements:
        - "必须使用'∵…∴…'格式"
        - "每一步推理都要注明依据（定理或已知条件）"
        - "全等证明要写出对应顶点顺序正确的△ABC≅△DEF"
        - "结论单独成行，用∴引导"
      scoring_notes:
        - "条件罗列正确1分"
        - "定理引用正确1分"
        - "推理链完整2分"
        - "结论正确1分"
        - "全等三角形顶点顺序写错扣1分"
    example:
      good_answer: |
        ∵ AB∥CD（已知）
        ∴ ∠ABE = ∠DCE（两直线平行，内错角相等）
        ∵ BE = CE（已知）
        ∠AEB = ∠DEC（对顶角相等）
        ∴ △ABE ≅ △DCE（ASA）
        ∴ AB = DC
      bad_answer: |
        因为平行所以全等所以相等。
        （缺少具体条件和定理引用）

  - type: "解答题-尺规作图/图形变换(Q21)"
    question_number: 21
    score: 5分
    time_budget: 6分钟
    template:
      steps:
        - "读题明确作图任务（作线段、角、垂线、平行线、旋转、平移等）"
        - "写出作法（分步骤，用'以…为圆心，以…为半径画弧'等标准语言）"
        - "保留所有作图痕迹（弧线不能擦掉）"
        - "标注结果图形并写结论"
      format_requirements:
        - "必须保留作图痕迹（圆弧线）"
        - "作法要分步骤写"
        - "图形变换（旋转/平移/对称）要标注关键点的对应点"
        - "旋转要标旋转中心和角度"
      scoring_notes:
        - "作法正确3分"
        - "作图痕迹保留1分"
        - "结果正确1分"
        - "没有痕迹即使结果正确也扣分"

  - type: "解答题-一次/反比例函数应用(Q22)"
    question_number: 22
    score: 5分
    time_budget: 7分钟
    template:
      steps:
        - "读题→设未知数，建立函数模型（y=kx+b或y=k/x）"
        - "利用已知条件列方程求参数"
        - "写出函数解析式"
        - "利用解析式解决实际问题（求值、求范围等）"
        - "检验结果的实际意义（自变量取值范围）"
      format_requirements:
        - "设函数解析式时要写'设y=kx+b(k≠0)'"
        - "代入求解过程要完整"
        - "最终要回答实际问题，用文字作答"
        - "注意自变量的取值范围"
      scoring_notes:
        - "建模正确1分"
        - "求解析式正确2分"
        - "应用解析式解题1分"
        - "回答完整1分"
    example:
      question: "某出租车起步价13元(3km内)，超过3km每km加2.3元，求路程x(km)与费用y(元)的关系"
      good_answer: |
        当x>3时，设y=kx+b
        由题意得：y = 13 + 2.3(x−3) = 2.3x + 6.1
        ∴ y = 2.3x + 6.1 (x>3)

  - type: "解答题-四边形综合证明(Q23)"
    question_number: 23
    score: 5分
    time_budget: 7分钟
    template:
      steps:
        - "在图上标注所有已知条件"
        - "明确证明目标（平行四边形/矩形/菱形/正方形）"
        - "选择证明路径："
        - "  平行四边形→两组对边平行/两组对边相等/一组对边平行且相等/对角线互相平分"
        - "  矩形→平行四边形+一个直角/对角线相等"
        - "  菱形→平行四边形+邻边相等/对角线互相垂直"
        - "  正方形→矩形+菱形"
        - "按∵∴格式逐步证明"
      format_requirements:
        - "先证明是平行四边形，再证明特殊四边形"
        - "辅助线要在图上画出并说明"
        - "每步推理写明依据"
      scoring_notes:
        - "证明路径正确选择1分"
        - "中间推理正确3分"
        - "结论正确1分"
        - "路径选择不当导致过程繁琐不扣分但浪费时间"

  - type: "解答题-数据分析实际问题(Q24)"
    question_number: 24
    score: 5分
    time_budget: 7分钟
    template:
      steps:
        - "读题：理解实际背景，明确已知数据和所求"
        - "建模：将实际问题转化为数学问题（方程/不等式/函数）"
        - "计算：规范解题"
        - "回答：用文字回答实际问题，注意单位"
      format_requirements:
        - "解设要完整：'设…为x（单位）'"
        - "列方程/不等式要写明依据"
        - "结果要带单位"
        - "最后一句话回答问题"
      scoring_notes:
        - "设未知数1分"
        - "列式正确2分"
        - "计算正确1分"
        - "回答问题1分（必须用文字回答，不能只写数字）"

  # ============================================================
  # 以下为压轴题（Q25-Q28，分值较高）
  # ============================================================

  - type: "解答题-圆综合(Q25)"
    question_number: 25
    score: 6分
    time_budget: 8分钟
    template:
      steps:
        - "识别圆中关键元素：圆心、半径、弦、切线、圆周角、圆心角"
        - "添加辅助线（核心策略）："
        - "  见弦→连弦心距（圆心向弦作垂线）"
        - "  见切线→连半径（切点与圆心连线）"
        - "  见直径→构造直径所对圆周角=90°"
        - "  见圆周角→找同弧上的圆心角（二倍关系）"
        - "利用定理推理：圆周角定理、切线长定理、垂径定理等"
        - "计算求值或完成证明"
      format_requirements:
        - "辅助线要在图上画出并在解题开头说明'连接OA'等"
        - "使用圆的定理要写全称"
        - "角度计算要逐步推导"
      scoring_notes:
        - "辅助线正确1分"
        - "定理运用正确2分"
        - "计算/证明过程正确2分"
        - "结论正确1分"
      auxiliary_line_strategies:
        - situation: 已知切线
          action: "连接切点与圆心，利用切线⊥半径"
        - situation: 已知弦
          action: "作弦的垂直平分线（过圆心），利用垂径定理"
        - situation: 求圆周角
          action: "找同弧对应的圆心角，圆周角=圆心角/2"
        - situation: 两圆相交
          action: "连接公共弦，利用公共弦的性质"

  - type: "解答题-二次函数综合(Q26)"
    question_number: 26
    score: 7分
    time_budget: 10分钟
    template:
      steps:
        - "第(1)问：求解析式 → 用待定系数法"
        - "  一般式y=ax²+bx+c（已知三点）"
        - "  顶点式y=a(x−h)²+k（已知顶点和一点）"
        - "  交点式y=a(x−x₁)(x−x₂)（已知两零点和一点）"
        - "第(2)问：求交点/线段/面积等 → 联立方程组或利用图形性质"
        - "第(3)问：存在性/最值问题 → 分类讨论"
        - "  设动点坐标→建立目标函数→求最值或判断存在性"
      format_requirements:
        - "待定系数法要写出方程组"
        - "分类讨论要写'当…时'逐一讨论"
        - "存在性问题要先假设存在，推导出结果后验证"
        - "最值问题要说明取等条件"
      scoring_notes:
        - "第(1)问解析式正确2分"
        - "第(2)问过程和结果3分"
        - "第(3)问分类讨论框架1分，结果正确1分"
        - "分类讨论遗漏情况扣1分/个"
    classification_framework:
      - type: 动点在抛物线上
        method: "设P(x, ax²+bx+c)，用坐标表示条件"
      - type: 三角形面积最大
        method: "面积=½|底×高|，底固定则高最大时面积最大"
      - type: 是否存在特殊四边形
        method: "假设存在→列条件方程→解方程→检验"

  - type: "解答题-几何综合(Q27)"
    question_number: 27
    score: 7分
    time_budget: 10分钟
    template:
      steps:
        - "识别图形变换类型：旋转、轴对称、平移"
        - "旋转题：找旋转中心→标旋转角→找对应点/对应边"
        - "寻找全等三角形：旋转前后的图形全等（SAS最常用）"
        - "寻找相似三角形：利用共角或平行构造相似"
        - "利用全等/相似得到等量关系"
        - "计算求值或完成证明"
      format_requirements:
        - "旋转/对称操作要写清楚变换要素"
        - "全等证明写出三对对应元素"
        - "相似证明写出两对对应角"
        - "计算过程要完整"
      scoring_notes:
        - "第(1)问证明全等/相似2分"
        - "第(2)问计算3分"
        - "第(3)问探究/最值2分"
        - "图形变换的对应关系写错全扣"
    key_strategies:
      - name: 旋转找全等
        detail: "旋转前后两三角形共用旋转中心处的角，加上旋转角相等，构造SAS"
      - name: 对称找等腰
        detail: "轴对称产生等腰三角形，利用三线合一"
      - name: 平移找平行
        detail: "平移产生平行且相等的线段"

  - type: "解答题-新定义探究(Q28)"
    question_number: 28
    score: 8分
    time_budget: 12分钟
    template:
      steps:
        - "第(1)步-读懂定义："
        - "  逐字逐句读题目给出的新定义"
        - "  用自己的话复述定义的含义"
        - "  画图或举例理解定义"
        - "第(2)步-验证/应用定义（第1小问，通常2分）："
        - "  按定义检验给定对象是否满足条件"
        - "  或直接利用定义求简单的值"
        - "第(3)步-探究/求值（第2小问，通常3分）："
