# ============================================================
# 通用答题规范
# ============================================================
general_format_rules:
  - "解答题必须写'解：'或'证明：'开头"
  - "每步计算单独一行"
  - "等号上下对齐"
  - "几何证明用'∵…∴…'格式"
  - "最终结果加下划线或方框突出"
  - "分类讨论用'当…时'分段书写，最后写'综上所述'"
  - "应用题最后用一句话回答问题"
  - "作图题保留作图痕迹"

scoring_strategy:
  principles:
    - "先易后难，确保基础题满分"
    - "解答题写过程就有步骤分，不能留空白"
    - "不会做的题也要写出已知条件和部分推理"
    - "选择填空不确定的先标记，最后回来检查"
  time_warning:
    - milestone: 40分钟
      expected_progress: "选择题+填空题完成"
    - milestone: 90分钟
      expected_progress: "Q17-Q24完成"
    - milestone: 110分钟
      expected_progress: "Q25-Q27尽量完成"
    - milestone: 120分钟
      expected_progress: "Q28能做多少做多少+检查"
