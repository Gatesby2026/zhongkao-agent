# 五、备考建议
# ============================================================
exam_tips:
  词汇题型分布:
    - "完形填空（8分）：主要考718核心词的词义辨析和搭配"
    - "阅读理解CD篇（8-10分）：纲外440词集中出现，影响理解"
    - "阅读表达（10分）：需要用准确词汇写答语"
    - "文段表达（10分）：词组和句式的正确运用决定档次"
    - "语法填空（4分）：不规则动词变形是常考点"

  各级别冲刺策略:
    L0: "集中突破300基础词，保证听力和简单阅读不丢分"
    L1: "718核心词反复滚动，配合完形和AB篇阅读训练"
    L2: "CD篇纲外词按词频优先级背诵，同时强化词组搭配"
    L3: "查漏补缺，重点练易混淆词和一词多义，冲满分"
