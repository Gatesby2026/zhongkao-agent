# ============================================================
# 北京中考英语词汇速查手册（按学生水平分级 L0-L3）
# 数据来源: 基于学生实际辅导材料结构化整理
# ============================================================

subject: 英语
region: 北京
exam_year: 2026
total_score: 100
last_updated: "2026-04-13"
data_source: "基于学生实际辅导材料（1600考纲词/718核心词/440纲外词/627词组）结构化"

# ============================================================
# 一、词汇总览
# ============================================================
vocabulary_overview:
  total_syllabus: 1600       # 课标考纲词总量
  core_high_freq: 718        # 718高频核心词（从1600中精选）
  cd_extra: 440              # CD篇纲外高频词（10年110套真题统计）
  phrases: 627               # 必备词组总量
  irregular_verbs: 100       # 不规则动词（约100个必背）

  说明: |
    1600考纲词是北京中考英语课标要求的完整词表。
    718核心词是从中筛选出的最高频、最重要的词汇。
    440纲外词来自10年110套真题CD篇阅读的词频统计，是拉开分差的关键。
    627词组按动词/介词/形容词/连词/固定句式分类，覆盖完形和写作高频搭配。

# ============================================================
# 二、按水平分级背诵计划
# ============================================================
by_level:

  # ----------------------------------------------------------
  # L0 入门级：零基础或词汇极薄弱
  # ----------------------------------------------------------
  L0_beginner:
    target: "掌握最基础的300个高频词，建立词汇信心"
    daily_plan: "每天背30个，10天一轮，滚动复习"
    review_method: "艾宾浩斯复习法：第1/2/4/7/15天各复习一次"
    focus_categories:
      - category: 日常生活
        count: 45
        words: [family, father, mother, brother, sister, son, daughter, friend, neighbor,
                home, house, room, door, window, bed, chair, table, kitchen, bathroom,
                food, water, milk, bread, rice, egg, meat, fruit, apple, cake,
                weather, rain, snow, wind, sun, hot, cold, warm, cool,
                morning, afternoon, evening, night, today, tomorrow, yesterday]
      - category: 学校学习
        count: 40
        words: [school, class, student, teacher, lesson, homework, exam, test, book,
                pen, pencil, paper, desk, blackboard, library, playground,
                English, Chinese, math, science, history, music, art, sport,
                learn, study, read, write, listen, speak, answer, question,
                easy, difficult, hard, important, interesting, boring, useful, careful]
      - category: 基础动词
        count: 50
        words: [be, have, do, go, come, get, make, take, give, put,
                see, look, watch, hear, listen, say, tell, speak, talk, ask,
                know, think, want, need, like, love, hope, wish, feel, believe,
                eat, drink, sleep, wake, walk, run, sit, stand, open, close,
                help, use, try, work, play, start, stop, finish, wait, carry]
      - category: 基础形容词与副词
        count: 35
        words: [good, bad, big, small, long, short, tall, old, young, new,
                happy, sad, angry, afraid, tired, hungry, thirsty, sick, well,
                fast, slow, early, late, much, many, few, little, some, any,
                very, too, also, still, already, never, always, often, sometimes]
      - category: 数词与时间
        count: 30
        words: [one, two, three, four, five, six, seven, eight, nine, ten,
                hundred, thousand, first, second, third, last, next,
                year, month, week, day, hour, minute, Monday, January,
                spring, summer, autumn, winter, birthday]
      - category: 代词与连接词
        count: 25
        words: [I, you, he, she, it, we, they, this, that, these, those,
                who, what, where, when, why, how, which,
                and, but, or, so, because, if, although]
      - category: 介词与方位
        count: 25
        words: [in, on, at, to, from, for, with, about, of, by,
                up, down, out, off, over, under, between, behind, beside,
                here, there, left, right, front, back]
      - category: 身体与健康
        count: 20
        words: [body, head, face, eye, ear, nose, mouth, hand, foot, leg,
                heart, back, arm, finger, tooth, hair,
                health, healthy, exercise, medicine]
      - category: 交通与出行
        count: 15
        words: [car, bus, bike, train, plane, boat, taxi,
                road, street, bridge, station, airport,
                drive, ride, fly]
      - category: 自然与动物
        count: 15
        words: [animal, dog, cat, bird, fish, horse, monkey, elephant, tiger,
                tree, flower, river, lake, mountain, sea]

  # ----------------------------------------------------------
  # L1 基础级：有一定基础，目标掌握718核心词
  # ----------------------------------------------------------
  L1_basic:
    target: "掌握718核心词，确保基础阅读无障碍"
    daily_plan: "每天背50个新词 + 复习50个旧词，14天一轮"
    review_method: "背完即测：每天晚上英译中+中译英各测一遍，错词单独标记"
    prerequisite: "L0的300词应已熟练"
    focus_categories:
      - category: 情感与态度
        sample_words: [excited, surprised, proud, worried, nervous, lonely, pleased,
                       satisfied, disappointed, patient, brave, confident, polite, honest,
                       lazy, selfish, strange, serious, grateful, curious]
      - category: 社会与交往
        sample_words: [community, society, culture, tradition, custom, rule, law,
                       invite, introduce, celebrate, discuss, argue, agree, disagree,
                       share, borrow, lend, return, accept, refuse, offer, provide]
      - category: 科技与媒体
        sample_words: [computer, Internet, website, phone, message, information, program,
                       technology, machine, robot, record, search, download, online,
                       news, newspaper, magazine, radio, television, screen]
      - category: 环境与自然
        sample_words: [environment, pollution, energy, recycle, protect, waste, save,
                       earth, ocean, island, forest, desert, field, garden,
                       plant, grow, rise, shine, blow, flood]
      - category: 职业与未来
        sample_words: [job, work, career, doctor, nurse, engineer, scientist, artist,
                       manager, reporter, pilot, farmer, worker, volunteer,
                       company, office, factory, meeting, interview, salary]
      - category: 学术与思维
        sample_words: [education, knowledge, skill, ability, experience, practice, method,
                       research, discover, invent, develop, improve, solve, compare,
                       explain, describe, express, suppose, consider, realize]
      - category: 购物与金钱
        sample_words: [shop, store, market, supermarket, price, cheap, expensive,
                       cost, pay, spend, save, waste, buy, sell, trade,
                       dollar, coin, money, customer, bill]
      - category: 饮食与烹饪
        sample_words: [meal, breakfast, lunch, dinner, dish, soup, salad, sandwich, noodle,
                       cook, boil, fry, taste, smell, sweet, sour, bitter, salty, fresh, delicious]
    study_tips:
      - "718词中约200个是一词多义，重点关注动词和形容词的多种含义"
      - "结合真题语境背单词，不要只背中文释义"
      - "每周做一套完形填空，标记不认识的718词"

  # ----------------------------------------------------------
  # L2 进阶级：核心词已熟练，攻克纲外高频词
  # ----------------------------------------------------------
  L2_intermediate:
    target: "718核心词熟练 + 系统背诵CD篇纲外440词"
    daily_plan: "核心词查漏补缺 + 每天15个纲外词，30天完成一轮"
    review_method: "结合真题CD篇原文复习，在语境中巩固"
    cd_extra_priority:
      - tier: "最高频（30次以上，必背7词）"
        freq_range: "30-42次"
        words:
          - {word: motivate, freq: 42, meaning: "激励；促使"}
          - {word: plastic, freq: 41, meaning: "塑料；塑料的"}
          - {word: positive, freq: 38, meaning: "积极的；正面的"}
          - {word: physical, freq: 30, meaning: "身体的；物理的"}
          - {word: reduce, freq: 30, meaning: "减少；降低"}
          - {word: performance, freq: 29, meaning: "表现；表演"}
          - {word: emotional, freq: 27, meaning: "情感的；情绪化的"}
      - tier: "高频（20-29次，必背8词）"
        freq_range: "20-29次"
        words:
          - {word: participant, freq: 25, meaning: "参与者"}
          - {word: view, freq: 24, meaning: "观点；风景；看待"}
          - {word: cooperate, freq: 22, meaning: "合作；协作"}
          - {word: negative, freq: 21, meaning: "消极的；负面的"}
          - {word: pressure, freq: 21, meaning: "压力"}
          - {word: failure, freq: 20, meaning: "失败；失败的人/事"}
          - {word: garbage, freq: 20, meaning: "垃圾"}
          - {word: journal, freq: 20, meaning: "日志；期刊"}
      - tier: "中高频（15-19次，重点背14词）"
        freq_range: "15-19次"
        words:
          - {word: device, freq: 19, meaning: "设备；装置"}
          - {word: literature, freq: 19, meaning: "文学；文献"}
          - {word: bacteria, freq: 18, meaning: "细菌"}
          - {word: landfill, freq: 18, meaning: "垃圾填埋场"}
          - {word: personality, freq: 18, meaning: "性格；个性"}
          - {word: solution, freq: 18, meaning: "解决方案；溶液"}
          - {word: affect, freq: 17, meaning: "影响；感染"}
          - {word: average, freq: 17, meaning: "平均的；普通的"}
          - {word: comfort, freq: 17, meaning: "安慰；舒适"}
          - {word: connection, freq: 17, meaning: "联系；连接"}
          - {word: quality, freq: 17, meaning: "质量；品质"}
          - {word: violent, freq: 17, meaning: "暴力的；猛烈的"}
          - {word: generate, freq: 16, meaning: "产生；发电"}
          - {word: publish, freq: 16, meaning: "出版；发布"}
      - tier: "中频（10-14次，建议背诵）"
        freq_range: "10-14次"
        sample_words:
          - {word: anxiety, meaning: "焦虑"}
          - {word: benefit, meaning: "好处；受益"}
          - {word: challenge, meaning: "挑战"}
          - {word: chemical, meaning: "化学的；化学品"}
          - {word: concept, meaning: "概念"}
          - {word: contribute, meaning: "贡献；导致"}
          - {word: creative, meaning: "有创造力的"}
          - {word: current, meaning: "当前的；水流"}
          - {word: decade, meaning: "十年"}
          - {word: employ, meaning: "雇用；使用"}
          - {word: function, meaning: "功能；运作"}
          - {word: global, meaning: "全球的"}
          - {word: greenhouse, meaning: "温室"}
          - {word: identify, meaning: "识别；确认"}
          - {word: impact, meaning: "影响；冲击"}
          - {word: inspire, meaning: "激励；启发"}
          - {word: mental, meaning: "精神的；心理的"}
          - {word: nutrition, meaning: "营养"}
          - {word: organization, meaning: "组织；机构"}
          - {word: recognize, meaning: "认出；承认"}
          - {word: resource, meaning: "资源"}
          - {word: responsible, meaning: "负责的"}
          - {word: significant, meaning: "重要的；显著的"}
          - {word: strategy, meaning: "策略；战略"}
          - {word: sustainable, meaning: "可持续的"}
          - {word: volunteer, meaning: "志愿者；自愿"}
    study_tips:
      - "纲外词集中出现在CD篇阅读，背词时结合原文段落理解"
      - "重点掌握词根词缀：-tion/-sion(名词), -ive/-ful(形容词), re-/un-(前缀)"
      - "positive/negative, physical/emotional/mental 这类反义词/同类词一起背"

  # ----------------------------------------------------------
  # L3 冲刺级：全面精通，冲击高分
  # ----------------------------------------------------------
  L3_advanced:
    target: "全部1600+440纲外词精通，易混淆词和一词多义零失误"
    focus: "易混淆词辨析 + 一词多义 + 熟词生义"
    daily_plan: "专项刷题 + 错词本滚动复习，保持每天接触200词以上"
    confusing_pairs:
      - pair: [accept, except]
        辨析: "accept接受 vs except除了"
      - pair: [affect, effect]
        辨析: "affect动词影响 vs effect名词效果"
      - pair: [beside, besides]
        辨析: "beside在旁边 vs besides此外"
      - pair: [borrow, lend]
        辨析: "borrow借入 vs lend借出"
      - pair: [cloth, clothes, clothing]
        辨析: "cloth布料 vs clothes衣服(复数) vs clothing衣物(总称)"
      - pair: [cost, spend, pay, take]
        辨析: "物cost钱/人spend时间on/人pay钱for/It takes人时间to do"
      - pair: [discover, invent]
        辨析: "discover发现已存在的 vs invent发明新事物"
      - pair: [everyday, every day]
        辨析: "everyday形容词日常的 vs every day副词每天"
      - pair: [rise, raise]
        辨析: "rise不及物升起 vs raise及物举起/养育"
      - pair: [travel, trip, journey, tour]
        辨析: "travel泛指旅行 vs trip短途 vs journey长途 vs tour观光"
      - pair: [used to, be used to]
        辨析: "used to do过去常常 vs be used to doing习惯于"
      - pair: [quiet, quite, quit]
        辨析: "quiet安静 vs quite相当 vs quit放弃"
    polysemy_focus:
      - word: run
        meanings: ["跑", "经营(run a business)", "运行(run a program)", "流淌"]
      - word: light
        meanings: ["光/灯", "轻的", "浅色的", "点燃"]
      - word: present
        meanings: ["礼物", "目前的", "出席的", "呈现"]
      - word: mean
        meanings: ["意味着", "打算", "吝啬的", "平均值"]
      - word: change
        meanings: ["改变", "零钱", "换乘"]
      - word: state
        meanings: ["状态", "国家/州", "陈述"]
      - word: note
        meanings: ["笔记", "纸币", "注意", "音符"]
      - word: fair
        meanings: ["公平的", "展览会", "相当的", "晴朗的"]

# ============================================================
# 三、627必备词组速查
# ============================================================
phrases_overview:
  total: 627
  categories:
    # 动词词组（345个）
    - name: 动词词组
      count: 345
      说明: "按核心动词分组，掌握介副词搭配规律"
      high_freq_groups:
        - verb: come
          count: 16
          must_know: [come across, come up with, come true, come out, come on,
                      come back, come from, come along, come over, come down]
        - verb: get
