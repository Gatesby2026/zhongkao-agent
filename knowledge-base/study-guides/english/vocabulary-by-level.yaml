                      go away, go back, go up, go down, go off,
                      go by, go for, go along, go around]
        - verb: keep
          count: 14
          must_know: [keep on, keep up with, keep away from, keep in mind,
                      keep in touch, keep off, keep out, keep quiet]
        - verb: look
          count: 20
          must_know: [look after, look forward to, look up, look into,
                      look out, look around, look for, look like,
                      look through, look over, look at, look down upon]
        - verb: make
          count: 24
          must_know: [make up, make sure, make a decision, make a difference,
                      make a living, make a mistake, make friends, make progress,
                      make up one's mind, make it, make fun of, make room for]
        - verb: put
          count: 14
          must_know: [put on, put off, put up, put away, put down,
                      put out, put up with, put into practice]
        - verb: take
          count: 31
          must_know: [take part in, take place, take care of, take off, take up,
                      take away, take back, take down, take in, take on,
                      take out, take over, take pride in, take turns, take it easy]
        - verb: turn
          count: 13
          must_know: [turn on, turn off, turn up, turn down, turn out,
                      turn into, turn over, turn around, turn to]
        - verb: fall
          count: 8
          must_know: [fall behind, fall down, fall asleep, fall in love,
                      fall off, fall over, fall into]
        - verb: 其他高频动词
          说明: "break/bring/carry/cut/drop/hand/hold/pick/point/pull/run/set/show/work等"
          sample: [break down, break out, break into, bring up, bring about,
                   carry on, carry out, cut down, cut off, cut up,
                   drop by, drop off, drop out, hand in, hand out,
                   hold on, hold up, pick up, pick out, point out,
                   pull down, run out of, run away, set up, set off,
                   show off, show up, work out, work on]

    # 介词词组（117个）
    - name: 介词词组
      count: 117
      说明: "按介词分组，高频介词词组是完形填空常考点"
      by_preposition:
        - prep: at
          must_know: [at least, at first, at last, at once, at present,
                      at the same time, at the age of, at the end of,
                      at the beginning of, at night, at noon]
        - prep: by
          must_know: [by the way, by accident, by mistake, by oneself,
                      by the time, by hand, by bus/car/train]
        - prep: in
          must_know: [in fact, in order to, in time, in front of, in the end,
                      in a hurry, in common, in danger, in need, in public,
                      in return, in silence, in total, in trouble, in charge of]
        - prep: on
          must_know: [on time, on duty, on purpose, on business, on foot,
                      on one's own, on the other hand, on the way,
                      on display, on sale, on average]
        - prep: to
          must_know: [to one's surprise, thanks to, next to,
                      according to, due to, close to, up to]
        - prep: "as/from/for等"
          must_know: [as a result, as usual, as well, as long as,
                      from now on, from time to time, for example,
                      for instance, instead of, because of, ahead of]

    # 形容词词组（72个）
    - name: 形容词词组
      count: 72
      must_know: [be afraid of, be angry with, be busy with, be careful of,
                  be different from, be famous for, be full of, be good at,
                  be interested in, be late for, be proud of, be ready for,
                  be responsible for, be similar to, be sorry for, be strict with,
                  be sure of, be surprised at, be tired of, be worried about]

    # 连词词组（17个）
    - name: 连词词组
      count: 17
      must_know: [as long as, as soon as, as well as, even though, ever since,
                  in case, in order that, not only...but also,
                  so that, such...that, whether...or, as if,
                  no matter what/how, neither...nor, either...or,
                  both...and, rather than]

    # 固定句式（76个）
    - name: 固定句式
      count: 76
      说明: "写作和语法填空高频句型"
      key_patterns:
        - pattern: "It is + adj + (for/of sb) + to do"
          例句: "It is important for us to protect the environment."
        - pattern: "too...to... / so...that... / enough to..."
          例句: "He is too young to go to school alone."
        - pattern: "not only...but also..."
          例句: "She is not only beautiful but also smart."
        - pattern: "It takes sb + 时间 + to do sth"
          例句: "It took me two hours to finish the homework."
        - pattern: "find/think/make + it + adj + to do"
          例句: "I find it difficult to learn physics."
        - pattern: "would rather...than... / prefer...to..."
          例句: "I would rather stay at home than go out."
        - pattern: "the + 比较级..., the + 比较级..."
          例句: "The more you read, the better you write."
        - pattern: "There is no doubt that..."
          例句: "There is no doubt that practice makes perfect."
        - pattern: "It is said/reported/believed that..."
          例句: "It is said that the movie is worth watching."
        - pattern: "so + adj/adv + that... (倒装)"
          例句: "So excited was he that he could not say a word."

