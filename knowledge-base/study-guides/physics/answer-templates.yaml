# ============================================================
# 一、单选题（12题×2分=24分）
# ============================================================
question_types:
  - type: 单选题
    score: 24分
    count: 12题
    score_per_question: 2分
    time_budget: 18分钟
    time_per_question: 约1.5分钟
    techniques:
      - 排除法
      - 代入法
      - 图像分析法
      - 估测法
      - 等效电路法

    subtypes:
      # ---------- 1.1 概念辨析题 ----------
      - name: 概念辨析题
        description: 考查基本物理概念的理解和辨析
        frequency: 每卷约3-4题
        steps:
          - 审题：圈出关键词（"正确的是""错误的是"）
          - 逐项排查：对每个选项做出"对/错/不确定"判断
          - 重点关注易混淆概念（如：质量与重力、热量与温度）
          - 回到题干再次确认所选答案
        format_requirements:
          - 在答题卡对应位置涂卡
          - 只能选一个答案
        scoring_notes:
          - 选对得2分，选错或不选得0分
        common_mistakes:
          - 没看清"正确"还是"错误"
          - 混淆相近概念（功和功率、压力和压强）
          - 忽略题目中的限定条件（如"匀速""静止"）
        example:
          question: "下列关于力的说法正确的是"
          method: |
            逐项分析：
            A. "力是维持物体运动的原因" → 错误，力是改变运动状态的原因
            B. "物体间力的作用是相互的" → 正确，牛顿第三定律
            C. "受平衡力作用的物体一定静止" → 错误，也可能匀速直线运动
            D. "摩擦力方向一定与运动方向相反" → 错误，静摩擦力可同向
            答案选B

      # ---------- 1.2 图像分析题 ----------
      - name: 图像分析题
        description: 根据物理图像判断物理量关系
        frequency: 每卷约2-3题
        steps:
          - 第一步：看轴标——确定横轴和纵轴各代表什么物理量
          - 第二步：看趋势——判断是正比、反比、先增后减还是不变
          - 第三步：看特殊点——原点、交点、拐点、截距的物理意义
          - 第四步：对比选项，选出与图像信息一致的
        format_requirements:
          - 在草稿纸上标注关键点的坐标值
        scoring_notes:
          - 选对得2分
        common_mistakes:
          - 横纵轴看反
          - 忽略坐标轴的起始值不是零
          - 把正比关系和一次函数混淆（正比必过原点）
        example:
          question: "如图所示的s-t图像，判断物体的运动状态"
          method: |
            ① 横轴：时间t，纵轴：路程s
            ② 图线是过原点的直线 → s与t成正比 → 匀速直线运动
            ③ 斜率 = 速度，斜率越大速度越大
            ④ 水平线段表示静止

      # ---------- 1.3 估测题 ----------
      - name: 估测题
        description: 对生活中物理量的数量级进行估计
        frequency: 每卷约1-2题
        steps:
          - 建立参照物——用自己熟悉的事物做对比
          - 量级判断——先确定数量级，再精确到合理范围
          - 单位换算——注意题目要求的单位
          - 排除明显不合理的选项
        format_requirements:
          - 快速判断，不要纠结精确值
        scoring_notes:
          - 选对得2分
        common_mistakes:
          - 单位换算出错（特别是cm²与m²、mL与L）
          - 对生活常识缺乏积累
          - 混淆物理量（如把功率当成力）
        key_references:
          - 中学生身高约1.6m
          - 人正常步行速度约1.1m/s
          - 一个鸡蛋约50g，即0.5N
          - 人体正常体温约37℃
          - 一节干电池电压1.5V
          - 家用照明电路电压220V
          - 人体安全电压不高于36V
          - 正常说话声音约60dB

      # ---------- 1.4 电路判断题 ----------
      - name: 电路判断题
        description: 判断电路的连接方式、电表示数等
        frequency: 每卷约2-3题
        steps:
          - 画等效电路图——用简洁方式重新画出电路
          - 判断串并联——电流只有一条路径为串联，有分支为并联
          - 分析电表——电压表并联在被测元件两端，电流表串联在电路中
          - 判断开关控制关系——断开/闭合开关观察哪些用电器受影响
        format_requirements:
          - 草稿纸上画出等效电路图辅助判断
        scoring_notes:
          - 选对得2分
        common_mistakes:
          - 把电压表当导线处理（电压表内阻很大，相当于断路）
          - 忽略短路情况
          - 串并联判断错误导致连锁出错

  # ============================================================
  # 二、多选题（3题×3分=9分）
  # ============================================================
  - type: 多选题
    score: 9分
    count: 3题
    score_per_question: 3分
    time_budget: 9分钟
    time_per_question: 约3分钟
    techniques:
      - 保守策略（少选得1分，多选得0分）
      - 排除法
      - 逐项独立判断法

    scoring_rule:
      全对: 3分
      少选且正确: 1分
      多选或错选: 0分

    strategy:
      core_principle: 不确定的选项坚决不选
      steps:
        - 先快速浏览四个选项，找出最有把握的正确选项
        - 对每个选项独立判断——确定对、确定错、不确定
        - 确定对的选项入选
        - 不确定的选项不选（宁可得1分也不冒0分风险）
        - 最后检查已选选项之间是否存在逻辑矛盾
      scoring_notes:
        - 如果只有1个选项有把握，就只选1个，稳拿1分
        - 如果有2-3个选项确定正确，全选
        - 绝对不要为了"多得分"去猜不确定的选项

    common_traps:
      - name: 混淆概念陷阱
        description: 选项中故意混淆相近概念
        examples:
          - '"功"和"功率"'
          - '"压力"和"压强"'
          - '"热量"和"温度""内能"'
        countermeasure: 抓住物理量的定义和单位进行区分

      - name: 条件缺失陷阱
        description: 选项表述看似正确但缺少必要前提条件
        examples:
          - '"物体受力就会运动"（缺少"合力不为零"条件）'
          - '"液体压强随深度增大而增大"（缺少"同种液体"条件）'
        countermeasure: 检查表述是否完整、有无隐含条件

      - name: 绝对化表述陷阱
        description: 使用"一定""必然""不可能"等绝对词汇
        examples:
          - '"密度大的物体一定会沉入水底"'
          - '"做功一定会产生热量"'
        countermeasure: 遇到绝对化词汇多加警惕，想反例

  # ============================================================
  # 三、实验探究题（约5题，共27分）
  # ============================================================
  - type: 实验探究题
    score: 约27分
    count: 约5题
    time_budget: 30分钟
    importance: 北京中考物理最重要的题型，分值占比最高
    techniques:
      - 控制变量法
      - 转换法
      - 等效替代法
      - 图像法

    subtypes:
      # ---------- 3.1 基本测量实验 ----------
      - name: 基本测量实验
        description: 考查仪器使用和读数规范
        steps:
          - 明确测量工具的量程和分度值
          - 读数时视线要与刻度面垂直
          - 估读到分度值的下一位
          - 记录数据要带单位
        format_requirements:
          - 读数格式：准确值 + 估读值 + 单位
          - 例如刻度尺分度值1mm，读数写为"2.35cm"（估读到0.01cm）
          - 温度计不需要估读
          - 电流表/电压表读数要先看量程再读数
        common_mistakes:
          - 忘记估读（刻度尺必须估读）
          - 搞错分度值
          - 量程选择不当（过大读数不准，过小烧毁仪器）
          - 读数时没写单位

      # ---------- 3.2 探究性实验通用模板 ----------
      - name: 探究性实验通用模板
        description: 适用于所有探究类实验题的通用答题框架
        scientific_method_steps:
          - step: 提出问题
            format: "____与____有什么关系？"
            example: "导体中的电流与导体两端的电压有什么关系？"

          - step: 猜想与假设
            format: "____可能与____有关。当____越大时，____可能越大/越小。"
            example: "导体中的电流可能与电压有关。电压越大，电流可能越大。"

          - step: 设计实验
            format: |
              ① 实验器材：____
              ② 实验方法：采用控制变量法，控制____不变，改变____
              ③ 实验步骤：第一步____，第二步____，……
            example: |
              ① 器材：电源、开关、导线、电流表、电压表、滑动变阻器、定值电阻
              ② 方法：控制电阻不变，用滑动变阻器改变电压
              ③ 步骤：按电路图连接→闭合开关→调节滑动变阻器→记录数据→重复

          - step: 进行实验与收集数据
            format: 设计表格记录数据，至少测量3组
            notes:
              - 表格第一行写物理量和单位
              - 至少记录3组数据
              - 数据之间要有明显差异

          - step: 分析与论证
            format: |
              方法一：计算比值/乘积，寻找规律
              方法二：画图像，分析图线特征
            example: "通过计算每组数据中U/I的值，发现比值基本相同，说明电流与电压成正比。"

          - step: 得出结论
            format: "在____条件下，____与____成正比/反比关系。"
            example: "在电阻一定时，导体中的电流与导体两端的电压成正比。"

          - step: 评估与交流
            format: |
              ① 实验中存在的不足：____
              ② 改进方案：____
            common_improvements:
              - 多次测量取平均值以减小误差
              - 控制变量不够严格，应____
              - 实验次数较少，应增加实验组数
              - 可以换用不同的器材重复验证

      # ---------- 3.3 控制变量法专项 ----------
      - name: 控制变量法答题模板
        description: 北京中考实验题最核心的方法
        standard_format: "控制____不变，改变____，观察（测量）____的变化。"
        steps:
          - 明确研究的问题——"探究A与B的关系"
          - 确定自变量（要改变的量）和因变量（要观察的量）
          - 确定控制变量（保持不变的量）
          - 用标准格式作答
        example:
          question: "探究滑动摩擦力大小与哪些因素有关"
          answer: |
            ① 探究与压力的关系：
            控制接触面粗糙程度不变，改变压力大小，
            用弹簧测力计拉物体做匀速直线运动，读出摩擦力大小。
            ② 探究与接触面粗糙程度的关系：
            控制压力不变，改变接触面的粗糙程度，
            用弹簧测力计拉物体做匀速直线运动，读出摩擦力大小。
        common_mistakes:
          - 没有说明"控制什么不变"
          - 只改变了自变量但没说观察什么
          - 混淆自变量和因变量

      # ---------- 3.4 数据处理 ----------
      - name: 数据处理模板
        description: 实验数据的分析和处理方法
        methods:
          - name: 表格分析法
            steps:
              - 检查数据是否有明显的异常值
              - 计算相关比值或乘积
              - 寻找数据之间的规律
            format: "由表格数据可知，____与____的比值（乘积）近似相等，说明____。"

          - name: 图像绘制法
            steps:
              - 建立坐标系，标注物理量和单位
              - 合理选取标度（让数据点分布在图纸2/3以上区域）
              - 描点（用"×"或"·"标注）
              - 连线（用平滑曲线或直线，不要折线连接）
            format_requirements:
              - 坐标轴要标物理量名称、符号和单位
              - 标度要均匀
              - 连线要让尽可能多的点落在线上或均匀分布在线两侧

          - name: 求平均值法
            steps:
              - 剔除明显偏差较大的异常数据
              - 对有效数据求算术平均值
              - 保留与原始数据相同的有效数字位数
            format: "____的平均值为（____+____+____）÷3 = ____"

      # ---------- 3.5 实验结论格式 ----------
      - name: 实验结论标准格式
        description: 实验结论的规范写法
        templates:
          - type: 正比关系
            format: "在____一定时，____随____的增大而增大（____与____成正比）。"
            example: "在电阻一定时，电流随电压的增大而增大（电流与电压成正比）。"

          - type: 反比关系
            format: "在____一定时，____随____的增大而减小（____与____成反比）。"
            example: "在电压一定时，电流随电阻的增大而减小（电流与电阻成反比）。"

          - type: 无关关系
            format: "____的大小与____无关。"
            example: "物体的质量与物体的形状、状态、位置无关。"

          - type: 条件性结论
            format: "当____时，____；当____时，____。"
            example: "当物距大于二倍焦距时，成倒立缩小的实像；当物距在一倍焦距和二倍焦距之间时，成倒立放大的实像。"

      # ---------- 3.6 实验评估与改进 ----------
      - name: 实验评估与改进模板
        description: 回答"实验有什么不足""如何改进"类问题
        common_improvements:
          - issue: 数据偶然性大
            improvement: 多次测量取平均值
          - issue: 控制变量不够严格
            improvement: "应严格控制____不变，具体做法是____"
          - issue: 实验次数少，结论不具普遍性
            improvement: 增加实验组数，更换不同的实验器材重复实验
          - issue: 测量误差大
            improvement: 选用分度值更小的测量工具，改进操作方法
          - issue: 实验方案不合理
            improvement: 具体说明改进方案并解释改进理由

      # ---------- 3.7 高频实验清单 ----------
      - name: 高频实验清单
        description: 北京中考常考的核心实验
        experiments:
          - name: 测量物质密度
            instruments: 天平、量筒
            method: "用天平测质量m，用量筒测体积V，由ρ=m/V计算密度"
            key_points:
              - 先测质量后测体积（减小水残留带来的误差）
              - 天平使用前要调平
              - 量筒读数时视线与凹液面最低处相平
            common_errors:
              - 先测体积后测质量，导致质量偏大，密度偏大
              - 天平未调平就使用

          - name: 探究欧姆定律
            instruments: 电源、开关、导线、电流表、电压表、滑动变阻器、定值电阻
            method: |
              ① 探究电流与电压关系：控制电阻不变，用滑动变阻器改变电压
              ② 探究电流与电阻关系：控制电压不变，更换不同电阻
            key_points:
              - 滑动变阻器的作用：保护电路 + 改变电压/控制电压不变
              - 连接电路时开关要断开，滑动变阻器调到最大阻值
              - 探究I与R关系时，每次换电阻后要调节滑动变阻器使电压不变
            common_errors:
              - 忘记说明滑动变阻器的作用
              - 换电阻后没有调节变阻器保持电压不变

          - name: 测量小灯泡电功率
            instruments: 电源、开关、导线、电流表、电压表、滑动变阻器、小灯泡
            method: "伏安法：用电压表测灯泡两端电压U，电流表测通过灯泡的电流I，由P=UI计算"
            key_points:
              - 分别测额定电压下、高于额定电压、低于额定电压三种情况
              - 观察灯泡亮度变化并记录
              - 灯泡电阻随温度变化，不能用一组数据求平均电阻
            common_errors:
              - 用多组数据求平均电功率（只有额定电压下的才是额定功率）
              - 灯泡不亮就认为断路（可能只是电压太低）

          - name: 探究凸透镜成像规律
            instruments: 光具座、凸透镜、蜡烛、光屏
            method: "固定凸透镜，改变物距，移动光屏找到清晰的像，记录物距和像距"
            key_points:
              - 三心共线（蜡烛焰心、透镜光心、光屏中心在同一高度）
              - 记住关键分界点：2f和f
              - "u>2f：倒立缩小实像；f<u<2f：倒立放大实像；u<f：正立放大虚像"
            common_errors:
              - 蜡烛、透镜、光屏三心不共线导致像偏上/偏下
              - 物距在焦距以内时在光屏上找像（虚像不能在光屏上成像）

          - name: 探究杠杆平衡条件
            instruments: 杠杆、铁架台、钩码、弹簧测力计
            method: "在杠杆两侧挂不同数量的钩码，调节位置使杠杆水平平衡，记录F₁、L₁、F₂、L₂"
            key_points:
              - 实验前调节杠杆在水平位置平衡（调节平衡螺母）
              - 力臂要从支点到力的作用线的垂直距离
              - 杠杆水平平衡时，力臂可以直接从杠杆上读出
            common_errors:
              - 实验前没有调节杠杆水平平衡
              - 用弹簧测力计斜拉时力臂不是杠杆上的距离

          - name: 探究浮力大小与什么因素有关
            instruments: 弹簧测力计、金属块、量筒、水、盐水
            method: "用弹簧测力计测物体在空气中的重力G和浸入液体中的示数F，浮力=G-F"
            key_points:
              - 控制变量法：分别探究与液体密度、排开液体体积的关系
              - 浮力与物体自身密度、形状无关
              - 阿基米德原理：F浮=ρ液gV排
            common_errors:
              - 认为浮力与深度有关（完全浸没后浮力不变）
              - 混淆"排开液体体积"和"物体体积"

  # ============================================================
  # 四、计算题（2题，共约10分）
  # ============================================================
  - type: 计算题
    score: 约10分
    count: 2题
    time_budget: 18分钟
    time_per_question: 约9分钟
    techniques:
      - 公式法
      - 分步求解
      - 单位统一

    writing_standards:
      - rule: 必须写"解："开头
      - rule: 公式→代入数据（带单位）→计算结果，每步一行
      - rule: 单位必须写，且全程统一（不能混用cm和m、g和kg）
      - rule: 最终答案要有"答："并用完整句子回答
      - rule: 中间计算过程不要跳步
      - rule: 物理量要用规范符号表示

    subtypes:
      # ---------- 4.1 力学计算 ----------
      - name: 力学计算模板
        description: 密度、压强、浮力、功、功率、机械效率等
        templates:
          - name: 密度计算
            formulas:
              - "ρ = m/V"
              - "m = ρV"
              - "V = m/ρ"
            example: |
              已知：m = 540g = 0.54kg，V = 200cm³ = 2×10⁻⁴m³
              解：
              ρ = m/V
                = 0.54kg ÷ (2×10⁻⁴m³)
                = 2.7×10³kg/m³
              答：该物质的密度为2.7×10³kg/m³。

          - name: 压强计算
            formulas:
              - "固体压强：p = F/S"
              - "液体压强：p = ρgh"
            key_points:
              - F的单位是N，S的单位是m²，p的单位是Pa
              - 液体压强中h是深度（液面到该点的竖直距离），不是高度
            example: |
              已知：F = 100N，S = 0.01m²
              解：
              p = F/S
                = 100N ÷ 0.01m²
                = 10000Pa
                = 10⁴Pa
              答：压强为10⁴Pa。

          - name: 浮力计算
            formulas:
              - "称重法：F浮 = G - F示"
              - "阿基米德原理：F浮 = ρ液gV排"
              - "漂浮/悬浮条件：F浮 = G"
            key_points:
              - 先判断物体状态（漂浮、悬浮、沉底）
              - 漂浮时V排 < V物，沉底时V排 = V物
              - 注意g取10N/kg
            common_mistakes:
              - V排和V物搞混
              - 忘记将单位换算成国际单位

          - name: 功和功率计算
            formulas:
              - "功：W = Fs"
              - "功率：P = W/t = Fv"
            key_points:
              - 力和位移方向必须一致
              - 分清有用功和总功
            common_mistakes:
              - 重力做功时用水平距离而非竖直高度
              - 混淆有用功和总功

          - name: 机械效率计算
            formulas:
              - "η = W有用/W总 × 100%"
              - "滑轮组：η = Gh/(Fs) × 100%"
            key_points:
              - 明确有用功是什么（通常是克服重力做的功）
              - 总功 = 有用功 + 额外功
              - 机械效率一定小于100%
            example: |
              已知：物重G = 200N，提升高度h = 2m，拉力F = 100N，绳子自由端移动距离s = 6m
              解：
              W有用 = Gh = 200N × 2m = 400J
              W总 = Fs = 100N × 6m = 600J
              η = W有用/W总 × 100%
                = 400J/600J × 100%
                ≈ 66.7%
              答：该滑轮组的机械效率约为66.7%。

      # ---------- 4.2 电学计算 ----------
      - name: 电学计算模板
        description: 欧姆定律、电功、电功率、电热等
        templates:
          - name: 欧姆定律计算
            formulas:
              - "I = U/R"
              - "U = IR"
              - "R = U/I"
            circuit_rules:
              串联:
                - "I = I₁ = I₂（电流处处相等）"
                - "U = U₁ + U₂（总电压等于各部分电压之和）"
                - "R = R₁ + R₂（总电阻等于各电阻之和）"
              并联:
                - "I = I₁ + I₂（总电流等于各支路电流之和）"
                - "U = U₁ = U₂（各支路电压相等）"
                - "1/R = 1/R₁ + 1/R₂（总电阻的倒数等于各电阻倒数之和）"

          - name: 电功和电功率计算
            formulas:
              - "电功：W = UIt"
              - "电功率：P = UI = I²R = U²/R"
              - "电热：Q = I²Rt"
            key_points:
              - P = I²R和P = U²/R只能用于纯电阻电路
              - 注意时间单位换算（分钟→秒）
              - 千瓦时和焦耳的换算：1kW·h = 3.6×10⁶J
            example: |
              已知：U = 220V，P额 = 1000W，使用时间t = 2h
              解：
              (1) 正常工作电流：
              I = P额/U = 1000W ÷ 220V ≈ 4.5A
              (2) 消耗的电能：
              W = P额t = 1000W × 2h = 2kW·h = 7.2×10⁶J
              答：正常工作电流约4.5A，消耗电能2kW·h。

    answer_format_template: |
      解：
      （1）由____公式可知：
      ____（写出公式）
      = ____（代入数据，带单位）
      = ____（计算结果，带单位）

      （2）由____公式可知：
      ____
      = ____
      = ____

      答：____为____；____为____。

  # ============================================================
  # 五、科普阅读题（1题，共约10分）
  # ============================================================
  - type: 科普阅读题
    score: 约10分
    count: 1题
    time_budget: 10分钟
    description: 给出一段科普材料，考查信息提取、知识迁移和综合应用能力
    techniques:
      - 信息提取法
      - 知识迁移法
      - 开放性作答法

    subtypes:
      # ---------- 5.1 信息提取题 ----------
      - name: 信息提取题
        description: 从材料中找出关键信息回答问题
        steps:
          - 先看问题，带着问题读材料（节省时间）
          - 在材料中圈画关键数据和概念
          - 用材料原文或原文关键词组织答案
          - 注意题目问的是"根据材料"还是"结合所学知识"
        format_requirements:
          - 如果问"根据材料"，答案必须来自材料原文
          - 可以直接引用材料中的关键语句
        scoring_notes:
          - 关键信息点每个1-2分
          - 不要遗漏要点
        common_mistakes:
          - 没有从材料中找答案，凭自己的知识回答
          - 答案过于简略，缺少关键信息

      # ---------- 5.2 知识迁移题 ----------
      - name: 知识迁移题
        description: 用已学物理知识解释材料中的新现象
        steps:
          - 识别材料中涉及的物理现象
          - 回忆相关的物理知识和原理
          - 建立材料内容与所学知识的联系
          - 用物理语言规范作答
        format_requirements:
          - 先写物理原理，再联系材料内容
          - 格式："因为____（物理原理），所以____（现象解释）"
        example:
          question: "材料中提到高铁列车流线型设计可以减小阻力，请用所学知识解释原因"
          answer: |
            流线型设计可以减小空气对列车的阻力。
            因为流线型的外形可以使空气更顺畅地流过列车表面，
            减少空气与车身之间的摩擦，从而减小阻力。
        common_mistakes:
          - 只写了原理没有结合材料
          - 解释不够具体，过于笼统

      # ---------- 5.3 开放性问题 ----------
      - name: 开放性问题
        description: 根据材料提出建议、举例或发表看法
        steps:
          - 明确题目要求（举例/建议/看法）
          - 结合物理原理作答，不要脱离物理学科
          - 答案要具体，不能空泛
        format_requirements:
          - 答题格式："物理原理 + 实际应用/具体例子"
          - 建议类：先说做法，再说物理依据
          - 举例类：先说例子，再说涉及的物理知识
        example:
          question: "请举出一个生活中利用该原理的例子"
          answer: |
            例如：暖水瓶的保温原理。
            暖水瓶的内壁镀银可以减少热辐射，
            真空夹层可以减少热传导和热对流，
            从而达到保温的效果。
        scoring_notes:
          - 答案合理即可得分，不追求唯一答案
          - 必须有物理原理支撑，不能只说生活现象
        common_mistakes:
          - 回答太空泛，没有具体物理原理
          - 举的例子与所考查的知识点不相关
          - 只说了现象没有解释原因

# ============================================================
# 通用考试技巧
# ============================================================
general_tips:
  考前准备:
    - 带齐文具：2B铅笔、黑色签字笔、直尺、橡皮
    - 提前到考场，稳定情绪
    - 快速浏览全卷，了解题量和难度分布

  答题顺序:
    - 建议按顺序作答，不要跳题
    - 遇到难题先跳过，做完简单题再回来
    - 最后5分钟重点检查涂卡是否正确

  检查策略:
    - 单选题：重新审题，确认没看错"正确/错误"
    - 多选题：检查是否有不确定的选项被误选
    - 实验题：检查结论格式是否规范
    - 计算题：检查单位是否统一、数值是否算对
    - 阅读题：检查是否回答了所有问题

  常见丢分原因:
    - 审题不仔细，遗漏条件
    - 单位不统一或忘写单位
    - 计算错误（特别是幂次运算）
    - 答题不规范（实验结论不完整、计算没写"解"和"答"）
    - 时间分配不合理，后面题没时间做
