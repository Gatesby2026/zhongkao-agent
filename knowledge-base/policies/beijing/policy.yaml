# ============================================================
# 北京市 2026 年中考（初中学业水平考试）政策
# ============================================================
# 数据来源：北京教育考试院、首都之窗、北京市教委
# 最后更新：2026-04-11
# 适用届次：2026届（初三）

region: 北京市
year: 2026
total_score: 510  # 中招录取总成绩满分

# ------ 考试科目（计入总分）------
exam_subjects:
  - name: 语文
    full_score: 100
    composition:
      - item: 笔试
        score: 100
    exam_type: 闭卷
    duration_min: 150

  - name: 数学
    full_score: 100
    composition:
      - item: 笔试
        score: 100
    exam_type: 闭卷
    duration_min: 120

  - name: 外语（英语）
    full_score: 100
    composition:
      - item: 笔试
        score: 60
      - item: 听力口语机考
        score: 40
    exam_type: 闭卷
    duration_min: 90          # 笔试时长
    special_rules:
      - 听力口语采用计算机考试，时长约30分钟
      - 学生有两次考试机会，取最高成绩
      - 第一次机考：2025年12月14日
      - 第二次机考：2026年3月

  - name: 道德与法治
    full_score: 80
    composition:
      - item: 笔试
        score: 70
      - item: 综合素质评价
        score: 10
    exam_type: 开卷
    duration_min: 70
    special_rules:
      - 可携带统编版《道德与法治》教材（七至九年级共6本）进入考场
      - 教材内不能夹带、粘贴任何资料
      - 侧重新情境新素材，考查综合分析能力，不是简单翻书找答案
      - 综合素质评价10分依据初中阶段综合素质评价相关结果计分

  - name: 物理
    full_score: 80
    composition:
      - item: 笔试
        score: 70
      - item: 实验操作
        score: 10
    exam_type: 闭卷
    duration_min: 70          # 笔试时长
    special_rules:
      - 实验操作采用随堂组织方式
      - 共21个实验（9个测量类 + 12个探究类）
      - 评分按完成数量核定：21个=10分, 19-20个=9分, 17-18个=8分, 以此类推

  - name: 体育与健康
    full_score: 50
    composition:
      - item: 现场考试
        score: 30
      - item: 过程性考核
        score: 20
    special_rules:
      - 过程性考核含体质健康测试(10分,初二上学期9-10月)和知识机考(10分,初二下学期5月)
      - 现场考试共4类22项，每人考4项（每类选1项），素质项目I（长跑）必选
      - 现场考试安排在初三第二学期4-5月

# ------ 考查科目（不计入总分，等级呈现）------
assessment_subjects:
  - name: 历史
    grade_system: ABCD
  - name: 地理
    grade_system: ABCD
  - name: 化学
    grade_system: ABCD
  - name: 生物学
    grade_system: ABCD

grade_thresholds:
  A: "85%及以上"
  B: "70%-85%"
  C: "60%-70%（合格线）"
  D: "60%以下"

# ------ 考核科目（合格/不合格）------
check_subjects:
  - 信息科技
  - 艺术
  - 劳动
  - 综合实践活动

# ------ 考试时间 ------
exam_dates:
  文化课笔试统考: "2026年6月24日-25日"
  英语听力口语机考_第一次: "2025年12月14日"
  英语听力口语机考_第二次: "2026年3月"
  体育现场考试: "2026年4-5月"

# ------ 录取政策 ------
admission:
  method: 考后知分填报志愿
  stages:
    - name: 提前招生
      description: 经市教委批准的部分学校

    - name: 指标分配招生（校额到校）
      description: 全市优质普通高中不低于50%招生计划分配到初中校
      requirements:
        - 连续3年本校学籍
        - 中考总分达430分
        - 综合素质评价达B等
      notes: 所有初中校（含民办和优质初中）均纳入

    - name: 统一招生
      description: 按成绩和志愿录取
      notes: 中高职衔接贯通项目调整至此批次

  enrollment_scale:
    普通高中: 约9.5万人
    中等职业教育: 约3.3万人

# ------ 2026年新变化（相比2025）------
changes_from_2025:
  - 普高大幅扩招：从8.5万人增至9.5万人，增加1万个学位
  - 新增登记入学试点：东城区、西城区、平谷区部分普高
  - 中高职贯通项目从提前批调整至统一招生批次
  - 校额到校覆盖扩大至所有初中校（含民办和优质初中）
  - 优化民办高中跨区招生管理

# ------ 未来趋势（2027-2029）------
future_trends:
  - "2027-2028年总分调整为520分（体育从50分增至60分）"
  - "2029年及以后总分调整为530分（体育增至70分）"
