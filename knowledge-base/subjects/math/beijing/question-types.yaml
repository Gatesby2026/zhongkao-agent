# ------ 各分数段的得分策略 ------
score_targets:

  - target: 60分（及格）
    strategy: 拿下所有基础题
    focus:
      - 选择题前6题（12分）
      - 填空题前5题（10分）
      - 解答题17-20题（20分）
      - 统计概率题（5分）
      - 零散中档题拿部分步骤分
    total_available: 约55-65分

  - target: 80分（良好）
    strategy: 基础题全对 + 中档题拿大部分
    focus:
      - 选择题全对或错1题（14-16分）
      - 填空题对6-7题（12-14分）
      - 解答题17-24题全做（约44分）
      - 25-26题拿部分分（6-8分）
    total_available: 约76-82分

  - target: 90分（优秀）
    strategy: 中档题全对 + 压轴题前2问
    focus:
      - 选择填空最多错1-2题（30-32分）
      - 解答题17-26题全做（约54分）
      - 27-28题前2问拿下（约8-10分）
    total_available: 约92-96分

  - target: 95+分（拔尖）
    strategy: 压轴题第3问也要拿分
    focus:
      - 选择填空全对（32分）
      - 所有解答题全做
      - 压轴题3小问全部完成
    notes: 需要极强的函数与几何综合能力，训练量大

# ------ 核心趋势总结 ------
key_insights:
  - 题型结构高度稳定（8+8+12连续多年不变）
  - 试卷设计遵循"入口易、层次多、空间大"的思路
  - 基础题占大头，70%的分数来自基础和简单中档题
  - 压轴题通常为二次函数综合 + 动态几何，分3小问递进
  - 2022新课标后，情境化和跨学科题目增加
  - 25题模式是未来趋势，但具体实施时间待确认
