# ================================================================
# 第二类：力量项目（满分10分）
# ================================================================
category_2:
  name: 力量项目
  full_score: 10

  items:
    # ---------- 引体向上（男生） ----------
    - name: 引体向上
      gender: 男
      unit: 个
      scoring_table:
        - score: 10
          performance: 10
          level: 满分
        - score: 9
          performance: 9
        - score: 8
          performance: 8
          level: 良好
        - score: 7
          performance: 7
        - score: 6
          performance: 6
          level: 及格
        - score: 5
          performance: 5
        - score: 4
          performance: 4
        - score: 3
          performance: 3
        - score: 2
          performance: 2
        - score: 1
          performance: 1
      technique_requirements:
        - 正手握杠（掌心向前），双手与肩同宽
        - 身体悬垂静止后开始
        - 上拉至下颏超过横杠上沿为完成一次
        - 下放时手臂完全伸直后再做下一次
        - 身体不得借助摆动发力

    # ---------- 仰卧起坐（女生） ----------
    - name: 仰卧起坐
      gender: 女
      unit: 个/分钟
      scoring_table:
        - score: 10
          performance: 49
          level: 满分
        - score: 9
          performance: 46
        - score: 8
          performance: 43
          level: 良好
        - score: 7
          performance: 40
        - score: 6
          performance: 37
          level: 及格
        - score: 5
          performance: 34
        - score: 4
          performance: 30
        - score: 3
          performance: 26
        - score: 2
          performance: 22
        - score: 1
          performance: 18
      technique_requirements:
        - 仰卧于垫上，双手交叉抱于脑后
        - 双脚屈膝约90度，同伴按压踝关节
        - 起坐时双肘触及或超过双膝为完成一次
        - 仰卧时肩胛骨须触垫
        - 计时一分钟

    # ---------- 实心球（男生） ----------
    - name: 实心球
      gender: 男
      unit: 米
      ball_weight: 2kg
      scoring_table:
        - score: 10
          performance: 10.0
          level: 满分
        - score: 9
          performance: 9.4
        - score: 8
          performance: 8.8
          level: 良好
        - score: 7
          performance: 8.2
        - score: 6
          performance: 7.6
          level: 及格
        - score: 5
          performance: 7.0
        - score: 4
          performance: 6.4
        - score: 3
          performance: 5.8
        - score: 2
          performance: 5.2
        - score: 1
          performance: 4.6
      technique_requirements:
        - 原地正面双手头上前掷
        - 两脚前后或左右开立
        - 身体面向投掷方向
        - 出手后身体不得过投掷线

    # ---------- 实心球（女生） ----------
    - name: 实心球
      gender: 女
