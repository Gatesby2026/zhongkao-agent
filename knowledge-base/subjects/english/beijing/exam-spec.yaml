# ============================================================
# 北京中考英语 — 考试规格说明
# ============================================================
# 数据来源：北京教育考试院、历年真题分析、教育媒体
# 最后更新：2026-04-12

subject: 英语
region: 北京市
year: 2026

# ------ 基本信息 ------
basic_info:
  full_score: 100
  composition:
    - part: 听力口语机考
      score: 40
      note: 两次机考取高分，一般在3月和12月（初三上学期末+初三下学期）
    - part: 笔试
      score: 60
      duration_min: 90
  exam_type: 闭卷
  exam_date_written: "2026年6月24日上午（笔试）"
  exam_date_oral:
    first: "2025年12月（第一次机考）"
    second: "2026年3月（第二次机考）"
    note: 取两次中较高分计入总成绩

# ------ 听力口语机考结构（40分）------
listening_speaking:
  full_score: 40
  duration_min: 30
  format: 人机对话，计算机自动评分
  sections:
    - type: 听后选择
      count: 4
      score_per_question: 1.5
      total_score: 6
      description: 听对话或独白，选择正确答案
      difficulty: 基础

    - type: 听后回答
      count: 5
      score_per_question: 2
      total_score: 10
      description: 听问题后口头回答，需完整句子
      difficulty: 基础-中档

    - type: 听后记录并转述
      count: 1
      total_score: 10
      description: 听短文后填写关键信息表格，然后口头转述主要内容
      sub_parts:
        - 听后填表：5个空，每空1分（5分）
        - 听后转述：根据表格内容口头转述（5分）
      difficulty: 中档

    - type: 朗读短文
      count: 1
      total_score: 6
      description: 朗读一篇约80词的短文，考查语音语调
      scoring: 发音准确性3分 + 语调自然度3分
      difficulty: 基础

    - type: 看图说话 / 回答问题
      count: 2
      total_score: 8
      description: 根据图片或情境，口头回答或描述
      difficulty: 中档
      note: 2024年改革后新增/调整的题型

  scoring_notes:
    - 发音准确性、语调自然度、语法正确性、内容完整性均计分
    - 转述题有内容要点和语言表达两个维度评分
    - 两次机考难度基本一致，取高分计入

# ------ 笔试结构（60分）------
paper_structure:
  total_score: 60
  duration_min: 90
  total_questions: 约31题

  sections:
    - type: 单项填空
      count: 10
      score_per_question: 1
      total_score: 10
      description: 语法和词汇的语境选择
      difficulty_distribution:
        easy: 6        # 基础语法和词汇
        medium: 3      # 时态语态/从句
        hard: 1        # 综合语境题
      typical_topics:
        - 代词（人称/物主/不定代词）
        - 介词和介词短语
        - 连词（并列/从属）
        - 时态（一般过去/现在完成时）
        - 被动语态
        - 形容词/副词比较级最高级
        - 宾语从句（语序/时态呼应）
        - 情态动词
        - 非谓语动词（to do / doing）
      notes: 2024年起从12题减至10题，但10大语法考点全部保留

    - type: 完形填空
      count: 6
      score_per_question: 1
      total_score: 6
      description: 一篇约200-250词短文，6个空
      difficulty_distribution:
        easy: 2
        medium: 3
        hard: 1
      typical_topics:
        - 记叙文为主（成长/感悟/助人为乐）
        - 考查词义辨析、上下文逻辑、固定搭配
      notes: 2024年起从10题减至6题

    - type: 阅读理解
      total_score: 26
      total_questions: 13
      description: 4篇文章共13题，每题2分，共26分
      sub_sections:
        - name: A篇（应用文）
          count: 3
          score_per_question: 2
          total_score: 6
          description: 约200词，活动通知/课程介绍/广告/社团招募
          difficulty: 基础
          question_types: [信息提取, 细节查找, 写作目的]

        - name: B篇（说明文/记叙文）
          count: 4
          score_per_question: 2
          total_score: 8
          description: 约300词，科技生活/自然环保/健康饮食/AI应用
          difficulty: 基础-中档
          question_types: [细节理解, 词义猜测, 推理判断, 主旨大意]

        - name: C篇（议论文）
          count: 3
          score_per_question: 2
          total_score: 6
          description: 约350词，教育观点/社会问题/青少年成长
          difficulty: 中档-较难
          question_types: [观点理解, 论据分析, 深层推理, 态度推断]

        - name: D篇（还原句子）
          count: 3
          score_per_question: 2
          total_score: 6
          description: 从备选句子中选择正确的句子还原到文章空缺处
          difficulty: 中档-较难
          question_types: [逻辑衔接, 代词指代, 段落结构, 信息补充]
          notes: 区分度最大的阅读题型，需要篇章分析能力

    - type: 文段表达
      total_score: 18
      sub_sections:
        - name: 邮件回复
          count: 1
          total_score: 8
          description: 回复外国朋友的邮件，要点完整、语言得体、格式正确
          typical_topics:
            - 学习方法/文化活动/景点推荐/校园生活
          difficulty: 中档
          notes: 格式固定，话题围绕中外交流和文化分享

        - name: 命题作文
          count: 1
          total_score: 10
          description: 某英文网站征稿，50词以上
          scoring_criteria:
            content: 4分（观点明确、内容充实）
            language: 4分（语法正确、用词得当、句式多样）
            structure: 2分（条理清晰、逻辑连贯）
          typical_topics:
            - 核心品质（责任/自律/助人/创新等）
            - 个人经历与感悟
          difficulty: 较难
          notes: 每年围绕一个核心品质词，"经历+感悟"三段式结构

# ------ 难度分布 ------
difficulty_ratio:
  five_year_average:
    easy: 55       # 基础题约55%（约33分笔试）
    medium: 35     # 中档题约35%（约21分笔试）
    hard: 10       # 较难题约10%（约6分笔试）
    note: 英语难度整体低于数学，注重基础和语用能力

  reform_trend:
    note: |
      2024年起笔试从70→60分，听口从30→40分
      笔试难度略有提升以保持区分度
      听口加强意味着口语表达能力更重要

# ------ 命题趋势（2022新课标后）------
trends:
  - name: 听口分值提升
    description: 从30分→40分，口语表达和听力理解的重要性大幅提升
  - name: 语境化命题
    description: 语法不再孤立考查，全部嵌入真实语境中
  - name: 中华文化融入
    description: 阅读和写作素材增加中国传统文化、北京地方文化内容
  - name: 开放性增强
    description: 阅读D篇最后一题和大作文均要求表达个人观点
  - name: 减少纯记忆考查
    description: 弱化单纯语法规则记忆，强调语言在真实情境中的运用
  - name: 核心素养导向
    description: 考查思维品质（推理判断）和文化意识（跨文化理解）

# ------ 评分说明 ------
scoring_notes:
  - 单选和完形：每题1分，选错不给分
  - 阅读理解：每题2分，选错不给分（含还原句子D篇）
  - 邮件回复：按要点完整性+语言得体+格式正确评分，共8分
  - 命题作文：按内容(4)+语言(4)+结构(2)三维评分，共10分
  - 作文中语法错误每个扣0.5分，同类错误不重复扣分
  - 字数不足50词扣1分，严重偏离主题最高给2分
  - 听口机考由计算机自动评分，转述题人工复核
