# ============================================================
# 初中语文课程标准知识点体系（2022年版）
# ============================================================
# 来源：《义务教育语文课程标准（2022年版）》第四学段（7-9年级）
# 最后更新：2026-04-12
#
# 要求层级说明：
#   了解 — 能从具体事例中知道或举例说明
#   理解 — 能描述特征和由来，能阐明与相关对象的区别联系
#   掌握 — 能在理解基础上用于新情境
#   运用 — 能综合运用知识，灵活合理地选择方法解决问题
#
# 中考权重说明（以北京为例）：
#   ★★★ = 高频必考（近5年几乎每年出现）
#   ★★  = 常考（3-4年出现）
#   ★   = 偶考（1-2年出现或仅作了解）
# ============================================================

subject: 语文
standard_version: "2022年版"
grade_range: "7-9年级（第四学段）"
total_knowledge_points: 120+
domains: 4    # 基础·积累与运用、古诗文阅读、现代文阅读、写作
themes: 12
modules: 35+

# ================================================================
#                 领域一：基础·积累与运用
# ================================================================
# 北京中考占比：约15分（100分制）

基础·积累与运用:

  # ------ 字音字形 ------
  字音字形:
    exam_weight: ★★★
    typical_score: 2-3分
    knowledge_points:
      - name: 常见易错字的读音（多音字、形近字）
        level: 掌握
        exam_note: 北京卷常考课标附录常用字表中的多音字和易混读音
      - name: 常见易错字的字形（形近字、同音字辨析）
        level: 掌握
        exam_note: 关注课内注释和课后字词表中的高频易错字
      - name: 汉字的基本笔画、笔顺和偏旁部首
        level: 了解
      - name: 常用汉字的规范书写
        level: 掌握

  # ------ 词语运用 ------
  词语运用:
    exam_weight: ★★★
    typical_score: 2-3分
    knowledge_points:
      - name: 词语的理解与辨析（近义词辨析）
        level: 掌握
        exam_note: 多在语段中考查词语的恰当使用
      - name: 成语的正确使用
        level: 掌握
        exam_note: 常考望文生义、对象误用、感情色彩不当等
      - name: 关联词语的正确搭配
        level: 掌握
      - name: 词语的感情色彩（褒义/贬义/中性）
        level: 理解

  # ------ 病句辨析与修改 ------
  病句辨析与修改:
    exam_weight: ★★
    typical_score: 2分
    knowledge_points:
      - name: 语序不当
        level: 掌握
      - name: 搭配不当（主谓/动宾/主宾/修饰语）
        level: 掌握
        exam_note: 北京卷最常考的病句类型
      - name: 成分残缺或赘余
        level: 掌握
      - name: 结构混乱（句式杂糅）
        level: 掌握
      - name: 表意不明（歧义）
        level: 理解
      - name: 不合逻辑
        level: 理解

  # ------ 标点符号 ------
  标点符号:
    exam_weight: ★
    typical_score: 1-2分
    knowledge_points:
      - name: 句号、问号、叹号的正确使用
        level: 掌握
      - name: 逗号、顿号、分号的区分与使用
        level: 掌握
      - name: 冒号、引号的使用规范
        level: 掌握
      - name: 书名号、括号、破折号、省略号的使用
        level: 掌握
        exam_note: 书名号和引号的误用是常见考查点

  # ------ 修辞手法 ------
  修辞手法:
    exam_weight: ★★
    typical_score: 2-3分（融入阅读和写作）
    knowledge_points:
      - name: 比喻（明喻/暗喻/借喻）
        level: 掌握
        exam_note: 最高频的修辞手法考点
      - name: 拟人
        level: 掌握
      - name: 排比
        level: 掌握
      - name: 夸张
        level: 理解
      - name: 对偶
        level: 理解
      - name: 反问、设问
        level: 理解
      - name: 反复
        level: 了解
      - name: 借代
        level: 了解

  # ------ 语句衔接与排序 ------
  语句衔接与排序:
    exam_weight: ★★
    typical_score: 2分
    knowledge_points:
      - name: 语句的连贯（上下文衔接）
        level: 掌握
        exam_note: 根据语境选择恰当句子或排列语句顺序
      - name: 语段的逻辑顺序排列
        level: 运用

  # ------ 文学文化常识 ------
  文学文化常识:
    exam_weight: ★★★
    typical_score: 2-3分
    knowledge_points:
      - name: 课内重要作家及其代表作品
        level: 掌握
        exam_note: 鲁迅、朱自清、老舍、冰心等现代作家必知
      - name: 古代重要作家（朝代、字号、代表作）
        level: 掌握
        exam_note: 李白、杜甫、苏轼、辛弃疾等常考
      - name: 文体常识（记叙文/说明文/议论文/诗歌/小说/散文/戏剧）
        level: 理解
      - name: 古代文化常识（科举制度、称谓礼仪、节日习俗）
        level: 了解
        exam_note: 2022新课标强调传统文化，此项考查趋增
      - name: 重要文学流派与运动
        level: 了解

  # ------ 古诗文默写 ------
  古诗文默写:
    exam_weight: ★★★
    typical_score: 5-6分
    knowledge_points:
      - name: 直接性默写（上下句填空）
        level: 掌握
        exam_note: 给上句写下句或给下句写上句，基础送分
      - name: 理解性默写（根据语境/主题提示默写）
        level: 运用
        exam_note: 北京卷近年以理解性默写为主，难度略高
      - name: 课标规定的61篇古诗文（7-9年级部分）
        level: 掌握
        exam_note: |
          必背篇目包括：
          古诗词：《关雎》《蒹葭》《观沧海》《饮酒》《送杜少府之任蜀州》
          《次北固山下》《使至塞上》《闻王昌龄左迁龙标遥有此寄》
          《行路难》《望岳》《春望》《茅屋为秋风所破歌》《白雪歌送武判官归京》
          《早春呈水部张十八员外》《酬乐天扬州初逢席上见赠》《观刈麦》
          《钱塘湖春行》《雁门太守行》《赤壁》《泊秦淮》《夜雨寄北》
          《无题》《相见欢》《渔家傲》《浣溪沙》《登飞来峰》
          《江城子·密州出猎》《水调歌头》《游山西村》《破阵子》
          《过零丁洋》《天净沙·秋思》《山坡羊·潼关怀古》《己亥杂诗》
          《满江红》《南乡子·登京口北固亭有怀》
          古文：《论语十二章》《陋室铭》《爱莲说》《三峡》《记承天寺夜游》
          《与朱元思书》《送东阳马生序》《马说》《小石潭记》
          《岳阳楼记》《醉翁亭记》《出师表》等
      - name: 名篇名句的准确书写（不出错别字）
        level: 掌握
        exam_note: '默写中写错字不给分，"凄""萋""畔"等易错字须注意'

  # ------ 综合性学习/语言运用 ------
  综合性学习:
    exam_weight: ★★
    typical_score: 2-3分
    knowledge_points:
      - name: 信息提取与概括（给材料概括要点）
        level: 运用
      - name: 图文转换（漫画/表格/图标→文字描述）
        level: 运用
        exam_note: 北京卷近年常考
      - name: 口语交际（劝说/邀请/采访/主持词等）
        level: 运用
      - name: 对联拟写
        level: 了解
        exam_note: 偶考，考查对仗和平仄基础

  # ------ 书法鉴赏 ------
  书法鉴赏:
    exam_weight: ★★★
    typical_score: 2-3分
    knowledge_points:
      - name: 辨识楷书、行书、草书、隶书、篆书五种书体
        level: 掌握
        exam_note: 北京卷近年必考，给出书法作品判断书体
      - name: 分析不同书体的艺术特点
        level: 理解
        exam_note: 如楷书端正工整、行书流畅自然、草书奔放洒脱等
      - name: 结合书法作品内容理解文化内涵
        level: 理解
        exam_note: 常与传统文化综合考查，如名家名帖的文化背景
      - name: 汉字书写的基本审美
        level: 了解
        exam_note: 字体结构、笔画运笔等基本鉴赏能力

# ================================================================
#                 领域二：古诗文阅读
# ================================================================
# 北京中考占比：约18分

古诗文阅读:

  # ------ 文言文阅读 ------
  文言文阅读:
    exam_weight: ★★★
    typical_score: 10-12分
    knowledge_points:
      - name: 常见文言实词（一词多义）
        level: 掌握
        exam_note: 课内150个高频实词须熟练，常考课内迁移课外
      - name: 常见文言虚词（之/而/以/于/其/为/乃/则/然/者）
        level: 掌握
        exam_note: 10个高频虚词的基本用法
      - name: 词类活用（名词作动词/形容词作动词/使动/意动）
        level: 理解
      - name: 古今异义词
        level: 掌握
        exam_note: '"走""去""妻子""交通"等常考'
      - name: 通假字
        level: 掌握
      - name: 文言句式（判断句/省略句/倒装句/被动句）
        level: 理解
      - name: 文言文翻译（直译为主、意译为辅）
        level: 运用
        exam_note: 翻译题一般2-4分，要求字字落实、关键词采分
      - name: 文言文内容理解与概括
        level: 运用
        exam_note: 概括主要内容、人物形象、作者情感
      - name: 课内文言文精读篇目
        level: 掌握
        exam_note: |
          北京必考课内篇目（近5年高频）：
          《出师表》《岳阳楼记》《醉翁亭记》《小石潭记》
          《三峡》《记承天寺夜游》《马说》《送东阳马生序》
          《鱼我所欲也》《曹刿论战》《邹忌讽齐王纳谏》
          《陋室铭》《爱莲说》《桃花源记》
      - name: 课外文言文阅读迁移
        level: 运用
        exam_note: 北京卷通常课内+课外对比阅读，考查知识迁移

  # ------ 古诗词鉴赏 ------
  古诗词鉴赏:
    exam_weight: ★★★
    typical_score: 6分
    knowledge_points:
      - name: 诗歌内容理解（写了什么/叙了什么事/描了什么景）
        level: 理解
      - name: 诗歌意象与意境分析
        level: 理解
        exam_note: '"月""柳""雁""梅"等常见意象的象征意义'
      - name: 诗歌情感/主旨把握
        level: 掌握
        exam_note: 北京卷高频考点，常结合写作背景分析情感
      - name: 诗歌表现手法（借景抒情/托物言志/动静结合/虚实结合/对比/用典）
        level: 理解
      - name: 诗歌语言赏析（炼字/炼句）
        level: 运用
        exam_note: '"赏析某一联/某个字的妙处"是经典题型'
      - name: 诗歌体裁判断（律诗/绝句/词/曲）
        level: 了解
      - name: 诗歌节奏与韵律
        level: 了解

# ================================================================
#                 领域三：现代文阅读
# ================================================================
# 北京中考占比：约22分（不含名著约17分）

现代文阅读:

  # ------ 记叙文/散文阅读 ------
  记叙文阅读:
    exam_weight: ★★★
    typical_score: 15-17分
    knowledge_points:
      - name: 梳理文章思路与结构（线索/顺序/层次）
        level: 掌握
        exam_note: '"梳理情节""概括事件"是必考题型'
      - name: 记叙顺序的判断与作用（顺叙/倒叙/插叙）
        level: 掌握
      - name: 人物描写方法（外貌/语言/动作/心理/神态/细节）
        level: 掌握
        exam_note: 分析人物描写的表达效果是高频题
      - name: 环境描写的作用
        level: 掌握
        exam_note: 渲染气氛/烘托心情/推动情节/暗示主题等
      - name: 关键词句的含义与表达效果
        level: 运用
        exam_note: '"理解画线句的含义"几乎每年必考'
      - name: 人物形象分析
        level: 运用
        exam_note: 需结合具体内容概括+分析，不能空洞
      - name: 文章主旨/情感的把握
        level: 运用
      - name: 标题的含义与作用
        level: 掌握
        exam_note: 表层含义+深层含义+结构作用
      - name: 开头/结尾段的作用分析
        level: 掌握
      - name: 散文的特点（形散神聚/线索/意境）
        level: 理解
      - name: 小说三要素（人物/情节/环境）
        level: 理解
      - name: 表达方式（记叙/描写/抒情/议论/说明的辨识与作用）
        level: 掌握

  # ------ 说明文阅读 ------
  说明文阅读:
    exam_weight: ★★
    typical_score: 与议论文二选一，约5-7分
    knowledge_points:
      - name: 说明对象及其特征
        level: 掌握
      - name: 说明顺序（时间/空间/逻辑）
        level: 掌握
      - name: 说明方法（举例子/列数字/作比较/打比方/分类别/下定义/摹状貌/引资料）
        level: 掌握
        exam_note: '"文中使用了什么说明方法，有什么作用"是经典题'
      - name: 说明文语言的准确性
        level: 运用
        exam_note: '"能否删去/替换某个词"是必考题型'
      - name: 说明文的结构（总分/总分总/分总/并列/递进）
        level: 理解
      - name: 信息筛选与概括
        level: 掌握

  # ------ 议论文阅读 ------
  议论文阅读:
    exam_weight: ★★
    typical_score: 与说明文二选一，约5-7分
    knowledge_points:
      - name: 中心论点的提炼
        level: 掌握
        exam_note: 论点一般在标题/开头/结尾，需用陈述句表达
      - name: 论据的类型（事实论据/道理论据）及其作用
        level: 掌握
      - name: 论证方法（举例论证/道理论证/比喻论证/对比论证）
        level: 掌握
        exam_note: 分析论证方法及其作用是高频题
      - name: 论证结构（提出问题—分析问题—解决问题/总分/并列/层进/对比）
        level: 理解
      - name: 议论文语言的严密性
        level: 理解
      - name: 补写论据
        level: 运用
        exam_note: 根据论点补写恰当的事实或道理论据

  # ------ 名著阅读 ------
  名著阅读:
    exam_weight: ★★★
    typical_score: 5分
    knowledge_points:
      - name: 课标推荐必读名著的基本信息（作者/体裁/主要内容）
        level: 掌握
        exam_note: |
          北京中考必读名著（12部）：
          《朝花夕拾》（鲁迅）、《西游记》（吴承恩）、
          《骆驼祥子》（老舍）、《海底两万里》（凡尔纳）、
          《红星照耀中国》（埃德加·斯诺）、《昆虫记》（法布尔）、
          《傅雷家书》（傅雷）、《钢铁是怎样炼成的》（奥斯特洛夫斯基）、
          《艾青诗选》（艾青）、《水浒传》（施耐庵）、
          《儒林外史》（吴敬梓）、《简·爱》（夏洛蒂·勃朗特）
      - name: 主要人物形象分析
        level: 掌握
        exam_note: 骆驼祥子、孙悟空、保尔·柯察金等是高频考点
      - name: 经典情节梳理（能说出关键情节）
        level: 掌握
        exam_note: 近年考查趋向深入，不只是"知道"而是"理解"
      - name: 主题思想与艺术特色
        level: 理解
      - name: 阅读方法与阅读体验（读书笔记/批注/推荐语）
        level: 运用
        exam_note: 北京卷近年创新题型，考查真实阅读体验

# ================================================================
#                 领域四：写作
# ================================================================
# 北京中考占比：40分

写作:

  # ------ 命题/半命题作文 ------
  命题作文:
    exam_weight: ★★★
    typical_score: 40分（二选一）
    knowledge_points:
      - name: 审题能力（准确理解题目含义与要求）
        level: 运用
        exam_note: 北京卷近年题目开放度较高，注意把握题眼
      - name: 立意（中心明确、立意深刻）
        level: 运用
      - name: 选材（真实/新颖/典型/与立意匹配）
        level: 运用
        exam_note: 关注生活、有真情实感是北京卷评分重点
      - name: 结构安排（开头/过渡/照应/结尾）
        level: 掌握
      - name: 详略得当（重点段落要充分展开）
        level: 掌握
      - name: 语言表达（通顺/生动/有文采）
        level: 运用
      - name: 规范书写与卷面整洁
        level: 掌握
        exam_note: 书写和卷面占隐性评分因素

  # ------ 想象/创意写作 ------
  想象写作:
    exam_weight: ★★★
    typical_score: 40分（二选一）
    knowledge_points:
      - name: 想象类作文（给情境续写/改写/创编故事）
        level: 运用
        exam_note: 北京卷近年常考想象类题目，2022新课标强调创意表达
      - name: 情境化写作（给定真实生活情境完成写作任务）
        level: 运用
      - name: 记叙文写作（叙事完整/人物鲜活/细节生动）
        level: 运用
      - name: 议论文写作基础（论点+论据+论证）
        level: 掌握
        exam_note: 初中以记叙文为主，议论文偶尔可选

  # ------ 写作评分标准 ------
  scoring_criteria:
    knowledge_points:
      - name: 一类文（36-40分）标准
        level: 了解
        exam_note: 立意深刻、选材精当、结构严谨、语言生动、有真情实感
      - name: 二类文（30-35分）标准
        level: 了解
        exam_note: 立意明确、选材合理、结构完整、语言通顺
      - name: 三类文（24-29分）标准
        level: 了解
        exam_note: 基本切题、内容一般、结构基本完整
      - name: 四类文（24分以下）标准
        level: 了解
        exam_note: 偏题/内容空洞/结构混乱/语病较多

