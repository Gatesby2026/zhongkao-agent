# ============================================================
# 北京中考语文 — 题型分布与历年对比
# ============================================================
# 数据来源：2021-2025年北京中考语文真题逐题分析
# 最后更新：2026-04-12

subject: 语文
region: 北京市
full_score: 100
structure: "基础·运用(约15分) + 古诗文阅读(约18分) + 名著阅读(约5分) + 现代文阅读(约22分) + 写作(40分)"
structure_note: 2021-2025五年结构高度稳定，各板块分值浮动不超过2分

# ------ 历年题型结构对比 ------
yearly_comparison:
  - year: 2021
    full_score: 100
    total_questions: 约25小题
    基础·运用: 约14分
    古诗文阅读: 约18分
    名著阅读: 约5分
    现代文阅读: 约23分
    写作: 40分
    notable_changes: 名著阅读首次出现"阅读体验"类主观题

  - year: 2022
    full_score: 100
    total_questions: 约24小题
    基础·运用: 约15分
    古诗文阅读: 约17分
    名著阅读: 约5分
    现代文阅读: 约23分
    写作: 40分
    notable_changes: 双减后首次中考，整体难度略降；作文题二为想象类作文（与冬奥相关）

  - year: 2023
    full_score: 100
    total_questions: 约25小题
    基础·运用: 约16分
    古诗文阅读: 约17分
    名著阅读: 约5分
    现代文阅读: 约22分
    写作: 40分
    notable_changes: 非连续性文本阅读首次以多材料+图表形式出现；理解性默写占比进一步增加

  - year: 2024
    full_score: 100
    total_questions: 约25小题
    基础·运用: 约15分
    古诗文阅读: 约18分
    名著阅读: 约5分
    现代文阅读: 约22分
    写作: 40分
    notable_changes: 文言文对比阅读加入课外短文；古诗鉴赏考查"炼字"能力

  - year: 2025
    full_score: 100
    total_questions: 约25小题
    基础·运用: 约15分
    古诗文阅读: 约18分
    名著阅读: 约5分
    现代文阅读: 约22分
    写作: 40分
    notable_changes: 综合性学习融入传统文化主题；记叙文阅读难度偏高

# ------ 题号与知识点的稳定对应关系 ------
# 基于2021-2025五年真题统计

typical_question_map:

  基础·运用:
    - question: 1
      typical_topic: 字音字形辨析
      frequency: 5/5
      difficulty: 基础
      form: 选择题
      note: 每年必考，考查课标常用字表中的易错读音和字形

    - question: 2
      typical_topic: 词语/成语使用
      frequency: 5/5
      difficulty: 基础
      form: 选择题
      note: 在语境中辨析词语的恰当使用

    - question: 3
      typical_topic: 病句辨析 / 语句衔接
      frequency: 5/5
      difficulty: 基础
      form: 选择题
      note: 2021-2023考病句，2024-2025转向语句衔接排序

    - question: 4
      typical_topic: 文学常识/文化常识
      frequency: 5/5
      difficulty: 基础
      form: 选择题
      note: 作者-作品-朝代对应，或古代文化常识判断

    - question: 5
      typical_topic: 古诗文默写
      frequency: 5/5
      difficulty: 基础
      form: 填空题
      score: 5-6分
      note: 以理解性默写为主（给语境提示），约5-6空

    - question: 6
      typical_topic: 综合性学习/语言运用
      frequency: 5/5
      difficulty: 基础-中档
      form: 主观题
      note: 信息概括/图文转换/拟写标语或邀请函等实用文体

  古诗文阅读:
    - question: 7-8
      typical_topic: 文言文实词/虚词
      frequency: 5/5
      difficulty: 基础
      form: 选择题
      note: 解释加点词含义或辨析虚词用法

    - question: 9
      typical_topic: 文言文句子翻译
      frequency: 5/5
      difficulty: 基础-中档
      form: 主观题
      score: 2-4分
      note: 翻译1-2个句子，关键词逐一采分

    - question: 10-11
      typical_topic: 文言文内容理解与分析
      frequency: 5/5
      difficulty: 中档
      form: 主观题
      note: 概括文章主旨/分析人物品质/比较课内外异同

    - question: 12-13
      typical_topic: 古诗词鉴赏
      frequency: 5/5
      difficulty: 中档
      form: 主观题
      score: 约6分
      note: |
        典型题型：
        1. 诗歌内容/画面描绘（2-3分）
        2. 情感/手法/炼字赏析（3-4分）
        高频考查篇目：《望岳》《春望》《水调歌头》《破阵子》
        《过零丁洋》《行路难》《饮酒》等

  名著阅读:
    - question: 14-15
      typical_topic: 名著人物/情节/主题
      frequency: 5/5
      difficulty: 基础-中档
      form: 填空+主观题
      score: 约5分
      note: |
        近5年高频考查名著：
        2021: 《骆驼祥子》+《红星照耀中国》
        2022: 《西游记》+《朝花夕拾》
        2023: 《水浒传》+《钢铁是怎样炼成的》
        2024: 《儒林外史》+《海底两万里》
        2025: 《骆驼祥子》+《艾青诗选》
        趋势：每年轮换2部，12部均需准备

  现代文阅读:
    - question: 16-20
      typical_topic: 记叙文/散文阅读
      frequency: 5/5
      difficulty: 中档-较难
      form: 主观题为主
      score: 15-17分
      note: |
        稳定5题模式：
        Q16: 内容梳理/情节概括（3分）—— 填表或简答
        Q17: 关键词句含义/表达效果（3-4分）
        Q18: 人物描写方法/手法分析（3-4分）
        Q19: 主旨/情感/标题含义（3-4分）
        Q20: 开放探究题（联系实际/拓展思考，2-3分）
        是全卷区分度最高的板块

    - question: 21-23
      typical_topic: 说明文/议论文阅读（或非连续性文本）
      frequency: 5/5
      difficulty: 基础-中档
      form: 选择+主观题
      score: 5-7分
      note: |
        近年趋势：
        2021-2022: 传统说明文（单篇）
        2023-2025: 非连续性文本（多材料+图表）
        典型题型：
        Q21: 信息筛选/判断正误（2分，选择题）
        Q22: 说明方法/论证方法及作用（2-3分）
        Q23: 内容理解/语言分析（2分）

  写作:
    - question: 24
      typical_topic: 作文（二选一）
      frequency: 5/5
      difficulty: 中档-较难
      form: 记叙文/想象文
      score: 40分
      note: |
        近5年作文题回顾：
        2021: ①"共和国，我为你拍照" ②"我的一天（2049年）"
        2022: ①"我创造了新纪录" ②"那个星期天"（想象+冬奥情境）
        2023: ①"我读到了_____的滋味" ②与名著人物对话（想象）
        2024: ①"北京，我的___" ②重回历史现场（想象）
        2025: ①"那一刻，我懂了" ②未来世界（想象）
        趋势：题目一偏写实，题目二偏想象；均贴近学生生活

# ------ 各分数段得分策略 ------
score_targets:

  - target: 60分（及格）
    guaranteed:
      - "基础·运用：字音字形+词语+文学常识（6分）"
      - "默写：写对3-4空（3-4分）"
      - "文言文：实词虚词选择题（4分）"
      - "名著：基本信息题（2-3分）"
      - "作文：完成600字以上，基本切题（24-28分）"
    subtotal: 约39-45分确定
    additional: "记叙文阅读部分步骤分(5-8分) + 说明文/议论文部分(3分)"
    total: 约55-60分

  - target: 80分（良好）
    additional_on_60:
      - "默写全对（+2分）"
      - "病句/衔接选择题（+2分）"
      - "综合性学习（+2分）"
      - "文言文翻译和内容理解（+6分）"
      - "古诗鉴赏（+4分）"
      - "名著深度理解（+2分）"
      - "记叙文阅读大部分题目（+10分）"
      - "作文达到二类文水平（30-35分，+5分）"
    total: 约78-82分

  - target: 90分（优秀）
    additional_on_80:
      - "基础·运用全对（+2分）"
      - "古诗文阅读接近满分（+3分）"
      - "记叙文阅读深层理解到位（+3分）"
      - "说明文/议论文接近满分（+2分）"
      - "作文冲击一类文（36-38分，+3分）"
    total: 约90-93分

  - target: 95+分（拔尖）
    additional: "所有客观题全对 + 主观题表述精准完整 + 作文38+分"
    note: 语文95+极难，主观题和作文的天花板效应明显，全市95+比例远低于数学

# ------ 核心趋势 ------
key_insights:
  - 五大板块结构连续5年稳定，各板块分值浮动不超过2分
  - 基础·运用是最稳定的送分区，全对率较高
  - 古诗文默写以理解性默写为主，区分度高于直接默写
  - 文言文阅读由"纯课内"转向"课内+课外对比"，迁移能力是关键
  - 记叙文/散文阅读是全卷区分度最高板块，每年分差最大
  - 名著阅读深度逐年增加，不能只背情节梗概
  - 作文二选一中想象类已成标配，选写比约4:6（多数选想象）
  - 非连续性文本阅读是2023年后的新增稳定题型
  - 语文高分（90+）瓶颈在记叙文深层理解和作文，不在基础
