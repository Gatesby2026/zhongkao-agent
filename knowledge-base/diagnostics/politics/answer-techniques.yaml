# ============================================================
# 诊断标准：材料分析答题技巧（审题/定位/组织语言/翻书技巧）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试（可带教材进考场）
# 题型结构：20道单选(40分) + 6道非选择题(40分)

module: 材料分析答题技巧
subject: 道德与法治
covers:
  - 审题技巧（读设问→圈关键词→判断题型→确定范围）
  - 翻书定位（目录检索/便签标记/快速翻阅）
  - 答题模板（是什么-为什么-怎么做/主体分析法/层次递进法）
  - 语言组织（教材术语+材料信息+逻辑连接）
  - 非选择题通用技巧（分点作答/多角度/卡字数）
exam_weight: 贯穿非选择题40分（6道材料分析题全部涉及）
typical_questions: 所有非选择题均需要运用这些技巧
open_book_note: |
  这是开卷考试最核心的能力模块。开卷≠不用复习，
  真正的挑战在于：90分钟内完成20道选择+6道非选择，
  留给翻书和思考的时间非常有限。
  翻书速度和答题模板直接决定非选择题的得分。

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 不知道怎么审题、怎么翻书、怎么组织答案
    signals:
      - 拿到材料题不知道从哪里入手
      - 审题时抓不住关键词，不知道题目在问什么
      - 翻书漫无目的，经常翻错书或翻错章节
      - 答题要么照抄材料，要么照抄教材，没有自己的分析
      - 答案不分点，一大段话写在一起
      - 答题时间严重不够，经常做不完
    diagnostic_questions:
      - question: |
          材料：北京市某中学开展"宪法宣传周"活动，组织学生参观法治教育基地，
          举办模拟法庭，邀请法官进校园讲座。
          问题：运用所学知识，分析该校开展这些活动的意义。
        expected: |
          ①有利于增强学生的法治意识和宪法意识（法治角度）
          ②有利于培养学生的法治精神，做知法守法用法的好公民（公民角度）
          ③有利于推进依法治国，建设社会主义法治国家（国家角度）
          ④有利于学校落实立德树人根本任务（学校角度）
        L0_typical_error: "只写'让学生了解法律'一句话，不分点，不分角度"
      - question: "你拿到上面这道题后，第一步应该做什么？"
        expected: "先读设问，圈出关键词'宪法宣传周''意义'，判断题型为'意义类'，确定翻书范围为'法治/宪法'相关章节"
        L0_typical_error: "先读材料，读完不知道该怎么答"

  - id: L1
    name: 概念模糊
    description: 知道要分点答题但审题不准、翻书慢、答不到采分点
    signals:
      - 知道要先看设问但关键词抓不准
      - 翻书能翻到大概章节但找不到具体知识点
      - 答题知道分点但角度重复或遗漏
      - 教材原话和自己的话混在一起，不够规范
      - 材料信息利用不充分，经常忽略材料中的关键细节
      - 答题时间紧张，最后1-2题写得很潦草
    diagnostic_questions:
      - question: |
          材料：某地政府投入资金改善农村教育条件，新建学校、培训教师、
          提供免费午餐，让农村孩子享受优质教育。
          问题：(1)上述做法体现了什么发展理念？(2)请从权利角度分析其意义。
        expected: |
          (1)共享发展理念（成果由人民共享）+ 协调发展理念（城乡协调）
          (2)保障了公民的受教育权；体现了权利公平；有利于实现教育公平和社会公平正义
        L1_typical_error: "(1)只答出一个理念；(2)能提到受教育权但'权利公平''社会公平正义'等延伸角度答不出"
      - question: "非选择题中'运用所学知识分析'和'谈谈你的认识'有什么区别？"
        expected: "'运用所学知识分析'要求用教材知识点结合材料分析；'谈谈认识'可以更开放，但也需要教材知识点支撑"
        L1_typical_error: "不区分题型，所有题都用同一种方式回答"

  - id: L2
    name: 基本熟练
    description: 审题较准，翻书较快，有基本的答题模板，但不够全面
    signals:
      - 审题能抓住关键词并判断题型
      - 翻书30-60秒内定位到知识点
      - 掌握2-3种答题模板
      - 能分点作答且角度较清晰
      - 有时会遗漏1-2个采分角度
      - 材料信息利用较好但偶有遗漏
      - 时间基本够用但不宽裕
    diagnostic_questions:
      - question: |
          材料：2025年北京推进"接诉即办"改革，12345热线解决群众诉求，
          小区加装电梯、增设停车位、改善物业服务...
          问题：(1)运用国情知识分析"接诉即办"的制度优势
                (2)作为北京中学生，你能为社区治理做什么？
        expected: |
          (1)①体现人民当家作主②基层群众自治制度③以人民为中心的发展思想④共享发展理念⑤社会治理创新
          (2)①积极参与社区志愿服务②为社区建设建言献策③遵守社区规则④学习法律知识，依法维权
        L2_response: "(1)能答出3-4个角度；(2)能答出2-3条但缺少'建言献策'或'依法维权'的角度"
      - question: "请展示你的答题流程（从拿到试卷到写完答案）"
        expected: "①通读设问→②圈关键词→③判断题型和知识范围→④快速翻书定位→⑤列答题提纲→⑥分点规范作答→⑦检查有无遗漏角度"
        L2_response: "能说出主要步骤但'列提纲'和'检查遗漏'环节容易跳过"

  - id: L3
    name: 熟练精通
    description: 审题精准，翻书极快，答题全面规范，时间充裕
    signals:
      - 10秒内完成审题并确定翻书方向
      - 翻书15-20秒内定位到知识点（常考知识点已无需翻书）
      - 掌握多种答题模板并灵活运用
      - 答题角度全面，不遗漏采分点
      - 教材术语+材料分析+逻辑连接流畅自然
      - 每道非选择题控制在5-6分钟内完成
      - 整张试卷有余裕时间检查
    pass_standard: 非选择题总分40分得到34分以上（85%）

# ------ 题型分类与对应模板 ------
question_types:

  意义类:
    设问特征: "'有什么意义''有什么作用''有什么影响'"
    answer_template: |
      多主体/多角度分析：
      ①对个人：有利于... ②对社会：有利于... ③对国家：有利于...
      或者：经济意义+政治意义+文化意义+生态意义
    common_error: "只从一个主体角度回答"

  原因类:
    设问特征: "'为什么''原因是什么''请说明理由'"
    answer_template: |
      理论依据+现实意义：
      ①这样做是因为...（教材原理）②这样做有利于...（现实作用）③不这样做会...（反面论证）
    common_error: "只说教材原理不结合材料"

  做法类:
    设问特征: "'怎么做''你有什么建议''如何''请提出建议'"
    answer_template: |
      分主体回答：
      ①国家/政府：完善制度/加强监管/... ②社会：营造氛围/加强宣传/...
      ③学校：开展教育/... ④个人/青少年：提高意识/积极参与/...
    common_error: "建议太空洞，缺少具体措施"

  认识类:
    设问特征: "'谈谈认识''怎么看''你怎么理解'"
    answer_template: |
      是什么+为什么+怎么做：
      ①是什么：这件事/现象是...（定性判断）
      ②为什么：因为...所以...（教材原理支撑）
      ③怎么做：应该...（具体行动方向）
    common_error: "只有观点没有论证"

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, topic: 简单意义类非选择题, score: 4, note: 角度明确的基础题 }
      - { year: 2024, topic: 做法类非选择题, score: 4 }
    should_struggle:
      - { year: 2025, topic: 多角度综合分析题 }

  L2:
    must_solve:
      - { year: 2025, topic: 多角度材料分析题, score: 6-8 }
      - { year: 2024, topic: 综合材料分析题, score: 6-8 }
    should_struggle:
      - { year: 2025, topic: 最后一道综合大题（多材料多设问） }

  L3:
    must_solve:
      - { year: 2025, topic: 综合大题全部, score: 40, note: 6道非选择题总分 }
    pass_standard: 非选择题总得分率≥85%

# ------ 翻书技巧专项 ------
book_flipping_skills:

  preparation:
    - 考前在教材上做好便签标记（每课一个标签，写上关键词）
    - 在目录页用荧光笔标出高频考点对应的课次
    - 准备一张A4纸的"知识点速查表"（教材允许夹带自制笔记）
    - 按主题给教材分区（如用不同颜色便签区分法律/道德/国情/时政）

  exam_strategy:
    - 先做选择题（不翻书，凭记忆做，25分钟内完成）
    - 非选择题先通读所有设问，规划翻书顺序（避免反复翻同一本书）
    - 同一本书的相关题目集中翻，减少换书次数
    - 翻到知识点后先在试卷上标注页码，全部定位完再集中作答
    - 每道非选择题翻书时间控制在1分钟内

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立基本的审题和答题意识
    estimated_hours: 6-8
    key_tasks:
      - 学习"先读设问再读材料"的审题顺序
      - 背诵四种基本题型的答题模板
      - 练习给教材做便签标记（每课一个标签）
      - 每天做1道非选择题，写完后对照答案分析差距

  L1_to_L2:
    focus: 提高翻书速度 + 答题角度全面性
    estimated_hours: 8-10
    key_tasks:
      - '翻书计时训练：随机出题→1分钟内翻到→记录用时'
      - '"角度清单"训练：读设问→先列出所有可能角度→再翻书验证'
      - 做近5年真题非选择题，严格按评分标准给自己打分
      - '制作"高频知识点-页码"速查表'

  L2_to_L3:
    focus: 速度+全面性+规范性同步提升
    estimated_hours: 6-8
    key_tasks:
      - '全真模拟：90分钟完成整张试卷（含翻书），记录各部分用时'
      - '非选择题限时训练：每题5分钟（含翻书+作答）'
      - '"多一个角度"训练：写完答案后强迫自己再想一个角度'
      - 海淀西城一模二模非选择题精练，对照满分答案找差距
