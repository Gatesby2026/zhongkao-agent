# ============================================================
# 诊断标准：时政热点（党的二十大/科技成就/生态文明/共同富裕）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试（可带教材进考场）
# 题型结构：20道单选(40分) + 6道非选择题(40分)

module: 时政热点
subject: 道德与法治
covers:
  - 党的二十大精神（中国式现代化/全过程人民民主/中华民族伟大复兴）
  - 科技成就（科教兴国/创新驱动/科技自立自强）
  - 生态文明（绿水青山就是金山银山/碳达峰碳中和/美丽中国）
  - 共同富裕（脱贫攻坚/乡村振兴/民生保障）
  - 年度重大时事（2025年4月-2026年3月）
exam_weight: 约15分（选择题6-8分 + 非选择题材料背景涉及8-10分）
typical_questions: 选择题3-4题 + 非选择题中的材料背景
open_book_note: |
  时政热点是开卷考中最不能依赖翻书的模块——教材不会有最新时事。
  需要考前积累时政素材，考试时能将时事与教材知识点对应。
  北京中考时政范围通常为上年4月至当年3月的国内外重大事件。

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 不关注时事新闻，对重大事件几乎不了解
    signals:
      - 不知道党的二十大提出了什么
      - 说不出近一年的任何一项国家重大成就
      - 不理解"中国式现代化"是什么意思
      - 完全没有时政素材积累
      - 看到时政材料题直接放弃
    diagnostic_questions:
      - question: "党的二十大报告的主题是什么？"
        expected: "高举中国特色社会主义伟大旗帜，全面贯彻新时代中国特色社会主义思想，弘扬伟大建党精神..."
        L0_typical_error: "完全不知道，或混淆二十大和十九大"
      - question: "请说出2025年我国的一项重大科技成就"
        expected: "能说出具体的科技成就（如航天、芯片、AI等领域）"
        L0_typical_error: "一个都说不出来"
      - question: "'绿水青山就是金山银山'体现了什么理念？"
        expected: "绿色发展理念/生态文明建设/可持续发展"
        L0_typical_error: "知道是关于环保的但说不出规范表述"

  - id: L1
    name: 概念模糊
    description: 知道一些时事但不能与教材知识点对应
    signals:
      - 知道一些大事件但细节模糊
      - 看到时政材料不知道该联系教材哪个知识点
      - 时政术语使用不准确
      - 有一些素材积累但不系统
      - 选择题能排除明显错误选项但容易在相近选项间犹豫
    diagnostic_questions:
      - question: "我国推进碳达峰碳中和目标体现了哪些教材知识点？"
        expected: "绿色发展理念+可持续发展战略+人与自然和谐共生+负责任大国形象"
        L1_typical_error: "只能说到'环保'和'绿色发展'，想不到更多角度"
      - question: "乡村振兴战略与教材中哪些知识点相关？"
        expected: "共同富裕+协调发展理念+共享发展理念+社会主要矛盾（不平衡不充分）"
        L1_typical_error: "只说'发展农村'，不能准确对应教材知识点"
      - question: "中国空间站全面建成体现了什么？"
        expected: "科教兴国战略+创新驱动发展战略+自主创新能力提升+综合国力增强+社会主义制度优越性"
        L1_typical_error: "只说'科技发展'，角度单一"

  - id: L2
    name: 基本熟练
    description: 有系统的时政素材积累，能建立时事与教材的对应关系
    signals:
      - 选择题正确率80%以上
      - 能将时政材料与2-3个教材知识点对应
      - 时政术语使用基本准确
      - 有时政笔记本或素材本
      - 非选择题中时政部分能得大部分分但不够全面
    diagnostic_questions:
      - question: "材料：2025年北京举办世界机器人大会... 从多角度分析其意义"
        expected: "创新发展理念+科教兴国+对外开放+文化交流+首都功能定位等多角度"
        L2_response: "能答出3个角度，可能遗漏'首都功能定位'这个北京特色角度"
      - question: "如何理解'中国式现代化'？请结合教材知识分析其特征"
        expected: "人口规模巨大+全体人民共同富裕+物质文明和精神文明相协调+人与自然和谐共生+走和平发展道路"
        L2_response: "能答出3-4个特征但可能不够完整"

  - id: L3
    name: 熟练精通
    description: 时政素材丰富，能从多角度深入分析，答题全面规范
    signals:
      - 时政选择题秒答，正确率95%以上
      - 能从4-5个角度分析时政材料
      - 善于发现材料中的"北京元素"并结合首都特色作答
      - 时政素材积累充分且有分类整理
      - 能将最新时事与教材知识点灵活对应
    pass_standard: 时政热点部分得分率90%以上（约13-14/15分）

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, topic: 时政常识·选择题, score: 2, note: 基本时事识记 }
      - { year: 2024, topic: 科技成就·选择题, score: 2 }
      - { year: 2023, topic: 二十大精神·选择题, score: 2 }
    should_struggle:
      - { year: 2025, topic: 时政+教材结合·材料分析 }

  L2:
    must_solve:
      - { year: 2025, topic: 时政综合分析, score: 6 }
      - { year: 2024, topic: 生态文明·材料分析, score: 6 }
      - { year: 2023, topic: 科技创新·材料分析, score: 6 }
    should_struggle:
      - { year: 2025, topic: 多角度深入分析题 }

  L3:
    must_solve:
      - { year: 2025, topic: 综合时政分析, score: 8 }
      - { year: 2024, topic: 综合时政分析, score: 8 }
    pass_standard: 时政选择题全对 + 非选择题中时政关联部分得分率≥85%

# ------ 各子模块细分诊断 ------
sub_modules:

  党的二十大精神:
    L0_signal: "不知道二十大是什么时候开的、讲了什么"
    L1_signal: "知道大概但'中国式现代化'的五个特征说不全"
    L2_signal: "核心精神掌握，能结合材料分析"
    L3_signal: "能灵活运用二十大精神分析各类材料"
    key_diagnostic: "中国式现代化与西方现代化有什么不同？"

  科技成就:
    L0_signal: "说不出任何一项近年重大科技成就"
    L1_signal: "知道一些成就但不能对应教材知识点"
    L2_signal: "能将科技成就与科教兴国、创新驱动等知识点结合"
    L3_signal: "多角度分析科技成就的意义"
    key_diagnostic: "列举两项我国近年科技成就，并分析其体现的教材知识点"

  生态文明:
    L0_signal: "'两山理论'没听说过"
    L1_signal: "知道概念但生态文明制度体系不清楚"
    L2_signal: "能从绿色发展、可持续发展等角度分析"
    L3_signal: "能结合碳达峰碳中和等最新政策全面分析"
    key_diagnostic: "为什么说'绿水青山就是金山银山'？请结合教材知识分析"

  共同富裕:
    L0_signal: "不理解共同富裕的含义"
    L1_signal: "知道概念但不清楚与脱贫攻坚、乡村振兴的关系"
    L2_signal: "能从社会主要矛盾、共享发展等角度分析"
    L3_signal: "能深入分析共同富裕的实现路径和制度保障"
    key_diagnostic: "共同富裕不是同时富裕，也不是同等富裕——请解释这句话"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立基本时政素养，了解重大事件
    estimated_hours: 6-8
    key_tasks:
      - 阅读"时政热点一本通"或教师整理的时政资料
      - 了解党的二十大核心内容（中国式现代化五个特征必背）
      - 整理近一年10件国内大事，每件一句话总结
      - 每天看5分钟新闻联播或学习强国APP

  L1_to_L2:
    focus: 建立"时事-教材"对应关系
    estimated_hours: 6-8
    key_tasks:
      - 制作"时政-知识点对照表"：每个热点对应哪些教材知识点
      - 练习"一材多用"：同一个时政材料从3个以上角度分析
      - 做近5年真题中的时政类题目
      - 五三道法·时政专题训练

  L2_to_L3:
    focus: 多角度深入分析 + 北京特色
    estimated_hours: 4-6
    key_tasks:
      - 关注北京本地时政（中轴线申遗、城市副中心建设、接诉即办等）
      - 材料分析"角度穷举"训练：每题至少找4个角度
      - 海淀西城一模二模时政大题限时精练
      - 预测2026中考可能考的时政热点并提前准备
