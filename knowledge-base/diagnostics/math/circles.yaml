# ============================================================
# 诊断标准：圆
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 圆
subject: 数学
covers:
  - 圆的基本概念（圆心/半径/直径/弦/弧）
  - 垂径定理
  - 圆心角与圆周角
  - 直线与圆的位置关系
  - 切线的判定与性质
  - 弧长与扇形面积
exam_weight: ★★
typical_score: 6-8分（北京中考）
typical_questions: 选择/填空1题 + 解答题1题

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 圆的基本定理记不住，圆心角和圆周角分不清
    signals:
      - 垂径定理说不出来
      - 圆心角和圆周角的关系不知道
      - 切线的概念模糊（和弦混淆）
      - 弧长公式和扇形面积公式记不住
    diagnostic_questions:
      - question: "圆心角为60°，半径为6，对应的弧长是？"
        expected: "弧长 = 60/360 × 2π×6 = 2π"
        L0_typical_error: "公式记不住或分数计算出错"
      - question: "直径所对的圆周角是多少度？"
        expected: "90°"
        L0_typical_error: "说成180°（那是圆心角）"

  - id: L1
    name: 定理记得住，不会用
    description: 能背出定理但在具体题目中不知道什么时候用
    signals:
      - 垂径定理能说出来但遇到题目不知道怎么用
      - 知道"切线⊥半径"但证明切线时找不到切入点
      - 弧长和扇形面积的计算偶尔出错
      - 圆与三角形结合的题目做不了
    diagnostic_questions:
      - question: "AB是圆O的直径，C是圆上一点，∠CAB=35°，求∠B"
        expected: "∠ACB=90°（直径所对圆周角），∠B=90°-35°=55°"
        L1_typical_error: "忘记用'直径所对圆周角=90°'这个关键条件"
      - question: "PA是⊙O的切线，A是切点，PO交⊙O于B，PA=8，PB=4，求⊙O半径"
        expected: "PA⊥OA，设r，PO=4+r，PA²+OA²=PO²，64+r²=(4+r)²，解得r=6"
        L1_typical_error: "不知道PA⊥OA（切线性质），或方程列错"

  - id: L2
    name: 基本熟练
    description: 常规圆的题目能做，但圆与其他知识的综合有困难
    signals:
      - 垂径定理、圆周角定理运用自如
      - 切线的判定和性质证明能完成
      - 弧长和扇形面积计算准确
      - 圆+三角形+四边形的综合问题有困难
    diagnostic_questions:
      - question: "AB是⊙O的弦，OC⊥AB于D，AB=8，OC=5，求⊙O半径"
        expected: "垂径定理：AD=DB=4，OD=√(r²-16)，OC=5即OD+DC=5或OD=5-DC，视图形而定，r=5（如果O在弦同侧）"
        L2_response: "能正确运用垂径定理求解"

  - id: L3
    name: 熟练精通
    description: 圆的各类题型准确快速，综合问题能处理
    signals:
      - 圆相关选择填空秒解
      - 切线证明题书写规范、步骤完整
      - 圆与三角形的综合问题能独立完成
    pass_standard: 中考圆相关题目全对

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 记牢核心定理
    estimated_hours: 6-8
    key_tasks:
      - 每天默写3大定理（垂径/圆心角与圆周角/切线性质）
      - 弧长和扇形面积公式各做10道计算题
      - 画图辅助理解（画各种位置的圆心角和圆周角，标注关系）

  L1_to_L2:
    focus: 定理的运用 + 切线证明
    estimated_hours: 6-8
    key_tasks:
      - 垂径定理应用题专练（弦长、弦心距、半径的互求）
      - 切线证明两种方法（已知切点→连半径证垂直 / 已知垂直→证过切点）
      - 中考真题圆的解答题精练

  L2_to_L3:
    focus: 综合题
    estimated_hours: 4-5
    key_tasks:
      - 圆+三角形综合题专练
      - 圆+坐标系综合题
      - 模考真题圆的部分精练
