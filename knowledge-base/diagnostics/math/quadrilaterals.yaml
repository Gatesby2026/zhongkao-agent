# ============================================================
# 诊断标准：四边形（平行四边形/矩形/菱形/正方形）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 四边形
subject: 数学
covers:
  - 多边形内角和/外角和
  - 平行四边形的性质与判定（5种）
  - 矩形的性质与判定
  - 菱形的性质与判定
  - 正方形的性质与判定
  - 中点四边形
exam_weight: ★★
typical_score: 4-8分（北京中考）
typical_questions: 选择/填空1题 + 解答题中的几何证明

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 各种四边形的性质分不清，判定方法混乱
    signals:
      - 平行四边形、矩形、菱形、正方形的性质区分不开
      - 不知道平行四边形有5种判定方法
      - "对角线互相平分"是哪种四边形的性质？答不上来
      - 内角和公式 (n-2)×180° 不会用
    diagnostic_questions:
      - question: "平行四边形的对角线有什么性质？"
        expected: "对角线互相平分"
        L0_typical_error: "说成'对角线相等'（那是矩形）或'对角线互相垂直'（那是菱形）"
      - question: "六边形的内角和是多少？"
        expected: "(6-2)×180° = 720°"
        L0_typical_error: "公式记不住或代入出错"

  - id: L1
    name: 性质记得住，判定不会用
    description: 能背出各四边形的性质，但证明题不知道怎么用判定方法
    signals:
      - 性质能说出来但容易张冠李戴
      - 知道"对角线互相平分→平行四边形"但不知道在题目中怎么用
      - 证明一个四边形是矩形的完整步骤写不出
      - 性质和判定方向分不清（用成了循环论证）
    diagnostic_questions:
      - question: "已知□ABCD中，AC=BD，证明□ABCD是矩形"
        expected: "平行四边形 + 对角线相等 → 矩形"
        L1_typical_error: "思路对但书写不规范，或在证明顺序上出错"
      - question: "在□ABCD中，E是BC中点，AE⊥BC，AB=4，求BC"
        expected: "利用等腰三角形+平行四边形性质推导"
        L1_typical_error: "找不到突破口，不知道从AE⊥BC能推出什么"

  - id: L2
    name: 基本熟练
    description: 常规证明和计算能做，但综合题（四边形+其他知识）有困难
    signals:
      - 四种特殊四边形的性质和判定掌握准确
      - 能完成"先证平行四边形，再证矩形/菱形/正方形"的两步证明
      - 中点四边形（取各边中点连线）的性质知道
      - 四边形与三角形、函数的综合题有困难
    diagnostic_questions:
      - question: "在菱形ABCD中，∠A=60°，对角线AC和BD交于O，BD=6，求菱形面积"
        expected: "菱形对角线互相垂直平分，利用30°直角三角形，AC=6√3，面积=6×6√3/2=18√3"
        L2_response: "能正确完成"

  - id: L3
    name: 熟练精通
    description: 各类四边形题目准确快速，能处理综合问题
    signals:
      - 性质和判定信手拈来，选择填空秒解
      - 复杂的四边形综合证明能独立完成
      - 四边形在动态几何和压轴题中的应用能处理
    pass_standard: 中考四边形相关题目全对

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 理清四种四边形的关系
    estimated_hours: 6-8
    key_tasks:
      - 画一张"四边形家族关系图"（平行四边形→矩形/菱形→正方形）
      - 列表对比：每种四边形的边/角/对角线性质
      - 每种四边形的判定方法各做5题

  L1_to_L2:
    focus: 判定方法的实际运用
    estimated_hours: 5-6
    key_tasks:
      - "证明是矩形/菱形/正方形"专项训练（各10题）
      - 中考真题四边形证明题精练
      - 中点四边形专题

  L2_to_L3:
    focus: 综合题训练
    estimated_hours: 3-4
    key_tasks:
      - 四边形与坐标系综合题
      - 四边形与函数综合题
      - 模考真题精练
