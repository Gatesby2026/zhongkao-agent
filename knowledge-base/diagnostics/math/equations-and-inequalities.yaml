# ============================================================
# 诊断标准：方程与不等式
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 方程与不等式
subject: 数学
covers:
  - 一元一次方程
  - 二元一次方程组
  - 一元二次方程（公式法/配方法/因式分解法/判别式）
  - 分式方程（含验根）
  - 一元一次不等式（组）
exam_weight: ★★★
typical_score: 8-12分（北京中考）
typical_questions: 选择/填空各1-2题 + 解答题（计算题+应用题）

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 方程的基本解法不熟练，应用题完全无法列式
    signals:
      - 一元一次方程解法步骤不清（移项变号、去分母等出错）
      - 不知道一元二次方程的求根公式
      - 看到分式方程不知道怎么去分母
      - 不等式和方程混淆（不等式两边乘以负数忘记变号）
      - 应用题完全看不懂怎么设未知数
    diagnostic_questions:
      - question: "解方程：x² - 5x + 6 = 0"
        expected: "x=2或x=3（因式分解法或公式法）"
        L0_typical_error: "不知道用什么方法，或者公式记不住"
      - question: "解方程：2/(x-1) = 1"
        expected: "x=3，且需验根"
        L0_typical_error: "不会去分母，或去分母后等式变形出错"

  - id: L1
    name: 会解不会用
    description: 基本解法会了，但应用题列不出方程，分式方程忘记验根
    signals:
      - 一元二次方程能用公式法求解，但配方法不熟
      - 分式方程能去分母求解，但经常忘记验根
      - 判别式的概念知道但不太会用
      - 方程应用题看得懂题意，但设未知数和列方程有困难
      - 不等式组能解，但在数轴上取解集偶尔出错
    diagnostic_questions:
      - question: "关于x的方程 x²+2x+m=0 有两个不相等的实数根，求m的取值范围"
        expected: "Δ=4-4m>0，解得m<1"
        L1_typical_error: "知道要用判别式但Δ的表达式列错，或不等号方向搞反"
      - question: "某商品原价a元，先涨价10%再打九折，现价是多少？"
        expected: "a×(1+10%)×0.9 = 0.99a"
        L1_typical_error: "不理解'涨价10%'怎么用代数式表达"
      - question: "解分式方程：x/(x-2) + 2/(2-x) = 1"
        expected: "注意x-2和2-x互为相反数，化简后解得x=0，验根合格"
        L1_typical_error: "没发现2-x=-(x-2)，或解完忘记验根"

  - id: L2
    name: 基本熟练
    description: 各类方程能正确求解，应用题能列出方程，但综合题偶尔出错
    signals:
      - 四种方法（直接开平方/配方/公式/因式分解）都会用，能选择最优方法
      - 分式方程能完整求解+验根
      - 判别式能正确使用（判断根的情况、求参数范围）
      - 简单应用题能独立完成
      - 综合性应用题（多步骤、需建模的）有时列式有误
      - 不等式与方程的综合题偶尔出错
    diagnostic_questions:
      - question: "已知方程x²-(2m+1)x+m²+m=0的两根为x₁、x₂，且x₁²+x₂²=7，求m"
        expected: "用韦达定理：x₁+x₂=2m+1, x₁x₂=m²+m，然后x₁²+x₂²=(x₁+x₂)²-2x₁x₂=7"
        L2_typical_error: "韦达定理用对了但展开过程计算出错"
      - question: "A、B两地相距120km，甲车比乙车快20km/h，甲从A到B比乙少用1小时，求两车速度"
        expected: "设乙车速度xkm/h，列方程120/x - 120/(x+20) = 1"
        L2_typical_error: "能正确列式并求解"

  - id: L3
    name: 熟练掌握
    description: 各类方程题准确快速，应用题建模能力强，能处理综合问题
    signals:
      - 所有题型准确率95%以上
      - 能快速判断用哪种方法最高效
      - 应用题能自如地设未知数、列方程、解方程、检验、作答
      - 判别式与韦达定理的综合应用游刃有余
      - 方程与函数的综合问题能正确处理
    pass_standard: 中考方程与不等式相关题目全对

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 掌握各类方程的基本解法
    estimated_hours: 10-12
    key_tasks:
      - 一元二次方程求根公式默写+练习（每天5题）
      - 分式方程"去分母→解方程→验根"三步固定流程训练
      - 不等式基本性质（特别是"乘以负数变号"）专项练习
      - 暂不练应用题，先把计算解法练熟

  L1_to_L2:
    focus: 突破应用题列式 + 判别式应用
    estimated_hours: 8-10
    key_tasks:
      - 方程应用题分类练习（行程/工程/利润/浓度各5题）
      - 判别式专题（3类题型：判断根的情况/求参数范围/已知根求参数）
      - 分式方程验根专项（连续10题不漏验根）
      - 韦达定理基础练习

  L2_to_L3:
    focus: 综合题型 + 提速
    estimated_hours: 5-6
    key_tasks:
      - 方程与函数的综合题专练
      - 中考真题方程部分限时训练
      - 复杂应用题建模训练
