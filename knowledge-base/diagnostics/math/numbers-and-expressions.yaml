# ============================================================
# 诊断标准：数与式（实数运算 + 整式 + 因式分解 + 分式）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 数与式
subject: 数学
covers:
  - 有理数与实数运算
  - 整式的加减乘除
  - 乘法公式
  - 因式分解
  - 分式运算
exam_weight: ★★★
typical_score: 10-16分（北京中考）
typical_questions: 选择1-2题 + 填空1-2题 + 解答第17题

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 基本运算规则不清，计算频繁出错
    signals:
      - 有理数加减法（特别是负数运算）经常搞错符号
      - 不清楚幂的运算法则（如 a²×a³ 不知道等于 a⁵）
      - 看到因式分解无从下手
      - 分式的通分约分概念模糊
    diagnostic_questions:
      - question: "计算：(-2)³ + |−5| − (-1)²⁰²⁶"
        expected: "能正确处理负数乘方、绝对值、负数偶次幂"
        L0_typical_error: "(-2)³算成+8，或(-1)²⁰²⁶算成-1"
      - question: "化简：3a²b × (-2ab³)"
        expected: "-6a³b⁴"
        L0_typical_error: "系数或指数计算错误"
      - question: "因式分解：x² - 9"
        expected: "(x+3)(x-3)"
        L0_typical_error: "完全不会，或写成 x²-9 = x(x-9)"

  - id: L1
    name: 规则模糊
    description: 知道基本概念，但运算法则混淆，做题慢且容易出错
    signals:
      - 简单的整式运算能做对，但混合运算容易出错
      - 知道提公因式和公式法，但不确定什么时候用哪个
      - 分式运算步骤不完整（如通分后忘记约分）
      - 科学记数法有时搞错指数
    diagnostic_questions:
      - question: "因式分解：2x³ - 8x"
        expected: "2x(x+2)(x-2)，需要先提公因式再用平方差"
        L1_typical_error: "只提公因式写成2x(x²-4)就停了，漏掉平方差"
      - question: "计算：(a+b)² - (a-b)²"
        expected: "4ab，用乘法公式展开后合并"
        L1_typical_error: "展开时公式记错，如(a-b)²展开成a²-b²"
      - question: "化简：(x/(x-1)) - (1/(x-1))"
        expected: "(x-1)/(x-1) = 1"
        L1_typical_error: "能通分但忘记约分，或者约分时犯错"

  - id: L2
    name: 基本熟练
    description: 课本例题和基础练习能做对，但综合性稍强的题会卡住
    signals:
      - 单一考点的计算题基本不出错
      - 因式分解的常见类型（提公因式+平方差+完全平方）能正确使用
      - 分式的四则运算基本掌握
      - 综合化简求值题偶尔出错（如先化简后代入时漏步骤）
      - 运算速度偏慢
    diagnostic_questions:
      - question: "先化简再求值：(1 + 1/(x-1)) ÷ (x/(x²-1))，其中x=√3"
        expected: "化简为(x+1)/x，代入得(√3+1)/√3，有理化得(3+√3)/3"
        L2_typical_error: "化简过程正确但代入时有理化出错"
      - question: "因式分解：-a² + 2ab - b²"
        expected: "-(a-b)²，需要先提取负号"
        L2_typical_error: "忘记提负号，或符号处理错误"

  - id: L3
    name: 熟练掌握
    description: 运算准确且快速，能处理各种变式和综合题
    signals:
      - 所有类型的数与式计算准确率95%以上
      - 化简求值题能快速完成，书写规范
      - 能识别各种因式分解的变形（换元、分组分解等）
      - 运算速度快，为后面的大题节省时间
    pass_standard: 中考数与式相关题目（选择+填空+解答第17题）全对

# ------ 真题锚点（2021-2025 北京中考）------
# 用法：做对 must_solve 中的题 = 确认达到该级别
# 详细题目信息见 exam-analysis/math/beijing/ 对应年份文件

exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 6, topic: 科学记数法, score: 2, note: 天问二号背景 }
      - { year: 2024, qid: 9, topic: 二次根式有意义的条件, score: 2, note: "√(9-x)≥0" }
      - { year: 2023, qid: 9, topic: 分式有意义的条件, score: 2 }
    should_struggle:
      - { year: 2025, qid: 19, topic: 代数式求值, note: 需识别(a+b)²结构 }

  L2:
    must_solve:
      - { year: 2025, qid: 9, topic: 二次根式有意义, score: 2 }
      - { year: 2025, qid: 10, topic: 因式分解, score: 2, note: "7m²-28=7(m+2)(m-2)" }
      - { year: 2025, qid: 17, topic: 实数混合运算, score: 5 }
      - { year: 2024, qid: 17, topic: 实数混合运算, score: 5 }
      - { year: 2022, qid: 19, topic: 整式代入求值, score: 5, note: "已知x²+2x-2=0求(x+2)²+x(x+1)" }
    should_struggle:
      - { year: 2025, qid: 19, topic: 代数式求值, note: 整体代入技巧要求较高 }

  L3:
    must_solve:
      - { year: 2025, qid: 19, topic: 代数式求值, score: 5 }
      - { year: 2023, qid: 19, topic: 分式化简求值, score: 5 }
      - { year: 2022, qid: 19, topic: 整式代入求值, score: 5 }
    pass_standard: Q9+Q10+Q17+Q19 共 14 分全拿

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 逐个击破运算法则
    estimated_hours: 8-10
    key_tasks:
      - 有理数混合运算专项（每天10题，连续5天）
      - 幂的运算法则默写（每天默写一遍，持续一周）
      - 因式分解三种方法分别练习（不要混着练）

  L1_to_L2:
    focus: 提高综合运算的准确率
    estimated_hours: 6-8
    key_tasks:
      - 混合运算限时训练（每组5题15分钟）
      - 化简求值专项（重点练"先化简后代入"的完整流程）
      - 错题归类（区分"方法不会"和"计算粗心"）

  L2_to_L3:
    focus: 提速+减少失误
    estimated_hours: 4-6
    key_tasks:
      - 限时训练（中考前16题控制在25分钟内）
      - 整理高频计算陷阱清单
      - 真题模拟（只做数与式部分，追求全对）
