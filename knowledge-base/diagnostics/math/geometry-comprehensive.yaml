# ============================================================
# 诊断标准：几何综合与动态几何（压轴题模块）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 几何综合与动态几何
subject: 数学
covers:
  - 几何变换综合（轴对称/旋转/平移）
  - 动点问题（点在线段/图形上运动）
  - 存在性问题（是否存在满足条件的点/图形）
  - 最值问题（最短路径/面积最值）
  - 代几综合（函数+几何）
exam_weight: ★★★（压轴题核心）
typical_score: 7-8分（第27或28题）
typical_questions: 压轴解答题（通常分3小问）
notes: 这是拉开分差的关键模块，目标90+的学生必攻

# ------ 水平分级 ------
levels:

  - id: L0
    name: 完全没接触
    description: 看到压轴题直接跳过，动态几何没有概念
    signals:
      - 从未认真做过压轴题
      - "动点""存在性"等题型术语不理解
      - 几何变换（旋转/轴对称）的基础也不牢
      - 本模块不建议L0的学生投入时间，应先补其他基础模块
    recommendation: 先把三角形/四边形/圆/函数提到L2再来攻这个模块

  - id: L1
    name: 能看懂题意
    description: 能读懂压轴题在问什么，但不知道从哪里下手
    signals:
      - 压轴题第一问有时能做对（通常是基础计算）
      - 第二问有思路但算不对或推理不完整
      - 第三问完全做不了
      - 不知道常见的辅助线技巧
      - 动点问题中不知道怎么用运动的点来建立等量关系
    diagnostic_questions:
      - question: "（压轴第1问）如图，抛物线y=-x²+2x+3与x轴交于A、B，顶点为C，求A、B、C坐标"
        expected: "令y=0，-x²+2x+3=0，x=-1或3，A(-1,0)B(3,0)，顶点C(1,4)"
        L1_response: "基本能做对"
      - question: "（压轴第2问）在对称轴上找点P，使PA+PB最短"
        expected: "利用对称轴做A或B的对称点，连线交对称轴即为P"
        L1_typical_error: "不知道'利用对称找最短路径'这个技巧"

  - id: L2
    name: 能做前两问
    description: 压轴题前两问基本能做对，第三问偶尔有思路但完成不了
    signals:
      - 第一问（基础计算/求坐标/求解析式）准确
      - 第二问（求面积/证明特殊关系/求简单最值）大部分能做
      - 第三问（存在性/分类讨论/复杂动点）做不完整
      - 知道一些辅助线技巧但不够系统
      - 分类讨论经常漏情况
    diagnostic_questions:
      - question: "（压轴第3问）在抛物线上是否存在点M，使△MAB为等腰直角三角形？"
        expected: "需分类讨论：MA=MB / ∠M=90° / ∠A=90° / ∠B=90°等多种情况"
        L2_typical_error: "只讨论了1-2种情况就结束，漏掉其他情况"

  - id: L3
    name: 压轴能手
    description: 压轴题前两问必对，第三问完成率高
    signals:
      - 常见压轴题类型（存在性/最值/动点/旋转构造）都有应对策略
      - 分类讨论能系统不遗漏
      - 辅助线技巧丰富（旋转构全等/取中点连中位线/作垂线构直角）
      - 计算速度快，能在15分钟内完成一道压轴题
      - 即使第三问做不出来，也能拿到步骤分
    pass_standard: 压轴题得分率70%以上（3问中至少完整做对前2问+第3问拿步骤分）

# ------ 压轴题常见类型 ------
common_types:

  - type: 代几综合（函数+几何）
    frequency: 每年必考
    description: 在抛物线/一次函数背景下，考查面积、距离、特殊三角形/四边形
    typical_structure:
      - 第1问：求函数解析式或交点坐标
      - 第2问：求面积/证明特殊关系
      - 第3问：存在性问题或动点问题

  - type: 动态几何
    frequency: 每年必考
    description: 点在线段/函数图象上运动，求某个量关于运动参数的函数关系
    key_technique: 设动点坐标为参数t，用t表达所有相关量

  - type: 存在性问题
    frequency: 高频
    description: "是否存在点P使得...？若存在求坐标，若不存在说明理由"
    key_technique: 先假设存在，列方程求解；若方程有解则存在，若无解则不存在

  - type: 最值问题
    frequency: 高频
    description: 最短路径/面积最值/周长最值
    key_technique: 对称法（最短路径）、二次函数法（面积最值）、几何法

  - type: 旋转/翻折构造
    frequency: 中频
    description: 通过旋转或翻折构造全等三角形，建立等量关系
    key_technique: 识别旋转中心和旋转角，找对应边和对应角

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 先补基础，暂不碰压轴
    estimated_hours: 0（把时间投到其他模块）
    prerequisite: 三角形达到L2、函数达到L2

  L1_to_L2:
    focus: 练好第1-2问 + 积累常见技巧
    estimated_hours: 12-15
    key_tasks:
      - 收集近5年北京中考+海淀西城一模的压轴题（约20题）
      - 每题只做前两问，限时10分钟
      - 整理第2问的常见题型和解法（面积法/对称法/函数法）
      - 背熟"最短路径用对称"这一核心技巧
      - 学会设动点坐标并用参数表达其他量

  L2_to_L3:
    focus: 第3问攻坚 + 系统化训练
    estimated_hours: 20-25
    key_tasks:
      - 存在性问题分类讨论的完整框架训练
      - 旋转构造全等的识别和应用
      - 每题完整做（含第3问），限时15分钟
      - 海淀/西城一模二模压轴题精练
      - 整理"做不出第3问时如何拿步骤分"的策略
    notes: 仅适合目标95+的学生，投入产出比较低，需权衡
