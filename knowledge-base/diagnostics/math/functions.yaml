# ============================================================
# 诊断标准：函数（一次函数 + 反比例函数 + 二次函数）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 函数
subject: 数学
covers:
  - 函数概念（定义域/函数值/三种表示）
  - 一次函数 y=kx+b（图象/性质/待定系数法）
  - 反比例函数 y=k/x（双曲线/性质）
  - 二次函数 y=ax²+bx+c（图象/性质/最值/与方程的关系）
  - 函数综合（代几综合/实际问题建模）
exam_weight: ★★★（中考分值最高的单一模块）
typical_score: 16-22分（北京中考），含压轴题
typical_questions: 选择1-2题 + 填空1-2题 + 解答题2-3题（含压轴）

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 看到函数表达式不知道图象长什么样，基本概念混乱
    signals:
      - 不清楚 y=kx+b 中 k 和 b 分别代表什么
      - 给出函数解析式画不出图象
      - 看到图象写不出解析式
      - 不理解"自变量""因变量""定义域"等概念
      - 反比例函数和一次函数分不清
      - 二次函数完全看不懂
    diagnostic_questions:
      - question: "画出 y=2x+1 的图象"
        expected: "在坐标系中画出过(0,1)和(-1/2,0)的直线"
        L0_typical_error: "不知道从哪下手，或只描了一个点"
      - question: "y=3/x 的图象在第几象限？"
        expected: "第一、三象限（k>0）"
        L0_typical_error: "完全猜测，或说四个象限"
      - question: "y=x²-2x+1 的图象开口向哪？"
        expected: "向上（a=1>0）"
        L0_typical_error: "不知道看哪个系数"

  - id: L1
    name: 概念模糊
    description: 知道公式但图象性质不熟，会做课本例题但变式题做不了
    signals:
      - 一次函数能画图，但 k 和 b 的变化对图象的影响说不清
      - 反比例函数知道图象形状但 k>0 和 k<0 的图象位置容易混
      - 二次函数能写出一般式，但不会配方、不会求顶点坐标
      - 待定系数法的步骤知道但经常列错方程
      - 函数与方程的关系不理解（如图象与x轴交点和方程的根的关系）
    diagnostic_questions:
      - question: "一次函数 y=kx+b 经过一、二、四象限，则 k__0, b__0（填>或<）"
        expected: "k<0（从左上到右下），b>0（与y轴正半轴相交）"
        L1_typical_error: "k和b的关系搞混，如认为经过第四象限所以b<0"
      - question: "二次函数 y=x²-4x+3 的顶点坐标是什么？"
        expected: "配方：y=(x-2)²-1，顶点(2,-1)"
        L1_typical_error: "不会配方，或配方过程出错"
      - question: "反比例函数 y=k/x 经过点(2,3)，求k的值"
        expected: "k=2×3=6"
        L1_typical_error: "能做对，但如果问图象的其他性质就答不上来"
      - question: "抛物线 y=ax²+bx+c 如图所示（开口向下，过原点，对称轴在y轴右侧），判断a、b、c的符号"
        expected: "a<0（开口向下），c=0（过原点），b>0（对称轴x=-b/2a>0，a<0所以b>0）"
        L1_typical_error: "a和c能判断，b的符号推理链断裂"

  - id: L2
    name: 基础扎实
    description: 课本题型和基础中考题能做对，但综合题和压轴题前两问有困难
    signals:
      - 三种函数的图象性质掌握牢固
      - 待定系数法求解析式准确
      - 能正确使用配方法求顶点、对称轴
      - 二次函数与一元二次方程的关系理解
      - 简单的函数应用题（利润最值、面积最值）能做
      - 代几综合题（函数+几何）前1-2问能做，第3问做不了
      - 动点问题中函数关系式的建立有困难
    diagnostic_questions:
      - question: "二次函数 y=x²-2x-3 与x轴的交点坐标"
        expected: "令y=0，x²-2x-3=0，(x-3)(x+1)=0，交点(-1,0)和(3,0)"
        L2_response: "正确求解"
      - question: "已知抛物线 y=ax²+bx+c 过A(-1,0)、B(3,0)、C(0,-3)，求解析式"
        expected: "用交点式 y=a(x+1)(x-3)，代入C(0,-3)得a=1，y=x²-2x-3"
        L2_response: "能做对，可能会用一般式列三个方程（效率低但正确）"
      - question: "（压轴题前两问）如图，抛物线y=x²-2x-3与x轴交于A、B，顶点为C。(1)求A、B、C坐标 (2)求△ABC的面积"
        expected: "(1)A(-1,0) B(3,0) C(1,-4)  (2)底AB=4，高=4，面积=8"
        L2_response: "能正确完成"
      - question: "（压轴题第3问）在抛物线上是否存在点P，使△ABP为等腰三角形？若存在，求P坐标"
        expected: "需要分类讨论（PA=PB / PA=AB / PB=AB），综合运用距离公式"
        L2_typical_difficulty: "分类讨论不完整，或计算过程出错"

  - id: L3
    name: 熟练精通
    description: 所有函数题型准确快速，压轴题前两问必对，第三问有较高的完成率
    signals:
      - 图象性质信手拈来，选择填空秒解
      - 综合题能快速识别题型套路并选择最优解法
      - 代几综合压轴题前两问100%正确
      - 压轴题第三问完成率50%以上
      - 动点问题能熟练建立函数关系式
      - 函数与几何的综合问题游刃有余
    pass_standard: 中考函数相关选择填空全对，解答题（含压轴）得分率85%以上

# ------ 各子模块细分诊断 ------
sub_modules:

  一次函数:
    L0_signal: "画不出y=kx+b的图象"
    L1_signal: "能画图但说不清k、b变化的影响"
    L2_signal: "图象性质熟练，待定系数法准确"
    L3_signal: "一次函数题秒解，能与其他知识综合运用"
    key_diagnostic: "y=-2x+4 的图象经过哪些象限？x和y的增减性如何？"

  反比例函数:
    L0_signal: "不知道y=k/x的图象是什么形状"
    L1_signal: "知道是双曲线但k正负对应的象限记混"
    L2_signal: "性质掌握牢固，|k|的几何意义理解"
    L3_signal: "反比例与一次函数的综合问题（如求交点围成的面积）能快速解决"
    key_diagnostic: "反比例函数y=6/x与一次函数y=x+1的交点坐标"

  二次函数:
    L0_signal: "不知道a、b、c分别影响什么"
    L1_signal: "不会配方，不会求顶点坐标"
    L2_signal: "基础性质和计算都会，但综合题和应用题有困难"
    L3_signal: "压轴题前两问必对，第三问有思路"
    key_diagnostic: "y=-x²+2x+3 求顶点/对称轴/与坐标轴交点/最大值"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立函数图象的直觉
    estimated_hours: 12-15
    key_tasks:
      - 一次函数：列表→描点→连线，画20个不同的y=kx+b
      - 反比例函数：画y=k/x（k=1,2,-1,-2），对比图象位置
      - 二次函数：用GeoGebra或手画，观察a,b,c变化时图象的变化
      - 每天"看式画图"+"看图写式"各5题

  L1_to_L2:
    focus: 掌握核心计算方法 + 性质推理
    estimated_hours: 10-12
    key_tasks:
      - 配方法专项（每天5题，连续一周）
      - "由图象判断a,b,c符号"专项（高频选择题型）
      - 待定系数法：一般式法 vs 交点式法，各练10题
      - 函数与方程关系专题（图象交x轴↔方程的根）
      - 简单函数应用题（利润最值）练习

  L2_to_L3:
    focus: 压轴题攻坚
    estimated_hours: 15-20
    key_tasks:
      - 代几综合压轴题分类训练（存在性问题/最值问题/动点问题）
      - 每题限时15分钟，先自做再对答案
      - 压轴题第三问的常见套路整理（分类讨论/设而不求/面积法）
      - 海淀西城一模二模压轴题精练
    notes: 适合目标95+的学生，90分目标的学生建议把时间投到其他弱科
