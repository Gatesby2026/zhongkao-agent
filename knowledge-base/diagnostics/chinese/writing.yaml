# ============================================================
# 诊断标准：写作（命题/半命题+想象写作）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12

module: 写作
subject: 语文
covers:
  - 命题作文（全命题/半命题，以记叙文为主）
  - 想象写作（2021年起北京卷新增题型）
  - 审题立意（准确理解题目要求和限制）
  - 选材组材（素材选择和文章结构安排）
  - 语言表达（描写手法/修辞运用/语言风格）
  - 卷面书写（字迹工整/格式规范）
exam_weight: ★★★★（40分，占总分40%，决定性板块）
typical_score: 40分（北京中考最后一大题，二选一）
typical_questions: 两道作文题选一，通常为命题/半命题+想象写作各一
note: |
  北京卷作文特点：
  - 二选一（一道传统命题/半命题，一道想象作文）
  - 字数要求600-800字
  - 重视真情实感和生活体验
  - 想象作文近年考查频率高，需要合理想象+主题立意

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 写不满字数，跑题严重，文章结构混乱
    signals:
      - 写不满600字，凑字数困难
      - 经常跑题或偏题
      - 文章没有明确的中心思想
      - 记流水账，没有详略安排
      - 几乎没有描写，全是叙述
      - 语言干瘪，大量口语化表达
      - 字迹潦草难辨，格式不规范
      - 想象作文完全没有思路
    diagnostic_questions:
      - question: "以'那一刻，我长大了'为题写一篇600字以上的记叙文"
        expected: "选取一个具体事件，通过细节描写展现'成长'的瞬间"
        L0_typical_error: "写成流水账，如'那天我做了什么什么，然后我就长大了'，无具体细节"
      - question: "请用50字左右的环境描写开头，烘托紧张的氛围"
        expected: "如'乌云压顶，狂风卷起落叶，整条街空无一人，只有远处传来隐隐的雷声'"
        L0_typical_error: "写不出，或只写'天气很不好'"
      - question: "想象写作：假如你穿越到古代某个朝代，你会做什么？（200字片段）"
        expected: "选定朝代，结合历史知识合理想象，有具体场景和细节"
        L0_typical_error: "无法展开想象，或想象脱离实际毫无逻辑"

  - id: L1
    name: 概念模糊
    description: 能写满字数且基本不跑题，但文章平淡无亮点
    signals:
      - 能写满600字但内容单薄
      - 基本不跑题但立意浅显
      - 有简单的开头结尾但缺乏设计
      - 叙事有条理但详略不当，该详的不详
      - 描写少且不够生动
      - 素材老旧（下雨送伞/生病送医院/考试失利）
      - 想象作文有基本框架但想象力不足
      - 字迹尚可辨认但不够工整
    diagnostic_questions:
      - question: "以'_____让我感动'为题写一篇记叙文（只写开头和结尾各100字）"
        expected: "开头引人入胜（设悬念/场景描写），结尾点题升华"
        L1_typical_error: "开头平铺直叙'有一件事让我很感动'，结尾空喊口号"
      - question: "描写一个你熟悉的人的外貌（100字），要求体现人物性格特点"
        expected: "选取有特征的细节，外貌描写服务于性格刻画"
        L1_typical_error: "写成'档案式'描写：身高多少、穿什么衣服，看不出性格"
      - question: "给一篇'写母爱'的作文列提纲（事件+详略安排）"
        expected: "选取2-3个事件，标明详写和略写，详写部分有具体场景"
        L1_typical_error: "事件之间缺乏内在联系，详略不分"

  - id: L2
    name: 基本熟练
    description: 审题准确，结构完整，有一定描写功底，作文基本在二类文水平
    signals:
      - 审题准确，不跑题不偏题
      - 立意较好，有一定深度
      - 结构完整，详略得当
      - 有较好的描写段落（环境/动作/心理）
      - 素材较新颖，来源于真实生活
      - 语言通顺流畅，有少量亮点
      - 想象作文能做到合理且有趣
      - 字迹工整，卷面整洁
      - 典型得分32-36分（北京中考）
    diagnostic_questions:
      - question: "以'转角'为题，写一篇作文提纲（立意+素材+结构+详略安排）"
        expected: "审题到位（转角=转折/变化），选材新颖，结构有设计感"
        L2_response: "立意准确，有较好的素材选择和结构安排"
      - question: "将以下叙述改写为生动的描写：'他很紧张地走上了讲台'（100字）"
        expected: "综合运用动作/心理/细节描写，让读者'看到'紧张"
        L2_response: "能写出较生动的描写，如手心出汗、腿发抖等细节"
      - question: "想象写作：以'2050年的一天'为题写一个200字的片段"
        expected: "科幻想象合理，有具体生活场景，有主题思考"
        L2_response: "想象合理有趣，但主题深度一般"

  - id: L3
    name: 熟练精通
    description: 作文一类文水平，立意深刻、选材精当、语言优美
    signals:
      - 审题精准，立意深刻独到
      - 选材新颖典型，来自真实生活积累
      - 结构精巧，有设计感（倒叙/插叙/线索贯穿）
      - 描写生动传神，画面感强
      - 语言优美凝练，有个人风格
      - 想象作文既大胆又合理，有深层思考
      - 字迹美观，卷面赏心悦目
      - 典型得分36-40分（北京中考）
    pass_standard: 写作板块40分中得36分以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    typical_score: 25-30分
    common_issues:
      - "素材老旧，缺乏新意"
      - "立意浅显，只停留在表面感受"
      - "详略不当，该详写的一笔带过"
    reference_topics:
      - { year: 2025, topic: 北京中考作文题（二选一） }
      - { year: 2024, topic: 北京中考作文题（二选一） }

  L2:
    typical_score: 32-36分
    strengths:
      - "审题准确，结构完整"
      - "有一定描写功底"
    weaknesses:
      - "立意可以更深刻"
      - "语言还不够精练优美"
    reference_topics:
      - { year: 2025, topic: 北京中考作文题 }
      - { year: 2024, topic: 北京中考作文题 }
      - { year: 2023, topic: 北京中考作文题 }

  L3:
    typical_score: 36-40分
    characteristics:
      - "立意深刻，有独到见解"
      - "语言优美，有个人风格"
      - "结构精巧，读来引人入胜"
    reference_topics:
      - { year: 2025, topic: 北京中考一类文标准 }

# ------ 各子模块细分诊断 ------
sub_modules:

  审题立意:
    L0_signal: "经常跑题或偏题，抓不住题目核心"
    L1_signal: "基本不跑题但立意浅显、常见"
    L2_signal: "审题准确，立意有一定深度"
    L3_signal: "审题精准，立意深刻独到"
    key_diagnostic: "分析题目'那条路'的多层含义并确定写作方向"

  选材组材:
    L0_signal: "没有素材积累，写什么都是空话"
    L1_signal: "素材老旧（下雨送伞三件套），千篇一律"
    L2_signal: "素材来自真实生活，有一定新意"
    L3_signal: "素材新颖典型，以小见大"
    key_diagnostic: "以'温暖'为主题列出3个不同的选材方案并说明详略"

  描写能力:
    L0_signal: "全是叙述没有描写，语言干瘪"
    L1_signal: "有描写但不够生动，画面感弱"
    L2_signal: "描写较生动，能综合运用多种描写手法"
    L3_signal: "描写传神，语言有画面感和感染力"
    key_diagnostic: "写一段200字的场景描写（综合环境/动作/心理描写）"

  语言表达:
    L0_signal: "大量口语化表达，病句多"
    L1_signal: "语言通顺但平淡无味"
    L2_signal: "语言流畅，有少量修辞亮点"
    L3_signal: "语言优美凝练，有个人风格"
    key_diagnostic: "将一段平淡的叙述改写为有文采的表达"

  想象写作:
    L0_signal: "无法展开想象，或想象脱离逻辑"
    L1_signal: "有基本框架但想象力不足，平淡"
    L2_signal: "想象合理有趣，有一定主题"
    L3_signal: "想象大胆又合理，有深层人文思考"
    key_diagnostic: "以'如果时间可以倒流'为题写一个300字片段"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 写得出、写得满、不跑题
    estimated_hours: 20-25
    key_tasks:
      - 审题训练：每天分析1个作文题的含义和写作方向
      - 素材积累：每天记录1个生活小事（100字日记）
      - 仿写训练：模仿课文中的精彩段落写片段
      - 每周写1篇完整作文（600字以上），重点练习写满和不跑题

  L1_to_L2:
    focus: 有亮点、有细节、有结构
    estimated_hours: 15-20
    key_tasks:
      - 描写专项：每天写一个描写片段（100-200字）
      - 素材升级：整理10个"独家素材"替换老旧素材
      - 结构设计：学习3种常用结构（总分总/倒叙/线索贯穿）
      - 开头结尾专项：积累10种开头方式和5种结尾方式
      - 每周写1篇作文+修改1次

  L2_to_L3:
    focus: 立意深刻、语言优美、结构精巧
    estimated_hours: 15-20
    key_tasks:
      - 立意升格训练：同一素材的多层立意练习
      - 语言锤炼：每天改写1个段落使之更精练优美
      - 范文研读：阅读北京中考一类文10篇，分析亮点
      - 想象写作专项：每周练1篇想象作文
      - 限时训练：50分钟完成审题+构思+写作
