# ============================================================
# 诊断标准：名著阅读（12部必读名著）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12

module: 名著阅读
subject: 语文
covers:
  - 12部课标必读名著的主要内容、人物、主题
  - 经典情节识别与概括
  - 人物形象分析（性格/经历/成长）
  - 阅读方法运用（批注/跳读/精读策略）
  - 名著间的比较阅读
exam_weight: ★（约5分，但容易丢分）
typical_score: 约5分（北京中考第12-13题左右）
typical_questions: 选择1题 + 简答1题
note: |
  北京中考12部必读名著：
  《朝花夕拾》《西游记》《骆驼祥子》《海底两万里》
  《红星照耀中国》《昆虫记》《傅雷家书》《钢铁是怎样炼成的》
  《艾青诗选》《水浒传》《儒林外史》《简·爱》

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 几乎没读过必读名著，主要人物和情节都不了解
    signals:
      - 12部名著只翻过1-2部，且记忆模糊
      - 主要人物和对应作品无法匹配
      - 经典情节完全不了解
      - 不知道名著阅读题的考查方向
      - 人物形象分析无从下手
    diagnostic_questions:
      - question: "《骆驼祥子》中祥子的外号'骆驼'是怎么来的？"
        expected: "祥子在逃兵混乱中捡到三匹骆驼并卖掉，因此得名"
        L0_typical_error: "完全不知道，或说'因为他长得像骆驼'"
      - question: "《西游记》中孙悟空的第一个师父是谁？"
        expected: "菩提祖师"
        L0_typical_error: "说成唐僧"
      - question: "《钢铁是怎样炼成的》主人公是谁？"
        expected: "保尔·柯察金"
        L0_typical_error: "完全不知道或张冠李戴"

  - id: L1
    name: 概念模糊
    description: 读过部分名著或看过梗概，知道主要人物但情节细节模糊
    signals:
      - 12部名著中读过或了解5-7部
      - 能说出主要人物但具体情节容易张冠李戴
      - 经典名场面有印象但细节不准确
      - 人物形象分析只能说出一两个特点
      - 不同名著之间的人物容易混淆
    diagnostic_questions:
      - question: "《水浒传》中'鲁提辖拳打镇关西'的起因是什么？"
        expected: "鲁达在酒楼遇到金翠莲父女，得知他们被郑屠欺压，为其打抱不平"
        L1_typical_error: "知道鲁达打了镇关西但说不清起因细节"
      - question: "《朝花夕拾》中鲁迅对'衍太太'和'藤野先生'分别持什么态度？"
        expected: "对衍太太持批判态度（虚伪/教唆坏事），对藤野先生持敬仰感激态度"
        L1_typical_error: "对藤野先生的态度能答，衍太太说不清或记混"
      - question: "《简·爱》中简·爱离开桑菲尔德庄园的直接原因是什么？"
        expected: "发现罗切斯特有妻子（疯妻伯莎·梅森）"
        L1_typical_error: "知道她离开了但原因说不准确"

  - id: L2
    name: 基本熟练
    description: 12部名著基本都了解，能准确回答人物和情节类问题
    signals:
      - 12部名著至少读过或精读梗概10部以上
      - 主要人物和经典情节掌握准确
      - 能进行简单的人物形象分析（性格+事例）
      - 能概括名著的主题思想
      - 答题规范，能结合原著内容作答
    diagnostic_questions:
      - question: "结合《骆驼祥子》中的具体情节，分析祥子性格变化的原因（至少说两个情节）"
        expected: "如：买车三起三落、小福子之死等导致祥子从勤劳上进变为麻木堕落"
        L2_response: "能举出2个关键情节，分析基本到位"
      - question: "《红星照耀中国》是一部纪实作品，说说它与小说类名著在阅读方法上有何不同"
        expected: "纪实作品关注真实性/历史背景/人物采访的可信度，小说关注情节/人物塑造/主题"
        L2_response: "能说出区别但不够深入"
      - question: "《艾青诗选》中'太阳'和'土地'两个意象分别象征什么？"
        expected: "太阳象征光明/希望/理想，土地象征祖国/人民/苦难"
        L2_response: "基本准确"

  - id: L3
    name: 熟练精通
    description: 名著阅读满分水平，对人物和主题有深入理解
    signals:
      - 12部名著全部精读，细节记忆准确
      - 人物形象分析深入，能多角度评价
      - 能进行名著间的比较阅读
      - 答题角度全面，语言精练有深度
      - 能联系时代背景分析作品主题
    pass_standard: 名著阅读板块5分中得5分

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 12, topic: 名著内容选择, score: 2 }
      - { year: 2024, qid: 12, topic: 名著内容选择, score: 2 }
    should_struggle:
      - { year: 2025, qid: 13, topic: 名著简答, score: 3 }

  L2:
    must_solve:
      - { year: 2025, qid: 12, topic: 名著内容选择, score: 2 }
      - { year: 2025, qid: 13, topic: 名著简答, score: 3 }
      - { year: 2024, qid: 12-13, topic: 名著全部, score: 5 }
    should_struggle:
      - { year: 2023, qid: 13, topic: 名著比较阅读, note: 需要跨作品分析 }

  L3:
    must_solve:
      - { year: 2025, qid: 12-13, topic: 名著全部, score: 5 }
      - { year: 2024, qid: 12-13, topic: 名著全部, score: 5 }
      - { year: 2023, qid: 12-13, topic: 名著全部, score: 5 }
    pass_standard: 名著阅读板块满分

# ------ 各子模块细分诊断 ------
sub_modules:

  小说类名著:
    covers: "《西游记》《骆驼祥子》《水浒传》《儒林外史》《简·爱》《钢铁是怎样炼成的》"
    L0_signal: "主要人物和作品对应不上"
    L1_signal: "知道主要人物但经典情节细节不准"
    L2_signal: "人物和情节掌握准确，能分析性格"
    L3_signal: "能深入分析人物成长变化，进行比较阅读"
    key_diagnostic: "概括祥子'三起三落'的具体内容"

  散文随笔类:
    covers: "《朝花夕拾》《傅雷家书》"
    L0_signal: "不知道《朝花夕拾》是鲁迅的回忆性散文"
    L1_signal: "知道主要篇目但人物态度分析不清"
    L2_signal: "各篇内容和情感态度掌握准确"
    L3_signal: "能分析鲁迅的写作手法和深层含义"
    key_diagnostic: "《朝花夕拾》中鲁迅对长妈妈的态度变化"

  纪实与科普类:
    covers: "《红星照耀中国》《昆虫记》《海底两万里》"
    L0_signal: "不知道这些是纪实/科普作品"
    L1_signal: "知道大致内容但阅读方法不对路"
    L2_signal: "掌握内容要点，了解纪实/科普的特点"
    L3_signal: "能评价作品的文学价值和科学精神"
    key_diagnostic: "说说《红星照耀中国》与《骆驼祥子》在写作手法上的根本区别"

  诗歌类:
    covers: "《艾青诗选》"
    L0_signal: "不了解艾青的诗歌风格和核心意象"
    L1_signal: "知道'太阳'和'土地'但说不出象征含义"
    L2_signal: "能分析意象象征义和情感"
    L3_signal: "能结合时代背景深入分析诗歌主题"
    key_diagnostic: "分析《我爱这土地》中的意象及其象征意义"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 快速补齐12部名著的基本内容
    estimated_hours: 15-20
    key_tasks:
      - 按考查频率排序精读：祥子→西游→水浒→朝花夕拾→简爱→红星
      - 每部名著整理"一句话概括+主要人物+3个经典情节"
      - 不必全文阅读，优先读万唯名著速记手册
      - 每天背诵一部名著的核心知识点

  L1_to_L2:
    focus: 情节细节和人物形象分析
    estimated_hours: 10-12
    key_tasks:
      - 重点名著（祥子/西游/水浒/朝花夕拾）精读经典章节
      - 人物形象分析专项（性格+事例+变化）
      - 名著简答题答题模板训练
      - 做五三/万唯名著阅读专项20题

  L2_to_L3:
    focus: 深度理解和比较阅读
    estimated_hours: 5-8
    key_tasks:
      - 名著间比较阅读专题（如祥子vs保尔的人生态度对比）
      - 写作手法分析（讽刺/象征/纪实）
      - 北京近5年真题名著题精练
      - 名著与时代背景的关联分析
