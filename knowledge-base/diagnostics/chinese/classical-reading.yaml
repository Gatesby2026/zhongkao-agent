# ============================================================
# 诊断标准：古诗文阅读（文言文+古诗鉴赏）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12

module: 古诗文阅读
subject: 语文
covers:
  - 课内文言文阅读（实词/虚词/翻译/内容理解）
  - 课外文言文阅读（迁移课内知识理解新文段）
  - 古诗词鉴赏（意象/情感/手法/名句赏析）
exam_weight: ★★★（约18分，区分度较高）
typical_score: 约18分（北京中考第6-11题左右）
typical_questions: 选择2题 + 翻译1题 + 简答2-3题

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 文言文几乎看不懂，实词虚词无积累，古诗鉴赏完全没思路
    signals:
      - 课内文言文实词积累不足30个
      - '"之""其""以""而"等常见虚词用法说不出'
      - 文言文翻译只能逐字猜测，无法组成通顺句子
      - 古诗意象完全不了解（如"月亮=思乡"不知道）
      - 课外文言文完全读不懂
      - 不知道古诗鉴赏的答题角度
    diagnostic_questions:
      - question: "解释'策之不以其道'中'策'的意思（《马说》）"
        expected: "鞭打/用鞭子打"
        L0_typical_error: "完全不知道，或猜成'策略'"
      - question: "翻译：醉翁之意不在酒，在乎山水之间也。"
        expected: "醉翁的情趣不在于喝酒，而在于山水之间。"
        L0_typical_error: "逐字硬译，'之意'译不出，句子不通"
      - question: "李白《行路难》中'长风破浪会有时，直挂云帆济沧海'表达了什么情感？"
        expected: "表达了诗人对未来充满信心、积极进取的豪迈情怀"
        L0_typical_error: "完全不知道从何说起"

  - id: L1
    name: 概念模糊
    description: 课内文言文能读懂大意但细节不准，古诗鉴赏答题不规范
    signals:
      - 常见实词积累50-80个，但一词多义掌握不牢
      - 虚词"之""其"的用法能说出1-2种，但不全面
      - 课内文言文翻译大意正确，关键词漏译或错译
      - 课外文言文能借助注释读懂50%左右
      - 古诗鉴赏能感知情感但说不清表达手法
      - 答题时"有话说"但组织不成规范答案
    diagnostic_questions:
      - question: "解释下列加点词：a.'以'中有足乐者 b.不'以'物喜 c.可'以'一战 d.属予作文'以'记之"
        expected: "a.因为 b.因为 c.凭借 d.来/用来"
        L1_typical_error: "a和b能答对，c和d的用法混淆"
      - question: "翻译：斯是陋室，惟吾德馨。（《陋室铭》）"
        expected: "这是简陋的屋子，只是我的品德好（就不感到简陋了）。馨：美好。"
        L1_typical_error: "大意对，但'馨'译为'香气'而非引申义'美好'"
      - question: "杜甫《春望》中'感时花溅泪，恨别鸟惊心'运用了什么手法？"
        expected: "运用了拟人（或互文/对偶）手法，移情于景，表达忧国伤时之情"
        L1_typical_error: "能说出'伤心'但说不出具体手法名称"

  - id: L2
    name: 基本熟练
    description: 课内文言文掌握扎实，课外文言文能读懂大意，古诗鉴赏答题规范
    signals:
      - 常见实词积累100+个，一词多义基本掌握
      - 六大虚词的常见用法熟练
      - 课内翻译准确率90%以上
      - 课外文言文能读懂70%以上，推断生词含义
      - 古诗鉴赏能从意象、手法、情感三个角度作答
      - 答题规范，条理清晰
    diagnostic_questions:
      - question: "阅读课外文言文片段（100字左右），回答：用自己的话概括文中人物的品质"
        expected: "能准确理解文段内容，概括人物品质并结合原文分析"
        L2_response: "答题准确、规范，偶尔遗漏细节"
      - question: "比较《岳阳楼记》和《醉翁亭记》中作者表达的思想感情有何异同"
        expected: "同：都有忧民情怀；异：范仲淹'先忧后乐'的政治抱负，欧阳修'与民同乐'的旷达"
        L2_response: "能答出主要异同，分析较到位"
      - question: "赏析苏轼《水调歌头》中'人有悲欢离合，月有阴晴圆缺'的妙处"
        expected: "将人的悲欢离合与月的阴晴圆缺类比，寓哲理于景象，表达豁达乐观的人生态度"
        L2_response: "能从手法和情感两方面作答"

  - id: L3
    name: 熟练精通
    description: 文言文翻译精准，课外迁移能力强，古诗鉴赏深入且有文采
    signals:
      - 课内外文言文阅读无障碍
      - 翻译既准确又通顺，关键词无遗漏
      - 课外文言文能联系课内知识灵活迁移
      - 古诗鉴赏角度全面，分析深入，语言有文采
      - 答题速度快，书写规范
    pass_standard: 古诗文阅读板块18分中得16-18分

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 6, topic: 课内文言文实词, score: 2 }
      - { year: 2024, qid: 6, topic: 课内文言文实词, score: 2 }
      - { year: 2023, qid: 9, topic: 古诗词情感理解, score: 2 }
    should_struggle:
      - { year: 2025, qid: 8, topic: 课内文言文翻译 }
      - { year: 2024, qid: 10, topic: 课外文言文理解 }

  L2:
    must_solve:
      - { year: 2025, qid: 6-8, topic: 课内文言文全部, score: 8 }
      - { year: 2025, qid: 9, topic: 古诗词鉴赏, score: 4 }
      - { year: 2024, qid: 6-8, topic: 课内文言文全部, score: 8 }
      - { year: 2023, qid: 10, topic: 课外文言文理解, score: 4 }
    should_struggle:
      - { year: 2025, qid: 10-11, topic: 课外文言文综合, sub: 深层分析题 }

  L3:
    must_solve:
      - { year: 2025, qid: 6-11, topic: 古诗文全部, score: 18 }
      - { year: 2024, qid: 6-11, topic: 古诗文全部, score: 18 }
    pass_standard: 古诗文阅读板块得分率90%以上

# ------ 各子模块细分诊断 ------
sub_modules:

  文言实词:
    L0_signal: "积累不足30个，高频实词如'走/去/引/属'不知古义"
    L1_signal: "积累50-80个，一词多义掌握不全"
    L2_signal: "积累100+个，一词多义和词类活用基本掌握"
    L3_signal: "实词积累全面，能根据语境推断新词含义"
    key_diagnostic: "解释'走''去''引''属''道''故'在不同语境中的含义"

  文言虚词:
    L0_signal: "之/其/以/而/于/为 的用法说不出一种"
    L1_signal: "每个虚词能说出1-2种用法"
    L2_signal: "常见用法基本掌握，能在语境中判断"
    L3_signal: "虚词用法全面掌握，判断又快又准"
    key_diagnostic: "判断'之'在10个不同句子中的用法（代词/助词/动词/取独）"

  文言翻译:
    L0_signal: "翻译不通顺，关键词错误多"
    L1_signal: "大意正确，关键词漏译或错译"
    L2_signal: "准确率90%以上，偶有小疏漏"
    L3_signal: "翻译准确通顺，关键词无遗漏"
    key_diagnostic: "翻译3个含特殊句式的句子（省略句/倒装句/判断句各一）"

  古诗鉴赏:
    L0_signal: "不知道从什么角度赏析古诗"
    L1_signal: "能感知情感但说不出手法"
    L2_signal: "能从意象/手法/情感三角度规范作答"
    L3_signal: "分析深入，能联系写作背景和诗人风格"
    key_diagnostic: "赏析《茅屋为秋风所破歌》中'安得广厦千万间'一句"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 实词积累和课内篇目精读
    estimated_hours: 20-25
    key_tasks:
      - 每天积累5个文言实词（含一词多义），制作词卡
      - 精读课内16篇必考文言文，逐句翻译
      - 学习常见古诗意象的象征含义（月/柳/雁/菊等20个）
      - 背诵古诗鉴赏的基本术语（比喻/拟人/借景抒情等）

  L1_to_L2:
    focus: 虚词突破和答题规范化
    estimated_hours: 12-15
    key_tasks:
      - 六大虚词专项（之/其/以/而/于/为，各10题）
      - 翻译"六字法"训练（留/删/补/换/调/变）
      - 课外文言文每天练1篇（150字左右）
      - 古诗鉴赏答题模板训练（手法+内容+情感）

  L2_to_L3:
    focus: 课外迁移和深度鉴赏
    estimated_hours: 8-10
    key_tasks:
      - 课外文言文限时训练（每篇8分钟）
      - 古诗比较鉴赏专项
      - 整理北京近5年古诗文真题的答案规范
      - 积累鉴赏用的文学术语和精彩表达
