# ============================================================
# 北京中考总分制度变迁（2023-2029）
# ============================================================
# 数据来源：北京教育考试院、北京市教委
# 最后更新：2026-04-11
# 用途：将不同年份分数线统一换算为可比口径

region: 北京市
subject: 中招录取

scoring_history:

  2023:
    total: 660
    subjects:
      语文: 100
      数学: 100
      外语: 100
      物理: 80
      化学: 80  # 化学/生物取高
      生物: 80
      历史: 80  # 历史/地理取高
      地理: 80
      道德与法治: 80
      体育: 40  # 过程性10+现场30
    note: 化学/生物取高者计入，历史/地理取高者计入，实际最多计8科

  2024:
    total: 670
    subjects:
      语文: 100
      数学: 100
      外语: 100
      物理: 80
      化学: 80
      生物: 80
      历史: 80
      地理: 80
      道德与法治: 80
      体育: 50  # 过程性20+现场30（体育提高10分）
    note: 与2023基本相同，仅体育从40增至50

  2025:
    total: 510
    subjects:
      语文: 100
      数学: 100
      外语: 100
      物理: 80
      道德与法治: 80
      体育: 50
    removed_from_score: [历史, 地理, 化学, 生物]
    removed_note: 历史/地理/化学/生物改为考查科目，ABCD等级呈现，不计入总分
    note: 重大改革——从10科缩减为6科计分

  2026:
    total: 510
    note: 与2025相同

  2027-2028:
    total: 520
    note: 体育从50增至60

  2029:
    total: 530
    note: 体育增至70

# 不同年份分数换算参考（粗略）
# 2024分数 ≈ 2023分数 + 10（仅体育差异）
# 2025分数 与 2023/2024 不可直接比较（科目数不同）
# 粗略换算：2025分数/510 ≈ 2024分数/670 的相对排位

conversion_note: |
  由于2025年改革，不同年份分数线不可直接比较。
  建议使用"区排名"作为跨年比较的稳定指标。
  例如：2024年朝阳区八十中646分(区排678名) ≈ 2025年482分(区排685名)
