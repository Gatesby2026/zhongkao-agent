# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
quota_allocation:
  policy_summary: |
    西城区优质高中集中，校额到校是普通初中学生进入四中/实验的重要途径。
    2025年西城区校额到校最低录取控制线约为462分（510分制）。
    西城整体教学水平高，校额到校分数线与统招线差距相对小。

  typical_discount:
    tier1_schools: "统招线下降10-18分（四中/北师大实验）"
    tier2_schools: "统招线下降15-25分（八中/师大附中等）"
    tier3_schools: "统招线下降20-30分（161/三十五中等）"

  examples_2025:
    - high_school: 北京四中
      统招线: 487
      校额到校典型线: 472-482
      降分幅度: 5-15分
      note: 西城顶尖校，校额到校竞争也很激烈
    - high_school: 北师大实验中学
      统招线: 481
      校额到校典型线: 468-478
      降分幅度: 3-13分
    - high_school: 八中
      统招线: 478
      校额到校典型线: 460-472
      降分幅度: 6-18分
    - high_school: 161中学
      统招线: 470
      校额到校典型线: 448-462
      降分幅度: 8-22分

  advice_for_students: |
    西城校额到校分数线与统招线差距不大，仍需高分才有机会。
    但对于在普通初中就读的学生，这是进四中/实验的关键通道。
    建议：尽早了解本校分到了哪些高中的名额。
