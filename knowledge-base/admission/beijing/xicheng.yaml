# 数据来源：北京中考信息网 (zhongkaobj.cn) 转载自北京教育考试院
# 最后更新：2026-04-13
# 注意：2023总分660，2024总分670，2025总分510（改革后不可直比）

district: 西城区
region: 北京市

# ================================================================
#  学校分层（基于2025年区排名）
# ================================================================
tiers:
  tier1:
    name: 第一梯队（区排名前2000）
    schools: [北京四中, 北京八中, 北师大实验中学, 北师大附中, 北师大二附中]
    note: 西城五大名校
  tier2:
    name: 第二梯队（区排名2000-4000）
    schools: [161中学, 三十五中, 十三中, 北师大亚太实验学校, 十五中]
  tier3:
    name: 第三梯队（区排名4000-7000）
    schools: [铁路二中, 十四中, 一五六中学, 三中, 一五九中学, 西城外国语学校, 四十四中, 育才学校]
  tier4:
    name: 第四梯队（区排名7000+）
    schools: [三十一中, 三十九中, 七中, 六十六中, 鲁迅中学, 回民学校, 四十三中, 教院附中, 宣武外国语, 五十六中]

