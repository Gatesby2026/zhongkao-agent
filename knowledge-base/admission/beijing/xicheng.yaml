# ================================================================
#  目标分数速查（2026年参考，基于2025年510分制）
# ================================================================
target_guide_2026:
  - target: 四中
    reference_score: 487
    math_target: 92+
  - target: 八中/北师大实验
    reference_score: 481
    math_target: 90+
  - target: 师大附中/师大二附中
    reference_score: 478
    math_target: 88+
  - target: 161/三十五/十三中
    reference_score: 469-470
    math_target: 82+
  - target: 十五中/铁二中/十四中
    reference_score: 459-464
    math_target: 75+
  - target: 普通高中保底
    reference_score: 407-455
    math_target: 60+

# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
quota_allocation:
  policy_summary: |
    西城区优质高中集中，校额到校是普通初中学生进入四中/实验的重要途径。
    2025年西城区校额到校最低录取控制线约为462分（510分制）。
    西城整体教学水平高，校额到校分数线与统招线差距相对小。

  typical_discount:
    tier1_schools: "统招线下降10-18分（四中/北师大实验）"
    tier2_schools: "统招线下降15-25分（八中/师大附中等）"
    tier3_schools: "统招线下降20-30分（161/三十五中等）"

  examples_2025:
    - high_school: 北京四中
      统招线: 487
      校额到校典型线: 472-482
      降分幅度: 5-15分
      note: 西城顶尖校，校额到校竞争也很激烈
    - high_school: 北师大实验中学
      统招线: 481
      校额到校典型线: 468-478
      降分幅度: 3-13分
    - high_school: 八中
      统招线: 481
      校额到校典型线: 460-472
      降分幅度: 9-21分
    - high_school: 161中学
      统招线: 470
      校额到校典型线: 448-462
      降分幅度: 8-22分

  advice_for_students: |
    西城校额到校分数线与统招线差距不大，仍需高分才有机会。
    但对于在普通初中就读的学生，这是进四中/实验的关键通道。
    建议：尽早了解本校分到了哪些高中的名额。
