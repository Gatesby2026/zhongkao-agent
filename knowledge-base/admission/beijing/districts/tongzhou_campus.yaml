# 通州区高中「校园生活」数据
# 字段: class_system(班型) / schedule(作息) / management(管理) / boarding_detail(住宿)
#       dining(食堂) / activities(活动·社团) / voices(学生/家长评价)
# 铁律: 绝不编造;每字段有出处(source);查不到的字段省略;整校查不到不写。
# 标注: 网传/家长整理类标 "民间整理·待核"。
# 采集日期: 2026-06-22
# 校名逐字对齐 tongzhou_admission_codes.json schools 正名。

district: 通州
collected_at: "2026-06-22"
note: >-
  仅收录可在公开网络(学校官网/公众号、百科、家长帮、知乎、中考/小升初信息站)查到的字段。
  查不到的学校或字段一律省略。部分字段为往年信息(住宿/食堂条件相对稳定,作息/班型可能逐年微调),
  以学校最新通知为准。

schools:
  北京市通州区潞河中学:
    boarding_detail:
      value: >-
        寄宿制高中,不支持走读。宿舍分普通宿舍/公寓/两人公寓多种;有信源称普通宿舍六人间(位于清真食堂楼上),
        公寓四人间(国际部高层),两人公寓在国际部;另一信源称宿舍每间8人、2个独立卫生间、1个洗漱池、
        独立内隔间阳台、2台风扇+1台空调、上下铺。床位按学号分配,一床一插座、可挂蚊帐,配独立储物柜。
        男女宿舍分楼,各楼配专职宿管,外人需登记入内。
        (两信源宿舍人数说法不一,均保留待核)
      source:
        - "https://zhuanlan.zhihu.com/p/674627039 (知乎·北京中考住宿盘点)"
        - "https://www.scxye.com/news/120262.html (选校招生网·潞河2023宿舍条件,民间整理·待核)"
    schedule:
      value: >-
        热水供应时间:中午11:45-12:30、下午17:15-18:30、晚上22:00-22:35。
        作息制度严格,不准晚归和随意外出。(完整起床/熄灯作息表未查到)
      source: "https://www.scxye.com/news/120262.html (选校招生网,民间整理·待核)"
    management:
      value: >-
        宿舍楼配专职宿舍管理员,实行严格作息制度,禁止晚归和随意外出,外人入楼需登记。
      source: "https://www.scxye.com/news/120262.html (民间整理·待核)"
    dining:
      value: >-
        校内有五个食堂:一食堂在学校中央;四食堂离初中部近、座位较多;三食堂为清真食堂(主要服务内地新疆班/内高班学生);
        国际部食堂种类多样。
      source: "https://zhuanlan.zhihu.com/p/674627039 (知乎,民间整理·待核)"
    class_system:
      value: >-
        2024级高一共16个班:1-4班创新实验班;5-8班普通平行班;9、10班分层教学实验班;
        11、12班文科实验班;13、14班理科实验班;15、16班为「1+3」人才培养试验项目班。
        (年度可能调整,以当年分班为准)
      source: "搜索聚合(知乎/中考信息站),民间整理·待核"
    activities:
      value: >-
        社团丰富:配指导老师的专业社团(广播站、潞园文学社、潞河之星电视台等),学生自创高质量社团
        (思辩社、模拟联合国等)及各类小众社团。规模最大的为天文社团——2014年被评为北京市学生
        金鹏科技团(天文分团)。
      source: "https://zhuanlan.zhihu.com/p/674627039 + 学校百科,民间整理·待核"

  北京市通州区永乐店中学:
    boarding_detail:
      value: >-
        通州区规模最大的完全中学,提供住宿,住宿生规模大(有信源称住宿生近1600名)。
        建有学生宿舍楼、学生公寓,宿舍配中央空调。
      source:
        - "https://baike.baidu.com/item/北京市通州区永乐店中学/8445612 (百度百科)"
        - "https://www.gx211.cn/school/school6247.shtml (中国高校之窗)"
    dining:
      value: "校内食堂可容纳约3000人就餐。"
      source: "https://baike.baidu.com/item/北京市通州区永乐店中学/8445612 (百度百科)"
    activities:
      value: >-
        校园设施支持丰富活动:大型操场、室内八道标准游泳馆、大型体育馆、可容纳1200人多功能报告厅、
        专业电视台演播室、多功能高清自动录播室、心理咨询室、安全体验教室等。
        (设施信息;具体社团清单未查到)
      source: "https://baike.baidu.com/item/北京市通州区永乐店中学/8445612 (百度百科)"

  北京市通州区运河中学:
    boarding_detail:
      value: >-
        建有学生宿舍楼、学生公寓,提供住宿。据学生反馈,宿舍为上下铺六人间,每人一张桌椅靠墙摆放。
      source:
        - "https://baike.baidu.com/item/北京市通州区运河中学/9473723 (百度百科)"
        - "https://www.zhihu.com/question/413739268/answer/1403735170 (知乎·学生反馈,民间整理·待核)"
    schedule:
      value: >-
        晚放学时间随季节调整:春秋季约17:30、夏季约18:20、冬季约17:00。
        (为学生反馈的放学时段,非完整作息表;民间整理·待核)
      source: "https://www.zhihu.com/question/413739268/answer/1403735170 (知乎,民间整理·待核)"
    class_system:
      value: >-
        高中设有「黄纬禄班」(2023年起遴选优秀新生组建),分科创1班(侧重理科思维)与
        科创2班(侧重人文社会学科)。
      source: "https://baike.baidu.com/item/北京市通州区运河中学高中部/54112563 (百度百科)"
    activities:
      value: >-
        三十余个学生社团,含汇学轩(篆刻)、非白阁(粉笔画)、摄影社、YH-DANCE、机器人社团、
        航天社团、烘焙创作与体验社团、春雨文社、模拟政协社团、造物坊,以及篮球、足球、田径等。
      source: "https://www.xscxx.com/chuzhong/tongzhou/202410232620.html + 学校百科,民间整理·待核"

  北京市通州区张家湾中学:
    boarding_detail:
      value: >-
        完全中学,提供住宿(收普通高中学费、住宿费),建有教师和学生宿舍楼。
        据一名学生反馈,洗澡的地方不在宿舍楼内,洗澡后可能赶不上吃饭。
        招生计划注明「考生入学后可申请走读」。
      source:
        - "https://baike.baidu.com/item/北京市通州区张家湾中学/54113002 (百度百科)"
        - "https://www.zhihu.com/question/283917122 (知乎·学生反馈,民间整理·待核)"
        - "tongzhou_admission_codes.json (官方统招计划 note:可申请走读)"
    dining:
      value: >-
        设有师生食堂(2025年公开招标「师生食堂委托经营服务及物业服务」)。
      source: "http://zhengfu.bjtzh.gov.cn/bjtz/xxfb/202302/1638668.shtml (通州区政府采购公示)"
    management:
      value: "校风良好,管理严格,以德育为首。"
      source: "https://www.xschu.com/xiaoshengchu/11/40454.html (学校介绍,民间整理·待核)"

  北京学校:
    class_system:
      value: >-
        北京市教委直属、小初高一体化全日制公立学校,高中规划30个教学班。
        (高中具体班型设置未查到公开信息)
      source: "https://baike.baidu.com/item/北京学校/9354937 (百度百科)"
