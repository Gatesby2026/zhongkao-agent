        配套设施完善。(具体社团/活动清单未查到)
      source: "https://baike.baidu.com/item/北京学校/9354937 (百度百科)"

  北京中加学校:
    class_system:
      value: >-
        中外合作普通高中,高中(高一至高三)分AP班、实验班、普通班,设约30个高中教学班、1000余人。
      source:
        - "https://baike.baidu.com/item/北京中加学校/2238895 (百度百科)"
        - "http://www.ccsc.com.cn/index.php/Index/listcontent/1/1/c (学校官网·学校简介)"
    boarding_detail:
      value: >-
        全寄宿制。学生宿舍四人一间,充分供应热水;生活指导教师全程关心学生,校医按计划防治保健,
        保安昼夜值勤。
      source:
        - "http://www.ccsc.com.cn/index.php/Index/listcontent/1/2/c (学校官网·校园设施)"
        - "https://baike.baidu.com/item/北京中加学校/2238895 (百度百科)"
    schedule:
      value: >-
        全寄宿作息(含小初):06:35起床;06:35-07:10洗漱晨练;07:10-07:40早餐;
        07:40-07:55升旗/晨读;08:00-11:25上午四节课+课间操+眼保健操;11:35-12:15午餐;
        12:15-13:30午休;13:40-16:55下午四节课+眼保健操;17:05-17:45小晚自习;
        17:55-18:30晚餐;18:50-19:30大晚自习;之后宿舍休息、洗漱就寝(小学约21:10熄灯)。
        (高中段就寝时间可能略晚,以学校通知为准)
      source: "https://www.ysxiao.cn/beijing-youeryuan/207053.html (北京幼升小网·中加全天作息表,民间整理·待核)"
    dining:
      value: >-
        食堂实行自助餐制,讲究营养配餐;2004年12月被原北京市卫生局授予「市卫生A级」标牌。
      source: "http://www.ccsc.com.cn/index.php/Index/listcontent/1/1/c (学校官网) + 百度百科"
    activities:
      value: >-
        开设20多个社团,含足球、篮球、棒球、羽毛球、曲棍球、击剑、马术、戏剧、舞蹈、模联、
        电影摄影、演讲辩论等;另设足、篮、网、排球场及400米标准跑道。
      source: "http://www.ccsc.com.cn/index.php/Index/listcontent/3/26/c (学校官网·校园生活) + 百度百科"

  北京通州华仁学校:
    class_system:
      value: >-
        十二年一贯制民办学校,小班制教学,融合中国课程与加拿大课程体系,
        开设双语实验班、中加特色班等多元化班级。
      source: "https://www.ccsc.com.cn/hrccsc/gzjs/ (学校官网·高中部介绍) + 百度百科"
    boarding_detail:
      value: >-
        寄宿兼走读管理。低年级可走读、有需要可寄宿;高年级原则上建议住校。
        寄宿生一般周五下午离校、周日下午返校,可申请周末寄宿。宿舍配空气净化器设备。
        住宿费12000元/学年,伙食费按实际用餐计算。
      source:
        - "https://www.ccsc.com.cn/hrccsc/zsqa/ (学校官网·招生问答)"
        - "https://www.ccsc.com.cn/index.php/Index/hrcontent/4239/c (学校官网·收费标准)"
    activities:
      value: >-
        开设数十个学生社团,覆盖学术、艺术、科技、人文社科、社会实践、运动6大门类。
        校内设室内篮球馆、健身房、乒羽中心、400米国际标准跑道及足球场、篮球场、钢琴中心、
        艺术画室、茶艺室、陶艺室、形体教室等。
      source: "https://www.ccsc.com.cn/hrccsc/ + https://www.ccsc.com.cn/hrccsc/hrjs/ (学校官网)"

  北京潞河国际教:  # 注:JSON 正名截断,实际为「北京潞河国际教育学园」
    class_system:
      value: >-
        国际高中,同时开设 A-Level、AP 及香港高考 HKDSE 课程,学分制,学生按兴趣专长自主选课。
      source:
        - "http://m.guojixuexiao.net/ischool/bjlhxy/news/17153.html (招生简章)"
        - "http://www.guojixuexiao.org/school/lhgjjyxy/ (国际学校网)"
    boarding_detail:
      value: >-
        提供住宿,酒店式后勤管理,二人间/四人间。住宿费按规格:四人间约4800元/学年、
        双人间约9600元/学年。
      source: "http://m.guojixuexiao.net/ischool/bjlhxy/news/17153.html (招生简章) + 国际学校网"
    dining:
      value: "五个各具特色的食堂,提供中、西、韩餐。"
      source: "http://www.guojixuexiao.org/school/lhgjjyxy/ (国际学校网)"
    management:
      value: "实行导师制,导师对学生学习生活、选课、留学及生涯规划全程指导。"
      source: "http://www.guojixuexiao.org/school/lhgjjyxy/ (国际学校网)"
    activities:
      value: >-
        课外活动丰富:学生会、社团联合会、学生志愿者协会、电视台等学生组织;
        合唱团、健美操队、模拟联合国、戏剧社、炫舞社、篮球社、动漫社、油画&雕塑社、
        手工艺社、摄影社、攀岩&远足社、乒乓球社、健身社等。
      source: "http://www.guojixuexiao.org/school/lhgjjyxy/ (国际学校网)"

  北京市通州区私立树人学校:  # 现名「北京市私立树人·瑞贝学校」
    class_system:
      value: >-
        K-12 全日制寄宿制学校(位于通州宋庄),招收中外籍学生。高中部(10-12年级)设
        双语高中、艺术高中、国际高中三种班型:双语高中限京籍、每班约30人;艺术高中
        (以艺术专业为发展方向)京籍/非京籍、每班约30人;国际高中不限户籍国籍、每班约20人。
      source:
        - "https://www.shuren.org/article/1346 (学校官网·高中部招生简章)"
        - "https://baike.baidu.com/item/北京市私立树人·瑞贝学校/9472397 (百度百科)"
    boarding_detail:
      value: >-
        可走读或住宿。校内共5间学生宿舍,住宿生(小学一年级至高中)有专属住宿区,
        周一至周五由专业生活老师负责生活管理;走读生(幼儿园至高中)有专属午休床位,
        保证每日1小时以上午休。
      source: "https://www.shuren.org/ + https://www.shuren.org/article/1346 (学校官网)"
    dining:
      value: >-
        独立高级餐饮团队(厨师长为前五星级饭店行政总厨、国家一级烹饪大师)。
        校内3间食堂分别服务幼儿园/小学/初高中,每日三餐两点,住宿生额外提供夜宵。
      source: "https://www.shuren.org/ (学校官网)"
    management:
      value: "封闭式管理,设校医室、24小时警卫及全方位监控。"
      source: "https://www.shuren.org/ (学校官网) + 百度百科"

  北京德闳明德高中:  # 隶属北京德闳学校(通州格拉斯小镇)
    class_system:
      value: >-
        15年一贯制国际化双语寄宿学校的高中段。10年级为 pre-IB「开拓之旅」过渡课程
        (核心课程+六大实践模块),11-12年级开设 IBDP 国际文凭大学预科课程。
      source:
        - "https://m.guoji.114study.com/school/dehong/news/21272/ (高中部招生简章)"
        - "https://beijing.dehong.cn/ (学校官网)"
    boarding_detail:
      value: >-
        寄宿学校,全校可容纳约1800名学生在校学习、可满足约400名学生寄宿。
        校园毗邻湖水,临近自然森林,环境幽静。
      source: "https://beijing.dehong.cn/our-school/about-us (学校官网) + 国际教育在线"
