# 门头沟区 普通高中统招录取最低分 + 区排名(位次) enrich
# 校名严格逐字对齐 mentougou_admission_codes.json 的 schools[].name(2025 官方统招正名)
# total_score: 2025=510 / 2024=660
# conf: medium(>=2 独立源互证) / low(1 源)；无源→省略该校
#
# 采集结论(2026-06-22)：门头沟为远郊小区，统招录取线/区排名几乎无任何聚合站收录
#   (gaokzx / zhongkaobj / bendibao / xschu / 知乎 各区汇总均明确"无门头沟")。
#   声称含门头沟的 gaokzx 历年页(134211 / 125024 / 148097)数据全在图片或为空白模板，
#   WebFetch 无法读取文字，且 148097 表格本身就是空("——")。
#   唯一搜到的具体数据点是 2024 景山京西 550分/区排724，但源头是"据热心家长分享"
#   (gaokzx 130154)，单源 + 二手传闻，仅作 low 置信记录，请勿据此做硬决策。
#   2025(510 总分)体系下门头沟任何学校的统招线/位次：0 可靠来源。

district: 门头沟
collected_at: "2026-06-22"
note: >-
  门头沟统招录取线 T3 可得性极差。聚合站普遍不收门头沟；区招考/官方一分一段只发分数段人数，
  不发逐校统招线。下方仅 1 条 low 置信(2024 景山京西，家长传闻)，2025 全缺。

schools:
  北京景山学校京西实验学校:
    scores:
      - year: 2024
        total_score: 660
        admit_min_score: 550
        rank: 724
        conf: low
        source:
          - name: "北京高考在线 - 北京新增8所公办普高首次招生"
            url: "https://www.gaokzx.com/gk/zhongkao/130154.html"
            quote: "据热心家长分享，今年录取分数线为550分，区排724"
        caveat: >-
          单源且为"家长分享"二手传闻，非官方/非区招考发布；该校 2024 为高中首年招生。
          仅供参考，未能找到第二独立源互证。2025(510)无数据。

