# 怀柔区 普通高中统招录取线 enrich
# 总分口径: 2025=510 / 2024=660
# 铁律: 校名逐字等于 huairou_admission_codes.json 正名; 无可靠来源则省略; 不编造.
# 采集说明: 怀柔为远郊小区, 各类网站(gaokzx/zhongkaobj/zgkao/bendibao)对怀柔
#   多数只发布"一分一段表"(分数/人数/累计), 几乎无逐校统招录取线对照表.
#   下方仅收录交叉核验通过的数据点.

district: 怀柔
schools:
  # 北京市第一O中学怀柔分校 (code 216003, 官方表记"一零一中学怀柔分校")
  北京市第一O中学怀柔分校:
    scores:
      "2024":
        total: 660
        admission_min: 616
        rank: 273   # 区排名(位次); 与官方一分一段表 616 分累计人数 273 完全吻合
        source:
          - name: "北京中考信息网(zhongkaobj) — 2025北京中考分数揭秘(内含2024各区逐校统招线表): 怀柔区 一零一中学怀柔分校 616 / 区排273 / 区考生1549 / 录取率17.62%"
            url: "https://www.zhongkaobj.cn/lqfsx/qitaqu/202502249690.html"
          - name: "北京高考在线(gaokzx)检索结果: 一零一中怀柔分校2024年高中部统招录取分数线616分"
            url: "https://www.gaokzx.com/gk/zhongkao/140768.html"
          - name: "怀柔区2024一分一段表(bendibao/gaokzx)交叉核验: 616分累计人数=273, 印证rank=273"
            url: "https://www.gaokzx.com/gk/zhongkao/133895.html"
        conf: medium
        note: >-
          616分(2024)经≥2源互证, 且与官方一分一段表内部一致。
          另见一条来源称"2024统招485分超区均线32分"——疑混淆校额到校/其它口径
          (485在660总分下与616/273矛盾, 不采纳), 故 admission_min 仍取 616。

# === 以下学校未采集到可靠数据, 按铁律省略, 仅记录排查留痕 ===
# 怀柔一中(116001): zhongkaobj 2024逐校表中该校录取线显示为"/"(空缺, 无值);
#   另有 zgkao 页"去年统招611分"实指2023年(被搜索引擎误标为2024), 单源且非2024/2025口径 -> 跳过.
# 怀柔二中(216001) / 红螺寺中学(216002) / 索兰诺(216005) / 青苗(216006):
#   各源均无逐校2024/2025统招录取最低分, 仅有一分一段表 -> 跳过.
# 2025(510总分)口径: 全区任何学校均未检索到可靠逐校统招录取线 -> 全部跳过.
