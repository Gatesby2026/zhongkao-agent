district: 顺义
purpose: 高中办学特色 + 高考出口(民间参考),供中考家长选校用
generated: 2026-06-22
disclaimer: |
  - 特色(features)采自学校官网/公众号、百度百科、阳光高考、gaokzx、zhongkaobj 等公开信源,力求真实,tags 限定词表。
  - 高考(gaokao)字段仅在真实可查时填写,统一标注「民间·非官方」,非学校官方口径;查不到的不写。
  - 校名逐字对齐 shunyi_admission_codes.json 正名;搜不到特色的学校跳过。
