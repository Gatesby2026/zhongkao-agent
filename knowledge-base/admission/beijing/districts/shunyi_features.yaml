  - 学科竞赛
  - 综合均衡
  - 寄宿制

schools:
  北京市顺义牛栏山第一中学:
    school_code: "113001"
    features:
      style: 顺义龙头校。北京市示范性普通高中,与中科院合作开展「科技拔尖创新人才培养」实验,每年百名科学家进校授课,数十名学生进入国家重点实验室做课题;推进「1+X」高效课堂改革,国际交流活跃。
      tags:
        - 科技创新
        - 理科见长
        - 课程改革
        - 学科竞赛
      source: 学校官网(nlsyz.com.cn)、百度百科、阳光高考(chsi)
    gaokao:
      note: 民间·非官方
      detail: 2025 年高考最高分约 693,650 分以上约 36 人,600 分以上约 202 人;顺义区 680 分以上高分段几乎集中于本校。历年清北录取居顺义区首位。
      source: zhongkaobj.cn(2025 北京各区高考喜报)、gaokzx.com、xschu.com

  北京市顺义区第一中学:
    school_code: "113002"
    features:
      style: 顺义老牌优质校。以科技教育为办学特色,获全国科学教育实验校、「央馆人工智能课程」试点校、北京市中小学科技教育示范校、艺术教育特色校;构建「四自五育」课程体系与「五环节」自主课堂;「1+3」项目以「人文底蕴、科技特色」为定位。
      tags:
        - 科技创新
        - 课程改革
        - 综合均衡
      source: 学校简介(gx211)、百度百科、gaokzx(1+3 简章)
    gaokao:
      note: 民间·非官方
      detail: 民间统计称本科率长期在 90%以上、重点大学录取率约 60%-70%;历史上累计为清北输送学生较多。具体逐年分数段无公开权威口径,仅供参考。
      source: 学校简介(gx211)、zhihu/xschu 等家长平台讨论(口径不一)

  北京市顺义区杨镇第一中学:
    school_code: "113003"
    features:
      style: 积淀「和、实、搏、爱」校风。竞技体育是办学亮点(1978 年北京市田径传统校,篮球/乒乓/田径强项);民族团结进步教育为特色,是内地新疆高中班规模最大的学校之一;开设智能机器人、航空科技等百余门选修课,科技教育示范校。
      tags:
        - 体育特长
        - 科技创新
        - 综合均衡
      source: 百度百科、阳光高考(chsi)、学校简介(gx211)

  北京市顺义区第二中学:
    school_code: "213001"
    features:
      style: 「学生有特长、教师有特点、学校有特色」为目标。以「立德树人,智圆行方」为校训,北京市体育项目传统校、健康促进校、教育科研先进校;理化生/计算机/通用技术/音美舞蹈专用教室齐备,体育设施完善。
      tags:
        - 体育特长
        - 综合均衡
      source: 学校简介(gx211)、学校官网(dayinmao)

  北京市顺义区第九中学:
    school_code: "213002"
    features:
      style: 「以美育德、以美益智、多元发展」。艺体教育是核心办学特色,为艺术、体育特长生搭建发展平台,多名学生考入清华美院、中央戏剧学院、上海戏剧学院、中国传媒大学等;北京市课改样本校、国家级教育体制改革特色发展试验项目校,2021 年度全国青少年校园足球特色学校。
      tags:
        - 艺术特长
        - 体育特长
        - 课程改革
      source: 百度百科、阳光高考(chsi)、学校简介(gx211)

  北京市第四中学顺义分校:
    school_code: "213003"
    features:
      style: 北京四中输出管理与品牌。特色方向「和润育人」,北京市教委「高中校特色建设」项目样本校;开设国家/地方/校本三级课程、数十门校本课(话剧《茶馆》、扎染服装设计等);「1+3」培养方向「数理应用创新」,培养「科学素养突出、人文底蕴深厚」的人才。
      tags:
        - 课程改革
        - 理科见长
        - 综合均衡
      source: 百度百科/本地宝(招生简章)、人民网报道、zgkao(2022 高中招生简章)

  北京师范大学附属实验中学顺义学校:
    school_code: "213005"
    features:
      style: 北师大实验中学输出资源。传承「学为人师,行为世范」校训与「求真务实」文化,依托国际空港区位探索智慧教育与跨学科融合教学;分基础/拓展/特色三层课程,配 STEAM 课程综合楼、游泳馆;「1+3」以科学教育创新与科学人才贯通培养为定位。
      tags:
        - 科技创新
        - 课程改革
        - 综合均衡
      source: 学校官网(bsdsysy.com.cn)、百度百科

  北京市顺义牛栏山第一中学板桥学校:
    school_code: "213006"
    features:
      style: 共享牛栏山一中优质资源。秉承牛中「厚德、博学、求实、创新」理念,小班化、个性化培养,配 AI 自习室等现代设施;开设科技创新、艺术体育、社会实践等特色课程;全国中小学影视教育试点实验校。
      tags:
        - 科技创新
        - 综合均衡
      source: 百度百科、bangboer 等(校情/招聘公告)

  北京市鼎石学校:
    school_code: "213012"
    features:
      style: 顺义后沙峪 12 年一贯制寄宿国际名校(2014 年创办)。典型 IB 双语校(小学 IPC、初中 IBMYP、高中 IBDP);独创「文化双主线」——强化中国传统文化同时塑造跨文化沟通力;寄宿制社区培养,配 STEAM 实验室、艺术创作中心。
      tags:
        - 国际方向
        - 寄宿制
        - 外语特色
      source: 百度百科、翰林/125 国际教育、学校公开介绍

  北京市顺义区青苗学校:
    school_code: "213013"
    features:
      style: 国内较早的中西合璧双语教育品牌(始创 1998)。国家大纲核心课程 + IB 探究/项目式教学;高中开设 IB-DP、IGCSE、A-Level、国际艺术课程;30 余种课外活动,培养双母语、多文化视角的学生。
      tags:
        - 国际方向
        - 外语特色
      source: 学校官网(shunyi.bibs.com.cn)、国际学校网

  北京市顺义区诺德安达学校:
    school_code: "213014"
    features:
      style: 诺德安达全球教育集团成员。执行国家义务教育课标 + 国际教学法,高中 IGCSE 衔接 A-Level/IBDP;与茱莉亚学院(艺术)、麻省理工(STEAM)合作,「大师通识课」邀普林斯顿/剑桥/哥大等教授主讲。
      tags:
        - 国际方向
        - 外语特色
      source: 学校官网(nasbeijing.cn)、jingkids/国际学校网

  北京市新英才学校:
    school_code: "213008"
    features:
      style: 中央别墅区 15 年一贯制寄宿国际化学校。多元高中:剑桥 A-Level/IGCSE(2005/2006 起)、美国 AP(18 门)、香港 DSE(2023 起)、德国留学项目;艺体教育(15 年一贯制)与人工智能信息科技课程突出,设少年科学院与四支科创校队。
      tags:
        - 国际方向
        - 寄宿制
        - 科技创新
        - 艺术特长
      source: 学校官网(bjnewtalent.com)、百度百科、国际学校网

  北京市顺义区君诚学校:
    school_code: "213009"
    features:
      style: 温榆河畔民办非营利涉外国际学校(2000 年创办)。全人教育、小班教学;获美国 Cognia 认证、IBO 授权 IBDP、英国 BTEC 体育认证、AP(CEEB 694107);融合美国 Common Core + 英国剑桥 + 中国国家课程,重视中国传统文化;开设 IGCSE/AP/IB/A-Level/国际艺术。
      tags:
        - 国际方向
        - 外语特色
      source: 百度百科、国际学校网/ieduchina

  北京市新府学外国语学校:
    school_code: "213010"
    features:
      style: 顺天府学教育集团创办,12 年一贯制寄宿/走读双语国际化学校。中国基础教育优势 + 西方教育精粹;延续「数学+」与「大语文」特色;高中开设 AP、IB-DP、A-Level、加拿大 OSSD;开设武术、民族舞等中华文化课程。
      tags:
        - 国际方向
        - 外语特色
        - 寄宿制
      source: 百度百科、jingkids、国际学校网

  北京市海嘉学校:
    school_code: "213011"
    features:
      style: 后沙峪 12 年一贯制双语学校(BIBA,2006 年创办)。中美教育标准为基础,突出中华文化;英文比例幼/小/中递增(50%/70%/80%);高中 IGCSE + IB DP;IBDP 认证校、美国 WASC 认证校,ACAMIS 会员。
      tags:
        - 国际方向
        - 外语特色
      source: 学校官网(bibachina.org)、百度百科、jingkids/国际学校网
