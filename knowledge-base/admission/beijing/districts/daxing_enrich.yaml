  仅在无实际数据时参考,未与 actual 混用。
  2024 总分官方为 670(非 660);2024 数据 5 校(627/617/612/607/591)由
  zhongkaobj + xschu(+ 实验大兴另有 zgkao) 三源互证, medium。
