# 丰台区高中 办学特色 补采(gap)——「有录取线但原 fengtai_features.yaml 未单列」的目标校
# 用途: 中考家长选校参考
# 铁律: 绝不编造、绝不张冠李戴; 特色须真实可查; tags 限词表; 校名逐字等于 fengtai_admission_codes.json 正名
# tags 词表: 理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段: 仅真实可查才写, 一律标注「民间·非官方」, 查不到不写
# 采集日期: 2026-06-22

district: 丰台
collected_date: "2026-06-22"
disclaimer: "特色信息来自学校官网/公众号/北京中考信息网/百度百科/地方媒体等公开来源; 仅供选校参考。两校均为近年新办校, 高考出口数据未检索到可信公开来源, 故 gaokao 字段不填(绝不编造)。"

schools:
  北京十一学校中堂实验学校:
    features:
      style: "北京十一学校在丰台区合作开办的公立分校(完全中学), 隶属丰台区教委, 与十一学校总部通过集体教研培训、共同课程研发「同频共振」。延续十一学校「创造适合每一位学生发展的教育」与走班/不分班传统: 六大「学习社区」(语言文学与表达/道德人文与社会/数学/科学技术与工程/体育健康与生活技能/综合实践), 课程分基础性、研究性、拓展性三类, 语数英开设高端荣誉课程与俱乐部课程; 配大型开放式图书馆、技术工坊、艺术馆、100 余间专业学科教室; 「一位老师负责约 10 名学生」的学习社区反馈/分层走班机制。"
      tags:
        - 课程改革
        - 科技创新
        - 综合均衡
      source: "北京中考信息网·丰台校情介绍《北京十一学校中堂实验学校》 https://www.zhongkaobj.cn/zhongkao/zhongxue/202501077901.html ; 腾讯新闻《十一中堂学校在新校址正式开学》 https://news.qq.com/rain/a/20230831A09IHO00 ; 北京日报客户端《搬新家,120名新生入读六大「学习社区」》 https://xinwen.bjd.com.cn/content/s64f03d07e4b00547e3de0f43.html ; 百度百科·北京十一学校中堂实验学校"

  北京市第十中学晓月苑分校:
    features:
      style: "北京市第十中学教育集团成员校, 2023 年创办、具独立法人资质的完全中学, 位于永定河东岸宛平街道晓月苑(2.1 万㎡、24 班规模)。以「人文特色」为核心定位, 旨在培养兼具人文特质与创新实践能力的复合型人才; 依托语文学科(丰台区学科建设示范基地)开展贯通培养的语文教学策略研究, 设区级「1+3」培养实验项目(面向丰台区招 30 人, 面试以小组讨论形式考察)。"
      tags:
        - 文科人文
        - 课程改革
      source: "北京幼升小网《丰台区北京市第十中学晓月苑分校2025年「1+3」培养实验公告》 https://www.ysxiao.cn/nenglipeiyang/214910.html ; 北京市发改委《今年9月北京城南4所学校投用》 https://fgw.beijing.gov.cn/gzdt/fgzs/mtbdx/bzwlxw/202408/t20240828_3784185.htm"
