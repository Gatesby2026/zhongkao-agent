# 东城区高中办学特色 + 高考出口(民间参考)
# 用途: 中考家长选校参考
# 采集日期: 2026-06-22
# 数据源: 学校官网/公众号、百度百科/维基、北京中考信息网(zhongkaobj.cn)东城校情介绍、
#         阳光高考、gaokzx、北京小升初/中考网、相关政府/高校官网、家长社区
# 铁律: 校名逐字等于 dongcheng_admission_codes.json 正名; tags 限固定词表;
#       特色须真实可查; 高考数据均为「民间·非官方」, 仅真实可查才写。
# tags 词表: 理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/
#            课程改革/学科竞赛/综合均衡/寄宿制
# 备注: 北京市第一四二中学 与 北京宏志中学 在官方校库中为两个独立学校代码
#       (201012 / 201013), 民间常将 142中 视为宏志中学实体; 本表按正名各自保留。

schools:

  北京市第二中学:
    features:
      style: "北京市示范高中,「空气养人」办学理念,注重全面与个性发展;金帆艺术团(舞蹈/管乐)、金鹏科技团传统校"
      tags: ["综合均衡", "科技创新", "艺术特长"]
      source: "北京中考信息网(zhongkaobj.cn)东城区公办高中校情介绍 + 百度百科"
    gaokao:
      note: "民间·非官方"
      detail: "连续多年一本率接近100%;2025年1人入全市前20名(屏蔽生)、预计裸分清北20+人;2024年全市前20名2人、700分以上8人"

  北京市第五中学:
    features:
      style: "东城区老牌市级示范高中,数理见长(数学、物理三十余年沉淀、五大学科竞赛培训),与北师大共建合成生物学iGEM项目(东城唯一参与iGEM并获银奖),北大博雅人才共育基地"
      tags: ["综合均衡", "理科见长", "科技创新", "学科竞赛"]
      source: "北京中考信息网(zhongkaobj.cn)校情介绍 + 北师大生命科学学院官网(cls.bnu.edu.cn)大中贯通合成生物学项目"
    gaokao:
      note: "民间·非官方"
      detail: "2024年最高分705分,700分以上2人,650分以上43人,一本率约95%;2023年600分以上100余人"

  北京市第十一中学:
    features:
      style: "东城区市级示范高中,全市率先实施「学习型学校」办学模式,科技(金鹏机器人)与篮球见长,成长课程体系完善"
      tags: ["科技创新", "体育特长", "课程改革"]
      source: "百度百科·北京市第十一中学; 中国教育新闻网 jyb.cn; 自主选拔在线 zizzs.com"

  北京市第五十中学:
    features:
      style: "1953年建校,北京市示范性普通高中,北京市首批人文特色校;推行「1+5」活力课程体系,拥有金帆舞蹈团"
      tags: ["文科人文", "艺术特长", "课程改革"]
      source: "百度百科·北京市第五十中学"

  北京市第五十五中学:
    features:
      style: "北京市示范性高中,1994年成为中国大陆第一所IB国际文凭学校,国际教育(IB MYP/DP)为标志性特色,中外融合培养"
      tags: ["国际方向", "外语特色", "综合均衡"]
      source: "百度百科; 中国高校之窗 gx211.cn; 国际部官网"

  北京市第一零九中学:
    features:
      style: "北京市示范性高中,以西班牙语为主的小语种特色校(国家级教育体制改革试点),兼具金帆管乐与美术专业班的艺术特色"
      tags: ["外语特色", "艺术特长"]
      source: "zhongkaobj.cn 东城校情; 网易·中招政策; edutoutiao.com"
    gaokao:
      note: "民间·非官方"
      detail: "实验班一本率约90%(2024)、85%(2023),本科上线率约95%,最高分642(2023)(实验班口径)"

  北京市第一六六中学:
    features:
      style: "贝满女中改制的东城百年名校,以「博雅教育」为品牌(博学、雅行课程),市级示范性高中,设金鹏科技团与金帆管乐团"
      tags: ["综合均衡", "科技创新", "艺术特长"]
      source: "百度百科/维基百科 北京市第一六六中学; 北京日报《北京第166中学史话》"

  北京市第一七一中学:
    features:
      style: "东城区重点、北京市示范高中,以「五步自主高效课堂」课改和「有层次无淘汰·三优」培养著称,金帆合唱团与金鹏科技团「双金」校,科技、艺术、体育校本课程丰富"
      tags: ["课程改革", "综合均衡", "科技创新", "艺术特长"]
      source: "北京中考信息网(zhongkaobj.cn)、百度百科、北京高考在线(gaokzx.com)、教育部官网(moe.gov.cn 报道171课改)"
    gaokao:
      note: "民间·非官方"
      detail: "近五年六十多人考入北大清华;2024年700分以上3人、650分以上66人、600分以上195人;一本率近年稳定约90%(2023年达97%);2024、2025连续位列东城区第二"

  北京市广渠门中学:
    features:
      style: "北京市示范高中,「华夏第一班·宏志班」发源地,以宏志教育和均衡扎实培养著称;设宏志班、徐特立班(北理工承办)、实验班等特色班型"
      tags: ["综合均衡", "课程改革"]
      source: "gaokzx.com 2026中考热门高中校、自主选拔在线、北京中考在线"
    gaokao:
      note: "民间·非官方"
      detail: "2024年600分以上占线上录取学生78%,一本率近100%;2023年700分以上3人、实验班均分656"

  北京汇文中学:
    features:
      style: "百年名校,办学宽松开放、全面发展学有特长;开设衔接/强基/竞赛课程,物理学科竞赛省一数量居东城区前列"
      tags: ["综合均衡", "学科竞赛", "理科见长"]
      source: "北京高考在线 gaokzx.com、阳光高考、百度百科"
    gaokao:
      note: "民间·非官方"
      detail: "2024年最高分696分,600分以上约140人,学堂班均分640+;近年每年10名以上学生考入清北"

  北京市东直门中学:
    features:
      style: "东城区示范性高中,以叶企孙实验班为核心,联手中科院高能所、清华开展科技创新人才培养;金帆交响乐团享誉京城,推行三层五领域课程体系与大学先修课程"
      tags: ["科技创新", "学科竞赛", "课程改革", "艺术特长"]
      source: "百度百科/阳光高考院校库/北京高考在线 gaokzx.com"
    gaokao:
      note: "民间·非官方"
      detail: "2025年一本上线率近100%,600分以上约85人、650分以上10人;叶企孙实验班近60%考入985、近100%考入211以上院校"

  北京景山学校:
    features:
      style: "1960年创办的教改实验学校,独创小学5年、初中4年、高中3年的「五四三」学制,长年探索从小学到高中贯通的素质教育新路;校训「明理勤奋严谨创新」"
      tags: ["课程改革", "综合均衡"]
      source: "百度百科/维基百科「北京景山学校」、阳光高考中学版"
    gaokao:
      note: "民间·非官方"
      detail: "据民间汇总,2025年清北录取约6人、双一流录取率60%以上、特殊类型招生上线接近100%,高分段有699/694/687分等;一本率长年约90%以上(未经学校官方确认)"

  北京市第一中学:
    features:
      style: "东城300余年历史老牌完中,与北京五中联合办学(优秀生可入五中混编);办人文社科实验班,北京市体育(田径)、艺术双传统校"
      tags: ["文科人文", "体育特长", "艺术特长"]
      source: "百度百科·北京市第一中学; 北京中考信息网 zhongkaobj.cn"
    gaokao:
      note: "民间·非官方"
      detail: "一本率约40%,本科率约100%,近年最高分2021年649/2022年641/2023年642"

  北京市第二十一中学:
    features:
      style: "外语特色办学,2015年起为中法教育部首批法文课程班试点校之一,高中设法语班(每周4节法语课、外教授课)"
      tags: ["外语特色", "课程改革"]
      source: "百度百科/北京中考信息网 zhongkaobj.cn(东城区公办高中校情介绍)"

  北京市第二十二中学:
    features:
      style: "百年完全中学(1924年创办,首任校长蔡元培),数学名师孙维刚执教于此,延续孙维刚数学实验班传统,北京市艺术教育特色校(金帆交响乐团)"
      tags: ["学科竞赛", "综合均衡", "艺术特长"]
      source: "百度百科/维基百科(孙维刚)/北京中考信息网"

  北京市第二十四中学:
    features:
      style: "历史悠久完全中学(前身1923年私立大同中学),校训尚德健体乐学求索,开设机器人、艺术联觉等校本课程,社团与国际交流丰富"
      tags: ["综合均衡", "科技创新"]
      source: "百度百科/北京中考信息网(东城区公办高中校情介绍)"

  北京市第二十五中学:
    features:
      style: "前身为1864年创立的著名育英学校,东西合璧·文化办学,校训致知力行,2005年起设中加合作办学项目"
      tags: ["国际方向", "文科人文"]
      source: "百度百科/维基百科/首都文明网 bjwmb.gov.cn"

  北京市第二十七中学:
    features:
      style: "前身为蔡元培1917年创办的孔德学校(李大钊曾任教、钱三强等校友),全人教育传统,拥有北京市金帆民族管弦乐团"
      tags: ["艺术特长", "文科人文"]
      source: "百度百科/新浪教育/北京幼升小网"

  北京市第五十中学分校:
    features:
      style: "永定门外地区唯一完全中学,人人皆可教理念,开设京剧、内画、面塑、篆刻等数十门传统文化与创客社团课程"
      tags: ["艺术特长", "综合均衡"]
      source: "百度百科/北京中考信息网(东城区高中校情介绍)"

  北京市第五十四中学:
    features:
      style: "和平里地区建校最早中学(1955年),以教育科研为特色(多年北京市教科研先进单位),精致教育办学思路,全国青少年校园足球特色学校"
      tags: ["体育特长", "课程改革"]
      source: "百度百科/北京小升初信息网/北京中考信息网"

  北京市第六十五中学:
    features:
      style: "东城区艺术教育特色校,拥有金帆舞蹈团、金鹏科技团,全国中华优秀传统文化传承学校(版画项目),开设航天、故宫等特色课程"
      tags: ["艺术特长", "科技创新"]
      source: "百度百科/北京中考信息网/北京市教委艺术特色校名单"

  北京市第九十六中学:
    features:
      style: "人文生态融合教育,广渠门中学教育集团成员校,拥有北京市唯一中学生纯打击乐团,棒垒球特色项目,设剑桥思辨表达及STEM整合课程"
      tags: ["艺术特长", "体育特长", "科技创新"]
      source: "北京中考信息网/百度百科/北京小升初信息网"

  北京汇文实验中学:
    features:
      style: "2016年加入北京汇文中学教育集团并增名,与汇文中学一体化管理,小班精品办学,开设国学、领导力等20余门选修课"
      tags: ["综合均衡", "课程改革"]
      source: "百度百科/维基百科/北京中考信息网"

  北京市第一四二中学:
    features:
      style: "与北京中医药大学合作开办全国首个中医药杏林高中实验班(中医预科课程+大学博士生导师,合格者获北中医自主招生认定);民间常与北京宏志中学视为同一实体"
      tags: ["课程改革", "理科见长"]
      source: "北京市中医管理局 zyj.beijing.gov.cn/北京中考网/百度百科"

  北京宏志中学:
    features:
      style: "全国首所公益性完全中学,以救助品学兼优贫困生的「宏志班」闻名(四免一补·设寄宿),开设中医药「杏林实验班」与人工智能教育特色"
      tags: ["综合均衡", "寄宿制", "科技创新"]
      source: "百度百科·北京市宏志中学; 人民网·民生周刊; 北京东城区政府网站; 科大讯飞智慧教育"

  北京市第一六五中学:
    features:
      style: "崇慈女中前身的东城百年校,科技教育是突出办学特色(已逾30年),并以健康教育见长,获世界卫生组织「健康促进学校金牌校」"
      tags: ["科技创新", "综合均衡"]
      source: "百度百科 北京市第一六五中学; m.city8090.com 学校简介"

  北京市龙潭中学:
    features:
      style: "让每名学生充分发展的多样化办学,校训求知问道感恩报国,拥有北京市第一支中学摇滚乐队龙出没,与广渠门中学教育集团一体化办学"
      tags: ["综合均衡", "艺术特长"]
      source: "百度百科/北京中考信息网/北京小升初信息网"

  北京市翔宇中学:
    features:
      style: "东城区唯一民办普通高中,成才先成人理念,以离退休老教师为基础的师资,与新加坡莎顿商学院合作开设剑桥O水准课程"
      tags: ["国际方向"]
      source: "百度百科/北京中考信息网/学校官网 xiangyu.com"
