# 房山区高中 办学特色 + 高考出口(民间参考)
# 用途: 中考家长选校参考
# 铁律: 绝不编造; 特色须真实可查; tags 限词表; 校名逐字等于 fangshan_admission_codes.json schools 正名
# tags 词表: 理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段: 仅真实可查才写, 一律标注「民间·非官方」, 查不到不写
# 采集日期: 2026-06-22

district: 房山
collected_date: "2026-06-22"
disclaimer: "特色信息来自学校官网/公众号/百度百科/gaokzx 等公开来源; 高考出口为民间参考·非官方; 仅供选校参考"

schools:
  北京师范大学燕化附属中学:
    features:
      style: "依托燕山石化资源, 以「希望教育」为理念, 建设石化科技专题课程群, 培养石化科技特色创新人才; 设石化科技实验班"
      tags:
        - 科技创新
        - 课程改革
      source: "百度百科; 北京师范大学教育学部参访报道 (fe.bnu.edu.cn); 教育与可持续发展智库 (easdt.com)"

  北京市燕山职业学校:
    features:
      style: "中等职业学校, 走「职普融通」之路; 综合高中班对接职教高考, 以「3+2」五年一贯制 + 「文化素质+职业技能」考试为高职专科/应用型本科输送人才"
      tags:
        - 综合均衡
      source: "北京市燕山职业学校教育质量年度报告(2022) (jw.beijing.gov.cn); 学来帮教育网"

  北京市房山区房山中学:
    features:
      style: "以人文教育见长, 与清华大学人文学院共建「房山区人文教育创新实践基地」, 设人文班; 2023 年被评为北京市基础教育课程建设先进单位, 五门课程通过北京市普通高中特色课程认定; 设宏志班(面向区内品学兼优家庭困难学生, 四免一补)"
      tags:
        - 文科人文
        - 课程改革
      source: "百度百科; 房山中学宏志班招生公开报道 (网易/搜狐); 北京中考在线 (zgkao.com)"

  北京市房山区良乡中学:
    features:
      style: "区属老牌完中, 秉承「爱众众爱, 以人育人」理念, 文化立校、质量立校; 连续多年获区高考质量评价一等奖"
      tags:
        - 综合均衡
      source: "百度百科; 中国高校之窗 (gx211.cn); gaokzx 2026 中考热门高中校"
    gaokao:
      note: "民间·非官方"
      summary: "据公开报道, 本科上线率长期接近/超过 95%; 2020 年 526 分以上 101 人, 本科总上线率(含艺术类)约 95.91%; 2022 年重点大学录取约 150 人。具体数据未经官方核实, 仅供参考。"
      source: "中国高校之窗 (gx211.cn); 51zixun.com 等民间汇总"

  北京师范大学良乡附属中学:
    features:
      style: "在全面发展基础上突出数理科技特色, 以「全面发展、数理见长」为目标, 「数理为基、科学为翼、全科融合」课程; 承担全区高中「翱翔计划」创新人才培养, 设机器人/科技活动开放实验室; 有「1+3」贯通培养项目"
      tags:
        - 理科见长
        - 科技创新
        - 课程改革
      source: "百度百科; 房山区政府网 (bjfsh.gov.cn); 人民网教育频道; 北京小升初网 (1+3 招生简章)"

  北京市房山区实验中学:
    features:
      style: "由房山区师范学校转制的公办普通高中, 秉持「和谐教育」思想, 育人目标「六会一爱」(会做人/会求知/会健体/会审美/会合作/会创新/爱劳动), 促进学生全面而有个性的和谐发展"
      tags:
        - 综合均衡
      source: "百度百科; 房山区政府网 (bjfsh.gov.cn)"

  北京市房山区周口店中学:
    features:
      style: "「尚和务实、守正创新」办学理念, 「天天精彩、人人绽放」办学特色; 小班化教学; 2001 年起与首师大美术学院合作创办高中美术班; 体育特长生培养有传统(国际田联检测合格塑胶运动场)"
      tags:
        - 艺术特长
        - 体育特长
      source: "百度百科; 房山区政府网 (bjfsh.gov.cn); 好学校招生网 (hxx.net)"

  首都师范大学未来实验学校:
    features:
      style: "首都师范大学直办的十二年一贯制学校, 以「思维为本的全息课堂」为教学特色, 以「引领未来教育的实践范式」为办学目标; 首师大选派执行管理团队及多名特级教师; 以未来素养构建课程体系"
      tags:
        - 课程改革
      source: "百度百科外公开报道: 教育头条 (edutoutiao.com); 房山区政府网 (bjfsh.gov.cn); 人民日报/中国城市报报道"

  北京市房山区坨里中学:
    features:
      style: "1956 年建校老校, 「文明、严谨、和谐、奋进」校风; 开设科技创新、艺术、体育等特色课程, 与高校合作建实践基地; 小班化教学, 注重个性化辅导"
      tags:
        - 科技创新
        - 艺术特长
        - 体育特长
      source: "Hi学校 (hixuexiao.net); 好学校招生网 (hxx.net); 房山区政府网 (bjfsh.gov.cn)"

  首都师范大学附属房山学校:
    features:
      style: "首师大附属、办学 40 余年, 高考历年区内名列前茅; 以「求是」核心价值观、「活力教育」为中心, 培养「会学习、会生活、有旺盛生命力的人」; 重视科技文体, 被评为北京市科技教育示范校/北京市中小学科普示范校"
      tags:
        - 科技创新
        - 综合均衡
      source: "百度百科(首都师范大学附属房山中学); 房山区政府网 (bjfsh.gov.cn); 上哪学 (shangnaxue.net)"
    gaokao:
      note: "民间·非官方"
      summary: "据公开介绍, 高考历年在房山区名列前茅, 有学生考入清华、北大等重点院校, 历年大专以上升学率 90% 以上。数据未经官方核实, 仅供参考。"
      source: "百度百科(首都师范大学附属房山中学)"

  北京理工大学附属实验学校:
    features:
      style: "房山区第一所拥有公立国际部的学校; 中美高中国际课程项目(与美国 Hoosac 学校合作, 中美双学籍/双毕业证, 北理工教师参与授课); 构建「高中+高校」协同育人, 开设 AP、美高特色课、大学先修及航天科技等校本课程; 与北理工尖端实验室共建特色科技课程"
      tags:
        - 国际方向
        - 科技创新
        - 外语特色
      source: "新浪 (k.sina.cn) 房山首所公立高中国际部报道; 北理工附校官网 (lgsy.bit.edu.cn); 北京小升初网; 国际学校网"

  首都师范大学附属中学实验学校:
    features:
      style: "房山区教委与首师大附中联合创办的公办校(含高中国际部), 与首师大附中「一个法人、一体化管理」; 聚焦「贯通+实验」特色, 建「一核三维」成达课程体系, 设五大类 26 门选修; 北京 2022 冬奥/冬残奥奥林匹克教育示范校, 全国青少年校园篮球/足球特色学校"
      tags:
        - 国际方向
        - 体育特长
        - 课程改革
      source: "百度百科; 房山区政府网 (bjfsh.gov.cn)"

  北京市博文学校:
    features:
      style: "1993 年创办, 房山窦店镇, 北京首批民办全日制寄宿学校, 十二年一贯制; 「人生中心教育」理念, 「博学多能、崇德自强」校训; 以艺术、体育教育为两翼, 强化多语种教学(英语/日语/俄语), 设非遗传承、AI 通识等校本课程; 提供寄宿兼走读"
      tags:
        - 寄宿制
        - 艺术特长
        - 体育特长
        - 外语特色
      source: "北京市博文学校官网 (bjbws.cn); 百度百科; 远播国际教育"
