# 延庆区高中办学特色 + 高考出口(民间参考)
# 数据性质: 远郊区,官方高考出口数据稀缺;特色据学校官网/公众号/百科/新闻采集
# 铁律: 校名逐字等于 yanqing_admission_codes.json schools 正名;tags 限词表;每校标 source
# tags 词表: 理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段仅在真实可查时填写,统一标注 "民间·非官方";延庆远郊未查到任何可靠高考出口数据,故 4 校均不写 gaokao

schools:
  北京市延庆区第一中学:
    style: >-
      延庆区龙头校,1956 年建校,2004 年获评北京市示范性普通高中。立足全国生态示范县区域特色,
      开展生态环保、科技、艺术教育;校训"让自觉成为生命的品质",重视自觉教育。
      延庆区首批北京市普通高中多样化特色发展实验学校,持续承办"1+3"培养实验(面向数理科学有兴趣特长的学生)。
    tags:
      - 综合均衡
      - 科技创新
      - 课程改革
    source: >-
      百度百科"北京市延庆区第一中学";中国教育在线走进中学;
      北京本地宝/北京幼升小网 2024-2025 延庆一中"1+3"培养实验公告;
      2020 北京市中小学科技教育示范学校名单(搜索快照,2026-06-22 采)

  北京市延庆区第二中学:
    style: >-
      完全中学。2004 年创办京郊首个"宏志班",为品学兼优、家庭经济困难的初中毕业生提供继续升学通道,
      录取后享"四免一补"(免学杂费/书本费/校服费/住宿费 + 伙食补贴)。
      另开设机器人、航模、京剧等社团,多人获市级竞赛奖项;建有天文圆顶等设施。
    tags:
      - 科技创新
      - 艺术特长
      - 综合均衡
    source: >-
      好学校招生网"延庆县第二中学简介";自主选拔在线 2025 北京中考宏志生报考;
      lileliao 北京市延庆区第二中学(搜索快照,2026-06-22 采)

  北京市延庆区第五中学:
    style: >-
      招收美术、体育特长班。2011 年确立"体验教育特色实验"项目,获评市级项目实验学校,
      推进国家课程校本化、校本课程特色化、实践活动课程化、艺体课程多样化;
      开展健美操、电声乐队、书法、中国结、3D 打印、机器人等艺体与科技体验活动。
    tags:
      - 艺术特长
      - 体育特长
      - 课程改革
    source: >-
      好学校招生网"延庆县第五中学简介";首都文明网"体验教育让延庆五中充满活力"(2015);
      gaokao.cn 延庆五中(搜索快照,2026-06-22 采)

  北京市八一实验学校:
    style: >-
      位于延庆区康庄镇,由北京市八一学校承办,在原康庄中学基础上改扩建的公立完全中学,
      2024 年 9 月正式投入使用。规划高中 18 个班、辐射服务全区,引入八一学校优质教育资源。
      新校,办学特色尚在建设中,暂无成熟特色定位。
    tags:
      - 综合均衡
    source: >-
      北京日报网/新京报 2022 北京市八一实验学校延庆开工建设;
      百度百科"北京市八一实验学校";首都文明网(搜索快照,2026-06-22 采)
