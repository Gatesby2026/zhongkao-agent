# 门头沟区高中 办学特色 + 高考出口（民间参考）
# 校名逐字对齐 mentougou_admission_codes.json 的 schools[].name（正名）
# 铁律：不编造；tags 限词表；每校标 source；查不到不写。
# tags 词表：理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# 备注：209010 北京市门头沟区中等职业学校（综合高中班）为中职/职高方向，无可核验的普高办学特色，跳过。

district: 门头沟
note: 远郊区，可核验信源有限；仅写真实可查的特色，宁少勿编。高考数据均为民间·非官方参考。

schools:
  北京市大峪中学:
    features:
      style: 北京市普通高中示范校、老牌区重点；治学严谨（作业必收必看必批必改必评，抓最后一名学生、抓最弱学科），重视特长生培养。
      tags:
        - 综合均衡
        - 学科竞赛
        - 体育特长
        - 艺术特长
      detail: 建有生物、物理、英语、化学等奥林匹克竞赛班；以兴趣小组为突破口培养不同特长学生。1978 年首批北京市重点中学，2004 年进入北京市普通高中示范校行列。
      source:
        - https://baike.baidu.com/item/北京市大峪中学/3497042
        - http://bj.aoshu.com/e/20090626/4b8bcbc9a0727.shtml
    # 高考：仅见早期奥数网无明确年份的笼统表述（升学率约95%以上），来源时效与口径均不可靠，按铁律不写。

  北京市第八中学永定实验学校:
    features:
      style: 门头沟区教委与北京市第八中学合作举办的国有公办创新实验学校，十二年一贯制；秉持“生命教育”理念，“初中品牌化、高中特色化、整体优质化”办学模式，执行与北京八中相同培养方案。
      tags:
        - 体育特长
        - 艺术特长
        - 综合均衡
      detail: 全国篮球特色学校、全国足球特色学校、全国国防教育示范学校、北京市体育传统项目学校、北京市艺术教育特色学校；“分层教学、分类培养、个性教育”小班化精细教学。
      source:
        - http://www.mtg.bjedu.cn/bzydsyxx/xxgk.htm
        - https://www.sohu.com/a/897082772_121956425

  首都师范大学附属中学永定分校:
    features:
      style: 北京市首批优质高中校，门头沟区第一所公立完全中学，2007 年与首师大附中合作办学；以“为每一位学生终身幸福奠基”为宗旨。
      tags:
        - 理科见长
        - 科技创新
      detail: 以“地球科学”为基点，物理、数学、化学、生物、地理、信息科技等学科为主要内容，兼顾人文；设机器人教室、3D 打印教室、创客工坊、数字化物理/生物实验室、天象馆、北京市地球科学重点开放实验室等。全国青少年校园足球示范校、北京市艺术教育特色校、北京市国防教育示范校。
      source:
        - https://baike.baidu.com/item/首师大附中永定分校/4825241
        - https://www.bjmtg.gov.cn/mtg11J005/bmdt52/202504/03276952c8154128a7e4529138d41506.shtml

  北京市第八中学京西校区:
    features:
      style: 2012 年门头沟区教委、西城区教委与北京八中合作创办的公立完全中学；“联合培养、师资共享、课程贯通”办学模式，秉承八中“着眼于未来，着力于素质”指导思想。
      tags:
        - 课程改革
        - 综合均衡
      detail: 整合区域红色资源，构建“培根铸魂·红色致美”课程体系，以“红色致美”为育人方向，校训“勤奋、进取、和谐、致美”。
      source:
        - https://www.no8ms.bj.cn/cms/hzbx/fxjj/000010.html
        - https://www.bjmtg.gov.cn/mtg11J005/bmdt52/202510/f39164cde8d942909cfdd7df491abbd5.shtml

  北京景山学校京西实验学校:
    features:
      style: 引进北京景山学校优质资源与管理模式创办的十二年制公办学校，采用“五·四·三”分段学制（小学五年、初中四年、高中三年）；93% 教师具硕士及以上学历，小班制（每班 30–38 人）。
      tags:
        - 课程改革
        - 综合均衡
      detail: 秉承景山“明理、勤奋、严谨、创新”校训与“全面发展打基础，发展个性育人才”理念，走“低负担、高质量”素质教育之路；立足十二年贯通培养，初高中有贯通培养实验经验。
      source:
        - https://baike.baidu.com/item/北京景山学校京西实验学校/61968424
        - https://www.sltzgs.cn/edu/jingshan.html
