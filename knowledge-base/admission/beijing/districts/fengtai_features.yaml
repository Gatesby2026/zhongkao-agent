    features:
      style: 「2023年丰台教育结构调整整合组建的12年一贯制学校，十八中教育集团成员校。文化定位「蒲芳教育」（人本/赏识/和谐），以美术、体育教育为特色，设艺体相关1+3贯通培养。」
