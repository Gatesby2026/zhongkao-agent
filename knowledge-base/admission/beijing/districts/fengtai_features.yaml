  北京市丰台区太平桥学校:
    features:
      style: 「（十二中联合总校校区）「做真善美的教育」，培养品德/学习/运动/生活四大习惯。美育与传统文化特色：「馨桥」美育课程体系，戏曲唱腔/美术/形体课及社团，北京市艺术特色校、丰台区戏曲特色校；并推进阶梯阅读、花样跳绳、京剧国粹等。」
      tags: [艺术特长, 文科人文]
      source: 「百度百科 https://baike.baidu.com/item/北京市太平桥中学/12578513 ；十二中校区风采 https://jw.bj12hs.com.cn/html/list-Taipingqiaoxuexiao.html ；教育头条 http://www.edutoutiao.com/zxx/14851.html」

  北京丽泽国际学校:
    features:
      style: 「丰台区第一所国际化学校（公立背景、民办特征，12年一贯制），源于北京十二中国际部/中美国际高中课程班。国际方向明确：剑桥 AS/A Level、AP、加拿大 OSSD 三大国际课程。位于丽泽金融商务区。」
      tags: [国际方向, 外语特色]
      source: 「学校官网 https://www.lizeacademy.com/course-high.html ；国际教育网《丰台区第一所国际学校》 https://m.ieduchina.com/beijing/education/202205/81395.html ；北京高考在线 https://www.gaokzx.com/gk/gaokao/123449.html」
    gaokao:
      note: 「民间·非官方（海外升学口径，非国内高考）」
      detail: 「学校宣传：约 1/3 学生录取美国前 30 大学；申英学生中约 92.4% 录取英国前 20 大学；96% 获顶级大学录取（含墨尔本/悉尼/新南威尔士等）。系学校升学宣传口径，非官方权威发布，仅供国际方向参考。」
      source: 「国际教育网 https://m.ieduchina.com/beijing/education/202205/81395.html」

