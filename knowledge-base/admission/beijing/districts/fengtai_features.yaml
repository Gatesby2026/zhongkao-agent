# 丰台区高中 办学特色 + 高考出口（民间参考）
# 用途：中考家长选校参考。
# 铁律：绝不编造、绝不张冠李戴；特色须真实可查；tags 限词表；校名逐字等于 fengtai_admission_codes.json 正名。
# tags 词表：理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段仅在真实可查时填写，并标注「民间·非官方」；查不到不写。
# 采集日期：2026-06-22

district: 丰台
collected_at: 「2026-06-22」
disclaimer: 「特色描述来自学校官网/公众号、百度百科、地方媒体、家长社区等公开信息；高考数据为民间参考，非官方权威发布，可能含历年口径差异，仅供选校方向性参考。」

schools:
  北京市第十二中学:
    features:
      style: 「丰台龙头校、市级示范高中。理科见长，以国家级特色项目「钱学森航天实验班」（2011年创办）著称，依托钱学森青少年航天科学院与院士专家导师团，三导师制；学科竞赛突出。」
      tags: [理科见长, 科技创新, 学科竞赛, 综合均衡]
      source: 「校长网学校简介 http://xiaozhang.com.cn/school/bjserz/about.html ；北京小升初信息网 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025061911170.html ；百度百科 https://baike.baidu.com/item/北京市第十二中学/457855」
    gaokao:
      note: 「民间·非官方」
      detail: 「公认丰台区高考第一梯队龙头校；钱学森航天实验班为全校录取分最高班型（民间口径 2024 年约 646 分入学线，丰台最高）。具体一本率/北清数未见官方权威发布，不列具体数字。」
      source: 「北京小升初信息网 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025061911170.html ；北京中考信息网 https://www.zhongkaobj.cn/zhongkao/zhongxue/202411124183.html」

  北京钱学森中学:
    features:
      style: 「全国唯一以「钱学森」冠名的完全中学，位于东高地航天城。以钱学森大成智慧思想设计课程，科技航天特色鲜明（3E航天俱乐部、院士1+X领航室、前沿科创课程），人文素养并重。」
      tags: [科技创新, 理科见长, 课程改革]
      source: 「丰台时报《北京钱学森中学打造航天教育」钱中样本「》 https://www.bjft.gov.cn/fengtaishibao/html/2026-04/24/content_9502_19481949.htm ；钱学森教育集团官网 http://www.bjqxs.com.cn/lists/8.html ；北京小升初信息网 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025061911170.html」

  北京市第十中学:
    features:
      style: 「始建于1949年，长辛店百年老校，2004年市级示范性普通高中，「一校十址」集团校。综合均衡、平台多元，开设50余种校本课程；田径、足球市级传统校。」
      tags: [综合均衡, 体育特长]
      source: 「学校官网简介 https://bj10z.ftedu.cn/bjdszx/650632/650622/index.html ；民生周刊 https://www.msweekly.com/show.html?id=146082 ；百度百科 https://baike.baidu.com/item/北京市第十中学/6627766」
    gaokao:
      note: 「民间·非官方」
      detail: 「近年成绩稳居丰台区前列，连续多年获「丰台区高中教学优质校」。民间报道 2023 年 600 分以上人数为前一年约 5 倍，最高分 683 分（区内排名靠前）。仅作方向性参考。」
      source: 「民生周刊 https://www.msweekly.com/show.html?id=146082」

  北京市第十八中学:
    features:
      style: 「始建于1933年，12年一贯制市级示范高中，方庄教育集群龙头校、大型教育集团（多校区）。「三化三育」特色：集团集群化、数字化、国际化 + 科技/体育/艺术育人；数字化校园、国际友好校交流广。」
      tags: [综合均衡, 国际方向, 科技创新, 课程改革]
      source: 「学校官网校史 http://www.bj18.net/cms/bjsdsbzx/xxls.jhtml ；北京小升初信息网十八中集团全攻略 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025101712501.html ；百度百科 https://baike.baidu.com/item/北京市第十八中学/8938745」

  北京市丰台区第二中学:
    features:
      style: 「以课程改革著称，开设四大类百余门校本课程、跑班授课制、30余社团。设市教委备案「人文实验班」，突出人文素养培养，统招填报、按分录取。」
      tags: [课程改革, 文科人文, 综合均衡]
      source: 「中国教育在线《丰台二中大举课程改革 人文实验班首招》 https://chuzhong.eol.cn/beijing/bjzz/201105/t20110516_616248.shtml ；百度百科 https://baike.baidu.com/item/北京市丰台区第二中学/64497641」

