# 房山区高中 办学特色 补采(gap)——「有录取线但原 fangshan_features.yaml 未单列」的目标校
# 用途: 中考家长选校参考
# 铁律: 绝不编造、绝不张冠李戴; 特色须真实可查; tags 限词表; 校名逐字等于 fangshan_admission_codes.json 正名
# tags 词表: 理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段: 仅真实可查才写, 一律标注「民间·非官方」, 查不到不写
# 采集日期: 2026-06-22

district: 房山
collected_date: "2026-06-22"
disclaimer: "特色信息来自学校官网/公众号/百度百科/人民网/新浪教育等公开来源; 高考出口为民间参考·非官方; 仅供选校参考。"

schools:
  北京四中房山分校:
    features:
      style: "北京四中教育集团成员校(2015 年成立、由北京四中直接管理的完全中学), 以「勤奋、严谨、民主、开拓」为校训, 以「培养杰出的中国人」为目标。承袭四中本部传统: 不加课、不补课; 高度重视体育(每天 1 节体育课/1 小时户外锻炼); 开设近五十门校本/选修课程(涵盖人文、科学、艺术, 含钢琴、羽毛球、茶艺、烘焙、机器人、编程、戏剧、合唱等)。师资中高级职称及硕士以上学历占比较高。"
      tags:
        - 综合均衡
        - 体育特长
        - 课程改革
      source: "人民网教育《北京四中房山分校 引进优质教育资源》 https://edu.people.com.cn/n/2015/0427/c395685-26911671.html ; 新浪教育《北京四中房山分校:培养杰出的中国人》 https://edu.sina.cn/2015-04-23/detail-iavxeafs6096204.d.html ; 北京中考在线《北京四中房山分校怎么样》 https://www.zgkao.com/zhongkao/73223.html"
    gaokao:
      note: "民间·非官方"
      summary: "据北京中考在线等公开介绍, 高中段一本率和本科率均保持在较高水平, 有多名学生在国家级/市级/区级学科竞赛中获奖; 初中段每年直升北京四中本部的学生均达标。具体数字未见官方权威发布, 仅供方向性参考。"
      source: "北京中考在线《北京四中房山分校怎么样》 https://www.zgkao.com/zhongkao/73223.html"
