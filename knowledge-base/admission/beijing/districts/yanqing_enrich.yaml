# 延庆区 普通高中统招录取最低分 + 区排名(位次) enrich
# 校名严格对齐 yanqing_admission_codes.json 的官方正名(2025)
# 总分口径: 2025=510 / 2024=660
# 铁律: 没搜到的不写; 每数据点必须真实来源(名+URL); conf=源数互证强度
#
# 采集结论(2026-06-22):
#   - 延庆是远郊小区(2025 全区约 1265 名考生),数据极稀疏。
#   - 全网仅检索到 1 个学校级录取线: 延庆一中 2024=568 / 区排名 633,
#     且多个二级转载源(zhongkaobj/xschu)均标注"网传版"(非官方),故 conf=low。
#   - 2025 各校统招线: 全网无任何学校级公布(只有一分一段段表),一律省略。
#   - 延庆二中/五中/八一实验学校: 全网无任何录取线数据(该区除延庆一中外
#     基本敞口录取,普遍不公布校线),全部省略,不编造。

district: 延庆
total_score:
  "2025": 510
  "2024": 660

schools:
  北京市延庆区第一中学:
    scores:
      "2024":
        score: 568          # 总分口径 660
        rank: 633           # 区排名(位次)
        conf: low           # 多源同值但均为"网传版"(非官方公布),保守降为 low
        sources:
          - name: 北京中考信息网-2024年北京延庆区高中录取分数线&区排名汇总
            url: https://www.zhongkaobj.cn/lqfsx/qitaqu/202410222474.html
          - name: 北京中考信息网-2025考生参考!2024年延庆区和经开区中考录取分数线
            url: https://www.zhongkaobj.cn/lqfsx/qitaqu/202409241228.html
          - name: 北京小升初网-北京各区高中中考录取分数线汇总(2025参考)
            url: https://www.xschu.com/zhonggaokaozixun/72059.html
      # "2025": 无任何学校级公布数据,省略(不编造)

  # 北京市延庆区第二中学: 全网无录取线数据,省略
  # 北京市延庆区第五中学: 全网无录取线数据,省略
  # 北京市八一实验学校:   全网无录取线数据,省略
