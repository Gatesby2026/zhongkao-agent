# 西城区高中 办学特色 + 高考出口（民间参考）
# 仅供中考家长选校参考。绝不编造、绝不张冠李戴。
# 校名逐字对齐 xicheng_admission_codes.json 的 schools.*.name 正名。
# tags 限词表：理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段均为「民间·非官方」，仅在可查到时填写；查不到则不写。
# 未列入的学校（如部分普通完中、职业学校）= 未搜到可信、可区分的特色，已按要求跳过。

district: 西城
note: 特色来自学校官网/公众号、百度百科、维基百科、zhongkaobj、gaokzx、家长社区等公开信源；高考数据为民间汇总，非官方喜报，仅作量级参考。

schools:
  北京市第四中学:
    features:
      style: "西城顶尖名校，学术底蕴深厚；道元实验班自主选拔重思维，语文等学科常年领先，竞赛与科技创新突出。"
      tags: [综合均衡, 学科竞赛, 科技创新, 国际方向]
      source: "百度百科/知乎等家长社区汇总（北京市第四中学）"
    gaokao:
      note: "民间·非官方：一本/重本上线率长期约95%以上；每年数十人考入清华北大（如近年报道清北录取数十人量级）。具体年份数字以学校官方为准。"
      year: 2021-2023
      source: "知乎/家长社区汇总，非学校官方喜报"

  北京师范大学附属实验中学:
    features:
      style: "西城第一梯队，理科与竞赛极强；设数理、科技、人文、综合等特色班型，拔尖创新人才培养体系成熟。"
      tags: [理科见长, 学科竞赛, 科技创新, 国际方向, 综合均衡]
      source: "gaokzx/百度百科/维基百科（北京师范大学附属实验中学）"
    gaokao:
      note: "民间·非官方：985上线率高，清北达线/录取常年位居西城前列（民间汇总称清北量级约数十人）。具体以学校官方为准。"
      year: 2021-2023
      source: "gaokzx 及家长社区汇总，非学校官方喜报"

  北京市第八中学:
    features:
      style: "素质教育先行者，少儿班（加速式）与素质班（充实式）超常教育闻名；课程体系丰富，科技综合素质实验班为特色班型。"
      tags: [科技创新, 综合均衡, 课程改革, 国际方向]
      source: "北京八中官网/知乎/维基百科（北京市第八中学）"
    gaokao:
      note: "民间·非官方：清北上线与录取居西城前列（如2019年报道理科校均分居西城前列、清北录取数十人量级）。具体以学校官方为准。"
      year: 2019
      source: "知乎/家长社区汇总，非学校官方喜报"

  北京师范大学附属中学:
    features:
      style: "百年名校，钱学森班实行因材施教、拔尖创新培养，理科见长兼重人文；另有科技实验班、文科特色。"
      tags: [理科见长, 科技创新, 学科竞赛, 文科人文]
      source: "北京师大附中官网/百度百科/北京小升初信息网（北京师范大学附属中学）"
    gaokao:
      note: "民间·非官方：本科率近100%、一本率高、985上线率高；钱学森班平均分突出（民间称近年平均分660+量级）。具体以学校官方为准。"
      year: 2024
      source: "家长社区/中考资讯汇总，非学校官方喜报"

  北京师范大学第二附属中学:
    features:
      style: "以「人文教育」「自主发展」为育人特色，文科实验班知名；另有项目式学习实验班、PGA 国际课程班。"
      tags: [文科人文, 课程改革, 国际方向, 综合均衡]
      source: "北京师大二附中官网/维基百科/知乎（北京师范大学第二附属中学）"
    gaokao:
      note: "民间·非官方：文科实验班毕业生重点率高，升入北大清华比例较高（民间汇总称占比较高）。具体以学校官方为准。"
      year: null
      source: "北京师大二附中官网及家长社区汇总，非学校官方逐年喜报"

  北京市第三十五中学:
    features:
      style: "前身志成中学，李大钊等任校董；十大科学探究实验室，科技创新实验班双导师制，科技/人文/艺术/国际多元发展。"
      tags: [科技创新, 学科竞赛, 艺术特长, 国际方向]
      source: "北京三十五中官网（志成）/百度百科/zhongkaobj（北京市第三十五中学）"
    gaokao:
      note: "民间·非官方：本科约100%、一本率约90%，实验班多数达在京211/部分达985线。具体以学校官方为准。"
      year: 2024
      source: "学校喜报转载/家长社区汇总，非一手官方"

  北京市第一六一中学:
    features:
      style: "百年女中底蕴，国家级语言文字示范校、足球篮球特色校，北京金鹏科技团、艺术教育特色校。"
      tags: [科技创新, 体育特长, 艺术特长, 综合均衡]
      source: "北京一六一中学官网/维基百科/首都之窗（北京市第一六一中学）"
    # 高考：未查到可靠的可量化年度数据，按铁律不写 gaokao。

  北京市第十四中学:
    features:
      style: "示范性高中，前身畿辅学堂；骨干教师与博士师资较多，数学/物理学科力量较强，「翱翔计划」基地校，对接高校引入师资。"
      tags: [理科见长, 综合均衡, 课程改革]
      source: "zhongkaobj 西城校情介绍（北京市第十四中学）"

  北京市第十三中学:
    features:
      style: "八十余年「治学严谨、作风朴实」校风，2020年入选北京市中小学科技教育示范校；设科技综合素质实验班。"
      tags: [科技创新, 综合均衡]
      source: "百度百科/学校官网（北京市第十三中学）"

  北京市第十五中学:
    features:
      style: "首批市级重点与示范高中，桃然校区为高中部；2012年起设「筑真」人文实验班，注重人文素养与多元发展。"
      tags: [文科人文, 综合均衡]
      source: "维基百科/中国高校之窗（北京市第十五中学）"

  北京市西城外国语学校:
    features:
      style: "鲜明外语特色市级重点完中，引进国外教材、互动英语环境，开设多语种（主修+辅修）课程，与十余国姐妹校交流。"
      tags: [外语特色, 国际方向, 课程改革]
      source: "西城外国语学校官网/百度百科（北京市西城外国语学校）"

  北京市回民学校:
    features:
      style: "位于牛街的民族特色完中，以「融·和」文化为引领，多民族师生共学，国家级高中特色发展试验项目校，含住宿。"
      tags: [综合均衡, 寄宿制]
      source: "北京市回民学校官网/百度百科/zhongkaobj（北京市回民学校）"

  北京市育才学校:
    features:
      style: "1937年创办的十五年一贯制市级高中示范校，与北京电影学院合作课余活动；管乐团为北京市金帆艺术团，棒球/篮球为市级传统项目。"
      tags: [艺术特长, 体育特长, 综合均衡]
      source: "zhongkaobj 西城校情介绍（北京市育才学校）"

  北京市铁路第二中学:
    features:
      style: "原全国铁路系统重点中学、市示范性高中；坚持五育并举，注重科技教育与女排传统项目优势。"
      tags: [体育特长, 科技创新, 综合均衡]
      source: "铁二中官网/zhongkaobj/维基百科（北京市铁路第二中学）"

  北京市鲁迅中学:
    features:
      style: "以「健康向上，做最好的自己」为核心；偏文科类高中，美术专业特色鲜明，试点北京市「1+3」培养模式。"
      tags: [文科人文, 艺术特长]
      source: "北京小升初网/百度百科（北京市鲁迅中学）"

  北京市第六十六中学:
    features:
      style: "市普通高中示范校；乒乓球队多年市赛夺冠，「金帆管乐团」曾赴德演出，体育与艺术传统项目突出。"
      tags: [体育特长, 艺术特长]
      source: "百度百科/维基百科（北京市第六十六中学）"

  北京市第三中学:
    features:
      style: "以「全面育人、办有特色」为方针；北京市排球传统校、西城区科技教育示范校，设民族艺术特长生班、市金帆艺术团。"
      tags: [体育特长, 艺术特长, 科技创新]
      source: "百度百科/维基百科（北京市第三中学）"

  北京市第七中学:
    features:
      style: "以「开放教育」为理念，建国学、跨文化、艺术、体育四大特色课程群，「修齐治平」特色课程体系。"
      tags: [文科人文, 课程改革, 艺术特长]
      source: "新华网校长专访/知乎（北京市第七中学）"
