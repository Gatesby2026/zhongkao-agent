# 海淀区高中办学特色补采（有录取线但 haidian_features.yaml 未覆盖的分校/校区）
# 给中考家长选校用。
# 铁律：绝不编造、绝不张冠李戴；style 须来自学校真实介绍；
#       tags 仅取自词表[理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制]；
#       gaokao 仅真实可查才写，一律标"民间·非官方"+URL；查不到则不写 gaokao 字段。
# 校名逐字等于目标清单/haidian_admission_codes.json 的正名。
# 采集日期：2026-06-22
# 说明：多为名校分校/校区，独立高考出口数据普遍查不到，故本批基本只补 style + tags（带 source）；
#       高考字段绝大多数留空（无可靠可查值）。

schools:
  中国人民大学附属中学分校:
    style: "人大附中联合总校成员校（2003年加入，2022年转海淀区属公办），引进人大附中教育思想与管理模式；学生培养目标「全面发展+突出特长+创新精神+高尚品德」，在大中小思政一体化、戏剧实践课程、STEM 课程上有特色"
    tags: ["综合均衡", "课程改革", "科技创新"]
    source: "百度百科;北京中考信息网 zhongkaobj.cn/zhongkao/zxdt/202412236934.html"

  中国人民大学附属中学第二分校:
    style: "海淀区属十二年一贯制公办校（前身1964年蓝靛厂中学，2009年由人大附中托管），秉「爱与尊重」与「潜能教育」理念；打造人文/艺术/体育/科学/综合实践/国际理解特色课程群，开设学科融合及建筑教育特色课程"
    tags: ["综合均衡", "课程改革"]
    source: "百度百科;北京日报 peking.bjd.com.cn/content/s66dfa745e4b0c25b287b35ff.html"

  人大附中航天城学校:
    style: "海淀区属公办十二年一贯制校，人大附中联合学校总校、人大附中承办；构建「三三三」（启航/领航/自航）小初高一体化课程，打造航天科技特色，科技社团涵盖机器人/天文/信息学/智造/地球演化/生命科学，建星球教室、冰球馆、游泳馆"
    tags: ["科技创新", "综合均衡", "课程改革"]
    source: "教育部官网 moe.gov.cn/fbh/live/2023/55484/dfdxal/202309/t20230920_1081673.html;百度百科"

  北京一零一中石油分校:
    style: "北京一零一中教育集团成员校（前身1960年石油附中，2019年101承办更名）；传承「铁人精神」，以韩/日/德/法/俄/西/葡七种小语种为特色（145门校本课程），管乐团（科技+艺术）与天文社著名"
    tags: ["外语特色", "综合均衡", "艺术特长"]
    source: "学校官网 101syfx.bjhdedu.cn/xxgk;百度百科;北京中考信息网 zhongkaobj.cn"

  北京一零一中矿大分校:
    style: "北京一零一中教育集团成员校（2019年矿大附中并入集团），海淀区属公办完全中学；北京市科技后备人才早期培养项目基地校，地学/STEM/航天/校园气象/信息技术科创见长，在集团「三层八域」体系上建「旷·爱」校本课程"
    tags: ["科技创新", "学科竞赛", "综合均衡"]
    source: "学校官网 bjsdschool.cn;搜狐 sohu.com/a/899491787_100187912;百度百科（北京一零一中教育集团）"

  北京中法实验学校:
    style: "海淀区中法合作十二年一贯制公办校（前身温泉第二中学），以法语为第一外语的法语+英语双外语特色校，部分学科法语授课、引中法融合课程；倡「博雅教育」，2019年法语教学获法国教育认证，海淀区艺术教育示范校"
    tags: ["外语特色", "国际方向", "课程改革"]
    source: "学校官网 zfsyxx.bjhdedu.cn;百度百科;北京小升初网 xschu.com/xiaoshengchu/24/31184.html"

  北京交通大学附属中学东校区:
    style: "北京交通大学附属中学教育集团校区，与交大附中本部共享「幸福教育」办学理念与集团资源（本部设茅以升班高端理科实验班，科技与艺术屡获国际奖项，棒/垒/田径见长）"
    tags: ["综合均衡", "科技创新"]
    source: "北京交通大学附属中学教育集团 edutoutiao.com/teshexiao/7676.html;北京中考信息网 zhongkaobj.cn"

  北京交通大学附属中学分校:
    style: "北京交大附中承办的分校（前身明光中学，2014年集团化更名），以「雅文化」（温雅教师/文雅学生/精雅校园）为核心，构建德心智美「幸福课程」体系，推「三有课堂」差异教学，开「人文+语言」特色课程；北京市校园文化建设示范校"
    tags: ["文科人文", "课程改革", "综合均衡"]
    source: "百度百科;知乎 zhuanlan.zhihu.com/p/672025143;教育头条 edutoutiao.com/teshexiao/7676.html"

  北京交通大学附属中学第二分校:
    style: "北京交大附中教育集团成员校（2015年加入），构建「和合」人文生态课程体系（人与自然/社会/自我三主题，基础-拓展-研究三层级），含绿色低碳/人生美学/健康发展三大课程群；教育部国防教育特色学校"
    tags: ["课程改革", "综合均衡", "文科人文"]
    source: "搜狐 sohu.com/a/838391232_121956424;百度百科"

  北京十一实验中学:
    style: "北京市十一学校承办的完全中学（前身1964年太平路中学，2016年起承办），与十一学校共同开展综合教育改革；设分层/分类/综合/特需课程体系、选课走班（111门学科课程+28门综合实践），导师制"
    tags: ["课程改革", "综合均衡"]
    source: "知乎 zhuanlan.zhihu.com/p/690995296;百度百科;北京小升初网 xschu.com/xiaoshengchu/30/44922.html"

  北京外国语大学附属外国语学校:
    style: "1959年周恩来、陈毅提议创建的全国第一所基础教育外国语学校，国家级高中特色发展试验项目学校；「英语+第二外语」复语教学，涵盖英/德/西/日/法/俄/韩7语种，面向国外名校的留学预备教育体系，培养「双复型」复合国际化预备英才"
    tags: ["外语特色", "国际方向", "科技创新"]
    source: "学校官网 bwfx.com.cn/index/bxts.htm;百度百科;北外国际 beiwaiguoji.com"

  北京大学附属中学北医分校:
    style: "北大附中承办的北医附中分校，继承北大「以奉献社会为己任」担当与北大医学部严谨敬业精神，办学思想「关注人/培养人/成就人/发展人」，课程目标「重核心素养，育博学雅行的人」；20余门社团及园艺、雕版印刷、风筝制作等劳动实践课程"
    tags: ["综合均衡", "课程改革"]
    source: "北京日报 xinwen.bjd.com.cn/content/s66d270aed5de123e3f115511.html;北京大学教职工之家 gh.pku.edu.cn/info/1018/1450.htm"

  北京市中关村中学知春分校:
    style: "北京市中关村中学承办的完全中学（前身知春里中学，2017年承办更名）；依托中科院智库与科研资源突出科学特色，机器人/模拟飞行/创客科技社团见长，足球（市级特色校）、垒球（市冠军）体育突出"
    tags: ["科技创新", "体育特长", "综合均衡"]
    source: "维基百科;百度百科;北京中考信息网 zhongkaobj.cn/zhongkao/zhongxue/202412246994.html"

  北京市八一学校附属玉泉中学:
    style: "北京市八一学校教育集团成员校（前身青龙桥中学/六十七中，2015年八一学校管辖更名），以「上善文化」为定位、提八大文化基因；探索航天科技特色育人，设航空国防实验班（飞机仪表驾驶/无人机/飞行模拟/「逐梦深蓝」国防科技活动）"
    tags: ["科技创新", "综合均衡", "课程改革"]
    source: "维基百科;北京中考信息网 zhongkaobj.cn/zhongkao/zxdt/202412257133.html;北京高考在线 gaokzx.com/gk/zhiyuan/125958.html"

  北京市海淀区教师进修附属实验香山分校:
    style: "海淀区教师进修学校附属实验学校承办的公办完全中学（前身1959年建校，2018年承办，集团化一体化管理），师资由进修学校骨干及名校毕业生组成；开设科技创新/国学经典/国际理解校本课程，参与集团五校联办「双英班」英才班，初中部享校额到校"
    tags: ["综合均衡", "课程改革", "学科竞赛"]
    source: "百度百科;北京中考信息网 zhongkaobj.cn/zhongkao/zhongxue/202412246990.html"

  北京市海淀实验中学:
    style: "由阜成路中学与122中学合并的大型完全中学，海淀区优质高中；设钱学森班（科技/人文）、国学实验班、统筹班及「1+3」项目，钱学森班含学科竞赛/艺术素养/实验创新/航天游学，办「三节一活动」与走进钱馆纪念活动"
    tags: ["科技创新", "文科人文", "课程改革"]
    source: "百度百科 baike.baidu.com/item/北京市海淀实验中学;学校官网 hdsyzx.bjhdedu.cn/xxgk/xxjj;北京中考信息网 zhongkaobj.cn"

  北京市清河中学:
    style: "二十中教育集团成员校（前身1951年建校，2023年11月加入二十中教育集团，资源共享师资交流）；秉「全面育人 关注差异 发展特长」理念，构建国家课程校本化体系，机器人/武术社团多次获国家级奖；国家级国防教育特色学校、海淀区劳动教育研究实验学校"
    tags: ["综合均衡", "体育特长", "课程改革"]
    source: "首都文明网 bj.wenming.cn/hd/yw/202311/t20231110_6696453.shtml;百度百科;北京中考信息网 zhongkaobj.cn/zhongkao/zxdt/202412267220.html"

  北京市第五十七中学上庄分校:
    style: "北京市第五十七中学集团化办学成员校（前身上庄中学，2019年57中承办更名），十二年一贯制公办校（设住宿部）；纳入57中集团资源统筹/课程共享，秉「笃学日新 守正致远」与「友善用脑」课堂改革；「体教结合」特色校，开体育特长班，拳击/跆拳道等市赛获多项冠军"
    tags: ["体育特长", "寄宿制", "综合均衡"]
    source: "维基百科（北京市第五十七中学）;北京中考信息网 zhongkaobj.cn/cjpm/gaokaochengji/202412267193.html;海淀教育网 bjhdedu.cn/zt/2024hdxx/.../t20240523_70656.html"

  清华大学附属中学上地学校:
    style: "清华附中承办的公办校（前身2006年上地中学，2012年清华附中承办冠名）；办学特色「坚持全面发展，注重个性培养，展现学生特长」，以体育（每天一节体育课+两次大锻炼）与心理教育（每周一节心理课）见长，开「走进圆明园」人文系列课程；全国/北京市足球特色学校"
    tags: ["体育特长", "综合均衡", "课程改革"]
    source: "清华附中官网 qhfz.edu.cn/qhfzhzxx/qhfzsdxx.htm;百度百科;海淀教育网 bjhdedu.cn"

  清华大学附属中学永丰学校:
    style: "清华大学与清华附中全程规划、体现清华理念的九年/十二年制公办校，校训「自强不息 厚德载物」、校风「德先于智 行胜于言」；构建以核心课程为中心、含中国大学先修课程的体系，地处中关村永丰高新基地，以科技课程与社团（「育人为本、科技兴校」）见长"
    tags: ["科技创新", "综合均衡", "课程改革"]
    source: "学校官网 qhfzyf.cn;百度百科;清华附中官网 qhfz.edu.cn/qhfzhzxx/qhfzyfxx.htm"

  清华附中学院路学校:
    style: "清华附中教育集团成员校（原中国地质大学附属中学，2024年4月清华附中承办），北京市「大学办附中」项目校、海淀区首批新优质学校；校训「自强不息 厚德载物」，建「三纵五维」课程体系，设清华班/学院班，体育特色突出（「无体育不地附」）"
    tags: ["体育特长", "综合均衡", "课程改革"]
    source: "百度百科 baike.baidu.com/item/清华附中学院路学校;清华附中官网 qhfz.edu.cn/info/1061/19951.htm;网易 c.m.163.com/news/a/J3585UR90536JW7T.html"

  清华附中志新学校:
    style: "清华附中教育集团成员校（前身1960年建校，2020年新品牌学校，2024年4月加入清华附中教育集团），依托本部整合集团顶尖师资；秉校训「自强不息 厚德载物」，建三级五类课程，以「科学技术课程」为轴心、其余四类为扇叶的「风车课程体系」，北京市科技教育示范校"
    tags: ["科技创新", "综合均衡", "课程改革"]
    source: "学校官网 qhfzzx.bjhdedu.cn/xxgk;教育头条 edutoutiao.com/zxx/16410.html;中国日报网 cn.chinadaily.com.cn/a/202505/27/WS683581aba310205377035452.html"

  首都师范大学附属中学第一分校:
    style: "首师大附中教育集团核心成员校（2010年首师大附中在海淀承办的第一所分校），秉「成达教育」理念，沿用并发展附中「基础通修+兴趣选修+专业精修+自主研修」四修课程体系；推书院制分层教学（成达班/实验班），管乐/合唱/民乐团市区领先，科技创新大赛成绩突出"
    tags: ["课程改革", "艺术特长", "科技创新"]
    source: "百度百科;海淀教育网 bjhdedu.cn/zt/2024hdxx/202405/t20240521_70535.html;首都师范大学附属中学官网 cnuhs.cn"

  首都师范大学附属玉泉学校:
    style: "十二年制公办校（2015年由首师大附小玉泉校区上延而成，2023年加入人大附中分校教育集团形成小初高），以「童心教育」为理念（率真/关爱/求索核心价值观）；建「志达课程体系」，全国足球特色校、球类运动突出，打造「三公里科技教育」学习圈（思政/科技/劳动）"
    tags: ["体育特长", "课程改革", "综合均衡"]
    source: "百度百科;海淀教育网 bjhdedu.cn/zt/2024hdxx/202405/t20240523_70657.html;北京中考信息网 zhongkaobj.cn/zhongkao/zxdt/202412257120.html"

  首都师范大学附属育新学校:
    style: "由北京市教委、首都师范大学党委、海淀区教委共管的十二年制公办校（72个教学班、3000余生），校训「勤奋好学和谐致美」、育人宗旨「先成人后成才」；深化「551」思维课堂、跨学科与项目式学习，建「三层六域贯通」课程体系，以网球为特色（贯通12年课程，育世界中学生运动会冠军）"
    tags: ["体育特长", "课程改革", "综合均衡"]
    source: "百度百科 baike.baidu.com/item/首都师范大学附属育新学校;北京中考信息网 zhongkaobj.cn/zhiyuan/gaokaochengji/202412267187.html"
    gaokao:
      note: "民间·非官方"
      "概况": "中考成绩曾连续两年位列海淀区总平均分第一；高考文科多次进入海淀区前七名，理科本科上线率约98%（网传·年份不详）"
      source: "https://www.zhongkaobj.cn/zhiyuan/gaokaochengji/202412267187.html"
