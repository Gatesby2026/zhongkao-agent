# 石景山区 高中办学特色 + 高考出口（民间参考）
# 用途：中考家长选校参考。校名严格等于 shijingshan_admission_codes.json schools 正名。
# 铁律：绝不编造；特色须真实可查；tags 限词表；每校标 source；高考仅真实可查才写并注「民间·非官方」。
# tags 词表：理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# 采集日期：2026-06-22

district: 石景山
collected_at: 2026-06-22
disclaimer: 办学特色综合学校官网/公众号、百度百科、媒体报道整理；高考数据为民间参考（非官方），仅供选校参考，不构成承诺。

schools:
  北京市第九中学:
    features:
      style: 石景山区龙头校，1962 年首批市属重点中学、2002 年北京市高中示范校；理科实验班见长，艺术体育传统强（金帆舞蹈团、艺术体操队多年蝉联市冠军、"战神"篮球）。
      tags:
        - 理科见长
        - 艺术特长
        - 体育特长
        - 综合均衡
      source: 百度百科「北京市第九中学」、阳光高考中学版 gaokao.chsi.com.cn、北京中考信息网 zhongkaobj.cn
    gaokao:
      note: 民间·非官方
      summary: 本科上线率长期保持 100%；每年约 300 名学生考入重点大学；理科实验班高考平均分多年居全市前列，大批学生升入清北、北航等名校。
      source: 百度百科、阳光高考中学版（学校宣传口径，非官方公布）

  北京市京源学校:
    features:
      style: 石景山区唯一一所幼儿园到高中一体化学校；从幼到高整体教改，研究性学习、双语教学、校本课程、小班化教学为特色；美术特长班（承办金帆书画院）知名。
      tags:
        - 课程改革
        - 艺术特长
        - 综合均衡
      source: 百度百科「北京市京源学校」、中国教育在线 eol.cn、北京中考信息网 zhongkaobj.cn
    gaokao:
      note: 民间·非官方
      summary: 高中精品小班教学，本科上线率连续多年 100%，文理科一本率均达 90% 以上；美术班艺本率 100%。
      source: 好学校招生网 hxx.net、中国教育在线（学校宣传口径，非官方公布）

  首都师范大学附属苹果园中学:
    features:
      style: "「让生命因教育而美好」办学理念；生涯教育、科技教育、艺术教育、体育与心理健康教育为特色品牌；依托高校与科研院所构建拔尖创新人才培养体系，小初衔接课程丰富。"
      tags:
        - 科技创新
        - 艺术特长
        - 课程改革
      source: 百度百科「首都师范大学附属苹果园中学」、教育头条 edutoutiao.com、北京日报 bjd.com.cn

  北京大学附属中学石景山学校:
    features:
      style: 石景山区教委与北大附中「国有联办、整体委托、自主办学」合作举办（2015 年揭牌）；北京市首批「1+3」培养模式改革试验校，初高一贯课程体系；借力北大附中管理与名师资源；曾入选「全国青少年人工智能活动特色单位」。
      tags:
        - 课程改革
        - 科技创新
      source: 百度百科「北京大学附属中学石景山学校」、央广网 cnr.cn、北京小升初网 xschu.com

  人大附中石景山学校:
    features:
      style: "「植根传统，放眼国际，创造未来」办学理念；1 对 1 数字化未来学习、中外融合课程、「中国心」系列课程；设中美高中课程教育项目；全国青少年足球/校园篮球特色校、全国滑冰体教融合示范学校。"
      tags:
        - 国际方向
        - 课程改革
        - 体育特长
      source: 百度百科「人大附中石景山学校」、北京日报 bjd.com.cn、学而行院校库
    gaokao:
      note: 民间·非官方
      summary: 2024 年高考最高分 669 分，16 名学生超特控线；近年一本率约 90% 以上。
      source: 百度百科、择校展媒体报道 cri.cn（学校/媒体口径，非官方公布）

  北京景山学校远洋分校:
    features:
      style: 继承北京景山学校「三个面向」教育思想与传统，三方联合办学、「学校-社区-家庭三位一体」管理；文理渗透、传统与现代结合，打通学段一体化培养，新高考课程改革探索见长。
      tags:
        - 课程改革
        - 综合均衡
      source: 百度百科「北京景山学校远洋分校」、中国广播网 cnr.cn、北京高考在线 gaokzx.com
    gaokao:
      note: 民间·非官方
      summary: 2024 年 120 名考生，1 人 700 分以上、3 人 690 分以上，包揽石景山区前三名（700/696/691）；2023 年最高 675 分，约 30 人 600 分以上；2022 年 2 人北大强基录取。
      source: 百度百科（学校宣传口径，非官方公布）

  北京市古城中学:
    features:
      style: 1959 年建校历史老校；北京市唯一以西班牙语作为第一外语的西语实验班（2012 年起），与首师大西班牙语系合作、大使馆与塞万提斯学院课程；西语国家文化交流活动丰富。
      tags:
        - 外语特色
        - 课程改革
      source: 百度百科「北京市古城中学」、北京日报 bjd.com.cn、教育头条 edutoutiao.com

  北京市石景山区中杉学校:
    features:
      style: 2014 年成立的十二年一贯制全寄宿民办学校；「育林教育」理念；国学诵读+英语口语+书法每日训练、人人参加乐团掌握一门乐器、下午科技/艺术/体育/英语自主选课、每周社会实践。
      tags:
        - 寄宿制
        - 艺术特长
        - 文科人文
      source: 中杉学校官网 bjzsis.com、百度百科「北京中杉学校」、北京幼升小网 ysxiao.cn
    note: 民办校（约 119800 元/学年）。

  北京市黄庄职业高中石景山鲁谷东街:
    features:
      style: 位于石景山区鲁谷东街的国家级重点公办中职（1981 年建校）；开设综合高中班，学生可就业、中高职衔接直升高职，也可参加普通高考/职教高考升本专科；技术/艺术/服务/教育四大学部，含京式旗袍非遗传承基地等特色专业。
      tags:
        - 综合均衡
      source: 百度百科「北京市黄庄职业高中」、职教网 zhijiao.cn、本地宝 bendibao.com
    note: 中等职业学校综合高中班，升学路径与普通高中不同。

