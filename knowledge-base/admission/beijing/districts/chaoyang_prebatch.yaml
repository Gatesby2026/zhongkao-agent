      plan_group: 78          # 0.5+3合计:本校53+中科院实验3+朝外10+朝外北苑分校1+师大实验朝分2+中科附1+直升特长8
      year: 2026
      breakdown: "本校53(含高水平社团8) + 联盟跨集团名额(中科院实验3/朝外10/朝外北苑1/师大实验朝分2/中科附1) + 直升特长生8 = 78"
      alliance: "和平街一中集团 ↔ 朝外集团 跨集团直升"
      source: "xschu(https://www.xschu.com/zhengcezixun/84670.html); xscxx(https://www.xscxx.com/xiaoshengchu/cyqxsc/2026011313055.html)"
      confidence: T3
      note: "本校53两源一致(evidence旧记53/66);78为集团含联盟合计"

  二中朝阳学校:
    zhisheng_05:
      plan_main: null
      plan_group: null
      year: 2026
      runs: true
      alliance: "二中朝阳集团 ↔ 清华附朝阳集团 跨集团直升"
      source: "xscxx(https://www.xscxx.com/xiaoshengchu/cyqxsc/2026011313055.html); xschu(https://www.xschu.com/zhengcezixun/84670.html)"
      confidence: T3
      note: "确认参与0.5+3联盟(与清朝跨集团),但逐校具体名额自媒体标'收集中',未查到数,不编"

  对外经济贸易大学附属中学:
    zhisheng_05:
      plan_main: null
      plan_group: null
      year: 2026
      runs: true
      alliance: "贸大附中(94中)集团 ↔ 人朝集团 跨集团直升(向人朝输送3人见人朝breakdown)"
      source: "xscxx(https://www.xscxx.com/xiaoshengchu/cyqxsc/2026011313055.html)"
      confidence: T3
      note: "确认参与跨集团直升,本校独立直升名额'收集中'未公布,不编"

  北京中学:
    zhisheng_05:
      plan_main: 90            # 高中本部签约名额
      plan_group: 200          # 本部90 + 传媒分校&科技分校合计110
      year: 2025
      breakdown: "高中本部90 + 传媒分校&科技分校共110 = 200(2025签约季)"
      source: "gaokzx(https://www.gaokzx.com/gk/zhongkao/135629.html); zhongkaobj(https://www.zhongkaobj.cn/zhaosheng/qyzs/2025082712013.html)"
      confidence: T3
      note: "两个2025页面一致。zizzs在2026页面逐项复用了这张旧表，不升级为2026数据；签约/计划名额不等于最终备案录取人数。"

