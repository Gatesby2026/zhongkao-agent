      note: "2026网传直升计划160；2025校长确认实际集团直升156。两者年份不同，不能互相替代；280含贯通120，贯通另算不等同直升"

  朝阳外国语学校:
    zhisheng_05:
      plan_main: 55             # 本部(xschu口径)
      plan_group: 250           # 三批次合计(xscxx口径):八下30 + 九上末70 + 九下新增150
      year: 2026
      breakdown: "xschu本部口径55;xscxx三批次口径250(30+70+150)。源间口径差异大,并列不取单值"
      alliance: "朝外集团 ↔ 和平街一中集团 跨集团直升"
      source: "xschu(https://www.xschu.com/zhengcezixun/84670.html); xscxx(https://www.xscxx.com/xiaoshengchu/cyqxsc/2026011313055.html)"
      confidence: T3
      note: "⚠️冲突:55(本部) vs 250(三批含九下新增大头) vs evidence旧记zhongkaobj 305。差异源自批次/集团口径,7月简章前不可作准"

  和平街一中:
