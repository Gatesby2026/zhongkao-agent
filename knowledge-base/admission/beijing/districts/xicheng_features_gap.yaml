# 西城区高中 办学特色补采（有录取线但 xicheng_features.yaml 尚未覆盖的学校）
# 仅供中考家长选校参考。绝不编造、绝不张冠李戴。
# 校名逐字对齐 xicheng_admission_codes.json 的 schools.*.name 正名。
# tags 限词表：理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制
# gaokao 字段均为「民间·非官方」，仅在可查到时填写；查不到则不写。
# 已专门核对易混校名：四十三中 vs 四十四中、五十六中 vs 一五六中、教育学院附中(北京教育学院) vs 教育科学研究院。

district: 西城
note: 特色来自学校官网/公众号、百度百科、维基百科、北京中考信息网(zhongkaobj)、人民网/新华网专访等公开信源；高考数据为民间汇总，非学校官方喜报，仅作量级参考。

schools:
  北京市宣武外国语实验学校:
    features:
      style: "2002年成立的外语特色公办完全中学，办学理念「悦纳、静心」，目标「外语优势、文理兼重、多元文化、优质发展」；开发校本课程《了解世界》（一班一国家），增设《综合英语》《新概念》并小班授课，聘外教、开听说写及日德法等多语种选修，以英语广播、英语角、外语短剧、国外友谊校营造语言环境。"
      tags: [外语特色, 国际方向, 课程改革]
      source: "百度百科/新华网2023校长专访/中国广播网（北京市宣武外国语实验学校）"
    # 高考：未查到可量化的官方/民间数据，按铁律不写 gaokao。

  北京市第一五九中学:
    features:
      style: "前身1931年「北京女三中」（可溯香山慈幼院女校），原名北京市第三女子中学，1972年改现名；办学理念「追求卓越，师生共同发展」，倡导开放自主互动的活力教育。北京市艺术教育特色校（合唱、管乐、舞蹈），北京市体育传统学校（田径、篮球、游泳、足球、乒乓球），首批北京市文明校园。"
      tags: [艺术特长, 体育特长, 课程改革]
      source: "百度百科/北京中考信息网zhongkobj西城校情介绍（北京市第一五九中学）"
    gaokao:
      note: "民间·非官方：2020年一本率约60%-70%，录取院校含中国传媒大学、南京航空航天大学、四川大学等。数据较旧，具体以学校官方为准。"
      year: 2020
      source: "北京中考信息网zhongkaobj《西城区高中校情介绍——北京市第一五九中学》，非学校官方喜报"

  北京市第一五六中学:
    features:
      style: "始建于1932年，前身辅仁大学附属女子中学，1952年改北京市第六女子中学，1968年起男女兼收并启用现名；现为北京四中教育集团成员校。北京市学生金帆书画院书法分院（人人上书法课），科技重点推进机器人项目（曾评北京市科技教育示范校），2015年起组建「人文素养班」并以故宫研学等提升人文素养，北京市语言文字示范校。"
      tags: [艺术特长, 科技创新, 文科人文, 课程改革]
      source: "百度百科/北京中考信息网zhongkaobj西城校情介绍（北京市第一五六中学）"
    gaokao:
      note: "民间·非官方：2022年最高分659、600分以上28人（约30%）、本科率100%；人文班均分552.7、网络班均分580.36。具体以学校官方为准。"
      year: 2022
      source: "北京中考信息网zhongkaobj《西城区高中校情介绍——北京市第一五六中学》，非学校官方喜报"

  北京市第三十九中学:
    features:
      style: "西城百年学校，高中部坐落金融街；生物组培中心、理化生实验室、艺术专用教室、400米标准田径场及3000余平米体育综合馆等设施齐全。以国际交流为突出特色，设国际部与外籍学生公寓、招收世界各地留学生，西城区国际交流示范校、汉语国际推广基地校、联合国教科文组织可持续发展实验校，亦为西城区心理教育特色校。"
      tags: [国际方向, 外语特色, 综合均衡]
      source: "维基百科/百度百科/zhongkao.com学校页（北京市第三十九中学）"
    # 高考：未查到可量化的官方/民间数据，按铁律不写 gaokao。

  北京市第五十六中学:
    features:
      style: "1955年建校的公立全日制完全中学（校址西城区文兴街3号），办学理念「全纳成功教育」；形成民族团结教育、红十字会、金帆合唱团三大特色，其中民族团结教育列为校本课程主要内容、为新课改下突出办学特色。北京市高中新课程改革样本校、北京市民族团结教育示范校、北京市金帆艺术团合唱分团学校。"
      tags: [艺术特长, 课程改革, 综合均衡]
      source: "百度百科/北京中考信息网zhongkaobj西城校情介绍（北京市第五十六中学；已与一五六中区分）"
    # 高考：仅查到2020年低置信民间数据（一本率约16.7%/本科率约80%），来源与口径均不稳，按铁律不写 gaokao。

  北京市第四十三中学:
    features:
      style: "创建于1947年（前身私立惜阴中学，校址西城区后孙公园胡同，一校两址）的完全中学，被西城重点打造为「小而精」特色学校。北京市艺术教育特色校，多次在北京市艺术节、西城区「七彩大舞台」展演获奖；设声乐、管乐及艺术特长班，拥有管乐团和西城区唯一的「男子汉合唱团」；高中实行走班制，高二选科后制定个性化课表。"
      tags: [艺术特长, 课程改革]
      source: "学校官网bj43zx.com/百度百科/北京中考信息网zhongkaobj西城校情介绍（北京市第四十三中学；已与四十四中区分）"
    gaokao:
      note: "民间·非官方：2024年一本率30%、本科率80%、600分以上5人；2023年一本率11.1%、本科率76.2%。具体以学校官方为准。"
      year: 2024
      source: "北京中考信息网zhongkaobj《西城区高中校情介绍——北京市第四十三中学》，非学校官方喜报"

  北京市第四十四中学:
    features:
      style: "始建于1953年，新中国成立后北京首批公立中学之一，社会素有「准重点学校」之称；管理完善、治学严谨、课堂效益高，教学质量长期稳定在西城较高水平。高中实施「侧重文理分层走班」、不设分班考、开学后按学情分层走班；重视社团与文化活动（戏剧节、艺术节），作业以大单元设计为主、注重自学能力培养。"
      tags: [综合均衡, 课程改革]
      source: "北京中考信息网zhongkaobj西城校情介绍/百度百科（北京市第四十四中学；已与四十三中区分）"
    gaokao:
      note: "民间·非官方：2024年一本率约45%以上、本科率约94%以上。具体以学校官方为准。"
      year: 2024
      source: "北京中考信息网zhongkaobj《西城区高中校情介绍——北京市第四十四中学》，民间整理转载非官方公布"

  北京师范大学亚太实验学校:
    features:
      style: "北京师范大学主办、西城区教委管理的全学段实验性创新型学校，十二年一贯制，寄宿与走读兼收，具招收外籍学生资格。核心理念「教育浸润生命」，构建以学习为中心、具国际视野、主体多元开放个性化的课程体系（语数英基础、科学与技术、体育与艺术、人文与社会等领域）；自创办起设寄宿制，宿舍专人家庭式照护，校园封闭管理、全天候安保。"
      tags: [寄宿制, 综合均衡, 国际方向, 课程改革]
      source: "学校官网yataischool.net学校简介/百度百科（北京师范大学亚太实验学校）"
    # 高考：未查到可量化的真实官方/民间数据，按铁律不写 gaokao。

  北京教育学院附属中学:
    features:
      style: "西城区教委与北京教育学院联合举办的全日制完全中学（地处西城中心城区）；办学理念「创建阳光特色学校、促进师生和谐发展」，宗旨「普通学校开展不普通的教育、为普通劳动者子女提供优质教育」。以「阳光文化」「三元全息课程」、增效课堂、科技创新及STEM综合学科研究发展为创新型学校；与法美澳新多校结友校开展海外游学，社团丰富（合唱、舞蹈、健美操、篮球、武术、京剧、英文戏剧），「口琴社」为特色社团。"
      tags: [科技创新, 综合均衡, 国际方向, 课程改革, 艺术特长]
      source: "人民网2015《北京教育学院附属中学：创建阳光特色学校》/百度百科/北京小升初信息网（北京教育学院附属中学；注意主体为「北京教育学院」非教育科学研究院）"
    # 高考：未查到可量化的真实官方/民间数据，按铁律不写 gaokao。
