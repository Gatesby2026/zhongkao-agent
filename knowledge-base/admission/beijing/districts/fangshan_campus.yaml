  北京理工大学附属实验学校:
    class_system:
      value: 涵盖小学、初中、高中、国际部的十二年制公立学校(北理工与房山区政府 2018 年共建);高中部设计规模 36 个班,2024 年 9 月高中部新校区启用,新增约 1620 个学位。国际部为房山区第一所公立学校国际部,中美高中国际课程项目与美国湖沙克学校(Hoosac)合作,提供中美双学籍、双毕业证(2023 年首招 2 个班共 50 人;02 专业学费 100000 元/学年)。
