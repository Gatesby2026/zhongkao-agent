#   - rank = 区排名/位次（含加分一分一段表口径），无则 null（保留 score）
#   - conf: medium = ≥2 源互证；low = 单源
#   - 燕山地区学校（北师大燕化附中、燕山职业学校）未搜到统招录取线，省略
#   - 网络数据多为家长/考生分享，非考试院官方逐校公告，仅供志愿参考
#
# 全部数据均来自网络第三方汇总，非北京教育考试院官方逐校录取线公告。
# 务必以官方发布为准。

