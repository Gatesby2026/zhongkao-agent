district: 密云
note: >-
  高中办学特色 + 高考出口(民间参考)。校名严格等于 miyun_admission_codes.json schools 正名。
  tags 限词表:理科见长/科技创新/外语特色/文科人文/艺术特长/体育特长/国际方向/课程改革/学科竞赛/综合均衡/寄宿制。
  高考数据标"民间·非官方";远郊信源稀薄,查不到从略。绝不编造。
schools:
  北京市密云区第二中学:
    style: >-
      1978 年北京市首批重点中学,2004 年进入北京市示范性普通高中。
      国家级体育传统项目(篮球、田径)学校,男篮多次夺市级以上冠军;
      并设创客、武术、服装设计、科技作品等多元育人成果,
      2021 年入选"全国青少年人工智能活动特色单位"。
    tags:
      - 体育特长
      - 科技创新
      - 综合均衡
    source:
      - https://baike.baidu.com/item/北京市密云区第二中学/22870380
      - https://www.beijing.gov.cn/ywdt/gqrd/202406/t20240625_3727404.html
    gaokao:
      note: 民间·非官方
      summary: >-
        坊间称近三年高考本科上线率近 99%、重点(特殊类型)上线率约 75%,
        有学生考入清华、北大等名校。数据来源为非官方网传,仅供参考。
      source:
        - https://www.gx211.cn/school/schoolcontent6254.shtml
  首都师范大学附属密云中学:
    style: >-
      始建于 1951 年,2001 年成独立设置高中校,2004 年与首都师范大学合作办学,
      2021 年加挂"北京市密云区外国语学校"校牌。
      办学理念"激发生命潜质,奠基智慧人生";课程创新见长,
      获全国基础教育教学成果二等奖、北京市一等奖,
      获评"全国中小学科学教育实验校""首都文明校园""北京市基础教育课程建设先进单位"。
    tags:
      - 外语特色
      - 课程改革
      - 科技创新
    source:
      - https://baike.baidu.com/item/首都师范大学附属密云中学/7302143
      - https://www.bjmy.gov.cn/zwgk/jy/gz/202301/t20230103_181144.html
  北京师范大学密云实验中学:
    style: >-
      与北京师范大学合作办学,以"真教育"思想为核心,形成"规范+自主"教学特色,
      培养"自觉、自主、自立"的学生。打造体育、科技、艺术三位一体特色教育:
      体育以健康第一、1+N 专项教学;科技以 STEM 与创客教育培养创新;
      艺术开设合唱、声乐、绘画等课程。
      获评"北京市教育信息技术融合应用示范基地""北京市中小学人工智能教育与应用实验校"。
    tags:
      - 课程改革
      - 科技创新
      - 艺术特长
    source:
      - https://baike.baidu.com/item/北京师范大学密云实验中学/7541769
      - https://www.bjmy.gov.cn/zwgk/jy/gz/202301/t20230103_181146.html
  北京市密云区新农村中学:
    style: >-
      始建于 1966 年,密云区唯一完全中学,系北京 161 中学密云分校。
      办学宗旨"为学生健康成长、全面而有个性的终身发展奠基",理念"和谐合作,共同发展"。
      被确立为北京市基础教育课程教材研究基地校,
      传统节日课程(春节、元宵、清明、端午、中秋、重阳等)彰显特色;
      课堂推行师友结对、自学讨论展示交流的合作学习模式。
    tags:
      - 课程改革
      - 综合均衡
    source:
      - https://www.bjmy.gov.cn/zwgk/jy/zx/202301/t20230103_181152.html
      - https://baike.baidu.com/item/北京市密云县新农村中学/9347752
