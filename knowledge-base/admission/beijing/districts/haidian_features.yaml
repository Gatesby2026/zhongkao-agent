      style: "创办于1996年，清华大学教育集团成员校；依托清华大学及清华附中资源，推进大中小学「一条龙」衔接培养，在美术、民乐、舞蹈、体育等方面特色突出，每学年约40门校本课程"
      tags: ["综合均衡", "艺术特长", "体育特长"]
      source: "清华附中实验学校官网 thues.cn;北京中考信息网 zhongkaobj.cn"
    gaokao:
      note: "民间·非官方"
      "2024": "本科率100%、一本上线率约95%，70%以上学生被985/211重点院校录取（网传）"
      source: "https://www.zhongkaobj.cn/zhongkao/zhongxue/202412236881.html"

  北京市二十一世纪学校:
    features:
      style: "创办于1993年，国际化特色的全寄宿制新型学校；「中国灵魂、国际视野与跨文化交流能力」培养目标，携手美国费尔蒙特学校开设中美高中课程合作项目，十二年一贯制、高中国际课程本土化（注：百科词条名为「二十一世纪国际学校」，同一校）"
      tags: ["国际方向", "寄宿制", "外语特色"]
      source: "二十一世纪学校官网 bj21cs.com;百度百科"
    gaokao:
      note: "民间·非官方（国际课程出口，非高考统招口径）"
      "2024": "AP国际课程出口：获世界/美国排名前50、英国前10名校录取占比约93.5%（网传）"
      source: "https://baike.baidu.com/item/北京市二十一世纪国际学校/7428475"
