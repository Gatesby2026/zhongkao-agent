# ================================================================
#  目标分数速查（2026年参考，基于2025年510分制）
# ================================================================
target_guide_2026:
  - target: 北京中学/八十中
    reference_score: 482-488
    math_target: 92+
  - target: 人朝/清朝/八十睿德/传媒附
    reference_score: 476-484
    math_target: 88+
  - target: 朝外/清望/陈经纶
    reference_score: 469-474
    math_target: 82+
  - target: 清广/首师附朝阳/二中朝阳
    reference_score: 463-466
    math_target: 78+
  - target: 工大附中/日坛/和平街一中
    reference_score: 454-460
    math_target: 70+
  - target: 普通高中保底
    reference_score: 420-450
    math_target: 60+
    note: 低于此分数段可能无法录取朝阳区公办普高

# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
quota_allocation:
  policy_summary: |
    校额到校在统招之前录取，分数线通常比统招线低20-40分。
    2025年朝阳区校额到校最低录取控制线约为460分（510分制）。
    名额分配到具体初中校，每校可能只有1-3个名额到某高中。
    因此实际"够不够"取决于该初中校内排名，而非全区排名。

  typical_discount:
    tier1_schools: "统招线下降15-25分（八十中/北京中学等）"
    tier2_schools: "统招线下降20-35分（陈经纶/朝外等）"
    tier3_schools: "统招线下降25-40分（工大附中/日坛等）"

  examples_2025:
    - high_school: 北京市第八十中学
      统招线: 482
      校额到校典型线: 460-475
      降分幅度: 7-22分
      note: 名额少竞争激烈，降幅相对小
    - high_school: 陈经纶中学
      统招线: 469
      校额到校典型线: 440-460
      降分幅度: 9-29分
    - high_school: 工大附中
      统招线: 460
      校额到校典型线: 430-450
      降分幅度: 10-30分
    - high_school: 日坛中学
      统招线: 455
      校额到校典型线: 420-440
      降分幅度: 15-35分

  advice_for_students: |
    如果你在普通初中（非重点初中），校额到校可能是你进好高中的最佳机会。
    关键是：在本校内排名靠前比全区排名更重要。
    建议：查询本校往年分到了哪些高中的名额，针对性准备。
