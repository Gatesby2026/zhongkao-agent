    reference_score: 489
    math_target: 95+
    note: 数学需接近满分
  - target: 八十中/北京中学普通班
    reference_score: 482-488
    math_target: 90+
  - target: 人大附朝阳/清华附朝阳
    reference_score: 476-477
    math_target: 85+
  - target: 陈经纶/朝外/清华附望京
    reference_score: 469-474
