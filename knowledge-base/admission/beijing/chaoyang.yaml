tiers:
  tier1:
    name: 第一梯队（区排名前1500）
    schools: [北京市第八十中学, 北京中学, 人大附中朝阳学校, 清华附中朝阳学校]
  tier2:
    name: 第二梯队（区排名1500-3000）
