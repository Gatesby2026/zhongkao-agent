# ================================================================
#  学校分层（基于2025年区排名）
# ================================================================
tiers:
  tier1:
    name: 第一梯队（区排名前1500）
    schools: [北京中学, 中国传媒大学附属中学, 北京八十中, 人大附中朝阳学校, 清华附中朝阳学校, 八十中睿德分校]
  tier2:
    name: 第二梯队（区排名1500-3000）
    schools: [朝阳外国语学校, 清华附中望京学校, 陈经纶中学, 北京中学科技分校, 清华附中广华学校, 首师大附中朝阳学校]
  tier3:
    name: 第三梯队（区排名3000-5000）
    schools: [二中朝阳学校, 工大附中, 日坛中学, 和平街一中, 莲葩园中学, 贸大附中, 东北师大附中朝阳学校]
  tier4:
    name: 第四梯队（区排名5000+）
    schools: [中科院附属实验学校, 三里屯一中, 十七中, 化工大学附属中学, 东方德才学校, 二外附中, 陈经纶中学团结湖分校, 汇文中学垂杨柳分校]

