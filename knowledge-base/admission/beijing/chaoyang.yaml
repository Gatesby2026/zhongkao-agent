    note: 低于此分数段可能无法录取朝阳区公办普高

# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
# 说明：校额到校是优质高中分配给普通初中的名额，
# 录取分数线通常比统招低20-40分，是普通初中学生进入好高中的重要通道。
# 前提：考生须在同一所初中连续三年学籍且实际就读。
# 注意：各初中分配的名额和分数线不同，以下为典型参考范围。

quota_allocation:
  policy_summary: |
    校额到校在统招之前录取，分数线通常比统招线低20-40分。
    2025年朝阳区校额到校最低录取控制线约为460分（510分制）。
    名额分配到具体初中校，每校可能只有1-3个名额到某高中。
    因此实际"够不够"取决于该初中校内排名，而非全区排名。

  typical_discount:  # 相比统招线的典型降分幅度
    tier1_schools: "统招线下降15-25分（八十中/北京中学等）"
    tier2_schools: "统招线下降20-35分（陈经纶/朝外等）"
    tier3_schools: "统招线下降25-40分（工大附中/日坛等）"

  examples_2025:  # 2025年部分校额到校录取实例
    - high_school: 北京市第八十中学
      统招线: 482
      校额到校典型线: 460-475
      降分幅度: 7-22分
      note: 名额少竞争激烈，降幅相对小
    - high_school: 陈经纶中学
      统招线: 469
      校额到校典型线: 440-460
      降分幅度: 9-29分
    - high_school: 工大附中
      统招线: 454
      校额到校典型线: 425-445
      降分幅度: 9-29分
    - high_school: 日坛中学
      统招线: 455
      校额到校典型线: 420-440
      降分幅度: 15-35分

  advice_for_students: |
    如果你在普通初中（非重点初中），校额到校可能是你进好高中的最佳机会。
    关键是：在本校内排名靠前比全区排名更重要。
    建议：查询本校往年分到了哪些高中的名额，针对性准备。
