# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
quota_allocation:
  policy_summary: |
    海淀区校额到校竞争最为激烈。六小强的校额到校名额极少，
    2025年海淀区校额到校最低录取控制线约为465分（510分制）。
    海淀优质初中（如中关村系、海淀实验系）校内竞争激烈，
    普通初中反而可能因为竞争者少而有机会。

  typical_discount:
    tier1_schools: "统招线下降10-20分（六小强，名额极少）"
    tier2_schools: "统招线下降15-25分（理工附/交大附等）"
    tier3_schools: "统招线下降20-35分（五十七中/育英等）"

  examples_2025:
    - high_school: 人大附中
      统招线: 491
      校额到校典型线: 478-488
      降分幅度: 3-13分
      note: 名额极少（每初中0-1个），实际降幅小
    - high_school: 北大附中
      统招线: 484
      校额到校典型线: 465-478
      降分幅度: 6-19分
    - high_school: 理工大附中
      统招线: 475
      校额到校典型线: 455-468
      降分幅度: 7-20分
    - high_school: 五十七中
      统招线: 465
      校额到校典型线: 435-455
      降分幅度: 10-30分

  advice_for_students: |
    海淀竞争激烈，校额到校是普通初中学生进入六小强的几乎唯一机会。
    关键策略：校内排名 > 全区排名。在普通初中排前几名比在重点初中排中游有用。
    注意：六小强的校额到校名额分到每所初中通常只有0-2个。
