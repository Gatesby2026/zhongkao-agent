# ================================================================
#  校额到校录取参考（2025年数据）
# ================================================================
quota_allocation:
  policy_summary: |
    东城区校额到校覆盖面广，二中、五中等均有名额分配到各初中。
    2025年东城区校额到校最低录取控制线约为458分（510分制）。
    东城初中数量相对少，校额到校竞争相对温和。

  typical_discount:
    tier1_schools: "统招线下降12-20分（二中）"
    tier2_schools: "统招线下降18-28分（171/五中等）"
    tier3_schools: "统招线下降22-35分（汇文/广渠门等）"

  examples_2025:
    - high_school: 北京二中
      统招线: 485
      校额到校典型线: 468-477
      降分幅度: 8-17分
    - high_school: 171中学
      统招线: 480
      校额到校典型线: 458-470
      降分幅度: 10-22分
    - high_school: 五中
      统招线: 475
      校额到校典型线: 452-465
      降分幅度: 10-23分
    - high_school: 汇文中学
      统招线: 469
      校额到校典型线: 442-458
      降分幅度: 11-27分

  advice_for_students: |
    东城区校额到校整体降分幅度适中，普通初中学生有较好的机会。
    二中的校额到校名额分布较广，很多初中都能分到。
    建议：数学稳定在80+，总分460+就有机会通过校额到校进入优质高中。
