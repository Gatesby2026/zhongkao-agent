# 目的：给志愿系统算通勤距离用。涉及孩子升学，地址必须扎实，禁止编造。
# 方法：北京中考信息网"朝阳区公办高中校情介绍"(zhongkaobj.cn) + 学校官网 + bjeea + 政府公示，多源核对。
# 局限：本轮研究工具只能用 WebSearch（WebFetch 多被拒/超时），引用原文来自页面摘录，
#       最高权威源 bjeea《2025招生简章》PDF 未逐字读取。门牌级精度按 confidence 标注。
# 校区原则：取"中考统招生实际去上高中的那个校区"，不是本部/初中部/注册地。
#
# confidence:
#   high   = ≥2 权威源一致 + 高中部明确 + 门牌到位，可直接进下一步地理编码
#   medium = 单一权威源，或门牌只到路名/楼号，或多校区高中部判断靠推断 → 入库前再核门牌
#   low    = 高中部校区会因年份变（借址/分年级/新校启用），地图无法解决 → 必须当年招生简章或电话确认
# action: ready | verify_doornumber | confirm_by_phone
#
# 更新日期: 2026-06-03  来源年份: 2024–2025 招生季

