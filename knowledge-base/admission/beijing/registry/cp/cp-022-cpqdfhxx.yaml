  features:
    style: 始建于 2005 年，十二年一贯制民办校。办学理念「一人一特长，一人一方案」，培养具家国情怀与国际视野的创新人才。设戏剧/演讲/辩论/机器人等特色课、中加班/AP/A-Level 双语课及小语种课，配击剑馆、游泳馆、高尔夫场等。
