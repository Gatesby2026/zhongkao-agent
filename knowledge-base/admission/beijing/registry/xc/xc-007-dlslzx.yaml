    class_system: 民间整理·待核：2024级高一8个班、每班40人左右；无实验班、教学不分层（平行分班）；学校分南北两校区——初一初二在南址，初三和高中在北址。
    schedule: 民间整理·待核：高一无晚自习；高三作业较多、有晚自习、会补课。
    management: 民间整理·待核：管理较严格，违反校园管理制度有处罚/通报，需穿校服；非常重视体育锻炼、每天跑操。
    boarding_detail: 民间整理·待核：暂时不提供住宿。
    dining: 民间整理·待核：食堂只有午餐、无早晚餐，上晚自习会有晚餐；民间评价南址食堂比北址好吃。
    activities: 民间整理·待核：乒乓球队是学校特色和强项（市级乒乓传统校）；有金帆管乐团常参加比赛；举办秋季运动会、科技节、艺术节、专场音乐会等。
    voices: 民间整理·待核：教学质量在市区示范校中保持优势、社会声誉良好；也有评价称『历史悠久、成绩属实一般』，优势是有校额到校。
