    note: 民间·非官方：清北上线与录取居西城前列（如2019年报道理科校均分居西城前列、清北录取数十人量级）。具体以学校官方为准。
    year: 2019
    source: 知乎/家长社区汇总，非学校官方喜报
  campus_life:
    class_system: 民间整理·待核：高中约13个班（每班40-45人）——5个特殊班（2个理科实验班/2个科技综合素质实验班/1个人文实验班）+ 8个普通班；另设素质班（智力优秀学生综合素质开发实验班，『4+3』学制，校本课程行学分制）及少儿班。
    schedule: 民间整理·待核：早7:30左右到校（各班主任要求不同），下午16:15或17:05放学；上午5节、下午3-4节；高三和住宿生晚自习18:00-21:00。
    management: 民间整理·待核：实行『行为分』制度（违纪扣分、表现良好或校外获奖加分，各班有自治权可自定细则）；住宿管理较严，帮助规范作息保证睡眠。
    boarding_detail: 民间整理·待核：条件较好，6人间，有空调、抽屉柜子；每层有浴室卫生间、24小时热水。
    dining: 民间整理·待核：被评『全市领先』——早饭5元内可搞定每天品种不同；午饭有15元四菜一汤和17元盖饭；晚饭可选菜，正常食量约15元、食量大约23元。
    activities: 民间整理·待核：延续30多年的科技节、体育节、艺术节；70多个学生社团。
    voices: 民间整理·待核：约70%学生高考排名进北京前10%。
    source: 知乎(就读体验) https://zhuanlan.zhihu.com/p/489172828 ; 官网(素质班) https://www.no8ms.bj.cn/cms/ccjy/szb/ ; 班型 https://www.gaokzx.com/gk/zhongkao/127183.html
