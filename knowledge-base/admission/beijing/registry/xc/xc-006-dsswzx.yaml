    year: 2024
    source: 学校喜报转载/家长社区汇总，非一手官方
  campus_life:
    class_system: 民间整理·待核：高一2024级16个班，含2个科技班、4个志成班；含六年一贯直升项目班、科技创新实验班（2010年与中科院京区科协合办、每周2节科技课、校内10个高端实验室）、自主班；另设志成实验班、立人实验班；选课走班/学部制/导师制/学分制；分班考8月中旬考语数英物化。
    schedule: 民间整理·待核：晚自习高一开设但非强制、20:00或21:00两档可选（另一处口径称不设晚自习，两源略有出入）。
    management: 民间整理·待核：穿校服、发型符合要求、未经允许不可使用手机（有源称手机不可带进校园）；重视体育跑步，偏素质教育。
    boarding_detail: 民间整理·待核：普高本部暂不提供住宿。
    dining: 民间整理·待核：国际部与普高同一食堂、各有区域；学生反馈食堂一般（民间补充约18元自助餐、主食免费其他刷卡）。
    activities: 民间整理·待核：近50个社团（文学/电影/书法/音乐剧/模联等）；合唱节、科技节、体育节、艺术节、贸易节、研学；高水平团队含游泳队/女篮（市金奥运动队）、金帆民族管弦乐团/合唱团（金帆艺术团，1989年获称号）、生命科学团/机器人团（金鹏科技团）。
    voices: 民间整理·待核（呈两极）：『硬件很好软件一般、氛围相对轻松、颇有素质教育感觉』；也有『项目班内卷王、其他班氛围一般』『进度极慢』之评。
