  campus_life:
    class_system: 民间整理·待核：高中约8个班（每班40-45人，特殊班约30人）——2个特色班（理科学科思想方法培养特色班、文科学科思想方法培养特色班）+ 6个普通班；招管乐特长生、科技特长生。
    management: 民间整理·待核：校训『诚真、开拓』，以『三严』著称（严明校纪/严肃学风/严格训练）；校风勤奋朴实团结进取。
    boarding_detail: 民间整理·待核：本部高中无宿舍，学生全部走读。
    dining: 民间整理·待核：有自有食堂，校内无小卖部、中午都在食堂，学生反映食堂『还不错』。
    activities: 民间整理·待核：『四个一』活动（健身技能/兴趣爱好/大型国内外活动/研究性课题）；模联、学生电视台、艺术节；成长仪式含十四岁生日、成人仪式（中山公园看升旗）；金鹏科技团/科技教育示范校，20-40余门校本选修，与美法英澳学校师生互访。
    voices: 民间整理·待核：『学习氛围比较好』；学生自嘲『遇到升旗就赶上一帮人集体迟到』（侧面反映氛围偏松）。
