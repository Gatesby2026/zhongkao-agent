  campus_life:
    class_system: 民间整理·待核：2023级高一共10个班、分普通班和住宿班、每班40人左右；有分班考但仅为摸底，分班仍参考中考成绩，高一下开始选科走班；另有源称每年开设1个实验班、进度比普通班快（待核）。
    schedule: 民间整理·待核：上课节奏较快、作业量较多（有学生反馈要写3小时左右）；放学后可申请到自习室自习（老师组织管理）；高三周末补课，有月考/期中/期末/周测。
    management: 民间整理·待核：管理比较严格；带手机须写申请说明理由，上课期间上交、放学归还。
    boarding_detail: 民间整理·待核：高一年级起设有住宿部（2022年成立），3人一间，配床/桌椅/衣柜/空调/暖气，公共区有洗浴间/卫生间、各区域相互独立。
    dining: 民间整理·待核：餐厅布局合理、可容纳800人用餐，采用自助餐就餐形式。
    activities: 民间整理·待核：合唱比赛、篮球/排球/足球等运动比赛；校外实践如参观科技馆、食品工厂等（北京市排球传统校）。
