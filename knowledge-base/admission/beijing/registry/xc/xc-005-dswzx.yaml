  campus_life:
    class_system: 民间整理·待核：设筑真人文实验班（2012年市教委批准，约80人，学测+中考成绩选拔，含游学支教）、王绶琯院士科学创新班（2024年成立，单一来源·待核），实验班外为普通班；另有四大类七十余门特色校本课程（机器人竞赛/数学建模/击剑/板球等）。
    management: 民间整理·待核：理念『以人为本』『减负增效』、营造宽松自由学习环境；但部分学生认为管理层偏严。
    boarding_detail: 民间整理·待核：高中部提供住宿；民间评价宿舍两人间、配空调暖气独立卫浴。
    dining: 民间整理·待核：校内设多元文化学生餐厅，民间评价食堂饭菜质量很好。
    activities: 民间整理·待核：文化品牌含午间音乐会、午间剧场、诗歌节、英语文化周、艺术节、科技文化节、心理文化周、周口店野外考察、『相约星期二』讲座、春秋运动会；社团有田径/篮球/编程/京剧/民乐/舞蹈等；德育特色为雷锋班活动30余年、清明祭扫高君宇烈士墓。
    voices: 民间整理·待核：知乎《就读体验》——食宿可圈可点、管理偏严、高考成绩西城中等（平均约500出头）。
