    - 课程改革
    source: 西城外国语学校官网/百度百科（北京市西城外国语学校）
  campus_life:
    class_system: 民间整理·待核：高中部约24个教学班、每年级8班；设法语班、西班牙语班、俄语德语班（小语种为分班核心特色，小语种班英语课时少但要求更高、优先英语基础好的学生）；实行分层教育，A层管理更严。
    schedule: 民间整理·待核：早7:20到校；作业适中，平时21:00-22:00完成、考前约23:00-24:00。
    management: 民间整理·待核：校风严谨注重细节、分层管理；家长反馈『该松的松该紧的紧』『学习抓得很紧』。
    boarding_detail: 民间整理·待核：设寄宿部（2012年回迁北礼士路甲62号），宿舍配空调、公共浴室，晚有任课老师看自习（住宿细节年份偏早，建议复核）。
    dining: 民间整理·待核：2个食堂、师生分开；午餐口碑好花样多（餐价年份偏早，建议复核）。
    activities: 民间整理·待核：外语节/国际文化节、科技节、艺术节、体育节、读书节；学生组织含『零点通讯社』『中国校园文学』记者站、学生电视台、外国语学校国际电台等；育人定位『中国情怀、国际视野』。
    voices: 民间整理·待核：『学风校风非常好、老师负责有爱、作业适中、十分满意』；『以前很辉煌、经常出状元』。
