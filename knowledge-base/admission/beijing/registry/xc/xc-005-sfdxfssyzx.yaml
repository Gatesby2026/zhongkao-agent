  campus_life:
    class_system: 民间整理·待核：高中本部约13个班（每班约40人）——4个数理特色班 + 3个科技特色班 + 1个人文特色班 + 5个综合(普通)班。
    schedule: 民间整理·待核：早7:20前到校，下午4:10放学；有社团或课后服务最晚到18:00。
    management: 民间整理·待核：管理较严格，任何时候出校门都要出门条；但对发型等较人性化（女生可留长发束起即可）。
    boarding_detail: 民间整理·待核：本部只解决远郊区学生住宿，入校后申请；四人间或六人间，有独立卫生间，配床/衣柜/写字台/椅子，室内空调暖气，楼层设公用浴室（每天开放）。
    dining: 民间整理·待核：早中晚三餐均可在校解决，早餐6:00-7:20供应；有10元和15元两种套餐，反馈好吃可续碗，饮料牛奶自费。
    voices: 民间整理·待核：学生反馈饭菜普遍好吃、可续碗；管理上『出门要出门条』但发型等规定较人性化。
