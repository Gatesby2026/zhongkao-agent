  campus_life:
    class_system: 民间整理·待核：高中约15个班，文/理分方向，8月入学测试定班；班型含文科实验班/人文实验班（全国唯一教育部批准文科实验班）、理科实验班、项目式学习实验班、数字化学习特色班、普通班，另有国际部PGA高中课程班。
    schedule: 民间整理·待核：周五16:00-17:00社团活动；高一至高三均提供晚自习、学生自愿、有教师管理；住宿生22:30熄灯统一自习。
    management: 民间整理·待核：定位『人文管理』『尊重学生自主』，学生评价『自由』『开明』；要求40学时课外志愿服务；校额到校生与统招生混编、一视同仁；手机管理由松到紧演变（后期返校直接交手机）。
    boarding_detail: 民间整理·待核：提供住宿、开学后申请、名额有限（外区可申请、本区少量）；370元/学期，8-12人/间，配空调、公共卫生间。
    dining: 民间整理·待核：约1540㎡分三层（套餐/风味餐/自由选择区），特色麻辣烫/刀削面/酸辣粉等；2024年9月官方满意度调查（354份）综合满意度86.51%。
    activities: 民间整理·待核：社团参与率超50%，分教师指导类与学生自发类（HP凤凰社、动漫社、推理社等）；语文/人文特色课程含《经典戏剧鉴赏与实践》《中英文跨学科文学鉴赏》《经典古文鉴赏》《武侠小说写作课》。
    voices: 民间整理·待核：文科实验班实力突出、项目班生源高分、普通班均分约600；体验『自由』『开明』有归属感，西城『四金刚』之一、文科声誉强。
