  campus_life:
    class_system: 民间整理·待核：高中约13个班（每班40-45人）——4个特殊班（道元特色班/科技特色班/理科实验班/人文特色班）+ 9个普通班。
    schedule: 民间整理·待核：早7:20前到校（早自习），下午4:10放学，有体育活动则稍晚。
    management: 民间整理·待核：较严格，中午一般不许外出、中途出校门须班主任签字；空调温控有规定（夏季不低于22℃、冬季不高于26℃）。
    boarding_detail: 民间整理·待核：提供住宿，男生四人间、女生六人间（另有四/六人间两种说法）；宿舍配空调、独立卫浴、储物空间，另设自习室。
    dining: 民间整理·待核：刷饭卡（可充值）；早餐种类多（油条/面包/煮鸡蛋/馄饨/粥/烧麦等），午餐套餐，晚餐各式小菜。
    voices: 民间整理·待核：约97%学生达重点大学录取线，学科奥赛累计获奖牌，多人获『北京青少年科技创新市长奖』，被称『优秀学生的摇篮』。
    source: 知乎(就读体验) https://www.zhihu.com/question/289112361 ; 知乎(住宿) https://zhuanlan.zhihu.com/p/674627039 ; 班型 https://www.gaokzx.com/gk/zhongkao/127183.html
