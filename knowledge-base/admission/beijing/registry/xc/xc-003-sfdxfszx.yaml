    note: 民间·非官方：本科率近100%、一本率高、985上线率高；钱学森班平均分突出（民间称近年平均分660+量级）。具体以学校官方为准。
    year: 2024
    source: 家长社区/中考资讯汇总，非学校官方喜报
  campus_life:
    class_system: 民间整理·待核：2024年新高一设三类特色班——钱学森班（2个班、每班约20人，理科为主兼人文）、科技实验班（有进高校科研院所/机器人社/科技竞赛优先机会）、人文实验班（人文社科专长）；小班制每班约30人。
    schedule: 民间整理·待核：7:20左右到校，7:30早自习，上午5节夹课间操；午休12:15-13:30（可自由活动/学习/答疑），放学约16:05-17:00。
    management: 民间整理·待核：管理『严格而有序』，有学生提到老师会定期查监控/晚自习查监控；校风总体被在校生形容为『自由开放』。
    boarding_detail: 民间整理·待核：分东西两区——东区供初二至高二学生生活，西区单独属当届高三；宿舍干净，游泳池、地下篮球馆等设施多在东区。
    dining: 民间整理·待核：食堂『相对可以』，学生反映比小学好；也有在校生称『盛饭阿姨亲切』满意度高（两条评价略有差异）。
    activities: 民间整理·待核：校刊、合唱团、金帆舞蹈团、模联、机器人社、环境科学社、微电影社、足球社、美式橄榄球社、桥牌社、摄影社等；兴趣课含男篮/女排/乒乓球/希腊神话/定向越野等。
    voices: 民间整理·待核：在校生形容校风『自由开放』；小班拉近同学关系『老师像朋友』；师资强且不向实验班倾斜，普通班老师也多为高学历/年级组长/特级教师。
