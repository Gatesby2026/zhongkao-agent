  gaokao:
    note: 网传喜报·非官方
    detail: 据民间汇总,2025年清北录取约6人、双一流录取率60%以上、特殊类型招生上线接近100%,高分段有699/694/687分等;一本率长年约90%以上(未经学校官方确认)
    '2026': 最高700分（全市第33名）、清北裸分线4人
    source: 网传·非官方汇编 zhongkaobj.cn / 163.com / sohu.com 2026 各区高考喜报(2026-06)
  campus_life:
    class_system:
      value: 高中约4个班(3个理科班含1个小五班直升+1个文科班), 全年级约100余人。班数随届变动。
      source: 知乎《在景山学校就读是怎样的体验》 https://www.zhihu.com/question/28125398/answer/3563930988
      confidence: 民间整理·待核
    schedule:
      value: 高一/高二无晚自习、基本每天15:05放学; 高三周一至周五晚自习18:30-20:40。
      source: 知乎 https://www.zhihu.com/question/28125398/answer/3563930988
      confidence: 民间整理·待核
    management:
      value: 管理严格、学风浓、老师负责; 可带手机入校但须交老师统一保管, 上课不许用、放学后领取。
      source: 知乎 https://www.zhihu.com/question/28125398/answer/3563930988 ; 上哪学 https://www.shangnaxue.net/a/1374620603572563970
      confidence: 民间整理·待核
    dining:
      value: 有食堂, 提前一周订食材由专业基地运输到校; 每份荤菜定量, 半荤/全素不限量。
      source: 上哪学 https://www.shangnaxue.net/a/1374620603572563970
      confidence: 民间整理·待核
    activities:
      value: 社团丰富按兴趣自选(学生会/管乐团/民乐团/合唱团/舞蹈团/定向越野社/天文社/辩论社/篮球/足球/排球/健美操等); 举办校园歌手大赛、秋季运动会、"致青春"诗会、校园科技节。
