    style: '北京四中教育集团成员校(2015 年成立、由北京四中直接管理的完全中学), 以「勤奋、严谨、民主、开拓」为校训, 以「培养杰出的中国人」为目标。承袭四中本部传统: 不加课、不补课; 高度重视体育(每天 1 节体育课/1
