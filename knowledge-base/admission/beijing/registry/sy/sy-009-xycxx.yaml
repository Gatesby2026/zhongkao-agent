    style: 中央别墅区 15 年一贯制寄宿国际化学校。多元高中:剑桥 A-Level/IGCSE(2005/2006 起)、美国 AP(18 门)、香港 DSE(2023 起)、德国留学项目;艺体教育(15 年一贯制)与人工智能信息科技课程突出,设少年科学院与四支科创校队。
