  campus_life:
    class_system: 2025级高一共10个班，其中有4个实验班。新高一学生主要根据中考成绩进行分班，后续会根据每学期的期中、期末考试动态调整实验班。
    schedule: 一般情况下，学校每学期仅安排期中、期末两次大型考试，无月考，但每天会有各科小测。学校规定住宿生必须上晚自习。
    management: 该校办学理念先进，秉承“明德、泛智、尚美、求真”的校训和“严谨、博雅、笃行、创新”的优良校风，同时着眼学生需求，严格管理，促进学生全面而有个性地发展。手机政策未提及。
    boarding_detail: 该校宿舍条件优越，四人一室，配备独立卫浴、空调等设施，并安排生活老师24小时为住宿生服务。校额到校录取的学生原则上不提供住宿，但如有需求，建议填报统招01专业申请住宿。
    dining: 该校为学生提供早、中、晚三餐，其中早饭和午饭面向全体学生，晚饭则专为住宿生准备。学校两层楼的标准化食堂可容纳千余人同时就餐，其半自助模式深受学生喜爱和家长好评。
    activities: 学校组建了航模社、民乐社、舞蹈社等百余个社团，并每年举办全校性读书节、体育节、文化艺术节、校园科技节、国际文化节等活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
