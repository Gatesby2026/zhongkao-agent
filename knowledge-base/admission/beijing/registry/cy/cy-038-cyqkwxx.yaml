rollup:
  campus_life:
    class_system: 往年按中考成绩会分出1个航空实验班，其他4个班平行分班。普高学部实行分层分类走班教学，根据选科意向和入学测评情况，适时分出侧文侧理实验班。
    schedule: 普高学部针对住宿生安排了晚课、晚自习，分18:30-19:20、19:30-20:20、20:30-21:20三节，每节50分钟。周日晚上返校进行周测。
    management: 住宿生的手机等电子产品由生活老师集中管控，周日返校上交手机，周五离校发放手机。每周三晚自习后学生会有一个小时的时间用手机与家长进行联络与沟通。
    boarding_detail: 该校普高学部拥有高水准的住宿设施，以四人间为主，有干湿分离的独立卫生间，公用洗衣房、公共自习室等。
    dining: 该校餐厅将每天的饭菜风格交错搭配，南方菜、北方菜、西北菜、国际菜、厨师推荐菜轮番上阵，尽量让学生们不会吃腻。细致到加餐菜单，一周的点心都是咸甜间隔提供。除此之外，餐厅还提供节日美食和特色小吃等。
    activities: 该校开设创造类、活动类及服务类三大类课外活动供学生参加。其中创造类目前已有乐团、雨果机器人俱乐部、音乐剧、生物工程等；活动类则多以球类运动为主，其他运动为辅，如：棒球、足球、高尔夫球、手球、初级击剑、游泳等；服务类则比较广泛，如：体育服务、桌游、凯文新闻、志愿者、壁画艺术等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
