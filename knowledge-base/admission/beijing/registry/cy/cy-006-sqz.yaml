    note: 网传·非官方（描述性）
    '2024': 一本率50%以上
    source: gaokzx.com/gk/gaokao/124276.html
  campus_life:
    class_system: 实验班有集团直升班1个，传媒特色实验班1个；新高一年级没有分班考试，除集团直升班和传媒实验班外，其他班级是统一分班。高一下学期确定选科后会重新进行分班、分层教学。
    schedule: 主要是期中和期末考试；高一走读生可自愿申请在学校上晚自习到20:30，住宿生通常是晚上22:00下课。
    management: 实行半军事化管理，部分学生感觉管理偏严格。男生不允许留长发，女生可以留马尾但是刘海不能过眉毛。
    boarding_detail: 提供住宿，4-6人间，公共的卫生间和洗漱间。在校生反馈高一、高二时住宿条件还不错，高三时稍微差一点。
    dining: 餐厅提供一日三餐，刷饭卡就餐。
    activities: 定期举办文化节、艺术节、体育节、读书节、心理文化周、社会实践周及陶苑艺术时空等活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
