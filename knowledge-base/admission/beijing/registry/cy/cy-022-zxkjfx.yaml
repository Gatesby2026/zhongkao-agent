  campus_life:
    class_system: 2024级高一共4个班，每班20人左右。无分班考。
    schedule: 学校有晚自习，学生可以自愿参加，一般时间到19:30。学校的考试和北中是同步的。
    management: 坚持“让学生创造性成长”的办学理念，“文理相通，科技见长”的培养目标。
    boarding_detail: 该校暂不提供住宿，全部为走读生。
    dining: 据在校学生分享，学校食堂一般，但是能吃饱。
    activities: 重视学生校园生活的建设，在校内积极组织各类课外活动，如开全员运动会活动。此外，学校还带领学生走出校园，前往中华女子学院等地开展校外研学实践活动。
    voices: 学生 A：2024 届高一学生实际是有分班考试的，但是高一就 4 个班，整体没有太多差异，一班和二班是相同的老师，但是二班比一般讲的要细一些、慢一点儿。学生 B：学校氛围很好，小班制教学，压力不大；学校的活动也很丰富。老师认真负责，教学水平都不错，但是个人觉得学校更倾向于理科。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
