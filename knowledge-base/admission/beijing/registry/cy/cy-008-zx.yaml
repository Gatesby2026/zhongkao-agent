rollup:
  features:
    style: 朝阳区头部校，行知项目、实践育人、国际化办学，氛围自由、注重综合素养
    tags:
    - 综合均衡
    - 课程改革
    - 国际方向
    source: 百度百科 / 北京市政府门户网（东坝校区报道）
  campus_life:
    class_system: 有钱学森班、英才班、“1+3”人才培养试验项目班、诺奖创新班和周恩来班；分班考科目为语文、数学、英语和物理；能否流动未提及
    schedule: 高一年级有晚自习，一般是晚上20:30下课；高一、高二周六也需要补课；平时有月考、期中和期末考试，每周还会有周练；据学生反馈作业量比较大
    management: 管理比较人性化，尊重学生的个人选择，给予成长空间；手机不得随意带入校园，确有需要的学生需提前申请，到校后交由班主任统一管理
    boarding_detail: 住宿生名额可参考当年的招生简章；据学生分享一般是六人间，上下铺，公共卫浴；走读生可以申请住宿
    dining: 食堂提供免费主食，其他菜品可通过刷卡购买；饭后，学生还能享用蛋挞、牛奶等餐后点心；若用餐时间较晚，还可前往隔壁图书馆用餐
    activities: 学生社团种类丰富，目前已有文创社、时屿报社（原名贰零贰陆报社）、丘山生
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
