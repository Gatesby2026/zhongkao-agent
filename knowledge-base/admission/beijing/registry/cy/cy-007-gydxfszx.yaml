    boarding_detail: 高一走读生下午17:45放学，住宿生则需在18:30至21:50之间参加晚自习。
    activities: 从高一第二学期四月中旬开始，选考科目“物理”“化学”两科试行预走班，一般高二年级正式开始走班，分层教学。每周三下午的校本、社团课由学生自主选择。
