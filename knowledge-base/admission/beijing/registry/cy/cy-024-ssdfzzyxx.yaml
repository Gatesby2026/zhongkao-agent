  campus_life:
    class_system: 有科创实验班和成达实验班，分班考科目为语文、数学和英语，实验班按中考成绩进行分班，后续也会根据学生实际学习情况进行动态调整。
    schedule: 所有学生均可参加晚自习，晚自习20:30下课，延时最晚至21:30。高一作业量稍多，但基本在23:00前完成。
    management: 管理严格，带手机需要签订协议，审核通过后可以携带手机。每天早晨手机存入保管箱，放学后取回。进校前需关机，出校后才可开机。
    boarding_detail: 宿舍为6人间，上下铺设计，配备隐私帘和收纳抽屉，室内安装暖气和空调。住宿生由专业宿管老师管理，管理严格，禁止玩手机。学生需向学校提交住宿申请，经班主任、德育处等部门审核通过后入住。
    dining: 有专业的餐饮团队为学生提供配餐，食谱会进行更换，能够保证学生的一日三餐。早餐的餐标是10元/人，午餐和晚餐的餐标是23元/人。
    activities: 开展各类优质社团，如科技、声乐、播音主持、舞蹈、美术、体育等。同时，学校通过举办各类不同的校园活动来丰富学生的校园生活，如每年都会举办主题不一的心理节、历史文化节等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
