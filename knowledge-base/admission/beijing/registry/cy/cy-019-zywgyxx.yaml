    class_system: 有实验班和平行分班，高一下学期期中考试进行第一次分班，高二期中期末还会分班，高三锁班，学生可以流动。
    schedule: 晚自习通常晚上21:20左右下课，学生可以自愿选择是否参加晚自习。高一、高二年级暂时没有月考，只有期中、期末考试。
    management: 管理相当严格，学生们在校要统一着装，女生不得佩戴饰品，男生不得留长发。学校禁止携带电子产品入校。
    boarding_detail: 2024年无住宿。
    dining: 午饭高二、高三去食堂，晚饭都去食堂。
    activities: 开设第二外语选修课，涉及德语、法语、西班牙语、俄语、日语5个语种，近20个选修班；每年举办艺术节、科技节、体育节等重大活动；模联、现代舞、合唱等社团的开设，极大拓宽了学生视野。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
