    activities: 学校积极组织其他校内活动来丰富学生的课外生活，如校园歌手大赛、篮球联赛、新年游园市集等。此外，学校也有带领学生走出校园，前往河南开展研学活动；齐聚官庄公园开展定向越野活动等。
