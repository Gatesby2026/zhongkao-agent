rollup:
  campus_life:
    class_system: 往年学校仅开设1个高考精英班。分班考科目为英语和数学，考试形式为笔试+面试。
    schedule: 高一学生晚自习时间为18:30-20:45，一般是三节课，会有老师全程辅导。
    management: 该校管理比较人性化，尊重学生的个性发展。
    boarding_detail: 有2人间宿舍和4人间宿舍，其中2人间宿舍配有独立卫生间、空调、学习桌椅等设施；4人间宿舍分为两种，一种是每位学生一张床铺，床铺下方为衣柜等储物设施，宿舍内配有学习桌椅和独立卫浴；另一种是上床下桌的形式，宿舍内同样配有独立卫生间。
    dining: 食堂提供早、中、晚、夜宵四餐，满足学生的日常需要，并且新学期会推出多种新菜品。
    activities: 社团包括篮球社、排球社、羽毛球社、足球社、乒乓球社、飞盘社、经济社、动漫社、合唱社、人工智能社、心理社、厨艺社、电影社、K-POP社、国青模联社、网络安全社等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
