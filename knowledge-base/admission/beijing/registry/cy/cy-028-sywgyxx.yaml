rollup:
  campus_life:
    class_system: 该校注重小班制教学，强调师生关注度，班容量在25-30人；除了普高班外，还有国内艺考班（美术、音乐、表演等）、小语种班（日语）、美国高中班、国际艺术班（艺术设计、音乐制作、影视编导等）、A-Level班和Cloud
      Learning Club慕课班。全面实行选课走班、分层教学。
    management: 学校规定，学生到校后第一时间上交手机，紧急情况可找班主任老师或学校相关教师处理。
    boarding_detail: 建议考生住宿，目前学校宿舍是4-6人间均为下铺，独立卫浴，宿舍内配有书架等设施。
    dining: 拥有独立学生食堂，三餐均会留样。学校要求学生在校内食堂用餐，不允许订外卖。据在校学生分享，校餐厅有各种风味的营养自助餐。
    activities: 为了使学生全面发展、快乐成长，学校鼓励学生开展丰富多彩的课后活动，相继成立了网球队、模联社、文学社、空中加油站、校园广播站、话剧团、英语沙龙等学生社团。同时，学校借助多样化场地空间及设备设施，开设书法、围棋、钢琴、版画、陶艺、机器人、足球、篮球、剑道、马术、垒球、棒球、排球、高尔夫、话剧、摄影等多种课程。另外，还会组织学生参加社会公益实践、西部捐赠、主题团课、海外交流、艺术展览、博物馆、红色教育等活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
