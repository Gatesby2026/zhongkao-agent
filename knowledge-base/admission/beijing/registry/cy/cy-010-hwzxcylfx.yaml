    activities: 该校高度重视学生综合素质的全面发展，在课程建设方面开展了篮球、乒乓球、击剑、跆拳道、跳绳、健美操、武术、陆地冰壶等体育特色社团，致力于为学生搭建各种平台，让学生有更多比赛和展示的机会。同时，学校还会举办校园歌手大赛、观影活动、体育节、艺术节、秋季田径运动会等活动，以此丰富学生们的校园生活。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
