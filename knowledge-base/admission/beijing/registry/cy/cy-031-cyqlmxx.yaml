  campus_life:
    class_system: 没有实验班，学校开设可高考可出国课程，往年有美国高中班2个，剑桥高中班1个，加拿大高中班1个。
    management: 该校管理严格，但是师生关系非常融洽。
    boarding_detail: 该校学生可走读可住宿，目前住宿是3-4人间，宿舍区域配备了洗衣机、安全饮水机等生活设施。
    dining: 该校每周会在公众号上公布一周菜谱，早餐提供糕点、蛋奶、汤粥和小菜等；午餐和晚餐提供西餐、中餐、粥汤、水果等。
    activities: 该校设有丰富的社团俱乐部，包括小提琴、钢琴、吉他、舞蹈、戏剧、绘画等。学生也可以参加自主创建并管理的学生社团活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
