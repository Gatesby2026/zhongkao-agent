    '2024': 本科率约100%，一本率约40%-50%
    source: zhongkaobj.cn/.../202412247047.html
  campus_life:
    class_system: 往年高一上学期没有实验班，下学期根据学生选科情况有侧重的分班。根据中考成绩进行分班，每个班学生比较均衡。
    schedule: 作业量比较大，一般要写2-3个小时。学校除了期中、期末考试外，还会组织月考，大型考试结束后，会公布分数和排名。个别科目还会利用早自习进行小测试，有成绩无排名。高一年级的晚自习学生自愿选择上还是不上，下课时间是17:30-18:30之间。
    management: 以学生的全面发展为目标，针对学生性格特点和发展需求，倡导学生“自我教育，自主管理，自主发展”。
    boarding_detail: 该校暂时不提供住宿。
    dining: 据在校学生反馈，学校会将配餐送至教室内，价格适中。
    activities: 开设篮球社、足球社、乒乓球社、音乐、美术、辩论、心理、思政、摄影、话剧社等系列学生社团，促进学生全面发展，满足学生的个性化需要。同时，校内还经常举办文化节、各类体育活动、班级秀舞台活动、读书竞赛等活动来丰富学生的课外生活。此外，学校还通过研学活动、京港两地互访、中日小大使文化交流活动等实践活动，打开学生的视野，提升综合素养。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
