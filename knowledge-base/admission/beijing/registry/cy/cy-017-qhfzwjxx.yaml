  campus_life:
    class_system: 2025级高一共18个班，其中2个直升班，1个美术班，1个文科实验班，2个第一实验班（3班、4班），2个第二实验班（5班、6班）。实验班大部分不流动，但少数优秀学生有机会申请进入实验班。分班考科目为语文、数学、英语、物理/历史（自选）。
    boarding_detail: 一般是三人间，但也有五个人的大房间。有单独的卫生间，水房，洗漱的地方，洗澡的地方。
    dining: 该校自办食堂，提供早餐和午餐，住宿舍提供晚餐，伙食不错。午饭强制要求必须在食堂吃，食堂给带饭的学生提供微波炉加热。
    activities: 为了提升学生的综合素养，助力特长发展，该校成立了多种社团供学生们自由选择并参加，目前已有篮球社、跆拳道社、美术社、二胡社、科技创新社等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
