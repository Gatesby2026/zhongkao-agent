rollup:
  campus_life:
    class_system: 该校全学段班额限定25人，八年级至十二年级采用导师制，每位导师带领6-8位学生。
    management: 该校管理严格，学生在校期间必须穿校服，并且在不同的场合需要穿着不同的校服。
    boarding_detail: 该校为九年级至十二年级的学生提供两种寄宿选择：第一种是5天寄宿项目，学生周一至周五在校住宿，周末回家；第二种是7天寄宿项目，学生按照学校每学年设置的“回家日历”放假，大约每月回家一次。宿舍设施齐全，配备24小时安保、护士和生活老师。
    dining: 该校餐厅整洁干净，只有中式餐，没有西式餐。每天菜品都是荤素搭配营养均衡，还会供应热汤、水果等。
    activities: 该校拓展课程比较丰富多彩，已经涵盖学术、艺术与运动共四十余种，如：大提琴、小提琴、钢琴、架子鼓、尤克里里、服装设计、国画、合唱团、街舞、戏剧、书法、摄影、辩论、主持与演讲、击剑、壁球、棒球、高尔夫、网球、科学、编程、3D
      打印、机器人、触式橄榄球、极限飞盘、模拟飞行、烘焙、桥牌等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
