rollup:
  campus_life:
    class_system: 往年该校高一年级 4-5 个班，每个班级 20 人左右。分班考科目为中文、英文数学、英文写作和 MAP 机考。
    management: 该校管理非常严格，严格遵守 IB 教育体系的所有要求。
    boarding_detail: 该校不提供住宿。
    dining: 该校食堂比较大，每天提供不同的菜品。每天固定有中餐，还会有意大利菜、墨西哥菜、韩国菜、日料等可以选择。午餐的话是 30 元每餐，不限量自选，味道也不错。食堂还有小卖部，供应一些食堂自制的面包、饮料、三明治等小零食，也给高年级学生提供咖啡。
    activities: 该校目前提供 100 余个俱乐部与课后活动，如：世青合唱团、机器人俱乐部、模拟联合国、中文话剧社等。同时，学校高中部还会举办其他活动来丰富学生的校园生活，如：运动会、“公司”运营日活动、音乐剧、英文辩论赛等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
