  campus_life:
    class_system: 新高一没有分班考，按照中考成绩进行分班。高一年级班型流动时主要看总测评成绩。
    schedule: 晚自习仅针对高三年级开设，通常在21:00左右结束，周六还会组织补课。高一年级是否开设晚自习则根据学校当年的安排决定。
    management: 该校在学习和生活管理方面都较为严格。学生携带的电子产品到校后需上交老师保管，校园内禁止使用；住宿舍一般22:30会收手机，由老师统一管理。同时学校对学生的发型和着装有一定要求，会进行不定期抽查。
