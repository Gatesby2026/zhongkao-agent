  campus_life:
    class_system: 有化大创新实验班和宏德班，高一新生有分班考，往年主要测试语文、数学和英语，一般情况下，军训结束后公布成绩。
    schedule: 高一、高二年级作业量适中，17:30 放学，暂时没有补课；除了期中、期末考试外还有周测。
    boarding_detail: 该校无住宿。
    dining: 高一、高二只提供早饭和午饭，高三还会提供晚饭。
    activities: 积极构建“美的教育、美好人生”的校本课程体系，目前已有行知课程、化附国学课程、南拳女扇课程、茶艺课程、女红课程等。同时，学校每年还会举办科技节、艺术节、体育节和阅读节，激发学生兴趣，培养学生个性，让学生在活动中健全人格，全面发展。此外，学校每天一节体育课，提高学生身体素质。另外，学校还会组织学生参加研学活动，如
      2023 年高一年级江南研学活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
