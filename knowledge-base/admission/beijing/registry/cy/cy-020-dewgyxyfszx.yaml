rollup:
  features:
    style: 1956年建校，外语特色（13门外语课、中法合作1+3项目）+AI STEAM 十二年一贯课程
    tags:
    - 外语特色
    - 科技创新
    source: 学校官网 ewfz.bjchyedu.cn / 百度百科 / 北京中考信息网
  campus_life:
    class_system: 有外语特色课程实验班、“1+3”试验培养项目; 高一新生入学没有分班考，学校也没有分层教学，也不可以流动
    schedule: 高一、高二学生没有开设晚自习; 除了正常的期中、期末考试外，还会组织月考或周测
    management: 管理严格，对于携带入校的电子产品，每天都会定时集中收发，对学生的发型、着装都有一定的要求
    boarding_detail: 无住宿
    dining: 标准化食堂可容纳三百余人同时就餐，菜品丰富且价格实惠，学生在窗口排队取餐，就餐环境整洁舒适
    activities: 重视学生的德育培养，大力发展社团活动，已有美术社、大运河采风社、模联社等; 每年会在校内举办春天诗会、猜灯谜、银杏文化节、校级篮球赛等活动
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
