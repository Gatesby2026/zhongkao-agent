    note: 网传喜报·非官方（与望京学校同址混编，数据或重叠）
    '2024': 680分以上6人，第一实验班均分661，统招生均分600+，一本率约95%，本科率100%，清北约7-8人
    source: gaokzx.com/gk/gaokao/135890.html
  campus_life:
    class_system: 2025级高一共18个班，其中2个直升班，1个美术班，1个文科实验班，2个第一实验班（3班、4班），2个第二实验班（5班、6班）。实验班大部分不流动，但少数优秀学生有机会申请进入实验班。分班考科目为语文、数学、英语、物理/历史（自选）。
    schedule: 据在校学生反馈，高一上学期作业量较多，但进入高一下学期选科后，作业量逐渐适中，基本可在一小时内完成。学校考试频率较高，有周考、月考、期中考试和期末考试。
    management: 该校管理比较宽松，无论是在学习上，还是在生活上，该校一直都在培养学生的自主管理意识，让学生学会如何对自己负责。走读生每天需要上交手机，学校统一管理，放学后再发放。
    boarding_detail: 该校宿舍条件优越，房间一般为3人间，部分为5人间。宿舍内配备独立卫生间、洗漱区和浴室，设施齐全。宿舍楼与教学楼相连，方便学生日常生活与学习。
    dining: 该校设有自办食堂，为学生提供早餐、午餐，住宿生还可享用晚餐，整体伙食质量较好。学校规定，午餐须在食堂内用餐，食堂可以为带饭学生提供微波炉加热服务。此外，学校实行错峰就餐制度，不同年级的学生分时段用餐。
    activities: 该校致力于培养学生兴趣与综合素质，开设了丰富的特色教育和社团活动，目前已有美术社团、排球班、围棋队、机器人创客社团、模拟飞行社团等。此外，还有由高中生自主创建、运营的社团，如演讲联盟和“ACE”街舞团。学校还定期举办体育节、艺术节、拔河比赛嘉年华、校园歌手大赛、秋季运动会及外出研学活动。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
