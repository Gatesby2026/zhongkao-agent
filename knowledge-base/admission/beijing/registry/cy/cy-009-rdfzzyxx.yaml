    '2026': 裸分清北6人、650分以上占25%、600分以上占60%、一本近100%
  campus_life:
    class_system: 2025级高一共10个班，每班35-40人。往年1班和2班是普通班，3班、4班和5班是第二实验班，6班和7班是第一实验班，9班和10班是直升班。从2021年开始取消分班考试，本校学生可以通过本校直升与签约方式进入实验班，其他学生按照中考成绩排名进入实验班。
    schedule: 为住宿生安排晚自习，非住宿生也可申请参加，晚自习通常于21:30结束。高一上学期作业量适中，每天基本可在一小时内完成。学校除正常的期中、期末考试外，偶尔会安排月考。
    management: 管理相对严格，除了传统的班主任负责制外，还建立了导师制，每周都有固定的时间供导师与学生进行交流。对于手机，学校规定每天上交，走读生放学后归还，住宿生则是放假时归还。
    boarding_detail: 宿舍为上下铺，6人间，宿舍内配有限学习桌椅、独立卫浴。
    dining: 午餐时不允许学生出校门，必须在校吃午餐；食堂方面提供早中晚三餐，饭菜质量佳口碑好，早餐丰富，还有地方小吃，实行校园卡一卡通充值刷卡，有十几个打饭窗口。
    activities: 已开设健美操队、篮球队、民乐团、科技俱乐部、模拟联合国、辩论社等60个学生团体，涵盖文化、艺术、科技、体育、公益、社会等多个领域。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
