rollup:
  features:
    style: 2012年与东北师大附中合作的全寄宿制完中，"五自"教育、小班化、严格管理，篮球传统校
    tags:
    - 寄宿制
    - 综合均衡
    source: 百度百科 / 北京中考信息网校情介绍
  campus_life:
    class_system: 有2种实验班，一种是直升班的实验班，另一种是入学后另分的实验班；分班考科目为数学和英语；高一上学期固定班型，高一下学期选科后开始走班
    schedule: 每周周日的晚自习会安排做试卷；无论是周测、月考还是期中、期末考试，都会公布成绩和排名；对于每个年级都开设3节晚自习，晚上21:30结束
    management: 实行全寄宿制管理，严格管理，只有少部分学生可以申请走读；住宿生周一需将手机交由老师保管，周五可取回
    boarding_detail: 宿舍雅洁实用，一般为8人间，配备公用卫生间和淋浴间；每晚22:00熄灯，中午有40分钟午休时间；高一入学后，学生可申请住宿或走读，学校审核后根据情况安排
    dining: 食堂提供早餐、午餐和晚餐，价格适中，同时还开设清真档口，由家长提前一周线上预定；据学生反馈食堂的伙食很好
    activities: 大力发展学校特色体育项目－校园足球，还开设击剑、轮滑、跆拳道、啦啦操等校本课程；每年举办丰富多彩的社团活动和艺术节展演；组织高一学生前往怀柔区黄花城水长城开展生态文明教育徒步实践活动，赴上海、南京进行为期5天的研学活动，以及积极参与社区志愿服务等
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
