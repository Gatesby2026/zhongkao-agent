  campus_life:
    class_system: 该校实行小班制教学，没有分班考试，但是理化生分层考试。
    schedule: 学校可以提供学生上晚自习的条件。
    management: 该校提倡互助合作之风，以理解为契机，沟通为桥梁，团结每一位师生。同时，该校对学生的仪容仪表要求严格。
    boarding_detail: 高中可以住宿，住宿条件为男生6人间，女生四人间，可以申请。
    dining: 该校没有食堂，学校是教委合格供应商名录中的供应商招标供应，桶餐到班。
    activities: 该校不仅会组织丰富多彩的国内外实践研学活动，还会组织一系列的课外活动来丰富学生的校园生活。如：2024年高中部组织辩论社举办首届“博雅杯”辩论赛、冬季长跑比赛、高中篮球赛、舞彩浅山徒步登山实践活动等。
    source: 2026朝阳高中指南白皮书(T3·机构汇编)
