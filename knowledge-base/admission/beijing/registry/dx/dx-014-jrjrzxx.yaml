    boarding_detail:
      value: 设独立宿舍楼,每层配公共洗衣房、浴室;宿舍为四人位上下床、每人一组整理柜;家具为超E0级环保材料、钢木结构
      source: https://jingkids.com/scg-bj/beijing-financial-street-runze-school/ ; https://baike.baidu.com/item/北京金融街润泽学校/23731690（待核）
