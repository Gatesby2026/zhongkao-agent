rollup:
  features:
    style: 大兴区唯一市级重点中学、北京市首批示范性普通高中（2002）。办学目标『管理高效、教育优质、特色鲜明』，育人目标『知行合一、阳光大气』，获评北京市高中学校特色建设项目学校、北京市德育先进学校。建有可承办比赛的体育馆、藏书十余万册图书馆及艺术楼，自
      2004 年起与韩国、冰岛、荷兰等校开展国际交流。
