    class_system: 民间整理·待核：实行选课走班、无传统固定行政班；设六大学院、九大书院（格物/致知/诚意/正心/明德/至善/新民/熙敬/弘毅），每书院高一高二各约100人，下设小班约35-40人。
    management: 民间整理·待核：每位高一生配书院导师（高中部教师担任），关注身心健康与目标管理、家校沟通；校园内可用手机，但进教学楼不允许、统一保管。
    boarding_detail: 民间整理·待核：宿舍6人间、独立浴室，床位有限需按当年条件申请；住宿费约444元/人/学期。
    activities: 民间整理·待核：需完成劳动学分、社区服务、研究性学习与实践课程，可参与/组建兴趣社团。
    voices: 民间整理·待核：评价两极——管理较『放养』，自制力强的学生更出色、自制力弱的易松懈；适应『没人管』后上大学衔接较快（知乎/澎湃）。
