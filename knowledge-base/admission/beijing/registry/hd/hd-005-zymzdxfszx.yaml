  campus_life:
    class_system: 民间整理·待核：按选科情况进行分班。
    management: 民间整理·待核：相对宽松，封闭式寄宿制管理，住校生周一至周五在校，每晚3节晚自习，教师陪伴式教育；师资要求硕士学位。
    boarding_detail: 民间整理·待核：高二高三住校，男生部分住食堂上方（独立卫浴）或民大留学生公寓（两宿舍共用独卫），女生宿舍每层多个洗漱间厕所、洗澡需出楼。
    dining: 民间整理·待核：早餐较丰富，午餐以盖饭/面/米线/汤为主，晚餐种类略少；海淀校区食堂地下两层、品类丰富。
    activities: 民间整理·待核：社团整体不算活跃，较活跃的有乐队、戏剧社、动漫社、学生会（部分社团一年仅招新与改选）。
    voices: 民间整理·待核：老师讲课各有风格、基本都用PPT；学校相对宽松（知乎/官网）。
    source: 民大附中官网概况 https://mdfz.muc.edu.cn/xxjj/fzgk.htm ; 知乎(就读体验) https://www.zhihu.com/question/28151262 ; 知乎(好不好) https://www.zhihu.com/question/382438528/answer/1494547743
