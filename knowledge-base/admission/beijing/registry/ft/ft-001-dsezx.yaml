  gaokao:
    note: 「民间·非官方」
    detail: 「公认丰台区高考第一梯队龙头校；钱学森航天实验班为全校录取分最高班型（民间口径 2024 年约 646 分入学线，丰台最高）。具体一本率/北清数未见官方权威发布，不列具体数字。」
    source: 「北京小升初信息网 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025061911170.html ；北京中考信息网 https://www.zhongkaobj.cn/zhongkao/zhongxue/202411124183.html」
  campus_life:
    school_code: '106001'
    class_system:
      value: 特殊班含 2 个贯通班、1 个钱学森航天实验班（钱班）、1 个博雅科创、1 个博雅人文、2 个普通实验班、1 个综合班；钱学森航天实验班招 30 人，小班化授课。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html（民间整理·待核）
    schedule:
      value: 高一晚自习 18:30-21:30，自愿申请参加。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html（民间整理·待核）
    management:
      value: 管理严格、学习氛围浓郁；严禁携带手机，需要时须家长书面申请，校园内不允许使用；作业量不多，基本在晚自习前完成。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html（民间整理·待核）
    boarding_detail:
      value: 5 层宿舍楼，可容纳约 500 人；六人间、上下铺，配空调、书桌、置物架和独立卫浴；公共水房、24 小时热水、公共浴室。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html（民间整理·待核）
    dining:
      value: 供应早餐和午餐，智慧食堂云点餐系统；餐厅可容纳约 1000 人，分批次分年级错峰就餐。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html（民间整理·待核）
    activities:
      value: 举办合唱节、艺术节、科技节等；社团累计达 218 个，参与率连续三年达 100%。钱学森航天实验班与钱学森青少年航天科学院合作，34 位院士/航天专家导师团，实行成长/学业/学术三导师制，假期安排野外考察、科技实践与国际交流。
      source: 北京高考在线 gaokzx.com/gk/zhongkao/150155.html + 校长网 xiaozhang.com.cn/school/bjserz（民间整理·待核）
