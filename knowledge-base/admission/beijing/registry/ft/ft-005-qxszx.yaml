rollup:
  features:
    style: 「全国唯一以「钱学森」冠名的完全中学，位于东高地航天城。以钱学森大成智慧思想设计课程，科技航天特色鲜明（3E航天俱乐部、院士1+X领航室、前沿科创课程），人文素养并重。」
    tags:
    - 科技创新
    - 理科见长
    - 课程改革
    source: 「丰台时报《北京钱学森中学打造航天教育」钱中样本「》 https://www.bjft.gov.cn/fengtaishibao/html/2026-04/24/content_9502_19481949.htm ；钱学森教育集团官网
      http://www.bjqxs.com.cn/lists/8.html ；北京小升初信息网 https://www.xscxx.com/xiaoshengchu/ftqxsc/2025061911170.html」
  campus_life:
    school_code: '206001'
    class_system:
      value: 高一约 6 个班，分火箭班、实验班、普通班；本校区设 1 个火箭班、2 个实验班；8 月分班考试按综合成绩定是否进实验班。
      source: 北京中考在线 zgkao.com/zhiyuan/74206.html（民间整理·待核）
    schedule:
      value: 宿舍 6:30 起床，要求 7:20 前到校；高一高二晚自习至 22:20，高三至 22:50。
      source: 知乎 zhihu.com/question/333254103（民间整理·待核）
    boarding_detail:
      value: 宿舍四人间；女生有独立卫生间，男生无；填志愿时可报住宿，也可入校后向学校申请（02 专业入学后可申请）。
      source: 知乎 zhihu.com/question/333254103 + 北京中考在线 zgkao.com/zhiyuan/74206.html（民间整理·待核）
    dining:
      value: 学生反馈食堂一般、有时不太好吃；可外出改善伙食（官方不允许）。
      source: 知乎 zhihu.com/question/333254103（民间整理·待核，主观评价）
    activities:
      value: 社团包括合唱、羽毛球、啦啦操、书法、舞蹈等。
      source: 知乎 zhihu.com/question/333254103（民间整理·待核）
    voices:
      value: 有毕业生评价学校「外强中干」，成绩部分由本部直升学生拉高；除规定活动外课外活动机会偏少。2024 高考年级平均 590.66，600 分以上占 42.86%，本科率 100%（成绩数据待官方核）。
      source: 知乎 zhihu.com/question/333254103 + zhuanlan.zhihu.com/p/539117664（民间整理·待核，含主观批评）
