  features:
    style: '北京十一学校在丰台区合作开办的公立分校(完全中学), 隶属丰台区教委, 与十一学校总部通过集体教研培训、共同课程研发「同频共振」。延续十一学校「创造适合每一位学生发展的教育」与走班/不分班传统: 六大「学习社区」(语言文学与表达/道德人文与社会/数学/科学技术与工程/体育健康与生活技能/综合实践),
