category: 北京市贯通培养项目（全市招生，2025）
scope: 全市，不分区；本市正式户籍考生可报
data_warning: 数据取自北京市教委《2025年北京市高端技术技能人才贯通培养项目招生计划表》官方Word附件(T1)，27项/8所承办院校/计划合计1035人(逐项核验一致)。贯通=7年→本科，最低报考线统一380分，仅限本市正式户籍，提前招生批次录取。具体专业代码/对接本科以官方简章为准；2026计划发布后须刷新。
