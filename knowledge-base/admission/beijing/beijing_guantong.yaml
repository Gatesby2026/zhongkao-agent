type_meta:
  中本贯通:
    entry: 初中毕业起点
    years: 7
    stage: 中职段 + 本科段(常见 3+4 或 2+3+2)
    transfer: 中职段结束需通过转段考核(学业水平+专业测试)合格,方可升入合作本科
    tuition: 中职段公办免学费;本科段按普通本科标准收费
  高本贯通:
    entry: 初中毕业起点
    years: 7
    stage: 基础段+高职段+本科段(常见 2+3+2)
    transfer: 各阶段结束需通过转段考核合格方可升段
    tuition: 中职/高职段公办免学费;本科段按普通本科标准收费
policy_note: 京籍应届专属 · 提前招生批 · 中考总分≥380(2025口径) · 录取即不再参加后续批次 · 2026起并入统一招生批次(以当年简章为准)
