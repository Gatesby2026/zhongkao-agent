model_rules:
  - "公办普通班未出现在征集表，只能证明官方名单中没有该类缺额，不能反推出逐校最低分或实际录取人数。"
  - "民办学校预测应增加 underfill_rate；预计有效供给不得机械等于招生计划。"
  - "进入征集仍有名额的学校，其常规录取尾部位次可能不存在稳定截点，不得用计划累计位次伪造最低位次。"
  - "找到征集录取结果或学校实际报到数以前，不得把 remaining 当作最终未录人数。"
  - "民办 underfill_rate 必须逐校、逐专业估计；2025校际差异极大，不得套用全区统一折扣。"
