entity: 2026朝阳新增统一招生主体代理证据
year: 2026
district: 朝阳区
note: >
  三校均由北京教育考试院官方计划确认参加2026统一招生，但“新增统一招生主体”不等于
  “新建学校”。预测时必须利用既有办学、高中培养和集团管理历史；首届统招仍无历史录取位次，
  因而只支持宽区间代理，不支持伪造精确线。
