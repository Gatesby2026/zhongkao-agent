collection_exhaustion_log:
  日期: '2026-06-19'
  '5825': ✅对(26公办统招投朝阳;+校额1133+提前批~1000≈公办录取7510/8229自洽)
  2024校额: OCR得朝阳块半段589/35行,量级≈2025的1133(约1100);精确需逐图分段精解
  2023_2022统招: ❌不可达——遍历bjeea计划查询全分页(list_286_2=全2024,_3=2022/0408尾页),2023/2022普高统招已从官网下架;archive.org宕机(503);百度/必应反爬;ID
    brute-force失败
  2026逐校: ❌不存在——官方7月发布
  提前批逐校×年实际录取: ❌不存在——官方从不按区×校×年公开
  已穷尽方法: bjeea直连/翻页遍历/图OCR(2024统招51图已成/校额14图半成) + archive.org + 百度/必应 + 本地宝/小升初网/公众号
    + 天眼查 + DeepSeek/Qwen(数字与官方矛盾弃用)
  结论: 2022-2026五年逐校全齐+提前批全齐 在当前公开数据下不可达;缺口=数据不存在(2026/提前批)或已下架不可达(2023/2022),非努力不足。已采:2024+2025逐校统招(官方)、2025校额12校(官方)、2024校额量级、头部直升、2022-2026规模总量。
