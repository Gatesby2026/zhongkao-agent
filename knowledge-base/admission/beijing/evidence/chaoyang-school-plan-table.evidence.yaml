entity: 朝阳区高中计划录取分项表
year: 2025
note: 按校:统招(投朝阳·官方计划册按代码精确)+校额到校(官方xeddx·仅12优质校为给出方)+提前批直升(社交·仅5头部校)。统招齐全;校额/直升有缺口(见gaps)。2026新校列待7月计划。只增不删。
source:
  统招: 2025_tongzhao_plan.json(bjeea计划册OCR,按school_code归朝阳本区·朝阳列求和)
  校额: chaoyang_xeddx.yaml(bjeea校额到校表,69初中×12优质高中列汇总)
  直升: xschu 2026朝阳0.5+3(人朝177/清华朝阳175/陈经纶160/朝外80/和平街66)
gaps:
- 校额仅12优质校有(其余优质公办如北京中学/望京/团结湖/二外/三里屯/化工/北中科技/中传附/睿德/广华/首师大朝阳/二中朝阳的校额给出方数据缺,需全量校额表)
- 提前批仅5校直升;1+3(八十睿德/清华广华/北中科技/二中朝阳等区级校)+特长+登记入学 per校缺
- 2026各校统招/校额计划7月官方发布后补
