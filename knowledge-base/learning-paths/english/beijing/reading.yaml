# ============================================================
# 学习路径：阅读理解（ABCD四篇，13题26分）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：笔试中分值最大的模块（26/60分），占比超过40%

module: 阅读理解
subject: 英语
region: 北京

# ================================================================
#  L0 -> L1：读懂文章 + A篇满分 + B篇入门
# ================================================================
L0_to_L1:
  target: A篇信息查找题全对，B篇细节题能做对一半，13题正确率达到45%+
  estimated_hours: 22-28
  prerequisite: 基础语法L0以上 + 词汇量600以上

  steps:
    - order: 1
      topic: 词汇扩充——阅读高频词1000
      goal: 掌握阅读理解中最常出现的1000个词汇
      estimated_hours: 10
      resources:
        - type: 教材
          name: 人教版Go for it七-九年级课本词汇表
          how_to_use: |
            背诵策略：
            每天背30个新词 + 复习前一天的30个
            分类背诵（比按字母顺序高效）：
            - 第1周：日常生活词汇（family/school/food/weather）
            - 第2周：情感品质词汇（happy/sad/kind/brave）
            - 第3周：动作行为词汇（decide/discover/improve）
            - 第4周：说明文常用词（develop/increase/produce/system）

            背诵方法：
            1. 看英文说中文（基础）
            2. 看中文说英文（进阶）
            3. 在句子中理解词义（最有效）
        - type: 练习
          name: 五三英语·核心词汇1600
          how_to_use: 配合词汇练习，每天做一页
      pass_criteria:
        - 阅读文章中的生词率低于10%
        - 能读懂A篇应用文的全部内容
      common_pitfalls:
        - "不要死背单词表，要在句子和文章中记忆"
        - "背完要及时复习，遗忘曲线很残酷"

    - order: 2
      topic: A篇应用文阅读——信息查找技巧
      goal: 掌握应用文的阅读策略，A篇3题全对
      estimated_hours: 4
      resources:
        - type: 练习
          name: 五三英语·应用文阅读专项
          how_to_use: |
            A篇特点：广告/通知/表格/海报/课程表
            阅读策略：先看题目再看文章（不需要通读全文！）

            做题步骤：
            1. 读题目，划出关键词（when/where/how much/who）
            2. 带着关键词去文章中定位
            3. 找到对应信息，和选项逐一比对
            4. 注意：选项可能是原文的同义替换

            常见陷阱：
            - 数字/日期/时间的干扰项（文中出现多个数字）
            - not included / except（排除类题目）
            - 需要简单计算的题（如两人共花多少钱）

            每周做3篇A篇，限时4分钟
      pass_criteria:
        - A篇3题正确率≥90%
        - 做题时间不超过4分钟
      common_pitfalls:
        - "不要通读全文，直接定位关键信息"
        - "注意except/not类题目要选不符合的"

    - order: 3
      topic: B篇记叙文阅读——抓主线
      goal: 能读懂B篇故事，做对细节题
      estimated_hours: 5
      resources:
        - type: 教材
          name: 人教版Go for it课文阅读材料
          how_to_use: |
            B篇特点：个人经历/成长故事/感人事迹
            阅读策略：通读全文抓主线

            读文章时要找到：
            WHO：主人公是谁？
            WHAT：发生了什么事？
            WHY：为什么会这样？
            HOW：结果怎样？感受如何？

            做题类型：
            1. 细节题（What/When/Where）→ 回文定位
            2. 推断题（What can we learn...）→ 从行为推品质
            3. 主旨题（What's the best title?）→ 全文中心

            先从细节题练起，每周做3篇B篇
        - type: 练习
          name: 五三英语·记叙文阅读基础
          how_to_use: 做★和★★难度的题
      pass_criteria:
        - B篇4题正确率≥50%（细节题基本能做对）
        - 读完文章能说出WHO/WHAT/WHY/HOW
      common_pitfalls:
        - "细节题要回文章找对应的句子，不要凭记忆选"
        - "推断题的答案不在原文中直接出现，需要推理"

    - order: 4
      topic: 做题策略和时间分配
      goal: 建立合理的做题顺序和时间分配习惯
      estimated_hours: 3
      resources:
        - type: 练习
          name: 北京中考真题·阅读理解完整套题
          how_to_use: |
            时间分配建议（总共25分钟以内）：
            A篇：3-4分钟（最简单，快速搞定）
            B篇：6-7分钟（通读+做题）
            C篇：7-8分钟（通读+做题，词汇较难）
            D篇：5-6分钟（如果D篇太难可以先跳过做其他题）

            做题顺序：A→B→C→D（从易到难）
            或者：A→B→D→C（如果C篇话题陌生可以先做D篇）

            练习：做2套完整的阅读理解，练习时间分配
      pass_criteria:
        - 总时间控制在25分钟以内
        - 不在某一篇上卡太久（超过10分钟就跳过）

# ================================================================
#  L1 -> L2：BC篇提高 + D篇入门
# ================================================================
L1_to_L2:
  target: ABC篇正确率≥80%，D篇能做对1-2题，13题正确率达到65%+
  estimated_hours: 15-20
  prerequisite: L1

  steps:
    - order: 1
      topic: B篇推断题和主旨题专项
      goal: 从做对细节题提升到做对推断题和主旨题
      estimated_hours: 4
      resources:
        - type: 练习
          name: 万唯英语·记叙文阅读拔高
          how_to_use: |
            推断题解题模板：
            题型标志词：infer / learn / conclude / suggest / probably
            解题方法：
            1. 定位文章中相关的段落
            2. 不选原文原话（那是细节题的答案）
            3. 选合理推断出来的（如行为→品质、原因→结果）

            主旨题解题模板：
            题型标志词：mainly about / best title / mainly tell us
            解题方法：
            1. 读首段和末段（主旨通常在这两段）
            2. 概括全文中心（不是某个段落的中心）
            3. 排除太宽和太窄的选项

            做15题推断题 + 10题主旨题
      pass_criteria:
        - 推断题正确率≥70%
        - 主旨题正确率≥70%

    - order: 2
      topic: C篇说明文/议论文阅读策略
      goal: 掌握说明文的阅读方法，提高C篇正确率
      estimated_hours: 4
      resources:
        - type: 练习
          name: 五三英语·说明文阅读专题
          how_to_use: |
            C篇特点：科普/社会话题/新技术
            难点：词汇量大，长句多，话题可能陌生

            阅读策略：
            1. 每段读第一句和最后一句（主旨句定位法）
            2. 遇到生词先跳过，不要卡在一个词上
            3. 画出每段的关键信息（时间/数字/对比）

            题型应对：
            细节题→定位到具体段落找答案
            推断题→从段落主旨句推断
            词义猜测题→看上下文线索（同义词/反义词/举例）
            标题概括题→概括全文不是某段

            每周做3篇C篇说明文
      pass_criteria:
        - C篇3题正确率≥65%
        - 能定位每段主旨句

    - order: 3
      topic: D篇还原句子入门
      goal: 学会利用逻辑连接词和代词指代判断句子位置
      estimated_hours: 5
      resources:
        - type: 练习
          name: 万唯英语·还原句子专项
          how_to_use: |
            D篇是区分度最高的题型，需要专项训练。

            三大解题线索：
            线索1：逻辑连接词
            - 空格后有Besides/Moreover→前面应该有同方向的内容
            - 空格后有However/But→前面应该有相反方向的内容
            - 空格后有For example→前面应该有观点/总结

            线索2：代词指代
            - 空格后有They/It/This/That→前面应提到对应的名词
            - 例：___. They can help us save time.
              →选项中应该提到复数名词（如computers/robots）

            线索3：语义衔接
            - 空格前后的话题应该一致
            - 同一段落围绕同一个主题

            做题步骤：
            1. 先读所有选项，理解每个选项的含义
            2. 再读文章，到空格处看前后文
            3. 用三大线索匹配选项
            4. 先做最确定的，再做不确定的

            每周做3篇D篇，每篇做完后标注用了哪种线索
      pass_criteria:
        - D篇3题正确率≥50%（至少对1-2题）
        - 能说出每题的判断依据
      common_pitfalls:
        - "不要只看空格前一句就选，要看前后2-3句"
        - "先做最确定的空格，用排除法解决不确定的"

    - order: 4
      topic: 同义替换识别训练
      goal: 提高识别选项中同义替换的能力
      estimated_hours: 3
      resources:
        - type: 练习
          name: 阅读理解同义替换50组
          how_to_use: |
            阅读理解的正确选项通常是原文的同义替换：

            高频同义替换：
            happy → glad / pleased / delighted
            important → significant / necessary / essential
            many → a large number of / lots of / plenty of
            because → since / as / due to / owing to
            help → assist / support / give sb a hand
            think → believe / consider / hold the view that
            like → enjoy / be fond of / be interested in
            difficult → hard / challenging / tough

            训练方法：
            做阅读题时，对照原文和正确选项，找出同义替换
            每篇标注2-3处同义替换，积累50组
      pass_criteria:
        - 能在选项中识别常见的同义替换
        - 不被"原文出现但答案错误"的选项干扰

# ================================================================
#  L2 -> L3：D篇攻坚 + 限时高准确率
# ================================================================
L2_to_L3:
  target: 13题至少对11题（22分+），D篇至少对2题
  estimated_hours: 12-15
  prerequisite: L2
  notes: 阅读是分值最大的模块，提分空间也最大

  steps:
    - order: 1
      topic: D篇还原句子高级技巧
      goal: D篇3题至少对2题
      estimated_hours: 5
      resources:
        - type: 真题
          name: 北京中考+各区模考·D篇还原句子精选20篇
          how_to_use: |
            高级技巧：

            技巧1：代词指代链追踪
            找出文章中的代词（they/it/this/these/such）
            向前追踪找到指代对象
            如果空格后第一个词是代词，选项必须包含对应名词

            技巧2：段落主题一致性
            每个段落有一个主题
            插入的句子必须和本段主题一致
            如果选项的话题和本段不符→排除

            技巧3：排除法
            先做最确定的2个空格
            剩余选项通过排除法确定

            技巧4：验证法
            选完后通读整段，检查逻辑是否连贯

            每周做4篇D篇，每篇限时5分钟
      pass_criteria:
        - D篇正确率≥65%（3题对2题以上）

    - order: 2
      topic: 长难句理解训练
      goal: 能快速理解C篇中的长难句
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯英语·长难句分析
          how_to_use: |
            长难句拆解方法：
            1. 找主干：主语+谓语+宾语
            2. 去修饰：把定语从句/状语从句/介词短语去掉
            3. 理关系：分析各部分之间的逻辑关系

            例句：
            "The study, which was conducted by researchers at Beijing
            University, shows that students who read for more than
            30 minutes a day perform better in exams."

            主干：The study shows that students perform better.
            修饰1：which was conducted by researchers（修饰study）
            修饰2：who read for more than 30 minutes a day（修饰students）

            每天分析3个长难句，持续2周
      pass_criteria:
        - 能在10秒内找出长难句的主干

    - order: 3
      topic: 限时全真模拟
      goal: 在考试时间内高准确率完成阅读
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京2024-2025各区一模二模·阅读理解完整套题
          how_to_use: |
            模拟训练计划：
            严格限时22分钟完成ABCD四篇13题
            时间分配：A(3min) + B(6min) + C(7min) + D(6min)

            做完后严格评分：
            - 22分以上→L3水平
            - 18-22分→L2+水平，继续练D篇
            - 18分以下→回去补BC篇

            每周做2套全真模拟，连续练6周
      pass_criteria:
        - 连续3套22分以上
        - 做题时间稳定在22分钟以内

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 阅读能力需要长期积累，词汇量和阅读量是根基
    by_level:
      L0: |
        核心任务：扩词汇+练A篇。每天35分钟。
        每天背30个词 + 做1篇A篇应用文阅读。
        每周1篇B篇记叙文（不限时，看懂为主）。
      L1: |
        每天25分钟阅读训练。
        每周：2篇BC篇 + 1篇D篇。
        重点：推断题和主旨题解题方法。
      L2: |
        每天20分钟限时训练。
        每周：1套完整阅读 + 2篇D篇专项。
        重点：D篇攻坚 + 长难句理解。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 以真题为核心，分篇型专项突破
    by_level:
      L0: |
        A篇限时训练（每周3篇），必须拿满6分。
        B篇细节题专项（每周2篇），目标对3题以上。
        词汇继续扩充，每天背20个。
      L1: |
        真题+模考精练。每周做2套完整阅读。
        D篇专项每周2篇。
        同义替换笔记持续积累。
      L2: |
        限时全真模拟。每周2套。
        D篇高级技巧训练。每周3篇。
        错题分析，聚焦失分最多的题型。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 真题限时，查漏补缺
    by_level:
      L0: |
        A篇必须满分（6分保底）。每周2篇限时练。
        B篇做前2题细节题（4分能拿到）。
        D篇如果来不及就先放，把时间给其他题。
        目标：13题对5-6题。
      L1: |
        每周1套完整阅读限时训练。
        重点复盘错题，不做新题型。
        目标：13题对8-9题。
      L2: |
        每周1套限时模拟保持手感。
        D篇考前刷最近2年的真题和模考题。
        目标：13题对11题以上。
