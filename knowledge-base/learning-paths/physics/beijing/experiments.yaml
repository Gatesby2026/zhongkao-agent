# ============================================================
# 学习路径：实验探究专项
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 说明：2026北京中考物理80分（2025及以前为70分），实验探究5题共28分，是全卷最高分值题型

module: 实验探究
subject: 物理
region: 北京

# ================================================================
#  L0 → L1：认识器材 + 学会控制变量法
# ================================================================
L0_to_L1:
  target: 认识基本实验器材，理解控制变量法，能读仪器刻度
  estimated_hours: 10-12
  prerequisite: 无

  steps:
    - order: 1
      topic: 基本实验器材认识与使用
      goal: 认识8种核心仪器，掌握使用方法和读数
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版物理教材各章实验部分
          how_to_use: |
            第1天：长度和质量测量
            - 刻度尺：看量程/分度值，要估读到分度值下一位
            - 天平：水平放置→游码归零→调平衡→左物右码→读数
            - 做5题天平读数

            第2天：力学测量器材
            - 弹簧测力计：校零→看量程/分度值→沿力的方向拉→读数
            - 量筒：看量程/分度值→视线与凹液面最低处相平
            - 做5题弹簧测力计和量筒读数

            第3天：电学测量器材
            - 电流表：串联接入，选量程（0-0.6A或0-3A），分度值不同
            - 电压表：并联接入，选量程（0-3V或0-15V），分度值不同
            - 做5题电流表电压表读数

            第4天：其他器材
            - 温度计：液柱上升/下降方向注意，零上零下读数
            - 秒表：大盘分钟+小盘秒
            - 滑动变阻器：结构和接法
            - 做5题综合读数
        - type: 练习
          name: 五三物理·实验基础篇
          how_to_use: 做仪器读数专项（约20题）
      pass_criteria:
        - 8种仪器的使用方法和注意事项能说出
        - 仪器读数正确率≥85%（含估读）
      common_pitfalls:
        - "天平读数忘记加游码的质量"
        - "量筒俯视读数偏大、仰视读数偏小"
        - "电流表电压表量程选错导致分度值算错"

    - order: 2
      topic: 控制变量法
      goal: 理解控制变量法并能运用到实验设计中
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版物理教材（贯穿各章实验）
          how_to_use: |
            第1天：什么是控制变量法
            - 研究A对C的影响时，保持B不变
            - 例：研究压力大小对压强的影响→保持受力面积不变
            - 写出5个实验的控制变量方案

            第2天：实例训练
            - 探究电流与电压的关系：控制电阻不变
            - 探究电流与电阻的关系：控制电压不变
            - 探究浮力大小与排开液体体积的关系：控制液体密度不变
            - 探究滑动摩擦力与压力的关系：控制接触面粗糙程度不变
            各写出实验方案

            第3天：判断练习
            - 给出实验方案，判断是否正确使用了控制变量法
            - 找出方案中的错误
            - 做10题
      pass_criteria:
        - 给出实验目的能说出需要控制哪些变量
        - 判断实验方案是否正确使用控制变量法
      common_pitfalls:
        - "不清楚研究变量和控制变量的区别"
        - "控制变量不完整（如只控制了一个，遗漏另一个）"

    - order: 3
      topic: 数据记录与基本处理
      goal: 能设计实验数据表格，正确记录和处理数据
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯物理·实验数据处理
          how_to_use: |
            第1天：表格设计
            - 表头要有物理量名称和单位
            - 实验次数/组数要明确
            - 多次测量的目的：减小误差（取平均值）或找规律

            第2天：数据处理方法
            - 求平均值（注意有效数字）
            - 描点画图（坐标轴标注/单位/标题）
            - 从图象中得出结论（正比/反比/不变）

            第3天：练习
            - 给数据设计表格5题
            - 给表格分析数据5题
            - 给数据画图象5题
      pass_criteria:
        - 表格设计规范完整
        - 能从数据中得出正确结论

# ================================================================
#  L1 → L2：八大必考实验逐一过关
# ================================================================
L1_to_L2:
  target: 八大必考实验的原理/步骤/数据处理/结论全部掌握
  estimated_hours: 12-15
  prerequisite: L1

  steps:
    - order: 1
      topic: 力学实验组（测密度 + 探究杠杆 + 探究摩擦力 + 探究浮力）
      goal: 4个力学实验完整掌握
      estimated_hours: 6
      resources:
        - type: 教材
          name: 人教版物理教材力学实验章节
          how_to_use: |
            实验1：测量物质密度（2天）
            - 原理：ρ=m/V
            - 固体：先天平测m，再量筒测V（排水法）
            - 液体：先测(杯+液)的质量，倒入量筒测V，再测空杯质量
            - 特殊方法：只用天平+水测密度
            - 做3题

            实验2：探究杠杆平衡条件（1天）
            - 调节水平平衡→挂钩码→记录F₁L₁F₂L₂→验证F₁L₁=F₂L₂
            - 关键：为什么要水平位置平衡（方便读力臂）
            - 做3题

            实验3：探究影响滑动摩擦力的因素（1天）
            - 弹簧测力计拉物体匀速直线运动→读数=摩擦力
            - 控制变量：压力/接触面粗糙程度
            - 做3题

            实验4：探究浮力影响因素（1天）
            - 称重法测浮力：F浮=G-F示
            - 控制变量：液体密度/排开液体体积
            - 做3题
        - type: 练习
          name: 五三物理·力学实验专题
          how_to_use: 每个实验做5题
      pass_criteria:
        - 4个力学实验的原理和步骤能完整写出
        - 实验中关键操作的原因能解释
      common_pitfalls:
        - "测密度先测体积再测质量→物体沾水→质量偏大→密度偏大"
        - "探究摩擦力时不是匀速→测力计读数≠摩擦力"

    - order: 2
      topic: 电学实验组（探究欧姆定律 + 测电阻 + 测电功率）
      goal: 3个电学实验完整掌握
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版九年级物理实验章节
          how_to_use: |
            实验5：探究欧姆定律（1.5天）
            - 探究I与U的关系：R不变，调变阻器改变U
            - 探究I与R的关系：U不变，换R后调变阻器保持U不变
            - 关键：换电阻后为什么要调变阻器（保持被测电阻两端电压不变）

            实验6：用伏安法测电阻（1天）
            - 原理：R=U/I
            - 多次测量取平均值减小误差
            - 注意：灯泡电阻≠取平均（温度影响）

            实验7：测量小灯泡电功率（1.5天）
            - 调节变阻器使灯泡在额定电压下工作
            - P=UI
            - 不同电压下灯泡亮度不同→实际功率不同
            - 故障分析：灯不亮+V有示数+A无示数=灯泡断路
        - type: 练习
          name: 万唯物理·电学实验专题
          how_to_use: 每个实验做5题
      pass_criteria:
        - 3个电学实验的电路连接和操作步骤熟练
        - 实验故障分析准确

    - order: 3
      topic: 光学实验（探究凸透镜成像）
      goal: 凸透镜成像实验完整掌握
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版八年级上册·第五章实验
          how_to_use: |
            实验8：探究凸透镜成像规律
            - 实验前：蜡烛、凸透镜、光屏中心在同一高度
            - 不同物距下成像特点记录
            - 关键问题：
              ·像在光屏上找不到→可能u<f（虚像不能呈在光屏上）
              ·像偏上/偏下→三者中心不在同一高度
              ·像模糊→光屏位置不对，需前后调节
            做5题
      pass_criteria:
        - 实验操作和注意事项掌握
        - 常见问题的原因分析正确

    - order: 4
      topic: 实验故障分析专项
      goal: 各种实验故障现象的分析准确
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯物理·实验故障分析
          how_to_use: |
            电学故障：
            - 灯不亮+V有示数+A无示数 → 灯泡断路
            - 灯不亮+V无示数+A无示数 → 电路断路（不在灯泡处）
            - 灯不亮+V无示数+A有示数 → 灯泡短路

            力学故障：
            - 弹簧测力计读数偏大 → 没有匀速拉动
            - 天平不平衡 → 没有调平衡螺母

            做15题故障分析
      pass_criteria:
        - 故障分析正确率≥85%

# ================================================================
#  L2 → L3：实验评价与改进 + 综合探究攻坚
# ================================================================
L2_to_L3:
  target: 实验探究28分中拿到25分以上
  estimated_hours: 8-12
  prerequisite: L2
  notes: 重点攻第20题综合探究（8分），这是拉分最大的实验题

  steps:
    - order: 1
      topic: 误差分析专项
      goal: 能指出实验误差的具体来源和影响方向
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯物理·误差分析专题
          how_to_use: |
            分析模板：
            1. 指出误差来源（具体操作环节）
            2. 判断偏大还是偏小
            3. 解释推理过程

            常见误差分析：
            - 测密度：先测V再测m→沾水→m偏大→ρ偏大
            - 测电阻：电压表内阻分流→I偏大→R=U/I偏小
            - 测电功率：电压未调到额定值→P≠额定功率
            - 测摩擦力：未匀速→测力计读数≠摩擦力

            做15题
      pass_criteria:
        - 误差分析能指出具体原因和偏大偏小方向

    - order: 2
      topic: 实验改进方案训练
      goal: 能针对实验不足提出具体可操作的改进措施
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三物理·实验改进专题
          how_to_use: |
            改进方向：
            1. 减小误差（多次测量取平均/换更精密仪器）
            2. 提高可操作性（选择合适的器材规格）
            3. 提高安全性（如先断开开关再改接电路）
            4. 使现象更明显（如增大物体质量使形变更明显）

            答题模板："为了___（目的），应该___（具体操作）"
            做10题
      pass_criteria:
        - 改进方案具体可操作，不说空话

    - order: 3
      topic: 第20题综合探究攻坚
      goal: 综合探究题（8分）拿到6分以上
      estimated_hours: 5
      resources:
        - type: 真题
          name: 北京近5年中考第20题 + 海淀/西城一模二模第20题
          how_to_use: |
            第20题结构分析：
            - 第1问（2分）：基础操作或数据读取
            - 第2问（2分）：实验方案补充或数据处理
            - 第3问（2分）：得出结论或画图象
            - 第4问（2分）：实验评价/改进/误差分析

            训练策略：
            - 每题限时12分钟
            - 先做前3问确保拿6分
            - 第4问用答题模板
            - 做完对答案，标记失分点

            共做10题（5年真题+5年模拟）
      pass_criteria:
        - 第20题得分率≥75%（8分拿6分）

    - order: 4
      topic: 陌生实验情境应对
      goal: 面对没见过的实验也能用科学方法分析
      estimated_hours: 2
      resources:
        - type: 练习
          name: 海淀/西城一模二模创新实验题
          how_to_use: |
            应对策略：
            1. 读题找出"研究什么"和"怎么研究"
            2. 识别控制变量法的运用
            3. 从数据中找规律（正比/反比/不变）
            4. 用物理知识解释结论

            即使没见过的实验，方法论是通用的
            做5题
      pass_criteria:
        - 陌生实验题也能拿到60%以上的分数

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 实验28分是物理最大分值题型，必须系统训练
    by_level:
      L0: |
        先认识器材和控制变量法。每天30分钟，持续3-4周。
        配合力学和电学的学习同步推进实验。
      L1: |
        八大必考实验逐个过关。每周攻克1-2个实验。
        每天30分钟，持续6-8周。
      L2: |
        误差分析和改进方案专项训练。
        每周做1题第20题综合探究。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 实验题是最容易提分的部分（有套路可循）
    by_level:
      L0: |
        集中2周补仪器读数和控制变量法。
        做近3年真题第16题（基础测量），确保拿到4分。
      L1: |
        八大必考实验查漏补缺，做近5年真题实验部分。
        每周3小时。
      L2: |
        第20题综合探究限时训练。
        误差分析和改进方案答题模板背熟。
        每周2-3小时。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 实验题要拿到20分以上（28分中）
    by_level:
      L0: |
        背8种仪器的使用方法和读数规则。
        做近3年真题第16-17题（基础实验），确保拿到8分。
      L1: |
        近5年真题第16-19题全做。
        重点：第18题电学实验和第19题力学实验的步骤背熟。
        第20题前两问也要尝试（4分）。
      L2: |
        限时模拟：5道实验题限时30分钟。
        第20题限时12分钟，前3问必拿。
        错题复盘，关注答题表述是否规范。
