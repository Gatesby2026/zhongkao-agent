# ============================================================
# 学习路径：名著阅读（12部必读名著）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：约5分，分值不大但容易拿满分或全丢

module: 名著阅读
subject: 语文
region: 北京

# ================================================================
#  L0 → L1：快速补齐12部名著核心内容
# ================================================================
L0_to_L1:
  target: 12部名著的主要人物和经典情节基本了解
  estimated_hours: 15-20
  prerequisite: 无

  steps:
    - order: 1
      topic: 高频考查名著速读（第一批6部）
      goal: 掌握考查频率最高的6部名著的核心内容
      estimated_hours: 8
      resources:
        - type: 教材
          name: 万唯·名著阅读速记手册
          how_to_use: |
            按考查频率排序，优先攻克前6部：

            第1-2天：《骆驼祥子》（北京卷超高频）
            必记要点：
            - 作者：老舍
            - 主人公：祥子（外号骆驼祥子的来历）
            - 核心情节：买车三起三落
              第一次：攒钱买车→被十兵抢走
              第二次：攒钱准备买车→被孙侦探敲诈
              第三次：用虎妞的钱买车→虎妞难产死后卖车葬虎妞
            - 其他人物：虎妞/小福子/刘四爷/曹先生
            - 主题：旧社会对底层劳动人民的压迫

            第3-4天：《西游记》
            必记要点：
            - 作者：吴承恩
            - 师徒四人+白龙马的来历和性格
            - 经典情节：大闹天宫/三打白骨精/真假美猴王/女儿国/火焰山
            - 主题：团结协作/坚持不懈

            第5-6天：《水浒传》
            必记要点：
            - 作者：施耐庵
            - 高频人物（绰号+性格+经典故事）：
              鲁智深/武松/林冲/宋江/李逵/吴用
            - 经典情节：鲁提辖拳打镇关西/武松打虎/林冲风雪山神庙/智取生辰纲

            第7-8天：《朝花夕拾》
            必记要点：
            - 作者：鲁迅（回忆性散文集）
            - 重点篇目和人物态度：
              《阿长与山海经》→长妈妈（先抑后扬，感激怀念）
              《藤野先生》→藤野先生（敬仰感激）
              《从百草园到三味书屋》→童年乐趣
              《五猖会》→父亲（批判封建教育）
              衍太太→虚伪（批判）

            第9-10天：《钢铁是怎样炼成的》+《简·爱》
            每部整理核心人物+3个经典情节+主题

        - type: 练习
          name: 五三·名著阅读选择题（30题）
          how_to_use: 做完6部名著对应的选择题，查漏补缺
      pass_criteria:
        - 6部名著的主要人物和对应作品能准确匹配
        - 每部至少能说出2个经典情节
      common_pitfalls:
        - "人物和作品张冠李戴：把《水浒传》的人物说成《西游记》的"
        - "情节记混：把武松打虎和景阳冈的细节搞错"

    - order: 2
      topic: 补齐剩余6部名著
      goal: 12部名著全部有基本了解
      estimated_hours: 5
      resources:
        - type: 教材
          name: 万唯·名著阅读速记手册（续）
          how_to_use: |
            第二批6部（每部1天）：

            《海底两万里》：作者凡尔纳/科幻小说/尼摩船长/鹦鹉螺号
            《红星照耀中国》：作者埃德加·斯诺/纪实作品/采访毛泽东等领导人
            《昆虫记》：作者法布尔/科普/观察蝉/蜘蛛/萤火虫等昆虫
            《傅雷家书》：傅雷写给儿子傅聪的信/艺术修养/做人道理
            《艾青诗选》：核心意象太阳(光明希望)+土地(祖国苦难)/自由体诗
            《儒林外史》：作者吴敬梓/讽刺小说/范进中举/严监生/匡超人
      pass_criteria:
        - 12部名著都能说出作者和主要内容
        - 每部至少能说出1个核心知识点

    - order: 3
      topic: 名著阅读题型认知
      goal: 了解北京中考名著题的考查方式
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考名著阅读真题
          how_to_use: |
            北京卷名著题型分析：
            1. 选择题（2分）：考查情节/人物/作品对应的准确性
               策略：排除法，找出明显错误的选项
            2. 简答题（3分）：常考类型
               a. 概括情节+分析人物性格
               b. 结合具体内容谈阅读感受
               c. 比较两部名著中的人物/主题

            逐题研究，了解出题套路
      pass_criteria:
        - 知道名著题考什么、怎么答

# ================================================================
#  L1 → L2：情节细节和人物形象分析
# ================================================================
L1_to_L2:
  target: 名著阅读板块得分率80%以上（4分/5分）
  estimated_hours: 10-12
  prerequisite: L1

  steps:
    - order: 1
      topic: 高频名著精读经典章节
      goal: 重点名著的经典情节记忆准确、细节不出错
      estimated_hours: 4
      resources:
        - type: 原著
          name: 《骆驼祥子》《西游记》《水浒传》《朝花夕拾》精读章节
          how_to_use: |
            不需要通读全书，精读关键章节：

            《骆驼祥子》精读：
            - 第1章（祥子进城/买车梦想）
            - 第4章（骆驼祥子外号来历）
            - 第18章（虎妞之死）
            - 第24章（祥子堕落）
            读完写100字情节概括

            《西游记》精读：
            - 大闹天宫相关章节
            - 三打白骨精
            - 真假美猴王
            读完整理孙悟空性格变化

            《水浒传》精读：
            - 鲁提辖拳打镇关西
            - 林教头风雪山神庙
            - 武松打虎+血溅鸳鸯楼
            读完整理人物性格（鲁达→正义豪爽/林冲→忍让到反抗/武松→勇猛刚烈）

            《朝花夕拾》精读：
            - 《阿长与山海经》全文
            - 《藤野先生》全文
            - 《从百草园到三味书屋》全文
      pass_criteria:
        - 经典情节细节准确无误
        - 能用自己的话概括情节（50-100字）

    - order: 2
      topic: 人物形象分析专项
      goal: 能用"性格特点+情节支撑"的模式分析人物
      estimated_hours: 3
      resources:
        - type: 练习
          name: 名著人物形象分析练习（15题）
          how_to_use: |
            答题模板：
            "XX是一个___的人。从___情节中可以看出，
            他/她___（具体行为），体现了___的性格特点。"

            必练人物：
            1. 祥子的性格变化（勤劳→堕落）
            2. 孙悟空的成长（桀骜→忠诚）
            3. 简·爱的独立精神
            4. 保尔的坚强意志
            5. 鲁迅笔下的长妈妈（粗俗但善良）
            6. 林冲的忍让与反抗
            7. 范进中举前后的变化

            每个人物写一段200字分析
      pass_criteria:
        - 人物分析有观点有依据
        - 能举出2-3个具体情节支撑

    - order: 3
      topic: 名著简答题答题训练
      goal: 简答题能拿3分满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考+一模二模名著简答题（10题）
          how_to_use: |
            答题要求：
            1. 看清题目问什么（概括情节/分析性格/谈感受）
            2. 结合原著具体内容（不能空谈）
            3. 字数控制在80-120字
            4. 语言规范，不写口语

            每题先自己写，再对照满分答案修改
            重点看自己的答案比满分答案少了什么
      pass_criteria:
        - 简答题平均得分2.5分以上（满分3分）

# ================================================================
#  L2 → L3：深度理解和比较阅读
# ================================================================
L2_to_L3:
  target: 名著阅读板块满分（5分）
  estimated_hours: 5-8
  prerequisite: L2
  notes: 名著满分不难，关键是细节准确+分析有深度

  steps:
    - order: 1
      topic: 比较阅读专项
      goal: 能在不同名著间进行有深度的比较分析
      estimated_hours: 2
      resources:
        - type: 练习
          name: 名著比较阅读练习（5题）
          how_to_use: |
            常见比较角度：
            1. 人物命运对比：祥子(堕落) vs 保尔(坚强)→时代/个人因素
            2. 写作手法对比：《红星照耀中国》(纪实) vs 《骆驼祥子》(小说)
            3. 主题思想对比：《儒林外史》(讽刺科举) vs 《朝花夕拾》(批判封建教育)
            4. 同类人物对比：鲁智深 vs 李逵（都勇猛但鲁达粗中有细/李逵鲁莽）

            每题写200-300字的比较分析
      pass_criteria:
        - 比较分析有观点、有依据、有深度

    - order: 2
      topic: 作品的时代背景与主题深度理解
      goal: 能联系创作背景分析作品的深层含义
      estimated_hours: 2
      resources:
        - type: 练习
          name: 名著主题深度分析
          how_to_use: |
            深层理解示例：
            - 《骆驼祥子》不仅写祥子个人悲剧，更揭示旧社会制度对个人命运的碾压
            - 《西游记》不仅是神话故事，更寓含反抗精神和团队协作的哲理
            - 《儒林外史》讽刺的不是个别人，而是整个科举制度和社会风气
            - 《红星照耀中国》记录的不仅是事实，更传递了一种精神力量

            练习：为4部重点名著各写一段"深层主题分析"（100字）
      pass_criteria:
        - 能超越情节层面进行主题分析

    - order: 3
      topic: 名著阅读方法总结
      goal: 能就阅读方法发表有见解的看法
      estimated_hours: 2
      resources:
        - type: 练习
          name: 阅读方法类题目训练
          how_to_use: |
            北京卷可能考查的阅读方法：
            1. 精读vs跳读：什么内容需要精读？什么可以跳读？
            2. 批注法：如何写旁批？（感受/疑问/联想/赏析）
            3. 圈点勾画：如何标注重点？
            4. 不同体裁的阅读策略差异

            练习：以一部名著为例，写一段"我的阅读方法"（100-150字）
      pass_criteria:
        - 能结合具体名著谈阅读方法

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 最好的方式是真正去读原著
    by_level:
      L0: |
        每天30分钟阅读原著。按优先级：祥子→西游→水浒→朝花夕拾。
        读完每部写100字的"一句话概括+3个关键情节"。
        如果实在没时间读原著，用万唯速记手册替代。
      L1: |
        利用碎片时间（上学路上/睡前）补充阅读剩余名著。
        每周做5道名著选择题保持记忆。
        开始练习人物形象分析（每周1题）。
      L2: |
        每周做1套名著阅读题即可。
        有余力的同学精读1-2部自己没认真读过的名著。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 背记为主，做题为辅
    by_level:
      L0: |
        不再读原著，直接背万唯名著速记手册。
        每天背1部名著的核心内容（15分钟）。
        12天一轮，至少轮2遍。
      L1: |
        每天复习2部名著的要点（10分钟）。
        做10套名著真题，整理常考知识点。
        人物分析答题模板背熟。
      L2: |
        维持每周做题。
        重点练比较阅读和深层分析题。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 回顾重点，确保选择题不丢分
    by_level:
      L0: |
        集中背6部高频名著的核心知识点。
        做5套选择题，熟悉干扰项设置方式。
        简答题背2个万能答题模板。
        目标：拿到2-3分。
      L1: |
        速记手册过一遍，重点看容易记混的内容。
        做3套完整名著阅读题。
        目标：拿到3-4分。
      L2: |
        考前一周翻一遍速记手册，重点看自己不太确定的名著。
        目标：拿到5分满分。
