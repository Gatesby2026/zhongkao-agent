# ============================================================
# 学习路径：现代文阅读（记叙文+说明文/非连续性文本）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：约22分，区分度最大的板块，决定语文能否上90

module: 现代文阅读
subject: 语文
region: 北京

# ================================================================
#  L0 → L1：建立阅读习惯和答题意识
# ================================================================
L0_to_L1:
  target: 能读懂文章大意，知道常见题型的答题方向
  estimated_hours: 20-25
  prerequisite: 无

  steps:
    - order: 1
      topic: 记叙文阅读基础（概括能力训练）
      goal: 能用一句话概括文章主要内容
      estimated_hours: 6
      resources:
        - type: 教材
          name: 人教版语文七至九年级课内现代文
          how_to_use: |
            第1周：一句话概括训练
            - 每天读1篇课内记叙文（如《背影》《散步》《秋天的怀念》）
            - 读完用"谁+在什么情况下+做了什么+结果如何"概括
            - 对照课文导读检查概括是否准确
            - 每天1篇，连续7天

            第2周：段落大意训练
            - 每天读1篇课外记叙文（600-800字）
            - 标注每一段的段落大意（一句话）
            - 划分文章层次（开头/发展/高潮/结尾）
            - 识别文章线索（时间线/情感线/事物线）

            第3周：中心思想提炼
            - 读完文章后回答"作者想表达什么"
            - 常见中心思想类型：
              亲情/友情/成长/自然/生命/社会
            - 训练从结尾段和题目中找中心思想的线索
        - type: 练习
          name: 五三·记叙文阅读基础篇
          how_to_use: 每天做1篇，只做概括类和理解类题目
      pass_criteria:
        - 能在3分钟内用一句话准确概括文章内容
        - 能说出文章的中心思想
      common_pitfalls:
        - "概括太啰嗦：把过程全部复述一遍"
        - "概括太笼统：只说'写了一件感人的事'"

    - order: 2
      topic: 修辞手法和描写手法认知
      goal: 能识别常见修辞和描写手法
      estimated_hours: 4
      resources:
        - type: 教材
          name: 万唯·修辞手法和描写手法归纳
          how_to_use: |
            八大修辞手法速记：
            比喻→"像/如/仿佛"，生动形象
            拟人→赋予事物人的动作/情感
            排比→三个以上结构相似的句子，增强气势
            夸张→故意放大/缩小，突出特征
            反问→用问句表达确定意思，加强语气
            设问→自问自答，引起注意
            对偶→结构相同字数相等，整齐美观
            反复→重复出现，强调突出

            五种描写手法：
            环境描写→烘托氛围/暗示心情/推动情节
            动作描写→表现人物性格
            语言描写→展示人物内心
            心理描写→直接揭示内心
            外貌描写→暗示身份/性格/境遇

            每种手法找3个课文例句，标注并分析
      pass_criteria:
        - 给出一个句子能说出用了什么修辞手法
        - 能区分环境/动作/语言/心理/外貌描写

    - order: 3
      topic: 说明文和议论文基础知识
      goal: 掌握说明方法、说明顺序和议论文三要素
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版语文说明文和议论文单元
          how_to_use: |
            说明文四大说明方法：
            举例子→"例如/比如"，具体说明
            列数字→准确具体地说明
            作比较→突出特征/区别
            打比方→生动形象地说明

            说明顺序三种：
            时间顺序/空间顺序/逻辑顺序

            说明文语言特点：准确严谨
            常考题型："约""左右""几乎"等词能否删去→不能删，因为体现准确性

            议论文三要素：
            论点→作者的观点（通常在开头或标题）
            论据→事实论据+道理论据
            论证→举例论证/道理论证/对比论证/比喻论证

            各做5题基础练习
      pass_criteria:
        - 能准确判断说明方法
        - 能找到议论文的中心论点

    - order: 4
      topic: 非连续性文本入门
      goal: 能从图表和多材料中提取基本信息
      estimated_hours: 4
      resources:
        - type: 练习
          name: 五三·非连续性文本基础篇
          how_to_use: |
            训练要点：
            1. 读柱状图/折线图/饼图：
               找最大值/最小值/变化趋势/占比
            2. 读表格：
               横向比较/纵向比较/找规律
            3. 多材料整合：
               从文字+图表中分别提取信息，综合概括

            每天做1篇非连续性文本，重点练信息提取
      pass_criteria:
        - 能准确读懂常见图表
        - 能从材料中提取指定信息

# ================================================================
#  L1 → L2：题型专项突破和答题规范化
# ================================================================
L1_to_L2:
  target: 现代文阅读得分率75%以上（16-17分/22分）
  estimated_hours: 15-20
  prerequisite: L1

  steps:
    - order: 1
      topic: 记叙文六大题型专项训练
      goal: 每种题型都有规范的答题思路
      estimated_hours: 6
      resources:
        - type: 练习
          name: 万唯·记叙文阅读专题
          how_to_use: |
            六大题型逐个攻破：

            【题型1：内容概括】2天
            答题格式：谁+在什么情况下+做了什么+结果如何
            练10题

            【题型2：句子赏析】2天
            答题格式：手法+内容+情感/效果
            "运用了___手法（修辞/描写），
            生动形象地写出了___，
            表达了___的感情/突出了___。"
            练10题

            【题型3：词句含义】2天
            答题格式：表层义+深层义
            "表面上写___，实际上表达了___。"
            注意：深层义通常与文章主题相关
            练8题

            【题型4：段落作用】1天
            开头段：开篇点题/设悬念/引出下文/奠定感情基调
            中间段：承上启下/为下文做铺垫/推动情节发展
            结尾段：总结全文/点明主旨/升华主题/留有余味
            练8题

            【题型5：人物形象】1天
            答题格式：性格特点+依据
            "从___（情节/言行）可以看出，XX是一个___的人。"
            练6题

            【题型6：主题理解】1天
            答题格式：内容+主题+情感
            "文章通过写___（内容），表达了___的主题/情感。"
            练6题
      pass_criteria:
        - 每种题型都有清晰的答题模板
        - 各题型练习正确率≥75%

    - order: 2
      topic: 说明文/议论文答题专项
      goal: 说明文和议论文常考题型能规范作答
      estimated_hours: 4
      resources:
        - type: 练习
          name: 五三·说明文和议论文阅读专题
          how_to_use: |
            说明文重点题型：

            【说明方法及作用】
            答题格式：方法+说明对象+效果
            "运用了___的说明方法，具体/准确/生动地说明了___的特点。"

            【"能否删去"题】
            答题三步：
            ① 不能删
            ② 该词表示___意思
            ③ 删去后与事实不符，体现了说明文语言的准确性

            议论文重点题型：

            【论证方法及作用】
            举例论证→"举了___的例子，具体有力地证明了___的论点"
            道理论证→"引用___的话/名言，有力地证明了___"
            对比论证→"将___和___进行对比，突出强调了___"
            比喻论证→"将___比作___，生动形象地论证了___"

            各做8-10题
      pass_criteria:
        - 说明方法和论证方法判断准确
        - 答题格式规范

    - order: 3
      topic: 非连续性文本信息整合训练
      goal: 能跨材料整合信息并概括
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考非连续性文本真题
          how_to_use: |
            训练策略：
            1. 先看题目，明确需要从哪些材料中找信息
            2. 在材料中标注关键信息
            3. 整合时注意：
               - 同类信息合并
               - 不同角度的信息分点列出
               - 图表数据要转化为文字表述

            每篇限时12分钟，做完对照答案找差距
      pass_criteria:
        - 信息整合题得分率≥80%

    - order: 4
      topic: 整体限时训练
      goal: 现代文阅读板块25分钟内完成
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京近5年中考现代文阅读真题
          how_to_use: |
            时间分配建议：
            - 非连文本/说明文：10分钟
            - 记叙文：15分钟
            合计25分钟

            阅读策略：
            1. 先快速通读全文（2-3分钟）
            2. 看题目，定位到原文对应段落
            3. 组织答案，注意要点齐全
            4. 检查答案是否规范（格式/字数）

            每周做1套完整的现代文阅读真题
      pass_criteria:
        - 25分钟内完成，得分率≥75%

# ================================================================
#  L2 → L3：深层理解和精准表达
# ================================================================
L2_to_L3:
  target: 现代文阅读板块22分中得19-22分
  estimated_hours: 10-12
  prerequisite: L2
  notes: 现代文阅读是语文拉分最大的板块，值得重点投入

  steps:
    - order: 1
      topic: 深层含义题和开放性题专项
      goal: 能从多角度深入分析，拿到深层理解题的满分
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京近5年中考记叙文阅读最后一题（深层理解/开放性题）
          how_to_use: |
            深层含义题策略：
            1. 表层义→字面意思是什么
            2. 语境义→在文中具体指什么
            3. 主题义→与文章中心的关联
            4. 象征义→是否有象征/隐喻意味

            开放性题策略：
            1. 先亮明观点
            2. 结合文章内容分析（不能脱离原文）
            3. 联系自身体验或社会现实
            4. 语言要有一定深度，避免空泛

            每题先自做（限时5分钟），再对照满分答案，
            重点比较自己缺少了哪个角度/层次
      pass_criteria:
        - 深层含义题得分率≥85%
        - 开放性题能从2-3个角度分析

    - order: 2
      topic: 语言赏析精准度提升
      goal: 赏析句子时既准确又有深度
      estimated_hours: 3
      resources:
        - type: 练习
          name: 记叙文句子赏析高分训练（15题）
          how_to_use: |
            提升策略：
            1. 手法识别要准确（不能把拟人说成比喻）
            2. "生动形象"之后要具体说出"形象地写出了什么"
            3. 情感分析要联系上下文和全文主题
            4. 如果有多种手法，要逐一分析

            赏析角度升级：
            - 初级：手法+效果
            - 中级：手法+内容+情感
            - 高级：手法+内容+情感+结构作用（如照应/铺垫）

            每题写完后用红笔修改，力求精益求精
      pass_criteria:
        - 赏析句子角度全面、分析精准

    - order: 3
      topic: 高分答案语言锤炼
      goal: 答题语言凝练有力，避免废话
      estimated_hours: 3
      resources:
        - type: 真题
          name: 海淀/西城一模二模满分答案汇编
          how_to_use: |
            对比训练：
            1. 先自己答题
            2. 对照满分答案
            3. 分析差距在哪：
               - 是否遗漏要点
               - 语言是否啰嗦
               - 分析是否到位
            4. 用满分答案的表达方式改写自己的答案

            积累高频表达：
            "生动形象地写出了……的特点"
            "烘托出……的氛围"
            "为下文……做了铺垫"
            "与前文……形成照应/对比"
            "深化了……的主题"
      pass_criteria:
        - 答题语言凝练精准
        - 与满分答案差距不超过1分

    - order: 4
      topic: 限时全真模拟
      goal: 考试条件下稳定拿到19分以上
      estimated_hours: 3
      resources:
        - type: 真题
          name: 海淀/西城最新一模二模现代文阅读
          how_to_use: |
            完全模拟考试条件：
            - 不看答案
            - 限时25分钟
            - 写完整答案
            - 做完自评打分
            - 分析每题丢分原因

            每周做1套，连续4周
      pass_criteria:
        - 模拟得分稳定在19-22分

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 阅读能力靠积累，答题技巧靠训练
    by_level:
      L0: |
        每天30分钟阅读+10分钟做题。
        先培养阅读习惯，不急于做题。
        每天读一篇600字记叙文，练概括能力。
        背修辞手法和描写手法的基础知识。
      L1: |
        每天做1篇阅读理解（交替做记叙文和说明文）。
        重点训练答题格式和规范。
        每周整理1次答题模板。
      L2: |
        每周做1-2套完整的现代文阅读训练。
        开始练深层含义题和开放性题。
        积累高分答案的表达方式。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 分题型突破，真题为核心
    by_level:
      L0: |
        集中突破记叙文概括题和句子赏析题（最高频的两种题型）。
        说明方法背口诀：举例/列数/作比较/打比方。
        每天做1题，写完看答案。
      L1: |
        六大题型轮流训练，每种题型做10题。
        做北京近5年真题，熟悉北京卷风格。
        限时训练：每篇阅读限时12-15分钟。
      L2: |
        专攻深层含义题和开放性题。
        做海淀/西城一模二模。
        限时25分钟完成整个现代文板块。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 稳固答题模板，限时训练
    by_level:
      L0: |
        背熟六大题型的答题模板（哪怕不完全理解也先背下来）。
        做3套真题，对照答案学习怎么写规范答案。
        目标：拿到12-14分（22分中）。
      L1: |
        每周做1套完整现代文阅读真题，限时训练。
        重点看错题，分析是"读不懂"还是"不会答"。
        目标：拿到15-17分。
      L2: |
        做2-3套最新一模二模题，保持手感。
        复习答题模板，确保不遗漏要点。
        目标：拿到19-22分。
