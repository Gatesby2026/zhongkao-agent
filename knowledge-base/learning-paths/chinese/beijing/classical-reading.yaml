# ============================================================
# 学习路径：古诗文阅读（文言文+古诗鉴赏）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：约18分，区分度较高，实词虚词积累是关键

module: 古诗文阅读
subject: 语文
region: 北京

# ================================================================
#  L0 → L1：实词积累和课内精读
# ================================================================
L0_to_L1:
  target: 课内文言文基本能读懂，古诗鉴赏知道基本答题方向
  estimated_hours: 20-25
  prerequisite: 无

  steps:
    - order: 1
      topic: 文言实词基础积累（100个高频实词）
      goal: 掌握100个课标要求的常见文言实词
      estimated_hours: 8
      resources:
        - type: 教材
          name: 人教版语文七至九年级文言文课文注释
          how_to_use: |
            分批积累，每天5个实词：

            第1周——古今异义高频词（20个）：
            走(跑) 去(离开) 引(拉/拿) 属(通"嘱",嘱咐)
            再(两次) 或(有的人) 但(只) 虽(即使)
            居(过了) 谢(道歉/辞别) 池(护城河) 妻子(妻子和儿女)
            交通(交错相通) 绝境(与世隔绝的地方) 鲜美(鲜艳美丽)
            无论(不要说/不必说) 牺牲(祭祀用的猪牛羊) 可以(可以凭借)
            卑鄙(地位低下见识短浅) 感激(感动振奋)

            第2-3周——一词多义高频词（40个）：
            以/之/其/而/于/为/故/道/绝/见/间/遗/穷/奇/书
            每个词整理3-5种常见义项，配课文例句

            第4周——词类活用常见类型（20个）：
            名词作动词："一狼洞其中"（洞=打洞）
            形容词作动词："亲贤臣远小人"（亲=亲近）
            名词作状语："箕畚运于渤海之尾"（箕畚=用箕畚）
            使动/意动用法各5个

        - type: 练习
          name: 万唯·文言实词专项
          how_to_use: 每天做5题实词解释，对照课文注释检查
      pass_criteria:
        - 100个高频实词能说出基本含义
        - 古今异义词能区分古义和今义
      common_pitfalls:
        - "用现代汉语含义去理解文言词：'走'不是走路而是跑"
        - "一词多义只记一个意思，遇到其他用法就蒙了"

    - order: 2
      topic: 课内16篇必考文言文精读
      goal: 每篇都能逐句翻译，理解文章内容和主题
      estimated_hours: 8
      resources:
        - type: 教材
          name: 课标要求的课内文言文篇目
          how_to_use: |
            按考查频率排序精读（优先级从高到低）：

            第一批（必考级别）：
            《出师表》《岳阳楼记》《醉翁亭记》《桃花源记》
            《马说》《小石潭记》《陋室铭》《爱莲说》

            第二批（高频级别）：
            《送东阳马生序》《三峡》《记承天寺夜游》《鱼我所欲也》
            《生于忧患死于安乐》《曹刿论战》《邹忌讽齐王纳谏》《湖心亭看雪》

            每篇精读步骤：
            1. 通读全文，标注不理解的词句
            2. 对照注释逐句翻译（写在本子上）
            3. 对照参考译文检查
            4. 整理本篇的重点实词、虚词、特殊句式
            5. 概括文章主旨和写作手法

            每天精读1篇，每篇约1小时
      pass_criteria:
        - 16篇文言文能说出大意
        - 关键句子能翻译

    - order: 3
      topic: 古诗鉴赏入门
      goal: 了解常见意象含义和基本鉴赏角度
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版语文教材中的古诗词
          how_to_use: |
            第1-2天：20个常见意象速记
            月亮→思乡  柳→离别  雁→思乡/书信
            梅→高洁  菊→隐逸  竹→正直  松→坚韧
            落花→惜春/伤感  流水→时光流逝  杜鹃→悲哀
            春风→温暖/希望  秋风→萧瑟/悲凉
            长亭→送别  浮云→游子  明月→团圆/思念
            酒→愁绪/豪情  烽火→战争  沙漠→边塞苍凉
            大海→胸怀宽广  高山→志向远大

            第3-4天：基本鉴赏角度
            1. 内容：诗写了什么（时间/地点/事件/景物）
            2. 情感：表达了什么感情（思乡/爱国/壮志/离愁/闲适）
            3. 手法：用了什么手法（借景抒情/托物言志/对比/夸张/用典）

            练习：赏析10首课内古诗（每首写100字赏析短文）
      pass_criteria:
        - 20个常见意象的象征含义能脱口而出
        - 能从内容/情感/手法三个角度鉴赏古诗
      common_pitfalls:
        - "不看全诗就凭单句猜情感"
        - "鉴赏时只说'好'或'美'，说不出具体好在哪"

# ================================================================
#  L1 → L2：虚词突破和答题规范化
# ================================================================
L1_to_L2:
  target: 课内文言文翻译准确率90%，古诗鉴赏答题规范
  estimated_hours: 12-15
  prerequisite: L1

  steps:
    - order: 1
      topic: 六大虚词专项突破
      goal: 掌握"之/其/以/而/于/为"的常见用法
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯·文言虚词专项
          how_to_use: |
            每个虚词1天，集中训练：

            【之】4种用法：
            ① 代词（代人/事/物）："学而时习之"（代所学知识）
            ② 助词"的"："水陆草木之花"
            ③ 动词"到/去"："送杜少府之任蜀州"
            ④ 取消句子独立性："予独爱莲之出淤泥而不染"

            【以】4种用法：
            ① 因为："不以物喜"
            ② 凭借/用："以残年余力"
            ③ 来/用来："属予作文以记之"
            ④ 认为："皆以美于徐公"

            【而】3种用法：
            ① 表转折（但/却）："人不知而不愠"
            ② 表顺承（就/然后）："学而时习之"
            ③ 表并列（和/又）："中峨冠而多髯者"

            其/于/为 按同样方法整理
            每个虚词做10道判断用法的选择题
      pass_criteria:
        - 六大虚词常见用法能在语境中正确判断
        - 练习正确率≥80%

    - order: 2
      topic: 翻译"六字法"训练
      goal: 翻译既准确又通顺
      estimated_hours: 3
      resources:
        - type: 练习
          name: 课内文言文翻译专项（50句）
          how_to_use: |
            翻译六字法：
            留——保留专有名词（人名/地名/官名）
            删——删去无实义的虚词（发语词/语气词）
            补——补充省略的成分（主语/宾语）
            换——用现代词替换古义词
            调——调整倒装句语序
            变——变通意译不通顺的地方

            特殊句式翻译要点：
            - 判断句："……者，……也" → "……是……"
            - 省略句：补出省略的主语/宾语
            - 倒装句：宾语前置/状语后置→调整到现代语序
            - 被动句："为……所……" → "被……"

            每天翻译5句，写出完整译文，标注关键词
      pass_criteria:
        - 课内句子翻译准确率≥90%
        - 关键词（得分点）无遗漏

    - order: 3
      topic: 课外文言文阅读训练
      goal: 能借助注释读懂150字左右的课外文言文
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·课外文言文阅读专题（20篇）
          how_to_use: |
            训练步骤：
            1. 先通读全文，借助注释理解大意
            2. 用课内学过的实词知识推断生词
            3. 理解文章主要内容后再看题目
            4. 每篇限时10分钟

            推断生词的方法：
            - 语境推断：根据上下文猜测
            - 联想课内：联系学过的相同字词
            - 字形分析：从偏旁推测含义
            - 组词法：尝试组成现代词语

            每天练1篇，做完后整理生词
      pass_criteria:
        - 课外文言文正确率≥70%
        - 能运用课内知识推断课外生词

    - order: 4
      topic: 古诗鉴赏答题模板训练
      goal: 古诗鉴赏答题规范完整
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考古诗鉴赏真题
          how_to_use: |
            三种常考题型的答题模板：

            【赏析名句题】
            答题格式：手法+内容+情感
            "这句诗运用了___手法，写出了___的景象/情形，
            表达了诗人___的感情。"

            【分析意象题】
            答题格式：意象+特点+情感
            "诗人选取___意象，描绘了___的画面，
            营造了___的氛围，表达了___的情感。"

            【比较阅读题】
            答题格式：异同+分析
            "两首诗都写了___，但甲诗侧重___，表达___；
            乙诗侧重___，表达___。"

            每种题型练5题，对照满分答案修改
      pass_criteria:
        - 按模板答题，要点齐全
        - 古诗鉴赏得分率≥80%
      common_pitfalls:
        - "只说手法不分析内容和情感"
        - "情感概括太笼统，如只说'表达了思乡之情'而不结合具体内容"

# ================================================================
#  L2 → L3：课外迁移和深度鉴赏
# ================================================================
L2_to_L3:
  target: 古诗文阅读板块18分中得16-18分
  estimated_hours: 8-10
  prerequisite: L2
  notes: 古诗文满分需要深厚积累，适合语文目标90+的学生

  steps:
    - order: 1
      topic: 课外文言文限时提速
      goal: 课外文言文限时8分钟完成且正确率80%以上
      estimated_hours: 3
      resources:
        - type: 练习
          name: 海淀/西城一模二模课外文言文（10篇）
          how_to_use: |
            提速策略：
            1. 先看题目再读文→带着问题读，效率更高
            2. 抓关键句→文章首尾句和转折句最重要
            3. 人物关系→先理清谁做了什么
            4. 对比课内→同一个字在课内怎么翻译

            每篇限时8分钟，做完对答案并整理错因
      pass_criteria:
        - 限时8分钟正确率≥80%

    - order: 2
      topic: 古诗深度鉴赏
      goal: 能联系诗人背景和写作手法进行深入分析
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考+一模二模古诗鉴赏题（15题）
          how_to_use: |
            深度鉴赏的三个层次：
            1. 表层——写了什么景/事
            2. 手法层——用了什么手法/技巧
            3. 深层——表达了什么情感/思想，与诗人经历有何关联

            重点诗人背景速记：
            - 杜甫：忧国忧民/安史之乱
            - 李白：豪放不羁/怀才不遇
            - 苏轼：旷达乐观/乌台诗案
            - 辛弃疾：壮志难酬/报国无门
            - 陆游：爱国/临终遗愿

            每题写出完整赏析（150字以上），对照满分答案修改
      pass_criteria:
        - 能从三个层次进行深度赏析
        - 答题语言精练有文采

    - order: 3
      topic: 比较阅读和综合题攻坚
      goal: 文言文+古诗综合题满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近年古诗文综合题精选
          how_to_use: |
            重点训练：
            1. 课内外对比阅读：找到两篇文章的关联点
            2. 古诗与文言文的关联分析
            3. 开放性题目：结合自身体验谈理解

            每周做2套完整的古诗文阅读（课内+课外+古诗鉴赏）
            限时25分钟完成
      pass_criteria:
        - 古诗文板块整体得分率≥90%

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 实词积累和课文精读是基本功，需要长期坚持
    by_level:
      L0: |
        每天40分钟：20分钟实词积累+20分钟精读课内文言文。
        不要急于做题，先把16篇课内文言文逐句翻译一遍。
        古诗鉴赏先背20个常见意象。
      L1: |
        每天30分钟：10分钟虚词复习+10分钟翻译练习+10分钟古诗鉴赏。
        课外文言文每周练2篇。
        整理个人的实词/虚词错题本。
      L2: |
        每周做1套完整古诗文阅读保持手感。
        开始积累课外文言文的阅读量。
        古诗鉴赏向深度发展，了解诗人背景。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 分项突破弱点，真题为核心
    by_level:
      L0: |
        集中背诵：每天背5个实词+翻译2句。
        优先精读8篇第一批必考文言文。
        古诗鉴赏只背答题模板，遇到就套模板。
      L1: |
        虚词专项2周集中突破。
        课外文言文每天练1篇（限时10分钟）。
        古诗鉴赏做近5年真题，熟悉北京卷出题风格。
      L2: |
        课外文言文提速训练（限时8分钟）。
        古诗深度鉴赏，每周精做2题。
        整体限时训练：25分钟完成古诗文板块。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 回归课内，保住基本分
    by_level:
      L0: |
        只看课内：16篇文言文的重点实词和翻译再过一遍。
        古诗鉴赏背模板答题。
        目标：拿到10-12分（18分中）。
      L1: |
        课内翻译每天练3句，保持手感。
        课外文言文每两天练1篇。
        古诗鉴赏按模板答题，确保格式分不丢。
        目标：拿到13-15分。
      L2: |
        做2套完整真题，限时训练。
        回顾错题，聚焦易错的实词和虚词。
        目标：拿到16-18分。
