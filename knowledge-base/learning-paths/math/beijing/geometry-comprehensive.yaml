# ============================================================
# 学习路径：几何综合与动态几何（压轴题模块）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京
# 注意：此模块仅适合其他基础模块达到L2的学生

module: 几何综合与动态几何
subject: 数学
region: 北京

prerequisite_warning: |
  本模块是中考最难的部分，不建议基础薄弱的学生投入时间。
  请先确保以下模块达到L2：
  - 函数（特别是二次函数）
  - 三角形（全等+相似）
  - 四边形
  - 圆
  达不到L2的话，把时间花在基础模块提分效果更好。

# ================================================================
#  L1 → L2：压轴题前两问攻坚
# ================================================================
L1_to_L2:
  target: 压轴题前两问正确率≥90%
  estimated_hours: 12-15
  prerequisite: 函数L2 + 三角形L2

  steps:
    - order: 1
      topic: 压轴题第一问——求坐标/解析式
      goal: 第一问100%拿满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考+海淀/西城一模压轴题（约20题）
          how_to_use: |
            第一问通常是：
            - 求抛物线解析式（待定系数法）
            - 求交点坐标（联立方程）
            - 求顶点/对称轴

            这些都是L2函数的基本功，只需要在压轴题的背景下做
            每题只做第一问，限时3分钟
      pass_criteria:
        - 20题第一问全对

    - order: 2
      topic: 压轴题第二问分类训练
      goal: 掌握第二问的4种常见题型
      estimated_hours: 6
      resources:
        - type: 真题
          name: 同上20题的第二问
          how_to_use: |
            按题型分类练习：

            【类型1：求面积】（3题）
            方法：
            a. 坐标法：S = ½|x₁(y₂-y₃)+x₂(y₃-y₁)+x₃(y₁-y₂)|
            b. 割补法：用矩形框住三角形，减去周围小三角形
            c. 底×高÷2：选一条边做底，算另一个顶点到底边的距离

            【类型2：最短路径/最小值】（3题）
            核心技巧：利用对称（轴对称找最短路径）
            步骤：
            1. 找对称轴（通常是坐标轴或函数的对称轴）
            2. 做某点关于对称轴的对称点
            3. 连接对称点和另一点，交对称轴的点即为所求

            【类型3：证明特殊关系】（3题）
            如：证明某直线过定点、证明某角相等
            通常需要代入坐标计算验证

            【类型4：求某个特殊值】（3题）
            如：当面积=某值时求点坐标
            通常列方程求解

            每类做3题，每题限时5-8分钟
      pass_criteria:
        - 第二问正确率≥85%

    - order: 3
      topic: '"对称找最短路径"专项'
      goal: 这个技巧用得极多，必须形成条件反射
      estimated_hours: 2
      resources:
        - type: 练习
          name: '"对称法求最值"专题（10题）'
          how_to_use: |
            经典模型：
            在直线l上找点P，使PA+PB最小
            → 做A关于l的对称点A'，A'B的长度就是最小值，交点就是P

            变式：在两条直线上各找一点使路径最短
            → 连续做两次对称

            在抛物线对称轴上找点使PA+PB最短
            → 做A关于对称轴的对称点
      pass_criteria:
        - 看到"最短路径"类题目能立刻想到对称法

# ================================================================
#  L2 → L3：第三问攻坚（仅限目标95+）
# ================================================================
L2_to_L3:
  target: 压轴题完整做完，第三问完成率≥50%
  estimated_hours: 20-25
  prerequisite: L2 + 所有其他模块达到L2以上
  suitability: 仅适合目标分数95+的学生，90分目标的学生时间应投到其他科

  steps:
    - order: 1
      topic: 存在性问题——分类讨论框架
      goal: 分类讨论做到不遗漏
      estimated_hours: 8
      resources:
        - type: 真题
          name: 存在性问题精选（10题）
          how_to_use: |
            "是否存在点P使△ABP为等腰三角形"
            完整分类框架：
            ┌─ PA=PB（P在AB的垂直平分线上）
            ├─ PA=AB（以A为圆心AB为半径画圆）
            ├─ PB=AB（以B为圆心AB为半径画圆）
            ├─ AB=PA（同上换个组合）
            ├─ AB=PB
            └─ PA=PB=AB（等边三角形特殊情况）

            "是否存在点P使四边形ABPC为平行四边形"
            完整分类：
            ┌─ AB//CP 且 AB=CP
            ├─ AC//BP 且 AC=BP
            └─ BC//AP 且 BC=AP
            （即P可能在3个不同位置）

            每题做完后对照答案，检查是否有遗漏的情况
            做10题
      pass_criteria:
        - 分类讨论不遗漏主要情况
        - 能在15分钟内完成一道存在性问题

    - order: 2
      topic: 动点最值问题——参数化方法
      goal: 用参数t表达一切，化成函数求最值
      estimated_hours: 6
      resources:
        - type: 真题
          name: 动点最值问题精选（8题）
          how_to_use: |
            标准解题流程：
            1. 设动点参数（如P在抛物线上，设P(t, t²-2t+1)）
            2. 用参数t表达目标量（面积/距离/周长等）
            3. 化成关于t的函数（通常是二次函数）
            4. 求最大值/最小值
            5. 检查t的取值范围（是否在定义域内）

            每题限时12分钟
      pass_criteria:
        - 能用参数化方法处理动点最值
        - 正确率≥60%

    - order: 3
      topic: 旋转/翻折构造全等
      goal: 识别旋转构造的信号，掌握基本操作
      estimated_hours: 4
      resources:
        - type: 练习
          name: '"旋转构造"专题（6题）'
          how_to_use: |
            识别信号：
            - 题目中出现等边三角形（旋转60°）
            - 题目中出现等腰直角三角形（旋转90°）
            - 两个三角形有一个公共顶点且一组边相等

            操作步骤：
            1. 确定旋转中心和旋转角度
            2. 旋转后找到全等三角形
            3. 利用全等建立等量关系
      pass_criteria:
        - 能识别需要旋转构造的题目
        - 旋转后正确找到全等关系

    - order: 4
      topic: '"拿步骤分"策略'
      goal: 即使做不完第三问也能最大化得分
      estimated_hours: 2
      resources:
        - type: 自制工具
          name: "压轴题步骤分策略清单"
          how_to_use: |
            如果第三问做不出来，至少做到以下几点拿步骤分：

            1. 写出"设P点坐标为(m, am²+bm+c)"（1分）
            2. 写出要满足的条件（如"PA=PB"→距离公式列出等式）（1分）
            3. 如果是分类讨论题，至少写出分类标准（1分）
            4. 做出其中一种情况的计算（1-2分）

            关键：不要交白卷！写了就有分。
      pass_criteria:
        - 任何压轴题第三问都能至少写出2-3步
