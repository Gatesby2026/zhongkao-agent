# ============================================================
# 学习路径：函数（一次 + 反比例 + 二次函数）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京
# 重要性：中考单一模块分值最高（16-22分），含压轴题

module: 函数
subject: 数学
region: 北京

# ================================================================
#  L0 → L1：建立函数图象的直觉
# ================================================================
L0_to_L1:
  target: 看到解析式能画出图象，看到图象能说出基本性质
  estimated_hours: 12-15
  prerequisite: 数与式L1 + 方程L0以上

  steps:
    - order: 1
      topic: 一次函数 y=kx+b 的图象与性质
      goal: 能画一次函数图象，理解k和b的几何意义
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版八年级下册·第十九章《一次函数》
          how_to_use: |
            第1天：画图训练
            - 画出以下函数的图象（列表描点连线）：
              y=x, y=2x, y=-x, y=x+1, y=x-2, y=-x+3
            - 对比观察：k影响什么？b影响什么？

            第2天：总结性质
            - k>0：从左下到右上（y随x增大而增大）
            - k<0：从左上到右下（y随x增大而减小）
            - b>0：与y轴正半轴相交
            - b<0：与y轴负半轴相交
            - b=0：过原点（正比例函数）

            第3天：反向练习
            - 给图象写解析式（待定系数法）：
              过两个点 → 代入坐标 → 解方程组 → 得k和b
            - 做课本例题5题

            第4天：象限判断专练
            - 判断y=kx+b经过哪些象限（看k和b的正负号）
            - 做10题
        - type: 练习
          name: 五三·一次函数基础篇
          how_to_use: 只做★和★★题
      pass_criteria:
        - 给任意k、b的值能说出图象经过哪些象限
        - 用待定系数法求解析式正确率≥80%
      common_pitfalls:
        - "k和b搞混：k是斜率（倾斜程度），b是截距（与y轴交点）"
        - "待定系数法列方程时代入坐标搞反了x和y"

    - order: 2
      topic: 反比例函数 y=k/x 的图象与性质
      goal: 理解双曲线图象特征，知道k正负对应哪些象限
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版九年级下册·第二十六章《反比例函数》
          how_to_use: |
            第1天：画图对比
            - 画出 y=2/x 和 y=-2/x 的图象
            - 记住：k>0 在一三象限，k<0 在二四象限
            - 图象永远不过原点，不与坐标轴相交

            第2天：性质总结
            - 每个象限内的增减性
            - |k|的几何意义（双曲线与坐标轴围成的面积）
            - 待定系数法：代一个点求k

            第3天：练习巩固
            - 做课本例题+课后题
        - type: 练习
          name: 五三·反比例函数基础
          how_to_use: 做★和★★题各5题
      pass_criteria:
        - k>0和k<0时图象在哪些象限能脱口而出
        - 能用待定系数法求k的值
      common_pitfalls:
        - "k>0在一三象限（不是一二），k<0在二四象限（不是三四）"
        - "反比例函数在每个象限内：k>0时y随x增大而减小（不是增大）"

    - order: 3
      topic: 二次函数 y=ax²+bx+c 入门
      goal: 理解抛物线的基本形状，知道a决定开口方向
      estimated_hours: 5
      resources:
        - type: 教材
          name: 人教版九年级上册·第二十二章《二次函数》
          how_to_use: |
            第1天：从最简单的 y=ax² 开始
            - 画 y=x², y=2x², y=-x² 的图象
            - 记住：a>0 开口向上，a<0 开口向下
            - |a|越大，抛物线越窄

            第2-3天：配方法 → 顶点式
            - 一般式 y=ax²+bx+c → 配方 → 顶点式 y=a(x-h)²+k
            - 顶点坐标 (h, k) = (-b/2a, (4ac-b²)/4a)
            - 对称轴 x = -b/2a
            - 先记住对称轴公式，顶点y值代入算
            - 每天练5题配方

            第4-5天：图象的基本性质
            - 开口方向（a的正负）
            - 对称轴位置
            - 顶点（最高/最低点）
            - 与y轴交点（0,c）
            - 与x轴交点（令y=0，解方程）
            - 每天做5题
      pass_criteria:
        - 能把一般式配方成顶点式
        - 给出解析式能说出开口方向、对称轴、顶点坐标
      common_pitfalls:
        - "配方时忘记提出a：y=2x²+4x+1 → y=2(x²+2x)+1 → y=2(x+1)²-1"
        - "对称轴公式的符号：x=-b/(2a)，注意负号"
        - "顶点坐标和对称轴搞混"

# ================================================================
#  L1 → L2：性质熟练 + 中档题能做
# ================================================================
L1_to_L2:
  target: 三种函数性质掌握牢固，中考中档函数题准确
  estimated_hours: 10-12
  prerequisite: L1

  steps:
    - order: 1
      topic: '"看图判断a、b、c符号"专项'
      goal: 这是中考选择题高频题型，必须秒解
      estimated_hours: 2
      resources:
        - type: 练习
          name: '"由图象判断abc符号"专项题集（20题）'
          how_to_use: |
            解题模板：
            - a的符号：看开口方向（上为正下为负）
            - c的符号：看与y轴交点（交正半轴c>0）
            - b的符号：看对称轴位置
              对称轴 x=-b/(2a)
              对称轴在y轴左侧 → -b/(2a)<0
              若a>0 → b>0; 若a<0 → b<0
            - b²-4ac的符号：看与x轴交点个数

            每天做5题，追求30秒内做出一题
      pass_criteria:
        - 20题正确率≥90%
        - 平均每题30-45秒

    - order: 2
      topic: 待定系数法（一般式 vs 交点式 vs 顶点式）
      goal: 根据已知条件选择最高效的设法
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三·二次函数待定系数法专题
          how_to_use: |
            三种设法的选择策略：

            【已知两个x轴交点(x₁,0)(x₂,0)】
            → 用交点式：y=a(x-x₁)(x-x₂)，再代第三个点求a

            【已知顶点(h,k)】
            → 用顶点式：y=a(x-h)²+k，再代另一个点求a

            【已知三个任意点】
            → 用一般式：y=ax²+bx+c，列方程组求a,b,c

            各做5题，重点体会"哪种设法最省事"
      pass_criteria:
        - 能根据已知条件选择最优设法
        - 正确率≥90%

    - order: 3
      topic: 函数与方程的关系
      goal: 理解图象与x轴交点 ↔ 方程的根 ↔ 判别式
      estimated_hours: 2
      resources:
        - type: 教材
          name: '课本"二次函数与一元二次方程"章节'
          how_to_use: |
            核心关系（必须记住）：
            y=ax²+bx+c 的图象与x轴的交点
            ↔ ax²+bx+c=0 的根
            ↔ Δ=b²-4ac

            Δ>0 → 两个交点 → 两个不等实根
            Δ=0 → 一个交点（相切）→ 一个实根（两等实根）
            Δ<0 → 无交点 → 无实根

            做综合练习10题
      pass_criteria:
        - 能从图象信息推出方程根的情况
        - 能从方程信息推断图象与x轴的关系

    - order: 4
      topic: 函数实际应用题
      goal: 能用函数建模解决利润最值、面积最值等问题
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·函数应用题专题
          how_to_use: |
            两类必练：

            类型1：利润最值
            例：售价提高x元，销量减少10x件，利润 = (单价利润)(销量)
            → 建立二次函数 → 求最大值

            类型2：面积最值
            例：用固定长度的围栏围矩形，面积最大是多少
            → 设一边为x → 面积 = x(L/2-x) → 求最大值

            各做5题
        - type: 真题
          name: 北京近5年中考函数应用题
          how_to_use: 逐题精做
      pass_criteria:
        - 能从文字题中建立二次函数模型
        - 能正确求最大值/最小值（顶点就是最值点）
      common_pitfalls:
        - "忘记自变量的取值范围（如个数必须是正整数）"
        - "开口向下求最大值用顶点，开口向上求最小值用顶点"

    - order: 5
      topic: 一次函数与反比例函数综合
      goal: 两种函数图象在同一坐标系中的交点、面积等问题
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三·一次函数与反比例函数综合
          how_to_use: |
            常见题型：
            1. 求交点（联立方程组）
            2. 交点围成的面积
            3. 比较函数值大小（看图判断哪段y₁>y₂）
            做8题
      pass_criteria:
        - 联立方程求交点准确
        - 能看图比较两个函数值的大小

# ================================================================
#  L2 → L3：压轴题攻坚
# ================================================================
L2_to_L3:
  target: 压轴题前两问必对，第三问能拿步骤分
  estimated_hours: 15-20
  prerequisite: L2 + 三角形L2 + 四边形L2
  notes: 仅适合目标95+的学生

  steps:
    - order: 1
      topic: 压轴题前两问强化训练
      goal: 前两问做到100%正确率
      estimated_hours: 5
      resources:
        - type: 真题
          name: 北京近5年中考+海淀/西城一模二模压轴题（约20题）
          how_to_use: |
            每题只做前两问，限时8分钟
            整理第二问的常见题型：
            1. 求三角形/四边形面积（坐标法或割补法）
            2. 在某条线上找点使距离最短（对称法）
            3. 证明某个特殊关系（如直线过定点）
      pass_criteria:
        - 20题的前两问正确率≥95%

    - order: 2
      topic: 压轴题第三问分类攻略
      goal: 掌握3类常见第三问的解题框架
      estimated_hours: 8
      resources:
        - type: 真题
          name: 同上20题的第三问
          how_to_use: |
            三类第三问的套路：

            【类型A：存在性问题】
            "是否存在点P使得△ABP为等腰三角形？"
            框架：假设存在 → 分类讨论所有情况 → 列方程求解 → 逐一检验
            关键：分类要全（等腰三角形至少讨论3种顶点情况）

            【类型B：动点最值问题】
            "当点P在抛物线上运动时，△ABP面积最大是多少？"
            框架：设P坐标含参数t → 用t表达面积 → 化成关于t的二次函数 → 求最值
            关键：底边固定时，面积最大=高最大

            【类型C：动点函数关系】
            "点P从A出发以速度v运动，求某个量关于时间t的函数关系式"
            框架：设运动参数t → 用t表达各点坐标/长度 → 建立函数关系
            关键：注意分段（P在不同边上时函数不同）

            每类精做5题，每题限时15分钟
      pass_criteria:
        - 看到第三问能判断属于哪种类型
        - 分类讨论不遗漏主要情况
        - 即使做不完也能写出关键步骤拿到步骤分

    - order: 3
      topic: 限时全真模拟
      goal: 在考试条件下完成压轴题
      estimated_hours: 4
      resources:
        - type: 真题
          name: 海淀/西城最新一模二模压轴题
          how_to_use: |
            完全模拟考试条件：
            - 不看答案
            - 限时15分钟/题
            - 写完整过程
            - 做完对答案并分析丢分原因
      pass_criteria:
        - 压轴题总得分率≥70%（14分中至少拿10分）
