# ============================================================
# 学习路径：数与式（实数运算 + 整式 + 因式分解 + 分式）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京（教材版本：人教版）

module: 数与式
subject: 数学
region: 北京

# ================================================================
#  L0 → L1：从基础薄弱到规则清晰
# ================================================================
L0_to_L1:
  target: 掌握各类运算的基本规则，不再混淆
  estimated_hours: 8-10
  prerequisite: 无

  steps:
    - order: 1
      topic: 有理数运算（符号法则 + 混合运算）
      goal: 正负数的加减乘除和乘方运算不出错
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版七年级上册·第一章《有理数》
          how_to_use: |
            回顾课本例题，重点看：
            1. 负数的加减法则（同号取相同，异号取绝对值大的符号）
            2. 负数的乘除法则（负负得正）
            3. 乘方的符号规律（底数为负：奇次为负，偶次为正）
            每个例题先看一遍，然后合上书自己重做一遍
        - type: 练习
          name: 五三·七上·有理数运算部分
          how_to_use: |
            只做★题（最基础的），每天10题
            重点关注：(-2)² 和 -2² 的区别
            做错的题用红笔标注错因（是规则不清还是计算粗心）
      pass_criteria:
        - 连续做20道有理数混合运算，正确率≥90%
        - 能准确说出 (-1)^2026 和 (-1)^2027 的值并解释原因
      common_pitfalls:
        - "(-2)²=4 但 -2²=-4 — 前者底数是-2，后者底数是2再取负"
        - "减法变加法时忘记变号：5-(-3) = 5+3"
        - "零的处理：0乘任何数=0，0不能做除数"

    - order: 2
      topic: 幂的运算 + 整式乘除
      goal: 幂的三个法则（同底数幂相乘/幂的乘方/积的乘方）不混淆
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版八年级上册·第十四章《整式的乘法与因式分解》
          how_to_use: |
            核心就三条法则，逐条过：
            1. a^m × a^n = a^(m+n) — 底数相同，指数相加
            2. (a^m)^n = a^(mn) — 幂的乘方，指数相乘
            3. (ab)^n = a^n × b^n — 积的乘方，分别乘方
            每条法则做5道配套练习确认理解
        - type: 自制工具
          name: "幂运算法则对比卡"
          how_to_use: |
            用一张卡片正面写法则，背面写易混点：
            正面：a^m × a^n = a^(m+n)
            背面：注意！是底数相同才能用！a² × b³ 不能合并！
            每天翻看2分钟，直到不用想就能说出
      pass_criteria:
        - 连续做15道幂运算题不出错
        - 能区分 (a²)³=a⁶ 和 a²×a³=a⁵
      common_pitfalls:
        - "a²×a³ 写成 a⁶（指数应相加不是相乘）"
        - "(a²)³ 写成 a⁵（指数应相乘不是相加）"
        - "a²×b³ 想合并成(ab)⁵（底数不同不能合并）"

    - order: 3
      topic: 因式分解（提公因式法 + 公式法）
      goal: 看到一个多项式能判断用哪种方法分解，并正确执行
      estimated_hours: 2.5
      resources:
        - type: 教材
          name: 人教版八年级上册·第十四章（因式分解部分）
          how_to_use: |
            分三步学，不要混着学：
            第1天：只练提公因式法
              例：6x²y - 9xy² = 3xy(2x - 3y)
              做课本和课后题各5题
            第2天：只练平方差公式
              例：x² - 9 = (x+3)(x-3)
              做课本和课后题各5题
            第3天：只练完全平方公式
              例：x² + 6x + 9 = (x+3)²
              做课本和课后题各5题
            第4天：混合练习（先判断类型再分解）
        - type: 练习
          name: 五三·八上·因式分解基础篇（★和★★题）
          how_to_use: |
            每题先在脑中判断"用哪种方法"，再动笔
            重点练：先提公因式，再看是否能用公式法
            例：2x² - 8 → 先提2 → 2(x²-4) → 再用平方差 → 2(x+2)(x-2)
      pass_criteria:
        - 连续做15道因式分解题，正确率≥85%
        - 能处理"先提公因式再用公式法"的两步分解
      common_pitfalls:
        - "x²-4 分解成 x(x-4)（这是错的，应该用平方差公式）"
        - "2x²-8 只提公因式写成 2(x²-4) 就停了，漏掉平方差这一步"
        - "完全平方公式的符号：x²-6x+9=(x-3)² 中间是减号"

    - order: 4
      topic: 分式的基本运算
      goal: 分式的约分、通分、四则运算不出错
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 人教版八年级上册·第十五章《分式》
          how_to_use: |
            核心是两件事：
            1. 约分：分子分母同除以公因式
            2. 通分：找最简公分母，分子分母同乘
            每种运算做5题课本例题
        - type: 练习
          name: 五三·八下·分式运算基础篇
          how_to_use: 每天5题，只做★题，做完对答案
      pass_criteria:
        - 分式加减乘除各做5题全对
      common_pitfalls:
        - "通分后忘记约分"
        - "分式加减时，分子变号不彻底（如 a/(x-1) - b/(x-1) = (a-b)/(x-1) 而非 a-b/(x-1)）"

# ================================================================
#  L1 → L2：从规则清晰到基本熟练
# ================================================================
L1_to_L2:
  target: 综合运算准确率高，化简求值类题型熟练
  estimated_hours: 6-8
  prerequisite: L1（各类运算基本规则已掌握）

  steps:
    - order: 1
      topic: 混合运算限时训练
      goal: 提高计算的准确率和速度
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·中考数学·数与式计算专题
          how_to_use: |
            每天一组（5题），限时15分钟
            做完对答案，错题归类：
            A类（规则不清）→ 回去补对应的L0步骤
            B类（计算粗心）→ 用红笔标注，下次做题前先看一遍错因
        - type: 真题
          name: 北京近5年中考第17题（计算题）
          how_to_use: |
            单独把这5道题做一遍
            这是中考最基础的送分题，必须全对
            每题限时5分钟
      pass_criteria:
        - 5组混合运算练习，平均正确率≥90%
        - 北京近5年中考第17题全部做对
      common_pitfalls:
        - "混合运算顺序错误（先乘除后加减，先括号内后括号外）"

    - order: 2
      topic: 化简求值专项
      goal: '"先化简后代入"的完整流程熟练准确'
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·中考数学·化简求值专题
          how_to_use: |
            化简求值题的标准流程：
            1. 先化简（通分/约分/合并同类项）
            2. 再代入（把给定的值代入化简后的式子）
            3. 最后计算

            注意：先化简再代入，不要上来就代入原式（容易出错且计算量大）
            每天3题，限时每题8分钟
        - type: 真题
          name: 北京近5年中考化简求值题汇编
          how_to_use: 逐题精练，每题写完整过程
      pass_criteria:
        - 化简求值题正确率≥85%
        - 代入有理化（如代入√3）不出错
      common_pitfalls:
        - "先代入再化简（顺序反了，计算量暴增且容易出错）"
        - "化简后代入时忘记有理化分母"
        - "代入负数时忘记加括号：代入x=-2，写成 -2² 而不是 (-2)²"

    - order: 3
      topic: 二次根式运算补强
      goal: 二次根式的化简、合并、有理化熟练
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本二次根式章节复习
          how_to_use: |
            重点三个技能：
            1. 化简：√12 = 2√3
            2. 合并同类根式：3√2 + √2 = 4√2
            3. 分母有理化：1/√3 = √3/3
        - type: 练习
          name: 五三·二次根式运算
          how_to_use: 每类各做10题
      pass_criteria:
        - 二次根式运算正确率≥90%
      common_pitfalls:
        - "√(a²+b²) 错写成 a+b（根号下的加法不能拆开）"
        - "√4 × √9 = √36 = 6 ✓ 但 √4 + √9 ≠ √13 ✗"

# ================================================================
#  L2 → L3：从基本熟练到精通（追求零失误）
# ================================================================
L2_to_L3:
  target: 数与式部分中考零失误，运算速度快为后面大题省时间
  estimated_hours: 4-6
  prerequisite: L2（基本运算准确率已达85%以上）

  steps:
    - order: 1
      topic: 限时模拟训练
      goal: 在时间压力下保持准确率
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考 + 海淀/西城一模 数与式部分汇编
          how_to_use: |
            把每套卷子中数与式相关的选择+填空+第17题单独拎出来
            每套限时15分钟
            目标：全对
        - type: 自制工具
          name: "个人计算错误清单"
          how_to_use: |
            整理自己做过的所有计算错误，归类：
            - 符号错误（出现X次）
            - 指数错误（出现X次）
            - 约分遗漏（出现X次）
            考前每次做题前过一遍这个清单
      pass_criteria:
        - 连续3套模拟的数与式部分全对
        - 每套完成时间≤12分钟

    - order: 2
      topic: 高频陷阱题专练
      goal: 见过所有常见出题陷阱，不再上当
      estimated_hours: 2
      resources:
        - type: 练习
          name: 中考数与式易错题精选（20题）
          how_to_use: |
            典型陷阱题类型：
            1. a⁰=1 但 0⁰ 无意义
            2. 分式有意义的条件（分母≠0）
            3. 二次根式有意义的条件（被开方数≥0）
            4. 科学记数法的指数（位数-1 还是 位数？）
            5. 绝对值去括号时的分类讨论
            每题做完写出"陷阱点在哪"
      pass_criteria:
        - 20道易错题正确率≥95%
        - 能说出每道题的陷阱在哪

    - order: 3
      topic: 速算技巧
      goal: 掌握常用速算方法，提高效率
      estimated_hours: 1
      resources:
        - type: 自制工具
          name: "常用数值速查"
          how_to_use: |
            记住这些常用值，能省大量计算时间：
            √2 ≈ 1.414    √3 ≈ 1.732    √5 ≈ 2.236
            π ≈ 3.14       2π ≈ 6.28
            常用勾股数：3-4-5, 5-12-13, 8-15-17
            常用完全平方数：1,4,9,16,25,36,49,64,81,100,121,144
      pass_criteria:
        - 上述常用值能脱口而出
