# ============================================================
# 学习路径：统计与概率
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京
# 特点：最容易拿满分的模块，性价比极高

module: 统计与概率
subject: 数学
region: 北京

# ================================================================
#  L0 → L1：搞清概念 + 学会列举法
# ================================================================
L0_to_L1:
  target: 各统计量会算，树状图和列表法会用
  estimated_hours: 5-6
  prerequisite: 无（本模块相对独立，不依赖其他模块）

  steps:
    - order: 1
      topic: 平均数/中位数/众数的区分
      goal: 三个概念永远不会混
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 课本统计章节
          how_to_use: |
            三个量用一句话记住：
            - 平均数：所有数加起来除以个数
            - 中位数：排序后最中间的那个数（偶数个取中间两个的平均）
            - 众数：出现次数最多的那个数

            例：数据 2, 3, 5, 5, 7, 8, 8, 8, 10
            平均数 = (2+3+5+5+7+8+8+8+10)/9 ≈ 6.2
            中位数 = 7（第5个，因为共9个数）
            众数 = 8（出现3次，最多）

            做课本例题5题确认理解
        - type: 练习
          name: 五三·统计量基础题
          how_to_use: 做10题，每题都要求三个量全算
      pass_criteria:
        - 三个统计量的定义能脱口而出
        - 计算正确率≥90%
      common_pitfalls:
        - "中位数忘记先排序就直接找中间"
        - "偶数个数据的中位数：取中间两个数的平均值"
        - "众数可以有多个（如果出现次数相同的最大值有多个）"

    - order: 2
      topic: 方差的计算
      goal: 方差公式记住，计算不出错
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 课本方差章节
          how_to_use: |
            方差公式：
            S² = [(x₁-x̄)² + (x₂-x̄)² + ... + (xₙ-x̄)²] / n

            步骤：
            1. 先算平均数 x̄
            2. 每个数减去平均数
            3. 差值平方
            4. 求平方的平均数

            意义：方差越大，数据越分散；方差越小，数据越稳定

            做3题（数据量不超过6个的）
        - type: 练习
          name: 五三·方差计算基础
          how_to_use: |
            每天做2题
            技巧：先算平均数时保留分数（不要四舍五入），减少后续误差
      pass_criteria:
        - 方差计算正确率≥85%
        - 能说出"方差越小越稳定"
      common_pitfalls:
        - "计算步骤多容易出错 → 建议列表格逐步算"
        - "不要忘记最后除以n"

    - order: 3
      topic: 频率分布直方图
      goal: 能读图、补图、从图中提取信息
      estimated_hours: 1
      resources:
        - type: 教材
          name: 课本频率分布直方图章节
          how_to_use: |
            关键概念：
            - 频数 = 落在某区间的数据个数
            - 频率 = 频数 / 总数（所有频率之和 = 1）
            - 直方图中每个长条的高 = 频率/组距（有时直接用频数）

            读图练习：看3个直方图，回答"哪个区间人数最多""中位数在哪个区间"
      pass_criteria:
        - 能从直方图中读出频数和频率
        - 能补全缺失的长条

    - order: 4
      topic: 概率——列表法和树状图法
      goal: 两种列举方法都熟练
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 课本概率章节
          how_to_use: |
            两种方法的选择：
            - 列表法：适合两步实验（如掷两个骰子），用二维表格列出所有可能
            - 树状图法：适合两步或三步实验（如不放回取球），画分支图

            步骤固定：
            1. 列出所有等可能的结果（列表或画树）
            2. 数出总数N
            3. 数出满足条件的个数M
            4. P = M/N

            各做5题
        - type: 练习
          name: 五三·概率基础篇
          how_to_use: |
            每题都画完整的列表或树状图，不要口算
            特别注意"放回"和"不放回"的区别
      pass_criteria:
        - 列表法和树状图法各做5题全对
        - 不遗漏任何分支
      common_pitfalls:
        - "树状图漏画分支（特别是不放回时第二步分支减少）"
        - "列表法中重复计数（如(1,2)和(2,1)是否算两种要看题意）"

# ================================================================
#  L1 → L2：提高准确率 + 复杂题型
# ================================================================
L1_to_L2:
  target: 中考统计概率题稳定拿满分
  estimated_hours: 4-5
  prerequisite: L1

  steps:
    - order: 1
      topic: 加权平均数实际应用
      goal: '能识别题目中"谁是权"并正确计算'
      estimated_hours: 1.5
      resources:
        - type: 练习
          name: 五三·加权平均数应用题
          how_to_use: |
            常见场景：
            - 招聘打分（笔试、面试按不同权重）
            - 综合评价（平时成绩占30%，期末占70%）
            - 不同品种/规格的混合计算

            做5题，每题标注"哪个数是权"
      pass_criteria:
        - 加权平均数计算正确率≥90%

    - order: 2
      topic: 方差限时训练 + 对比分析题
      goal: 方差计算又准又快，能做数据对比分析题
      estimated_hours: 1.5
      resources:
        - type: 练习
          name: 中考真题统计对比题
          how_to_use: |
            典型题型：甲乙两组数据，算平均数和方差，判断谁更稳定
            平均数相同 → 方差小的更稳定
            平均数不同 → 需综合分析（看题目具体要求）

            做5题，每题限时5分钟（含计算全过程）
      pass_criteria:
        - 对比分析题正确率≥90%

    - order: 3
      topic: 中考真题统计概率全部精练
      goal: 熟悉北京中考出题风格
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考统计概率全部题目（含选择+填空+解答）
          how_to_use: |
            逐题精做，写完整过程
            统计概率的解答题通常是第18题左右，分值5分
            这5分是最容易拿的分，必须全对
      pass_criteria:
        - 5年真题统计概率部分全对

# ================================================================
#  L2 → L3：新课标内容 + 零失误
# ================================================================
L2_to_L3:
  target: 完全掌握，包括2022新课标新增内容
  estimated_hours: 2-3
  prerequisite: L2

  steps:
    - order: 1
      topic: 四分位数和箱线图（2022新增）
      goal: 了解概念，能解决基本问题
      estimated_hours: 1.5
      resources:
        - type: 视频
          name: 国家中小学智慧教育平台·四分位数和箱线图
          how_to_use: |
            四分位数：
            Q1（下四分位数）：数据排序后前半段的中位数
            Q2（中位数）：全部数据的中位数
            Q3（上四分位数）：数据排序后后半段的中位数

            箱线图：
            用 最小值-Q1-Q2-Q3-最大值 画出的图
            箱子的宽度(Q3-Q1)反映数据的集中程度

            这是新考点，可能出现在选择或填空中，了解即可
      pass_criteria:
        - 能从一组数据中算出Q1、Q2、Q3
        - 能读懂箱线图

    - order: 2
      topic: 查漏补缺
      goal: 确保统计概率模块零失误
      estimated_hours: 1
      resources:
        - type: 练习
          name: 统计概率易错题精选（10题）
          how_to_use: 做完确认没有死角
      pass_criteria:
        - 10题全对
