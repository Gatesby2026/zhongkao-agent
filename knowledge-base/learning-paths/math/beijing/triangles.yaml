# ============================================================
# 学习路径：三角形（全等 + 相似 + 勾股 + 三角函数）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京

module: 三角形
subject: 数学
region: 北京

# ================================================================
#  L0 → L1：记住方法 + 建立找条件的习惯
# ================================================================
L0_to_L1:
  target: 5种全等判定能背出来，简单证明能写出格式
  estimated_hours: 10-12
  prerequisite: 无

  steps:
    - order: 1
      topic: 全等三角形的5种判定方法
      goal: 能默写5种方法，知道每种方法需要什么条件
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版八年级上册·第十二章《全等三角形》
          how_to_use: |
            5种方法每天背一种，配一张对比卡：

            SSS：三边对应相等
            SAS：两边及其夹角对应相等（注意"夹角"二字）
            ASA：两角及其夹边对应相等
            AAS：两角及其中一角的对边对应相等
            HL：斜边和一条直角边对应相等（仅用于直角三角形）

            不能用的：SSA（两边及非夹角）、AAA（三角对应相等）
            → AAA只能判相似，不能判全等！
        - type: 自制工具
          name: "全等判定方法对比卡"
          how_to_use: |
            正面：方法名（如SAS）
            背面：条件+示意图+注意事项
            每天翻看3分钟，持续一周
      pass_criteria:
        - 能默写5种方法及每种所需条件
        - 能说出为什么SSA和AAA不能用
      common_pitfalls:
        - "SAS的'A'必须是两边的夹角，不是任意角"
        - "HL只能用在直角三角形"

    - order: 2
      topic: 全等证明的书写格式
      goal: 学会规范的证明书写，不丢格式分
      estimated_hours: 3
      resources:
        - type: 教材
          name: 课本全等证明例题（照抄5遍格式）
          how_to_use: |
            证明格式模板：
            ∵ 条件1（如 AB=CD）
              条件2（如 ∠A=∠D）
              条件3（如 AC=DF）
            ∴ △ABC ≌ △DEF（SAS）
            ∴ 结论（如 BC=EF）

            先照着课本例题抄5道证明的完整过程（练手感）
            然后合上书自己写5道
        - type: 练习
          name: 五三·全等三角形基础证明（★题）
          how_to_use: |
            做10道最基础的证明题（条件已经在图中直接给出的）
            每道都写完整格式，不能跳步
            重点：找"对应顶点"的顺序一定要对
      pass_criteria:
        - 证明格式规范，∵∴逻辑清晰
        - 简单全等证明（条件直接给出的）正确率≥80%
      common_pitfalls:
        - "△ABC≌△DEF 的顶点对应顺序不能乱写"
        - "写∴BC=EF前必须先写∵△ABC≌△DEF（不能跳步）"

    - order: 3
      topic: 勾股定理
      goal: 勾股定理正用（求斜边）和反用（判断直角三角形）都会
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本勾股定理章节
          how_to_use: |
            a² + b² = c²（a、b是直角边，c是斜边）

            正用：已知两直角边，求斜边
            反用（逆定理）：三边满足a²+b²=c²，则是直角三角形

            记住常用勾股数：
            3-4-5（及其倍数6-8-10, 9-12-15...）
            5-12-13
            8-15-17
        - type: 练习
          name: 五三·勾股定理基础篇
          how_to_use: 每天5题，含正用和反用
      pass_criteria:
        - 勾股定理计算正确率≥90%
        - 常用勾股数能脱口而出

    - order: 4
      topic: 三角函数值记忆
      goal: 30°/45°/60°的sin/cos/tan值烂熟于心
      estimated_hours: 1.5
      resources:
        - type: 自制工具
          name: "特殊角三角函数值表"
          how_to_use: |
            必背表格（每天默写一遍，持续一周）：

            角度    sin      cos      tan
            30°     1/2      √3/2    √3/3
            45°     √2/2    √2/2     1
            60°     √3/2    1/2      √3

            记忆技巧：
            sin的值从小到大：1/2, √2/2, √3/2（对应30°,45°,60°）
            cos的值从大到小：√3/2, √2/2, 1/2（和sin反过来）
        - type: 练习
          name: 课本三角函数计算题
          how_to_use: 做10题涉及特殊角的计算
      pass_criteria:
        - 不看表能写出9个值（3个角×3个函数）
        - 计算题中能正确代入

# ================================================================
#  L1 → L2：学会找隐含条件 + 相似三角形 + 三角函数应用
# ================================================================
L1_to_L2:
  target: 中考三角形证明和计算题能独立完成
  estimated_hours: 10-12
  prerequisite: L1

  steps:
    - order: 1
      topic: '"找隐含条件"专题'
      goal: 图中不直接写出但可以用的条件都能找到
      estimated_hours: 3
      resources:
        - type: 练习
          name: '"隐含条件识别"专题训练（15题）'
          how_to_use: |
            常见隐含条件清单（做题时逐条检查）：
            1. 公共边（两个三角形共用一条边）
            2. 公共角（两个三角形共用一个角）
            3. 对顶角（两直线相交形成的对顶角相等）
            4. 等腰三角形的底角相等
            5. 平行线产生的同位角/内错角/同旁内角
            6. 直角（垂直关系隐含90°角）
            7. 角平分线上的点到两边距离相等

            做题训练：每道题先不做，先把能找到的隐含条件全部列出来
      pass_criteria:
        - 15题中能找出85%以上的隐含条件
      common_pitfalls:
        - "最容易漏的：公共边和对顶角"

    - order: 2
      topic: 相似三角形的判定与性质
      goal: 3种判定方法熟练，比例计算准确
      estimated_hours: 3
      resources:
        - type: 教材
          name: 课本相似三角形章节
          how_to_use: |
            3种判定方法：
            AA：两角对应相等（最常用！）
            SAS：两边成比例且夹角相等
            SSS：三边对应成比例

            性质：
            对应边成比例
            对应角相等
            面积比=相似比的平方

            平行线产生相似的典型模型：
            DE//BC → △ADE∽△ABC
        - type: 练习
          name: 五三·相似三角形专题
          how_to_use: |
            分两阶段练：
            第1阶段：判定（给条件判断是否相似）10题
            第2阶段：计算（利用相似求线段或面积）10题
      pass_criteria:
        - 判定正确率≥85%
        - 比例计算正确率≥85%
      common_pitfalls:
        - "比例关系的对应要正确：AD/AB = DE/BC（不是AD/DB = DE/BC）"
        - "面积比是相似比的平方，不是一次方"

    - order: 3
      topic: 解直角三角形实际应用
      goal: 仰角/俯角/坡度问题能正确建模和计算
      estimated_hours: 2.5
      resources:
        - type: 教材
          name: '课本"解直角三角形"应用章节'
          how_to_use: |
            解题步骤固定：
            1. 画图（标注已知角和已知边）
            2. 找到直角三角形
            3. 选择合适的三角函数
            4. 列式计算

            常见场景：
            - 测量建筑物高度（仰角+距离）
            - 测量河宽（两岸两个角度）
            - 坡度问题（坡度=对边/邻边=tan角度）
        - type: 练习
          name: 五三·解直角三角形应用题
          how_to_use: 做8题，每题必画图
      pass_criteria:
        - 应用题正确率≥80%
        - 能正确选择sin/cos/tan

    - order: 4
      topic: 中考真题三角形部分精练
      goal: 熟悉中考出题风格
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考·三角形相关题汇编
          how_to_use: |
            含选择填空中的三角形题+解答题中的证明题
            每题独立完成，写完整过程
            做完对答案分析错因
      pass_criteria:
        - 真题正确率≥80%

# ================================================================
#  L2 → L3：辅助线 + 几何综合
# ================================================================
L2_to_L3:
  target: 复杂几何题能找到突破口，辅助线技巧丰富
  estimated_hours: 8-10
  prerequisite: L2

  steps:
    - order: 1
      topic: 常见辅助线技巧
      goal: 掌握5种高频辅助线手法
      estimated_hours: 4
      resources:
        - type: 练习
          name: '"辅助线专题训练"（15题）'
          how_to_use: |
            5种常用辅助线（各练3题）：

            1. 作高线：遇到求面积或需要直角三角形时
            2. 延长线：延长某条边构造全等/相似
            3. 取中点连线：构造中位线（平行且等于第三边一半）
            4. 旋转构造：旋转三角形构造全等，建立新的等量关系
            5. 连接已知点：如连接圆心和切点/弦的中点
      pass_criteria:
        - 看到题目能判断可能需要哪种辅助线

    - order: 2
      topic: 几何综合题实战
      goal: 全等+相似+勾股+三角函数的综合运用
      estimated_hours: 4
      resources:
        - type: 真题
          name: 海淀/西城一模二模几何解答题
          how_to_use: |
            每题限时10分钟
            做完整理：用了哪些知识点？怎么找到突破口的？
      pass_criteria:
        - 综合几何题正确率≥75%
