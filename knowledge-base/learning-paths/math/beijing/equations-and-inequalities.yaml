# ============================================================
# 学习路径：方程与不等式
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京（教材版本：北师大版）

module: 方程与不等式
subject: 数学
region: 北京

# ================================================================
#  L0 → L1：掌握各类方程的基本解法
# ================================================================
L0_to_L1:
  target: 各类方程能正确求解，不遗漏关键步骤
  estimated_hours: 10-12
  prerequisite: 数与式已达L1（基本运算不出错）

  steps:
    - order: 1
      topic: 一元二次方程的三种解法
      goal: 公式法熟练掌握，因式分解法和配方法会用
      estimated_hours: 4
      resources:
        - type: 教材
          name: 北师大版九年级上册·第二章《一元二次方程》
          how_to_use: |
            按顺序学三种方法（不要同时学，容易混）：

            第1-2天：公式法（最通用，必须熟练）
            - 求根公式：x = (-b ± √(b²-4ac)) / 2a
            - 默写公式3遍，然后做10题
            - 重点：先把方程化成 ax²+bx+c=0 的标准形式

            第3天：因式分解法（最快，能用时优先用）
            - 适用场景：能看出因式分解的方程
            - 例：x²-5x+6=0 → (x-2)(x-3)=0 → x=2或x=3
            - 做8题

            第4天：配方法（理解原理，实际用得少）
            - 了解配方法的思路即可
            - 做5题
        - type: 练习
          name: 五三·九上·一元二次方程基础篇（★和★★题）
          how_to_use: |
            每天做5题，用公式法做
            每题必须写出：标准形式 → a,b,c的值 → 代入公式 → 求解
      pass_criteria:
        - 求根公式能默写无误
        - 连续做10道一元二次方程全对
      common_pitfalls:
        - "忘记先化成标准形式就直接套公式"
        - "b²-4ac 中的b前面有系数时漏了（如2x²+3x-1=0，b=3不是x的系数3/2）"
        - "±号只写了一个根"

    - order: 2
      topic: 分式方程（解法 + 验根）
      goal: '掌握"去分母→解整式方程→验根"的三步流程'
      estimated_hours: 3
      resources:
        - type: 教材
          name: 课本分式方程章节
          how_to_use: |
            分式方程有固定流程，死记硬背这三步：
            1. 去分母（方程两边同乘最简公分母）
            2. 解出的整式方程（变成一元一次或一元二次方程）
            3. 验根！把解代回原方程的分母，分母=0则为增根，舍去

            每做一道题都强制写验根步骤，哪怕你觉得肯定对
        - type: 练习
          name: 五三·分式方程基础篇
          how_to_use: |
            每天3题，每题必须包含完整的验根步骤
            特别注意：验根不是代回解出的整式方程，而是代回原分式方程的分母
      pass_criteria:
        - 连续10道分式方程不遗漏验根步骤
        - 能正确识别增根并舍去
      common_pitfalls:
        - "最致命的错误：做完忘记验根！中考必扣分"
        - "验根代错地方：应代入原分式方程的分母，不是代入去分母后的方程"
        - "去分母时某一项漏乘"

    - order: 3
      topic: 一元一次不等式（组）
      goal: 不等式解法掌握，能在数轴上表示解集
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本不等式章节
          how_to_use: |
            不等式和方程的解法几乎一样，唯一区别：
            两边同乘或同除以负数时，不等号要变向！

            口诀："乘负变向"

            不等式组的解集用数轴表示：
            "同大取大，同小取小，大小小大取中间，大大小小无解"
        - type: 练习
          name: 五三·不等式基础篇
          how_to_use: 每天5题，每题画数轴表示解集
      pass_criteria:
        - 不等式解法正确率≥90%
        - 不等式组的数轴表示准确
      common_pitfalls:
        - "两边除以负数忘记变号：-2x>6 → x<-3（不是x>-3）"
        - "不等式组取交集时搞错方向"

    - order: 4
      topic: 判别式（Δ = b²-4ac）
      goal: 理解判别式的含义，会用来判断根的情况
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 课本判别式章节
          how_to_use: |
            三种情况记牢：
            Δ > 0 → 两个不相等的实数根
            Δ = 0 → 两个相等的实数根（即一个根）
            Δ < 0 → 无实数根

            常见题型：已知方程有实数根，求参数范围 → 列 Δ≥0
        - type: 练习
          name: 五三·判别式专题
          how_to_use: 做8题，每题写清Δ的表达式和不等式
      pass_criteria:
        - 能准确写出Δ的表达式
        - 能根据题意列出关于Δ的不等式
      common_pitfalls:
        - "有实数根是 Δ≥0（含等号），不是 Δ>0"
        - "Δ的展开计算出错"

# ================================================================
#  L1 → L2：突破应用题 + 判别式综合运用
# ================================================================
L1_to_L2:
  target: 应用题能独立列式，判别式灵活运用
  estimated_hours: 8-10
  prerequisite: L1（各类方程基本解法已掌握）

  steps:
    - order: 1
      topic: 方程应用题分类突破
      goal: 掌握4大类应用题的列式套路
      estimated_hours: 5
      resources:
        - type: 练习
          name: 五三·方程应用题分类精练
          how_to_use: |
            4大类各练5题，按类型集中练（不要混着练）：

            【第1类：行程问题】（2天）
            核心公式：路程 = 速度 × 时间
            设未知数套路：通常设速度或时间
            例：甲比乙快20km/h → 设乙的速度为x，甲为x+20

            【第2类：工程问题】（1天）
            核心思路：把总工程量看作1
            设未知数套路：设完成时间
            例：甲单独做需x天，每天完成1/x

            【第3类：利润/销售问题】（1天）
            核心公式：利润 = 售价 - 成本，利润率 = 利润/成本
            涨价x% → 原价 × (1+x%)
            降价x% → 原价 × (1-x%)

            【第4类：增长率问题】（1天）
            核心公式：末量 = 初量 × (1+增长率)^n
            两年增长 → a(1+x)² = b
        - type: 真题
          name: 北京近5年中考方程应用题
          how_to_use: '逐题精做，重点练习"读题→设未知数→找等量关系→列方程"的过程'
      pass_criteria:
        - 每类应用题能独立列出方程
        - 北京近5年应用题能做对4/5以上
      common_pitfalls:
        - "不知道设什么为x → 固定策略：题目问什么就设什么为x"
        - "增长率问题：两次增长是(1+x)²，不是1+2x"
        - "列完方程忘记检验解是否合理（如速度不能为负数）"

    - order: 2
      topic: 判别式与韦达定理综合
      goal: 判别式的3类题型熟练，韦达定理入门
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·判别式综合专题
          how_to_use: |
            3类题型各练5题：

            类型1：已知根的情况，求参数范围
            例：x²+2x+m=0有两个实根 → Δ=4-4m≥0 → m≤1

            类型2：已知方程有特殊根，求参数
            例：x²+mx+2=0有一个根是1 → 代入1+m+2=0 → m=-3

            类型3：韦达定理（根与系数关系）
            若x₁+x₂ = -b/a, x₁x₂ = c/a
            例：已知两根之和=5，两根之积=6 → 方程为x²-5x+6=0
        - type: 真题
          name: 北京中考判别式相关题汇编
          how_to_use: '做完整理"什么时候用Δ≥0，什么时候用Δ>0，什么时候用Δ=0"'
      pass_criteria:
        - 判别式题型正确率≥85%
        - 韦达定理基本应用能正确使用
      common_pitfalls:
        - "Δ≥0和Δ>0的区别：有实根vs有两个不相等的实根"
        - "韦达定理的符号：x₁+x₂=-b/a（注意负号）"

    - order: 3
      topic: 不等式的实际应用
      goal: 能列不等式解决实际问题
      estimated_hours: 1.5
      resources:
        - type: 练习
          name: 五三·不等式应用题
          how_to_use: |
            关键词识别：
            "不超过" → ≤
            "至少" → ≥
            "不足" → <
            做5-8题应用题
      pass_criteria:
        - 能从题目中识别不等关系并列式

# ================================================================
#  L2 → L3：综合提速
# ================================================================
L2_to_L3:
  target: 方程部分中考零失误
  estimated_hours: 5-6
  prerequisite: L2

  steps:
    - order: 1
      topic: 综合题训练
      goal: 方程与函数/几何结合的综合题能处理
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考+海淀西城一模·方程综合题
          how_to_use: |
            重点做：
            1. 方程与函数图象结合的题（如由图象信息列方程）
            2. 几何中的方程（如用勾股定理列方程求边长）
            限时训练，每题8分钟
      pass_criteria:
        - 综合题正确率≥85%

    - order: 2
      topic: 限时全真模拟
      goal: 在考试时间压力下保持准确
      estimated_hours: 2
      resources:
        - type: 真题
          name: 整套中考/模考卷的方程相关部分
          how_to_use: |
            从整套卷中抽出方程相关题（通常4-5题）
            限时20分钟完成
            目标：全对
      pass_criteria:
        - 连续3套模拟方程部分全对
