# ============================================================
# 学习路径：国情国策（基本国情/基本路线/发展理念/制度优势）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试 — 核心能力是翻书定位+规范作答
# 重要性：约20分，制度优势和发展理念是近年高频考点

module: 国情国策
subject: 道德与法治
region: 北京

# ================================================================
#  L0 -> L1：建立国情国策基本知识框架
# ================================================================
L0_to_L1:
  target: 知道我国基本国情、基本路线、发展理念和制度体系的核心内容
  estimated_hours: 8-10
  prerequisite: 无

  steps:
    - order: 1
      topic: 基本国情与社会主要矛盾
      goal: 理解社会主义初级阶段的含义和主要矛盾
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版九年级上册·第一单元（富强与创新）
          how_to_use: |
            第1天：基本国情
            - 找到教材中关于"社会主义初级阶段"的论述
            - 用荧光笔标出：我国仍处于并将长期处于社会主义初级阶段
            - 背诵社会主要矛盾的完整表述：
              "人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾"
            - 注意：这是新表述，旧表述"物质文化需要"已经过时

            第2天：基本路线
            - 找到"一个中心、两个基本点"的内容
            - 一个中心：以经济建设为中心
            - 两个基本点：坚持四项基本原则 + 坚持改革开放
            - 在教材上标注并贴便签

            做5道相关选择题巩固
      pass_criteria:
        - 能完整背出社会主要矛盾的表述
        - 能说出"一个中心、两个基本点"的内容
      common_pitfalls:
        - "主要矛盾的表述必须完整准确，少一个字都算错"
        - "不要把'基本路线'和'基本方略'搞混"

    - order: 2
      topic: 新发展理念
      goal: 记住五大发展理念及各自解决的核心问题
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版九年级上册·创新驱动发展章节
          how_to_use: |
            必背内容：

            创新 → 解决发展动力问题（引领发展的第一动力）
            协调 → 解决发展不平衡问题（城乡/区域/经济社会协调）
            绿色 → 解决人与自然和谐共生问题
            开放 → 解决发展内外联动问题
            共享 → 解决社会公平正义问题（发展成果由人民共享）

            背诵口诀："创协绿开共，动力平衡生态外分享"
            在教材上用五种颜色分别标出五个理念的详细内容

            做5道"材料对应哪个发展理念"的选择题
        - type: 练习
          name: 五三道法·新发展理念选择题
          how_to_use: 做10道选择题，重点练"判断材料体现哪个理念"
      pass_criteria:
        - 五大理念及对应问题能脱口而出
        - 给出材料能判断体现哪个理念，正确率≥80%
      common_pitfalls:
        - "'协调'和'共享'容易混淆：协调侧重区域/城乡平衡，共享侧重成果分配"
        - "'绿色'不只是环保，是人与自然和谐共生的整体理念"

    - order: 3
      topic: 制度体系梳理
      goal: 分清根本制度、根本政治制度、基本政治制度、基本经济制度
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版九年级上册·民主与法治章节 + 八年级下册·宪法章节
          how_to_use: |
            制度体系一览（必须制作成表格贴在教材首页）：

            【根本制度】社会主义制度
            【根本政治制度】人民代表大会制度
            【基本政治制度】
              ① 中国共产党领导的多党合作和政治协商制度
              ② 民族区域自治制度
              ③ 基层群众自治制度
            【基本经济制度】
              ① 公有制为主体、多种所有制经济共同发展
              ② 按劳分配为主体、多种分配方式并存
              ③ 社会主义市场经济体制

            易混辨析：
            - "根本"只有两个：社会主义制度（最根本）+ 人大制度（根本政治制度）
            - "基本"有两类：政治三个 + 经济三个
            - 人大制度 ≠ 人大：人大是国家权力机关，人大制度是政治制度

            每天默写一遍制度体系表，连续一周
        - type: 练习
          name: 五三道法·制度体系辨析选择题
          how_to_use: 做10道易混辨析选择题
      pass_criteria:
        - 默写制度体系表无遗漏
        - 能准确区分"根本"和"基本"
        - 人大制度和人大的区别能说清楚

# ================================================================
#  L1 -> L2：深化理解 + 翻书定位精度提升
# ================================================================
L1_to_L2:
  target: 国情国策知识体系清晰，能结合材料准确分析
  estimated_hours: 8-10
  prerequisite: L1

  steps:
    - order: 1
      topic: 知识树构建
      goal: 将零散知识点构建成有逻辑的体系
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 思维导图构建
          how_to_use: |
            以"中国特色社会主义"为核心，画出知识树：

            中国特色社会主义
            ├── 道路（实践路径）
            ├── 理论体系（指导思想）
            ├── 制度（制度保障）
            │   ├── 根本制度
            │   ├── 根本政治制度
            │   ├── 基本政治制度（3个）
            │   └── 基本经济制度（3个）
            └── 文化（精神力量）

            基本国情
            ├── 社会主义初级阶段
            ├── 主要矛盾
            ├── 基本路线（一个中心两个基本点）
            └── 发展理念（创协绿开共）

            手画在A3纸上，贴在书桌前，每天看一遍
      pass_criteria:
        - 不看提示能画出完整的知识树
        - 能说出各知识点之间的逻辑关系

    - order: 2
      topic: 材料与知识点对应训练
      goal: 读完材料能快速判断涉及哪些教材知识点
      estimated_hours: 3
      resources:
        - type: 练习
          name: '"一材多点"对应训练'
          how_to_use: |
            训练方法：读一段材料，列出所有可对应的教材知识点

            示例材料："北京冬奥会成功举办"
            可对应知识点：
            ① 综合国力增强
            ② 社会主义制度优越性（集中力量办大事）
            ③ 创新发展理念（科技冬奥）
            ④ 绿色发展理念（绿色办奥）
            ⑤ 开放发展理念（国际交流）
            ⑥ 文化自信（展示中华文化）
            ⑦ 人类命运共同体（国际合作）

            每天练2个材料，先自己列再对照答案补充
        - type: 真题
          name: 北京近5年中考·国情类材料分析题
          how_to_use: 逐题分析材料与知识点的对应关系
      pass_criteria:
        - 每段材料能找到3个以上对应的教材知识点
        - 知识点定位准确率≥80%
      common_pitfalls:
        - "不要只往一个方向想，政治/经济/文化/生态四个维度都要考虑"
        - "北京中考特别爱考'制度优势'，材料中有'集中力量''全国一盘棋'就要想到"

    - order: 3
      topic: 非选择题规范作答训练
      goal: 答案分点清晰、术语准确、角度全面
      estimated_hours: 4
      resources:
        - type: 练习
          name: 万唯道法·国情国策非选择题专练
          how_to_use: |
            本模块高频题型：

            【发展理念类】"材料体现了哪些发展理念？请说明理由"
            作答要求：
            ① 先判断涉及哪几个理念
            ② 每个理念分一点作答
            ③ 格式："...体现了X发展理念。因为X理念强调...，材料中..."

            【制度优势类】"运用制度知识分析..."
            作答要求：
            ① 先判断涉及哪个制度
            ② 说出该制度的内涵和优势
            ③ 结合材料分析

            【国情分析类】"结合基本国情分析..."
            作答要求：
            ① 从社会主要矛盾切入
            ② 结合基本路线分析
            ③ 联系发展理念和制度保障

            每种题型做3道，写完对照评分标准自批
      pass_criteria:
        - 非选择题答案分点清晰
        - 每点都有"教材术语+材料分析"
        - 得分率≥70%

# ================================================================
#  L2 -> L3：精准深入 + 高效答题
# ================================================================
L2_to_L3:
  target: 国情国策部分得分率≥85%，答题全面高效
  estimated_hours: 6-8
  prerequisite: L2
  notes: 适合目标70+（总分80）的学生

  steps:
    - order: 1
      topic: 易混概念精准辨析
      goal: 彻底消除概念混淆
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 易混概念对比训练
          how_to_use: |
            必须辨清的概念对：

            1. 根本制度 vs 根本政治制度
               社会主义制度（最根本）vs 人民代表大会制度（根本政治制度）

            2. 人大 vs 政协
               人大：国家权力机关，行使立法权
               政协：参政议政，民主监督，不是国家机关

            3. 基本路线 vs 基本方略
               基本路线：一个中心两个基本点
               基本方略：全面依法治国等十四条

            4. 主要矛盾 vs 基本国情
               主要矛盾：人民美好生活需要和不平衡不充分的矛盾
               基本国情：社会主义初级阶段

            5. 公有制经济 vs 非公有制经济
               公有制：国有经济+集体经济+混合所有制中的国有/集体成分
               非公有制：个体经济+私营经济+外资经济

            每对概念写100字辨析，坚持一周
      pass_criteria:
        - 选择题中遇到易混概念不再犯错
        - 非选择题中术语使用零误差

    - order: 2
      topic: 多层次深入分析训练
      goal: 从表面分析深入到逻辑推理
      estimated_hours: 3
      resources:
        - type: 真题
          name: 海淀/西城一模二模·国情类大题
          how_to_use: |
            深度分析方法：
            ① 表层分析：材料说了什么事？→ 对应哪个知识点？
            ② 深层分析：为什么这样做？→ 根源是什么（国情/矛盾）？
            ③ 延伸分析：有什么意义？→ 对个人/社会/国家的影响

            示例：材料"北京推进垃圾分类"
            表层：绿色发展理念
            深层：解决生态环境问题，回应主要矛盾中"美好生活需要"
            延伸：推进生态文明建设→美丽中国→可持续发展→人与自然和谐共生

            每道大题按三个层次分析，追求答案的深度
      pass_criteria:
        - 每道题能做到"三层分析"
        - 答案有深度，不只是罗列知识点

    - order: 3
      topic: 限时全真模拟
      goal: 考试条件下高效完成本模块题目
      estimated_hours: 3
      resources:
        - type: 真题
          name: 海淀/西城最新一模二模完整试卷
          how_to_use: |
            模拟考试：
            - 90分钟完整做一套卷
            - 国情国策相关非选择题限时12分钟
            - 写完后计算本模块得分率
            - 分析：哪些分是翻书慢丢的？哪些是角度遗漏丢的？

            目标：本模块得分率≥85%
      pass_criteria:
        - 国情国策模块得分率≥85%
        - 选择题全对
        - 非选择题每题用时≤6分钟

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 国情国策需要理解逻辑，不能靠死记硬背
    by_level:
      L0: |
        先搞清楚制度体系——制作制度一览表每天默写一遍。
        每天30分钟：20分钟读教材+10分钟做选择题。
        不急着做非选择题，先把基础知识搞清楚。
      L1: |
        画知识树，建立知识体系。
        开始练"材料-知识点"对应（每天1道）。
        翻书速度训练同步进行。
      L2: |
        每周做2道非选择题限时训练。
        积累"一材多点"的分析能力。
        开始做海淀西城期末试题。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 翻书速度+材料分析能力是突破关键
    by_level:
      L0: |
        集中背诵：主要矛盾+五大理念+制度体系（三张表）。
        每天10道选择题（允许翻书），积累翻书经验。
        非选择题先学会写"答题格式"（分点+术语）。
      L1: |
        真题训练为主，每天1道非选择题。
        重点练：发展理念判断+制度优势分析。
        翻书速度必须达标（30秒内）。
      L2: |
        模拟题+真题交替。
        练"三层分析"（表层/深层/延伸）。
        开始关注北京特色考点（副中心建设/接诉即办等）。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 巩固高频考点+限时模拟
    by_level:
      L0: |
        死记三张表：主要矛盾+五大理念+制度体系。
        选择题翻书做，目标拿到本模块选择题8分。
        非选择题写出知识点名称就有分。
      L1: |
        做3套完整真题，计时模拟。
        回顾错题中的"遗漏知识点"。
        确保速查表上有国情国策全部高频知识点。
      L2: |
        全真模拟查漏补缺。
        重点检查易混概念是否还会错。
        预判可能考的时政材料，提前对应教材知识点。
