# ============================================================
# 学习路径：时政热点（党的二十大/科技成就/生态文明/共同富裕）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试 — 但时政热点教材上没有，必须提前积累
# 重要性：约15分，且几乎所有非选择题的材料背景都涉及时政

module: 时政热点
subject: 道德与法治
region: 北京

# ================================================================
#  L0 -> L1：建立时政素养，了解重大事件
# ================================================================
L0_to_L1:
  target: 了解近一年重大时事，能说出10件国内大事
  estimated_hours: 6-8
  prerequisite: 无（但需要国情国策L0以上才能建立时政-教材对应关系）

  steps:
    - order: 1
      topic: 党的二十大核心内容
      goal: 掌握二十大报告中与中考相关的核心知识点
      estimated_hours: 2
      resources:
        - type: 资料
          name: 教师整理的"二十大核心考点"或时政一本通
          how_to_use: |
            必背内容：

            1. 二十大主题（简化版）
               - 全面建设社会主义现代化国家
               - 全面推进中华民族伟大复兴

            2. 中国式现代化五个特征
               ① 人口规模巨大的现代化
               ② 全体人民共同富裕的现代化
               ③ 物质文明和精神文明相协调的现代化
               ④ 人与自然和谐共生的现代化
               ⑤ 走和平发展道路的现代化

            3. 全过程人民民主
               - 全链条、全方位、全覆盖的民主

            每天背一个板块，第4天综合默写检测
        - type: 练习
          name: 五三道法·时政专题选择题
          how_to_use: 做10道二十大相关选择题
      pass_criteria:
        - 中国式现代化五个特征能完整背出
        - 二十大主题能说出核心内容
      common_pitfalls:
        - "五个特征的顺序和措辞要准确，考试中一字之差就是错"
        - "不要把十九大和二十大的提法混淆"

    - order: 2
      topic: 年度重大时事速览
      goal: 了解2025年4月-2026年3月的国内外重大事件
      estimated_hours: 2
      resources:
        - type: 资料
          name: 中考时政热点汇编（学校发放或网上整理）
          how_to_use: |
            分类整理近一年大事：

            【科技成就】
            - 航天领域（月球探测/空间站/卫星等）
            - AI与数字经济发展
            - 关键技术突破

            【民生保障】
            - 教育改革相关政策
            - 医疗/养老/住房政策
            - 就业与收入分配

            【生态文明】
            - 碳达峰碳中和进展
            - 重大环保政策或事件
            - 新能源发展

            【国际关系】
            - 重要外交活动
            - 一带一路进展
            - 国际组织中的中国角色

            【北京本地】
            - 城市副中心建设
            - 接诉即办改革
            - 中轴线申遗/文化建设

            每个类别记住2-3件大事，共10-15件
        - type: 习惯
          name: 每日5分钟时政积累
          how_to_use: |
            方式选一种坚持：
            - 看新闻联播前5分钟（国内要闻）
            - 看"学习强国"APP的头条
            - 看老师推送的时政简报
            每天在笔记本上记一句话新闻
      pass_criteria:
        - 能说出近一年10件国内大事
        - 每件大事能用一句话概括
      common_pitfalls:
        - "不需要记太多细节，记住'什么事+什么意义'就够了"
        - "国际时事只需关注与中国直接相关的"

    - order: 3
      topic: 时政与教材初步对应
      goal: 开始建立"时事-教材知识点"的连接
      estimated_hours: 3
      resources:
        - type: 训练方法
          name: '"时政-知识点"对照表制作'
          how_to_use: |
            制作方法：
            准备一个本子，左边写时政事件，右边写对应教材知识点

            示例：
            | 时政事件 | 教材知识点 |
            |---------|-----------|
            | 神舟飞船发射 | 科教兴国+创新驱动+综合国力+制度优势 |
            | 乡村振兴成果 | 共同富裕+共享理念+主要矛盾+协调发展 |
            | 碳中和目标 | 绿色理念+可持续发展+人与自然+大国担当 |
            | 全国两会召开 | 人大制度+政协制度+全过程人民民主 |
            | 反诈骗宣传 | 法治建设+公民权利保护+网络安全 |

            每个事件至少对应3个教材知识点
            先自己想，想不到的再翻教材补充
      pass_criteria:
        - 对照表包含至少10个时政事件
        - 每个事件有3个以上对应知识点

# ================================================================
#  L1 -> L2：系统积累 + 材料分析能力提升
# ================================================================
L1_to_L2:
  target: 有系统的时政素材积累，能将时事与教材知识点准确对应
  estimated_hours: 6-8
  prerequisite: L1 + 国情国策L1以上

  steps:
    - order: 1
      topic: 时政素材分类深化
      goal: 每个热点领域都有充分的素材和对应知识点
      estimated_hours: 2
      resources:
        - type: 资料
          name: 万唯道法·时政热点专题
          how_to_use: |
            按四大板块深化积累：

            【科技板块】
            核心知识点：科教兴国战略+人才强国战略+创新驱动发展战略
            教材原话积累：
            - "创新是引领发展的第一动力"
            - "科技是第一生产力，人才是第一资源"
            - "关键核心技术是要不来、买不来、讨不来的"

            【生态板块】
            核心知识点：绿色发展理念+可持续发展+生态文明
            教材原话积累：
            - "绿水青山就是金山银山"
            - "人与自然是生命共同体"
            - "建设美丽中国"

            【民生板块】
            核心知识点：共享发展+社会公平正义+民生保障
            教材原话积累：
            - "发展的根本目的是增进民生福祉"
            - "让人民群众共享发展成果"

            【治理板块】
            核心知识点：全过程人民民主+依法治国+制度优势
            教材原话积累：
            - "人民当家作主是社会主义民主政治的本质特征"

            每个板块的教材原话必须标注出处（哪本书哪一课）
      pass_criteria:
        - 四大板块各有3条以上教材原话积累
        - 每条原话知道出自哪本书

    - order: 2
      topic: '"一材多用"分析训练'
      goal: 同一个时政材料能从多个角度分析
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 多角度拆解练习
          how_to_use: |
            训练方法：拿一个时政热点，从尽可能多的角度分析

            示例：北京冬奥会成功举办
            ① 科技角度：科技冬奥→创新发展理念→科教兴国
            ② 生态角度：绿色冬奥→绿色发展理念→可持续发展
            ③ 文化角度：展示中华文化→文化自信→文化强国
            ④ 制度角度：集中力量办大事→制度优势→社会主义制度
            ⑤ 开放角度：国际交流→开放发展理念→人类命运共同体
            ⑥ 民生角度：带动冰雪运动→共享发展理念→全民健身

            每天拆解1个热点，追求找到5个以上角度
      pass_criteria:
        - 每个热点能找到4个以上分析角度
        - 角度之间不重复

    - order: 3
      topic: 时政类真题实战
      goal: 在真题中检验时政分析能力
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考·时政相关题目（选择+非选择）
          how_to_use: |
            分析要点：
            1. 选择题：注意时政表述的准确性（一字之差可能选错）
            2. 非选择题：材料中的时政背景要准确识别
            3. 答题时先写教材知识点，再结合材料中的时政信息

            每年真题做一套时政相关题，限时训练：
            - 选择题部分：10分钟
            - 非选择题部分：每题6分钟
            - 对照答案找差距
        - type: 练习
          name: 五三道法·时政非选择题专练
          how_to_use: 精选8题限时训练
      pass_criteria:
        - 时政选择题正确率≥80%
        - 非选择题能将时政与教材知识点准确对应
        - 答案中有具体的时政素材支撑

# ================================================================
#  L2 -> L3：深入分析 + 北京特色 + 预测能力
# ================================================================
L2_to_L3:
  target: 时政分析全面深入，本模块得分率≥85%
  estimated_hours: 4-6
  prerequisite: L2 + 国情国策L2以上
  notes: 时政是拉开差距的关键——教材上翻不到，全靠积累

  steps:
    - order: 1
      topic: 北京特色时政专项
      goal: 掌握北京本地高频时政考点
      estimated_hours: 2
      resources:
        - type: 资料
          name: 北京本地时政汇编
          how_to_use: |
            北京中考必关注的本地热点：

            1. 城市副中心建设
               → 协调发展+新型城镇化+首都功能疏解

            2. 接诉即办改革（12345热线）
               → 基层治理+人民当家作主+以人民为中心

            3. 中轴线申遗成功
               → 文化自信+传统文化保护+文化强国

            4. "两区"建设（国家服务业扩大开放综合示范区+自贸试验区）
               → 开放发展理念+改革开放+高质量发展

            5. 科技创新中心建设（中关村/怀柔科学城等）
               → 创新发展理念+科教兴国+创新驱动

            6. 垃圾分类/碳中和行动
               → 绿色发展+生态文明+公民责任

            每个热点准备"一句话概括+三个教材知识点"
      pass_criteria:
        - 6个北京热点的对应知识点能脱口而出
        - 答题时能主动融入北京特色元素

    - order: 2
      topic: 热点预测与提前准备
      goal: 预判2026中考可能考的时政热点
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 考点预测分析
          how_to_use: |
            预测方法：
            ① 看时间节点：2025.4-2026.3中的重大纪念日/周年
            ② 看政策重点：当年政府工作报告的关键词
            ③ 看北京特色：北京独有的重大事件或政策
            ④ 看命题规律：近5年考过什么、没考什么

            2026年可能的热点方向：
            - 十四五规划收官之年相关
            - 科技自立自强最新成就
            - 共同富裕相关政策进展
            - 数字经济/AI发展
            - 北京城市更新和治理创新

            每个预测热点提前准备好"教材知识点对应+答题要点"
      pass_criteria:
        - 能预测出5个以上可能考的热点
        - 每个热点有完整的"素材+知识点+答题框架"

    - order: 3
      topic: 限时全真模拟
      goal: 考试条件下高效完成时政类题目
      estimated_hours: 2
      resources:
        - type: 真题
          name: 海淀/西城最新一模二模
          how_to_use: |
            重点关注：
            - 一模二模的时政材料往往预示中考方向
            - 分析出题人选材料的思路
            - 看标准答案中时政与教材结合的方式

            模拟时注意：
            - 时政类选择题不能翻书（教材上没有），必须靠积累
            - 非选择题中时政背景是"引子"，答题核心还是教材知识点
            - 但引用具体时政素材会给答案加分
      pass_criteria:
        - 时政类题目得分率≥85%
        - 选择题不需要翻书即可作答
        - 非选择题能融入具体时政素材

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 时政积累是慢功夫，越早开始越好
    by_level:
      L0: |
        先背二十大核心内容（一周搞定）。
        养成每天5分钟看新闻的习惯。
        每周在笔记本上记3件大事。
      L1: |
        开始制作"时政-知识点"对照表。
        每周做3道时政选择题。
        关注老师推送的时政资料。
      L2: |
        每周做1道时政非选择题。
        练"一材多用"多角度分析。
        开始积累北京本地时政素材。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 系统整理+对应教材是关键
    by_level:
      L0: |
        背诵二十大五个特征+五大理念（与国情国策模块同步）。
        整理10件大事的"一句话概括"。
        时政选择题靠排除法+常识判断。
      L1: |
        完善"时政-知识点"对照表。
        做近5年真题时政类题目。
        每天积累1条教材原话（贴在时政笔记旁边）。
      L2: |
        "一材多用"训练强化（每天1个热点拆解）。
        关注北京特色时政。
        开始做一模二模时政题。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 聚焦高概率考点+预测押题
    by_level:
      L0: |
        背诵老师给的时政简报（10件大事+对应知识点）。
        时政选择题靠"政治正确"原则判断（正面积极的选项更可能对）。
        非选择题遇到时政材料不要慌，写教材知识点就有分。
      L1: |
        翻阅时政对照表，确保10个高频热点烂熟于心。
        做2-3套一模二模卷的时政题。
        把可能考的热点和知识点写在速查表上带进考场。
      L2: |
        预测+押题：按5个方向各准备一套"素材+知识点+答题框架"。
        全真模拟。
        关注最后一个月的重大时事（可能出现在选择题中）。
