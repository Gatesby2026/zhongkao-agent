# ============================================================
# 易错点：实验探究
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：北京中考物理实验探究题占28分，是最大的得分模块

module: 实验探究
module_id: experiments

mistakes:

  - id: EX-01
    name: 控制变量法理解不到位
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 3-5分
    description: |
      控制变量法是物理实验的核心方法，常见错误：
      1. 不清楚哪个是自变量（需改变的），哪个是因变量（需观察的）
      2. 控制不变的量没有写全（答题时漏掉控制条件）
      3. 实验设计中没有真正控制好变量（如探究摩擦力时没保持压力相同）
      4. 答题格式不规范："在xx相同的情况下"这句话经常漏写
    exam_examples:
      - { year: 2021, qid: 30, description: "探究影响滑动摩擦力大小的因素" }
      - { year: 2023, qid: 29, description: "探究影响电阻大小的因素" }
      - { year: 2025, qid: 30, description: "控制变量法在力学实验中的应用" }
    fix_method: |
      答题模板：
      "探究xx与xx的关系时，控制xx和xx不变，改变xx，观察xx"
      三步检查法：
      1. 改变了什么？（自变量）→只能改变一个
      2. 观察了什么？（因变量）→对应的测量工具是什么
      3. 不变的是什么？（控制量）→列出所有需要控制的量
      标准：实验设计题15道，每题写出完整的变量分析

  - id: EX-02
    name: 实验记录表格不规范
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      实验数据记录表格有严格要求，常见错误：
      1. 表头没有写物理量名称和单位（如只写"长度"没写"长度/cm"）
      2. 数据没有保留对应的有效数字（如刻度尺读数未估读）
      3. 多次实验的数据没有编号（第1次、第2次...）
      4. 表格缺少必要的列（如缺少平均值列）
    exam_examples:
      - { year: 2022, qid: 28, description: "测量小灯泡电功率实验" }
      - { year: 2024, qid: 29, description: "设计实验记录表格" }
    fix_method: |
      表格规范口诀："表头有量有单位，数据对齐有估读"
      标准表格格式：
      - 表头：物理量名称/单位（如"电压U/V"）
      - 行：实验序号（1、2、3...）
      - 数据：保留与测量工具对应的位数
      - 最后一行或一列：平均值（如需要）
      标准：补全或设计实验表格10道，格式全部规范

  - id: EX-03
    name: 实验误差分析答偏
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      北京中考实验题经常考"测量结果偏大/偏小的原因"，常见错误：
      1. 只回答"操作不规范"而没有具体说明哪里不规范
      2. 分析不出误差偏大还是偏小
      3. 系统误差和偶然误差混淆
      典型场景：
      - 测密度时先测体积再测质量→质量偏大→密度偏大
      - 测电阻时电压表内接→R测偏大；外接→R测偏小
    exam_examples:
      - { year: 2022, qid: 29, description: "密度测量误差分析" }
      - { year: 2024, qid: 28, description: "电阻测量误差分析" }
      - { year: 2025, qid: 29, description: "实验误差来源分析" }
    fix_method: |
      误差分析三步法：
      1. 明确测量公式（如ρ=m/V）
      2. 分析操作导致哪个量偏大或偏小
      3. 代入公式判断最终结果偏大还是偏小
      常考误差场景背诵：
      - 密度：先量体积后称质量→沾水→m偏大→ρ偏大
      - 电阻：电流表内接→多测了电流表电阻→R偏小；不对，安培表内接→电压表测总电压→R偏大
      标准：误差分析专题10道，每题写出完整推导过程

  - id: EX-04
    name: 实验改进方案缺乏针对性
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      实验改进题要求针对具体问题提出改进措施，常见错误：
      1. 改进措施与问题不对应（问的是减小误差，答的是操作步骤）
      2. 改进方案不具体（如"操作更仔细"不是有效答案）
      3. 没有说明改进后能解决什么问题
      4. 实验方案设计时缺少关键步骤
    exam_examples:
      - { year: 2023, qid: 30, description: "实验方案评估与改进" }
      - { year: 2025, qid: 28, description: "实验方案改进建议" }
    fix_method: |
      改进答题模板：
      "原方案存在的问题是xx，改进方法是xx，这样可以xx"
      常见改进方向：
      - 减小误差→多次测量取平均值、换更精确的测量工具
      - 实验现象不明显→增大变化量（如增大温差、增大电压）
      - 控制变量不严格→明确指出需要控制的量及控制方法
      标准：实验改进题10道，每题改进方案有针对性且可操作

  - id: EX-05
    name: 多次实验的目的(求平均/找规律)混淆
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      多次实验有两种不同目的，学生经常答反：
      - 目的一：多次测量取平均值→减小误差（测同一个量）
        例：测固定物体的密度时多次测量质量和体积
      - 目的二：多次实验寻找规律→使结论具有普遍性（改变条件做不同组）
        例：探究杠杆平衡条件时用不同的力和力臂组合
      常见错误：
      1. 探究规律的实验说成"减小误差"
      2. 测量型实验说成"使结论具有普遍性"
    exam_examples:
      - { year: 2021, qid: 28, description: "杠杆平衡条件多次实验目的" }
      - { year: 2023, qid: 28, description: "欧姆定律多次实验目的" }
      - { year: 2024, qid: 30, description: "多次实验目的辨析" }
    fix_method: |
      判断标准：看每次实验条件是否相同
      - 条件相同（测同一个东西多次）→减小误差，取平均值
      - 条件不同（改变自变量做多组）→寻找普遍规律，使结论可靠
      典型分类：
      - 测密度、测电阻→取平均值（减小误差）
      - 探究杠杆平衡、欧姆定律→找规律（普遍性）
      标准：多次实验目的判断15道全对

  - id: EX-06
    name: 实验器材选择与使用错误
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      实验器材的选择和正确使用是基本功，常见错误：
      1. 电流表电压表量程选择不当（偏大浪费精度，偏小烧表）
      2. 天平使用前未调平衡（游码未归零就调平衡螺母）
      3. 温度计读数时视线未与液柱顶端平齐
      4. 弹簧测力计使用前未校零
      5. 刻度尺读数未估读到分度值下一位
    exam_examples:
      - { year: 2022, qid: 27, description: "实验器材使用规范" }
      - { year: 2024, qid: 27, description: "测量工具的正确使用" }
    fix_method: |
      器材使用检查清单：
      - 量程：先估计被测量的大小，选合适量程
      - 校零/调零：弹簧测力计校零、天平游码归零再调平
      - 读数规范：视线垂直刻度面，刻度尺要估读
      - 电表：正接线柱进，负接线柱出；先用大量程试触
      标准：器材使用规范判断题15道，正确率>95%

by_level:
  L0:
    focus: [EX-01, EX-02, EX-05]
    message: "控制变量法、表格规范和多次实验目的是实验题答题基础，必须先掌握"
  L1:
    focus: [EX-01, EX-03, EX-05, EX-06]
    message: "误差分析和器材使用是实验题失分重灾区，结合控制变量法一起突破"
  L2:
    focus: [EX-03, EX-04]
    message: "误差分析的完整推导和实验改进的针对性是实验题拿满分的关键"
