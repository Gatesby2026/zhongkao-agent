# ============================================================
# 易错点：计算题
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：北京中考物理计算题占8分（2道），虽分值不高但区分度大

module: 计算题
module_id: calculation

mistakes:

  - id: CA-01
    name: 公式选用错误
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      计算题第一步就是选对公式，常见错误：
      1. 求液体压强用p=F/S而非p=ρgh
      2. 求浮力时情况不同公式不同，选错公式
      3. 电功和电功率的公式混淆（W=UIt vs P=UI）
      4. 不会根据已知条件选择最合适的变形公式
    exam_examples:
      - { year: 2022, qid: 31, description: "力学计算题" }
      - { year: 2024, qid: 31, description: "压强与浮力计算" }
      - { year: 2025, qid: 31, description: "力学综合计算" }
    fix_method: |
      公式选用决策树：
      - 求压强：固体→p=F/S；液体→p=ρgh
      - 求浮力：称重法F浮=G-F示；公式法F浮=ρ液gV排；平衡法F浮=G物
      - 求电功率：通用P=UI；纯电阻P=I²R或P=U²/R
      做题前先列出已知量，再匹配对应公式
      标准：每种题型至少练5道，每题标注公式选用理由

  - id: CA-02
    name: 单位换算出错
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 1-3分
    description: |
      物理计算必须统一单位，常见换算错误：
      - 1kg = 1000g（不是100g）
      - 1m³ = 10⁶cm³（不是10³cm³）
      - 1L = 10⁻³m³ = 1000cm³
      - 1kW·h = 3.6×10⁶J（不是3600J）
      - 速度：1m/s = 3.6km/h
      常见错误场景：
      1. 密度ρ=1.0×10³kg/m³ 和 ρ=1.0g/cm³ 混用导致结果差1000倍
      2. 面积cm²换算到m²时忘记是10⁻⁴而非10⁻²
    exam_examples:
      - { year: 2021, qid: 32, description: "电学计算（单位换算）" }
      - { year: 2023, qid: 31, description: "力学计算（密度单位）" }
    fix_method: |
      单位换算口诀：
      - 长度：m→cm ×100；cm→m ÷100
      - 面积：m²→cm² ×10⁴（因为100²=10⁴）
      - 体积：m³→cm³ ×10⁶（因为100³=10⁶）
      - 质量：kg→g ×1000
      黄金法则：计算时统一用国际单位（kg, m, m³, Pa, N, W, V, A）
      标准：单位换算专练20道，包括面积和体积换算，全对

  - id: CA-03
    name: 解题步骤不规范(缺公式/代入/单位)
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 1-3分
    description: |
      北京中考物理计算题有严格的书写规范，评分按步给分。
      常见扣分原因：
      1. 没有写出原始公式直接代入数字
      2. 代入数据时没有带单位
      3. 计算结果没有写单位
      4. 没有写出必要的文字说明（如"因为物体漂浮，所以F浮=G"）
      5. 多个公式之间缺少过渡步骤
    exam_examples:
      - { year: 2022, qid: 32, description: "电学计算（步骤规范）" }
      - { year: 2024, qid: 32, description: "计算题评分标准" }
      - { year: 2025, qid: 32, description: "电功率计算（规范解答）" }
    fix_method: |
      标准答题四步：
      1. 写公式（原始公式，不是变形后的）
      2. 代入数据（带单位代入）
      3. 计算结果（带单位）
      4. 答（用文字回答问题）
      示例：
        解：由p=ρgh得
           p = 1.0×10³kg/m³ × 10N/kg × 0.2m
           p = 2000Pa
        答：水对容器底部的压强为2000Pa。
      标准：每道计算题严格按四步写，请老师批改格式

  - id: CA-04
    name: 力学和电学公式混用
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      力学和电学都有"功率"和"功"的概念，公式形式相似但含义不同：
      - 力学：W=Fs, P=Fv, P=W/t
      - 电学：W=UIt, P=UI, P=W/t
      常见错误：
      1. 求电热水壶的电功率时用P=Fv
      2. 求起重机的机械功率时用P=UI
      3. 效率公式中W有和W总分不清力学和电学场景
    exam_examples:
      - { year: 2023, qid: 32, description: "电学与热学综合计算" }
      - { year: 2025, qid: 31, description: "力学综合计算" }
    fix_method: |
      分类记忆法：
      力学公式组：W=Fs → P=W/t=Fv → η=W有/W总
      电学公式组：W=UIt → P=W/t=UI → 纯电阻P=I²R=U²/R
      热学公式：Q=cmΔt（吸放热）, Q=W=I²Rt（电热）
      判断依据：看题目问的是什么场景，力学场景用力学公式，电学场景用电学公式
      标准：力电综合计算题10道，每题标注用的是力学还是电学公式

  - id: CA-05
    name: 浮力综合题漏条件
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      浮力综合计算是北京中考力学计算题的重点，涉及多个物理量。
      常见漏掉的条件：
      1. 物体漂浮→F浮=G物（这个等式很多学生漏用）
      2. 浸没→V排=V物（没有明确写出）
      3. 弹簧测力计读数→F示=G-F浮（多了绳的拉力时漏掉）
      4. 液面变化→漏掉"溢出"或"未溢出"的条件
      5. 密度条件：物体密度与液体密度的比较决定沉浮状态
    exam_examples:
      - { year: 2021, qid: 31, description: "浮力综合计算" }
      - { year: 2023, qid: 31, description: "浮力与密度综合" }
      - { year: 2025, qid: 31, description: "浮力综合计算（含弹簧测力计）" }
    fix_method: |
      浮力综合题解题清单：
      1. 先判断状态：漂浮/悬浮/沉底/被拉住
      2. 列出所有已知量和隐含条件
      3. 隐含条件检查表：
         □ 漂浮/悬浮→F浮=G
         □ 浸没→V排=V物
         □ 有绳拉→F浮=G+F绳 或 F浮=G-F绳
         □ 液面/体积关系→排开液体的体积与容器关系
      4. 选公式→代入→检查单位→验算
      标准：浮力综合计算专题10道，每题列出隐含条件清单

  - id: CA-06
    name: 电学计算题中电路状态分析错误
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      电学计算题通常涉及开关状态变化导致电路结构改变：
      常见错误：
      1. 开关闭合/断开后电路连接方式（串/并联）判断错误
      2. 两种状态下哪些电阻工作没有分析清楚
      3. 两种状态之间的共同量（如电源电压不变）没有利用
      4. 额定电压下的条件没有用上
    exam_examples:
      - { year: 2022, qid: 32, description: "电路状态变化计算" }
      - { year: 2024, qid: 32, description: "开关变化与电路计算" }
    fix_method: |
      电学计算标准流程：
      1. 画出每种开关状态下的等效电路图
      2. 标注每种状态下工作的用电器
      3. 找出两种状态的联系（通常是电源电压U不变）
      4. 列方程求解（常用欧姆定律和串并联特征）
      ⚠️ 额定条件："灯正常发光"意味着灯两端电压=额定电压
      标准：电学计算专题10道，每题画等效电路图

by_level:
  L0:
    focus: [CA-01, CA-02, CA-03]
    message: "公式选对、单位换对、步骤写全，计算题基础分就能拿到"
  L1:
    focus: [CA-01, CA-03, CA-05, CA-06]
    message: "浮力综合和电学计算是计算题主战场，重点练隐含条件和解题规范"
  L2:
    focus: [CA-04, CA-05, CA-06]
    message: "力电综合题和多状态电路题是拿满分的关键，注意公式对应和条件完整"
