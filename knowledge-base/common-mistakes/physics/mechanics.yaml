# ============================================================
# 易错点：力学
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：力学在北京中考物理约占25-30分，是物理最核心的模块

module: 力学
module_id: mechanics

mistakes:

  - id: MC-01
    name: 惯性概念理解错误(惯性≠惯性力)
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      惯性是物体保持原来运动状态的性质，不是力。常见错误：
      1. "物体受到惯性的作用"（惯性不是力，不能说"受到"）
      2. "速度越大惯性越大"（惯性只与质量有关，与速度无关）
      3. 认为静止的物体没有惯性（静止物体也有惯性）
      4. 用"惯性力"来解释现象（初中不存在惯性力的概念）
    exam_examples:
      - { year: 2022, qid: 8, description: "惯性概念辨析" }
      - { year: 2024, qid: 7, description: "惯性与运动状态变化" }
      - { year: 2025, qid: 7, description: "惯性现象解释" }
    fix_method: |
      纠正表述三原则：
      1. 惯性是"性质"不是"力"→不能说"受到惯性"
      2. 惯性只看质量→质量越大惯性越大，与速度无关
      3. 所有物体都有惯性→运动或静止的物体都有
      标准表述模板："由于xx具有惯性，要保持原来的xx状态..."
      标准：改正10句惯性错误表述，再做5年真题惯性题

  - id: MC-02
    name: 浮力计算漏排开液体体积
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      阿基米德原理：F浮=ρ液gV排
      常见错误：
      1. V排用物体总体积代替（物体未完全浸没时V排≠V物）
      2. 漂浮时忘了F浮=G物这个等量关系
      3. 浸没但有绳拉时，F浮仍用ρ液gV物但漏掉绳的拉力
      4. 密度与体积的单位未统一（g/cm³和m³混用）
    exam_examples:
      - { year: 2021, qid: 26, description: "浮力综合计算" }
      - { year: 2023, qid: 25, description: "浮力与密度综合" }
      - { year: 2025, qid: 26, description: "浮力实验与计算" }
    fix_method: |
      浮力解题四步法：
      1. 判断状态：漂浮/悬浮（F浮=G）还是沉底（F浮<G）
      2. 确定V排：完全浸没V排=V物；部分浸没需另求V排
      3. 选公式：F浮=ρ液gV排 或 F浮=G物（漂浮/悬浮）
      4. 统一单位：ρ用kg/m³，V用m³，g=10N/kg
      标准：浮力计算专题15道，每题标明V排的来源

  - id: MC-03
    name: 压强公式F/S中S选错
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      p=F/S中S是受力面积，不是物体的底面积。常见错误：
      1. 砖块不同面放置时用总表面积或某固定面积
      2. 液体压强中误用容器底面积代入p=F/S
      3. 物体放在桌面上但超出桌面时，S取物体底面积还是桌面面积搞混
      关键：S永远是"受力面的面积"（两个接触面中较小的那个）
    exam_examples:
      - { year: 2022, qid: 17, description: "固体压强计算" }
      - { year: 2024, qid: 16, description: "压强比较与计算" }
    fix_method: |
      "谁被压S选谁"原则：
      - 砖压桌子→S=砖与桌子接触的面积
      - 人站冰面→S=鞋底与冰面的接触面积（双脚则×2）
      - 物体超出桌面→S=桌面面积（桌面是受力面）
      液体压强单独记：p=ρgh（与容器底面积无关）
      标准：压强选S专题10道，每题画出受力面并标注

  - id: MC-04
    name: 杠杆力臂画错
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      力臂是支点到力的作用线的垂直距离，不是支点到力的作用点的距离。
      常见错误：
      1. 把支点到作用点的连线当力臂（未作垂线）
      2. 力的方向改变后力臂没有重新画
      3. 画力臂时垂足位置不对
      4. 不会找力的作用线（力沿直线延长）
    exam_examples:
      - { year: 2021, qid: 20, description: "画杠杆力臂" }
      - { year: 2023, qid: 19, description: "杠杆平衡条件应用" }
      - { year: 2025, qid: 20, description: "杠杆力臂与平衡" }
    fix_method: |
      画力臂标准三步：
      1. 找支点O，标出来
      2. 沿力的方向延长画出力的作用线（虚线延长）
      3. 从支点O向作用线作垂线，垂线段就是力臂（标直角符号）
      ⚠️ 力臂是"点到线的距离"，不是"点到点的距离"
      标准：画力臂专项练习15道，每题标出垂足和直角

  - id: MC-05
    name: 功率公式混淆
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      功率相关公式：
      - P=W/t（基本公式）
      - P=Fv（推导公式，匀速直线运动时使用）
      常见错误：
      1. P=Fv中F和v不对应（F不是产生v的那个力）
      2. 求功率时t用的不是做功的时间
      3. 混淆额定功率和实际功率
      4. 机械效率η=W有/W总 与功率搞混
    exam_examples:
      - { year: 2022, qid: 25, description: "功和功率综合计算" }
      - { year: 2024, qid: 25, description: "滑轮组效率与功率" }
    fix_method: |
      公式选用规则：
      - 已知W和t→用P=W/t
      - 已知F和v（匀速）→用P=Fv
      - 求机械效率时→先分清W有和W总，η=W有/W总
      ⚠️ P=Fv要求匀速运动，加速过程不能直接用
      对应关系检查：F和v必须是同一个物体在同一方向上的
      标准：功和功率计算专题10道，每题写出使用公式的理由

  - id: MC-06
    name: 二力平衡条件漏判
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      二力平衡的四个条件：同体、等大、反向、共线。
      常见错误：
      1. 忽略"同体"条件→把作用在不同物体上的力当成平衡力
      2. 相互作用力与平衡力混淆（相互作用力在两个物体上）
      3. 匀速直线运动时漏掉摩擦力，导致受力分析不平衡
    exam_examples:
      - { year: 2022, qid: 9, description: "平衡力与相互作用力辨析" }
      - { year: 2024, qid: 8, description: "受力分析与平衡" }
    fix_method: |
      辨析口诀：
      - 平衡力："同体等大反向共线"→一个物体受到的两个力
      - 相互作用力："异体等大反向共线"→两个物体之间的力
      练习方法：画受力分析图，标出每个力的施力物体
      标准：平衡力与相互作用力判断15道，正确率>95%

  - id: MC-07
    name: 摩擦力方向判断错误
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2分
    description: |
      摩擦力方向与相对运动（趋势）方向相反，不是与运动方向相反。
      常见错误：
      1. 认为摩擦力一定阻碍物体运动（摩擦力可以是动力）
      2. 静摩擦力方向判断不了（需分析相对运动趋势）
      3. 传送带上物体的摩擦力方向判断错误
    exam_examples:
      - { year: 2023, qid: 8, description: "摩擦力方向判断" }
      - { year: 2025, qid: 9, description: "摩擦力与运动分析" }
    fix_method: |
      判断摩擦力方向两步法：
      1. 假设接触面光滑，物体会怎样运动？（这就是相对运动趋势）
      2. 摩擦力方向与这个趋势相反
      例：人走路→脚向后蹬地→相对运动趋势向后→摩擦力向前（摩擦力是动力）
      标准：摩擦力方向判断专题10道全对

by_level:
  L0:
    focus: [MC-01, MC-03, MC-06]
    message: "惯性概念、压强中S的选取、平衡力条件是力学基础，必须先搞清楚"
  L1:
    focus: [MC-02, MC-03, MC-04, MC-05]
    message: "浮力计算、压强、杠杆力臂和功率是中考大题核心，逐一突破"
  L2:
    focus: [MC-02, MC-05, MC-07]
    message: "浮力综合、功率与效率结合、摩擦力分析是冲高分的关键"
