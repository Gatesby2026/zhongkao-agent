# ============================================================
# 易错点：电学
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：电学在北京中考物理约占25-30分，与力学并列为最重要模块

module: 电学
module_id: electricity

mistakes:

  - id: EL-01
    name: 串并联电路特征搞混
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      串联与并联的基本特征：
      - 串联：电流处处相等I=I₁=I₂，电压之和U=U₁+U₂
      - 并联：电压处处相等U=U₁=U₂，电流之和I=I₁+I₂
      常见错误：
      1. 串联电路中误认为电压处处相等
      2. 并联电路中误认为电流处处相等
      3. 串联分压、并联分流的规律记反
      4. 电路图识别错误，把串联看成并联
    exam_examples:
      - { year: 2021, qid: 15, description: "串并联电路判断与计算" }
      - { year: 2023, qid: 16, description: "串并联电路特征" }
      - { year: 2025, qid: 15, description: "电路连接方式辨析" }
    fix_method: |
      判断口诀："串同流分压，并同压分流"
      电路识别方法：
      - 串联：电流只有一条路径（去掉一个，另一个也不工作）
      - 并联：电流有多条分支（去掉一个，另一个照常工作）
      标准：电路识别+特征判断20道，正确率>95%

  - id: EL-02
    name: 欧姆定律I=U/R中R不变条件忘
    frequency: 极高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      欧姆定律I=U/R的适用前提：R是定值电阻（温度不变时R不变）。
      常见错误：
      1. 认为"电压增大电阻也增大"（定值电阻R不随U变化）
      2. 滑动变阻器改变的是接入电阻值，不是电压直接改变电流
      3. 灯丝电阻随温度变化，不能当定值电阻处理
      4. 把R=U/I误解为"电阻由电压和电流决定"
    exam_examples:
      - { year: 2022, qid: 21, description: "欧姆定律探究实验" }
      - { year: 2024, qid: 20, description: "欧姆定律应用" }
    fix_method: |
      核心理解：电阻是导体本身的属性，由材料、长度、横截面积和温度决定
      R=U/I是测量公式，不是决定关系
      做题时先标注哪些电阻是定值，哪些是变量
      标准：欧姆定律概念辨析+计算15道，注意标注R是否为定值

  - id: EL-03
    name: 电功率P=UI和P=I²R适用条件混淆
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      电功率三个公式：
      - P=UI（通用公式，任何电路都适用）
      - P=I²R（纯电阻电路，常用于求串联电路中各电阻功率比）
      - P=U²/R（纯电阻电路，常用于求并联电路中各电阻功率比）
      常见错误：
      1. 非纯电阻电路（如电动机）用P=I²R计算总功率
      2. 串联电路功率比用P=U²/R时R搞反
      3. 额定功率与实际功率混淆，把额定电压下的功率当任何情况都适用
    exam_examples:
      - { year: 2022, qid: 24, description: "电功率计算" }
      - { year: 2024, qid: 24, description: "电功率综合" }
      - { year: 2025, qid: 24, description: "电功率与电能计算" }
    fix_method: |
      公式选用规则：
      - 串联比功率→P=I²R（电流相同比R，P₁/P₂=R₁/R₂）
      - 并联比功率→P=U²/R（电压相同比R，P₁/P₂=R₂/R₁）
      - 有电动机→只能用P=UI
      额定 vs 实际：灯标"220V 100W"→只有在220V时功率才是100W
      标准：电功率公式选用专题10道，每题说明选择理由

  - id: EL-04
    name: 动态电路分析方向错误
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      滑动变阻器滑片移动导致电路各量变化的分析（必考题型）。
      常见错误：
      1. 滑片移动方向与接入电阻变化关系判断错
      2. 串联电路中：总R变→I变→各处U变，推导链条断裂
      3. 并联电路中：支路R变只影响该支路电流，不影响另一支路电压
      4. 电压表和电流表的示数变化方向判断相反
    exam_examples:
      - { year: 2021, qid: 18, description: "动态电路分析" }
      - { year: 2023, qid: 18, description: "滑动变阻器与电路变化" }
      - { year: 2025, qid: 18, description: "动态电路综合分析" }
    fix_method: |
      串联动态分析四步法：
      1. 判断滑片移动→变阻器接入R变大还是变小
      2. 总电阻R总变化方向→总电流I变化方向（I=U总/R总）
      3. 定值电阻上的电压：U₁=IR₁，I变则U₁同方向变
      4. 变阻器上的电压：U₂=U总-U₁
      ⚠️ 并联电路每条支路独立分析，总电压不变
      标准：动态电路分析专题15道，每题写出完整推导链条

  - id: EL-05
    name: 安全用电常识混淆
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      安全用电知识是选择题常考内容，常见错误：
      1. 混淆火线和零线的功能（火线有电压，零线接地）
      2. 开关应接在火线上（断开火线才安全）
      3. 三孔插座的接地线作用不清楚
      4. 触电类型搞混：单线触电 vs 双线触电
      5. 雷雨天安全措施记混
    exam_examples:
      - { year: 2022, qid: 10, description: "安全用电选择题" }
      - { year: 2024, qid: 10, description: "家庭电路安全" }
    fix_method: |
      安全用电口诀：
      - "开关火线串，插座左零右火上接地"
      - 触电急救：先断电源，不能直接用手拉人
      - 家庭电路电压220V，安全电压不高于36V
      重点记忆：保险丝接在火线上，用电器外壳接地保安全
      标准：安全用电选择题10道全对

  - id: EL-06
    name: 电路故障分析判断失误
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2分
    description: |
      电路故障分为断路和短路，判断方法常出错：
      - 断路：某处断开→该支路无电流→串联的用电器都不工作
      - 短路：某个电阻被导线绕过→该电阻无电流→其余正常
      常见错误：
      1. 混淆整体短路（电源短路，危险）和局部短路（某用电器被短路）
      2. 电压表和电流表示数变化分析错误
      3. 断路时电压表有示数的原因不理解
    exam_examples:
      - { year: 2023, qid: 17, description: "电路故障分析" }
      - { year: 2025, qid: 17, description: "电路故障判断" }
    fix_method: |
      故障判断口诀：
      - 断路：电流表无示数，电压表可能有示数（相当于接在电源两端）
      - 短路：被短路的用电器两端电压为0，电流不经过它
      画等效电路图辅助分析：把故障元件去掉或用导线替代
      标准：电路故障分析专题10道，每题画等效电路图

by_level:
  L0:
    focus: [EL-01, EL-05]
    message: "先分清串并联特征和安全用电常识，这是电学入门基础分"
  L1:
    focus: [EL-01, EL-02, EL-03, EL-04]
    message: "欧姆定律、电功率公式选用和动态电路分析是电学核心，必须逐一突破"
  L2:
    focus: [EL-03, EL-04, EL-06]
    message: "电功率综合计算、动态电路推导链和故障分析是高分关键"
