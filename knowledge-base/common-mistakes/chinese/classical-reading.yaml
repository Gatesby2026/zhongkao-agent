# ============================================================
# 易错点：古诗文阅读（文言文+古诗词鉴赏）
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 说明：古诗文阅读约18分，文言文阅读+古诗词鉴赏，课内外结合

module: 古诗文阅读
module_id: classicalReading

mistakes:

  - id: CR-01
    name: 实词古今异义混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      用现代汉语意思直接套用文言实词，导致理解偏差：
      - "妻子"古义是"妻子和儿女"，今义只是"妻子"
      - "走"古义是"跑"，今义是"行走"
      - "可以"古义是"可以凭借"，今义是"能够"
      - "虽"古义多为"即使"，今义是"虽然"
      北京卷实词解释题2-4分，古今异义是高频考点
    exam_examples:
      - { year: 2022, qid: 9, description: "解释文言实词（含古今异义）" }
      - { year: 2024, qid: 9, description: "实词解释四选一" }
    fix_method: |
      建立"古今异义词卡"：
      1. 整理课内文言文中所有古今异义词（约50个）
      2. 每个词写古义和今义，配上原文例句
      3. 做专项练习：给文言句子，选择正确的词义
      重点篇目：《出师表》《桃花源记》《岳阳楼记》《醉翁亭记》
      标准：50个高频古今异义词默写古义，正确率>90%

  - id: CR-02
    name: 虚词用法判断错误
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      北京卷常考"之""其""以""而""于"等虚词的用法辨析：
      - "之"的用法最复杂：代词/助词"的"/取消句子独立性/宾语前置标志
      - "以"：因为/凭借/用来/把
      - "而"：表并列/转折/修饰/承接，学生分不清
      题型多为"下列加点词用法相同的一项"
    exam_examples:
      - { year: 2023, qid: 10, description: "虚词用法辨析（之、以）" }
      - { year: 2024, qid: 10, description: "虚词意义和用法判断" }
    fix_method: |
      "虚词五兄弟"逐个突破：
      1. 每个虚词整理4-6种常见用法，各配2个课内例句
      2. 重点练"之"和"以"：占考题80%以上
      3. 判断方法：先看虚词前后是什么成分（名词/动词/句子）
         "之"后接名词→多为助词"的"；前后都是主谓结构→取消独立性
      标准：做20道虚词辨析题，正确率>85%

  - id: CR-03
    name: 翻译漏关键词
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      文言文翻译题通常4分，每句有2-3个得分点（关键词）：
      - 漏译关键实词（题目暗含的重点词不翻译）
      - 省略成分不补出（主语省略、宾语省略）
      - 特殊句式不调整语序（倒装句直译）
      阅卷按关键词采分，漏一个扣一分
    exam_examples:
      - { year: 2022, qid: 11, description: "翻译文言句子（含省略和倒装）" }
      - { year: 2024, qid: 11, description: "翻译两个文言句子" }
    fix_method: |
      "三步翻译法"：
      1. 画出句中关键词（实词+虚词），逐个翻译
      2. 补出省略成分，用括号标注：（诸葛亮）遂许（刘备）先帝以驱驰
      3. 调整语序：倒装句还原为现代汉语语序
      翻译完自查清单：
      - 每个关键词都译了吗？
      - 省略的主语/宾语补了吗？
      - 句子通顺吗？
      标准：翻译10个课内重点句子，对照标准答案逐词检查

  - id: CR-04
    name: 诗歌情感答偏
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      古诗词鉴赏题必考情感分析，学生常见问题：
      - 只写"表达了作者的思乡之情"，太笼统
      - 把复杂情感简单化：杜甫的诗不只是"忧国忧民"
      - 忽略情感变化：有些诗前半喜后半悲，只答一种
      - 用现代人视角解读，脱离诗歌时代背景
      北京卷要求结合具体诗句分析情感
    exam_examples:
      - { year: 2023, qid: 12, description: "分析诗歌情感" }
      - { year: 2024, qid: 13, description: "结合诗句分析诗人情感" }
    fix_method: |
      "知人论世+关键意象"答题法：
      1. 先看作者和写作背景（知人论世）
      2. 找诗中关键意象和情感词（如"独""愁""空"）
      3. 答题模板：通过___（意象/手法），表达了___（具体情感）
      4. 注意情感的层次性：表面写景→实则抒情→深层寄托
      标准：做10首课内古诗的情感分析题，对照答案找差距

  - id: CR-05
    name: 鉴赏只说手法不分析效果
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 1-2分
    description: |
      诗歌鉴赏题问"赏析某句"时：
      - 只答"运用了比喻的修辞手法"，不说把什么比作什么
      - 只答"借景抒情"，不说写了什么景、抒了什么情
      - 只答"动静结合"，不分析哪是动、哪是静、效果如何
      阅卷标准：手法1分+分析1分+效果/情感1分，缺一扣一
    exam_examples:
      - { year: 2022, qid: 13, description: "赏析诗句（手法+效果）" }
      - { year: 2023, qid: 13, description: "从修辞角度赏析" }
    fix_method: |
      "手法+内容+效果"三段式答题：
      1. 指出手法："这句诗运用了___的修辞/表现手法"
      2. 结合内容分析："把___比作___"或"通过描写___"
      3. 说明效果："生动形象地写出了___，表达了___的情感"
      练习方法：
      - 找10首课内古诗的名句，按三段式写赏析
      - 对照参考答案，检查是否三个层次都写到了
      标准：赏析题答案包含手法+分析+效果三个层次

by_level:
  L0:
    focus: [CR-01, CR-02, CR-03]
    message: "实词虚词和翻译是文言文基本功，每天练一篇课内文言文，积累词汇量"
  L1:
    focus: [CR-03, CR-04, CR-05]
    message: "翻译注意关键词采分，诗歌鉴赏学会三段式答题，古诗文争取14分以上"
  L2:
    focus: [CR-04, CR-05]
    message: "情感分析要有层次感，鉴赏要手法+分析+效果完整，冲16分以上"
