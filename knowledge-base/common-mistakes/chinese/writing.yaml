# ============================================================
# 易错点：写作
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 说明：写作40分，占语文总分40%，是拉开差距最大的模块

module: 写作
module_id: writing

mistakes:

  - id: WR-01
    name: 审题偏题
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 8-15分
    description: |
      审题偏差是作文最致命的失误：
      - 题目要求写"那一刻"，结果写了一整天的流水账
      - 题目是"我终于理解了你"，重心应在"理解"的转变过程，却通篇写事件经过
      - 忽略题目中的限定词："又""终于""其实"都有特定含义
      - 命题作文和半命题作文补题不当，导致写作方向偏离
      北京卷偏题作文直接降两个档次（30分以下）
    exam_examples:
      - { year: 2022, qid: 25, description: "命题作文审题" }
      - { year: 2024, qid: 25, description: "我___的北京（半命题）" }
    fix_method: |
      "三圈审题法"：
      1. 第一圈：圈出题目中的关键词（限定词+核心词）
      2. 第二圈：想3个可选素材，逐一检验是否扣题
      3. 第三圈：确定中心后，检查每段是否都在写这个中心
      半命题作文补题技巧：
      - 补具体不补抽象："我理解的北京"不如"我走过的北京胡同"
      - 补小不补大：小切口更容易写深写透
      标准：拿到题目后花3-5分钟审题，列出关键词和写作提纲再动笔

  - id: WR-02
    name: 选材老套
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 3-5分
    description: |
      阅卷老师每年批阅大量雷同素材，审美疲劳严重：
      - "下雨天妈妈送伞"→出现率极高
      - "考试失利后受到鼓励"→缺乏新意
      - "生病了妈妈背我去医院"→几乎每个考场都有
      - "运动会最后冲刺"→模式化
      这些素材不是不能写，但千篇一律的开头和结尾会被归入二类文
    exam_examples:
      - { year: 2023, qid: 25, description: "半命题作文（选材区分度大）" }
      - { year: 2024, qid: 25, description: "命题作文" }
    fix_method: |
      "三不选"原则：
      1. 不选第一个想到的素材（大家都会想到）
      2. 不选电视/网络上看到的素材（不够真实）
      3. 不选无法写出细节的素材（自己没经历过）
      选材方向建议（北京特色加分）：
      - 胡同里的邻里故事、四合院的生活片段
      - 北京地铁/公交上的观察
      - 学校社团活动中的独特经历
      - 家庭日常中的小事（但要找到独特角度）
      标准：同一个题目准备3个不同素材，选最有细节感的那个

  - id: WR-03
    name: 开头结尾套路化
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      开头结尾直接影响阅卷第一印象和整体评分：
      - 开头套路："在我的记忆中，有一件事让我难忘……"
      - 开头堆砌排比："人生如歌，人生如画，人生如诗……"与正文无关
      - 结尾空喊口号："这件事让我明白了一个道理，我们要……"
      - 结尾生硬点题：最后一段硬塞题目中的关键词
      阅卷老师平均每篇作文看1-2分钟，开头结尾权重极大
    exam_examples:
      - { year: 2022, qid: 25, description: "作文评分（开头结尾占比大）" }
      - { year: 2024, qid: 25, description: "作文" }
    fix_method: |
      开头三种好方法：
      1. 场景开头：直接写一个画面/动作，把读者拉进故事
         "推开那扇掉了漆的木门，一股熟悉的酱香味扑面而来。"
      2. 对话开头：用一句有悬念的对话开场
      3. 倒叙开头：先写结果或感悟，再回到事件
      结尾三种好方法：
      1. 画面定格：用一个意象或场景收束
      2. 首尾呼应：与开头的场景/意象形成对照
      3. 含蓄升华：不直说道理，用意象或动作暗示
      标准：改写自己5篇作文的开头和结尾，每篇至少两个版本

  - id: WR-04
    name: 详略不当
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      600-800字的篇幅内，详略失当导致文章散乱：
      - 铺垫太长：写了300字还没进入主要事件
      - 高潮太短：最关键的转折/冲突只有两三句话就过了
      - 平均用力：三件事各写200字，没有重点
      - 结尾匆忙：字数快到了草草收尾
      北京卷作文要求中心突出，详略得当是重要评分标准
    exam_examples:
      - { year: 2023, qid: 25, description: "作文（详略得当为评分重点）" }
      - { year: 2024, qid: 25, description: "作文" }
    fix_method: |
      "四段分配法"（以650字为例）：
      1. 开头（50-80字）：场景切入，快速入题
      2. 铺垫（150字）：交代背景，制造矛盾
      3. 高潮（300字）：核心事件展开，细节描写集中在这里
      4. 结尾（80-120字）：感悟升华，首尾呼应
      关键原则：
      - 与中心最相关的事件详写（占全文50%以上）
      - 铺垫和过渡简洁，不超过全文30%
      - 写之前先列提纲，标注每段大约字数
      标准：列完提纲后检查高潮部分是否占全文一半以上

  - id: WR-05
    name: 缺少细节描写
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 3-5分
    description: |
      细节描写是区分一类文和二类文的关键：
      - 只有叙述没有描写："妈妈很感动"→感动的表情/动作是什么？
      - 动作描写笼统："他跑过来"→怎么跑？步伐/表情/呼吸？
      - 环境描写缺失：故事发生在哪里？什么天气？什么氛围？
      - 心理描写空洞："我很紧张"→紧张时身体有什么反应？在想什么？
      没有细节的作文读起来像流水账，无法打动阅卷老师
    exam_examples:
      - { year: 2022, qid: 25, description: "作文（细节描写为加分项）" }
      - { year: 2024, qid: 25, description: "作文" }
    fix_method: |
      "五感细节法"（看/听/闻/触/味）：
      1. 每个关键场景至少用两种感官描写
      2. 动作描写要拆解：一个大动作拆成3-4个小动作
         差："他打开了信。"
         好："他撕开信封的一角，停了一下，然后慢慢抽出那张折了两折的信纸。"
      3. 心理描写用内心独白或身体反应代替直接说情绪
         差："我很害怕。"
         好："心脏砰砰跳到了嗓子眼，手心全是汗，攥着试卷的手指微微发抖。"
      练习方法：
      - 每天用5分钟写一个"微场景"（100字），练习细节描写
      - 改写自己旧作文中的3个关键段落，增加细节
      标准：高潮段落中至少有3处具体的细节描写

by_level:
  L0:
    focus: [WR-01, WR-05, WR-02]
    message: "先解决审题和选材问题，再练细节描写，作文从25分冲到30分"
  L1:
    focus: [WR-02, WR-03, WR-05]
    message: "选材避开老套，开头结尾出彩，细节描写是从30分冲35分的关键"
  L2:
    focus: [WR-04, WR-05, WR-03]
    message: "详略得当+细节丰富+开头结尾精致，冲36分以上需要每一段都有亮点"
