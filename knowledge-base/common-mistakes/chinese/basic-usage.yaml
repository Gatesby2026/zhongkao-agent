# ============================================================
# 易错点：基础·运用（字音、字形、成语、病句、默写、书法）
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 说明：基础运用约15分，是语文最容易拿满的模块，也是最不该丢分的

module: 基础·运用
module_id: basicUsage

mistakes:

  - id: BU-01
    name: 字音多音字混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      北京卷每年第1题考字音，多音字是重灾区：
      - "处理"的"处"读 chǔ，"处所"读 chù
      - "差强人意"的"差"读 chā，不是 chà
      - "模样"的"模"读 mú，"模型"读 mó
      学生常凭日常口语习惯选错
    exam_examples:
      - { year: 2023, qid: 1, description: "字音选择题含多音字辨析" }
      - { year: 2024, qid: 1, description: "字音判断（含处、差、模）" }
    fix_method: |
      整理北京中考高频多音字表（约60个），每天读10个：
      1. 把多音字按"义项-读音"配对记忆，不要孤立背读音
      2. 用造句法：每个读音造一个短句
      3. 做近5年北京真题第1题+各区一模二模第1题
      标准：模拟卷字音题连续5次全对

  - id: BU-02
    name: 形近字写错
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      字形题和默写中都会暴露：
      - "急躁"写成"急燥"（火字旁vs足字旁）
      - "凑合"写成"凑和"
      - "部署"写成"布署"
      - "脉络"的"脉"少写一点
      阅卷对错别字零容忍，写错一字扣一分
    exam_examples:
      - { year: 2022, qid: 2, description: "字形选择题" }
      - { year: 2024, qid: 2, description: "易混字形辨析" }
    fix_method: |
      建立"易混字对比本"：
      1. 把形近字成对整理（躁/燥、合/和、部/布）
      2. 用偏旁表义法区分：躁=足旁→跺脚急躁；燥=火旁→干燥
      3. 默写时逐字检查，养成写完回看的习惯
      标准：听写100个易错词，错误率<5%

  - id: BU-03
    name: 成语望文生义
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      北京卷常考成语使用正误判断：
      - "差强人意"误以为是"不如人意"，实际是"大致令人满意"
      - "不刊之论"误以为是"不能发表"，实际是"不可更改的言论"
      - "万人空巷"误以为是"街上没人"，实际是"人们都出来了"
      - "首当其冲"误用为"首先""第一个"
    exam_examples:
      - { year: 2022, qid: 3, description: "成语使用正误判断" }
      - { year: 2023, qid: 3, description: "成语运用（含望文生义干扰项）" }
    fix_method: |
      重点突破60个"望文生义"高频成语：
      1. 先查词典理解本义，再看3个正确用法例句
      2. 自己造一个正确的句子、一个错误的句子，对比记忆
      3. 做专项练习：每题4个成语，判断使用正误
      标准：做30道成语使用题，正确率>85%

  - id: BU-04
    name: 病句搭配不当漏判
    frequency: 高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2分
    description: |
      北京卷病句题常考六大类型，学生最容易漏判搭配不当：
      - 主谓搭配不当："他的精神值得我们学习"（精神不能学习）
      - 动宾搭配不当："提高了认识和水平"（提高认识✓，提高水平✓，但合并后易忽略）
      - 两面对一面："能否成功取决于努力"（能否→两面，努力→一面）
      很多学生只关注语序和成分残缺，忽略搭配问题
    exam_examples:
      - { year: 2023, qid: 4, description: "病句辨析（含搭配不当）" }
      - { year: 2024, qid: 4, description: "病句修改" }
    fix_method: |
      "紧缩法"找搭配问题：
      1. 把长句压缩到主干（主语+谓语+宾语）
      2. 检查主谓是否搭配、动宾是否搭配
      3. 看到"和""以及"并列成分时，分别与谓语/宾语搭配检验
      4. 看到"能否""是否"检查是否两面对一面
      标准：做50道病句题，按六大类型分类总结错因

  - id: BU-05
    name: 默写错别字
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 1-3分
    description: |
      默写题（理解性默写）北京卷约6-8分，学生能背出来但写错字：
      - "海日生残夜"写成"海日升残夜"（生vs升）
      - "长风破浪会有时"的"长"写成"乘"
      - "零落成泥碾作尘"的"碾"写错
      阅卷标准：错一字该空不得分
    exam_examples:
      - { year: 2022, qid: 5, description: "理解性默写（6空）" }
      - { year: 2024, qid: 5, description: "情境默写（含易错字）" }
    fix_method: |
      三轮默写法：
      1. 第一轮：看原文抄写，标出易错字用红笔描
      2. 第二轮：合上书默写，逐字对照批改
      3. 第三轮：只重写第二轮错的句子
      重点关注：同音替换字（生/升、长/乘）、笔画复杂字（碾、簪、箫）
      标准：全部必背篇目默写零错字

  - id: BU-06
    name: 书法书体混淆
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      北京卷常在基础运用板块考书法常识：
      - 楷书和行书分不清（楷书方正规矩，行书有连笔）
      - 隶书特征不清楚（蚕头雁尾、横画长竖画短）
      - 颜真卿、柳公权、欧阳询的字体风格张冠李戴
      - 篆书和隶书混淆（篆书笔画圆转，隶书有波磔）
    exam_examples:
      - { year: 2022, qid: 6, description: "辨认书体（给四幅书法作品选书体名称）" }
      - { year: 2023, qid: 6, description: "书法家与作品对应" }
    fix_method: |
      视觉对比记忆法：
      1. 找5种书体（篆隶楷行草）的经典代表作品图片各2张
      2. 记住每种书体的"一句话特征"：
         篆书→线条圆转如画；隶书→蚕头雁尾；楷书→方正端庄；
         行书→有连笔但可辨认；草书→连绵难辨认
      3. 做图片辨认练习：看字判断书体
      标准：给10幅书法图，正确辨认书体>8幅

by_level:
  L0:
    focus: [BU-01, BU-02, BU-05]
    message: "字音字形和默写是最基础的送分题，每天花15分钟专项训练，力争满分"
  L1:
    focus: [BU-03, BU-04, BU-06]
    message: "成语和病句需要系统整理，书法常识看图记特征，基础运用争取只扣1-2分"
  L2:
    focus: [BU-04, BU-03]
    message: "基础运用应该满分或接近满分，重点关注病句中的隐蔽搭配问题"
