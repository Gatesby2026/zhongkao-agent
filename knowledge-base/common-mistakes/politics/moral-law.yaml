# ============================================================
# 易错点：道德与法律
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：道法是开卷考试，错误核心不是"不知道"而是"翻不到、写不准"

module: 道德与法律
module_id: moralLaw

mistakes:

  - id: ML-01
    name: 道德与法律的区别答混
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      道德靠舆论和内心信念约束，法律靠国家强制力保证实施。
      常见错误：
      - 把"社会舆论谴责"写成法律手段
      - 把"罚款""拘留"等法律制裁写成道德层面
      - 分析题中道德和法律的作用答反，该写"法律底线"时写成"道德要求"
      开卷易错点：书上道德与法律关系一节内容分散，翻书时容易只找到一半
    exam_examples:
      - { year: 2023, qid: 21, description: "道德与法律的关系辨析" }
      - { year: 2024, qid: 19, description: "社会生活中的道德与法治" }
    fix_method: |
      用对比表格记忆（贴在教材对应页）：
      | 维度 | 道德 | 法律 |
      | 产生方式 | 自然形成 | 国家制定或认可 |
      | 实施手段 | 舆论、信念、习惯 | 国家强制力 |
      | 适用范围 | 更广 | 有明确界限 |
      标准：能在30秒内翻到教材中道德与法律关系的对比内容

  - id: ML-02
    name: 权利与义务混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 3-5分
    description: |
      权利是"可以做"，义务是"必须做/不能做"。
      常见错误：
      - 受教育既是权利又是义务——知道结论但解释不清为什么
      - 把"纳税"说成权利，把"选举权"说成义务
      - 材料分析时权利义务的对应关系写反
      开卷易错点：权利义务章节内容多，翻书找具体条目耗时长
    exam_examples:
      - { year: 2022, qid: 20, description: "公民权利与义务关系" }
      - { year: 2024, qid: 21, description: "权利义务相统一" }
    fix_method: |
      在教材"权利与义务"章节做好标签分类：
      - 用红色标签标注"基本权利"页（政治权利、人身自由、社会经济等）
      - 用蓝色标签标注"基本义务"页（维护统一、遵纪守法、纳税等）
      口诀："权利可放弃（部分），义务必履行"
      标准：给10个具体行为，30秒内判断是权利还是义务，正确率100%

  - id: ML-03
    name: 违法行为三类分不清（民事/行政/刑事）
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      三类违法行为的区分是北京中考高频考点。
      常见错误：
      - 把"欠债不还"（民事）说成行政违法
      - 把"闯红灯罚款"（行政）说成刑事犯罪
      - 不清楚"治安管理处罚"属于行政违法而非刑事
      - 分不清"违法"和"犯罪"的关系（犯罪一定违法，违法不一定犯罪）
    exam_examples:
      - { year: 2022, qid: 6, description: "违法行为分类判断" }
      - { year: 2023, qid: 5, description: "行政违法与刑事违法辨析" }
      - { year: 2025, qid: 7, description: "违法行为情境判断" }
    fix_method: |
      三栏对比法（做成卡片夹在教材里）：
      - 民事违法：侵犯私人权益，承担民事责任（赔偿、道歉）
      - 行政违法：违反行政法规，受行政处罚（罚款、拘留、警告）
      - 刑事违法（犯罪）：触犯刑法，受刑罚处罚（管制、拘役、有期徒刑等）
      关键词判断法：看到"赔偿"→民事，看到"罚款拘留"→行政，看到"判刑"→刑事
      标准：做15道违法行为分类题，全对

  - id: ML-04
    name: 法律术语用词不规范
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      开卷考试中抄书但抄得不准确，导致法律术语表述有误。
      常见错误：
      - "违法"和"犯罪"混用（犯罪特指刑事违法）
      - "法律制裁"和"法律处罚"混用
      - "诉讼"写成"起诉"（诉讼包含起诉、审判、执行）
      - 把"行政复议"写成"行政诉讼"，两者途径不同
      开卷陷阱：翻到了相关页面但没仔细看，凭印象写了近似词
    exam_examples:
      - { year: 2023, qid: 22, description: "法律术语规范使用" }
      - { year: 2024, qid: 6, description: "依法维权途径" }
    fix_method: |
      在教材法律部分建立"术语索引"（写在书页空白处）：
      - 违法 vs 犯罪：违法是大概念，犯罪是最严重的违法
      - 行政复议 vs 行政诉讼：复议找上级机关，诉讼找法院
      - 刑罚 vs 处罚：刑罚专指犯罪后果，处罚包括行政处罚等
      答题时务必翻书核对术语原文，不要凭记忆默写
      标准：做5道术语辨析题，用语与教材完全一致

  - id: ML-05
    name: 维权途径顺序和适用场景搞混
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      维权途径包括：协商、调解、仲裁、诉讼等。
      常见错误：
      - 不知道应该先协商再诉讼，直接写"打官司"
      - 混淆"调解"和"仲裁"的区别
      - 把"12315投诉"和"向法院起诉"搞混
      - 忘记"诉讼是维权的最后屏障"这一关键表述
      开卷考试中翻书能找到途径列表，但不清楚具体情境该选哪个
    exam_examples:
      - { year: 2022, qid: 22, description: "消费者维权途径选择" }
      - { year: 2025, qid: 21, description: "未成年人维权" }
    fix_method: |
      维权途径按"成本从低到高"记忆：
      1. 协商（双方谈）→ 成本最低
      2. 调解（第三方介入）→ 如消协、人民调解
      3. 仲裁（仲裁机构裁决）→ 一裁终局
      4. 诉讼（法院判决）→ 最后屏障、最权威
      答题模板："首先可以与对方协商解决；协商不成可以请求__调解；
      也可以依法向法院提起诉讼，诉讼是维护权益的最后屏障。"
      标准：给5个维权情境，正确选择并排序维权途径

  - id: ML-06
    name: 未成年人保护四大保护搞混
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      家庭保护、学校保护、社会保护、司法保护四类保护的主体和内容混淆。
      常见错误：
      - 把"学校不得开除未成年学生"归到家庭保护
      - 把"网吧不得接纳未成年人"归到学校保护（应为社会保护）
      - 司法保护的具体内容说不清
      开卷时四类保护分布在不同页面，翻找对应困难
    exam_examples:
      - { year: 2023, qid: 19, description: "未成年人保护法" }
      - { year: 2025, qid: 20, description: "四大保护情境判断" }
    fix_method: |
      按"谁来保护"分类记忆（在教材上做好分页标签）：
      - 家庭保护→主体是父母/监护人
      - 学校保护→主体是学校和老师
      - 社会保护→主体是社会各界（政府、企业、公共场所等）
      - 司法保护→主体是公安机关、法院、检察院
      答题时先判断"保护主体是谁"，再归类
      标准：做10道四大保护归类题，全对

by_level:
  L0:
    focus: [ML-01, ML-02, ML-06]
    message: "先搞清道德与法律的区别、权利义务的分类，这是选择题基础分"
  L1:
    focus: [ML-02, ML-03, ML-05]
    message: "违法行为分类和维权途径是大题高频考点，翻书要快、术语要准"
  L2:
    focus: [ML-03, ML-04, ML-05]
    message: "拿高分关键是术语规范、维权途径分析到位，答题用语必须和教材一致"
