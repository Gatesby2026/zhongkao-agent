# ============================================================
# 易错点：几何综合（动态几何/最值/变换）
# ============================================================
# 最后更新：2026-04-11
# 说明：几何综合是压轴题核心，通常为Q27或Q28

module: 几何综合
module_id: geometryComprehensive

mistakes:

  - id: GC-01
    name: 动点问题分类讨论不全
    frequency: 极高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      动点在线段/函数图象上运动时，图形的形状会变化，
      需要讨论不同位置下的情况。
      常见遗漏：
      1. 动点在端点或特殊位置时的退化情况
      2. 三角形/四边形的不同构型（如直角可能在不同顶点）
      3. "存在性问题"只找了一种情况就停了
    exam_examples:
      - { year: 2023, qid: 28, description: "动点存在性问题" }
      - { year: 2025, qid: 28, description: "动态几何压轴" }
    fix_method: |
      分类讨论三原则：
      1. 画多个图（至少3个位置：起点附近/中间/终点附近）
      2. 看哪些情况图形性质不同→分类
      3. 每种情况都要算，最后汇总答案
      标准：做3道动点分类讨论题，每题画出所有情况的图

  - id: GC-02
    name: 最短路径问题展开图画错
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      "将军饮马"类问题：找关于某条线的对称点→连线→交点就是最短路径点。
      常见错误：
      1. 找错对称轴（应关于河（直线）做对称，不是关于原点）
      2. 对称点坐标算错
      3. 圆柱/圆锥侧面最短路径要展开，但展开角度算错
    exam_examples:
      - { year: 2022, qid: 16, description: "最短路径（尺规作图）" }
      - { year: 2024, qid: 27, description: "最值问题" }
    fix_method: |
      "将军饮马"标准步骤：
      1. 确定对称轴（题目中的"河""墙""直线"）
      2. 把其中一个点关于对称轴做对称
      3. 连对称点与另一个点→交对称轴的点就是最佳点
      4. 最短距离 = 对称点与另一个点的直线距离
      标准：做5道最短路径题

  - id: GC-03
    name: 旋转变换后的对应关系搞混
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      旋转变换保持形状和大小不变，但对应关系容易搞错：
      1. 旋转中心不变，其他点绕中心转
      2. 旋转角度的方向（顺时针/逆时针）
      3. 旋转前后的对应边、对应角
      压轴题中常出现"旋转后全等三角形的对应关系"
    exam_examples:
      - { year: 2023, qid: 27, description: "旋转变换综合" }
      - { year: 2025, qid: 27, description: "旋转与全等" }
    fix_method: |
      旋转题做题法：
      1. 标出旋转中心（不动的点）
      2. 画出旋转前后的两个图形（用不同颜色）
      3. 标出对应顶点：A→A', B→B'
      4. 利用对应关系写全等
      标准：做3道旋转压轴题，每题画出旋转前后对比图

  - id: GC-04
    name: 面积法/坐标法选错方法
    frequency: 中
    affected_levels: [L2]
    typical_score_loss: 3-5分
    description: |
      压轴题常需要求面积或证明关系，但方法选错会浪费时间：
      - 规则图形（三角形、梯形）→用面积公式
      - 不规则图形→用割补法（大面积减小面积）
      - 有坐标→用坐标法（向量/公式）
      - 证垂直→有时设坐标算斜率比直接几何证明快
    exam_examples:
      - { year: 2024, qid: 28, description: "面积最值综合" }
    fix_method: |
      方法选择指南：
      - 题目给了坐标→优先坐标法
      - 纯几何图形→优先几何法（全等/相似/面积）
      - 求最值→找函数关系式（用面积表达式或距离表达式）
      标准：做3套压轴题，每题先花1分钟选方法再做

  - id: GC-05
    name: 压轴题第一问做对但第二问断联
    frequency: 高
    affected_levels: [L2]
    typical_score_loss: 3-5分
    description: |
      压轴题通常分3小问，递进设计：
      - 第1问：基础计算（正确率>60%）
      - 第2问：用第1问的结论做进一步推导（正确率30-40%）
      - 第3问：综合（正确率<15%）
      很多学生第1问做对了，但第2问不知道要用第1问的结果。
    exam_examples:
      - { year: 2021, qid: 28, description: "三问递进压轴" }
      - { year: 2025, qid: 28, description: "三问压轴" }
    fix_method: |
      压轴题策略：
      1. 第1问一定要做对（这是送分）
      2. 第2问做之前回看第1问的结论→大概率要用
      3. 第3问如果5分钟没思路就跳过（性价比太低）
      ⚠️ 考试时宁可把第1、2问写完美，也不要在第3问上死磕
      标准：做5年压轴题，每题前两问在15分钟内完成

by_level:
  L0:
    focus: []
    message: "几何综合是压轴，L0阶段暂不攻，先把基础几何搞定"
  L1:
    focus: [GC-01, GC-02]
    message: "动点题先画多个图，最短路径要找对称点"
  L2:
    focus: [GC-01, GC-03, GC-05]
    message: "保住压轴前两问的分，第三问有把握再做"
