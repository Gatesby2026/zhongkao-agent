# ============================================================
# 易错点：数与式
# ============================================================
# 最后更新：2026-04-11
# 数据来源：北京中考真题阅卷反馈、菁优网错题统计、教师访谈
# 用途：注入LLM prompt，让规划报告精准指出学生易丢分点

module: 数与式
module_id: numbersAndExpressions

# ================================================================
#  高频易错点（按丢分严重程度排序）
# ================================================================
mistakes:

  - id: NE-01
    name: 绝对值化简忽略分类讨论
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      遇到 |a-b| 或含字母的绝对值，直接去掉绝对值号而不讨论正负。
      例：|a-2| 当 a<2 时应为 2-a，很多学生直接写 a-2。
    exam_examples:
      - { year: 2023, qid: 9, description: "含绝对值的化简求值" }
      - { year: 2025, qid: 11, description: "二次根式结合绝对值" }
    fix_method: |
      口诀："绝对值，先判号，正的不变负的翻"
      练习：写出 |x-3| 在 x≥3 和 x<3 两种情况下的结果
      标准：连续做对10题含字母绝对值化简，零失误

  - id: NE-02
    name: 幂运算法则混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      三大混淆：
      1. 同底数幂相乘 a^m × a^n = a^(m+n) 写成 a^(m×n)
      2. 幂的乘方 (a^m)^n = a^(mn) 写成 a^(m+n)
      3. 底数符号：(-2)^3 = -8 但 -2^3 = -8，(-2)^2 = 4 但 -2^2 = -4
    exam_examples:
      - { year: 2022, qid: 10, description: "整式运算中的幂运算" }
      - { year: 2024, qid: 10, description: "因式分解与幂运算综合" }
    fix_method: |
      制作对照卡片：
      - 乘法→指数加：a^m × a^n = a^(m+n)
      - 乘方→指数乘：(a^m)^n = a^(mn)
      - 括号决定底数：(-2)^2 ≠ -2^2
      每天做5题幂运算辨析，连续5天全对才过关

  - id: NE-03
    name: 因式分解不彻底
    frequency: 高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-3分
    description: |
      只做了一步就停手。典型：
      - 2x²-8 → 2(x²-4) 就停了，没继续分解为 2(x+2)(x-2)
      - x³-x → x(x²-1) 就停了，没继续 → x(x+1)(x-1)
      或者方向错误：用十字相乘但搞错符号。
    exam_examples:
      - { year: 2021, qid: 17, description: "因式分解计算题（解答第1题）" }
      - { year: 2023, qid: 17, description: "因式分解" }
      - { year: 2025, qid: 17, description: "因式分解" }
    fix_method: |
      分解三步检查法：
      1. 先提公因式
      2. 看剩余部分能否用公式（平方差/完全平方）
      3. 检验：展开验算是否等于原式
      标准：做5年真题Q17，全部一次做对

  - id: NE-04
    name: 科学记数法位数搞错
    frequency: 中
    affected_levels: [L0]
    typical_score_loss: 2分
    description: |
      a × 10^n 中 n 的值算错。
      规则：小数点移动到只剩一位整数，移了几位 n 就是几。
      常见错误：0.000035 写成 3.5×10^(-4) 而非 3.5×10^(-5)
    exam_examples:
      - { year: 2021, qid: 2, description: "科学记数法（选择题）" }
      - { year: 2022, qid: 2, description: "科学记数法" }
      - { year: 2024, qid: 3, description: "科学记数法" }
    fix_method: |
      方法：数"跳"了几次小数点
      0.000035 → 3.5，小数点向右跳了5位 → 3.5×10^(-5)
      大数同理：光速 300000000 → 3×10^8
      标准：做10题科学记数法（含大数和小数），全对

  - id: NE-05
    name: 二次根式化简遗漏条件
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      1. √(a²) = |a|（不是 a），当 a<0 时 √(a²) = -a
      2. 分母有理化后忘记化简
      3. 最简二次根式判断错误（被开方数含完全平方因数没提出来）
    exam_examples:
      - { year: 2022, qid: 9, description: "二次根式化简（填空）" }
      - { year: 2025, qid: 9, description: "二次根式有意义的条件" }
    fix_method: |
      记住：√(a²) = |a| 是核心！
      化简步骤：提完全平方数→合并同类根式→分母有理化→检查最简
      标准：做完5年真题中所有二次根式题，错误率<10%

  - id: NE-06
    name: 分式运算通分错误
    frequency: 中
    affected_levels: [L1]
    typical_score_loss: 2分
    description: |
      1. 找最简公分母时遗漏因式
      2. 通分后分子忘记乘对应因式
      3. 约分时只约了部分项（如 (2x+4)/(x+2) 错误地约去2变成 (x+4)/(x+2)）
    exam_examples:
      - { year: 2023, qid: 18, description: "分式化简求值" }
      - { year: 2024, qid: 18, description: "分式运算" }
    fix_method: |
      正确约分：必须是整体因式才能约，不能约单独的项
      (2x+4)/(x+2) = 2(x+2)/(x+2) = 2 ✓
      不能写成 (2x+4)/(x+2) → 约x → (2+4)/2 ✗
      标准：做完5年分式化简题，步骤完整且结果正确

# ================================================================
#  按水平段的易错重点
# ================================================================
by_level:
  L0:
    focus: [NE-01, NE-02, NE-04]
    message: "先搞定绝对值和幂运算，这两个搞混了后面全错"
  L1:
    focus: [NE-03, NE-05, NE-06]
    message: "因式分解必须彻底，二次根式化简是填空必考"
  L2:
    focus: [NE-03, NE-05]
    message: "确保因式分解和根式化简零失误，这是保90的基础"
