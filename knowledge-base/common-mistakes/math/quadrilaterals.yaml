# ============================================================
# 易错点：四边形
# ============================================================
# 最后更新：2026-04-11

module: 四边形
module_id: quadrilaterals

mistakes:

  - id: QD-01
    name: 平行四边形性质与判定混用
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      性质（已知是平行四边形→推出什么）和判定（要证明是平行四边形→需要什么）方向搞反。
      典型错误：要证明ABCD是平行四边形，说"因为对角线互相平分"——
      这没错，但很多学生用成了"因为是平行四边形所以对角线互相平分"（这是性质不是判定）。
    exam_examples:
      - { year: 2022, qid: 20, description: "四边形性质证明" }
    fix_method: |
      判定方法（证明是平行四边形）：
      1. 两组对边分别平行
      2. 两组对边分别相等
      3. 一组对边平行且相等
      4. 两组对角分别相等
      5. 对角线互相平分
      性质（已知平行四边形→推出）：
      对边相等、对角相等、对角线互相平分
      标准：背出5种判定方法，做5道判定题

  - id: QD-02
    name: 特殊四边形判定条件不充分
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      矩形/菱形/正方形的判定是在平行四边形基础上加条件：
      - 矩形 = 平行四边形 + 一个直角（或对角线相等）
      - 菱形 = 平行四边形 + 一组邻边相等（或对角线互相垂直）
      - 正方形 = 矩形 + 邻边相等 = 菱形 + 一个直角
      常见错误：四边都相等就说是正方形（其实只是菱形）
    exam_examples:
      - { year: 2023, qid: 14, description: "特殊四边形判定" }
      - { year: 2025, qid: 15, description: "矩形/菱形判定" }
    fix_method: |
      判定层级图：
      四边形 → 平行四边形 → 矩形/菱形 → 正方形
      每升一级要加一个条件，不能跳级
      标准：做10道"判断四边形类型"的选择题

  - id: QD-03
    name: 中点四边形类型判断错误
    frequency: 中
    affected_levels: [L2]
    typical_score_loss: 2分
    description: |
      任意四边形各边中点连线构成平行四边形。
      对角线关系决定中点四边形类型：
      - 对角线相等→中点四边形是菱形
      - 对角线垂直→中点四边形是矩形
      - 对角线相等且垂直→中点四边形是正方形
      学生容易搞反（对角线相等对应菱形，不是矩形）。
    exam_examples:
      - { year: 2024, qid: 13, description: "中点四边形" }
    fix_method: |
      记忆："相等出菱形，垂直出矩形"（跟直觉相反，要特别记）
      标准：做5道中点四边形题

  - id: QD-04
    name: 多边形内角和公式用错
    frequency: 中
    affected_levels: [L0]
    typical_score_loss: 2分
    description: |
      内角和 = (n-2)×180°，n 是边数。
      常见错误：n 代成角的个数或三角形的个数。
      外角和永远=360°（与边数无关），但学生会用内角和公式算。
    exam_examples:
      - { year: 2021, qid: 3, description: "多边形内角和" }
      - { year: 2023, qid: 3, description: "正多边形内角" }
    fix_method: |
      内角和：(n-2)×180°（n=边数，六边形就是(6-2)×180°=720°）
      外角和：永远360°（不用算，直接写）
      标准：做5道多边形角度题

by_level:
  L0:
    focus: [QD-01, QD-04]
    message: "背熟平行四边形5种判定方法，内角和公式别代错n"
  L1:
    focus: [QD-01, QD-02]
    message: "判定和性质的方向别搞反，特殊四边形判定要分层"
  L2:
    focus: [QD-02, QD-03]
    message: "中点四边形结论容易考选择题，记住'相等出菱形'"
