# ============================================================
# 易错点：完形填空
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：完形填空1篇6道题共6分，是阅读类题型中最考查综合能力的部分

module: 完形填空
module_id: cloze

mistakes:

  - id: CL-01
    name: 只看空格不看全文
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      做完形填空时只关注空格所在句子，不通读全文理解大意。
      常见后果：
      - 选了语法正确但语义不通的选项
      - 前后文有明确暗示但没注意到
      - 特别是首尾句（通常无空格）包含关键信息被忽略
      北京中考完形填空以记叙文为主，情节连贯性很重要
    exam_examples:
      - { year: 2023, qid: 完形1-6, description: "记叙文完形，首段暗示主题" }
      - { year: 2024, qid: 完形1-6, description: "情节前后呼应类完形" }
    fix_method: |
      三遍法：
      1. 第一遍：跳过空格通读全文，理解大意和情感基调
      2. 第二遍：逐题选择，结合上下文语境
      3. 第三遍：代入答案通读检查，看故事是否通顺
      重点关注：首句（定主题）、尾句（揭示主旨/情感转变）
      标准：练习时强制先读全文再做题，记录是否因"没读全文"丢分

  - id: CL-02
    name: 动词辨析忽略语境
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      四个选项都是动词时，只看中文意思而忽略英文搭配和语境。
      常见错误：
      - speak/say/talk/tell 四个"说"不分场景
      - look/see/watch/read 四个"看"混用
      - bring/take/carry/get 四个"拿"不分方向
      北京中考完形填空中动词辨析几乎每年出现
    exam_examples:
      - { year: 2022, qid: 完形3, description: "say/tell辨析" }
      - { year: 2024, qid: 完形2, description: "动词辨析结合语境" }
    fix_method: |
      高频动词辨析整理：
      说：say+内容, speak+语言, talk to/with/about, tell+人+事
      看：look at+目标, see 看见, watch 观看(比赛/电视), read 阅读
      拿：bring 带来, take 带走, carry 搬运, get 去拿
      做题时先看空格前后的搭配词，再结合语境选择
      标准：整理10组常考动词辨析，每组造句区分

  - id: CL-03
    name: 最后一题主旨理解偏差
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 1分
    description: |
      北京中考完形填空最后一道题常考全文主旨或情感态度。
      常见错误：
      - 选了文中某个细节而非全文主旨
      - 被干扰项迷惑（与主题相关但不是核心）
      - 没读懂情感转折（如从消极到积极的变化）
    exam_examples:
      - { year: 2023, qid: 完形6, description: "文章主旨/寓意选择" }
      - { year: 2024, qid: 完形6, description: "情感态度判断" }
    fix_method: |
      主旨题解题策略：
      1. 关注文章首尾段，主旨常在此呼应
      2. 记叙文找"感悟"：作者从经历中学到了什么
      3. 排除法：只是细节的选项不选，要选覆盖全文的
      4. 情感线索词：finally, at last, realized, understood, learned
      标准：做10篇完形，最后一题单独分析，总结主旨判断规律

  - id: CL-04
    name: 固定搭配不熟悉
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      完形填空中常考固定搭配和短语动词，记忆不牢导致选错。
      常见错误：
      - look forward to doing 中 to 后接 doing 而非 do
      - be proud of / be afraid of 介词搭配错
      - give up / put off / take off 等短语动词混淆
      - in the end / at the end of 混用
    exam_examples:
      - { year: 2022, qid: 完形4, description: "固定搭配填空" }
      - { year: 2024, qid: 完形3, description: "短语动词辨析" }
    fix_method: |
      高频固定搭配分类记忆：
      动词短语：give up放弃, put off推迟, take off起飞/脱下, turn on/off开关
      介词搭配：be good at, be interested in, be proud of, be afraid of
      固定句型：It takes sb. some time to do, not...until, so...that
      方法：每天记5个搭配，用造句法加深记忆
      标准：默写50个中考高频搭配，正确率>85%

  - id: CL-05
    name: 形容词/副词情感色彩判断失误
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 1分
    description: |
      完形填空中描述人物情感的形容词/副词选择需要结合情节发展。
      常见错误：
      - 情节明显是积极的但选了 sadly/angrily
      - 不理解 nervous 和 excited 的语境区别
      - 忽略转折词（however/but）后情感发生变化
    exam_examples:
      - { year: 2023, qid: 完形4, description: "情感形容词选择" }
      - { year: 2024, qid: 完形5, description: "情感变化判断" }
    fix_method: |
      情感词分正负两组记忆：
      正面：happy, excited, proud, confident, grateful, surprised
      负面：sad, angry, nervous, worried, disappointed, scared
      中性/转折：confused, curious, surprised（可正可负）
      做题时标注情节线：开头→冲突→转折→结局，情感随情节变化
      标准：做完形时先用箭头标出情感变化线，再选情感词

by_level:
  L0:
    focus: [CL-01, CL-02, CL-04]
    message: "先养成通读全文的习惯，动词辨析和固定搭配是基础得分点"
  L1:
    focus: [CL-01, CL-03, CL-05]
    message: "全文理解能力和主旨判断是提分关键，注意情感色彩词"
  L2:
    focus: [CL-03, CL-05]
    message: "主旨题和情感判断的细微差别是满分的关键"
