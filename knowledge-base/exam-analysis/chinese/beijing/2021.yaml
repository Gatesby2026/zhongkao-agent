# 2021年北京中考语文真题逐题分析
year: 2021
region: 北京
subject: 语文
full_score: 100
duration_minutes: 150
total_questions: 24

structure:
  - section: 基础·运用
    score: 15
    question_range: "1-5"
    description: 语文基础知识与语言运用
  - section: 古诗文阅读
    score: 18
    question_range: "6-12"
    description: 古诗文默写、古诗词鉴赏、文言文阅读
  - section: 名著阅读
    score: 5
    question_range: "13-14"
    description: 名著阅读理解与分析
  - section: 现代文阅读
    score: 22
    question_range: "15-22"
    description: 议论文阅读、记叙文阅读
  - section: 写作
    score: 40
    question_range: "23-24"
    description: 作文二选一

difficulty_distribution:
  easy: 0.30
  medium: 0.50
  hard: 0.20
  estimated_avg_score: 72

domain_distribution:
  基础积累与运用: 0.15
  古诗文阅读: 0.18
  名著阅读: 0.05
  现代文阅读: 0.22
  写作: 0.40

questions:
  # ===== 基础·运用 =====
  - id: 1
    section: 基础·运用
    score: 2
    type: 选择题
    knowledge_point: 字音字形
    description: 根据语境判断加点字读音和书写正确的一项
    difficulty: easy
    key_content: 考查常见易错字音字形，涉及"锲而不舍""鳞次栉比"等词语

  - id: 2
    section: 基础·运用
    score: 2
    type: 选择题
    knowledge_point: 词语运用
    description: 根据语境选择恰当的词语填入横线
    difficulty: easy
    key_content: 近义词辨析，考查语境中词语的准确运用

  - id: 3
    section: 基础·运用
    score: 2
    type: 选择题
    knowledge_point: 病句辨析
    description: 判断语句表达是否有语病
    difficulty: medium
    key_content: 常见病句类型——搭配不当、语序不当、成分残缺

  - id: 4
    section: 基础·运用
    score: 4
    type: 综合题
    knowledge_point: 语言表达·对联/标语
    description: 结合建党百年主题活动，完成语言运用任务
    difficulty: medium
    key_content: 2021年恰逢建党100周年，结合时事考查对联拟写、活动方案等

  - id: 5
    section: 基础·运用
    score: 5
    type: 综合题
    knowledge_point: 书法鉴赏与语言综合
    description: 书法作品赏析及语段修改
    difficulty: medium
    key_content: 辨识书体特征，修改语段中的语病和标点错误

  # ===== 古诗文阅读 =====
  - id: 6
    section: 古诗文阅读
    score: 4
    type: 填空题
    knowledge_point: 古诗文默写
    description: 根据提示默写古诗文名句
    difficulty: easy
    key_content: |
      考查篇目包括：
      - 《次北固山下》"海日生残夜，江春入旧年"
      - 《游山西村》"山重水复疑无路，柳暗花明又一村"
      - 《论语》相关名句
      - 理解性默写：以诗文内容为情境填写

  - id: 7
    section: 古诗文阅读
    score: 2
    type: 选择题
    knowledge_point: 古诗词鉴赏
    description: 阅读古诗，理解诗歌内容与情感
    difficulty: medium
    key_content: 考查诗歌意象、意境、情感表达及写作手法

  - id: 8
    section: 古诗文阅读
    score: 2
    type: 简答题
    knowledge_point: 古诗词鉴赏
    description: 结合诗句分析诗人的思想感情
    difficulty: medium
    key_content: 要求结合具体诗句，分析作者表达的情感

  - id: 9
    section: 古诗文阅读
    score: 2
    type: 选择题
    knowledge_point: 文言文实词
    description: 解释文言文中加点词的含义
    difficulty: easy
    key_content: 考查《醉翁亭记》及对比材料中的文言实词

  - id: 10
    section: 古诗文阅读
    score: 2
    type: 选择题
    knowledge_point: 文言文翻译
    description: 选择文言语句翻译正确的一项
    difficulty: medium
    key_content: 考查关键实词、虚词的翻译准确性

  - id: 11
    section: 古诗文阅读
    score: 3
    type: 简答题
    knowledge_point: 文言文内容理解
    description: 根据两篇文章内容，分析"乐"的内涵
    difficulty: hard
    key_content: 《醉翁亭记》与对比篇目共同探讨"与民同乐"的主题

  - id: 12
    section: 古诗文阅读
    score: 3
    type: 简答题
    knowledge_point: 文言文比较阅读
    description: 比较两篇文章在写作手法或主旨上的异同
    difficulty: hard
    key_content: 对比阅读，要求从内容和写法两方面进行比较分析

  # ===== 名著阅读 =====
  - id: 13
    section: 名著阅读
    score: 2
    type: 选择题
    knowledge_point: 名著内容识记
    description: 根据名著内容判断正误
    difficulty: easy
    key_content: 考查《西游记》《骆驼祥子》《海底两万里》等必读名著的情节、人物

  - id: 14
    section: 名著阅读
    score: 3
    type: 简答题
    knowledge_point: 名著阅读感悟
    description: 结合名著中的人物或情节，谈阅读感悟
    difficulty: medium
    key_content: 要求选择一部名著，联系具体内容谈个人理解和感悟

  # ===== 现代文阅读 =====
  - id: 15
    section: 现代文阅读
    score: 2
    type: 选择题
    knowledge_point: 议论文论点
    description: 概括选文的中心论点
    difficulty: medium
    key_content: 议论文阅读，材料主题关于"创新精神"

  - id: 16
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 议论文论证方法
    description: 分析文中所用的论证方法及其作用
    difficulty: medium
    key_content: 考查举例论证、道理论证、对比论证的辨识与作用分析

  - id: 17
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 议论文论证思路
    description: 简述文章的论证思路
    difficulty: medium
    key_content: 梳理"提出问题—分析问题—解决问题"的论证结构

  - id: 18
    section: 现代文阅读
    score: 2
    type: 简答题
    knowledge_point: 议论文拓展延伸
    description: 结合生活实际，补充一个事实论据
    difficulty: medium
    key_content: 开放性题目，要求论据与论点一致且表述规范

  - id: 19
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 记叙文内容概括
    description: 梳理文章情节，概括主要事件
    difficulty: medium
    key_content: 记叙文阅读，文章以亲情或成长为主题

  - id: 20
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 记叙文词句赏析
    description: 品味文中画线句子的表达效果
    difficulty: medium
    key_content: 从修辞手法、描写方法、用词精妙等角度赏析

  - id: 21
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 记叙文人物形象
    description: 分析文中人物的性格特征
    difficulty: medium
    key_content: 结合具体情节和描写手法分析人物形象

  - id: 22
    section: 现代文阅读
    score: 3
    type: 简答题
    knowledge_point: 记叙文主题理解
    description: 结合全文，谈谈对文章主题的理解
    difficulty: hard
    key_content: 深层理解文章主旨，要求联系全文内容进行阐述

  # ===== 写作 =====
  - id: 23
    section: 写作
    score: 40
    type: 作文
    knowledge_point: 想象类作文
    description: '"共和国，我为你拍照"——设想2049年国庆100周年时的场景'
    difficulty: medium
    key_content: |
      题目一：想象类作文
      要求以"共和国，我为你拍照"为题，想象2049年祖国百年华诞时的情景
      需要展现想象力，同时体现爱国主题，字数600-800字

  - id: 24
    section: 写作
    score: 40
    type: 作文
    knowledge_point: 记叙类作文
    description: '"我的探险之旅"——讲述一次探索经历'
    difficulty: medium
    key_content: |
      题目二：记叙类作文
      以"我的探险之旅"为题写一篇文章
      可写实际经历，也可虚构，要求有真情实感，字数600-800字
