# ============================================================
# 2025年北京市中考语文真题 — 结构概要
# ============================================================
# 说明: 本文件仅记录试题结构、知识点与模块映射，不含原题文本
# 满分：100分  时长：150分钟

year: 2025
district: 北京市
exam_type: 真题
subject: 语文
full_score: 100
duration_minutes: 150
total_questions: 25
structure: 基础·运用(14分) + 古诗文阅读(17分) + 名著阅读(5分) + 现代文阅读(24分) + 写作(40分)

questions:
# === 一、基础·运用 (共14分) ===
- id: 1
  type: 选择
  score: 2
  description: 字音字形辨析——考查课标附录常用字表中易混淆的读音和字形
  knowledge_points: [字音辨析, 字形辨析]
  module: basicUsage
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 2
  type: 选择
  score: 2
  description: 词语/成语辨析——根据语境选择最恰当的词语或判断成语使用正误
  knowledge_points: [词语辨析, 成语运用]
  module: basicUsage
  difficulty: 基础
  recommended_for: [L0, L1, L2, L3]

- id: 3
  type: 选择
  score: 2
  description: 语句连贯与病句——在语段中选择衔接恰当的句子或辨别语病
  knowledge_points: [语句衔接, 病句辨析]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

- id: 4
  type: 综合
  score: 4
  description: 综合性学习——围绕传统文化或社会热点主题，完成海报撰写、发言稿等任务
  knowledge_points: [语言运用, 综合性学习, 传统文化]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

- id: 5
  type: 综合
  score: 4
  description: 书法鉴赏与文化常识——鉴赏楷书/行书碑帖特征，考查文学文化常识
  knowledge_points: [书法鉴赏, 文学常识, 文化常识]
  module: basicUsage
  difficulty: 中档
  recommended_for: [L1, L2, L3]

# === 二、古诗文阅读 (共17分) ===
- id: 6
  type: 填空
  score: 4
  description: 古诗文默写——课标61篇必背篇目名句填写，含直接默写和理解性默写
  knowledge_points: [古诗文默写, 理解性默写]
