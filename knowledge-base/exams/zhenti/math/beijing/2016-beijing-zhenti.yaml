    （2）点$P,Q$ 是BC 边上的两个动点（不与$B,C$ 重合），点P 在点Q 的左侧，且$AP = AQ$ ，点Q 关于直线AC 的对称点为M ，连接$AM, PM.$

    ①依题意将图2补全；

    ②小茹通过观察、实验，提出猜想：在点$P,Q$ 运动的过程中，始终有$PA = PM.$ 小茹把这个猜想与同学们进行交流，通过讨论，形成了证明该猜想的几种想法：

    想法1：要证$PA = PM$ ，只需证$\triangle APM$ 是等边三角形。

    想法2：在BA 上取一点N ，使得$BN = BP$ ，要证$PA = PM$ ，只需证$\triangle ANP \cong \triangle PCM$.

    想法3：将线段BP 绕点B 顺时针旋转$60^\circ$ ，得到线段BK ，要证$PA = PM$ ，只需证$PA = CK$ ，$PM = CK$.

    ……

