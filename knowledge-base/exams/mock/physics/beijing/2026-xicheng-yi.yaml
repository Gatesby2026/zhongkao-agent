  stem: '小萱把一个装有适量水的柱形容器放在水平桌面上，将一个空的薄壁玻璃杯放在水面，

    如图所示，当杯子和容器中的水静止时，水面到容器底的距离为$h_{1}$:她将杯口倾斜，从容器中舀取一些水到杯中，然后松开手，当杯子和容器中的水静止时，她观察到装水的杯子仍漂浮在水面，此时容器中水面到容器底的距离为$h_{2}$。请利用力学知识分析推理判断:前、后两次容器中水面到容器底的距离$h_{1}$与$h_{2}$的大小关系。

    请阅读《江门中微子实验》并回答26题。

    江门中微子实验

    2025年11月19日，中国江门中微子实验正式运行后的首个重大科研成果发布，其对中微子相关参数的测量精度比此前实验的最好记录提高1.5~1.8倍，为探知物理世界打开了新窗口。

    中微子实验项目为何选址广东省江门市呢?原来，核反应堆是地球上产生中微子最集中的区域，广东阳江和台山两大核反应堆全面建成后总功率居世界第一，可提供双倍的实验样本。江门距两地核电站的距离均在53km左右，与最佳实验站址的理论区域吻合。实验选址的地下有着完整的花岗岩，地质条件优越而稳定，实验装置位于地下700m，深厚的山体和岩层相当于过滤器，可使宇宙射线的强度大幅降低，使实验能得到纯净的中微子信号。因此，江门成为目前进行高精度中微子实验的理想之地。

    北京市西城区九年级统一测试试卷 物理 2026.4第6页(共8页)

    江门中微子实验装置的主体是一个有效质量为2万吨、直径35.4m的球形有机玻璃容器(如图所示)，是世界上能量精度最高、规模最大的液体闪烁体中微子探测器。探测器厚度仅个 120mm，虽然“薄如蛋壳”，却有极强的坚固性。科研人员采用本体粘接工艺，让263块玻璃板浑然一体。有机玻璃容器内部灌装2万吨液体闪烁体，用于捕捉中微子发出的光。玻璃容器外设有直径41.1m的低放射性不锈钢网架，是国内最大的单体不锈钢结构。整个网架在安装过程中不允许使用焊接技术，12万套高强度螺栓铆接全靠人工完成，建造难度极大。网架上安装了约4.5万只光电倍增管，这些椭圆形“黄金瞳”可将中微子的光信号转换成电信号并放大1000万倍后形成电子脉冲，成为科学家们研究的数据。为完成此项实验，国内多家企业和研究所联合攻关，成功研制出世界上探测效率最高的光电倍增管，为实验项目建设助力。

    为科学家们研究的数据。为完成此项实验，国内多家企业和研究所联合攻关，成功研制出世界上探测效率最高的光电倍增管，为实验项目建设助力。

    该实验项目通过测量来自广东阳江和台山两处核电站的中微子，开展对各类中微子、暗物质间接探测等前沿领域的研究，将对地球物理、天体物理乃至宇宙学的研究做出重大贡献。

