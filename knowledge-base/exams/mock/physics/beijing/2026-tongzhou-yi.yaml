- id: 12
  type: 单选
  score: 2
  stem: '两名同学用相同的电源、弹簧和电阻棒R分别设计了电子秤模型，电路如图甲、乙所示。电源电压恒为6V，弹簧被压缩的长度ΔL与作用在秤盘上压力F的关系如图丙；粗细均匀的电阻棒R长为5cm，竖直放置，a、b两端间的阻值为5Ω。滑片P可随秤盘升降在电阻棒上移动（摩擦不计），秤盘空载时均位于a端。他们利用表盘上已有的刻度线将电表改装成质量表，当滑片P从a端向下滑动3cm时，均能实现电表指针偏转到最大刻度位置；为了防止弹簧被过度压缩损坏弹簧和电表，弹簧两侧安装了挡板。R1、R2为定值电阻，电流表量程为0～0.6A，分度值为0.02A；电压表量程为0～3V，分度值为0.1V。g取10N/kg，下列说法正确的是（     ）


    ![](figures/image37.png)'
  options:
    A: 图甲中，R1阻值为3Ω
    B: 图甲中，滑片P在R的中点时，电压表示数为1.5V
    C: 图乙中，电流表示数为0.5A时，秤盘里物体的质量为1kg
    D: 图乙中，电流表表盘上每一小格代表的质量相同
  answer: C
  solution: '已知电阻棒总长5cm，总电阻5Ω，因此单位长度电阻为1Ω/cm；由丙图得ΔL与F成正比，关系为$F = 10 \Delta L$

    A．图甲中整个电阻棒全部接入电路，当滑片P从a端向下滑动3cm时，电压表满偏，电压表的示数是3V，此时电阻棒连入电路的电阻$R_{a P} = 3 \text{cm} \times 1 \Omega/\text{cm}=\text{3}\Omega$

    电路中的电流$I = \frac{U_{\text{V}}}{R_{a P}} = \frac{\text{3V}}{\text{3}\Omega} =\text{1A}$

    电路的总电阻$R = \frac{U}{I} = \frac{6 \text{V}}{1 \text{A}} = 6 \Omega$

    R1阻值为$R_{1} = R - R_{a b} = 6 \Omega - 5 \Omega = 1 \Omega$，故A错误；

    B．滑片在中点时，电压表在电路中看作断路，电阻棒整个电阻连入电路，电路中的电流不变，为1A，电压表示数为$\left(U^{''}\right)_{\text{V}} = I \left(R^{''}\right)_{a p} = 1 \text{A} \times \frac{1}{2} \times 5 \Omega = 2 . 5 \text{V}$，故B错误；

    C．图乙中，整个电阻棒全部接入电路，当滑片P从a端向下滑动3cm时，电阻棒的阻值$R_{P b} = 5 \Omega - 3 \Omega = 2 \Omega$

    电流表满偏，电流表的示数是0.6A，总电阻$R_{总} = \frac{U}{I_{满}} = \frac{\text{6V}}{\text{0}.\text{6A}} =\text{10}\Omega$

    R2的阻值$R_{2} = R_{} - R_{P b} = 10 \Omega - 2 \Omega = 8 \Omega$

    电流为0.5A时，总电阻$\left(R^{''}\right)_{总} = \frac{U}{I^{''}} = \frac{\text{6V}}{\text{0}.\text{5A}} =\text{12} \Omega$

    则$R_{P b} = 12 \Omega - 8 \Omega = 4 \Omega$

    对应电阻棒的长度是4cm，压缩长度为$\Delta L = 5 \text{cm} - 4 \text{cm}=\text{1cm}$

    由图丙可知，对应的压力是10N，物体的重力是10N，物体的质量$m = \frac{G}{g} = \frac{10 \text{N}}{10 \text{N}/\text{kg}} = 1 \text{kg}$，故C正确；

    D．图乙电路中的电流$I = \frac{U}{R_{2} + \left(\right. 5 \Omega - \Delta L \cdot 1 \Omega / \text{cm} \left.\right)}$

    ΔL与质量m成正比，但I与ΔL不是正比关系，因此电流变化量相同时，对应的质量变化量不同，即电流表每一小格代表的质量不同， 故D错误。

    故选C。'
