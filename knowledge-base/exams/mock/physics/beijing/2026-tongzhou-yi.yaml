- id: 8
  type: 单选
  score: 2
  stem: '图中是摄影师拍摄同一个速滑运动员在赛前热身、赛中快速过弯和赛后庆祝的三个瞬间。关于照片中涉及到的物理知识，下列说法正确的是（     ）


    ![](figures/image11.png)'
  options:
    A: 图甲和图丙所示的瞬间，运动员对冰面的压强相等
    B: 图乙中，运动员由于受到惯性的作用而快速运动
    C: 图乙中，正在过弯的运动员所受合力不为零
    D: 图丙中，运动员受到的重力和地面对他的支持力是一对相互作用力
  answer: C
  solution: "A．运动员对冰面的压力等于自身重力，同一运动员重力不变，因此甲、丙中运动员对冰面的压力相等；图甲运动员单脚着地，受力面积$S_{甲}$小于图丙双脚着地的受力面积$S_{丙}$，根据压强公式$p = \\frac{F}{S}$，压力$F$相同时，受力面积$S$不同，因此二者对冰面的压强不相等，故A错误； \nB．惯性是物体本身固有的性质，不是力，不能说“受到惯性的作用”，只能说物体“具有惯性”，故B错误；\
    \ \nC．正在过弯的运动员运动方向不断改变，运动状态发生改变，因此所受合力不为零，故C正确； \nD．图丙中，运动员受到的重力和地面对他的支持力作用在同一物体上，不是一对相互作用力，故D错误。\n故选C。"
