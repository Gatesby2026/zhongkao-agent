    C: 制酒过程中，锡锅里的水内能不变
    D: 混合蒸气遇冷凝结成酒是液化现象
  answer: C
  solution: 'A．制酒作坊充满酒味，是酒精分子在空气中不停地做无规则运动，属于扩散现象，故A正确；

