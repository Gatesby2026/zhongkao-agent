- id: 20
  type: 实验探究
  score: 3
  stem: '小芳用下面的方法测量某种液体的密度。她先用调好的天平测出烧杯A和所盛水的总质量为50g，然后用细线拴着一个小球，将其浸没在烧杯A内的水中，不触碰烧杯，天平平衡后如图甲所示，此时天平的测量值为________g。接着她用天平测出烧杯B和所盛待测液体的总质量为50g，再用细线拴着擦干后的同一个小球浸没在烧杯B内的液体中，不触碰烧杯，天平平衡后如图乙所示。已知$\rho_{水} ＝ 1 \times
    10^{3} \text{kg}/\text{m}^{\text{3}}$，则待测液体的密度为________$\text{kg}/\text{m}^{\text{3}}$。


    ![](figures/image120.png)'
  answer: ''
  solution: '①. 62    ②. $1 . 2 \times 10^{3}$


    详解：甲图中砝码总质量为$50 \text{g} + 10 \text{g} = 60 \text{g}$，游码对应刻度为$2 \text{g}$，因此总测量值为$60 \text{g} + 2 \text{g} = 62 \text{g}$

    小球浸没不接触烧杯时，根据力的作用是相互的，小球对液体向下的压力等于小球受到的浮力，大小等于天平增加的重力，即$F_{浮} = \Delta m g$；水中：增加的质量$\Delta m_{水} = 62 \text{g} - 50 \text{g} = 12 \text{g}$

    由阿基米德原理，得$\rho_{水} g V_{球} = \Delta m_{水} g$，即$V_{球} = \frac{\Delta m_{水}}{\rho_{水}}$​​

    根据乙图天平读数可得总质量为$64 . 4 \text{g}$，增加的质量$\Delta m_{液} = 64 . 4 \text{g} - 50 \text{g} = 14 . 4 \text{g}$

    同理可得$\rho_{液} g V_{球} = \Delta m_{液} g$，代入$V_{球}$​整理可得$\rho_{液} = \frac{\Delta m_{液}}{\Delta m_{水}} \rho_{水} = \frac{14 . 4 \text{g}}{12 \text{g}} \times 1 \times 10^{3} \text{kg}/\text{m}^{3} = 1 .
    2 \times 10^{3} \text{kg}/\text{m}^{3}$'
