  stem: 对《岳阳楼记》中描述的光现象，从物理学角度解释正确的是（     ）
  options:
    A: “锦鳞游泳”：诗人看见的水中鱼，是由于光的折射形成的鱼的实像
    B: “皓月千里”：诗人看见的皓月，是由于月球反射太阳光形成的太阳的实像
    C: “静影沉璧”：诗人看见的水中月，是由于光的反射形成的月亮的虚像
    D: “浮光跃金”：诗人看见浮动的水面上闪烁着金光，是光的折射现象
  answer: C
  solution: 'A．看见水中的鱼，是鱼反射的光从水中斜射入空气中发生折射，人逆着折射光线看到的是鱼的虚像，不是实像，故A错误；

    B．皓月是月球反射太阳光，我们看到的月球是它反射的光进入人眼形成的视觉，不是太阳的实像，故B错误；

    C．平静的水面相当于平面镜，水中的月亮是光的反射形成的平面镜成像，属于月亮的虚像，故C正确；

    D．“浮光跃金”是太阳光在波动的水面上发生反射形成的现象，不是光的折射，故D错误。

    故选C。'
