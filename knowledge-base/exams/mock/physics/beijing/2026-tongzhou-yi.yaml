    B: 阻力臂逐渐减小
    C: 动力臂逐渐增大
    D: 裁纸刀是省力杠杆
  answer: D
  solution: 'A．阻力是纸张阻碍裁纸刀转动的力，方向垂直刀身向上，故A错误；

