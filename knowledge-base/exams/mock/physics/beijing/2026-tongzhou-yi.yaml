- id: 14
  type: 多选
  score: 2
  stem: '小芳用图中所示的装置比较液体比热容大小。烧瓶的规格、液体$\text{A}$与$\text{B}$的质量和初温均相同。通电相同时间，液体$\text{A}$与$\text{B}$升高的温度分别为$\Delta t_{\text{A}}$和$\Delta t_{\text{B}}$，吸收的热量为$Q_{\textit{A}}$和$Q_{\text{B}}$，比热容为$c_{\text{A}}$和$c_{\text{B}}$。不计热量损失，下列说法正确的有（     ）


    ![](figures/image60.png)'
  options:
    A: 若$\Delta t_{\text{A}} ＞ \Delta t_{\text{B}}$，则$Q_{\text{A}} ＞ Q_{\text{B}}$
    B: 若$R_{甲} ＜ R_{乙}$，则$Q_{\textit{A}} < Q_{\textit{B}}$
    C: 若$R_{甲} ＝ R_{乙}$、$\Delta t_{\text{A}} ＞ \Delta t_{\text{B}}$，则$c_{\text{A}} ＜ c_{\text{B}}$
    D: 若$R_{甲} > R_{乙}$、$\Delta t_{\text{A}} < \Delta t_{\text{B}}$，则$c_{\text{A}} > c_{\text{B}}$
  answer: BCD
  solution: 'A．根据$Q = c m \Delta t$可知，吸收热量的多少不但与升高的温度有关，还和比热容有关，当$\Delta t_{\text{A}} ＞\Delta t_{\text{B}}$时， $Q_{\text{A}}$ 不一定大于$Q_{\text{B}}$，故A错误；

    B．由图可知，甲乙两电阻串联在电路中，根据串联电路电流的特点可知，通过电阻的电流相等，由$Q = I^{2} R t$得，电阻大的，产生的热量多，即液体吸收的热量多，当$R_{甲} < R_{乙}$时，$Q_{\text{A}} < Q_{\text{B}}$，故B正确；

    C．当$R_{甲} = R_{乙}$时，由$Q = I^{2} R t$得，$Q_{\text{A}} = Q_{\text{B}}$，由$\text{c} = \frac{Q}{m \Delta t}$可知，$Q$、$m$相同时，$c$与$\Delta t$成反比，当$\Delta t_{\text{A}} > \Delta t_{\text{B}}$时，$c_{\text{A}} < c_{\text{B}}$，故C正确；

    D．当$R_{甲} > R_{乙}$时，由$Q = I^{2} R t$得，$Q_{\text{A}} > Q_{\text{B}}$，由$\text{c} = \frac{Q}{m \Delta t}$可知，当$m$相同，且$\Delta t_{\text{A}} < \Delta t_{\text{B}}$时，$\frac{Q_{\text{A}}}{m \Delta t_{\text{A}}}
    > \frac{Q_{\text{B}}}{m \Delta t_{\text{B}}}$，即$c_{\text{A}} > c_{\text{B}}$，故D正确。

    故选BCD。'
