- id: 25
  type: 计算题
  score: 4
  stem: '图甲中，电源电压恒为3V，小灯泡的额定电压为2.5V。通过小灯泡的电流IL与它两端电压UL的关系如图乙所示。求：


    ![](figures/image146.png)


    （1）小灯泡的额定功率。


    （2）当电路中的电流为0.1A时，滑动变阻器在1min内消耗的电能。'
  answer: ''
  solution: '（1）0.625W      （2）15J


    详解：（1）

    由图甲可知，小灯泡与滑动变阻器串联，小灯泡正常发光时两端电压等于额定电压，即$U_{\text{L}} = U_{额} = 2 . 5 \text{V}$

    由图乙$I_{\text{L}} - U_{\text{L}}$关系图像可得，此时小灯泡的额定电流$I_{额} = 0 . 25 \text{A}$。小灯泡的额定功率$P_{额} = U_{额} I_{额} = 2 . 5 \text{V} \times 0 . 25 \text{A}=\text{0}.\text{625W}$


    （2）

    当电路电流$I = 0 . 1 \text{A}$时，串联电路电流处处相等，因此通过滑动变阻器的电流也为0.1A，由图乙可得，此时小灯泡两端电压$U_{\text{L}} = 0 . 5 \text{V}$。根据串联电路的电压规律，总电压等于各部分电压之和，可得滑动变阻器两端电压$U_{滑} = U - U_{\text{L}} = 3 \text{V} - 0 . \text{5V}=\text{2}.\text{5V}$

    滑动变阻器消耗的电能$W = U_{滑} I t = 2 . 5 \text{V} \times 0 . 1 \text{A} \times 60 \text{s}=\text{15J}$'
