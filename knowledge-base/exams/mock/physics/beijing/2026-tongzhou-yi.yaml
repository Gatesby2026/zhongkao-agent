- id: 11
  type: 单选
  score: 2
  stem: '如图所示，质量为$70 \text{kg}$的工人站在水平台上，用竖直向上$500 \text{N}$的拉力$F$将质量为$80 \text{kg}$的重物匀速竖直提升$4 \text{m}$，用时$40 \text{s}$。绳重不计，$g$取$10 \text{N} / \text{kg}$。关于此过程，下列说法正确的是（     ）


    ![](figures/image25.png)'
  options:
    A: 动滑轮受到的重力为$200 \text{N}$
    B: 额外功为$800 \text{J}$
    C: 拉力$F$的功率为$50 \text{W}$
    D: 工人对工作台的压力为$200 \text{N}$
  answer: B
  solution: 'A．重物的重力$G = m g = 80 \text{kg} \times 10 \text{N}/\text{kg} = 800 \text{N}$

    由图可知，动滑轮上承担物重的绳子段数是2段，若不及摩擦，则动滑轮受到的重力$G_{动} = 2 F - G = 2 \times 500 \text{N} - 80 \text{0N}=\text{200N}$

    但题干未说明不计摩擦，故A错误；

    BC．不计绳重，拉力端移动距离$s = n h = 2 \times 4 \text{m}=\text{8m}$

    总功$W_{总} = F s = 50 \text{0N} \times \text{8m}=\text{4000J}$

    有用功$W_{有} = G h = m_{物} g h = 8 \text{0kg}\times\text{10N}/\text{kg} \times \text{4m}=\text{3200J}$

    额外功$W_{额} = W_{总} - W_{有} =\text{4000J}- 3200 \text{J} = 800 \text{J}$

    拉力功率$P = \frac{W_{总}}{t} = \frac{\text{4000J}}{\text{40s}} =\text{100W}$

    故B正确，C错误；

    D．工人受到重力、绳的拉力和工作台的支持力，工作台的支持力$F_{支持} = G_{人} + F = m_{人} g + F = 70 \text{kg} \times 10 \text{N}/\text{kg} + 500 \text{N} = 1200 \text{N}$

    工人对平台的压力与支持力是相互作用力，大小相等，工人对平台的压力是1200N，故D错误。

    故选B。'
