- id: 15
  type: 多选
  score: 2
  stem: '如图所示，小桐用透明矿泉水桶（下部为圆柱形）做了一个计时模型。桶底中心位置有个高为1cm的圆台形凸起，边缘有一出水管；用质量为40g、底面积为10cm2、高为8cm的长方体木块（不吸水）作为浮舟；用一把与木块的上表面垂直粘接的直尺作为漏箭，其质量为20g。调试时，将模型放在水平桌面上，先堵住出水管，放入浮舟后加水，当水面到达A点停止加水，浮舟静止后，直尺30cm刻度线与桶口上沿齐平；再打开出水管，看到随着液面下降出水管的水流速度慢慢减小；当浮舟接触到圆台的顶部时浮舟停止下降，此时液面处为B点，且直尺50cm刻度线恰好与桶口上沿齐平。液面从A降到B用时10min。直尺在下降过程中保持竖直，不计胶的质量，$\rho_{水}
    = 1 . 0 \times 10^{3} \text{kg} / \text{m}^{3}$，$g$取$10 \text{N} / \text{kg}$。下列说法正确的有（     ）


    ![](figures/image92.png)'
  options:
    A: 木块的密度为$0 . 75 \text{g} / \text{cm}^{3}$
    B: B点与A高度差为20cm
    C: B点到桶底的距离为7cm
    D: 水面在A时打开出水管，经过5min，直尺40cm刻度线与桶口上沿齐平
  answer: BC
  solution: 'A．由$\rho = \frac{m}{V}$可得木块密度$\rho_{木} = \frac{m_{木}}{V_{木}} = \frac{40 \text{g}}{10 \text{cm}^{2} \times 8 \text{cm}} = 0 . 5 \text{g}/\text{cm}^{3}$，故A错误。

    B．从A点降到B点直尺下降距离$\Delta h = 50 \text{cm} - 30 \text{cm} = 20 \text{cm}$

    由图可知木块和直尺组成的整体漂浮在水中。液面从A点降到B点总重力不变，则受到的浮力不变，排开水的体积也不变。则B点与A点的高度差等于直尺下降距离20cm，故B正确。

    C．木块和直尺组成的整体漂浮在水中，所受浮力$F_{浮} = \rho_{水} g V_{排} = G_{总} = m_{总} g = \left(0,.,04,\text{g},+,0,.,02,\text{g}\right) \times 10 \text{N}/\text{kg} = 0 . 6 \text{N}$

    则$V_{排} = \frac{F_{浮}}{\rho_{水} g} = \frac{0 . 6 \text{N}}{1 . 0 \times 10^{3} \text{kg}/\text{m}^{3} \times 10 \text{N}/\text{kg}} = 0 . 6 \times 10^{- 4} \text{m}^{\text{3}} = 60 \text{cm}^{3}$

    木块浸入的深度$\Delta h = \frac{V_{排}}{S_{木}} = \frac{60 \text{cm}^{3}}{10 \text{cm}^{2}} = 6 \text{cm}$

    液面下降到B点时木块接触到高度为1cm圆台的顶部此时水面高度即B点到桶底的距离$h_{B} = 6 \text{cm} + 1 \text{cm} = 7 \text{cm}$，故C正确。

    D．液面从A点降到B点下降20cm，用时10min，因为随着液面下降出水管的水流速度慢慢减小，即前5分钟下降距离大于后5分钟。所以前5分钟下降距离大于10cm。初始液面高度30cm，则5分钟后直尺40cm刻度线在桶口上沿的下方，故D错误。

    故选BC。'
