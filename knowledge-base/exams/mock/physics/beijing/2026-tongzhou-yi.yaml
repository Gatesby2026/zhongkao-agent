- id: 9
  type: 单选
  score: 2
  stem: '下图是乡村运动会的情境。关于对物体是否做功，下列说法正确的是（     ）


    ![](figures/image17.png)'
  options:
    A: 图甲中，篮球离开手在空中运动的过程中，手对篮球仍在做功
    B: 图乙中，将米袋提起的过程中，人对米袋做功
    C: 图丙中，举竿保持不动的过程中，人对竿做功
    D: 图丁中，推着小车沿水平路面运动的过程中，小车所受的重力对小车做功
  answer: B
  solution: '做功的两个必要因素：①作用在物体上有力；②物体在力的方向上移动了距离，二者缺一不可。

    A．篮球离开手在空中运动时，手对篮球没有作用力，不满足做功条件，手对篮球不做功，故A错误；

    B．将米袋提起的过程中，人对米袋施加了向上的力，且米袋在力的方向上移动了距离，满足做功条件，人对米袋做功，故B正确；

    C．举竿保持不动时，竿没有在力的方向上移动距离，不满足做功条件，人对竿不做功，故C错误；

    D．小车沿水平路面运动时，重力方向竖直向下，小车在重力的方向（竖直方向）没有移动距离，重力对小车不做功，故D错误。

    故选B。'
