- id: 10
  type: 单选
  score: 2
  stem: 生物小组用电池驱动的无人机观察野生动物活动。关于该无人机，下列说法正确的是（  ）
  options:
    A: 加速升空，动能增大
    B: 匀速飞行，重力势能增大
    C: 空中悬停，机械能减小
    D: 匀速下降，机械能不变
  answer: A
  solution: 'A．加速升空时，无人机的质量不变，速度增大，根据动能的影响因素（质量越大、速度越大，动能越大），动能增大，故A正确；

    B．匀速飞行时，无人机的质量和速度不变，动能不变，但题目未说明高度变化情况，若水平匀速飞行，高度不变，重力势能不变，所以重力势能不一定增大，故B错误；

    C．空中悬停时，无人机处于静止状态，速度为零，动能为零；高度不变，重力势能不变。机械能等于动能与重力势能之和，因此机械能不变，故C错误；

    D．匀速下降时，无人机的质量和速度不变，动能不变，高度减小则重力势能减小，机械能等于动能与重力势能之和，因此机械能减小，故D错误。

    故选A。'
