- id: 26
  type: 计算题
  score: 4
  stem: '如图所示，某观光载人飞艇由充满氦气的气囊、动力装置和吊舱组成。气囊总体积为$300 \text{0m}^{\text{3}}$，其体积不随海拔高度而变化，内部密闭的氦气密度为$0 . 18 \text{kg}/\text{m}^{\text{3}}$；动力装置是两台电力驱动的发动机，可提供竖直向上或竖直向下的推力；吊舱非密闭，有观景窗。某次飞行，飞艇总质量为3480kg（含乘员），当日无风，其海拔高度h对应的空气密度ρ空见下表，除气囊外不考虑其他部分产生的浮力，g取10
    N/kg，求此飞艇：


    ![](figures/image157.png)


    | h/m | 0 | 200 | 400 | 600 | 800 | 1000 | 1200 |

    |---|---|---|---|---|---|---|---|

    | ρ空/（$\text{kg}/\text{m}^{\text{3}}$） | 1.205 | 1.181 | 1.160 | 1.136 | 1.114 | 1.092 | 1.070 |


    （1）在海拔1200m高空中悬停时，发动机提供的推力F的大小和方向。


    （2）能最大程度节省电能的悬停海拔高度。'
  answer: ''
  solution: '（1）$2700 \text{N}$，方向竖直向上      （2）$400 \text{m}$


    详解：（1）

    飞艇总重力$G_{飞艇} = m_{飞艇} g = 3480 \text{kg} \times 10 \text{N}/\text{kg} = 34800 \text{N}$

    由表中数据可知，海拔1200m处空气密度为$1 . 070 \text{kg}/\text{m}^{3}$，飞艇受到的浮力$F_{浮} = \rho_{空} g V_{排} = 1 . 070 \text{kg}/\text{m}^{3} \times 10 \text{N}/\text{kg} \times 3000 \text{m}^{\text{3}} =\text{32100N}$

    在海拔1200m高空中悬停时，飞艇受到竖直向下的重力、竖直向上的浮力和竖直向上的推力，发动机提供的推力$F = G_{飞艇} - F_{浮} = 34800 \text{N} - 32100 \text{N}=\text{2700N}$


    （2）

    最节省电能的悬停海拔最大程度节省电能时，发动机推力为0，不需要输出动力，此时满足浮力等于总重力，即$\left(F^{''}\right)_{浮} = G_{飞艇}$

    由阿基米德原理和$G = m g$得到$\left(\rho^{''}\right)_{空} g V = m_{飞艇} g$

    空气密度$\left(\rho^{''}\right)_{空} = \frac{m_{飞艇}}{V} = \frac{\text{3480kg}}{\text{3000m}^{\text{3}}} = 1 . 160 \text{kg}/\text{m}^{\text{3}}$

    由表中数据可知，对应的悬停海拔高度是400m。'
