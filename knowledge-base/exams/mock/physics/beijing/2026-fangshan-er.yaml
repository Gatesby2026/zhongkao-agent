- id: 14
  type: 多选
  score: 2
  stem: 下列说法正确的是（　　）
  options:
    A: 一切物体都具有内能
    B: 铁块很难被压缩，说明分子间存在斥力
    C: 扫地时飞扬的尘土，说明分子在不停地运动
    D: 长时间紧压在一起的铅片和金片互相渗入，是由于发生了扩散现象
  answer: ABD
  solution: 'A．内能是物体内部所有分子热运动的动能和分子势能的总和，一切物体的分子都在永不停息地做无规则运动，因此一切物体都具有内能，故A正确；

    B．铁块很难被压缩，是因为当铁块被压缩时，分子间距离减小，分子间的斥力表现得更为显著，说明分子间存在斥力，故B正确；

    C．飞扬的尘土是肉眼可见的宏观固体小颗粒，尘土飞扬属于宏观物体的机械运动，不是分子的运动，故C错误；

    D．不同物质的分子彼此进入对方的现象叫做扩散现象，长时间紧压在一起的铅片和金片互相渗入，是分子无规则运动导致的扩散现象，故D正确。

    故选ABD。'
