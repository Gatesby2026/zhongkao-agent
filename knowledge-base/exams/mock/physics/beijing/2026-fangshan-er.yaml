  stem: '物理实践活动中，小华将定值电阻和压敏电阻串联，设计并制作了一个简易电子秤，其电路如图所示。电源电压保持不变，已知压敏电阻的阻值大小与压力大小成反比，质量显示仪由电压表改装而成。托盘放在压敏电阻上（图中未画出），压敏电阻受到的压力等于托盘和被测物体的总重力，托盘的质量为[公式]。当托盘上未放物体时，电压表的示数为$0.75V$
    ，当托盘上所放物体的质量为$0.8kg$ 时，电压表的示数为$2.25V$ 。定值电阻阻值为[公式]，电压表量程为0~3V，[公式]取[公式]，下列说法正确的是（　　）


    ![](figures/image71.png)'
  options:
    A: '[公式]是压敏电阻'
    B: 电源电压为[公式]
    C: 该电子秤称量物体质量的最大值为[公式]
    D: 当称量的物体质量变大时，电路消耗的总功率变大
  answer: BD
  solution: "A．物体质量越大，压力越大，压敏电阻阻值与压力大小成反比，因此压敏电阻阻值越小；已知电压表示数（测[公式]电压）随质量增大而增大。若[公式]是压敏电阻，压力越大[公式]阻值越小，根据串联分压规律，[公式]两端电压会减小，与电压表示数增大矛盾，说明[公式]是定值电阻，[公式]才是压敏电阻，故A错误；\n\
    B．由于压敏电阻阻值与压力成反比，因此压敏电阻阻值与压力乘积k为固定值，托盘不放物体时，总压力${F}_{1}=0.2kg×10N/kg=2N$ \n此时电流${I}_{1}=\\frac{0.75V}{6Ω}=0.125A$ \n电源电压$U=0.125A×(6Ω+\\\
    frac{k}{2N})$ \n放[公式]物体时，总压力${F}_{2}=(0.2kg+0.8kg)×10N/kg=10N$ \n此时电流${I}_{2}=\\frac{2.25V}{6Ω}=0.375A$ \n因此电源电压$U=0.375A×(6Ω+\\\
    frac{k}{10N})$ \n联立两式解得$k=60Ω·N$ ，[公式]，故B正确；\nC．电压表最大示数为[公式]，最大电流${I}_{max}=\\frac{{U}_{max}}{{R}_{1}}=\\frac{3V}{6Ω}=0.5A$\
    \ \n总电阻${R}_{总}=\\frac{U}{{I}_{max}}=\\frac{4.5V}{0.5A}=9Ω$ \n此时压敏电阻${R}_{2}=9Ω-6Ω=3Ω$ ，总压力$F=\\frac{k}{{R}_{2}}=\\frac{60Ω·N}{3Ω}=20N$\
    \ \n总质量${m}_{总}=\\frac{20N}{10N/kg}=2kg$ ，被测物体最大质量$m=2kg-0.2kg=1.8kg≠2kg$ \n故C错误；\nD．称量物体质量变大时，压力增大，压敏电阻阻值减小，电路总电阻减小，电源电压不变，由[公式]可知，电路消耗的总功率变大，故D正确。\n\
    故选BD。"
