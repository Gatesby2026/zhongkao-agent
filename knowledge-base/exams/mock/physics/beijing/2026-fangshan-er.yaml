- id: 24
  type: 科普阅读
  score: 4
  stem: '请阅读《八达岭太阳能热发电实验电站》并回答问题。


    八达岭太阳能热发电实验电站


    八达岭太阳能热发电实验电站位于北京市延庆区，它是我国及亚洲首座兆瓦级塔式太阳能热发电实验电站，由119米高的集热塔和100面定日镜（即平面镜）组成镜场，如图所示。每一个定日镜都由自动跟踪太阳光装置控制，以便准确地将太阳光反射后会聚到高塔顶部的接收器上。发电时，100个镜面会把太阳光反射到集热塔上，安装在塔顶的吸热器吸收太阳能，形成的高温把锅炉内的工作物质水加热成高温高压蒸气，高温高压蒸气通过管道一部分推动汽轮机发电，一部分输送到储热器把内能储存起来，实现无日照时供电，整个发电过程不消耗不可再生资源，没有污染，绿色可持续。按照八达岭当地的太阳辐射资源计算，电站总发电规模为$1MW$
    ，年发电量约195万度，实现二氧化碳等污染物减排。


    ![](figures/image133.png)


    请根据上述材料，回答下列问题：


    （1）当太阳光照射到定日镜上时，会发生光的_________现象。


    （2）塔式光热发电系统主要是把太阳能最终转化为__________能。


    （3）假设有一束太阳光最初沿图中的[公式]方向照射到定日镜[公式]上，反射光沿[公式]方向射到接收器上，经过一段时间后，这束太阳光在纸面内沿着逆时针方向转过[公式]后照射到定日镜[公式]上的[公式]点，若想让其反射光仍沿[公式]方向射向接收器，则定日镜[公式]将以[公式]点为轴沿逆时针方向转过________。


    （4）若八达岭太阳能热发电实验电站年发电量全部由火力发电站提供，火力发电的发电效率为[公式]，需要完全燃烧__________千克标准煤。（已知标准煤热值$q=3.0×{10}^{7}J/kg$ ）'
  answer: ''
  solution: "（1）  反射    （2）  电    （3）  [公式]      （4）  $6.5×{10}^{5}$\n\n详解：（1）\n定日镜是平面镜，作用是改变光的传播方向，太阳光照射到定日镜上时，会发生光的反射现象。\n\
    \n（2）\n塔式光热发电过程中，太阳能先转化为内能，再转化为汽轮机的机械能，最终通过发电机转化为电能，因此太阳能最终转化为电能。\n\n（3）\n根据光的反射定律，反射角等于入射角。入射光线逆时针转过[公式]后，若要反射光线仍沿原方向射出，入射角总共改变[公式]，法线需要逆时针转过[公式]；由于定日镜与法线始终垂直，因此定日镜需要沿逆时针转过[公式]。\n\
    \n（4）\n年发电量$W=195×{10}^{4}kW·h=195×{10}^{4}×3.6×{10}^{6}J=7.02×{10}^{12}J$ \n根据效率公式[公式]，可得煤燃烧放出的总热量[公式]，结合放热公式[公式]，得需要煤的质量$m=\\\
    frac{W}{ηq}=\\frac{7.02×{10}^{12}J}{0.36×3.0×{10}^{7}J/kg}=6.5×{10}^{5}kg$"
