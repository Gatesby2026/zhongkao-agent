  answer: D
  solution: "A．小球在甲杯中漂浮，根据漂浮条件和阿基米德原理，小球重力 $G={F}_{浮甲}={G}_{排1}={m}_{1}g$ \n小球在乙杯沉底时，$G>{F}_{浮乙}={m}_{2}g$ ，即 $G>{m}_{2}g$\
