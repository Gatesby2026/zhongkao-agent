    （2）I$\underset{\cdot}{保温}=\frac{P_{\text{保温}}}{U}=\frac{55W}{220V}=0.25A$

    $R_{1} = \frac{220V}{5A} = 44\Omega$

    保温状态下$R_{1}$两端的电压$U_{1}=I_{保温}R_{1}=0.25A×44\Omega=11V$

    所以保温状态下$R_2$两端的电压$U_2=U-U_1=220V-11V=209V$

