  stem: '示例:

    取管底一小液片为研究对象，其受到左侧水的压力$F_{1}$和右侧水的压力$F_{2}$，设液片面积为S，左侧水面高度为$h_{1}$。右侧水面高度为$h_{2}$。(1分)

    则$p_1=\rho g h_1，p_2=\rho g h_2$

    所以$F_{1}=p_{1}S=\rho g h_{1}S,F_{2}=p_{2}S=\rho g h_{2}S(1分)$

    因为不论玻璃管缓缓提高还是缓缓下降，最终液体静止，即$F_{1}$=$F_{2}$

    所以$h_1=h_2$(1分)

    即两根玻璃管的液面仍在同一个水平面。'
