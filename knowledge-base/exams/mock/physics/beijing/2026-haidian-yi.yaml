  stem: '盛有盐水的薄壁杯子静止在水平桌面上,杯子上宽下窄、杯口直径大于杯底直径、底面积为S。如图所示,将一个鸡蛋轻放入杯内的盐水中(盐水未溢出),鸡蛋悬浮。与放入鸡蛋前相比,鸡蛋悬浮时,盐水对杯底的压力增大了$\Delta F_1$,杯子对桌面的压力增大了$\Delta
    F_2$。请分析并判断$\Delta F_1$与$\Delta F_2$的大小关系。

    请阅读《马赫环》并回答24题。

    马赫环

    “马赫环”是一种出现在超声速气流中的现象。当飞机或火箭发动机尾喷管喷出的气体速度超

    “马赫环”是一种出现在超声速气流中的现象。当飞机或火箭发动机尾喷管喷出的气体速度超

    过1倍声速(1倍声速也称为1马赫)、且喷出气体的压强与外界大气压不平衡时，导致气体反复经历膨胀与压缩的过程，飞机或火箭的尾焰中就会出现一串等间距、交替排列的暗环和亮环，称为马赫环，如图甲所示。马赫环常见于飞机发动机、火箭发动机的地面试车或高空飞行中。

    当发动机尾喷管喷出的超声速气体的压强高于外界大气压时，超声速气体会向外急剧膨胀，该过程中超声速气体的压强和温度骤降、亮度减弱，形成暗环。随着超声速气体继续向外膨胀，其压强会低于外界大气压，此时外界空气将反向

    压缩超声速气体，使其压强和温度骤升、再次点燃超声速气体中未完全燃烧的燃料，使其燃烧发光，形成亮环。这样，一暗一明交替出现，就形成了一串马赫环，如图乙所示。

    当发动机尾喷管直径为D，喷出的气体速度是声速的M倍时(M>1)，通常情况下，发动机尾喷管后能观察到的相邻两马赫环之间的间距$\lambda$满足:$\lambda=0.85D\sqrt{M^2-1}$。工程师可将观察到的马赫环的间距和个数，作为判断发动机工作状态的重要依据。

    24.根据上述材料回答下列问题。

    (1)马赫环形成的条件之一是尾喷管喷出的气体速度_。

    (2)形成“暗环”的过程中，向外膨胀的超声速气体的_转化为机械能。

    (3)某飞机飞行时，若发动机尾喷管直径不变，工程师观察到其尾喷管后相邻两马赫环之间的间距变小，可判断出此时喷出的气体速度_(选填“变大”“变小”或“不变”)。

    (4)请结合文中马赫环的形成原理分析:若火箭在太空中(真空环境)飞行时，其发动机尾焰的速度为5马赫，则在其尾焰中_(选填“能”或“不能”)形成马赫环。'
  figure: 2026-haidian-yi/figures/q23.png
  answer: ''
  solution: '设鸡蛋所受的重力为G，鸡蛋悬浮时，排开盐水的体积为V排，杯内液面上升的高度为△h

    由于液面上升，导致杯底压强增加:△p=ρ盐水g△h

    盐水对杯底压力的增加量:△F1=△pS=p盐水g△hS

    杯子对桌面压力的增加量:△F2=G=F 浮=p 盐水gV排

    由于杯子上宽下窄，所以△hS<V排

    因此，△F1<△F2(3分)

