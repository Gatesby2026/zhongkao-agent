  stem: '请阅读《马赫环》并回答问题。


    马赫环


    “马赫环”是一种出现在超声速气流中的现象。当飞机或火箭发动机尾喷管喷出的气体速度超过1倍声速（1倍声速也称为1马赫）、且喷出气体的压强与外界大气压不平衡时，导致气体反复经历膨胀与压缩的过程，飞机或火箭的尾焰中就会出现一串等间距、交替排列的暗环和亮环，称为马赫环，如图甲所示。马赫环常见于飞机发动机、火箭发动机的地面试车或高空飞行中。


    当发动机尾喷管喷出的超声速气体的压强高于外界大气压时，超声速气体会向外急剧膨胀，该过程中超声速气体的压强和温度骤降、亮度减弱，形成暗环。随着超声速气体继续向外膨胀，其压强会低于外界大气压，此时外界空气将反向压缩超声速气体，使其压强和温度骤升、再次点燃超声速气体中未完全燃烧的燃料，使其燃烧发光，形成亮环。这样，一暗一明交替出现，就形成了一串马赫环，如图乙所示。


    当发动机尾喷管直径为[公式]，喷出的气体速度是声速的[公式]倍时[公式]，通常情况下，发动机尾喷管后能观察到的相邻两马赫环之间的间距[公式]满足：[公式]。工程师可将观察到的马赫环的间距和个数，作为判断发动机工作状态的重要依据。


    ![](figures/image191.png)


    （1）马赫环形成的条件之一是尾喷管喷出的气体速度________；


    （2）形成“暗环”的过程中，向外膨胀的超声速气体的________转化为机械能；


    （3）某飞机飞行时，若发动机尾喷管直径不变，工程师观察到其尾喷管后相邻两马赫环之间的间距变小，可判断出此时喷出的气体速度________（选填“变大”“变小”或“不变”）；


    （4）请结合文中马赫环的形成原理分析：若火箭在太空中（真空环境）飞行时，其发动机尾焰的速度为5马赫，则在其尾焰中________（选填“能”或“不能”）形成马赫环。'
  answer: ''
  solution: '（1）  超过1倍声速    （2）  内能    （3）  变小    （4）  不能


    详解：（1）

    根据材料第一段内容可知，马赫环的形成条件为：喷出气体速度超过1倍声速，且喷出气体压强与外界大气压不平衡，因此条件之一为喷出气体速度超过1倍声速。


    （2）

    形成暗环的过程中，超声速气体向外膨胀对外做功，自身内能减小，因此是气体的内能转化为膨胀的机械能。


    （3）

    根据材料给出的马赫环间距公式[公式]，尾喷管直径[公式]不变时，间距[公式]变小，说明[公式]（喷出气体速度和声速的比值）变小，因此喷出气体的速度变小。


    （4）

    根据马赫环形成原理，气体膨胀后压强低于外界大气压时，需要外界空气反向压缩气体，才能形成交替排列的暗环、亮环；而太空是真空环境，没有外界空气，无法完成反向压缩的过程，因此不能形成马赫环。'
