    C．最低水位触发条件，拉力10 N，要求总浮力固定为2 N，B需要浸入水中的深度固定为5 cm。该条件只和B的浸入深度有关，与 A、B间绳长无关，因此最低水位完全不变。

    最高水位触发条件，拉力4 N，要求总浮力固定为8 N，A、B总浸入深度固定为20 cm。当 A、B间细线缩短时，B完全浸没后，水位不用上升到原来的高度，圆柱体A就会提前进入水中，更快达到总浸入20 cm的要求，因此最高水位降低。故C错误。

    D．圆柱体积[公式]​完全不变，物体重力[公式]，重力与材料密度成正比。

    原单个圆柱密度[公式]

    新材料密度[公式]​，因此单个圆柱新重力[公式]

    A、B 整体新总重力[公式]

    受力平衡公式更新为[公式]​

    开关的触发拉力数值完全不变：

    1.最低水位触发（[公式]）,所需浮力[公式]

    浮力需求变大，圆柱体B需要浸入水中的深度更深，最低水位升高。

    2.最高水位触发（[公式]），所需浮力[公式]

    整体总浮力需求变大，A、B 需要的总浸入水中深度更大，最高水位升高。

    所以，更换材料后桶内最低水位、最高水位均升高。

    故D正确。

    故选BD。

