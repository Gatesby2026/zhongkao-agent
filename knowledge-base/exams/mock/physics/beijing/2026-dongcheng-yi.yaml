  stem: '小东利用某金属弹簧设计了一款测力计，该弹簧所受压力F与其压缩量ΔL的关系如图甲所示。将弹簧接入如图乙所示的电路，M、N为绝缘挡板，N固定不动，当手用力缓慢推M时，会带动固定在弹簧左端的滑片P一起移动，移动过程中滑片P始终与电阻R保持接触良好。当弹簧处于原长时，滑片P恰好处于电阻R的最左端。已知电源两端的电压为6 V，定值电阻R0的阻值为10 
    Ω，电阻R最大阻值为20  Ω，总长度为4  cm，电阻R的阻值与其长度成正比，电压表测量范围为0~3  V，弹簧的电阻忽略不计。下列说法正确的是（　　）


    ![](figures/image71.png)'
  options:
    A: 闭合开关，当滑片向右移动时，电压表示数变大
    B: 当电压表的示数为2  V时，弹簧所受压力的大小为100  N
    C: 在保证电路安全的前提下，该测力计能够测量的最大推力为400 N
