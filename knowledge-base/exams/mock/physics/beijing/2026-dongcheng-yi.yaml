- id: 25
  type: 计算题
  score: 4
  stem: '实验室有一个规格为“3 V  0.3 A”的小灯泡（不考虑温度对灯丝电阻的影响）、规格为“20 Ω  0.5 A”的电位器、两端电压为4.5 V的电源、开关、导线。小东用以上器材连接了如图所示的电路，制作了简易可调光台灯。求：


    ![](figures/image135.png)


    （1）小灯泡的额定功率。


    （2）为保证电路安全，电位器接入电路的最小阻值。'
  answer: ''
  solution: '（1）  0.9$0 . 3 \text{A}$      （2）  5$0 . 5 \text{A}$


    详解：（1）

    由题意得，小灯泡的额定功率$I_{最大} = 0 . 3 \text{A}$


    （2）

    由电路可知，小灯泡与电位器串联，为保证电路安全，电路电流不能超过元件允许的最大电流。

    已知小灯泡允许的最大电流为$U = 4 . 5 \text{V}$，电位器允许的最大电流为$U_{滑} = U - U_{额} = 4 . 5 \text{V} - 3 \text{V} = 1 . 5 \text{V}$，因此电路的最大安全电流$I
    = \frac{U}{R}$，对应电位器接入的最小阻值。

    电源电压$R_{小} = \frac{U_{滑}}{I_{最大}} = \frac{1 . 5 \text{V}}{0 . 3 \text{A}} = 5 \Omega$，根据串联电路电压规律，电位器两端电压：$\Delta p = p_{0}
    - p_{内} = 1 . 0 \times 10^{5} \text{Pa} - 3 \times 10^{4} \text{Pa} = 7 \times 10^{4} \text{Pa}$

    根据欧姆定律$p = \frac{F}{S}$，得电位器接入的最小阻值$F = \Delta p S = 7 \times 10^{4} \text{Pa} \times 0 . 04 \text{m}^{2} = 2800 \text{N}$'
