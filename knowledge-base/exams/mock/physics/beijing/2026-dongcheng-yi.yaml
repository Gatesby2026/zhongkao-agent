  solution: '首先正确分析电路：滑动变阻器$R$滑片左侧部分电阻串联接入电路，电压表测量滑片左侧电阻两端的电压，弹簧压缩量$\Delta L$等于滑片右移的距离，即等于滑片左侧电阻的长度。$R$总阻值$20 \Omega$，总长度$4
    \text{cm}$，因此$R$单位长度阻值为$\frac{20 \Omega}{4 \text{cm}} = 5 \Omega/\text{cm}$

    A．当滑片向右移动时，滑动变阻器R接入电路的阻值增大，根据串联电路分压原则，电阻越大分压越大，电压表测滑动变阻器两端电压，则电压表示数逐渐增大，故A正确；

    B．当$U_{\text{V}} = 2 \text{V}$时，$U_{0} = U - U_{\text{V}} = 6 \text{V} - 2 \text{V} = 4 \text{V}$

    此时电路中电流$I = \frac{U_{0}}{R_{0}} = \frac{4 \text{V}}{10 \Omega} = 0 . 4 \text{A}$

