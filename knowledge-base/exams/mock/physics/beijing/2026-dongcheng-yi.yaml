    N，悬挂衣物所受重力为25 N且保持不变，挂钩所受重力忽略不计。悬挂衣物时，硬杆OA始终保持水平平衡，∠BAO=30°。下列说法正确的是（　　）


    ![](figures/image64.png)'
  options:
    A: 挂钩对杠杆的作用力就是衣物的重力
    B: 动力的力臂为OC
    C: 若该衣物悬挂点距O点间的距离为0.4m时，硬杆OA是省力杠杆
    D: 该衣物悬挂点与O点间的距离可在0~0.8m范围内调节
  answer: BCD
  solution: 'A．挂钩对杠杆的作用力是拉力，受力物体是杠杆；衣物的重力是地球对衣物的力，受力物体是衣物。两者只是大小相等、方向相同，但施力物体、受力物体都不同，不是同一个力。故A错误；

    B．力臂是支点到力的作用线的垂直距离。OC是支点O到动力（细绳AB的拉力）作用线的垂线段，所以OC就是动力臂。故B正确；

    C．动力臂$L_{\text{1}} = O C = \frac{1}{2} O A = \frac{1}{2} \times 1 \text{m} = 0 . 5 \text{m}$

    衣物悬挂点距O点间的距离为0.4m，阻力臂为$L_{2} = 0 . 4 \text{m}$。因为动力臂$L_{1} > L_{2}$，根据杠杆平衡条件，动力小于阻力，这是一个省力杠杆。故C正确；

    D．当细绳拉力达到最大值$F_{1 max} = 40 \text{N}$时，根据杠杆平衡条件$F_{1} L_{1} = F_{2} L_{2}$

    阻力臂最大$L_{2 max} = \frac{F_{1 max} L_{1}}{F_{2}} = \frac{40 \text{N} \times 0 . 5 \text{m}}{25 \text{N}} = 0 . 8 \text{m}$

    所以悬挂点距离O点的最大距离是0.8m，最小可以接近0，因此调节范围是0~0.8m。故D正确。

    故选BCD。'
