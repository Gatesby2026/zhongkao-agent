- id: 26
  type: 计算题
  score: 4
  stem: '如图甲所示是一台真空吸盘悬臂吊吊起水平放置的玻璃板的情境。抽出吸盘内部的空气，使吸盘内部气压减小，在玻璃板被吸盘覆盖区域的上下表面形成气压差，从而产生垂直于玻璃板的吸附力。玻璃板所受气压作用的示意图如图乙所示。该装置在竖直方向上吊起水平放置的玻璃板时，为保证吊装过程安全可靠，规定允许吊起物体的最大重力为总吸附力的三分之一。已知该装置下方装有6个完全相同的圆形真空吸盘，每个吸盘的有效面积（玻璃板被吸盘覆盖区域的面积）为0.04
    m2。外界大气压强p0=1.0×105 Pa，吸盘工作时内部气体压强的范围为2.0×104 Pa≤p内≤6.0×104Pa。假设装置工作时6个吸盘内的气压均相同。求：


    ![](figures/image146.png)


    （1）当每个吸盘内部的气体压强为3×104 Pa时，单个吸盘可以使玻璃板受到的吸附力。


    （2）装置在安全使用的前提下，能够吊起的玻璃板所受的最大重力。


    （3）若想增大此装置可吊起玻璃板的最大重力，请写出一种改进方法。'
  answer: ''
  solution: '（1）  2800N    （2）  6400N    （3）  增加吸盘的个数##增大单个吸盘的有效面积##进一步减小吸盘内部气压


    详解：（1）

    吸附力是吸盘内外气压差产生的压力差。

    单个吸盘内外气压差$S_{总} = n \text{S} = 6 \times 0 . 04 \text{m}^{2} = 0 . 24 \text{m}^{2}$

    根据压强公式$\Delta p_{最大} = p_{0} - p_{内最小} = 1 . 0 \times 10^{5} \text{Pa} - 2 . 0 \times 10^{4} \text{Pa} = 8 \times 10^{4}
    \text{Pa}$，得单个吸盘的吸附力$F_{总} = \Delta p_{最大} S_{总} = 8 \times 10^{4} \text{Pa} \times 0 . 24 \text{m}^{2} = 19200 \text{N}$


    （2）

    总吸附力越大，可吊起的最大重力越大；要总吸附力最大，需要吸盘内部气压最小（气压差最大）。

    6个吸盘的总有效面积$\frac{1}{3}$

    最大气压差$G_{最大} = \frac{1}{3} F_{总} = \frac{1}{3} \times 19200 \text{N} = 6400 \text{N}$

    总吸附力$G_{最大} = \frac{1}{3} \left(p_{0},-,p_{内}\right) n S$

    由题意，允许吊起的最大重力为总吸附力的$G_{最大}$，因此能够吊起的玻璃板所受的最大重力$n$


    （3）

    根据公式$S$，要增大$p_{内}$，可以增大吸盘个数![](figures/image157.png)、增大单个吸盘面积![](figures/image158.png)、减小吸盘内部气压![](figures/image159.png)，任选一种合理方法即可。'
