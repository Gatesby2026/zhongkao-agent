  stem: '科技小组设计了一款智能饮水机模型，可以自动控制注水。水箱结构如图所示，柱形水箱底部中心竖直固定一根直的轻质细杆，细杆顶端安装一个力传感器，传感器上方固定一个实心浮子，传感器可以检测细杆受到浮子对它沿竖直方向的力，传感器显示的数值表示力的大小，正负表示力的方向。设计要求使用过程中，当传感器显示+0.3
    N时开始注水，当传感器显示-0.8N时停止注水。已知水箱的底面积$S_{箱} = 200 c m^{2}$，细杆高度$L = 0 . 5 c m$，浮子底面积$S_{浮} = 20 c m^{2}$、高度$h_{浮} = 10 c m$、密度$\rho_{浮}
    = 0 . 5 \text{g} / c m^{3}$，细杆、传感器的质量和体积均忽略不计，g取10 N/kg。下列说法正确的是（　　）


    ![](figures/image41.png)'
  options:
    A: 使用前水箱中无水时，传感器示数显示的是-1N
    B: 当传感器显示+0.3N时，水对水箱底的压强为350Pa
    C: 使用过程中从停止注水到下次开始注水，能用的水的体积为1100cm3
    D: 若浮子的材料和高度不变，将浮子底面积变为16 cm2，则开始注水时水的深度会减小，停止注水时水的深度会增大
  answer: D
  solution: 'A．浮子的质量$m_{浮} = \rho_{浮} S_{浮} h_{浮} = 0 . 5 \text{g} / c m^{3} \times 20 c m^{2} \times 10 c m = 100 \text{g}
    = 0 . 1 k g$

    浮子的重力$G = m_{浮} g = 0 . 1 k g \times 10 \text{N} / k g = 1 \text{N}$

    水箱无水时，浮子向下压传感器，因此传感器示数应为+1N，故A错误。

    B．当传感器示数为+0.3N时，对浮子受力分析，可得浮子受到的浮力$F_{浮 1} = G - F_{压} = 1 \text{N} - 0 . 3 \text{N} = 0 . 7 \text{N}$

    由$F_{浮} = \rho_{液} g V_{排}$可得，浮子排开的水的体积为$V_{1} = \frac{F_{浮 1}}{\rho_{水} g} = \frac{0 . 7 \text{N}}{1 . 0 \times 10^{3}
    k g / \text{m}^{3} \times 10 \text{N} \times / k g} = 7 \times 10^{- 5} \text{m}^{3}$

    浮子浸入水中的高度$h_{浮 1} = \frac{V_{1}}{S_{浮}} = \frac{7 \times 10^{- 5} \text{m}^{3}}{20 \times 10^{- 4} \text{m}^{2}} = 0 .
    035 \text{m} = 3 . 5 c m$

    则水箱中水的深度$h_{1} = L + h_{浮 1} = 0 . 5 c m + 3 . 5 c m = 4 c m = 4 \times 10^{- 2} \text{m}$

    根据$p = \rho g h$，可知水对水箱底的压强$p = \rho_{水} g h_{1} = 1 . 0 \times 10^{3} k g / \text{m}^{3} \times 10 \text{N} / k g \times
    4 \times 10^{- 2} \text{m}^{3} = 400 P a$，故B错误；

    C．停止注水时，对浮子受力分析，可知浮子所受的浮力$F_{浮 2} = G + F_{拉} = 1 \text{N} + 0 . 8 \text{N} = 1 . 8 \text{N}$

    浮子排开水的体积$V_{2} = \frac{F_{浮 2}}{\rho_{水} g} = \frac{1 . 8 \text{N}}{1 . 0 \times 10^{3} k g / \text{m}^{3} \times 10 \text{N}
    \times / k g} = 1 . 8 \times 10^{- 4} \text{m}^{3}$

    浮子浸入水中的高度$h_{浮 2} = \frac{V_{2}}{S_{浮}} = \frac{1 . 8 \times 10^{- 4} \text{m}^{3}}{20 \times 10^{- 4} \text{m}^{2}} =
    0 . 09 \text{m} = 9 c m$

    水箱中水的深度$h_{2} = L + h_{2} = 0 . 5 c m + 9 c m = 9 . 5 c m$

    能用的水的体积$V_{能用} = \left(S_{箱},-,S_{浮}\right) \left(h_{2},-,h_{1}\right) = \left(200,c,m^{2},-,20,c,m^{2}\right) \times
    \left(9,.,5,c,m,-,4,c,m\right) = 990 c m^{3}$，故C错误；

    D．开始注水时，有$G '' = F ''_{浮 1} + F_{1}$，即$\rho_{浮} g S '' h_{浮} = \rho_{水} g S '' h_{浸 1} '' + F_{1}$

    整理得$h ''_{浸 1} = \frac{\rho_{浮} h_{浮}}{\rho_{水}} - \frac{F_{1}}{\rho_{水} g S ''}$

    浮子底面积减小了，$h_{浸 1}^{''}$减小，则水的深度减小，停止注水时，有$F ''_{浮 2} = G '' + F_{2}$，即$h ''_{浸 2} = \frac{\rho_{浮} h_{浮}}{\rho_{水}} +
    \frac{F_{2}}{\rho_{水} g S ''}$

    浮子底面积减小了，$h_{浸 2}^{''}$增大，则水的深度增大，故D正确。

    故选D。'
