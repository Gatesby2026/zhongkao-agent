  stem: '用如图甲所示的滑轮组提升物体M。卷扬机在绳子自由端施加拉力F，使物体M匀速上升，拉力F做的功W随时间t的变化图像如图乙所示，物体M移动的距离h随时间t的变化图像如图丙所示。已知物体M所受重力为240N，每个滑轮所受的重力相等，忽略绳重及轮与轴之间的摩擦。下列说法正确的是（　　）


    ![](figures/image16.png)'
  options:
    A: 绳子自由端移动的速度为3m/s
    B: 拉力F为300N
    C: 滑轮组的机械效率为75%
    D: 天花板对定滑轮的拉力为360N
  answer: D
  solution: 'A．由图甲可知，滑轮组承担物重的绳子段数$n = 2$，由丙图得，物体上升速度 $v_{物} = \frac{�}{t} = \frac{8 \text{m}}{8 \text{s}} = 1 \text{m}/\text{s}$

    绳子自由端移动速度$v = 2 v_{物} = 2 \times 1 \text{m}/\text{s} = 2 \text{m}/\text{s}$，故A错误；

    B．由乙图得，$t = 8 \text{s}$时拉力总功$W_{总} = 2400 \text{J}$，绳子自由端移动距离$s = v t = 2 \text{m}/\text{s} \times 8 \text{s} = 16 \text{m}$

    由$W = F s$得拉力 $F = \frac{W_{总}}{s} = \frac{2400 \text{J}}{16 \text{m}} = 150 \text{N}$，故B错误；

    C． 提升物体做的有用功$W_{有} = G � = 240 \text{N} \times 8 \text{m} = 1920 \text{J}$

    滑轮组机械效率 $\eta = \frac{W_{有}}{W_{总}} \times 100 \% = \frac{1920 \text{J}}{2400 \text{J}} \times 100 \% = 80 \%$，故C错误；

    D．忽略绳重和摩擦，由$F = \frac{G + G_{动}}{n}$​​得，动滑轮重力$G_{动} = n F - G = 2 \times 150 \text{N} - 240 \text{N} = 60 \text{N}$

    每个滑轮重力相等，因此定滑轮重力$G_{定} = G_{动} = 60 \text{N}$

    定滑轮静止，受力平衡，天花板对定滑轮的拉力为$F_{拉} = G_{定} + 2 F = 60 \text{N} + 2 \times 150 \text{N} = 360 \text{N}$，故D正确。

    故选D。'
