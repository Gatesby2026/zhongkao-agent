  stem: 琵琶是我国的一种传统弹拨乐器，通过弹拨琴弦使之发声。下列说法正确的是（　　）
  options:
    A: 琴弦发出的声音可以在真空中传播
    B: 琴弦发出的声音是空气振动产生的
    C: 用大小不同的力拨动同一根琴弦，琴弦发出声音的响度不同
    D: 用大小相同的力拨动粗细不同的琴弦，琴弦发出声音的音调相同
  answer: C
  solution: 'A．声音的传播需要介质（如空气、水等），真空不能传声。琴弦发出的声音无法在真空中传播。故A错误。

    B．声音是由物体振动产生的，琵琶的声音是由琴弦振动产生的，空气只是传播声音的介质，不是振动源。故B错误。

    C．响度与物体振动的幅度（振幅）有关：用大小不同的力拨动同一根琴弦，琴弦的振幅不同，发出声音的响度就不同。故C正确。

    D．音调与物体振动的频率有关：用大小相同的力拨动粗细不同的琴弦时，琴弦的振动频率不同（细弦振动快、音调高；粗弦振动慢、音调低），所以音调不同。故D错误。

    故选C。'
