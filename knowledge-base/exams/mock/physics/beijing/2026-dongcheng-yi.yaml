    C．电压表最大量程为$U_{\text{Vmax}} = 3 \text{V}$，因此最大$U_{0} = U - U_{\text{Vmax}} = 6 \text{V} - 3 \text{V} = 3 \text{V}$，此时$U_{0}
    = U_{\text{Vmax}}$

    根据串联电路分压原则，$R_{左\text{max}} = R_{0} = 10 \Omega$，即$F = 200 \text{N}$

    $400 \text{N}$

    对应最大推力$R_{0}$，不是$I$，故C错误；

    D．若减小$R_{左}$​，总电阻减小，电路电流$U_{\text{V}} = I R_{左}$增大，相同压缩量（相同$3 \text{V}$​）下，电压表示数$1 N$​更大，会更早达到电压表量程$0 . 2 N$，能测量的最大压缩量更小，测量范围减小，故D错误。

    故选AB。'
