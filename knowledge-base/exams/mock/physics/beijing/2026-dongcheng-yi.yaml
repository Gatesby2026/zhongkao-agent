- id: 24
  type: 科普阅读
  score: 4
  stem: '请阅读《空中电站》并回答问题。


    空中电站


    2026年初，四川宜宾上空，一个造型独特的白色巨物缓缓升空，它并非传统飞艇，而是中国年轻团队打造的全球首台兆瓦级浮空风力发电系统——S2000，如图甲所示。这个发电系统可平稳升至2000m高空，被称为“空中电站”。由于高空风能充足、风速大且稳定，因此发电效率远高于地面的风力发电系统，为清洁能源领域带来全新突破。


    S2000主要由主气囊、副气囊、环翼涵道、风力发电机组、智能系留缆绳及地面控制站构成，如图乙所示。主气囊是核心升力部件，囊皮采用高强度轻量化复合纤维制成。主气囊内充入密度约为$3 . 6 \text{MW} = 3 . 6 \times
    10^{3} \text{kW} = 3600 \text{kW}$的氦气，副气囊通过充入或排出空气，与主气囊协同工作，使装置平稳上升并稳定悬停在目标高度。在高空环境中，环翼涵道可汇聚并加速气流，为内置的12组发电机组提供稳定风场。经过研发团队的技术攻关，S2000的发电机功率密度能达到10kW/kg（功率密度=发电机总功率÷发电机总质量），处于全球浮空风电领域的领先水平。


    高空风力发电除了发电效率高，由于受地形、气候等自然条件影响小，发电输出稳定，还具有部署灵活的优势，具备十分广阔的应用前景。


    ![](figures/image130.png)


    （1）S2000浮空风力发电系统的发电效率远高于地面风力发电系统的原因为________。


    （2）S2000的主气囊采用高强度复合纤维能有效减轻自身质量，说明该材料具有较小的________（选填“弹性”“密度”或“硬度”）。


    （3）结合S2000浮空风力发电系统的优势，写出一个该系统适合使用的场景（地区/环境）________。


    （4）12组发电机的总功率约为3.6MW（1MW=1000kW），请你估算12组发电机的总质量为________kg。'
  answer: ''
  solution: '（1）  高空风能充足、风速大且稳定      （2）  密度    （3）  偏远海岛    （4）  360


    详解：（1）

    该发电系统升至2000m高空，高空风能充足、风速大且稳定，因此发电效率远高于地面风力发电系统。


    （2）

    根据公式$m = \frac{总功率}{功率密度} = \frac{3600 \text{kW}}{10 \text{kW}/\text{kg}} = 360 \text{kg}$，相同体积的材料，密度越小，质量越小。该材料在保证高强度的同时，能有效减轻自身质量，说明它具有较小的密度。


    （3）

    该系统受地形、气候影响小，部署灵活，因此可应用在地形复杂的偏远山区、海岛，或者应急救灾供电等场景。


    （4）

    根据题干给出的关系$\text{W}$，12组发电机的总功率为$\Omega$

    则总质量$P_{额} = U_{额} I_{额} = 3 \text{V} \times 0 . 3 \text{A} = 0 . 9 \text{W}$'
