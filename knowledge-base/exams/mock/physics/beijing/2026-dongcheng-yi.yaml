  stem: '如图所示，游客随滑草板一起下滑且越来越快。下列说法正确的是（　　）


    ![](figures/image15.png)'
  options:
    A: 游客下滑过程中运动状态保持不变
    B: 游客下滑过程中越来越快是由于受到惯性作用
    C: 游客下滑过程中重力势能减小，动能增大
    D: 游客下滑过程中，游客所受重力不做功
  answer: C
  solution: 'A．游客下滑时 “越来越快”，说明速度大小在变化，而运动状态包括速度的大小和方向，所以运动状态是改变的。故A错误。

    B．惯性是物体的固有属性，只能说 “具有惯性”，不能说 “受到惯性作用”，故B错误。

    C．游客下滑时高度降低，质量不变，所以重力势能减小；游客下滑时速度增大，质量不变，所以动能增大。故C正确。

    D．做功的两个必要条件：① 受到力的作用；② 在力的方向上通过距离。游客下滑时，受到竖直向下的重力，且在竖直方向上有位移（高度降低），所以重力做了功。故D错误。

    故选C。'
