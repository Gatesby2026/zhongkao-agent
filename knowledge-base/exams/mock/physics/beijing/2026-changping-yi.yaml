    热电材料就像一位“能量魔术师”，能在内能和电能之间自由转换.它魔法的核心原理:两种不同材料的

    导体或半导体组成闭合电路，当两个接点存在温度差时，它会直接发电，电路中就会产生电流。如图甲所

    示，把一根铁丝的两端分别与两根铜丝相连接，再与一只小量程电流表串联成闭合电路。然后把铜丝和铁

