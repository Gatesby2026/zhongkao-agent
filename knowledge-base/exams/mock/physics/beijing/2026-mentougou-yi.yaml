  stem: '图甲为一款测量液体密度的装置设计图。电源电压为12V，R０为一定值电阻，MN间是足够长的轻质导线，金属棒竖直固定且粗细均匀。一弹簧上端固定，滑片P固定在弹簧下端，与金属棒之间无摩擦且接触良好。已知金属棒接入电路的阻值R与弹簧所受拉力F的关系如图乙所示。容积为40cm³的小桶通过轻绳挂在弹簧下端，闭合开关S，桶内未装液体时，电流表示数为0.2A；测量密度时，需在桶内装满待测液体，通过读取电流表示数可得出液体密度。（不计弹簧、滑片及小桶的质量）


