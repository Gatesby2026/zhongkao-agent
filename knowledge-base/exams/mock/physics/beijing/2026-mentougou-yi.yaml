  answer: ''
  solution: '（1）增大    （2）所测液体的密度会偏小。理由：电源电压降低，实际电压小于12V，测量同一液体时电路实际电流偏小；若仍按12V计算时，金属棒接入电阻的测量值偏大。由图乙可知，对应拉力的测量值会偏小；由![](figures/image117.png)可知，拉力偏小则质量的计算值偏小，会直接导致密度的计算值偏小。


    详解：（1）

