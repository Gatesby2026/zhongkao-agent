  stem: '如图甲，小勇用标有“等高线”的球形玻璃罩装置进行“光的反射实验”探究。


    ![](figures/image96.png)


    （1）将一小块平面镜放在一个能转动的水平圆台上、用固定放置的红色激光笔，发出一束垂直射向平面镜的光，记为NO；用另一支绿色激光笔，斜射向O点发出一束光，记为AO；AO经平面镜反射后沿OE方向射出，E点恰好落在A点所在的等高线上，如图乙。


    将绿色激光笔固定在玻璃罩上后，缓慢转动圆台，当整个装置旋转到某一位置，可以看到光线OE恰好把光线NO和光线AO挡住。这说明光的反射现象中，反射光线、入射光线和光线NO在_______。


    （2）保持入射角度不变，让绿色激光笔继续沿A点所在的等高线顺时针转动，使入射光始终射向O点，如图丙，发现反射光线将_______（选填“顺时针”或“逆时针”）转动，且所有的反射光线都经过这条等高线。'
  answer: ''
  solution: '（1）同一平面内      （2）顺时针


    详解：（1）

    NO是垂直平面镜的法线，当转动圆台后，只有反射光线OE、入射光线AO、法线NO在同一平面时，OE才能同时挡住AO和NO，这个现象验证了光的反射定律：反射光线、入射光线和法线在同一平面内。


    （2）

    根据光的反射定律，反射角始终等于入射角，且反射光线与入射光线分居法线两侧。当入射光线沿等高线顺时针转动、入射角大小不变时，反射光线会跟随入射光线，沿顺时针方向转动。'
