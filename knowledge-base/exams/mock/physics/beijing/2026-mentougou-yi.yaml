- id: 23
  type: 实验探究
  score: 4
  stem: '图 21 甲为一款测量液体密度的装置设计图。 电源电压为 12V，R_{0}为一定值电阻，MN间是足够长的轻质导线，金属棒竖直固定且粗细均匀。 一弹簧上端固定，滑片 P 固定在弹簧下端，与金属棒之间无摩擦且接触良好。已知金属棒接入电路的阻值R与弹簧所受拉力F的关系如图
    21 乙所示。容积为$40cm^3$的小桶通过轻绳挂在弹簧下端，闭合开关S，桶内未装液体时， 电流表示数为0.2A；测量密度时，需在桶内装满待测液体，通过读取电流表示数可得出液体密度。(不计弹簧、滑片及小桶的质量)

    多旋翼无人机

    如图22所示，多旋翼无人机是一种具有三个及以上旋翼轴的特殊的无人驾驶直升机。其通过每个轴上的电动机转动，带动旋翼，从而产生升推力。旋翼的总距固定，而不像一般直升机那样可变。多旋翼无人机靠旋翼的转速差控制飞行。当总升力大于无人机自身重力时，无人机垂直起

    飞;总升力等于重力时，悬停;总升力小于重力时，垂直下降。方向控制通过调节旋翼转速实现，例如向前飞行是通过增加后方旋翼转速、降低前方旋翼转速，使无人机产生倾斜角，升力分解出向前的分力;左右飞行类似，通过调整左右旋翼转速差实现;转向则通过改变成对旋翼的转速差，打破反扭矩平衡，实现机身旋转。

    多旋翼无人机的缺点包括: ①飞行速度慢:由于多旋翼无人机的设计特点，它们的飞行速度相对较慢，无法与固定翼无人机相比; ②续航时间短:多旋翼无人机的续航时间通常较短，一般不超过 30 分钟; ③飞行距离有限: 由于技术和电池容量的限制，多旋翼无人机的飞行距离相对较短;
    ④抗风性能较差:在强风条件下，多旋翼无人机的飞行稳定性可能会受到影响。

    多旋翼无人机在操作简便性、 成本效益和垂直起降能力等方面具有明显优势，但在飞行速度、续航时间和抗风性能等方面存在不足。这些优缺点决定了多旋翼无人机在民用和商业领域的广泛应用，尤其是在航拍、环境监测、侦查、建筑建模等领域。'
