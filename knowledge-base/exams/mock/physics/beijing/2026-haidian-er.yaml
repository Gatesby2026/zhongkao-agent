  stem: 下列说法正确的是（　　）
  options:
    A: 水和酒精吸收相等的热量，酒精升高的温度更多
    B: 酒精灯中的酒精用掉一半后，剩余酒精的热值不变
    C: 冬天长期置于室外的铁块和木块，铁块的温度一定更低
    D: 沿海地区通常比内陆地区昼夜温差小，原因之一是水的比热容比砂石的比热容大
  answer: BD
  solution: 'A．根据热量计算公式$Q = c m \Delta t$，可得$\Delta t = \frac{Q}{c m}$，当水和酒精吸收热量$Q$相等时，升高的温度还与质量$m$有关，题目未说明二者质量相等，无法判断酒精升高的温度更多，故A错误；

    B．热值是燃料的固有特性，只与燃料的种类有关，与质量无关，酒精灯中的酒精用掉一半后，种类不变，剩余酒精的热值不变，故B正确；

    C．冬天长期置于室外的铁块和木块，会与周围环境达到热平衡，温度等于环境温度，因此二者温度相同，故C错误；

    D．由$Q = c m \Delta t$可知，相同质量的水和砂石，吸收或放出相同热量时，水的比热容大于砂石的比热容，水的温度变化更小，沿海地区水多、砂石少，所以昼夜温差比内陆地区小，故D正确。

    故选BD。'
