- id: 20
  type: 实验探究
  score: 3
  stem: '小明用裁剪后的饮料瓶（瓶身上部粗细均匀）、刻度尺、水和细筷子测量一个苹果的密度。


    ![](figures/image92.png)


    （1）将以下的实验步骤补充完整：


    ①在瓶内装入适量的水，使水面到达瓶身粗细均匀的部分，如图甲所示，用刻度尺测出此时水面到水平桌面的距离$h_{1}$。


    ②将苹果放入水中，苹果漂浮在水面上，如图乙所示，用刻度尺测出此时水面到水平桌面的距离$h_{2}$。


    ③________，水未溢出，用刻度尺测出此时水面到水平桌面的距离$h_{3}$。


    （2）已知水的密度为$\rho_{水}$，则待测苹果的密度$\rho_{苹果} =$________。（用已知量和测量量表示）'
  answer: ''
  solution: '（1）用大头针将苹果完全压入水中      （2）$\frac{h_{2} - h_{1}}{h_{3} - h_{1}} \rho_{水}$


    详解：（1）

    本实验中有一个关键的不变量，就是瓶身粗细均匀的那一部分的截面积，这个截面积记为$S$，实验需要先得到苹果的质量，再得到苹果的体积。

    前两步，苹果漂浮（二力平衡），结合阿基米德原理有$G_{苹果} = F_{浮} = G_{排} = m_{排} g = \rho_{水} V_{排} g = \rho_{水} S \left(\right. h_{2} - h_{1}
    \left.\right) g$①

    第三步需要让苹果完全浸没，此时苹果排开液体的体积就是苹果自身的体积，苹果的重力$G_{苹果} = m_{苹果} g = \rho_{苹果} V_{苹果} g = \rho_{苹果} V_{排}^{''} g = \rho_{苹果} S
    \left(\right. h_{3} - h_{1} \left.\right) g$②

    根据①②两式的关系，可以达到测量的目的。为了第三步能让苹果完全浸没以便得到相应的数据，应当使用细筷子将苹果按入水中。


    （2）

    联立上面的①②两式，可得$\rho_{水} S \left(\right. h_{2} - h_{1} \left.\right) g = \rho_{苹果} S \left(\right. h_{3} - h_{1} \left.\right)
    g$

    整理可得$\rho_{苹果} = \frac{h_{2} - h_{1}}{h_{3} - h_{1}} \rho_{水}$'
