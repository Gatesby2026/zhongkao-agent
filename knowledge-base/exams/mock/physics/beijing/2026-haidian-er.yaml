- id: 11
  type: 单选
  score: 2
  stem: '小明用两端电压不变的电源、小灯泡L、电流表和两根阻值不同的电阻丝R1、R2（图中未画出）进行实验，电路如图所示。他先后将电阻丝R1、R2分别接入电路中的a、b两端，闭合开关S后，观察到接入R1时，小灯泡的亮度更亮，电流表的示数更大。已知灯泡亮度变亮时，灯丝电阻变大。R1、R2分别接入电路时，下列说法正确的是（　　）


    ![](figures/image25.png)'
  options:
    A: R1两端的电压大于R2两端的电压
    B: R1的电功率一定大于R2的电功率
    C: R1接入电路时，电路的总功率一定更大
    D: R1接入电路时，小灯泡消耗的电能更多
  answer: C
  solution: '由图可知，电阻丝接入a、b后，灯泡L与电阻丝R串联，电流表测电路电流，电源电压U保持不变。已知接入R1​时电流$I_{1} > I_{2}$，且灯泡更亮时灯丝电阻更大，因此${R}_{L1}>{R}_{L2}$。

    A．电路总电压$U = U_{\text{L}} + U_{R}$

    灯泡两端的电压$U_{\text{L}} = I R_{\text{L}}$​

    因为$I_{1} > I_{2}$​、${R}_{L1}>{R}_{L2}$​，所以${U}_{L1}={I}_{1}{R}_{L1}>{U}_{L2}={I}_{2}{R}_{L2}$​

    则R两端的电压${U}_{R}=U−{U}_{L}$

    因此${U}_{R1}<{U}_{R2}$，故A错误；

    B．R的功率$P_{R} = U_{R} I$，则乘积大小无法确定，因此R1的功率不一定大于R2的，故B错误；

    C．电路总功率$P_{总} = U I$，电源电压U不变，$I_{1} > I_{2}$​，因此${P}_{总1}=U{I}_{1}>{P}_{总2}=U{I}_{2}$，故C正确；

    D．小灯泡消耗的电能$W={P}_{L}t$ ，电能大小与通电时间有关，题目未给出通电时间，无法比较电能多少，故D错误。

    故选C。'
