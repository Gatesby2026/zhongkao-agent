- id: 24
  type: 科普阅读
  score: 4
  stem: '请阅读《太空中的“重力侦探”——中国重力卫星》并回答问题。


    太空中的“重力侦探”——中国重力卫星


    地球表面附近的重力场可以反映地球形状、物质分布及运动。$g$值可以反映地球上不同地方重力场的强弱，因此它并不总是等于9.8 N/kg。我国跟踪型重力测量卫星（简称中国重力卫星）通过极其精密地测量来推算出各地的$g$值，是构建地球重力场模型的重要依据。


    如图所示，中国重力卫星由两颗完全相同的卫星组成，它们以一前一后的方式在距离地球表面约470 km的同一近地轨道上跟飞，两者间保持着约200 km的恒定距离。这段距离构成了整个科学任务中最关键的“测量基线”，仿佛一把悬浮在太空的超级尺子。


    地球上的山脉、海沟、地下矿藏、冰川消融乃至地下水迁移都会影响该处的$g$值，如某区域的地下水枯竭会使该处的$g$值减小。当卫星由$g$值较小的区域飞到$g$值较大的区域时，其速度会略微增大；反之，速度会略微减小。这种微小的速度变化，会导致前后两颗卫星之间的距离发生微米级的变化。中国重力卫星搭载的“微米级精度星间测距系统”，能够实时、精准地捕捉两颗卫星间距离的微小变化，通过分析数据，便能推算出地球重力场的精细结构和动态变化。


    由中国重力卫星在轨连续观测获得的重力场数据，能分析地球内部的质量分布与结构，可服务于多个领域，如水资源监测、冰川变化研究、地震监测等，让我国实现了对全球重力场自主可控的连续监测。


    ![](figures/image126.png)


    （1）中国重力卫星用于捕捉两颗卫星间距离微小变化的测量设备是________。


    （2）下列关于中国重力卫星的说法正确的是________。（填写正确选项前的字母）


    （3）中国重力卫星在距离地球表面的近地轨道上绕地球做匀速圆周运动，已知卫星绕地球飞行的平均速度约为$7 . 6 \text{km} / \text{s}$，卫星绕地球飞行一周所用的时间约为$94 . 2 \text{min}$，由此可知地球的半径约为________km。（π取3.14）'
  options:
    A: 两颗卫星在不同轨道上飞行，彼此间的距离会随地球重力场变化发生千米级的改变
    B: 卫星飞到地下水枯竭区域时，与该处地下水枯竭前相比，速度将略微减小
    C: 卫星获取的重力场数据仅能应用于水资源监测、冰川变化研究两大领域
  answer: ''
  solution: "（1）  微米级精度星间测距系统    （2）B      （3）  6370##$6.37×{10}^{3}$\n\n详解：（1）\n根据原文描述可知，测量设备为“微米级精度星间测距系统”。\n\n（2）\nA．原文说明两颗卫星在同一近地轨道飞行，二者距离的变化是微米级，不是不同轨道的千米级变化，故A错误；\n\
    B．原文说明地下水枯竭会使区域$g$值减小，卫星飞到$g$值更小的区域，速度会略微减小，故B正确；\nC．原文说明重力场数据可服务于水资源监测、冰川变化研究、地震监测等多个领域，并非仅应用于两个领域，故C错误；\n故选B。\n\n（3）\n\
    周期$t=94.2min=94.2×60s=5652s$ \n卫星绕地球做匀速圆周运动，轨道周长等于平均速度乘以周期，轨道半径等于地球半径加上卫星距离地面的高度$vt=2π(R+h)$ ，变形得地球半径$R=\\frac{vt}{2π}-h=\\\
    frac{7.6km/s×5652s}{2×3.14}-470km=6370km$"
