  stem: '小明要证明滑动摩擦力的大小与压强的大小无关，他利用水平桌面上符合实验要求的带滑轮的木板，两个材料相同、表面粗糙程度相同、大小不同的带挂钩的立方体木块A和B，弹簧测力计和轻质细线进行实验，如图所示。


