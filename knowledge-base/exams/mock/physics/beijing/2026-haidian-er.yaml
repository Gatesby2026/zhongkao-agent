  type: 多选
  score: 2
  stem: '为检测某特种服装（忽略其材料的厚度）的气密性，科技小组设计了气压检测装置（忽略其体积），其电路如图甲所示，电源为恒流源，其输出电流恒为$1 . 8 \text{A}$，$R_{0}$是阻值为$40 \Omega$的定值电阻，$R$是气压敏感电阻，其阻值与气压的关系如图乙所示。如图丙所示，把该装置和被测服装$\text{M}$放入真空测试腔$\text{N}$中，将$\text{N}$内气体抽出后密封，接通电路进行检测。检测时，$\text{N}$内初始气压为0，M内初始气压为$1
    . 0 \times 10^{5} \text{Pa}$，若M漏气，则会使N内气压升高，导致电流表的示数发生变化，从而可判断M的气密性。已知M、N内的气压与气体的密度成正比，M、N的容积不变，分别为$\text{0}.\text{06
    m}^{\text{3}}$、$\text{0}.\text{12 m}^{\text{3}}$。下列说法正确的是（　　）


    ![](figures/image71.png)'
  options:
    D: 一段时间后，若电流表的示数为1A，则此时M内气压为$7.5 \times 10^{4}\text{Pa}$
  answer: AC
  solution: "A．若M漏气，N内气压升高，由图乙可知，气压敏感电阻R减小。由图甲，$R_{0}$与R并联，总电流I总恒定，电路总电压$U={I}_{总}·\\frac{{R}_{0}R}{{R}_{0}+R}$，R减小则U减小，电流表示数$I_{0}\
    \ = \\frac{U}{R_{0}}$，因此$I_{0}$减小，故A正确；\nB．当M全部漏气后，N内气压达到最大值，因为M、N内的气压与气体的密度成正比，又由$\\rho = \\frac{m}{V}$，且气体质量不变，可得${p}_{max}({V}_{M}+{V}_{N})={p}_{0}{V}_{M}$\n\
    代入数据得${p}_{max}=\\frac{1.0×{10}^{5}Pa×0.06{m}^{3}}{0.06{m}^{3}+0.12{m}^{3}}≈3.33×{10}^{4}Pa<1.0×{10}^{5}Pa$ \n因此R不可能减小到20Ω。由${I}_{0}=\\\
    frac{{I}_{总}R}{{R}_{0}+R}$\n得最小电流大于0.6A，故B错误；\nC．一半质量漏出时，漏出质量$Δm=\\frac{{m}_{0}}{2}=\\frac{{p}_{0}{V}_{M}}{2k}$\nN内气压${p}_{N}=\\\
    frac{kΔm}{{V}_{N}}=\\frac{{p}_{0}{V}_{M}}{2{V}_{N}}$\n代入数据得${p}_{N}=\\frac{1.0×{10}^{5}Pa×0.06{m}^{3}}{2×0.12{m}^{3}}=2.5×{10}^{4}Pa$\
    \ ，故C正确；\nD．当电流表示数${I}_{0}=1A$ ，流过R的电流${I}_{R}={I}_{总}-{I}_{0}=0.8A$ \n由并联电压相等得${I}_{0}{R}_{0}={I}_{R}R$ ，解得$R = 50 \\\
    Omega$。\n由R-p关系$R=60-\\frac{40}{1×{10}^{5}}{p}_{N}$\n得${p}_{N}=2.5×{10}^{4}Pa$ \n根据${p}_{M}{V}_{M}+{p}_{N}{V}_{N}={p}_{0}{V}_{M}$\n\
    代入数据得${p}_{M}=\\frac{1.0×{10}^{5}Pa×0.06{m}^{3}-2.5×{10}^{4}Pa×0.12{m}^{3}}{0.06{m}^{3}}=5×{10}^{4}Pa≠7.5×{10}^{4}Pa$\
    \ ，故D错误。\n故选AC。"
