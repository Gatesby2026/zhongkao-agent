- id: 12
  type: 单选
  score: 2
  stem: '小明在已调零的弹簧测力计下悬挂一个小桶，在测力计的原刻度线处标上相应的密度值，制成一个简易的“液体密度秤”，如图所示。使用时将测力计上端固定，向小桶内缓慢加满待测液体，即可直接读出液体的密度。当相邻两刻度线对应的密度差值越小，该装置的测量精度越高。已知测力计的量程为$0
    ∼ F$，小桶的容积为$V$、重为$G$。下列说法正确的是（　　）


    ![](figures/image34.png)'
  options:
    A: 该密度秤的最大测量值为$\frac{F}{g V}$
    B: 若仅换用质量相等、容积更大的小桶再次制成密度秤，则其测量精度会提高
    C: 若小桶内的液体没有加满，则测出的密度会偏大
    D: 若将重为$G_{石}$的小石块用细线系好，手提细线使石块浸没在装满液体的小桶中，石块不接触小桶，静止后密度秤的示数增大了$\frac{G_{石}}{g V}$
  answer: B
  solution: 'A．对小桶受力分析有$F = G + G_{液} = G + \rho_{液} g V$

    得$\rho_{液} = \frac{F - G}{g V}$，故A错误；

    B．测量精度由相邻两刻度线对应的密度差值决定，差值越小，精度越高。测力计的刻度是均匀的，相邻刻度的拉力差固定，根据$\Delta \rho = \frac{\Delta F}{g V}$，当换用质量相等、容积更大的小桶时，V 变大，$\Delta
    F$不变，因此 $\Delta \rho$ 变小，相邻刻度的密度差更小，测量精度提高，故B正确；

    C．若液体没有加满，实际液体体积 $V_{实} < V$，此时测力计示数$F = G + \rho_{液} g V_{实}$

    计算时仍按容积 V 代入公式得${ρ}_{测}=\frac{G+{ρ}_{液}g{V}_{实}-G}{gV}=\frac{{ρ}_{液}g{V}_{实}}{gV}=\frac{{ρ}_{液}{V}_{实}}{V}$

    因为$V_{实} < V$，所以$\rho_{测} < \rho_{液}$，测出的密度偏小，故C错误；

    D．石块浸没在装满液体的小桶中，不接触小桶，石块会将液体排出小桶外，剩余液体的重力会减小，但石头受到浮力，故石头对液体也有竖直向下的压力。由阿基米德原理，$F_{浮} = G_{排}$，故静止后测力计拉力为示数不变，密度秤的示数不变，故D错误。

    故选B。'
