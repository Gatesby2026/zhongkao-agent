  stem: '图甲所示为一种户外健身器材，其简化结构如图乙所示。其中牵引杆$A B$的$B$处、杆$O_{2} C$的$D$处均装有轴，杆$B D$连接两轴，小明坐在座椅上向下拉动$A$端，杆$A B$绕转轴$O_{1}$转动，杆$B D$拉动杆$O_{2}
    C$绕转轴$O_{2}$转动，可将座椅抬起。当杆$A B$处于水平位置时，小明已被拉离地面，此时小明对$A$端的拉力及他和座椅所受的重力作用在同一直线上，杆$B D$垂直于丁杆$A B$和$O_{2} C$，杆$B D$对上下两杆的拉力均沿竖直方向。已知$O_{1}
    B : O_{1} A = 1 : 4$，$O_{2} C : O_{2} D = 2 : 1$，小明的质量为60$\text{kg}$，座倚的质量为$15kg$ ，不计转动时的摩擦和器材其他部分的质量，$g$取$10 \text{N}
    / \text{kg}$。求：


    ![](figures/image146.png)


    （1）小明坐在座椅上，不接触牵引杆，站在地面上的小亮对$A$端施加竖直向下的拉力，将小明拉离地面，当杆$A B$处于水平位置静止时，小亮施加的拉力大小$F_{1}$。


    （2）如图乙所示，小明对$A$端施加竖直向下的拉力，将自己拉离地面，当杆$A B$处于水平位置静止时，小明施加的拉力大小$F_{2}$。'
  answer: ''
  solution: "（1）375N      （2）250N\n\n详解：（1）\n小明和座椅所受的总重力为$G_{总} = \\left(\\right. m_{人} + m_{椅} \\left.\\right) g = \\left(\\\
    right. 60 \\text{kg} + 15 \\text{kg} \\left.\\right) \\times 10 \\text{N}/\\text{kg} = 750 \\text{N}$\n当小亮在地面上向下拉动A端时，以$O_{2}$为支点分析杠杆$O_{2}\
    \ D C$，设杆BD对D点的竖直向上拉力为$F_{B D}$，根据杠杆平衡条件$F_{1} L_{1} = F_{2} L_{2}$可得$F_{B D} \\cdot O_{2} D = G_{总} \\cdot O_{2} C$\n\
    代入$O_{2} C : O_{2} D = 2 : 1$可得$F_{B D} = 750 \\text{N} \\times 2 = 1500 \\text{N}$\n以$O_{1}$为支点分析杠杆AB，根据杠杆平衡条件可得$F_{1}\
    \ \\cdot O_{1} A = F_{B D} \\cdot O_{1} B$\n代入$O_{1} B : O_{1} A = 1 : 4$可得$F_{1} = 1500 \\text{N} \\times \\frac{1}{4}\
    \ = 375 \\text{N}$\n\n（2）\n当小明自己坐在座椅上向下拉动A端时，根据力的作用是相互的，小明以$F_{2}$向下拉牵引杆，牵引杆会对小明产生竖直向上的等大拉力$F_{2}$。\n因此，小明和座椅整体对C端的压力减小，变为$G_{总}\
    \ - F_{2}$\n以$O_{2}$为支点分析杠杆$O_{2} D C$，设此时杆BD对D点的拉力为$\\left(F^{'}\\right)_{B D}$\n根据杠杆平衡条件可得$\\left(F^{'}\\right)_{B D}\
    \ \\cdot O_{2} D = \\left(\\right. G_{总} - F_{2} \\left.\\right) \\cdot O_{2} C$\n代入已知比例解得${{F}^{′}}_{BD}=2(750N−{F}_{2})=1500N−2{F}_{2}$\n\
    以$O_{1}$为支点分析杠杆AB，根据杠杆平衡条件可得${F}_{2}⋅{O}_{1}A={{F}^{′}}_{BD}⋅{O}_{1}B$ \n代入$O_{1} B : O_{1} A = 1 : 4$并化简，可得$4{F}_{2}=1500N−2{F}_{2}$，解得$F_{2}\
    \ = 250 \\text{N}$"
