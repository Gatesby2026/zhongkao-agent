- id: 23
  type: 实验探究
  score: 3
  stem: '如图所示为某科技小组设计的分拣苹果装置的示意图。该装置按照一定质量标准自动分拣大苹果和小苹果，托盘秤压在一个以$O_{1}$为转动轴的杠杆上，杠杆末端压在压力传感器$R_{1}$上，已知压力越大，$R_{1}$阻值越小。当$R_{2}$两端的电压较小时，分拣开关在弹簧向上弹力作用下处于水平状态，小苹果进入通道1；当$R_{2}$两端的电压超过某一值$U_{0}$时，可使电磁铁与衔铁保持吸合状态，此时大于一定标准质量的大苹果进入通道2。已知$R_{1}$和$R_{2}$所在电路的电源两端的电压为$U$并保持不变。若仅通过调节$R_{2}$的阻值，使能进入通道2的苹果的标准质量变大，分析说明应如何调节$R_{2}$的阻值。


    ![](figures/image121.png)'
  answer: ''
  solution: '应减小$R_{2}$的阻值。


    详解：能进入通道2的苹果标准质量变大，说明只有质量更大的苹果才能让$R_{2}$两端电压达到临界值$U_{0}$。

    根据题意，苹果质量越大，对$R_{1}$的压力越大，$R_{1}$的阻值越小。

    $R_{1}$与$R_{2}$串联，电源电压$U$保持不变，根据串联分压规律可得${U}_{0}=\frac{U{R}_{2}}{{R}_{1}+{R}_{2}}$

    整理得${R}_{1}={R}_{2}\left(\frac{U}{{U}_{0}}-1\right)$

    由于$U$和$U_{0}$均不变，要使临界$R_{1}$更小（对应更大的苹果质量），因此需要减小$R_{2}$的阻值。'
