- id: 11
  type: 单选
  score: 2
  stem: '在两个相同的烧杯中分别装有两种质量相等的液体A、B。用额定电压相同的甲、乙两个电加热器分别加热液体A、B，电加热器的额定功率$P_{甲} < P_{乙}$，它们均正常工作。液体A、B温度T随加热时间t变化的图像如图所示。下列说法正确的是（　　）


    ![](figures/image16.png)'
  options:
    A: 实验中用液体升高温度反映吸收热量的多少
    B: 相同时间内液体A吸收的热量等于液体B吸收的热量
    C: 电加热器甲的电阻丝阻值小于乙的电阻丝阻值
    D: 液体A的比热容小于液体B的比热容
  answer: D
  solution: 'A.本实验中，吸收热量的多少由电加热器做功决定，是用加热时间结合功率反映吸热多少，不能用液体升高温度反映吸收热量多少，故A错误；

    B.电加热器正常工作时实际功率等于额定功率，已知$P_{甲} < P_{乙}$，根据$W = P t$得，相同时间内乙电加热器放出的热量更多，液体B吸收的热量更多，故B错误；

    C.电加热器额定电压U相同，根据公式$P = \frac{U^{2}}{R}$​，变形得$R = \frac{U^{2}}{P}$​，额定功率越小，电阻越大，因为$P_{甲} < P_{乙}$，故甲的电阻更大，故C错误；

    D.已知两种液体质量m相等，由图像可知，相同时间内$Δ{t}_{A}>Δ{t}_{B}$，根据吸热公式$\text{Q} = \text{cm} \Delta \text{t}$变形得$\text{c} = \frac{Q}{m \Delta
    t}$，$Q_{\text{A}}$更小、$Δ{t}_{A}$更大，因此$c_{\text{A}} < c_{\text{B}}$，故D正确。

    故选D。'
