    |---|---|---|---|---|---|---|---|---|

    | 压敏电阻R阻值/Ω | 140 | 92 | 60 | 36 | 18 | 10 | 5 | … |'
  options:
    A: 浮体所处箱内水位与下水道水位相平是利用了连通器原理；
    B: 当浮体体积的$\frac{1}{10}$浸在雨水中时，此时浮体受到的浮力为10N；
    C: 当电路电流为I时，压敏电阻的阻值为10Ω；
    D: 若要提前启动排水系统，可更换控制电路中阻值更大的定值电阻
  answer: AB
  solution: "A．上端开口、底部相连通的容器是连通器，连通器中装同种液体静止时液面相平，浮体所处容器与下水道底部相连通、上端都开口，符合连通器特点，因此水位相平利用了连通器原理，故A正确；\nB．当浮体体积的$\\frac{1}{10}$浸在水中时，浮体对容器底没有压力，说明容器底对浮体的支持力为0，对浮体受力分析，静止时浮力与重力平衡，大小相等，浮体重力为$10\
    \ \\text{N}$，因此浮力$F_{浮} = G = 10 \\text{N}$，故B正确；\nC．根据阿基米德原理$F_{浮} = \\rho_{水} g V_{排}$，$\\frac{1}{10}V$ 浸在水中时${F}_{浮1}=10N={ρ}_{水}g·\\\
    frac{V}{10}$\n完全浸没时$V_{排} = V$，浮力${F}_{浮全}={ρ}_{水}gV=100N$ \n浮体受力平衡，有${F}_{浮全}=G+F$ ，可得压敏电阻受到的压力$F={F}_{浮全}-G=100N-10N=90N$\
    \ \n由表格可知，压力为$90 \\text{N}$时，压敏电阻阻值为$18 \\Omega$，不是$10 \\Omega$，故C错误；\nD．提前启动排水系统，即水位更低（压敏电阻受到压力更小、压敏电阻$R$更大）时，电流就达到启动电流$I$。根据欧姆定律$I\
    \ = \\frac{U}{R_{0} + R}$，电源电压$U$不变，启动电流$I$不变，$R$变大，需要减小定值电阻$R_{0}$的阻值才能满足条件，更换更大阻值的$R_{0}$会使总电阻更大，电流更小，无法提前达到启动电流，故D错误。\n\
    故选AB。"
