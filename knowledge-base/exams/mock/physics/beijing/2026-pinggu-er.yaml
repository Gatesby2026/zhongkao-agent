  stem: '现有额定电压均为3V的两盏小灯泡A和B，它们的$U - I$关系图像如图所示。下列说法中正确的是（　　）


    ![](figures/image44.png)'
  options:
    A: 小灯泡A的额定功率大于小灯泡B的额定功率
    B: 若将两灯串联在电压为6V的电路中，则两灯均能安全工作
    C: 若将两灯串联在电压为4V的电路中，则两灯均能安全工作
    D: 若将两灯并联在电压为3V的电路中，电路消耗的总功率为1.5W
  answer: CD
  solution: "A．由$U - I$图像可知，额定电压为3V时，小灯泡A的额定电流${I}_{A额}=0.2A$ ，小灯泡B的额定电流${I}_{B额}=0.3A$ ；A的额定功率${P}_{A额}={U}_{额}{I}_{A额}=3V×0.2A=0.6W$\
    \ \nB的额定功率${P}_{B额}={U}_{额}{I}_{B额}=3V×0.3A=0.9W$ \n小灯泡A的额定功率小于小灯泡B的额定功率，故A错误；\nBC．两灯串联时，电流相等，A的额定电流更小，因此电路允许的最大电流为$0\
    \ . 2 \\text{A}$。此时从图像可得，此时$U_{\\text{A}} = 3 \\text{V}$，$U_{\\text{B}} = 1 \\text{V}$，总电压${U}_{总}={U}_{A}+{U}_{B}=3V+1V=4V<6V$\
    \ \n若将两灯串联在电压为4V的电路中，则两灯均能安全工作；若将两灯串联在电压为6V的电路中，电路电流会大于$0 . 2 \\text{A}$，超过A的额定电流，不能安全工作，故B错误，C正确；\nD．若将两灯并联在电压为3V的电路中，两灯两端电压均等于额定电压，均正常工作，总功率${P}_{总}={P}_{A额}+{P}_{B额}=0.6W+0.9W=1.5W$\
    \ ，故D正确。\n故选CD。"
