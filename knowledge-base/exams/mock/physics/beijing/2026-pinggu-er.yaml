- id: 26
  type: 计算题
  score: 4
  stem: '如图所示，工人站在水平台面上用滑轮组提货物。工人竖直向上拉动绳子，使货物以0.1m/s的速度匀速上升。已知工人体重为600N，货物重为900N，工人与台面的接触面积为400cm2，动滑轮重为60N。不计滑轮组的绳重和摩擦，求：


    ![](figures/image92.png)


    （1）提货物时工人对水平台面的压强；


    （2）工人拉力的功率；


    （3）该滑轮组的机械效率。'
  answer: ''
  solution: '（1）2.3×104Pa      （2）96W    （3）93.75%


    详解：（1）

    滑轮组的绳子股数$n = 3$，不计滑轮组的绳重和摩擦，工人对货物的拉力为$F = \frac{G_{物} + G_{动}}{n} = \frac{900 \text{N}+ 60 \text{N}}{3} = 320 \text{N}$

    由力的相互作用得，货物对工人的拉力为$F^{''} = F = 320 \text{N}$

    提货物时工人对水平台面的压力为$F_{压} = G_{人} + F^{''} = 600 \text{N} + 320 \text{N} = 920 \text{N}$

    提货物时工人对水平台面的压强$p = \frac{F_{压}}{S} = \frac{\text{920N}}{400 \times 10^{- 4} \text{m}^{2}} = 2 . 3 \times 10^{4} \text{Pa}$


    （2）

    绳子末端移动的速度$v = n v_{物} = 3 \times 0 . 1 \text{m}/\text{s}= 0 . 3 \text{m}/\text{s}$

    工人拉力的功率$P = F^{''} v = 320 \text{N} \times 0 . 3 \text{m} / \text{s} = 96 \text{W}$


    （3）

    该滑轮组的机械效率$\eta = \frac{W_{有}}{W_{总}} \times 100 ％= \frac{G_{物} h}{F^{''} s} \times 100 ％= \frac{G_{物} \times v_{物} t}{F^{''}
    \times v t} \times 100 ％= \frac{G_{物} \times v_{物}}{F^{''} \times v} \times 100 ％= \frac{900 \text{N} \times 0 . 1 \text{m}/\text{s}}{320
    \text{N} \times 0 . 3 \text{m}/\text{s}} \times 100 ％= 93 . 75 ％$'
