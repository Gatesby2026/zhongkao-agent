- id: 12
  type: 单选
  score: 2
  stem: '如图所示，水平桌面上放置两个完全相同的溢水杯，分别装满甲、乙两种液体。将一个密度为$\rho_{0}$的小球放入甲液体中，小球静止时，溢出液体的质量为$m_{甲}$；再将小球放入乙液体中，小球静止时，溢出液体的质量为$m_{乙}$，此时两溢水杯中液体对容器底部的压强为p甲和p乙，下列说法正确的是（　　）


    ![](figures/image27.png)'
  options:
    A: 小球静止时，溢出液体的质量$m_{甲} < m_{乙}$
    B: 两容器底部受到的压强$p_{甲} < p_{乙}$
    C: 小球的体积为$\frac{m_{乙}}{\rho_{0}}$
    D: 乙液体的密度为$\frac{m_{乙}}{m_{甲}} \rho_{0}$
  answer: D
  solution: 'A．物体在甲中漂浮，则$F_{浮甲} = G_{排甲} = m_{甲} g = G_{球}$

    在乙中下沉，则$F_{浮乙} = G_{排乙} = m_{乙} g ＜ G_{球}$

    所以$m_{甲} ＞ m_{乙}$，故A错误；

    B．在液体甲中，小球漂浮，所以甲液体的密度大于小球的密度，在液体乙中，小球沉底，乙液体的密度小于小球的密度，则甲液体的密度大于乙液体的密度，甲、乙两液体的深度相同，由$p = \rho g h$可知，两容器底部受到的压强$p_{甲} ＞
    p_{乙}$，故B错误；

    CD．小球在乙液体中完全浸没，小球的体积等于排开乙液体的体积，所以小球的体积为$V_{球} = V_{排乙} = \frac{m_{乙}}{\rho_{乙}}$①

    物体在甲中漂浮，则$F_{浮甲} = G_{排甲} = m_{甲} g = G_{球} = m_{球} g$

    所以小球的质量为$m_{球} = m_{甲}$

    小球的体积$V_{球} = \frac{m_{球}}{\rho_{球}} = \frac{m_{甲}}{\rho_{0}}$②

    联立①②可得$\rho_{乙} = \frac{m_{乙}}{m_{甲}} \rho_{0}$，故C错误，D正确。

    故选D。'
