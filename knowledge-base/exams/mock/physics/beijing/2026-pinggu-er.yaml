- id: 25
  type: 计算题
  score: 4
  stem: '如图所示是科技小组设计的模拟某电热毯工作电路的示意图。R0和R都是电热毯中的发热电阻丝，开关S的右端可分别处于a、b、c三个位置，当S的右端位于$a$位置时，电热毯的开关处于断开状态，当S的右端分别位于b、c位置时，电热毯分别处于高温挡和低温挡。该电热毯接入电压恒为220V的电路中，电热毯处于高温挡时的功率为110W；电热毯处于低温挡时的功率为55W。忽略电阻随温度的变化。求：


    ![](figures/image88.png)


    （1）电热毯处于高温挡时，电路中的电流；


    （2）电阻R的阻值。'
  answer: ''
  solution: "（1）0.5A      （2）$440 \\Omega$\n\n详解：（1）\n当开关S接$b$位置时，电热毯为高温挡，此时电阻$R$被短路，只有发热电阻$R_{0}$接入电路。电路电流${I}_{高}=\\frac{{P}_{高}}{U}=\\\
    frac{110W}{220V}=0.5A$ \n\n（2）\n$R_{0}$的阻值${R}_{0}=\\frac{{U}^{2}}{{P}_{高}}=\\frac{(220V{)}^{2}}{110W}=440Ω$ \n当开关S接$c$位置时，电热毯为低温挡，此时$R$与$R_{0}$串联，低温挡电路总电阻${R}_{总}=\\\
    frac{{U}^{2}}{{P}_{低}}=\\frac{(220V{)}^{2}}{55W}=880Ω$ \n$R$的阻值$R={R}_{总}-{R}_{0}=880Ω-440Ω=440Ω$"
