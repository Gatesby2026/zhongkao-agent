- id: 24
  type: 科普阅读
  score: 4
  stem: '请根据材料，回答问题。


    手机电池技术


    随着信息技术高速发展，智能手机已然成为人们日常通讯、出行支付、移动办公不可或缺的工具。而电池作为智能手机的核心部件，直接影响手机的使用体验。


    手机电池不断朝着大容量、快充电、长续航方向升级。某款智能手机的锂电池上标有“电压 3.7V，容量 4200mA・h”字样。该机型搭载超级快充功能，在保持充电电压不变的前提下，将充电电流从常规的 1A 提升至 5A，从而显著提升充电功率，缩短充电时间。电池充满电后，随着持续使用，当屏幕显示剩余电量不足
    20% 时，系统会触发低电量提醒，此时建议及时为手机充电以保障正常使用；若无法及时充电，开启省电模式，手机还可维持使用约2小时。


    除有线快充外，无线充电技术愈发成熟。无线充电就是无需数据线等物理连接即可为手机补充电量，使用更加便捷。现阶段主流无线充电技术的原理如图甲、乙所示：交变电流通入送电线圈（无线充电板）后产生交变磁场，置于充电板上的手机（受电线圈）在磁场中感应出电流，进而为手机锂电池充电并储存电能。


    在科技的持续推动下，手机电池性能持续升级，充电技术不断突破，进一步改善手机使用体验，为智能生活提供坚实保障。


    ![](figures/image82.png)


    （1）文中描述手机快充功能将充电功率变为原来常规模式的_______倍。


    （2）手机在无线充电时，手机中的受电线圈会产生_______，无线充电工作原理与_______（选填“发电机”或“电动机”）工作原理相似；


    （3）文中手机待机时工作电流约60mA，正常亮屏使用时工作电流约500mA。若手机一天亮屏使用4h，其它时间待机，则使用一天（24h）______（选填“会”或“不会”）触发低电量提醒。'
  answer: ''
  solution: "（1）5    （2）    ①. 感应电流    ②. 发电机      （3）不会\n\n详解：（1）\n根据电功率公式 $P = U I$，题目明确充电电压$U$保持不变，因此充电功率之比等于电流之比。已知常规充电电流$I_{1}\
    \ = 1 \\text{A}$，快充电流$I_{2} = 5 \\text{A}$，可得 $\\frac{{P}_{快}}{{P}_{常}}=\\frac{U{I}_{2}}{U{I}_{1}}=\\frac{{I}_{2}}{{I}_{1}}=5$\
    \ \n因此快充功率是常规模式的5倍。\n\n（2）\n无线充电利用了电磁感应原理，送电线圈产生交变磁场，手机的受电线圈在变化的磁场中会产生感应电流；发电机的工作原理是电磁感应，电动机的工作原理是通电导体在磁场中受力运动，因此无线充电的工作原理和发电机相似。\n\
    \n（3）\n根据电量公式$Q = I t$计算一天总耗电量：亮屏使用时间${t}_{1}=4h$ ，电流${I}_{1}=500mA$ ，亮屏耗电量 ${Q}_{1}={I}_{1}{t}_{1}=500mA×4h=2000mA·h$\
    \ \n待机时间${t}_{2}=24h-4h=20h$ ，待机电流${I}_{2}=60mA$ ，待机耗电量${Q}_{2}={I}_{2}{t}_{2}=60mA×20h=1200mA·h$ \n总耗电量 ${Q}_{消}={Q}_{1}+{Q}_{2}=3200mA·h$\
    \ \n剩余电量 ${Q}_{剩}=4200mA·h-3200mA·h=1000mA·h$ \n剩余电量占比 $\\frac{1000}{4200}≈23.8%>20%$ \n因此不会触发低电量提醒。"
