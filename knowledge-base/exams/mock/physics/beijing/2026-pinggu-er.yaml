- id: 21
  type: 实验探究
  score: 4
  stem: "学习浮力知识后，某实验小组利用酒精、烧杯、铁块、细线和弹簧测力计测量牛奶的密度。主要实验步骤如下，请你补充完整：\n\n（1）①用细线拴住铁块，用弹簧测力计测出铁块的重力G；\n\n②将铁块浸没在酒精中且不触碰烧杯底和侧壁，记下此时弹簧测力计的示数F1；\
    \ \n\n③__________，记下此时弹簧测力计的示数F2；\n\n（2）则牛奶的密度表达式为ρ牛奶=______（用G、F1、F2和ρ酒精表示）；"
  answer: ''
  solution: '（1）将铁块浸没在牛奶中且不触烧杯底和侧壁      （2）$\frac{(G−{F}_{2}){ρ}_{酒精}}{G−{F}_{1}}$


    详解：（1）

    将铁块浸没在酒精中且不触碰烧杯底和侧壁，通过铁块的重力以及此时弹簧测力计的示数计算得出铁块所受浮力，再借助阿基米德原理计算得出铁块排开酒精的体积，由于铁块完全浸没，所以铁块的体积等于排开酒精的体积，由于可求出铁块的体积，为测得牛奶的密度，应将铁块也完全浸没在牛奶中，通过铁块重力和弹簧测力计的示数计算得出铁块所受浮力，再借助阿基米德原理计算得出牛奶的密度，所以实验步骤③为将铁块浸没在牛奶中且不触烧杯底和侧壁，记下此时弹簧测力计的示数F2。


    （2）

    同一铁块两次都浸没，排开液体的体积都等于铁块自身体积V，保持不变。铁块浸没在酒精中时，浮力为$F_{浮酒​} = G - F_{1} ​ = \rho_{酒精} ​ g V$

    解得，铁块体积$V = \frac{G - F_{1}}{\rho_{酒精} ​ g}$

    铁块浸没在牛奶中时，浮力为$F_{浮奶​} = G - F_{2 ​} = \rho_{牛奶} ​ g V = \rho_{牛奶} ​ g \times \frac{G - F_{1}}{\rho_{酒精} ​ g} = \rho_{牛奶}
    ​ \times \frac{G - F_{1}}{\rho_{酒精} ​}$

    解得，牛奶的密度为${ρ}_{牛奶}=\frac{(G−{F}_{2}){ρ}_{酒精}}{G−{F}_{1}}$'
