  stem: '如图所示是中华大地丰收的场景，运粮的车辆和联合收割机在平整的稻田上以同样快慢、沿同一方向前进。关于此场景，下列说法正确的是（　　）


    ![](figures/image12.png)'
  options:
    A: 以运粮的车辆为参照物，联合收割机是运动的
    B: 以联合收割机为参照物，运粮的车辆是静止的
    C: 以运粮车辆上的司机为参照物，运粮的车辆是运动的
    D: 以远处的大树为参照物，联合收割机是静止的
  answer: B
  solution: 'AB.由于运粮的车辆和联合收割机以同样快慢、向同一方向前进，它们相互之间的相对位置没有发生变化，所以选取它们其一作为参照物，另外一个对象都是静止的，故A错误，B正确；

    C.运粮的车与车上的司机之间没有发生相对位置的变化，所以以车上的司机为参照物，运粮的车辆是静止的，故C错误；

    D.以远处的大树为参照物，正在行驶的联合收割机的位置发生变化，故联合收割机是运动的，故D错误。

    故选B。'
