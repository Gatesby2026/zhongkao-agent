  stem: '关于图中所示的实例，下列说法正确的是（　　）


    ![](figures/image13.png)'
  options:
    A: 背包的背带做得较宽，是为了增大压强
    B: 三峡船闸工作时，是利用连通器的原理
    C: 吸盘式挂钩吸在墙壁上，是因为分子间存在引力
    D: 乘客需在安全线外等候列车进站，是因为列车周围的空气流速快压强大
  answer: B
  solution: 'A．书包的背带做得较宽，是在压力一定时，通过增大受力面积来减小压强，故A错误；

    B．三峡的船闸，闸室和上、下游能构成连通器，是利用连通器原理工作的，故B正确；

    C．吸盘式挂钩吸在墙壁上，是因为吸盘内的气压小于吸盘外的气压，大气压把吸盘压在墙壁上，故C错误；

    D．乘客需在安全线外等候列车进站，是因为列车周围的空气流速大压强小，安全线外的空气流速慢，气压大，如果乘客站在安全线以内，会发生危险，故D错误。

    故选B。'
