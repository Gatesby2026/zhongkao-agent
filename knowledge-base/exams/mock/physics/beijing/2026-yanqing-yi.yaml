  stem: 下图所示的光现象，由于光的折射形成的是（　　）
  options:
    A: '![](figures/image7.png)我国古代利用日晷计时'
    B: '![](figures/image8.png)幕布上呈现人偶的剪影'
    C: '![](figures/image9.png)削冰成镜向日取火'
    D: '![](figures/image10.png)桥在水中形成倒影'
  answer: C
  solution: 'A．我国古代利用日晷计时，是因为光沿直线传播，晷针的影子才会随时间变化，故A不符合题意；

    B．幕布上呈现人偶的剪影，是由于光在同种均匀介质中沿直线传播，光被人偶挡住后形成影子，故B不符合题意；

    C．削冰成镜向日取火，这里的冰镜相当于凸透镜，光经过凸透镜时发生折射，将太阳光会聚到一点从而取火，是由于光的折射形成的，故C符合题意；

    D．桥在水中形成倒影，属于平面镜成像，是光的反射现象，故D不符合题意。

    故选C。'
