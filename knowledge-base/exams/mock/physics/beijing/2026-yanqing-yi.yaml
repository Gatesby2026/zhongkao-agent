  options:
    A: 同学们的歌声是由声带振动产生的
    B: 歌声在空气中的传播速度是![](figures/image11.png)
    C: “放声高歌”中的“高”是指声音的音色好
    D: 观众根据响度辨别不同乐器的伴奏声
  answer: A
  solution: 'A．声音是由物体振动产生的，同学们的歌声是由声带振动产生的，故A正确；

    B．声音在15℃空气中的传播速度约为340m/s，而不是3×108m/s，3×108m/s是光在真空中的传播速度，故B错误；

    C．放声高歌中的高是指声音的响度大，而不是音色好，故C错误；

    D．观众能够辨别不同乐器的伴奏声，是根据声音的音色不同，而不是响度，故D错误。

    故选A。'
