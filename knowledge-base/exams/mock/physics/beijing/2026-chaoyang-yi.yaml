- id: 26
  type: 计算
  score: 4
  stem: '26. 潜标是海洋科学观测中用于长期获取水下环境数据的重要装备，可将观测设备置于海面以下，通过多层传感器实现全海深多要素同步观测。它主要由主浮体、观测设备、若干浮球和释放器组成，将它们用缆绳串联，并通过重块锚定在海底。回收时通过释放器与重块脱离，在主浮体和浮球共同作用下，使整体设备浮出海面。在某次深海科学观测时，工作人员需要投放一套潜标，其简化模型如图所示，其中主浮体重4000N，体积为0.8m³，位于海面以下50m的位置；观测设备（分布在缆绳上的不同位置）总重3000N，总体积为0.1m³；15个浮球、缆绳和释放器总重6000N，每个浮球的体积为0.05m³；释放器位于深度3000m的位置；缆绳和释放器的体积忽略不计。g取10N/kg，海水的密度取$1.0
    \times 10^3 \, \text{kg/m}^3$。求：


    (1)释放器所受海水的压强。


    (2)重块对释放器的拉力。


    [图]'
  figure: 2026-chaoyang-yi/figures/q26.png
  answer: 3×10^7 Pa；3.5×10^3 N
  solution: "(1) p = ρ * g * h = 1.0 × 10^3 kg/m^3 × 10N/kg × 3000m = 3 × 10^7 Pa \n(2) 对潜标整体受力分析如右图 \n潜标受到的总浮力： \nF_浮 = ρ\
    \ * g * V_排 = 1.0 × 10^3 kg/m^3 × 10N/kg × (0.8m^3 + 0.1m^3 + 0.05m^3 + 15) = 1.65 × 10^4 N \n潜标受到的总重力 G_标： \nG_标 = G_上\
    \ + G_下 + G_排 = 4000N + 3000N + 6000N = 13000N \nF_拉 = F_浮 - G_标 = 1.65 × 10^4 N - 1.3 × 10^4 N = 3.5 × 10^3 N"
