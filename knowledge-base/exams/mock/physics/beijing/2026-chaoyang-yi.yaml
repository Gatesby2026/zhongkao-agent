- id: 25
  type: 计算
  score: 4
  stem: '25. 如图所示的是一种家用插线板，其指示灯为一个发光二极管。发光二极管正常工作时两端的电压为2V，通过的电流为10mA。已知插线板允许通过的最大电流为10A，家庭电路的电压为220V。


    (1)为了使指示灯正常工作，需要串联一个电阻器，求电阻器的电阻。


    (2)一个额定功率为800W的电饭锅接在插线板上且正常工作，为保证插线板的安全使用，还可以接入一个额定功率不超过多大的用电器？（指示灯的电功率可忽略不计）


    [图]'
  figure: 2026-chaoyang-yi/figures/q25.png
  answer: 21800Ω；1400W
  solution: '(1) $U_{\text{上}} = U - U_{\text{下}} = 220V - 2V = 218V$

    $R_{\text{上}} = U_{\text{上}} / I = 218V / 0.01A = 21800\Omega$

    (2) $P_{\text{上}} = U / I = 220V \times 10A = 2200W$

    $P_{\text{下}} = P_{\text{上}} - P_{\text{下}} = 2200W - 800W = 1400W$'
