- id: 9
  type: 单选
  score: 2
  stem: 将两根阻值分别为R1和R2的电阻丝接入电路中工作，已知R1<R2，忽略温度对电阻的影响，则下列说法正确的是（　　）
  options:
    A: 若R1、R2串联，通过R1的电流小于通过R2的电流
    B: 若R1、R2串联，R1两端的电压小于R2两端的电压
    C: 若R1、R2并联，通过R1的电流小于通过R2的电流
    D: 若R1、R2并联，R1两端的电压大于R2两端的电压
  answer: B
  solution: 串联电路的电流特点是电流处处相等，因此串联时通过R1、R2的电流相等，根据欧姆定律$U = I R$，电流相同时，电压与电阻成正比，由于$R_{1} < R_{2}$，所以$U_{1} < U_{2}$；并联电路各支路两端电压相等，因此并联时R1、R2两端电压相等，根据欧姆定律$I
    = \frac{U}{R}$，电压相同时，电流与电阻成反比，由于$R_{1} < R_{2}$，所以$I_{1} > I_{2}$，故选B。
