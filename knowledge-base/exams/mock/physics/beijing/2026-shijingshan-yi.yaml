  stem: '如图所示的电路中，电源两端电压U=4V并保持不变，电阻R1的阻值为10Ω。闭合开关S后，电流表示数是0.6A。求：


    ![](figures/image144.png)


    （1）通过电阻R1的电流；


    （2）电阻R2的阻值；


    （3）10s内整个电路消耗的电能。'
  answer: ''
  solution: '（1）0.4A      （2）20Ω    （3）24J


    详解：（1）

    根据并联电路电压规律，$R_{1}$两端电压等于电源电压，即$U_{1} = U = 4 \text{V}$

    通过电阻R1的电流$I_{1} = \frac{U_{1}}{R_{1}} = \frac{4 \text{V}}{10 \Omega} = 0 . 4 \text{A}$


    （2）

    根据并联电路电流规律，干路电流等于各支路电流之和，可得通过$R_{2}$的电流$I_{2} = I - I_{1} = 0 . 6 \text{A} - 0 . 4 \text{A} = 0 . 2 \text{A}$

    $R_{2}$两端电压$U_{2} = U = 4 \text{V}$

    电阻R2的阻值$R_{2} = \frac{U_{2}}{I_{2}} = \frac{4 \text{V}}{0 . 2 \text{A}} = 20 \Omega$


    （3）

    10s内整个电路消耗的电能$W = U I t = 4 \text{V} \times 0 . 6 \text{A} \times 10 \text{s} = 24 \text{J}$'
