- id: 26
  type: 计算题
  score: 4
  stem: '实践小组的同学将刻度均匀，量程0~30cm的钢板尺改装成可以测量固体密度的工具。他们的改装过程如下：用细线悬挂钢板尺，制成杠杆，悬挂在铁架台上，调节细线位置到O点，使杠杆水平平衡。在溢水杯中装满水，溢水口接好塑料袋（质量忽略不计），用细线悬挂小石块，将其浸没在水中，如图甲所示；当溢出的水全部流入塑料袋后，把小石块取出擦干并挂在杠杆左侧A点，取下溢水杯口的水袋，挂在杠杆右侧，移动水袋到B点，使杠杆再次水平平衡，如图乙所示。（g取10
    N/kg，水的密度ρ水=1.0×103 kg/m3）


    ![](figures/image153.png)


    （1）如图乙所示，若O点在钢板尺16 cm刻度线处，A点在11 cm刻度线处，B点在28 cm刻度线处，计算小石块的密度；


    （2）仍在溢水杯中装满水，用此套装置测量不同固体的密度。如图丙所示，当杠杆以左侧M点作为待测物悬挂点，该装置可测量固体的最大密度值为ρ1，若将杠杆左侧N点作为待测物悬挂点，该装置可测量固体的最大密度值为ρ2，分析比较ρ1与ρ2的大小。'
  answer: ''
  solution: '（1）$2 . 4 \times 10^{3} \text{kg} / \text{m}^{\text{3}}$      （2）$\rho_{1} < \rho_{2}$


    详解：（1）

    根据杠杆平衡条件，$G_{石} \cdot l_{\text{OA}} = G_{排} \cdot l_{\text{OB}}$，即$\frac{G_{石}}{G_{排}} = \frac{l_{\text{OB}}}{l_{\text{OA}}}$

    将$F_{浮} = G_{排} = \rho_{水} g V_{排}$，$G_{石} = m_{石} g = \rho_{石} g V_{石}$代入上式，且石块浸没在水中，$V_{石} = V_{排}$，可得$\frac{G_{石}}{G_{排}}
    = \frac{\rho_{石} g V_{石}}{\rho_{水} g V_{排}} = \frac{\rho_{石}}{\rho_{水}} = \frac{l_{\text{OB}}}{l_{\text{OA}}}$

    其中$l_{\text{OA}} = l_{\text{A}} - l_{\text{O}} = 16 \text{cm} - 11 \text{cm} = 5 \text{cm}$，$l_{\text{OB}} = l_{\text{B}}
    - l_{\text{O}} = 28 \text{cm} - 16 \text{cm} = 12 \text{cm}$

    小石块的密度为$\rho_{石} = \frac{l_{\text{OB}}}{l_{\text{OA}}} \rho_{水} = \frac{12 \text{cm}}{5 \text{cm}} \times 1 . 0 \times
    10^{3} \text{kg} / \text{m}^{3} = 2 . 4 \times 10^{3} \text{kg} / \text{m}^{3}$


    （2）

    当水袋挂在杠杆右端最远点，设为D点时，即30cm刻度线，以左端M点作为待测物悬挂点，则最大可测量的密度为$\rho_{1} = \frac{l_{\text{OD}}}{l_{\text{OM}}} \rho_{水}$

    以左端N点作为待测物悬挂点，则最大可测量的密度为$\rho_{2} = \frac{l_{\text{OD}}}{l_{\text{ON}}} \rho_{水}$

    由于$l_{\text{OM}} > l_{\text{ON}}$，$l_{\text{OD}}$和$\rho_{水}$一定，因此$\rho_{1} < \rho_{2}$。'
