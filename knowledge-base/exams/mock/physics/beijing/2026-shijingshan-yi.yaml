  answer: A
  solution: 'A．动能大小和物体质量、速度有关，机器人加速奔跑时，质量不变，速度增大，因此动能逐渐增大，故A正确；

    B．物体运动状态包含速度大小和运动方向，机器人跳起腾空时，受重力作用，速度大小和运动方向都会发生变化，运动状态改变，故B错误； 

    C．机器人落回地面是因为受到重力的作用；惯性是物体本身的固有性质，不能说“受到惯性作用”，故C错误；

    D．机器人对舞台的压力受力物体是舞台，机器人自身重力的受力物体是机器人，两个力作用在不同物体上，且方向相同，不是一对平衡力，故D错误。

    故选A。'
