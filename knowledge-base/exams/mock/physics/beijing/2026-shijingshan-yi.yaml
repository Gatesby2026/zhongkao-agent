- id: 10
  type: 单选
  score: 2
  stem: '利用一个动滑轮将重为400N的货箱A竖直匀速提升2m，用时10s，此过程中，施加在绳自由端竖直向上的拉力F为250N。下列说法正确的是（　　）


    ![](figures/image14.png)'
  options:
    A: 动滑轮重为100N
    B: 绳子自由端移动的速度是0.2m/s
    C: 拉力F所做的功为500J
    D: 滑轮组的机械效率是80%
  answer: D
  solution: 'A．不计绳重和摩擦时，动滑轮重力为$G_{动} = n F - G_{物} = 2 \times 250 \text{N} - 400 \text{N} = 100 \text{N}$

    如果考虑绳重和摩擦，动滑轮重力实际小于$100 N$，故A错误；

    B．绳子自由端移动距离$s = n h = 2 \times 2 m = 4 m$

    自由端移动速度$v = \frac{s}{t} = \frac{4 \text{m}}{10 \text{s}} = 0 . 4 \text{m}/\text{s}$

    故B错误；

    C．拉力做的总功$W_{总} = F s = 250 \text{N} \times 4 \text{m} = 1000 \text{J}$

    故C错误；

    D．对货箱做的有用功$W_{有} = G_{物} h = 400 \text{N} \times 2 \text{m} = 800 \text{J}$

    机械效率$\eta = \frac{W_{有}}{W_{总}} \times 100 \% = \frac{800 \text{J}}{1000 \text{J}} \times 100 \% = 80 \%$

    故D正确。

    故选D。'
