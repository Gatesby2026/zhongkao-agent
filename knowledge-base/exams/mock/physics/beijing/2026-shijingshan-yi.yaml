- id: 14
  type: 多选
  score: 2
  stem: '某实验小组设计了一款防溺水定位求救报警器，其简化电路如图甲所示。已知电源电压恒为6V，报警器由电压表改装而成，且并联在定值电阻R0两端，R是一个压敏电阻，其阻值随潜水深度h变化的关系图像如图乙所示。当报警器未进入水中时，电路中电流表示数为0.12A；当潜水深度$h
    \geq 1 \text{m}$时，R0两端的电压大于或等于警戒电压U，报警器开始触发报警。下列说法正确的是（　　）


    ![](figures/image50.png)'
  options:
    A: R0的阻值为10 Ω
    B: R的阻值随着h的增大而增大
    C: 警戒电压U=1.5 V
    D: 将R0更换为另一阻值更小的电阻，可使报警器在更浅处报警
  answer: AC
  solution: 'A．报警器未入水时，潜水深度$h = 0$，由图乙得此时$R = 40 \Omega$。已知电源电压$U = 6 \text{V}$，电流$I = 0 . 12 \text{A}$，总电阻$R_{总} = \frac{U}{I}
    = \frac{6 \text{V}}{0 . 12 \text{A}} = 50 \Omega$

    因此$R_{\text{0}}$的阻值$R_{0} = R_{总} - R = 50 \Omega - 40 \Omega = 10 \Omega$

    故A正确；

    B．由图乙可知，潜水深度$h$增大时，压敏电阻$R$的阻值减小，故B错误；

    C．当$h = 1 \text{m}$时，由图乙得$R = 30 \Omega$，此时电路电流$I^{''} = \frac{U}{R_{0} + R} = \frac{6 \text{V}}{10 \Omega + 30 \Omega}
    = 0 . 15 \text{A}$

    $R_{0}$两端电压即警戒电压$U = I^{''} R_{0} = 0 . 15 \text{A} \times 10 \Omega = 1 . 5 \text{V}$

    故C正确；

    D．报警要求$R_{0}$两端电压达到警戒电压$U$，由$U = \frac{U_{总} R_{0}}{R + R_{0}}$变形得临界压敏电阻$R = R_{0} \cdot \frac{U_{总} - U}{U}$​

    若更换阻值更小的$R_{0}$​，临界$R$会更小，而$R$越小对应深度$h$越大，说明需要更深才会报警，故D错误。

    故选AC。'
