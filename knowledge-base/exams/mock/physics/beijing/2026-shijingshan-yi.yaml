- id: 12
  type: 单选
  score: 2
  stem: 某风力发电系统可以为路灯供电。该风力发电机叶片旋转面面积为$S = 2 \text{m}^{2}$，在风速v =8m/s时，空气密度为$\rho = 1 . 2 \text{kg}/\text{m}^{3}$，时间t内通过某一截面的风能大小为$\frac{1}{2}
    \rho S v^{3} t$，风能利用效率为30%。路灯（LED灯）功率为12W，额定电压为24V，系统还配备了蓄电池储存电能，供无风时照明。假设风能先转化为电能，再对蓄电池充电，充电效率为90%，蓄电池放电供灯工作的效率为95%。下列说法正确的是（　　）
  options:
    A: 风能是不可再生能源
    B: 风力发电机对蓄电池充电过程中，将机械能直接转化为化学能
    C: 在8m/s的风速下，风力发电机的输出电功率为184.32W
    D: 充满电的蓄电池可让该 LED 灯正常工作20小时，蓄电池储存的能量约为$0 . 28 \text{kW}\cdot\text{h}$
  answer: C
  solution: 'A．风能可以源源不断从自然界获取，属于可再生能源，故A错误；

    B．风力发电机给蓄电池充电的过程：先将风能（机械能）转化为电能，再将电能转化为蓄电池的化学能储存，并不是机械能直接转化为化学能，故B错误；

    C．根据题意，$t$时间内总风能为$E_{风} = \frac{1}{2} \rho S v^{3} t$，风能利用效率为30%，风力发电机输出电功率为 $P = \frac{E_{风} \times 30 \%}{t} = \frac{1}{2}
    \rho S v^{3} \times 30 \%$

    风力发电机的输出电功率$P = \frac{1}{2} \rho S v^{3} \times 30 \% = \frac{1}{2} \times 1 . 2 \text{kg}/\text{m}^{3} \times 2 \text{m}^{2}
    \times \left(\left(8,\text{m}/\text{s}\right)\right)^{3} \times 30 \% = 184 . 32 \text{W}$

    故C正确；

    D．LED灯正常工作20小时消耗的电能$W_{灯} = P t = 12 \times 10^{- 3} \text{kW} \times 20 \text{h} = 0 . 24 \text{kW} \cdot \text{h}$

