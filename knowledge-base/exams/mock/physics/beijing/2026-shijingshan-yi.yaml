- id: 11
  type: 单选
  score: 2
  stem: '某电动汽车在水平路面上沿直线向前运动，行驶过程中所受到的阻力不变，当车速从v =10m/s逐渐增大至某速度值后，汽车保持匀速直线运动。此过程中，汽车所受牵引力F与速度的倒数（$\frac{1}{v}$）的关系如图中实线所示。关于上述过程说法正确的是（　　）


    ![](figures/image23.png)'
  options:
    A: 牵引力F做功的功率恒为1000W
    B: 加速过程中，牵引力F越来越小
    C: 当v = 20 m/s，汽车所受阻力为5×103N
    D: 加速过程中，牵引力F对汽车做功越来越快
  answer: B
  solution: '根据功率公式 $P = F v$，变形得 $F = P \times \frac{1}{v}$，可知图中倾斜段$F$与$\frac{1}{v}$成正比，说明此段功率$P$保持不变，结合图像计算分析各选项：

    A．取点 $\frac{1}{v} = 0 . 10 \text{s}/\text{m}$，$F = 1 . 0 \times 10^{4} \text{N}$，计算功率 $P = F v = F \times \frac{1}{\frac{1}{v}}
    = 1 . 0 \times 10^{4} \text{N} \times \frac{1}{0 . 10} \text{m}/\text{s} = 1 \times 10^{5} \text{W} = 100000 \text{W}$

    不是$1000 \text{W}$，故A错误；

    B．加速过程车速$v$逐渐增大，因此$\frac{1}{v}$逐渐减小，由图像可知：$\frac{1}{v}$减小时，$F$逐渐减小，因此牵引力越来越小，故B正确；

    C．汽车最终匀速时，牵引力等于阻力，最大速度对应$\frac{1}{v} = 0 . 03 \text{s}/\text{m}$，此时$F = 0 . 3 \times 10^{4} \text{N} = 3 \times 10^{3}
    \text{N}$，阻力$f = F = 3 \times 10^{3} \text{N}$，阻力全程不变，因此$v = 20 \text{m}/\text{s}$时阻力仍为$3 \times 10^{3} \text{N}$，故C错误；

    D．做功快慢就是功率，加速过程中功率$P = F v$保持不变，因此牵引力做功的快慢不变，故D错误。

    故选B。'
