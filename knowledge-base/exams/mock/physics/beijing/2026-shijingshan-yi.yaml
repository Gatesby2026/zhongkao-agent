    B.用精密温度计记录水温变化

    C.在氧弹中充入高压氧气

    D.通过恒温控制系统保持外筒温度恒定

    (4)某绝热式量热计的前期电能标定实验中，测得标准加热电阻丝两端电压为10V，

    通过标准加热电阻丝的电流为5A，通电时间为2min，此时内筒中的水温升高____0.6℃。使用该绝热式量热计测量1g燃料样品的热值，待其完全燃烧后，内筒中

