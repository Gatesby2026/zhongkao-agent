  score: 4
  stem: '请阅读《氧弹量热计》，并回答问题。


    氧弹量热计


    物理学中，热值被定义为燃料完全燃烧时释放出的热量与其质量的比。燃料的质量可以通过电子天平测得非常精确，而燃料完全燃烧所释放出的热量，通常需要借助一种称为“氧弹量热计”的装置进行测量，如图所示。


    氧弹量热计的基本原理并不复杂：燃料燃烧释放的热量使水温升高，通过水温升高值推算出燃烧所放出的热量。测量时，为了使燃料样品完全燃烧，需要将氧弹充入高压氧气。将氧弹置于盛有定量水的内筒中，点燃燃料样品后，其所释放的热量被内筒中的水吸收，待燃烧完全后，用精密温度计记录水温变化。


    如果外筒水温低于内筒，热量会散失到外筒中，导致测量不准。为此，氧弹量热计主要分为绝热式和恒温式两种。绝热式通过调节外筒水温，使其与内筒保持一致，阻止热量散失。恒温式则保持外筒温度恒定，由于热交换速率主要取决于温差，此时温差仅由内筒温度决定，因此可用数学方法算出热损失。绝热式量热计主要用于国家级计量院、标准物质定值等高精度场景。恒温式量热计制造成本低、维护简便，在实际应用中更为普遍。


    然而，燃料样品燃烧所放出的热量，不仅用于升高水温，也会使测量装置本身温度上升，使用同一量热计测量时，整个系统的热容量（C）是不变的。热容量（C）是量热系统温度升高（或降低）所吸收（或放出）的热量Q与温度变化量$\Delta t$的比，可以通过前期标定实验来测定。其中电能标定的方法是在氧弹内安装标准加热电阻丝，通电后使其加热内筒中的水。由于电压和电流能够被精确地测量，电阻丝在特定时间内释放的热量可以准确得出。对于绝热式量热计而言，只需再测出内筒水温的变化，即可根据公式计算出量热计的总热容量。


    ![](figures/image138.png)


    （1）绝热式与恒温式量热计中，______式量热计在实际应用中更为普遍；


    （2）燃料燃烧释放的热量使水温升高，水的内能是通过______（选填“做功”或“热传递”）的方式增加的；


    （3）以下操作的目的是使燃料样本完全燃烧的是（　　）


    （4）某绝热式量热计的前期电能标定实验中，测得标准加热电阻丝两端电压为10V，通过标准加热电阻丝的电流为5A，通电时间为2min，此时内筒中的水温升高0.6℃。使用该绝热式量热计测量1g燃料样品的热值，待其完全燃烧后，内筒中水温升高2.5℃，则该燃料样品的热值为______J/kg。'
  options:
    A: 用燃料燃烧释放的热量加热水
    B: 用精密温度计记录水温变化
    C: 在氧弹中充入高压氧气
    D: 通过恒温控制系统保持外筒温度恒定
  answer: ''
  solution: '（1）恒温    （2）热传递    （3）C      （4）$2 . 5 \times 10^{7}$


    详解：（1）

    由文章第三段可知，恒温式量热计制造成本低、维护简便，在实际应用中更为普遍。


    （2）

    燃料燃烧释放热量，热量被水吸收，使水的内能增加、温度升高，该过程是能量的转移，是通过热传递的方式改变水的内能。


    （3）

    A．用燃料燃烧释放的热量加热水的目的是通过水温变化推算燃烧放热，故A不符合题意；

    B．用精密温度计记录水温变化的目的是准确测量温度变化量，故B不符合题意；

    C．根据材料第二段原文“测量时，为了使燃料样品完全燃烧，需要将氧弹充入高压氧气。”可知在氧弹中充入高压氧气的目的是使燃料样本完全燃烧，故C符合题意；

    D．通过恒温控制系统保持外筒温度恒定的目的是方便计算热损失、减小测量误差，故D不符合题意。

    故选C。


    （4）

    标定实验中电阻丝释放的热量$Q = W = U I t = 10 \text{V} \times 5 \text{A} \times 2 \times 60 \text{s} = 6000 \text{J}$

    量热计的热容量$C = \frac{Q}{\Delta t_{1}} = \frac{6000 \text{J}}{0 . 6 \text{\textdegree C}} = 1 \times 10^{4} \text{J} / \text{\textdegree
    C}$

    燃料完全燃烧放出的总热量$Q_{放} = C \Delta t_{2} = 1 \times 10^{4} \text{J} / \text{\textdegree C} \times 2 . 5 \text{\textdegree C}
    = 2 . 5 \times 10^{4} \text{J}$

    则燃料热值$q = \frac{Q_{放}}{m} = \frac{2 . 5 \times 10^{4} \text{J}}{1 \times 10^{- 3} \text{kg}} = 2 . 5 \times 10^{7} \text{J}
    / \text{kg}$'
