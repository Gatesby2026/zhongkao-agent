- id: 23
  type: 实验探究
  score: 3
  stem: '各种饮品中的水果冰块，是将水果与水冻在一起，制作成不同形状的冰块。小石将一块含有草莓的水果冰块放入装满水的玻璃杯中，待水不再流出，擦干玻璃杯。此时水果冰块漂浮在水面上，如图所示。请用所学的知识进行判断，当草莓外部的冰完全熔化后，水是否会从玻璃杯中溢出？请写出推理过程。（其中ρ水>ρ草莓>ρ冰，且整个过程，草莓和水的密度不发生变化，不考虑蒸发等其它造成的液体质量减少的因素）


    ![](figures/image129.png)'
  answer: ''
  solution: '如图，当冰没有熔化时，水果冰块漂浮在水面上，根据漂浮条件，总浮力等于总重力，则$F_{浮\text{1}} = G_{总} = G_{冰} + G_{草莓}$

    所以总排开水的体积$\Delta V_{\text{1}} = V_{排} = \frac{F_{浮\text{1}}}{\rho_{水} g} = \frac{G_{冰} + G_{草莓}}{\rho_{水} g} = \frac{m_{冰}
    + m_{草莓}}{\rho_{水}}$

    当冰块全部熔化后，此时得到水的质量不变，因此$m_{冰化水} = m_{冰}$，因为$\rho_{草莓} < \rho_{水} ，$草莓最终会漂浮在水面上，根据漂浮条件，有$F_{浮\text{2}} = G_{草莓}$，则熔化水的体积加草莓的排开体积总和$\Delta
    V_{2} = V_{冰化水} + V_{排草莓} = \frac{m_{冰化水}}{\rho_{水}} + \frac{F_{浮\text{2}}}{\rho_{水} g} = \frac{m_{冰}}{\rho_{水}} + \frac{G_{草莓}}{\rho_{水}
    g} = \frac{m_{冰} + m_{草莓}}{\rho_{水}}$

    即总体积和原来冰块漂浮时的排开体积相等，原来放入冰块后已经溢出了体积为$V_{排}$​的水，此时水面与杯口相平，所以熔化后水面高度不变，因此水不会溢出。'
