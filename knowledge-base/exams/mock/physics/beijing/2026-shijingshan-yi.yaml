- id: 15
  type: 多选
  score: 2
  stem: '我国是全球首个实现月壤砖全流程自主研发并完成太空暴露实验的国家。月壤砖呈榫卯结构，如图甲所示。小石采用图乙所示的长方体样品A进行探究，样品A的长、宽、高分别为20cm、5cm、10cm，密度为2×103kg/m3。现从样品A上表面的正中间切割出一个截面为正方形且边长为l的凹槽，得到具有榫卯结构的样品B，如图丙所示，测得此时样品B对水平地面的压强为1840Pa。为得到合适尺寸的构件，继续将样品B沿左侧竖直方向切去宽度为d（0<d
    <20cm）的部分，如图丁所示。g取10N/kg，下列说法正确的是（　　）


    ![](figures/image68.png)'
  options:
    A: 从样品A上表面切去部分的质量为0.16kg
    B: 样品B中凹槽的截面边长l=2cm
    C: 若样品B切去宽度d=10cm，其右侧剩余部分对水平地面的压强等于1840Pa
    D: 若样品B切去宽度d满足0<d <8cm，其右侧剩余部分对水平地面的压强小于1840 Pa
  answer: ACD
  solution: 'A．原样品A的体积$V_{A} = 20 \text{cm} \times 5 \text{cm} \times 10 \text{cm} = 1000 \text{cm}^{3} = 1 \times 10^{- 3}
    \text{m}^{3}$

    A的质量$m_{A} = \rho V_{A} = 2 \times 10^{3} \text{kg}/\text{m}^{3} \times 1 \times 10^{- 3} \text{m}^{3} = 2 \text{kg}$

    样品B对水平地面的压力等于B的重力，接触底面积不变$S = 20 \text{cm} \times 5 \text{cm} = 100 \text{cm}^{2} = 0 . 01 \text{m}^{2}$

    物体B的重力为$G_{B} = F_{B} = p_{B} S = 1840 \text{Pa} \times 0 . 01 \text{m}^{2} = 18 . 4 \text{N}$

    则B的质量为$m_{B} = \frac{G_{B}}{g} = 1 . 84 \text{kg}$

    切去部分质量$\Delta m = m_{A} - m_{B} = 2 \text{kg} - 1 . 84 \text{kg} = 0 . 16 \text{kg}$

    故A正确；

    B．切去部分体积$\Delta V = \frac{\Delta m}{\rho} = \frac{0 . 16 \text{kg}}{2 \times 10^{3} \text{kg}/\text{m}^{3}} = 8 \times
    10^{- 5} \text{m}^{3} = 80 \text{cm}^{3}$​

    凹槽截面为正方形，边长$l$，沿宽度方向（5cm方向）通长，故$\Delta V = l^{2} \times 5 \text{cm}$

    代入得$l^{2} = 16 \text{cm}^{2}$，$l = 4 \text{cm}$，故B错误；

    C．切去宽度$d = 10 \text{cm}$，剩余长度为$10 \text{cm}$，凹槽在剩余部分的长度为$2 \text{cm}$，剩余体积 $V^{''} = 10 \times 5 \times 10 - 2 \times
    4 \times 5 = 460 \text{cm}^{3} = 4 . 6 \times 10^{- 4} \text{m}^{3}$

    则剩余物体重力$G^{''} = \rho V^{''} g = 2 \times 10^{3} \text{kg}/\text{m}^{\text{3}} \times 4 . 6 \times 10^{- 4} \text{m}^{3}
    \times 10 \text{N} / k g = 9 . 2 \text{N}$

    底面积$S^{''} = 10 \text{cm} \times 5 \text{cm} = 50 \text{cm}^{\text{2}} = 0 . 005 \text{m}^{2}$

    则压强为$p^{''} = \frac{G^{''}}{S^{''}} = \frac{9 . 2 \text{N}}{0 . 005 \text{m}^{2}} = 1840 \text{Pa}$

    故C正确。

    D．切去宽度d满足$0 < d < 8 \text{cm}$时，剩余物体压力为$G_{剩} = G_{\text{B}} - G_{切} = 18 . 4 \text{N} - \rho V_{切} g$

    $V_{切} = \left(5,c,m,\times,10,c,m,\times,d\right) \times 10^{- 6} \text{m}^{3}$

    代入化简可得$G_{剩} = \left(18,.,4,-,d\right) \text{N}$

    剩余部分底面积$S_{剩} = S_{\text{B}} - S_{切} = \left(20,\text{cm},\times,5,\text{cm},-,5,\text{cm},\times,d\right) \times 10^{-
    4} \text{m}^{2}$

    由压强公式可得$p = \frac{F}{S} = \frac{G_{剩}}{S_{剩}} = \frac{\left(18,.,4,-,d\right) \text{N}}{\left(20,\text{cm},\times,5,\text{cm},-,5,\text{cm},\times,d\right)
    \times 10^{- 4}}$

    化简得$p = \frac{\left(\right. 18 . 4 - d \left.\right) \times 10^{4}}{100 - 5 d} \text{Pa}$

    当切去宽度的取值范围为$0 < d < 8 c m$时，$p < 1840 \text{Pa}$，故D正确。

    故选ACD。'
