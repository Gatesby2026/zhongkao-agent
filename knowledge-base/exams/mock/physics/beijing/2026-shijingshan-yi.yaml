    D．捏紧自行车车闸控制了压力相同，结冰路面比柏油路面粗糙程度更小、摩擦力更小，所以更不容易停下来，能验证滑动摩擦力的大小与接触面粗糙程度有关，故D符合题意；


    （2）

    实验中控制了接触面粗糙程度、接触面受到的压力不变，只改变相对运动速度，两次测得滑动摩擦力大小相等，因此得出滑动摩擦力大小与物体相对运动速度大小无关的结论。


    （3）

    探究中控制接触面粗糙程度不变，改变压力多次实验，表格合理即可'
