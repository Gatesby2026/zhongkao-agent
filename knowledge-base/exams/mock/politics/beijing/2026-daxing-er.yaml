  solution: '①：十四届全国人大常委会表决通过法律修改决定，体现了全国人大常委会行使国家立法权，故①说法符合题意；

    ②：宪法是其他法律的立法基础和立法依据，但题干材料未涉及宪法与普通法律的关系，故②说法不符合题意；

    ③：针对人工智能新技术修订法律，促进其健康有序发展，表明我国不断完善中国特色社会主义法律体系，故③说法符合题意；

    ④：建成法治国家需要科学立法、严格执法、公正司法、全民守法等多方面共同努力，“只要……就能”说法过于绝对，故④说法错误。'
