  stem: '2026年2月1日，《全民阅读促进条例》正式施行，某班同学围绕条例展开了讨论。


    | 《全民阅读促进条例》摘选 第一条  为了促进全民阅读，推进书香社会建设，增强全民族思想道德素质和科学文化素养，提高全社会文明程度，推动建设社会主义文化强国，制定本条例。 第二条  第二款 全民阅读促进工作坚持以社会主义核心价值观为引领，传播有益于公民全面发展和社会文明进步的科学文化知识，激发公民阅读兴趣，培养公民阅读习惯，增强公民阅读能力，提升公民阅读质量，形成全社会爱读书、读好书、善读书的浓厚氛围。
    第十三条  每年4月第四周为全民阅读活动周。 第十九条  第一款 县级以上地方人民政府应当根据基本公共文化服务有关要求，加强相关场所、设施统筹利用，科学合理规划全民阅读设施建设，有计划地设置覆盖城乡、实用便利、服务高效的全民阅读设施。
    | ![](figures/image3.png) |

    |---|---|



    阅读是“私事”还是“公事”，结合所学，谈谈你的看法。'
  answer: ''
  solution: '我认为阅读既是关乎个人成长的“私事”，更是关乎社会文明与国家发展的“公事”，《全民阅读促进条例》的施行，正是以法治力量推动全民阅读的重要举措。对个人而言，阅读能增长知识、陶冶情操、提升道德修养，丰富精神文化生活，促进我们身心健康成长。对社会国家而言，全民阅读有利于提高国民整体素质，传承中华优秀传统文化，涵养社会文明风尚，助力社会主义文化强国建设。  条例的实施，以法治保障公民文化权利，体现国家重视全民阅读，说明阅读早已不是单纯的个人小事，而是关系民族发展的公共事业。条例的实施，回应了人民群众对美好生活的精神文化需求，体现了党和政府坚持以人民为中心，落实共享发展理念，增进民生福祉。  作为中学生，我们要养成爱读书、读好书、善读书的良好习惯，自觉利用阅读提升自我；积极参与校园、社区阅读活动，带动他人参与阅读，为推进全民阅读贡献力量。


    详解：从设问中可知，本题需结合《全民阅读促进条例》和漫画观点，辩证分析阅读是 “私事” 还是 “公事”，并结合所学知识作答。

    从材料中条例第一条 “增强全民族思想道德素质和科学文化素养，推动建设社会主义文化强国” 的立法目的，可知阅读不仅是个人行为，更关乎社会文明与国家发展，体现了 “公事” 的属性。

    从条例第二条 “激发公民阅读兴趣、培养阅读习惯、增强阅读能力” 的要求，以及阅读对个人知识增长、道德修养、精神生活的作用，可知阅读首先是关乎个人成长的 “私事”，能促进个体身心健康发展。

    从条例以法治推动全民阅读、保障公民文化权利的做法，可知阅读已成为关系民族发展的公共事业，体现了党和政府以人民为中心的发展思想，回应了群众的精神文化需求。

    从漫画中 “阅读不是私事，更是关乎国家发展的公事” 的观点，可知我们既要认识到阅读对个人的价值，也要看到其对社会国家的意义，作为中学生应主动参与阅读，为全民阅读贡献力量。'
