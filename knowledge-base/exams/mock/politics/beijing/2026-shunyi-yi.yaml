  solution: 'A：行政机关负责国家行政管理工作，交通秩序治理属于其职权范围，依法行政严格治理乱象有利于安全骑行，故A说法符合题意；

    B：立法权属于人民代表大会及其常务委员会，人大代表个人享有提案权等权利但没有立法权，故B说法错误；

    C：监察机关负责对行使公权力的公职人员进行监察，不直接处置普通公民的交通违法行为，故C说法错误；

    D：审判机关是人民法院，行使审判权；检察机关是人民检察院，行使检察权，选项职权搭配错误，故D说法错误；'
