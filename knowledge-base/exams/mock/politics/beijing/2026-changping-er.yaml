  stem: '阅读材料，回答问题。


    某校初三年级开展“校园观察与思考”主题活动，同学们记录了以下三个镜头。


    【镜头一  合唱比赛】


    校合唱比赛前，大家节奏不齐，有人想放弃。班长说：“咱们是一个集体，每个人都很重要！”大家都是为了班级的荣誉而战。擅长音乐的同学主动当起领唱，内向的小林也鼓起勇气参与其中。最终，在大家的共同努力之下班级获得了第一名的好成绩。


