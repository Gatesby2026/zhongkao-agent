  stem: '阅读材料，回答问题。


    在学校开展的国旗下讲话活动中，小明同学以 “国家发展与时代成就” 为题发言，以下是他发言的节选。


    2025年至2026年初，我国综合国力实现新突破。国家统计局数据显示，2025年我国GDP达140.19万亿元，制造业增加值连续16年居世界第一；国家发改委介绍，我国高铁运营里程超4.8万公里，新能源汽车产量占全球60%以上；国家文物局公布，我国世界遗产总数达60项，国家级非遗代表性项目达1557项。


    据新华社和央视网报道，2025年9月至2026年1月，我国国防和军队建设取得一系列重大进展：福建舰正式入列，人民海军迈入 “三航母时代”；歼—35、空警—600等新型舰载机成功完成电磁弹射起飞与着舰训练；新域新质作战力量比重提升，无人作战、智能对抗等新质战斗力加速生成；全军大抓实战化练兵，有效捍卫国家主权、安全、发展利益。


