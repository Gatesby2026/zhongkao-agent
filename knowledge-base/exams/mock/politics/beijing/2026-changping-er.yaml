    \ \n③：思维导图中立法流程的第一步是坚持党的全面领导，体现了中国共产党是最高政治领导力量，我国立法工作坚持党领导立法，故③符合题意； \n④：全国人大是最高国家权力机关，行使立法权等职权；国家行政机关才是国家权力机关的执行机关，行使依法行政职权，故④说法错误。"
