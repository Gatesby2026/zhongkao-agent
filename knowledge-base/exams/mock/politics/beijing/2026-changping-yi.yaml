  stem: '2025年7月，中国在上海成功举办世界人工智能大会暨人工智能全球治理高级别会议，发表《人工智能全球治理行动计划》，倡议秉持开放共享精神，搭建各类国际科技合作平台，营造创新友好的政策环境，共同推动人工智能技术创新突破与持续发展，这表明中国（   ）


    ①主导人工智能领域的国际规则制定，保护自身技术


    ②展现负责任大国形象，积极参与全球人工智能治理


    ③推动人工智能领域国际合作，促进新兴技术造福人类


    ④引领全球治理体系变革，在国际事务中发挥决定性作用'
  options:
    A: ①②
    B: ①④
    C: ②③
    D: ③④
  answer: C
  solution: '①：中国主张共商共建共享的全球治理观，不主导国际规则制定，且倡议开放共享而非单纯保护自身技术，故①说法错误；

    ②：举办大会并发布行动计划，体现了中国积极参与全球人工智能治理，展现负责任大国形象，故②说法正确；

    ③：搭建国际科技合作平台，推动技术创新突破，表明中国推动国际合作，促进新兴技术造福人类，故③说法正确；

    ④：中国在国际事务中发挥重要作用和建设性作用，而非决定性作用，故④说法错误；'
