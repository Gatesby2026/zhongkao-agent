    【活动二：主题讲座】


    学校邀请专家，为我们做了一场关于粮食安全的主题讲座。专家从“一粒种子”谈起，讲述了我国创造的“用有限耕地养活众多人口”的奇迹。这让同学们深刻认识到粮食安全是“国之大者”，需要人人参与、共同守护。


    【活动三：红色研学】


