- id: 25
  type: 作文
  score: 8
  stem: '学校广播站开设了“心中的光”特别栏目，征集同学们心中的榜样，同学们踊跃投稿。以下是精选出的三份来稿。


    | 他是我们心中耀眼的光。共和国勋章获得者李振声，我国小麦远缘杂交育种领域的奠基人。他数十年如一日扎根田间，攻克了小麦与偃麦草远缘杂交的世界性难题，培育出“小偃”系列优良品种，为国家粮食安全作出了卓越贡献。他常说：“科研要为国家做事，为人民做事。”即使年事已高，他仍坚持深入田间地头，把毕生精力奉献给祖国大地。
    |

    |---|

    | 他们是城市里温暖的光。一群城市守护者，是大街小巷的环卫工人，每天凌晨四点开始工作，无论严寒酷暑，始终坚守岗位。他们用扫帚守护城市的整洁，用汗水换来市民的舒心。有人说他们是“城市美容师”，他们说：“让大家出门有个好环境，我们就满足了。”
    |

    | 他们是邻里间明亮的光。一个社区助老志愿服务队，由社区居民自发组成，专门为独居老人提供日常照护、陪伴就医、代买物资等服务。队员们大多是退休职工。他们说：“我们还能动，就多帮帮更需要帮助的人。”他们用点滴行动温暖了社区的每一个角落。 |


    每一个奋力奔跑的身影，都闪闪发光。结合材料，运用所学，以“追光·发光”为题写一篇倡议书。


    要求：观点明确，逻辑清晰，不少于80字。'
  answer: ''
  solution: '亲爱的同学们：为弘扬社会主义核心价值观，以榜样精神激励大家奋发向上，我向全体同学发出如下倡议：  一、学习榜样精神，厚植家国情怀。以院士、环卫工人、志愿者为榜样，坚守初心、甘于奉献，将个人理想与国家发展紧密结合。  二、立足实干担当，践行社会主义核心价值观。从点滴小事做起，勤奋学习、乐于助人、锤炼本领，以实际行动服务他人、奉献社会。  三、凝聚青春力量，勇担强国使命。以榜样为指引，勤学笃行、发光发热，让青春在追梦路上绽放光彩，共筑复兴梦想。  同学们，让我们行动起来，以榜样为镜，以实干为笔，共同书写属于我们这一代人的青春答卷！


    详解：设问要求写倡议书，需要对材料进行关键词提炼。

    他是我们心中耀眼的光，可联系学习榜样精神，厚植家国情怀；

