    | ③ | 北京拥有顶尖科研资源，天津具备先进制造基础，河北拥有产业配套优势，三地聚焦人工智能、生物医药、新能源等领域协同创新，共建京津冀国家技术创新中心体系，各要素自由流动、高效配置，成果快速转化，不断加快发展新质生产力。 |

