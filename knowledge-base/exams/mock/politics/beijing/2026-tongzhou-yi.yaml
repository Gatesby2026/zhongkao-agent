  stem: '以法护绿


    | 党的二十届三中全会明确提出“编纂生态环境法典”，将其作为推进生态文明建设的核心法治保障。 | → | 全国大人常委会党组领导成立生态环境法典编纂小组，组建编纂工作专班，启动编纂工作。工作专班赴30多个地方开展立法调研，实地听取意见建议。
    | → | 法典草案经过3次常委会审议，4次通过中国人大网向社会公布并征求意见，累计收到7000多人次提出的2万多条意见，持续优化草案细节。 | → | 生态环境法典草案提请十四届全国人大四次会议审议。根据各代表团的审议意见和有关方面的意见，又作了100余处实质性修改。最后审议表决通过。
    |

    |---|---|---|---|---|---|---|



    （1）运用所学，谈谈你对这部法典立法过程的理解。


    ![](figures/image6.png)


    （2）运用所学，补充法律条文内容，并说明填写的依据。


    生态环境法典划定了污染防治、生态保护、绿色低碳发展的法律红线。在现行法律规定的基础上，针对生态环境领域执法、司法新情况、新问题，作出了更加严密和完善的调整。


    | 调整一 | 调整二 |

    |---|---|

    | 对有恶意损害生态环境、拒不改正违法行为造成严重危害后果、多次实施违法行为被处罚等法定情形的，依法从重处罚。过去，往往是一次性处罚，罚完就算；现在，法律启动“按日计罚”上不封顶，直到违法行为停止那一刻。这套严密的追责体系，增强了刚性震慑。
    | 法典还设计了“信用修复”条款。过去企业一旦被处罚，信用就有了污点，贷款、招标都受影响，无法翻身。现在，只要真心悔改、修复到位，可以申请修复信用，摘掉“污点”帽子，重新堂堂正正地经营。 |

    | 法律链接： 《中华人民共和国生态环境法典》第五十四条……企业事业单位和其他生产经营者纠正失信行为、消除不良影响、符合信用修复条件的，可以提出信用修复申请，有关国家机关应当按照规定开展信用修复。 《中华人民共和国生态环境法典》第一千零六十条企业事业单位和其他生产经营者违法排放、倾倒、处置污染物、废弃物或者其他物质，受到罚款处罚，被责令改正的，依法作出处罚决定的部门或者机构应当组织复查，发现其继续实施该违法行为、拒不改正或者拒绝、阻挠复查的，可以自责令改正之日的次日起，按照原罚款数额按日连续处罚……
    |


    （3）法律是“刚”还是“柔”？阅读材料，运用所学谈谈你的认识。'
  answer: ''
  solution: （1）  ①我国坚持党的领导、人民当家作主、依法治国的有机统一；②我们是人民民主专政的社会主义国家，人民是国家的主人；③我国坚持依法治国的基本方略；④全国人民代表大会是我国最高的国家权力机关，具有立法权。      （2）  宪法。依据：宪法是国家的根本法，具有最高的法律地位、法律权威、法律效力；宪法是其他法律的立法基础和立法依据，其他法律是根据宪法制定，不得与宪法精神相违背，否则就会因违宪而无效。      （3）法律既有“刚”的一面，也有“柔”的一面，是刚柔并济的。   ①“刚”体现在法律的强制性、权威性和惩戒性。如材料中提到的“按日计罚”上不封顶，对恶意违法行为从重处罚，构成了严密的追责体系，增强了刚性震慑，体现了法律惩恶扬善、维护公平正义的作用。   ②“柔”体现在法律的引导、教育和修复功能。如材料中设计的“信用修复”条款，给予真心悔改、修复到位的企业改正机会，摘掉“污点”帽子，体现了法律不仅惩罚，更重在教育和挽救，引导公民和企业自觉守法，营造了良好的法治营商环境。
