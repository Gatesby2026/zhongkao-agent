    后来窑火熄了，我却活成了另一种样子---笔墨纸砚、古玩字画，文人雅士在我这里谈笑风生。

    我是首钢园，四座高炉是我今天你到我这儿，还能听见的骄傲，炉火燃烧了半个世纪，木版水印声，买到心仪的国然后安静地熄灭了。如今，我拆风文具，看见外国人举着掉了围墙，建起了滑雪大跳台，毛笔学写“福”字。

    迎接世界各地的冰雪爱好者。高炉从“冒黑烟的巨人”变首钢园成“碳中和的典范”，我也从钢厂变成了打卡地。

