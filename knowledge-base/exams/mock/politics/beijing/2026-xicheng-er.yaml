  stem: '生活中的双向奔赴。


    “双向奔赴”是指相关方朝着共同的目标，一起努力。


    | 场景1 小静对正在做饭的父母说：“我的作业做完了，我来帮你们打下手吧。”“好的，你把碗筷放在餐桌上。”吃饭时，小静和父母聊着学校的事儿。饭后，小静让父母休息，自己去刷碗。父母用一餐饭表达“爱你”，小静用行动回应“我也是”。 | 场景2
    小凯是班级卫生委员，每次值日他都参与，认真负责，班级多次获得卫生流动红旗。班会上，同学们将他的日常付出做成视频在全班播放，小凯看着视频激动地说：“我只是做了自己力所能及的一点小事。谢谢大家对我的肯定！” | 场景3 快递小哥每天穿梭于城市大街小巷。他们在配送过程中向社区反映楼道灯损坏、垃圾乱堆等问题。居民自发为快递小哥设立“友好驿站”，提供热水和休息区。快递小哥表示：“社区为我们提供服务和帮助，我们也要为社区出一份力。”
    |

    |---|---|---|



    从以上三个场景中任选其一，结合材料，运用所学，谈谈你对“生活中的双向奔赴”的感悟。'
  answer: ''
  solution: '选场景1：材料中父母用一餐饭付出关爱，小静主动帮做家务、用行动回应父母，这就是亲子间的双向奔赴。 感悟：①孝亲敬长是中华民族的传统美德，也是公民的法定义务；②和谐家庭需要家庭成员共同付出、双向互动，亲情需要彼此共同呵护；③我们要从小事做起，主动关心父母，承担力所能及的家务，用行动表达亲情，共建和谐家庭。  选场景2：材料中小凯主动承担班级卫生责任、为班级争得荣誉，同学们用视频肯定小凯的付出，这就是集体中的双向奔赴。
    感悟：①建设美好集体需要人人参与、各尽所能，每个人都要为集体出力；②主动承担责任既能建设集体，也能收获他人的认可与尊重；③我们要在集体中主动承担自身职责，同时也要懂得肯定、感恩为集体付出的人，共同建设美好集体。  选场景3：材料中快递小哥主动为社区反映问题、助力社区建设，居民为快递小哥设立驿站提供便利，这就是社会生活中的双向奔赴。
    感悟：①我们都是社会的一员，关爱是双向的，我们既接受他人的关爱，也应当关爱他人；②主动服务社会、帮助他人，能共同营造和谐美好的社会；③我们要养成亲社会行为，主动关心帮助他人，共同建设友善和谐的社会。


    详解：设问要求从三个场景中任选其一，结合材料，运用所学，谈谈你对“生活中的双向奔赴”的感悟问题，需从材料中提取具体做法对应知识点。

    场景中“双向奔赴”的具体内容，体现的知识点分别是亲情与和谐家庭建设、美好集体建设、社会关爱与亲社会行为，结合对应知识点谈谈认识与做法即可。'
