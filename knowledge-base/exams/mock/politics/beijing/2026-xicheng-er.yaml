  score: 13
  stem: '班级开展“规划启新程奋斗报国家”综合实践活动。


    活动1：畅谈成长“新”机遇


    时代发展为我们描绘了职业新图景。同学们围绕收集到的新职业，畅谈职业体验规划。


    | 新职业 ①网络安全等级保护测评师：对网络系统和数据开展安全技术和安全管理测评的人员。 ②养老服务师：从事居家、社区、机构养老服务方案制定与实施等方面工作的技术人员。 ③农村集体经济经理人：为发展壮大新型农村集体经济，从事相关经济活动经营管理的人员。
    ④跨境电商运营管理师：从事国际间商品或服务的交易、推广、运营及供应链管理的人员。 ⑤研学旅游指导师：策划、制定、实施研学旅游方案，组织、指导开展研学体验活动的人员。 |

    |---|

    | 我希望体验职业②，当前我国人口发展呈现老龄化等趋势，我有耐心、肯付出，希望通过亲身实践，为老年人提供更好的照护和帮助。 我希望体验职业__________，_________________________________________。
    |


    （1）仿照示例，运用所学，从上述列举的职业中任选其一（示例除外），谈谈你的职业体验设想。


    活动2：分享职业“亲”体验


    | 我在地铁站体验安检工作，引导乘客安检及出入站，真切感受到地铁能够安全准点，离不开每一个岗位的默默坚守。 | 我在医院中药房体验抓药，手持秤具称量每一味药材，真切感受到“失之毫厘，谬以千里”背后的严谨与责任。 | 我在创客空间体验3D打印，凭借所学的几何知识，设计并打印出可接水的杯子，真切感受到运用知识让想法变成现实。
    |

    |---|---|---|



    活动3：实践活动总结


    | 规划启新程 奋斗报国家 同学们，我们正走在实现第二个百年奋斗目标的征程上。通过参与此次活动，我们找到了自己与祖国发展的真实联结。____________________________________________________________________________________________________________________________________________________________________________________________。
    |

    |---|



    （2）结合活动1和活动2的内容，运用所学，完成“规划启新程奋斗报国家”活动总结的续写。要求：100字左右。'
