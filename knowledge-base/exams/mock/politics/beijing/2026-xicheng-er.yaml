    | 市民朋友： 您好，感谢您对深圳湾公园的关注与支持！对于您反映的深圳湾公园夜间照明不足的问题收悉，现回复如下： 深圳湾公园地处全球九大候鸟迁徙路线之一的东亚—澳大利西亚迁飞线中点，这片咸淡水交汇的湿地，是候鸟迁徙途中不可或缺的“补给站”，增设过多高亮度灯具，会干扰候鸟的越冬栖息与迁飞节律。深圳湾公园在公园的主要出入口、交通节点和部分核心步道保留了基础照明，以满足市民的基本通行需求。
