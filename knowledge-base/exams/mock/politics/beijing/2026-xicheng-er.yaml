- id: 24
  type: 作文
  score: 8
  stem: '讲好中国故事。


    | 【故事1：一张蓝图】 科学制定和接续实施五年规划，是中国共产党治国理政的重要经验。新中国成立以来，“一五”到“五五”，我国建立起独立的比较完整的工业体系和国民经济体系；“六五”“七五”，推动基本解决温饱问题；“八五”“九五”，实现人民生活总体达到小康水平；“十五”到“十三五”，全面建成小康社会；“十四五”时期，我国综合国力跃上新台阶，中国式现代化迈出新的坚实步伐。“十五五”时期是基本实现社会主义现代化的关键时期。
    |

    |---|

    | 【故事2：一次突破】 赤霉病又被称为小麦的“癌症”，一旦爆发，可能造成小麦颗粒无收。培育高产、抗病品种是一个世界难题。我国科研人员跳出传统育种模式，通过分子育种技术等，尝试在种子内部植入“抗病基因”，他们扎根麦田30余载，反复试验，最终培育出高抗高产品种。科研团队用一粒良种，彻底改写了小麦遭遇赤霉病的“绝收”宿命，保障了农民的收入，撑起了国家粮食丰收的底气，让中国饭碗牢牢端在自己手里。
    |


    从上述故事中任选其一，结合材料，运用所学，撰写一篇不少于80字的宣讲稿。'
  answer: ''
  solution: '选择故事1  中国共产党领导是中国特色社会主义最本质的特征，是中国特色社会主义制度的最大优势。办好中国的事情，关键在党。伟大的事业要有伟大的计划，党坚持全国一盘棋，科学制定和接续实施计划，实现了国家发展的连续性和战略性。中国经济社会发展取得巨大成就，中国式现代化持续推进，人民生活水平持续提升。我们要坚定地拥护党的领导，努力学习科学文化知识，在担当中历练，在尽责中成长，立志做有理想、敢担当、能吃苦、肯奋斗的新时代好青年。  选择故事2  创新是引领发展的第一动力。创新是一个民族进步的灵魂，是一个国家兴旺发达的不竭源泉，也是中华民族最鲜明的民族禀赋。自力更生是中华民族自立于世界民族之林的奋斗基点，自主创新是我们攀登世界科技高峰的必由之路。我国科研人员弘扬创新精神，用一粒良种彻底改写小麦遭遇赤霉病“绝收”的宿命，让中国饭碗牢牢端在自己手里。我们要有强烈的创新信心和决心，勇于攻坚克难，不断赢得胜利。


    详解：设问要求从材料中任选一个，写一篇宣讲稿，需要从故事中提炼关键词，并综合运用所学知识撰写。

    选择故事1：

    “科学制定和实施五年规划，是中国共产党治国理政的重要经验”，可联系坚持中国共产党领导，科学制定和实施规划的重要性。

    从“一五”到“十四五”我国取得的成就，可联系中国经济社会发展取得巨大成就。启示我们要拥护党的领导，担当时代责任。

    选择故事2：

    我国科研人员扎根麦田30余载，最终培育出高抗高产品种，保障了农民的收入，撑起了国家粮食丰收的底气，可联系创新的重要性、自力更生的重要性。

    我国科研人员扎根麦田30余载反复试验，最终培育出高抗高产品种，可联系科研人员弘扬创新精神。启示我们要有强烈的创新信心和决心，勇于攻坚克难。'
