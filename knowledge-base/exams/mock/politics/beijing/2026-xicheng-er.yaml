  stem: 近年来，三星堆文物展、兵马俑—陕西秦汉文明展、良渚文明展等中国古文明展在全球巡展期间出现一票难求的景象。同样，古埃及、古罗马、古希腊文明展在中国也吸引着大量观众参观。对此，下列认识正确的是（     ）
  options:
    A: 文明因交流而多彩，要学习一切外来文化
    B: 每个民族的文化都是独特的，都值得尊重
    C: 中国秉持“和而不同”的思想参与全球治理
    D: 当今世界，兼收并蓄和交流互鉴成为时代主题
  answer: B
  solution: 'A：我们要学习借鉴优秀外来文化，吸收有益成果，而非“学习一切外来文化”，故A说法错误；

    B：中外文明展互受欢迎，体现了文化多样性，说明每个民族的文化都是独特的，都值得尊重，故B符合题意；

    C：题干主要反映文化交流现象，未体现中国参与全球治理的内容，故C不符合题意；

    D：当今时代的主题是和平与发展，兼收并蓄和交流互鉴是文明发展的方式，故D说法错误；'
