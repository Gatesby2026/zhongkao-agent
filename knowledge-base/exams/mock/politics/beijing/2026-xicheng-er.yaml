- id: 24
  type: 材料分析
  score: 8
  stem: '(8分)讲好中国故事。

    [故事1:一张蓝图]科学制定和接续实施五年规划，是中国共产党治国理政的重要经验。新中国成立以来，“一五”到“五五”，我国建立起独立的比较完整的工业体系和国民经济体系;“六五”“七五”，推动基本解决温饱问题;“八五”“九五”，实现人民生活总体达到小康水平;“十五”到“十三五”，全面建成小康社会;“十四五”时期，我国综合国力跃上新台阶，中国式现代化迈出新的坚实步伐。“十五五”时期是基本实现社会主义现代化的关键时期。

    [故事2:一次突破]赤霉病又被称为小麦的“癌症”，一旦爆发，可能造成小麦颗粒无收。

    培育高产、抗病品种是一个世界难题。我国科研人员跳出传统育种模式，通过分子育种技术等，尝试在种子内部植入“抗病基因”，他们扎根麦田30余载，反复试验，最终培育出高抗高产品种。科研团队用一粒良种，彻底改写了小麦遭遇赤霉病的“绝收”宿命，保障了农民的收入，撑起了国家粮食丰收的底气，让中国饭碗牢牢端在自己手里。

    [故事3:一道风景线]北京的每个地铁站都是一道令人驻足的风景线。地铁平安里站，对古时庆贺场景匠心复刻，立柱“变身”灯笼，灯影绰绰中乘客仿佛踏入了一场“上元灯会”，驻足欣赏，与北京传统民间艺术亲密接触。地铁19号线的站台传承旧时金中都景风门、明清两朝右安门古都风貌，整条线以“一站一景、站站迥异”的设计，串起“荟萃京华”的主题。

    从上述故事中任选其一，结合材料，运用所学，撰写一篇不少于80字的宣讲稿。

    www.gao关注:，北京市西城区九年级模拟测试试卷道德与法治2026.5第7页()'
