  stem: '北京市检察机关在履职中发现，部分爱国主义教育基地未落实未成年人保护法关于对未成年人免费开放的规定，存在违规收费问题。为此，检察机关督促相关单位整改，推动普惠政策落地。目前，包括故宫、八达岭长城在内的40余家爱国主义教育基地已全部实现对未成年人免费开放。对此，下列认识正确的是（     ）


    ①检察机关解释法律，维护未成年人的合法权益


