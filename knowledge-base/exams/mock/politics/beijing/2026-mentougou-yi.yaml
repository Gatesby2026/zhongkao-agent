  stem: '教育部2025年5月发布的《中小学生成式人工智能使用指南（2025年版）》有以下的明确规定（如下表）


    | 核心禁令与规范内容（节选） 学生应避免在作业中简单复制生成式人工智能工具生成的内容：避免使用生成式人工智能参加考试与测验，不得利用生成式人工智能作弊：避免在展现创造性或个性化表达的学习任务中轻易滥用生成式人工智能。 |

