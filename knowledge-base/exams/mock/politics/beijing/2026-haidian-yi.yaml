    A: ①②
    B: ①④
    C: ②③
    D: ③④
  answer: A
  solution: '①：长青春痘是青春期正常的生理变化，我们要正视并悦纳青春生理变化，该做法可以化解因长青春痘自卑的烦恼，故①符合题意；

    ②：面对和朋友的竞争要正确看待竞争与友谊的关系，面对集体合唱活动要主动融入集体，该做法可以化解比赛输给好友的失落、不愿参与集体活动的烦恼，故②符合题意；

    ③：集体建设需要每个人的贡献，我们要正确处理个人利益和集体利益的关系，不能只优先考虑学习而拒绝参与集体活动，故③说法错误；

    ④：我们要理性对待他人的评价，“无视他人想法”的做法过于绝对，是错误的，故④说法错误；'
