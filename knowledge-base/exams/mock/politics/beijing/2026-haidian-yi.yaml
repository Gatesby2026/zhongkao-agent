  score: 2
  stem: '某校的“心语信箱”收到了三张倾诉烦恼的小纸条。


    | “校园乒乓球冠亚军争夺赛中，我输给了好朋友，心里有点儿不是滋味。” | “最近我的脸上长了青春痘，有人笑话我，我有些自卑。” | “学校要举办班级合唱比赛，我觉得排练太耽误学习了，不想参加。” |

    |---|---|---|



    下列建议中可以帮助他们化解烦恼的是（   ）


    ①认识自我，悦纳青春变化②融入集体，正确对待竞争


