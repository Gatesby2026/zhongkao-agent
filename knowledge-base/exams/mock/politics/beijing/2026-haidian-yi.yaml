- id: 24
  type: 材料分析
  score: 8
  stem: '马年话“马”。


    第一则马年春晚主标识“骐骥驰骋”出自《楚辞·离骚》：“乘骐骥以驰骋兮，来吾道夫先路。”该标识以“四马齐驱”为创意，融合云纹、雷纹等传统纹样，勾勒出四匹骏马齐头并进、拾级而上的意象。


    ![](figures/image6.png)


    第二则抗日战争期间，徐悲鸿以画笔为武器，以马喻人，激励民众奋起。他将个人的忧愤、民族的苦难与不屈的抗争，全部倾注于笔墨。他笔下的马，热血刚毅、昂首挺拔，成为烽火年代激昂的视觉史诗。


    ![](figures/image7.png)


    第三则普氏野马原产于我国新疆，是现存唯一的野生马种，堪称“活着的自然遗产”。我国通过科学的繁育和保护措施，使普氏野马种群数量突破900匹，占全球总数近三分之一，成为世界濒危物种保护史上的里程碑。


    ![](figures/image8.png)


    从以上材料中任选两则，运用所学，说说“马”带给你的感悟。'
  answer: ''
  solution: '第一则感悟：春晚主标识源自古籍经典，融合传统纹样，体现了中华文化源远流长、博大精深的特点，也展现了中华优秀传统文化的传承与创新发展。这让我感悟到我们要坚定文化自信，传承中华优秀传统文化，推动传统文化与时俱进。   第二则感悟：徐悲鸿以马喻人，将个人命运与民族抗争结合，承载着以爱国主义为核心的伟大民族精神，在烽火年代激励中国人民奋起救国。这让我感悟到，民族精神是中华民族发展的精神支柱，我们要弘扬民族精神，自觉将个人命运与国家命运紧密相连，厚植爱国情怀。   第三则参考感悟：我国对普氏野马的科学保护取得突出成就，体现了我国坚持人与自然和谐共生的生态文明理念，践行保护环境的基本国策，也为全球濒危物种保护作出了重要贡献。这让我感悟到，我们要树立生态文明意识，尊重自然、保护自然，共同建设美丽中国。


    详解：从设问中可知考查从以上材料中任选两则，运用所学，说说“马”带给你的感悟，需要提炼关键词分析。

    第一则：“ 融合云纹、雷纹、传统纹样、四匹骏马齐头并进、拾级而上的意象”体现中华文化源远流长、博大精深；中华优秀传统文化的传承与创新发展；坚定文化自信，传承中华优秀传统文化；

    第二则：“以马喻人、激励民众奋起、不屈的抗争、热血刚毅、昂首挺拔”体现爱国主义为核心的伟大民族精神；弘扬民族精神，自觉将个人命运与国家命运紧密相连。

    第三则：“活着的自然遗产”、“世界濒危物种”体现坚持人与自然和谐共生的生态文明理念；树立生态文明意识。'
