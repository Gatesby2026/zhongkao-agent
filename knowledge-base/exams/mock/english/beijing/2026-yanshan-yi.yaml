  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    “Why did we pick today for this? I should be staying at home, having a birthday party, and lots of birthday gifts are
    waiting for me!” I said to Dad, a little <u>____13____</u>. Six miles into our bird-watching trip in Happy Forest Park,
    we were in trouble.

    In the morning, we set out in sunny weather. Birds were singing along the way while we were enjoying the sunshine. But
    storm clouds came <u>____14____</u>.

    “I checked the weather, but the app didn’t warn us,” Dad explained.

    “Don’t worry, and maybe you’ll get a nicer gift for your birthday,” Mom <u>____15____</u> me.

    “Really?” I forced a smile.

    “Find shelter (遮蔽)!” Dad shouted as the heavy rain poured down. We noticed a rest area nearby and rushed there. The wind
    blew hard and I felt cold. I <u>____16____</u> my bag, but I found I’d forgotten to take my emergency rescue blanket (紧急救生毯).

    “Ta-da! Look!” Dad pulled out a blanket from his bag and put it over us. “Let’s share,” he added. Mom brought out a packet
    of cookies. “<u>____17____</u> makes everything better,” she said, passing them around. Her calmness helped me breathe
    easily.

    Half an hour passed, but the rain didn’t stop. We had to give up the trip and return.

    The ground was wet, so Dad kept <u>____18____</u> us to be slow and careful. He suggested we hold on to the trees in order
    not to fall.

    The sky grew dark, so we couldn’t see the road clearly. “Are we…lost?” I asked. Dad took out a compass (指南针) from his
    magic bag.“See this? Always <u>____19____</u> one,” he said, “North is that way.” Then he guided us with a flashlight.

    We finally got to the car park and drove home safely. On arriving home, we got into warm clothes. “The weather in the
    mountains changes anytime. Luckily, with good <u>____20____</u>, we made the trip safe and sound. High five!” Dad said
    while we were drinking hot chocolate.

    “And this unusual trip is the best birthday gift I got today,” I smiled to Mom.'
