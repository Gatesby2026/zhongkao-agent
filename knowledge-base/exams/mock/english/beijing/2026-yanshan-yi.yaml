  body: 'It was a long night. Our dog Precious was having puppies. I stayed by her side. After six hours, the puppies finally
    arrived. The first was black and white. The next two were tan (棕褐色的) and brown, and the last two were also black and white.
    I counted five puppies and went to tell my wife, Judy, that everything was okay.

    When we came back, we saw a sixth puppy alone in the cage. Judy noticed something was wrong. The puppy had a cleft lip
    and palate (唇腭裂 ), which meant it couldn’t close its mouth or suckle (吸吮). The vet said it would cost a lot to fix, and
    the puppy might not survive. We couldn’t afford it, but I decided to try my best to help the puppy. I fed it with a syringe
    every two hours for over 10 days. The puppy slowly learned to eat soft food.

    After five weeks, we found homes for all the puppies except the one with the cleft lip.

    One day, our neighbor, a retired (退休的) teacher, asked if she could have a puppy for her grandson. When they arrived, I
    told her all the puppies were taken. Just then, the little puppy with the cleft lip started to yelp (吠叫). The boy ran
    to the puppy, calling it “my puppy”. He looked up at his grandmother and said, “Look, Grandma! They found homes for all
    the puppies except the pretty one.”

    The teacher asked if the puppy was available. I said yes. The boy hugged the puppy tightly (紧紧地).

    The image of the boy and his puppy still stays with me. I think it must be a wonderful feeling to look at a small animal
    and see nothing except “the pretty one”.

    ![](figures/image7.png)'
  figure: 2026-yanshan-yi/figures/image7.png
