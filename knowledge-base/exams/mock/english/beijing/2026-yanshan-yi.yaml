- id: 38
  type: 作文
  score: 10
  stem: "从下面两个题目中·任选一题·，根据中文和英文提示，完成一篇不少于50词的文段写作。文中已给出内容不计入总词数。所给提示词语仅供选用。请不要写出你的校名和姓名。\n\n题目①\n\n假设你是李华，你们班的英语课正在开展研究性学习。你选择研究同学们如何平衡社团活动与中考备考的情况，为此你对班里40名同学进行了问卷调查，下图是部分统计结果。请用英语写一篇短文，简要说明图表内容，并对班级同学平衡社团活动与中考备考提出建议。\n\
    \n![](figures/image8.png)\n\n提示词语：show, join, manage, helpful, prepare, develop\n\n提示问题：\n\n What can you learn from the\
    \ results?\n\n Offer your advice to your classmates.\n\nI did a survey on balancing club activities and exam preparation.\
    \ _____________________________________________________________________________________________________________________________________________________________________________________________________________________"
  answer: ''
  solution: "I did a survey on balancing club activities and exam preparation. Among 40 classmates. The results show that\
    \ 26 students stop club activities to prepare for the exam, 8 put interests first, and only 6 balance well.     Most students\
    \ give up hobbies to study. But club activities are helpful to develop skills and relax. Here are my suggestions. First,\
    \ manage time carefully and make a plan. Second, join only 1-2 favorite clubs. Proper activities can help you study better.\n\
    \n详解：确定文体：图表类说明文 \n明确要点：以李华的身份，结合班级40名同学关于“如何平衡社团活动与中考备考”的调查结果，写一篇短文说明图表内容，并提出平衡两者的建议 \n确定人称：第一人称（I/my） \n注意事项：短文需清晰呈现调查数据，结合提示词语展开分析，给出具体可行的建议\
    \  \n[第二步：构思布局] \n总分总结构 \n开头：沿用给定开头，点明调查主题与对象 \n主体：说明调查结果、分析现象、提出建议 \n结尾：强调合理平衡的重要性  \n[第三步：要点展开] \n调查结果说明：The results\
    \ show that 26 students stop club activities completely to prepare for the high school entrance exam / 8 students put\
    \ their personal interests first and spend most of their free time on club activities / only 6 students manage to balance\
    \ their study and club activities well等 \n现象分析：Most students choose to give up their hobbies to focus on exam preparation\
    \ / they worry that club activities will take too much study time / however, proper club activities are helpful to develop\
    \ practical skills, reduce study pressure and relax our minds等  \n平衡建议：manage daily time carefully and make a clear weekly\
    \ plan / join only 1-2 favorite clubs instead of too many / set specific time for both study and club activities / make\
    \ full use of small breaks to finish small study tasks / arrange study tasks well in advance to leave time for clubs /\
    \ proper activities can help us stay energetic and study better等  \n主题升华：we can make full use of every minute to both\
    \ prepare for the exam and develop our personal interests / learning to balance is also an important skill for our future\
    \ life等\n题目②"
  knowledge_points:
  - 命题作文
  module: writing
  difficulty: 中等
  recommended_for:
  - L1
  - L2
  - L3
  qc_status: draft
  qc_note: ''
