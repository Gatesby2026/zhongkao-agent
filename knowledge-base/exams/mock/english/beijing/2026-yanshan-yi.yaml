  body: 'When I flew back to school from Colorado to start my sophomore (大二) year, my sister cried beside me on the plane.
    As we looked over the Pacific, she said,“I just realized how far away you are.” Being 1,000 miles from home can feel overwhelming
    (让人不知所措的), even when my family is just a phone call away.

    I always dreamed of going out of state for college, but I didn’t realize how lonely it would be, especially at a school
    where only 4.64% of the students are from out of state. I’m really lucky to be here. I did the “right” things, worked
    hard and got myself to a great school in a beautiful place, so why do I just want to go home? It was not until the middle
    of my sophomore year that I realized being unhappy is a possibility and a reality. It doesn’t mean you can’t deal with
    challenges. It just means that you’re experiencing life.

    Living independently has transformed (改变) me in many ways. I’ve become more resourceful and outgoing. I’ve made family
    out of friends to combat (化解,缓解) the family I miss back at home. The “old me”, who once cried from nerves before my first
    cross-country practice, would be proud to see how I’ve pushed myself to join new clubs and try new things entirely on
    my own. I’ve also learned how to get through the tough times by calling my loved ones, spending time with friends and
    enjoying the culture shock of California. I’m not walking on sunshine all the time while I’m here, but frequent belly
    laughs with my friends make me pause and realize that I’m going to be fine.

    Most importantly, I’ve learned that it’s completely normal to feel down sometimes. And the moments of intense homesickness
    just prove that I am experiencing growth.

    College is challenging for everyone, no matter where you come from. Nevertheless, this experience has taught me how to
    stand on my own and how to make a home out of two places.'
