  type: 作文
  score: 0
  stem: "假设你是李华，你校正在开展“艺术校园”活动。英语社团公众号打算做一期以“Dream Art Corner”为主题的推送，为此在校内征集创意。请用英语给公众号留言，提出你的设想，并简要说明它会带来哪些好处。\n\n提示词语：recommend,\
    \ colorful, express, inspire, creativity\n\n提示问题：\n\n What is your dream art corner like?\n\n How can students benefit\
    \ from your idea?\n\nI’m Li Hua from Class 1, Grade 9. ______________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nI hope my dream will come true. Thanks."
  answer: ''
  solution: "[二选一备选题目，与上一题任选其一作答；本题不重复计分]\n<u>I’m Li Hua from Class 1, Grade\n\n详解：确定文体：留言类应用文 \n明确要点：以李华的身份，为英语社团公众号的“Dream\
    \ Art Corner”推送提出创意设想，并说明该设想能给学生带来的好处 \n确定人称：第一人称（I/my） \n注意事项：需包含提示词语，回答提示问题，开头与结尾已给出  \n[第二步：构思布局] \n总分总结构 \n开头：沿用给定开头，介绍自己并提出创意设想\
    \ \n主体：描述设想的艺术角落，说明它能给学生带来的好处 \n结尾：沿用给定结尾，表达希望与感谢  \n[第三步：要点展开] \n提出设想：recommend setting up a “Creative Wall” in our school\
    \ / it can be a colorful wall where students freely draw, write poems or stick their small art works / the wall can change\
    \ with different themes every month, like “My Favorite Season” or “My School Life”等 \n带来的好处：allows us to express our true\
    \ feelings and share creative ideas freely / inspires students’ creativity and imagination / makes our campus more lively\
    \ and full of artistic atmosphere / students can relax there and learn from each other’s works / helps us reduce study\
    \ pressure and feel the joy of art / builds a closer bond between classmates through sharing art等 \n结尾：I hope my dream\
    \ will come true./ I believe my dream will come true等"
