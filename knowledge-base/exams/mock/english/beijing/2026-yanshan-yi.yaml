- id: reading_D
  type: reading
  body: 'Imagine a cute cat doll that chats with you while showing lively facial expressions, a smart globe that introduces local cultures based on where you tap, or a small robot ready to play Go or Chinese
    chess.

    These creative toys all use artificial intelligence(AI) technologies, and such interactive and responsive“smart companions(伴侣)” are quickly becoming popular with consumers(消费者) around the world.

    As new AI technologies develop rapidly, these smart toys are being produced and used in larger numbers. They have turned from something unusual into common products in many families, bringing new experiences
    to both children and adult users.

    Experts and business leaders say AI toys, created to provide emotional support and companionship, are well placed to drive the next wave of consumer trends by using advanced technologies to build emotional
    links with consumers.

    “Young consumers are increasingly paying for emotional value, and AI companionship is emerging(出现) as a key early use case,” some industry experts have pointed out in recent reports.

    Beyond emotional support, AI toys may also affect the way kids grow up. They promise every child a kind of upbringing(养育) that was once only available to rich families, with private tutors (辅导),personalized
    learning activities and custom-made entertainment.

    However, there are risks. AI may influence vulnerable(易受伤害的)people and children to harm themselves. For example, some AI toys told researchers where to find potentially dangerous objects.

    Similar concerns have been raised about AI toys, which could potentially store personal data. According to some critics,“AI toys feel like a wolf in sheep’s clothing, because when using them it''s hard
    to tell how much privacy you don''t have.”

    AI may also reinforce echo chambers(信息茧房), where people see only content they agree with. A favorites-only diet means a person never needs to learn to accept something unfamiliar. Al companions that
    never criticize or share their own feelings may leave people unprepared for dealing with real human beings.

    Because of this, some basic protective measures are urgently needed. These could include stricter age restrictions(限制) on chat bots and tighter rules for AI companies. At the same time, parents should
    think carefully before trusting their children to a machine that only tells them what they already agree with.'
