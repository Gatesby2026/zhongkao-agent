    衡。

    price“价格”，place“地方”，balance“平衡”，condition“条件”。结合上下文，研制植物营养液需要调配配

    料，找到正确的配料平衡，balance 符合语境。其他选项均与“调配配料”无关。

    [14题详解]

    句意:她生气地说，举起双手，不小心碰倒了一盘小幼苗。

    softly“*轻柔地”，peacefully“平静地”，clearly清楚地”，angrily“生气地”。根据前文“the flowers looked

    droopier than before”可知，实验失败，Elara 应该是生气的，angrily 符合语境。其他选项与“实验失败后的

    情绪”不符。

    [15题详解]

    句意:她越沮丧，犯的错误就越多。

    mistakes“错误”，progress“进步”，preparations“准备”，decisions“决定”。结合前文“a test tube slipped from

    her hand and dropped on the floor”可知，她情绪不好时犯了更多错误，mistakes 符合语境。其他选项与“实验

    中的失误*无关。

    [16题详解]

    句意:冷静下来，Elara。

    feel“感觉”，calm“冷静”，get“得到”，come“来”。根据前文“it’s taking way longer because I was always in a

    hurry"可知，她太急躁，需要冷静下来，calm down 是固定搭配，意为“冷静下来”，符合语境。其他选项无

    法构成符合语境的短语。

    [17题详解]

    句意:她因为失去对情绪的控制，把事情变得更加困难了。

    taking“拿走”，keeping“保持”，losing“失去”，exercising“锻炼”。结合前文她因情绪激动犯了很多错误，可

    知她失去了对情绪的控制，lose control of 是固定搭配，意为“失去对....的控制”，符合语境。其他选项与

    “情绪失控”不符。

