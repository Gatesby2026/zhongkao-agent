  body: '阅读短文，根据短文内容回答问题。

    When we are at school, we all want to get better at studying. Before quizzes, exams, or projects, preparing well is always
    important. But what’s the best way to study? Should we sit alone in a quiet place, or study with friends?

    Studying alone can mean different things—like sitting quietly in a library or a table with headphones. This way of studying
    has both good and bad points. The biggest advantages are fewer distractions (分心), setting your own pace and better focus.
    When you’re alone, you don’t have to talk to others, so you can focus only on your work. You can take breaks when you
    feel tired, or read at a speed that’s comfortable for you. This is helpful because no one knows your learning needs better
    than you. Also, studying alone lets you spend more time on topics you find hard and less time on things you already understand
    well. However, studying alone has a problem: without friends around, it’s easy to get off task. Even good students might
    waste hours on their phones or watching videos without noticing. Friends can push you to stay focused, but you don’t get
    that when you’re alone.

    Studying in groups (usually 2-5 people) also has pros and cons. Group study helps you remember things better. When you
    explain ideas to others, you remember them more easily. You can also learn more from your friends—everyone brings different
    knowledge to the group. The best part is that friends can keep you motivated. When others are studying, you’re less likely
    to get distracted, and you can work harder together. But groups have drawbacks too. The group can only be as productive
    as the least focused person. If one person is noisy, checks his phone a lot, or talks about other things, it can ruin
    the study time for everyone.

    Everyone learns differently, so the best study method is the one that works for you. You might need to try both alone
    and group study to find out what helps you most. For me, group study is better. I feel less stressed, and my friends keep
    me on track. When I study alone, I sometimes end up watching videos online for an hour without realizing it! Both methods
    have good and bad sides, so it’s up to you to choose what helps you succeed.'
