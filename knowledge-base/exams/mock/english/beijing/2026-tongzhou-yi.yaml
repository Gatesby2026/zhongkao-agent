  stem: "从下面两个题目中任选一题，请根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。\n\n题目1.\n\n请根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词仅供选用。请不要写出真实的校名、姓名和地名。\n\
    \n假设你是李华，你校将开展“环保生活有我参与”的活动，鼓励学生积极践行绿色环保生活。请你用英语写一封倡议书，向国际部的同学们介绍环保行为的重要性和你是如何践行环保理念的。\n\n提示词语：help, protect, reduce,\
    \ turn off, ride to school\n\n内容提示: ●Why is green living important? ：\n\n●What can you do to live a green life? \n\n|\
    \ Dear students, I am writing to call on all of you to join in Green Lifestyles. _____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\
    \ Yours, Li Hua |\n|---|"
  answer: ''
  solution: 'Dear students,      I am writing to call on all of you to join in Green Lifestyles. Green living is important
    because it helps protect our environment and makes our planet healthier. We can all take action. For example, I always
    turn off lights when leaving a room to save energy. Also, I ride my bike to school to reduce air pollution. Let’s work
    together to live a green life!  Yours,  Li Hua


    详解：[第一步：审题立意]

    确定文体：倡议书（应用文），以一般现在时为主

    明确要点：介绍环保生活的重要性、分享个人践行环保的具体做法、号召同学们参与绿色生活

    确定人称：第一人称（I/my/we）

    注意事项：不得透露真实姓名和学校名称

    [第二步：构思布局]

    单段式结构

    开头：点明写信目的，发起“绿色生活”倡议

    主体：说明环保生活的重要性，并介绍个人践行环保的具体行动

    结尾：发出呼吁，号召大家共同参与绿色生活

    [第三步：要点展开]

    要点一：环保生活的重要性

    作用说明：helps protect our environment/makes our planet healthier/keeps the air clean等

    要点二：个人践行环保的具体做法

    节约能源：turn off lights when leaving a room/turn off taps when not using water等

    低碳出行：ride my bike to school/take the bus instead of driving等

    减少污染：reduce waste/reuse plastic bags等

    要点三：发出倡议

    呼吁表达：Let’s work together to live a green life!/Let’s take action to protect our planet!等

    题目2.'
