  answer: D
  solution: 'D

    [导语]本文主要介绍了科学研究为学生克服数学压力、掌握数学知识提供的新策略，包括翻转课堂模

    式、改变坐姿以及利用互动游戏等，旨在帮助学生建立信心、加深理解，最终学好数学。

    [27题详解]

    文章第二段指出“Students now learn new concepts through videos at home, freeing class time for cooperative

    problem solving and discussion.”，说明在翻转课堂中，学生在家通过视频学习新概念，课堂时间被解放出来

    用于合作解决问题和讨论，由此可知学生可以更积极地参与课堂讨论。选项A是传统教学模式，不符合;

    选项 B 中“same pace”与文中“watch introductory videos at their own pace”不符;选项 C 中“same learning

    styles”与文中“students have different flipping styles”不符。

    [28题详解]

    文章第三段提到“This suggests that keeping an upright posture could be a simple way to help reduce stress and

    increase the focused thinking required for math.”，说明坐姿端正有助于减少压力，增加数学所需的专注思

    考。选项 A 与文中“More than half (56.4%) found it was easier when they sat upright”不符;选项 C 中“gestures

    helped students choose the game”文中未提及，文中是说游戏中使用手势有助于理解几何概念;选项 D与文

    中“motion-based video games can help learn geometry”不符，并非通过游戏改善身体动作。

    29题详解]

    文章开篇点明“scientific research is now providing new strategies to change this fear into mastery”，后文围绕翻

    转课堂、坐姿、互动游戏三种科学策略展开，结尾总结“science is helping educators and students with

    different tools... help students become good at math”，核心是科学帮助学生学好数学。选项 A 侧重数学老师,

    与文章核心“科学”不符;选项 B 中“traditional games”错误，文中是“motion-based video games”，且并非文

    章核心;选项 C侧重科技为科学开辟新道路，与文章主题“科学帮助学生学数学”不符。'
