    来，wash over 是固定搭配，意为“席卷(某种情绪)”，符合语境。其他选项无法表达“情绪席卷”的含义。

    [20题详解]

    句意:她休息了一下，提醒自己要耐心。

    fast“快的”，patient “耐心的”，gentle“温和的”，polite“礼貌的”。结合前文“Days turned into weeks. There were

