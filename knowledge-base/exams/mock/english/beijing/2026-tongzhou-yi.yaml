    Elara was singing softly as she carefully put liquids (液体) into a tube (试管). She was sure that her new plant food would
    make her flowers bloom brighter than ever; she just had to find the right <u>____13____</u> of ingredients (配料). “Just
    a little more of this,” she said to herself, but a larger drop of blue liquid than she expected fell out. She was angry
    and rushed on. When she checked her first experiment, the flowers looked droopier (更下垂的) than before. “No!” she said <u>____14____</u>,
    throwing her hands up, and she accidentally knocked over a plate of tiny seedlings.

    Disappointment filled inside her. She tried again, rushing through the steps. This time, a test tube slipped from her
    hand and dropped on the floor. “This is taking forever!” she shouted. The more upset she became, the more <u>____15____</u>
    she made. She sat on the floor, not saying a word.

    As she was angry with the mess in front of her, she caught sight of the clock. “It’s taking way longer because I was always
    in a hurry. Just <u>____16____</u> down, Elara. Do it slowly and do it right... That’s actually the fastest way.” She
    had made things so much harder by <u>____17____</u> control of her emotions (情绪). Elara took a deep breath. “Okay,” she
    said to herself. “One step at a time.” She cleaned up the broken glass and spilled soil, then <u>____18____</u> reorganized
    her workspace.

    She started a new experiment, moving with careful motions. This time, the flowers still didn’t come alive. A wave of disappointment
    <u>____19____</u> over her, but she didn’t throw anything. She slowly counted to ten, then calmly wrote down her observations,
    noting every detail. She had to bite her lip a little, but she managed to stay in control. She tried again, and again,
    correcting one tiny thing each time. Days turned into weeks. There were still failures, but she didn’t let them defeat
    (打败) her. She took breaks and reminded herself to be <u>____20____</u>.

    Finally, one morning, she walked into her lab, feeling extremely surprised. The flowers in her latest experiment were
    not just blooming; the flowers glowed with a beautiful color she had never seen before. Her persistence (坚持) and her newfound
    self-control had finally paid off.'
