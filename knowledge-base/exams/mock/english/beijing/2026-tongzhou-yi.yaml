- id: reading_C
  type: reading
  body: 'For many students, math is a source of stress that can prevent performance. However, scientific research is now providing new strategies to change this fear into mastery.

    An excellent finding is the flipped(翻转的) classroom model. Traditional teaching, where lectures(授课) happen in class and practice at home, is being changed. Students now learn new concepts(概念) through
    videos at home, freeing class time for cooperative problem solving and discussion. Researchers are leading a study across 40 math classrooms to compare this method with traditional teaching. They find
    students have different flipping styles and watch introductory videos at their own pace(节奏). The key idea is to make better use of class time for active engagement(参加) and teacher support.

    Researchers also find changing sitting position can produce benefits. Erik Peper studied the effect of posture(姿 势)on math performance.In the study, his team asked 125 students to mentally subtract(心算减法)
    large numbers.

    Half were told to slouch(无精打采地坐着).The rest were directed to sit upright.For 30 seconds, each student started with the number 964 and then silently subtracted by sevens. Then they changed positions and
    repeated the exercise, this time starting from the number 834. A survey asked each person which position made it easier for them to do the mental math. More than half(56.4%) found it was easier when
    they sat upright. One sixth(17%) said it was easier when they slouched. The rest said posture didn''t matter. Notably, those who struggled most while slouching were often the same students who reported
    high test anxiety. This suggests that keeping an upright posture could be a simple way to help reduce stress and increase the focused thinking required for math.

    Now technology also offers more chances for participation. A math education researcher is exploring how motion-based video games can help learn geometry(几何). In her game“The Hidden Village”, players
    use body movements to control the figure in the game and interact(互动) with geometric concepts. Research shows that when students work in groups and use gestures(手势) to solve problems, their intuitive(直觉)
    understanding and deeper insight improve clearly. For example, groups using gestures showed correct intuition 70% of the time, compared to only 27% for groups that did not gesture. This proves using
    physical movement in teamwork can improve math reasoning.

    In conclusion, science is helping educators and students with different tools-from restructuring classrooms and using body posture to joining interactive games. These ways are moving beyond rote memorization(死记硬背).

    aiming to build confidence, deepen understanding, and finally help students become good at math.'
