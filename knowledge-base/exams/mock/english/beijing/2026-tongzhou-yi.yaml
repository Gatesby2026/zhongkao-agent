  - 33
  body: 'B

    Madison’s Dream

    Madison looked out of the classroom window. A bird flew freely across the sky, cutting through a white cloud. Total freedom,
    she thought, wishing she could escape (摆脱) math class like that bird. Her mind wandered to her horse, Star, and the summer
    days riding him. Lost in her daydream, she didn’t hear Mrs. Landon calling her name until the teacher’s voice brought
    her back. The class laughed as Mrs. Landon asked about the homework.

    “I didn’t have trouble doing it,” Madison said, “but I forgot to bring it.” More laughter filled the room. Mrs. Landon
    sighed, clearly disappointed with Madison’s constant daydreaming, and mentioned talking to her parents.

    Soon, Mrs. Landon introduced a special guest: Dr. Landon, an animal doctor visiting for Career Day. He talked about how
    important school grades were and how hard he studied math and science when he was young. Madison found it hard to focus
    until one word caught her ear: “horse.”

    Dr. Landon explained that working with horses lets him be outside all day. “Does anyone here have a horse?” he asked.
    Madison’s hand shot up. “I do! His name is Star!”

    “A big brown horse on Anderson Road?” Dr. Landon asked. He remembered treating Star. Madison was amazed and happy that
    he knew her horse. “So you spend your days taking care of horses?” “Most days,” Dr. Landon said, describing his job visiting
    horses all over the area. “It’s a lot of work, but I love it.”

    Madison was amazed. A clear picture of her future suddenly appeared: She would be an animal doctor for horses! The idea
    filled her with excitement. Her life suddenly felt bigger and full of purpose.

    That afternoon, Madison changed her plans when she got home. She hurried past her surprised parents in the kitchen. “I’m
    going to study math for an hour,” she said loudly, “then ride Star.” Her parents looked at each other in surprise. “She’s
    studying before riding?” her mother whispered. Her father shrugged, looking proud. “Must be that talk I had about college
    last week. I guess she listened.” He smiled, pleased with himself.

    Madison overheard them as she went upstairs, smiling too. She remembered her dad talking about college last week, but
    her real inspiration was different: Dr. Landon and his life with horses. She decided she would study math and science
    hard every night now—those were important subjects for becoming an animal doctor. Her new plan had begun.'
