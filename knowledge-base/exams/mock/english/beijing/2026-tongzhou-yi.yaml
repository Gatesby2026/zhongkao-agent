    I used to be not good at public speaking. Last month, I joined a school speech contest. Though nervous, I practiced hard
    every day. Finally, I gave a clear speech and won second prize. This experience helped me find my hidden courage. I learned
    that practice builds confidence. Now I believe challenges help us grow. Facing difficulties bravely can lead to wonderful
    discoveries about ourselves.


    详解：确定文体：介绍性记叙文（公众号推送），以一般过去时和一般现在时为主

    明确要点：介绍一次自我发现、自我超越的经历，分享过程中的感受与收获

    确定人称：第一人称（I/my）

    注意事项：不得透露真实姓名、校名和地名

    [第二步：构思布局]

    开头：点明自己的经历背景（不擅长的事）

    主体：描述经历的过程与结果（克服困难、获得成功）

    结尾：分享收获与感悟，升华主题

    [第三步：要点展开]

    要点一：经历背景

    经历主题：public speaking/playing sports/learning a new skill等

    初始状态：not good at…/nervous/afraid to try等

    要点二：经历过程与结果

    行动方式：practiced hard every day/asked for help/kept trying等

    最终结果：gave a clear speech/won a prize/did well in the competition等

    要点三：感受与收获

    过程感受：nervous/upset at first/gradually confident等

    成长收获：practice builds confidence/learned to face challenges/discovered my hidden courage等

    主题升华：challenges help us grow/facing difficulties bravely leads to self-improvement等'
