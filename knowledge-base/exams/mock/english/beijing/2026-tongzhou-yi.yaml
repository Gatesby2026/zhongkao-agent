  solution: '从下面两个题目中任选一题，请根据所给的中文和英文提示，完成一篇不少于50词的英

    语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校

    名、姓名和地名。

    题目1.


    例文:

    Dear students,

    I am writing to call on all of you to join in Green Lifestyles. Green living is important because it helps protect

    our environment and makes our planet healthier. We can all take action. For example, I always turn off lights when

    leaving a room to save energy. Also, I ride my bike to school to reduce air pollution. Let''s work together to live a

    green life!

    Yours,

    Li Hua

    [详解]写作步骤

    [第一步:审题立意]

    确定文体:倡议书(应用文)，以一般现在时为主

    明确要点:介绍环保生活的重要性、分享个人践行环保的具体做法、号召同学们参与绿色生活

    确定人称:第一人称(I/my/we)

    注意事项:不得透露真实姓名和学校名称

    [第二步:构思布局]

    单段式结构

    开头:点明写信目的，发起“绿色生活”倡议

    主体:说明环保生活的重要性，并介绍个人践行环保的具体行动

    结尾:发出呼吁，号召大家共同参与绿色生活

    [第三步:要点展开]

    要点一:环保生活的重要性

    作用说明:helps protect our environment/makes our planet healthier/keeps the air clean等

    要点二:个人践行环保的具体做法

    节约能源:turn off lights when leaving a room/turn off taps when not using water等

    低碳出行:ride my bike to school/take the bus instead of driving等

    减少污染:reduce waste/reuse plastic bags等

    要点三:发出倡议

    呼吁表达:Let''s work together to live a green life!/Let''s take action to protect our planet!等

    题目2.


    例文:

    I used to be not good at public speaking. Last month, I joined a school speech contest. Though nervous, I

    practiced hard every day. Finally, I gave a clear speech and won second prize. This experience helped me find my

    hidden courage. I learned that practice builds confidence. Now I believe challenges help us grow. Facing difficulties

    bravely can lead to wonderful discoveries about ourselves.

    [详解][第一步:审题立意]

    确定文体:介绍性记叙文(公众号推送)，以一般过去时和一般现在时为主

    明确要点:介绍一次自我发现、自我超越的经历，分享过程中的感受与收获

    确定人称:第一人称(I/my)

    注意事项:不得透露真实姓名、校名和地名

    [第二步:构思布局]

    开头:点明自己的经历背景(不擅长的事)

    主体:描述经历的过程与结果(克服困难、获得成功)

    结尾:分享收获与感悟，升华主题

    [第三步:要点展开]

    要点一:经历背景

    经历主题:public speaking/playing sports/learning a new skill等

    初始状态:not good at.../nervous/afraid to try等

    要点二:经历过程与结果

    行动方式:practiced hard every day/asked for help/kept trying等

    最终结果:gave a clear speech/won a prize/did well in the competition等

    要点三:感受与收获

    过程感受:nervous/upset at first/gradually confident等

    成长收获:practice builds confidence/learned to face challenges/discovered my hidden courage等

    主题升华:challenges help us grow/facing difficulties bravely leads to self-improvement等

    本部分共33题，共40分。在每题列出的四个选项中，选出最符合题目要求的一项。

    从下面各题所给的A、B、C、D四个选项中，选择可以填入空白处的最佳选项。'
