  stem: What can we learn from the passage?
  options:
    A: 20-30 minutes’ exercise is out of date today.
    B: The kids did activities instead of tests in the lab.
    C: Tiredness may influence the kids’ math performance.
    D: The HIIE program mainly benefits the kids’ learning.
  answer: C
  solution: "根据文章第四段“That could be because of tiredness... math tasks seem to be the first ones affected by tiredness.”可知，疲劳可能影响孩子的数学表现，故选C。文中未提及“20-30分钟的运动如今过时了”，不选A。根据第三段“completed\
    \ tasks testing attention, language skills, and math”可知，孩子们在实验室进行测试，选项B与原文不符。根据文章第四段“However, for math, the kids performed\
    \ a bit less than after less-intense exercise.”可知，HIIE可能会导致数学表现下降，故选项D过于片面。\nD\nIn the classic story The Little Engine\
    \ That Could, a small train worked hard up a steep hill, repeating, “I think I can.” This story shows how much society\
    \ values perseverance—sticking with something even when it’s hard. \nBut researchers suggest that sometimes, instead of\
    \ always setting new goals, we should ask: “What do I no longer need?” Past goals may no longer fit our lives. They might\
    \ be too hard, too expensive, or simply not what we want anymore. However, quitting (放弃) is often looked down upon, so\
    \ letting go can be even harder than persevering. \nWhy We Stick with Past Goals\nScientists are now studying why quitting\
    \ is so difficult. One reason is the <u>“sunk-cost” bias</u>— we find it hard to give up something after we’ve spent time,\
    \ money, or effort on it. \nIn one online game, researchers had over 3, 500 players push colored buttons to get points.\
    \ Some buttons gave points more often than others, but players weren’t told which. They could turn to a new color at any\
    \ time but couldn’t go back. Most players stuck with a color far longer than they should have, even though making a change\
    \ would have been smarter. “Even in this unpaid game, people worked hard to move on,” said researcher Rachit Dubey. In\
    \ real life, where emotions are involved, it’s even harder. \nHow to Quit in a Healthy Way\nSo if quitting is sometimes\
    \ the best choice, how do we do it? Studies show that why we quit is the key point. A 2022 study followed over 900 people\
    \ who were giving up long-term goals. Those who quit because others pressured them often felt“stuck” (被困住的) and doubted\
    \ their decision. But those who quit because the goal no longer fit found it easier to move on. \nPsychologist Andreea\
    \ Gavrila compares quitting to a breakup. “It’s very messy,” she says. Quitting a goal can take months or even years.\
    \ But if there’s a moment you decide from your inner motivation (内在的动机) to do it, there’ll be the process of moving on.\
    \ \nA Different Kind of Courage\nWe often think of perseverance as a strength. But sometimes, holding on does more harm\
    \ than good. Letting go of a goal you’ve outgrown can free up mental space and energy for new dreams. Finding a new way\
    \ forward may first require the courage to say, “I think I can’t.”"
