- id: 39
  type: 作文
  score: 0
  stem: "生活中处处都有鼓励的力量。有时只是一句简单的话、一个肯定的眼神，但却能让人重拾信心，勇敢面对困难。某英文网站正在开展以“Encouragement”为主题的征文活动，假设你是李华，请用英文写一篇短文投稿，谈谈你在生活中得到的一次鼓励或给予他人鼓励的经历，以及这次经历给你带来的启示。\n\
    \n提示词语：nervous, kind, prepare, support, confident\n\n内容提示：●What’s your experience of giving or receiving encouragement?\
    \ \n\n●What have you learned from this experience? \n\n| Encouragement has an amazing power in our daily life.  __________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\
    \ |\n|---|"
  answer: ''
  solution: "[二选一备选题目，与上一题任选其一作答；本题不重复计分]\nEncouragement has an amazing power in our daily life. I remember one experience\
    \ that has deeply moved me.   Last term, I felt nervous about an English speech competition. I was afraid that I might\
    \ fail it. Then my English teacher, Mrs Lin, came over and encouraged me, “Believe in yourself. You have prepared well.”\
    \ Her smile and kind words made me feel much more confident.   During the competition, I tried my best and finally won\
    \ the second prize. At that moment, I realized how powerful encouragement could be. It not only gives people confidence,\
    \ but also helps them face challenges bravely. Since then, I have learned to encourage others whenever they need support.\n\
