  body: 'B

    Nilsa stared at the classroom clock, counting down the minutes until lunch. Her mom had packed her favorite meal— sancocho,
    a rich chicken soup from their hometown.

    In the dining hall, she poured the warm soup into a bowl. Just as she was about to take a sip (一小口) , her classmates noticed
    it.

    “What is that smell?” John asked, wrinkling (皱起) his nose.

    “It’s sancocho. It’s a kind of chicken soup,” Nilsa replied.

    “That doesn’t look like any soup I’ve ever seen,” said Codi. “Looks like something from a science lab.”

    “Why don’t you eat normal food, like pizza?” added Candice.

    Nilsa took a quick look at the other lunches— pizza, fries, peanut butter and jelly sandwiches. Suddenly, she didn’t feel
    hungry anymore. Quietly, she closed her lunchbox.

    When Nilsa got home, she cried out, “Why did you pack that strange food, Mom?”

    Her mother looked surprised. “Strange? That’s our traditional dish. It’s part of our hometown culture. Your great-grandmother
    used to make it.”

    “But everyone made fun of me,” Nilsa said sadly.

    “Then maybe next time, you can help them understand,” her mom said gently. “Tell them where it comes from, or share some
    with them. People often think something is strange just because they’ve never tried it.”

    Nilsa thought for a moment. “Will you teach me how to make it?”

    Her mom smiled. “Of course. Let’s cook together tonight.”

    The next day at lunch, Nilsa opened her lunchbox confidently. The familiar smell spread through the room. She offered
    some to her classmates.

    One by one, they tasted the soup. Some liked it, some didn’t, but nobody laughed. Instead, they asked questions about
    the ingredients (原料) and the cooking method. Nilsa smiled. “This is a traditional dish from my hometown. My great-grandmother
    used to make it. It’s part of my family’s story.” She realized that sharing her food was more than just about taste— it
    was sharing the culture, her hometown, her family, and a little part about herself.

    She returned home that afternoon, feeling proud. Her mom asked, “How was the lunch?” Nilsa smiled. “Not everyone loved
    it, but they listened. And that’s the part that counts.”'
