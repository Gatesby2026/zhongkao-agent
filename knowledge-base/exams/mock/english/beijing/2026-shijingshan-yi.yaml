    When our teacher said we would create a class book corner, I felt very excited and thought it would be a wonderful way
    to share stories—though I knew it would take real teamwork to make it happen.

    As the class monitor, I felt quite <u>____13____</u> on the first day. I’d never led a project like this and worried other
    students might not share my interest in books. Our teacher, Mrs. Liu, comforted me in a kind voice, “Every good thing
    starts with a small step. What <u>____14____</u> most is your true love for reading.”

    ![](figures/image3.png)

    She then showed us how to organize books on the new shelves so everyone could find them <u>____15____</u>. Soon, everyone
    pitched in: some brought their favorite books from home, and others worked on eye-catching posters. After a week, the
    empty corner became a comfortable place where students could enjoy reading.

    By the third week, however, only a handful of students were using it. Some of us grew discouraged, but Mrs. Liu reminded
    us, “<u>____16____</u> new habits takes time and patience. We must keep trying—and thinking of ways to make our corner
    even better.”

    So we held a class meeting to collect ideas. We decided to award small prizes to students who read often and also started
    a weekly story time. Through this, I learned to <u>____17____</u> my classmates’ creativity rather than just my own, and
    realized that teamwork goes beyond simply working together.

    In the weeks that followed, I would say—I still had my <u>____18____</u>. Was all this effort really worth it? But then
    we began to notice more and more students spending their free time reading in the corner. The pride we felt then was quite
    sure—every bit of work had <u>____19____</u> off.

    At the end of the term, our head teacher came to visit our book corner. He presented us with the “Best Creative Book Corner”
    award and told us that creating a class book corner had been a special school tradition for many years.

    I finally understood the true <u>____20____</u> of what we’d done. It was not just about making a pretty corner, but about
    helping every student find joy in reading and learning.'
