    \ scientist Eric Drollette, an exercise psychologist at the University of North Carolina, wanted to find a kind of exercise\
    \ that could fit into a classroom setting with limited space. Early studies had tested 20 to 30 minutes of moderate-intensity\
    \ (中等强度的) exercise, but they couldn’t be done in a classroom and would take too much time away from lessons. Drollette’s\
    \ team designed a nine-minute high-intensity interval exercise (HIIE). Kids performed moves like jumping jacks (开合跳),\
    \ squats and high knees—exercising for 30 seconds, resting for 30 seconds, and then repeating. \nThe study tested 25 children\
    \ aged 9 to 12. Each child visited the lab three times, taking part in three different activities: doing the nine-minute\
    \ HIIE, riding a stationary (静止的) bike, and watching an educational video. After each activity, the children completed\
    \ tasks testing attention, language skills, and math. \nDrollette’s team showed that after the high-intensity interval\
    \ exercise (HIIE), children’s brains became more efficient at recognizing mistakes. Language performance also improved\
    \ after the HIIE. However, for math, the kids performed a bit less than after less-intense exercise. “That could be because\
    \ of tiredness.” Drollette says. Tasks that require higher-level thinking, such as math, seem to be the first ones affected\
    \ by tiredness. \nExperts find the results exciting. Lauren Raine, an exercise scientist at Northeastern University, noted\
    \ that short, high-intensity exercise breaks in classrooms might improve learning performance and help students deal with\
    \ mistakes more effectively. \nDrollette also believes such exercise could benefit teens. An overactive mistake response\
    \ is connected with mental (精神的) health problems, which have become more common in high school. By helping calm this response,\
    \ high-intensity exercise may support mental well-being. \n“Being active can help with a lot of things that are going\
    \ on in society,” Drollette said, encouraging students to find chances to stand up and get moving."
