- id: 38
  type: 写作
  score: 10
  stem: '38.从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词的

    英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不要写

    出真实的校名、姓名和地名。

    题目①

    假设你是李华，你校的英国交换生Peter对中国传统文化很感兴趣，计划周末在北京

    体验一下，他在校园论坛上发布了一则帖子，希望邀请一位中国同学同行。请你结合帖

    子内容，用英文回复一个愿意同行的帖子，请就具体的安排给出建议，并谈谈你能提供

    的帮助。

    →C School Forum

    [Help] Can you go with me?

    Post Time:2026-04-25 14:30| Views:128| Replies:30

    Peter

    Hey everyone!

    I''m a huge fan of traditional Chinese culture and I''d love to

    explore Beijing this weekend. Is any Chinese friend free to

    join me and give some suggestions?

    Your help and company would mean a lot to me.

    提示词语:museum,watch,explain,introduce,communicate

    内容提示:● Where can you go and what can you do together? Give some advice.

    ● How can you help Peter during the cultural exploration?

    Hi, Peter. I''m Li Hua. I''d be happy to join you this weekend!

    题目②

    生活中处处都有鼓励的力量。有时只是一句简单的话、一个肯定的眼神，但却能让

    人重拾信心，勇敢面对困难。某英文网站正在开展以“Encouragement”为主题的征文活

    动，假设你是李华，请用英文写一篇短文投稿，谈谈你在生活中得到的一次鼓励或给予

    他人鼓励的经历，以及这次经历给你带来的启示。

    提示词语:nervous,kind,prepare,support,confident

    内容提示:● What''s your experience of giving or receiving encouragement?

    ● What have you learned from this experience?

    Encouragement has an amazing power in our daily life.'
  answer: ''
  solution: 'One possible version:

    题目①

    Hi, Peter: I''m Li Hua. I''d be happy to join you this weekend! How about visiting an art

    museum in the morning and trying to do some paper cutting? In the afternoon, we can go to a

    teahouse to watch a short Peking Opera performance.

    I can help explain the history and stories behind the activities in simple English so that

    you can understand them better. For example, I can introduce some famous artists and explain

    the meanings behind different Peking Opera mask colors. I can also help you communicate

    with local artists if needed.

    Hope we have fun together!

    题目②

    Encouragement has an amazing power in our daily life. I remember one experience that

    has deeply moved me.

    Last term, I felt nervous about an English speech competition. I was afraid that I might fail

    it. Then my English teacher, Mrs Lin, came over and encouraged me,“Believe in yourself. You

    have prepared well.” Her smile and kind words made me feel much more confident.

    During the competition, I tried my best and finally won the second prize. At that moment,

    I realized how powerful encouragement could be. It not only gives people confidence, but also

    helps them face challenges bravely. Since then, I have learned to encourage others whenever

    they need support.

