- id: reading_D
  type: reading
  body: 'In the classic story The Little Engine That Could, a small train worked hard up a steep hill, repeating,“I think I can.” This story shows how much society values perseverance-sticking with something
    even when it''s hard.

    But researchers suggest that sometimes, instead of always setting new goals, we should ask:“What do I no longer need?” Past goals may no longer fit our lives. They might be too hard, too expensive,
    or simply not what we want anymore. However, quitting(放弃) is often looked down upon, so letting go can be even harder than persevering.

    Why We Stick with Past Goals Scientists are now studying why quitting is so difficult. One reason is the “sunk-cost” bias-we find it hard to give up something after we''ve spent time, money, or effort
    on it.

    In one online game, researchers had over 3,500 players push colored buttons to get points.

    Some buttons gave points more often than others, but players weren''t told which. They could turn to a new color at any time but couldn''t go back. Most players stuck with a color far longer than they
    should have, even though making a change would have been smarter.“Even in this unpaid game, people worked hard to move on,” said researcher Rachit Dubey. In real life, where emotions are involved, it''s
    even harder.

    How to Quit in a Healthy Way So if quitting is sometimes the best choice, how do we do it? Studies show that why we quit is the key point. A 2022 study followed over 900 people who were giving up long-term
    goals. Those who quit because others pressured them often felt“stuck”(被困住的) and doubted their decision. But those who quit because the goal no longer fit found it easier to move on.

    Psychologist Andreea Gavrila compares quitting to a breakup.“It’s very messy,” she says.

    Quitting a goal can take months or even years. But if there''s a moment you decide from your inner motivation(内在的动机) to do it, there''ll be the process of moving on.

    A Different Kind of Courage We often think of perseverance as a strength. But sometimes, holding on does more harm than good. Letting go of a goal you''ve outgrown can free up mental space and energy
    for new dreams. Finding a new way forward may first require the courage to say,“I think I can’t.”'
