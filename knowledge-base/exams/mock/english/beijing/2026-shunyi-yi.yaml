    题目1

    I did a survey about our classmates'' after-class reading time. The result shows

    that 5 students spend less than 5 hours reading every week. 25 students read for 5 to 8

    hours a week while only 10 students spend more than 8 hours on reading. From the

    survey, I find most students spend some time reading, but quite a few don''t read

    much.

    Reading is a wonderful way to relax ourselves and learn more knowledge. It also

    opens our eyes and improves our writing skills. To make reading a part of our lives, I

    have some advice. First, we can make a weekly reading plan and stick to it, so that

    reading will become a habit. Second, it is a good idea to share our favorite books with

    classmates. This way, we can not only learn from each other but also find more

    interesting books to read.

    In short, reading is very important. Let''s start reading more from now on and

    make progress together!

    题目2

    I''m glad to share my design for the“Mark 2026” campus souvenir activity. I plan

    to design a special notebook.

    This notebook will have our school logo and the words“2026” on the cover,

    making it meaningful and unique. It is not only beautiful but also very useful in our

    daily school life. We can record our thoughts, interesting stories, great progress and

    unforgettable moments in it. Every page will keep our warm memories of 2026.

    In my opinion, it is more than a notebook. It is a wonderful souvenir of our youth

    and school days. I believe it will be loved by all the students.'
