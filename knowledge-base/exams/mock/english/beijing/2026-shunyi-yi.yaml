- body: 'When I walked out of school after our final exams, it was a great feeling.

    Summer vacation! Time to relax and watch videos for the next six weeks, I thought.

    But my mom and dad told me that I was spending my first week of summer at an adventure camp.

    “A what?” I asked, not ___13___ my ears.

    “An adventure camp - you know, wilderness, backpacking, rock climbing, sleeping in a tent," Dad explained.

    I didn''t have a ___14___. The next day, I went to the camp unhappily.

    The first day was actually more fun than I expected. We did activities to know each other. Then, we shared why we were here. and I admitted(承认) that my parents had made me come. Others gave much better
    ___15___: Kate wanted a challenge and to learn new things about herself. And Russel wanted to leave his comfort zone. “Is getting out of my comfort zone a good thing?” I wondered.

    The third day was a ___16___ day. We did rappelling(绕绳下降). That put me far outside of my comfort zone! I was scared of heights. My legs felt weak the whole way down. So even though I was afraid, it
    all went surprisingly ___17___! It was terrifying but exciting.

    On the fifth day, our task was to find our campsite. I was worried because the only people we could rely on(依靠) were ourselves. When we finally got to the campsite, I couldn''t believe that I was actually
    ___18___ this. I felt a sense of freedom and control over my life.

    On the last day, the instructor asked what adventure meant to us. After thinking, I finally put it into words-Adventure is a great way to break out of daily routine. You have to experience something
    new. That''s why a little ___19___ is worth it. Adventure brings out the best in people, I think. When you get out of your routine and ___20___ beyond the limits of your comfort zone, you''re learning
    to take care of yourself and grow.'
