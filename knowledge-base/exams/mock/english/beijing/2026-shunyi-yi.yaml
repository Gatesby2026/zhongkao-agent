    The Math Challenge

    It was Friday, and there were only 15 minutes until lunch. All the students in Mrs. Stretch’s math class were waiting
    excitedly for the fun game called Around the World. This was Eddie’s favorite activity. He loved racing against classmates
    to solve math problems quickly. Eddie sometimes won and sometimes lost, but his friend Michael was always the champion.
    Michael never lost and beat everyone in class every week.

    Soon the game started. Mrs. Stretch let the new student Talia play first. Talia was very fast. She beat Eddie, Vivian,
    and many other students one by one. No one could stop her. Finally, only Michael was left. The whole class became quiet
    and watched carefully. When Mrs. Stretch gave the question, Talia answered correctly before Michael. Everyone cheered
    loudly for the new winner.

    After class, Eddie found Michael sitting sadly at his desk with his head down. Eddie walked over and asked, “You OK?”
    Michael didn’t look up. Eddie could tell he was upset. He sat beside Michael and said, “It’s OK to lose. I lose all the
    time, and you’re still great at math. ”

    Michael looked up and said quietly, “I thought no one liked me. They cheered when I lost. ” Eddie smiled and explained
    that the class was just surprised and happy for Talia’s amazing work. He told Michael that one loss didn’t change how
    good he was.

    Then Eddie said, “We can practice math together. I can help you, and you can help me. Next time you can challenge her
    again. ” Michael felt much better and said with a little smile, “Challenge accepted!”

    Finally, the two friends walked out together to join their classmates. Michael was no longer sad. He felt hopeful and
    ready to practice hard for the next game.'
