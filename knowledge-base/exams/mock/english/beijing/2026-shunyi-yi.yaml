    After dinner, I told my six-year-old son, who was mid-meltdown, “Use your words!” He had just started yelling and hitting
    his eight-year-old sister because she wasn’t sharing a toy he believed was his. Both kids froze for a second, giving me
    just enough time to slow my own quickly rising emotions.

    Looking back, I realize I never actually explained to my kids why words can help. But putting feelings into words is how
    we begin to name what’s happening inside us, and that naming can start to change the experience itself. Sometimes, as
    research shows, the words we choose to describe our lives can shape our mental health for months and years to come.

    Psychologists are exploring how <u>verbalizing</u> our feelings can transform experience. It can help us manage heated
    moments and also support healing from life’s hardest situations. Research published over the past 40 years on expressive
    disclosure—using your words—shows it can lead to significant health improvements, especially for those dealing with stressful
    life events. Another research shows that writing about feelings can have a similar effect. After writing about a challenging
    situation, people report fewer doctor visits, reduced pain, stronger immune function (免疫功能), and better outcomes for conditions.

    Research also shows that writing about feelings can actually change the way you remember them. For those who don’t like
    to write, talking through one’s feelings works just as well. When we describe painful or overwhelming events, we don’t
    just relive them. We reorganize them. We add meaning, emotional context and resolution. In doing so, we can reduce the
    pain these memories cause and make them easier to deal with.

    Similar expressive writing programs are being explored with children and stem from (源于) research by psychologist John
    Gottman. A recent review shows these newer expressive writing programs have small but meaningful effects on improving
    outcomes for emotional well-being among kids ages 10 to 18 years old. There’s even some indication that these programs
    can improve school achievement among kids who have significant emotional problems. Even for young kids, storytelling and
    drawing can help make sense of big emotions, especially when guided by a teacher or parent.

    “Use your words” is a tool, and like any tool, it takes practice for someone to use it effectively. Sometimes we see it
    pay off. The boy is trying new ways to ask the girl to share her toys, and sometimes it even works. When using their words
    helps them get what they want or helps them solve a problem, it creates its own reward loop (循环). Over time, these small
    moments of language aren’t just about resolving conflicts. People begin to see themselves as the main characters in their
    own life stories—those who can take action and make changes, which, as research shows, is a foundation for lasting well-being.'
