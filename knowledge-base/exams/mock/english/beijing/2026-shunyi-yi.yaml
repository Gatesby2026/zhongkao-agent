  score: 0
  stem: '假设你是李华，你校英语社团打算开展以“印记2026”为主题的校园纪念物 (souvenir) 设计活动，为此在校内征集想法。请你用英语给社团公众号留言，分享你的设计，并说明设计理由。


    提示词语：special, notebook, useful, record


    内容提示：


    ●What is your souvenir like?


    ●Why do you design it in this way?


    I’m Li Hua from Class 1, Grade 9.


    ________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________


    I hope my design will be liked by all my schoolmates.'
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    [第一步：审题立意]

    确定文体：新媒体语篇 (公众号留言)，时态用一般现在时和一般将来时为主

    明确要点：围绕“印记2026”校园纪念品设计活动，分享自己的设计并说明理由，需包含提示词

    确定人称：第一人称 (I/we)

    注意事项：内容需覆盖提示问题；逻辑清晰，理由充分；语句通顺，无语法错误

    [第二步：构思布局]

    三段式结构：

    开头段：自我介绍并引出设计分享

    主体段：介绍纪念品的样子及设计理由

    结尾段：表达对设计的期望

    [第三步：要点展开]

    要点一：自我介绍与引入

    个人信息：I’m Li Hua from Class 1, Grade 9/My name is Li Hua, I’m from Class 1, Grade 9等

    分享意愿：I’m glad to share my design for…/I’m more than happy to share my idea with you等

    要点二：介绍纪念品设计

    物品描述：I plan to design a special notebook/My design is a special notebook等

    外观细节：This notebook will have our school logo and the words “2026” on the cover/It will carry our school logo and “2026”
    printed on the front等

    功能用途：It is not only beautiful but also very useful in our daily school life/It can hold our daily school life records
    and sweet memories等

    要点三：说明设计理由

    设计初衷：Every page will keep our warm memories of 2026/It is a wonderful souvenir of our youth and school days等

    深层意义：It’s more than a notebook/it holds our special school memories/It will remind us of our school life in 2026 whenever
    we see it等

    要点四：结尾期望

