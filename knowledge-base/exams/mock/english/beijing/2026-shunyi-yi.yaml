  body: '阅读短文，根据短文内容回答问题。

    Playing Out

    In recent years, a movement called “Playing Out” has become popular. It aims to bring back safe, community-centered outdoor
    play for children, helping them stay healthy, happy, and connected to where they live.

    Children are gathered on a “playing street” that is temporarily (暂时地) closed to the traffic, where they can play freely,
    enjoy games together and form new friendships.

    The movement started when a group of parents noticed that their children were spending less time playing outside because
    of safety worries and more time spent on digital entertainment. To change this, they began working together to close their
    streets for short periods. This creates a safe space for children’s activities like football, skipping and drawing with
    chalk.

    However, there are some challenges. Parents must apply for the street-closing and make sure traffic is managed safely.
    Some local councils (政务委员会) provide signs and cones to help with this, but in other areas, parents have to find these
    themselves. There is sometimes a small fee (费用) for applying, and it needs to be done each time. Adults must be there
    to make sure traffic doesn’t come down the road, as well as setting up signs to tell drivers where to go.

    Even so, the benefits are clear. Children learn new physical skills—like kicking a ball or riding a bike—and also social
    skills, such as how to get along with others from different backgrounds. What’s more, they feel more part of the community.
    Adults benefit too, by meeting neighbors and breaking down barriers (隔阂) between people. Rachel, one of the founders,
    says: “The children don’t all go to the same schools, but now they recognize each other. They’ve played team games together
    and even say ‘Hi’ when they meet in the park.”

    The “Playing Out” movement shows how communities can come together to create safe, fun spaces for children. By closing
    streets to cars and encouraging outdoor play, it helps children live healthier, happier lives while building stronger
    neighborhoods. The movement hopes to encourage more communities to start their own “playing streets”.'
