- id: reading_C
  type: reading
  body: 'If you''ve ever worn a cotton T-shirt, drunk bottled water, or forgotten to turn off the tap, you''ve unknowingly connected with coral reefs- those vibrant underwater ecosystems that are coral
    reefs disappearing faster than we realize. National Geographic''s 2024 Marine Survey reveals that 50% of the world''s coral reefs have died since 1995, and without action, another 90% could disappear
    by 2050. Coral reefs aren''t just exotic wonders-they''re linked to our lives, and saving them starts with understanding that link.

    First, let''s uncover why coral reefs matter beyond their beauty. Though they cover less than 1% of the ocean floor, they support 25% of all marine species (海洋物 种),from tiny clownfish to large sea turtles.
    This biodiversity isn''t just fascinating it''s necessary and important to human survival. Over 500 million people rely on reef fish for protein, and reefs act as natural breakwaters, reducing storm
    damage to coastal communities by up to 97%. For students, reefs also fuel curiosity: their limestone skeletons, built over thousands of years, hold clues to Earth''s past climate, much like tree rings.
    Losing reefs means losing a classroom of natural science.

    So what''s harming them? The biggest threats are linked to our daily habits.

    Carbon emissions (排放) from cars and energy use warm oceans, causing “coral bleaching”-when corals force out the algae(藻类) that give them color and food.

    Plastic waste, often from single-use items like water bottles or snack wrappers, entangles (缠住) coral polyps and gives off toxie chemicals. Even water waste plays a role: a single load of laundry uses
    41 gallons of water, and runoff from our homes carries pollutants into reef habitats. The good news? These are problems students can deal with directly.

    Teenagers around the world are already leading the charge, proving that age doesn''t limit impact. In Cape Town, 18-year-old Jade founded Oceano Reddentes, an organization that turns beach plastic into
    “eco-bricks” for building houses. Her team hosts monthly clean-ups where students collect plastic waste that would otherwise reach reefs, and she gives talks at schools to teach peers about the reef-plastic
    connection. Across the globe, high students in Australia use smartphone apps to report bleached coral to marine scientists, helping track damage in real time. Even small acts add up: switching to reusable
    water bottles, buying secondhand clothes (to reduce cotton''s water footprint), and using reef-safe sunscreen can cut your personal impact by 30%.

    National Geographic explorer Sylvia Earle once said,“The ocean connects us all.” This is never truer than for coral reefs. Every time you choose to walk to school instead of getting a ride, or recycle
    a plastic bag, you''re sending a lifeline to these underwater ecosystems. Saving reefs isn''t about grand gestures- it''s about recognizing that your daily choices are part of a global web.'
