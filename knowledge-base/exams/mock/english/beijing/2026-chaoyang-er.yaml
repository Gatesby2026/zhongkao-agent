  body: '阅读短文，根据短文内容回答问题。

    When I was a child, my mother would say,“Go outside and play.” And I would, with all the other kids in the neighborhood.
    We learned a lot about nature and ourselves by playing outside.

    A few years ago, I was lucky to be asked to join the advisory committee(咨询委员会)of Children and Nature Network(C&NN). This
    is a growing organization created by writer Richard Louv. His book, Last Child in the Woods, became a best-seller as people
    realized we have a generation (一代人) of children so connected to electronics that they are losing their connection to nature.
    As Louv points out, “We are fast reaching a generation of children where no child will have played outdoors.”

    Nature is more than plants and animals we see each day. Nature is a shared spirit of being with all things.

    Through nature, we learn that everything is cyclical (周期的), that life begins and life passes, and that every life is in
    balance with all other life forms, and each one helps the other serve an important purpose.

    My neighbors follow the beliefs of nature that Louv suggests in his book. They plant, they play, and they teach their
    children that nature has her purpose. They live out the idea that we are part of nature, and when we harm her, 者 任 we
    harm ourselves.

    Spending time outdoors both in loneliness and at play is an important education for children. The outdoors encourages
    an inner connection to nature, and if you stay there for a little while in silence, you will see all the natural connections.
    You will connect to the chlorophyll(叶绿素) of plants, the flight of insects and birds, and especially the knowing of the
    earth herself.

    In Shakespeare''s As You Like It, it mentions that there are songs in trees, stories in running rivers, lessons in stones,
    and goodness in everything.'
