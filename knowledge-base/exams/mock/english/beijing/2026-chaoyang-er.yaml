  stem: '阅读下文，回答下列问题（30-33）：

    Facial expressions are central to social life, yet scientists still don''t fully understand how the brain produces them. To find out what''s going on in the brain during facial expressions, researchers
    turned to monkeys. They recorded how the brain worked when the animals communicated with one another in the lab. The team''s results, published in Science, came as a surprise. The monkeys'' expressions,
    from a scary face to a friendly "lip-smacking", were produced by both the medial cortex and lateral cortex. These two brain areas were long thought to operate alone, but the study showed that both of
    them took part in the production of all kinds of facial expressions. The two areas did, however, run at different speeds. Activity in the lateral cortex changed quickly to control the fast facial movements.
    By comparison, things happened more slowly in the medial cortex, which may help it notice slow background changes that influence facial expressions. What''s more, both brain activities showed up before
    facial movements did, suggesting the brain prepares expressions ahead of time. This raises a question: do monkeys plan the faces they make on purpose? If facial expressions are partly controlled, they
    may not just show feelings — they might be tools to influence others. Alan Fridlund, an expert who was not part of this study, believes monkeys control their facial expressions carefully, but doubts
    whether lab tests can fully show how monkeys communicate. Still, the new study offers a new understanding of how facial expressions are made.


    30. What does the study show about the medial cortex and lateral cortex?

    '
  options:
