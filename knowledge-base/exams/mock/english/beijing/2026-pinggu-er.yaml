  body: 'Priya used to hate Mondays. Not because of math tests, but because of library period. That was when Mrs. Tandon asked
    students to read aloud.

    Every Sunday night, Priya’s stomach would hurt. “I feel sick,” she told her mother. Every Monday morning, she pressed
    her hands against her belly and walked to the nurse’s office. Her face looked pale, but her heart beat fast with fear.
    She was not really ill. She was just afraid.

    Priya had trouble with words. When she looked at a page, the letters seemed to dance. The other children read smoothly,
    but her voice shook. Last month, a boy laughed when she said “dog” instead of “god.” She wanted to disappear.

    This went on for four Mondays. Then one Tuesday, Mrs. Tandon found Priya under the old tree in the school garden.

    “Priya,” she said gently, “may I sit with you?” Priya nodded, but she did not look up.

    “Reading is like climbing a mountain,” Mrs. Tandon said. “Nobody runs to the top alone.” Her voice was warm. Tears filled
    Priya’s eyes. “I just want friends,” Priya whispered. “Not pity.”

    Mrs. Tandon smiled. “Then let us try something new.” The next week, she started a “Reading Buddy” plan. She put Priya
    together with Aarav, a small boy from Grade 1. He loved stories but needed help with big words. “You look at the pictures,
    and I will read the words,” Priya told him. Her voice was soft, but Aarav listened carefully. He did not laugh. He just
    smiled and pointed at the next picture.

    Week by week, something changed. Priya’s voice grew steady. The letters stopped dancing. And Aarav listened carefully
    to every word she read. “Again!” he said when they finished a book. Priya began to arrive early on Mondays, carrying picture
    books for her little partner.

    By the end of the term, Priya no longer walked to the nurse’s office. She walked to the library instead. She finally understood:
    everyone carries his own problems. The bravest thing is not to hide them, but to let someone walk beside you until you
    find your own strength.'
