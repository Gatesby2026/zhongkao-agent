- id: 38
  type: 作文
  score: 10
  stem: '从下面两个题目中·任选一题·，根据中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出内容不计入总词数。所给提示词语仅供选用。请不要写出你的校名和姓名。


    题目①


    为丰富校园文化生活，你校英语社团即将举办“English Dubbing Competition (英语配音大赛)”。假设你是英语社团团长李华，为此你对本社团40名同学进行了调查统计，下表是部分统计结果。请你根据表格中的学生意向调查结果，给英语老师写一篇报告，简要说明图表内容，并谈谈你的看法。


    | Types of dubbing materials (配音类型) | Cartoons | Movies | School sitcoms (校园剧) | Documentaries (纪录片) |

    |---|---|---|---|---|

    | Number of Students | 16 | 12 | 8 | 4 |

    | Competition forms (配音形式) | individual dubbing (单独) | Pair dubbing | Group dubbing |  |

    | Number of Students | 4 | 20 | 16 |  |


    提示词语：most, be interested in, prefer, choose, perform, practice, show, benefit


    提示问题：·What can you learn from the results?


    ·What is your opinion of the dubbing competition?


    Dear students,


    Our school will hold an English dubbing competition. Here is the result of our survey about students choices._


    ________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________


    题目②


    初中生活转瞬即逝，回望三年校园时光，总有一些温暖的瞬间令人铭记于心。某学校英文网站现举办毕业留言征文活动，请你以“A Moment That Touched Me”为题，写一篇英语短文。简述令你感动的瞬间发生的经过；谈谈你的内心感受；表达你的感恩之情。


    提示词语：unforgettable, upset, encourage, support, thankful, cherish


    提示问题：·What happened in the moving moment?


    ·How did it make you feel and what have you learned from the experience?


    How time flies! Many warm moments come back to my mind._______________________________________


    ____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________'
