  body: '阅读短文，根据短文内容回答问题。

    Chinese Calligraphy

    Chinese calligraphy is one of the greatest art forms in Chinese culture. In 2009, UNESCO officially recognized it as an
    Intangible Cultural Heritage of Humanity (人类非物质文化遗产). It has a history of more than 3,000 years. The earliest examples
    come from the Shang Dynasty (商朝), when people carved characters onto bones and shells.

    Over the centuries, calligraphy developed through different styles. In the Qin Dynasty, Prime Minister Li Si created the
    small seal script to meet the growing need for records. However, it was too slow to write, which led to the official script
    — faster and with straighter lines. Later, the regular script developed, which has clear corners and straight strokes
    (笔画) of different thicknesses.

    The Tang Dynasty is seen as the golden age of calligraphy. Masters like Wang Xizhi and Yan Zhenqing set standards for
    later generations. During this time, calligraphy skill became very important. Anyone who wanted a government job had to
    write well in regular script. The Chinese still use this script today in print and daily life. Two other styles, running
    script and cursive script, also became popular. Running script is faster and more flowing, while cursive script is even
    more free and artistic.

    Calligraphy is more than beautiful writing. In ancient China, good handwriting was a sign of education and moral character
    (品德). Many great poets and thinkers were also famous calligraphers. Their works remain national treasures, and calligraphy
    continues to attract interest worldwide as a symbol of Chinese civilization (文明).

    For students, learning calligraphy offers valuable lessons. It requires careful attention to every stroke, helping build
    patience and focus. In today’s digital world, calligraphy provides a chance to slow down. The slow, repeated brush movements
    create a sense of calm, helping students manage stress.

    Moreover, calligraphy connects students with their cultural roots (根源). By studying ancient masters, they learn core Chinese
    values (核心价值观) — harmony (和谐), discipline (自律), and respect for hard work. In an age of computers, calligraphy offers
    a rare link to the past. It builds character, preserves culture, and brings inner peace. Tradition can still bring meaning
    to modern life.

    ![](figures/image8.png)'
