- body: 'Lily was a shy girl who often felt like she wasn''t“enough”. She compared herself to her classmates. Some were amazing at sports or dancing. Some had lots of friends.“Why can’t I be like them?”
    she often wondered.

    One day, her mom noticed Lily looking ___13___.“What’s wrong, dear?”

    Mom asked kindly. Lily sighed,“I just don''t think I’m good at anything.” Mom smiled and said,“Everyone has their own strengths, Lily. You just haven''t ___14___ yours yet. What you need is to have
    a little more confidence in yourself.”

    That afternoon, Lily found an old box on her doorstep. There was a note on it: The Perfect You. Curious, she opened it. Inside was a puzzle piece with a soft green light. Suddenly, it spoke,“What makes
    you truly happy?” Lily quickly ___15___ the box, too scared to answer. But that night, the shining puzzle piece floated(漂浮)toward her in her dream.

    The next morning, still thinking about the question, Lily opened the box again and whispered to herself,“I feel happy when I draw pictures for my little sister.” To her ___16___, the puzzle piece floated
    into the grid and clicked into place!

    Then, a second puzzle piece appeared.“What are you proud of?” it asked.

    Lily thought for a moment before answering.“I feel proud when I help other kids,” she replied. The second piece flew into place just like the first one.

    Day by day, more puzzle pieces appeared, Drawing Helping Others each asking a question. Lily answered ___17___.

    Sometimes it was easy to answer. Sometimes it wasn''t. She never hid her true thoughts.

    The Finally, the last piece appeared. It asked, Perfect You “Do you sometimes feel left out?” Lily froze.

    “I don''t know.” But then she remembered when her classmates worked together and didn''t ___18___ her. Then she remembered her mom telling her,“It’s OK to feel alone sometimes. Everyone gets to choose
    their own friends, but that doesn''t mean you should ___19___ yourself!” Lily took a deep breath and replied,“Yes, I feel left out sometimes, but I know it''s OK."

    The whole puzzle flashed and turned into a bright mirror. Instead of showing someone“perfect”, the mirror reflected Lily’s own smiling face with words below it:“Be Yourself.” A warm feeling spread through
    her heart. She finally realized she didn''t need to be like anyone else. She just needed to be herself, and that was ___20___.'
