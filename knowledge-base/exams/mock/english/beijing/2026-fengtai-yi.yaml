    基本通顺，语意基本连贯，表达基本清楚。虽然有少量语言错误，但不影响整体理解。

    第三档:(5~4分)

    部分内容符合题目要求，要点不齐全。语法结构和词汇错误较多，语言不通顺，表达

    不够清楚，影响整体理解。

    第四档:(3~0分)

    与题目有关内容不多，只是简单拼凑词语，所写内容难以理解。

