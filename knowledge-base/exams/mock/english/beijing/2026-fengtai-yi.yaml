    （二）阅读下列短文，根据短文内容，从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    B

    The bell woke me and the pain took my breath away. The doctors had promised this operation would help me walk again. Instead,
    my legs felt strange and every movement sent sharp pain through my knees. I shouted until my throat burned. Night after
    night, alone in the hospital with my pain, I told my mom through tears, “I can’t do this. There is no hope. I’m giving
    up.”

    But my mother refused to accept that. Every morning, she drove me to recovery training: lifting weights, pulling myself
    on parallel bars, and learning to fall and stand again. My hands shook. My muscles ached badly. I hated every second of
    it.

    One Tuesday, a girl with golden hair rolled her wheelchair beside mine. “I’m Betty,” she said gently. I turned away, but
    Betty didn’t press. She simply opened up, “After my operation, I cried every day for two weeks. I had the same treatment
    and it failed twice.”

    Her honesty drew my eyes back. “Giving up just lets the pain win,” she continued softly. “I’m not asking for courage.
    I’m just asking for one more day. Will you try one more day with me?”

    That question lit a small hope in my heart. The next morning, I arrived before she did. “You came,” Betty said with a
    smile. I whispered, “Just one day.”

    One day turned into a week, then two. Betty was there for every painful moment—steadying (使稳定) my shaking hands, catching
    me before I fell, celebrating each trembling step. When I broke down in tears three weeks in, crying that nothing had
    changed, Betty simply sat beside me and said, “Three weeks ago, you couldn’t stand for three seconds. Today, you held
    on for six. That’s change.”

    Together, we kept going. One month later, I pushed off the bars and stood alone for eight full seconds. Recovery still
    brings aches and doubts, but now, I remember Betty’s question— and the choice to try one more day. She taught me that
    true strength isn’t about never falling, but about having someone who stays steadily by your side, saying, “It’s okay.
    Let’s try again.”'
