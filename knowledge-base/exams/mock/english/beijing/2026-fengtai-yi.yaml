- id: express
  type: reading_express
  body: '阅读短文，根据短文内容回答问题。

    On social media, have you seen book fans share pictures of cool books and nice reading spaces? In real life, have you noticed people reading at coffee shops or on public transport?

    Before you wonder whether they are truly reading, there''s already a name for this:“performative reading”. As The Week noted, people have joked that these individuals(个人)regard books as “a fashion symbol”.

    This trend(潮流) of “performative reading” became more popular in 2021, when the“BookTok” community on TikTok became a place where popular books turned into trendy items. NBC News noted that social media
    algorithms(算法) push this trend further, as they favor eye-catching things like attractive book covers and coffee cups in city cafes.

    However,“performative reading” also made some real book lovers uncomfortable. Alaina Demopoulos, a writer for the Guardian, shared that when she tried to read alone in public to enjoy a lovely evening,
    two young girls laughed at her, leaving her feeling stressed. On social media, readers spoke out that there’s no such thing as“performative reading”.

    Some young people even argue that this so-called“performance” doesn’t reduce the real joy of reading. Selva Khan, a university graduate who enjoys sharing her reads on social media, feels it’s common
    to“aestheticize(美化) our hobbies”.“I think social media makes everyone perform, whether they accept it or not,” she told NBC News.“I’ve seen posts on various platforms that are ‘performative’ for years,
    and these are exactly the ones I really enjoy,” Khan added.

    Today, as many of us rely heavily on short videos, making it hard to read even a whole book, does it really matter if someone“appears” to be reading?

    Jafei Pollitt, a regular reader, joked online that even pretending to read can encourage someone to start reading.“Acting like a reader can finally lead you to become a real one. You might start for
    aesthetics but end up getting into the book...” she told NBC News.'
