  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    One possible version:  Version 1:  I have a great design for our graduation memory book.  First, it will include photos
    of classmates, teachers and special school moments that show our happy junior life. Second, our teachers can write warm
    encouraging words for us. Besides, we can leave sweet short messages for our dear friends and share our dreams and best
    wishes in the book to encourage each other.  The book will record our growth and special memories from junior high school.
    It helps us treasure our friendships and remember these meaningful years forever. (88w)  Version 2:  I have a wonderful
    idea for our graduation book.  To start with, it should include photos of our classmates, teachers and unforgettable school
    moments, which will bring back sweet memories. Another great idea is to invite our teachers to write messages of encouragement
    for us. We can also share our dreams and best wishes in the book to inspire each other.  This book is special because
    it records our growth, friendship and courage and reminds us of the valuable time forever. When we look back years later,
    we will treasure these memories and remember the wonderful time we spent together. I hope it will become the most cherished
    gift of our junior high life. (114w)


