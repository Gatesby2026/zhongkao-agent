    ![](figures/image8.png)

    Household robots have long been a popular idea in science fiction. Now, scientists are finally making them real, yet one
    daily task has proved surprisingly challenging: folding laundry.

    Picking up a T-shirt and folding it seems easy, but it requires a complex (复杂的) understanding of how objects move in three
    dimensions (维度). Humans learn how fabrics (织物) respond and can apply that knowledge to new situations, but robots cannot.
    As a result, robots are slow and poor at folding laundry.

    One key difficulty in teaching robots this skill is the endless number of ways various fabrics can fold. It’s simple for
    people to pick up a shirt and quickly find a sleeve or collar to fold it, but each way a shirt crumples is a new challenge
    for robots, which are often trained on images of smooth clothing lying flat on a surface.

    This task is easier for people because we learn by seeing and feeling things. Our eyes and hands provide rich information
    by interacting with objects. Simply looking at a piece of fabric gives us a learned understanding of how heavy or stretchy
    it is, and how it would best be folded. For example, we know jeans don’t fold like silk. Robots, however, don’t understand
    that more force is required to lift and fold a pair of jeans than a blouse and instead must interact with the object before
    determining (确定) a folding plan.

    Additionally, robots’ “hands” aren’t as flexible (灵活的) as ours. Many grippers are designed for specific objects, like
    picking up exact-sized screws (螺丝) in a car factory. Laundry presents a challenge: the dimensions of fabric change with
    every fold, so grippers must be able to adjust (调节) to match any fabric shape and size. “Folding laundry requires skilled
    hand control and high-level reasoning,” computer scientist Danica Kragic explains.

    Many robots fold laundry using “pick and place”. They pick up a point on clothing and move it along a fixed path to a
    set spot. However, this method adapts (适应) poorly to real-time changes. Now, a newer method called AdaFold can adjust
    its plan during folding by monitoring the fabric and adapting its actions as needed. This flexibility could help scientists
    design robots that better adapt to changing environments.

    Even though robots still have trouble with messy, crumpled clothing, new methods like AdaFold are bringing folding laundry
    closer to reality.'
