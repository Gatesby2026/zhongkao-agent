- id: 38
  type: 写作
  score: 10
  stem: '38.从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇

    不少于50词的英语文段写作。文中已给出内容不计入总词数。所给提

    示词语仅供选用。请不要写出真实的校名和姓名。

    题目①

    假设你是李华，你们班的英语课正在开展研究性学习。你选择研究同

    学们每周使用社交网络的时长情况，为此你对班里40名同学进行了问卷调

    查。下图是部分统计结果。请用英语写一篇短文，简要说明图表内容，并

    就如何平衡社交网络使用与现实生活给同学们提出建议。

    How much time do students spend on social media per week?

    25

    25

    Number of Students

    20

    15

    10

    10

    5

    5

    0

    less than 3 hours

    3-5 hours

    more than 5 hours

    Weekly Social Media Use Time

    提示词语:show,spend,habit,join,talk face-to-face

    内容提示:●What can you learn from the results?

    ●Offer some advice to your classmates on balancing social

    media use and real life.

    题目②

    假设你是李华，你校英语社团正在征集“初三毕业纪念册”的设计方

    案。请你用英语写一篇短文，提出你的设想，并简要说明理由。

    提示词语:include,message,record,special,treasure

    内容提示:●What is your design for the graduation book?

    ● Why do you design it like that?'
  answer: ''
  solution: 'One possible version:

    题目①

    Version 1:

    I surveyed 40 classmates about how long they spend on social media per week. The results show

    that 10 students spend less than 3 hours per week, 25 students spend 3 to 5 hours, and only 5 students

    spend more than 5 hours. Most students have good habits, but some spend too much time online.

    Here are my suggestions to balance social media and real life. First, set a daily time limit of 20

    minutes. Second, join offline activities like sports or reading. Finally, try to talk face-to-face with

    friends instead of only chatting online. By following these tips, we can enjoy social media without

    letting it control our lives.(111 words)

    Version 2:

    Recently, I did a survey on weekly social media use. The results show that 10 students spend less

    than 3 hours per week, 25 students spend 3 to 5 hours, and only 5 students spend more than 5 hours.

    It shows most of us have good habits with social media, though a few spend too much time online.

    Here are my suggestions on balancing social media use with real life. First, set a clear time limit

    like 20 minutes a day. This helps you control your habit. Second, join more offline activities such as

    sports or reading. These activities are good for your body and mind. Finally, talk face-to-face with

    friends instead of only chatting online. In this way, we can enjoy social media without letting it

    control our lives.(131w)

    题目②

    Version 1:

    I have a great design for our graduation memory book.

    First, it will include photos of classmates, teachers and special school moments that show our

    happy junior life. Second, our teachers can write warm encouraging words for us. Besides, we can

    leave sweet short messages for our dear friends and share our dreams and best wishes in the book to

    encourage each other.

    The book will record our growth and special memories from junior high school. It helps us

    treasure our friendships and remember these meaningful years forever.(88w)

    Version 2:

    I have a wonderful idea for our graduation book.

    To start with, it should include photos of our classmates, teachers and unforgettable school

    moments, which will bring back sweet memories. Another great idea is to invite our teachers to write

    messages of encouragement for us. We can also share our dreams and best wishes in the book to

    inspire each other.

    This book is special because it records our growth, friendship and courage and reminds us of the

    valuable time forever. When we look back years later, we will treasure these memories and

    remember the wonderful time we spent together. I hope it will become the most cherished gift of our

    junior high life.(114w)

