- id: reading_D
  type: reading
  body: 'Explore social media and you''ll quickly find phrases like“I am worthy” or“I choose happiness.” The idea is simple: repeat these self-affirmations(自我肯定) often enough, and you may feel happier,
    and healthier. But do they really help, or just sound comforting?

    Self-affirmation theory suggests we all want to believe we are“good enough” and“worthy”. However, painful experiences like poor grades or failure can cause shame, self-doubt, anxiety, and depression(抑郁).
    The theory claims that affirming your positive qualities can protect you from these mental health difficulties, boosting(提升) your mood and self-worth.

    Some studies have found that self-affirmations may help support self-esteem (自尊) and improve overall mental health. For example, women with cancer felt less depressed when listening to music with recorded
    affirmations rather than music alone. Adults with depression who wrote personal affirmations twice daily reported better self-esteem after just 15 days. However, a 2009 study found this only worked
    for people who already had high self-esteem. Those with low self-esteem even felt worse after practicing positive affirmations.

    Besides these results, there is another side to using positive affirmations. Pretending (假装) to stay positive during difficult times can lead to toxic positivity, which means hiding or even denying(否认)
    painful feelings instead of solving real problems. When you lock away your emotions this way, you may feel ashamed of your struggles and less likely to reach out for help. Positive affirmations may
    also provide a short-term lift by activating the brain''s reward system, but depending too much on these quick emotional boosts may become unhealthy over time. In unsafe or harmful situations, focusing
    too much on staying positive may even blind you to potential dangers or stop you trusting your instincts(直觉).

    This has led researchers to look more closely at self-talk. Their findings suggest that the way people speak to themselves may matter more than how positive the words are. Instead of simply repeating
    positive affirmations, it may be more beneficial to respond with self-compassion(自我怜悯),such as saying“this is hard” or“anyone would feel this way.” Another useful method is third-person self-talk. This
    can create some emotional distance and make it easier to manage feelings and observe them with curiosity rather than simply reacting to them.

    Few thinking styles are always useful. The key is to be flexible: ask yourself“is that thought helpful?” and choose what works best for your situation. If that’s positive self-talk, try to use compassion
    and understanding, not just upbeat words.'
