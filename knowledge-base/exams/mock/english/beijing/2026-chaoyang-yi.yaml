    D

    A large body of research has been developed in recent years to explain willpower. Most of the researchers exploring self-control
    do so with a clear goal in mind: How can willpower be improved? If willpower is truly easily used up, as the research
    suggests, what can be done to keep it strong?

    Avoiding temptation (诱惑) is an effective method for keeping self-control, so please follow “out of view, out of mind”
    rule. One recent study, for example, found office workers are less attracted to candy in the desk drawer than that on
    top of their desks.

    The research suggesting that we have a limited amount of self-control raises a troubling question. When we face too many
    temptations, are we to fail? Not necessarily. Researchers don’t believe that one’s willpower is ever completely used up.
    Rather, people appear to hold some willpower in reserve (储备), saved for future needs. The right drive allows us to <u>tap
    into</u> those reserves, allowing us to carry on even when our self-control strength has been run down. High drive might
    help deal with weakened willpower, at least to a point.

    Willpower may also be made less easily exhausted (精疲力尽的) in the first place. Researchers compare self-control to a muscle
    (肌肉) that gets tired with heavy use. But there is another side to this comparison, they say. While muscles become exhausted
    by exercise in the short term, they are strengthened by daily exercise in the long term. Similarly, we should take regular
    (有规律的) practices of self-control to build willpower strength.

    Studies on willpower exhaustion suggest that making a list of decisions on New Year’s Eve is the worst possible way. Being
    exhausted in one area can reduce willpower in other areas, so it makes more sense to focus on a single goal at a time.
    In other words, don’t try to give up smoking, choose a healthy diet and start a new exercise plan at the same time. Taking
    goals one by one is a better way. Once a good habit is in place, psychologist Baumeister says, you’ll no longer need willpower
    to keep the behavior. Finally, healthy habits will become routine (常规) and won’t require making decisions at all.

    Many questions about the nature of self-control remain to be answered by further research. Yet it seems likely that with
    clear goals, good self-control and a little practice, you can train your willpower to stay strong in the face of temptation.'
