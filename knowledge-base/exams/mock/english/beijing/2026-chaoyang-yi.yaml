    （二）阅读下列短文，根据短文内容，从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    B

    “Dear Daddy” Notes

    My father was the gentlest and most caring dad in the world. But when we argued, he became strict and never considered
    that there could be another side. My words seemed to reach no one because his ears were closed. I could never win.

    When my father refused to understand that I needed privacy for my phone, I felt frustrated (沮丧的) and even cried. When
    he noticed I was trying to explain my reason for not wearing uniforms to school in junior high, he ended our “discussion”,
    leaving me silently sad. Later, when he refused to let me go on my last-year class trip to Montreal, I could do nothing
    but run out of his room in great sadness. I couldn’t get him to listen to my side, maybe he would read it.

    Hoping his eyes would be more open than his ears, I wrote a note that began “Dear Daddy” and ended with how much I respected
    his opinion, hated to fight with him, valued our relationship, and loved him. I put the note under his door and raced
    back to my room.

    Minutes later, there was a knock at my door. Seeing my father’s face, I knew my note had softened his strictness and touched
    his heart.

    Getting his agreement to go to Montreal was sweet. Even better was discovering a way to argue with him without tears,
    ending with a hug instead. My “Dear Daddy” notes became a way to follow up on many of our arguments. During our most heated
    disagreements, I knew how to get through to him, but his firm (坚定的) final word left me speechless.

    Years later, my father and I still share those sweet memories about my “Dear Daddy” notes. Whenever we look back on our
    heated disagreements and how those little notes helped him finally understand me, we can’t help smiling. He never said
    he knew my little plan, but I could always tell he loved every note that helped him see my way. To this day, those notes
    remain one of my favorite stories between us.'
