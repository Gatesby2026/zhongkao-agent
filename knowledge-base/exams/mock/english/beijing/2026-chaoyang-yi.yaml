    me impatiently and said, “Why should I learn this? I’ll probably just work at my uncle’s restaurant someday.”

    Her words surprised me. In my family, education had always been considered very important. Still, I realized that simply
    telling her this would not <u>____14____</u> her mind. Maybe Riley needed something different from the textbook.

    That evening, I thought about Riley’s words. Maybe not everything we learn is useful later, but practicing could help
    her in many ways. The next morning, I returned to her home. Riley was sitting quietly, holding a small notebook. I smiled
    <u>____15____</u> and asked her if she wanted to try a new way of learning.

