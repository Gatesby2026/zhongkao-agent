    When I was in Grade 8, my mother suggested that I help a younger student named Riley who had trouble understanding fractions
    (分数). At first, I wondered whether I could really be helpful, but my mother believed the experience would teach me something
    important as well.

    The first time I visited her apartment, Riley sat at the kitchen table with her arms crossed and her head <u>____13____</u>
