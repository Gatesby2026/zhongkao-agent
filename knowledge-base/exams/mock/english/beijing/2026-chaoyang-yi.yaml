- id: reading_27
  type: reading
  body: 'Many people think that eating a fruit in summer has the same effect on your body

    as eating it in winter. However, new research shows a different result.

    Our bodies have body cycles, which are just like our body

    clocks. There''s a main clock in the brain and other clocks in

    (

    different body parts. These clocks work together to control different

    **

    cycle

    body activities. For example, at night, our bodies produce

    chemical substances (物质) that make us sleepy.

    The body knows what time it is mainly through light. Since the daylight changes

    with the seasons, our bodies adjust(调整) accordingly. There are two types of body

    cycles: daily cycles and yearly cycles.

    Food also influences our body clocks. The idea suggests that parts in plants can

    let our bodies know about the place where the plants grow. So, eating fruits and

    vegetables when they''re in season can help our bodies get used to the changing

    seasons. For example, apples are in season in autumn. Apples from this season have

    certain things that can help our bodies save energy and get stronger against illness as

    the weather turns cold.

    However, these days, we can eat all kinds of fruits and vegetables at any time of

    the year. According to the recent study, polyphenols (多酚) which are things in fruits

    and vegetables are good for our health and can affect our body cycles. Different plants

    have different kinds of polyphenols because of their growing conditions. It is believed

    that eating out-of-season fruits might cause a difference between our body clock and

    the real environment.

    Let''s take bananas as an example. Bananas grow in areas with a hot climate. In

    the places where they come from, they come together at a certain time of the year. If

    people in mild-climate(气候温和的) areas eat bananas when they''re not in season

    locally, it might mess up the body''s normal cycle. Our bodies may get “wrong”

    signals, which could possibly influence how our body processes(加工) food and our

    general health.

    So, it''s better to eat fruits in season to keep our body cycles in line with the

    environment. But remember, eating any fruit is better than not eating at all.'
