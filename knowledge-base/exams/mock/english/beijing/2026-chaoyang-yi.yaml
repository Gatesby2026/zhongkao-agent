  - 37
  body: '阅读短文，根据短文内容回答问题。

    You don’t have to give up sugar or run a marathon to see real changes in your health and happiness. Instead, science supports
    a “start small” way. Small actions that are done regularly are what create long-lasting changes.

    The secret? It’s not willpower. It’s not even goals. The best way to turn a small change into a powerful habit is not
    to focus on your motivation (动力), your reasons for doing it, or your long-term goals.

    That is what everyone thinks, but research has shown that making small changes to the environment, the situation in which
    you perform the behavior, is far more powerful. Goals aren’t bad; they certainly have a purpose, but “motivation” only
    lasts for so long. Habits need to be two things to stick to: easy and enjoyable.

    For example, do you think your goal of getting back into the jeans you wore two years ago will encourage you to hit the
    gym every day? Probably not. What will, then? Choosing a gym that is close to your house, preferably less than 5 kilometers
    away, is the most important consideration for keeping a regular exercise habit, according to our research. Even better
    if you are doing an activity you really enjoy or meeting a good friend there.

    The best part is that once these tiny changes take root (扎根), they add up to better sleep, stronger bodies, calmer feelings
    and a clearer mind.

    Just as small drops make a big ocean, small, regular habits can lead to great health improvements. As a result, these
    changes are more likely to last because they come from doing the same things again and again, not from a short time of
    hard work.

    Start now by choosing one or two of these small habits that suit you. Once you feel confident with these, add similar
    habits for even greater benefits.

    Instead of trying to change everything or forcing yourself to do something you hate, focus on two questions: How can I
    make it easy to do? And how can I make it enjoyable? That’s how you change your life, one small change at a time.'
