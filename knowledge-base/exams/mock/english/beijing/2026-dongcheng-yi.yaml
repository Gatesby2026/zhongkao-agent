    B

    阅读下列短文，根据短文内容，从短文后各题所给的 A、B、C、D 四个选项中，选择最佳选项。

    David felt no joy. It was his second week at the new school but he still had no friends. Every time he went up to his
    classmates, he found a closed circle. The football team had enough players. The art club was full. Everyone had their
    own groups.

    During break, he saw some classmates throwing darts and counting the holes on a dartboard. David wondered what they were
    doing but he couldn’t find the courage to ask.

    ![](figures/image10.png)

    The next day was the Class Fun Day. There were circles all around David. Big, bright hula hoops (呼啦圈).

    Suddenly someone shouted, “Look at David’s hula hoop.” David had brought an old bicycle tyre (轮胎). He wanted to disappear.
    Again, he could feel the circle closing, leaving him out. The other children ran out to play. David was left alone.

    “Why are you in class, David?” Mr Wilson, his maths teacher, asked. “They laughed at my ugly circle,” David replied.

    “Ah David,” the teacher said. “It’s not what’s on the outside that matters. It’s what’s inside. Just like pi (π).”

    Mr Wilson picked up David’s tyre and a big, shiny hula hoop.

    “Divide the length of the circumference (周长) of this hula hoop by its diameter (直径),” Mr Wilson said. David got 3.14768.
    “Great! Now divide the circumference of your tyre by its diameter.” David got 3.1463.

    Mr Wilson smiled. “When we divide the circumference of any circle by its diameter, the number we get is always about 3.14.
    This is called pi. Whether it is a shiny hula hoop or an old tyre, you will find pi.”

    David understood what Mr Wilson was trying to tell him. When it came to the laws of maths, his tyre was just as good as
    a shiny hula hoop. He realised that circles may appear to be closed but they had an open mystery (奥秘) inside them. Then
    he read a book about pi.

    In the afternoon, he saw a younger group of children playing a game at the dartboard.

    “I’m David,” he said. “I read about pi. I know what this is.” The children formed a circle around David. He counted the
    holes and started doing the maths. The answer was 3.14159. There was a loud cheer. David was finally part of a circle.
    He felt a sense of wonder.'
