- id: 38
  type: 写作
  score: 10
  stem: '38.从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词

    的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请

    不要写出真实的校名、姓名和地名。

    题目①

    假设你是李华，你们班的英语课正在开展研究性学习，你选择研究同学们的课外

    阅读方式，为此你对班里40名同学进行了问卷调查，下图是部分统计结果。请用英

    语写一篇短文，简要说明图表内容，并谈谈你对这一现象的看法。

    Which way of reading do you prefer?

    12

    10

    digital reading

    paper reading

    both

    18

    提示词语:choose,popular,habit,convenient,make good use of

    内容提示:●What can you learn from the results?

    ● What do you think of this phenomenon(现象)?

    I did a survey on my classmates'' ways of reading.

    题目②

    假设你是李华，你校正在创建“健康校园(Healthy Campus)”。学校英语校刊向

    同学们征求建议。请你用英语给校刊编辑写一封邮件，推荐一个活动，并说明理由。

    提示词语:running,join,stay healthy,relaxed,relationship

    内容提示:●What activity would you like to suggest?

    ● Why do you suggest this activity?

    Dear Editor,

    I''m glad to hear that our school is building a“Healthy Campus”.

    I hope my suggestion will be helpful. Thank you!

    Yours,

    Li Hua'
  answer: ''
  solution: 'One possible version:

    题目①

    I did a survey on my classmates'' ways of reading. According to the

    results,18 students prefer digital reading,12 students choose paper reading,

    and 10 students like both. We can see that digital reading has become more

    popular among students. This shows that technology is changing our reading

    habits, while traditional books still hold an important place.

    In my opinion, digital reading is fast and convenient, while paper books

    help us focus better and think more deeply. We should make good use of both.

    It''s wise to use digital tools to get information quickly, and read paper books for

    a better reading experience. In this way, we can become better readers.

    题目②

    Dear Editor,

    I''m glad to hear that our school is building a“Healthy Campus”. I would like

    to suggest an activity called“Sunshine Hour”. In this activity, students can do

    simple sports for about one hour every day, such as running, playing

    badminton, or playing basketball. Teachers can also join us, so everyone can

    take part.

    I think this activity is very beneficial. First, it can help us stay healthy and

    become stronger. Second, it can reduce stress and make us feel relaxed. What''s

    more, doing exercise together can help students and teachers build closer

    relationships.

    I hope my suggestion will be helpful. Thank you!

    Yours,

    Li Hua

