- body: 'We pulled into the parking lot of a fast-food restaurant in our town.

    “Do you think Leo will remember me?” my fourteen-year-old son, Daniel, asked.

    Leo has worked at the restaurant for nearly ten years, and he is always smiling and ready to ___13___ others. When Daniel was in preschool, we often had lunch there, and he always looked forward to
    seeing Leo.

    Even now, I could sense Daniel''s ___14___. He couldn''t wait to see his old friend.

    We walked inside and immediately heard a familiar voice call out,“Hey, Daniel!

    Is that you?”

    Daniel''s face lit up.“Wow! You remembered me,” he said happily.“I''ll never forget when you ___15___ my favorite toy car.”

    Once, Daniel and I stopped for lunch. His toy car rolled(滚动) under the drink machine and got stuck. Leo offered to help, but he ___16___. Daniel left in tears.

    Two weeks later, we visited the restaurant again. Leo pulled Daniel''s toy car from his pocket.“I got it for you.” The manager told me quietly that Leo ___17___ to leave until he got the car out that
    day. He carefully washed it off and then carried it in his pocket every day until we returned.

    “Leo, when you gave that car back to him, Daniel thought you were the coolest man in the whole world," I said.

    We talked for a while. Then a family with young kids came in. Leo called out, “Amazing Adam! Super Sarah! I''m so happy to see you!”

    I smiled at Daniel.“Leo makes friends with every kid who comes in here. He makes more people smile each day than almost anyone else I know. He might do a small job, but he does it in a way that really
    brings ___18___."

    After lunch, Daniel and I stopped at the store. This time we smiled at every person we passed, and people smiled back. This was the most ___19___ shopping trip we''d ever had.

    Leo influenced us in such a positive way. He taught us that, no matter how small a task might be, we can always find a/an ___20___ in it. Truly seeing others, even for a moment, can turn a seemingly
    unimportant job into a quiet light.'
