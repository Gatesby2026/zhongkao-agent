    I smiled at Daniel. “Leo makes friends with every kid who comes in here. He makes more people smile each day than almost
    anyone else I know. He might do a small job, but he does it in a way that really brings <u>____18____</u>.”

    After lunch, Daniel and I stopped at the store. This time we smiled at every person we passed, and people smiled back.
    This was the most <u>____19____</u> shopping trip we’d ever had.

    Leo influenced us in such a positive way. He taught us that, no matter how small a task might be, we can always find a
