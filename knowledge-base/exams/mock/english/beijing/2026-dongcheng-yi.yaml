    D

    Artificial Intelligence (AI) has already become an important part of our daily lives. From answering our questions to
    recommending movies, AI is no longer an idea of the future but a present-day reality. Yet behind this progress lies a
    strange and sometimes troubling problem: hallucinations.

    An AI hallucination happens when a generative (生成式的) model produces information that seems believable but does not match
    reality. For example, if a model is asked to provide a source (来源) for a medical study, it might invent a paper with a
    realistic title, believable writers, and even a journal listing, but the paper is not real. AI hallucinations result from
    the way the models are trained: on a great deal of human-generated text, images, and other information. A model’s job
    is to predict the most likely sequence (序列) of words or pixels to come next. But it does not understand facts the way
    humans do. So sometimes, those predictions are untrue.

    One cause of AI hallucinations is data limitations (局限). Even large datasets cannot cover every possible fact, and missing
    or incorrect information may lead to mistakes. Also, a model might learn that some structures or patterns (模式) are common
    — such as the organization of a scientific report — and copy them even when there is no real source. Finally, <u>the lack
    of grounding</u> is key. AI models generate text only by probability. Without ways to check against real facts, the model
    cannot decide whether it is true.

    ![](figures/image15.png)

    Researchers are exploring ways to reduce or prevent hallucinations. One promising method is to connect AI models to live
    databases, scientific collections, or trusted knowledge networks. This allows the model to check its outputs (输出的内容) against
    them. Some developers are also introducing testing steps, where models explain their reasoning or clearly show their sources,
    making it easier for users to judge the truthfulness of answers. In addition, AI models can be used together with traditional
    search engines or fact-checking tools to check the facts before giving the final output.

    However, fixing hallucinations is not just a matter of improving models. Education is also important. Just as society
    learned to question sources during the rise of the Internet, we must now develop the ability to wisely judge AI outputs.

    In the end, the story of AI hallucinations is also the story of humanity’s relationship with its own creations. It is
    a story of dreams, mistakes, correction, and growth. By facing the problem honestly, we can ensure that AI will be a tool
    for knowledge, empowerment, and discovery — without letting the hallucinations of machines become hallucinations of our
    own.'
