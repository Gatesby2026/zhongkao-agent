    Even now, I could sense Daniel’s <u>____14____</u>. He couldn’t wait to see his old friend.

    We walked inside and immediately heard a familiar voice call out, “Hey, Daniel! Is that you?”

    Daniel’s face lit up. “Wow! You remembered me,” he said happily. “I’ll never forget when you <u>____15____</u> my favorite
    toy car.”

    Once, Daniel and I stopped for lunch. His toy car rolled (滚动) under the drink machine and got stuck. Leo offered to help,
    but he <u>____16____</u>. Daniel left in tears.

    Two weeks later, we visited the restaurant again. Leo pulled Daniel’s toy car from his pocket. “I got it for you.” The
    manager told me quietly that Leo <u>____17____</u> to leave until he got the car out that day. He carefully washed it
    off and then carried it in his pocket every day until we returned.

    “Leo, when you gave that car back to him, Daniel thought you were the coolest man in the whole world,” I said.

