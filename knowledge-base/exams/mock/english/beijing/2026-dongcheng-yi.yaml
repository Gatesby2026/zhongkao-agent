  body: '阅读短文，根据短文内容回答问题。

    Over the weekend, I met up with a friend for lunch. It would be an hour before he arrived. Thinking that I had enough
    time to clean the kitchen and take a shower, I suddenly realized I was running late.

    Everyone has thought, “This will only take a few minutes,” only to realize an hour later that they’re not on time. Or
    maybe your to-do list seems impossible to finish. This could be a sign of being a time optimist.

    A time optimist is someone who usually underestimates (低估) how long something takes, and overestimates how much time they
    actually have. They often say yes to more than they can manage, confident that they can “fit it all in”. They delay (拖延)
    until the last minute, believing there is still plenty of time. Although they are used to underestimating, they are confused
    when they fall behind.

    If you are a time optimist, you often rush through the days, leave tasks unfinished, and feel regretful. In light of these
    clear downsides (弊端), why do so many people become time optimists? Human psychology (心理学) offers several explanations:

    • The planning problem. We often underestimate the time it will take to complete a future task, even when we have a history
    of similar tasks taking longer. Most of the time, we focus on the ideal (理想的) path to completion, without considering
    possible problems.

    • Poor memory of past tasks. Our brains are surprisingly good at forgetting boring, slow, or messy middle parts of tasks.
    As a result, tasks appear to be completed faster than they actually are.

    • Sense of self and self-worth. Some people believe that being busy means being important. A full timetable can seem like
    a sign of importance. If they say they need more time or that a task is more challenging than they thought, they may feel
    weak.

    Do you want to feel less stressed and more productive? Be honest about the time it takes to get things done. Using that
    truth as your guide, build your days.'
