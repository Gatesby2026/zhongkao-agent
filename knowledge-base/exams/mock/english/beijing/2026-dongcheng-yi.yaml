  stem: "假设你是李华，你校正在创建“健康校园(Healthy Campus)”。学校英语校刊向同学们征求建议。请你用英语给校刊编辑写一封邮件，推荐一个活动，并说明理由。\n\n提示词语：running, join, stay healthy,\
    \ relaxed, relationship\n\n内容提示：• What activity would you like to suggest?\n\n• Why do you suggest this activity?\n\n\
    Dear Editor,\n\nI’m glad to hear that our school is building a “Healthy Campus”. \n\n_______________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nI hope my suggestion will be helpful. Thank you!\n\nYours,\n\nLi Hua"
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    Dear Editor,  I’m glad to hear that our school is building a “Healthy Campus”. I would like to suggest an activity called
    “Sunshine Hour”. In this activity, students can do simple sports for about one hour every day, such as running, playing
    badminton, or playing basketball. Teachers can also join us, so everyone can take part.  I think this activity is very
    beneficial. First, it can help us stay healthy and become stronger. Second, it can reduce stress and make us feel relaxed.
    What’s more, doing exercise together can help students and teachers build closer relationships.  I hope my suggestion
    will be helpful. Thank you!  Yours,  Li Hua


    详解：[第一步：审题立意]

    确定文体：应用文，用一般现在时

    明确要点：推荐的活动及推荐理由

    确定人称：第一人称（I）

    注意事项：不得出现真实的姓名和校名

    [第二步：构思布局]

    三段式结构：

    开头段：介绍推荐的活动

    第二段：介绍推荐的理由

    结尾段：表达希望

    [第三步：要点展开]

    要点一：推荐的活动

    活动名称：an activity called “Sunshine Hour”/holds a Morning Running activity等

    活动内容：running/playing badminton/playing basketball/playing football等

    要点二：推荐理由

    理由描述：help us stay healthy and become stronger/reduce stress and make us feel relaxed/doing exercise together can help
    students and teachers build closer relationships/running is easy to join in and doesn’t need special skills等'
