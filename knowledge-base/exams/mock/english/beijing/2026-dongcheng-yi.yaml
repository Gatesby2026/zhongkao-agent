    Have you ever looked up at a beautiful rainbow when noticing your friend looking at it? At that moment, both of you were
    focusing on the same object and aware of each other’s attention. This shared focus is called joint(共同的)attention. It depends
    on social cues(提示)such as actions or words that help two people to focus on the same thing.

    When completing tasks or solving problems, it is often said that two heads are better than one. But what does “better”
    mean? In one study, researchers asked pairs of participants(参与者)to complete a search task alone and then together. They
    found that when the participants worked together, they were faster at finding the goal, which researchers suggest is“better”performance.

    You might be wondering why two heads are better. Is it simply because you have another pair of eyes or because you divide
    the task? Well, the answer is both! Just having another pair of eyes can make a task easier and faster, so a group benefit
    can be found even if two people do not talk about the division of work. By dividing the work, you are more likely to finish
    the task faster, though one may work a little faster than the other.

    Researchers have also been interested in whether joint attention improves memory. They asked participants to remember
    pictures and found that when people believed another person was looking at the same picture and doing the same task, they
    remembered the picture better. So, this suggests that even when people imagine social cues, like just thinking someone
    else is focusing on the same task, joint attention can help people better remember things.

    Today, however, many interactions(互动)take place online. It is important to understand whether online interactions with
    others influence people’s attention. Researchers asked participants to complete a search task on their home computers,
    with an imaginary partner. The results showed that people were more accurate(准确的)when they thought they were working together
    with a partner, but faster when they thought they were competing with that partner. Interestingly, it did not matter how
    realistic the imaginary partner’s image(形象)was.

    All in all, joint attention is an important part of human interaction that shapes how people work together and how they
    remember. By understanding this, we can better recognise the value of our interactions.'
