  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    Maya was a perfectionist. Her world was beautifully <u>____13____</u>. Her notebooks were clearly organized by color,
    her desk was always clean, and her socks were always a perfect, matching pair. However, her best friend, Chloe, was her
    <u>____14____</u>. Chloe’s backpack was a black hole of forgotten papers and unfinished art projects. Yet, their friendship
    was perfect because they balanced each other out.

    One Monday morning, Maya overslept. She raced through her morning activities. Without checking carefully, she grabbed
    (抓起) two dark socks, put them on and <u>____15____</u> out of the door. It wasn’t until she was sitting in her first-period
    class, feeling proud of having made it on time, that she mindlessly looked under her desk. The socks on her feet were
    different! A wave of heat rushed to her face. She spent the whole lesson <u>____16____</u> her feet under her chair, believing
    that every word and laugh was about her mismatched feet.

    At lunch, she sat next to Chloe. “I might as well go home now,” she said, finally telling Chloe about her mismatched socks.
    Chloe stared (凝视) for a second and said, “That’s wonderful! I love it! It’s like your <u>____17____</u> are having an
    argument!”

    “We should start a trend (潮流)! Let’s make tomorrow ‘Mismatched Sock Day’! I’ll tell everyone! It must be fun!”

    Maya thought her friend had lost her mind. “No one will do it.”

    But Chloe was already on her phone, her fingers flying across the screen, <u>____18____</u> their whole grade and posting
    on the class social page. The whole grade responded (回应) quickly and positively.

    The next day, Maya <u>____19____</u> put on mismatched socks. She walked into school with her head down, prepared to be
    laughed at. But to her surprise, there were flowers and animals, polka dots and stars, knee-highs and short socks — all
    proudly mismatched. Even her history teacher had one sock with cats and another with dogs. People were laughing, pointing
    at each other’s feet, and high-fiving.

    Maya looked down at her own crazy socks and felt a huge smile spread across her face. She realized she had been hiding
    behind the idea of “<u>____20____</u>” for so long. That day, she learned that true confidence is about being brave enough
    to be a little different, and sometimes, the best ideas are the imperfect ones that bring everyone together in laughter.

    ![](figures/image3.png)'
