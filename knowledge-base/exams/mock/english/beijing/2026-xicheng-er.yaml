  body: '阅读短文，根据短文内容回答问题。

    The heart of learning is tranquility (宁静), not excitement.

    We often connect the idea of learning with the moments of inspiration and excitement. But these moments don’t last. True
    learning happens in the quiet, daily steps we take. The key is to stay consistent (一贯的) without being burned out by the
    pressure of achieving quick results. The most meaningful learning takes place in the space between pushing too hard and
    doing nothing. It’s about finding the balance.

    Learning is not a race but a journey. It requires patience.

    Set realistic goals and increase the difficulty of what you learn over time. This way, you can make progress without forcing
    it.

    Learning requires the courage to bear boredom, which is what leads to mastery. The repetition of small tasks is the true
    training ground for developing expertise (专长). Whether reading the same unit again or practicing the same skill, consistency
    is key. The true value of learning lies in making daily effort and continuing without expecting quick results. This is
    what results in mastery.

    So how to learn with tranquility? It’s important to set a clear goal and break down the learning tasks into smaller, manageable
    ones which should be clear and achievable. Remember to focus on progress, not perfection, and allow yourself to make mistakes
    without feeling ashamed.

    As you follow the correct method, each step builds upon the last. There’s no need to rush—step by step, calmly, you’ll
    make progress. True growth begins with acceptance — recognizing where we are and where we need to go. By accepting where
    we are, we can plan our next steps calmly and effectively, without the need to force change.

    Learning is not about running away from our problems but dealing with them. When we accept the challenges and discomforts
    of our learning journey and take action, we develop resilience (韧性).

    From this foundation (基础), we can shape the future, one step at a time. When we understand that change takes time and
    requires patience, we’ll stop expecting quick results and focus on our progress.'
