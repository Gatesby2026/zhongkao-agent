  options:
    A: my
    B: mine
    C: your
    D: yours
  answer: B
  solution: '句意：——这个蓝色瓶子是你的吗？——不，我的是白色的。

    my 我的（形容词性物主代词）；mine 我的（名词性物主代词）；your 你的（形容词性物主代词）；yours 你的（名词性物主代词）。形容词性物主代词后需接名词，名词性物主代词后不接名词。根据答语“No, ...is white.”可知空后无名词，且指代“我的瓶子”，故用名词性物主代词mine。'
