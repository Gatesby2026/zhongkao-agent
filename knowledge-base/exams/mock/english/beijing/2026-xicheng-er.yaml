- id: reading_D
  type: reading
  body: 'You''ve probably pressed a like button many times today, or Stella Smith kept checking what you posted as the like count rises. But why do we like the like button so much?

    like button In 2018, neuroscientist Lauren Sherman and her team studied that question. They asked 58 teens to choose some 1 hr ago Like Comment photos they had posted recently. Each teen then viewed
    the photos chosen by the whole group ona specially-designed social media that included a like button. They did so while lying in an fMRI(功能磁共振成像) machine, which allowed researchers to see if the brain
    lit up when they hit the like button-and if so, what parts of it.

    Sure enough, there was activity, and a lot of it. In the experiment, when teens saw their own photos with many likes, their brains showed activity in many different areas. Notably, Sherman also found
    that viewing photos with many (compared with few) likes was related to greater brain activity. That means we don''t just like to receive likes;

    we also like things more when other people have liked them.

    Why do we like likes so much? According to Nicholas Christakis, a sociologist at Yale University, it is because“the like button is built on the back of evolutionary(进化的) biology.” All animals learn
    and evolve as they interact with a challenging world, from experience they get through trying and making mistakes, but only certain primates(灵长类动物) have the ability to learn from others’ experience.
    This social learning allowed early humans to raise their chances of survival by avoiding mistakes they saw others making, and copying the successful moves.

    This helps explain why human beings have the preference for “mild hierarchy”(轻微等级制度). In the animal world, animals become leaders by force. Humans, however, recognize the one from whom they learn most
    as the leader. Members follow standout performers considering what they have done and how well they share the lessons to be taken from their experience.

    The evolved social learning ability also helps develop our habits of expressing thankfulness. Because we are willing to keep learning, we show thankfulness in a way that encourages others to keep sharing.
    For example, we give likes to their posts. In turn, they respond to the likes they receive. It''s what keeps us sharing what we discover.

    在线官方微信:(微信号:)，获取更多试题资料及排名分析信息。

    All this explains why we have evolved to enjoy liking and being liked. What has been chosen in human evolution is not just physical characteristics, but also urges (冲动) and feelings.

    m And this is the very deep psychological(心理的) area the like button was able to tap in to. Seeing likes come in gives us pleasure. Giving a like, knowing it will make someone happy, also makes us feel
    good. This is the key to the rise of the like button: Its popularity has very much to do with something fundamental in our biology.'
