  stem: "某国际青少年健康组织将与你校联合举办“健康生活”主题活动，现面向学生征集方案。假设你是李华，你为此调查了学生最想了解的健康生活内容(下图是部分统计结果)。请你用英文给该组织写一封邮件，简要分析调查结果，并针对同学们感兴趣的·某一方面·提出具体活动方案。根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。\n\
    \n![](figures/image7.png)\n\n提示词语：balanced, invite, group, share, practical\n\n内容提示：● What have you learned from the results?\
    \ \n\n● What activity do you suggest based on the results?\n\nDear Sir/Madam,\n\nI did a survey on what students in my\
    \ school want to learn about healthy living.\n\n___________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nI hope my idea can be considered. Thanks.\n\nYours, \n\nLi Hua"
  answer: ''
  solution: "Dear Sir/Madam,\nI did a survey on what students in my school want to learn about healthy living.\nAccording\
    \ to the results, 32% of the students want to know how to eat a healthier diet, which is the most popular topic. Also,\
    \ many students are interested in dealing with stress and keeping up daily exercise.\nBased on the results, I suggest\
    \ we hold an activity about healthy eating. We can invite an expert to give a talk on how to keep a balanced diet. After\
    \ that, students can be divided into groups to share their practical ideas on making healthy meals.\nI hope my idea can\
    \ be considered. Thanks.\nYours,\nLi Hua\n\n详解：写作步骤\n[第一步：审题立意]\n确定文体：应用文，一般现在时 \n明确要点：简要分析图表中的主要调查结果，指出学生们最想了解的健康生活内容；根据调查结果，针对健康饮食提出具体的活动建议\n\
    确定人称：第一人称（I/We）\n注意事项：根据所给的中文和英文提示，完成一篇不少于50词；不得透露真实姓名和学校名称 \n[第二步：构思布局]\n三段式结构：\n开头段：开门见山，说明写信的背景 —— 自己做了一项关于学生健康生活学习需求的调查，引出下文。\n\
    主体段：分为两层逻辑，先讲调查结果，再讲基于结果提出的具体建议。第一层：呈现数据和学生的主要兴趣点（健康饮食、压力管理、日常锻炼）；第二层：针对最受欢迎的话题，提出可落地的活动方案（专家讲座+小组分享）\n结尾段：礼貌收尾，表达希望建议被采纳的意愿，并致谢\n\
    [第三步：要点展开]\n要点一：呈现调查结果\n数据支撑：According to the results, 32% of the students want to know how to eat a healthier diet, which\
    \ is the most popular topic./Based on the survey results, 32% of students hope to learn about healthier eating habits,\
