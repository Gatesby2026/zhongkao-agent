- id: 39
  type: 作文
  score: 0
  stem: "初中三年匆匆而过。回首来路，你也许曾战胜过胆怯，也许曾为梦想努力拼搏……这一路，你应该感谢自己。某英文网站正在举办以“谢谢你，曾经的自己”为主题的征文活动。假设你是李华，请用英文写一篇短文投稿，讲述一次你想感谢自己的经历，并说明为什么感谢当时的自己。根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。\n\
    \n提示词语：encourage, confident, brave, success, improve\n\n内容提示：● Describe a time when you wanted to thank yourself. \n\n\
    ● Why do you want to thank yourself?\n\nLooking back on the past three years, there’s a time when I truly wanted to thank\
    \ myself. \n\n___________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________"
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    Looking back on the past three years, there’s a time when I truly wanted to thank myself.

    Last year, I joined an English speech contest. I was nervous. However, I encouraged myself to be brave. I practiced hard
    every day. Finally, I won the prize. I want to thank myself because I didn’t give up.

    That experience made me more confident. It helped me improve my English skills. I learned that hard work leads to success.
    It was a valuable memory.


    详解：写作步骤

    [第一步：审题立意]

    确定文体：介绍性记叙文，用一般过去时为主

    明确要点：讲述一次你想感谢自己的经历，并说明为什么感谢当时的自己。

    确定人称：第一人称(I/my)

    注意事项：不得透露真实姓名和学校名称

    [第二步：构思布局]

    三段式结构：

    开头段：总起句，承接短文开头

    主体段：描述一个你想感谢自己的时刻及你要感谢自己的原因

    结尾段：总结感受，升华主题

    第三步：要点展开

    要点一：叙述经历

    核心词汇短语及拓展：join an English speech contest/be nervous/encourage oneself/be brave/practice hard/win the prize/take part in/feel
    worried/keep practicing/try one’s best.等

    要点二：说明感谢的原因

    核心词汇短语及拓展：not give up/stick to it/hold on to the end.等

    要点三：经历带来的成长与感悟

    核心词汇短语及拓展：confident/improve skills/success/valuable memory/make great progress/learn a useful lesson/become stronger.

    拓展句型：I once took part in a speech competition and felt really nervous at first./I thank myself for keeping going when
    I wanted to quit./This experience greatly changed me and brought me a lot of progress. /As long as you work hard, you
    will get closer to success.等'
