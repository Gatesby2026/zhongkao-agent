- id: reading_D
  type: reading
  body: 'When Krista Lawlor told her teenage son to be home at a “reasonable hour”, he immediately asked for a clearer explanation.
    To him, the word was frustratingly unclear-a term whose meaning seemed to change depending on who was speaking. This elusive
    quality is the central idea of Lawlor''s book Being Reasonable: The Case for a Misunderstood Virtue. Lawlor argues that
    being reasonable is not about following a strict set of rules; instead, it is about the ability to see what truly matters
    in the “greater picture of things”.

    Reasonableness forms the basis of the law system. In many countries, judges decide negligence(过失) through the “reasonable
    person standard(标准)”, asking whether a person acted with the same care and attention that a “reasonable” person would
    exercise in the same situation. Yet, as Lawlor discovered, even law experts struggle to 在线官方微信: (微信号:)，获取更多试题资料及排名分析信息。

    define (定义) it. Take the case of Rudy Stanko, who was ticketed for driving 85 miles per hour on a frozen, bent highway
    in Montana. At the time, Montana had no speed limit; the law simply required drivers to be “reasonable and careful”. Stanko
    argued against his ticket, saying that the law was too unclear to follow. After a heated debate, Montana finally agreed,
    deciding that the word “reasonable” provided no real guidance for drivers.

    Lawlor suggests that “reasonable” is often misunderstood because it is highly dependent on the situations. She also points
    out an important difference between being “reasonable” and being “rational”. To be rational often means acting only for
    one''s own benefit. A rational seller might put the bike online for the highest possible price, refusing to lower it by
    even a dollar because his goal is to get the most money for himself. Yet, a reasonable one might choose to sell the bike
    for a lower price to a neighbor''s child who really needs it. While the seller “loses” money, he is acting reasonably
    by recognizing that helping a neighbor and seeing the bike put to good use matters more in the long run than a small money
    gain.

    Because reasonableness is tied to values, reasonable people can-and often do-disagree. They may look at the same facts
    but reach different conclusions because they value different things. Lawlor notes that we truly understand what we value
    only when our beliefs are challenged by those different from our own. Drawing on the philosopher John Stuart Mill, she
    argues that we need different perspectives to sharpen our own thinking. In our modern, divided world, reasonableness is
    a necessary tool for productive discussion, helping us stay connected even when we see the world through different eyes.'
