  body: 'Many of us feel a sudden of anger over something unimportant, like an impolite message or heavy traffic. Such reactions
    are usually brief, understandable and easy to cope (处理) with. But when irritability- getting annoyed or angry easily-becomes
    often, it may mean more than a bad mood.

    To understand why some people tend to be irritable, neuroscientist Wan-Ling Tseng studied the biological roots of irritability
    by purposefully frustrating(挫败) mice. In the experiment, the mice were trained to expect a reward after pressing a lever.
    When the reward was suddenly gone, the mice couldn''t get what they needed. They pressed the lever harder and longer,
    which meant they were angry. It is much like people angrily hitting the button of an overly slow elevator. This similar
    behavior suggests that the reaction may be even an evolutionarily beneficial(进化利好 的) one, helping animals get what they
    need or want.

    A lever No rewards!

    slow Why some adults are more likely to feel extremely irritable is still unknown, but studies on teenagers may offer
    clues on how irritability looks in the brain. Irritable young people have unusual brain activity in areas dealing with
    rewards and threats(威胁). In a 2018 study, Tseng and her team had 195 young people play a frustrating computer game. When
    kids became frustrated, the irritable kids had more brain activity in the striatum(a key part of the brain for processing
    rewards) than the calm ones. Other studies found unusual activity in the amygdala (the brain''s threat- processing center)
    in highly irritable kids. While the causes of such brain reactions remain unknown, research so far 在线官方微信: (微信号:)，获取更多试题资料及排名分析信息。

    points to the hidden health problems, as irritability often appears in depression and anxiety patients and they share
    the same genes. Besides, sickness, stress, poor sleep, pain, loneliness and overuse of social media can also make m irritability
    worse.

    Fortunately, irritability is manageable. Recent studies suggest a simpler method: using a smartphone app and wearable
    device to track(追踪) anger and stress levels. By monitoring emotional and physical changes, people can notice anger before
    it becomes too strong. They can then calm themselves by doing breathing exercises, leaving stressful situations, or reminding
    themselves that others'' annoying behaviors are not purposeful.

    Being easily irritated is not a character weakness. Rather, it can be a signal that something in a person''s life or health
    calls for close care, and with realization and proper support, people can deal with irritability in healthier ways.'
