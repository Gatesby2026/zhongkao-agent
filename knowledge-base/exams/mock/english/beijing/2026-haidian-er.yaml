- id: reading_B
  type: reading
  body: 'My grandpa is a retired(退休的) math teacher. But in our hutong, he''s famous as a skilled kite-making master.

    People say he can bring paper and bamboo to life. He always tells me,“A kite wants to fly. You just help it remember how.”

    I''d heard those words a hundred times, but I never really got their meaning until last year. When the Beijing International
    Kite Festival was coming, Grandpa asked me to make a kite with him for the first time. I felt honored but also nervous,
    as I was used to holding my phone every day, and working with bamboo felt really hard. I cut the bamboo strips(竹条) either
    too thick or too thin. After three failed tries, I almost wanted to give up.

    “Maybe I''m just not good at this,” I was discouraged, throwing down a crooked(弯曲的)bamboo strip.

    Grandpa wasn''t mad at me. Instead, he picked up the strip and examined it.“This one isn''t perfect,” he said, “but what
    seems imperfect can often turn into something surprisingly beautiful.” Then he showed me how to rearrange the strips step
    by step. We put the crooked strip together with my other failed pieces. Slowly, a ready-to- fly kite took shape. It wasn''t
    the dragon we''d planned, but something unique with uneven(不对称的)wings and a strangely curved tail.

    “Sometimes,” he said,“the kite knows what it wants to be. We just have to listen.”

    On the day of the festival, we went to the host park with hundreds of other kite lovers. Our imperfect kite flew up into
    the sky easily. As it danced among the clouds, it got more attention than any perfectly made kite. People stopped to take
    photos and ask about its special shape.

    Watching it fly, I finally understood: A kite doesn''t fly because it''s perfect. It flies because someone puts heart
    into making it-and gives it the space to rise on its own.'
