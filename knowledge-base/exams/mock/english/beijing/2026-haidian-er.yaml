- id: express
  type: reading_express
  body: '阅读短文，根据短文内容回答问题。

    School should be a place to learn, grow, and feel happy. But for many teenagers, school life can be filled with stress,
    arguments, or quiet loneliness. Instead of suffering alone, some schools are introducing a special program called Peer(同伴)Support
    to help students get through hard times and build a warmer atmosphere(氛围) in school.

    In Peer Support, students help and listen to each other. The program trains a group of students to be listeners and guides.
    These peer supporters have the following qualities in common: they are usually patient, caring, and good at communicating.
    After special training, they learn how to listen carefully, keep secrets safe, and encourage their classmates to face
    difficulties bravely. If a classmate''s problem is too serious, the peer supporter will guide them to talk to a teacher
    or a parent.

    At many middle schools, peer supporters play an important role in helping lonely or struggling students fit in and seek
    help. Take 15-year-old Eric for example. He was a shy student who always sat alone in the classroom. He struggled with
    his math grades and was afraid to ask teachers for help, fearing he would be laughed at by other m students.“When I noticed
    his low spirits, I sat with him during lunch break and invited him to join a small study group,” said Sarah, his peer
    supporter in an interview. “With Sarah’s gentle support, now I feel safe enough to share my trouble,” Eric added.

    This program benefits both sides. For students who need help, peer supporters offer a non-judgmental ear. It can reduce
    anxiety and loneliness quickly because talking to a friend often feels easier than talking to adults. For the peer supporters
    themselves, they learn to understand others'' feelings and how to communicate effectively.

    Peer Support also changes the whole school atmosphere. When students see that their classmates care about them, the sense
    of community becomes stronger. Classrooms become warmer, and arguments are more likely to be solved peacefully.

    Peer support programs prove that the most powerful help sometimes comes from a friend standing right beside you.'
