- id: 38
  type: 作文
  score: 10
  stem: "从下面两个题目中任选一题,根据所给的中文和英文提示,完成一篇不少于 50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不要写出真实的校名、姓名和地名。\n\n题目①\n\n假设你是李华，你校英语社团计划举办一次以“读经典，共成长”为主题的英语读书日活动，现向社团成员征集想法。请你用英语写一篇短文，分享你的一个活动建议，并说明理由。\n\
    \n提示词语：share, story, character, meaningful, develop\n\n内容提示：· What activity do you suggest?\n\n· Why do you suggest this\
    \ activity?\n\nHere is my idea for the English Reading Day.                                                          \
    \                                 \n\n____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nI hope my suggestion will be helpful."
  answer: ''
  solution: '【参考范文】

    Here is my idea for the English Reading Day.

    I suggest holding a classic story-sharing activity. Each of us can pick a favorite English classic, introduce the main
    story, and talk about our favorite character. This activity is very meaningful. It helps us learn more about great works
    and share ideas with each other. It also develops our English speaking skills and deepens our love for reading.

    I hope my suggestion will be helpful.


    详解：写作步骤

    [第一步：审题立意]

    文体：说明文，以一般现在时为主，客观提出活动建议并说明理由。

    人称：第一人称I/my

    核心要点：明确提出一个英语读书日的活动建议，说明开展该活动的理由

    注意事项：结构清晰，要点完整

    [第二步：构思布局]

    三段式结构

    开头段：已给出固定开头，直接承接

    中间段：提出具体活动，阐述理由

    结尾段：呼应开头，收束全文

    [第三步：要点展开]

    要点一：提出活动建议

    基础表达：suggest holding a classic story sharing activity

    拓展词汇/句式：organize a classic book discussion activity/host a character analysis speech contest等

    要点二：阐述活动理由

    基础表达：learn more about great works, share ideas, develop English speaking skills, meaningful

    拓展词汇/句式：improve communication skills/strengthen love for reading/encourage deeper understanding of classics等

    要点三：提示词语运用

    share：share ideas with each other/share favorite stories

    story：introduce the main story of the classic

    character：talk about our favorite character

    meaningful：This activity is very meaningful

    develop：develop our English speaking skills'
  knowledge_points:
  - 命题作文
  module: writing
  difficulty: 中等
  recommended_for:
  - L1
  - L2
  - L3
  qc_status: draft
  qc_note: ''
- id: 39
  type: 作文
  score: 0
  stem: "假设你是李华，你校英文网站正在开展以“学乐相长，成长有方”为主题的征文活动。请你用英语写一篇短文投稿，分享你平衡学习与娱乐的具体做法，并谈谈你的体会。\n\n提示词语：plan, hobby, break, focus, grow\n\
    \n内容提示：\n\nWhat do you do to balance study and recreation (娱乐)?\n\nWhat have you learned from this balance?\n\nI’m Li\
    \ Hua. I’d like to share my way of balancing study and recreation. \n\n____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________"
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    I’m Li Hua. I’d like to share my way of balancing study and recreation.

    First, I make a weekly plan to manage my time. When I study, I focus on my lessons carefully. After finishing tasks, I
    take a break to enjoy my hobby, like playing basketball. This helps me relax.

    From this balance, I have learned that study and fun are both important. They help me grow happily and healthily. I believe
    a good balance leads to a better future.


    详解：写作步骤

    [第一步：审题立意]

    确定文体：记叙文，以一般现在时为主

    明确要点：平衡学习与娱乐的具体做法；从这种平衡中学到了什么

    确定人称：第一人称

    注意事项：不要写出真实的校名、姓名和地名；不少于50词

    [第二步：构思布局]

    三段式结构：

    开头段：引出话题：想要分享自己平衡学习与娱乐的方法

    主体段：介绍平衡学习与娱乐的具体做法

    结尾段：介绍自己从中学到的东西

    [第三步：要点展开]

    要点一：平衡学习与娱乐的具体做法

    平衡学习与娱乐的具体做法：make a weekly plan/focus on lessons carefully/take a break/enjoy my hobby like playing basketball/set clear
    goals for each day/finish homework before playing/spend 30 minutes on a hobby after study/listen to music to relax between
    tasks...

    要点二：从中学到的东西

    从中学到的东西：study and fun are both important/help me grow happily and healthily/a good balance leads to a better future/balance
    makes me more productive/I learn better when I am not stressed...'
