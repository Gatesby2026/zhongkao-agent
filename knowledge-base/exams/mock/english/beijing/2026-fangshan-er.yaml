  body: 'Scientists at the University of Pennsylvania have created some of the world’s smallest robots. The tiny, light-powered
    robots are smaller than a grain (粒) of salt.

    For many years, scientists have worked to make smaller and smaller robots. But as robots get small, they also become easily
    broken. The new robots have been designed without any moving parts.

    The scientists faced many challenges in developing such tiny robots. To power the robot, the team chose to use a solar
    panel (太阳能电池板). This allows a robot to run for months, powered only by light. But it also meant that they had to cover
    much of the robot with the solar panel, which didn’t leave room for much else. Scientists at the University of Michigan
    developed a super tiny computer that can be programmed and even has a memory. Once the robots are programmed, they can
    move on their own, with no outside control. These robots use very new technology, but each one costs only about one US
    cent.

    For a robot so tiny, moving through water is hard. Instead of pushing water like fish, the robots create a tiny electric
    field around themselves. This field makes the ions (离子) in the surrounding water move. When those ions move, they hit
    nearby water molecules (分子) and push on them. The moving water then carries the robot forward.

    The robots can sense the temperature of the water they’re in. They can also be programmed to swim toward warmer temperatures.
    Besides, the robots can send information to researchers through movement. For example, once a robot has sensed the temperature,
    it can do a little dance.Researchers watching through a microscope (显微镜) can then understand the dance to get the information.
    “It’s very similar to how honey bees communicate,” says David Blaauw, who developed the computer.

    The scientists say the project is only the first step. In the future, similar robots could be used to report on the health
    of cells (细胞) in the human body. And, though each robot is tiny, they can be programmed to work together to complete larger
    tasks as a group.'
