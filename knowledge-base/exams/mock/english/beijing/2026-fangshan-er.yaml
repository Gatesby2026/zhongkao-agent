  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    Jacob was proud to be the editor (编辑) of the new class blog. He took his job seriously and he believed a good editor should
    be truthful.

    One day, the class was rehearsing (排练) a short play about seasons. Tess acted as a falling leaf. During practice, she
    fell down in a funny way. Everyone <u>____13____</u>, including Tess. It was a funny, unexpected moment. Jacob, seeing
    a great photo opportunity (时机), quickly took a picture.

    That evening, as he was writing a blog about the rehearsal, he remembered the funny photo. He thought everyone would love
    it. Without asking Tess, he <u>____14____</u> the photo with the description: “Our friend Tess is really ‘falling’ into
    her role!”

    The photo immediately got lots of likes and funny comments (评论) from classmates. Jacob felt proud that the photo made
    everyone smile.

    The next morning, he saw Tess by her locker, looking at the blog on her phone.

    “Hey, Tess! Did you see all the likes your photo got?” Jacob said <u>____15____</u>.

    Tess looked up, “Yeah, I saw,” she said quietly. “It was funny when it happened in class with all of us, but… I didn’t
    know you were going to upload it for the whole school to see.”

    Jacob’s cheerful feeling disappeared, and a feeling of <u>____16____</u> filled him. He had been so focused on getting
    a funny photo that he never thought about how Tess might feel. A moment that was silly and private among friends had been
    turned into a public joke. He was truthful, but he wasn’t <u>____17____</u>. He knew what he had to do.

    “I’m sorry, Tess. I should have asked you first. It was your moment, not mine to <u>____18____</u>. Do you want me to
    take it down?” Jacob said softly.

    Tess looked up and smiled. “Thanks. That would be great.”

    Jacob deleted (删除) the photo. Later, he wrote a new post titled “A Note from the Editor.”

    He explained that being a good digital citizen means that you should <u>____19____</u> your friends’ feelings, and that
    he was still learning.

    He now understood that <u>____20____</u> with someone first is as important as telling the truth, and a friend’s trust
    is worth more than any number of likes.'
