  body: 'People often look back on their life choices and imagine better possible results. When the real result is not as
    good as the imagined one, people may experience regret.

    Researchers have long been interested in studying this common feeling. One well-known study focused on the types of things
    people regret and whether they experienced more regret for things they did or did not do. Interestingly, for short-term
    regrets, they mostly talked about actions they had taken, such as saying silly words in public. For lifelong regrets,
    however, they mostly mentioned chances they had missed, like not valuing time with family members.

    These studies also showed something special. Very few people reported regret for something that they could not have personally
    changed. This means that if you don’t think you played a part in the result, you won’t feel regret. This is different
    from lots of other emotions like sadness, disappointment, or excitement, which people can feel even when they were not
    responsible for the situation that resulted in those feelings. This led scientists to believe that regret may help people
    see what went wrong with a decision and how to improve next time.

    In an experiment, 6-year-olds were told to choose between two locked boxes to win the prize that was inside. Most picked
    the box with a shorter wait and got two candies, but they learned they would have gotten four if they had chosen the other
    box. The next day, those who experienced regret the day before were more likely to wait longer. Experiencing regret helps
    people make better choices the next time they are faced with a similar decision.

    Even thinking about regret can help people make better choices in situations they have never experienced before. Lots
    of research has shown that, when it comes to making a decision, people will do what is called mental (心理的) time travel.
    This mental time travel allows people to <u>anticipate</u> future regret — they imagine themselves picking different options
    (选择) and how they would feel about each choice. Then, when it comes to actually deciding what to do in real life, they
    decide to go with the option they think will cause the smallest amount (数量) of regret.

    Regret is not our enemy. Wise people don’t get stuck in the past. They learn from it, accept it, and focus on the present.
    They let regret guide them, but they value today and make wiser choices ahead.'
- id: reading_express_intro
