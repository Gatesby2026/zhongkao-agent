  body: 'Cora had been working on a special drawing for a week. It was a picture of her good friends having a great time in
    a wonderful park. She had used her favorite glitter (闪光) pens and had gotten the colors just right. She hoped she could
    give it to her friends soon as a surprise.

    As she was packing her bag after school, her water bottle tipped over. The water made the bottom of her backpack wet.
    Cora’s heart sank (低落). She quickly pulled out the drawing. Most of the picture was badly ruined (毁坏) by the water. Its
    colors ran and the paper turned wet and soft. Cora almost cried.

    The next day, she wanted to tell her friends what had happened. During the break, she went to Peter and Zach, but they
    were busy talking about a video game. Later, she saw Mia and Emily, but they were excited about Emily’s new watch. She
    felt sad that nobody seemed to care about her. She went to sit on a bench (长椅) alone.

    A few moments later, Eric sat down next to her and asked, “You don’t look very happy today. What’s up?”

    Finally, someone was asking and someone was ready to listen. The lump (哽咽) in Cora’s throat disappeared as she told him
    everything—about the week of work, the tipped-over water bottle, and the ruined painting.

    Eric didn’t interrupt. He didn’t try to solve the problem. He just listened. When she was done, he nodded seriously. “That’s
    such a pity,” he said. “It’s okay to be sad when something you worked so hard on is ruined.”

    What he said made Cora feel a million times better. Her sadness didn’t disappear, but it felt lighter, as if she had shared
    the weight of it.

    “Thanks, Eric,” she said, managing a small smile. “Thanks for listening.”

    Sometimes, the most helpful thing you can do for someone isn’t to give advice, but simply to offer a listening ear.'
