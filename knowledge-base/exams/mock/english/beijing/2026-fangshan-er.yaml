  body: '阅读短文，根据短文内容回答问题。

    A family dinner is an important tradition to celebrate Spring Festival. In the past, most families prepared the dinner
    at home, with everyone gathering in the kitchen. Nowadays, however, more and more people choose to have the dinner in
    a restaurant.

    Some people think eating out is a good choice because it saves people the trouble of cooking and cleaning up. After working
    all year, people can relax and spend quality time with their family. Besides, eating out does not mean losing traditions,
    as family members still get together in a different way.

    Wang Peng, a software engineer, supports eating out. His family has eaten out for the Spring Festival dinner for the past
    three years and enjoyed it as much as eating at home. Without tiring cooking, the dinner becomes more enjoyable, and the
    dishes also taste better. In his opinion, what or where they eat does not matter; the love among family members remains
    the same.

    However, some people prefer to have the Spring Festival dinner at home. Liu Yonghui, a retired (退休的) teacher, is one of
    them. For him, it just won’t feel like Spring Festival having the dinner out.

    When he was a little boy, the dinner on the eve of Spring Festival was what he looked forward to most. It was not only
    for the delicious food that he seldom got to eat, but for the opportunity to have the whole family gather together. He
    used to run around the house, listen to adults chatting, and watch his mother make dumplings with special fillings inside:
    candies for a sweet life and peanuts for a long and healthy life. The whole family would sit around the table, talking
    and laughing happily. To him, simple home-cooked dishes always taste better than restaurant food.

    He hopes his children and grandchildren will still value the memories of preparing the dinner together. He believes that
    the preparation for the dinner is even more important than the dinner itself.

    Whether people choose to eat at home or in a restaurant, the spirit of the Spring Festival dinner never changes. What
    truly matters is not the place, but the warmth of being together and the love that connects family members.'
