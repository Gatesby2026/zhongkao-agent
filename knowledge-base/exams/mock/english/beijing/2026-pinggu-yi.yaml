- body: 'Making Another Kid''s Day It was the day after New Year''s. The air smelled of joy and laughter. My mom took me to Chuck E. Cheese''s, my favorite place to play games.

    口 口口 the joystick It was the day after New Year''s. The air touched seemed to pour out tickets like a waterfall -red, blue, and yellow ones growing in my put in a token hands. I kept putting them into
    my pocket, and I felt like a(n) ___13___.

    a claw machine Then I saw a claw machine in the corner. A little boy, maybe seven years old, was pulling the joystick with all his strength. His dad stood behind him, cheering softly. The boy''s face
    was full of ___14___, like that toy was all he cared about. He put in a token and moved the joystick carefully. The claw dropped, catching a small toy bear. Yes! But just as it lifted, the claw let
    go, and the bear fell back down. The boy''s smile ___15___ .

    “That’s okay,” his dad encouraged him gently. “Try again.”

    The boy put in another token. This time, the claw missed completely. His shoulders dropped. One more token, and the claw caught a toy, but halfway up, it stopped and the toy fell. To make things ___16___,
    his tickets got stuck inside the machine.

    The boy''s eyes filled with tears. His father tried to help, but there was nothing he could do. The boy looked so disappointed, as if his whole day was broken.

    I stood there watching him. At that moment, I realized I could use my own ___17___ to help him and give him a Kid''s Day.

    I walked over and said, “Hey!” He looked up. I counted out twenty of my own red tickets.

    “These are for you,” I said.“They’re for the tickets you lost.”

    The boy''s eyes ___18___ in surprise.

    “Really?” he asked quietly.

    “Really,” I answered. “Everyone has hard times, but you''re so brave and you deserve to(应得的) have a good time.” He took the tickets ___19___, and his face lit up with a big smile. He turned to his dad
    and shouted,“Dad! Look!”

    He ran to the prize counter, holding the tickets high. His dad smiled and said, “Thank you. You made his holiday.”

    I watched him pick out a small toy car. He waved at me, and I waved back.

    My mom said,“That was very kind.”

    I smiled. Making others happy gave me more joy than any prize. A small act of ___20___ can brighten anyone''s day.'
