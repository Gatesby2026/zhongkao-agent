- id: express
  type: reading_express
  body: '阅读短文，根据短文内容回答问题。

    Can Sleeping Longer on Weekends Help Teens Feel Less Anxious?

    For many teens, Saturday mornings are a time to sleep longer. After a busy week, the weekend offers a chance to catch up on sleep. A new study finds that sleeping a little longer on weekends may help
    reduce anxiety(焦虑)-but only if teens get less than two extra hours of sleep.

    Sleep is important for the brain and body, especially for teenagers. However, 75 percent of American teens do not get the recommended 8 to 10 hours of sleep each night.

    School and other activities make them wake up early, and their body clocks make it hard to fall asleep before 11 p.m.

    Some past studies suggested that too much weekend sleep might be linked to depression(抑郁).But no one had carefully studied how it relates to anxiety. So researcher Sojeong Kim decided to find out.

    Kim used data from nearly 1,900 teens aged 12 to 15. She looked at their sleep patterns(模式) and their feelings of anxiety. She found that teens who slept in for less than two extra hours on weekends
    reported the lowest anxiety symptoms. Teens who did not sleep in, or who lost sleep on weekends, had higher anxiety. Those who slept more than two extra hours had the highest anxiety symptoms of all.

    Kim shared her findings at a meeting in 2025. She thinks that big changes between weekday and weekend sleep schedules may cause a problem called“social jet lag”. This happens when the body''s clock
    does not match the sleep cycle. It can make people feel tired and unfocused.

    Kim did not find a clear link between weekend sleep and depression. That may be because depression usually starts later in adolescence(青春期).Anxiety, however, often begins earlier.

    For now, Kim''s advice for teens is simple: getting a little extra sleep on weekends may help you feel less anxious, but too much may have the opposite effect.'
