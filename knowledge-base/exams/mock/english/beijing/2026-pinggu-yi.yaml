  solution: 'Lisa在第三段第1句说“I chose playing badminton”，说明她选择打羽毛球。

    （二）阅读下列短文，根据短文内容，从短文后各题所给的A、B、C、D四个选项中,选择最佳选项。

    B

    I grew up in a small town called Palmerston, Ontario. My parents had a small store, and we lived a simple life. In high
    school, I dreamed of working in TV. But when I talked to a school advisor, she told me I could only be a nurse, a teacher,
    or a hairdresser. I was too shy to tell anyone about my real dream — except my parents. They always said, “You can do
    anything you want.”

    With their support, I applied for (申请) the radio and TV program at Ryerson University in Toronto. I was accepted and graduated
    as the best student. But finding a job was not easy. CBC and CTV both said NO to me because I had no experience.

    Then I heard that Global Television was just starting. I made a brave decision. I found the name of the president and
    decided to call him directly. My heart was beating fast, but I practiced what I would say. When he answered the phone,
    I politely asked for a visit to the studio. He was surprised but agreed.

    I chose 11 o’clock for the visit, hoping he might ask me to lunch. Sure enough, after the tour, he did. During the lunch,
    he asked me directly, “What do you want?” I answered, “All I want is a chance. If there is a job on camera, I want a chance
    to try. I just want you to know me.”

    Three months later, his secretary called. There was a chance to try out for a new game show called Wintario. I went, and
    everything went well. I got the job at once. That was the start of a 22-year career. I went on to host hundreds of shows,
    appeared in ads, movies and celebrations, and built a life I had only dreamed of as a teenager.

    Looking back, I learned that dreams don’t come true by waiting. You have to be brave, take risks, and take the first step
    — even when you are afraid. One phone call changed my life. You never know where your courage will lead you.'
