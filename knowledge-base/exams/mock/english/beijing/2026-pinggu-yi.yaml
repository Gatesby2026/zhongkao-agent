    C

    When you think of fast animals, cheetahs and falcons may come to mind. But do you know some of the fastest living things
    on Earth are very small cells? If cells had their own Olympics, who would win the speed game?

    Manu Prakash, a scientist at Stanford University, says the “competitors” won’t show up ready to compete. “We have to go
    search in puddles and ponds and in the deep ocean,” he says. His team collected information on the speed of different
    cells to compare them.

    So how do these tiny speeders move? Some fast cells jump or slide across water. Others move by waving long, thin parts
    that look like whips (鞭子), or swim with the help of tiny, hair-like parts. There are also speedy cells that do not move
    from one place to another but grow bigger or become smaller very quickly, and this makes them special “speed players”
    too.

    Take Spirostomum, for example. In Liberia, Prakash saw many white spots in a pond. They were not spread out randomly.
    He took a sample (样本) and found this single-celled creature. It can shrink (缩小) its body faster than any other eukaryote
    (真核生物) — a living thing whose cells have a nucleus. Why does it shrink so fast? Prakash says it’s part of how it communicates.
    “It actually talks to other cells … using sound underwater.”

    Another amazing cell is Pyrocystis. These algae (水藻) do not swim, but they make a huge journey. Prakash found them deep
    in the ocean near Hawai’i. They need sunlight to live, but how do they get it? The algae can <u>inflate</u> like a balloon
    to five times their size and then shrink back down. This allows them to travel about one kilometer up to the sunlit surface.
    Compared to their size, that is the longest journey on Earth.

    Prakash has found many super-fast cells in different places. These unusual living things help us learn more about the
    secret of life. "This planet is full of amazing things," he says. "When we study and compare them, we will find how wonderful
    life is."

