    Making Another Kid’s Day

    It was the day after New Year’s. The air smelled of joy and laughter. My mom took me to Chuck E. Cheese’s, my favorite
    place to play games.

    I was really lucky that day. Every game I touched seemed to pour out tickets like a waterfall — red, blue, and yellow
    ones growing in my hands. I kept putting them into my pocket, and I felt like a(n) <u>____13____</u>.

    Then I saw a claw machine in the corner. A little boy, maybe seven years old, was pulling the joystick with all his strength.
    His dad stood behind him, cheering softly. The boy’s face was full of <u>____14____</u>, as if that toy was all he cared
    about. He put in a token and moved the joystick carefully. The claw dropped, catching a small toy bear. Yes! But just
    as it lifted, the claw let go, and the bear fell back down. The boy’s smile <u>____15____</u>.

    “That’s okay,” his dad encouraged him gently. “Try again.”

    The boy put in another token. This time, the claw missed completely. His shoulders dropped. One more token, and the claw
    caught a toy, but halfway up, it stopped and the toy fell. To make things <u>____16____</u>, his tickets got stuck inside
    the machine.

    The boy’s eyes filled with tears. His father tried to help, but there was nothing he could do. The boy looked so disappointed,
    as if his whole day was broken.

    I stood there watching him. At that moment, I realized I could use my own <u>____17____</u> to help him and give him a
    Kid’s Day. I walked over and said, “Hey!” He looked up. I counted out twenty of my own red tickets.

    “These are for you,” I said. “They’re for the tickets you lost.”

    The boy’s eyes <u>____18____</u> in surprise.

    “Really?” he asked quietly.

    “Really,” I answered. “Everyone has hard times, but you’re so brave and you deserve to(应得的) have a good time.” He took
    the tickets <u>____19____</u>, and his face lit up with a big smile. He turned to his dad and shouted, “Dad! Look!”

    He ran to the prize counter, holding the tickets high. His dad smiled and said, “Thank you. You made his holiday.”

    I watched him pick out a small toy car. He waved at me, and I waved back.

    My mom said, “That was very kind.”

    I smiled. Making others happy gave me more joy than any prize. A small act of <u>____20____</u> can brighten anyone’s
    day.

