- id: 38
  type: 作文
  score: 10
  stem: '从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。·请不要写出真实的校名·、·姓名和地名·。


    题目①


    假设你是李华，你校将举办以“如何利用碎片化时间”为主题的英文演讲比赛。请你用英语写一篇演讲稿，谈谈你对碎片化时间的看法，并介绍你的做法及原因。


    提示词语：meaningful, relax, improve, habit, progress


    内容提示：


    ● What do you think of pockets of time?


    ● What do you usually do in your pockets of time and why?


    | Hello, everyone!  __________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________
    Thank you for listening. |

    |---|'
  answer: ''
  solution: 'Hello, everyone! Today I’d like to talk about pockets of time. I think they are very meaningful and useful in
    our daily life. We can make good use of them to relax, improve ourselves and form good habits.  For example, I often listen
    to English words or read short stories on my way to school. This helps me improve my English little by little. I also
    take deep breaths to relax when I wait in line. These small steps help me make progress every day.  Don’t look down on
    these small moments. Let’s make full use of them!  Thank you for listening.


    详解：[第一步：审题立意]

    确定文体：演讲稿，以一般现在时为主，围绕如何利用碎片化时间展开论述

    明确要点：表达对碎片化时间的看法，介绍个人利用碎片化时间的做法及原因

    确定人称：第一人称（I）

    注意事项：语言流畅，书写规范，不得透露真实姓名和学校名称

    [第二步：构思布局]

    三段式结构

    开头段：开篇点明碎片化时间的价值，表达自己对它的看法

    主体段：举例介绍自己利用碎片化时间的具体做法及原因

    结尾段：发出倡议，呼吁大家珍惜并利用好碎片化时间

    [第三步：要点展开]

    要点一：对碎片化时间的看法

    核心观点：meaningful/very useful

    重要作用：relax/improve ourselves/form good habits

    要点二：利用碎片化时间的具体做法及原因

    具体做法：listen to English words/read short stories/take deep breaths

    原因：improve my English little by little/help me relax/help me make progress every day

    要点三：发出倡议与总结

    倡议内容：Don’t look down on these small moments/make full use of them

    核心态度：cherish every minute of time/make small but steady progress

    题目②'
  knowledge_points:
  - 命题作文
  module: writing
  difficulty: 中等
  recommended_for:
  - L1
  - L2
  - L3
  qc_status: draft
  qc_note: ''
- id: 39
  type: 作文
  score: 0
  stem: '假设你是李华，你校英语公众号发布了以“健康第一 (Health First)”为主题的征文活动。请你用英语写一篇短文投稿，介绍你的体育运动习惯，并谈谈你的收获。


    提示词语：run, do sit-ups, improve, physical health, energetic


    内容提示：


    ● Introduce your good exercise habits.


    ● How can you benefit from these habits?


    | I’m glad to share my good exercise habits with all of you.  ___________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________
    |

    |---|'
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    I’m glad to share my good exercise habits with all of you. I usually run for half an hour in the morning and do sit-ups
    before going to bed, no matter how busy I am with schoolwork.   These habits help me a lot. Firstly, they improve my physical
    health. I seldom catch a cold now. Secondly, I feel more energetic every day, so I can focus better on my studies and
    finish my homework more efficiently.  I believe that keeping exercising is the key to a healthy and happy life. Let’s
    all put health first!


    详解：确定文体：说明文 (介绍类短文，校园公众号征文投稿)，以一般现在时为主，描述日常习惯和客观收获

    明确要点：介绍良好的运动习惯、说明运动带来的收获

    确定人称：第一人称 (I/my)，身份为李华

    注意事项：需覆盖所有提示词，语言贴合校园公众号投稿的积极、真诚风格

    [第二步：构思布局]

