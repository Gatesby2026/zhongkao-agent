  - 26
  body: 'Jared sat unhappily, staring into space as he fanned himself with a napkin (餐巾纸). His grandma’s noodle stand was
    full of noise and people. Jared sighed (叹气) heavily. He had wanted to spend his school holiday playing video games, not
    sitting in this hot food market at nine o’clock in the morning.

    “Ugh, why are you still working at your age? You’re seventy-two!” Jared asked. Grandma just smiled and kept cooking, her
    hands moving quickly — pouring soup, adding toppings, passing bowls to customers with a warm nod.

    “Sit there and watch, boy,” Grandma said. “There are things books do not teach.” Jared didn’t understand. To him, it just
    looked like hard, tiring work.

    As the morning went on, Jared began to notice small things. Grandma knew every customer’s name and she remembered their
    small favorites — extra fish balls for one, no spring onions for another, less salt for the third. When a little boy dropped
    his spoon, Grandma quietly handed him a new one before he even asked. When an old lady struggled with her tray, she came
    around and helped her take it to her table.

    “Don’t you get tired of all this?” Jared finally asked during a short break. Grandma smiled. “Of course, I do. But without
    it, I was never able to pay for your father’s education. And when I see elderly people who might not get a good meal for
    the day, I know why I must continue. Tiredness goes away. But the will to keep going, bowl after bowl, stays.”

    Jared didn’t say anything. He had thought his grandma’s job was just about making noodles. But watching her today, Jared
    saw how Grandma served each bowl with care. What he had thought was just cooking turned out to be admirable work.

    “You should enjoy life in your old age!” Jared asked as he helped clean up. Grandma looked at him and said, “People remember
    how you make them feel. In fact, I enjoy spending my time this way.” Jared laughed a little. Between playing video games
    and making someone smile, he now knew which one counted more.'
- id: reading_C
