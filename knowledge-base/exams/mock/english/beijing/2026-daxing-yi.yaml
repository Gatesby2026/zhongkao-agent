  body: '阅读短文，根据短文内容回答问题。

    Imagine you are at a birthday party. There are lots of candies laid out on the table and you can help yourself to whatever
    you want. You eat lots of chocolate! Later that evening, you begin to feel sick. You think to yourself, “I wish I had
    stopped eating sooner.”

    People often compare what actually happened in life to what could have happened. When what actually happened is worse
    than what could have happened, then people can feel regret. Regret is something that lots of people experience. We can
    have big regrets, like not working harder at school or we can have small regrets, like picking the longer queue at lunch.
    Regret is so common and unpleasant that researchers have spent a lot of time trying to understand it.

    In a famous study, researchers asked lots of people to describe a time when they experienced regret. Interestingly, when
    people were asked about recent regrets, they often mentioned things they did, like making an embarrassing joke. But when
    people were asked what they regretted over their whole lives, they usually mentioned things they did not do, like not
    spending enough time with friends and family.

    Other studies also showed something special about regret: People seldom felt regret for things they could not change.
    This suggests that feeling responsible for an outcome is necessary to experience regret. When people feel regret, they
    think “if only I had acted differently, things would be better!” Researchers believe regret might play a special role
    in helping people to understand where a decision went wrong and how they can do better next time.

    In summary, regret often helps people make better decisions and learn from their mistakes. However, sometimes regret is
    not helpful. People who spend lots of time thinking about the things they regret report feeling less satisfied with their
    lives. With this in mind, it is important to avoid getting too caught up in past regrets. Instead, focus on the present
    and try to make the best possible decisions in the future!'
