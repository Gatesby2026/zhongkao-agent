- id: 38
  type: 作文
  score: 10
  stem: "从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。·请不要写出真实的校名、姓名和地名·。\n\n题目①\n\n假设你是李华，你在学校举办的“国潮创客节（China-Chic\
    \ Maker Festival）”中获奖。你的英国笔友Tom对你的获奖作品很感兴趣，请你给Tom写一封电子邮件，介绍你的创意作品、其中蕴含的传统文化元素（traditional cultural elements）及你想传达的理念。\n\
    \n提示词语：product, traditional arts, Chinese painting, spread, develop\n\n内容提示：\n\n·What is your creative work?\n\n·What\
    \ traditional cultural elements did you choose?\n\n·What do you want to express with them?\n\nDear Tom,\n\nI’m glad you’re\
    \ interested in my work at the China-Chic Maker Festival. \n\n___________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nI hope you’ll like my work.\n\nYours,\n\nLi Hua"
  answer: ''
  solution: '范文：

    Dear Tom,

    I’m glad you’re interested in my work at the China-Chic Maker Festival.

    My creative work is a set of bookmarks. They are made of bamboo and each has a hand-painted Chinese painting. I chose
    traditional Chinese elements like the lotus and the bamboo. The lotus stands for purity and the bamboo represents being
    strong and flexible.

    Through this product, I want to spread the beauty of traditional arts and encourage young people to develop a love for
    our culture. I believe traditional things can also be cool and creative.

    I hope you’ll like my work.

    Yours,

    Li Hua


    详解：写作步骤

    [第一步：审题立意]

    确定文体：电子邮件/介绍类文章，以一般现在时为主

    明确要点：创意作品是什么、选择了哪些传统文化元素、想传达什么理念

    确定人称：第一人称（I）和第二人称（you）为主

    注意事项：不得透露真实姓名和学校名称，需涵盖所有要点

    [第二步：构思布局]

    三段式结构：

    开头段：已给出，回应对方对作品的兴趣

    主体段：介绍创意作品、传统文化元素及传达的理念

    结尾段：表达期望

    [第三步：要点展开]

    要点一：创意作品

    作品描述：a set of bookmarks made of bamboo/a hand-painted fan/a paper-cutting artwork等

    材料与工艺：made of bamboo/hand-painted等

    要点二：传统文化元素

    元素选择：the lotus and the bamboo/Chinese ink painting/calligraphy/paper-cutting等

    象征意义：lotus stands for purity/bamboo represents being strong and flexible等

    要点三：传达的理念

    文化传播：spread the beauty of traditional arts/keep traditional culture alive等

    青年引领：encourage young people to develop a love for our culture等

    创新表达：traditional things can also be cool and creative/combine old and new等

    要点四：结尾表达

    期望表达：I hope you’ll like my work/look forward to your reply等'
  knowledge_points:
  - 命题作文
  module: writing
  difficulty: 中等
  recommended_for:
