  stem: '38.从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词

    的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。请不

    要写出真实的校名、姓名和地名。

    题目①

    假设你是李华，你在学校举办的“国潮创客节(China-Chic Maker Festival)”中获奖。你

    的英国笔友Tom对你的获奖作品很感兴趣，请你给Tom写一封电子邮件，介绍你的创意

    作品、其中蕴含的传统文化元素(traditional cultural elements)及你想传达的理念。

    提示词语:product,traditional arts,Chinese painting,spread,develop

    内容提示:●What is your creative work?

    ● What traditional cultural elements did you choose?

    ● What do you want to express with them?

    初三英语试卷第8页(共9页)

    Dear Tom,

    I''m glad you''re interested in my work at the China-Chic Maker Festival.

    I hope you''ll like my work.

    Yours,

    Li Hua

    题目②

    计划总让我们安心，但生活未必总是按计划进行。

    某英语报纸正在征集题为“当计划A失效时(When Plan A Fails)”的文章。假设你

    是李华，请你用英文写一篇短文投稿，分享一段你使用备用方案(PlanB)应对突发情

    况的经历，以及有什么收获。

    提示词语:organize,accident,important,grow,careful

    内容提示:● Share an experience you had to choose Plan B.

    ● What have you learned from the experience?

    No matter how carefully we plan, unexpected things can still happen.

    初三英语试卷第9页(共9页)

    昌平区2026年初三年级第一次统一练习

