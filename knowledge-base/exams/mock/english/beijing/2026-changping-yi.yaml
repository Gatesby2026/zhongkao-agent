  body: '阅读短文，根据短文内容回答问题。

    In June 2025, people talked about an event in which foxes moved onto a rooftop in central London. The roof belongs to
    a large new office building, but it is not a normal one—this rooftop is a 300-meter-long garden. Built with 40,000 tons
    of soil and 250 trees, this space shows how modern buildings can include nature.

    Such roofs are called “biodiverse (生物多样的) green roofs.” Unlike common roofs, they support different native plants and
    create living spaces for wildlife. These plants attract bees, butterflies, and other small animals. In this way, biodiverse
    roofs help bring nature back to the city. Expert Chris Roddick calls them “a real lifeline for biodiversity.” The foxes
    proved that if you create the right environment, nature will come.

    Since early 2024, the UK has had a new rule called Biodiversity Net Gain (BNG). It requires new building projects to improve
    biodiversity by at least 10%. This has helped the UK catch up with countries like Germany, where one in ten flat roofs
    is already green.

    Green roofs also help create “pollinator corridors (传粉者走廊).” Butterflies and other pollinators can only fly short distances
    to find food. If green spaces are too far apart, insect groups can become separated. “Having even small green rooftop
    spaces means pollinators can move from roof to roof, helping them spread and survive,” says Roddick.

    The benefits of green roofs go beyond helping wildlife. Not only do they make buildings look better and keep them warmer
    in winter and cooler in summer, but they also help reduce noise—something especially helpful for schools and hospitals.
    Additionally, some green roofs have “blue roofs” under them that collect rainwater and reduce flooding risk.

    In the end, the foxes will still have to leave when the building opens to 7,000 workers. But the green roof will stay,
    providing a home for insects and birds. As more cities add green roofs, our urban environments can become greener and
    more wildlife-friendly for everyone.'
