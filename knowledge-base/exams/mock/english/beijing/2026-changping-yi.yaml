  body: '![](figures/image4.png)

    Drones are increasingly used in many fields, becoming important tools for all kinds of jobs. However, a single drone often
    cannot deal with complex (复杂的) tasks alone. To overcome this, many drones need to team up. Yet, one big challenge has
    been their inability to fly on top of one another and work together while in flight.

    When one drone flies directly above another, the downward airflow from the upper one’s propellers creates a strong wind.
    This airflow, known as downwash, can reach speeds of over 13 meters per second and change the stability (稳定性) of the drone
    below. The challenge has made it nearly impossible for drones to fly one above another or perform exact operations together.

    Recently, researchers at Westlake University in China have developed a new system that allows drones to exchange tools
    while flying. The system, called Flying Toolbox, uses two types of drones working as a team. The lower drone carries a
    set of tools, acting like a flying toolbox. The upper drone has a robotic arm that can pick up and return tools during
    flight. Together they perform tasks much like a doctor and nurse exchanging instruments during an operation.

    However, keeping the drones stable during this process is no easy task. The system solves this problem by using several
    technologies. A smart network predicts the strength and direction of the downwash in real time, allowing the lower drone
    to change its position by itself. Also, special connecting parts make the drones join together safely. Finally, onboard
    cameras scan QR codes (扫描二维码) on the drones, helping them match positions with high precision (精确), even in strong wind.
    This breakthrough overcomes the limitations and makes drones work together more effectively.

    Building on this success, the team is now focused on improving the system’s abilities beyond the lab. While the testing
    was limited to controlled indoor environments, the researchers plan to use the system outdoors. They are also developing
    robotic arms with more degrees of freedom and improved sensor systems to deal with more difficult tasks. The team believes
    the progress could change how drones are used for team tasks. By making them share tools and divide work, drones could
    operate as work teams in the air that are able to finish tasks far beyond their own limits.'
  figure: 2026-changping-yi/figures/image4.png
- id: reading_D
