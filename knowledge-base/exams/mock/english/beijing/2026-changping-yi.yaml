  - 33
  body: 'For many teenagers, growing up means stepping out of family life to build friendships. Hanging out after school and
    sharing secrets may seem like simple fun, but scientists say these experiences are important as they shape a teen’s “social
    brain”—the system for understanding others and managing feelings.

    Recently, however, teens in many places spend far less time face-to-face with friends, mainly connecting through screens
    instead. Being alone from time to time is not necessarily bad, but the social habit of overusing screens often leads to
    a serious problem: long-term social <u>isolation</u>. In such a situation, teens are unwilling to be with people their
    age and hardly have meaningful face-to-face communication outside the home, which is quite different from choosing to
    be alone voluntarily.

    During the teenage years, the brain changes rapidly and strengthens connections between its different areas. It is in
    this period that the social brain becomes better at reading facial expressions, understanding others’ thoughts, and making
    proper behavioral choices. One researcher compares this process to language learning: the brain is born with such an ability,
    yet it still requires plenty of practice to use the ability properly. Similarly, teenagers need real-life social connections
    to improve the systems supporting their social understanding and behavior.

    Scientists have been carrying out long-term studies to explore the effects of social isolation on teenagers. They follow
    large groups of teens, collecting both brain scans and daily-life information. In one recent project, researchers compared
    the brain scans of socially isolated teens with those of teens who had more face-to-face social activities, and used parents’
    reports to judge the social isolation levels of these teens, such as whether they often stayed away from group activities.

    There were worrying differences: teenagers with long-term social isolation had underdeveloped signs in brain areas related
    to social understanding and emotional control. Surprisingly, brain areas for attention and decision-making also performed
    poorly, something that researchers had not expected, as they never thought isolation would harm so many brain parts. This
    finding matters because these negative changes during the teenage years can leave long-lasting effects on a developing
    brain, making it harder for them to succeed in the future.

    The hopeful news is that teenage brains can still be shaped, so early support can reduce the risks of long-term social
    isolation. This can be achieved by offering teens more opportunities to socialize or asking a trusted adult or a doctor
    for help. What matters most is that teenagers keep meaningful face-to-face connections with others their age, and with
    proper support and balance, most can develop healthy social habits that benefit both their brains and overall well-being.'
