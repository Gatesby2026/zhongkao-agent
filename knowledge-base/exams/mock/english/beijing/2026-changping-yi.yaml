  answer: ''
  solution: 'One possible version:

    题目

    ①

    Dear Tom,

    I''m glad you are interested in my work at the China-Chic Maker Festival. My creative

    work is a beautiful handmade bookmark, which is full of traditional cultural elements.

    The traditional cultural elements I chose are the Great Wall and a famous Chinese line. I

    painted the Great Wall on the bookmark with traditional Chinese painting skills, and put this

    line“He who doesn''t reach the Great Wall is not a true man” on it.

    With these elements, I want to express my love for traditional Chinese culture and my

    respect for Chinese ancient wisdom. I hope more and more teenagers will fall in love with

    traditional Chinese art and Chinese classic literature.

    I hope you will like my work.

    Yours,

    Li Hua

    题目②

    No matter how carefully we plan, unexpected things can still happen.

    Last month, I was responsible for organizing a school second-hand market activity and

    got everything ready carefully. We planned to hold it on the playground at first. However,

    heavy rain suddenly ruined our plan. Luckily, we turned to our Plan B at once. Instead, we

    held the activity in the school gym, which we booked for our Plan B. Thanks to our Plan B,

    we enjoyed ourselves happily together. Surprisingly, the gym was even better.

    This experience teaches me that careful plans are important and we should also take

    unexpected changes into consideration. Thinking further helps us deal with unexpected

    situations successfully.

    初三英语答案第2页(共3页)

    文段表达评分标准:

    第一档:(10-9分)

    完全符合题目要求，观点正确，要点齐全。句式多样，词汇丰富。语言准确，语意

    连贯，表达清楚，具有逻辑性。

    第二档:(8-6分)

    基本符合题目要求，观点正确，要点齐全。语法结构和词汇基本满足文章需要。语

    言基本通顺，语意基本连贯，表达基本清楚。虽然有少量语言错误，但不影响整体理解。

    第三档:(5-3分)

    部分内容符合题目要求，要点不齐全。语法结构和词汇错误较多，语言不通顺，表

    达不够清楚，影响整体理解。

    第四档:(2-1分)

    与题目有关内容不多，只是简单拼凑词语，所写内容难以理解。

    第五档:(0分)

    与题目内容无关。

    初三英语答案第3页(共3页)'
