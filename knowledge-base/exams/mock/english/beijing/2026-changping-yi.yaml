- id: reading_24
  type: reading
  body: '选择最佳选项。


    My mother''s favorite bowl was not expensive, but it meant a lot to her. It was a simple

    china bowl which she had used for thirty years. Last month, I dropped it while washing it, and

    it broke into pieces. I stood there, unable to move. I was worried that she would be angry.

    When my mother walked in, she didn''t get angry. Instead, she picked up the broken

    pieces carefully.“Don’t worry, Alice,” she said. She told me about an ancient Chinese art

    called ceramic(陶瓷)mending. It is a special way of fixing broken things with small pieces of

    metal. Instead of hiding the broken lines, this art shows them clearly. It makes the repaired

    object even stronger. It treats the breakage as a part of history, not something to hide.

    A few days later, we watched a worker repair the bowl. He carefully made small holes

    and put silver pieces of metal across the broken lines. They looked like stars in the sky.“You

    see,” my mother said in a low voice,“We don’t need to be shy about the broken parts. They

    show that the bowl has lived through hard times. A bowl that has never been broken is just a

    bowl, but this one is special because its scars(疤痕) have become art.”

    This experience made me think about my own life. Like many teenagers, I used to try to

    be“perfect”. I felt bad when I failed a test or had an argument with a friend. I thought any

    mistake made me less worthy. But looking at the bowl, I realized that my experiences-even

    the painful ones-were my“start”. They hold me together and make me who I am.'
- id: reading_27
  type: reading
  body: 'Drones are increasingly used in many fields, becoming important

    propeller

    tools for all kinds of jobs. However, a single drone often cannot deal with

    complex(复杂的) tasks alone. To overcome this, many drones need to

    team up. Yet, one big challenge has been their inability to fly on top of

    one another and work together while in flight.

    When one drone flies directly above another, the downward airflow

    a drone

    from the upper one''s propellers creates a strong wind. This airflow,

    known as downwash, can reach speeds of over 13 meters per second and change the stability

    (稳定性) of the drone below. The challenge has made it nearly impossible for drones to fly one

    above another or perform exact operations together.

    Recently, researchers at Westlake University in China have developed a new system that

    allows drones to exchange tools while flying. The system, called FlyingToolbox, uses two

    types of drones working as a team. The lower drone carries a set of tools, acting like a flying

    toolbox. The upper drone has a robotic arm that can pick up and return tools during flight.

    Together they perform tasks much like a doctor and nurse exchanging instruments during an

    operation.

    However, keeping the drones stable during this process is no easy task. The system

    solves this problem by using several technologies. A smart network predicts the strength and

    direction of the downwash in real time, allowing the lower drone to change its position by

    itself. Also, special connecting parts make the drones join together safely. Finally, onboard

    cameras scan QR codes(扫描二维码) on the drones, helping them match positions with high

    precision(精确),even in strong wind. This breakthrough overcomes the limitations and makes

    drones work together more effectively.

    Building on this success, the team is now focused on improving the system''s abilities

    beyond the lab. While the testing was limited to controlled indoor environments, the

    researchers plan to use the system outdoors. They are also developing robotic arms with more

    degrees of freedom and improved sensor systems to deal with more difficult tasks. The team

    believes the progress could change how drones are used for team tasks. By making them share

    tools and divide work, drones could operate as work teams in the air that are able to finish

    tasks far beyond their own limits.'
- id: reading_30
  type: reading
  body: 'For many teenagers, growing up means stepping out of family life to build friendships.

    Hanging out after school and sharing secrets may seem like simple fun, but scientists say

    these experiences are important as they shape a teen’s “social brain”-the system for

    understanding others and managing feelings.

    Recently, however, teens in many places spend far less time face-to-face with friends,

    mainly connecting through screens instead. Being alone from time to time is not necessarily

    bad, but the social habit of overusing screens often leads to a serious problem: long-term

    social isolation. In such a situation, teens are unwilling to be with people their age and hardly

    have meaningful face-to-face communication outside the home, which is quite different from

    choosing to be alone voluntarily.

    During the teenage years, the brain changes rapidly and strengthens connections between

    its different areas. It is in this period that the social brain becomes better at reading facial

    expressions, understanding others'' thoughts, and making proper behavioral choices. One

    researcher compares this process to language learning: the brain is born with such an ability,

    yet it still requires plenty of practice to use the ability properly. Similarly, teenagers need

    real-life social connections to improve the systems supporting their social understanding and

    behavior.

    Scientists have been carrying out long-term studies to explore the effects of social

    isolation on teenagers. They follow large groups of teens, collecting both brain scans and

    daily-life information. In one recent project, researchers compared the brain scans of socially

    isolated teens with those who have more face-to-face social activities, and used parents''

    reports to judge the social isolation levels of these teens, such as whether they often stayed

    away from group activities.

    There were worrying differences: teenagers with long-term social isolation had

    underdeveloped signs in brain areas related to social understanding and emotional control.

    Surprisingly, brain areas for attention and decision-making also performed poorly, something

    that researchers had not expected, as they never thought isolation would harm so many brain

    parts. This finding matters because these negative changes during the teenage years can leave

    long-lasting effects on a developing brain, making it harder for them to succeed in the future.

    The hopeful news is that teenage brains can still be shaped, so early support can reduce

    the risks of long-term social isolation. This can be achieved by offering teens more

    opportunities to socialize or asking a trusted adult or a doctor for help. What matters most is

    that teenagers keep meaningful face-to-face connections with others their age, and with proper

    support and balance, most can develop healthy social habits that benefit both their brains and

    overall well-being.'
- id: express
  type: reading_express
  body: '阅读短文，根据短文内容回答问题。

    In June 2025, people talked about an event that foxes moved onto a rooftop in central

    London. The roof belongs to a large new office building, but it is not a normal one-this

    rooftop is a 300-meter-long garden. Built with 40,000 tons of soil and 250 trees, this space

    shows how modern buildings can include nature.

    Such roofs are called“biodiverse(生物多样的) green roofs.” Unlike common roofs, they

    初三英语试卷第7页(共9页)

    support different native plants and create living spaces for wildlife. These plants attract bees,

    butterflies, and other small animals. In this way, biodiverse roofs help bring nature back to the

    city. Expert Chris Roddick calls them“a real lifeline for biodiversity.” The foxes proved that

    if you create the right environment, nature will come.

    Since early 2024, the UK has had a new rule called Biodiversity Net Gain (BNG). It

    requires new building projects to improve biodiversity by at least 10%. This has helped the

    UK catch up with countries like Germany, where one in ten flat roofs is already green.

    Green roofs also help create “pollinator corridors (传粉者走廊).” Butterflies and other

    pollinators can only fly short distances to find food. If green spaces are too far apart, insect

    groups can become separated. “Having even small green rooftop spaces means pollinators can

    move from roof to roof, helping them spread and survive,” says Roddick.

    The benefits of green roofs go beyond helping wildlife. Not only do they make buildings

    look better and keep them warmer in winter and cooler in summer, but they also help reduce

    noise-something especially helpful for schools and hospitals. Additionally, some green roofs

    have “blue roofs” under them that collect rainwater and reduce flooding risk.

    In the end, the foxes will still have to leave when the building opens to 7,000 workers.

    But the green roof will stay, providing a home for insects and birds. As more cities add green

    roofs, our urban environments can become greener and more wildlife-friendly for everyone.'
