- id: reading_B
  type: reading
  body: '答 Alice and I were both in the school writing club. We weren''t exactly friends, just two people 或 who happened to share the same hobby. We sat on opposite sides of the room and wrote our own 书
    stories. Then there was a writing competition at school. The winner would get his or her story published in the local newspaper. We both wanted that.

    写 Suddenly, we were rivals(竞争对手). I''d been working on a story about a girl who 在 discovered an old camera in her attic(阁楼), a camera that could take photos of the past. I heard 答 that Alice was writing
    something about time too. That made me worried. What if our stories ended up being too similar? But I wasn''t about to change my idea. It was mine, and I believed in 题 it. I pushed the thought away
    and kept writing.

    卡 Finally, we handed in our stories without a word. The next morning, our teacher called us 上 over.“I read both of your stories,” she said.“Alice, your characters feel real, like people I might know.”
    She looked at me,“As for yours, your time-travel idea is really creative.” She stopped for a while,“Have you thought about working together?”

    We glanced (瞥) at each other, unsure. But that afternoon, we talked. I told her about the magic camera. She described her main character, a girl who missed her grandmother terribly. And then it clicked.
    What if the camera let that girl see her grandmother one last time? Her character and my idea fit together like puzzle pieces.

    We spent the next three days writing side by side. When we finally finished, the story was better than anything either of us could have written alone. It was chosen for the competition. A few weeks
    later, we found out it won first prize.

    Standing next to Alice when we got the award, I realized something important. Competition pushes us to do our best. But working together? That''s where the real magic happens.

    务'
