- id: reading_C
  type: reading
  body: '在答题 Birdwatching is a popular hobby around the world. Millions of people enjoy it. But beyond learning to identify (识别) birds, is it possible that birdwatching is actually shaping our brains?

    A new study suggests the answer may be yes.

    Scientists were curious about whether the brains of expert birdwatchers differ from those 卡 of beginners. To find out, they studied 58 adults. Half of them were experienced birdwatchers, 上 while the
    other half had much less experience. Then the scientists sent all of them into 学校 specialized brain-imaging(脑成像) machines to study brain structure and brain activity while having them identify birds.

    Compared with beginners, expert birdwatchers showed more organized brain structure in areas linked(连接) to attention and visual perception(视觉感知). The more organized the brain structure, the better the
    ability to identify birds. Interestingly, these same areas of the brain lit up on brain imaging when bird experts were identifying less familiar birds.

    This suggests that spending time birdwatching and becoming an expert may actually reshape the brain over time. This builds on another recent study. It found that people who took part in more creative
    activities had more youthful-looking brains and this was directly linked to how skilled they were at those activities.

    Besides these brain changes, birdwatching may help improve brain health in other ways.

    With social connections at the top of the list of things that support brain health, joining a social birdwatching group could provide a direct positive brain effect. Birdwatching can lead to physical
    activity, which is clearly good for the brain. Spending more time in nature is also increasingly linked to improved overall brain health, as is staying away from screens. Finally, birdwatching may help
    people reduce stress. This is important because stress is bad for the brain.

    There is still much more to learn about the possible good effects of birdwatching on our brain. But while spending your day looking for birds does not replace the need for a healthy diet, good sleep,
    and daily exercise, it may still be doing your brain some good.'
