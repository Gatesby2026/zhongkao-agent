- body: 'The community library was Megan''s peaceful kingaom. Every summer, she worked as a volunteer, feeling responsible for protecting this quiet space.

    Lately, a boy named Liam became her ___13___. Liam couldn''t sit still. Like clockwork, he would get up to stretch(伸展) his legs. Sometimes he accidentally knocked over a chair.

    Yesterday, Liam let out a loud “Whoa” when he saw a giant dinosaur filled the page. His voice drew looks from other readers. When Megan ___14___ him again, Liam''s face turned red.

    “I’m sorry,” he said,“I don’t mean to. I really like being here.” She believed him. She had noticed that Liam was a ___15___ explorer of books. He would pull out a book on dinosaurs, read for a few
    minutes, then reach for another about space, as if he couldn''t wait to learn more.

    Back to her office, a note caught her eyes. It read, “More Lively Reading Activities? Book sharing? Acting?” Megan suddenly remembered the librarian had mentioned she could feel free to use the garden
    at the back of the library. At the time, Megan hadn''t thought much about it. But now an idea came to her: Liam''s energy could be directed into the garden project. Perhaps the solution wasn''t to ___16___
    Liam down, but to give his energy and love for books a positive stage.

    Soon, her “Garden Reading Corner” project began to take-shape. She found Liam among the bookshelves.“Want to do something cool?” Liam did not answer at once, but the ___17___ light in his eyes said
    everything.

    For the next week, Megan and Liam busied themselves with the project. They designed two areas in the garden, one for reading and one for ___18___.

    On the opening day, they waited in the garden. When the first few children arrived, Liam eagerly showed them the reading area. As more kids came, Megan invited some to sit around the acting area and
    nodded for Liam to begin.“Did you know I''m a dinosaur that can fly?” Liam, now dressed as a dinosaur, ___19___ in a clear, excited voice. The children watched, laughed, and were completely drawn into
    the story.

    Megan''s heart was full. She understood that true peace in a library grows not only from silence, but from ___20___ a place where every reader feels they belong.'
