- id: express
  type: reading_express
  body: '卡 阅读短文，根据短文内容回答问题。

    In recent years, virtual(虚拟的) museums have changed the way people experience art.

    上 Using Virtual Reality(VR) technology, art lovers can now visit famous museums like the Louvre or the British Museum from home.

    The idea of virtual museums started in the 1990s. Early experiments used basic 3D modeling to create digital copies of art museums, but the experiences did not feel real. Today, virtual museums are
    different. VR technology is used, letting users do amazing things, like walking through ancient buildings or touching sculptures(雕塑) up close.

    One great advantage of virtual museums is that they help more people enjoy world-famous artworks. People who live far away or cannot travel easily can now enjoy these treasures without leaving their
    homes. For example, the British Museum''s VR tour has attracted over 2 million users since its start, many from areas where international travel is impractical.

    Virtual museums offer more than just looking at artworks. Visitors can look closely at details, 务 listen to explanations, or join virtual workshops. They can even take part in guided tours led by 必
    experts. For example, the Louvre''s VR experience allows users to explore the Mona Lisa in 360 degrees and see details that people normally cannot see. Virtual museums turn simple looking 将 into active
    exploration. That''s why many young people prefer them.

    答 However, traditional museums still have their own advantages. Traditional museums offer 案 the real feeling of standing before a great artwork, which VR cannot provide. Besides, traditional museums
    let people talk and share ideas with each other, which makes the visit more interesting 将 and educational.

    涂 In fact, virtual museums and traditional museums each have their own special qualities.

    案 Virtual museums bring art closer to more people, while traditional museums offer real and unforgettable feelings for visitors. They serve people in different ways and both play an important 书 role
    in the world of art.

    写'
