  body: '![](figures/image10.png)

    Matthew followed his dad and the bellman Mr. Colby up the narrow, shaky stairs of the old meetinghouse. When they reached
    the belfry (钟楼), 80 feet above the ground, the town below looked like a tiny toy village. Behind them hung the huge, 1,500-pound
    bell.

    The bell had worked for the town for almost 250 years. Matthew was there that day to take photos of the bell for his history
    fair project. When he touched one of the thick wooden beams holding the bell, his finger sank into soft, rotten wood.
    “Maybe it was just a small, harmless spot,” he thought to himself. So he didn’t say anything.

    Then it was time for Mr. Colby to ring the bell, so he went downstairs to pull the rope. As the huge bell swung back and
    forth, the rotten beam moved with it. At that moment, Matthew found that the wood around a bolt (螺栓) had broken and fallen
    apart. His heart raced: What if other beams were rotting too? What if one broke and the heavy bell fell down?

    He looked at dad, who was still admiring the view from above. “Dad, look!” he shouted, pointing at the broken beam. When
    dad turned around, his smile disappeared when he saw it. Matthew didn’t waste a second. He hurried down the stairs to
    stop Mr. Colby.

    Mr. Colby went up again and checked the beams with his screwdriver (螺丝刀). He shook his head sadly. Years of wind and rain
    had eaten away at the wood. The whole support structure needed to be replaced, and the bell shouldn’t be rung again until
    it was fixed.

    Days later, Matthew finished his project using the photos he had already taken. And the belfry was fixed just in time
    for the 250th anniversary of the town. He was glad he’d spoken up instead of staying quiet.

    At the celebration, Mr. Colby spoke in front of everyone. “If it weren’t for Matthew’s sharp eye and quick thinking, the
    damage could have been much worse.” Matthew felt proud but a little shy. Then Mr. Colby handed him the rope.

    Matthew rang the bell for the town’s 250th birthday.'
