- id: reading_C
  type: reading
  body: 'In the deep dark waters of the Arctic and North Atlantic, Greenland sharks, which can live for centuries, have been found to have a few tricks for long-term survival.

    Recent studies suggest that some organs(器官) of Greenland sharks may not be easily harmed by aging, while others seem able to handle tissue damage(组织损伤) that builds up over time. The findings explain
    how these sharks live longer than any other vertebrate on Earth. Swiss biologist Lily Fogg says that the findings may one day help treat aging in human organs, calling it her“biggest dream goal”.

    People used to believe that the sharks either had seriously damaged eyesight or were completely blind. However, Fogg and her team studied eye tissue from 10 Greenland sharks, some of which were as old
    as 150 years, and published their findings in Nature Communications. Surprisingly, the sharks had all the basic tools needed to see in the dim light of the deep sea. Also, their eye tissue did not show
    the usual wear and tear of aging. Fogg also explains that this may be because their eyes have more active DNA repair tools. These tools can repair damage that would otherwise lead to cell death and
    tissue breakdown.

    However, the anti-aging(抗衰老) method in the eyes may not work in all organs of Greenland sharks. Italian researcher Cellerino examined the hearts of 6 Greenland sharks and found that they were full of
    hard scars formed with age. In humans, such scar tissue suggests heart disease, making the heart stiff(僵硬的) and less able to pump(泵送) blood. The sharks'' hearts also showed cell damage, yet Cellerino
    notes they still functioned-able to send blood despite damage that would fail other animals'' hearts. The reason is unclear, but sharks'' tissue may produce protective body chemicals to handle age-related
    heart damages.

    Ecologist Catherine Macdonald isn''t surprised by these findings. She notes,“Any animal that lives such a long life must have the ability to repair and maintain itself.” Still, Macdonald doesn''t see
    direct applications for human health in the near future. And she stresses,“The new findings certainly do not mean people should rush to follow anti-aging trends using shark products.”'
