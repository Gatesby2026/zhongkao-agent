  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    ![](figures/image3.png)

    I begged Mom not to drop me at Grandpa’s. Every time I visited, I felt <u>____13____</u> and uneasy. It seemed there was
    a distance between grandpa and me. Mom explained that it was because of Grandma’s passing away, but I just felt he didn’t
    love me.

    Seeing him lost in TV, I started on homework after walking in. Soon, I finished. Wondering what to do next, I suddenly
    heard Grandpa’s voice, “Want to watch TV?” Unexpectedly, I sensed a touch of <u>____14____</u>.

    “O-OK.” I answered. While he changed channels, I moved a bit to sit closer to him. Then, my heel hit something hard. I
    pulled it out — a wooden box. Grandpa gently wiped off the dust on it and <u>____15____</u> opened it. “This pretty chess
    set is a gift from your Grandma,” he said with something in his throat. “She taught me to play and we played for 37 years
    until, until…” He seemed to try very hard to control the <u>____16____</u> welling up from his heart.

    “Want to learn?” he asked, much calmer.

    “Sure.” I agreed immediately.

    He explained the rules very patiently. But when we played, he didn’t go easy on me. He won in nine moves — then again,
    and again!

    “This merciless (心狠的) old guy!” I thought to myself. “Want me to give in? No way!” I started watching carefully and <u>____17____</u>
    his traps (陷阱) one after another. Grandpa’s eyebrows lifted and it took him long to think.

    At the seventh game, I set one trap. Though Grandpa paused, he still fell into it. My Knight took his Queen.

    Grandpa <u>____18____</u>. Then, he laughed — deep and warm. “You little fox! That was really clever!”

    I froze, too. I’d never seen him so happy and we’d never been so <u>____19____</u>.

    We kept playing until Mom came back. Before I left, I turned, and gave him a hug, “Thanks for the chess. I love you, grandpa.”

    He looked up, eyes wet, and smiled — a real, soft, happy smile. It was then that I knew how to <u>____20____</u> him,
    this lovely, lonely old man next time.'
