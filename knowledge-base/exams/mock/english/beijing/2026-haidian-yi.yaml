    题目1

    Now AI is widely used in our study, and it has become an invaluable helper for me. First of all,

    when I face problems in homework, I try to get explanations from AI. After that, I always work out

    the problems myself instead of copying answers. I also practice spoken English with an AI agent

    whenever I want, which improves my speaking skills effectively. Most importantly, I use AI to check

    my writing by asking AI to point out mistakes. Then I try to correct them by myself. In this way, I

    learn a lot about writing.

    AI benefits me a lot. However, relying too much on AI can be risky. If we just copy answers

    provided by AI, we will lose our ability to think independently. In my view, AI should be a helpful

    tool, not a replacement for our own efforts.

    题目2

    Among all my photos, I''d like to share one that means the most to me. It was taken by my best

    friend during an English speech competition. In the photo, I am standing at the stage center, bathed in

    the bright spotlight. With a calm smile on my face, I have just finished the English speech entitled“I

    Have a Dream”. The audience are clapping, some of whom are even standing up and cheering for me.

    I choose to share this photo because it records the highlight moment I have had in junior high. As

    a once shy person, I can never forget how much effort I put in to overcome the stage fright and win

    the first prize in that competition. Whenever I look at the photo, a sense of achievement wells up in

    me and it reminds me that as long as I have a dream, I can always find a way to achieve it.

