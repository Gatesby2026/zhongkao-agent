    I begged Mom not to drop me at Grandpa''s. Every time I visited, I felt ___13___ and uneasy.

    It seemed there was a distance between Grandpa and me. Mom explained that it was because of Grandma''s pass-away, but I just felt he didn''t love me.

    Seeing him lost in TV, I started on homework after walking in. Soon, I finished. Wondering what to do next, I suddenly heard Grandpa''s voice,“Want to watch TV?” Unexpectedly, I sensed a touch of ___14___.

    “O-OK.” I answered. While he changed channels, I moved a bit to sit closer to him. Then, my heel hit something hard. I pulled it out-a wooden box. Grandpa gently wiped off the dust on it and ___15___
    opened it.“This pretty chess set is a gift from your grandma,” he said with something in his throat.“She taught me to play and we played for 37 years until, until...” He seemed to try very h hard to
