- id: express
  type: reading_express
  body: '阅读短文，根据短文内容回答问题。

    Imagine you''re focusing on the screen, controller in hand. Your mom walks in. What might she say? But wait-what if you''re not sitting? You''re jumping, ducking, and punching(打拳) the air!

    You are not gaming-you''re actually exergaming!

    英 So, what exactly is exergaming? It refers to video games that require physical movements. Exergames use motion-sensing(运动传 感) technology, cameras, or specialized equipment to translate your real-
    world body movements into in-game actions. Exergaming can take place anywhere, such as in the gym, at school or even at home.

    exergaming Traditional exercise like weightlifting or running is great for building strength, but it doesn''t attract everyone. Exergaming feels more like playing than exercising. That desire to play
    might help people take up physical activities without the pressure or boredom that sometimes comes with heading to the gym.

    According to the research from the University of Georgia, people who don''t want to hit the gym benefit from exergaming the most. The study shows that exergamers feel high levels of enjoyment and a
    sense of control over their exercise. “When you can choose what game to play and how hard to push yourself, you''re more likely to exercise on your own,” says Sami Yli-Piipari, the co-researcher of
    the study.“You feel like you are doing it for yourself, not because someone tells you to.”

    Another study followed 55 people who exercised less than 150 minutes a week. They were asked to have either exergames or traditional gym workouts. The results showed that the gym group worked harder.“That
    makes sense because you probably will push yourself harder if somebody is looking over your shoulder,” says Yli-Piipari. But the exergamers had a better time. The good feeling and a sense of ownership
    over their physical exercise make exergamers more likely to stick to it. And possibly, they will be more open to other physical activities in the future.

    “Sometimes it’s hard for the inactive people to take the first step,” according to Yli-Piipari, “Exergaming might be a chance for them.”'
