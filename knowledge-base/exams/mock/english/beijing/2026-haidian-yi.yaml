- id: 38
  type: 作文
  score: 10
  stem: '假设你是李华。你校英语公众号正发起以“AI助力学习”为主题的讨论。请你用英文留言，谈谈你在学习中如何合理使用人工智能的，并就人工智能的使用发表你的观点。


    提示词语：convenient, search, independent, develop, self-control


    提示信息：• How do you use AI wisely in your study?


    • Express your views on the use of AI?


    Now AI is widely used in our study. ________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________'
  answer: ''
  solution: 'Now AI is widely used in our study. I often use AI to search for useful information and solve difficult problems
    after class. It makes our study more convenient and saves lots of time.

    However, we should use AI wisely. We can’t depend on it too much or copy answers directly. We need to think independently
    and develop our own learning skills.

    In my opinion, self-control is important. AI is a good helper, but real progress comes from our hard work. We should make
    good use of it to improve ourselves.


    详解：写作步骤

    [第一步：审题立意]

    确定文体：议论文，用一般现在时为主

    明确要点：如何合理使用人工智能（AI）助力学习；对人工智能使用的观点

    确定人称：第一人称（I/my）

    注意事项：使用提示词语，围绕主题展开讨论

    [第二步：构思布局]

    三段式结构：

    开头段：引入话题，说明AI在学习中的广泛应用

    主体段：分别阐述如何合理使用AI以及发表对AI使用的观点

    结尾段：总结观点，强调自我控制的重要性

    [第三步：要点展开]

    要点一：如何合理使用人工智能

    使用方式：I often use AI to search for useful information and solve difficult problems after class./I frequently utilize AI
    to look up relevant materials and tackle challenging questions when doing my homework.

    作用效果：It makes our study more convenient and saves lots of time./It brings great convenience to our study and enables us
    to save a large amount of time.

    要点二：对人工智能使用的观点

    依赖问题：We can’t depend on it too much or copy answers directly./We shouldn’t rely excessively on it or simply copy the answers
    without thinking.

    独立思考与技能发展：We need to think independently and develop our own learning skills./It is necessary for us to think on our own
    and cultivate our unique learning abilities.

    自我控制的重要性：In my opinion, self-control is important. AI is a good helper, but real progress comes from our hard work. We
    should make good use of it to improve ourselves./From my perspective, self-discipline is of great significance. Although
    AI serves as a helpful assistant, genuine progress stems from our diligent efforts. We ought to make the most of it to
    enhance ourselves.'
  knowledge_points:
  - 命题作文
  module: writing
  difficulty: 中等
  recommended_for:
  - L1
  - L2
  - L3
  qc_status: draft
  qc_note: ''
- id: 39
  type: 作文
  score: 0
  stem: '假设你是李华。毕业将至，你校英语社团正在举办毕业季校园照片征集活动，定格初中美好时光。请你选择一张你最想分享的照片，用英语描述照片里的画面，并说明你选择这张照片的原因。


    提示词语：moment, enjoy, growth, proud, unforgettable


    提示信息：• Describe the picture you want to share.


    • Why do you choose it?


    Among all my photos, I’d like to share one that means the most to me. ____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________'
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    Among all my photos, I’d like to share one that means the most to me. It was taken on our sports meeting. In the picture,
    my classmates and I are smiling together after we finished a relay race. We looked tired but full of joy.

    I choose this photo because it records a warm and special moment. I truly enjoy staying with my kind classmates. It shows
    my growth in junior high school. I feel proud of our teamwork and friendship. This sweet memory will be unforgettable
    in my whole life.


    详解：写作步骤

    [第一步：审题立意]

    确定文体：记叙文，结合一定议论抒情，用一般过去时和一般现在时

    明确要点：描述照片画面（时间、人物、事件、人物状态）、说明选择照片的原因（记录特殊时刻、享受相处、体现成长、为团队合作和友谊骄傲、记忆难忘）

    确定人称：第一人称（I/my）

    注意事项：使用提示词语“moment, enjoy, growth, proud, unforgettable”

    [第二步：构思布局]

    三段式结构：

    开头段：引出要分享的照片

    主体段：详细描述照片里的画面，并阐述选择这张照片的原因

    结尾段：总结强调这张照片的意义

    [第三步：要点展开]

    要点一：描述照片画面

    时间地点事件：It was taken on our sports meeting. In the picture, my classmates and I are smiling together after we finished
    a relay race./The photo was captured during our school sports meet. In it, my classmates and I are all beaming with smiles
    right after completing a thrilling relay race.

    人物状态：We looked tired but full of joy./We appeared exhausted yet brimming with happiness.

    要点二：说明选择照片的原因

    记录特殊时刻：I choose this photo because it records a warm and special moment./I pick this photo as it has preserved a heartwarming
    and unique moment.

    享受相处：I truly enjoy staying with my kind classmates./I genuinely relish spending time with my amiable classmates.

    体现成长：It shows my growth in junior high school./It reflects my personal development throughout my junior high school years.

    为团队合作和友谊骄傲：I feel proud of our teamwork and friendship./I take great pride in our teamwork and the deep friendship we
    share.

    记忆难忘：This sweet memory will be unforgettable in my whole life./This precious memory will remain etched in my mind forever.'
