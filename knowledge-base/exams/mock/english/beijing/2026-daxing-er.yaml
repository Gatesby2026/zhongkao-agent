- id: 3
  type: reading_express
  score: 2
  stem: 'Parallelism


    Parallelism is a powerful tool to create rhythm, stress ideas, and make the writing more memorable. It is the use of similar
    grammatical structures to express related ideas. The key is that all parts are presented in a balanced and symmetrical
    (对称的) way. Here are a few quick examples:


    ◆ She likes hiking, biking, and swimming.


    ◆ Believe in yourself, believe in your effort, believe in your future.


    ◆ She was a woman of courage, a woman of strength, and a woman of vision.


    Repetition draws attention to important ideas; balanced and symmetrical phrases are easier to remember.'
