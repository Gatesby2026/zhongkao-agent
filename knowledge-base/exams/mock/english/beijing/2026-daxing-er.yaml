  stem: 'Simile


    Have you ever wanted to paint a picture with words? That’s where simile comes in. It’s a powerful tool to create vivid
    (生动的) imagery and make their writing more engaging (引人入胜的). At its heart, a simile is a comparises between two different
    things using the words “like” or “as” to show a shared quality. Here are a few quick examples to get you started:


    ◆ He eats like a horse.


    ◆ Her smile was bright like the sun.


    ◆ The lake was as smooth as a mirror.


    Writers use similes to paint a picture in the reader’s mind and to make their writing more interesting and memorable.'
