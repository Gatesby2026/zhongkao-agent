  - 29
  body: 'Many people wonder if there is a “best time” to exercise. A new study answers this question with a clear suggestion:
    instead of forcing yourself into a fixed schedule, you should match your workout with your own “chronotype”—your natural
    habit of sleeping or waking up at certain times.

    Whether you are a “lark” who wakes up early full of energy, or a “night owl” who feels more active later in the day, the
    key message is that exercise is most effective when it matches a person’s biological rhythm (韵律). Research shows that
    aligning (使一致) at least part of your workouts to your chronotype helps reduce risk factors for heart attacks and strokes,
    and it also improves sleep quality.

    But how do you know if you are a morning or evening person? Here is a simple test. After a long holiday over two weeks,
    do you still feel tired and hard to get up every morning? If yes, you are probably a night owl. Otherwise, you may be
    a lark. “A longer holiday gives us time to relax, catch up on sleep and return to natural sleep and wake times, so it
    can tell us a lot about our natural sleep-wake habits.” Dr Jeffrey Kelu says.

    If you are someone who wakes at 6 am ready to run, the best exercise time is between 7 am and 8 am. A study shows morning
    exercisers were 30 percent less likely to have type 2 diabetes (糖尿病) and 31 percent less likely to have heart disease.
    Besides doing morning workouts, early risers are also advised to add small strength training at home in the evening, like
    chair squats and leg moves.

    Owls can save strength training for the evening because most sports science studies suggest that muscle performance peaks
    (达到高峰) in the afternoon or evening. However, evening types should still spend a little time outdoors in the morning. A
    short walk of just a few minutes can fix their body clock and keep their daily sleep routine regular.

    There is no one-size-fits-all best time of day to exercise but you should pay attention to how you feel and how well you
    recover at different times of the day. Alignment with biological preference is more important than the exact clock time.
    So, do what feels right for you.'
- id: reading_D
  type: reading
  name: D
  q_range:
  - 30
  - 33
  body: 'When I was a teenager, I was a big music fan. Yet feeding that love was no easy matter. It took countless small efforts
    to find ways of listening to my favorite songs. But it’s much easier to find music nowadays. I can just speak into my
    phone and it does the rest. This is definitely progress. But let’s be careful, too—because sometimes, it’s important to
    pay a price for getting things.

    We tend to think of effort as a cost or an unpleasant thing. In fact, in addition to being a cost, effort is sometimes
    doing very important things for us. It is how we turn events into experience and how we turn information into knowledge.
    Without it, things pass through us; but when we put the work in, we gain skills, meaning and understanding.

    However, not every effort is worthy. So, rather than completely refusing effort or always praising it blindly, we need
    to start to understand when effort matters and when it doesn’t.

    The difference is not between effort and ease but between effort that holds us back and effort that forms us. Some difficulties
    are unnecessary. They are the extra burdens (负担) tied to an activity: typing instead of speaking, moving files from one
    place to another. These tasks may consume (消耗) time and attention, but they do not normally deepen understanding or sharpen
    judgment.

    Other difficulties are different. They are not attached (附属) to the activity from the outside; they are part of what the
    activity is. Writing in your own words is how you discover what you think. Working through a math problem is how you learn
    to see structure. Here, the effort is not a block between you and the result. It is the process through which the result
    becomes yours.

    Accordingly, how can we keep the right kind of friction (磨砺) in our life? Pause before choosing the easiest answer. Sometimes
    a brief pause can help you tell the unnecessary trouble from meaningful effort. You may also ask yourself: Is this saving
    me effort or saving me from growth? This simple question truly gets to the heart of the problem. Besides, take small active
    actions in daily life: taking notes instead of passively highlighting, cooking without completely following a recipe.
    The goal of these practices is not to make life harder, but to preserve the healthy friction.

    Convenience is one of modern life’s great gifts, and we should use it gratefully. But we must not let it take away the
    very struggles that teach us and shape us. The challenge, then, is not to refuse ease, but to think wisely about which
    difficulties are still worth choosing.'
