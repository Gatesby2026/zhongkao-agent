  body: 'Opposite Day

    Sammy checked his calendar. “Yes!” he cried, jumping out of bed. “I mean NO! It’s Opposite Day!”

    He put his shirt on inside out and walked backward down the hall. In the kitchen, he said to his mom, “Good night. Have
    a bad day at work!” When Dad offered pancakes, Sammy held out his plate and said, “No, thanks. They look terrible.” His
    parents looked confused, but Sammy just said, “Opposite Day!”

    At school, kids entered through the door marked “EXIT”. In the classroom, they stood at their desks instead of sitting
    down. During math, they added when the sign said to subtract and subtracted when the sign said to add. “What is going
    on here?” cried Ms. Trix, their teacher. “It’s Opposite Day!” said the class. “That’s right,” Ms. Trix said. “In that
    case, there’s no homework tonight.” The kids cheered before remembering what day it was. Then Ms. Trix wrote their homework
    on the blackboard.

    In the lunchroom, students went backward through the line and ate dessert first. Sammy told Marcie, “You can’t sit by
    me.” “Good. I didn’t want to,” she said, putting her plate beside his.

    That afternoon, Ms. Trix asked the kids to present their book reports. Oh no! thought Sammy. He’d been so excited today
    that he had left his report at home. Now, he had no interest in Opposite Day anymore.

    When Ms. Trix called on him, he took a deep breath and finally said, “I won’t be able to present my book report today.”
    Ms. Trix studied him for a second and smiled. “Well, it’s Opposite Day. I guess that means you can bring it in tomorrow!
    I expect it to be awful. And by that I mean great!”

    After hearing that, Sammy let out a breath and felt much better. He walked back to his seat with a smile. It was strange
    how a day all about opposites could make things feel so right. Thanks to Ms. Trix, a playful boy’s worry went away.'
