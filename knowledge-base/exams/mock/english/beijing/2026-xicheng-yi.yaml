    Thank you for listening.

    题目②

    当第一双眼睛仰望星空，当第一只手掌伸向火焰，人类的探索便已悄然发生。

    好奇，始终是人类突破认知边界的原动力。某英文网站正在开展以“好奇”为主

    题的征文活动。假设你是李华，请你用英文写一篇短文投稿，讲述让你好奇的事物、

    你出于对它的好奇做过的事情以及你的收获。

    提示词语:

