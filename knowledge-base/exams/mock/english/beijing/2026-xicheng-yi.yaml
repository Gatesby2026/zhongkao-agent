  body: '阅读短文，根据短文内容回答问题。

    In any room, you can feel it before you see it—the person whose presence lights things up. It’s not about their titles
    or reputation. It’s energy, a kind of force that pulls people in, makes them want to help, stay, and believe. That’s the
    real force that moves things.

    The difference between energy and ability is that ability can be taught, while energy must be developed. You can copy
    someone’s skills, but not their heart. You copy their methods, but miss the thing that makes those methods work—their
    inner state.

    Energy is built through intention (意图), character, and the way we treat others. High-energy people don’t just work hard—they
    believe, they uplift, they inspire. That’s what people remember, and that’s what they follow.

    People, events, and environments are always interacting and influencing one another. You draw into your lives what mirrors
    your inner state. If you’re open-hearted, the world answers in kind, but if you’re self-doubting, life starts to mirror
    that back at you. The energy you carry is what you send out. And what you attract is not accidental. Everything you experience
    is related to the energy you carry. As your inner alignment (一致) is improved, you’ll notice that certain people or problems
    quietly fall away. The right ones will find you. Your outer reality will catch up with your inner state.

    Basically, energy is where action, clearness, and creativity come from. When your energy is full, wisdom follows. You
    don’t have to force your way forward—life begins to answer in kind.

    So how do you raise your personal energy? Not through willpower, but through deep self-tending (自我维护).

    Energy doesn’t come from a crowded to-do list—it comes from alignment. When your actions align with your values, when
    your rest matches your effort, when your environment feeds rather than drains (耗尽) you, that’s when energy increases.

    You raise your energy not by chasing more, but by throwing out what’s draining you. Are you always reacting to messages,
    or do you protect quiet time? Do your relationships make you more complete, or emptier?

    High-energy people are calm and quietly powerful. They build an inner life that’s energetic, stable (稳定的) and self-respecting.

    When you become a high-energy person, you stop chasing and start attracting. That quiet power is the force the world remembers.'
