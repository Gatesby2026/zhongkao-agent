- id: reading_C
  type: reading
  body: 'From a young age, we are taught not to lie. But do people sometimes lie when it is to their advantage? If they do lie, how often do they do so? What kind of lies do 线 people usually tell? These
    are the questions that interest researchers.

    To study lying behavior without influencing the behavior of a liar, researchers have developed some creative experiments. One is the die-under-the-cup experiment. Each 内 participant(参与者) sits alone
    in a closed room. In front of the participant is a cup with a small hole and a die. Each participant is asked to cover the die with the cup, shake the die, peek through the hole, and report the number
    on the die. They are told that the 不 higher the number they report, the more they get paid, which means if they report 2, they will receive$2, and 6 for$6. In this experiment, it is worthwhile for them
    to report a high number to receive more money. They know only they can see the true result.

    要 《 roll a die 答 A die.

    peek through the hole 题 When people roll a die, the chance of rolling any number from 1 to 6 is the same- exactly 1/6(about 16.67%). So, if a large number of participants roll a die and report the number
    they really see, then about 1/6 would report 1, 1/6 would report 2, and the like. However, if participants lie and report higher numbers to get more money, the percentage of participants reporting 1
    or 2 would be lower than 1/6.

    Here is what the researchers found. Participants were more likely to report more 北京市西城区 high numbers(4, 5, 6) and fewer low numbers. However, instead of always reporting the highest number, participants
    usually reported slightly(稍微) higher numbers than what they rolled.

    Why do people lie only a little? Some studies note it is important for people to think of themselves as honest people, so they balance the longing to benefit from the lie with the longing to keep a
    positive self-image(自我形象). Also, the longing to keep a positive social image is another reason. The fear of being seen as a liar often reduces 题 the possibility to lie.

    How is it possible to use these findings to reauce dishonesty? In a study in the UK, aimed at stopping people from stealing bicycles, researchers placed signs near the 学号 答 bicycle parking area with
    a photograph of eyes and the words“we are watching you.”

    After that, fewer bicycles were stolen in those areas. The image and words increased people’s social image concerns(担忧). That means the findings are useful in reducing 答 dishonesty to some degree. Future
    experiments should test how these findings might help people be more honest in different real-life situations.'
