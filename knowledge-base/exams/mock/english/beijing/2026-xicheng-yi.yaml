  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    ![](figures/image3.png)

    Lily believed real beauty was only found in bright things: golden sunsets, warm smiles … Armed with her digital camera,
    she chased (追求) only <u>____13____</u>. When her family moved to the Riverside neighborhood, she saw only old houses and
    too many shadows. She thought it completely boring.

    Her photography project for the school’s “My Community” competition felt like a certain <u>____14____</u>. One gray afternoon,
    filled with a sense of duty rather than inspiration, she went on a walk with her camera. As the setting sun hit the neighborhood,
    long shadows stretched (延伸) across the storefront of the flower shop. Out of boredom, she raised her camera and took a
    picture. The picture, which looked like a drawing, <u>____15____</u> her. The shadow of a woman planting flowers in window
    boxes was full of a quiet story.

    An idea came to her mind. What if she stopped <u>____16____</u> the shadows and instead looked at them? She gave up her
    old project and began a new one: “The Shadow Project.”

    This project required a <u>____17____</u> kind of sight. She photographed a joyful girl’s shadow as she jumped rope. She
    found unexpected beauty in the shadow of an apple tree, and love in the shadow of a mother and child holding hands...

    To record these shadows, she interacted with those who made them. She met Mrs. Garcia, the woman with the window boxes,
    who was a violin teacher and played a beautiful song for her. Lily began to realize that Riverside wasn’t <u>____18____</u>;
    it was full of stories.

    For the competition, she presented artistic photographs of shadows. Beside each, she placed a small card with a handwritten
    paragraph about the person, place, or moment that had made it. The energetic life was implied (蕴含), not shown, making
    the shadows feel full of presence and <u>____19____</u>.

    Her project won first prize. At the exhibition, an elderly woman stood for a long time before a photo of a long, lonely
    shadow made by an empty park bench. “That’s old Mr. Brown’s bench,” she said softly. “He sat there every day for twenty
    years. Your photo...it feels like he’s still there. You <u>____20____</u> him.”

    At that moment, Lily understood. She hadn’t been photographing the lack (缺失) of light. She had been photographing the
    memory of light and the shape of stories. She learned the truest beauty is not only in the light, but also in the shadows
    where history and heart quietly live.'
