- id: 38
  type: 作文
  score: 10
  stem: '你校正在举办主题为“Wisdom From Great Minds”的英文演讲比赛。假设你是李华，你参加了比赛并抽到初赛题目（如下图）。请你根据抽到的名人名言，用英文写一篇演讲稿，阐释你对它的理解以及它对你的影响。


    | Books are the ladder of human progress. — Maxim Gorky 书籍是人类进步的阶梯。——马克西姆·高尔基 |

    |---|



    提示词语： step, discovery, grow, wise, strength


    内容提示：●How do you understand the saying?


    ●What influence does the saying have on you?


    The famous saying I’d like to talk about is from Maxim Gorky: “Books are the ladder of human progress.” ______________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________


    Thank you for listening.'
  answer: ''
  solution: "The famous saying I’d like to talk about is from Maxim Gorky: “Books are the ladder of human progress.” I think\
    \ books are like steps that help us reach higher and see further. Through reading, we make new discoveries and learn from\
    \ great minds.\nThis saying deeply influences me. I used to read little, but now I read every day. Reading not only brings\
    \ me new discoveries, but also makes me wiser and stronger. Books give me knowledge and hope.\nI believe that as long\
    \ as we keep reading, we will keep growing. Let’s climb the ladder of books together!\nThank you for listening.\n\n详解：写作步骤\n\
    [第一步：审题立意]\n确定文体：英文演讲稿，以一般现在时为主\n明确要点：阐释高尔基名言“Books are the ladder of human progress”的含义、该名言对“我”（李华）的影响，需结合提示词语展开\n确定人称：第一人称（I/my）\n\
    注意事项：贴合演讲比赛主题“Wisdom From Great Minds”，围绕名言展开，语言简洁有力，符合演讲的口语化（适度）与逻辑性要求，不得透露真实信息\n[第二步：构思布局]\n演讲稿结构： \n开头段：引出演讲主题，点明所选择的名人名言及出处，开门见山，吸引听众注意力\n\
    主体段：分两部分展开，先阐释对名言的理解，再说明名言对自己的影响，结合自身经历让内容更真实\n结尾段：总结升华，发出倡议，呼应演讲主题，结束演讲并表达感谢\n[第三步：要点展开]  \n要点一：阐释名言含义\n核心类比：books are\
    \ like steps that help us reach higher and see further/books are like a bridge that connects us to a wider world/books\
    \ are like a lamp that lights up our way of progress\n具体阐释：we make new discoveries and learn from great minds/we gain\
    \ new knowledge and broaden our horizons/we understand the world better and learn valuable experiences from great people\n\
    要点二：名言对“我”的影响\n阅读习惯改变：I used to read little, but now I read every day/I didn’t like reading before, but this saying made\
    \ me start reading regularly/I used to spend much time on games, but now I spend an hour reading every day\n具体影响：brings\
    \ me new discoveries, makes me wiser and stronger, gives me knowledge and hope/brings me joy and enlightenment, makes\
    \ me more confident and knowledgeable, provides me with strength to face difficulties\n补充升华：as long as we keep reading,\
    \ we will keep growing; let’s climb the ladder of books together/as long as we stick to reading, we will make progress;\
    \ let’s read more books and pursue wisdom together/reading makes us better, let’s take books as our ladder to grow and\
    \ progress together"
