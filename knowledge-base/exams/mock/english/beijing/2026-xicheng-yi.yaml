  body: 'You’ve been there before: promising to finish that report by Thursday, telling your partner you’ll be ready in “just
    five minutes,” or confidently planning back-to-back meetings with zero buffer (缓冲) time. Then reality hits, deadlines
    rush by, and you’re left wondering why you’re so bad at estimating (估计) time. You’re not alone. Most people often underestimate
    the time, costs, and risks of future actions while overestimating their benefits. This is the “planning fallacy.”

    The planning fallacy is more than just poor time management. Imagine you are short on time but have to write an email.
    You quickly estimate it will not take too long, but it takes far longer than you thought. What has happened? Most likely,
    you pictured yourself writing the message, reviewing it once, and hitting send. The problem is, when you plan, you focus
    on the task itself while forgetting the countless small interruptions (干扰) and difficulties that unavoidably appear.

    The planning fallacy also explains why large projects always run over budget and take more time than planned. Part of
    the reason is that everyone makes optimistic (乐观的) estimates, which quickly produce wildly unrealistic expectations. The
    problem is often made worse by the “sunk cost fallacy.” We refuse to accept failure when too much effort has been made,
    and throw more time and money at the project instead.

    The planning fallacy can be very costly. Missed deadlines hurt your reputation (名声). Poor planning eats your time away
    and then other chances will pass you by. And when every task takes longer than expected, you keep playing catch-up, creating
    unnecessary stress and health problems.

    So what can you do? Instead of thinking about the task, use data (数据). Think back to when you last completed a similar
    task. How long did it take? This works best if you keep some actual notes. Adding buffers is also a good idea, but one
    rule to keep you realistic is to add percentages instead of fixed time buffers. For example, add 25% to your estimate
    instead of 10 minutes more. Break big projects into smaller, more predictable steps, and estimate the time of each one.
    Estimating a big project holds lots of unknowns. <u>Vague commitments</u> hardly work. Instead, create clear “if-then”
    plans: If I have a meeting at 9 a.m. on Monday, then I’ll add a 25% buffer (leave 30 minutes earlier than usual) to account
    for the rush hour traffic instead of just saying “I’ll go earlier.”

    When you learn to make more clear time estimates, you will experience less stress, achieve higher-quality work, and improve
    your reputation. You’ll also save time, make more space in your mind needed for creative work and have the time to chase
    other chances.'
