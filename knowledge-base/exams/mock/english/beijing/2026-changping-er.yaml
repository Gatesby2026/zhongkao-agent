  type: 作文
  score: 10
  stem: "从下面两个题目中任选一题，根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。·请不要写出真实的校名·、·姓名和地名·。\n\n题目①\n\n根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。·请不要写出真实的校名·、·姓名和地名·。\n\
    \n假设你是李华。你的朋友Chris生日将至，你想送他一本书作为生日礼物，但不确定选择哪类书籍最为合适。请给他写封邮件，说明你选择书籍作为生日礼物的理由，并提出至少两个具体问题以了解他的阅读偏好。\n\n提示词语：hobby, pleasure,\
    \ science, history, adventure\n\n内容提示：\n\n• Explain to him the reason(s) why you plan to send him a book as a birthday\
    \ gift.\n\n• Ask at least two questions to learn about Chris’s reading preferences.\n\nDear Chris,\n\nYour birthday is\
    \ coming. I’ve been thinking about what gift I should give you. \n\n____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________\n\
    \nLooking forward to your reply. Once I hear from you, I’ll pick out a suitable book for you.\n\nYours,\n\nLi Hua"
  answer: ''
  solution: 'Dear Chris,

    Your birthday is coming. I’ve been thinking about what gift I should give you.

    I think reading is a wonderful hobby. It can bring you much pleasure and knowledge. So I plan to buy a book for you as
    a gift. But I don’t know which kind you like best. Do you prefer science books or history stories? Are you interested
    in adventure novels? Please tell me your idea so I can choose wisely.

    Looking forward to your reply. Once I hear from you, I’ll pick out a suitable book for you.

    Yours,

    Li Hua


    详解：写作步骤

    [第一步:审题立意]

    确定文体：应用文（电子邮件），以一般现在时为主

    明确要点：阐述送书理由、提出至少两个具体问题来了解对方的阅读偏好

    确定人称：以第一人称（I/me/my）为主

    注意事项：不得透露真实姓名、校名和地名，词数不少于50词

    [第二步：构思布局]

    第一段：承接已给开头

    第二段：阐述送书理由、提出至少两个具体问题来了解对方的阅读偏好

    第三段：结尾

    [第三步：要点展开]

    要点一：阐述送书理由

    理由：I think reading is a wonderful hobby./It can bring you much pleasure and knowledge./I know you love reading, and it’s
    such a nice hobby.等

    要点二：提出至少两个具体问题来了解对方的阅读偏好

    问题：Do you prefer science books or history stories?/Are you interested in adventure novels?/Do you prefer books about science
    or history?/Are you interested in exciting adventure stories?等'
