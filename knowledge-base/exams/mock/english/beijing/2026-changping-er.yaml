  body: '阅读下面的短文，掌握其大意，然后从短文后各题所给的A、B、C、D四个选项中，选择最佳选项。

    When I was 18, I worked in a fast-food restaurant. I enjoyed it and learned a lot at first, but later the drive-through
    service started to tire me out. Loud cars hurt my ears. People often shouted at me when I asked them to repeat their orders.
    Their <u>____13____</u> made me angry every time I was at work.

    I knew I had only two choices: stay angry or try to feel different. I made a decision. For one whole day, I would <u>____14____</u>
    every person who came to my window.

    The first customer was a woman with tired eyes. I noticed her blue earrings and said, “I like your earrings.” A little
    surprised, she stopped. Her face softened, and at that moment the tiredness in her eyes <u>____15____</u>. Then she smiled.
    “Thank you. I made them myself.” She drove away slowly, still smiling.

    The next customer was a man with a loud radio. I almost gave up. But I saw his hat — it had a fishing boat on it. “Nice
    hat!” I said. He laughed, “My wife gave it to me twenty years ago.” He was still laughing as he left.

    Then something small began to change. I started to look at people in a <u>____16____</u> way. I searched for one good
    thing — a bright shirt, a colorful bottle, a dog in the back seat. It was not easy, but I always found it. The most amazing
    thing of all, though, was their <u>____17____</u>. “No one ever says that to me,” A young man said excitedly before leaving.

    At the end of the day, I went home happy for the first time in weeks. I knew I had discovered a <u>____18____</u>, with
    which I could avoid becoming the kind of person I dislike. I used to keep my bad feelings inside, and in the end, they
    would be taken out on the people I cared about. Simple kindness changes both others’ day and my own.

    Thirty years later, the habit has never <u>____19____</u> me. Whenever stress hits, I turn on my “praise brain”. It pulls
    me out of my dark thoughts and connects me with others. Kind words cannot fix everything, but they can brighten a moment.
    It is because I choose to be <u>____20____</u> that those around me end up happier.

    And so am I.'
