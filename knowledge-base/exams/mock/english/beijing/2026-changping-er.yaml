- id: 39
  type: 作文
  score: 0
  stem: "根据所给的中文和英文提示，完成一篇不少于50词的英语文段写作。文中已给出的内容不计入总词数。所给提示词语仅供选用。·请不要写出真实的校名·、·姓名和地名·。\n\n某英文杂志社正在征集以“我是改造家”为主题的创意稿件。请用英语写一篇短文给杂志社投稿，结合自己的亲身经历，介绍你改造一件物品的过程，以及你从中获得的乐趣。\n\
    \n提示词语：cut, tie, use…as…, special, proud\n\n内容提示：\n\n• Describe what old thing you changed and what you did to it.\n\n\
    • Explain the fun you got from doing this.\n\nHave you ever turned something old into something new? I’d like to share\
    \ my own experience with you. \n\n____________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________________"
  answer: ''
  solution: "[二选一备选题目，与上一题任选其一作答；本题不重复计分]\nHave you ever turned something old into something new? I’d like to share my own\
    \ experience with you. Last week, I changed an old bottle into a pen holder. First, I cut the top off carefully. Then,\
    \ I tied a colorful rope around it to decorate it. Finally, I used it as a container for my pens. It looked very special\
    \ on my desk. I felt proud because I made something useful with my own hands. This activity brought me much fun and creativity.\n\
    \n详解：写作步骤\n[第一步:审题立意]\n确定文体：记叙文\n明确要点：描述改造的旧物品以及具体改造过程、说明从改造物品中获得的乐趣与感受\n确定人称：第一人称（I/me/my） \n注意事项：不得透露真实姓名、校名和地名，词数不少于50词\n\
    [第二步：构思布局]\n一段式结构\n开头句：引出改造话题（题目已给出）\n中间句：描述改造的物品与过程\n结尾句：分享乐趣与感悟\n[第三步：要点展开]\n要点一：描述改造的物品与过程\n改造的物品：I changed an old\
    \ bottle into a pen holder./I once turned an old T-shirt into a small bag./I made a flower pot from an old can.等\n改造的过程：cut\
    \ the top off carefully/tied a colorful rope around it/used it as a container for my pens/tied the bottom with a strong\
    \ string/tied some pretty ribbons around the edge等\n要点二：分享乐趣与感悟\n乐趣与感悟：I felt proud because I made something useful with\
    \ my own hands./This activity brought me much fun and creativity./I felt so proud when I finished it, because I made something\
    \ new from an old thing.等"
