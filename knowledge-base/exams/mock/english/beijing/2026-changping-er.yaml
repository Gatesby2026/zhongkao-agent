  body: 'About 50 years ago, recordings of whale songs touched people’s hearts. These beautiful sounds helped change public
    opinion and call for an end to whaling (捕鲸业). Today, scientists use microphones to record and study sounds in nature.
    This important science is called “soundscape ecology (声景生态学)”. By listening carefully, scientists can learn about the
    ecosystem, and also find out how human activities influence the lives of whales and other sea animals.

    Whales are like musicians in the sea. Their songs can last for up to 30 minutes and may be repeated for hours. Scientists
    have found that some changes happen as they grow older. For North Atlantic right whales, calls become clearer and longer
    with age, just like human musicians improving with practice.

    Whales have smart ways to protect themselves from natural enemies. Mia Nielsen’s research group studied right whale mothers
    and their babies, finding that they chose to live in shallow (浅的) waters. The noisy waves there can hide their sounds,
    so these whales make very soft and few calls to avoid being heard.

    Beyond these natural habits, the environment also plays a key role in changes in whale sounds. Take blue whales as an
    example: their calls are about 0.2 to 0.3 Hz higher during the Southern summer. Scientists believe this happens because
    there is more background noise at that time of year, mainly caused by the breaking of ice near Antarctica. Dr. Chou explains,
    “These records of whale sounds allow us to see how less sea ice and more ships may influence animals.”

    Scientists have also found that changes in whale sounds are related to the whaling ban (禁令). Researcher Leroy and his
    team suggested that, thanks to the whaling ban, blue whale populations have grown over recent years. With more whales
    living in the same areas, they can now easily hear one another without calling across long distances.

    Soundscape ecology is becoming increasingly important. Other than whales, it helps study many other animals. Rosenbaum’s
    team studied the Bering Sea for four years, recording over 33,000 sounds from different sea animals. This data helps scientists
    understand these animals and how climate and human activities influence them. This is the power of soundscape ecology:
    it turns the simple noise of the sea into a message that helps us understand animals and realize the serious effects of
    human activities on them. In this way, we can learn to live in peace with ocean life.'
- id: reading_D
  type: reading
  name: D
  q_range:
  - 30
  - 33
  body: 'In a factory in Germany, something unusual is happening. Every machine on the production line is under the watch
    of intelligent sensors (智能传感器). If a robot uses too much electricity, the intelligent program will slow it down to reduce
    energy waste. If an important part begins to wear out, workers will get a warning before it breaks down. With these digital
    tools, the factory has not only cut its electricity use by 20% but also increased its production to a record high, showing
    the great power of joining technology and sustainability (可持续性).

    This is more than just a factory story. Experts name it the “twin transition (转型)”. It connects digital transition and
    sustainability in a way that not only focuses on using digital tools or saving energy. Instead, it aims to use digital
    technologies to help protect our planet. What makes this transition special is that it turns the once-separate goals of
    technological progress and environmental protection into a united task that benefits both businesses and the earth.

    The idea is already being used in the “digital twin”, a virtual replica (虚拟副本) of a real machine in which robots can practice
    and repeat difficult tasks again and again without wasting any materials or risking harm to real parts. The technology
    records all effective actions and removes ineffective ones. After enough virtual tests, the robot can perform perfectly
    in the real world. It cuts down material waste and stops breakdowns, which would need expensive repairs under normal conditions.

    However, the twin transition is not a perfect solution by itself. Although digital tools help people complete tasks with
    less effort and better results, people may end up using them more often, leading to increased energy use in the long run,
    a problem known as the “rebound effect.” Another challenge is the “digital divide.” Both developed and poorer areas have
    tried the twin transition, but poorer areas are short of high-speed Internet and practical digital skills. As a result,
    they cannot get the same benefits from the transition as developed areas do.

    To solve these problems, experts suggest that good leadership and proper education are key. Companies need leaders with
    an understanding of both technology and the natural world. Schools should teach students how to use digital tools to solve
    environmental problems. In fact, there is no need for technological progress to <u>clash</u> with nature. With the right
    actions, the twin transition will guide us toward a more sustainable and intelligent future.'
