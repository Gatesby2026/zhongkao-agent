  body: '阅读短文，根据短文内容回答问题。

    Not long ago, thrifting (淘二手货) was seen as “shameful” by many. But now, second-hand clothes have become a “cool must-have”.
    In just ten years, thrifting has gone from a small hobby in local communities to a new style that can compete with fast
    fashion.

    People’s ideas toward thrifting have changed. Eve Perez, a 21-year-old who once felt strange shopping at thrift stores,
    recalls that something began to change five years ago, when social media became popular. She noticed people’s views on
    buying and wearing used clothes were different. Now, young people feel that thrifting is a “treasure hunt” to find things
    that show their personality. Historians also point out that young people often want to be different from the older generation
    through fashion. Together with their friends, they’ve turned early 2000s clothing into cool looks from the past.

    Social media is a big driving force in making thrifting popular. Apps like TikTok are flooded with ThriftHaul videos,
    where users show off their “finds” from thrift stores. Caring about the environment is another big reason. More and more
    people are realizing how fast fashion harms the environment. Thrifting helps cut down on waste.

    The thrifting fever has opened up chances for people. Alex Chen, a college student, started selling old band T-shirts
    on an app. In six months, he got over 5,000 followers and made enough money to pay his tuition (学费). Many sellers also
    sell second-hand products in physical thrift stores. “People share their love for special things there,” says Sofia Martinez,
    who runs such a store.

    Thrifting is no longer just about saving money. It’s a cultural movement. As young people continue to accept it, this
    industry is expected to keep growing, showing that what’s old can truly become new again.'
