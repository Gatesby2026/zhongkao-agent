  body: '（一）阅读下面材料，完成17-19题。（共7分）

    材料一

    建设美丽中国，关键在于推动经济社会发展全面绿色转型。产业结构绿色转型和能源结构优化调整是推动全面绿色转型的重中之重。

    在产业结构上，一方面，推动传统产业绿色低碳改造升级。严格项目准入标准，坚决遏制高耗能、高排放、低水平项目盲目扩张。另一方面，大力发展绿色低碳产业。做强新能源汽车、节能环保等绿色优势产业，打造全球规模领先的新能源产业链。

    同时，还要推动能源结构绿色低碳转型。以我国电力生产为例，火电主要通过燃烧煤炭等化石燃料，将化学能转化为电能。与火电相比，水电、核电、风电、太阳能发电分别是利用水能、核能、风能、太阳能等清洁能源发电，其优势十分明显，对环境友好，是实现绿色发展的有效途径。从表1可见，2025年，______，体现了能源绿色转型的成效。

    表1 2025年全国各类发电量及增长速度统计表

    | 电源类型 | 发电量（亿千瓦时） | 比上年增长（%） |

    |---|---|---|

    | 火电 | 63271.5 | -0.7 |

    | 水电 | 14616.7 | 2.5 |

    | 核电 | 4852.3 | 7.6 |

    | 风电 | 11279.2 | 13.1 |

    | 太阳能发电 | 11732.4 | 39.8 |

    （数据来源：国家统计局）

    材料二

    生态修复是美丽中国建设的基础工程。在黄河“几字弯”沙漠腹地陕西榆林境内，860万亩流沙得到全面治理；在塔克拉玛干沙漠边缘，3000多公里阻沙防护带筑起“绿色长城”……神州大地不断书写“绿色奇迹”。如今，我国生态系统稳定性不断提升，“三区四带”生态安全屏障基本形成。我国森林面积、森林蓄积量连续双增长，森林覆盖率达25.09%，已是全球增绿最多最快的国家。根据规划，到2035年，全国森林覆盖率要提高至26%，水土保持率要提高至75%，生态系统基本实现良性循环。持续改善生态环境质量，让人民群众在绿水青山中共享自然之美、生命之美，满足人民美好生活需要。

    材料三

    经过不懈奋斗，目前，我国53%的可治理沙化土地得到有效治理，在全球率先实现土地退化“零增长”。里程碑式的成就背后，有这样一组数据：全民义务植树运动已开展45年；2025年，全国各地建成“互联网+全民义务植树”基地3071个，全年发布尽责活动6.2万场，接待3300多万人次。在建设美丽中国的进程中，一个个普通人以最朴素的方式参与着这场“绿色长征”，形成了“人人有责、人人尽责、人人享有”的绿色发展格局。可见，美丽中国建设离不开全民参与。'
