    D: 殚精竭虑  第四站 香山革命纪念馆  香山革命纪念馆6000平方米的展厅里，陈列着众多与“进京赶考”相关的珍贵文物。一辆军用吉普车，一个“七一”证章，一艘渡江战役时使用的木船，开国大典上所用的“九头鸟”喇叭，天安门城楼悬挂过的大红灯笼……这些文物是旧时代落幕、新时代诞生的生动缩影，见证了中国共产党领导人民推翻旧制度、建立新中国的历程，彰显着共产党人在时代变局中敢为人先、·革故鼎新·的魄力。  在赶考之路上，中共中央始终奉行谦虚谨慎、不骄不躁、艰苦奋斗的“赶考”精神。而今，我们走进香山革命纪念馆，重温这段历史，就是要__________，__________，__________，为实现中华民族的伟大复兴交出不负时代的优秀答卷。
