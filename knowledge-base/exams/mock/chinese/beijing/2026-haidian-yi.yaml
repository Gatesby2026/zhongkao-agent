  body: '“进京赶考”原指古代科举学子赴京应试。毛泽东将中共中央进驻北平（今北京）、接受执政考验称为“进京赶考”。学校组织编写“重走进京赶考路”研学推荐手册，请你协助整理。

    第一站 清华园车站旧址

    清华园车站旧址是京张铁路上承·载·（zài）百年记忆的地标。车站由清末铁路工程师詹天佑设计督建，五开间的形制庄重大方，尽显中国人自主筑路、建站的·骨·（gǔ）气。抗战初期，这里曾是抗战物资·调·（diào）度与运送的中转站；解放战争时期，这里还是地下党组织青年学生进城参·与·（yǔ）进步运动的出发地。1949年3月25日清晨，毛泽东等中共中央领导同志乘火车抵达清华园车站。清华园车站成为中共中央领导人“进京赶考”的第一站。

    <u>清华园车站不仅是新时代红色精神的传递者，还亲历了近代中国历史变迁的见证者。</u>如今，这里被列为北京市不可移动革命文物、市级文物保护单位。修缮开放后，清华园车站旧址成为红色文化宣传的教育基地。'
- id: classical_材料一
  type: classical
  name: 材料一
  q_range: null
  body: '秦王怫然怒，谓唐雎曰：“公亦尝闻天子之怒乎？”唐雎对曰：“臣未尝闻也。”秦王曰：“天子之怒，伏尸百万，流血千里。”唐雎曰：“大王尝闻布衣之怒乎？”秦王曰：“布衣之怒，亦免冠徒跣，以头抢地尔。”唐雎曰：“此庸夫之怒也，非士之怒也。夫专诸之刺王僚也，彗星袭月；聂政之刺韩傀也，白虹贯日；要离之刺庆忌也，仓鹰击于殿上。此三子者，皆布衣之士也，怀怒未发，休祲降于天，与臣而将四矣。若士必怒，伏尸二人，流血五步，天下缟素，今日是也。”挺剑而起。

    （节选自《战国策·唐雎不辱使命》）'
- id: classical_材料二
  type: classical
  name: 材料二
  q_range: null
  body: '赵简子①出畋②，命郑龙：“射野人③，使无惊吾鸟。”龙曰：“吾先君晋文公伐卫，不僇④一人；今君一畋而欲杀良民，是虎狼也。”简子曰：“人畋得兽，我畋得士。”

    （节选自《金楼子》）

    注：①[赵简子]即赵鞅。春秋时晋国正卿。②[畋]打猎。③[野人]乡野之人。④[僇]同“戮”，杀。

    三则材料里的人物对话都展现了语言的力量。邹忌用_______的方式委婉劝谏齐威王广开言路，表现了辅君安国的智慧；唐雎面对秦王的威胁，慷慨陈词，震慑秦王，尽显_______的精神；郑龙以“_______”直斥赵简子，阻止他滥杀无辜，体现了重民爱民的本心。'
- id: classical_材料一
  type: classical
  name: 材料一
  q_range: null
  body: 秦王勃然大怒，对唐雎说：“您曾听说过天子发怒吗？”唐雎回答说：“我未曾听说过。”秦王说：“天子发怒，倒下的尸体有百万，血流千里。”唐雎说：“大王曾听说过平民发怒吗？”秦王说：“平民发怒，也不过是摘掉帽子光着脚，用头撞地罢了。”唐雎说：“这是平庸无能的人发怒，不是有胆识有才能的人发怒。专诸刺杀吴王僚的时候，彗星的尾巴扫过月亮；聂政刺杀韩傀的时候，一道白光直冲太阳；要离刺杀庆忌的时候，苍鹰扑到宫殿上。这三个人，都是平民中有胆识的人，心中的愤怒还没发作出来，上天就降示了征兆。现在加上我，将成为四个人了。如果有胆识的人真的发怒，倒下的尸体只有两具，血流不过五步远，天下百姓都要穿丧服，今天就是这样的时候。”说完，唐雎拔剑站起身。
- id: classical_材料二
  type: classical
  name: 材料二
  q_range: null
  body: 赵简子外出打猎，命令郑龙：“射杀那些百姓，不要让他们惊飞了我的鸟。”郑龙说：“我们前代君主晋文公攻打卫国，不杀一个人；现在您一次打猎却想杀害善良的百姓，这是像虎狼一样凶狠的行为。”赵简子说：“别人打猎得到野兽，我打猎得到了贤士。”
- id: modern_材料一
  type: modern
  name: 材料一
  q_range: null
  body: '①一人健康是立身之本，人民健康是立国之基。我国体育强国建设将全民健身上升为国家战略，坚持把人民作为发展体育事业的主体。为贯彻体育强国建设精神，相关部门积极行动，推动全民健身活动和群众体育赛事蓬勃开展，运动健身成为全民生活新风尚。我国常年参与体育锻炼人数比例达38.52%，养成体育锻炼习惯的人群数量持续攀升。北京市中小学全面启动了班级超级联赛，常态化开展多样赛事，“人人参赛，班班参与”。“班超”联赛在提升学生体育素养的同时，培养学生的意志品质，促进学生身心健康发展。

    ②硬件建设为全民健身创造必要条件。截至2025年底，全国共有体育场地500.4万个，面积达43.72亿平方米。全国共建成体育公园1555个，160个国家乡村振兴重点帮扶县实现县级专项运动场地全覆盖，体育场地日趋身边化。甘肃玉门岷州村村民说：“以前想锻炼没地方去，现在出门就是篮球场，身体越练越结实！”同时，科学健身指导也为群众体育高质量发展提供技术支撑。国家体育总局持续推动科学健身指导走基层、进万家，让健身更科学、更有效。390万名社会体育指导员活跃在公园社区，当起群众的“健身管家”。综上所述，__________，为全民积极参与体育锻炼提供保障。

    ![](figures/image3.png)'
  figure: 2026-haidian-yi/figures/image3.png
- id: modern_材料二
  type: modern
  name: 材料二
  q_range: null
  body: '①加快发展体育产业是体育强国建设的重要战略任务。当下，通过“体育+”的深度融合，体育产业成为各地拉动内需、促进消费升级的重要抓手。

    ②由江苏省体育局联合全省13个地市的人民政府共同主办的“苏超”赛事火爆出圈，单场最高上座超6万人。大量群众奔赴各承办城市观赛旅游，带动江苏全域多场景消费近380亿元。“体育+旅游”的融合，成功将以竞技为主导的体育项目变身为具有强经济效益的文旅项目，将体育“流量”转化为旅游“留量”，带来了传统景区难以独立实现的经济增量。安徽肥西农村将闲置农田建成足球训练基地，并联动周边农户定向供应农副产品。“体育+农业”模式让农业资源借体育流量实现经济价值跃升。浙江湖州通过“测—评—导—练”服务和AI体测设备，为群众开具个性化运动处方，激活了运动干预、慢病管理等“非刚需”消费。“体育＋医疗”的创新探索，正在开辟传统医疗体系之外的健康消费新增长极。

    ③当山水风景融入观赛体验，闲置农田变身运动赛场，运动处方成为健康消费……“体育+”催生的复合效应，正成为体育产业为经济增长注入新动力的有力证明。'
- id: modern_材料三
  type: modern
  name: 材料三
  q_range:
  - 14
  - 23
  body: 充分发挥体育在精神文明建设中的作用，是体育强国建设的重要内容。国家体育总局全力打造“中华体育精神颂”核心体育文化品牌，通过系列活动，以体育精神厚植文化自信根基。“决胜巴黎·绽放奥运——奥运冠军面对面”活动中，奥运冠军们先后奔赴新疆、西藏等边疆地区，以及陕西延安、江西赣州等革命老区进行巡回宣讲。健儿们不畏强手、顽强拼搏的故事让现场各界代表共同感受为国争光的无上荣耀，激发了代表们的民族自豪感。北京大学的“开学季·冠军来了”活动现场，奥运冠军与青年学子面对面交流，分享成长经历。该活动让青年学子体悟中国体育的奋进力量，在体育精神的滋养中树立“强国有我”的信念。
