  score: 2
  stem: '阅读材料后，一位同学想为益寿堂拟写一副对联。你认为在上下联横线处填入文字，最恰当的一项是（   ）


    昔日名堂，      <u>①</u>      ，开创伟业；


    今朝圣地，传薪火同守初心，   <u>②</u>   。'
  options:
    A: ①设盛宴礼贤下士    ②赓续荣光
    B: ①聚贤才共商国是    ②赓续荣光
    C: ①聚贤才共商国是    ②铸魂育人
    D: ①设盛宴礼贤下士    ②铸魂育人  第三站 双清别墅  双清别墅位于海淀区香山公园南部山腰，本是清代皇家园林静宜园“松坞山庄”的旧址。此地苍松翠竹相互掩映，美丽景致·巧夺天工·。离开益寿堂后，毛泽东等中共中央领导同志入驻双清别墅。毛泽东在这里·运筹帷幄·，发布了《向全国进军的命令》，指挥解放军取得渡江战役的胜利；起草了100多封军事电报，指挥全军以·摧枯拉朽·之势解放上海、解放西北，进军中南和西南，解放全中国；和同志们·殚精竭虑·，为筹备新政协、筹建新中国日夜操劳。众多关乎民族前途命运的决策在此诞生，双清别墅成为了中共中央“进京赶考”的第一考场。
  answer: B
  solution: '①上联“昔日名堂”对应1949年史实，也是材料核心内容：毛泽东在益寿堂会见宴请民主人士，共商建国大计。“聚贤才共商国是”准确反映史实“共商建国大计”，“国是”指国家大政方针，庄重贴合语境。

    ②“开创伟业”是动宾短语，与“赓续荣光”对应，“铸魂育人”为并列短语（故排除）。'
