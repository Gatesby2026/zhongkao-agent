- id: 11
  type: 主观填空
  score: 3
  stem: 梁启超评论这首词说：“此绝似苏辛派，不类《漱玉集》中语。”意思是这首词与苏轼、辛弃疾的词风相近，不像李清照《漱玉集》的婉约风格。结合本词中的语句，联系苏轼或辛弃疾的词句（本试卷中出现的除外），说说你对该评论的理解。
  answer: ''
  solution: '“天接云涛连晓雾，星河欲转千帆舞”描绘了海天苍茫、星河涌动、千帆竞发的壮美景象，境界开阔。辛弃疾《破阵子·为陈同甫赋壮词以寄之》中“八百里分麾下炙，五十弦翻塞外声”渲染出热烈豪迈的军营氛围。二者词风相近，都体现出豪放特点，与婉约风格不同。


    详解：首先，我们需要明确梁启超评价的意思是：这首词打破了李清照一贯的婉约细腻、柔媚清丽的风格，呈现出与苏轼、辛弃疾相近的豪放开阔、雄奇浪漫的特点。

    从本词来看，开篇“天接云涛连晓雾，星河欲转千帆舞”，描绘了海天相接、云涛翻涌、星河转动的壮阔景象，画面宏大辽远，笔力雄浑奔放，完全不同于她以往“寻寻觅觅，冷冷清清”的柔婉。结尾“九万里风鹏正举。风休住，蓬舟吹取三山去”，化用《逍遥游》中大鹏的典故，想象奇崛，以大鹏乘风高飞的意象抒发挣脱现实束缚的豪情，气势磅礴，充满浪漫主义色彩；再联系苏轼或辛弃疾的豪放词句，找风格上的共性，比如同样的壮阔意境、同样的借典故抒怀、同样的豪迈气势，最后回扣评价，说明这首词为什么“像苏辛派”。

    示例：苏轼、辛弃疾是宋代豪放词代表，风格雄浑大气、气概豪迈，而李清照一贯是婉约词风，多写柔细私情。这首《渔家傲》中“天接云涛连晓雾，星河欲转千帆舞”“九万里风鹏正举”，描辽阔海天、写凌云气概，意境恢宏雄奇，充满浪漫豪放的气质，和李清照一贯的婉约风格截然不同。正如苏轼《江城子·密州出猎》中“会挽雕弓如满月，西北望，射天狼”，同样格调开阔、豪情奔放，因此梁启超评价这首词“绝似苏辛派”。'
