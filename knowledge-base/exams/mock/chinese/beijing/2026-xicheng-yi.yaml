  stem: 你在文段中的横线处依次填入词语。下列恰当的一项是（   ）
  options:
    A: ①飞跃 ②乞求
    B: ①飞跃 ②祈求
    C: ①飞越 ②祈求
    D: ①飞越 ②乞求
  answer: B
  solution: '第一处，飞跃：指事物从旧质到新质的突飞猛进。飞越：指从上空飞过，多形容空间移动。文中形容文明进程重大进步，“飞跃”更适合。

    第二处，祈求：指虔诚地盼望，多用于对神灵祝祷，中性褒义。乞求：指哀求施舍，带贬义。此处形容向马王爷虔诚祝祷，“祈求”更合适。'
