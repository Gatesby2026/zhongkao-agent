  question: 25. 阅读文章，写出第③段的论证过程。（3 分）
  answer: 首先，引用学者观点，点明人与机器的区别。然后，指出“人工智能是工具，方向和效用如何，归根结底还在于使用者”，并举滥用人工智能赶作业、造假而造成危害的例子加以证明。最后，得出“技术越普及，人文素养的底线越不能失守”的结论。
