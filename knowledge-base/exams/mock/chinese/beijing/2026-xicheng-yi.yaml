  question: 22. 结合全文内容，谈谈对结尾段画线句的理解。（3分）
  answer: 把物质生活的贫乏与艰难踩在脚下，体现在：上学路途艰难，却不缺一节课；点灯自修，却以苦为乐。文娱晚会、暮春踏青、登高吟诗等则体现了追求精神生活的充实与欢乐。而这一切的动力是“一切为民族”，为从愚昧走向文明，为解救苦难的民族于水深火热之中。这句话彰显了那一代青年把个人成长与国家命运紧密相连的忧国忧民的情怀。
