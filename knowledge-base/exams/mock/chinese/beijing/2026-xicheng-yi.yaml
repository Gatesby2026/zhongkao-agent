- id: 15
  type: book_review
  score: 5
  stem: '名著中有些词语多次出现，统计结果如下。


    | 作品 | 词语 | 出现频次 |

    |---|---|---|

    | 《骆驼祥子》 | 车 | 800余次 |

    |  | 苦 | 近100次 |

    | 《钢铁是怎样炼成的》 | 路 | 400余次 |

    |  | 斗争 | 50余次 |

    | 《简·爱》 | 家 | 近500次 |

    |  | 自由 | 近50次 |


    这些词语与作品主题有着千丝万缕的联系。从以上三部名著中任选一部，围绕上表中该作品的两个词语，结合具体情节，谈谈你对作品主题的理解。（100字左右）'
  answer: ''
  solution: 示例一：祥子一生都在为拥有一辆属于自己的车而奋斗。可新车被抢、被敲诈、虎妞难产，一次次的痛苦磨难让他失去了车。“车”是祥子的梦想寄托，而“苦”则是他追梦过程中无尽的磨难，这两个词揭示了黑暗社会让底层劳动者无路可走的主题。  示例二：保尔的人生之“路”充满荆棘。从少年时反抗神父，到投身革命、修筑铁路，再到全身瘫痪、双目失明。但他始终选择“斗争”，他与敌人斗争，英勇作战；他与疾病斗争，坚持创作。“路”和“斗争”共同诠释了真正的革命者是在磨难中成长的主题。  示例三：自幼父母双亡、身无分文、寄住在舅妈家的简·爱始终渴求“家”的温暖，但她逃离盖茨海德府的牢笼、拒绝做罗切斯特的情妇、拒绝圣约翰的求婚，则意味着她始终以“自由”为底线守护自己对“家”的追求。这体现了小说追求精神独立的主题。
