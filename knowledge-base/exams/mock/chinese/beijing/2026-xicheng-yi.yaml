- id: 25
  type: 现代文阅读
  score: 3
  stem: 阅读文章，写出第③段的论证过程。
  answer: ''
  solution: '首先，引用学者观点，点明人与机器的区别。然后，指出“人工智能是工具，方向和效用如何，归根结底还在于使用者”，并举滥用人工智能赶作业、造假而造成危害的例子加以证明。最后，得出“技术越普及，人文素养的底线越不能失守”的结论。


    详解：根据第③段第1句可知，首先引用学者观点，指出人与机器的区别在于人拥有情感、道德、纪律和良知。根据第③段第2、3、4句可知，然后提出人工智能是工具，其方向和效用取决于使用者，并举出利用人工智能赶作业、写论文导致能力钝化，以及生成假新闻、散播谣言侵蚀社会信任等反面例子加以证明。根据第③段第5句可知，最后得出结论：技术越普及，人文素养的底线越不能失守。'
