  solution: 我与老屋  推土机的轰鸣声从村头传来，我知道，老屋的倒计时开始了。  那是一座青砖黑瓦的老房子，爷爷说，它比父亲的年纪还大。墙角的青苔一年年变厚，木门上的漆一块块剥落，门框上刻着我从小到大的身高线，一条条歪歪扭扭，像在记录时光的脚步。  小时候，老屋是我的乐园。堂屋里的八仙桌，是我写作业的地方，桌子上还有我用圆珠笔刻下的“到此一游”。后院的枇杷树，每到夏天就结满金黄的果子，我爬上去摘，爷爷在下面喊：“小心点！别摔了！”树下的石凳被磨得光滑，那是奶奶坐着择菜、我和她分吃西瓜的地方。  老屋的夏天很热，只有一台老式吊扇，吱呀吱呀地转，声音像催眠曲。我躺在竹席上，听奶奶讲她年轻时的故事，讲着讲着，她就睡着了，手里的蒲扇还搭在我的肚子上。  冬天，老屋很冷，风从门缝里灌进来，呜呜地响。爷爷会把火盆搬到屋里，我们围坐在火边，烤红薯，嗑瓜子。火光映着爷爷的脸，沟壑纵横，但他的眼睛很亮。他总说：“这屋子虽旧，但暖和，是人住出来的。”  后来，我去了县城读书，回老屋的次数越来越少。每次回去，都觉得它又旧了一些，屋顶的瓦缺了几片，墙上的裂缝更长了。爷爷老了，不再生火盆，只用电暖器。他坐在藤椅上，望着窗外，嘴里念叨：“房子老了，我也老了。”  去年冬天，爷爷病重，我们把他接到城里。临走前，他让我扶他回老屋，里里外外看了一遍。他摸着门框上我的身高线，说：“你从这么点长到这么高，这屋都记着呢。”那天他坐在门槛上，很久很久，夕阳把他的影子拉得很长。  爷爷走后，老屋就空了。村里说要拆迁，推土机终于来了。我没有回去，不敢看。我知道，老屋不在了，但它在我的记忆里，永远不会倒。  那里有我的童年，有爷爷的烟斗，有奶奶的蒲扇，有枇杷树下的笑声，有火盆边的故事。老屋与我，一起走过了十五年。如今它要走了，但它给我的温暖，足够我用一辈子。
