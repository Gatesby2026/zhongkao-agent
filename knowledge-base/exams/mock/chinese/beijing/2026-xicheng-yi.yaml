- id: 21
  type: 现代文阅读
  score: 2
  stem: 于漪倡导语言既要典雅优美，又要通俗有趣。结合第⑦段的具体语句，说说这一特点是如何体现的。
  answer: ''
  solution: '示例一：引用杨万里的诗句“莫问早行奇绝处，四方八面野香来”，“儿童急走追黄蝶，飞入菜花无处寻”，写出了春天生机勃勃的景象，增加了文章的文化内涵；用“撒腿跑一阵”“甩甩它”等口语化的表达描绘出青年人的活泼与洒脱。形成了既活泼又典雅的风格。示例二：“暮春三月，江南草长，杂花生树，群莺乱飞”句式整齐，典雅优美，写出了春天明媚而又充满活力的景象；“我照镜子啦！”“看我能站在水上，有轻功”等口语化描写，活泼通俗，充满童趣。两者相融，体现了于漪倡导的语言风格。


    详解：根据第⑦段第一句可知，作者化用南朝丘迟《与陈伯之书》的名句，用“暮春三月，江南草长，杂花生树，群莺乱飞”这样句式整齐、辞藻清丽的句子开篇，语言典雅凝练，一下子勾勒出江南春日明媚又充满生机的画面，为全段定下了富有古典韵味的基调。

    根据第⑦段第三句可知，文中自然引用杨万里的诗句，借诗句烘托郊野油菜花盛开、香气扑鼻的春日盛景，既贴合眼前所见，又增添了文章的书卷气与文化内涵，让语言显得雅致优美。

    根据第⑦段第二句和最后一句可知，作者用“撒腿跑一阵”“甩甩它”这类直白的口语化表达，还有“我照镜子啦！”“看我能站在水上，有轻功”这样充满童趣的对话，生动还原了少年们踏青时的自在、活泼与顽皮，语言通俗有趣，读来鲜活灵动。

    整段文字中，典雅的古典名句、诗词引用，和生活化的口语、俏皮对白巧妙交织，既营造出江南春日的诗意美感，又真实展现了少年们的鲜活天性，完美体现了“典雅优美又通俗有趣”的语言风格。'
