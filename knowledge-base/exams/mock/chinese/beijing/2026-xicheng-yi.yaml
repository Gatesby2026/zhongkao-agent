    C: “万钟于我何加焉”和“牺牲玉帛，弗敢加也”中的“加”意思完全相同，都解释为“虚夸、夸大”。
    D: “已”有“停止”“已经”等意思，“是亦不可以已乎”与“死而后已”中的“已”，都取“停止”之意。
