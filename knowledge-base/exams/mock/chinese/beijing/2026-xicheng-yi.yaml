  stem: 你检查了文段中加点成语的使用情况。下列判断正确的一项是（   ）
  options:
    A: “怀才不遇”使用正确，其他三个成语使用有误。
    B: “耀武扬威”使用错误，其他三个成语使用正确。
    C: “怀才不遇”“耀武扬威”使用正确，“各得其所”“入木三分”使用有误。
    D: “各得其所”“入木三分”使用正确，“怀才不遇”“耀武扬威”使用有误。  展板三 美术展览中赏马  徐悲鸿纪念馆于马年之初推出了“奔腾尺幅间——馆藏马主题精品展”。  展览不仅为观众展出了徐悲鸿珍贵的收藏品，更以时间为轴展现了徐悲鸿奔马创作的演变轨迹。徐悲鸿打破了传统画马的桎梏，以西方解剖透视为骨，以中国水墨写意为魂，在几十年的艺术创作中，<u>逐渐刻画了融汇西东、形神兼备的奔马美学风格</u>。  展览引领观众开启一段视觉与心灵之旅，感受一笔一墨间的生命律动。画作的每一笔都蕴藏着徐悲鸿对家国的关切，饱含着他对民族精神的呼唤。凝视这些奔马，我们不仅为徐悲鸿精湛的画艺所折服，还能感受到那份跨越时空的精神力量。
  answer: A
  solution: 'A.怀才不遇：有才能而得不到施展的机会。用来形容千里马所象征的人才处境，使用正确；

    B.耀武扬威：含贬义，指炫耀武力、显示威风。文段中用来形容战场场景的豪迈气势，感情色彩不当，使用错误；

    C.各得其所：指每个人或事物都得到合适的安顿。不能用来指马的意象有所不同，使用有误；

    D.入木三分：形容书法笔力刚劲有力，也比喻见解、议论深刻、确切。不能用来指指诗文体现中国人的精神追求，使用有误。'
