  question: 21. 于漪倡导语言既要典雅优美，又要通俗有趣。结合第⑦段的具体语句，说说这一特点是如何体现的。（2分）
  answer: 引用杨万里的诗句“莫问早行奇绝处，四方八面野香来”，“儿童急走追黄蝶，飞入菜花无处寻”，写出了春天生机勃勃的景象，增加了文章的文化内涵；用“撒腿跑一阵”“甩甩它”等口语化的表达描绘出青年人的活泼与洒脱。形成了既活泼又典雅的风格。\“暮春三月，江南草长，杂花生树，群莺乱飞”句式整齐，典雅优美，写出了春天明媚而又充满活力的景象；“我照镜子啦！”“看我能站在水上，有轻功”等口语化描写，活泼通俗，充满童趣。两者相融，体现了于漪倡导的语言风格。
