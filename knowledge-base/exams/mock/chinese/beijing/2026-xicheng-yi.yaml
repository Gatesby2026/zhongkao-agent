  body: '阅读《求学的艰辛与欢乐》，完成以下题。

    求学的艰辛与欢乐

    ①初中毕业，父亲一病不起，临终把我们姐弟叫到床边，吃力地说了一句话——“学点本领，做个好人，孝顺妈妈”，就挥手叫我们走开，怕我们传染上肺病。

    ②抗日战争胜利，我与大弟都考取了省立淮安中学。学校离家十几里路，每天很早就要出门。下雨下雪，一身水一身泥；刮大风时，迈一步都得花相当力气。即使如此，我们也不缺一堂课，披星戴月，早出晚归。有时功课多，就用冷水朝脸上浇一浇，脑子就不是浆糊一盆了。早上起不来，多睡一会儿都是好的。这就苦了母亲了，她每天·提心吊胆·等天明，喊我们起床，烧火煮早饭。寒冬腊月，屋檐挂上尺长的冰凌，我们一起床，母亲已把热气腾腾的泡饭端到我们手上。

    ③天天练腿劲，走读了一个学期，学校又搬迁，于是转入镇江中学。当时，物质条件极其艰苦，而同学之间从不为生活上的事计较，相反，总是互帮互助。天寒地冻，汲水不易。清晨，井边放着一排漱口杯、脸盆，总有同学自告奋勇为大家提井水。井深，一桶桶提上来，累得头上冒汗。个子高的不用招呼就身先士卒，男同学更是把女同学推开，自己大显身手。欢声笑语驱赶着天空的彤云，驱赶着凛冽的寒气。

    ④一次上作文课，有同学恶作剧，偷偷把我的凳子搬走。我不去找，就站着写。那次是自由命题，我就针对这件事大发议论，笔端汩汩滔滔，写下了一篇类似“檄文”的东西。出乎意料的是老师大为欣赏，在文后批了一大段：“……于生失座，成此佳篇，遂使孟嘉落帽①韵事不专美于前矣！”至今想起，心里依旧暖暖的。

    ⑤晚自修是学校一景。教室里每张课桌上一盏煤油灯，两个同学合用，尽管油灯大大小小、高高低低有差别，但排列整齐，星星点点，远远望去，简直有纳兰性德《长相思》中“夜深千帐灯”的味道。同学中无人言苦，以苦为乐。知识大门打开，某个问题悟到真谛时，自控能力好的会莞尔一笑，无所顾忌的则手舞足蹈，千姿百态，生气勃勃。

    ⑥大考完了最是快乐，每个毛孔都放松了，骨头架子也似乎散了板。班班忙着排节目，说的，唱的，吹奏的，表演的，自娱自乐。最引人注目的莫过<u>于</u>文娱晚会。从编导、演出到搬桌子搭台，全是由学生担当。夏夜繁星闪烁，台的四角吊着四盏马灯，台下人头攒动，有时屏息谛听，有时笑得前俯后仰。说实在的，舞台上灯光昏暗，表演者的模样不清晰，不过是人影绰约而已，但有的节目迄今还依稀在目。

    ⑦暮春三月，江南草长，杂花生树，群莺乱飞之时，三五好友去踏青。周六下午不急于回家，总要在田野里撒腿跑一阵。菜花黄了，扑鼻清香，少不得信口悠悠吟诵“莫问早行奇绝处，四方八面野香来”“儿童急走追黄蝶，飞入菜花无处寻”，俨然宋人杨万里就在身边。与其说是走路，不如说是跑跳。小河流水潺潺，只要有一两块阶石，都要兴冲冲地站上去。这个弯下腰说：“我照镜子啦！”那个展开臂膀说：“看我能站在水上，有轻功。”彼此之间还要做做鬼脸。路旁的树枝有时也倒霉，我们手痒时折它一根，甩甩它，装作马鞭子用。心里甜蜜蜜的，那种高兴劲儿难以言表。

    ⑧走一路，洒一路欢声笑语，连地上的尘土也羡慕，不时地飞扬。然而，有时我们也会严肃得像历经沧桑的老人。镇江北固山是寒暑假必去之处，北固山不过一座小丘，在我心中却高大巍峨，有说不尽的滋味。登临山顶，回顾历史，遥望滚滚长江，不禁想起辛弃疾的《南乡子·登京口北固亭有怀》。大家吟诵之余，感慨系之，忧国忧民之思充盈胸际。

    ⑨每当此时，镇江中学校训“一切为民族”五个大字总凸现在眼前。“求学为什么？为了从愚昧走向文明，为了解救苦难的民族于水深火热之中……”老师激昂的话语揭示了求学的目的，诠释了校训的内涵。<u>为此，我们风华正茂的学生努力进取，把物质生活的贫乏与艰难踩在脚下，追求精神生活的充实与欢乐。</u>“一切为民族”这五个大字掷地铿锵，镌刻我心中，成为我铸造师魂的基因。

    （取材于回忆录《岁月如歌》，作者于漪②）

    【注释】①孟嘉落帽：东晋时期的孟嘉在宴会上，帽子被风吹落而不觉，后从容应对嘲弄，写出优美文章。②于漪（1929.2.7—2026.3.14），上海市特级教师。被国家授予“人民教育家”荣誉称号。'
- id: modern_（三）
  type: modern
  name: （三）
  q_range:
  - 23
  - 25
  body: '阅读下文，完成以下题目。

    ①如今，人工智能加速迭代，深入影响社会各行各业，·甚至·在某种程度上重塑着知识与智力的定义。面对这场深刻的变革，我们该如何定位自身，以确保技术始终服务于人，而非相反？

    ②要回答这个问题，或许可以从一个课堂片段中找到线索。语文课上，老师提问：“用一个字证明你不是人工智能，你会选什么？”有学生选择“妈”，有学生选择“慢”或“痛”。这些字体现的是亲情血缘，是生命节奏，是身体感受。这些回答形象地印证了“人之为人”的核心：不在于精准无误的逻辑演算，而在于对世界、对彼此的感受与共鸣。

    ③有学者提出，人除了有情感，还有道德、有纪律、有良知，这些是我们和机器的区别。人工智能是工具，方向和效用如何，归根结底还在于使用者。例如让人工智能赶作业，写论文，看似高效，实则跳过了理解、吸收知识的学习过程，已造成逻辑思考、表词达意能力的钝化。更有甚者，若利用人工智能生成假新闻，散播谣言，则会侵蚀社会信任的基石，最终反噬人类社会。可见，技术越普及，人文素养的底线越不能失守。

    ④全国政协委员朱松纯在谈到人才培养时认为，人工智能时代重要的不再是筛选谁更聪明，·而是·培养更有判断力、更有格局的人才。这意味着，强化人文素养，正是为了巩固人的主体性，确保我们在技术巨浪中不致迷失，能够清醒地判断方向，让人工智能为人所用，而不被其奴役。

    ⑤人文素养不仅关乎人的主体性，·也·会影响人工智能的系统架构。人工智能可以从海量数据中快速梳理重组，但无法产生追问“为什么”的好奇和探索世界的热情。试想，如果人类丧失了情感的复杂性、思考的深刻性、文化的多样性，那么以此为蓝本的人工智能的演进也会步履蹒跚。人类的人文高度，决定了技术的温度与边界。

    ⑥总之，我们应清醒地意识到：        。我们不仅要创造能理解人类价值观的人工智能，·更·要致力于培养能深刻理解自身、又能驾驭技术的“完整的人”。因为人类的未来不取决于技术，而取决于拥有人文精神的人类本身。

    （取材于2026年3月14日《人民日报》）'
