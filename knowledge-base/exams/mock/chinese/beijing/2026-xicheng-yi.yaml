  type: 单选
  score: 2
  stem: 下列对文中加点词语的分析，说法·不恰当·的一项是（   ）
  options:
    A: 第①段的“甚至”，突出了人工智能对人类社会影响之深。
    B: 第④段的“而是”，明确了人工智能时代人才培养的重点。
    C: 第⑤段的“也”，阐明人类的技术优势对人工智能的影响。
    D: 第⑥段的“更”，强调“完整的人”对人类未来的重要性。
  answer: C
  solution: C.错误。根据第⑤段第1句可知，“也”字在此处强调的是人文素养对人工智能系统架构的影响，而非“人类的技术优势”。C项将“也”理解为“人类的技术优势对人工智能的影响”，与原文意思不符。
