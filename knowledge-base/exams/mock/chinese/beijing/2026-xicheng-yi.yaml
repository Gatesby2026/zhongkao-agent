  body: '2026年是农历马年，学校将举办马文化主题展。同学草拟了展板内容，请你协助整理。

    要展板一文化长河中寻马马是具有独特内涵的生肖符号，富有深刻的文化意蕴。马被视为“六畜之首”，在中华民族历史中占有重要地位。中国对马的驯养，最早可追溯到距今三四千年的齐家文化时期。

    不马的驯养，不仅解放了人力，更驱动了农业与军事等领域的根本性变革，堪称人类文明进程中的一次历史性①。

    姓名中国自古以来就高度重视马的作用与价值，这一认识贯穿古代社会的多个领域。马是日常农耕和交通的工具:马匹耕地犁田，抢收抢种;马队运输物资，传递信息[甲]军马内驰骋，助力冲锋陷阵;车马礼制，彰显等级差异:马是军力的象征，也是权力的象征。

    马作为重要的文化载体，衍生出形式各异的民俗传统。春节期间，很多地方有挂“马到成功”主题年画、贴骏马窗花【乙】在庙会上跑竹马的习俗。在马王爷庙会上，人们向线主掌畜牧车马的马王爷虔诚祝祷，②六畜兴旺、出行平安。

    追溯 shù封追溯 shù②乞求②祈求密②祈求②乞求展板二古典文学中品马在中国古典文学长廊中，马是文人墨客抒怀言志的经典意象，承载着深厚的人文精神。

    北京市西城区九年级统一测试试卷语文2026.4第1页()“老骥伏枥，志在千里”，道出了东汉曹操的雄心壮志;“①，而无车马喧”，表现了东晋陶渊明的隐逸超然;“挥手自兹去，萧萧班马鸣”，寄寓着大唐李白的离别深情;“古道西风瘦马”，写尽了元代马致远的羁旅愁思。从韩愈“千里马常有，②”的无限慨叹，到辛弃疾“马作的卢飞快，③”的战场景象，马既是怀才不遇的象征，也是耀武扬威的见证。

    这些诗文中的马各得其所，共同绘制出马在中华传统文化中丰富的意象图谱，入木三分地体现了中国人的情感世界与精神追求。

    展板三美术展览中赏马徐悲鸿纪念馆于马年之初推出了“奔腾尺幅间-馆藏马主题精品展”。

    展览不仅为观众展出了徐悲鸿珍贵的收藏品，更以时间为轴展现了徐悲鸿奔马创作的演变轨迹。徐悲鸿打破了传统画马的桎梏，以西方解剖透视为骨，以中国水墨写意为魂，在几十年的艺术创作中，逐渐刻画了融汇西东、形神兼备的奔马美学风格。

    展览引领观众开启一段视觉与心灵之旅，感受一笔一墨间的生命律动。画作的每一笔都蕴藏着徐悲鸿对家国的关切，饱含着他对民族精神的呼唤。凝视这些奔马，我们不仅为徐悲鸿精湛的画艺所折服，还能感受到那份跨越时空的精神力量。

    ①小幅的纸张或绢布;②泛指文章或画作;③治理的范围。请你根据工具书释义和对文段的理解，向这位同学解说。(2分)8，有同学就展板三的内容写了一副对联，请你选择最恰当的下联。(2分)上联:解剖透视为骨，方寸能藏千里势下联:结语马，贯穿古今社稷民生，是耕战礼俗的重要依托;;马，奔腾于丹青尺幅之间，是民族奋进的不朽象征。纵观中华历史，马早已超越了寻常牲畜的本义，成为镌刻在中华文化基因里、兼具实用价值与精神内涵的文化符号。

    9.根据语境，请你在文段中的横线处补写一个分句。(2分)北京市西城区九年级统一测试试卷语文2026.4第2页()'
