- id: 10
  type: 古诗内容理解
  score: 3
  stem: '根据你的理解，在下面横线处填写恰当的内容。


    本词开篇描绘了词人梦中所见海天相接的图景。继而叙写她与①________的对话，一个“②________”字道尽词人空有才华而遭逢不幸的苦闷。最后化用③________的典故和“三山”的神话传说，富于浪漫色彩。'
  answer: ''
  solution: '①. 天帝    ②. 谩    ③. 大鹏高飞


    详解：第一空，从原文“仿佛梦魂归帝所，闻天语，殷勤问我归何处”可知，词人梦中魂归天帝居所，与天帝对话，因此对话对象是“天帝”。

    第二空，从原文“我报路长嗟日暮，学诗谩有惊人句”可知，“谩”是“空、徒然”的意思，直接点出词人空有满腹才华、惊人诗句，却在现实中无用武之地，道尽了她遭逢不幸、怀才不遇的苦闷与无奈。因此第②空应为“谩”。

    第三空，从原文“九万里风鹏正举”可知，此句化用《庄子·逍遥游》中大鹏“抟扶摇而上者九万里”的典故，结合“三山”神话，充满浪漫主义色彩，因此第③空填“大鹏高飞”。'
