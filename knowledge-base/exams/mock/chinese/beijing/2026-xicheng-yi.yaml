- id: 27
  type: 作文
  score: 0
  stem: '将“        与        ”补充完整，作为题目，写一篇作文。


    要求：将作文题目写在答题卡上。文体不限，诗歌除外。字数在600-800之间。不出现学校的真实校名、师生姓名等。'
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    我与老屋  推土机的轰鸣声从村头传来，我知道，老屋的倒计时开始了。  那是一座青砖黑瓦的老房子，爷爷说，它比父亲的年纪还大。墙角的青苔一年年变厚，木门上的漆一块块剥落，门框上刻着我从小到大的身高线，一条条歪歪扭扭，像在记录时光的脚步。  小时候，老屋是我的乐园。堂屋里的八仙桌，是我写作业的地方，桌子上还有我用圆珠笔刻下的“到此一游”。后院的枇杷树，每到夏天就结满金黄的果子，我爬上去摘，爷爷在下面喊：“小心点！别摔了！”树下的石凳被磨得光滑，那是奶奶坐着择菜、我和她分吃西瓜的地方。  老屋的夏天很热，只有一台老式吊扇，吱呀吱呀地转，声音像催眠曲。我躺在竹席上，听奶奶讲她年轻时的故事，讲着讲着，她就睡着了，手里的蒲扇还搭在我的肚子上。  冬天，老屋很冷，风从门缝里灌进来，呜呜地响。爷爷会把火盆搬到屋里，我们围坐在火边，烤红薯，嗑瓜子。火光映着爷爷的脸，沟壑纵横，但他的眼睛很亮。他总说：“这屋子虽旧，但暖和，是人住出来的。”  后来，我去了县城读书，回老屋的次数越来越少。每次回去，都觉得它又旧了一些，屋顶的瓦缺了几片，墙上的裂缝更长了。爷爷老了，不再生火盆，只用电暖器。他坐在藤椅上，望着窗外，嘴里念叨：“房子老了，我也老了。”  去年冬天，爷爷病重，我们把他接到城里。临走前，他让我扶他回老屋，里里外外看了一遍。他摸着门框上我的身高线，说：“你从这么点长到这么高，这屋都记着呢。”那天他坐在门槛上，很久很久，夕阳把他的影子拉得很长。  爷爷走后，老屋就空了。村里说要拆迁，推土机终于来了。我没有回去，不敢看。我知道，老屋不在了，但它在我的记忆里，永远不会倒。  那里有我的童年，有爷爷的烟斗，有奶奶的蒲扇，有枇杷树下的笑声，有火盆边的故事。老屋与我，一起走过了十五年。如今它要走了，但它给我的温暖，足够我用一辈子。


    详解：二、选材构思。选材上要坚持“以小见大”，选取自己亲身经历的真实素材，避开“成功与失败”“困难与坚持”这类过于陈旧泛化的选材方向，尽量结合自己独一无二的生活体验选材，比如有艺术爱好的同学可以围绕学业和爱好的关系选材，有亲情记忆的同学可以围绕自我成长和长辈生活的碰撞选材，构思上可以采用“误解关系—经历转变—感悟升华”的递进结构，先写自己初期对两个对象关系的错误认知，再通过具体的事件触发转变，最后点明主旨升华思考，让文章层次清晰，情感真实。比如补题“坚持与绽放”，就可以写自己练习舞蹈准备汇演，多次想要放弃，最终顶住压力登台的亲身经历，在行文中时时点出坚持对结果的推动作用，结尾再升华自己对二者关系的独特感悟。如补题为“槐花与奶奶”，可写小时候住在奶奶家，院子里有一棵老槐树，每年春天奶奶都会摘槐花给我做槐花糕，我带着槐花串和小伙伴疯玩，槐花是整个童年的甜味记忆；后来我进城读书很少回去，今年春天奶奶寄来一罐槐花酱，打开盖子闻到香味，所有和奶奶有关的记忆都涌了出来。构思上以“槐花香味”为线索，开头从眼前槐花酱的香味引入回忆，中间插叙童年在槐树下和奶奶相处的细节（比如奶奶摘槐花、蒸槐花糕的动作），结尾升华主旨，保证紧扣题目不偏题。'
