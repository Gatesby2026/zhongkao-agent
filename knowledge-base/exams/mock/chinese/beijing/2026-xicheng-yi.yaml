  stem: 文章在叙事中蕴含着深挚的情感：①________、母亲烧早饭，体现父母情；②________、灯下读书、文娱晚会、田野踏青，表现同窗情；写下的“檄文”被老师表扬，折射出③________；游山诵诗、想起校训，感受到厚重的家国情。
  answer: ''
  solution: '①. 父亲临终嘱托    ②. 同学帮忙打水    ③. 师生情


    详解：根据第①段可知，父亲临终前叮嘱子女勤学向善、孝顺母亲，饱含对孩子的殷切期许与深沉疼爱，寄托了厚重真挚的父母亲情。故可概括：父亲临终嘱托。

    根据第③段第四句可知，求学条件艰苦，同学们主动为集体打水、互帮互助、彼此照料，在清贫的求学时光里温暖相伴，生动体现了真挚淳朴的同窗情谊。故可概括：同学帮忙打水。

    根据第④段第二、四句可知，作者课堂遇同学恶作剧，坦然应对并成文，得到老师欣赏与批注夸赞，体现老师对学生的认可与赏识，流露温暖和睦的师生情。故可概括：师生情。'
