  stem: 有同学问：为什么用“奔腾尺幅间”作展览的标题？你查阅工具书，“尺幅”解释为：①小幅的纸张或绢布；②泛指文章或画作；③治理的范围。请你根据工具书释义和对文段的理解，向这位同学解说。
  answer: ''
  solution: '“奔腾尺幅间”指徐悲鸿的奔马画作，既点明画作中奔马在尺幅间的奔腾气势，也蕴含着徐悲鸿的家国关切与民族精神。


    详解：“尺幅”在题目中取工具书释义②“泛指文章或画作”，这里特指徐悲鸿的奔马画作。“奔腾尺幅间”有两层含义：一是点明展览内容是奔马画作，奔马虽画于小幅尺幅之上，却充满奔腾的气势与力量；二是呼应徐悲鸿画作的特点，以水墨写意的方式，在方寸之间展现奔马的神采与民族精神，富有诗意与感染力。'
