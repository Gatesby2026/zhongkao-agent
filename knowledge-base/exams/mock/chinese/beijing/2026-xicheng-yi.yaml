- id: 23
  type: 单选
  score: 2
  stem: 根据全文，在第⑥段横线处填写内容最恰当的一项是（   ）
  options:
    A: 人工智能越发展，越要强化人文素养
    B: 人除了情感，还有道德、纪律和良知
    C: 人文素养的培养和技术提升同样重要
    D: 人文素养对人工智能系统会产生影响
  answer: A
  solution: '根据第①段第1、2句可知，文章开篇提出人工智能加速迭代背景下，如何定位自身以确保技术服务于人的问题。第②至⑤段分别从人性核心、人文素养对个体主体性的巩固、技术伦理的影响以及对人工智能系统架构的作用等方面展开论述，层层递进，强调在人工智能发展中强化人文素养的必要性。第⑥段作为总结，应呼应全文中心论点。

    A.准确概括了全文主旨，与上下文衔接紧密；

    B.仅涉及第③段部分内容；

    C.“同样重要”未突出人文素养在人工智能时代的关键作用；

    D.仅涉及第⑤段内容，均不够全面。'
