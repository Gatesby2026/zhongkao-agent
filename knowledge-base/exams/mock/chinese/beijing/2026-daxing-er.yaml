- id: 19
  type: 现代文阅读
  score: 2
  stem: '学习上述三则材料后，你认为对抗内耗与焦虑的方法有：  <u>①</u>  、  <u>②</u>  、  <u>③</u>  。（3分）


    （二）阅读文章，完成第20-23题。（共12分）


    题目：___________


    张耘睿


    ①凛冽的寒风里，故乡的黄河褪去了浊浪奔腾的模样——大大小小的冰排顺流而下，在夕阳下碰撞出金红的光。这便是“流凌”，黄河一年中最震撼的时刻。


    ②零下十几度的深冬，风像刀子般刮过脸颊，光秃秃的树枝在冷空气中瑟瑟发抖，屋内暖气氤氲，人人都贪恋着温暖。可当我瞥见家中墙上悬挂的流凌照片，心瞬间被勾走，满心向往，只想立刻奔赴河岸。


    ③哪怕寒意刺骨，我也决意奔赴这场与黄河的冬日之约。我简单收拾好东西，拿起相机，直奔黄河岸边。


    ④一下车，太阳正要沉入天际。风依旧凛冽。芦苇被压弯了腰，远处路灯次第亮起——夕阳，真的要落了。


    ⑤我站在岸边的小土坡上俯视眼前的景象。就在那一刻，夕阳把最浓烈的红光泼洒在河面。那是怎样一幅景象！大片大片的冰排如流动的琉璃，在霞光中现出利落的几何之美。冰缝间的河水被染成暖红，每一块冰排都反射着耀眼的金光，彼此相拥、碰撞，缓缓流向远方。越冬的水鸟静立在薄冰上，望着落日凝神；待脚下薄冰微微裂开，便振翅冲向天空，镰刀似的翅膀划破寂静的空气。


    ⑥天色渐渐暗下，河水仍在做着最后的挣扎。它加快流速，试图延缓冰封的脚步，可气温不断下降，大块的流凌已挡在碎冰之前。光滑的冰面、厚重的冰层，被夕阳的红光穿透，更显澄澈通透。岸边堆积的大小冰排，在光晕笼罩下红得剔透，像被点燃的玉石。我被眼前的一切深深震撼，久久伫立，不愿移开目光。


    ⑦待夕阳完全沉下去了。我沿着河岸找了一块背风的大石坐下。月光渐渐亮起来，洒在整条河上。


    ⑧月光下的流凌褪去了夕阳的炽热，露出晶亮幽蓝的本色：大块的冰如时光淬炼的巨钻，内里凝着深邃的蓝，像藏着一河沉默的星河；细碎的冰凌晶莹剔透，边缘锋利，彼此碰撞、搏击，像无畏的勇士在寒冬里坚守生机。


    ⑨寒气透过厚衣钻进来，像细针轻轻扎着皮肤。风在耳边呼啸，冰层偶尔开裂，远处传来冰排碰撞的闷响。这些声响反而让四周显得更加寂静。对岸远处几点灯火，在辽阔夜空下渺小而温暖，更衬得眼前冰河壮阔无言。


    ⑩在这极冷又极静的地方，心里那些纷乱的念头渐渐消散，心下澄澈平静，再无烦扰。天地之间，仿佛只剩我与这条静静呼吸的河。


    ⑪坐在大石上，冰层下那“咕咚咕咚”的水声越来越清晰——<u>河水从未真正屈服，仍</u><u>在缝隙间倔强地涌动，如同大地深沉的叹息。</u>那声音浑厚如战鼓，粗犷而有力，一下一下，撞在胸口上。


    ⑫心底涌起深深的感动，更生出一种无言的自豪。我望着月光下那些幽蓝的冰凌——它们沉默地坚守着，在严寒中从未真正屈服。


    ⑬我想起李白的“黄河之水天上来”，写尽了黄河的奔腾壮阔。可眼前这凝固沉默的黄河，却藏着另一种力量——<u>冰封，何尝不是另一种奔流？</u>它把外露的汹涌，化作内敛的坚韧，就像这片土地上的人们，经历严寒却从不低头，在冰下默默积蓄力量，只等春天一到，便冲破冰冻，浩浩荡荡向东流去。


    ⑭这便是我执意奔赴的意义。不只是看一场自然奇观，更是与母亲河对话，触摸它最坚硬也最柔软的灵魂。它温柔时哺育大地，暴怒时浊浪滔天，寒冬里则披甲坚守，冰下热血从未停歇——这，正是我们民族的模样：能屈能伸，心怀希望，永远向着东方，向着黎明。


    ⑮一阵更强的风袭来，卷起冰面上的雪沫。我站起身，最后回望一眼月光下的琉璃世界，转身离开。来时觉得路很远，回去却觉得很快。车内暖气氤氲，与冰河世界恍如隔世，脸颊因冻痕回温微微发痒，心底却滚烫明亮。


    ⑯归家静坐沙发之上，抬眼再望墙面那幅黄河流凌照片。冰蓝铺展，熔金流光依旧分明，耳畔仿佛还回荡着冰河深处浑厚低沉的水声。那声响温柔如摇篮曲，雄浑似奋进战鼓，在心底久久萦绕，让人心生安宁，澄澈而沉静。


    （取材于《人民周刊》作者张耘睿的文章，有删改）'
