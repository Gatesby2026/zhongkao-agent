  body: <u>卢沟桥曾是西出北京的要道，自古便是折柳送别胜地的所在之处。</u>离人·即·将出京，亲友送至桥畔，折柳相赠，“柳”与“留”谐音，以此寄托惜别之情，离别的·氛·围弥漫桥头。金代赵秉文写下“落日卢沟桥上柳，送人几度出京华”，清代龚自珍感慨“五百狻猊屡送君”，两句诗共同烘托出绵长的离别情思。柳色青了又青，石狮静立无言，见证一场场别离。这燕京离愁并非凄苦，而是对远行人前路平安的牵挂与仕途顺遂的期许，是故土故人对远行人由衷的祝愿与寄托。
