  body: '（一）阅读下面材料，完成下17-19题。（共7分）

    材料一

    社会心理学中有两个现象：“自我参照效应”指人总以自我为中心，高估别人对自己的关注；“镜像自我”指我们常靠想象中他人的评价来定义自己。受这两种心理影响，我们常会过度揣测他人看法，反复怀疑自身，进而陷入精神内耗与焦虑。针对这一问题，传统智慧早有化解之道。如被尊为中医理论奠基之作的《黄帝内经》提出“恬淡虚无，精神内守”。意思是内心要平和，不起杂念，心境不随外物流转，不被外物扰乱心神，把精神能量收回自身，不向外耗散。又如明代儒家心学代表王阳明提出的“心即理”，主张价值标准本在自己的内心，不必向外求取认可。传统医学与哲学智慧直指内心症结，为人们化解焦虑、远离内耗提供了可行思路。

    材料二

    当我们认定一件事是困难且难以完成的，在做事过程中，我们常会觉得这件事消耗了大量的脑能量，使人非常疲惫，并萌生放弃的念头。一项关于“大脑能耗”的研究揭示了一个反直觉的真相：_________。既然如此，为何我们仍会感到格外疲惫？根据认知资源理论，大脑的认知资源是有限的，当我们以畏难、抵触的心态做事时，一方面大脑要分配资源完成任务，另一方面还要耗费大量资源对抗抵触情绪，压制逃避念头，有限的认知资源被严重分散、透支。造成疲惫感的主要原因不是大脑能量的枯竭，而是认知负荷过载与神经调控紊乱。由此产生了身心俱疲的主观感受。破解这一问题的关键是：只要你积极调整心态，把“难=做不到”转化为“难=成长契机”，主动重构认知，先迈出微小的一步，就能逐渐打破情绪对抗的壁垒，减少额外认知消耗，后续行动便会顺畅推进。这就像坐滑梯，只需克服站上高点的恐惧，一旦开始下滑，后续便无需对抗额外阻力。

    图1  不同大脑状态下的脑能量消耗对比

    | 大脑状态 | 脑能量消耗 |

    |---|---|

    | 休息（如：放空、发呆） | 1 |

    | 思考并处理简单的任务 | 1-1.05 |

    | 思考并处理困难的任务 | 1-1.05 |

    注：表中数值为相对值，是相对于“休息时大脑能耗”的倍数，这里把休息时的大脑能耗记为1。

    （数据来源：学术期刊《Trends in Cognitive Sciences》）

    材料三

    哈佛医学院等机构的研究表明，运动可诱导大脑分泌多种神经递质，作用于情绪与痛觉中枢，起到调节情绪、缓解身体痛感的作用。

    表2  运动所产生的相关神经递质，及其主要产生条件与核心作用

    | 神经递质 | 通俗别称 | 主要产生条件 | 核心作用 |

    |---|---|---|---|

    | 内啡肽 | 天然止痛剂 | 持续中低强度有氧运动 | 镇痛，消解身体疲劳，缓解焦虑 |

    | 多巴胺 | 动力驱动源 | 达成可实现的运动小目标 | 产生成就感、专注力、主动力 |

    | 血清素 | 情绪稳定剂 | 低强度长时间的有氧运动 | 稳定情绪，改善抑郁焦虑 |

    | 内源性大麻素 | 身心舒缓剂 | 中等强度有氧运动 | 舒缓身心压力，带来愉悦感 |

    | 强啡肽 | 强效镇痛剂 | 长期高强度超负荷运动 | 强效镇痛，易引发情绪低落 |

    注：表中为每种神经递质的主要分泌条件，运动中若满足多项条件，便可同步分泌、协同发挥作用。'
