  stem: '本文题目“无尽灯”在文中有多重意蕴，请结合全文内容，阐明你的理解。(3分)


    (三)阅读《韧字当头破万难》,完成24—26题。、共7分)


    韧字当头破万难


    (1)韧之为物，似柔实刚，似弱实强。它不似刀剑之锋芒毕露，亦不如雷霆之摧枯拉朽，却能在岁月磨洗中愈显其力。古人云：“绳锯木断，水滴石穿。”此非一日之功，全在一个韧字。韧字当头，方能破万难而行远。


    (2)春秋战国之际，越王勾践卧薪尝胆之事，最足为韧性之注脚。彼时吴王夫差大败越军，勾践为奴三年，尝粪问疾，受尽屈辱。常人处此境地，或一死了之，或苟且偷生。然勾践不然，他归国后悬胆于户，出入尝之，又卧于薪上，励精图治，终得灭吴雪耻。司马迁记此事，特著“苦心人，天不负”六字。勾践之韧，非匹夫之勇。他懂得在失败中汲取教训，在屈辱中积蓄力量，在漫长的等待中保持清醒。这种韧性，实为一种高度的生存智慧。


    (3)汉代张骞出使西域，亦是韧性之典范。他持汉节出使大月氏，途中为匈奴所虏，囚禁十年。十年间，匈奴单于“留骞十余岁，予妻，有子”，欲消磨其志。然而张骞“持汉节不失”，终得逃脱，继续西行。后虽未能说服大月氏共击匈奴，却带回了西域诸国情报及葡萄、苜蓿等物产，为丝绸之路的开辟奠定了基础。张骞之韧，在于其使命必达的精神。这种在极端困境中仍能保持初心、坚守使命的韧性，恰是中华民族开拓精神的生动写照。


    (4)近代中国的发展历程，更是一部韧性史诗。红军长征便是其中最为壮烈的篇章。1934年，中央红军在第五次反“围剿”失败后被迫战略转移。前方是数十万敌军的围追堵截，脚下是雪山草地的天险绝境，缺衣少食，弹药匮乏，红军将士跨越14个省、长驱二万五千里，进行了600余次战斗，最终实现胜利会师。正是百折不回的韧性，支撑这支队伍穿越雪山沼泽、闯过炮火硝烟。长征的胜利，不是偶然的奇迹，而是“韧”字在民族血脉中最极致的迸发。


    (5)韧之精神，古今一也。无论个人或民族，欲成大事，必先砺其韧性。因为世间最难之事，不是一时奋发，而是长久坚持；不是瞬间闪耀，而是持续的光芒。


    (6)一个“韧”字，既是中国经济在风浪中稳步前行的真实写照，也是亿万人民奋斗不息、追梦逐梦的生动反映。在新的一年里，面对日益严峻的风险挑战，面对繁重艰巨的使命任务，我们更要把“韧”字融入血脉，坚定信心、坚韧不拔，为实现“十五五”宏伟目标而努力奋斗。


    (取材于向贤彪同名文章)'
