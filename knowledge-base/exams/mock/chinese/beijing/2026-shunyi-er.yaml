  score: 2
  stem: '综合以上三则材料，可以从<u>①   </u>、<u>② </u>、<u>③ </u>等方面了解到“人工智能+教育”带给我国教育的深刻变革。(3分)


    (二)阅读《无尽灯》,完成20—23题。(共11分)


    无尽灯


    苏沧桑


    (1)丙午马年踏春而来的前夜，我回到了家乡玉环。故园春雨无声，将每一个归来的游子拥入它温润的怀抱。车子拐进沧桑文苑所在的漩门湾观光农业园时，肺腑间盈满了海岛初春特有的、混合着海风与泥土微腥的气息。我一直觉得，玉环岛上终年弥漫着的花香、果香、书香和万物蓬勃生长的气息，亦是幸福指数的体现。


    (2)一片光海蓦然撞入眼帘——它们流淌着，闪烁着，低语着。漩门湾丙午马年的盛大灯会，便这般将它的第一抹华彩赠予了深夜归来的游子。


    (3)新春，我和十几个老同学如约聚在了这光的海洋中。沿着观光农业园的小径和安静的无名小河游走，目光所及，尽是灯的河流，灯的山峦，灯的世界。


    (4)如定海神针般妥妥立在C位的，是神农广场的“璀璨玉环海润丰年”灯组。五个巨型花篮托举着五谷瓜果灯，耳边仿佛传来金秋时节四周稻浪的哗哗声。多年前，脚下的土地还是一片叫“漩门湾”的海域，现如今，家乡人围垦造田，硬是让海浪变成了稻浪。


    (5)同学阿福说起少时嗜书如命，放牛时也捧着本残破的《三国演义》。后来家里实在困难，把老牛卖给了一个宁波人。牛通人性，任他怎么赶，都一步一回头望着小主人，眼里滚下大颗的泪。阿福送出去好几里地，最后抱着牛脖子，哭得比牛哞更响。同学文贵则说，有一次他跑到同学达跃家蹭饭。达跃母亲用猪油炒的一大盘米粉干是至今难忘的顶级盛宴。那时的苦，是浸到骨子里的海水般的咸涩。那时的梦想，也渺小朴素得令人心酸。


    (6)“沧海桑田”，不是诗里的词句，是脚下实实在在的变迁，曾经巨浪滔天的“鬼门关”，早已被长堤挽住，化作了万顷平畴。灯火照亮的不只是夜色，更是一段改天换地的壮美史诗。


    (7)当我们来到“潮涌精卫魂”灯组前，一时都陷入了沉默。精卫鸟衔木的执拗身影，映着它背后的“云上粮仓”“百草织梦”图景，诠释了家乡人祖祖辈辈矢志不渝的拼搏精神。


    (8)走累了，便踱去沧桑文苑喝茶。文苑是旧舍改的，它静静坐落在灯海一隅。毗邻的草莓园主人已等在路边，手里提着两篮刚采摘的草莓与小番茄，还有一筐自家鸡生的蛋，蛋壳上还沾着一点干草屑。草莓园是左邻，柑橘园是右舍。我每次回来，都会应柑橘园主人之邀到他的菜园里“偷菜”。阳光下，菜畦间.脚边堆着他帮我砍的菜心、大白菜，拔的红萝卜。每次“偷菜”，我的裤腿和鞋子上都会沾满泥巴，<u>宛如故乡盖在游子身上的一枚枚打卡印章</u>。


    (9)围炉而坐，清茶氤氲，草莓的鲜香在齿间弥漫，我们聊起各自的近况。几个女同学像主人一样，洗好水果，默默为大家斟茶，提醒这个喝茶，招呼那个尝果，就像前日，在一号公路的泊岸聆潮茶咖馆举办的新春阅读主题分享会上，爱芬老师特别用心地去百年老店买了老家的各色传统糕点、谢年用的年糕，还做了一大碗海鲜面，用我的《等一碗乡愁》引出乡愁话题，招呼我们几个从外地赶回来的玉环籍作家和大学生们尝这尝那。其实，游子惦记故乡，也被故乡深深惦记。双向奔赴的默契，如同龙溪山里村的双缸酒，不烈，却醇厚入心。


    (10)夜深了，回来的路上，春雨不知何时又飘了起来。璀璨的灯海倒映在水中，被微雨点化出亿万个晃动的金圈，一圈套着一圈，无穷无尽。我曾说，故乡的美食，是一条脐带，连着游子的呼吸和心跳，镌刻进了游子的基因里。此刻漩门湾的灯火，何尝不是另一条脐带?它连着的，是这片山海的血脉与记忆。


    (11)传说千年前，唐代著名的法藏法师向武则天阐释《华严经》义理时，进行过一次直观教学演示“镜灯之阵”：当烛火点亮，光线在列阵的镜面间无尽地反射，每一面镜子里重重叠叠地映出无数佛像与无数灯火，构成了一灯映着千灯、无穷无尽、互融互摄的光影世界。


    (12)漩门湾的灯火，也似这无尽灯。这灯火，是渔火，是灯塔，是玉环岛绵延不尽的万家灯火，是这片土地上恣意绽放、宣告苦尽甘来的盛世华灯，它穿越时间，联结着玉环岛的过去‘和未来，也照亮了每一个游子的归途。


    (13)华夏大地上的万家灯火，也似这无尽灯，从未熄灭。无论走多远，只要回头望去，总有一片为游子亮着的、不语的、无尽的光之海。


    (取材于《光明日报》有删改)'
