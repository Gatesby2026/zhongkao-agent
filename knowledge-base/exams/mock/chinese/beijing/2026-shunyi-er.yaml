    第二组：青瓦韵四时


    甲同学：我曾站在高处俯瞰北京城那些保存完好的历史街区，成片的四合院错落有致，景色美不胜收。·鳞次栉比·的屋顶与绿树相互掩映，简直是·巧夺天工·。一方面，遵循标准形制的四合院，屋顶有着统一的尺度、节奏与韵律，规整端庄、气韵从容；另一方面，受传统礼制规制，院落规模各有不同，再加上屋舍本身高低错落，整片屋顶并非水平平铺，而是起伏有致。这种统一中的变化，正是四合院建筑之美。


    乙同学：我同意，不过我觉得这种“变化”在植物身上体现得更生动。国槐、海棠、石榴、丁香、·相映成趣·，以各异的姿态柔化了建筑硬朗的线条，为规整的院落格局注入灵动气息。四季流转，树叶由鹅黄转浓绿，再染金黄霜红；即便冬日枯枝，也以遒劲身姿点缀庭院。<u>草木四时景致各异，与四合院建筑相得益彰，尽显古院的岁月。</u>'
