  body: '(一)阅读下面材料,完成17—19题。(共7分)

    材料一

    近日，教育部等五部门联合印发《“人工智能+教育”行动计划》，旨在系统构建智能时代的教育体系，将育人之路引向更广阔的未来。

    人工智能带给教育的改变并非某一教学环节的小修小补，而是学校组织形态和资源供给体系的深刻重构。在办学模式上，将实现从相对封闭、单一供给的传统办学向开放共享、协同联动、无边界连接的智能办学转变。过去，学校更多依赖校内课程、校内教师和校内空间开展办学；而在智能时代，优质教育资源将以更加广泛的形式流动起来，在更大范围内链接课程、教师、平台和产业资源。学校要转向资源整合型、平台支撑型办学，推动形成政府、学校、企业、科研机构等多元参与的资源供给格局。尤其是在职业教育和高等教育领域，将进一步推动科教融汇、产教融合，探索校企协同开发课程、共建项目、共育人才的新机制，让学校教育更加贴近科技前沿、产业变革和真实问题情境。可以说，人工智能正在推动办学模式                 ，这本质上是办学组织的再造，也是教育改革的重要突破口。

    材料二

    随着《“人工智能+教育”行动计划》全面落地，未来五年，中小学教师的职业定位、工作模式、能力标准将迎来全方位变革。

    长期以来，中小学教师角色定位为知识传授者，承担着知识讲解、课堂讲授的核心职责，而《“人工智能+教育”行动计划》将打破这一定位。未来五年，人工智能将全面辅助教师完成知识点讲解习题批改、错题梳理、重复性答疑等基础教学工作。教师将逐步从机械性教学事务中解放出来。

    教师的核心角色将转向学习引导者与育人设计者。教师不再局限于课本知识的传授，而是依托智能教育平台分析学生的学习数据、认知特点、兴趣短板，设计分层教学、项目式学习、探究式学习方案，成为学生学习路径的规划者；同时，聚焦学生核心素养、创新思维、社交能力、数字素养的培养，回归立德树人的教育本质，成为学生精神成长的引路人。

    材料三

    在北京市一些学校出现了课间机器人。机器人会穿梭于走廊，提醒同学注意通行安全。它还可以变身“运动伙伴”，做简单的运动项目辅助同学舒展身体，活跃氛围。遇到有学习疑问的同学，机器人能用通俗易懂的语言讲解难题，辅助学生巩固课堂知识。同时，机器人能实时监测教室环境，全方位助力校园课间活动的有序开展。

    人工智能时代的教育不再是单向的知识传授，而是一种多维的学习体验，能够跨越时空的界限为学生提供多样的工具与资源。学生可以根据自己的兴趣和需求，制定个性化学习方案，通过教学辅助工具和智能体等应用，享受教育服务与支持，成为一个跨学科、跨领域、跨层次的个性化教育时代的学习者。'
