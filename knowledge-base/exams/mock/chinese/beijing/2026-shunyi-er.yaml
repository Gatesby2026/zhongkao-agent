  score: 2
  stem: '根据《鱼我所欲也》及下面的材料，在后面语段中的横线上填写恰当的内容。(3分)


    已而降将王世强复导大军①入广，建宁、泉、福皆降。知福州王刚中②遣使徇③兴化，文龙④斩之而纵其副以还，使持书责世强、刚中负国。遂发民兵自守，城中兵不满千，大兵来攻不克……通判曹澄孙开闩降；执文龙与其家人至军中，欲降之，不屈，左右凌⑤挫之，文龙指其腹曰：“此皆节义文章也，可相逼邪?”强之，卒不屈，乃械系⑥送杭州。文龙去兴化即不食，至杭饿死。


    (取材于《宋史》)


    注：①大军：元军。②王刚中：福州知州，已投降元军。③徇：巡行，这里指招降。④文龙：陈文龙，福建莆田人，南宋末年抗元名臣，此时驻守兴化。⑤凌：欺凌，侵犯。⑥械系：用刑具拘禁。


    孟子和陈文龙都认为人要坚守“<u> ①  </u>”，在关键时刻才能做出正确的选择。材料中陈文龙面对元军及叛将的劝降，他斩使拒降<u>、② </u>；城破被俘后，面对威逼凌辱，他指腹明志，称“<u>  ③  </u>”宁死不屈；在押送杭州途中，他绝食殉国，以死明志。'
