  - 7
  body: '假期，你和学习小组的同学一起参观了北京园林博物馆的“马文化展”。下面是同学们撰写的参观手记，现在请你协助整理、完善手记内容。

    手记一

    下面图片展现的是“马文化展”宣传海报上的“垌（jīng）野彭彭”四个字，这四个字出自《诗经·鲁颂·駧》。这首庙堂乐歌赞颂了鲁国国力的强盛，描绘的是远郊原野上骏马成群、车马奔腾的壮阔景象。“马文化展”以此为主题，彰显出中国马文化的深厚底蕴，传递出昂扬向上、奔腾不息的民族精神。

    ![](figures/image2.png)

    小组成员对于宣传海报上“垌野彭彭”的评价鉴赏正确的一项是（2分）

    A. 这四个字采用正楷笔法，既体现出《鲁颂》的庄重，又呼应骏马奔腾的动感。

    B. 这四个字采用行书笔法，刚柔相济，让笔墨形态与主题的文化内涵高度统一。

    C. “野”字采用隶书的笔法，行笔一波三折，既显大地的沉稳，又见原野的无垠。

    D. “彭彭”二字采用草书笔法，两个“彭”字形态各异，展现出群马奔腾的状态。

    手记二

    在十二生·肖·（xiào）中，马位列第七，与十二地支中的“午”对应，故称“午马”。午时阳气最盛，万物皆倦，唯马昂首挺立，尽显勃发之态。“午马”成为坚·韧·（rèn）不拔、昂扬奋进的精神象征。古人观照宇宙运行的节律，又从“午马”的昂扬姿态中·窥·（kuī）见人格特性。因此，“午马”不仅是纪年符号，也体现出古人体物悟道的智慧，还阐释了生肖文化中“天人相·应·（yìng）”的内涵。

    你审核手记中标注的字音，其中读音标注不正确的一项是（2分）

    A. 生肖 B. 坚韧不拔 C. 窥见 D. 天人相应

    手记三

    馆中陈列着许多含有马元素的古代园林建筑装饰材料，如名为“浮雕飞马砖”的陶质砖块，其腹内的祥云飞马浮雕惟妙惟肖。“祥云”兆示祥瑞【甲】“飞马”象征腾飞，体现出古人对美好生活的向往。再如“黄琉璃天马垂脊兽”，它常见于皇家园林建筑殿顶的垂脊上，多以三、五、七、九等单数出现。它最初的功能是固定瓦件，防止渗漏【乙】后来逐渐演变为兼具装饰功能与等级象征的建筑构件。这些兽端坐在檐角，给建筑增加无限意趣。梁思成评价道：“使本来极无趣笨拙的实际部分，成为整个建筑物美丽的冠冕。”

    【甲】【乙】两处标点的使用，你认为正确的一项是（2分）

    A.【甲】、【乙】， B.【甲】，【乙】、 C.【甲】，【乙】。 D.【甲】、【乙】、

    手记四

    在古代，马被誉为“兵甲之本，国之大用”，是改写战争格局、影响王朝兴衰的战略力量。展厅里设置了丰富多样的与马相关的互动体验项目：复刻“昭陵六骏”典故的“六骏征战”拼图闯关、考验排兵布阵智慧的经典游戏“华容道”、沉浸式的AI模拟骑马射击体验……这些互动项目将历史文化与趣味体验相结合，让厚重的马文化以更鲜活的方式，浸润到每一位观展者的心里。<u>在趣味互动中，不仅我们了解了诸多与马相关的历史文化，还感受到马在古代战争中举足轻重的地位。</u>

    “浸润”在物理学领域指液体与固体接触时，液体附着在固体表面并沿表面自发扩展，或渗透到固体内部的现象。你根据语境判断文段中的“浸润”的意思，下列不正确的一项是（2分）

    A. 活动渐进 B. 认知融入 C. 内涵渗透 D. 文化熏陶

    小组成员认为文段中画线的句子存在问题，请你修改。（2分）

    手记五

    “马韵新生”展区展出了大量与马相关的玉器、瓷器、绘画等。“青玉马上封侯坠”利用局部沁色的青玉，巧妙雕成一只伏于马背的猴子，巧借动物形象寄寓美好愿景。“青花狩猎图盘”盘心绘制三人策马行猎，动感十足，展现出当时的尚武精神。“马晋八骏图镜心”中八匹骏马膘肥体壮，骨肉匀亭，尽显皇家贡马之神韵。马，镌刻在中华文脉的精神图腾中，它  、  、  ，凝结着中华民族的审美智慧与精神风骨。

    根据文段内容，你将一组词语填在句中的横线处。下列恰当的一项是（2分）

    A. 精巧 刚健 传神 B. 精巧 传神 刚健 C. 刚健 精巧 传神 D. 刚健 传神 精巧

    结语

    砖瓦上刻画出的祥马纹饰，丹青中描绘出的昂首神骏，瓷盘间勾勒出的腾云骐骥，都是中华文明独有的审美印记。'
