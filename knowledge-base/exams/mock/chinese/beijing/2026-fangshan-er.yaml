  body: '（一）默写（共4分）

    初三年级在开展“古诗文中的经典意象”专题复习时，某同学制作了一张意象梳理卡，请你帮他补充完整。

    | 意象 | 诗文 | 意象批注 |

    |---|---|---|

    | 月 | 我寄愁心与明月，①  。（李白《闻王昌龄左迁龙标遥有此寄》） | 将月亮人格化，寄予了对友人的深切牵挂。 |

    | 雁 | ②  ，归雁入胡天。（王维《使至塞上》） | 借归雁衬托自身的漂泊无依，流露出远离故土的孤寂。 |

    | 酒 | ③  ，④ | “酒”入诗肠，滋味万千，被无数文人墨客用以遣怀抒志。 |

    （二）阅读《雁门太守行》，完成9-10题（共6分）

    雁门太守行

    李贺

    黑云压城城欲摧，甲光向日金鳞开。

    角声满天秋色里，塞上燕脂凝夜紫。

    半卷红旗临易水，霜重鼓寒声不起。

    报君黄金台上意，提携玉龙为君死。

    本诗既有对战斗进程的叙写，又有情感的抒发。开篇两句渲染了兵临城下的危急形势，三、四句侧面展现出战争的激烈悲壮，五、六句描绘①  的场面，最后运用典故表明将士们②  的情怀。（2分）

    “角声满天秋色里，塞上燕脂凝夜紫”两句中，“满”和“凝”极具表现力，请结合诗句内容简要分析其妙处。（4分）

    （三）阅读《愚公移山》，完成11-13题（共6分）

    太行、王屋二山，方七百里，高万仞，本在冀州之南，河阳之北。

    北山愚公者，年且九十，面山而居。惩山北之塞，出入之迂也，聚室而谋曰：“吾与汝毕力平险，指通豫南，达于汉阴，可乎？”杂然相许。其妻献疑曰：“以君之力，曾不能损魁父之丘，如太行、王屋何？且焉置土石？”杂曰：“投诸渤海之尾，隐土之北。”遂率子孙荷担者三夫，叩石垦壤，箕畚运于渤海之尾。邻人京城氏之孀妻有遗男，始龀，跳往助之。寒暑易节，始一反焉。

    河曲智叟笑而止之曰：“甚矣，汝之不惠！以残年余力，曾不能毁山之一毛，其如土石何？”北山愚公长息曰：“汝心之·固·，固不可彻，曾不若孀妻弱子。虽我之死，有子存焉。子又生孙，孙又生子；子又有子，子又有孙；子子孙孙无穷匮也，而山不加增，何苦而不平？”河曲智叟亡以应。

    操蛇之神闻之，惧其不已也，告之于帝。帝感其诚，命夸娥氏二子负二山，一厝朔东，一厝雍南。自此，冀之南，汉之阴，无陇断焉。

    “汝心之固”中的“固”与下列加点字中意思相同的一项是（2分）

    A. 顽·固·不化 B. ·固·若金汤 C. 君子·固·穷 D. 根深蒂·固·

    对“帝感其诚”中“诚”的理解·不恰当·的一项是（2分）

    A. 愚公不畏山高路远、敢于挑战的决心。

    B. 愚公艰苦奋斗、誓要铲平大山的恒心。

    C. 愚公为造福后代，甘愿付出的无私之心。

    D. 愚公答应他人之事必定践行的守信之心。

    根据《愚公移山》及下面的材料，在后面语段的横线处填写恰当的内容。（2分）

    赵襄主学御于王子期，俄而，与子期逐，三易马而三后。襄主曰：“子之教我御，术未尽也。”对曰：“术已尽，用之则过也。凡御之所贵者，马体安于车，人心调于马，而后可以进速致远。今君后则欲逮臣，先则恐逮于臣。夫诱道争远，非先则后也。而先后心皆在于臣，上何以调于马？此君之所以后也。”

    （取材于《韩非子·喻老》）

    【注释】①御：驾车。②逐：追赶，这里指赛马。③调：相协调。④逮：赶上，追及。⑤诱道争远：引导马匹进行长途赛跑。⑥上：通“尚”，还。

    面对目标，内心状态往往影响成败走向。愚公面对太行、王屋二山的阻隔，最终感动天帝成功移山，是因为他秉持①  的精神，带领子孙寒暑不辍地移山；赵襄主虽已从王子期处学全驾车技艺，却三战三败，原因在于他没有做到“②  ”，被输赢杂念干扰，无法“进速致远”。'
