    （三）阅读下面的文章，完成22-24题（共7分）

    ①“路再远，读书是前途；矿再近，不能背一辈子。”父亲这句朴实的话语，始终鞭策着四川凉山博士生杨孟平。年少时，家乡不少伙伴早早弃学背矿挣钱，而他在父母支持下勤学不辍，从华东理工大学一路保送硕博连读，更坚持回乡劝学，用亲身经历证明：读书是青年成长成才、担当时代使命的必由之路。

    ②中国人自古崇尚读书。从车胤囊萤夜读、孙康映雪读书的千古佳话，到“忠厚传家久，诗书继世长”的家训传承，读书早已融入中华民族的文化基因，赓续着民族的精神血脉。古往今来的无数事实昭示：事有所成，必是学有所成；学有所成，必是读有所得。

    ③青年正是学习知识、增长才干的黄金时期，读书更是青年积蓄力量、成长成才的必由之路。深圳快递小哥袁石剑利用碎片化时间坚持读书，最终圆了自己的大学梦；北大保安张俊成通过自学考入北京大学法律系，毕业后返乡办学，让更多贫困地区的孩子通过读书改变了命运。读书不仅能帮助青年打破出身的局限、实现职业的跃迁，更能拓宽人生的格局、丰富精神的世界。

    ④当今时代，知识更新加速，新技术新模式层出不穷，读书的价值愈发凸显。所有颠覆性创新，都建立在对前人知识的系统吸收与深度整合之上。国产大模型DeepSeek的研发团队就是典型：他们不仅深耕人工智能核心技术，更广泛涉猎语言学、哲学、数学等基础学科，将跨学科知识融会贯通，突破单一技术思维局限，打造出国际先进水平的国产通用大模型，为我国人工智能自主可控发展作出了重要贡献。在这个快速变化的时代，唯有坚持终身学习、持续阅读，才能更新知识结构，提升核心竞争力，在竞争中立于不败之地。

    ⑤读书不仅是增长知识的途径，更是润德端行、涵养品格的重要方式，是青年担当时代使命的底气所在。从古代先贤“为天地立心，为生民立命”的读书追求，到中国共产党人“依靠学习走到今天”的历史经验，读书始终与国家命运紧密相连。李大钊博通典籍，称“知识是引导人生到光明与真实境界的灯烛”；毛泽东青年时“饭可以一日不吃，觉可以一日不睡，书不可以一日不读”。从“为中华之崛起而读书”的周恩来，到“立志为强国建设、民族复兴而读书”的新时代青年，一代代中国人始终将个人阅读与国家前途紧密相连。唯有发扬“挤”和“钻”的精神，让读书成为精神追求与生活方式，才能在博览群书中明大德、守公德、严私德，成长为可堪大用、能担重任的栋梁之才。

    ⑥青春时光短暂而宝贵，不容虚度。以书为翼，我们既能在读书中充实自我、成就更好的人生，更能以真才实学服务人民、以创新创造贡献国家。不负韶华，潜心读书，让青春在为祖国、为人民的奉献中焕发出绚丽光彩，方能在人生的广阔舞台上书写无愧于时代的精彩答卷。

    （取材于黄超的文章）

