  body: '（一）阅读下面材料，完成15-17题（共7分）

    材料一

    提升青少年阅读素养，是落实立德树人根本任务的重要途径，对个体成长和国家发展具有深远意义。对青少年而言，持续的深度阅读能够帮助他们系统积累语言知识、提升表达能力，在潜移默化中锤炼逻辑思维、塑造健全人格。对国家和民族而言，青少年是文化传承与创新的核心力量，其阅读素养直接关系到中华优秀传统文化的赓续发展，进而影响到国家的文化软实力。

    材料二

    为深入贯彻“爱读书、读好书、善读书”的重要指示，全面落实全民阅读相关战略部署，推动《全民阅读促进条例》的科学实施，2026年4月15日，教育部正式发布《中国青少年阅读素养框架》，为全国青少年阅读素养提升提供了统一的指导标准。  。它立足青少年身心发展规律与阅读素养形成特点，将阅读素养划分为三个相互关联、层层递进的核心维度。其中，阅读知识是基础，解决“用什么读”的问题；阅读能力是核心，解决“会不会读”的问题；阅读价值是引领，解决“爱不爱读”“为何而读”的问题。这一科学的理论模型，为不同学段、不同类型的阅读教育活动制定了明确的目标，提出了具体的要求。

    材料三

    国家多部门联合印发通知，确定2026年4月20日至26日举办首届全民阅读活动周，主题为“共促全民阅读，共建书香社会”。活动周以落实《中国青少年阅读素养框架》为核心，将青少年阅读列为重中之重，统筹推进多项特色实践活动。

    各地依托书香校园建设，开展班级读书会、名著导读讲堂等校园阅读活动；通过青春领读行动，邀请作家、学者走进校园分享阅读经验；借助亲子共读及书香家庭创建等举措，推动阅读从校园延伸至家庭。这些活动将框架中的三维要求转化为可操作的具体实践，依托家校社联动机制，让阅读素养培育真正融入青少年的学习与生活，为青少年阅读素养的全面提升提供了坚实的实践支撑。

    根据以上三则材料，下列说法不符合文意的一项是（2分）

    A. 提升青少年阅读素养既能促进个体全面发展，也能助力国家文化软实力的提升。

    B. 《中国青少年阅读素养框架》为不同学段的阅读教育活动提出了目标与要求。

    C. 首届全民阅读活动周以青少年阅读为重中之重，开展了家校社协同的特色活动。

    D. 青少年阅读素养的高低是决定中华优秀传统文化能否赓续发展的唯一因素。

    根据材料二的内容，在文中横线处补写一句话，下列最恰当的一项是（2分）

    A. 该框架构建了三维理论模型并明确各维度的定位。

    B. 该框架重点关注青少年阅读能力的培养与提升。

    C. 该框架将指导各地开展丰富多彩的阅读实践活动。

    D. 该框架的发布将有力推动中华优秀传统文化的传承。

    围绕提升青少年阅读素养，以上三则材料分别从①  、②  、③  三个角度进行了介绍。（3分）

    （二）阅读《窗前的树》，完成18-21题（共11分）

    窗前的树

    ①我的窗前有一棵树。

    ②那是一棵高大的洋槐。树冠差不多可达六层的楼顶。粗壮的树干与三层的阳台相齐，碧绿而茂密的树叶部分正对着我的四楼的窗户。

    ③坐在我的书桌前，一树浓阴收入眼底。从春到秋，由晨至夜，任是着意的或是不经意抬头，终是满眼的赏心悦目。

    ④那树想必已生长了多年。我还没搬来的时候，它就站立在这里了。或许，我还没出生的时候，它就已成为一棵树了。我曾真心希望能拥有一扇能看到树的窗，后来果真如愿，我搬来以后，便天天享受着它的清凉与恬静，便因此很是满足，很觉幸福。

    ⑤洋槐在春天，似乎比其他的树都沉稳些。杨与柳都已翠叶青青，它才爆出米粒般大的嫩芽；只星星点点的一层隐绿，悄悄然决不喧哗。又过些日子，忽然就挂满了一串串葡萄似的花苞，又如一只只浅绿色的蜻蜓缀满树枝——当它张开翅膀跃跃欲飞时，薄薄的羽翼在春日温和的云朵下染织成一片耀眼的银色。那个清晨你会被一阵来自梦中的花香唤醒，那香味甘甜淡雅、撩人心脾却又若有若无。你寻着这馥郁走上阳台，你的身子为之一震，你的眼前为之一亮，顿时整个世界都因此灿烂而壮丽：【甲】<u>满满的一树雪白，袅袅低垂，如瀑布倾泻四溅。</u>银珠般的花瓣在清风中微微飘荡，花气熏人，人也陶醉。

    ⑥便设法用手勾一串鲜嫩的槐花，一小朵一小朵地放进嘴里，甜津津、凉丝丝的。轻轻地咽下，心也香了。

    ⑦洋槐开花的日子，是我们的槐花节。

    ⑧槐花开过，才知春是真的来了。铺在桌上的稿纸，便也文思灵动起来。那时的文字，就有了些许轻松。

    ⑨夏的洋槐，巍巍然郁郁葱葱，一派的生机勃发。骄阳下如华盖蔽日，烈焰下送来阵阵清风。夏日常有雨，暴雨如注时，偏爱久久站在窗前看我的槐树——它任凭狂风将树冠刮得东歪西倒，满树的绿叶呼号犹如一头发怒的雄狮，它翻滚，它旋转，它战栗，它呻吟。曾有好几次我以为它会被风暴折断，闪电与雷鸣照亮黑暗的瞬间，却窥见它的树干却始终岿然坚劲。大雨过后，它轻轻抖落树身的水珠，那一片片细碎光滑的叶子被雨水洗得发亮，饱含着水分，安详而平静。

    ⑩那个时刻我便为它幽幽地滋生出一种感动，自己的心似乎也变得干净而澄明。雨后清新的湿气萦绕书桌徘徊不去，我想这书桌会不会是用洋槐树木做成的呢？否则为何它负载着沉重的思维却依然结实有力。

    ⑪洋槐伴我一春一夏的绿色，到秋天，艳阳在树顶涂出一抹金黄，不几日，窗前已是装点得金碧辉煌。秋风乍起，金色的槐树叶如雨纷纷飘落，我的思路便常常被树叶的沙沙声打断。我明白那是一种告别的方式。它们从不缠缠绵绵凄凄切切，它们只是痛痛快快利利索索地向我挥挥手连头也不回。它们离开了槐树就好比清除了衰老抛去了陈旧，是一个必然、一种整合、一次更新。它们一日日稀疏凋零，安然地沉入泥土，把自己还原给自己。它们需要休养生息，一如我需要忘却所有的陈词滥调而寻找新的开始。所以凝望这棵斑驳而残缺的树，我并不怎样觉得感伤和悲凉——我内心很是平静，我知道它们明年还会再回来。

    ⑫冬天的洋槐是沉默的。【乙】<u>面对凛冬，它赤裸着全身一无遮挡，挺拔、骄傲地昂着头。</u>或许没人理会过它的存在，它活得孤独，却活得自信，活得潇洒。寒流摇撼它时，它黑色的枝条俨然如乐队指挥庄严的手臂，指挥着风的合奏。树叶落尽以后，树杈间露出一只褐色的鸟窝，肥硕的喜鹊啄着树枝喳喳欢叫，几只麻雀飞来飞去到我的阳台上寻食，偶尔还有乌鸦的黑影匆匆掠过，时喜时悲地营造出一派生命的气氛，使我常常猜测着鸟们的语言，也许是在提醒着我什么，引得我沉思良久。雪后的槐树一身素裹，银光璀璨，在阳光还未及融化它时，真不知是雪如槐花还是槐花如雪。

    ⑬四季的洋槐树便如一幅幅不倦变幻的图画，镶入我窗口这巨大的画框。冬去春来，老槐衰而复荣、败而复兴，重新回来的是原来那棵老槐；可是，我知道它已不再是原来的那棵槐树了。<u>它是一棵新的老树。</u>

    ⑭年复一年，我已同我的洋槐度过了六个春秋。在我的一生中，我与槐树无言相对的时间将超过所有的人。这段漫长又真实的日子，树与我无声的对话，便构成一种神秘的默契。

    （取材于张抗抗的同名文章）

