- id: 26
  type: 作文
  score: 0
  stem: "按要求作文 \n\n据《三国志》记载，刘备集团在取得益州根据地后进行了领导层分工，其中“诸葛亮为股肱”。查《现代汉语词典》，“股肱”的解释为“大腿和胳膊，比喻左右辅助得力的人”。在你的日常生活中，如课上课下、社会实践、研学旅行、志愿服务等等，当遇到困难或挑战时，你身边是否有“股肱”在？或者，你是别人的“股肱”？\
    \  \n\n请以“股肱的力量”为题，写一篇作文。文体不限，诗歌除外。\n\n要求：将作文题目写在答题卡上，作文内容积极向上，字数在600—800之间，不出现真实的学校校名、师生姓名等。"
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    股肱的力量  《三国志》载刘备得益州，以诸葛亮为股肱，赞其为左膀右臂、得力辅佐。股肱者，大腿与胳膊，是支撑身躯、托举前行的关键。于我而言，股肱不在朝堂，而在朝夕相伴的同窗与师长，在困境中伸手相援、并肩前行的温暖力量。  校运会前夕，我报名参加
    4×100 米接力。作为最后一棒，我既紧张又忐忑，担心掉棒、担心拖慢全队。训练时，我频频失误，脚步慌乱，接力棒几次从掌心滑落。我垂着头，满心沮丧，甚至想放弃比赛。这时，队长小宇走过来，轻轻拍我的肩：“别慌，我们一起练。” 他放慢速度，一遍遍示范交接棒的手势，握着我的手感受力度与节奏；另外两位队友也围过来，陪我反复起跑、冲刺，纠正我的摆臂与步伐。  夕阳把跑道染成金红，我们的影子叠在一起。汗水浸湿校服，却没人喊累。小宇总在我失误时说
    “再来一次”，队友们用鼓励的眼神驱散我的怯懦。他们是我赛场之上最可靠的股肱，用陪伴与信任，撑起我摇摇欲坠的信心。  比赛当天，发令枪响，前三棒队员奋力奔跑，交接棒流畅利落。接力棒稳稳递到我手中时，我听见看台上传来全班的呐喊。我咬紧牙关向前冲，耳边风声呼啸，脑海里全是训练时队友们的叮嘱。冲过终点线的那一刻，我们紧紧相拥，欢呼声响彻操场。那一刻我懂得，个人的力量有限，而股肱之力，是同心协力的支撑，是彼此托举的温暖。  志愿服务中，我也曾成为别人的股肱。社区敬老活动里，我帮老人打扫房间、朗读报纸；校园大扫除时，我主动承担最重的任务，协助同学整理图书、擦拭门窗。当老人露出笑容，当班级获评文明寝室，我真切感受到，成为他人的左膀右臂，是责任，更是幸福。  股肱的力量，从不是一人独强，而是守望相助、携手共进。诸葛亮以才智辅佐刘备，成就蜀汉基业；我们以真诚与担当陪伴彼此，跨越成长的坎坷。人生路上，总有风雨与挑战，愿我们都能遇见值得信赖的股肱，也愿我们都能成为别人的股肱，以微光汇聚暖阳，以并肩书写成长。


    详解：第二，构思选材。本题适合写成记叙文。选材需聚焦生活中真实可感的“股肱”瞬间，比如小组合作探究难题时同学并肩互助、运动会上同伴相互鼓励坚持跑完赛程、研学旅行中彼此照应帮扶、班级劳动中分工协作共担任务、志愿服务里同伴携手完成工作等具体内容。写作时要聚焦细节刻画，比如遇到难题时同伴耐心讲解的神情、坚持不下时身旁一句暖心的鼓励、分工合作时默契配合的举动，将这些细节与自己内心的感动、支撑与成长相融；结构上，开头由“股肱”词义引出文题，点明身边自有股肱相伴；中间详写一次相伴相助、互为支撑的具体经历，细致刻画彼此扶持的过程与内心感受，真切体现股肱的力量；结尾回扣题目内涵，点明股肱是陪伴、是帮扶、是同心共进，升华互帮互助、携手成长的主旨。'
