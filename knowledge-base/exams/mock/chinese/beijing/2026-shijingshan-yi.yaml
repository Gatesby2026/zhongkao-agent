  solution: '西南各少数民族流传着许多和诸葛亮相关的传说故事


    详解：根据材料二第二、三句可知，诸葛亮在南中推广牛耕、教百姓务农桑，极大地推动了当地农业与生活方式的进步，实实在在造福了西南百姓。

    根据材料二所附表格整表内容可知，基诺族、苗族、白族都留存着不少和诸葛亮相关的民间趣闻与生活传说，覆盖农事、手艺、衣食等多个方面。

    根据材料二横线前一句可知，有这些丰富的少数民族民间故事作为佐证，恰好能够间接佐证诸葛亮开发南中、带动地方经济发展的历史功绩。

    示例：西南多个少数民族中都流传着诸葛亮教民发展生产、改善生活的传说。'
