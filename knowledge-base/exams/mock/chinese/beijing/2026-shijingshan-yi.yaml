  solution: '①. 诸葛亮殿    ②. 感受后来者的情感共鸣


    详解：第一空，根据第③段第一句可知，作者穿过院落向诸葛亮殿走去，随后在殿内的沉思中生出诸多“假如”式的遐想，因此这里填写“诸葛亮殿”。

