  type: 现代文阅读
  score: 3
  stem: 综合三则材料，西南少数民族“诸葛亮崇拜”现象的成因有_______、_______、_______。
  answer: ''
  solution: '①. 诸葛亮南征采取攻心安抚政策，赢得民心    ②. 推动南中经济发展、传授生产生活技艺惠及百姓    ③. 西南民众感念其恩德加以尊崇，后世统治者宣扬儒家忠义观助推其由人成神


    详解：根据材料一第四至七句可知，诸葛亮南征时采用“攻心为上”的策略，战后推行“和夷”政策，赢得了当地百姓的拥护与爱戴，这是崇拜形成的历史基础。

    根据材料二第一至三句及表1可知，诸葛亮在南中推广牛耕、传授生产技术、改善民生，推动当地经济发展，这些实实在在的惠民举措，让民众对他心怀感激，这是崇拜形成的现实基础。

    根据材料三第②段第一至三句可知，明清统治者为宣扬儒家忠义观，将诸葛亮塑造为伦理典范，加上长期的文化涵养，使他的形象在西南地区被不断神化，这是崇拜形成的文化助推力。'
