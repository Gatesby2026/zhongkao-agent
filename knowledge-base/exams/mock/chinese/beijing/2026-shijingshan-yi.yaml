  body: '阅读下面的文章，完成小题。

    ①诸葛亮是著名的贤相，长久以来深受国人的推崇和尊敬：统治者旌表他；文人士大夫歌颂他；劳动人民纪念他。这种崇高地位的形成主要取决于诸葛亮本人的坚贞节操和盖世功勋，但不可否认的是，________。

    ②在杜甫之前，李白、岑参等也有专咏诸葛亮的诗。·但是·，这些诗歌无论在数量上、认识的深度上，还是在艺术水平以及对后人的影响上，都不成气候，直至杜甫，歌咏诸葛亮的诗才渐成大观。杜甫诗共有《蜀相》《武侯庙》《八阵图》等9首专咏诸葛亮，还有15首咏及诸葛亮。在诗中，杜甫对诸葛亮的品质、才华、功绩做了全面而精辟的评价和热情的歌颂。“三顾频烦天下计，两朝开济老臣心”“犹闻辞后主，不复卧南阳”，生动刻画出其殚精竭虑、不辞劳苦的股肱老臣形象，赞美了他忠贞不二的高尚情操和鞠躬尽瘁的献身精神；“功盖三分国，名成八阵图”“伯仲之间见伊吕，指挥若定失萧曹”，衷心歌颂其雄才大略和赫赫功勋；“武侯祠屋常邻近，一体君臣祭祀同”“洒落君臣契，飞腾战伐名”，表现了杜甫对刘备、诸葛亮君臣遇合的艳羡，并藉此抒发作者的一腔激愤：“志士幽人莫怨嗟，古来才大难为用。”同时，杜甫也为诸葛亮壮志难酬的悲剧命运痛惜：“出师未捷身先死，长使英雄泪满襟”。他对诸葛亮的认识远远高于常人。莫砺锋先生曾指出：“朱熹、张栻对诸葛亮的评价并未超出杜甫所确立的高度，这项本应由朱、张这样的大儒来进行的价值判断早就由诗人杜甫完成了。”

    ③家庭的文化熏陶、丰富的生活经历、深厚真挚的情感，加上精益求精的创作态度，使杜甫的咏诸葛亮诗格律精严、词警意丰、风格多样，在艺术水平上达到了此类诗歌的顶峰。而诸葛亮的美名也就随着这些优秀篇章四海传扬。

    ④进入北宋后，宋人对于杜甫的高贵品质、炉火纯青的诗歌艺术技巧逐渐有了深刻的认识，如苏轼称赞杜诗“故诗至于杜子美、文至于韩退之、书至于颜鲁公、画至于吴道子，而古今之变，天下之能事毕矣”，认为杜诗代表了古典诗歌创作的顶峰。基于这种·普遍·的推重，杜甫在宋代被尊为“诗圣”，他的诗也在宋代广泛流传，因而杜诗中对诸葛亮的推崇也必然对宋人产生影响。而事实也正是如此，今天检索资料，会发现宋人将诸葛亮和杜甫二人联系起来论述的言论俯拾即是，以孔明来解读杜诗，也以杜诗来认识孔明，所谓读杜诗“想见孔明风采”即此。从中我们完全可以看到优秀的文学作品对人们产生的巨大影响力。

    ⑤就杜甫和诸葛亮二人而言，他们在思想上有着很多共通之处：都深受儒家思想熏陶，都有济世救民的抱负。尤其在忧国忧民、忠贞恭勤这两点上，他们是·完全·相通的。很多宋人把他们当作心意相通的异代知己。如陆游诗《思夔州》：“武侯八阵孙吴法，工部十诗韶頀音。遗碛故祠春草合，略无人解两公心。”朱熹也对他们的忠贞不二的高洁品质推崇备至，他从历史上选出五位贤人，号称“五君子”，诸葛亮和杜甫就比肩前列。

    ⑥苏轼有言，寂寂无名的黄四娘托杜诗“黄四娘家花满蹊”一句而不朽。葛立方说草堂之名与其山川草木“皆因公诗以为不朽之传”。·的确·，时至今日，无数的风流人物已泯灭无闻，王谢华堂也早已经化为灰土，但是杜甫的草堂依然存在，只要人们还读杜诗，就一定知道黄四娘。作为一个深受杜甫敬重和极力歌颂的一代名相，诸葛亮自然会被推崇杜甫的宋人所重视，而他本人确实是符合儒家道德规范、集文治武功于一身、智计无双的忠臣贤相的典范，也就顺理成章地备受人们推崇了。'
