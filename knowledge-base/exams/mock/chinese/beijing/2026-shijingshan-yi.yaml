  type: 单选
  score: 2
  stem: '第二组同学的研究成果是《亦人亦神诸葛亮》。下面文稿中成语使用不恰当的一项是（   ）


    读《三国志》，我们看到的诸葛亮是白璧微瑕、有血有肉的真实的人。而读《三国演义》，我们看到的诸葛亮既是·足智多谋·的统帅，又是·巧舌如簧·的外交家，甚至是呼风唤雨、未卜先知的活神仙。罗贯中“优化”诸葛亮主要采用了两种方法，一是·移花接木·，将孙权的“草船借箭”、文聘的“空城计”统统给了诸葛亮；一是·无中生有·，虚构了“舌战群儒”“借东风”“三气周瑜”等故事，就是为了塑造一个近乎完美的诸葛亮形象。'
  options:
    A: 足智多谋
    B: 巧舌如簧
    C: 移花接木
    D: 无中生有
  answer: B
  solution: B.巧舌如簧是贬义词，形容人能说会道、花言巧语，善于狡辩，带有贬义色彩。文中是赞美诸葛亮作为外交家口才出众、善于论辩，应用褒义成语，用巧舌如簧感情色彩不当，成语使用不恰当。
