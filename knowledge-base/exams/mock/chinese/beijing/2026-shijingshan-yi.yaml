  stem: 虚实结合是散文常用手法，实写指眼前真实看到的事物，虚写指由眼前事物引发的联想、想象、回忆和内心感受。结合本文第④段，说明其起到的作用。
  answer: ''
  solution: '虚实结合。实写诸葛亮端坐在龛台上，虚写作者的“假如”。通过虚写，表达了对诸葛亮的惋惜和遗憾之情，深化了文章主题，即诸葛亮虽输但赢得所有人的心。


    详解：根据第④段第一句可知，虚写部分是作者由眼前景象生发的一系列“假如”遐想，比如假设他生在盛世、或有更长寿命、或做出不同选择。

    根据第④段第二句可知，实写部分是诸葛亮依旧静坐于龛台之上、神态宁静的模样；

    虚实结合的手法，一方面用实写的沉稳形象，与虚写的波澜想象形成对比，突出诸葛亮顺应天命、从容沉静的品格；另一方面，通过这些“假如”，把作者对诸葛亮壮志未酬的惋惜、遗憾之情推向顶点，既深化了诸葛亮虽功业未竟却赢得后世人心的悲剧美感，也为下文阐述其精神化为民族魂的主题做了铺垫。'
