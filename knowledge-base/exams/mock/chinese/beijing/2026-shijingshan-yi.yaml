  body: '阅读《武侯祠前的沉思》，完成小题。

    武侯祠前的沉思

    ①中国历史上有无数个名人，但没有谁能像诸葛亮这样引起人们长久不衰的思念；中国大地上有无数座祠堂，但没有哪一座能像成都武侯祠这样，让人生出无限的崇敬、无尽的思考和深深的遗憾。这座带有传奇色彩的建筑，令海内外所有的崇拜者一提起它就产生一种神秘的向往。

    ②武侯祠坐落在成都市区略偏南的闹市。两棵古榕为屏，一对古狮拱卫，当街一座朱红飞檐的庙门。你只要往门口一站，一种尘世暂离而圣地在即的庄严肃穆之感便油然而生。进门是一庭院，满院绿树披道，杂花映目，一条五十米长的甬道直达二门，路两侧各有唐代、明代的古碑一座。这绿荫的清凉和古碑的幽远先教你有一种感情的准备，我们将去造访一位一千七百年前的哲人。

    ③我穿过一座又一座的院落，悄悄地向诸葛亮殿走去。诸葛亮端坐在正中的龛台上，头戴纶巾，手持羽扇，正凝神沉思。往事越千年，历史的风尘不能掩遮他聪慧的目光，墙外车马的喧嚣也不能把他从沉思中唤醒。他的左右是其子诸葛瞻，其孙诸葛尚。瞻与尚在诸葛亮死后都为蜀汉政权战死沙场。殿后有铜鼓三面，为丞相当初治军之用，已绿锈斑驳，却余威尚存。我默对良久，隐隐如闻金戈铁马声。殿的左右两壁书写着他的两篇名文，左为《隆中对》，条分缕析，预知数十年后天下事；右为《出师表》，慷慨陈词，痛表一颗忧国忧民的心。我透过他深沉的目光，努力想从中发现这位东方“思想家”的过去。我看到他在国乱家丧之时，布衣粗茶，耕读山中；我看到他初出茅庐，羽扇轻轻一挥，八十万曹兵灰飞烟灭；我看到他在斩马谡时那一滴难言的混浊泪；我看到他在向后主自报家产时那一颗坦然无私的心。记得小时读《三国》，总希望蜀国能赢，那实在不是为了刘备，而是为了诸葛亮。这样一位才比天高、德昭宇宙的人不赢，真是天理不容。但他还是输了，上天为中国历史安排了一出最雄壮的悲剧。

    ④假如他生在古周、盛唐，他会成为周公、魏征；假如上天再给他十年时间（活到63岁不算老吧），他也许会再造一个盛汉；假如他少一点愚忠，真按刘备的遗言，将阿斗取而代之，也许会又建一个什么新朝。我心中四海翻腾作着这许多的“假如”，抬头一看，诸葛亮还是那样安静地坐着，目光更加明净，手中的羽扇像刚刚挥过一下。我不觉可笑自己的胡思乱想。我知道他已这样静坐默想一千七百年，他知道天命不可违，英雄无法造一个时势。

    ⑤一千七百年前，诸葛亮输给了曹魏，他却赢得了从此后所有人的心。我从大殿上走下，沿着回廊在院中漫步。这个天井式的院落像一个历史的隧道，我们随手可翻捡到唐宋遗物，甚至还可驻足廊下与古人、故人聊上几句。杜甫是到这祠里最多的。他的名句“出师未捷身先死，长使英雄泪满襟”唱出了这个悲剧的主调。院东有一块唐碑，正面、背面、两侧或文或诗，密密麻麻，都在与杜甫做着悲壮的酬唱。南面东西两廊的墙上嵌着岳飞草书的前后《出师表》，笔走龙蛇，倒海翻江，黑底白字在幽暗的廊中如长夜闪电，我默读着“临表涕零，不知所云”，读着“汉贼不两立，王业不偏安”，<u>看那墨痕如涕如泪，笔锋如枪如戟，</u>我听到了这两位忠臣良将遥隔九百年的灵魂共鸣。这座天井式的祠院一千七百年来就这样始终为诸葛亮的英气所笼罩，并慢慢积聚而成为一种民族魂。我看到一个个的后来者，他们在这里扼腕叹息、仰天长呼或沉思默想。他们中有诗人，有将军，有朝廷的大臣，有封疆大吏，甚至还有割据巴蜀的草头王。但不管什么人，不管来自什么出身，负有什么使命，只要在这个天井小院里一站，就受到一种庄严的召唤。人人都为他的凛然正气所感召，都为他的忠义之举所激动，都为他的淡泊之志所净化，都为他的聪慧才智所倾倒。人有才不难，历史上如秦桧那样的大奸也有歪才；有德也不难，天下与人为善者不乏其人，难的是德才兼备，有才又肯为天下人兴利，有功又不自傲。

    ⑥历史早已过去，我们现在追溯旧事，也未必对“曹贼”那样仇恨，但对诸葛亮却更觉亲切。这说明诸葛亮在那场历史斗争中并不单纯地为克曹灭魏，他不过是要实现自己的治国理想，是在实践自己的做人规范，他在试着把聪明才智发挥到极限，蜀、魏、吴之争不过是这三种实验的一个载体。他借此实现了作为一个人，一个历史伟人的价值。史载公元347年，桓温征蜀，犹见武侯时小吏，年百岁余。温问曰：“诸葛丞相今谁与比？”答曰：“诸葛在时，亦不觉异，自公没后，不见其比。”此事未必可信，但诸葛亮确实实现了超时空的存在。古往今来有两种人，一种人为现在而活，拼命享受，死而后已；一种人为理想而生，鞠躬尽瘁，死而后已。一个人不管他的官位多大，总要还原为人；不管他的寿命多长，总有寿终之日；而只有极少数人才有幸被百姓筛选、历史擢拔而为神，享四时之祀，得到永恒。

    ⑦我在祠中盘桓半日，临别时又在武侯像前伫立一会儿，他还是那样，目光泉水般的明净，手中的羽扇轻轻抬起，一动也不动。

    （取材于梁衡同名文章）'
