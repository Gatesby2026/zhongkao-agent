- id: 24
  type: 名著阅读
  score: 5
  stem: 鲁迅对《三国演义》中诸葛亮形象的评价是“状诸葛之多智而近妖”，即诸葛亮的智慧被过度神化，致人物失真。小说的人物塑造要真实、合理，避免标签化，应尽量展现人物性格的复杂性和多面性。请从《水浒传》《西游记》《骆驼祥子》《钢铁是怎样炼成的》中任·选一个主要人物·，谈谈这个人物塑造得是否真实、合理。（100字左右）
  answer: ''
  solution: '示例一（鲁智深《水浒传》）  鲁智深塑造真实合理。他路见不平拳打镇关西，仗义救助金氏父女，心怀侠义；又因不守戒律大闹五台山，喝酒吃肉、冲撞僧人，性情粗犷鲁莽。既有英雄善良的一面，又有凡人随性鲁莽的缺点，性格立体不脸谱化。  示例二（孙悟空《西游记》）  孙悟空塑造贴合人性，十分合理。他三打白骨精嫉恶如仇，尽心保护唐僧；却因性情刚烈，被唐僧误解后赌气重回花果山，遇事也常无力降妖、四处求助神仙。有神通也有脾气、有委屈、有无奈，没有被神化失真。  示例三（祥子《骆驼祥子》）  祥子人物塑造真实合理。他初到北平，省吃俭用苦干三年买新车，勤劳上进要强；经历车被抢、钱被骗、小福子自尽等连环打击后，彻底沦为吃喝嫖赌、混日子的行尸走肉。完整写出底层人被现实摧毁的蜕变，合乎情理。  示例四（保尔《钢铁是怎样炼成的》）  保尔的人物塑造略显不合理。他战场负伤、修路染重病、全身瘫痪双目失明，接连遭遇人生绝境，却始终毫不动摇、放弃个人一切全身心投入事业。几乎没有普通人的消沉、自私与软弱，被过度理想化完美化，缺少真实人性的挣扎。


    详解：示例一（林冲《水浒传》）

    林冲塑造得真实合理。他起初安分守己、隐忍退让，只想安稳度日；遭高俅步步陷害后，才彻底反抗走上梁山。他既有懦弱隐忍的一面，也有刚烈侠义的一面，性格随境遇转变，层次丰富，十分贴合普通人的人性特点。

    示例二（唐僧《西游记》）

    唐僧形象塑造真实合理。他一心向佛、信念坚定，坚守取经初心；却肉眼凡胎、不辨妖邪，固执迂腐，常错怪孙悟空。并非完美圣僧，有着普通人的愚昧、固执与慈悲，性格多面，不刻板失真。

    示例三（虎妞《骆驼祥子》）

    虎妞塑造得真实立体。她泼辣霸道、精明市侩，算计控制祥子；内心却渴望真挚情感，向往安稳家庭生活。作者没有将她简单塑造成恶人，兼具蛮横、自私与可悲的一面，性格复杂，塑造合乎人情常理。

    示例四（《钢铁是怎样炼成的》保尔）

    我认为保尔的人物塑造有不合理之处。他意志被过度拔高，一次次遭遇重病、负伤、绝境，仍从未动摇、一味牺牲奉献，极少有普通人的私欲、退缩与倦怠。人物被理想标签固化，近乎完美圣人，缺少普通人的性格弱点，略显刻意失真。'
