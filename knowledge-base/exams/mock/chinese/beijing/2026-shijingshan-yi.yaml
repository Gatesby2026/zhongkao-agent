  stem: 下列对文中加点词语的分析，说法·不恰当·的一项是（   ）
  options:
    A: 第②段中的“但是”，以转折突出了杜甫咏诸葛诗的重要地位。
    B: 第④段中的“普遍”，体现宋人推重杜诗的深度、广度和力度。
    C: 第⑤段中的“完全”，强调杜甫和诸葛亮在这两点上高度一致。
    D: 第⑥段中的“的确”，肯定了黄四娘和草堂因杜诗不朽的看法。
  answer: B
  solution: B. 根据第④段“基于这种普遍的推重，杜甫在宋代被尊为‘诗圣’，他的诗也在宋代广泛流传”可知，“普遍”强调的是宋人对杜诗推重的广度，即大多数人的态度，但并未直接体现推重的“深度”（如理解的深刻程度）与“力度”（如推崇的强烈程度）。
