  type: 主观填空
  score: 2
  stem: '第六组同学撰写成果集的结语。请根据语境，在文稿的横线上填写恰当的内容。


    从一介布衣到一代鼎臣，诸葛孔明为兴复汉室“鞠躬尽瘁，死而后已”，他的雄才大略与高洁品德，如同展翅高翔于万古云霄中的鸾凤，绝世独立，受历代敬仰。正如杜甫诗中“万古云霄一羽毛”的赞语，万古为不尽的时日，云霄为不尽的空间，在茫茫不尽的时空之中，仅此一羽，至高至洁。这一羽，_______，_______；这一羽，运筹帷幄，智计卓绝；这一羽，笔抒忠魂，文耀千秋。“至今千载慕冥鸿”，十多座武侯祠散落九州，从汉中到成都，从古隆中到五丈原，那一砖一瓦写就了“卧龙”传奇，每一次抬脚迈进门槛，都是与历史的一次对视：丹心一片凌霄上，千古犹怀一羽毛。'
