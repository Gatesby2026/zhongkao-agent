- id: 4
  type: 主观填空
  score: 2
  stem: '第三组同学向大家介绍《绝世妙人须此绝世妙文以副之——谈〈三国演义〉诸葛亮出场的艺术处理》。他们想用一句话解说清楚下面文稿中“染叶衬花”的意思。查《现代汉语词典》，“染”的意思是“用染料着色”。根据词典释义及文段内容，“染叶衬花”在文中具体指_________。


    作者将写孔明，先写司马徽“明于知人，识得英雄”，这样的人推崇孔明，“二人得一，可安天下”；再写徐庶善于用兵，设伏，破阵，取城，这样的人说他和诸葛亮相比“譬犹驽马并麒麟，寒鸦配鸾凤耳”。如此·“··染叶衬花·”，虽然未见孔明其人，但其不同凡响已自在其中，之后的“三顾茅庐”就是瓜熟蒂落、水到渠成了。'
  answer: ''
  solution: '先描写司马徽、徐庶这些次要人物（叶），用他们的学识、才干与高度推崇来烘托渲染，以此衬托突出诸葛亮（花）的超凡出众、才华盖世。


    详解：结合词典中“染”是用染料着色的意思，“染叶衬花”就是先渲染烘托次要的“叶”，再衬托突出主要的“花”；文中先着力描写司马徽识人善鉴、极力推崇诸葛亮，又写徐庶才干出众却自愧不如诸葛亮，以司马徽、徐庶这些次要人物作为“叶”加以渲染铺垫，从而侧面烘托出诸葛亮超凡脱俗、才智超群的不凡形象。'
