    场的艺术处理》。他们想用一句话解说清楚下面文稿中“染叶衬花”的意思。查《现

    代汉语词典》,“染”的意思是“用染料着色”。根据词典释义及文段内容，“染叶衬花”

    在文中具体指


    作者将写孔明，先写司马徽“明于知人，

    识得英雄”，这样的人推崇孔明，“二人得

    一，可安天下”;再写徐庶善于用兵，设伏，破阵，取城，这样的人说他和诸葛亮相比“譬

    犹驽马并麒麟，寒鸦配鸾凤耳”。如此“染叶衬花”，虽然未见孔明其人，但其不同凡响

    已自在其中，之后的“三顾茅庐”就是瓜熟蒂落、水到渠成了。

    5.第四组同学的研究成果是《诸葛亮散文的文学价值》。下面文稿中的画线句存在问题，

    请你做出修改。

    《诸葛亮集》共收录其文章120余篇，不仅有《草庐对》《出师表》这样的传世奇文，

    像《诫子书》等尺寸之作，往往也精粹可读。就其散文的艺术风格而言，或爽健雄奇，

    或委婉深挚，至于其中所显现出的气魄与胆识、胸襟与谋略，同时代恐怕只有曹操诗作

    尚可媲美，曹丕、曹植两兄弟和建安七子是望尘莫及的。然而，目前一些文学史中对汉

    魏文学的论述，往往只着想三曹七子，对诸葛亮则缺乏应有的评价，或略而不提，或一

    带而过，这显然是失之偏颇的。

    6.第五组同学的研究成果是《草船上的“草把”》。下面是他们文稿的部分内容，请你帮

