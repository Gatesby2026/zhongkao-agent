    只能屏息凝神，默默肃立，生怕惊扰了他。此时我的脑子里没有什么史实考证，没有什

    么形胜探究，更顾不得褒贬评判，只有那句“葬汉中定军山，因山为坟，冢足容棺，敛

    以时服，不须器物”。丞相嘱咐薄葬，只是因为平时简朴惯了，临终不改其志。一具薄薄

    的棺椁，一具伟大的遗骸，肃静而淡泊地躺在其中，如此简单，如此纯粹。

    (第6段)我有一位朋友，成都人，标准的诸葛亮粉。每次一提诸葛亮，她就两眼

    发亮，旁证博引，典故精熟，信息量巨大。她最爱说的一句话是“成都，是丞相的成都”。

    此言不虚，在成都，你总能深切地感受到那种对诸葛亮的热爱，不必特意言说，它已经

    深入骨髓，早已沉淀在每一条大街小巷和居民的言谈举止之中，和这个城市一同呼吸。

    A.“屏”在此处是“抑止”的意思，应读作“bing”。

    B.“简”在此处是“简单”的意思，应写作“简”。

    C.“证”在此处是“证明”的意思，应写作“证”。

    D.“髓”在此处是“骨髓”的意思，应读作“sui”。

    第1页

    3.第二组同学的研究成果是《亦人亦神诸葛亮》。下面文稿中成语使用不恰当的一项是

    读《三国志》，我们看到的诸葛亮是白璧微瑕、有血有肉的真实的人。而读《三国演

    义》，我们看到的诸葛亮既是足智多谋的统帅，又是巧舌如簧的外交家，甚至是呼风唤雨、

    未卜先知的活神仙。罗贯中“优化”诸葛亮主要采用了两种方法，一是移花接木，将孙

    权的“草船借箭”、文聘的“空城计”统统给了诸葛亮;一是无中生有，虚构了“舌战群

    儒”“借东风”“三气周瑜”等故事，就是为了塑造一个近乎完美的诸葛亮形象。

