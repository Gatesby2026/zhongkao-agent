  stem: '从下面两个题目中任选一题，按要求写一篇作文。

    (1)星陨五丈原，诸葛亮倒在了离长安135公里的地方。小说《长安的荔枝》中有这样的对话:“这件事毫无胜算，你为什么还要做?”“就算失败，我也想知道，自己倒在距离终点多远的地方。”主人公李善德对“离终点有多远”反复测算，他不断调整路线，不断试错，不断改进方式方法，最终把不可能变成可能。面对复杂艰巨的任务，做成了，你能看到自己的潜能有多大;即使没做成，你也会收获到宝贵的财富。以“离终点有多远”为题，写一篇作文。文体不限，诗歌除外。

    (2)据《三国志》记载，刘备集团在取得益州根据地后进行了领导层分工，其中“诸葛亮为股肱”。查《现代汉语词典》，“股肱”的解释为“大腿和胳膊，比喻左右辅助得力的人”。在你的日常生活中，如课上课下、社会实践、研学旅行、志愿服务等等，当遇到困难或挑战时，你身边是否有“股肱”在?或者，你是别人的“股肱”?请以“股肱的力量”为题，写一篇作文。文体不限，诗歌除外。

