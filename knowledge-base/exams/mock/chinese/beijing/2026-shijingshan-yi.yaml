  type: 主观填空
  score: 2
  stem: '第五组同学的研究成果是《草船上的“草把”》。下面是他们文稿的部分内容，请你帮他们补充一个例子，并推测他们的结论是什么。


    我们发现了一个有趣的现象：民间文学的历代创作者们，常常把一些同类情节集中归附在某一个人物身上。这个人物就是“箭垛式人物”，比如诸葛亮是智计超群的“箭垛”，包拯是断案如神、刚正不阿的“箭垛”，_______，……通过研究，我们得出的结论是_______。'
  answer: ''
  solution: "①. 孙悟空是神通广大、降妖伏魔的“箭垛”    ②. 民间文学常把同类特质、同类故事情节集中汇聚到同一个经典人物身上，塑造出形象鲜明、特质极致的箭垛式人物，让人物更具传奇色彩与典型性。\n\n详解：先理解“箭垛式人物”的定义，即同类情节集中归附的人物。\
    \ 据此补充符合该定义的人物例子，再根据前文现象推测关于“箭垛式人物”的结论。\n示例：济公是扶危济困、惩恶扬善的“箭垛” \n结论：民间文学常会把同类型的故事情节、人物本领与美好特质，集中归附到经典人物身上，将其塑造成某类品格或能力的代表，使之形象更典型、更传奇，也更容易被后人铭记与流传。"
