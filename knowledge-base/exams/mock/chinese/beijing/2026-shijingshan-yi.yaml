- id: 10
  type: 主观填空
  score: 3
  stem: 文天祥被俘后，写下了《过零丁洋》《怀孔明》《正气歌》等多首表达爱国情怀的佳作。本诗结句中的“丹”“照”有如撞钟，清音绕梁，请你谈谈它们是怎样表达诗人爱国情怀的。
  answer: ''
  solution: '“丹”指赤诚的忠心，体现诗人坚守气节、忠于国家的赤子情怀；“照”有照耀史册之意，表明诗人甘愿舍生取义，愿以一身正气留名青史，将忠贞报国的精神永传后世，二字凝练深沉，尽显崇高的爱国情怀。


    详解：从字词本义来看，“丹”本义为红色，诗中代指丹心，即赤诚忠贞的报国之心；结合诗人身世，文天祥兵败被俘、身陷绝境，却拒不投降，“丹”字凸显他坚守民族气节、心系家国的赤诚本心。

    “照”是照耀、映照之意，“汗青”指代史册。诗人以“照”字落笔，表明甘愿以死明志，要让自己的忠义气节、爱国初心永远镌刻在史册中，流芳后世。两字质朴有力，把舍生取义、至死不渝的爱国情怀抒发得铿锵动人。'
