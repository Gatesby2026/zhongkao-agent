  stem: '第一组同学向大家介绍《定军山下，锦官城外》。他们对文稿中的字音和字形解说·不正确·的一项是（   ）


    （第2段）陕西汉中，勉县，武侯墓。覆斗形的大冢前，我不敢说话，不敢挪步，只能·屏·息凝神，默默肃立，生怕惊扰了他。此时我的脑子里没有什么史实考证，没有什么形胜探究，更顾不得褒贬评判，只有那句“葬汉中定军山，因山为坟，冢足容棺，敛以时服，不须器物”。丞相嘱咐薄葬，只是因为平时·简·朴惯了，临终不改其志。一具薄薄的棺椁，一具伟大的遗骸，肃静而淡泊地躺在其中，如此简单，如此纯粹。


    （第6段）我有一位朋友，成都人，标准的诸葛亮粉。每次一提诸葛亮，她就两眼发亮，旁·证·博引，典故精熟，信息量巨大。她最爱说的一句话是“成都，是丞相的成都”。此言不虚，在成都，你总能深切地感受到那种对诸葛亮的热爱，不必特意言说，它已经深入骨·髓·，早已沉淀在每一条大街小巷和居民的言谈举止之中，和这个城市一同呼吸。'
  options:
    A: “屏”在此处是“抑止”的意思，应读作“bǐng”。
    B: “简”在此处是“简单”的意思，应写作“简”。
    C: “证”在此处是“证明”的意思，应写作“证”。
    D: “髓”在此处是“骨髓”的意思，应读作“suǐ”。
  answer: C
  solution: C.正确字形应为旁征博引，是“征引、搜集”的征，不是“证明”的证。
