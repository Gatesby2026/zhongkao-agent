- id: 23
  type: 现代文阅读
  score: 3
  stem: 阅读文章，写出第②至⑤的行文思路。
  answer: ''
  solution: '先写杜甫咏诸葛亮诗作数量多、评价精、立意高，远超前人；再点明其诗作艺术成就高，助推诸葛亮美名远扬；接着写宋代尊杜崇杜，杜诗进一步影响世人对诸葛亮的认知；最后分析二人思想情怀相通，被宋人视作异代知己。


    详解：根据第②段第一至七句可知，先以李白、岑参等人的诗作作为对比，指出其咏诸葛亮的作品未成气候，再介绍杜甫9首专咏、15首咏及诸葛亮的诗作，从品质、才华、功绩等多方面进行精辟评价，展现出远超前人的认识深度与情感力量。

    根据第③段第一、二句可知，点明杜甫咏诸葛亮的诗格律精严、词警意丰，在艺术水平上达到顶峰，也让诸葛亮的美名随着这些优秀篇章四海传扬。

    根据第④段第一至四句可知，写宋人对杜诗的推重，使杜诗中对诸葛亮的推崇进一步影响世人，形成将二人联系论述的普遍现象，凸显文学作品的影响力。

    根据第⑤段第一至五句可知，分析杜甫与诸葛亮在儒家思想熏陶、济世救民抱负上的共通之处，指出二人忧国忧民、忠贞恭勤的品质高度相通，被宋人视为异代知己。'
