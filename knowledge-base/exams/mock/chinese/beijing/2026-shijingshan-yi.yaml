  stem: 根据全文，在第①段横线处填写恰当的内容。
  answer: ''
  solution: '杜甫的诗歌也起到了至关重要的推动作用


    详解：作答此题，首先梳理文章行文逻辑。首段先点明诸葛亮受各阶层推崇，点明个人品行与功绩是内在原因，横线处需补充外在助推因素。再从后文提炼关键内容：杜甫大量咏赞诸葛亮的诗作成就极高、流传深远，宋代推崇杜诗又进一步带动世人对诸葛亮的尊崇，二人精神共鸣也助推其地位提升。然后整合逻辑，横线处需概括杜甫诗文的推崇与后世文学传播的助力这一外在原因，起到总领下文的作用。

    示例：杜甫的诗文也极大助推了诸葛亮崇高地位的确立。'
