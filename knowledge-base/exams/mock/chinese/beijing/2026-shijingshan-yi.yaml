    B: 想起先帝临崩之际将“兴复汉室，还于旧都”的大事托付于己，给予自己莫大信任。
    C: 想到自己带兵北伐后，朝堂之中攸之、祎、允等人很可能会懈怠，他对此担心忧虑。
    D: 希望自己举兵北伐后，后主刘禅能够“深追先帝遗诏”，他对后主怀有殷切的期待。
