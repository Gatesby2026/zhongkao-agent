  stem: 结合文章内容，简要分析第⑤段画线句的表达效果。
  answer: ''
  solution: '运用比喻的修辞手法，将墨痕比作涕泪，笔锋比作枪戟，生动形象地写出了岳飞草书的墨迹和笔锋特点，表现了岳飞对诸葛亮的敬仰和对历史的感慨，也体现了作者对诸葛亮的感悟。


    详解：根据第⑤段画线句可知，这里运用了比喻的修辞手法，将岳飞草书的“墨痕”比作“涕泪”，将“笔锋”比作“枪戟”。“墨痕如涕如泪”，形象地写出了字迹中饱含的悲怆与赤诚，传递出岳飞书写时内心的沉痛；“笔锋如枪如戟”，则凸显了笔势的刚劲凌厉，暗含着他对家国的忠愤之气。这组比喻，既生动刻画了岳飞书法作品的形态与神韵，也写出了他与诸葛亮跨越时空的灵魂共鸣，传递出二人同样忧国忧民、壮志未酬的悲愤与忠诚，也让作者对诸葛亮的崇敬之情更显厚重，深化了武侯祠所承载的民族正气与忠义精神。'
