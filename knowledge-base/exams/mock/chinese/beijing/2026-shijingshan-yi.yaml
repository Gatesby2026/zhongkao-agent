- id: 15
  type: 单选
  score: 2
  stem: 根据以上三则材料，下列说法符合文意的一项是（   ）
  options:
    A: 诸葛亮采取了“和夷”政策是他能够平定南中叛乱的关键原因。
    B: 诸葛亮在南中修路开疆的举措使南中人民走向定居的农业社会。
    C: 西南各族对诸葛亮的敬称说明儒家的忠义观已在西南地区扎根。
    D: 西南各族的“诸葛亮崇拜”现象的形成是一个潜移默化的过程。
  answer: D
  solution: 'A. 根据材料一“诸葛亮在南征过程中采取‘攻心为上，攻城为下’策略，战后实施‘和夷’政策”可知，平定叛乱的关键是“攻心为上”的策略与军事行动的结合，“和夷”是战后安抚措施，并非平定叛乱的关键原因；

    B. 根据材料二“他还从内地引来比较先进的生产技术，如‘命人教打牛，以代刀耕’，引进牛耕，以改变当地落后的刀耕火种的方法……许多原以狩猎为生的少数民族走向定居的农业社会”可知，南中人民走向定居农业社会的直接原因是牛耕等先进生产技术的推广，并非单纯“修路开疆”，选项表述以偏概全；

    C. 根据材料三第②段“在长时期的文化涵养后，儒家的忠义观已在西南地区扎根，民众对于这位贤相也就更加崇敬”可知，是忠义观扎根让民众更崇敬诸葛亮，而非各族的敬称直接说明忠义观已扎根，选项逻辑倒置，表述错误。'
