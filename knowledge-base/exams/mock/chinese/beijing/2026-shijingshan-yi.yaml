  stem: 诸葛亮毕生致力于“兴复汉室”的大业。结合文章内容，谈谈你从中获得的启示。
  answer: ''
  solution: '启示：学习诸葛亮才德兼备，有才肯为天下人兴利，有功不自傲；学习他的忠义之举，为理想鞠躬尽瘁；学习他的淡泊之志，不贪图名利；学习他的聪明才智，为社会做贡献。


    详解：作答此题，首先要提炼核心事迹。从文中提取诸葛亮“鞠躬尽瘁兴复汉室”的毕生追求、他德才兼备的品格、壮志未酬却赢得后世人心的结局等关键内容，明确他在理想与现实的冲突中展现出的精神力量。然后，突出精神品质。围绕“坚守理想”“鞠躬尽瘁”“德才兼备”等核心，总结他行为背后体现的崇高精神，展现跨越时空的榜样力量。

    示例：诸葛亮以毕生心血践行兴复汉室的理想，即便身处乱世、天命难违，仍鞠躬尽瘁、死而后已。他既有经天纬地的才略，更有忧国忧民的赤诚，德才兼备的品格让他虽功业未竟，却赢得后世千百年的敬仰与共鸣。他的故事启示我们，理想的价值不只在于结果的成败，更在于以毕生坚守践行初心，以赤诚之心对待家国与理想，让有限的生命在精神的传承中获得永恒。'
