  stem: '第四组同学的研究成果是《诸葛亮散文的文学价值》。下面文稿中的画线句存在问题，请你做出修改。


    《诸葛亮集》共收录其文章120余篇，不仅有《草庐对》《出师表》这样的传世奇文，像《诫子书》等尺牍之作，往往也精粹可读。就其散文的艺术风格而言，或爽健雄奇，或委婉深挚，至于其中所显现出的气魄与胆识、胸襟与谋略，同时代恐怕只有曹操诗作尚可媲美，曹丕、曹植两兄弟和建安七子是望尘莫及的。然而，<u>目前一些文学史中对汉魏文学的论述，往往只着想三曹七子，</u>对诸葛亮则缺乏应有的评价，或略而不提，或一带而过，这显然是失之偏颇的。'
  answer: ''
