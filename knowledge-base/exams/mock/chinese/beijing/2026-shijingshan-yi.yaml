- id: 13
  type: 古诗内容理解
  score: 3
  stem: '根据《出师表》（节选）及下面材料，在后面语段中的横线上填写恰当的内容。


    陛下已登大宝①，黎元②有归，社稷有主，勤王③之师日集。虏④方谓吾素弱，未必能敌，正宜乘其怠而击之。而黄潜善、汪伯彦辈，不能承陛下之意，恢复故疆，而令长安、维扬、襄阳准备巡幸⑤，有苟安之渐⑥，无远大之略，恐不足以系中原之望⑦。为今之计，莫若请车驾还京，罢三州巡幸之诏，乘虏穴未固之际，亲帅六军，迤逦⑧北渡，则天威所临，将帅一心，士卒作气，中原之地，指期可复。


    （取材于岳飞《南京上高宗书略》）


    【注释】①〔大宝〕帝位。②〔黎元〕百姓。③〔勤王〕君主危难时臣子起兵救援的行为。④〔虏〕对敌方的蔑称。⑤〔巡幸〕帝王到各地巡视。⑥〔渐〕苗头。⑦〔系中原之望〕将中原百姓的期待系于其身。⑧〔迤逦〕迂回。


    在表章中，诸葛亮和岳飞都强调应当抓住时机决心北伐。诸葛亮认为在南方已定、兵甲已足的有利时机，君臣应当竭尽全力，各司其职，尤其是后主当“_______，_______”，让自己能够放心北伐；岳飞认为在社稷初定、军势渐盛，尤其是趁着敌人_______的有利时机，皇帝应当停止“_______”，决意率领六军北渡，恢复中原。'
  answer: ''
  solution: '①. 咨诹善道    ②. 察纳雅言    ③. 懈怠    ④. 三州巡幸


    详解：第一、二空，根据《出师表》“陛下亦宜自谋，以咨诹善道，察纳雅言”可知，诸葛亮希望后主刘禅能够广开言路、咨诹善道、察纳雅言，以此稳定后方，让自己能放心北伐，所以此处应填“咨诹善道，察纳雅言”。

    第三空，根据岳飞《南京上高宗书略》“虏方谓吾素弱，未必能敌，正宜乘其怠而击之”可知，岳飞认为此时敌人对我方力量判断有误、防备松懈，这是北伐的有利时机，所以此处应填“怠（松懈、懈怠）”。

    第四空，根据《南京上高宗书略》“而令长安、维扬、襄阳准备巡幸……莫若请车驾还京，罢三州巡幸之诏”可知，岳飞反对皇帝前往长安、维扬、襄阳三地巡幸，认为这是苟安的苗头，所以此处应填“三州巡幸”。'
