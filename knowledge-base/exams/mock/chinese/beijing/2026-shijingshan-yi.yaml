  stem: '根据你的理解，在下面横线上填写恰当的内容。


    诗歌先交代诗人读书入世、_______的辛苦经历，接着慨叹家国在风雨飘摇中“破碎”“浮沉”的凄惨境况，再抒发兵败惶恐滩、被俘零丁洋的_______心境，最后表达要留大义于史册的坚定决心。'
  answer: ''
  solution: '①. 久经战乱    ②. 惊惧孤苦


    详解：第①空：根据首联“辛苦遭逢起一经，干戈寥落四周星”可知，前句写诗人由科举经书步入仕途，后句写多年身处战乱的人生历程，与“读书入世”并列，此处需填写“久经战乱”的人生经历。

    第②空：根据颈联“惶恐滩头说惶恐，零丁洋里叹零丁”可知，诗人追忆兵败险境的惊惧，感伤被俘后的孤苦无依，满含悲凉孤寂、惶恐无助的情绪，此处需概括诗人当下“惊惧孤苦”的内心状态。'
