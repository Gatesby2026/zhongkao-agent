    从一介布衣到一代鼎臣，诸葛孔明为兴复汉室“鞠躬尽瘁，死而后已”，他的雄才大

    略与高洁品德，如同展翅高翔于万古云霄中的鸾凤，绝世独立，受历代敬仰。正如杜甫

    诗中“万古云霄一羽毛”的赞语，万古为不尽的时日，云霄为不尽的空间，在茫茫不尽

    的时空之中，仅此一羽，至高至洁。这一羽，

