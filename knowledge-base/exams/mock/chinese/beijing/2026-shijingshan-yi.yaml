    智计卓绝;这一羽，笔抒忠魂，文耀千秋。“至今千载慕冥鸿”，十多座武侯祠散落九州，

    从汉中到成都，从古隆中到五丈原，那一砖一瓦写就了“卧龙”传奇，每一次抬脚迈进

