  body: '阅读下面材料，完成小题。

    材料一

    公元223年刘备病逝后，位于南中（今云南、贵州和四川西南部）的三郡豪强发动叛乱。诸葛亮于公元225年3月率军分三路南下，先平定了两郡叛乱，5月又渡泸水追击孟获，通过多次擒纵使其归降。至当年秋季，三路大军会师滇池，完成平叛。诸葛亮在南征过程中采取“攻心为上，攻城为下”策略，战后实施“和夷”政策，撤军并任用当地有影响力的人做官，这是他攻心策略的延续。此举缓和了与当地夷人的矛盾，使其感情上得到安抚，风俗习惯得到尊重，旧有的社会结构得到维系。这与王莽以来东汉王朝在南中只重军事征讨、杀伐无度的做法形成了鲜明的对比。由此，诸葛亮威名远扬，赢得了南中士庶的拥护和爱戴。诸葛亮的传说也从此在南中地区流传。

    材料二

    诸葛亮大力推动了南中的经济开发。据徐栻《新建诸葛武侯祠记》的记载，武侯在南中修建道路，治理水土，开疆垦辟，教导当地人民种植农作物来保障衣食。他还从内地引来比较先进的生产技术，如“命人教打牛，以代刀耕”，引进牛耕，以改变当地落后的刀耕火种的方法，这一地区的农业生产力提高了，“诸夷慕侯之德，渐去山林，徙居平地，建城邑，务农桑”，许多原以狩猎为生的少数民族走向定居的农业社会。___________，也从侧面印证了诸葛亮对南中经济发展的贡献。

    表1  西南少数民族传说故事举隅

    | 民族 | 传说故事内容 |

    |---|---|

    | 基诺族 | 诸葛亮南征途中，有士兵因贪睡而被“丢落”（谐音“基诺”），后来他们虽然赶上了部队，但为了严肃军纪，孔明不再收留他们，命其停在黑水河畔，赐给茶籽，让他们好好种茶。从此，这些“丢落”者定居下来，制茶业也成了他们的经济支柱。
    |

    | 苗族 | 早先，苗家男女都是光脚走路的，每次上山脚板都得划破。孔明知道后，就差人教苗家青年编鞋，还没弄完，敌军就来了，苗家青年只好穿着脚后跟还没编好的鞋子，跟孔明打仗去，从此苗家人就习惯了穿这种没有脚后跟的鞋子。 |

    | 苗族 | 苗家女性自古就能歌善舞，但之前穿的硬皮革跳舞很不方便，孔明就教她们种蓝靛草做衣服，还用杨梅树皮染色，弄好之后将布匹裹在一根木棍上，不停用力捶，于是粗硬的布匹很快变得柔软，并且黑里透亮。苗家女性穿这种衣服跳起舞来，就像春风拂柳一样好看，捶布也成为苗家少女的必修课。
    |

    | 白族 | 传说诸葛亮南征带了许多菜种子，每到一个地方都会分发给当地的百姓，路过丽江，给了民众小麦种子，还教他们烤粑粑；到了鹤庆，留下了酒曲，教鹤庆人酿酒；结果到剑川东山的时候，只剩下紫皮蔓菁种子，就送给了剑川的白族人，百姓都爱吃这菜，很感激诸葛亮，把它取名为“诸葛菜”。
    |

    材料三

    ①在有关诸葛亮的习俗传说中，无论是傣族的泼水节，还是彝族各地的火把节，都是为了纪念诸葛亮对当地百姓做的贡献。在《诸葛亮的帽子》这一传说故事中，诸葛亮临别时摘下帽子赠给傣族人民，傣族人仿照诸葛亮的帽子建造了傣族的竹楼。诸葛亮还告诉他们“想命长，水冲凉”，于是傣族人在炎热的季节里就互相泼水，这个习俗沿袭至今。相传，诸葛亮到纳西族教各族人民种植水稻，各村寨为迎接汉兵点火驱散瘴气，此后每年都会点火纪念，遂形成了火把节。而从江的苗族也认为是诸葛亮教他们种糯米，连斗牛、打鼓等民俗活动都是诸葛亮教的。诸葛亮似乎在西南地区无处不在，无所不能。白族将诸葛亮奉为本主，傈僳族、基诺族也将他纳入到民族起源传说之中，成为建构民族神圣起源的关键符号。景颇族把诸葛武侯奉为人类世界的创造者，尊称其为孔明老爹，遇举行盛大祭典时，必先呼孔明老爹之名而祭拜之。佤族称呼孔明为“阿公”，居住在普洱一带的哈尼族、基诺族称呼孔明为“茶祖”。这些称谓都是少数民族对于最亲近的长辈的称呼，亦是祖先崇拜的体现，足见少数民族对于诸葛亮的无比崇敬，亦是对诸葛亮所代表的汉文化的认同。

    ②诸葛亮“功盖三分国”却从不思僭越，是儒家忠义文化的代表之一。之后尤其是明清的统治者为了在“蛮夷之地”宣扬儒家的忠义观，便将诸葛亮塑造成为儒家伦理的典范，布撒民间，将抽象的儒家伦理与西南民众尊敬的人物相结合，使得民众更加容易接受。在长时期的文化涵养后，儒家的忠义观已在西南地区扎根，民众对于这位贤相也就更加崇敬。

    ③由此可见，诸葛亮由人到神的转变，是西南民众与统治者共同选择的结果，是一个潜移默化的过程。'
