    2026北京丰台初三一模

    语

    文

    .本练习卷，共五道大题，27道小题，满分100分。练习时间150分钟。

    注

    在试卷和答题卡上准确填写学校名称、班级、姓名和考号。

    意

    3.试题答案一律填涂或书写在答题卡上，在试卷上作答无效。

    事

    4.在答题卡上，选择题用2B铅笔作答，其他试题用黑色字迹签字笔作答。

    项 5，考试结束，将本试卷和答题卡一并交回。

    基础-运用

    为支持丰台区“乐学公园”建设，学校组织编写“乐学公园课程”宣传手册，你所在的学习小组收

    集了相关资料，请你协助整理。

    1.你用正楷字将标题“乐学无界，精彩纷呈”书写在宣传手册封面上。

    第一部分序言

    “乐学公园”是以公园绿地为载体，以中小学校为主体，将学校教育、自然教育、社会教育融为一体

    的新型教育模式，其核心理念在于“无界育人”。首先是空间无界，打破校园围墙的间隔，将公园化身

    “立体教科书”，让每一片树叶成为教具，让每一声鸟鸣化作乐章，让学习沿伸到更广阔的自然和社区

    里。其次是课程无界，“3X”课程体系一“湿地生态”“城市农耕”“古建密码”三大基础课程以及

    各种特色课程，依托真实场景，打破学习与生活的壁磊，致力于达到“乐在其中，学以致用”的学习境

    界。第三是角色无界，即打破身份局限，推动学生、教师、园林工作者等协同参与，形成教育合力。最后

    是成长无界，“乐学公园”让学习的成果不再局限于分数与试卷，而是将每一次探索都变成学生全面成长

    的催化剂，实现“乐学无界，精彩纷呈”的教育愿景。

    2.你审核文段中加点词语的字音与字形。下列说法不正确的一项是

    A.“载体”是指“能承载其他事物的事物”，正确读音为“zait丫”

    B.“间隔”指“事物在空间或时间上的距离”，正确读音为“jian

    g6”

    C.“沿伸”应写作“延伸”，表达“延长、伸展”之意。

    D.“壁磊”应写作“壁垒”，表达“界限”之意。

    3.你想知道文段中“催化剂”的意思，查《现代汉语词典》，“催化剂”的解释为“能改变化学反应速

    率，而本身的量和化学性质并不改变的物质”。根据词典解释，下列对文段中“催化剂”的理解最恰当

    的一项是

    A.变化趋势

    B.转化成果

    C.助推力量

    D.预期目标

    第二部分课程推荐

    湿地生态课程-一南苑森林湿地公园“生物多样性监测之旅"

    南苑森林湿地公园被称为“生物多样性监测站”，在这里，我们可以化身“湿地侦察员”，开启生态监

    测之旅。举起望远镜，沿着观鸟路线，追踪飞鸟掠过的身影;竖起“顺风耳”，学习通过鸟儿的鸣叫声判断

    它们的种类;还可以架起红外相机，捕捉路过的“神秘居民”。沉浸其中，我们会发现，这座公园是一个生

    命的宝库。近危植物垂丝海棠、国家二级重点保护野生动物红隼、国家“三有”保护动物刺猬和黄鼬，以及

    238种植物、117种有监测记录的野生鸟类、28种大型野生真菌，每一种植物都在向我们传递生态修复的奇

    迹。我们可以像真正的科研人员一样，记录物种，分析数据，在探索中感受自然的神奇。

    4.文段中的画线句存在两处问题，请你修改。(2分

    城市农耕课程-一庄怡乐学公园“从校园到田园的成长记”

    庄怡乐学公园的城市农耕课程有条不紊地开展。首先是农耕常识的学习，包括农作物的种类、生长周期、

    播种技巧等。随后便是实际操作，亲手翻土、播种、浇水、除草，学习搭防风支架、铺反光板，体验简易智

    能灌溉设备的使用。我们甚至还可以大显身手，将地理、生物、化学等学科知识运用于实践，分析土壤成分，

    改良土壤结构，配制营养液。从播种到收获，从采摘到烹饪，全程身体力行，每一步都需要耐心与协作。栩

    栩如生的课程让我们告别书本的抽象描述，深入体验从春种到秋收、从田间到餐桌的全过程。

    5.你检查文段中成语使用的情况。结合语境，下列成语使用不恰当的一项是

