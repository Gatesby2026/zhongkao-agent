    古建密码课程

    北京园博园“跨越时空的对话"

    在北京园博园，我们可以化身为“小小古建测绘师”，穿梭于67个园林之间，用脚步丈量建筑基址，

    以纸笔描绘飞檐斗拱，尝试破译古人藏在木梁石缝里的建筑密码。课程中，最让人着迷的是古建筑的榫卯结

    构，不用一根铁钉，仅凭木材之间的凹凸咬合，就能构筑起屹立千年的殿宇楼阁。这种精妙的设计，不仅体

    现了工匠巧用力学原理的智慧，更折射出中华传统文化的和谐之美，真是让人叹为观止!这场与古建筑跨越

    时空的奇妙对话，将带我们

