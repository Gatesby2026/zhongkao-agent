  stem: '结合全文内容，谈谈你对第⑨段“有这样的‘吾土’就是幸福的根源”的理解。（3分）


    （三）阅读下面的文章，完成24-26题。（共7分）


    ①在扬州游个园，见汉学堂有一楹联：“咬定几句有用书，可忘饮食；养成数竿新生竹，直似凡孙。”上联说读书要择有用书，抓住要旨，身体力行；下联讲要像养育竹子般把儿孙教育得正直而有节操。该联出自郑板桥题扬州小玲珑山馆联，古籍多收录，我也喜此联，尤喜“咬定几句有用书”句。思之悟之践之，以为此乃郑板桥读书法，精辟透彻，令人信服。


    ②论及“有用”，便大有文章。书海浩瀚，生命有限，读书要有选择，选“有用”，弃“无用”，远“有害”。郑板桥曾说：“魏晋而下，迄于唐宋，著书者数千百家。其间风云月露之辞，悖理伤道之作，不可胜数……”时至今日，此类情形亦不鲜见。除了伪哲学、假道学、伪科学、毒鸡汤等蛊惑人心，还有鸡毛蒜皮、无病呻吟等滥竽充数，开卷未必有益，甚或有害。故而读什么乃读书第一要事。


    ③选“有用”首选有大用。多大算大？依我看，修身做人之用为最。修齐治平，修身是根本。明末高攀龙在《高氏家训》中说：“吾人生于天地之间，只思量做得一个人，是第一义，余事都没要紧。”<u>陶行知</u>先生亦言：“千教万教教人求真，千学万学学做真人。”反观现实，有些人思想和作风出问题，归根到底还是做人上出了偏差。由此可见，讲“求真”、教“做人”的书，便是大有用的书，当为择书首选。


    ④谈及“几句”，更需领会其妙。“几句”与“读万卷书”并行不悖。“博览群书”是从读书广度讲的，哪怕是读“闲书”，也能涵养性情、启迪思想、触发灵感；“几句”则是从领会要旨、精通要义、终身受用讲的。无论读什么，只有抓住精要，得其旨趣，为我所用，方才受益。所以，《板桥自序》说：“板桥居士读书，求精不求多。”他不齿走马观花、囫囵吞枣式的读书，匆匆一阅，心得全无，徒费工夫。


    ⑤“几句”不等于分量轻、价值小、获益少。要紧的话不必繁琐，真正的道理往往就在几句之中。所以，“几句”也可常受益，受大益。诸葛亮《诫子书》全文不过八十六字，其中“非淡泊无以明志，非宁静无以致远”寥寥数语，便把修身治学之理讲得透彻明白，传之后世。再如《论语》，摘其一句即可启人深省，洞明修身处世之要，历来为世所重，正是“几句”分量的最好印证。


    ⑥至于“咬定”，则另有一番讲究。怎么才算“咬定”？我认为，就是要把书读熟读透。·蜻蜓·点水、浅尝辄止，读再多也是虚浮；唯有沉下心来反复钻研，方能得其真味。这就像牛吃草，囫囵吞下不反刍，终难化为营养；读书亦如此，须反复咀嚼，方能消化吸收。巧的是，扬州何园《何氏家训》亦有此训：“读书以百遍为度，务要反复熟嚼，使其言皆若出于吾之口，使其意皆若出于吾之心，融会贯通，然后为得。”你看，这不正是“咬定”的解读吗？板桥之联悬于个园，其精义却在何园家训中得到共


    鸣，正可谓个园出题，何园答卷。


    ⑦由此可见，“咬定几句有用书”确为读书良方。选有用，则开卷有益；抓几句，则得其精要；咬定之，则终身受用。三者兼备，方是善读书。


    （取材自于文岗的文章）'
  answer: ''
  solution: '富春江景色秀美，是祖国大好河山的代表；生于这样的国土，能感受山河之美、文化底蕴，内心幸福自豪，所以说“吾土”是幸福根源。


