  stem: '根据以上三则材料，我们了解到北京市从    <u>①</u>    、<u>    ②   </u> 、 <u>    ③   </u> 三个方面促进全民健身活动的发展。


    （二）阅读《富春江上》，完成20-23题。（共10分）


    富春江上


    ①记得读到过两句诗：“到江吴地尽，隔岸越山多。”


    ②当时我只能欣赏诗句的意境，而没有丝毫感性认识。不意我今天竟亲身来到了富春江上。极目一望，江水平阔，浩渺如海；<u>隔岸青山如青螺数点，绵延若微痕一抹，出没于烟雨迷蒙中</u>。“隔岸越山多”的意境我终于目睹了。


    ③我们坐在一艘游艇上。江水青碧，水声淙淙，远处是点点风帆。黑色的小燕子在起伏翻腾的碎波上贴水面飞行，似乎是在努力寻觅着什么。我只见它们忙忙碌碌，匆匆促促，最终也不知道，它们究竟在寻觅什么。岸上则是点点的越山，飞也似的向艇后奔。一点消逝了，又出现了新的一点，数十里连绵不断。诗句中的“多”字表现的就是这个意境吗？


    ④眼中看到的虽然是当前的景色，但我心中想到的却是历史的人物。谁到了这个吴越分界的地方不会立刻就想到古代的吴王夫差和越王勾践的冲突呢？当年他们相互征战，乱箭齐发、金鼓轰鸣。这种鏖兵的情况无论如何同这样的青山绿水也不能协调起来。人世变幻，今古皆然，青山绿水却将永在。我们今天大可不必庸人自扰，还是欣赏眼前的美景吧！


    ⑤但是，我的幻想却不肯停止，耳边响起了诗僧苏曼殊的那句“何时归看浙江潮”。这里不正是浙江钱塘潮的老家吗？我虽还没有看到浙江潮的福气，这诗我却是喜欢的，常常在无意中独自吟咏。今天来到富春江上，这诗仿佛是自己来到了我的耳边。“怒声汹汹势悠悠”，耳边诗句一响，眼前潮水就壮阔奔涌起来。但是，幻象毕竟只是幻象。一转瞬间，“怒声汹汹”的江涛就消逝得无影无踪，眼前江水平阔，浩渺如海，隔岸青螺数点，微痕一抹，出没于烟雨迷蒙中。


    ⑥就这样到了今天艇游的终点——富阳。我们舍舟登陆，爬上了有名的鹳山。山上层楼叠阁，曲径通幽；山顶参天树木森然苍蔚，阵阵松涛低吟回响。我们登上了春江第一楼，凭窗远望，富春江景色尽收眼底。因为高，点点风帆显得更小了，而水上的小燕子则小得无影无踪。想必它们仍是忙忙碌碌地在那里飞着，可惜我们一点也看不着，只能在这里想象了。


    ⑦在山边上一座石壁下是名闻天下的严子陵钓台。宋朝大诗人苏东坡写的“登云钓月”四个大字赫然镌刻在石壁上。此地距江面相当远，钓鱼无论如何钓不着的。遥想两千多年前，一个披着蓑衣的老头子，手持几十丈长的钓丝，孤零零一个人，蹲在这石壁下，等候鱼儿上钩，一动也不动，宛如一个木雕泥塑。这样一幅景象，无论如何也难免有滑稽之感。古人说，姑妄言之姑妄听之，过分认真，反会大煞风景。难道宋朝的苏东坡就真正相信吗？此地自然风光，天下独绝，有此一个传说，更会增加自然风光的魅力，我们就姑妄听之吧！


    ⑧我曾畅游黄山。那里景色之奇丽瑰伟，使我大为惊叹。窃念大化造物，独垂青于中华大地。我觉得生为一个中国人，是十分幸福的，是非常值得骄傲的。今天我又来到了富春江上。这里景色明丽，秀色天成，同样是美，但却与黄山形成了鲜明的对照。一个是阳刚之美，一个是阴柔之美。刚柔不同，其美则一，同样使我惊叹。我们祖国大地，江山如此多娇，我的幸福之感，骄傲之感，更是油然而生。眼前的富春江在我眼中更增加了明丽，更增加了妩媚，仿佛是一条天上的神江了。


    ⑨忽然想到唐代诗人孟浩然《宿桐庐江寄广陵旧游》中“建德非吾土，维扬忆旧游”两句诗。孟浩然说“建德非吾土”，这种心情是容易理解的。他忆念广陵，便觉得建德非吾土。我们当然不会有这样的感觉。我觉得桐庐不但是“吾土”，而且同黄山一样，是“吾土”中的精华。<u>有这样的“吾土”就是幸福的根源</u>。非吾土的感觉我是有过的，但那是在瑞士。那里的山水也是十分神奇动人的，我曾为之颠倒痴迷过。但一想到“山川信美非吾土”，我就不禁有落寞之感。今天在富春江上，我丝毫也不会有什么落寞之感。正相反，我是越看越爱看，越爱看便越觉得幸福，在这风物如画的江上，我大有手舞足蹈之意了。


    ⑩我从小就背诵梁代大文学家吴均的名作《与朱元思书》。文章描绘的正是富春江的“奇山异水”，那确是非常动人的。然而他讲的是“自富阳至桐庐”，我今天刚刚到了富阳，便戛然而止。我知道还有更奇丽的景色，不由得望眼欲穿，向着桐庐的方向望去，根据吴均的描绘，再加上我自己的幻想，把那一百多里的奇山异水给描绘得如阆苑仙境。我的心好像就在这些奇山异水上飞驰，感到无比的快乐。等我耳边听到嘈杂声，是同伴们准备回去的时候了。我抬眼四望，唯见青螺数点，微痕一抹，出没于烟雨迷蒙中。


    （取材于季羡林同名文章）'
  answer: ''
