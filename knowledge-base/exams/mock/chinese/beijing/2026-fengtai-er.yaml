  body: '（一）阅读下面的材料，完成17-19题。（共7分）

    材料一

    2025年是《北京市全民健身实施计划（2021-2025年）》的收官之年。五年来，北京市聚焦群众健身需求，重点推进各类场地设施建设，取得了丰硕成果。场地设施总量持续增长：全市体育场地数量达到4.88万个，体育场地面积7115.81万平方米，人均体育场地面积3.26平方米；截至2026年3月底，北京市已建成36个符合国家标准的体育公园，新建和更新足球、篮球等专项活动场地615片，安装全民健身器材7.25万件，新增健身步道2430公里。场地设施类型更加丰富：传统项目场地建设不断完善，积极拓展匹克球、攀岩、滑板等新兴运动场地供给，持续推动冰雪场地建设，100条全民健身徒步线路上线“徒步北京”小程序。整体来看，首都全民健身场地设施建设愈加完善，为全民健身提供了坚实的保障。

    材料二

    北京持续丰富赛事活动体系，全域赛事有序开展。五年间，北京市累计举办·各级·各类全民健身赛事活动10万余场，参与人次4200多万。圆满完成第十五届全国运动会群众组赛事，成功举办市运会、市冬运会群众组比赛，组织“社区运动会”“社区足球赛”等基层赛事活动。围绕端午、重阳等重要时间节点，组织开展龙舟、登高等多样化主题赛事。持续举办全民健身体育节、大运河龙舟嘉年华、极限运动汇、“和谐杯”乒乓球赛等品牌赛事。面向青少年群体开展“奔跑吧·少年”主题活动；积极推动适老化体育赛事发展。运用各类线上资源，举办全国电子体育大赛暨北京国际电子体育周、北京数智体育公开赛、北京虚拟体育运动会等线上赛事。累计开展各级各类冰雪赛事活动2万余场次，线上线下参与5200余万人次，其中线下参与1640万人次。北京全民健身赛事活动体系已初步呈现出________的特点。

    材料三

    北京大力运用科技创新手段全方位赋能全民健身发展。在数字技术方面，全市打造北京健身汇、北京健身地图等数字化公共服务平台，提供体育场地查询、在线预约、一键报修等服务。创新开展线上云健身、虚拟马拉松、VR趣味运动、数字体育公开赛等跨时空群众赛事，打破场地限制，吸引全民参与锻炼。依托大数据开展国民体质动态监测。上线海量居家科学健身线上课程，针对青少年、老年人推出分层智能健身服务。在人工智能方面，城市公园广泛增设AI智能健身器材，可一键完成体质检测并生成AI专属科学运动处方。智慧体育场馆引入鹰眼智能判析系统，对比赛及训练画面进行实时智能分析。在物联网方面，升级改造智慧体育场馆，引入气膜恒温场馆、5G智慧运营等，实现场馆环境的智能调控与运营管理。这些举措让全民健身更智能、更便捷，提升了首都全民健身的整体水平。'
