  score: 3
  stem: '根据《爱莲说》及下面两则材料，在后面语段中的横线上填写恰当的内容。（3分）


    材料一


    卜算子·咏梅


    陆游


    驿外断桥边，寂寞开无主。已是黄昏独自愁，更着风和雨。


    无意苦争春，一任群芳妒。零落成泥碾作尘，只有香如故。


    材料二


    夫植物之中，禀贞刚之气者，唯松为独多。尝昧昧思之：一气方伸①，根而蕴者，荄②而敛者，莫不振翘③舒荣④以逞妍于一时；及夫秋高气清，霜露既降，则皆黄陨⑤而无余矣。其能凌岁寒而不易行改度⑥者，非松也耶？是故昔之君子每托之以自厉，求君之志，盖亦若斯而已。


    注：①[一气方伸]刚刚得到舒展的时机。②[荄（gāi）]草根。③[振翘]茂盛。④[舒荣]舒展开枝叶。⑤[黄陨]枯黄凋落。⑥[易行改度]改变行为态度。


    （取材于宋濂《看松庵记》）


    君子人格，是中国古代文人历久弥新的精神追求。《爱莲说》中，周敦颐以莲喻君子，文末感慨“莲之爱，同予者何人”，与前文的“   <u>①</u>   ” 字相呼应，道出君子独善其身的孤寂和知音难觅的心境；陆游的《卜算子·咏梅》中，梅花 “零落成泥碾作尘，只有香如故”，恰如君子   <u>②
    </u>  ；《看松庵记》中，宋濂以松喻君子，“   <u>③</u>   ”一句，赞美君子坚贞不屈的风骨。'
