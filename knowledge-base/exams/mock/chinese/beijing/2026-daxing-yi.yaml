  stem: '联系上面《鱼我所欲也》及下面的材料，在后面语段的横线处填写恰当的内容。(3分)[材料一]子墨子曰:“万事莫贵于义。今谓人曰:‘予①子②冠履③，而断子之手足，子为之乎?’必不为。何故?

    则冠履不若手足之贵也。又曰:‘予子天下，而杀子之身，子为之乎?’必不为。何故?则天下不若身之贵也。争一言④以相杀，是贵义于其身也。故曰:万事莫贵于义也。”

    (取材于《墨子·贵义》)[材料二]至潮阳，见弘范⑤，左右命之拜，不拜，弘范遂以客礼见之，与俱入崖山，使为书招⑥张世杰⑦。天祥曰:“吾不能捍父母，乃教人叛父母，可乎?”索之固⑧，乃以书《过零丁洋》诗与之。崖山破，弘范遣使护送天祥至京师。天祥在燕凡三年，上知天祥终不屈也，召入谕之曰:“汝何愿?”天祥对曰:“天祥受宋恩，为宰相，安事二姓?愿赐之一死足矣。”天祥临刑殊⑧从容，南乡拜而死，年四十七。

    (取材于《宋史·文天祥传》)[注]①予:给，送。②子:你，代词。③履:鞋子。④一言:一句话，即关系到正义与非正义的一句话。⑤弘范:元初大将。⑥招:招降，招安。⑦张世杰:宋朝抗元爱国名将。⑧固:坚决。⑨殊:很。

    墨子通过“冠履与手足”“天下与自身”的对比，强调“①”的观点;文天祥被俘后，以②和③的行为表明忠贞为国的决心，被囚多年仍不屈服，最终以死殉国，守住了民族气节。二人言行，体现了孟子“舍生取义”的主张。

    三、整本书阅读(共5分)'
