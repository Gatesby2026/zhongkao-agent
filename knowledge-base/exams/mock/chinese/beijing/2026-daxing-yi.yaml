  body: '材料一“健康第一”是以学生身心健康为首要，融合德智体美劳，培育健康素养，助力学生全面发展的育人理念。为了让这一理念落到实处，2021年教育部等五部门印发《关于全面加强和改进新时代学校卫生与健康教育工作的意见》，系统构建学校卫生与健康教育体系，着力提升学生健康素养与体质水平。2025年1月，中共中央、国务院印发《教育强国建设规划纲要(2024-2035年)》，将促进学生健康成长上升为国家教育战略。2026年2月，教育部出台《关于全面推进健康学校建设的指导意见》，把“健康第一”的教育理念变成实实在在的校园要求和办学准则，让健康教育从宏观政策真正落实到每一所校园，逐步形成_____的“健康学校建设”实施体系。预计到2035年，我国将普遍建成更高质量的健康学校。

    表1《关于全面推进健康学校建设的指导意见》中的八项重点任务明细表重点任务核心举措实施学生体质强健计划加强学校体育工作推行“课间15分钟”，落实每天综合体育活动2小时实施学校美育浸润行动加强学校美育工作开齐开足艺术课程实施劳动习惯养成计划加强学校劳动教育融合劳动教育与实践育人，广泛开展学生社会劳动实践活动开展中小学生劳动技能、成果展示活动加强心理健康教师队伍建设深化心理健康教育推进学生心理健康监测预警系统建设聚焦关键阶段，坚持预防为主综合防控学生近视细化防控措施，加快降低学生近视率有效管控学生体重强化家校协同，引导家庭膳食营养均衡深化医教协同，开展早期干预和转诊治疗规范校园餐饮管理，加强从业人员培训保障校园食品安全配齐食品安全与营养健康管理人员健全校园膳食监督家长委员会职责和运行机制推进生命安全与健康教育进课程强化生命安全教育普及应急救护知识技能(图表信息来源:《关于全面推进健康学校建设的指导意见》)材料二2024年9月，教育部等十七部门联合印发《家校社协同育人“教联体”工作方案》。在《方案》的指引下，北京市各校联合家庭、卫健、体育、社区等多方力量，共同推进“健康第一”育人实践。全市广泛开展亲子健身与主题跑步活动，以家校协同带动学生坚持锻炼，养成终身运动的习惯。延庆、丰台、大兴等区联合卫健、体育部门，组织疾控专家与专业教练进校园，开展近视防控、科学健身等专题指导，把专业健康服务送到学生身边。学校联合供餐企业、家长膳食委员会共建营养保障体系。截至2025年底，全市建成366个智慧食堂，实行“一校一案”配餐，通过智能烹饪、食材溯源、实时监控和线上公示，以数字化手段守护学生饮食安全与营养健康，切实把协同育人落到实处。

    材料三2026年北京全面推进人工智能教育应用，深化智能体建设。其中，“京小健”健康师统筹体育、美育、营养与卫生健康等多方面内容，为学生精准构建个性化身心健康发展方案;“京小壮”则立足校园生活场景，提供安全提醒、运动陪伴、学习指导等服务，全面护航学生成长。这些智能体的应用，契合心理学中的“即时反馈效应”一当个体能够实时感知自身行为数据，清晰看到进步与薄弱环节时，会更愿意主动调整，自我提升。北京市多所学校以此为理念，投用AI智慧操场，通过视觉识别与人脸核验，自动完成对学生跑步、跳绳、引体向上等项目的监测，实时生成个性化运动建议。学生直观了解自身体能状况，逐步从“要我练”转向“我要练”，有效激发自主锻炼积极性，增强学生“健康第一责任人”的行动自觉。'
- id: narrative
  type: narrative
  q_range:
  - 20
  - 23
  body: '我的建筑之路程泰宁①建筑于我，是一生的行路，是在岁月里慢慢求索，在实践中慢慢成型的漫长修行。

    ②人生的前二十年，我满是幼稚和懵懂的妄想。生于战乱，在“放养”的状态中，我读了不少历史、文学，包括武侠小说之类的“闲”书，并在“闲”书中寻得了一份内心的自在，心里全是“侠之大者，为国为民”的英雄梦。中学时，我还在《文汇报》《亦报》发过几篇文字，一心想靠笔墨抒发情怀。但作为家中长子，父亲一句“学工科方能养家”，让我懵懂走进南京工学院建筑系。

    ③那时我根本不懂建筑学，也没有任何美术基础。比起受过专业训练的同学，我就是个“菜鸟”，但我始终憋着一口气。大学前两年，我把所有时间都用来苦练素描和水彩，元旦前夜的空教室，盛夏闷热的亭子间，都有我画画的身影。在摸索色彩、线条和光影的过程中，我发现建筑学不仅是工程技术，更是空间与美的艺术创造，模糊的建筑世界慢慢清晰，也让我萌生出对建筑的热爱与理想，前行的道路愈发的坚定。

    ④真正让我将建筑当作一生事业的，是时代赋予的热忱与期许。新中国成立之初，山河焕新，百业待兴，间与美的艺术创造，模糊的建筑世界慢慢清晰，也让我萌生出对建筑的热爱与理想，前行的道路愈发的坚军，赛场上的欢呼，让我心潮澎湃，一颗用专业为中国建筑在世界赛场“夺冠”的种子，自此在心底萌芽。

    ⑤就在我以满腔热忱准备大展拳脚，渴望将所学付诸更多实践时，时代的浪潮骤然翻涌，专业工作戛然而止，命运的小舟被推向未知的航道。1970年，我从北京远赴山西临汾，前路茫茫，唯有沉下心来修炼内功。没有恢弘的公共建筑可做，便从小规模的工业厂房起步;没有充足的设计经费，便在有限的条件里雕琢巧思。我人生中第一个建成的作品，是临汾解放军某部的一座公共厕所，哪怕只是方寸之地，我仍力求让功能与设计相融。十年间，我在一个个中小型项目中摸爬滚打，从施工图绘制到工程难题破解，每一次实践都是一次沉淀。这些经历，让我在困境中寻得了一份内心的自在。离开临汾时，我已经有了自信，无论项目多大、多复杂，应该没有我解决不了的困难!

    ⑥1981年，我调到杭州建筑设计院。当时杭州旅游业发展很快，急需配套的高档酒店。黄龙饭店项目中，出资方请来的美国和香港建筑师，设计的都是百米板式高楼，立在西湖边像一堵厚墙，隔断了城市与山深藏;就像“山重水复疑无路，柳暗花明又一村”的曲折回转，豁然开朗。这般曲折掩映、藏露相生的空间做方案的机会。我借鉴中国画的留白手法，在建筑之间留出让城市与风景相融的空间。搭配自然围合的庭园，营造江南园林“移步换景”“婉转藏趣”的意境。就像“竹径通幽处，禅房花木深”的婉转穿行，意趣深藏;就像“山重水复疑无路，柳暗花明又一村”的曲折回转，豁然开朗。这般曲折掩映、藏露相生的空间营造，尽显传统美学含蓄内敛的审美特质。整整一年，我埋首案头画方案，稿纸堆到半人高，最终方案脱颖而出成功入选。在杭州多年的设计实践中，我始终坚信，“中国制造”的本土建筑师，完全可以走出一条自己的路。带着这份信念，我设计的加纳国家剧院、马里共和国会议大厦，将“中国建筑语言”运用到国际实践中，最终让中式建造走向世界。

    ⑦1995年我到了退休年龄，正处于创作活跃期，格外珍惜那时的创作环境，暗下决心，不管多难，都要继续做设计。退休之后，我放下繁琐事务，潜心钻研建筑理论。以东方哲学为根基，建构“境界、意境、语言”三位一体的中国建筑理论体系，希望借此引领中国新一代的建筑师坚守传统，勇于创新，为行业发展贡献独特的中国智慧。

    ⑧人生如远行，回望来时路，建筑如人生，人生如建筑，都需要在不确定中找确定，在变化中守住平衡。

    生命是流动的，我选择在流动中寻找自己的形状，在行走中成为自己的样子。

    (取材于《人民日报》2026年2月25日第20版，有删改)'
