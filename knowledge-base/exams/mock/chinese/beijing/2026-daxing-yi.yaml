  body: '江城子·密州出猎苏轼老夫聊发少年狂，左牵黄，右擎苍，锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。

    酒酣胸胆尚开张，鬓微霜，又何妨!持节云中，何日遣冯唐?会挽雕弓如满月，西北望，射天狼。'
- id: classical_3
  type: classical
  q_range:
  - 13
  - 16
  body: '鱼，我所欲也;熊掌，亦我所欲也。二者不可得兼，舍鱼而取熊掌者也。生，亦我所欲也;义，亦我所欲也。二者不可得兼，舍生而取义者也。生亦我所欲，所欲有甚于生者，故不为苟得也;死亦我所恶，所恶有甚于死者，故患有所不辟也。如使人之所欲莫甚于生，则凡可以得生者何不用也?使人之所恶莫甚于死者，则凡可以辟患者何不为也?由是则生而有不用也，由是则可以辟患而有不为也。是故所欲有甚于生者，所恶有甚于死者。非独贤者有是心也，人皆有之，贤者能勿丧耳。

    一箪食，一豆羹，得之则生，弗得则死。呼尔而与之，行道之人弗受;蹴尔而与之，乞人不屑也。万钟则不辩礼义而受之，万钟于我何加焉!为宫室之美、妻妾之奉、所识穷乏者得我与?乡为身死而不受，今为宫室之美为之;乡为身死而不受，今为妻妾之奉为之;乡为身死而不受，今为所识穷乏者得我而为之:是亦不可以已乎?此之谓失其本心。'
