  body: '江城子·密州出猎苏轼老夫聊发少年狂，左年黄，右擎苍，锦帽貂兔，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。

    泊甜胸胆尚开张。裂微霜，又何妨!持节云中，何日遣冯唐?会恍雕弓如满月，西北望，射天狼，'
- id: classical_3
  type: classical
  q_range:
  - 14
  - 16
  body: 天时不如地利，地利不如人和。三里之城，七里之亦，环而攻之而不胜。夫环而攻之，必有得天时老矣，然而不胜者，是天时不如地利也。城非不高也，池非不深也，兵革非不坚利也，米秉非不多也，委而去之，是地利不如人和也。故曰:域民不以封壁之界，固国不以山溪之险，威天下不以兵羊之利。得道者多助，失道者寡助。寡助之至，亲成畔之;多助之至，天下顺之。以天下之所顺，攻亲成之所畔，故君子有不战，战必胜矣。
