  body: '材料一2024年住房城乡建设部组织编制了《口袋公园建设指南(试行)》，以加强城市口杂公园规划、建设、管理工作。《指南》全面践行“人民城市”重要理念，明确了口袋公园建设需遵循的五大原则。一是可大可小，因地制宜。结合实施城市更新，留白增绿、拆违建绿、见缝插绿等建设口袋公园。充分尊重和利用场地原有地形和植被，突出地域文脉特征，形成“一园一品”景观格局。二是全龄友好，便民亲民。充分考虑周边群众需求，重点选址公园绿化活动场地服务半径覆盖不足的区域，落实适老化和儿童友好等要求，增加活动场地，完善配套设施，打造多元活动场所。三是科学布局，安全舒适。选址和建设应尽量规避各类潜在风险因素，科学进行功能布局，有效控制公园中的各类休闲活动对周边居民造成的干扰。四是以需定供，节俭务实。落实节约型园林和绿色低碳理念，根据群众使用需求合理配置设施，优先应用乡土植物，倡导使用节能、节水的材料、技术和工艺。

    五是多元交流，共建共享。探索建立“政府引导、社会参与”的多元建设管理机制，引导市民参与公园选址、设计、建设和养护管理，共建共享美好环境。总之，口袋公园的出现，解决了如何利用有限的土地打造高品质生活空间的难题。

    材料二作为一个联通碎片空间、兼具多样使用功能的复合型开放空间，口袋公园让居民在家门口邂逅“诗与远方”。它的建设聚焦自然美景的引入、历史文化的延续和艺术审美的升级。但同时，功能设置中的文化展示和科普教育功能在小型和中型口袋公园中较难实现。

    可见，表1口袋公园功能设置功能小型口袋公园中型口袋公园大型口袋公园休闲游憩儿童游戏●●运动健身●文化展示OO科普教育OO宜设置:可设置:O材料三近年来，北京建起了大大小小共计610多处“口袋公园”。西城区东棉寿里胡同南口的口袋公园始建于2018年，占地800多平方米的小公园就建在胡同口，精巧玲珑的公园内栽植老玉兰、石榴、柿子树等，午后暖阳从中式风格的围挡间洒下，更为胡同平添了几分生机。不同于周围竖起高高围栏的大公园，校尉胡同旁经过拆除违建、腾退土地后建起丁占地约3000平方米的“步入式”口袋公园。它临街而建，没有正式的大门，这儿的口公园用开放的姿态，让周围的居民能更好地亲近绿意。这些北京胡同旁的“口袋公园”，为这座古老而又现代的城市增添了无限的生机与活力。'
