  - 24
  body: '先生教我写散文王凯利①可能是因为从事文化广电和新闻出版工作的缘故，我和陈忠实先生有过不少工作交集。

    ②多次参会，有幸被主办方安排和陈先生坐在一起。在会议开始前的空闲时间里，往往是我向先生请教和交流的难得机会，有时看似海阔天空般谈笑风生，却让我从中受益匪浅，终生难忘。

    ③有次参加灞桥区非遗展演大会，我远远看到陈先生，便急忙迎上前去，紧紧握住他的手说:“咱俩又坐到一块儿了!”陈先生谦逊地急忙起身，半开玩笑地说:“你是管文化的，我归你什么。”坐定后，陈先生说:“我在报纸上看到你万的散文了，写得不错!”

    我深知这是先生的励，当不得真，就接惹说:“咱俩上一次见而时，我说你的书法好，你说那称不止书法，只能算是写大字。我写的那些也算不上散文，只能是小学生作文买了。”

    说罢，我俩四目相视，莞尔一笑。紧接着，我有一招没一招地说:“散文好写，比较随意，想到哪儿写到哪儿。”陈先生听罢，很认真地说:“要写好也不容易!关键是立意不能收。”

    少顷，先生又接着说:“你不爷写啥，要想感动别人，你自己先要被感动。要想让别人能读下去，你自己先要觉得有意思。”我闻言插话:“极是，极是!”正在这时，主持人宣布大会开始!热烈的掌声打断了我俩的谈话。

    ④陈先生言简意赅，却让我琢磨许久，从中受益良多。尽管如此，仍觉得先生言犹未尽。于是，我找来《陈忠实散文精选集》，在书中与先生对话。当我读到《漕渠三月三》时，深深被他饱蘸乡土气息的细腻笔触所折服，被他笔下锣鼓喧天的古会盛况所震撼;对古会场景细致入微的悉心描画，让人宛若身临其境，是点睛之处。这篇大作催促我两赴漕渠古会，模仿先生的笔意，学写了一篇《也说漕渠三月三》，发表在《西安晚报》上。而先生的《寻找属于自己的句子--<白鹿原创作手记>》，仅这个文章标题，就足以振聋发聩、催人返璞归真。纵观先生的散文，无不以心相付，本色为文。

    ⑤此后，我处处以先生为榜样，创作力戒矫揉造作，绝不无病呻吟。多年来，我时时按照先生的教诲，习作紧扣主题，“走多远都要回来”。努力做到自己不感动的不写，立意不高的不写，没有亲身体验的不写。

    ⑥记得在一个文化艺术品展览会上，我偶遇陈先生。微笑、问好、握手后，我急切地询问:“我想把在报纸杂志上发表过的散文出个集子。想了好几个题目，都觉得美中不足。

    叫《日暮苍山远》吧、觉得有点儿苍凉;叫《我牵岁月踏歌行》吧，显得有些张狂······”陈老师打断我的话说:“虽说题目是个文眼，但内容比题目更重要。要让人记得住内容，这才是最要紧的，这才算好文章。”

    ⑦其实，我原本汇集了一百篇文章，正打算结集出版。陈先生的话让我醍醐灌顶。于是，我回去后又重新审读了所有文章，果断地拿掉了14篇;以“散文集”出版后，自己甚觉满意，反响也还算不错。

    ⑧但遗憾的是，再也没有请先生写序的机会了。

    (原文刊于《西安晚报》2026年03月13日08版，有删改)注:①陈忠实(1942-2016)，中国当代著名作家，中国作家协会副主席。'
