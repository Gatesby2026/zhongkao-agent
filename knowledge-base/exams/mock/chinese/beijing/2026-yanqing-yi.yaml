    转着柔和光泽。门前铜獬豸昂首挺胸，如忠诚卫士般守护着庄严殿宇，尽显富丽堂皇的气

    派。

    东侧堆秀山则由各色奇石错落堆叠而成，形似青螺浮水。石缝间垂着的碧绿藤蔓，随

    风摇曳。山顶御景亭檐角微翘，似欲展翅的飞鸟。登亭远眺，紫禁城红墙黛瓦如浪潮般铺

    展，一望无际的开阔感油然而生。山石与亭台相映，藤蔓与光影交织

    钛安殿与堆秀山这般别具匠心的设计，让硬朗的建筑多了几分清新淡雅的韵味，不愧

    是古典园林中天造地设的妙笔。

    5.你检查文段中成语的使用情况。下列成语使用不拾当的一项是

    A.相映成趣

    B.富丽堂皇

    C.油然而生

    D.天造地设

    6.你根据语境判断画线词语“妙笔”的意思，下列理解正确的一项是

    A.用于创作的神奇之笔

    B.园林建造中的精妙设计

    C.擅长造园的巧匠

    D.园林管造的精良材料

    结语

    故宫，用巍峨殿宇诉说历史沧桑

    用雅孜园林演绎天人合-。

    它不

    仅是北京的文化地标，更是中华文明的精神象征，值得我们永远珍视与传承。

    7.根据语境，你在文段中的横线处补写一个分句。'
