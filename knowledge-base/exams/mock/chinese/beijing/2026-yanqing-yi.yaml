    1. 请在手册封面用正楷字规范书写标题:“一脉文渊，紫禁流芳”推荐手册。

    资料一

    故宫，曾经的“紫禁城”，是明清两代的皇家宫殿建筑群。故宫zuu8在北京中轴

    线上，讲究对称，遵循“前朝后寝”古制。前朝以太和、中和、保和三大殿为核心，殿宇

    巍峨壮丽，彰显皇权至尊，是举行shengda典礼的地方;后寝以乾清、交泰、坤宁后三

    宫及东西六宫为主，布局紧凑精巧，是帝后生活的地方。故宫坐北朝南，北侧倚景山，南

    侧临金水河，山水相依，意境和谐。1925年故宫博物院正式成立，标志着这座皇家禁苑

    从私藏变为全民共享的文化遗产。从皇权中心到现代博物院,丛开放文化空间到封闭宫殿，

    故宫以崭新的姿态笑纳八方宾朋。

    2.请你确定文段中拼音处的汉字和加点字的读音，全都正确的一项是

    A.坐落称(chen)

    盛大

    苑(yuan)

    B.座落称(cheng)胜大苑(yuon)

    C.坐落称(cheng)

    盛大

    苑(yuon)

    D.座落称(chen)

    胜大苑(yuan)

    3.画线句作为这一段的结尾句，有两处存在问题，请你加以修改。

    资料二

    故宫博物院馆藏文物达186万余件(套)，跨越新石器时代至明清，涵盖书画、陶瓷、

    玉器等25大类，宛如一部镌刻着文明印记的立体百科全书。

    《清明上河图》《伯远帖》

    等传世书画珍品，笔墨间流淌着千年文脉的气韵;“大清受命之宝”的印玺上，沉淀看三

    朝近迭的库重。它们似一位位沉肤的仿他、诉说着延续不绝的中华文明。这些火物来源广

    泛，飙包括历代皇家旧威、穹廷特制、也有后世征集与捐睥。这里的每件文物都承截养特

    有的价值，如掐丝珐琅见证工艺传承，莲鹤方壶展现文明交舳，曾侯乙编钟彰显匠艺苹新，

    它们成为中华文明

    和

    的鲜活见证。

    4.你在文段中的横线处填入一组词语，下列最恰当的一项是

    A.创新

