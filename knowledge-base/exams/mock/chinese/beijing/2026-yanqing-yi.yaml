  - 4
  body: '故宫博物院馆藏文物达186万余件(套)，跨越新石器时代至明清，涵盖书画、陶瓷、玉器等25大类，宛如一部镌刻着文明印记的立体百科全书。《清明上河图》《伯远帖》等传世书画珍品，笔墨间流淌着千年文脉的气韵;“大清受命之宝”的印玺上，沉沉看三朝更速的厚重。它们似一位位沉默的仿他，诉说,养延续不绝的中华文明。这些火物来源广泛，风包括历代皇家旧威、宫廷特制、也有后世征集与捐赠。这里的每件文物都承载并特有的价值，如掐丝珐琅见证工艺传承，莲鹤方壶展现文明文融，曾侯乙编钟彰显匠艺革新，它们成为中华文明和的鲜活见证。

    包容接续创新接续包容创新创新包容'
- id: base_资料三
  type: base
  name: 资料三
  q_range:
  - 5
  - 7
  body: '故宫并非纯粹的宫殿集群，其园林景观秉持“虽由人作，宛自天开”的理念，成为皇家生活的诗意点缀。闻名遐迩的御花园中，最动人的莫过于钦安殿与堆秀山的相映成趣。

    钦安殿如一位沉稳的老者，静静伫立在园心。殿顶黄瓦像铺着一层碎金，在日光下流转着柔和光泽。门前铜獬豸昂首挺胸，如忠诚卫士般守护着庄严殿宇，尽显富丽堂皇的气派。

    东侧堆秀山则由各色奇石错落堆叠而成，形似青螺浮水。石缝间垂着的碧绿藤蔓，随风摇曳。山顶御景亭檐角微翘，似欲展翅的飞鸟。登亭远眺，紫禁城红墙黛瓦如浪潮般铺展，一望无际的开阔感油然而生。山石与亭台相映，藤蔓与光影交织。

    钦安殿与堆秀山这般别具匠心的设计，让硬朗的建筑多了几分清新淡雅的韵味，不愧是古典园林中天造地设的妙笔。

    结语故宫，用巍峨殿宇诉说历史沧桑，，用雅致园林演绎天人合一。它不仅是北京的文化地标，更是中华文明的精神象征，值得我们永远珍视与传承。'
