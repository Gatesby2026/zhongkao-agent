  body: '故宫，曾经的“紫禁城”，是明清两代的皇家宫殿建筑群。故宫zuòluò在北京中轴线上，讲究对称，遵循“前朝后寝”古制。前朝以太和、中和、保和三大殿为核心，殿宇巍峨壮丽，彰显皇权至尊，是举行shèngdà典礼的地方;后寝以乾清、交泰、坤宁后三宫及东西六宫为主，布局紧凑精巧，是帝后生活的地方。故宫坐北朝南，北侧倚景山，南侧临金水河，山水相依，意境和谐。1925年故宫博物院正式成立，标志着这座皇家禁苑从私藏变为全民共享的文化遗产。从皇权中心到现代博物院，从开放文化空间到封闭宫殿，故宫以崭新的姿态笑纳八方宾朋。

    盛大苑(yuàn)盛大苑(yuón)'
