    B.园林建造中的精妙设计

    C.擅长造园的巧匠

    D.园林管造的精良材料

    结语

    故宫，用巍峨殿宇诉说历史沧桑

    用雅孜园林演绎天人合-。

    它不

    仅是北京的文化地标，更是中华文明的精神象征，值得我们永远珍视与传承。

