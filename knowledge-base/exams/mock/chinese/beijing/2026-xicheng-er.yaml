    阳台空置的紫砂花盆有了去处，父亲不要我买来的五颜六色包装精美的营养土，他固执地把自己带过来的泥土一捧一捧填进盆里。他不用小铲，直接用手小心地把大块的土疙瘩捏碎，把板结的地方慢慢揉开，就像给一个疲惫的旅人做按摩一样。他念叨着:“这土是有灵性的，你伺候好它，它就知道，你长出最好的庄稼来。那些个花花绿绿的土，看着美观，不长精气神。”

    他种了从老家干辣椒里抠出的籽，照料这盆辣椒成了他在城里最要紧的事。天刚亮他就蹲在阳台看土的干湿。父亲说:“庄稼和人一样，吃喝要有度，水多了，根就烂了。”

    他总搬个马扎坐在花盆边，一坐就是半天，背弯得像经了风雨的老树，目光越过栏杆，投向楼宇间被割得细碎的天空。我知道他看的不是这儿的天，他的眼光顺着这盆土牵的线，飘回了那片能望到地平线的庄稼地。这盆土是他在城市钢筋混凝土丛林里的一座孤岛，也是一个不会让他彻底迷失方向的锚点。只有对着它，父亲紧绷的肩膀才会放松。

    辣椒苗慢慢长出了鲜活的绿，父亲眼里的笑意也越来越浓。夏天时结出了火红的朝天椒，他摘了小半把炒肉片，那辣味冲得有劲儿，吃下去有阳光的暖，有老家泥土的味道。

    父亲吃得额头冒汗，脸上的皱纹在这熟悉的辛辣里，仿佛都被熨帖得舒展开来。那一刻，他是在自己的土地上，享用着自己收获的果实，他甚至有点得意地瞥了我一眼，又看了眼我老公说:“咋样?这味儿正吧?城里的辣椒，长不出这个劲儿。”我点了点头，嘴里辣得很，心里酸涩得很，我知道，他吃下去的不仅仅是辣椒，还有对自己一生劳作的确认。

    可城里留不住他，他的身体像移错了地方的树，慢慢枯了，查出来是老肺病。他待在阳台的时间越来越长，一遍遍摸着这盆土。秋霜来的时候，辣椒枯了，只剩光秃秃的枝子倔强地站着，父亲没说扔，我们就让它立着。

    父亲是在一个秋日午后走的，坐在阳台的小马扎上，手边就是那盆土。

    悲伤沉淀后，老公试探着说:“把土扔了吧，板结了，占地方。爸......爸也不在了。”我没说话，蹲下来像父亲那样摸了摸硬邦邦的土块，指尖是熟悉的粗糙感。我抬头对老公说:“这是爸的心愿，也是....

    我的根。”

    最后那盆土没扔掉，我们找来一个素净的青灰陶盆，把父亲带来的泥土还有那些枯死的辣椒根一起重新栽进去。没有种上其他的花草，就让它空着。这一次老公没说话，只是默默地帮我收拾着。也许他也明白，有些东西的价值不在于有没有用处，而在于有没有。

    有时我会站在阳台上看那一盆土，粗糙，黑褐，静静地躺在那里，仿佛看见父亲佝偻着背坐在小马扎上，用布满老茧的手一遍又一遍、深情而又虔诚地抚摸着他魂牵梦绕的故土。我也伸出手去摸一摸，仿佛可以通过这片土地接触到父亲的大手，接触到故土的心跳。

    这盆泥土，是父亲留给我最后的遗产，也许不会再长出辣椒，但是会生长出①，生长出②。

    (取材于《作家天地》2026年第3期同名文章)关注北京高考在线官方微信:京考一点通(微信号:bjgkzx)，获取更多试题资料及排名分析信息。'
- id: argument
  type: argument
