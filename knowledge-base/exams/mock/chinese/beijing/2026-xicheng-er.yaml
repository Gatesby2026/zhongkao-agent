  body: '父亲的泥土老毛亚莉父亲挑着两袋印着“尿素”蓝字的蛇皮袋走进我家客厅，两个多小时的山路车程，让他风尘仆仆，布鞋边还沾着田埂上新鲜的黄泥。他把沉甸甸的袋子轻轻放在一尘不染的地板上。老公眼角闪过一丝不易察觉的皱眉，但没说什么，转身去倒茶。

    “爸，您带这么两大袋东西，啥呀?这么沉。”父亲笑得意又神秘，没直接回答，只用那双布满粗纹、指甲缝永远嵌着褐色泥渍的手，解开扎袋口的麻绳。袋口一掀开，一股浓烈的气息扑出来。有腐熟草木的微涩，有晒透砂石的干暖，还有雨后天晴田野特有的鲜活气，一下子挤走了客厅里淡淡的柠檬香，蛮横，却让人心里踏实。

    “土，咱家地里的土。”父亲说着，掌心轻轻探进袋里，像抚摸熟睡的婴儿，让混着细碎草根的土沫从指缝间簌簌落下。他看泥土的眼神，浑浊又清亮。

    这土我太熟悉了。童年时它黏在父亲的犁铧上，沾在他的裤腿上，嵌在他的掌纹里。就是这土养活了高粱玉米，也温暖了我的童年:我光着脚踩在新翻的软土上，温热的触感从脚底钻到心口。

    埂上，头枕着泥土看天，汗珠落进土里瞬间就没了影，他说“人吃土，一辈子”，那时我不懂，现在看着他看土的眼神，好像突然就明白了。

