  body: '“寻常一样窗前月，才有梅花便不同。”不同在于何处?我们只能感到而不能说出。

    但仅乎像吃糖一般地感到一下子甜，而无以记录站在窗前所切实地经验的这微妙的心情，我们总不甘心。于是就有聪明的人出来，煞费苦心地设法表现这般心情。这等人就是艺术家，他们所作的就是艺术。

    于窗前的梅花，在我们只能观赏一下，至多低徊感叹一下。但在宋朝的梅花画家杨无咎，处处是杰作的题材;在词人姜白石，可为《暗香》《疏影》的动机。我们看了梅花的横幅，读了《暗香》《疏影》，往往觉得比看到真的梅花更多微妙的感动，于此可见艺术的高贵!可见凡物一入作品便会美起来。梅兰竹菊，实物都极平常。试看:真的梅树不过是几条枯枝;真的兰叶不过是一种大草;真的竹叶散漫不足取;真的菊花与无名的野花也没有什么大差。经过了画家的表现，方才美化而为四君子。这不是横幅借光梅花的美，而是梅花借光横幅的美。梅花受世人的青眼，全靠画家的提拔。世间的庸人俗子，他们听见画家有四君子之作，因而另眼看待它们。另眼看待之后，自然对于它们特别注意;特别注意的结果，也会渐渐地发现其可爱了。

    有人说:人们不是为了悲哀而哭泣，乃为了哭泣而悲哀的。在艺术上也有同样的情形，人们不是感到了自然的美而表现为绘画，乃表现了绘画而感到自然的美。换言之，绘画不是模仿自然，自然是模仿绘画的。

    英国诗人王尔德有“人生模仿艺术”之说。从前的人，都以为艺术是模仿人生的。

    例如文学描写人生，绘画描写景物，但他却深进一层，说“人生模仿艺术”。小说可以变动世间的人的生活，图画可以变动世间的人的相貌。据论者所说，这是确然的事:卢骚(卢梭)作了《哀米儿》(《爱弥儿》)，说法国的妇人大家退出应接室与跳舞厅而回到育儿室中去。日本的竹久梦二画了大眼睛的女颜，日本现在的少女的眼睛都同银杏果一样。

    有一位善于趣话的朋友对我说:“倘使世间的画家大家都画没有头的人，不久世间的人将统统没有头了。”读者以为这是笑话么?其实并不是笑话。世间的画家决不会画没有头的人，所以人的头决不会没有。但“人生模仿艺术”之说，决不是夸张的。因为艺术家常是敏感的，常是时代的先驱者。世人所未曾做到的事，艺术家有先见之明。所以艺术家创造未来的世界，众人当然跟了他实行。艺术家创造未来的自然，自然也会因了培养的关系而跟了他变形。梅花经过了杨无咎与姜白石的描写，而渐渐地美化。今日的梅花，一定比宋朝以前的梅花美丽得多了。

    (选自丰子恺《从梅花说到艺术》，有删节)'
