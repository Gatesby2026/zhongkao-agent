  body: '[甲]白雪歌送武判官归京岑参北风卷地白草折，胡天八月即飞雪。

    忽如一夜春风来，千树万树梨花开。

    散入珠帘湿罗幕，狐裘不暖锦衾薄。

    将军角弓不得控，都护铁衣冷难着。

    瀚海阑千百丈冰，愁云惨淡万里凝。

    中军置酒饮归客，胡琴琵琶与羌笛。

    纷纷暮雪下辕门，风掣红旗冻不翻。

    轮台东门送君去，去时雪满天山路。

    山回路转不见君，雪上空留马行处。

    [乙]别董大高适千里黄云白日曛，北风吹雁雪纷纷。

    莫愁前路无知己，天下谁人不识君?'
