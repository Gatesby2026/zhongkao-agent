  type: subjective_blank
  score: 4.0
  stem: '一直以来，大自然都是中国古代文人的情感共鸣体。结合上面两则文字和下面材料，分别说说苏轼、周敦颐、韩愈是如何借助自然景物表达思想情感的。(4分)乐也者，郁于中而泄于外者也，择其善鸣者而假①之鸣。金、石、丝、竹、匏、土、苹、木②八者，物之善鸣者也。维天之于时也亦然，择其善鸣者而假之鸣。是故以鸟呜春，以雷鸣夏，以虫鸣秋，以风鸣冬。四时之相推敚③，其必有不得其平者乎!其于人也亦然。人声之精者为言，文辞之于言，又其精也，尤择其善鸣者而假之鸣。

    (韩愈《送孟东野①序》)①假:借助。②金、石、丝、竹、匏(páo)、土、革、木:中国传统乐器的八种制作材料，也用来指各类乐器。③推敚(duó):推移变化。④东野:作者友人孟郊的字。孟郊与贾岛同为苦吟诗人，以“郊寒岛瘦”并称。'
  answer: ''
  solution: '示例:①苏轼将月下景比喻成“积水”“藻、荇”，描绘了一个空明澄澈的美妙境界，表达出他旷


    达、乐观的情怀;②周教颐以花喻人，通过对莲花坚贞高洁品德的描绘，表达自己对正直品德的

    追求;③韩愈以自然之声类比，指出世间万物受到不平之气都会发声，表达对人应以文发声的

    肯定。'
