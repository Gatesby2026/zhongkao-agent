  stem: 读完全文后，有同学发现文章结尾段语言凝练，意蕴深厚。你从该段的表达形式中获得了怎样的启示?请简要说说。(4分)
  answer: ''
  solution: '示例:


    (一)获得的启示是表达时句式可以整散结合。如文章结尾段“穿越山川，穿越时光，流淌

    着文明的光芒”，前两个分句字数相同，句式齐整，第三个分句字数稍多，语言简洁典雅，意思层

    层递进，既总结了全文内容，写出河流与人的相互依存、和谐共生关系，又使语言富有节奏感。

    (二)从修辞和写法的综合运用上获得了启示。运用比喻修辞。如段中把临夏的河比作中

    华血脉，赋予河流以宏大的文化意蕴，表达作者对山河与人依存共生的赞叹。情感深沉，境界

    开阔。同时，还在写法上以小见大。如文中不局限于写河流的自然样貌，将临夏之河当作文明

    载体、民族血脉的象征。这两种表达形式的综合使用，跳出了景物本身，既挖掘了景物承载的

    历史底蕴与文化价值，又使全文主旨得到升华。


