    音乐，是将郁结于心的感情抒发出来，选择善于发声的器物来借助它发声。钟铸、磬、琴瑟、箫

    管、笙、顷、鼓、祝敌这八类，是器物中善于发声的。天对于四时也是如此，选择善于发声的东西借

    助它来发声。所以让鸟为春天歌唱，让雷为夏天轰鸣，让虫为秋天鸣叫，让风为冬天呼啸。四季的

    推移变化，其中必定有什么地方得不到平静吧!对于人来说也是如此。人的声音中比较精华的是

    语言，文辞对于语言来说，又是语言中最精华的，所以尤其要选择善于代言的人来借助他们发言。

