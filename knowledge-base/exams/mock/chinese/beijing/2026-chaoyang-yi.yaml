  body: '①班级足球赛、趣味爬树课、科学运动专家讲座……2026年春季开学，北京市各级各类学校以“健康第一”为主题开展开学第一课。开学第一周，北京市中小学全面启动“班超”联赛，全年计划举办赛事40万场，覆盖学生超1000万人次，构建“人人有项目、班班有队伍、周周有比赛”的体育竞赛格局。

    ②不仅北京市，全国各地都在深入落实国家“学生体质强健计划”。一方面确保“每天综合体育活动2小时”“课间15分钟”扎扎实实落到每所学校，惠及每个学生；另一方面让校园通过体育赛事，迅速热起来、燃起来、多措并举，让体育锻炼融入学生日常，激发学生锻炼热情，让孩子们真正练通透、玩尽兴、有收获，在奔跑跳跃中增强体质、健全人格和锤炼意志。

    ③近年来，国家持续强化学生体质健康顶层设计。2012年，教育部等四部门印发文件，明确“每天一小时校园体育活动”刚性要求；2016年，深化学校体育改革；2021年，构建一体化健康教育体系……通过一系列增强学生体质的行动，中小学生体质健康合格率整体处于较高水平。从图可知，2022年到2024年________________。可见，学生体质健康状况总体呈现良好态势。

