  stem: 下列对文中加点词和画线句的分析，说法·不恰当·的一项是（ ）
  options:
    A: 第①段中的“常常”具有限定的作用，增强了文章语言的客观性。
    B: 第③段中连用“正是因为……才……”，强调“快”是时代进步的动力。
    C: 第⑤段中的画线句是举例论证，证明快中有慢的积淀，慢里有快的力量。
    D: 第⑥段中的“也”表示递进关系，进一步证明快与慢是普通人生活的辩证法。
  answer: D
  solution: D.第⑤段是从社会发展、事业建树层面谈快慢辩证，第⑥段“于普通人而言，快与慢也是生活的辩证法”，前后两个层面属于并列关系，因此，“也”不是表递进关系，分析不恰当。
