  stem: '按要求作文


    每一次奔跑都是速度与激情的较量，每一次尝试都是在为梦想寻找新的可能。生命在于运动，改变始于行动。动起来，让活力充盈身心，让美好悄然发生。


    请以“来，动起来”为题作文。文体不限，诗歌除外。


    要求：将作文题目写在答题卡上，作文内容积极向上，字数在600-800之间，不出现真实的学校名称、师生姓名等。'
  answer: ''
  solution: '来，动起来  晨光透过窗棂。看着黑板上“生命在于运动，改变始于行动”的标语，我深吸一口气，终于鼓起勇气，迈出了改变的第一步——动起来。  曾经的我，是个十足的“宅家派”，运动于我而言，是遥不可及的事情。直到那次运动会，看着同学们在跑道上奋力奔跑，在操场上肆意跳跃，他们脸上的汗水与笑容，像一束光，照亮了我沉寂的世界。我忽然明白，所谓活力，从来不是凭空而来，而是动起来之后，自然绽放的光芒。  我开始尝试动起来。每天清晨，我不再赖床，迎着朝阳慢跑在小区的小径上，起初不过几百米就气喘吁吁，双腿发软，好几次都想放弃。但我告诉自己，每一次奔跑，都是向更好的自己靠近。渐渐地，我能跑完一圈、两圈，风拂过耳畔，带走疲惫，也让我感受到了前所未有的轻松。课间，我不再久坐，和同学们一起跳绳、踢毽子，欢声笑语中，不仅锻炼了身体，更收获了并肩同行的快乐。  动起来，不仅改变了我的身体状态，更重塑了我的心态。曾经的我胆怯、自卑，遇到困难就想退缩。而运动教会我，坚持与勇气比天赋更重要。记得第一次参加班级跳绳比赛，我紧张得手心冒汗，跳得磕磕绊绊。但看着身边同学鼓励的目光，我咬紧牙关，加快节奏，哪怕汗水模糊了双眼，也没有停下脚步。当听到同学们为我欢呼时，我懂得了：动起来，就有希望；坚持下去，就会收获惊喜。  不必畏惧起点太低，不必担心进步缓慢。动起来，不是为了追求速度与完美，而是为了让活力充盈身心，让美好悄然发生。课堂上，主动举手发言，是思维的“动起来”；生活中，主动帮助他人，是善意的“动起来”；成长中，主动挑战自我，是勇气的“动起来”。  夕阳西下，我再次踏上跑道，晚风温柔，脚步轻盈。我知道，每一次奔跑，都是对生命的热爱；每一次行动，都是对梦想的奔赴。朋友，别再犹豫，别再等待，来，动起来！让我们以运动为翼，以行动为帆，在成长的道路上，一路向阳，绽放属于自己的精彩。


    详解：二、选材构思：选材方面，如果选择身体运动方面的“动起来”，可以写自己热爱舞蹈，但一直缺乏勇气去展示，后来在一次活动中鼓起勇气报名参加舞蹈表演，通过不断练习，最终在舞台上绽放光彩，收获了自信和快乐；如果从社会行动角度选材，可以写自己参与环保活动，和同学们一起去公园、街道捡垃圾，宣传环保知识，为保护环境贡献自己的一份力量。结构上，开头可以用一段富有感染力的话语引出“来，动起来”这一主题，如描述生活中人们常见的慵懒状态，与积极“动起来”形成鲜明对比，引发读者兴趣，点明“动起来”的重要性和意义；中间部分详细叙述自己“动起来”的具体事例，按照事情发展的顺序，描述事情的起因、经过和结果，同时可以穿插一些环境描写或他人的反应，来烘托氛围，增强文章的感染力；结尾部分可总结“动起来”给自己带来的收获和感悟，再次强调“来，动起来”的号召，升华主题，鼓励读者也积极行动起来，以积极的态度面对生活，创造属于自己的精彩。'
