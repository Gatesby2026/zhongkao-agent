  body: '北京城市图书馆已成为首都文化新地标。其外形恰似一枚端正的印章，印在“城市绿心”的画卷上。馆内的山谷状门厅、银杏树叶伞盖式屋顶和玻璃幕墙的设计，将森林自然景观与阅读人文空间耦合，让读者寻到一本好书时，不管是临窗而坐，或是暂居廊侧，都能抬头阅尽四季，低头徜徉书海。

    在这座图书馆中，读者既能欣赏建筑的自然通透，又能享受阅读的闲适惬意，还能________。图书馆为读者打造全方位、沉浸式的智慧阅读新体验：在元宇宙体验馆里，AI鲁迅为读者提供导览服务；在智慧桌面上，裸眼3D数字典籍系统能够动态演示《天工开物》的十道工艺……'
