  body: 北京故宫文渊阁，是清代为贮藏《四库全书》而修建的一座皇家藏书楼。藏书楼最惧火灾，故而文渊阁的设计寄寓了以水避火的祈愿。其上层为一通间，下层为六间，体现《易经》“天一生水，地六成之”的理念；因黑色象征水德，绿色象征草木涵养水源，所以文渊阁屋顶覆盖黑色琉璃瓦，檐边配以绿色琉璃剪边，可谓·琳琅满目·；天花板上画的是金莲水草，外檐彩画绘的是游龙海马，·惟妙惟肖·。文渊阁把“水”融入数字，染上屋顶，绘进彩画，·别具匠心·。今天，当你推开文渊阁的黑色木门，仍能感到一股凉意。这座藏书楼以庄重古朴之姿，为后人守住那条·源远流长·的文化长河。
- id: base_资料二
