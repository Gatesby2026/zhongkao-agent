  body: '阅读《曹刿论战》（节选），完成下面小题。

    曹刿论战（节选）

    《左传》

    十年春，齐师伐我。公将战，曹刿请见。其乡人曰：“肉食者谋之，又何间焉？”刿曰：“肉食者鄙，未能远谋。”乃入见。问：“何以战？”公曰：“衣食所安，弗敢专也，必以分人。”对曰：“小惠未遍，民弗从也。”公曰：“牺牲玉帛，弗敢加也，必以信。”对曰：“小信未孚，神弗福也。”公曰：“小大之狱，虽不能察，必以情。”对曰：“忠之属也。可以一战。战则请从。”

    公与之乘，战于长勺。公将鼓之。刿曰：“未可。”齐人三鼓。刿曰：“可矣。”齐师败绩。公将驰之。刿曰：“未可。”下视其辙，登轼而望之，曰：“可矣。”遂逐齐师。'
- id: classical_材料一
  type: classical
  name: 材料一
  q_range: null
  body: '域民不以封疆之界，固国不以山溪之险，威天下不以兵革之利。得道者多助，失道者寡助。寡助之至，亲戚畔之；多助之至，天下顺之。以天下之所顺，攻亲戚之所畔，故君子有不战，战必胜矣。

    （节选自《孟子·公孙丑下》）'
- id: classical_材料二
  type: classical
  name: 材料二
  q_range: null
  body: '子贡问政。子曰：“足食，足兵，民信之矣。”子贡曰：“必不得已而去，于斯三者何先？”曰：“去兵。”子贡曰：“必不得已而去，于斯二者何先？”曰：“去食。自古皆有死，民无信不立。”

    （节选自《论语·颜渊》）

    治国为政，民心所向是根本。曹刿认为鲁庄公以“_____”的态度处理案件，是“忠之属也”，可以凭借这一点去迎战；孟子则认为，使人民安定、国家稳固的根本在于君主能_____；在孔子看来，为政的三要素中，“_____”尤为重要。'
