- id: 13
  type: 文言文综合理解
  score: 2
  stem: '根据《曹刿论战》（节选）及下面两则材料，在后面语段中的横线上填写恰当的内容。


    材料一


    域民不以封疆之界，固国不以山溪之险，威天下不以兵革之利。得道者多助，失道者寡助。寡助之至，亲戚畔之；多助之至，天下顺之。以天下之所顺，攻亲戚之所畔，故君子有不战，战必胜矣。


    （节选自《孟子·公孙丑下》）


    材料二


    子贡问政。子曰：“足食，足兵，民信之矣。”子贡曰：“必不得已而去，于斯三者何先？”曰：“去兵。”子贡曰：“必不得已而去，于斯二者何先？”曰：“去食。自古皆有死，民无信不立。”


    （节选自《论语·颜渊》）


    治国为政，民心所向是根本。曹刿认为鲁庄公以“_____”的态度处理案件，是“忠之属也”，可以凭借这一点去迎战；孟子则认为，使人民安定、国家稳固的根本在于君主能_____；在孔子看来，为政的三要素中，“_____”尤为重要。'
  answer: ''
  solution: '①. 虽不能察，必以情    ②. 施行仁政    ③. 民信之


    详解：第一空，根据《曹刿论战》第一段中“公曰：‘小大之狱，虽不能察，必以情。’对曰：‘忠之属也。可以一战。战则请从’”可知，鲁庄公说，大大小小的案件，即使不能一一明察，也一定按照实情处理，曹刿认为这是尽职分的事，是作战的基础，故此处填“虽不能察，必以情”。

    第二空，根据材料一可知，孟子认为，君主只有施行仁政（得道），才能得到天下百姓的归顺，进而安定人民、稳固国家，故此处填“施行仁政（得道）”。

    第三空，根据材料二可知，孔子认为，粮食、军备、百姓信任三者中，“民信”是国家立足的根本，比粮食、军备更重要，故此处填“民信（民信之）”。'
