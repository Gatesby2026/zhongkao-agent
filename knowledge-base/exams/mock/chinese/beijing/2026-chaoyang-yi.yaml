  body: '阅读《像黄河，永远向前流淌》，完成下面小题。

    像黄河，永远向前流淌

    ①兰州音乐厅是一个特殊的音乐空间，舞台正中幕墙上的巨门一打开，便可直接面对黄河气浪。巨门外是两个庞大的水车，遮天蔽日，它们与黄河之水相连，一道流转，同频共振，将黄河澎湃的回响送入观众耳畔，倾诉着无尽的岁月与时光。

    ②此时，钢琴演奏家方弋已端坐在钢琴前，奋力弹响了第一串音符。此后的每一个章节，都回响着黄河奔流向前之声，拍岸的惊涛、呐喊的号子、激昂的战斗……宛在耳畔，直击我心底。

    ③没有人知道他流过多少血泪——25年前，经历了一场噩梦般的车祸后，医生断言：他的右臂能保住就是万幸，至于弹琴，更是绝无可能！而这次，他要在黄河边上完整演奏《黄河》。

    ④第一乐章《黄河船夫曲》以密集的八度，快速音阶模拟惊涛骇浪，需要坚实的手臂力量与精准的触键。这对他带着3块钢板的右臂、有着寸许长伤疤的右手背来说，是一场难以想象的艰辛跋涉——他是怎样拴着绳子，用左手无数次地拽拉，硬是将它唤醒的？那是超越常人千百倍的付出啊！但这种坚忍，让他更加贴近了黄河纤夫的踉跄脚步。在乐队铺开的浓烈气氛中，他很快进入状态。他对《黄河船夫曲》的埋头疾奏，不是外在的劳动号子，而是他内在的生命搏击。

    ⑤最令我感动的是第二乐章《黄河颂》。他的弹奏，给人以翻越万重峰峦、大河豁然开阔之感。旋律之美，在他的指下尽情绽放，内心深层的涟漪，坦荡拥吻着黄河两岸秀丽的倒影。这种弱键轻奏，让现场观众沉浸其间。我深知这种控制能力，不仅来自他超过常人的技术锤炼，更源于他对生命复杂性的艰深理解。

    ⑥演奏进入《黄河愤》，他对琴键有着更宽阔丰沛的驾驭。车祸后至少有两年的时间，他的右臂无法抬起，手指像被关进牢房，密不透气。石膏的包裹，让他的五指失去了所有的灵气与活动的可能。

    ⑦在某一个阳光温煦的早晨，他将盔甲式的铁硬石膏罩移开后，那种清风拂面的爽透，直抵心坎。他每一刻都在渴望着触摸键盘。刚掀开琴盖时，他的手指，只能一根根按响琴键，像幼儿拿着树枝拨弄溪水，拨出的是一串细弱的水花。指尖弹崩了，小手指尖锐地刺痛，迸出一股鲜血，他仍不肯停下手，键盘上被抹出一道道血迹。他希望让指尖的锐痛唤醒深嵌于右臂中的钢板。

    ⑧今夜，多少不堪回首的往事，终于冲决牢笼，彻底释放。

    ⑨《黄河》的第四乐章，是高潮部分。那段震撼天地的“东方红”，我每次听来都有种血脉偾张之感。由于前3个乐章的匠心铺垫，到了尾声，他越弹越好。当最后一个音符落下，他那刚劲有力的右手从键盘上猛地朝上方扬起。那一瞬间，我顿觉那只不屈的右臂迎着风浪，像一面高挂的云帆。

    ⑩生命的冲动与激情，像滚滚黄河，穿山破壁，再沉重的泥沙，也无法阻挡奔流。这位钢琴家的内心，从来不曾泯灭黄河的壮阔涛声。

    ⑪掌声如雷，经久不息。我看见他缓缓站起身，汗水已经浸透了他的演出服。舞台上的那道巨门没有打开，但是，他演奏的《黄河》则穿墙破壁，让我强烈感受到了黄河已经与他的键盘融为一体：旋涡，波涌，静流，久久无法平复。

    ⑫演出结束后，我在后台见到了他。当他伸出手与我相握时，我能感觉到那只手的重量——不仅是3块钢板的重量，更是他25年坚持的重量。

    ⑬我问：“你此前从未见过黄河，为什么能如此深刻地理解这首作品？”

    ⑭他沉默片刻，回答：“这些年来，我在失去与重建中重新认识了生命。黄河对我而言，不是一条具体的地理河流，而是生命本身的象征。这条古老的河流，<u>有时温顺，有时狂暴，有时清澈，有时浑浊</u>，但永远向前流淌。”

    ⑮我突然明白，这位钢琴家25年的坚持，不过是为了证明：生命可以破碎，但精神永远完整；肉体可以伤残，但梦想永远鲜活。

    ⑯离开音乐厅时，夜色中的黄河在眼前静默。我曾自以为读懂了这条大河，直到今晚，这一曲《黄河》，让我感受到：黄河不仅流淌在中华大地上，更流淌在每个中国人的血脉里。无论你来自哪里，无论你遭遇了怎样的不幸，只要你心中怀着对生命的敬畏与热爱，你就能理解黄河，演绎黄河，融入黄河。

    ⑰这就是黄河的回响，在每一个不屈的生命中，永恒回荡。

    （取材于刘元举同名文章）'
