  stem: 综合三则材料，推动“健康第一”的育人理念扎实落地，可以从_____、_____、_____等方面综合发力。
  answer: ''
  solution: '①. 增强体质    ②. 促进心理健康    ③. 推进“教联体”建设


    详解：第一空：根据材料一第②段、第③段“通过一系列增强学生体质的行动，中小学生体质健康合格率整体处于较高水平”可知，落实“健康第一”理念，首要任务是通过体育活动、赛事等方式增强学生体质，夯实身体健康基础。

    第二空：根据材料二可知，健康包含心理健康维度，需通过开展心理健康活动、完善监测预警机制、建设师资队伍等方式促进学生心理健康，培育积极心理品质。

    第三空：根据材料三前四句可知，学生健康成长需要多方合力，需通过压实学校责任、发挥家庭作用、凝聚社会共识，推进“教联体”建设，构建校家社协同育人体系，为学生健康成长营造良好环境。'
