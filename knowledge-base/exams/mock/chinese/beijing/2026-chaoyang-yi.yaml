  stem: '按要求作文。


    生活中处处有暖。粗拙却珍贵的《山海经》让小鲁迅感受到长妈妈的暖，带着露珠的缅桂花让汪曾祺感受到昆明的暖，志愿服务让社会处处充满温情的暖……一个信任的眼神、一次善意的提醒、一段默默的陪伴……暖，就藏在细微之处。


    请以“暖”为题作文。文体不限，诗歌除外。


    要求：将作文题目写在答题卡上，作文内容积极向上，字数在600-800之间，不出现真实的学校名称、师生姓名等。'
  answer: ''
  solution: '[二选一备选题目，与上一题任选其一作答；本题不重复计分]

    暖  生活就像一杯平淡的白开水，而那些藏在细碎时光里的温柔，便是悄悄融进水里的暖意。暖，从不是轰轰烈烈的壮举，往往就藏在一个眼神、一句叮嘱、一次默默的陪伴里，温柔了岁月，治愈了人心。  深秋的傍晚，冷风卷着落叶漫天飞舞，放学的我站在公交站台，焦急地望着来时的路。天色渐渐暗沉，同行的同学陆续离开，只有我孤零零站在原地，书包沉重，寒意顺着衣角钻进身体里。我忘了带雨伞，也没带零钱，望着灰蒙蒙的天空，心里满是慌张与无助。  就在我不知所措时，旁边一位摆摊卖烤红薯的阿姨轻声开口：“孩子，是不是等不到车，没带伞呀？”我腼腆地点点头，不知该如何回应。阿姨笑着从保温箱里拿出一个热乎乎的红薯，递到我手里：“拿着暖暖手，别冻着了。”红薯滚烫的温度透过掌心蔓延到心底，香甜的气息萦绕在鼻尖。我连忙道谢，阿姨摆摆手，眉眼间满是温柔：“出门在外，互相帮忙都是应该的。”  风还在吹，可我手里捧着温热的红薯，浑身都变得暖和起来。阿姨没有华丽的言语，只是用最朴素的善意，在寒凉的傍晚，给了我一份猝不及防的温暖。那一刻我忽然明白，暖从来都不遥远，它就藏在陌生人善意的举动里。  往后的日子里，我也学着把这份温暖传递下去。看到同学失落时，送上一句安慰；遇见老人过马路，主动上前搀扶；楼道里遇见邻居，笑着道一声问候。微小的善意虽不起眼，却能汇聚成人间最美的温情。  人间烟火，处处皆暖。一份小小的善意，一次不经意的相助，都能化作心底的暖阳。愿我们都能珍藏生活里的每份温暖，也愿我们都能做一个温暖的人，以温柔待人，以善意处世，让暖常在人间流转。


    详解：选材构思。构思上采用“开篇点题——中间叙事——结尾升华”的结构，开头结合提示语引出“暖在细微处”的主旨，中间用三个层次片段支撑内容，结尾总结升华。选材避开空洞典故、老旧俗套事例，不堆砌名人名言，多选用校园日常、邻里相处、陌生人相助、志愿服务等身边真实生活场景，也可选取社会公益、互帮互助等暖心社会热点，让内容接地气、有真情。行文采用“分角度事例+细节描写+内心感悟”的模式，每一段叙事后都回扣“细微处有暖、温暖滋养人心”的主旨，层层推进情感。'
