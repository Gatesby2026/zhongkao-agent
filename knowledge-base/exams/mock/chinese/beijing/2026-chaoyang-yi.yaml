  stem: 文章先是记述了_______，并在其中穿插钢琴演奏家为复出而坚持练琴的艰辛历程，接着记叙演出结束后_______。“我”由此获得了对黄河的深刻理解。
  answer: ''
  solution: '①. “我”欣赏钢琴演奏家演奏《黄河》    ②. “我”与钢琴演奏家的对话


    详解：根据第①②⑨⑪段“兰州音乐厅是一个特殊的音乐空间”“钢琴演奏家方弋已端坐在钢琴前，奋力弹响了第一串音符”“《黄河》的第四乐章，是高潮部分”“掌声如雷，经久不息”可知，文章前半部分主要写“我”现场聆听方弋演奏《黄河》。

    根据第⑫⑬⑭段“演出结束后，我在后台见到了他”“我问：‘你此前从未见过黄河，为什么能如此深刻地理解这首作品？’”可知，后半部分写演出后“我”与他对话，并生出人生与黄河精神的感悟。'
