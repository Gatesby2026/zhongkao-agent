  answer: ''
  solution: '①. 奇丽雪景    ②. 苦寒


    详解：由诗歌第一至第四句分析，诗人描绘出边塞八月狂风呼啸、大雪漫天飞舞的景象。诗句以梨花比喻枝头积雪，画面新奇又壮美，这是诗人亲眼观赏到的奇丽雪景。所以第一空填：奇丽雪景。

    结合诗歌第五至第八句理解，雪花飘入营帐带来寒气，珍贵的皮衣棉被都挡不住冷意。将军的弓箭冻得无法拉开，都护的铠甲冰冷难以穿戴。这些细节都直观体现边塞气候严寒，也让人真切感受到军营生活环境恶劣、条件艰苦，所以第二空填：苦寒。'
