- id: 14
  type: 名著阅读
  score: 5
  stem: '中小学语文教材中，有一些课文是名著选篇，其中不少经典人物形象给我们留下了深刻印象。读过整本书后，你会对这些人物有新的认识。从下面表格中选择一个人物，分别结合课文和整本书的内容，说说你对该人物的认识发生了怎样的变化。（100字左右）


    | 人物 | 课文 | 整本书 |

    |---|---|---|

    | 孙悟空 | 《猴王出世》（五年级下册） | 《西游记》 |

    | 祥子 | 《他像一棵挺脱的树》（五年级下册） | 《骆驼祥子》 |

    | 杨志 | 《智取生辰纲》（九年级上册） | 《水浒传》 |

    | 范进 | 《范进中举》（九年级上册） | 《儒林外史》 |'
  answer: ''
  solution: '示例一：《范进中举》里的范进穷酸卑微，醉心科举，中举后喜极而疯，是令人同情的科举牺牲品。读完《儒林外史》，我发现他迎合豪绅，拉拢权贵，戴孝时还大吃大喝，四处卖弄学问，是个虚伪无耻、人格扭曲的腐儒。  示例二：《智取生辰纲》中的杨志押送生辰纲时，急躁蛮横、刚愎自用。通读《水浒传》后才知，他是将门之后，一心想封妻荫子，却先是失陷花石纲，后又丢失生辰纲，屡遭挫折，是一个怀才不遇、被现实逼上梁山的悲剧人物。


    详解：如选择孙悟空。课文《猴王出世》中，石猴从仙石中迸出，率先闯入水帘洞，带领众猴安家立业，彼时的他，野性十足、天真无畏，眼里满是不受拘束的自在，只让人看到他的果敢与灵动。通读《西游记》全书后才发现，他不仅有闯劲，更有成长：前期大闹天宫，闯地府、闹龙宫，桀骜不驯、无所畏惧；取经路上，历经三打白骨精、智取红孩儿、穿越火焰山等重重磨难，即便被唐僧误解驱逐，也始终忠心护主，从一只顽劣不羁的石猴，逐渐成长为有担当、懂坚守的强者，这份蜕变让我对他有了更深刻的认知。

    如选择祥子。课文中，祥子身材挺拔、精神饱满，拉车时步伐稳健、劲头十足，眼里满是对未来的憧憬，一门心思攒钱，只想买一辆属于自己的新车，那时的他，踏实肯干、纯粹真诚，浑身都是向上的力量。读完《骆驼祥子》全书，才看清他的完整人生：他第一次买车，刚实现心愿就被大兵抢走；第二次攒够钱，又被孙侦探敲诈一空；第三次买车后，虎妞难产离世、心爱的小福子上吊自尽，接二连三的打击彻底击垮了他，从一个勤劳坚韧、心怀希望的青年，沦为麻木潦倒、自甘堕落的行尸走肉，这份落差更让人体会到他的可悲与无奈。

    如选择杨志。课文《智取生辰纲》中，杨志作为押送官，全程小心翼翼、戒备森严，要求军士在最热的正午赶路，不许在凉快处歇息、不许懈怠，却因性格急躁、态度苛刻，与下属矛盾重重，最终被晁盖等人用蒙汗药劫走生辰纲，那时我只觉得他谨慎却固执，不懂变通。通读全书才知道，他的人生远比这复杂：此前他失陷花石纲，落魄到卖祖传宝刀，因牛二百般挑衅、百般羞辱，忍无可忍之下怒杀牛二；他一心想通过建功立业重振仕途，却清高孤傲、不懂得体恤下属，也不懂顺势而为，最终仕途梦碎，被迫投奔梁山，是一个有才干却被性格和时代裹挟的悲情人物。

    如选择范进。课文中，范进寒窗苦读多年，屡试不第，直到五十四岁才中举，喜极而疯的模样，加上岳父胡屠户前倨后恭的态度，只让人觉得他迂腐可笑、沉迷功名。读完《儒林外史》全书，才读懂他的无奈与可悲：二十岁应试，直到五十四岁才得中，期间家境贫寒，只能靠母亲省吃俭用供他读书，受尽胡屠户的辱骂和邻里的嘲讽；他一生被科举捆绑，除了应试毫无谋生本领，中举后也只是依附权贵、无所作为，看似可笑的背后，是封建科举制度对人性的摧残，也让我对他多了一份同情，而非单纯的嘲讽。

    示例一：《猴王出世》里的孙悟空活泼勇敢、机警聪明，带领群猴进入水帘洞成为美猴王，尽显天真烂漫。读完《西游记》，我发现他桀骜不驯、敢作敢当，大闹天宫挑战权威，后又历经磨难保护唐僧取经，终成斗战胜佛，变得成熟稳重。

    示例二：《他像一棵挺脱的树》里的祥子身强体壮、朴实憨厚，怀揣着买车的梦想努力拉车。读完《骆驼祥子》，我发现他在经历三起三落后，变得麻木潦倒、狡猾自私，为了钱出卖阮明，彻底堕落成社会的行尸走肉，令人唏嘘。

    示例三：《智取生辰纲》里的杨志精明能干、急功近利，为保生辰纲精心谋划却最终失败。读完《水浒传》，我发现他本是忠良之后，却命运坎坷，先失花石纲，又丢生辰纲，被迫落草为寇，虽有一身本领却只能在梁山屈居人下，令人惋惜。'
