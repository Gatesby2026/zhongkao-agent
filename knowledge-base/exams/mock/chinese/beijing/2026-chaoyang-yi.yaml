- id: 27
  type: 解答
  score: 40
  stem: '从下面两个题目中任选一题，按要求写一篇作文。

    (1)每-次奔跑都是速度与激情的较量，每一次尝试都是在为梦想寻找新的可能。生命在于运动、改变始于行动。动起来，让活力充盈身心，让美好悄然发生。请以“来，动起来”为题作文。文体不限，诗歌除外。

    (2)生活中处处有暖。粗拙却珍贵的《山海经》让小鲁迅感受到长妈妈的暖，带着露珠的缅桂花让汪曾祺感受到昆明的暖，志愿服务让社会处处充满温情的暖······一个信任的眼神、一次善意的提醒、·段默默的陪伴······暖，就藏在细微之处。请以“暖”为题作文。文体不限，诗歌除外。

    要求:将作文题目写在答题卡上，作文内容积极向上，字数在600-800之间，不出现真实的学校名称、师生姓名等。'
