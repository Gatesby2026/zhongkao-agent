  body: 为儿童青少年健康成长创造良好环境，营造尊重多元、包容差异的社会氛围，要加快加强“教联体”建设，推动学校主体作用与家庭教育、社会服务有效贯通，弹好校家社协同育人“协奏曲”。一是压实学校主体责任，把学生身心健康作为学校考核评价的重要因素，列入教育督导重大专项。二是更好发挥家庭作用，用好家长会、家长课堂，引导家长树立“健康第一”教育理念，塑造和谐融洽亲子关系。三是凝聚社会共识，引导全社会关心支持，共同为学生健康成长护航。政府鼓励各地在法律、政策、制度等方面进行创新，积极推广保障青少年健康成长的经验。2025年，湖南在全国省级层面率先以立法形式构建学生心理健康工作体系，明确促进学生心理健康是全社会的共同责任。
- id: modern_（二）
