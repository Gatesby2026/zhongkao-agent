  score: 3
  stem: 画线诗句展现了雪中送别的场景，言有尽而意无穷。请结合诗句，赏析“满”“空”二字的表达效果。
  answer: ''
  solution: '答案示例：“满”写大雪铺天盖地，突出风雪之大，隐含对友人归程之艰的担忧。“空”写雪地上只留下马蹄痕迹，突出雪野的空寂苍茫与送别后场面的清冷。以雪景烘托情感，抒发了诗人对友人的依依不舍之意，以及因友人返京而产生的惆怅之情。


    详解：诗句“去时雪满天山路，山回路转不见君，雪上空留马行处”意思是：送别友人离去时，漫天大雪铺满了整条天山道路；山路曲折迂回，友人身影渐渐望不见，空旷雪地上只留下一行马蹄印迹。“满”字写出大雪铺满天山整条道路，描摹出风雪漫天、路途被白雪全覆盖的壮阔苦寒之景，侧面烘托出友人归途路途遥远、行程艰难，暗含诗人对友人旅途艰险的担忧牵挂。“空”字既描绘出友人离去后，雪地空旷苍茫、天地寂寥清冷的实景，渲染出送别后冷清落寞的氛围；又精准道出诗人内心的空落与惆怅，友人远去，只剩诗人独自伫立，满心都是离别后的孤寂。借“满”“空”二字以景衬情，用苍茫雪景烘托心境，含蓄抒发了诗人送别友人时依依不舍的眷恋之情，以及友人离去后内心的孤寂与惆怅，意蕴悠长。'
