- id: 21
  type: 现代文阅读
  score: 2
  stem: 钢琴演奏家用伤残的身体演奏出精彩的乐章。结合文章内容，说说你获得的启示。
  answer: ''
  solution: '文中的钢琴演奏家经历车祸后，从未放弃对音乐梦想的追求，克服右臂钢板带来的痛苦，经过超乎寻常的艰辛练习，坚持25年，重新站上舞台，展现出对梦想的热爱和生命的坚忍不屈。这启示我，无论面临怎样的境遇，都要保持对生命的敬畏与热爱，用坚持与顽强面对挫折，执着地追求梦想。


    详解：从原文提炼钢琴家经历——遭遇车祸右臂重伤，医生断言不能弹琴，却忍受伤痛、常年刻苦练习，坚持二十五年，最终在黄河边完美演奏《黄河》，身体残疾却坚守音乐梦想。然后概括人物品质——坚韧顽强、不畏磨难、心怀热爱、永不放弃、精神不屈、坚守梦想。最后谈自我启示：由人物精神联系自身生活，面对挫折困境该怎样做：不轻言放弃、以坚韧意志迎难而上、坚守初心与热爱，保持对生命的敬畏。

    示例：钢琴家遭遇车祸身受重伤，被判定无法再弹琴，却凭借超常的毅力强忍伤痛，日复一日艰苦练习，历经二十五年坚守，最终用伤残的身体完美演绎《黄河》。这启示我们：人生难免遭遇不幸与挫折，肉体可以残缺，境遇可以坎坷，但精神不能倒下、梦想不能磨灭。'
