  body: 健康，不只是身体无病，更是心灵阳光。培育积极心理品质，要在多方面下功夫，重点要推进心理健康促进行动。除了优化教育教学内容和方式，在学科教学中注重维护学生心理健康，各中小学还应广泛开展丰富多彩的心理健康活动，比如艺术展演、劳动实践、户外拓展、青少年读书行动、游戏活动等，培养学生阳光自信的心态、应对挫折的能力、团结合作的精神。2025年，我国已将“建立监测预警和干预机制”列为重点任务，明确提出“推进建设全国学生心理健康监测预警系统”，2026年将进一步升级完善平台预警功能。此外，还将完善专业化的心理健康教师队伍建设，配齐配强心理健康教师，持续加大心理健康教育师资培养力度，构建全员育心工作格局。
