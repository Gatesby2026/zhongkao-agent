  body: '阅读《白雪歌送武判官归京》，完成下面小题。

    白雪歌送武判官归京

    岑参

    北风卷地白草折，胡天八月即飞雪。

    忽如一夜春风来，千树万树梨花开。

    散入珠帘湿罗幕，狐裘不暖锦衾薄。

    将军角弓不得控，都护铁衣冷难着。

    瀚海阑干百丈冰，愁云惨淡万里凝。

    中军置酒饮归客，胡琴琵琶与羌笛。

    纷纷暮雪下辕门，风掣红旗冻不翻。

    <u>轮台东门送君去，去时雪满天山路。</u>

    <u>山回路转不见君，雪上</u><u>·空·</u><u>留马行处。</u>'
