    同庆街主题艺术装置·布景出新意


    漫步海淀同庆街，你会看到以清代传世名作《十骏图》为灵感的艺术装置沿街布设。驻足·端详·，这十匹骏马风姿各异：大宛骝缀满牡丹纹样，神采飞扬；赤花鹰以剪纸工艺打造，气韵灵动；红玉座用金属线条勾勒，赤彩如丹；阚虎骝通体机械风，·蓄势待发·……


    这些艺术装置与古街的青砖灰瓦、廊檐花灯·相应成趣·，形成了独特的老街风貌。艺术赋能让传统艺术与城市肌理完美融合，这条百年老街因此容光·焕发·。'
