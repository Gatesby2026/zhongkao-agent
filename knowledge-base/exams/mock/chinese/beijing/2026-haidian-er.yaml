  body: '①文艺鉴赏是鉴赏者透过文艺作品的形式去感受、理解文艺作品中所表现的审美意识，从而获得情感愉悦和精神满足的一种审美活动。

    ②文艺鉴赏以审美享受为根本标志。所谓审美享受，是指鉴赏者在文艺鉴赏中所获得的愉悦和满足。

    审美享受主要通过“共鸣”“净化”“领悟”等鉴赏心理来实现。

    ③所谓“共鸣”，是指鉴赏者被作品中的思想感情、人物命运所感动，从而形成的一种审美体验，是鉴赏者和作者在情感、趣味、思想上的共振与沟通。所谓“净化”，是指鉴赏者的情感在共鸣的基础上得到调节、慰籍、疏导和升华。艺术鉴赏时，鉴赏者暂时忘却尘世的困扰，松弛紧张的神经，疏导郁闷的情绪，甚至使异化的心灵得到纠正，从而进入一种高尚纯洁的精神境界。所谓“领悟”，是鉴赏者在共鸣、净化的基础上主动追索作品深层意蕴，从而获得一种彻悟的满足，是文艺鉴赏所追求的最高境界。例如，我们读《带上她的眼睛》，会为女孩永困地心的凄婉命运唏嘘，这是共鸣;为她在绝境中对花草清风保有的热爱而感动，实现灵魂升华，这是净化;透过隔空之旅，思索生命的意义，感受人类探索未知世界的崇高情怀，这便是领悟。

    ④⑤各种艺术形式，都有着生动感人的形象，鉴赏它，就要运用形象思维，即丰富的联想与想象。联想()，可以帮助鉴赏者建立起艺术形象与生活的关系，调动鉴赏者关于生活的积累，从而更深切地感受艺术形象。例如，我们鉴赏齐白石的《蛙声十里出山泉》，尽管画面上只有山泉和小蝌蚪，但我们却能联想到声传旷野的蛙唱，联想到非常亲切的山村生活。而想象则可以让鉴赏者走进作品的艺术世界。我们聆听《黄河大合唱》，当一个个乐句鸣响在耳边，渐渐地，我们听到的不仅仅是乐句了，仿佛听到了黄河的咆哮、怒吼、呜咽、悲泣!仿佛自己也融入了黄河，成了黄河的一部分，随着它一起奔腾，咆哮!这个鉴赏过程，活跃着的就是我们的想象。

    ⑥情感体验是文艺鉴赏中最活跃的因素。文艺鉴赏时，鉴赏者不仅要体会作品所蕴含的情感，而且要对这些情感作出反应，并对作品作出情感化的审美评价。因此，文艺鉴赏始终都会伴随着鉴赏者的情感体验。“夫缀文者情动而辞发，观文者披文以入情。”没有丰富的情感内涵，文艺作品自然难以成为真正的文艺作品;没有情感体验，鉴赏者也难以走进文艺作品的艺术境界。所以，别林斯基在批评那些仅凭理智去理解文艺作品的人时曾说:“没有心灵的参与，而这，几乎比用脚去理解艺术更坏。”

    ⑦因此，文艺鉴赏活动中，鉴赏者会由眼前的艺术形象展开联想和想象，在深深的共情中体味悲欢，品味意蕴，从而在共鸣中与艺术形象同频共振，在净化中涤荡灵魂，在领悟中抵达审美的最高境界，最终实现精神的丰盈与生命的升华。

    (取材于魏饴、刘海涛主编《文艺鉴赏概论》)'
