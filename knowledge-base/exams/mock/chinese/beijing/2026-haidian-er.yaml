  body: '（一）阅读下面的材料，完成17-19题。（共7分）

    材料一

    2024年国际木偶艺术节上，扬州市木偶研究所带来的《板桥作画》惊艳全场。演员操控木偶运笔挥毫，绘就一幅清雅苍润的水墨画卷，演绎出郑板桥坚贞自持的文人风骨。2025年，闽西客家木偶戏亮相“杨达尔”国际木偶剧院艺术节。其中《木偶茶艺》以细腻的动作展现茶艺风采，将中国茶道的雅致与木偶艺术的精巧完美融合，让现场的各国观众深深折服。我国木偶之所以能享誉世界舞台，是因为“不是真人，胜似真人”的艺术效果，更因为其作为“文化使者”所承载的中华文化。

    木偶戏，是艺人操控偶人演绎故事的传统民间艺术。我国木偶戏相传起源于汉代，至唐代广融百戏表演，日臻成熟。宋代经济繁荣，市井文娱兴盛，勾栏瓦舍遍布城乡，由此形成成熟的演艺空间，为木偶戏的展演、传承与繁荣发展奠定基础。明清两代，木偶戏进入全盛阶段，全国流行，形成杖头、提线、布袋等表演形式，流派纷呈，技艺精妙。千年积淀的深厚底蕴为木偶戏走向世界筑牢了根基。

    材料二

    方寸戏台上，中国传统木偶戏艺术家以一双巧手，为木偶注入灵魂。

    川北大木偶是杖头木偶的典型代表。2026年春晚宜宾分会场的舞台上，艺人双手举木杖，两米高的川北大木偶随杖而动，宛若巨人踏歌而来。在艺人的巧手操控之下，木偶眼波流转，长袖蹁跹，让亿万观众为之惊叹。

    与杖头木偶的表演形式不同，提线木偶表演时，观众既能看见木偶在台前翩翩起舞，也能看见幕后艺人灵巧的动作。艺人的手与木偶的动作完全同频，观众看的是“偶”的潇洒，实则是在欣赏艺人“手”的灵巧。传承千年的泉州提线木偶戏，至今保留着700余出传统剧目，被誉为研究闽南文化的“活化石”。

    布袋木偶戏又称“指头木偶戏”。它无需额外操作工具，仅靠木偶本体就能表演。孩童在双手套上画有五官的布袋，便可作耍。中国第一部彩色木偶电影《掌中戏》中说：“神妙的手，创造了优美的艺术。”影片中，布袋木偶戏表演大师杨胜双手各执一员武将，交锋对打。双手合演“对手戏”，正是布袋木偶艺人的拿手绝活。

    表1  中国木偶戏常见表演形式介绍

    | 偶戏种类 | 杖头木偶戏 | 提线木偶戏 | 布袋木偶戏 |

    |---|---|---|---|

    | 主要道具 | 木偶本体、木杖 | 木偶本体、提线 | 木偶本体 |

    | 执偶数量 | 双手执单偶 | 双手执单偶 | 单手执单偶，双手可执双偶同时表演 |

    | 执偶方式 | 曲臂，手操作木偶头、双臂上的一根命杆和两根手杆，做出动作 | 曲臂，手提拉勾牌上的线，控制提线木偶的动作 | 直臂，手直接执偶，用手指表现动作 |

    | 典型图片 | ![](figures/image2.png) | ![](figures/image3.png) | ![](figures/image4.png) |

    材料三

    技术创新正为传统木偶艺术注入全新的时代活力。某AI木偶剧借助智能技术优化木偶神态动作，让传统文化在新时代更具感染力与传播力。

    木偶戏的应用场景也在创新拓展。上海自然博物馆以海派木偶戏为载体，打造“发现上海·木偶奇缘”科普课程，通过角色扮演、剧本编创、科学演示等活动，将木偶艺术与科学教育融合，让非遗走进校园。中国木偶艺术剧院创新非遗传承模式，集演出、展陈、体验于一体，让古老艺术贴近大众，实现传统文化的创新性发展。

    从传统技艺到现代科技，从剧场演出到科普课堂，我国传统木偶戏以创新赓续文脉，用作品传播文化，在守正创新中展现出蓬勃生机。'
