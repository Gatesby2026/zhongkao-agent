  body: '开江的日子刘白羽①今天，我想起我迎接春天一次非常奇特的经历。

    “跑冰排哪!”

    ③“跑冰排哪!”

    ④我随着这突然而来的喊声，一下从船工们的秫秸窝棚里蹿出来，绕过那些俯仰在沙滩上的正塞麻屑浇桐油的木船，朝松花江边猛跑。

    ⑤这时，我很奇怪，冰冻的江面还是白皑皑的一片平静、沉默，有如睡眠的冰山。而从天穹从大地从不知什么一切地方，都传来可怕的隆隆声。大自然真是神奇莫测，变化无穷。它平时似乎十分和蔼、而突然一下变得那样狂暴。现在就是这样，当我挤到江岸人群里时，看到江中心，好像由于受了上下左右的巨大强力挤压，而突然崩裂了，发出一阵猛烈的咔咔声，于是像喷泉一样涌射出大股黑色的水流。而后，整个大江震出十分繁杂、十分微妙的声音，和在冰层爆炸轰鸣之中，形成狂飙一样的一支交响乐。忽然整个江面都忽悠忽悠移动起来，灰色的、蔚蓝色的巨大冰块好像给刀子割裂开来一样，分崩离析，犬牙交错。由上游汹涌而来的激流，把几百米长的冰排都摇撼、冲击、推动起来。就在这险象环生的时刻，我一下愣住了。有一大块冰排漂流而去，那上面有两三个人影，还有一辆拉满干草的大车。它们在这疯狂暴虐、赫赫威严之下，显得如此渺小孤独，无望。

    ⑥就在这一眨眼的工夫，一个穿一身黑棉袄、戴一顶火红狐皮帽、五短黑粗的人，突然推开众人，一()，跃而出:“给大绳!”

    ⑦他边跑，人们边把大绳送给他。

    ⑧他肩扛着碗口粗的大绳，一摇一晃，摆动着方方正正像一块案板似的脊背，真是惊人，他竟然跳上一块也正飞速向下游冲去的冰排。

    ⑨一个妇女发出凄厉的声音嘶喊:“她爹，你……”

    ⑩你什么?她也说不出，而她怀里抱着的一个小女孩哇的一声哭起来。

    ①那块偌大的冰排，一转眼漂流远去。我睁大眼睛用力瞅，隐隐约约看见上面那一车黄干草，还有几个小小黑人影，只见他们捶胸顿足，狂挥双手，却一点也听不见他们嘶喊的声音。因为冰冻江流的爆裂的轰隆声，愈来愈遮天盖地，就像几百万个响雷连成一片霹雳。

    ②那个汉子真是灵巧极了。

    ③他从这块冰排跳上另一块冰排，又从那一块冰排跳上另一块冰排，这样接近着那载人载马的巨大冰排。

    ④真正刻不容缓、千钧一发呀!

    ⑤我只觉得棉衣服里全身汗湿淋漓。

    ⑥我目不转睛地盯住那愈来愈远的穿一身黑棉袄的人影。

    ⑦江一迸裂，黑色的狂流像发疯了的野马一样，根本不受人的意志所羁绊，有些冰排彼此撞击，一下陡然壁立起来，那冰块闪着灼眼的蓝光，一下飞起来，一下跌下去。

    ⑧可是人呵!人和天比起来是多么渺小，可是人在向原始的暴力挑战了。

    江上的人只顾奋死搏斗，无声无息。江岸上的人们却一窝蜂随着漂流的冰排，面向下游奔跑。

    20那汉子终于接近了那块大冰排，而且，他把大绳抛掷过去，那边那几个运干草的人接住了大绳，拽牢了大绳。可是，这时发生了力量对比悬殊的问题，那汉子立足的小冰排被大冰排摽住往下游流淌。

    ①于是人群中起了一阵骚动，刚才都给那汉子跳冰排吓呆，现在像有什么打开了每个人的天灵盖，一下都猛然清醒过来，一群人向冰排上扑去。水搅住冰，冰搅住水。有人扑通落在水里，有人扑倒在冰排上。可是，人们终于跳到那汉子附近，黑压压几十个人，就像站在小划子上一样，分立在无数冰排上，一条条大绳都飞了过去。我忘记了一切，也要跳下江流，忽然给那个高声嘶喊的妇女紧紧拉住，我一看她完全变成另外一个人，刚才脸像蜡渣子一样白，现在却泛着桃花一样的红晕，她那样自豪地说:“能行，她爹能行!”

    ③那个摆着拉干草马车的冰排得救了。

    ()，④松花江，你的春天的苏醒是多么吓人呀!

    ⑤一块冰排形不成力量，无数冰排摞在一起就形成巨大无比的力量，被牵牢的大冰排缓缓向江岸靠拢，拉黄干草的几匹马刚才一声不响，这会儿却突噜噜低声嘶鸣了几声，辽阔大平野上的风徐徐吹着，吹得马的鬃毛、黄干草都在微微拂动着。

    ww⑥我连忙向人群中寻找，那个五短黑粗的人不见了，那个脸色开始煞白后来又泛红的妇女也不见了，不过，他们那粗犷的气息一下深深渗入我的心灵。

    ⑦太阳光不知为什么突然明亮起来，江流浩浩荡荡，汹涌澎湃，春天就在雪白的、蔚蓝的冰块冲撞中到来了。

