  solution: '答案示例一:[甲]句中副词“竟”字体现了出乎宗璞的意料，“不到一年”与“先后三幅”用时间与数量的


    细节写出汪曾祺收到索画请求后，赠画速度之快、数量之多，完全超出了宗璞的预期;体现出作者

    对汪曾祺待人真诚、慷慨、热情的赞美。

    答案示例二:[乙]句运用对偶的修辞手法，高度概括了汪曾祺画作的艺术特质，点出“恬淡清雅”的格调与

    “拙趣温情”的情感内核;表达了作者对汪曾祺绘画艺术的高度认可与赞美。句式工整对称，

    节奏明快，语言凝练典雅，富有音韵美;评分:本题共3分。'
