  score: 5
  stem: '在平面直角坐标系xOy中，函数y＝kx+b（k≠0）的图象经过点（1，3），（2，1）．

    （1）求k，b的值；

    （2）当x＞2时，对于x的每一个值，函数y＝mx（m≠0）的值大于函数y＝kx+b的值，且小于y＝x﹣k的值，直接写出m的取值范围．'
  answer: （1）k＝﹣2，b＝5；
  solution: '解：（1）把（1，3），（2，1）分别代入y＝kx+b得$\left\{\begin{matrix} k+b=3 \\ 2k+b=1 \end{matrix}\right.$，

    解得$\left\{\begin{matrix} k=-2 \\ b=5 \end{matrix}\right.$，

    ∴一次函数解析式为y＝﹣2x+5；

    （2）当x＞2时，对于x的每一个值，函数y＝mx的值大于函数y＝kx+b的值，且小于y＝x﹣k的值，

    即x＞2时，mx＞﹣2x+5且mx＜x+2恒成立，

    对于mx＞﹣2x+5，

    （m+2）x＞5，

    ∵x＞2，

    ∴m+2＞0，此时x$＞\frac{5}{m+2}$，

    ∴$\frac{5}{m+2}≤$2，

    解得m$≥\frac{1}{2}$；

    对于mx＜x+2，m＝1恒成立，

    （m﹣1）x＜2，

    ∵x＞2，

    ∴m﹣1＜0，此时x$＞\frac{2}{m-1}$，

    ∴$\frac{2}{m-1}≤$2，

    解得m≤2，

    ∴m≤1，

    综上所述，m的取值范围为$\frac{1}{2}≤$m≤1．'
