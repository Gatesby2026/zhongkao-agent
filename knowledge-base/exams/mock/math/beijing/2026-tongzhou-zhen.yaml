    （1）已知点A（2，0）．

    ①若点A，点B，点O具有“平等关系”，则点B的坐标为　                  　 ；

    ②如图1，⊙O半径为1，若点A，⊙O，点$C(a，\sqrt{3})$具有“平等关系”，求a的值；

    （2）如图2，点F（﹣2，2），G（1，2），以点O为圆心的两个同心圆，其中一个圆的半径为1，另一个圆的半径为r．若线段FG与这两个同心圆具有“平等关系”，直接写出r的取值范围．

