    （2）解：MD$=\frac{1}{2}AC$，

    证明：延长BD到N，使DN＝BC，连接AN，如图，

    ![](figures/image41.png)

    则∠ADB+∠ADN＝180°，

    ∵∠ADB+∠ABC＝α+180°﹣α＝180°，

    ∴∠ABC＝∠ADN，

    ∵线段AB绕点A逆时针旋转180°﹣2α得到线段AD，

    ∴AB＝AD，

    在△ABC 和△ADN 中，

    $\left\{\begin{matrix} AB=AD \\ ∠ABC=∠ADN， \\ BC=DN \end{matrix}\right.$

    ∴△ABC≌△ADN（SAS），

    ∴∠ACB＝∠N，AC＝AN，

    ∵∠ACB＝∠BDG，

    ∴∠N＝∠BDG，

    ∴AN∥GD，

    ∴$\frac{DF}{DN}=\frac{MF}{MA}$，

    ∵BC＝DF，BC＝DN，

    ∴DF＝DN，

    ∴$\frac{MF}{MA}=1$，

    ∴AM＝FM，

    ∴$MD=\frac{1}{2}AN$，

    ∴$MD=\frac{1}{2}AC$．'
