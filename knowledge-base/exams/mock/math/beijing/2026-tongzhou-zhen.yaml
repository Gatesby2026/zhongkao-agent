  solution: '（1）证明：∵将BA所在的射线绕点B顺时针旋转180°﹣α得到射线BP，

    ∴∠ABC＝180°﹣α，

    ∵BC＝AB，

    ∴△ABC中，$∠BAC=∠BCA=\frac{α}{2}$，

    ∵∠GDB＝∠BCA，

    ∴$∠GDB=\frac{α}{2}$，

    ∵将线段AB绕点A逆时针旋转180°﹣2α得到线段AD，

    ∴AB＝AD，∠BAD＝180°﹣2α，

    ∴△ABD 中，∠ABD＝∠ADB＝α，

    ∴∠ADB＝2∠GDB，

