  score: 2
  stem: '某科技公司对四款AI软件（甲、乙、丙、丁）进行效率测试．每款软件处理不同数量的任务所获得的“效率分”如表所示（分数越高代表效率越高）．在分配任务时，每款软件只能被分配一次任务．

