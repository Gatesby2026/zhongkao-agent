  stem: '如图，函数$y=\frac{k}{x}(k＞0)$的图象与过原点的O的直线相交于A，B两点，点M是第一象限内双曲线上的动点（点M在点A的左侧），直线AM分别交x轴，y轴于C，D两点，连结BM分别交x轴，y轴于点E，F，连结OM．给出下面四个结论：

    ①若BM⊥AM于点M，则∠MBA＝30°；

    ②△OCD可能是等腰直角三角形；

    ③△ODM与△OCA面积相等；

    ④若$MF=\frac{1}{3}MB$，则MD＝MA．

    上述结论中，所有正确结论的序号是（　　）

    ![](figures/image8.png)'
  options:
    A: ①②③
    B: ②③④
    C: ①④
    D: ②③
  figure: 2026-tongzhou-zhen/figures/image8.png
  answer: B
  solution: '解：①设点$A(m，\frac{k}{m})$，$M(n，\frac{k}{n})$，

    设直线AC的解析式为 y＝kx+b，

    则$\left\{\begin{matrix} \frac{k}{m}=mk′+b \\ \frac{k}{n}=nk′+b \end{matrix}\right.$，

    解得：$k′=-\frac{k}{mn}$，$b=\frac{k}{n}+\frac{k}{m}$，

    则直线AC的解析式为$y=-\frac{k}{mn}x+\frac{k}{n}+\frac{k}{m}$，

    令x＝0，则$y=\frac{k}{n}+\frac{k}{m}=\frac{(m+n)k}{mn}$，

    令y＝0，则$0=-\frac{k}{mn}x+\frac{k}{n}+\frac{k}{m}$，

    解得：x＝m+n，

    ∴C（m+n，0），$D(0，\frac{(m+n)k}{mn})$，

    ∴${S}_{△ODM}=\frac{1}{2}⋅n⋅\frac{(m+n)k}{mn}=\frac{(m+n)k}{2m}$，${S}_{△OCA}=\frac{1}{2}×(m+n)×\frac{k}{m}=\frac{(m+n)k}{2m}$，

    ∴△ODM与△OCA的面积相等，故③正确；

    当△OCD是等腰直角三角形时，OC＝OD，

    即$m+n=\frac{(m+n)k}{mn}$，

    ∴k＝mn，

    该式可以成立（如k＝2，m＝1，n＝2，此时OC＝OD＝3），故△OCD可以是等腰直角三角形，②正确．

    ∵反比例函数与正比例函数关于原点对称，

    ∴O是AB的中点，

    ∵BM⊥AM，

    ∴OM＝OA，

    ∴${m}^{2}+(\frac{k}{m}{)}^{2}={n}^{2}+(\frac{k}{n}{)}^{2}$，

    ∴k＝mn，

    ∴A（m，n），M（n，m），

    ∴$AM=\sqrt{2}(m-n)$，$OM=\sqrt{{m}^{2}+{n}^{2}}$，

    ∴AM不一定等于OM，即△AMO不一定是等边三角形，

    ∴∠BAM不一定是60°，

    ∴∠MBA不一定是30°，故①错误；

    如图，作MK∥OD交OA于K，

    ![](figures/image26.png)

    ∵OF∥MK，

    ∴$\frac{FM}{BM}=\frac{OK}{KB}=\frac{1}{3}$，

    ∴$\frac{OK}{OB}=\frac{1}{2}$，

    ∵OA＝OB，

    ∴$\frac{OK}{OA}=\frac{1}{2}$，

    ∴$\frac{OK}{KA}=1$，

    ∵KM∥OD，

    ∴$\frac{DM}{AM}=\frac{OK}{AK}=1$，

    ∴MD＝MA，故④正确．

    综上，正确的结论是②③④，

    故选：B．'
