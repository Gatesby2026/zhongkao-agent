    ∵四边形$AECD$为平行四边形，$AE = 2$，

    ∴$CD = AE = 2$．

    在$Rt\triangle BCD$中，$\tan\angle CBD=\frac{CD}{BC}=\frac{1}{2}$，$CD = 2$，

    则$\frac{2}{BC}=\frac{1}{2}$，

    解得$BC = 4$．

    ∵$BD^{2}=BC^{2}+CD^{2}$，

    把$BC = 4$，$CD = 2$代入可得

    $BD = \sqrt{4^{2} + 2^{2}} = \sqrt{16 + 4} = \sqrt{20} = 2\sqrt{5}$．

    ∴$AD = BE = \frac{1}{2} BD = \sqrt{5}$．'
