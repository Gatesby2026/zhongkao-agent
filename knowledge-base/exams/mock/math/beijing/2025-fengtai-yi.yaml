  question: '如图，在矩形$ABCD$中，点E在BC上，$DE \perp AC$于点F．若$AB = 6,\ AD = 8$，则CE的长为___________．

    [图]'
  answer: $4.5$
  solution: '解：∵四边形ABCD是矩形，

    ∴$CD = AB = 6$，$BC = AD = 8$，$\angle B=\angle ADC=\angle DCE=90^{\circ}$，

    ∴$AC = \sqrt{AD^{2} + CD^{2}} = 10$，

    ∵$DE \perp AC$，

    ∴$\angle CEF = \angle CFD = 90^\circ = \angle ADC = \angle B$，

    ∵$\angle DCF = \angle ACD$，

    ∴$\triangle CDF \sim \triangle CAD$，

    ∴$\frac{CF}{CD} = \frac{CD}{AC}$，

    ∴$\frac{CF}{AC}=\frac{6}{10}=3.6$，

    ∵$\angle ECF = \angle ACB$，

    ∴$\triangle CEF\sim\triangle CAB$，

    ∴$\frac{CE}{AC} = \frac{CF}{BC}$，

    ∴$CE=\frac{10\times3.6}{8}=4.5$；

    故答案为：$4.5$．'
