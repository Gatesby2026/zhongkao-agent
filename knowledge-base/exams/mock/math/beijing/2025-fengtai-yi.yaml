  question: 已知$a-2b-3=0$，求代数式$\frac{2(a-b)-2b}{a^{2}-4ab+4b^{2}}$的值．
  answer: $\frac{2}{a-2b},\frac{2}{3}$
  solution: '解：$\frac{2(a-b)-2b}{a^{2}-4ab+4b^{2}}$

    $\frac{2a-2b-2b}{(a-2b)^{2}}$

    $-\frac{2(a-2b)}{(a-2b)^2}$

    $=\frac{2}{a-2b}$，

    ∵$a-2b-3=0$，

    ∴$a-2b=3$，

    ∴原式$\frac{2}{a-2b}=\frac{2}{3}$．'
