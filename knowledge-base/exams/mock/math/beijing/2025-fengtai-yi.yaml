  question: 方程$\frac{3}{2x+1}-\frac{1}{x}=0$的解为_____．
  answer: $x = 1$
  solution: '解：$\frac{3}{2x+1}-\frac{1}{x}=0$，

    方程两边同乘$x(2x+1)$，得$3x-\left(2x+1\right)=0$，

    解得$x = 1$，

    检验：当$x = 1$时，$x(2x+1)\neq0$，

    所以分式方程的解是$x = 1$，

    故答案为：$x = 1$．'
