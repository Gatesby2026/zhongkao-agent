  type: 填空
  score: 2
  question: '某校举办了“数学节”活动，其中有一项活动是“数学游戏挑战赛”，参赛学生要按顺序依次参加“九连环、七巧板、五子棋、二十四点、魔方、华容道、数独”七个项目（每个项目只能挑战一次）．按照完成情况每个项目都分为参与奖、优秀奖、卓越奖，并奖励相应的积分．七个项目不同奖项对应的奖励积分如下表所示：

    | 项目奖项 | 九连环 | 七巧板 | 五子棋 | 二十四点 | 魔方 | 华容道 | 数独 |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | 参与奖 | 2 | 7 | 5 | 7 | 4 | 7 | 4 |

    | 优秀奖 | 5 | 10 | 9 | 9 | 7 | 8 | 7 |

    | 卓越奖 | 9 | 12 | 13 | 15 | 12 | 10 | 9 |

    小明同学参加了此次“数学游戏挑战赛”活动，若知道小明在“九连环”项目中没有获得卓越奖，在“魔方”项目中获得了优秀奖，且在所有获得卓越奖项目的前一个项目中都获得参与奖，则可推断小明在“华容道”和“数独”这两个项目的积分之和最高为___________，他参加此次“数学游戏挑战赛”活动的总积分最高为___________'
  answer: ①.16 ②.58
  solution: '解：∵小明在“九连环”项目中没有获得卓越奖，

    ∴小明在“九连环”项目中可能获得参与奖或优秀奖

    ∵小明在“魔方”项目中获得了优秀奖，

    ∴魔方获得优秀奖的积分为7分

    ∵在所有获得卓越奖项目的前一个项目中都获得参与奖

    ∴当华容道和数独都获得优秀奖时，得分为$8+7=15$（分），

    当华容道获得参与奖，数独获得卓越奖时，得分为$7+9=16$（分），

    ∴可推断小明在“华容道”和“数独”这两个项目的积分之和最高为16分；

    ∵在所有获得卓越奖项目的前一个项目中都获得参与奖，

    ∴①当只七巧板获得卓越奖时，九连环获得参与奖，其他项目获得优秀奖，

    ∴总积分为$2+12+9+9+7+16=55$（分）；

    ②当七巧板，二十四点获得卓越奖，

    ∴九连环，五子棋获得参与奖，

    ∴总积分为$2+12+5+15+7+16=57$（分）；

    ③当五子棋获得卓越奖，二十四点获得优秀奖，

    ∴九连环获得优秀奖，七巧板获得参与奖，

    ∴总积分为$5+7+13+9+7+16=57$（分）；

    ④当二十四点获得卓越奖，九连环，七巧板获得优秀奖，

    ∴五子棋获得参与奖，

    ∴总积分$[公式]$$5+10+5+15+7+16=58$（分）；

    综上所述，他参加此次“数学游戏挑战赛”活动的总积分最高为58分．

    故答案为：16，58．'
