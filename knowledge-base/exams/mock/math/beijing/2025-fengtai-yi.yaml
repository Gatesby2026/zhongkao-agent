  question: '在平面直角坐标系xOy中，$P(x_1,\ y_1),\ Q(x_2,\ y_2)$是抛物线$y = x^{3} - 2tx + c$上的两点．

    （1）若对于$x_1 = -1,\ x_2 = 3$，有$y_{1}=y_{2}$，求抛物线的对称轴；

    （2）若对于$2t-3\leq x_{1}\leq 2t-2,\ t+1\leq x_{2}\leq t+3$，都有$y_1 > y_2$，求t的取值范围．'
  answer: （1）对称轴为直线$x = 1$； （2）$t > 6$或$t<-1$
  solution: '【小问1详解】

    解：∵$x_1 = -1,\ x_2 = 3$，有$y_{1}=y_{2}$，

    ∴这两点关于y轴对称，抛物线的对称轴为直线$x=\frac{-1+3}{2}=1$；

    【小问2详解】

    解：∵$y_{1}=x^{2}-2tx+\epsilon$，$y_{2}=x^{2}-2tx+c$，又$y_1 > y_2$，

    ∴$x_{1}^{2}-2cx_{1}+c>x_{2}^{2}-2cx_{2}+c$，

    整理得$(x-x_{2})(x_{1}+x_{2}-2t)>0$，

    ∴$\begin{cases}

    x_1 - x_2 > 0 \\

    x_1 + x_2 - 2t > 0

    \end{cases}$或$\begin{cases}

    x_1 - x_2 < 0 \\

    x_1 + x_2 - 2t < 0

    \end{cases}$，

    ①若$\begin{cases}

    x_1 - x_2 > 0 \\

    x_1 + x_2 - 2t > 0

    \end{cases}$，即$\begin{cases}

    x_1 > x_2 \\

    x_1 + x_2 > 2k

    \end{cases}$，

    ∵$2t-3\leq x_{1}\leq 2t-2,\ t+1\leq x_{2}\leq t+3$，

    ∴$2t-3>t+3$且$2t-3+t+1>2t$，

    ∴$t > 6$且$t>2$，

    ∴$t > 6$；

    ②若$\begin{cases}

    x_1 - x_2 < 0 \\

    x_1 + x_2 - 2t < 0

    \end{cases}$，

    同理$2t - 2 < t + 1$且$2t-2+t+3<2t$，

    ∴$t<3$且$t<-1$，

    ∴$t<-1$；

    综上，$t > 6$或$t<-1$．'
