  question: '如图，在四边形$ABCD$中，$\angle B=\angle BCD=90^{\circ}$，点E在BC上，$CE < BE$，连接AE并延长交DC的延长线于点F，连接DE，$\triangle ABE \cong \triangle ECD$．给出下面三个结论：①$AE \perp DE$；②$AB + CD > AE$；③$\frac{\sqrt{2}}{2}AB\cdot
    EF=AD\cdot CF$．上述结论中，所有正确结论的序号是（   ）

    [图]

    A$[公式]$①②

    B.②③

    C.①③

    D.①②③'
  answer: D
  solution: '解：$\triangle ABE \cong \triangle ECD$，

    $\angle BAE = \angle CED$，$AE = ED$，$BE = CD$，

    $\angle B=\angle BCD=90^{\circ}$，

    $\angle AEB + \angle CED = \angle AEB + \angle BAE = 90^\circ$，

    $\angle AED = 180^\circ - (\angle AEB + \angle CED) = 90^\circ$，

    $\therefore AE \perp DE$，故①正确，符合题意；

    $AB + BE > AE$，且$BE = CD$，

    $AB + CD > AE$，故②正确，符合题意；

    $\therefore AE = ED$，$\angle AED = 90^\circ$，

    $AD = \sqrt{AE^{2} + ED^{2}} = \sqrt{2}AE$，

    $\therefore AE = \frac{\sqrt{2}}{2}AD$，

    $\angle FCE=\angle B=90^{\circ}$，$\angle FEC = \angle AEB$，

    $\triangle FEC \sim \triangle AEB$，

    $\therefore \frac{EF}{AE}=\frac{CF}{AB}$，

    $AB\cdot EF=\frac{\sqrt{2}}{2}AD\cdot CF$，

    $\sqrt{2}AB\cdot EF=AD\cdot CF$，故③正确，符合题意；

    故选：D．'
