  question: '如图，在$Y_{ABCD}$中，AC，BD交于点O，$\angle ABD = \angle CBD$，过点D作$DE \parallel AC$交BC延长线于点E．

    [图]

    （1）求证：四边形$ABCD$是菱形；

    （2）若$OB = \sqrt{3}$，$\angle ABC=60^\circ$，求DE的长．'
  answer: （1）见解析 （2）$DE=2$
  solution: '【小问1详解】

    证明：∵四边形$ABCD$是平行四边形，

    ∴$AD \parallel BC$．

    ∴$\angle ADB = \angle CBD$．

    ∵$\angle ABD = \angle CBD$，

    ∴$\angle ABD=\angle ADB$．

    ∴$AB = AD$．

    ∴四边形$ABCD$是菱形．

    【小问2详解】

    解：∵四边形$ABCD$是菱形，

    ∴$AC \perp BD$，$BD=2OB$，$\angle DBE=\frac{1}{2}\angle ABC$．

    ∵DE$\parallel$AC，

    ∴$\angle BDE=\angle BOC-90^{\circ}$．

    ∵$OB = \sqrt{3}$，

    ∴$BD=2OB=2\sqrt{3}$．

    ∵$\angle ABC=60^\circ$，

    ∴$\angle DBE=\frac{1}{2}\angle ABC=30^\circ$．

    在Rt$\triangle BDE$中，$\tan \angle DBE = \frac{\sqrt{3}}{3}$，$BD=2\sqrt{3}$．

    ∴$\tan \angle DBE = \frac{DE}{BD} = \frac{\sqrt{3}}{3}$．

    ∴$DE=2$．'
