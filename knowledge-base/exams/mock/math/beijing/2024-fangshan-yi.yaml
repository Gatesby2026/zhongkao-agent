  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\ne0)$的图象由函数$y=2x$的图象平移得到，且经过点$(2,3)$．

    （1）求该函数的解析式；

    （2）当$x<2$时，对于x的每一个值，函数$y = x + m$的值大于函数$y=kx+b\ (k\ne0)$的值，直接写出m的取值范围．'
  answer: （1）$y=2x-1$ （2）$m\ 1$
  solution: '【小问1详解】

    ∵函数$y=kx+b(k\neq0)$的图象平行于函数$y=2x$的图象，

    ∴$y=2x+b$，

    把$(2,3)$代入，得：$2\times2+b=3$，

    解得，$b = -1$，

    ∴该函数的表达式为$y=2x-1$；

    【小问2详解】

    当函数$y = x + m$的值大于函数$y=kx+b\ (k\ne0)$的值时，$x + m > 2x - 1$，

    ∴$x<m+1$，

    ∵当$x<2$时，对于x的每一个值，函数$y = x + m$的值大于函数$y=kx+b(k\neq0)$的值，

    ∴$m+1\quad2$，

    ∴$m\ 1$．'
