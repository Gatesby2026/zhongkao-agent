  question: '在平面直角坐标系xOy中，$A(x_1,y_1)$，$B\left(x_{2},y_{2}\right)$是抛物线$y=x-2a+x+a^{2}-2$上任意两点．

    （1）当$a = 1$时，求抛物线与y轴的交点坐标及顶点坐标；

    （2）若对于$0 < x_1 < \frac{1}{2}$，$\frac{1}{2}<x_{2}<1$，都有$y_{1}>y_{2}$，求a的取值范围．'
  answer: （1）抛物线与y轴的交点坐标为$(0,-1)$，抛物线的顶点坐标为$(1,-2)$ （2）$a\frac{3}{4}$
  solution: '【小问1详解】

    解：令$x = 0$，则$y=a^{2}-2$．

    当$a = 1$时，$y=-1$．

    ∴抛物线与y轴的交点坐标为$(0, -1)$；

    ∵$y = x^2 - 2ax + a^2 - 2 = (x - a)^2 - 2$，

    ∴当$a = 1$时，抛物线的顶点坐标为$(1, -2)$．

    【小问2详解】

    解：∵$A(x_{1},\ y_{1})$，$B(x_{2},\ y_{2})$是抛物线$y = x^2 - 2ax + a - 2$上任意两点，

    ∴$y_1=(x_1-a)^2-2$，$y_{2}=(x_{2}-a)^{2}-2$．

    ∴$y_1 - y_2 = (x_1 - a)^2 - (x_2 - a)^2 = (x_1 - x_2)(x_1 + x_2 - 2a)$．

    ∵$0 < x_1 < \frac{1}{2}$，$\frac{1}{2}<x_{2}<1$，

    ∴$x_{1}<x_{2}$，$\frac{1}{2}<x_{1}+x_{2}<\frac{3}{2}$．

    ∵$x_{1}<x_{2}$，$y_{1}>y_{2}$，

    ∴$x_{1}+x_{2}-2a<0$．即$x_{1}+x_{2}<2a$．

    ∴$2a\quad\frac{3}{2}$．

    ∴$a\frac{3}{4}$．'
