  question: '如图，AB是$\odot\odot$的直径，点C是$\odot\odot$上一点，过点C作$\odot\odot$的切线CD与AB的延长线交于点D，过点B作$BE \parallel CD$，BE与$\odot\odot$交于点E，连接AE，CE．

    [图]

    （1）求证：$\angle ACE = \angle D$；

    （2）若$\tan \angle ACE = \frac{3}{4}$，$AE = 3$，求CE的长．'
  answer: （1）见解析 （2）$CE = \sqrt{5}$
  solution: '【小问1详解】

    证明：∵$\angle AE = \angle AE$，

    ∴$\angle ACE = \angle ABE$，

    又∵$BE \parallel CD$，

    ∴$\angle ABE = \angle D$．

    ∴$\angle ACE = \angle D$．

    【小问2详解】

    解：连接OC，交BE于点F，如图所示：

    [图]

    ∵CD是$\odot\odot$的切线，切点为C，

    ∴$\angle OCD = 90^\circ$，

    ∵$BE \parallel CD$，

    ∴$\angle OFB-\angle OCD=90^\circ$，

    ∴BE⊥OC，

    ∴F为BE中点．

    ∵O为直径AB中点，

    ∴OF为$\triangle AEB$的中位线，

    ∴$OF=\frac{1}{2}AE$，

    ∵$AE = 3$，

    ∴$OF = \frac{3}{2}$．

    ∵$\angle AE = \angle AE$，

    ∴$\angle ACE = \angle ABE$，

    ∵$\tan \angle ACE = \frac{3}{4}$，

    ∴$\tan \angle ABE = \frac{3}{4}$，

    ∵AB是$\odot\odot$的直径，

    ∴$\angle AEB = 90^\circ$，

    在$Rt_{\triangle AEB}$中

    ∵$\tan \angle ABE = \frac{3}{4}$，

    ∴$BE = 4$，

    由勾股定理得$AB = 5$．

    ∴$OC=\frac{5}{2}$．

    ∴$CF = 1$．

    ∵F为BE中点，$BE = 4$，

    ∴$EF = 2$．

    在$Rt_{\triangle}ECF$中，由勾股定理得

    $CE=\sqrt{2^{2}+1^{2}}=\sqrt{5}$．'
