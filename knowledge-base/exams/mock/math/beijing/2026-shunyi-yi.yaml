    ∴△ADB∽△ABE，

    ∴$\frac{AD}{AB}=$$\frac{AB}{AE}$，

    ∴AE$=\frac{A{B}^{2}}{AD}=$$\frac{{5}^{2}}{3}=$$\frac{25}{3}$，

    ∴EF＝AE﹣AF$=\frac{25}{3}-$5$=\frac{10}{3}$，

    ∴EF的长为$\frac{10}{3}$．

