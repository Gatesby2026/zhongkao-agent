    ∴BE⊥AB，

    ∴∠ABE＝90°，

    ∵∠CBE+∠ABC＝90°，∠BAC+∠ABC＝90°，

    ∴∠CBE＝∠BAC，

    ∵$\vec{BC}=$$\vec{CD}$，点E在AD的延长线上，

    ∴∠BAC＝∠CAE，

    ∴∠CBE＝∠CAE．

    （2）解：延长BC交AE于点F，连接BD，则∠BDF＝∠ADB＝∠ACF＝∠ACB＝90°，

    在△AFC和△ABC中，

    $\left\{\begin{matrix} ∠FAC=∠BAC \\ AC=AC \\ ∠ACF=∠ACB \end{matrix}\right.$，

    ∴△AFC≌△ABC（ASA），

    ∵∠DBF+∠AFB＝90°，∠CAE+∠AFB＝90°，

    ∴∠DBF＝∠CAE，

    ∴$\frac{DF}{BD}=$tan∠DBF＝tan∠CAE$=\frac{FC}{AC}=$$\frac{1}{2}$，

    ∵DF＝2，

    ∴BD＝2DF＝4，

    ∴BF$=\sqrt{B{D}^{2}+D{F}^{2}}=$$\sqrt{{4}^{2}+{2}^{2}}=$2$\sqrt{5}$，

    ∴FC＝BC$=\frac{1}{2}$BF$=\sqrt{5}$，

    ∴AC＝2FC＝2$\sqrt{5}$，

    ∴AF＝AB$=\sqrt{A{C}^{2}+B{C}^{2}}=$$\sqrt{(2\sqrt{5}{)}^{2}+(\sqrt{5}{)}^{2}}=$5，

    ∴AD$=\sqrt{A{B}^{2}-B{D}^{2}}=$$\sqrt{{5}^{2}-{4}^{2}}=$3，

