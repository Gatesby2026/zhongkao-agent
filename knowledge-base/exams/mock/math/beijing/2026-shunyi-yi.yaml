  stem: '在平面直角坐标系xOy中，对于⊙C和⊙C外一点A给出如下定义：若点P在⊙C上，且对圆上任意一点Q，都有∠PAC≥∠QAC，则称线段AP是点A关于⊙C的关联线段，称∠PAC的大小是点A关于⊙C的关联角度．

    （1）如图，⊙O的半径为1．

    ①已知点$A(\frac{1}{2}，\frac{\sqrt{15}}{2})$，则点A关于⊙O的关联线段的长为　             　 ，点A关于⊙O的关联角度为　     　 °；

    ②已知⊙O上一点$B(\frac{\sqrt{2}}{2}，-\frac{\sqrt{2}}{2})$，点D在直线$y=-x-3\sqrt{2}$上，线段DB是点D关于⊙O的关联线段，则点D的坐标为　                  　
    ；

    （2）已知点T（t，0），⊙T的半径为2，直线$y=-\sqrt{3}x+6$上的所有点都有关于⊙T的关联线段，记这些点关于⊙T的关联角度的最大值为α，若45°≤α＜90°，直接写出t的取值范围．'
