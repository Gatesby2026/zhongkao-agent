  stem: '在△ABC中，AB＝AC，∠BAC＝α，点D是BC边上一点（不与B，C重合），连接AD．将线段AD绕点A逆时针旋转α得到线段AE，连接DE．

    （1）如图1，α＝∠BAC＝80°，求∠DCE的度数；

    （2）如图2，α＝∠BAC＝90°，BD＜CD，过点D作DG⊥BC，DG交CA的延长线于G，连接BG．点M是DE的中点，点F是BG的中点，连接FM，CM．用等式表示线段FM与CM的数量关系并证明．'
  figure: 2026-pinggu-yi/figures/image15.png
  answer: （1）100°；
  solution: '解：（1）∵AB＝AC，α＝∠BAC＝80°，

    ∴∠ABC＝∠ACB＝50°，

    ∵将线段AD绕点A逆时针旋转α得到线段AE，

    ∴∠DAE＝α＝∠BAC，AD＝AE，

    ∴∠BAD＝∠CAE＝α﹣∠CAD，

    ∴△BAD≌△CAE（SAS），

    ∴∠ACE＝∠ABD＝50°，

    ∴∠DCE＝∠ACB+∠ACE＝100°；

    （2）$FM=\sqrt{2}CM$，证明如下：

    如图，连接CE，AM，AF，

    ![](figures/image43.png)

    ∵∠BAC＝90°，AB＝AC，

    ∴∠ACB＝∠ABC＝45°，

    ∵将线段AD绕点A逆时针旋转α得到线段AE，

    ∴∠DAE＝α＝90°，AD＝AE，

    ∴∠BAD＝∠CAE＝90°﹣∠CAD，

    ∴△BAD≌△CAE（SAS），

    ∴∠ACE＝∠ABC＝45°，CE＝BD，

    ∴∠ECD＝∠ACB+∠ACE＝90°，

    ∵DG⊥BC，∠ACB＝45°，

    ∴∠CDG＝∠BDG＝90°，△CDG为等腰直角三角形，

    ∴CD＝DG，

    ∵∠GDB＝∠DCE＝90°，BD＝CE，

    ∴△ECD≌△BDG（SAS），

    ∴DE＝BG，

    ∵点M，F分别为DE，BG的中点，∠ECD＝90°，∠DAE＝90°，∠BAG＝180°﹣∠CAB＝90°，

    ∴$CM=AM=\frac{1}{2}DE$，BF＝AF$=\frac{1}{2}$BG$=\frac{1}{2}$DE，

    ∴CM＝AM＝AF＝BF，

    又∵AC＝AB，

    ∴△CAM≌△BAF（SSS），

    ∴∠CAM＝∠BAF，

    ∴∠BAF+∠BAM＝∠CAM+∠BAM，即∠MAF＝∠CAB＝90°，

    ∵AM＝AF，

    ∴FM$=\sqrt{2}$AM$=\sqrt{2}CM$．'
