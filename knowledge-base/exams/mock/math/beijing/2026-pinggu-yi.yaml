  solution: '解：（1）在平面直角坐标系xOy中，抛物线y＝ax2+bx（a＜0）经过点A（3a，m）和点B（﹣a，m）．

    ∴点A、B关于对称轴$x=\frac{3a-a}{2}=a$对称，又抛物线的对称轴方程为$x=-\frac{b}{2a}$，

    ∴$-\frac{b}{2a}=a$，则b＝﹣2a2；

    （2）点C（t﹣1，n）在抛物线上，且m＜n，过点D（t，0）作x轴的垂线，交抛物线于点P，

    由（1）得y＝ax2﹣2a2x，

    ∵点C（t﹣1，n）在抛物线上，且m＜n，a＜0，

    ∴3a＜t﹣1＜﹣a，则3a+1＜t＜﹣a+1，

    由题意，P（t，at2﹣2a2t），Q（t，﹣at），

    ∴PQ＝|at2﹣2a2t+at|＝﹣a|t2﹣（2a﹣1）t|，

    解方程t2﹣（2a﹣1）t＝0得t1＝0，t2＝2a﹣1，

    ∵PQ的长随着t的增大而增大，

    ∴$\left\{\begin{matrix} 3a+1≥2a-1 \\ -a+1≤\frac{2a-1}{2} \\ a＜0 \end{matrix}\right.$或$\left\{\begin{matrix} 3a+1≥0 \\
    a＜0 \end{matrix}\right.$，

    解得：无解或$-\frac{1}{3}≤$a＜0，

    故满足条件的a的取值范围为$-\frac{1}{3}≤$a＜0．'
