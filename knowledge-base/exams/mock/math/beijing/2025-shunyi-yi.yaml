  question: '某社区举办“家园好声音”歌唱比赛，分为初赛和复赛两个阶段．

    （1）初赛由12名专业评委和50名群众评委给每位选手打分（百分制）．对评委给某位选手的打分进行整理、描述和分析．下面给出了部分信息．

    a．专业评委打分：

    84  86  88  90  90  90  91  91  92  95  97  98

    b．群众评委打分的频数分布直方图如下（数据分6组：第1组$82 \leq x < 85$，第2组$85\leq x<88$，第3组$88 \leq x < 91$，第4组$91 \leq x < 94$，第5组$94 \leq x < 97$，第6组$97 \leq x \leq 100$）：

    [图]

    c．评委打分的平均数、中位数、众数如下：

    |  | 平均数 | 中位数 | 众数 |

    | --- | --- | --- | --- |

    | 专业评委 | 91 | m | n |

    | 群众评委 | $90,2$ | p | 91 |

    根据以上信息，回答下列问题：

    ①写出表中m，n的值；

