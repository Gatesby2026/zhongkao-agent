    | 生产时间 / 分钟 | 2 | 7 | 6 |

    | 冷却时间 / 分钟 | 2 | 10 | 3 |

    已知A，B，C三种产品各生产一个．

    （1）若按照“$A-B-C$”的顺序生产，并完成冷却，那么至少需要________分钟；

    （2）若使完成A，B，C三个产品的加工总时间最短，则应按照________的顺序生产．'
  answer: ①.19 ②.$B-C-A$
  solution: '解：（1）由题意得：生产产品的同时可以冷却其他多个产品，

