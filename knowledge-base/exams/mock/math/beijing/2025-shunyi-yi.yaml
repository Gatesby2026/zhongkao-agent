  solution: '解：$(a-1)^{2}+b(b+2a)+2a$

    $a^{2}-2a+1+2ab+b^{2}+2a$

    $a^{2}+2ab+b^{2}+1$

    $=(a+b)^{2}+1$，

    当$a+b=\sqrt{2}$时，原式$\left(\sqrt{3}\right)^{2}+1=2+1=3$．'
