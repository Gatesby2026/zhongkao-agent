  question: '如图，在正方形$ABCD$中，点E在BC上，连接AE交对角线BD于点F．若$AB = 3$，$BE = 1$，则$BF =$________．

    [图]'
  answer: $\frac{3\sqrt{2}}{4}$##$\frac{3}{4}\sqrt{2}$
  solution: '解：$\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$正方形$ABCD$，

    $\therefore AD \parallel BC$，$AD = AB = 3$，$BD=\sqrt{2}AB=3\sqrt{2}$，

    $\triangle ADF \sim \triangle EBF$，

    $\frac{DF}{BF}=\frac{AD}{BE}=\frac{3}{1}$，

    $\therefore DF = 3BF$，

    $\because DF + BF = BD$，

    $3BF + BF = 3\sqrt{2}$，

    解得：$BF = \frac{3\sqrt{2}}{4}$．

    故答案为：$\frac{3\sqrt{2}}{4}$．'
