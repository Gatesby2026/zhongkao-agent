    ③比赛同时依据群众评委打分来评估选手的受欢迎等级．当有一半及以上的评委打分超过95评为一级；当没有达到一级，且有一半及以上的评委打分超过90评为二级；当没有达到二级，且有一半及以上的评委打分超过85评为三级．那么该选手的受欢迎等级为_______（一级/二级/三级）；

    （2）复赛由5名专家评委打分（百分制）．如果某选手得分的5个数据的方差越小，则认为评委对该选手的评价越一致．5名评委给甲选手打分为92，91，93，92，91．前4名评委给乙选手打分为92，91，92，92，乙选手的平均得分高于甲选手的平均得分，且5名评委对乙选手的评价更一致，则第五名评委给乙选手的打分是________（打分为整数）．'
  answer: （1）①$m=90.5$，$n = 90$；②能；③二级 （2）93
  solution: '【小问1详解】

    解：①专业评委打分从小到大排序后位于中间位置的两个数分别为90和91，

    ∴$m=\frac{90+91}{2}=90.5$，

    专业评委打分中出现次数最多的是90分，

    ∴$n = 90$；

    ②专业评委打分的平均分为$84+86+88+90+3\times91\times2+92+95+97+98>91>90$，

    ∴该选手能进入复赛，

    故答案为：能；

    ③由直方图可得，群众评委打分中，有$10+3=13$人超过95，人数不足一半；

    $18+10+3=31$位评委打分超过90，人数超过一半；

    ∴该选手的受欢迎等级为二级，

    故答案为：二级；

    【小问2详解】

    解：甲选手的平均分为$\frac{92+91+93+92+91}{5}=91.8$（分）

    ∴甲选手的方差为$s_{31}^{2}=\frac{2\times(92-91.8)^{2}+2\times(91-91.8)^{2}+(93-91.8)^{2}}{5}=0.56$，

    设第五名评委给乙选手的打a分

    ∵乙选手的平均得分高于甲选手的平均得分，且5名评委对乙选手的评价更一致，

    ∴$\frac{92+91+92+92+a}{5}>91.8$，解得$a > 92$，

    当整数$a = 93$时，$\frac{92+91+92+92+93}{5}=92$

    此时$s_{y}^{2}=\frac{3\times(92-92)^{2}+(91-92)^{2}+(93-92)^{2}}{5}=0.4<0.56$，

    当$a = 94$及以上时，方差增大，

    故答案为：93．'
