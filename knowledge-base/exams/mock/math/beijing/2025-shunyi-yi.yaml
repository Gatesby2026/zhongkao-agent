    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$生产A产品需要2分钟，生产B产品需要7分钟，可在生产B产品的同时冷却A产品，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$生产1个A产品1个B产品并冷却1个A产品共需要9分钟，即$2+7=9$分钟；

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$生产C产品的同时冷却B产品，冷却B产品需要10分钟，生产C产品需要6分钟，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$生产C产品后还需冷却B产品1分钟，

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$冷却C产品需要3分钟，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$按照“$A-B-C$”的顺序生产，并完成冷却，那么至少需要$2+7+10=19$分钟，'
