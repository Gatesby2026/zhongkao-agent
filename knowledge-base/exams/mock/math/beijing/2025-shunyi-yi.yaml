  solution: '【小问1详解】

    证明：∵四边形$ABCD$是矩形，

    ∴$AD = BC$，$AD \parallel BC$．

    ∵$AE = CF$，

    ∴$AD\cdot AE=BC\cdot CF$，即$DE = BF$．

    ∴四边形$EBFD$是平行四边形．

    【小问2详解】

    解：如下图，过点E作$EH \perp BC$于点H，则$\angle BHE=\angle FHE=90^{\circ}$．

    [图]

    ∵四边形$ABCD$是矩形，

    ∴$\angle A=\angle ABC=90^{\circ}$．

    ∴四边形$ABHE$是矩形．

    ∴$AE = BH = l$，$AB=EH=2$．

    ∵$BF = DE = 3$，

    ∴$HF = BF - BH = 2$．

    ∵在$Rt\triangle HEF$中，$EH^{1} + HF^{2} = EF^{2}$，

    ∴$EF = \sqrt{EH^{2} + HF^{2}} = \sqrt{2^{2} + 2^{2}} = 2\sqrt{2}$'
