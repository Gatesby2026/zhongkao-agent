  question: '在平面直角坐标系xOy中，函数$y=kx+b$（$k \neq 0$）的图象由函数$y=x$的图象平移得到，且经过点$(1,-1)$．

    （1）求k，b的值；

    （2）当$x > -1$时，对于x的每一个值，函数$y = mx + 1$（$m \neq 0$）的值大于函数$y=kx+b$（$k \neq 0$）的值且小于$y=5x+4$的值，直接写出m的取值范围．'
  answer: （1）$k = 1$，$b = -2$； （2）$2\leq m\leq 4$．
  solution: '【小问1详解】

    解：∵函数$y=kx+b$的图象由函数$y=x$的图象平移得到，

    ∴$k = 1$

    将点$(1,-1)$、$k = 1$代入$y=kx+b$，得

    $1+b=-1$

    解得$b = -2$

    答：k的值为1，b的值为$-2$．

    【小问2详解】

    由（1）得$y=x-2$，

    当$x = -1$时，$y = -m + 1$，$y = x - 2 = -3$，$y=5x+4=-1$，

    ∵当$x > -1$时，对于x的每一个值，函数$y = mx + 1$（$m \neq 0$）的值大于函数$y=kx+b$（$k \neq 0$）的值且小于$y=5x+4$的值，

    ∴$\left\{\begin{array}{l} m+1 \geq 3, \\ -m+1 \leq-1 \end{array}\right.$，解得$2\leq m\leq 4$．

    故答案$[公式]$：$2\leq m\leq 4$．'
