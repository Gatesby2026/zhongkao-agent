  question: '如图，AB是$\odot\odot$的直径，CD是$\odot\odot$的弦，AB与CD交于点E，若E为CD中点，$\angle BCD = 60^\circ$，$CD=2\sqrt{3}$，则$AE =$________．

    [图]'
  answer: $1$
  solution: '解：如图，连接AC，

    $\therefore AB$是$\odot\odot$的直径，E为CD中点，

    $\therefore AB \perp CD$，$CE=\frac{1}{2}\cdot CD=\frac{1}{2}\times 2\sqrt{3}=\sqrt{3}$，$\angle ACB=90^\circ$，

    $\angle AEC = 90^\circ$

    $\angle BCD = 60^\circ$，

    $\angle ACE = \angle ACB - \angle BCD = 30^\circ$，

    $\therefore\tan\angle ACE=\tan30^{\circ}=\frac{AE}{CE}=\frac{\sqrt{3}}{3}$，

    $\therefore AE=\frac{\sqrt{3}}{3}, CE=\frac{\sqrt{3}}{3}\sqrt{3}=1$．

    故答案为：$1$．

    [图]'
