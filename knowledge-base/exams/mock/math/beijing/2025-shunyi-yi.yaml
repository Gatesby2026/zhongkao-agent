  question: '在平面直角坐标系xOy中，已知抛物线$y=ax^{3}-2a^{3}x$（$a \neq 0$）．

    （1）求抛物线的对称轴（用含a的式子表示）；

    （2）已知$M(x_{1},y_{1})$和$N(x_{2},y_{2})$是抛物线上的两点．若对于$a+1<x_{1}<a+2$，$x_{2}=2a$，都有$y_{1}<y_{2}$，求a的取值范围．'
  answer: （1）$x = a$； （2）$-1 < a < 0$或$a^{2}$．
  solution: '【小问1详解】

    解：抛物线$y=ax^{3}-2a^{3}x$的对称轴为$x=\frac{-2a^{2}}{2a}=-a$

    【小问2详解】

    ∵$a \neq 0$，所以分为两种情况$a > 0$，$a < 0$

    [图]

    ①当$a > 0$时，对称轴为$x = a$，开口向上，

    ∵$a+1<x_{1}<a+2$,$x_{2}=2a$,

    ∴此时$x_1$、$x_{2}$都在对称轴的右侧，

    又∵当$x > a$时，y随x的增大而增大，

    结合图象，若对于$a+1<x_{1}<a+2$，$x_{2}=2a$，都有$y_{1}<y_{2}$

    则：$a+2\leq 2a$，

    ∴$a^{2}$

    ②当$a < 0$时，对称轴为$x = a$，开口向下，当$x > a$时，y随x的增大而减小，当$x<a$时，y随x的增大而增大，

    ∵$a+1<x_{1}<a+2$$[公式]$$x_{2}=2a$,

    ∴此时$x_1$在对称轴的右侧，$x_{2}$在对称轴的左侧,

    又∵抛物线$y=ax^{3}-2a^{3}x$的对称轴为$x = a$，

    ∴$(2a,y_{2})$关于对称轴的对称点为$(0, y_2)$，

    结合图象，若对于$a+1<x_{1}<a+2$，$x_{2}=2a$，都有$y_{1}<y_{2}$．

    ∴$\begin{pmatrix} a+1 & 0 \end{pmatrix}$

    ∴$a^{-1}$

    ∴$-1 \leq a < 0$

    综上，a的取值范围是$-1 \leq a < 0$或$a^{2}$．'
