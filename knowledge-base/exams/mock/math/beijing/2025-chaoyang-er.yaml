  question: '如图是一个几何体的三视图（图中尺寸单位：cm），根据图中数据计算，这个几何体的表面积为__________$cm^2$．

    [图]'
  answer: $16\pi$
  solution: '分析：由主视图和左视图确定是柱体，锥体还是球体，再由俯视图确定具体形状，确定圆锥的母线长和底面半径，从而确定其表面积．

    详解：由主视图和左视图为三角形判断出是锥体，由俯视图是圆形可判断出这个几何体应该是圆锥；

    根据三视图知：该圆锥的母线长为6cm，底面半径为2cm，

    故表面积=πrl+πr2=π×2×6+π×22=16π（cm2）．

    故答案为16π．

    点睛：考查学生对三视图掌握程度和灵活运用能力，同时也体现了对空间想象能力方面的考查．'
