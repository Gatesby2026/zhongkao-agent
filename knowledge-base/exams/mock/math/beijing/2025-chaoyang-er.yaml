    （3）该快餐连锁店提供了两种日工资方案（不考虑其他因素）：方案一规定每日底薪50元，每完成一单外卖提成5元；方案二规定每日底薪100元，外卖的前24单没有提成，从第25单开始，每送一单外卖提成10元．

    ①若甲、乙两人都选择了方案一，则甲这30日的工资___________乙这30日的工资（填“$\gt$”“$\gt$”或“$=$”）；

