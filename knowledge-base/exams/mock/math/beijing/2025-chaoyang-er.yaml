  question: 某学校安排15名老师和一些学生参加团体操表演，所有师生恰好排列成矩形方阵，要求每一行都有且只有6名男学生，每一列都有且只有8名女学生，则此次团体操表演最多可以安排___________名男学生，此次团体操表演最少需要___________名学生．
  answer: ①.426 ②.206
  solution: '解：设矩形方阵为m行n列，

    ∵每一行都有且只有6名男学生，每一列都有且只有8名女学生，且有15名老师，

    ∴师生总数满足$mn=15+6m+3n$，

    整理得$(n-8)(n-6)=63$，

    ∵m、n都是正整数，$63=1\times63=3\times21=7\times9$，

    ∵男生总数为$6t$，当男生人数最多时，需要m最大，

    此时$m-8=63$，$n-6=1$，

    解得$m = 71$，$n=7$，

    ∴$6m=6\times71=426$，

    ∴此次团体操表演最多可以安排426名男学生；

    当$m-8=9$，$n-6=7$，

    解得$m = 17$，$n = 13$，

    ∴$6m+8n=6\times17+8\times13=206$，

    ∴此次团体操表演最少需要206名学生；

    故答案$[公式]$：426；206．'
