  question: '不透明的袋子中装有$2$个红球、$1$个绿球，这$3$个球除颜色外无其他差别，随机一次摸出两个球，颜色相同的概率是（）

    A.$\frac{2}{3}$

    B.$\frac{1}{2}$

    C.$\frac{1}{3}$

    D.$\frac{1}{6}$'
  answer: C
  solution: '解：运用列表法或画树状图法把所有等可能结果表示如下，有$2$个红球分别用$A,B$表示、$1$个绿球用C表示，

    |  | A | B | C |

    | --- | --- | --- | --- |

    | A |  | $\left(A,B\right)$ | $(A,C)$ |

    | B | $\left(B,A\right)$ |  | $(B,C)$ |

    | C | $(C,A)$ | $(C,B)$ |  |

    共有6种等可能结果，其中相同的有2种，

    ∴颜色相同的概率是$\frac{2}{6}=\frac{1}{3}$，

    故选：C．'
