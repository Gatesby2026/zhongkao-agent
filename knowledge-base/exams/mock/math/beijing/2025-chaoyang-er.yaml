  question: '实数$a, b$在数轴上的对应点的位置如图所示，下列结论中正确的是（）

    [图]

    A.$-a < a + b < -b < a - b$

    B.$-a<-b<a-b<a+b$

    C.$a-b<-a<-b<a+b$

    D.$-b < -a < a + b < a - b$'
  answer: A
  solution: '解：由数轴可知$1<a<2$，$-2 < b < -1$，

    $\therefore a$是正数，b是负数，且$|b| < |a|$．

    $\because a>0$，

    $\therefore -a < 0$，且$-2 < -a < -1$，

    $\because b<0$，

    $\therefore -b > 0$，且$1<-b<2$．

    $\because b < a$，

    $\therefore a+b>0$，$a+b$的绝对值为$\left|a-b\right|$，

    又因为a在$1$到$2$之间，$\left| b \right|$在$1$到$2$之间且$|b| < |a|$，

    $0 < a + b < 1$，

    $\therefore -2 < b < -1$，

    $1<-b<2$，

    $a-b=a+(-b)$，$a > 0$，$-b > 0$，

    $\therefore a-b>0$，

    $\therefore a-b>2$，

    $-2 < -a < -1$．$0 < a + b < 1$，$1<-b<2$，$a-b>2$，

    $\ldots-a<a+b<-b<a-b$，

    故选：A．'
