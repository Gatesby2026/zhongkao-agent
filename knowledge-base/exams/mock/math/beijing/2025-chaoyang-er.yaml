  question: '在平面直角坐标系xOy中，一次函数$y=kx-2k\ (k\neq0)$的图象与函数$y=\frac{3}{x}$的图象的一个交点为$A(a,1)$．

    （1）求一次函数的表达式；

    （2）当$x > 4$时，对于x的每一个值，函数$y = nx \, (n \neq 0)$的值大于函数$y=\frac{3}{x}$的值，且小于一次函数$y=kx-2k$的值，直接写出n的取值范围．'
  answer: （1）$y=x-2$ （2）$\frac{3}{16} \leq n \leq \frac{1}{2}$
  solution: '【小问1详解】

    解：把$A(a_{1})$代入$y=\frac{3}{x}$得：

    ∴$1=\frac{3}{a}$，解得：$a = 3$，

    ∴点$A(3,1)$，

    把点$A(3,1)$代入$y = kx - 2k \, (k \neq 0)$得：

    $1 = 3k - 2k$，解得：$k = 1$，

    ∴一次函数的表达式为$y=x-2$；

    【小问2详解】

    解：如图，

    [图]

    对于$y=\frac{3}{x}$，

    当$x = 4$时，$y = \frac{3}{4}$，

    把$x = 4$，$y = \frac{3}{4}$代入$y = nx \ (n \neq 0)$得：

    $\frac{3}{4}=4n$，解得：$n=\frac{3}{16}$，

    对于$y=x-2$，

    当$x = 4$时，$y=2$，

    把$x = 4$，$y=2$代入$y = nx \ (n \neq 0)$得：

    $2=4n$，解得：$n=\frac{1}{2}$，

    观察图象得：当$x > 4$时，对于x的每一个值，函数$y = nx \ (n \neq 0)$的值大于函数$y=\frac{3}{x}$的值，且小于一次函数$y=kx-2k$的值，n的取值范围为$\frac{3}{16} \leq n \leq \frac{1}{2}$．'
