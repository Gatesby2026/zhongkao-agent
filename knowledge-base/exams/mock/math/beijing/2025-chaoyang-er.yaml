  solution: '【小问1详解】

    解：甲在这30天的送外卖量中，排在第15和16的是27和29，

    则中位数$m = \frac{27 + 29}{2} - 28$；

    乙在这30天的送外卖量中，39出现的次数最多，出现了8次，

    则众数$n = 39$；

    【小问2详解】

    解：$\frac{400}{2000} \times 100\% = 20\%$，

    由频数分布直方图可知，平均送单量在“$45\sim55$”及“$55\sim65$”区间的人数共$15+5=20$人，占抽样100人的$\frac{20}{100} \times 100\% = 20\%$，即这部分人对应前$20\%$，

    而甲的平均值为35.2，落在“$35\sim45$”区间，并不在45以上那一组中，

    故估计甲不能进入前400名，得不到奖金；

    【小问3详解】

    解：甲、乙的30天的日平均送单量都是35.2单/天 ，

    则这30天甲、乙的总送单量为$35.2\times30=1056$（单），

    因而二人总工资$=30\times50+5\times1056=1500+5280=6780$(元)，

    所以甲的工资=$=$乙的工资，

    ②若甲按“方案二”的总收入为$30\times100+10\times(27+29+32+33+42+47+56\times5+58+59\times2+60+62-24\times16)=7040$(元)，

    大于其在“方案一”下的6780元，

    因此甲应选“方案二”，

    若乙按“方案二”的总收入为$30\times100+10\times(35.2\times30-18-23-24-24\times27)=6430$(元)，

    小于其在“方案一”下的6780元，

    因此乙应选“方案一”．'
