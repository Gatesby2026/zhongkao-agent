    a．随机抽取该快餐连锁店的100名外卖骑手，统计他们30天的平均送外卖量（单位：单），并画出频数分布直方图（数据分成6组：$5\pi x=15.15,x<25.25\pi x=35.35,x$$x < 45.45 \leq x < 55.55 \leq x < 65$；

