  question: '根据国家相关规定，新建小区的绿地率不得低于$30\%$，旧小区改造的绿地率不得低于$25\%$，一般地，绿地率可以看做是绿地面积（包括覆土绿地和实土绿地）与小区总面积的比，其中实土绿地是指绿化层下面为真实的土地，其面积应占总绿地面积的$50\%$以上，覆土绿地是在人工铺设的土层上进行绿化，当覆土高度小于$1,5m$时，不算绿地面积；当覆土高度在$1,5m$至$3m$时，覆土面积的$50\%$计入绿地面积；只有当覆土高度超过$3m$时，覆土面积才全部计入绿地面积．

    某旧小区总面积为$24000m^{2}$，绿地率只有$15\%$，且其中覆土绿地的覆土高度都约为$2m$．现有一种改造方案，计划把原有覆土绿地的覆土高度都增加到$3m$以上，并增加$1400m^{2}$实土绿地，从而使实土绿地的面积达到总绿地面积的$60\%$．请判断按照该方案改造后，该小区的绿地率能否合格，并说明理由．'
  answer: 绿地率可以合格，理由见解析
  solution: '解：设该小区改造前覆土绿地的面积为$x\mathrm{m}^{2}$，实土绿地的面积为$ym^2$，

    由题意可知，$\begin{cases}

    50\%x + y = 24000 \times 15\% \\

    (x + y + 1400) \times 60\% = y + 1400

    \end{cases}$，

    解得$\left\{ \begin{array} { l } { x = 2500 } \\ { y = 2350 } \end{array} \right.$，

    按照该方案改造后的绿地面积为$2500+2350+1400=6250\left(m^{2}\right)$，

    根据规定，该小区的绿地面积不得低于$24000\times25\%=6000(m^{2})$，

    ∵$6250 > 6000$，

    ∴按照该方案改造后，该小区的绿地率可以合格．'
