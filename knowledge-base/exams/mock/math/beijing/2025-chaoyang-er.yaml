  question: 已知$a-b-2=0$，求代数式$\frac{2a}{a^{2}-b^{2}}-\frac{1}{a+b}$的值．
  answer: $\frac{1}{a-b}$，$\frac{1}{2}$
  solution: '解：$\frac{2a}{a^{2}-b^{2}}-\frac{1}{a+b}$

    $\frac{2a}{(a+b)(a-b)}-\frac{a-b}{(a+b)(a-b)}$

    $=\frac{a+b}{(a+b)(a-b)}$

    $\frac{1}{a-b}$，

    $a - b - 2 = 0$，

    $\therefore a-b=2$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$原式$=\frac{1}{2}$．'
