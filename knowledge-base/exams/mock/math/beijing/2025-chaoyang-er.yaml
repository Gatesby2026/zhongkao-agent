  question: 若关于x的一元二次方程$(a+1)x^{2}+(a+1)x+1=0$有两个相等的实数根，则实数a的值为___________．
  answer: '3'
  solution: '解：关于x的一元二次方程$(a+1)x^{2}+(a+1)x+1=0$有两个相等的实数根，

    ∴$a+1\ne0$，$\Delta=(a+1)^{2}-4(a+1)=0$，

    ∴$a \neq -1$，$(a+1)(a+1-4)=0$，

    解得，$a = -1$或$a = 3$，

    ∴$a = 3$，

    故答案为：$3$．'
