  question: 若$\frac{\sqrt{x}}{x-1}$在实数范围内有意义，则x的取值范围是____________.
  answer: $x\quad 0$且$x \ne 1$.
  solution: '分析：根据分式有意义和二次根式有意义的条件解题.

    详解：因为$\frac{\sqrt{x}}{x-1}$在实数范围内有意义，所以x≥0且x－1≠0，则x≥0且x≠1.

    故答案为x≥0且x≠1.

    点睛：本题考查了分式和二次根式有意义的条件，分式有意义的条件是分母不等于0；二次根式有意义的条件是被开方数是非负数，代数式既有分式又有二次根式时，分式与二次根式都要有意义.'
