  question: 方程$\frac{1}{x-1}+\frac{2}{3x+2}=0$的解为______．
  answer: $x = 0$
  solution: '解：$\frac{1}{x-1}+\frac{2}{3x+2}=0$

    方程两边同时乘$(x-1)(3x+2)$，得$3x+2+2(x-1)=0$，

    去括号，得$3x+2+2x-2=0$，

    解得：$x = 0$，

    检验：把$x = 0$代入$(x-1)(3x+2)\neq0$，

    ∴分式方程的解为$x = 0$．

    故答案为：$x = 0$．'
