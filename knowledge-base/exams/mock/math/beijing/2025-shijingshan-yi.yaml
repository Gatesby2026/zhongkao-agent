  question: 已知$x - 2y = 0$，求代数式$2x^{2}-4xy+2y^{2}=\frac{2-x}{x-y}$的值．
  answer: $\frac{1}{2}$
  solution: '解：$2x^{2}-4xy+2y^{2}=\frac{2-x}{x-y}$

    $=\frac{x}{2(x^{2}-2xy+y^{2})}+\frac{2}{x-y}$

    $=\frac{x}{2(x-y)^{2}}\cdot\frac{x-y}{2}$

    $=\frac{x}{4(x-y)}$

    $=\frac{x}{4x-4y}$，

    ∵$x - 2y = 0$，

    ∴$x = 2y$，

    ∴原式$\frac{2y}{8y-4y}=\frac{1}{2}$．'
