    $\therefore \angle ACB = 60^\circ$，$AB = BC = AC = 6$，

    $\because CD \perp AB$，

    $\therefore BD = \frac{1}{2}AB = 3$，$\angle BCD=\frac{1}{2}\angle ACB=30^\circ$，

    $CD=\sqrt{3}BD=3\sqrt{3}$，

    QPF是CE的垂直平分线，

