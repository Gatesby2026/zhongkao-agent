    $\textcircled{2}$小明和哥哥合作完成四项家务，把A和D分为一组，B和C分为一组，

    A和D分为一组，最少需要的时间是$5+12+15=32$分钟，

    B和C分为一组，最少需要的时间是$3+15+16=34$分钟，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$小明和哥哥合作完成四项家务，则至少需要$34$分钟．

