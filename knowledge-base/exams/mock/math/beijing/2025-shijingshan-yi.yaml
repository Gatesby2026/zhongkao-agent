  question: '每年的5月20日为中国学生营养日，2024年营养日的主题是“奶豆添营养，少油更健康”．某学校为每位学生定制了盒装的牛奶和豆浆，它们的营养成分表如下：

    | 营养成分 食品种类 | 一盒牛奶 | 一盒豆浆 |

    | --- | --- | --- |

    | 能量 | $280\mathrm{kJ}$ | $210kJ$ |

    | 蛋白质 | $3.5g$ | $4.2g$ |

    | 脂肪 | $3.5g$ | $2.4g$ |

    | 碳水化合物 | $5.6g$ | $1.7g$ |

    | 钠 | $65mg$ | $13mg$ |

    | 钙 | $130mg$ |  |

    某天，初中生小石从这两种食品中恰好摄入了$770\mathrm{kJ}$能量和$11.2g$蛋白质．

    （1）小石喝了牛奶和豆浆各多少盒？

    （2）初中生每日脂肪摄入量约为$59 \sim 73g$．若小石这天已经从其它食品中摄入$60g$脂肪，在他喝完牛奶和豆浆后，脂肪摄入量是否超标，并说明理由．'
  answer: （1）小石喝了2盒牛奶和1盒豆浆 （2）他喝完牛奶和豆浆后，脂肪摄入量没有超标，理由见解析
  solution: '【小问1详解】

    解：设小石喝了牛奶x盒，豆浆y盒，根据题意：

    $\begin{aligned}

    &280x + 210y = 770 \\

    &3.5x + 4.2y = 11.2

    \end{aligned}$，

    解得：$\left\{\begin{array}{l}x=2\\y=1\end{array}\right.$，

    答：小石喝了2盒牛奶和1盒豆浆；

    【小问2详解】

    解：他喝完牛奶和豆浆后，脂肪摄入量没有超标，理由如下：

    由（1）知小石这天喝了2盒牛奶和1盒豆浆，

    则喝完牛奶和豆浆后，摄入的脂肪为$3.5x+2.4x=9.4g$，

    则这天小石这天共摄入$60+9.4=69.4g$脂肪，

    $59<69.4<73$，

    ∴他喝完牛奶和豆浆后，脂肪摄入量没有超标．'
