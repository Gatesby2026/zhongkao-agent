  question: '若一个多边形的每个内角都是相邻外角的2倍，则这个多边形的边数为（）

    A.4

    B.5

    C.6

    D.8'
  answer: C
  solution: '解：设这个多边形的一个外角的度数为x，则一个内角的度数为$2x$，

    ∴$x + 2x = 180^\circ$，

    解得$x = 60^\circ$．

    ∴该多边形一个外角的度数为$60^\circ$，

    ∴该多边形的边数为$\frac{360^{\circ}}{60^{\circ}}=6$，

    故选：C．'
