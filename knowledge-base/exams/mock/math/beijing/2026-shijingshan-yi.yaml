  answer: （1）3；
  solution: '解：（1）∵过线段PQ的两个端点分别作直线l的平行线，交y轴于点P_{1}和Q_{1}，称线段P_{1}Q_{1}的长为线段PQ关于直线l：y＝x﹣5的纵影长，

    ∴PP_{1}∥l，QQ_{1}∥l，

    设PP_{1}为y＝x+b，QQ_{1}为y＝x+m，

    将点P（1，1），点Q（0，3）分别代入上面两个式子，即1＝1+b，3＝0+m，

    ∴b＝0，m＝3，

    ∴PP_{1}为y＝x，QQ_{1}为y＝x+3，

    将x＝0分别代入上面两个式子，即y＝0，y＝0+3＝3，

    ∴点P_{1}（0，0）和Q_{1}（0，3），

    ∴P_{1}Q_{1}＝3﹣0＝3，

    ∴线段PQ 关于直线y＝x﹣5的纵影长为3，

    故答案为：3；

    （2）y＝kx+2（k≠0）是一条过点（0，2）旋转的直线，

    如图，根据定义可知，当线段MN关于直线y＝kx+2（k≠0）的纵影长为4时，NH＝4，则H（1，0）或H（1，8），

    将M（﹣1，2），H（1，0）代入y＝ax+b，

    得：$\left\{\begin{matrix} 2=-a+b \\ 0=a+b \end{matrix}\right.$，

    解得$\left\{\begin{matrix} a=-1 \\ b=1 \end{matrix}\right.$，

    根据纵影长的定义可知，k＝a＝﹣1，

    ![](figures/image38.png)

    将M（﹣1，2），H（1，8）代入y＝ax+b，

    得：$\left\{\begin{matrix} 2=-a+b \\ 8=a+b \end{matrix}\right.$，

    解得$\left\{\begin{matrix} a=3 \\ b=5 \end{matrix}\right.$，

    根据纵影长的定义可知，k＝a＝3，

    ![](figures/image39.png)

    综上所述，k＝﹣1或k＝3，

    故答案为：﹣1或3；

    （3）过点T分别作直线y＝2x﹣10和直线y＝﹣x﹣10的平行线，分别交y轴于点T_{1}，T_{2}，

    当线段OT关于直线y＝2x﹣10的纵影长与线段OT关于直线y＝﹣x﹣10的纵影长的和为6时，OT_{1}+OT_{2}＝6，

    如图，当T_{1}，T_{2}位于点O两侧时，T_{1}T_{2}＝6，过点T作TH⊥TT_{2}，y＝2x﹣10与y轴交于C（0，﹣10），与x轴交于B（5，0），

    ![](figures/image40.png)

    设TH＝h，

    ∵TT_{1}与y＝﹣x﹣10平行；

    ∴∠T_{1}TH＝45°，

    ∴T_{1}H＝TH＝h，

    ∵TT_{2}与y＝2x﹣10平行，

    ∴△HTT_{2}∽△BOC，

    ∴$\frac{H{T}_{2}}{TH}=\frac{OC}{OB}$，

    ∴HT_{2}＝2h，

    则T_{1}T_{2}＝HT_{1}+HT_{2}＝h+2h＝6，

    h＝2，即点T的横坐标为±2，

    当点T的横坐标为2时，令T_{1}与O重合，T的纵坐标为﹣2，令T_{2}与O重合，T的纵坐标为4，

    当点T的横坐标为﹣2时，令T_{1}与O重合，T的纵坐标为2，令T_{2}与O重合，T的纵坐标为﹣4，

    此时点T的运动轨迹如图所示，

    ![](figures/image41.png)

    如图，当T_{1}，T_{2}位于点O同侧时，设T（m，n），

    当T在第一象限，设过点T分别与直线y＝2x﹣10和直线y＝﹣x﹣10平行的直线为y_{1}＝2x+b_{1}，y_{2}＝﹣x+b_{2}，

    代入得$\left\{\begin{matrix} n=2m+{b}_{1} \\ n=-m+{b}_{2} \end{matrix}\right.$，

    则$\left\{\begin{matrix} {b}_{1}=n-2m \\ {b}_{2}=n+m \end{matrix}\right.$，

    故y_{1}＝2x+n﹣2m，y_{2}＝﹣x+n+m，

    令x＝0，得，T_{1}（0，n﹣2m），T_{2}（0，m+n），

    ∵OT_{1}+OT_{2}＝6，

    ∴n﹣2m+m+n＝﹣m+2n＝6，即T在直线$n=\frac{1}{2}m+3$上运动，

    ∵﹣2m+n＞0，

    ∴0＜m＜2，

    同理可以找到T在第二象限，第三象限和第四象限的运动轨迹，如图，

    ![](figures/image42.png)

    整理可得T完整的运动轨迹，以A（1，0）为圆心，r为半径的圆需与此轨迹有交点，

    ![](figures/image43.png)

    当⊙A刚好与轨迹相切时，r＝1，

    当⊙A过点（﹣2，﹣4）时，r＝5，

    综上，1≤r＜5．'
