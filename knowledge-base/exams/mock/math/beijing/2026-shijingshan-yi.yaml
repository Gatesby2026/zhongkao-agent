  stem: '在平面直角坐标系xOy中，对于线段PQ和直线l（点P，Q均不在直线l上且直线PQ不与直线l平行），给出如下定义：过线段PQ的两个端点分别作直线l的平行线，交y轴于点P_{1}和Q_{1}，称线段P_{1}Q_{1}的长为线段PQ关于直线l的纵影长．

    （1）如图，已知点P（1，1），点Q（0，3），线段PQ关于直线y＝x﹣5的纵影长为　   　 ；

    （2）已知点M（﹣1，2），点N（1，4），线段MN关于直线y＝kx+2（k≠0）的纵影长为4，则k的值为　       　 ；

    （3）已知A（1，0），⊙A的半径为r．若⊙A上存在点T，使线段OT关于直线y＝2x﹣10的纵影长与线段OT关于直线y＝﹣x﹣10的纵影长的和为6，直接写出r的取值范围．'
