    ∴$∠AMB=∠ABM=\frac{180°-(180°-2α)}{2}=α$，

    ∵∠ABC＝α，

    ∴点M，D，C，B共线，

    ∴∠ABE＝∠AMB＝α，

    ∴∠ABE＝∠ABC，

    延长EP交BC于点N，作PK⊥BC于点K，PL⊥BE于点L，连接PF，

    ∵∠ACB＝90°，

    ∴四边形PQCK是矩形，

    ∴PQ＝CK，

    ∵EF⊥BC，PG是EF的垂直平分线，

    ∴PG∥BC，EG＝FG，

    ∴$\frac{EP}{NP}=\frac{EG}{FG}$，

    ∴EP＝NP，

    ∴$FP=EP=NP=\frac{1}{2}EN$，

    ∴NK＝KF，

    ∴$NK=\frac{1}{2}NF$，

    ∵PK⊥BC，PL⊥BE，∠ABE＝∠ABC，

    ∴PK＝PL，

    ∵PN＝PE，

    ∴△PNK≌△PEL（HL），

    ∴∠PNK＝∠PEL，

    ∴△PNB≌△PEB（AAS），

    ∴BE＝BN，

    ∴DM＝BN，

    ∵∠ACB＝90°，AB＝AM，

    ∴CM＝CB，

    ∴CM﹣DM＝CB﹣BN，

    ∴CD＝CN，

    ∴$CN=\frac{1}{2}DN$，

    ∴$CK=NK+CN=\frac{1}{2}NF+\frac{1}{2}DN=\frac{1}{2}DF$，

    ∴$PQ=\frac{1}{2}DF$，即DF＝2PQ．'
