  answer: （1）见解析    （2）$C D = B E + C F$，见解析
  solution: '（1）根据等腰三角形三线合一得到$A E \bot B C$，求出$A E = A F , \angle E A F = 180 \circ - 2 \alpha$，进而求出$\angle B A E = \alpha$，由旋转的性质知$\angle
    E A M = \angle F A C$，根据等边对等角得到$\angle A E F = \angle A F E = \alpha$，进而得到$\angle B A E = \angle A E F$，即可证明$E F A B$；

    （2）在$B C$上取一点$M$，连接$A M ,$使得$A M = A C$，根据等边对等角得到$\angle A M C = \angle A C M = \alpha$，进而求出$\angle M A C = 1 8 0 \circ
    - 2 \alpha$，由旋转的性质知$A E = A F , \angle E A F = 1 8 0 \circ - 2 \alpha$，可知$\angle E A F = \angle M A C$，进而得到$\angle E A
    M = \angle F A C$，证明$\triangle A E M \approx \triangle A F C$，得到$E M = C F$，证明$\triangle A B M \approx \triangle A D C$，得到$B
    M = C D$，根据$B M = B E + E M$即可得到$C D = B E + C F$．

    （1）

    证明：$\because A B = A D , E$是$B D$的中点，

    $\therefore A E \bot B C ,$

    $\because \angle A C E = \alpha$，

    $\therefore \angle C A E = 9 0 \circ - \alpha ,$

    $\because \angle B A C = 9 0 \circ$，

    $\therefore \angle B A E = 9 0 \circ - \angle C A E = \alpha$，

    由旋转的性质知$= 180 \circ - 2 \alpha$，

    $\therefore \angle A E F = \angle A F E = \frac{1 8 0 \circ - \left(\right. 1 8 0 \circ - 2 \alpha \left.\right)}{2} =
    \alpha$，

    $\therefore \angle E A F = \angle M A C$，

    $\therefore E F \parallel A B$；

    （2）

    解：$C D = B E + C F$．证明过程如下：

    如图，在$B C$上取一点$M$，连接$A M ,$使得$A M = A C$，

    ![](figures/image612.png)

    $\because \angle A C B = \alpha$，

    $\therefore \angle A M C = \angle A C M = \alpha$，

    $\therefore \angle M A C = 1 8 0 \circ - \angle A M C - \angle A C M$

    $= 1 8 0 \circ - 2 \alpha$，

    由旋转的性质知$A E = A F , \angle E A F = 1 8 0 \circ - 2 \alpha$，

    $\therefore \angle E A F = \angle M A C$，

    $\therefore \angle E A F - \angle M A F = \angle M A C - \angle M A F$，

    即$\angle E A M = \angle F A C$，

    又$\because A M = A C , A E = A F$，

    $\therefore \triangle A E M \approx \triangle A F C \left(\right. \left.\right)$，

    $O M$，

    $\because \angle A C M = \angle A M C$，

    $\therefore \angle A M B = \angle A C D$，

    $\because A B = A D$，

    $\therefore \angle B = \angle D$，

    $\therefore \triangle A B M \approx \triangle A D C \left(\right. \left.\right)$，

    $\therefore B M = C D$，

    $\because B M = B E + E M$，

    $\therefore C D = B E + C F$．'
