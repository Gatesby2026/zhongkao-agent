  answer: （1）$45 \circ$ （2）$\frac{1 1}{2}$ （3）$0 < a \leq \frac{3}{2}$
  solution: '（1）将点$A \left(\right. 4 , 5 \left.\right)$代入抛物线解析式，通过移项化简直接用含$a$的式子表示出$b$；

    （2）代入$a = 2$得到具体抛物线解析式，令$y = 1 0$解一元二次方程，用较大根减去较小根即可得到$M N$的长度；

    （3）先求出直线$A B$的解析式，分类讨论点$P$与点$C$的上下位置关系，利用$4 5 \circ$角和相似三角形将$E F$转化为关于$m$的二次函数，再根据二次函数的增减性结合给定区间列不等式求解$a$的取值范围即可．

    （1）

    解：∵抛物线$y = a x^{2} + b x + 1 \left(\right. a > 0 \left.\right)$经过点$A \left(\right. 4 , 5 \left.\right)$，

    ∴$5 = 1 6 a + 4 b + 1$，

    ∴$M N = x_{2} - x_{1} = \frac{9}{2} - \left(-,1\right) = \frac{11}{2}$；

    （2）

    解：由（1）可得抛物线为$y = a x^{2} + \left(\right. 1 - 4 a \left.\right) x + 1$

    将$a = 2$代入$y = a x^{2} + \left(\right. 1 - 4 a \left.\right) x + 1$中，

    得$y = 2 x^{2} - 7 x + 1$，

    ∵点$M \left(\right. x_{1} , 1 0 \left.\right)$，$N \left(\right. x_{2} , 1 0 \left.\right) \left(\right. x_{2} > x_{1} \left.\right)$在该抛物线上，

    ∴将$y = 1 0$代入$y = 2 x^{2} - 7 x + 1$中，

    得$2 x^{2} - 7 x + 1 = 1 0$，

    解得$x_{1} = - 1$，$x_{2} = \frac{9}{2}$，

    ∴$M N = x_{2} - x_{1} = \frac{9}{2} - \left(\right. - 1 \left.\right) = \frac{1 1}{2}$；

    （3）

    解：将$x = 0$代入$y = a x^{2} + b x + 1$中，得$y = 1$，

    ∴点$B$的坐标为$\left(\right. 0 , 1 \left.\right)$，

    设直线$A B$的解析式为$y = k x + n \left(\right. k \neq 0 \left.\right)$，

    将$A \left(\right. 4 , 5 \left.\right) , B \left(\right. 0 , 1 \left.\right)$代入，

    得$\left{\right. 5 = 4 k + n & 1 = n$，

    解得$\left{\right. k = 1 & n = 1$，

    ∴直线$A B$的解析式为$y = x + 1$，

    如图①，过点$A$作$A G \bot y$轴于点$G$，则$A G = 4$，$O G = 5$，$O B = 1$，

    ![](figures/image532.png)

    ∴$B G = O G - O B = 4$，

    ∴$A G = B G$，即$\triangle A G B$是等腰直角三角形，

    ∴$\angle A B G = 4 5 \circ$，

    当$0 < m \leq 4$时，如解图①，

    ∵$P C \bot x$轴，

    ∴$P C \parallel y$轴，

    ∴$\angle P C Q = \angle A B G = 4 5 \circ$，

    ∵$P Q \bot A B$，即$\angle P Q C = 9 0 \circ$，

    ∴$\angle C P Q = 9 0 \circ - \angle P C Q = 4 5 \circ$，

    ∴$Q C = Q P$，

    ∴在$\triangle P Q C$中，$Q C^{2} + Q P^{2} = 2 Q C^{2} = P C^{2}$，

    ∴$Q C = \frac{}{2} P C$，

    ∵$E F \parallel A B$，

    ∴$\triangle P E F \sim \triangle P Q C$，

    ∵$P Q = 4 P E$，

    ∴$\frac{E F}{Q C} = \frac{P E}{P Q} = \frac{1}{4}$，

    ∴$E F = \frac{1}{4} Q C = \frac{}{8} P C$，

    由（1）可得抛物线$y = a x^{2} + b x + 1 = a x^{2} + \left(\right. 1 - 4 a \left.\right) x + 1$，

    ∵点$P$的横坐标为$m$，且在抛物线上，

    ∴$y_{p} = a m^{2} + \left(\right. 1 - 4 a \left.\right) m + 1$，

    ∵$P C \bot x$轴，

    ∴点$C$的横坐标为$m$，

    ∵点$C$在直线$A B$上，

    ∴$y_{c} = m + 1$，

    ∵点$C$在点$P$上方，

    ∴$P C = y_{c} - y_{p}$，

    $= m + 1 - \left[\right. a m^{2} + \left(\right. 1 - 4 a \left.\right) m + 1 \left]\right.$

    $= - a \left(\right. m - 2 \left.\right)^{2} + 4 a$，

    ∴$E F = \frac{}{8} P C = - \frac{a}{8} \left(\right. m - 2 \left.\right)^{2} + \frac{a}{2}$，

    ∵$a > 0$，

    ∴$- \frac{a}{8} < 0$，

    ∴抛物线开口向下，当$m \leq 2$时，$E F$的长随$m$的增大而增大，

    又∵当$0 < m \leq a + \frac{1}{2}$时，$E F$的长随$m$的增大而增大，

    ∴$a + \frac{1}{2} \leq 2$，

    解得$a \leq \frac{3}{2}$，

    ∴$0 < a \leq \frac{3}{2}$，

    当$m > 4$时，如解图②，

    ![](figures/image565.png)

    同理可得$E F = \frac{}{8} P C$，

    ∵点$P$在点$C$上方，

    ∴$P C = y_{p} - y_{c}$

    $= a m^{2} + \left(\right. 1 - 4 a \left.\right) m + 1 - \left(\right. m + 1 \left.\right)$

    $= a \left(\right. m - 2 \left.\right)^{2} - 4 a$，

    ∴$E F = \frac{}{8} P C = \frac{a}{8} \left(\right. m - 2 \left.\right)^{2} - \frac{a}{2}$，

    ∵$a > 0$，

    ∴该抛物线开口向上，对称轴为$m = 2$，则当$m > 2$时，$E F$随$m$的增大而增大，

    ∵$m > 4$，即$m > 4$时，$E F$随$m$的增大而增大，

    ∴$0 < m \leq a + \frac{1}{2}$不能满足全部在$m > 4$的范围内，故此情况不存在，

    综上所述，$a$的取值范围为$0 < a \leq \frac{3}{2}$．'
