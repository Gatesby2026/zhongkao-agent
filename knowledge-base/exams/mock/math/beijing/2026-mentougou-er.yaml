  stem: '在平面直角坐标系$x O y$中，抛物线$y = a x^{2} + b x + 1 \left(\right. a > 0 \left.\right)$经过点$A \left(\right. 4 , 5 \left.\right)$．

    （1）用含$a$的式子表示$b$；

    （2）若$a = 2$，点$M \left(\right. x_{1} , 1 0 \left.\right)$，$N \left(\right. x_{2} , 1 0 \left.\right)$（$x_{2} > x_{1}$）在该抛物线上，求$M
    N$的长；

    （3）记抛物线与$y$轴的交点为$B$，点$P \left(\right. m , y_{P} \left.\right)$在抛物线上，分别过点$P$作$x$轴、直线$A B$的垂线，交直线$A B$于点$C$，$Q$，$E$是$0 <
    a \leq \frac{3}{2}$上一点，且$P Q = 4 P E$，过点$E$作$E F A B$交$P C$于点$F$．已知当$0 < m \leq a + \frac{1}{2}$时，$E F$的长随$m$的增大而增大，求$a$的取值范围．'
