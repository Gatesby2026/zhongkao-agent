    F \bot B C$；

    （2）结合已知条件，先证明$A B = B G$，$\angle G = \angle B A O = \angle B C D$．设$B D = x$，在Rt$\triangle B O D$中，根据勾股定理列方程可求出$B D$的长，继而求解．

    （1）

