    $C D = 2 x$，

    $\therefore \angle B A O + \angle A B C = \angle B C D + \angle A B C = 9 0^{\circ}$，

    $\therefore \angle B A O = \angle B C D$．

    $\because B G \parallel A C$，

    $\therefore \angle G = \angle C A O$，

    $\therefore \angle G = \angle B A O = \angle B C D$，

    $\therefore A B = B G$，$G = \angle B A O = \angle B C D = \frac{1}{2}$，

    $\therefore \frac{O D}{A D} = \frac{B D}{C D} = \frac{1}{2}$，

    $\because O D = 3$，

    $\text{m}$．

    设$B D = x$，则$C D = 2 x$，

