  question: 已知$x^{2}+x-2=0$，求代数式$\left(\frac{1}{x-1}+1\right)\cdot\frac{2}{x-1}$的值．
  answer: '1'
  solution: '解：原式$\frac{1}{4}+\frac{x-1}{x-2}-\frac{2}{x^{2}-4}$$= \frac{x}{x - 1} \cdot \frac{(x + 1)(x - 1)}{2}$$=\frac{x^{2}+x}{2}$

    $x^{2}+x-2=0$，

