  question: '如果$m+n=1$，那么代数式$\left(1-\frac{m}{m-n}\right)\cdot\frac{m^{2}-n^{2}}{m}$的值为（）

    A.$-1$

    B.1

    C.$-2$

    D.2'
  answer: A
  solution: '∵$m+n=1$

    ∴$\left(1-\frac{m}{m-n}\right)\cdot\frac{m^{2}-n^{2}}{m}$

    $= \frac{m - n}{m - n} - \frac{m}{m - n} = m^2 - n^2$

    $\frac{-n}{m-n}(m+n)(m-n)$

    $=-(m+n)$

    $=-1$．

    故选：A．'
