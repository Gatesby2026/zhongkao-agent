  answer: D
  solution: '解：根据题意列表如下：

    |  | 向 | 前 | 冲 |

    | --- | --- | --- | --- |

    | 向 | 向，向 | 前，向 | 冲，向 |

    | 前 | 向，前 | 前，前 | 前，冲 |

    | 冲 | 向，冲 | 前，冲 | 冲，冲 |

    共有9种等可能得情况，其中两次都摸到“冲”字的情况有1种，

