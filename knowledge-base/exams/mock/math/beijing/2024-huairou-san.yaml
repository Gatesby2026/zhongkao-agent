    D.2.6m'
  answer: A
  solution: '解：如图：设正五边形的中心为O，连接OA，OB，过点O作$OF \perp AB$，垂足为F，

    [图]

    $\angle AOB=\frac{360^{\circ}}{5}=72^{\circ}$，$\triangle AOB$的面积$=\frac{1}{5}$正五边形的面积$-\frac{48}{5}\mathrm{m}^2$，

    $\because OA = OB$，$OF \perp AB$，

    $\angle AOF=\frac{1}{2}\angle AOB=36^\circ$，$AB = 2AF$，

    设$OF = xm$，

    在$Rt\triangle OAF$中，$AF=OF\cdot\tan36^{\circ}=0.7x(\mathrm{m})$，

    $\therefore AB = 2AF - 1.4 \, (\text{cm})$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\frac{1}{2}AB\cdot OF=\frac{48}{5}$，

    $\frac{1}{2} \times 1.4x \cdot x = \frac{48}{5}$，

    解得：$x \approx 3.71$，

    $\ldots AB \cdot 1.4x = 5.2(m)$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$该正五边形的边长大约是$5.2m$，

    故选：A．'
