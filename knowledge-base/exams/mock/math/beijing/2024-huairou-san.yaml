  question: '燕几（即宴几）是世界上最早的一套组合桌，设计者是北宋进士黄伯思．全套燕几一共有七张桌子，每张桌子高度相同．其桌面共有三种尺寸，包括$2$张长桌、$2$张中桌和$3$张小桌，它们的宽都相同．七张桌面可以拼成一个大的长方形，或者分开组合成不同的图形，其方式丰富多样，燕几也被认为是现代七巧板的前身．右图给出了《燕几图》中列出的名称为“函三”和“回文”的两种桌面拼合方式．若全套七张桌子桌面的总面积为$61.25$平方尺，则长桌的长为多少尺？

    [图]'
  answer: $7$
  solution: '解：设每张桌面的宽为x尺，

    根据图形可得：小桌的长为$2x$尺，中桌的长为$3x$尺，长桌的长为$4x$尺，

    故可得$2\times4x^{2}+2\times3x^{2}+3\times2x^{2}=61.25$，

    解得：$x_{1}=\frac{7}{4}$，$x_{2}=-\frac{7}{4}$（舍去），

    ∴$4x = 7$，

    答：长桌的长为$7$尺．'
