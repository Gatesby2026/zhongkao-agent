- id: 26
  type: 解答
  score: 6
  stem: '在平面直角坐标系$x O y$中，过点$P \left(p,,0\right)$作$x$轴的垂线与抛物线$y = x^{2} - x$交于点$M$，与直线$y = x$交于点$N$（特殊地，当点$M$，$N$重合时，线段$M N$的长为$0$）．

    （1）若$p = 1$，求线段$M N$的长；

    （2）已知实数$m \left(\right. m > 0 \left.\right)$，对于每一个确定的$m$的值，记$0 < p \leq m$时线段$M N$长度的最大值为$t$，若存在$m_{0}$，使得当$m > m_{0}$时，都有$t$随$m$的增大而增大，求$m_{0}$的最小值．'
  answer: ''
  solution: '解：（1）$p = 1$时，点$M$坐标为$\left(1,0\right)$，点$N$坐标为$\left(1,1\right)$，

    $\therefore M N = 1 - 0 = 1$．

    （2）抛物线$y = x^{2} - x$与直线$y = x$的交点为$\left(0,0\right)$，$\left(2,2\right)$．

    设$M \left(p,,,y_{1}\right)$，$N \left(p,,,y_{2}\right)$，

    则$y_{1} = p^{2} - p$，$y_{2} = p$．

    当$0 < p \leq 2$时，

    $y_{1} - y_{2} \leq 0$．

    $\therefore M N = y_{2} - y_{1} = - p^{2} + 2 p$．

    可知当$p = 1$时，线段$M N$长度的最大值为1．

    当$p > 2$时，

    $y_{1} - y_{2} > 0$．

    $\therefore M N = y_{1} - y_{2} = p^{2} - 2 p$．

    可知$M N$的长度随$p$的增大而增大．

    令$p^{2} - 2 p = 1$，解得$p = 1 + \sqrt{2}$或$p = 1 - \sqrt{2}$（舍）．

    分析线段$M N$长度的最大值的变化规律可知：

    （ⅰ）当$0 < m_{0} < 1$时，随着$m$的增大，$t$的值先增大，再保持不变，再增大；

    （ⅱ）当$1 \leq m_{0} < 1 + \sqrt{2}$时，随着$m$的增大，$t$的值先保持不变，再增大；

    （ⅲ）只有当$m_{0} \geq 1 + \sqrt{2}$时，$t$随$m$增大而增大．

    $\therefore$要使$m > m_{0}$时，都有$t$随$m$的增大而增大，$m_{0}$的最小值为$1 + \sqrt{2}$．'
