- id: 20
  type: 解答
  score: 6
  stem: '如图，在$\triangle A B C$中，$A B = B C$，$B D$为$A C$边上的高，$E$为$A B$边的中点，$E F \bot B C$，垂足为$F$，点$H$在线段$F C$上，$F H = D E$．


    （1）求证：四边形$D E F H$是矩形；

    （2）若$B C = 10$，$\text{sin} \angle A B C = \frac{4}{5}$，求$C D$的长．'
  figure: 2026-chaoyang-er/figures/image128.jpeg
  _figures_extra:
  - image128.jpeg
  answer: ''
  solution: '（1）证明：$\because$$A B = B C$，$B D$为$A C$边上的高，

    $\therefore$$A D = C D$．

    $\because$$E$为$A B$边的中点，

    $\therefore D E \parallel B C$．

    $\because$$F H = D E$，

    ∴四边形$D E F H$是平行四边形．

    $\because$$E F \bot B C$，

    $\therefore$$\angle E F H = 90 \circ$．

    ∴四边形$D E F H$是矩形．

    ![](figures/image36.jpeg)

    （2）解：$\because$$B C = 10$，

    $\therefore$$A B = 10$．

    $\therefore$$D E = B E = 5$．

    $\therefore$$F H = 5$．

    $\because$$\text{sin} \angle A B C = \frac{4}{5}$，

    $\therefore$$E F = B E \cdot \text{sin} \angle A B C = 5 \times \frac{4}{5} = 4$．

    在$\text{Rt} \triangle B E F$中，由勾股定理，得$B F = \sqrt{B E^{2} - E F^{2}} = 3$．

    $\therefore$$H C = 2$．

    ∵四边形$D E F H$是矩形，

    $\therefore$$D H = E F = 4$，$\angle D H C = 90 \circ$．

    在$\text{Rt} \triangle D H C$中，由勾股定理，得$C D = \sqrt{C H^{2} + D H^{2}} = 2 \sqrt{5}$．'
