  stem: '在$\triangle A B C$中，$\angle A C B = 90 \circ$，$\angle A B C = \alpha$，$D$是平面内的一点（不与点$A$重合），连接$A D$，以$A$为中心，将线段$A D$顺时针旋转$180 \circ - 2 \alpha$，得到线段$A E$，连接$E C$．


    （1）如图1，点$D$在边$A B$上，用等式表示$\angle D A E$与$\angle B A C$之间的数量关系（直接写出结果）；

    （2）如图2，点$D$在$\triangle A B C$外，延长$E C$到点$F$，使$C F = E C$，连接$B F$，$B D$，用等式表示$\angle D A E$与$\angle D B F$之间的数量关系，并证明．'
  figure: 2026-chaoyang-er/figures/image230.png
  _figures_extra:
  - image230.png
  answer: ''
  solution: '（1）$\angle D A E = 2 \angle B A C$；

    （2）$\angle D A E + \angle D B F = 180 \circ$

    证明：如图，将$\triangle A E C$沿$A C$翻折得到$\triangle A P C$，连接$B P$．

    $\therefore \triangle A E C ≌ \triangle A P C$．

    $\therefore A E = A P$，$C E = C P$，$\angle E A C = \angle P A C$，$\angle E C A = \angle P C A$．

    $\because \angle A C B = 90 \circ$，$C F = E C$，

    $\therefore \angle E C A + \angle B C F = 90 \circ$，$\angle P C A + \angle B C P = 90 \circ$，$C F = C P$．

    $\therefore \angle B C P = \angle B C F$．

    $\therefore \triangle B C F ≌ \triangle B C P$．

    $\therefore \angle C B F = \angle C B P$．

    $\because \angle A B C = \alpha$，

    $\therefore \angle C A B = 90 \circ - \alpha$．

    $\because \angle D A E = 180 \circ - 2 \alpha$，

    $\therefore \angle E A C + \angle D A B = \angle P A C + \angle P A B$．

    $\therefore \angle D A B = \angle P A B$．

    $\because A E = A D$，

    $\therefore A P = A D$．

    $\therefore \triangle D A B ≌ \triangle P A B$．

    $\therefore \angle D B A = \angle P B A$．

    $\therefore \angle D B F = 2 \angle A B C = 2 \alpha$．

    $\therefore \angle D A E + \angle D B F = 180 \circ$．

