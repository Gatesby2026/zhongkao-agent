  stem: 已知$3 m^{2} - 2 m - 7 = 0$，求代数式$\left(2,m,+,1\right) \left(2,m,-,1\right) - \left(\right. m + 1 \left.\right)^{2}$的值．
  answer: ''
  solution: '解：$\left(2,m,+,1\right) \left(2,m,-,1\right) - \left(\right. m + 1 \left.\right)^{2}$

