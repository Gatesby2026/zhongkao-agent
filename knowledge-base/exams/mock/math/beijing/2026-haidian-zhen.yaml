  stem: '某校新增了甲、乙、丙三门选修课程．为了解学生对这三门课程的满意度，学校在每门课程的选课学生中分别随机抽取了10名学生，记录他们对所选课程的满意度评分（满分10分，分值为整数），并对数据进行了整理、描述和分析．下面给出了部分信息．

