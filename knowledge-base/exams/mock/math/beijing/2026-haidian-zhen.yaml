  solution: '（1）证明：∵CA⊥AB，

    ∴∠CAO＝90°，

    如图，连接OD、OC，


    在△OAC和△ODC中，

    $\left\{\begin{matrix} OA=OD \\ CA=CD \\ OC=OC \end{matrix}\right.$，

    ∴△OAC≌△ODC（SSS），

    ∴∠ODC＝∠CAO＝90°，

    ∵OD为半圆O的半径，

    ∴CD是半圆O的切线；

    （2）解：如图：连接AD，


    由（1）可得△OAC≌△ODC（SSS），

    ∴∠AOC＝∠DOC，

    ∵OB＝OD，

    ∴∠OBD＝∠ODB，

    ∵∠AOD＝∠OBD+∠ODB，∠AOD＝∠AOC+∠DOC，

    ∴∠AOC＝∠OBD，

    ∵$sin∠OBD=\frac{3}{5}$，

    ∴$sin∠AOC=sin∠OBD=\frac{3}{5}$，

    ∴$\frac{CA}{OC}=\frac{3}{5}$，

    ∵CA＝5，

    ∴$OC=\frac{25}{3}$，

    ∴$OA=\sqrt{O{C}^{2}-A{C}^{2}}=\frac{20}{3}$，

    ∴$OE=OA=\frac{20}{3}$，$AB=2OA=\frac{40}{3}$，

    ∵H为BD的中点，OD＝OB，

    ∴OH⊥BD，

    ∵$sin∠OBD=\frac{3}{5}$，

    ∴$\frac{AD}{AB}=\frac{3}{5}，\frac{OH}{OB}=\frac{3}{5}$，

    ∴AD＝8，OH＝4，

    ∴$EH=OE-OH=\frac{8}{3}$，

    ∴$DH=BH=\sqrt{O{B}^{2}-O{H}^{2}}=\frac{16}{3}$，

    ∵AB为半圆O的直径，

    ∴∠ADB＝90°＝∠EHF，

    ∵∠AFD＝∠EFH，

    ∴△ADF∽△EHF，

    ∴$\frac{DF}{FH}=\frac{AD}{EH}=\frac{8}{3}=3$，

    ∴$DF=\frac{3}{4}DH=4$．'
