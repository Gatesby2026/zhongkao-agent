  answer: ''
  solution: '解：（1）∵函数y＝kx+b（k≠0）的图象经过点（2，0）和（0，﹣1），

    ∴$\left\{\begin{matrix} -1=b \\ 0=2k+b \end{matrix}\right.$，

    ∴$\left\{\begin{matrix} k=\frac{1}{2} \\ b=-1 \end{matrix}\right.$．

    （2）由（1）可得函数的表达式为y$=\frac{1}{2}$x﹣1，

    当x＝2，y＝﹣3时，即﹣3＝2m﹣5，

    解得：m＝1，

    ∵当x＜2时，对于x的每一个值，函数y＝mx﹣5（m≠0）的值既小于函数y＝kx+b的值又小于﹣3，

    ∴$\frac{1}{2}≤m≤1$．'
