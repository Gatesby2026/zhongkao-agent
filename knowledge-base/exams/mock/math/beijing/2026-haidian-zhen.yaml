    ，m＝|（at2﹣2at）﹣（﹣ax+2a）|＝|at2﹣2at+ax﹣2a|＝a|t2﹣t﹣2|，

    当﹣2＜t＜﹣1时，m随t的增大而减小，

    ∴当t＝﹣2时，m取最大值，此时m＝a|（﹣2）2﹣（﹣2）﹣2|＝4a，

