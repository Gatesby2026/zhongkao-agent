  answer: （1）168页 （2）![](figures/image388.png)    （3）四 （4）五    （5）19
  solution: '（1）根据题意，将A家庭从星期一当天开始，连续10天每日阅读量相加即可；

    （2）根据“A家庭从星期一当天开始连续10天阅读总量$\times 0 . 2$”求得$m$的值，然后描点即可；

    （3）比较一周积分数值，并结合尽早完成兑换，即可获得答案；

    （4）首先求得$n$的值，然后比较一周积分数值大小，即可获得答案；

    （5）分别计算B家庭每日连续10天阅读总量，且$p_{}$随$x$的增大而增大，即每日连续10天阅读总量随$x$的增大而增大，据此建立关于$k$的不等式组并求解，即可获得答案．

