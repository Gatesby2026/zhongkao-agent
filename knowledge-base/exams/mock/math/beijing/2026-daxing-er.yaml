  answer: （1）证明：如图，连接$C D$ ![](figures/image440.png) $\because$在$\triangle A B C$中，$\angle A C B = 9 0 \circ$，点$D$是$A B$的中点，
    $\therefore$ $C D = A D = B D$， $\therefore$ $∠BCD=∠B=α$ ， $\therefore$ $\angle A D C = \angle B C D + \angle B = 2 \alpha$，
    $\therefore$ $\angle A D G = \angle A D C + \angle C D G = 2 \alpha + \angle C D G$， 又$\because$ $\angle A D G = \angle
    A E D + \angle D A E$，$\angle A E D = 2 \alpha$， $\therefore$ $\angle A D G = 2 \alpha + \angle D A E$， $\therefore$ $\angle
    C D G = \angle D A E$． （2）解：$A E = E F + 2 D G$，证明如下： 如图，延长$E G$至点$H$，使得$E H = A E$，连接$C D , C H , F H$， ![](figures/image450.png)
    由旋转的性质得：$E F = E D$，$\angle D E F = 2 \alpha$， 在$\triangle E F H$和$\triangle E D A$中， $\left\{EF=ED∠HEF=∠AED=2αEH=EA\right.$，
    $\therefore$ $△EFH\cong△EDA\left(SAS\right)$， $\therefore$ $H F = A D , \angle F H E = \angle D A E$， 由（1）已得：$C D = A
    D , \angle C D G = \angle D A E$， $\therefore$ $H F = C D , \angle F H E = \angle C D G$， $\therefore$ $H F \parallel
    C D$， $\therefore$四边形$C D F H$是平行四边形， $\therefore$ $H G = D G$， $\therefore$ $E H = D E + D G + H G = E F + 2 D G$， $\therefore$
    $A E = E F + 2 D G$．
  solution: '（1）连接$C D$，先得出$C D = A D = B D$，再得出$∠BCD=∠B=α$ ，则$\angle A D C = 2 \alpha$，然后根据三角形的外角性质即可得证；

    （2）延长$E G$至点$H$，使得$E H = A E$，连接$C D , C H , F H$，先证出$\triangle E F H \approx \triangle E D A$，则$H F = A D , \angle F
    H E = \angle D A E$，再证出四边形$C D F H$是平行四边形，则$H G = D G$，据此即可得出结论．

