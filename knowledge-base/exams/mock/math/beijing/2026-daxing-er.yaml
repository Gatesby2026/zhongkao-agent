    = 1$至6依次表示星期一至星期六，$x = 7$表示星期日．

    A家庭制定的每周循环阅读计划：星期$x$读书的页数记为$y_{}$，从星期$x$当天开始连续阅读10天后的总积分记为$p_{}$，可以认为$y_{}$，$p_{}$分别是$x$的函数，部分数据如下：

    | 星期$x$ | 1 | 2 | 3 | 4 | 5 | 6 | 7 |

