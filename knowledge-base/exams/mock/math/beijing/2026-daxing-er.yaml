    | 星期$x$ | 1 | 2 | 3 | 4 | 5 | 6 | 7 |

    |---|---|---|---|---|---|---|---|

    | $y_{}$ | 20 | 18 | 13 | 22 | $k$ | 15 | 23 |

    | $p_{}$ | $a$ | $b$ | $c$ | $d$ | $e$ | $f$ | $g$ |

    通过分析数据，在平面直角坐标中，分别描出部分数对$\left(x,{y}_{A}\right)$，$\left(x,{p}_{A}\right)$所对应的点．


    （1）A家庭从星期一当天开始，连续阅读10天后的读书总页数为________；

    （2）在给出的坐标系中，描出表示$\left(\right. 1 , m \left.\right)$的点；

    （3）按照A家庭的积分兑换办法，兑换一本新书需要37积分．若连续阅读10天后的总积分满足这次兑换要求，且要尽早完成兑换，则应从星期________当天开始阅读；

    （4）A家庭从星期________当天开始阅读，连续阅读10天后所能获得的积分最大；

