  stem: '在平面直角坐标系$x O y$中，函数$y = k x + b \left(\right. k \neq 0 \left.\right)$的图象过点$\left(\right. 2 , 2 \left.\right)$和$\left(\right.
    0 , - 1 \left.\right)$．

    （1）求$k$和$b$的值；

    （2）当$x < 2$时，对于$x$的每一个值，函数$y = m x + 3 \left(\right. m \neq 0 \left.\right)$的值大于函数$y = k x + b$的值且大于1，直接写出$m$的取值范围．'
  answer: （1）$\left\{k=\frac{3}{2}b=−1\right.$ （2）$- \frac{1}{2} \leq m < 0$
  solution: '（1）将两个已知点的坐标代入一次函数解析式，得到关于k和b的二元一次方程组，解方程组即可得到结果；

    （2）根据题意列出$x < 2$时恒成立的两个不等式，分情况讨论不等式恒成立的条件，结合$x < 2$的范围推导得到m的取值范围．

    （1）

    解：将点$\left(\right. 2 , 2 \left.\right)$和$\left(\right. 0 , - 1 \left.\right)$代入$y = k x + b \left(\right. k \neq 0 \left.\right)$，

    得$\left\{2k+b=2b=−1\right.$，

    解得$\left\{k=\frac{3}{2}b=−1\right.$；

    （2）

    解：由（1）得$y = k x + b = \frac{3}{2} x - 1$，

    根据题意得，当$x < 2$时，$m x + 3 > \frac{3}{2} x - 1$且$m x + 3 > 1$恒成立，

    $\therefore$ $\left(\right. m - \frac{3}{2} \left.\right) x > - 4$且$m x > - 2$，

    对于$\left(\right. m - \frac{3}{2} \left.\right) x > - 4$，若$m > \frac{3}{2}$，则$x > \frac{- 4}{m - \frac{3}{2}}$，

    当$x < 2$时，x可取任意小于2的数，无法满足$x >$常数，

    $\therefore$无解，舍去；

    若$m = \frac{3}{2}$，可得$0 > - 4$，不等式恒成立；

    若$m < \frac{3}{2}$，则$x < \frac{8}{3 - 2 m}$，

    $\because$对所有$x < 2$恒成立，

    $\therefore$ $2 \leq \frac{8}{3 - 2 m}$

    $2 \left(\right. 3 - 2 m \left.\right) \leq 8$

    解得$m \geq - \frac{1}{2}$；

    $\therefore$第一个不等式要求$- \frac{1}{2} \leq m \leq \frac{3}{2}$；

    对于$m x > - 2$，若$m > 0$，则当$x > 0$时，满足$m x > - 2$，

    又$\because$在$x < 2$中，不可能都满足$m x > - 2$，

    $\therefore$舍去；

    若$m = 0$，可得$0 > - 2$，不等式恒成立；

    若$m < 0$，则$x < \frac{- 2}{m}$，

    $\because$对所有$x < 2$恒成立，

    $\therefore$ $2 \leq \frac{- 2}{m}$

    $2 m \geq - 2$

    解得$m \geq - 1$；

    $\therefore$第二个不等式成立的条件是 $- 1 \leq m \leq 0$．

    又$\because$ $m \neq 0$，

    $\therefore$m的取值范围为$- \frac{1}{2} \leq m < 0$．'
