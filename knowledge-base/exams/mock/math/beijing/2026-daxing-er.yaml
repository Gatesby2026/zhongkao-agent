  score: 2
  stem: '在“课间一刻钟”活动中，甲、乙、丙三名同学相约到篮球场进行定点投篮练习，共设置5轮投篮，每轮每人投篮5次，投中次数统计整理如下：

    甲：2，2，4，5，5；

    乙：2，3，4，4，5；

    丙：3，3，4，4，4．

    根据方差越小，数据的波动越小，发挥越稳定这一统计意义，据此推断，________同学发挥更稳定．'
  answer: 丙
  solution: '先计算三组数据的平均数，再根据方差公式计算三组数据的方差，比较方差大小，根据方差越小数据波动越小发挥越稳定的性质，得到结论．

    解：$\bar{x}_{甲} = \frac{2 + 2 + 4 + 5 + 5}{5} = 3 . 6$，$\bar{x}_{乙} = \frac{2 + 3 + 4 + 4 + 5}{5} = 3 . 6$，$\bar{x}_{丙}
    = \frac{3 + 3 + 4 + 4 + 4}{5} = 3 . 6$，

    $\therefore$ ${s}_{甲}^{2}=\frac{1}{5}\left[{\left(2−3.6\right)}^{2}+{\left(2-3.6\right)}^{2}+{\left(4−3.6\right)}^{2}+{\left(5−3.6\right)}^{2}+{\left(5−3.6\right)}^{2}\right]=1.84$
    ，${s}_{乙}^{2}=\frac{1}{5}\left[{\left(2−3.6\right)}^{2}+{\left(3−3.6\right)}^{2}+{\left(4−3.6\right)}^{2}+{\left(4−3.6\right)}^{2}+{\left(5−3.6\right)}^{2}\right]=1.04$
