  answer: $\frac{4}{3}$
  solution: '先将分式方程去分母转化为整式方程，求解整式方程后，检验得到原方程的解．

    解：$\frac{1}{x-4}+\frac{1}{2x}=0$ ，

    $2x+\left(x-4\right)=0$ ，

    $2x+x-4=0$ ，

    $3 x - 4 = 0$，

    $3 x = 4$，

    $x=\frac{4}{3}$，

    经检验：当$x=\frac{4}{3}$时，$2x(x-4)≠0$ ，

    $\therefore$ $x=\frac{4}{3}$是原分式方程的解．'
