    即A家庭从星期一当天开始，连续阅读10天后的读书总页数为168页；

    （2）

    解：$m = 1 6 8 \times 0 . 2 = 3 3 . 6$，描点略；

    （3）

    解：$\because$ $m = 3 3 . 6 < 3 7$，$3 4 . 8 < 3 7 , 3 6 < 3 7 , 3 7 . 2 > 3 7$，

    $\therefore$连续阅读10天后的总积分满足这次兑换要求，且要尽早完成兑换，则应从星期四当天开始阅读；

    （4）

    解：根据题意，$n=\left(20+22+24+12+14+16+18+20+22+24\right)×0.2=38.4$ ，

    $\because$ $3 8 . 4 > 3 7 . 2 > 3 6 . 8 > 3 6 > 3 5 . 2 > 3 4 . 8 > 3 3 . 6$，

    $\therefore$A家庭从星期五当天开始阅读，连续阅读10天后所能获得的积分最大；

    （5）

    解：根据题意，B家庭从星期一当天开始，连续阅读10天后的读书总页数为$2 0 + 1 8 + 1 3 + 2 2 + k + 1 5 + 2 3 + 2 0 + 1 8 + 1 3 = 1 6 2 + k$，

    B家庭从星期二当天开始，连续阅读10天后的读书总页数为$1 8 + 1 3 + 2 2 + k + 1 5 + 2 3 + 2 0 + 1 8 + 1 3 + 2 2 = 1 6 4 + k$，

    B家庭从星期三当天开始，连续阅读10天后的读书总页数为$1 3 + 2 2 + k + 1 5 + 2 3 + 2 0 + 1 8 + 1 3 + 2 2 + k = 1 4 6 + 2 k$，

    B家庭从星期四当天开始，连续阅读10天后的读书总页数为$2 2 + k + 1 5 + 2 3 + 2 0 + 1 8 + 1 3 + 2 2 + k + 1 5 = 1 4 8 + 2 k$，

    B家庭从星期五当天开始，连续阅读10天后的读书总页数为$k + 1 5 + 2 3 + 2 0 + 1 8 + 1 3 + 2 2 + k + 1 5 + 2 3 = 1 4 9 + 2 k$，

    B家庭从星期六当天开始，连续阅读10天后的读书总页数为$1 5 + 2 3 + 2 0 + 1 8 + 1 3 + 2 2 + k + 1 5 + 2 3 + 2 0 = 1 6 9 + k$，

    B家庭从星期日当天开始，连续阅读10天后的读书总页数为$2 3 + 2 0 + 1 8 + 1 3 + 2 2 + k + 1 5 + 2 3 + 2 0 + 1 8 = 1 7 2 + k$，

    $\because$ $p_{}$随$x$的增大而增大，

    $\therefore$ $\left\{146+2k>164+k169+k>149+2k\right.$，解得$1 8 < k < 2 0$，

    $\because$ $k$为整数，

    $\therefore$ $k = 1 9$．'
