    E$垂直x轴于点E，交图象于点G，作$D F$垂直y轴于点F，交图象于点H．给出下面四个结论：


    ①$\Delta C O E$与$\Delta D O F$的面积一定相等；

    ②连接$O H$，$O G$，则$\Delta D O H$的面积是$\Delta G O E$面积的2倍；

    ③连接$O G$，$A G$，$O H$，$B H$，则$\Delta O A G$与$\Delta O B H$的面积一定相等；

    ④连接$G H$，$C D$，则$G H$，$C D$不一定平行．

    上述结论中，所有正确结论的序号是（     ）'
  options:
    A: ①②
    B: ①③
    C: ②③
    D: ①④
  figure: 2026-daxing-er/figures/image75.png
  _figures_extra:
  - image75.png
  - image90.png
  answer: B
  solution: '设点A、点B坐标推出点C、点D、点G、点H坐标，利用图像和坐标得出三角形的面积，分析①②③结论，利用$G H$，$C D$所在直线的解析式进行切入，假设$G H \parallel C D$，分析④结论．

    解：过点A作$A M \bot C E$，过点B作$B K \bot D F$，如图所示：

    ![](figures/image90.png)

    设点A坐标为$\left(\right. x_{1} , y_{1} \left.\right)$，点B坐标为$\left(\right. x_{2} , y_{2} \left.\right)$，

    $\because$点A是$O C$的中点，点B是$O D$的中点，

    $\therefore$点C坐标为$\left(2{x}_{1},2{y}_{1}\right)$，点D坐标为$\left(2{x}_{2},2{y}_{2}\right)$，点G坐标为$\left(2{x}_{1},\frac{2}{{x}_{1}}\right)$，点H坐标为$\left(\frac{2}{{y}_{2}},2{y}_{2}\right)$，

    $\because$点A，点B是函数$y = \frac{4}{x} \left(\right. x > 0 \left.\right)$图象上的点，

    $\therefore$ $x_{1} y_{1} = 4$，$x_{2} y_{2} = 4$，

    根据图象可知：${S}_{ΔCOE}=\frac{1}{2}OE·CE=\frac{1}{2}×2{x}_{1}×2{y}_{1}=2×4=8$ ，

    ${S}_{ΔDOF}=\frac{1}{2}DF·OF=\frac{1}{2}×2{x}_{2}×2{y}_{2}=2×4=8$ ，

    $\therefore$ $S_{\Delta C O E} = S_{\Delta D O F}$，故①正确；

    $\because$ ${S}_{ΔFOH}=\frac{1}{2}HF·OF=\frac{1}{2}×\frac{2}{{y}_{2}}×2{y}_{2}=2$ ，

    $\therefore$ $S_{\Delta D O H} = S_{\Delta D O F} - S_{\Delta F O H} = 8 - 2 = 6$，

    $\because$ ${S}_{ΔGOE}=\frac{1}{2}EG·OE=\frac{1}{2}×\frac{2}{{x}_{1}}×2{x}_{1}=2$ ，

    $\therefore$ $S_{\Delta D O H} = 3 S_{\Delta G O E}$，故②不正确；

    $\because$ ${S}_{ΔACG}=\frac{1}{2}AM·CG=\frac{1}{2}×{x}_{1}×\left(2{y}_{1}-\frac{2}{{x}_{1}}\right)=\frac{1}{2}×{x}_{1}×\left(\frac{8}{{x}_{1}}-\frac{2}{{x}_{1}}\right)=3$
    ，

    ${S}_{ΔBHD}=\frac{1}{2}BK·DH=\frac{1}{2}×{y}_{2}×\left(2x-_{2}^{}\frac{2}{{y}_{2}}\right)=\frac{1}{2}×{y}_{2}×\left(\frac{8}{{y}_{2}}-\frac{2}{{y}_{2}}\right)=3$

    $\therefore$ $S_{\Delta O A G} = S_{\Delta C O E} - S_{\Delta G O E} - S_{\Delta A C G} = 8 - 2 - 3 = 3$，

    $S_{\Delta O B H} = S_{\Delta D O F} - S_{\Delta F O H} - S_{\Delta B H D} = 8 - 2 - 3 = 3$，

    $\therefore$ $S_{\Delta O B H} = S_{\Delta O A G}$，故③正确，

    $\because$设$C D$所在直线的函数表达式为$y_{3} = k_{1} x + b_{1}$，

    将C$\left(2{x}_{1},2{y}_{1}\right)$，D$\left(2{x}_{2},2{y}_{2}\right)$代入$y_{3} = k_{1} x + b_{1}$得：$\left\{2{k}_{1}{x}_{1}+{b}_{1}=2{y}_{1}2{k}_{1}{x}_{2}+{b}_{1}=2{y}_{2}\right.$，

    解得：$k_{1} = \frac{y_{2} - y_{1}}{x_{2} - x_{1}}$，

    设$G H$所在直线的函数表达式为$y_{4} = k_{2} x + b_{2}$，

    将点G坐标为$\left(2{x}_{1},\frac{2}{{x}_{1}}\right)$，点H坐标为$\left(\frac{2}{{y}_{2}},2{y}_{2}\right)$，代入$y_{4} = k_{2} x + b_{2}$得：$\left\{2{k}_{2}{x}_{1}+{b}_{2}=\frac{2}{{x}_{1}}\frac{2{k}_{2}}{{y}_{2}}+{b}_{2}=2{y}_{2}\right.$，

    解得：$k_{2} = - \frac{y_{2}}{x_{1}}$，

    若$G H \parallel C D$，则$k_{1} = k_{2}$，

    即：$\frac{y_{2} - y_{1}}{x_{2} - x_{1}} = - \frac{y_{2}}{x_{1}}$，

    整理得：$x_{1} y_{2} - x_{1} y_{1} = - x_{2} y_{2} + x_{1} y_{2}$，

    所以$x_{1} y_{1} = x_{2} y_{2}$，

    因为$x_{1} y_{1} = 4$，$x_{2} y_{2} = 4$，所以等式恒成立，

    即$G H \parallel C D$，所以④不正确．

    本题考查了反比例函数的图象与性质、坐标与图形的面积关系、中点坐标公式以及平行线的判定，重难点在于利用点的坐标得出线段的长度，进而计算三角形面积，以及通过坐标关系判断直线的平行关系，解题核心是设点A、点B坐标推出点C、点D、点G、点H坐标．'
