  type: 解答
  score: 6
  stem: '五一假期，某景区为调查游客通行效率，某高峰时段工作人员在景区南、北两个检票口各随机抽取20名游客，记录他们从入园开始排队到通过检票口进入景区的等候时间（单位：分钟）．将数据整理，描述和分析，给出下面信息：

    a．将南、北两个检票口各20名游客等候时间t分别分成四组：'
  options:
    A: $0 < t \leq 1 5$，
    B: $1 5 < t \leq 3 0$，
    C: $3 0 < t \leq 4 5$，
    D: '$4 5 < t \leq 6 0$

      b．南检票口20名游客等候时间数据：

      5  6  9  11  14  19  21  23  26  30  30  30  32  35  37  39  42  46  50  53

      c．北检票口20名游客等候时间在C组内的数据：

      31  32  32  33  35  36  39  42

      d．北检票口20名游客等候时间扇形统计图如下：


      e．南、北检票口20名游客等候时间平均数、众数、中位数如下表：

      | 项目 | 南检票口 | 北检票口 |

      |---|---|---|

      | 平均数 | 27.9 | 27.9 |

      | 众数 | n | 32 |

      | 中位数 | 30 | p |

      （1）写出图表中m，n，p的值：$m =$________，$n =$________，$p =$________；

      （2）已知当天该高峰时段从南检票口进入景区的游客约为6000人，从北检票口进入景区的游客约为8000人，估计从两个检票口进入景区的等候时间超过30分钟的游客有________人'
  figure: 2026-daxing-er/figures/image290.png
  _figures_extra:
  - image290.png
  answer: （1）25，30，31.5 （2）6800
  solution: '（1）利用扇形统计图的数据可求得A组所占百分比，再通过北检票口20名游客中C组占8个求得该组所占百分比，进而求得B组所占百分比，即m的值，观察南检票口20名游客等候时间数据出现次数最多的即为众数，求得n的值，再通过计算求出北检票口20名游客等候时间中第10、11名游客等候时间之和的平均数即为中位数，求得p的值；

    （2）利用样本估计总体，分别求出北检票口超过30分钟的游客所占频率和南检票口超过30分钟的游客所占频率，再用各自的总数分别乘以对应的频率再相加即可得出结果．

    （1）

    解：由扇形统计图可知，北检票口A组的圆心角度数为$7 2 \circ$，

    $\therefore$所占百分比为：$\frac{7 2 \circ}{3 6 0 \circ} \times 1 0 0 % = 2 0 %$，

    $\because$北检票口20名游客等候时间在C组内的数据共有8个，

    $\therefore$所占百分比为：$\frac{8}{2 0} \times 1 0 0 % = 4 0 %$，

    $\therefore$B组所占百分比为：$1 - 1 5 % - 4 0 % - 2 0 % = 2 5 %$，即$m = 2 5$，

    在南检票口20名游客等候时间数据中，出现次数最多的为30，共出现3次，

    $\therefore$ $n = 3 0$，

    在北检票口的20名游客等候时间数据中，中位数为第10、11名游客等候时间数据之和的平均数，

    而第10、11名游客等候时间为31、32，

    $\therefore$ $p = \frac{3 1 + 3 2}{2} = 3 1 . 5$．

    （2）

    解：由题可知，在南检票口20名游客等候时间数据中，超过30分钟的游客有8名，

    $\therefore$频率为$\frac{8}{2 0} = 0 . 4$，

    在北检票口20名游客等候时间数据中，超过30分钟的游客占比为$1 5 % + 4 0 % = 5 5 %$，

    $\therefore$ $6 0 0 0 \times 0 . 4 + 8 0 0 0 \times 5 5 % = 2 4 0 0 + 4 4 0 0 = 6 8 0 0$（人），

    $\therefore$估计从两个检票口进入景区的等候时间超过30分钟的游客有6800人．'
