  stem: '如图，在$\triangle A O B$中，$A O = B O$，点$C$是$A B$中点，以$O$为圆心，$O C$的长为半径作$\bigodot O$交$B O$延长线于点$D$，交$O A$于点$E$，交$O B$于点$F$，过点$D$作$\bigodot
    O$的切线$D G$交$B A$延长线于点$C$．


    （1）求证：$D G = C G$；

    （2）连接$D E$并延长交$A B$于点$H$，若$\frac{E H}{D E} = \frac{1}{3}$，$C G = 1 0$，求$\bigodot O$的半径．'
  figure: 2026-daxing-er/figures/image313.png
