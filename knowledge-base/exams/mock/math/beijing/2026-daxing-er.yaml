  answer: （1）证明：连接$O C$，如图： ![](figures/image319.png) $\because$ $O A = O B$，$C$为$A B$的中点， $\therefore$ $O C \bot A B$， 又$\because$
    $O C$是$\bigodot O$的半径， $\therefore$ $C G$是$\bigodot O$的切线， 又$\because$ $D G$是$\bigodot O$的切线， $\therefore$ $D G = C G$；
    （2）$\bigodot O$的半径为$5$．
  solution: '（1）证明$C G$是$\bigodot O$的切线，再根据切线长定理可得结论；

    （2）连接$D E$并延长交$A B$于点$H$，过点$O$作$O G \bot D H$于点$G$，连接$E F$，根据题意得到$\frac{E H}{G H} = \frac{2}{5}$，设$\bigodot O$的半径为$3 x$，则$O
    D = O E = O C = 3 x$，分别求出$A E = 2 x$，$O B = 5 x$，$B D = 8 x$，$A H = \frac{8}{5} x$，再根据直角三角形得到$t a n \angle B = t a n \angle
    O A B = \frac{D G}{B D} = \frac{3}{4}$，即$8 x = \frac{4 0}{3}$，即可求解．

    （1）

    略

    （2）

    解：连接$D E$并延长交$A B$于点$H$，过点$O$作$O G \bot D H$于点$G$，连接$E F$，如图：

    ![](figures/image334.png)

    $\because$ $A O = B O$，点$C$是$A B$中点，

    $\therefore$ $O C \bot A B$，$O C$平分$\angle A O B$，即$O C$平分$\angle E O F$，

    又$\because$ $O E = O F$，

    $\therefore$ $O C \bot E F$，

    $\because$ $\angle D E F = 9 0 \circ$，

    $\therefore$ $O C \parallel D H$，

    $\because$ $O C \bot A B$，

    $\therefore$ $D H \bot A B$，

    $\because$ $O D = O E$，$O G \bot D E$，

    $\therefore$ $G E = \frac{1}{2} D E$，

    $\because$ $\frac{E H}{D E} = \frac{1}{3}$，

    $\therefore$ $\frac{E H}{G E} = \frac{2}{3}$，

    $\therefore$ $\frac{E H}{G H} = \frac{2}{5}$，

    设$\bigodot O$的半径为$3 x$，则$O D = O E = O C = 3 x$，

    $\because$ $O G \bot D E$，$D H \bot A B$，$O C \bot A B$，即$\angle O G H = \angle G H C = \angle O C H = 9 0 \circ$，

    $\therefore$四边形$O G H C$是矩形，

    $\therefore$ $G H = O C = 3 x$，

    $\therefore$ $\frac{E H}{3 x} = \frac{2}{5}$，

    $\therefore$ $E H = \frac{6}{5} x$，

    $\because$ $\angle A H E = \angle O G E = 9 0 \circ$，$\angle A E H = \angle O E G$，

    $\therefore$ $\triangle A E H \sim \triangle O E G$，

    $\therefore$ $\frac{A E}{O E} = \frac{E H}{G E} = \frac{2}{3}$，即$\frac{A E}{3 x} = \frac{2}{3}$，

    $\therefore$ $A E = 2 x$，

    $\therefore$ $O B = O A = O E + A E = 3 x + 2 x = 5 x$，

    $\therefore$ $B D = O D + O B = 3 x + 5 x = 8 x$，

    在$\triangle A H E$中，$AH=\sqrt{A{E}^{2}−E{H}^{2}}=\sqrt{{\left(2x\right)}^{2}−{\left(\frac{6}{5}x\right)}^{2}}=\frac{8}{5}x$
    ，

    $\therefore$ $t a n \angle E A H = \frac{E H}{A H} = \frac{\frac{6}{5} x}{\frac{8}{5} x} = \frac{3}{4}$，即$t a n \angle
    O A B = \frac{3}{4}$，

    $\because$ $O A = O B$，

    $\therefore$ $\angle B = \angle O A B$，

    在$\triangle B D G$中，$t a n \angle B = t a n \angle O A B = \frac{D G}{B D} = \frac{3}{4}$，

    由（1）知，$D G = C G = 1 0$，

    $\therefore$ $\frac{1 0}{B D} = \frac{3}{4}$，

    $\therefore$ $B D = \frac{4 0}{3}$，即$8 x = \frac{4 0}{3}$，

    $\therefore$ $x = \frac{5}{3}$，

    $\therefore$ $\bigodot O$的半径为$3 \times \frac{5}{3} = 5$．'
