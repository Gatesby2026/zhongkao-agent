  stem: 已知$2 a + b - 3 = 0$，求代数式$\frac{4 \left(\right. 2 a - b \left.\right) + 8 b}{4 a^{2} + 4 a b + b^{2}}$的值．
  answer: $\frac{4}{3}$
  solution: '分别计算分子、因式分解分母，约分得到化简结果，再由已知条件得到$2 a + b = 3$，整体代入化简结果即可得到答案．

    解：$\frac{4 \left(\right. 2 a - b \left.\right) + 8 b}{4 a^{2} + 4 a b + b^{2}}$

    $= \frac{8 a - 4 b + 8 b}{\left(\right. 2 a + b \left.\right)^{2}}$

    $= \frac{8 a + 4 b}{\left(\right. 2 a + b \left.\right)^{2}}$

    $= \frac{4 \left(\right. 2 a + b \left.\right)}{\left(\right. 2 a + b \left.\right)^{2}}$

    $= \frac{4}{2 a + b}$，

    由$2 a + b - 3 = 0$可得$2 a + b = 3$，则原式$= \frac{4}{3}$．'
