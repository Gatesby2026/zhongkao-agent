  stem: '如图1，筒车是明代科学家宋应星所著《天工开物》中记载的经典水利灌溉工具，它利用流水冲击圆形转轮带动筒车转动，通过遍布圆周的竹筒舀水至顶部，并倾倒在水槽中，实现将低处河水提升至高处水槽中，再引流至农田，达到自流灌溉的目的，是我国古代劳动人民智慧的结晶．如图2，已知某筒车的转轮圆心为O，吃水深度（转轮最低点到水位线的距离）与转轮半径的比为$1
    : 3$，转轮圆心O到水槽底部的距离为0.9米，提水高度（水槽底部到水位线的竖直高度）是吃水深度的3.5倍．求这个筒车的转轮半径．'
  figure: 2026-daxing-er/figures/image281.png
  _figures_extra:
  - image281.png
  answer: 1.8米
  solution: '根据题意设吃水深度为x米，则筒车的转轮半径为$3 x$米，列出一元一次方程求解x的值即可得出筒车的转轮半径．

    解：设吃水深度为x米，则筒车的转轮半径为$3 x$米，

    由题意得：$0 . 9 + 2 x = 3 . 5 x$，

    解得：$x = 0 . 6$，

    $\therefore$ $3 x = 3 \times 0 . 6 = 1 . 8$（米），

    $\therefore$筒车的转轮半径为1.8米．'
