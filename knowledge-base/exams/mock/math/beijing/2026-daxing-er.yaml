  answer: '9'
  solution: '本题主要考查了矩形的性质，相似三角形的判定与性质等知识．

    根据线段之间的关系先求出$\frac{B F}{C F}$，再利用矩形的性质证明$\triangle A B F \sim \triangle G C F$，即可求出$S_{\triangle A B F}$，再求出$\frac{E F}{B
    F}$，问题随之得解．

    解：$\because$ $C F = \frac{1}{3} B C$，

    $\therefore$ $3 C F = B C$，

    $\therefore$ $3 C F + C F = B C + C F = B F$，即$\frac{B F}{C F} = 4$，

    $\because$在矩形$A B C D$中，$A B \parallel C D$，

    $\therefore$ $\angle B = \angle G C F$，

    又$\because$ $\angle F = \angle F$，

    $\therefore$ $\triangle A B F \sim \triangle G C F$，

    $\therefore$ $\frac{{S}_{△ABF}}{{S}_{△GCF}}={\left(\frac{BF}{CF}\right)}^{2}=16$ ，

    $\because$ $\triangle C F G$的面积为$1$，

    $\therefore$ $S_{\triangle A B F} = 1 6 S_{\triangle G C F} = 1 6$，

    $\because$点$E$为$B C$中点，

    $\therefore$ $E C = B E = \frac{1}{2} B C$，

    $\because$ $C F = \frac{1}{3} B C$，

    $\therefore$ $B E = \frac{1}{2} B C = \frac{3}{2} C F$，$E F = E C + C F = \frac{3}{2} C F + C F = \frac{5}{2} C F$，

    $\therefore$ $\frac{B E}{E F} = \frac{3}{5}$，即$\frac{E F}{B F} = \frac{5}{8}$，

    $\therefore$ $S_{\triangle A E F} = \frac{5}{8} S_{\triangle A B F} = 1 0$，

    $\therefore$ $S_{\triangle A E F} - S_{\triangle G C F} = 1 0 - 1 = 9$．'
