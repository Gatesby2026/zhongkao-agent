  solution: '（1）将点$O \left(\right. 0 ， 0 \left.\right)$和点$A \left(\right. 1 , 0 \left.\right)$代入二次函数即可作答；

    （2）①根据（1）的结果，联立一次函数、二次函数即可作答；②将一次函数、二次函数相减，结果的绝对值即为$M N$的长度，将其配方，再分类讨论：当$a < 0$时，即$E\left(\frac{a}{4},0\right)$、$F\left(\frac{3}{4}a,0\right)$同在y轴的左侧，即确定$M
    N$取最大值时x的值，再确定此种情况下点$B$的位置，数形结合即可求解；当$x = \frac{a + 1}{2}$时，再确定$M N$取最大值时x的值，数形结合即可列出关于a的不等式组，问题随之得解．

    （1）

    解：将点$O \left(\right. 0 ， 0 \left.\right)$和点$A \left(\right. 1 , 0 \left.\right)$代入二次函数关系式有：$c = 0$，$a + b = 0$，

    即：$b = - a$；

    （2）

    解：$\because$ $b = - a$，$c = 0$，

    $\therefore$二次函数为$y = a x^{2} - a x$，

    ①联立：$\left\{y=a{x}^{2}−axy={a}^{2}x\right.$，解得：$\left\{\right. x = 0 & y = 0$，或$\left\{x=a+1y={a}^{3}+{a}^{2}\right.$，

    即点B的坐标为：$B\left(a+1,{a}^{3}+{a}^{2}\right)$，

    $\because$ $O$、$B$不重合，

    $\therefore$ $a + 1 \neq 0$，即$a \neq - 1$，

    则点B的横坐标为$a + 1$；

    ②根据题意可知$M N$的长度为：${y}_{MN}=\left|a{x}^{2}−ax−{a}^{2}x\right|=\left|−\frac{a{\left(a+1\right)}^{2}}{4}+a{\left(x−\frac{a+1}{2}\right)}^{2}\right|$，

    当$a < 0$时，即$E\left(\frac{a}{4},0\right)$、$F\left(\frac{3}{4}a,0\right)$同在y轴的左侧，

    $\because$ $a < 0$，

    $\therefore$ $−\frac{a{\left(a+1\right)}^{2}}{4}>0$ ，$a{\left(x−\frac{a+1}{2}\right)}^{2}<0$ ，

    $\therefore$当$x = \frac{a + 1}{2}$时，$M N$的最大值为：${y}_{MN}=−\frac{a{\left(a+1\right)}^{2}}{4}$，

    $\because$直线$y = a^{2} x$与抛物线交于点$O$和点$B$（$O$、$B$不重合），点B的横坐标为：$a + 1$，

    若点$B$在y轴的右侧，结合$E\left(\frac{a}{4},0\right)$、$F\left(\frac{3}{4}a,0\right)$同在y轴的左侧，

    如图，

    ![](figures/image427.png)

    即在$\frac{3}{4} a < x < \frac{1}{4} a$范围内，$y = a^{2} x$的函数值大于$y = a x^{2} - a x$的函数值，

    $\therefore$此时的$M N$的值将随着x的变大逐渐变大，此时与题意不符，

    $\therefore$点$B$在y轴的左侧，

    如图，

    ![](figures/image429.png)

    $\because$当$x = \frac{a + 1}{2}$时，$M N$的最大值为：${y}_{MN}=−\frac{a{\left(a+1\right)}^{2}}{4}$，

    又$\because$点$P$从线段$E F$左端点运动到右端点的过程中，随$t$的增大，$M N$的长是先增大后减小，

    $\therefore$ $\left\{\frac{3}{4}a<\frac{a+1}{2}<\frac{1}{4}a\frac{3}{4}a≥a+1\right.$，解得：$a \leq - 4$；

    当$a > 0$时，即$E\left(\frac{a}{4},0\right)$、$F\left(\frac{3}{4}a,0\right)$同在y轴的右侧，

    $\because$ $a > 0$，${y}_{MN}=\left|a{x}^{2}−ax−{a}^{2}x\right|=\left|−\frac{a{\left(a+1\right)}^{2}}{4}+a{\left(x−\frac{a+1}{2}\right)}^{2}\right|=\left|\frac{a{\left(a+1\right)}^{2}}{4}−a{\left(x−\frac{a+1}{2}\right)}^{2}\right|$，

    $\therefore$ $\frac{a{\left(a+1\right)}^{2}}{4}>0$ ，$−a{\left(x−\frac{a+1}{2}\right)}^{2}<0$ ，

    $\therefore$当$x = \frac{a + 1}{2}$时，$M N$的最大值为：${y}_{MN}=\frac{a{\left(a+1\right)}^{2}}{4}$，

    如图，

    ![](figures/image431.png)

    要满足：点$P$从线段$E F$左端点运动到右端点的过程中，随$t$的增大，$M N$的长是先增大后减小，

    $\therefore$ $\left\{\frac{1}{4}a<\frac{a+1}{2}<\frac{3}{4}a\frac{3}{4}a≤a+1\right.$，解得：$a > 2$；

    综上：$a$的取值范围$a \leq - 4$或$a > 2$．'
