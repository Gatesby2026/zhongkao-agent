    A E D = 2 \alpha$，将线段$E D$绕点$E$顺时针旋转$2 \alpha$，得到线段$E F$，点$F$恰好落在$A B$上．连接$F C$，延长$E D$交$C F$于点$G$．


    （1）连接$C D$，求证：$\angle C D G = \angle D A E$；

    （2）用等式表示$A E$，$E F$，$D G$之间的数量关系，并证明．'
