  stem: '在平面直角坐标系xOy中，⊙O的半径为1，对于⊙O的弦AB和⊙O外的一点C，给出如下定义：若直线CA，CB中一条垂直弦AB，另一条是⊙O的切线，则称点C为弦AB的“垂联点”．

    （1）已知点A（1，0），${B}_{1}(\frac{\sqrt{2}}{2}，\frac{\sqrt{2}}{2})，{B}_{2}(\frac{1}{2}，\frac{\sqrt{3}}{2})$．


    ①如图1，在点${C}_{1}(1，2\sqrt{2}-2)$，C2（1，1），${C}_{3}(2-\frac{\sqrt{2}}{2}，\frac{3\sqrt{2}}{2}-2)$中，弦AB1的“垂联点”是　        　 ；

    ②如图2，若点C为弦AB2的“垂联点”，直接写出OC的长；

    （2）已知点$M(0，3)，N(\frac{6\sqrt{5}}{5}，0)$，对于线段MN上一点S，存在⊙O的弦PQ，使得点S为弦PQ的“垂联点”．设PQ的长为d，当点S在线段MN上运动时，直接写出d的取值范围．'
  figure: 2026-yanshan-yi/figures/image19.png
