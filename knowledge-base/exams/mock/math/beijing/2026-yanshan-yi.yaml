- id: 8
  type: 单选
  score: 2
  stem: '如图，在平面直角坐标系xOy中，矩形OABC的顶点A，C分别在x，y轴正半轴上，点B坐标为（2m，m）．点M是边BC上的动点（不与B，C重合），函数$y=\frac{k}{x}(k＞0，x＞0)$的图象经过点M且与边AB交于点N，给出下面四个结论：

    ①△BOM与△BON的面积一定相等；

    ②若点M是边BC的中点，则点N一定为AB的中点；

    ③在点M的运动过程中，$\frac{MB}{NB}$是一个定值；

    ④△OCM∽△OAN．

    上述结论中，所有正确结论的序号是（　　）'
  options:
    A: ①②
    B: ①②③
    C: ②③④
    D: ①②③④
  figure: 2026-yanshan-yi/figures/image8.png
  _figures_extra:
  - image8.png
  answer: B
  solution: '解：∵反比例函数$y=\frac{k}{x}(k＞0)$的图象经过点M与点N，

    ∴${S}_{△COM}={S}_{△AON}=\frac{k}{2}$，

    ∵四边形OABC为矩形，

    ∴S△COB＝S△AOB，

    ∴S△COB﹣S△COM＝S△AOB﹣S△AON，即S△BOM＝S△BON，故①正确；

    ∵点M是边BC的中点，

    ∴$CM=\frac{1}{2}BC$，

    ∴${S}_{△COM}=\frac{1}{2}×CM×OC=\frac{1}{4}×BC×OC$，

    ∵${S}_{△COM}=\frac{1}{2}×AN×OA$，且S△COM＝S△AON，

    ∴$\frac{1}{4}×BC×OC=\frac{1}{2}×AN×OA$，

    ∵四边形OABC为矩形，

    ∴OA＝BCAB＝OC，

    ∴$\frac{1}{4}×OA×AB=\frac{1}{2}×AN×OA$，即$AN=\frac{1}{2}AB$，

    ∴若点M是边BC的中点，则点N一定为AB的中点，故②正确；

    由点B的坐标为（2m，m），

    可知点$M(\frac{k}{m}，m)$，点$N(2m，\frac{k}{2m})$，点A（2m，0），

    ∴$MB=2m-\frac{k}{m}=\frac{2{m}^{2}-k}{m}$，$NB=m-\frac{k}{2m}=\frac{2{m}^{2}-k}{2m}$，

    ∴$\frac{MB}{NB}=\frac{\frac{2{m}^{2}-k}{m}}{\frac{2{m}^{2}-k}{2m}}=2$，即$\frac{MB}{NB}$是一个定值，故③正确；

    在△OCM与△OAN只有∠OCM＝∠OAN＝90°，

    根据已知条件无法证明△OCM∽△OAN，故④无法确定．

    综上，上述结论中，所有正确结论的序号是①②③，

    故选：B．'
