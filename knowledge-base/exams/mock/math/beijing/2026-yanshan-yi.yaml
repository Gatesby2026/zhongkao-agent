  answer: （1）y＝2x+1，C（﹣2，﹣3）；
  solution: '解：（1）将A（1，3），B（﹣1，﹣1）代入y＝kx+b（k≠0）中，

    得$\left\{\begin{matrix} k+b=3 \\ -k+b=-1 \end{matrix}\right.$，

    解得$\left\{\begin{matrix} k=2 \\ b=1 \end{matrix}\right.$，

    ∴函数的表达式为y＝2x+1，

    ∵过点（﹣2，0）且平行于y轴的直线为x＝﹣2，

    ∴点C的横坐标为﹣2，

    在y＝2x+1中，令x＝﹣2得y＝﹣3，

    ∴点C的坐标为（﹣2，﹣3）；

    （2）∵当x＜﹣2时，对于x的每一个值，函数y＝nx（n≠0）的值大于函数y＝2x+1的值且小于﹣2，

    ∴2×（﹣2）+1≤﹣2n≤﹣2，

    解得1≤n$≤\frac{3}{2}$；

    ∴n的取值范围是1≤n$≤\frac{3}{2}$．'
