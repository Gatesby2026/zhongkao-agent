  answer: （1）①C1，C3；②线段OC的长为$\frac{\sqrt{21}}{3}$；
  solution: '解：（1）①∵点A（1，0），${B}_{1}(\frac{\sqrt{2}}{2}，\frac{\sqrt{2}}{2})$，${C}_{1}(1，2\sqrt{2}-2)$，

    ∴C1A⊥OA，${C}_{1}{A}^{2}=(2\sqrt{2}-2{)}^{2}=12-8\sqrt{2}，{C}_{1}{B}_{1}^{2}+A{B}_{1}^{2}=(1-\frac{\sqrt{2}}{2}{)}^{2}+(2\sqrt{2}-2-\frac{\sqrt{2}}{2}{)}^{2}+(1-\frac{\sqrt{2}}{2}{)}^{2}+(0-\frac{\sqrt{2}}{2}{)}^{2}=12-8\sqrt{2}$，

    ∴${C}_{1}{A}^{2}={C}_{1}{B}_{1}^{2}+A{B}_{1}^{2}$，

    ∴C1B1⊥AB1，

    又∵C1A⊥OA，OA是⊙O的半径，

    ∴C1A是⊙O的切线，即点${C}_{1}(1，2\sqrt{2}-2)$是弦AB的“垂联点”；

    ∵点A（1，0），${B}_{1}(\frac{\sqrt{2}}{2}，\frac{\sqrt{2}}{2})$，C2（1，1），

    ∴C2A⊥OA，${C}_{2}{A}^{2}=1$，${C}_{2}{B}_{1}^{2}+A{B}_{1}^{2}=(1-\frac{\sqrt{2}}{2}{)}^{2}+(1-\frac{\sqrt{2}}{2}{)}^{2}+(1-\frac{\sqrt{2}}{2}{)}^{2}+(0-\frac{\sqrt{2}}{2}{)}^{2}=5-3\sqrt{2}$，

    ∴C2B1与AB1不垂直，即点C2（1，1）不是弦AB的“垂联点”；

    ∵点A（1，0），${B}_{1}(\frac{\sqrt{2}}{2}，\frac{\sqrt{2}}{2})$，${C}_{3}(2-\frac{\sqrt{2}}{2}，\frac{3\sqrt{2}}{2}-2)$，

    ∴${C}_{3}{O}^{2}=(2-\frac{\sqrt{2}}{2}{)}^{2}+(\frac{3\sqrt{2}}{2}-2{)}^{2}=13-8\sqrt{2}$，${C}_{3}{B}_{1}^{2}+O{B}_{1}^{2}=(2-\frac{\sqrt{2}}{2}-\frac{\sqrt{2}}{2}{)}^{2}+(\frac{3}{2}\sqrt{2}-2-\frac{\sqrt{2}}{2}{)}^{2}+(0-\frac{\sqrt{2}}{2}{)}^{2}+(0-\frac{\sqrt{2}}{2}{)}^{2}=13-8\sqrt{2}$，

    ∵${C}_{3}{O}^{2}={C}_{3}{B}_{1}^{2}+O{B}_{1}^{2}$，

    ∴C3B1⊥OB1，OB1是⊙O的半径，

    ∴C3B1是⊙O的切线，

    ∴${C}_{3}{B}_{1}^{2}=(2-\frac{\sqrt{2}}{2}-\frac{\sqrt{2}}{2}{)}^{2}+(\frac{3}{2}\sqrt{2}-2-\frac{\sqrt{2}}{2}{)}^{2}=12-8\sqrt{2}$，${C}_{3}{A}^{2}+A{B}_{1}^{2}=(2-\frac{\sqrt{2}}{2}-1{)}^{2}+(\frac{3\sqrt{2}}{2}-2{)}^{2}+(1-\frac{\sqrt{2}}{2}{)}^{2}+(0-\frac{\sqrt{2}}{2}{)}^{2}=12-8\sqrt{2}$，

    ∴${C}_{3}{B}_{1}^{2}={C}_{3}{A}^{2}+A{B}_{1}^{2}$，

    ∴C3A⊥AB1，即点${C}_{3}(2-\frac{\sqrt{2}}{2}，\frac{3\sqrt{2}}{2}-2)$是弦AB的“垂联点”；

    故答案为：C1，C3；

    ②∵点A（1，0），${B}_{2}(\frac{1}{2}，\frac{\sqrt{3}}{2})$，点C为弦AB2的“垂联点”，

    设点C（a，b），分两种情况讨论：

    第一种情况，当CA是⊙O的切线，CB2⊥AB2，

    ∴a＝1，$C{A}^{2}=C{B}_{2}^{2}+A{B}_{2}^{2}$，

    ∴$(b-0{)}^{2}=(1-\frac{1}{2}{)}^{2}+(b-\frac{\sqrt{3}}{2}{)}^{2}+(1-\frac{1}{2}{)}^{2}+(0-\frac{\sqrt{3}}{2}{)}^{2}$，

    ∴$b=\frac{2\sqrt{3}}{3}$，

    ∴$C(1，\frac{2\sqrt{3}}{3})$，

    ∴$OC=(1-0{)}^{2}+(\frac{2\sqrt{3}}{3}-0{)}^{2}=\frac{\sqrt{21}}{3}$；

    第二种情况，当CB2是⊙O的切线，CA⊥AB2，

    ∴$C{O}^{2}=C{B}_{2}^{2}+O{B}_{2}^{2}$，$C{B}_{2}^{2}=C{A}^{2}+A{B}_{2}^{2}$，

    ∴$\left\{\begin{matrix} {a}^{2}+{b}^{2}=(a-\frac{1}{2}{)}^{2}+(b-\frac{\sqrt{3}}{2}{)}^{2}+(0-\frac{1}{2}{)}^{2}+(0-\frac{\sqrt{3}}{2}{)}^{2}
    \\ (a-\frac{1}{2}{)}^{2}+(b-\frac{\sqrt{3}}{2}{)}^{2}=(a-1{)}^{2}+{b}^{2}+(1-\frac{1}{2}{)}^{2}+(0-\frac{\sqrt{3}}{2}{)}^{2}
    \end{matrix}\right.$，

    解得$\left\{\begin{matrix} a=\frac{3}{2} \\ b=\frac{\sqrt{3}}{6} \end{matrix}\right.$，

    ∴$C(\frac{3}{2}，\frac{\sqrt{3}}{6})$，

    ∴$OC=(\frac{3}{2}-0{)}^{2}+(\frac{\sqrt{3}}{6}-0{)}^{2}=\frac{\sqrt{21}}{3}$；

    综上所述，线段OC的长为$\frac{\sqrt{21}}{3}$；

    （2）∵线段MN上一点S，存在⊙O的弦PQ，使得点S为弦PQ的“垂联点”，PQ随着S的变动在一定范围内变动，且点M（0，3），$N(\frac{6\sqrt{5}}{5}，0)$，

    ∴如图所示，在线段MN上取一点S，作直径PT，连接QT、OS，

    ![](figures/image48.png)

    ∵PQ的长为d，

    ∴只考虑SP是⊙O的切线，SQ⊥PQ一种情况即可，

    ∵S△QPT＝S△QPS，

    ∴$\frac{1}{2}⋅ST⋅PQ=\frac{1}{2}$PS•PT，

    ∴ST•d＝PS×2，

    ∴$d=\frac{2PS}{ST}=2sin∠T$，

    ∴PQ随着∠T的增大而增大，随着∠T的减小而减小，

    ∵$tan∠T=\frac{PS}{PT}=\frac{PS}{2}$，

    ∴∠T随着PS的增大而增大，随着PS的减小而减小，

    ∵$PS=\sqrt{O{S}^{2}-O{P}^{2}}=\sqrt{O{S}^{2}-1}$，

    ∴PS随着OS的增大而增大，随着OS的减小而减小，

    即求出OS最大值和最小值作为临界点；

    当点S在点M（0，3）时，OS取最大值，即PQ最大，

    则MP是⊙O的切线，MQ⊥PQ，如图所示，作直径PT，连接QT，

    ![](figures/image49.png)

    ∴PT＝2，PQ＝d，∠MPT＝90°，∠PQT＝90°，∠PQM＝90°，

    ∴$QT=\sqrt{P{T}^{2}-P{Q}^{2}}=\sqrt{4-{d}^{2}}$，

    ∵M（0，3），MP是⊙O的切线，

    ∴OP⊥MP，

    ∴$MP=\sqrt{O{M}^{2}-O{P}^{2}}=\sqrt{{3}^{2}-{1}^{2}}=2\sqrt{2}$，

    ∵∠PQT＝90°，∠PQM＝90°，PT是直径，

    ∴点M、Q、T三点共线，

    ∴$MT=\sqrt{P{M}^{2}+P{T}^{2}}=\sqrt{(2\sqrt{2}{)}^{2}+{2}^{2}}=2\sqrt{3}$，

    ∵∠MPT＝∠MQP＝90°，

    ∴S△MPT＝S△MPT，

    ∴$\frac{1}{2}⋅MT⋅PQ=\frac{1}{2}⋅PM⋅PT$，

    ∴$2\sqrt{3}⋅d=2\sqrt{2}×2$，

    ∴$d=\frac{2}{3}\sqrt{6}$，

    当点S在经过点O的MN的垂线上时，即点K，OS取最小值，即PQ最小，

    如图所示，作直径QT，连接PT，

    ![](figures/image50.png)

    同理可得，点K、P、T三点共线，∠KQT＝∠TPQ＝∠KPQ＝90°，

    ∵OK⊥MN，点M（0，3），$N(\frac{6\sqrt{5}}{5}，0)$，

    ∴OK•MN＝OM•ON，$MN=\sqrt{O{M}^{2}+O{N}^{2}}=\sqrt{{3}^{2}+(\frac{6\sqrt{5}}{5}{)}^{2}}=\frac{9\sqrt{5}}{5}$，

    ∴$OK=\frac{OM⋅ON}{MN}=\frac{3×\frac{6\sqrt{5}}{5}}{\frac{9\sqrt{5}}{5}}=2$，

    ∴$QK=\sqrt{O{K}^{2}-O{Q}^{2}}=\sqrt{{2}^{2}-{1}^{2}}=\sqrt{3}$，$KT=\sqrt{Q{K}^{2}+Q{T}^{2}}=\sqrt{(\sqrt{3}{)}^{2}+{2}^{2}}=\sqrt{7}$，

    ∵KT•PQ＝QK•QT，

    ∴$\sqrt{7}⋅d=\sqrt{3}×2$，

    ∴$d=\frac{2}{7}\sqrt{21}$，

    则d的取值范围为$\frac{2\sqrt{21}}{7}≤d≤\frac{2\sqrt{6}}{3}$．'
