    则∠HAN＝90°，

    由（2）可知：CD＝CE，∠DEN＝45°，∠CBE＝45°$-\frac{1}{2}$α，∠CED＝∠CDE＝90°$-\frac{1}{2}$α，

    ∵CM⊥ED，

    ∴CM垂直平分DE，

    ∴ND＝NE，

    ∴∠NDE＝∠NED＝45°，

    ∴∠CDN＝90°$-\frac{1}{2}$α﹣45°＝45°$-\frac{1}{2}$α，

    在正方形ABCD，AB＝AD，∠ABC＝∠BAD＝∠ADC＝90°，

    ∴∠ADN＝∠ADC+∠CDN＝90°+45°$-\frac{1}{2}$α＝135°$-\frac{1}{2}$α，

