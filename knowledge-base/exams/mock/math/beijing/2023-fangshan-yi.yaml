  solution: '【小问1详解】

    解：∵抛物线$y=x^{3}-2ax+b$经过点$(1,1)$，

    ∴$1=1-2a+b$，

    ∴$b = 2a$，

    ∵$y = x^2 - 2ax + b = (x - a)^2 + 2a - a^2$，

    ∴抛物线的顶点坐标为$\left\{a,2a-a^{2}\right\}$；

    【小问2详解】

    解：∵$y = x^2 - 2ax + b = (x - a)^2 + 2a - a^2$，

    ∴抛物线的对称轴为直线$x = a$，

    又∵抛物线开口向上，离对称轴越远函数值越大，且$a-1\leq x\leq a+2$，

    ∴当$x=a+2$时，$y_{\text{max}} = (a + 2 - a)^2 + 2a - a^2 = 4 + 2a - a^2 \leq 1$，

    即$a^2-2a-3\quad0$，

    ∴$(a-3)(a+1)\quad 0$，

    ∴$\begin{pmatrix} a-3 & 0 \\ a+1 & 0 \end{pmatrix}$或$\left\{ \begin{array} { l } { a - 3 \leq 0 } \\ { a + 1 \leq 0 } \end{array} \right.$，

    解得$a\ 3$或$a \leq -1$．'
