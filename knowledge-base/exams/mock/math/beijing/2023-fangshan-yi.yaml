  type: 解答
  score: 5
  question: '下面是证明等腰三角形性质定理“三线合一”的三种方法，选择其中一种完成证明．

    | 等腰三角形性质定理：等腰三角形顶角的平分线、底边上的中线、底边上的高互相重合（简记为：三线合一）． |  |  |

    | --- | --- | --- |

    | 方法一： 已知：如图， $\triangle ABC$ 中， $AB = AC$ ， AD 平分 $\angle BAC$ ． 求证： $BD = CD$ ， $AD \perp BC$ ． [图] | 方法二： 已知：如图， $\triangle ABC$ 中， $AB = AC$ ，点 D 为 BC 中点． 求证： $\angle BAD = \angle CAD$ ， $AD \perp
    BC$ ． [图] | 方法三： 已知：如图， $\triangle ABC$ 中， $AB = AC$ ， $AD \perp BC$ ． 求证： $BD = CD$ ， $\angle BAD = \angle CAD.$ [图] |'
  answer: 证明见解析
  solution: '证明：方法一：∵AD平分$\angle BAC$，

    ∴$\angle BAD = \angle CAD$，

    在$\triangle BAD$和$\triangle CAD$中，

    $AB = AC \\

    \angle BAD = \angle CAD \\

    AD = AD$，

    ∴$\triangle BAD\cong\triangle CAD(SAS)$，

    ∴$BD = CD$，$\angle ADB = \angle ADC$，

    ∵$\angle ADB+\angle ADC=180^{\circ}$，

    ∴$\angle ADB=\angle ADC=90^{\circ}$，即$AD \perp BC$，

    ∴$BD = CD$，$AD \perp BC$；

    方法二：∵点D为BC中点，

    ∴$BD = CD$，

    在$\triangle BAD$和$\triangle CAD$中，

    $\left\{\begin{array}{l} AB=AC \\ BD=CD \\ AD=AD \end{array}\right.$，

    ∴$\triangle BAD \cong \triangle CAD (SSS)$，

    ∴$\angle BAD = \angle CAD$，$\angle ADB = \angle ADC$，

    ∵$\angle ADB+\angle ADC=180^{\circ}$，

    ∴$\angle ADB=\angle ADC=90^{\circ}$，即$AD \perp BC$，

    ∴$\angle BAD = \angle CAD$，$AD \perp BC$；

    方法三：∵$AD \perp BC$，

