  question: '如图，$\triangle ABC$中，CD平分$\angle ACB$，$DE \parallel AC$交BC于点E．若$AC = 5$，$DE = 3$，则$BE =$__________．

    [图]'
  answer: $\frac{9}{2}$
  solution: '解：∵CD平分$\angle ACB$，$DE \parallel AC$，

    ∴$\angle ACD=\angle DCE=\angle EDC$，

    ∴$ED = EC$，

    ∵$DE \parallel AC$，$AC = 5$，$DE = 3$，

    设$BE = x$，则$BC = x + 3$，

    ∴$\triangle BDE \sim \triangle ABC$，

    ∴$\frac{DE}{AC}=\frac{BE}{BC}$，即$\frac{x}{3+x}=\frac{3}{5}$，

    ∴$x = \frac{9}{2}$，

    故答案为：$\frac{9}{2}$．'
