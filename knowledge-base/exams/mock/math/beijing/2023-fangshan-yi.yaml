  question: '如图，$\triangle ABC$中，$AB = AC$，以BC为直径作$\odot\odot$，与边AC交于点D，过点D的$\odot\odot$的切线交BC的延长线于点E．

    [图]

    （1）求证：$\angle BAC=2\angle DBC$；

    （2）若$\cos\angle BAC=\frac{3}{5}$，$DE = 4$，求BE的长．'
  answer: （1）见解析 （2）$BE = 8$．
  solution: '【小问1详解】

    证明：∵$AB = AC$，

    ∴$\angle ABC = \angle ACB$，

    ∴$\angle BAC=180^\circ-\angle ABC-\angle ACB=180^\circ-2\angle ACB$，

    ∵BC为$\odot\odot$的直径，

    ∴$\angle DBC = 90^\circ - \angle ACB$，

    ∴$\angle BAC=2\angle DBC$；

    【小问2详解】

    解：∵BC为$\odot\odot$的直径，

    ∴$\angle BDC=\angle BDA=90^\circ$，

    ∵$\cos\angle BAC=\frac{3}{5}$，

    ∴$\frac{AD}{AB}=\frac{3}{5}$，

    设$AD = 3a$，则$AB = 5a$，$BD=\sqrt{AB^{2}-AD^{2}}=4a$，

    ∵$AB = AC = 5a$，

    ∴$CD = 2a$，

    连接OD，

    [图]

    则$OD = OB$，

    ∴$\angle CBD = \angle BDO$，

    ∵BC为$\odot\odot$的直径，DE为$\odot\odot$的切线，

    ∴$\angle BDC=\angle ODE=90^{\circ}$，

    ∴$\angle EDC = \angle BDO = \angle EBD$，

    ∵$\angle DEC = \angle BED$，

    ∴$\triangle DEC \sim \triangle BED$，

    ∴$\frac{DE}{BE}=\frac{CD}{BD}=\frac{2a}{4a}=\frac{1}{2}$，

    ∵$DE = 4$，

    ∴$BE = 8$．'
