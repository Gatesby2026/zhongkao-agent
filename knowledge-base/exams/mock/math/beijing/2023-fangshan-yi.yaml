  question: '在平面直角坐标系xOy中，点$A(1,\ a)$在直线$l_{1}: y = kx + 3 - k (k > 0)$上，直线$l_{2}: y = x + m$过点$B(2,3)$．

    （1）求a的值及直线$l_2$的表达式；

    （2）当$x > -1$时，对于x的每一个值，函数$y=kx+3-k(k>0)$的值大于函数$y = x + m$的值，直接写出k的取值范围．'
  answer: （1）$a = 3$，直线$l_2$的表达式为$y=x+1$； （2）$1 \leq k \leq \frac{3}{2}$．
  solution: '【小问1详解】

    解：∵点$A(1,\ a)$在直线$l_{1}: y = kx + 3 - k (k > 0)$上，

    ∴$a=k+3-k=3$，

    ∵直线$l_{2}: y = x + m$过点$B(2,3)$，∴$3=2+m$，∴$m = 1$，

    ∴直线$l_2$的表达式为$y=x+1$；

    【小问2详解】

    解：函数$y = kx + 3 - k = k(x - 1) + 3$，

    当$x = 1$时，$y=3$，即直线$y=kx+3-k$恒过点$(1,3)$，

    当$x=-1$时，$y = x + 1 = 0$，即直线$y=x+1$过点$(-1,0)$，

    将点$(-1,0)$代入$y=kx+3-k$，得$0 = -k + 3 - k$，

    解得$k = \frac{3}{2}$，

    当两直线平行时，$k = 1$，

    ∵当$x > -1$时，对于x的每一个值，函数$y=kx+3-k(k>0)$的值大于函数$y = x + m$的值，如图，

    [图]

    ∴$1 \leq k \leq \frac{3}{2}$．'
