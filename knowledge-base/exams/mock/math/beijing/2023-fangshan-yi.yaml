  question: 已知$a^{2}+4a-3=0$，求代数式$a(a+2)+(a+3)^{2}$的值．
  answer: $15$
  solution: '解：∵$a^{2}+4a-3=0$，

    ∴$a^{2}+4a=3$，

    ∴$a(a+2)+(a+3)^{2}$

    $=a^{2}+2a+a^{2}+6a+9$

    $=2a^{2}+8a+9$

    $=2(a^{2}+4a)+9$

    $=2\times3+9$

    $=15$．'
