  question: '如图，在$\triangle ABC$中，$AB = AC$．

    [图]

    （1）使用直尺和圆规，作$AD \perp BC$交BC于点D（保留作图痕迹）；

    （2）以D为圆心，DC的长为半径作弧，交AC于点E，连接BE，DE．

    ①$\angle BEC =$________$\text{o}$；

    ②写出图中一个与$\angle CBE$相等的角________．'
  answer: （1）见解析 （2）①$90$；②$\angle DAC$（或$\angle BAD、\angle BED$）
  solution: '【小问1详解】

    解：如图所示，

    [图] 【小问2详解】

    ①如图所示，

    [图]

    ∵$AB = AC, AD \perp BC$，

    ∴$DB = DC$，

    又∵$DE = DC$，

    ∴$DB = DE = DC$，

    ∴E在BC为直径的圆上，

    ∴$\angle BEC = 90^\circ$，

    故答案为：$90$．

    ②∵$\angle BEC = 90^\circ$，

    ∴$\angle CPE+\angle ACB=90^{\circ}$，

    ∵$AD \perp BC$，

