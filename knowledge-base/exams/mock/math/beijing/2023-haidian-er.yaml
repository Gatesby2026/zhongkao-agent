  question: '如果$a-b=2$，那么代数式$\frac{2}{a+b}\left(1+\frac{2b}{a-b}\right)$的值是（）

    A.$\frac{1}{2}$

    B.1

    C.$\sqrt{2}$

    D.2'
  answer: B
  solution: '解：$\frac{2}{a+b}\left(1+\frac{2b}{a-b}\right)$

    $\frac{2}{a-b} \times \frac{a-b+2b}{1}$

    $\frac{2}{a+b}\times\frac{a+b}{a-b}$

    $=\frac{2}{a-b}$，

    ∵$a-b=2$，

    ∴原式$=$$\frac{2}{2}=1$，

    故选：B．'
