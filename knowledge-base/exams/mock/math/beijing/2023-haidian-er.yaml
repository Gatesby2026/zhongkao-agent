  solution: '【小问1详解】

    证明：∵平行四边形$ABCD$的对角线AC，BD交于点O，

    ∴$BO = DO$，

    又$EF = DE$，

    ∴OE为$\triangle DFB$的中位线，

    ∴$OE \parallel FB$，且$OE=\frac{1}{2}BF$，

    又E为OA的中点，

    ∴$OE=\frac{1}{2}AO$，

    ∴$OA=BF, OA \parallel BF$，

    ∴四边形$AFBO$为平行四边形；

