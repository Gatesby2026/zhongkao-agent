    ①若点M与点A重合，点N与点B重合，直接写出$\triangle OAB$的“翻折点”的坐标；

    ②P是线段AB上一动点，当P是$\triangle OAB$的“翻折点”时，求AP长的取值范围；

    （2）直线$y=-\frac{3}{4}x+b(b>0)$与x轴，y轴分别交于A，B两点，若存在以直线AB为对称轴，且斜边长为2的等腰直角三角形，使得该三角形边上任意一点都为$\triangle OAB$的“翻折点”，直接写出b的取值范围．'
  answer: （1）①$P\left(\frac{9}{2},\frac{3\sqrt{3}}{2}\right)$；②$6-\sqrt{3}\leq PA\leq 3$ （2）$b\frac{1+\sqrt{7}}{2}$
  solution: '【小问1详解】

    ①∵$A(3,0)$，$B\left(0,3\sqrt{3}\right)$

    ∴$\overline{OA}=3,\overline{OB}=3\sqrt{3}$，则$AB = 6$

    ∴$\tan \angle OBA = \frac{OA}{OB} = \frac{3}{3\sqrt{3}} = \frac{\sqrt{3}}{3}$，

    ∴$\angle OBA=30^\circ$，则$\angle BAO = 60^\circ$

    ∵点M与点A重合，点N与点B重合，

    ∴$OA=PA=3,\angle OAP=120^{\circ}$

    过点P作$PD \perp x$轴于点D，

    [图]

    依题意$OA \perp AB$，则$PA=OA=3,\angle POA=30^\circ$

    ∴$PD=\frac{3\sqrt{3}}{2}$，$AD=\frac{3}{2}$

    ∴$OD=OA+AD=\frac{9}{2}$，

    ∴$\triangle OAB$的“翻折点”的坐标为$P\left(\frac{9}{2},\frac{3\sqrt{3}}{2}\right)$；

    ②∵点O与点P关于MN对称，

    ∴MN为线段OP的垂直平分线，

    当点N运动到点B时，$NO = NP = 3\sqrt{3}$

    ∴$AP = 6 - 3\sqrt{3}$

    当点M运动到点A时，$AP = OA = 3$

    ∴$6-\sqrt{3}\leq PA\leq 3$

    [图] 【小问2详解】

    直线$y=-\frac{3}{4}x+b(b>0)$与x轴，y轴分别交于A，B两点，

    令$x = 0$，则$y = b$，令$y = 0$，解得$x = \frac{4}{3}b$，

    ∴$A\left(\frac{4}{3}b,0\right)$,$B(0,b)$

    对于$Rt_{\triangle OAB}$中'
