    \draw[->] (-4,0) -- (4,0);

    \foreach \x in {-3,-2,-1,0,1,2,3}

    \draw (\x,-0.1) -- (\x,0.1) node[below] {\x};

    \fill (1.5,0) circle (2pt) node[below] {$a$};

