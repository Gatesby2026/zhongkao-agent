  question: '如图，正方形$ABCD$，点A在直线l上，点B到直线l的距离为3，点D到直线l的距离为2，则正方形的边长为________．

    [图]'
  answer: $\sqrt{13}$
  solution: '解：如图所示，

    [图]

    过点$D,B$分别作l的垂线，垂足分别为$E,F$，

    ∴$DE = 2, BF = 3$，$\angle DPA=\angle BFA=90^\circ$，

    ∵四边形$ABCD$是正方形，

    ∴$AD = AB, \angle DAB = 90^\circ$，

    ∴$\angle BAF = 90^\circ - \angle DAE = \angle ADE$，

    ∴$\triangle ADE \cong \triangle BAF$，

    ∴$AE = BF = 3$，

    在$Rt\triangle ADE$中，$AD = \sqrt{DE^{2} + AD^{2}} = \sqrt{2^{2} + 3^{2}} = \sqrt{13}$，

    故答案为：$\sqrt{13}$．'
