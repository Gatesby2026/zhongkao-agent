  answer: （1）证明见解析 （2）10
  solution: '【小问1详解】

    证明：过O作$OH \perp AC$于H，如图所示：

    [图]

    ∴$\angle OHA = 90^\circ$，

    ∴$\angle AOH + \angle OAC = 90^\circ$，

    ∵PA是$\odot\odot$的切线，

    ∴$\angle OAP = 90^\circ$，

    ∴$\angle OAC + \angle PAC = 90^\circ$，

    ∴$\angle AOH = \angle PAC$，

    ∵$OA = OC$，$OH \perp AC$，

    ∴$\angle AOC=2\angle AOH$，

    ∴$\angle AOC = 2\angle PAC$；

    【小问2详解】

    解：连接OB，延长AC交PB于E，如图所示：

    [图]

    ∵PA，PB是$\odot\odot$的切线，

    ∴$OB \perp PB$，$PA = PB$，

    ∵$AC \parallel OB$，

    ∴$AC \perp PB$，

    ∴四边形$OBEH$是矩形，

    ∴$OH = BE$，$IIE = OB = 5$，

    ∵$OH \perp AC$，$OA = OC$，

    ∴$AH = CH = \frac{1}{2}AC = 3$，

    ∴$OH = \sqrt{OC^{2} - CH^{2}} = 4$，

    ∴$BE = OH = 4$，$AE = AH + HE = 8$，

    ∵$PA^{2}=AE^{2}+PE^{2}$，

    ∴$P_{1}F_{1}=8^{2}+(PA-4)^{2}$，

    解得：$AP = 10$．'
