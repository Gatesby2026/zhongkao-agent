  question: '投掷两枚质地均匀的骰子，两枚骰子向上一面的点数相同的概率是（）

    A.$\frac{1}{12}$

    B.$\frac{1}{6}$

    C.$\frac{1}{3}$

    D.$\frac{1}{2}$'
  answer: B
  solution: '列表得：

    | $(1,6)$ | $(2,6)$ | $(3,6)$ | $(4,6)$ | $(5,6)$ | $(6,6)$ |

    | --- | --- | --- | --- | --- | --- |

    | $(1,5)$ | $(2,5)$ | $(3,5)$ | $(4,5)$ | $(5,5)$ | $(6,5)$ |

    | $(1,4)$ | $(2,4)$ | $(3,4)$ | $(4,4)$ | $(5,4)$ | $(6,4)$ |

    | $(1,3)$ | $(2,3)$ | $(3,3)$ | $(4,3)$ | $(5,3)$ | $(6,3)$ |

    | $(1,2)$ | $(2,2)$ | $(3,2)$ | $(4,2)$ | $(5,2)$ | $(6,2)$ |

    | $(1,1)$ | $(2,1)$ | $(3,1)$ | $(4,1)$ | $(5,1)$ | $(6,1)$ |

    ∵共有$36$种等可能的结果，两个骰子向上一面的点数相同的有$6$种情况，

    ∴两个骰子向上一面的点数相同的概率是：$\frac{6}{36}=\frac{1}{6}$．

    故选：B．'
