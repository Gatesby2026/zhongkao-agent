  question: '已知关于x的一元二次方程$x^{2}-2x+m=0\,(m<0)$．

    （1）判断方程根的情况，并说明理由；

    （2）若方程的一个根为$-1$，求m的值和方程的另一个根．'
  answer: （1）方程有两个不相等的实数根，理由见解析 （2）$m = -3$，另一个根为$3$
  solution: '【小问1详解】

    解：∵$x^{2}-2x+m=0$，

    ∴$\Delta = b^{2}-4ac = -4-4m$，

    ∵$m < 0$，

    ∴$4-4m>0$，

    即$\triangle > 0$，

    ∴该方程有两个不相等的实数根．

    【小问2详解】

    解：∵方程的一个根为$-1$，

    ∴$1-2x(-1)+m=0$，

    解得：$m = -3$，

    设方程的另一个根为$x_2$，

    ∵$x_{1}x_{2}=m$，$m = -3$，$x_{1}=-1$，

    ∴$x_{2}=3$，

    ∴另一个根为$3$．'
