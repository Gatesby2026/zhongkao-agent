  question: '在平面直角坐标系xOy中，直线$y=kx-1$与$y=\frac{1}{2}x$交于点$A(2,m)$．

    （1）求k，m的值；

    （2）已知点$P(n,0)$，过点P作垂直于x轴的直线交直线$y=kx-1$于点M，交直线$y=\frac{1}{2}x$于点N．若$MN = 2$，直接写出n的值．'
  answer: （1）$k=1,m=1$ （2）$n = 6$或$-2$
  solution: '【小问1详解】

    解：将点$A(2,m)$代入$y=\frac{1}{2}x$

    即$m=\frac{1}{2}\times 2=1$，

    ∴$A(2,1)$，

    代入$y=kx-1$，即$1=2k-1$，

    解得：$k = 1$；

    【小问2详解】

    解：依题意，$M(n,n-1)$，$N\left(n,\frac{1}{2}n\right)$，

    ∵$MN = 2$，

    ∴$n-1-\frac{1}{2}n=2$，

    解得：$n = 6$或$-2$．'
