  question: '临近端午，某超市准备购进小枣粽、豆沙粽、肉粽共200袋（每袋均为同一品种的粽子），其中小枣粽每袋6个，豆沙粽每袋4个，肉粽每袋2个，为了促销，超市计划将所购粽子组合包装，全部制成A，B两种套装销售，A套装为每袋小枣粽4个，豆沙粽2个；B套装为每袋小枣粽2个，肉粽2个．

    （1）设购进的小枣粽x袋，豆沙粽y袋，则购进的肉粽的个数为________（用含x，y的代数式表示）；

    （2）若肉粽的进货袋数不少于三种粽子进货总袋数的$\frac{2}{5}$，则豆沙粽最多购进_______袋．'
  answer: ①.$(400-2x-2y)$ ②.40
  solution: '解：（1）设购进的小枣粽x袋，豆沙粽y袋，则购进的肉粽$(200-x-y)$袋，

    ∴购进的肉粽的个数为$2(200-x-y)=(400-2x-2y)$个；

    故答案为：$(400-2x-2y)$

    （2）根据题意得：购进的小枣粽的个数为$6x$个，豆沙粽的个数为$4y$个，

    ∵A套装豆沙粽2个；B套装肉粽2个．

    ∴A套装为$\frac{4y}{2}=2y$套，B套装为$400-2x-2y=(200-x-y)^{2}$套，

    ∵A套装每袋小枣粽4个，B套装每袋小枣粽2个，

    ∴$2y + 4(200 - x - y) = 6x$，

    解得：$x=50+\frac{3y}{4}$，

    ∵肉粽的进货袋数不少于三种粽子进货总袋数的$\frac{2}{5}$，

    ∴$200-x=y-200\times\frac{1}{2}$，

    即$200-\left(50+\frac{3y}{4}\right)=y\cdot200\times\frac{12}{5}$，

    解得：$y \leq 40$，

    ∴豆沙粽最多购进40袋；

    故答案为：40'
