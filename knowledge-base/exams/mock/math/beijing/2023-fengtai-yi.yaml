  question: '在平面直角坐标系xOy中，函数$y=kx+b\ (k\neq0)$的图象经过点$(2,0)$，$(0,-1)$．

    （1）求这个函数的表达式；

    （2）当$x > -2$时，对于x的每一个值，函数$y=kx+b+n$$(k\neq0)$的值大于0，直接写出n的取值范围．'
  answer: （1）$y=\frac{1}{2}x-1$； （2）$n^{2}$．
  solution: '【小问1详解】

    $\begin{array}{c}

    \bullet \\

    \bullet \quad \bullet \\

    \bullet

    \end{array}$函数图象经过点$(2,0)$，$(0,-1)$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$$\begin{cases}

    2k + b = 0 \\

    b = -1

    \end{cases}$，解得$\left\{\begin{array}{l}k=\frac{1}{2}\\b=-1\end{array}\right.$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$函数表达式为$y=\frac{1}{2}x-1$．

    【小问2详解】

    ∵函数$y=kx+b+n$$(k\neq0)$的值大于0，

    ∴$\frac{1}{2}x-1+n>0$，

    解得：$x > 2 - 2n$，

    ∵$x > -2$，

    ∴$2 - 2n \leq -2$，

    解得：$n^{2}$．'
