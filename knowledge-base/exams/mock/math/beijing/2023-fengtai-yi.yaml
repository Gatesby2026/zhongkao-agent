  question: '如图，$\triangle ABC$中，$\angle A = 90^{\circ}$，$AB = AC$，以点B为圆心，适当长为半径画弧，分别交BA，BC于点M，N，再分别以点M，N为圆心，大于$\frac{1}{2}MN$的长为半径画弧，两弧交于点F，作射线BF交AC于点D，若点D到BC的距离为1，则$AC =$_______．

    [图]'
  answer: $\sqrt{2}+1$##$1+\sqrt{2}$
  solution: '解：过点D作$DE \perp BC$于E，如图所示，

    [图]

    ∵点D到BC的距离为1，BD平分$\angle ABC$，

    ∴$AD = DE = 1$，

    ∵$\angle A = 90^{\circ}$，$AB = AC$，

    ∴$\angle ABC = \angle C = 45^{\circ} = \angle EDC$，

    ∴$CE=DE=1$，

    ∴$CD = \sqrt{1^{2} + 1^{2}} = \sqrt{2}$，

    ∴$AC=AD+CD=\sqrt{2}+1$，

    故答案为：$\sqrt{2}+1$．'
