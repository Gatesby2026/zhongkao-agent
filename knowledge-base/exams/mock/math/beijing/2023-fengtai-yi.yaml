  question: '在证明等腰三角形的判定定理时，甲、乙、丙三位同学各添加一条辅助线，方法如下图所示，你能用哪位同学添加辅助线的方法完成证明，请选择一种方法补全证明过程．

    | 等腰三角形的判定定理： 如果一个三角形有两个角相等，那么这两个角所对的边也相等（简写成“等角对等边”）． 已知：如图，在 $\triangle ABC$ 中， $\angle B = \angle C$ ． 求证： $AB = AC$ ． [图] |  |  |

    | --- | --- | --- |

    | 甲的方法： 证明：作 $\angle BAC$ 的平分线交 BC 于点 D ． [图] | 乙的方法： 证明：作 $AE \perp BC$ 于点 E ． [图] | 丙的方法： 证明：取 BC 中点 F ，连接 AF ． [图] |'
  answer: 选择甲的方法，证明见解析．
  solution: '解：选择甲的方法：

    证明：作$\angle BAC$的平分线交BC于点D．

    $\begin{tikzpicture}

