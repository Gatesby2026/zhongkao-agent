    设所走高速公路的路程为x公里，则普通公路的路程为$\left(x,+,60\right)$公里，根据题意列出方程求解即可，注意单位换算．

    解：设所走高速公路的路程为x公里，则普通公路的路程为$\left(x,+,60\right)$公里，

