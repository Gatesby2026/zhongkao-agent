- id: 16
  type: 填空
  score: 2
  stem: '小云被邀请玩一个拍灯挑战，规则如下：桌面上有40盏无差别的小灯，每个灯只有两种状态：亮或者暗，玩家可以通过拍灯来切换一盏灯的亮暗状态，但是每一盏灯只能拍一次．现40盏小灯中，已知有15盏灯亮，其余都是暗的．要求玩家蒙上双眼，将40盏小灯分成2组，如果玩家可以只通过拍灯的方式，使两组中亮着的小灯数一样多，即算挑战成功．

    （1）若将灯平均分成两组，经检查第一组里有5盏灯亮．如果只拍第一组的灯，则最少需要拍________盏，挑战成功．

    （2）小云的做法是：从40盏灯中任意选出n盏作为一组，然后将这n盏灯逐一拍一下，结果他挑战成功了，那么$n =$________．'
  answer: ①. 5    ②. 15
  solution: '（1）先求出第二组初始亮灯数和第一组的暗灯数，要使拍灯盏数最少，那么所拍的灯都是暗的灯，据此可得答案；

    （2）设选出的$n$盏灯中原有$x$盏亮灯，表示出拍灯前选出的组和另一组中亮灯的数量，进而表示出拍灯后选出的组和另一组中亮灯的数量，根据拍灯规则得到拍完后两组的亮灯数，根据相等条件列等式，消去变量得到$n$的值．

    解：（1）$\because$一共有40盏小灯，

    $\therefore$每组有$40 \div 2 = 20$盏小灯

    $\because$一共有15盏灯亮，第一组有$5$盏灯亮，

    $\therefore$第一组有$20 - 5 = 15$盏灯暗，第二组有$15 - 5 = 10$盏灯亮，

    $\because$只拍第一组灯，第二组亮灯数不变，且要使两组中亮着的小灯数一样多，

    $\therefore$拍完灯后第一组有10盏灯亮，

    $\because$要使拍灯盏数最少，

    $\therefore$所拍的灯都是暗的灯，使它们都变亮后满足第一组有10盏灯亮，

    $\therefore$最少需拍$10 - 5 = 5$盏灯；

    （2）设选出的$n$盏灯中原有$x$盏亮灯，则剩余一组的原有亮灯数为$\left(15,-,x\right)$，

    将选出的$n$盏灯每一盏都拍一下后，原有$x$盏亮灯变为暗，原有$\left(n,-,x\right)$盏暗灯变为亮，

    因此拍完后选出组的亮灯数为$\left(n,-,x\right)$，

    $\because$拍完后两组中亮着的小灯数一样多

    $\therefore$ $n - x = 15 - x$

    解得$n = 15$．'
