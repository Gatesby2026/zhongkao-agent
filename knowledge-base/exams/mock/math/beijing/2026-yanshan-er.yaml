  answer: （1）见详解    （2）2
  solution: '（1）先利用圆周角定理证得$\angle A O B = 90 \circ$，再根据平行线的性质，求得$\angle P A O = 90 \circ$，然后利用切线的判定得出结论；

    （2）先证明$\triangle O B D \sim \triangle A P D$，再根据相似三角形的性质，列出比例式，设$O D = k$，接着用$k$表示出$O B$，然后利用勾股定理求得$B D$，代入比例式中，求得$P D$，再利用线段的和求得$B
    P$，得到关于$k$的方程，求出$k$，最后求出$O B$．

    （1）

    证明：如图，连接$O A$．

    ![](figures/image333.png)

    $\because \angle A C B = 45 \circ$，

    $\therefore \angle A O B = 2 \angle A C B = 90 \circ$，

    $\because P A \parallel O B$，

    $\therefore \angle P A O = \angle A O B = 90 \circ$，

    $\because$ $A O$是半径，

    $\therefore P A$是$\bigodot O$的切线．

    （2）

    解：设$O A$与$B P$相交于点D．

    $\because P A \parallel O B$，

    $\therefore \angle O B P = \angle P$，

    $\because$ $\angle B D O = \angle A D P$，

    $\therefore \triangle O B D \sim \triangle A P D$．

    $\therefore \frac{O D}{A D} = \frac{B D}{P D} = \frac{O B}{A P}$，

    $\because \frac{O B}{A P} = \frac{1}{2}$，

    $\therefore \frac{O D}{A D} = \frac{B D}{P D} = \frac{O B}{A P} = \frac{1}{2}$，

    $\because O B = O A$，

    $\therefore \frac{O D}{O A} = \frac{O D}{O B} = \frac{1}{3}$，

    设$O D = k$，则$O B = 3 k$，

    $\therefore$在$Rt\triangle O B D$中，$B D = \sqrt{O B^{2} + O D^{2}} = \sqrt{10} k$，

    $\because \frac{B D}{P D} = \frac{1}{2}$，

    $\therefore P D = 2 \sqrt{10} k$，

    $\therefore P B = P D + B D = 3 \sqrt{10} k$，

    $\because P B = \sqrt{10}$，

    $\therefore 3 \sqrt{10} k = \sqrt{10}$，

    $\therefore k = \frac{1}{3}$，

    $\therefore O B = 3 k = 1$

    则$\bigodot O$的直径为2.

    本题考查了切线的判定，相似三角形的判定与性质，勾股定理，利用平行线的性质求角度，解题的关键是证明三角形相似，列出比例式求出待求线段的长．'
