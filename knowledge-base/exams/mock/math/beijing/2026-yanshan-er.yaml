  options:
    A: $m < 1$
    B: $m \leq 1$
    C: $m > 1$
    D: $m \geq 1$
  answer: B
  solution: '本题主要考查了根据一元二次方程有实数根求参数以及解一元一次不等式，根据$\Delta \geq 0$即可求出m的取值范围．

    解：$\because$一元二次方程$x^{2} + 2 x + m = 0$有实数根，

    $\therefore$ $\Delta = b^{2} - 4 a c = 2^{2} - 4 \times 1 \times m = 4 - 4 m \geq 0$，

    解得：$m \leq 1$．

    故选∶B．'
