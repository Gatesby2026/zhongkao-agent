  stem: '在平面直角坐标系$x O y$中，点$A \left(1,,y\right)$为抛物线$y = x^{2} - 2 t x$上一点，点$B$坐标为$\left(t,+,3,,y\right)$，点$A$与点$B$不重合．

    （1）求此抛物线的顶点坐标和对称轴（用含$t$的代数式表示）；

    （2）连接$A B$．

    ①当线段$A B$与抛物线有且只有1个公共点时，直接写出$t$的取值范围；

    ②在①的条件下，过点$B$作$x$轴的垂线交抛物线于点$C$，若线段$B C$的长随$t$的增大而减小，求$t$的取值范围．'
  figure: 2026-yanshan-er/figures/image418.png
