  answer: （1）B、C；（2）$x < \frac{6}{5}$或$x > 2$；（3）$x_{T} < - 4$或$x_{T} > 2 \sqrt{5}$．
  solution: '（1）根据“直盖点”的定义解答即可；

    （2）根据定义可得$\bigodot O$在其“直盖点”E为直角顶点的直角内部，引$\bigodot O$两条切线相交于点P，可求得$\bigodot O$的直盖点在以O为圆心，以2为半径的圆外，作以O为圆心，2为半径的圆与直线$y =
    - 2 x + 4$交于$E_{1}$、$E_{2}$两点，求出两点的坐标即可求解；

    （3）由（2）得$\bigodot T$的“直盖点”在以6为半径的圆外，可得当线段GH全部在半径为6的圆内时不能满足题意，分两种情况讨论①当圆心T在线段GH左侧时； ②当圆心T在线段GH右侧时.

    （1）根据定义可得线段PQ的“直盖点”均在以该线段为直径的圆外，如图，作以PQ长为直径的圆，线段PQ的“直盖点”为点B、C．

    故答案为：B、C

    ![](figures/image482.png)

    （2）根据定义可得$\bigodot O$在其“直盖点”E为直角顶点的直角内部，如图，引$\bigodot O$两条切线相交于点P，

    $\because$ $\bigodot O$的半径为$\sqrt{2}$，

    $\therefore$当两条切线夹角为90°时，$O P = \sqrt{\left(\sqrt{2}\right)^{2} + \left(\sqrt{2}\right)^{2}} = 2$．

    $\therefore$ $\bigodot O$的直盖点在以O为圆心，以2为半径的圆外．

    作以O为圆心，2为半径的圆与直线$y = - 2 x + 4$交于$E_{1}$、$E_{2}$两点，

    设$E_{1}$、$E_{2}$两点的坐标为$\left(x_{1},,,-,2,x_{1},+,4\right)$、$\left(x_{2},,,-,2,x_{2},+,4\right)$，

    由勾股定理得$x_{2} + \left(\left(-,2,x,+,4\right)\right)^{2} = 2^{2}$，解得$x_{1} = \frac{6}{5}$，$x_{2} = 2$，

    $\therefore$点E的横坐标的取值范围为$x < \frac{6}{5}$或$x > 2$；

    ![](figures/image489.png)

    （3）$\because$ $\sqrt{\left(\left(3,\sqrt{2}\right)\right)^{2} + \left(\left(3,\sqrt{2}\right)\right)^{2}} = 6$，

    $\therefore$由（2）得$\bigodot T$的“直盖点”在以6为半径的圆外，

    $\therefore$当线段GH全部在半径为6的圆内时不能满足题意，

    ①当圆心T在线段GH左侧时，如图，作以T为圆心，6为半径的圆，当线段GH全部在大圆内时，设此时的圆心为$T_{1}$，此时大圆过点G，易得圆心$T_{1}$的坐标为$\left(-,4,0\right)$；

    ②当圆心T在线段GH右侧时，如图，作以T为圆心，6为半径的圆，当线段GH全部被大圆包含时，设此时的圆心为$T_{2}$，此时大圆过点H，在$Rt \triangle O H T_{2}$中，由勾股定理得$O T_{2} = \sqrt{H
    T_{2}^{2} - O H^{2}} = \sqrt{6^{2} - 4^{2}} = 2 \sqrt{5}$，则$T_{2}$的坐标为$\left(2,\sqrt{5},,0\right)$；

    综上所述，观察图象可得圆心T的横坐标$x_{T}$的取值范围是$x_{T} < - 4$或$x_{T} > 2 \sqrt{5}$．

    ![](figures/image497.png)

    本题考查的是新定义问题，理解新定义并正确的画出图形是关键.

    错因分析：较难题．失分原因：第（1）问：不能由定义得出线段的“直盖点”均在以该线段为直径的圆外；第（2）问：①不能由定义想到引出切线，从而得到$\bigodot O$的“直盖点”是在以2为半径的圆外；②不能正确求点$E_{1}$、$E_{2}$的坐标；第（3）问：①不能正确画出图象，找到线段GH全部被以T为圆心，6为半径的圆包含的两种极限情况；②不能正确观察图象，找到满足题意的情形'
