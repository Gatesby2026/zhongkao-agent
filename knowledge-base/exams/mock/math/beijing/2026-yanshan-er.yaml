  solution: '（1）根据旋转的全等性质，补角的性质，等腰三角形的判定，等量代换解答即可．

    （2）作$Q D \bot B D$，且使$D Q = B D$，连接$B Q$，$E Q$．利用三角形全等的判定和性质，等腰直角三角形的性质，等量代换思想解答即可．

    （1）

    解：$A B$与$C D$的数量关系是$A B = C D$．

    ![](figures/image432.png)

    证明：$\because$A，C，D共线，

    $\therefore \angle B C A = 180 \circ - \left(180,\circ,-,\alpha\right) = \alpha$．

    $\therefore \angle B C A = \angle B A C$，

    $\therefore A B = B C$．

    $\because$线段$B C$绕点C旋转得到线段$C D$，

    $\therefore B C = C D$．

    $\therefore A B = C D$．

    （2）

    解：$C E$与$B D$的数量关系是$C E = \sqrt{2} B D$．

    证明：$\because \angle M A N = 45 \circ , E D \bot A D$．

    $\therefore \angle A E D = 45 \circ$．

    $\therefore A D = D E$．

    作$Q D \bot B D$，且使$D Q = B D$，

    连接$B Q$，$E Q$．

    ![](figures/image441.png)

    $\because$ $\angle B A C = 45 \circ$，

    $\therefore \angle B C D = 135 \circ$．

    $\therefore \angle B C A = 45 \circ$．

    $\therefore A B = B C$．

    $\therefore \angle A B C = 90 \circ$．

    $\because \angle 1 + \angle 3 = \angle 2 + \angle 3 = 90 \circ$．

    $\therefore \angle 1 = \angle 2$．

    在$\triangle A D B$和$\triangle E D Q$中，

    $\left\{\begin{matrix} A D = E D \\ \angle 1 = \angle 2 \\ B D = D Q \end{matrix}\right.$，

    $\therefore \triangle A D B \cong\triangle E D Q \left(S,A,S\right)$．

    $\therefore A B = E Q$，$\angle D E Q = \angle A = 45 \circ$．

    $\therefore B C = E Q$．

    $\because \angle A E D = 45 \circ$，

    $\therefore \angle B E Q = 90 \circ$，

    在$\triangle E B C$和$\triangle B E Q$中，

    $\left\{\begin{matrix} B E = E B \\ \angle B E Q = \angle E B C \\ E Q = B C \end{matrix}\right.$，

    $\therefore \triangle E B C \cong\triangle B E Q \left(S,A,S\right)$，

    $\therefore B Q = E C$，

    $\because$在$Rt\triangle B Q D$中，$B D = D Q$，

    $\therefore B Q = \sqrt{2} B D$．

    $\therefore C E = \sqrt{2} B D$．

    本题考查了旋转的性质，三角形全等的判定和性质，等腰三角形的判定和性质，等腰直角三角形的性质，等量代换，熟练掌握相关图形的性质和等量代换思想是解题的关键．'
