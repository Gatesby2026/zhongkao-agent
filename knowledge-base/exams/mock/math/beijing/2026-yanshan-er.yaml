- id: 23
  type: 解答
  score: 6
  stem: '为了解某年级200名学生A，B两门课程的学习情况，从中随机抽取20名学生进行测试，获得了他们的成绩（百分制），并对数据（成绩）进行整理描述和分析．下面给出了部分信息．

    a．A课程成绩的频数分布直方图如下（数据分成5组：$50 \leq x < 60$，$60 \leq x < 70$，$70 \leq x < 80$，$80 \leq x < 90$，$90 \leq x < 100$）：


    b．A课程成绩在$80 \leq x < 90$这一组的是：

    85   85   83   85   84   81   80

    c．A，B两门课程成绩的平均数、中位数、众数如下：

    | 课程 | 平均数 | 中位数 | 众数 |

    |---|---|---|---|

    | A | 80 | m | 85 |

    | B | 79.9 | 84 | 86 |

    根据以上信息，回答下列问题：

    （1）写出表中m的值；

    （2）在此次测试中，学生甲的A课程成绩为83分，B课程成绩为83分，这名学生成绩排名更靠前的课程是__________（填“A”或“B”）；

    （3）在此次测试中，学生乙的A课程成绩为84分，B课程成绩为85分，下面有两个推断：

    ①学生乙这两门课程的总成绩一定高于这20名学生两门课程总成绩的平均数；

    ②若按这两门课程的总成绩对这20名学生由高到低排序，该名学生一定排在前10名；

    其中所有正确推断的序号是__________；

    （4）假设该年级200名学生都参加此次测试，估计A课程成绩不低于80分的学生有__________人．'
  figure: 2026-yanshan-er/figures/image310.png
  _figures_extra:
  - image310.png
  answer: （1）82    （2）A （3）①    （4）120
  solution: '本题考查考查频数分布直方图，中位数，用样本估计总体等知识，熟练掌握中位数的计算方法和意义是解题的关键．

    （1）根据中位数的定义进行解答即可；

    （2）根据中位数进行判断即可；

    （3）根据两组的平均分和最高分分别进行判断即可；

    （4）根据样本估计总体的方法计算即可．

    （1）

    解：$\because$A课程总人数为20，

    $\therefore$中位数为第10、11个数据的平均数，而第10、11个数据均在$80 \leq x < 90$这一组，

    $\therefore$中位数在$80 \leq x < 90$这一组，

    $\because$ $80 \leq x < 90$这一组的是：80，81，83，84，85，85，85，前三组共$1 + 3 + 4 = 8$个数据，

    $\therefore$A课程的中位数为$\frac{\text{81}+\text{83}}{2} = 82$ ，即$m = 82$；

    （2）

    解：$\because$该学生的成绩大于A课程的中位数，而小于B课程的中位数，

    $\therefore$这名学生成绩排名更靠前的课程是A，

    故答案为：A．

    （3）

    解：①两门课程总成绩的平均数为$80 + 79 . 9 = 159 . 9$，学生乙的总成绩为$84 + 85 = 169$，$169 > 159 . 9$，所以①正确；

    ②总成绩高于平均数的人数不一定只有10人，可能有更多人总成绩高于平均数，

    因此乙不一定排在前10名，所以②错误；

    故选：①；

    （4）

    解：由题意可得，$200 \times \frac{7 + 5}{20} = 120$人，

    即估计A课程成绩不低于80分的学生有$120$人．'
