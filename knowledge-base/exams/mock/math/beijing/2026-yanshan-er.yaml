  stem: '在平面直角坐标系xOy中，函数$y = k x + b \left(k,\neq,0\right)$的图象由函数$y = x$的图象平移得到，且经过点$\left(1,2\right)$．

    （1）求k，b的值；

    （2）当$x > 1$时，对于x的每一个值，函数$y = m x \left(m,\neq,0\right)$的值大于函数$y = k x + b$的值且小于函数$y = 3 x + b$的值，直接写出m的取值范围．'
  figure: 2026-yanshan-er/figures/image297.png
  _figures_extra:
  - image297.png
  answer: （1）$k = 1$；$b = 1$ （2）$2 \leq m \leq 3$
  solution: '本题主要考查了一次函数图象与几何变换、一次函数图象与系数的关系，解题时要熟练掌握并能灵活运用一次函数的性质是关键．

    （1）依据题意，由函数$y = k x + b \left(\right. k \neq 0 \left.\right)$的图象由函数$y = x$的图象平移得到，从而$k = 1$，结合函数过$\left(\right. 1,2 \left.\right)$，可得$1
    + b = 2$，进而计算可以得解；

    （2）依据题意，结合（1）可得$y = k x + b$为$y = x + 1$，$y = 3 x + b$为$y = 3 x + 1$，然后在同一坐标系中画出$y = x + 1$，$y = 3 x + 1$的图象，又当$x = 1$时，$y
    = x + 1 = 2$，则$m = 2$，且当$x > 1$时，对于$x$的每一个值，函数$y = m x \left(\right. m \neq 0 \left.\right)$的值大于函数$y = x + 1$的值且小于函数$y
    = 3 x + 1$的值，进而可以判断得解．

    （1）

    解：由题意，$\because$函数$y = k x + b \left(\right. k \neq 0 \left.\right)$的图象由函数$y = x$的图象平移得到，

    $\therefore k = 1$．

    $\therefore$函数为$y = x + b$．

    又$\because$函数过$\left(\right. 1,2 \left.\right)$，

    $\therefore 1 + b = 2$．

    $\therefore b = 1$；

    （2）

    解：由题意，结合（1）可得$y = k x + b$为$y = x + 1$，$y = 3 x + b$为$y = 3 x + 1$，

    在同一坐标系中画出$y = x + 1$，$y = 3 x + 1$的图象如下．

