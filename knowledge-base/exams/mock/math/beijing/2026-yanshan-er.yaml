    当$x > 1$时，对于$x$的每一个值，函数$y = m x \left(\right. m \neq 0 \left.\right)$的值大于函数$y = x + 1$的值，

    那么$m \geq 2$，

    当$x > 1$时，对于$x$的每一个值，函数$y = m x \left(\right. m \neq 0 \left.\right)$的值小于函数$y = 3 x + 1$的值，

    则$m \leq 3$，

    $\therefore$结合图象可得，$2 \leq m \leq 3$．'
