  stem: '在平面直角坐标系xOy中，对于点A和图形M，若存在以点A为直角顶点的直角，使得图形M都在该直角内部，就称点A是图形M的“直盖点”．如图①即为点A是图形M的“直盖点”的示例．

    （1）若图形M是线段PQ，其中点$P \left(-,2,0\right)$，点$Q \left(2,0\right)$，则以下三点：$B \left(0,3\right)$，$C \left(2,2\right)$，$D \left(-,1,,,1\right)$是线段PQ的“直盖点”的为________；

    （2）若$\bigodot O$的半径为$\sqrt{2}$，直线l：$y = - 2 x + 4$，求直线l上$\bigodot O$的“直盖点”E的横坐标的取值范围；

    （3）设$\bigodot T$的半径为$3 \sqrt{2}$，圆心T是x轴上的动点，直线$y = - 2 x + 4$与x轴，y轴分别交于点G、H，若线段GH上存在$\bigodot T$的“直盖点”，直接写出圆心T的横坐标$x_{T}$的取值范围．'
