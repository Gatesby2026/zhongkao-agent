  stem: '如图，$\triangle A B C$是$\bigodot O$的内接三角形，$\angle A C B = 45 \circ$，点P在$B C$的延长线上，$P A \parallel O B$．


    （1）求证：$P A$是$\bigodot O$的切线；

    （2）若$\frac{O B}{A P} = \frac{1}{2}$，$P B = \sqrt{10}$，求$\bigodot O$直径的长．'
  figure: 2026-yanshan-er/figures/image322.png
  _figures_extra:
