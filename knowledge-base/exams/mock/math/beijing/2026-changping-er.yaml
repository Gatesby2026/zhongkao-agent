  stem: '如图甲所示，某同学在学校组织的“绿色校园，从我做起”的环保实践活动中，主动承担了为校园新栽种的树苗浇水的任务。该同学质量为$60 \text{kg}$，双脚与地面的总接触面积为$0 . 04 \text{m}^{2}$。他用图乙所示的平底水桶装水，水桶底面积为$0 . 03 \text{m}^{2}$（不计桶壁的厚度），水桶内装有深度为$0 . 28 \text{m}$、质量为11
    kg的水，水桶放在水平地面上时水对水桶底的压力为$F$，水桶对水平地面的压强为$4000 \text{Pa}$，该同学提起这桶水时对水平地面的压强为$p$。已知水的密度为$1 . 0 \times 10^{3} \text{kg} / \text{m}^{3}$，$g$取$10 \text{N} / \text{kg}$。求：


    （1）水对水桶底的压力$F$。

    （2）该同学提起这桶水时对水平地面的压强$p$。'
  figure: 2026-changping-er/figures/image141.png
  answer: ''
  solution: '（1）水对水桶底的压力

    $p_{水对桶} = \rho_{水} g h = 1 . 0 \times 10^{3} \text{kg} / \text{m}^{3} \times 10 \text{N} / \text{kg} \times 0 . 28 \text{m} = 2 . 8 \times 10^{3} \text{Pa}$

    $F = p_{水对桶} S = 2 . 8 \times 10^{3} \text{Pa} \times 0 . 03 \text{m}^{2} = 84 \text{N}$（2分）

    （2）水桶放在水平地面上

    $p = \frac{F_{总}}{S} = \frac{720 \text{N}}{0 . 04 \text{m}^{2}} = 18000 \text{Pa}$

