  question: '如图，直线$a \parallel b$，直线l与$a, b$分别交于点$A, B$，过点A作$AC \perp b$于点

    C．若$\angle1=55^\circ$，则$\angle 2$的大小为（）

    [图]

    A.$35^\circ$

    B.$45^\circ$

    C.$55^\circ$

    D.$125^\circ$'
  answer: A
  solution: '解：如图，

    [图]

    ∵直线l与a，b分别交于点A，B，$\angle1=55^\circ$，

    ∴$\angle DAB=\angle 1=55^{\circ}$，

    ∵$AC \perp b$于点C，

    ∴$\angle ACB=90^\circ$，

    ∵$a \parallel b$，

    ∴$\angle CAD + \angle ACB = 180^\circ$，

    ∴$\angle CAD = 90^\circ$，

    ∴$\angle 2=\angle CAD-\angle DAB=35^\circ$．

    故选：A．'
