  question: 方程$\frac{2}{3x+7}=\frac{1}{5x}$的解为____________．
  answer: $x = 1$
  solution: '解：$\frac{2}{3x+7}=\frac{1}{5x}$，

    两边都乘以$5x(3x+7)$，得

    $2\times5x=3x+7$，

    解得$x = 1$，

    检验：当$x = 1$时，$5x(3x+7)\neq0$，

    ∴$x = 1$是原分式方程的解．'
