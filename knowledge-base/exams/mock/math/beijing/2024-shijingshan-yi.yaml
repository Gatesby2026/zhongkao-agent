  question: '为了保护水资源，提倡节约用水，北京市居民用水实行阶梯水价，实施细则如下表：

    北京市居民用水阶梯水价表（单位：元/立方米）

    | 供水 类型 | 阶梯 | 户年用水量 （立方米） | 水价 | 其中 |  |  |

    | --- | --- | --- | --- | --- | --- | --- |

    | 水费 | 水资源费 | 污水处理费 |  |  |  |  |

    | 自来水 | 第一阶梯 | 0—180 （含） | 5 | $2.07$ | $1.57$ | $1.36$ |

    | 第二阶梯 | 181—260 （含） | 7 | $4.07$ |  |  |  |

    | 第三阶梯 | 260 以上 | 9 | $6.07$ |  |  |  |

    某户居民2023年用水共缴纳1040元，求这户居民2023年的用水量．'
  answer: 这户居民2023年的用水量为$200$立方米
  solution: '解：设这户居民2023年的用水量为x立方米．

    ∵$5\times180=900$，$5\times180+7\times(260-180)=1460$，

    ∴$900<1040<1460$，

    ∴$180<x<260$．

    根据题意列方程，得

    $S=180\cdot\pi\cdot(x-180)=1040$．

    解这个方程，得$x=200$．

    答：这户居民2023年的用水量为$200$立方米．'
