  question: '在平面直角坐标系xOy中，函数$y=kx+b(k\neq0)$的图象过点$A(0,3)$和$B(-2,1)$，与过点$(0,5)$且平行于x轴的直线交于点C．

    [图]

    （1）求该函数$[公式]$解析式及点C的坐标；

    （2）当$x<2$时，对于x的每一个值，函数$y = mx (m \neq 0)$的值小于$y=kx+b(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=x+3$，$C(2,5)$ （2）$1 \leq m \leq \frac{5}{2}$
  solution: '【小问1详解】

    ∵函数$y=kx+b(k\neq0)$的图象过点$A(0,3)$和$B(-2,1)$，

    ∴$\begin{cases} b=3 \\ -2k+b=1 \end{cases}$，

    解得：$\left\{

    \begin{array}{l}

    b = 3 \\

    k = 1

    \end{array}

    \right.$，

    ∴直线解析式为：$y=x+3$，

    当$y = 5$时，$x=2$，

    ∴$C(2,5)$．

    【小问2详解】

    如图所示，直线$y = mx (m \neq 0)$过点C时，$m = \frac{5}{2}$，

    当直线$y = mx (m \neq 0)$与直线$y=x+3$平行时，$m = 1$，此时，满足条件．

    ∴$1 \leq m \leq \frac{5}{2}$满足条件．

    [图]'
