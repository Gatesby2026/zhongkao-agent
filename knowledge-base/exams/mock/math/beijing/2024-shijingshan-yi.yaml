  question: '在平面直角坐标系xOy中，抛物线$y = x - (2 + m)x + 2m$的对称轴为直线$x = t$．

    （1）求t的值（用含m的代数式表示）；

    （2）点$A(-t,y_{1})$，$B(t,y_{2})$，$C(t+1,y_3)$在该抛物线上．若抛物线与x轴的一个交点为$\left(x_{0},0\right)$，其中$0<x_{0}<2$，比较$y_{1}$，$y_{2}$，$y_{3}$的大小，并说明理由．'
  answer: （1）$t=\frac{2+m}{2}$ （2）$y_{2}<y_{3}<y_{1}$，详见解析
  solution: '【小问1详解】

    解：由题意得，对称轴$[公式]$直线$x=\frac{-(2+m)}{2}=t$，

    即$t=\frac{2+m}{2}$．

    【小问2详解】

    解：$y_{2}<y_{3}<y_{1}$．

    理由如下：

    令$y = 0$，得$x^{2}-(2+m)x+2m=0$．

    ∴$x_1=2,\ x_2=m$．

    ∴抛物线与x轴的两个交点为$(2,0)$，$(m,0)$．

    ∵抛物线与x轴的一个交点为$\left( x_{0}, 0 \right)$，其中$0<x_{0}<2$，

    ∴$0 < m < 2$．

    ∵$t=\frac{2+m}{2}$，

    ∴$1<t<2$．

    ∴$-2 < -t < -1$，$2<t+1<3$．

    设点$A(-t,y_{1})$关于抛物线的对称轴$x = t$的对称点为$A''''(n,y_1)$．

    ∵点$A(-t,y_{1})$在抛物线上，

    ∴点$A''(n,y_{1})$也在抛物线上．

    由$n-\ell=\ell-\{-\ell\}$，得$n = 3t$．

    ∴$3<3t<6$．

    ∴$t<2t+1<3t$．

    ∵抛物线的解析式为$y = x - (2 + m)x + 2m$，

    ∴此抛物线开口向上．

    当$x\quad t$时，y随x的增大而增大．

    ∵点$B(t,y_{2})$，$\alpha(t+1,y_{3})$，$A''(3t,y_1)$在抛物线上，且$t<2t+1<3t$，

    ∴$y_{2}<y_{3}<y_{1}$'
