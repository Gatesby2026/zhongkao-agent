  question: '如图，AB是$\odot\odot$的直径，CD是$\odot\odot$的弦，$CD \perp AB$于点E，点F在$\odot\odot$上且$\overline{CF}=\overline{CA}$，连接AF．

    [图]

    （1）求证：$AF = CD$；

    （2）连接$BF，BD$．若$AE = 2,\ BF = 6$，求BD的长．'
  answer: （1）详见解析 （2）$4\sqrt{5}$
  solution: '【小问1详解】

    证明：∵AB是$\odot\odot$的直径，$CD \perp AB$，

    ∴$\overline{AD}=\overline{AC}$．

    又∵$\overrightarrow{CF} = \overrightarrow{AC}$，

    ∴$\overrightarrow{CF}\cdot\overrightarrow{AC}\cdot\overrightarrow{AD}$．

    ∴$\overline{AF}=\overline{CD}$．

    ∴$AF = CD$．

    【小问2详解】

    解：如图，连接OC，连接OF，

    [图]

    设$\odot\odot$的半径为x，

    ∵AB是$\odot\odot$的直径，

    ∴$\angle AFB=90^{\circ}$，

    ∵$\overline{CF}=\overline{CA}$，

    ∴$OC \perp AF$，

    ∴$OC \parallel BF$，

    ∴$\angle1=\angle2$，

    又∵$\angle CEO = \angle AFB = 90^\circ$，

    ∴$\triangle CEO \sim \triangle AFB$，

    ∴$\frac{CO}{AB} = \frac{OE}{BF}$，即$\frac{x}{2x}=\frac{x-2}{6}$．

    解得$x=5$，

    ∴$OE = OA - AE = 3$，$BE=AB-AE=8$，

    由勾股定理得，$CE = \sqrt{OC^{2} - OE^{2}} = 4$，

    ∵AB是$\odot\odot$的直径，$CD \perp AB$，

    ∴$DE=CE=4$，

    由勾股定理得，$BD = \sqrt{DE^{2} + BE^{2}} = 4\sqrt{5}$，

    ∴BD的长为$4\sqrt{5}$．'
