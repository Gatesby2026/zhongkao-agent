  question: '如图，在四边形$ABCD$中，$AD \parallel BC,\ AB = AD$，AE平分$\angle BAD$交BC于点E，连接DE．

    [图]

    （1）求证：四边形$ABED$是菱形；

    （2）连接BD交AE于点F．若$\angle BCD = 90^\circ$，$\cos\angle DBC=\frac{\sqrt{6}}{3}$，$BD=2\sqrt{6}$，求EC的长．'
  answer: （1）详见解析 （2）1
  solution: '【小问1详解】

    证明：∵AE平分$\angle BAD$，

    ∴$\angle BAE = \angle DAE$．

    ∵$AD \parallel BC$，

    ∴$\angle DAE = \angle BEA$．

    ∴$\angle BAE = \angle BEA$，

    ∴$BE = AB$，

    ∵$AD = AB$，

    ∴$BE = AD$．

    ∵$AD \parallel BC$，即$AD \parallel BE$

    ∴四边形$ABED$是平行四边形．

    ∵$AD = AB$，

    ∴$\Box ABED$是菱形．

    【小问2详解】

    解：∵在$Rt\triangle BCD$中，$\angle C=90^{\circ}$，$\cos \angle DBC = \frac{BC}{BD} = \frac{\sqrt{6}}{3}$，

    ∴$BC=\frac{3}{2}BD=\frac{\sqrt{6}}{3}\times2\sqrt{6}=4$．

    ∵四边形$ABED$是菱形，

    ∴$AB\perp BD,\;BI=\frac{1}{2}BD=\sqrt{6}$．

    ∴在$\mathrm{Rt}\triangle BFE$中，$BE=\frac{BF}{\cos \angle FBE}=\frac{\sqrt{6}}{\frac{\sqrt{6}}{3}}=3$，

    ∴$EC = BC - BE = 4 - 3 = 1$．

