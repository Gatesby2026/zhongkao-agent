  question: '为了培养学生的爱国情感，某校在每周一或特定活动日举行庄严的升国旗仪式．该校的国旗护卫队共有18名学生，测量并获取了所有学生的身高（单位：cm），数据整理如下：

    a．18名学生的身高：

    170，174，174，175，176，177，177，177，178，

    178，179，179，179，179，181，182，183，186

    b．18名学生的身高的平均数、中位数、众数：

    | 平均数 | 中位数 | 众数 |

    | --- | --- | --- |

    | 178 | m | n |

    （1）写出表中m，n的值；

    （2）该校的国旗护卫队由升旗手、护旗手、执旗手组成，其中12名执旗手分为两组：

    | 甲组学生的身高 | 175 | 177 | 177 | 178 | 178 | 181 |

    | --- | --- | --- | --- | --- | --- | --- |

    | 乙组学生的身高 | 170 | 174 | 174 | 176 | 177 | 179 |

    对于不同组的学生，如果一组学生的身高的方差越小，则认为该组的执旗效果越好．

    据此推断：在以上两组学生中，执旗效果更好的是（填“甲组”或“乙组”）；

    （3）该校运动会开幕式的升国旗环节需要6名执旗手，因甲组部分学生另有任务，已确定四名执旗手的身高分别为175，177，178，178．在乙组选另外两名执旗手时，要求所选的两名学生与已确定的四名学生所组成的六名执旗手的身高的方差最小，则选出的另外两名学生的身高分别为和．'
  answer: （1）m的值为$178$，n的值为$179$ （2）甲组 （3）$177cm，176cm$
  solution: '【小问1详解】

    将18名学生的身高从小到大排列为：170，174，174，175，176，177，177，177，178，178，179，179，179，179，181，182，183，186，

    从中可以看出第9个数据和第10个数据分别是178，178，所以这组数据的中位数为$(178+178)\div2-178$，故$m=178$；

    其中，179出现的次数最多，所以这组数据的众数为179，故$n = 179$；

    故答案为：178，179．

    【小问2详解】

    甲组学生的身高分布于$175 \sim 181$，乙组学生的身高分布于$170 \sim 179$，

    据此可以看出甲组学生的身高波动比乙组学生的小，稳定性较大，

    所以执旗效果更好的是甲组，

    故答案为：甲．

    【小问3详解】

    根据题意，为保证方差最小，另外两名学生的身高应该在175厘米$\sim178$厘米，

    从乙组的数据可以知道，在175厘米$\sim178$厘米的身高有2个，分别是176、177，

    故答案为：176、177．'
