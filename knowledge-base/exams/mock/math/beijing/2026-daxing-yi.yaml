  stem: '在平面直角坐标系xOy中，已知点M（x1，y1），N（x2，y2），对于坐标原点O和点P给出如下定义：将点O向右（x1+x2≥0）或向左（x1+x2＜0）平移|x1+x2|个单位长度，再向上（y1+y2≥0）或向下（y1+y2＜0）平移|y1+y2|个单位长度，得到点P，称点P是点O的“（M，N）对应点”．

    （1）如图1，当点M（0，2），N（﹣4，0）时，

    ①画出点O的“（M，N）对应点”点P；

    ②若点P1（2，1）是点O“（M，N1）对应点”，则N1的坐标是　         　 ；

    （2）当点M（0，3），A（3，0）时，N是半径为1的⊙A上一点，点P是点O的“（M，N）对应点”，则线段OP的最小值是　                　 ，最大值是　                　 ；

    （3）当点M（t，0）（t＞0），B（4，0）时，N是以线段BM为半径的⊙B上一点，若⊙B上存在点P是点O的“（M，N）对应点”，直接写出t的取值范围．

    ![](figures/image16.png)'
  figure: 2026-daxing-yi/figures/image16.png
  answer: （1）①![](figures/image48.png)；②（2，﹣1）；
  solution: '解：（1）①如图所示，

    ![](figures/image49.png)

    ∵M（0，2），N（﹣4，0），

    ∴0﹣4＝﹣4＜0，2+0＝2＞0，

    ∴|x1+x2|＝|0﹣4|＝4，|y1+y2|＝|2+0|＝2，

    将点O向左平移4个单位，向上平移2个单位得到P（﹣4，2）；

    ②依题意，点P1（2，1）是点O的“（M，N1）对应点”，

    ∴从点O到P1，平移方式为向右平移2个单位向上平移1个单位，

    设N1（x，y），

    ∴$\left\{\begin{matrix} 0+x=2 \\ 2+y=1 \end{matrix}\right.$，

    解得：$\left\{\begin{matrix} x=2 \\ y=-1 \end{matrix}\right.$，

    ∴N1（2，﹣1），

    故答案为：（2，﹣1）；

    （2）如图，

    ![](figures/image50.png)

    ∵点M（0，3），A（3，0）时，N是半径为1的⊙A上一点，点P是点O的“（M，N）对应点”，

    将O向右平移3个单位，向上平移3个单位得到A''（3，3），

    ∴点P在以A''（3，3）为圆心半径为1的圆上，

    ∴$OA′=3\sqrt{2}$，

    ∴线段OP的最小值是$3\sqrt{2}-1$；最大值为$3\sqrt{2}+1$；

    故答案为：$3\sqrt{2}-1；3\sqrt{2}+1$；

    （3）点M（t，0）（t＞0），B（4，0）时，N是以线段BM为半径的⊙B上一点，

    ∴BM＝|t﹣4|，

    ∵点P是点O的“（M，N）对应点”，

    ∴P（t+xN，yN），

    如图，点P是以B′（4+t，0）为圆心，|t﹣4|为半径的圆上运动，

    依题意，点P是沿OM，ON方向平移得到的，则NP＝ON，NP∥OM，

    若⊙B上存在点P是点O的“（M，N）对应点”，则两圆相切或相交，

    当两圆相切时，

    ∴BB''＝NP＝OM＝t，

    ∵r＝|4﹣t|，OM＝t，

    ∴BB''＝2|4﹣t|，

    ∴2|4﹣t|＝t，

    解得：$t=\frac{8}{3}$或t＝8；

    当点M在B（4，0）的左侧时，$0＜t≤\frac{8}{3}$；

    ![](figures/image51.png)

    如图，当点M在B（4，0）的右侧时，t≥8；

    ![](figures/image52.png)

    综上所述，若⊙B上存在点P是点O的“（M，N）对应点”，t的取值范围为$0＜t≤\frac{8}{3}$或t≥8．'
