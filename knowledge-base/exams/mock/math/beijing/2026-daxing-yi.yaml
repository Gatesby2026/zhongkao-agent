    解得t＝﹣m或t＝5m；

    当m＞0时，﹣m＜5m，

    则MN＝|t2﹣4mt﹣5m2|$=\left\{\begin{matrix} {t}^{2}-4mt-5{m}^{2}(t＜-m或t＞5m) \\ -{t}^{2}+4mt+5{m}^{2}(-m≤t≤5m) \end{matrix}\right.$，

    函数图象如图，

    ![](figures/image41.png)

    由图象可知当t≤﹣m或1.5m≤t≤5m时，MN随t的增大而减小，

    ∵点P从点（2，0）运动到点（3，0）的过程中，MN的长随t的增大而减小，

    即2≤t≤3时，MN的长随t的增大而减小，

    ∴$\left\{\begin{matrix} 2m≤2 \\ 5m＞3 \end{matrix}\right.$，

    解得$\frac{3}{5}＜$m≤1；

    当m＜0时，﹣m＞5m，

    则MN＝|t2﹣4mt﹣5m2|$=\left\{\begin{matrix} {t}^{2}-4mt-5{m}^{2}(t＜5m或t＞-m) \\ -{t}^{2}+4mt+5{m}^{2}(5m≤t≤-m) \end{matrix}\right.$，

    函数图象如图，

    ![](figures/image42.png)

    由图象可知当t≤5m或1.5m≤t≤﹣m时，MN随t的增大而减小，

    ∵点P从点（2，0）运动到点（3，0）的过程中，MN的长随t的增大而减小，

    即2≤t≤3时，MN的长随t的增大而减小，

    ∴$\left\{\begin{matrix} 2m≤2 \\ -m＞3 \end{matrix}\right.$，

    解得m＜﹣3；

    综上，m＜﹣3或$\frac{3}{5}＜$m≤1．'
