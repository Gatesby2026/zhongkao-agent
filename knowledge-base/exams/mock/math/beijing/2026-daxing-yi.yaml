  stem: '如图，在△ABC中，∠ACB＝90°，AC＝BC，D为线段AB上一点，连接CD，∠BCD＝α（0°＜α＜45°），将线段DC绕点D逆时针旋转90°得到DE，连接BE，AE，点F是BE中点，连接DF．

    （1）连接CE，求∠ACE的度数（用含α的式子表示）；

    （2）用等式表示DF与AE的数量关系，并证明．

    ![](figures/image15.png)'
  figure: 2026-daxing-yi/figures/image15.png
  answer: （1）45°﹣α；
  solution: '解：（1）连接CE，

    ![](figures/image45.png)

    ∵将线段DC绕点D逆时针旋转90°得到DE，

    ∴∠CDE＝90°，CD＝DE，

    ∴∠DCE＝∠DEC＝45°，

    ∵∠ACB＝90°，

    ∴∠ACE+∠BCD＝45°，

    ∴∠ACE＝45°﹣∠BCD＝45°﹣α；

    （2）AE＝2DF，证明如下：

    作CG⊥AB于点G，作EH⊥AB于点H，则∠CGD＝∠DHE＝90°，

    ![](figures/image46.png)

    ∵∠ACB＝90°，AC＝BC，

    ∴$CG=\frac{1}{2}AB=AG=BG$，

    ∴将线段DC绕点D逆时针旋转90°得到DE，

    ∴∠CDE＝90°，CD＝DE，

    ∴∠EDH＝∠DCG＝90°﹣∠CDG，

    ∴△CDG≌△DEH（AAS），

    ∴DH＝CG，EH＝DG，

    ∴DH＝AG＝BG，

    ∴AH＝DG，HG＝BD，

    ∴AH＝EH，

    在AB上截取DP＝BD，则DP＝HG，

    ∴HP＝DG，

    ∴HP＝AH，

    ∵EH⊥AP，

    ∴AE＝PE，

    ∵F为BE的中点，

    ∴$DF=\frac{1}{2}PE$，

    ∴$DF=\frac{1}{2}AE$，即AE＝2DF．'
