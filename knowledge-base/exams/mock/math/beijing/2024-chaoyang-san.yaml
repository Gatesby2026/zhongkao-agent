  question: '在平面直角坐标xOyxOy中，函数$y=kx+b\,(k\neq0)$的图象经过点$A(0,1)$和$B(1,2)$，与过点$(0,4)$且平行于x轴的直线交于点C．

    （1）求该函数的解析式及点C的坐标；

    （2）当$x<3$时，对于x的每一个值，函数$y=\frac{2}{3}x+n$的值大于函数$y=kx+b\,(k\neq0)$的值且小于5，直接写出n的取值范围．'
  answer: （1）$y=x+1$，$C(3,4)$ （2）$2\leq n\leq 3$
  solution: '【小问1详解】

    解：把点$A(0,1)$，$B(1,2)$代入$y=kx+b\,(k\neq0)$得：$\begin{cases}

    b = 1 \\

    k + b = 2

    \end{cases}$，

    解得：$\left\{\begin{array}{l}k=1\\b=1\end{array}\right.$，

    ∴该函数的解析式为$y=x+1$，

    由题意知：点C的纵坐标为4，

    当$y = x + 1 = 4$时，

    解得：$x=3$，

    ∴$C(3,4)$；

    $[公式]$小问2详解】

    解：由（1）知：当$x=3$时，$y = x + 1 = 4$，

    当$x=3$时，$y=2x+n=2+n$，

    ∵当$x<3$时，函数$y=\frac{2}{3}x+n$的值大于函数$y=x+1$的值且小于5，

    ∴$4\leq2+n\leq5$，

    解得：$2\leq n\leq 3$．'
