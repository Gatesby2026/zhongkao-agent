  question: '如图，OA是$\odot\odot$的半径，BC是$\odot\odot$的弦，$OA \perp BC$于点D，AE是$\odot\odot$的切线，AE交OC的延长线于点E．若$\angle AOC = 45^\circ$，$BC = 2$，则线段AE的长为______．

