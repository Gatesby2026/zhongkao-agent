  answer: $\sqrt{2}$
  solution: '解：∵$OA \perp BC$，

    ∴$\angle ODC=90^{\circ}$，$DC = \frac{1}{2}BC = 1$．

    ∵$\angle AOC = 45^\circ$，

    ∴$\triangle ODC$为等腰直角三角形，

    ∴$OC = \sqrt{2}DC = \sqrt{2}$，

    ∴$OA = OC = \sqrt{2}$．

    ∵AE是$\odot\odot$的切线，

    ∴$\angle OAE=90^\circ$，

    ∵$\angle AOC = 45^\circ$，

    ∴$\triangle AOE$为等腰直角三角形，

    ∴$AE = OA = \sqrt{2}$．

    故答案为：$\sqrt{2}$．'
