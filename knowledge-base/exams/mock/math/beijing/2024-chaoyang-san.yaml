  question: '单板滑雪大跳台是北京冬奥会比赛项目之一，举办场地为首钢滑雪大跳台，运动员起跳后的飞行路线可以看作是抛物线的一部分，建立如图所示的平面直角坐标系，从起跳到着陆的过程中，运动员的竖直高度y（单位：m）与水平距离x（单位：m）近似满足函数关系$y = a(x - h)^2 + k (a < 0)$．

    [图]

    某运动员进行了两次训练．

    （1）第一次训练时，该运动员的水平距离x与竖直高度y的几组数据如下：

    | 水平距离 x /m | 0 | 2 | 5 | 8 | 11 | 14 |

