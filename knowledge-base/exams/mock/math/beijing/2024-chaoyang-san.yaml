    | 竖直高度 y /m | 20.00 | 21.40 | 22.75 | 23.20 | 22.75 | 21.40 |

    根据上述数据，直接写出该运动员竖直高度的最大值，并求出满足的函数关系$y = a(x - h)^2 + k (a < 0)$；

    （2）第二次训练时，该运动员的竖直高度y与水平距离x近似满足函数关系$y = -0.04(x - 9)^2 + 23.24$记该运动员第一次训练的着陆点的水平距离为d1，第二次训练的着陆点的水平距离为$d_{2}$，则$d_{1}$______$d_{2}$（填“>”“=”或“<”）．'
  answer: （1）23.20 m；$y = -0.05(x - 8)^2 + 23.20$ （2）$\lt$
  solution: '【小问1详解】

    解：根据表格中的数据可知，抛物线的顶点坐标为：$(8,23.20)$，

    ∴$h=8$，$k = 23.20$，

    即该运动员竖直高度的最大值为23.20 m，

    根据表格中的数据可知，当$x = 0$时，$y = 20.00$，代入$y=a(x-8)^{2}+23.20$得：

    $20.00=a(0-8)^{x}+23.20$，解得：$a = -0.05$，

    ∴函数关系关系式为：$y = -0.05(x - 8)^2 + 23.20$．

    【小问2详解】

    设着陆点的纵坐标为t，则第一次训练时，$t = 0.051 \times (-8)^{2} + 23.20$，

    解得：$x=8+\sqrt{20(23.20-t)}$或$x=8-\sqrt{20(23.20-\tau)}$，

    ∴根据图象可知，第一次训练时着陆点的水平距离$d_{1}=8+\sqrt{26(23.20-\bar{c})}$，

    第二次训练时，$t = -0.04(x - 9)^2 + 23.24$，

    解得：$x=9+\sqrt{25(23.24-x)}$或$x=9-\sqrt{25(23.24-x)}$，

    ∴根据图象可知，第二次训练时着陆点的水平距离$d_{2}=9+\sqrt{25(23.24-t)}$，

    ∵$20(23.20-r)<25(23.24-r)$，

    ∴$\sqrt{20(23.20-t)}<\sqrt{28(23.24-t)}$，

    ∴$d_{1}<d_{2}$．

    故答案为：$\lt$．'
