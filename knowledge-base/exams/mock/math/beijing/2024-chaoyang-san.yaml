  question: '如图，菱形ABCD的对角线AC，BD交于点O，点E，F分别在DA，BC的延长线上，且BE⊥ED，CF=AE．

    [图]

    （1）求证：四边形EBFD是矩形；

    （2）若$AB = 5$，$\cos\angle OBC=\frac{4}{5}$，求BF的长．'
  answer: （1）见解析 （2）BF的长为$\frac{32}{5}$．
  solution: '【小问1详解】

    证明：∵四边形ABCD是菱形，

    ∴AB=CD，AB∥CD，AD∥BC，

    ∴∠EAB=∠ADC，∠FCD=∠ADC，

    ∴∠EAB=∠FCD，

    ∵AE=CF，

    ∴△ABE≌△CDF(SAS)，

    ∴BE=DF，∠F=∠E=90°，

    ∴BE∥DF，

    ∴四边形EBFD是平行四边形，

    ∵∠E=90°，

    ∴四边形EBFD是矩形；

    【小问2详解】

    解：∵四边形ABCD是菱形，AB=5，

    ∴OB=OD，AC⊥BD，AB=BC=5，

    在Rt△BCO中，$\cos\angle OBC=\frac{4}{5}$，BC=5，

    ∴$\frac{OB}{BC}=\frac{4}{5}$，

    ∴OB=4，则BD=2OB=8，

    在Rt△BDF中，$\cos\angle OBC=\frac{4}{5}$，BD=8，

    ∴$\frac{BF}{BD} = \frac{4}{5}$，

    ∴BF=$\frac{4}{5}$×8=$\frac{32}{5}$．'
