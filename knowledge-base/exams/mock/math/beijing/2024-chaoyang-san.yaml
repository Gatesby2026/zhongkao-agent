  question: '已知关于x的一元二次方程$\frac{1}{12}x^{2}-\pi x+\pi r-5=0$．

    （1）求证：此方程总有两个不相等的实数根；

    （2）若m为整数，且此方程的两个根都是整数，写出一个满足条件的m的值，并求此时方程的两个根．'
  answer: （1）见解析； （2）当m=1时，$x=4$或$x=-2$满足题意（答案不唯一）．
  solution: '【小问1详解】

    解：∵二次函数为$\frac{1}{12}x^{2}-\pi x+\pi r-5=0$，

    ∴$a = \frac{1}{2}$，$b = -m$，$c = m - 5$．

    ∴$\Delta=b^{2}-4ac=m^{2}-4\times\frac{1}{2}(m-5)=m^{2}-2m+10=(m-1)^{2}+9>0$，

    ∴此方程总有两个不相等的实数根．

    【小问2详解】

    ∵当m=1时，原方程为：$\frac{1}{2}x^{2}-x-4=0$，

    ∴原式可化为$x^{2}-2x-8=0$，则$(x-1)^2=9$，

    ∴$x=4$或$x=-2$，

    ∴当m=1时，$x=4$或$x=-2$满足题意（答案不唯一）．'
