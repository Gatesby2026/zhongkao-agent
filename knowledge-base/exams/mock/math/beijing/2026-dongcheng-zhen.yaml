- id: 16
  type: 填空
  score: 2
  stem: '某新能源电池厂有40台专用设备，用于生产两种核心零件：正极片和负极片．按照每台设备每天生产的合格的正、负极片的效率分为以下三类：

    | 类别 | 正极片（片/台） | 负极片（片/台） | 设备数量（台） |

    |---|---|---|---|

    | 甲类 | 20 | 200 | 15 |

    | 乙类 | 12 | 100 | 15 |

    | 丙类 | 8 | 70 | 10 |

    每台设备每天只能生产一种零件．已知每1片正极片需要搭配4片负极片才能组装成一个完整电池．

    （1）若只由甲类专用设备工作，则一天最多可生产　      　 个电池；

    （2）若40台专用设备都在工作，则一天最多可生产　      　 个电池．'
  answer: ''
  solution: '解：（1）甲设备有15台，

    ∴设甲设备有x台生产正极片，则有（15﹣x）台生产负极片，

    ∴正极片的数量为20x，负极片的数量为200（15﹣x），

    ∵每1片正极片需要搭配4片负极片才能组装成一个完整电池

    ∴4×20x＝200（15﹣x），

    解得，$x=\frac{75}{7}≈10.71$，

    当x＝10时，正极片的数量为20x＝20×10＝200，负极片的数量为200（15﹣x）＝200×（15﹣10）＝1000，

    ∴200个正极片与800个负极片可以组装成200个电池，此时负极片剩余200；

    当x＝11时，正极片的数量为20x＝20×11＝220，负极片的数量为200（15﹣x）＝200×（15﹣11）＝800，

    ∴200个正极片与800个负极片可以组装成200个电池，此时正极片剩余20；

    ∴若只由甲类专用设备工作，则一天最多可生产200个电池，

    故答案为：200；

    （2）若40台专用设备都在工作，

    甲类、乙类、丙类生产正极片与负极片的比例分别为：$\frac{200}{20}=10$，$\frac{100}{12}≈8.33$，$\frac{70}{8}≈8.75$，

    ∴甲类生产负极片效率最大，其次是丙类，最后是乙类，

    ∴生产时，尽量优先考虑甲类生产负极片，

    情况一：若甲类15台生产负极片，乙类、丙类生产正极片，

    ∴正极片的数量12×15+8×10＝260，负极片的数量200×15＝3000，

    ∵260×4＝1040＜3000，

    ∴此时，能组装成一个完整电池的数量是260个，而负极片剩余1960个，

    ∴甲类的15台设备应该要分出一部分生产负极片，

    ∴设甲类生产正极片的有y台，则生产负极片的有（15﹣y）台，让乙类、丙类生产正极片，

    ∴生产正极片的有y+15+10＝25+y（台），生产负极片的有（15﹣y）台，

    ∴正极片的数量为20y+12×15+8×10＝20y+260，负极片的数量为200（15﹣y），

    ∴4（20y+260）＝200（15﹣y），

    解得y＝7，

    ∴生产正极片的有25+y＝25+7＝32台，则甲类生产负极片的有8台，

    ∴正极片的数量为20y+260＝20×7+260＝400，负极片的数量为200×8＝1600，

    此时，400个正极片与1600个负极片可以组装成400个电池．

    故答案为：400．'
