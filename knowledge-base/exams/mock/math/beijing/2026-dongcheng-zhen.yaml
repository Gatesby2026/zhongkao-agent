  figure: 2026-dongcheng-zhen/figures/image4.png
  answer: A
  solution: '解：如图所示，连接正方形对角交于点O，以点O为圆心，以OD为半径画圆，则点D，E，F，G在圆O上，连接OA，OB，OC，并延长，交圆O于点M，N，P，


    ∵△ABC是等边三角形，

    ∴$∠AOB=∠AOC=∠BOC=\frac{360°}{3}=120°$，

    ∴MN＝MP＝NP，即△MNP是等边三角形，

    ∴当点M，N，P在圆上运动时，对应的△ABC在正方形内部运动，

    ∴等边三角形有无数个，故①正确；

    如图所示，过点A作AM⊥DG，则∠D＝∠E＝∠AMD＝90°，


    ∴四边形AMDE是矩形，

    ∴AM＝DE＝1，

    ∵AB≥AM，且等边三角形的周长C△ABC＝3AB，

    ∴AB最小值为1，

    ∴等边三角形的周长的最小值为3，故②正确；

    如图所示，过点A作AN⊥BC，$cos∠BAN=cos30°=\frac{AN}{AB}=\frac{\sqrt{3}}{2}$，

    ∴$AN=\frac{\sqrt{3}}{2}AB$，

    ∴${S}_{△ABC}=\frac{1}{2}AB⋅AN=\frac{1}{2}×AB×\frac{\sqrt{3}}{2}AB=\frac{\sqrt{3}}{4}A{B}^{2}$，

    当AB最大时，等边三角形的面积最大，

    如图所示，当三角形一个顶点与正方形的一个顶点重合时，


    ∴$∠DAB=∠FAC=\frac{1}{2}(∠DAF-∠BAC)=\frac{1}{2}×(90°-60°)=15°$，

    又∵AD＝AF，AB＝AC，

    ∴△ADB≌△AFC（SAS），

    ∴BD＝CF，

    设BD＝CF＝x（0＜x＜1），则BG＝CG＝1﹣x，

    在Rt△ABD中，AB2＝AD2+BD2＝1+x2，

    在Rt△BCG中，BC2＝2BG2＝2×（1﹣x）2＝2x2﹣4x+2，

    ∵AB＝BC，

    ∴AB2＝BC2

    ∴1+x2＝2x2﹣4x+2，

    整理得，x2﹣4x+1＝0，

    解得，${x}_{1}=2-\sqrt{3}$，${x}_{2}=2+\sqrt{3}$（舍去），

    ∴$BD=2-\sqrt{3}$，

    ∴$A{B}^{2}=B{C}^{2}=2(1-2+\sqrt{3}{)}^{2}=8-4\sqrt{3}$，

    根据上述计算可知，AB≥1，

    ∴AB2的最大值为$(8-4\sqrt{3})$，

    ∴${S}_{△ABC}=\frac{\sqrt{3}}{4}×(8-4\sqrt{3})=2\sqrt{3}-3$，故③错误；

    综上所述，正确的有①②，

    故选：A．'
