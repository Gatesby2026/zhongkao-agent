    ②∵OC＝2，

    ∴点C在以点O为圆心，2为半径的圆上，

    设A（0，1），$C(\sqrt{3}，1)$，

    则此时AC一定是⊙O的切线，只需满足△ABC为锐角三角形，则△ABC为直角三角形即可找到临界值，

    如图，当∠B1AC＝90°时，


    AB1为圆的直径，即AB1＝2，

    如图，当∠AB2C＝90°时，过点O作OD⊥AB于D，


    ∵OD⊥AB2，

    ∴设AD＝B2D＝x，则AB2＝2x，

    ∵∠OAC＝∠AB2C＝90°，

    ∴∠OAD＝∠ACB2＝90°﹣∠CAB2，

    ∴$sin∠OAD=sin∠AC{B}_{2}=\frac{OD}{OA}=\frac{A{B}_{2}}{AC}$，

    ∵OA＝1，AD＝x，

    ∴$OD=\sqrt{1-{x}^{2}}$，

    则$\frac{\sqrt{1-{x}^{2}}}{1}=\frac{2x}{\sqrt{3}}$，

    解得$x=\frac{\sqrt{21}}{7}$，x$=-\frac{\sqrt{21}}{7}$（不符题意，舍去），

    则AB2＝2x$=\frac{2\sqrt{21}}{7}$，

    则当$\frac{2\sqrt{21}}{7}＜AB＜2$时，△ABC为锐角三角形，即点C是⊙O的弦AB的“锐切点”，

    故答案为：$\frac{2\sqrt{21}}{7}＜AB＜2$；

    （2）已知点T（t，0）（t＞0），⊙O经过点T，则⊙O的半径为t，

    由题可知，AB＝t，则△ABO为等边三角形，

    如图，过点B分别作BC1∥y轴，BC2⊥AB交过点A垂直于y轴的直线于点C1C2，

    连接OC1OC2，


    ∵∠OAB＝∠AOB＝∠ABO＝60°，

    ∴∠BAC1＝30°，

    ∴$cos30°=\frac{A{C}_{1}}{AB}=\frac{AB}{A{C}_{2}}$，

    则$A{C}_{1}=\frac{\sqrt{3}}{2}t$，A${C}_{2}=\frac{2\sqrt{3}}{3}t$，

    当点C位于C1，C2之间时，△ABC为锐角三角形，此时$O{C}_{1}=\frac{\sqrt{7}}{2}t$，$O{C}_{2}=\frac{\sqrt{21}}{3}t$，

    以点O为圆心，分别以$O{C}_{1}=\frac{\sqrt{7}}{2}t$，O${C}_{2}=\frac{\sqrt{21}}{3}t$为半径画圆，长为$2\sqrt{7}$的线段在圆弧区域内时，线段上的任意一点都是⊙O的长为的弦的“锐切点”，

    如图，与圆环内圆相切时，是线段在此范围内的最长状态，仅有此时存在EF使得条件成立时，圆的半径最小，连接OF；


    ∴$EF=2\sqrt{7}$，

    ∴$FD=\sqrt{7}$，

    在 Rt△FDO 中，$(\sqrt{7}{)}^{2}+(\frac{\sqrt{7}}{2}t{)}^{2}=(\frac{\sqrt{21}}{3}t{)}^{2}$，

    解得$t=2\sqrt{3}$t$=-2\sqrt{3}$（不符合题意，舍去），

    即$t＞2\sqrt{3}$．'
