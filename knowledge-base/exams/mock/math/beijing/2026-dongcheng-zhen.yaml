  stem: 方程$\frac{3}{x+1}-\frac{1}{x}=0$的解为　                  　 ．
  answer: ''
  solution: '解：$\frac{3}{x+1}-\frac{1}{x}=0$，

    方程两边同乘以最简公分母x（x+1）得，3x﹣（x+1）＝0，

    去括号得3x﹣x﹣1＝0，

    合并同类项得2x＝1，

    解得$x=\frac{1}{2}$，

    经检验，当$x=\frac{1}{2}$时，x（x+1）≠0，

    所以$x=\frac{1}{2}$是原方程的解，

    故答案为：$x=\frac{1}{2}$．'
