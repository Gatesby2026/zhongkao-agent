  solution: '解：（1）①补全图形如下：

    ![](figures/image41.png)

    ②证明：∵∠BAC＝120°，AB＝AC，AD⊥BC，

    ∴∠CAD＝60°，∠ACD＝30°，

    ∴AC＝2AD，

    又∵CE＝2AD，

    ∴AC＝CE，

    ∵∠CAE＝60°，

    ∴△ACE为等边三角形，

    ∴AE＝AC＝AB，

    又∵E，F关于点A对称，

    ∴AE＝AF，

    ∴AF＝AB；

    （2）∠CBF＝45°$+\frac{1}{2}$∠BCE；

    证明：延长BA到G，使得AB＝AG，连接EG，CG．

    ![](figures/image42.png)

    ∵E，F关于点A对称，

    ∴AE＝AF，

    在△ABF和△AGE中，

    $\left\{\begin{matrix} AB=AG \\ ∠BAF=∠GAE \\ AF=AE \end{matrix}\right.$，

    ∴△ABF≌△AGE（SAS），

    ∴∠ABF＝∠AGE，

    ∵AB＝AG，BD＝CD，

    ∴AD为△BCG的中位线，

    ∴CG＝2AD，

    ∵CE＝2AD，

    ∴CG＝CE，

    ∴$∠CGE=∠CEG=\frac{1}{2}(180°-∠ECG)=\frac{1}{2}(180°-90°-∠BCE)=45°-\frac{1}{2}∠BCE$，

    ∵∠CBF＝∠ABF+∠ABC＝∠AGE+90°﹣∠BGC＝∠AGE+90°﹣（∠AGE+∠CGE）＝90°﹣∠CGE，

    ∴$∠CBF=90°-(45°-\frac{1}{2}∠BCE)=45°+\frac{1}{2}∠BCE$．'
