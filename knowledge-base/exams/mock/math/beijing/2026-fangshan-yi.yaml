  solution: '解：$\frac{2(a-b)+6b}{{a}^{2}+4ab+4{b}^{2}}$

    $=\frac{2a-2b+6b}{(a+2b{)}^{2}}$

    $=\frac{2a+4b}{(a+2b{)}^{2}}$

