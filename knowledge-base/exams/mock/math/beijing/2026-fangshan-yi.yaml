  stem: '在平面直角坐标系xOy中，点A（1，y1）为抛物线y＝x2﹣2ax上一点，点B坐标为（a+2，y1），点A与点B不重合．

    （1）求此抛物线的对称轴（用含a的代数式表示）；

    （2）连接AB．

    ①当线段AB与抛物线有且只有1个公共点时，直接写出a的取值范围；

    ②在①的条件下，过点B作x轴的垂线交抛物线于点C，若线段BC的长随a的增大而增大，求a的取值范围．'
  answer: （1）直线x＝a；
  solution: '解：（1）∵抛物线y＝x2﹣2ax，

    ∴抛物线的对称轴为直线x$=-\frac{-2a}{2×1}=$a；

    （2）①∵点A（1，y1）点B为（a+2，y1），

    ∴AB∥x轴，

    ∵点A（1，y1）为抛物线y＝x2﹣2ax上一点，

    ∴点A（1，y1）关于对称轴的对称点为（2a﹣1，y1），

    ∵线段AB与抛物线有且只有1个公共点，

    ∴2a﹣1＞a+2或2a﹣1≤1，

    解得a＞3或a≤1．

    故a＞3或a≤1且a≠﹣1；

    ②∵点A（1，y1）为抛物线y＝x2﹣2ax上一点，点B坐标为（a+2，y1），

    ∴y1＝1﹣2a，

    ∴B（a+2，1﹣2a），

    把x＝a+2代入y＝x2﹣2ax得，y＝（a+2）2﹣2a（a+2）＝﹣a2+4，

    ∴C（a+2，﹣a2+4），

    ∴BC＝|1﹣2a﹣（﹣a2+4）|＝|a2﹣2a﹣3|，

    当BC＝a2﹣2a﹣3＝（a+1）（a﹣3），

    ∴a＜﹣1或a＞3时，BC＞0，

    ∵线段BC的长随a的增大而增大，

    ∴a＞3；

    当BC＝﹣a2+2a+3＝﹣（a+1）（a﹣3），

    ∴﹣1＜a＜3时，BC＞0，

    ∵线段BC的长随a的增大而增大，

    ∴﹣1＜a＜1；

    综上，满足条件的a的取值范围是﹣1＜a＜1或a＞3．'
