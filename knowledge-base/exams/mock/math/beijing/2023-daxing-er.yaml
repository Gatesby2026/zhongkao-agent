  question: '某公司需要采购甲种原料41箱，乙种原料31箱．现安排A，B，C三种不同型号的卡车来运输这批原料，已知7箱甲原料和5箱乙原料可装满一辆A型卡车；5箱甲原料和7箱乙原料可装满一辆B型卡车；3箱甲原料和2箱乙原料可装满一辆C型卡车．A型卡车运输费用为一次2000元，B型卡车运输费用为一次1800元，C型卡车运输费用为一次1000元．

    （1）如果安排5辆A型卡车、1辆B型卡车、1辆C型卡车运输这批原料，需要运费________元；

    （2）如果要求每种类型的卡车至少使用一辆，则运输这批原料的总费用最低为________元．'
  answer: ①.12800 ②.12600
  solution: '（1）安排5辆A型卡车、1辆B型卡车、1辆C型卡车运输的费用为：

    $5\times2000+1\times1800+1\times1000=12800$元

    故答案为：12800．

    （2）当每个卡车至少使用1辆时，余下甲原料有$41-15=26$箱，乙原料有$31-14=17$箱，

    设余下的原料中，需要A型车a辆，B型车b辆，C型车c辆

    则满足$\begin{aligned}

    7a+5b+3c &= 26 \\

    5a+7b+2c &= 17

    \end{aligned}$

    对比可知，1辆A型车和2辆C型车的费用相等，但是1辆A型车运输的却比2辆C型车运输的多，故故为了使总费用最少，余下原料的分配中，减少对C车的选择；

    且甲原料最多，而三个车型中，A型车对甲原料的运输的最多，在余下原料的分配中，优先考虑A型车；

    故根据余下的原料可能的方案有：

    ①A型车4辆，B型车0辆，C型车0辆，费用为$5\times2000+1\times1800+1\times1000=12800$

    ②A型车3辆，B型车1辆，C型车0辆，费用为$4\times2000+2\times1800+|x|900=12600$

    ③A型车3辆，B型车2辆，C型车0辆，费用比②高，不考虑

    ④A型车3辆，B型车3辆，C型车0辆，费用比②高，不考虑

    即随着B型车选择的增多，余下的甲原料额外需要增加A型车取运输，故③，④不考虑、

    故答案为：12600'
