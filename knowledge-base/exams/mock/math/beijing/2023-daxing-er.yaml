  question: '如图，在$\triangle ABC$中，$AB = AC$，$AD \perp BC$于点D，延长DC到点E，使$CE = CD$．过点E作$EF \parallel AD$交AC的延长线于点F，连接AE，DF．

    [图]

    （1）求证：四边形$ADFE$是平行四边形；

    （2）过点E作$EG \perp DF$于点G，若$BD = 2$，$AE = 5$，求EG的长．'
  answer: （1）见解析 （2）$\frac{12}{5}$
  solution: '【小问1详解】

    证明：∵$EF \parallel AD$，

    ∴$\angle DAC = \angle EFC$．

    ∵$\angle DAC = \angle EFC, \angle ACD = \angle FCE, CD = CE$，

    ∴$\triangle ACD\cong\triangle FCE$，

    ∴$AD = EF$．

    ∵$AD \parallel EF,\ AD = EF$，

    ∴四边形$ADFE$是平行四边形．

    【小问2详解】

    过点E作$EG \perp DF$于点G

    [图]

    ∵$AB = AC$，$AD \perp BC$，$CD = 2$

    ∴$BD=CD=2$，

    ∵$CD = CE$，

    ∴$CE = 2$，

    ∴$DF = CD + CE = 4$．

    ∵$AE = 5$，$AD \perp BC$，

    ∴$AD=\sqrt{AE^{2}-DE^{2}}$，

    ∴$AD = 3$．

    ∵四边形$ADFE$是平行四边形，

    ∴$AE = DF = 5$，

    ∴$S_{\triangle ADFE}=AD\cdot DE=DF\cdot EG$，即$3\times4=5EG$

    ∴$EG = \frac{12}{5}$．'
