  question: '如图，点B，E，C，F在一条直线上，$AC \parallel DF$，$BE = CF$，只需添加一个条件即可证明$\triangle ABC \cong \triangle DEE$，这个条件可以$[公式]$________（写出一个即可）．

    [图]'
  answer: $AC = DF$或$\angle A = \angle D$或$\angle ABC = \angle DEF$或$AB \parallel DE$（答案不唯一）．
  solution: '解：∵$AC\parallel DF$，

    ∴$\angle ACB = \angle DFE$，

    ∵$BE = CF$，

    ∴$BE + EC = CF + EC$，即$BC = EF$，

    则有边角AS两个条件，要添加一个条件分三种情况，

    （1）根据“SAS”，则可添加：$AC = DF$，

    （2）根据“ASA”，则可添加：$\angle ABC = \angle DEF$或$AB \parallel DE$，

    （3）根据“AAS”，则可添加：$\angle A = \angle D$，

    故答案为：$AC = DF$或$\angle ABC = \angle DEF$或$AB \parallel DE$或$\angle A = \angle D$（答案不唯一）．'
