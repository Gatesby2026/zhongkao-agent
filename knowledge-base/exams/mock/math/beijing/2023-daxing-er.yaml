  question: '某中学为普及天文知识，举行了一次知识竞赛（百分制）．为了解七、八年级学生的答题情况，从中各随机抽取了40名学生的成绩，并对数据（成绩）进行了整理、描述和分析．下面给出了部分信息．

    a．七年级学生竞赛成绩的频数分布表：

    | 成绩 | 频数 | 频率 |

    | --- | --- | --- |

    | $50 \leq x < 60$ | 2 | 0.05 |

    | $60 \leq x < 70$ | 4 | m |

    | $70 \leq x < 80$ | 10 | 0.25 |

    | $80 \leq x < 90$ | 14 | 0.35 |

    | $90 \leq x \leq 100$ | 10 | 0.25 |

    | 合计 | 40 | 1.00 |

    b．八年级学生竞赛成绩的扇形统计图：

    [图]

    c．八年级学生竞赛成绩在$80 \leq x < 90$这一组的数据是：80，80，82，83，83，84，86，86，87，88，88，89，89，89

    d．七、八年级学生竞赛成绩的中位数如下：

    |  | 中位数 |

    | --- | --- |

    | 七年级 | 81 |

    | 八年级 | n |

    根据以上信息，回答下列问题：

    （1）写出表中m，n的值：$m =$________，$n =$________；

    （2）此次竞赛中，抽取的一名学生的成绩为83分，在他所在的年级，他的成绩超过了一半以上被抽取的学生的成绩．他是哪个年级的学生，请说明理由；

    （3）该校八年级有200名学生，估计八年级竞赛成绩80分及80分以上的学生共有________人．'
  answer: （1）0.10，85 （2）七年级，理由见解析 （3）130
  solution: '【小问1详解】

    频率为：$m=1-0.05-0.25-0.35-0.25=0.10$

    八年级的成绩中，$60 \leq x < 70$的人有$40\times15\%=6$人，$70 \leq x < 80$的人有$40\times20\%=8$人，$80 \leq x < 90$的人有$40\times35\%=14$人，$90 \leq x \leq 100$的人有$40\times30\%=12$人，

    故中间两个数是$80 \leq x < 90$这组中的84和86，故中位数为：$\frac{84+86}{2}=85$

    故答案为：0.10，85．

    【小问2详解】

    七年级

    理由如下：因为被抽取的七年级学生成绩的中位数是81，81<83，所以该生的成绩超过了一半以上被抽取的七年级学生的成绩；因为被抽取的八年级学生成绩的中位数是85，83<85，所以该生的成绩低于一半被抽取的八年级学生的成绩；

    所以该名学生是七年级学生．

    【小问3详解】

    在抽取的40人中，八年级竞赛成绩80分及80分以上的学生占抽取人数的$35\%+30\%=65\%$

    故估计八年级竞赛成绩80分及80分以上的学生共有$200\times65\%=130$人

    故答案为：130．'
