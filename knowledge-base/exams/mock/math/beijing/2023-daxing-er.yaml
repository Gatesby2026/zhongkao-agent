    （2）第二次训练时，该运动员的竖直高度y与水平距离x近似满足函数关系$y=-0.25(x-22)^{2}+1.21$．记该运动员第一次训练落入沙坑点的水平距离为$d_{1}$，第二次训练落入沙坑点的水平距离为$d_{2}$，则$d_{1}$________$d_{2}$(填“$\gt$”“$=$”或“$\gt$”)．'
