  question: '在平面直角坐标系xOy中，函数$y=kx+b(k\neq0)$的图象由函数$y=\frac{1}{2}x$的图象平移得到，且经过点$(-2,0)$．

    （1）求该函数的解析式；

    （2）当$x^{2}$时，对于x的每一个值，函数$y = x + m$的值大于函数$y=kx+b(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）$y=\frac{1}{2}x+1$ （2）$m>0$
  solution: '【小问1详解】

    ∵函数$y=kx+b(k\neq0)$的图象平行于函数$y=\frac{1}{2}x$的图象，

    ∴$y=\frac{1}{2}x+b$，

    把$(-2,0)$代入，得：$0=\frac{1}{2}\times(-2)+b$，

    解得，$b = 1$，

    ∴该函数的表达式为$y=\frac{1}{2}x+1$．

    【小问2详解】

    如图所示，

    [图]

    当$x=2$时，$x + \pi = -\frac{1}{2}x + 1$，即$2+m=\frac{1}{2}\times 2+1$

    解得，$m = 0$，

    所以，当$x^{2}$时，对于x的每一个值，函数$y = x + m$的值大于函数$y=kx+b(k\neq0)$的值，此时$m > 0$．'
