  answer: C
  solution: '解：A．$b^{3}\cdot b^{3}=b^{3-5}=b^{8}$，故该选项错误，不符合题意；

    B．$(-ab)^{2}=a^{2}b^{2}$，故该选项错误，不符合题意；

