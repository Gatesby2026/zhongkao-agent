  question: '如图1，点P，Q分别从正方形$ABCD$的顶点A，B同时出发，沿正方形的边逆时针方向匀速运动，若点Q的速度是点P速度的2倍，当点P运动到点B时，点P，Q同时停止运动．图2是点P，Q运动时，$\mathrm{VBPQ}$的面积y随时间x变化的图象，则正方形$ABCD$的边长是（）

    [图]

    A.2

    B.$2\sqrt{2}$

    C.4

    D.8'
  answer: C
  solution: '当点Q在CD上运动时，$\mathrm{VBPQ}$的面积为$\frac{1}{2}\times PB\times BC$

    当$x=2$时，$\mathrm{VBPQ}$的面积为4

    即$\frac{1}{2} \times PB \times BC = 4$

    此时点P为AB的中点

    故$\frac{1}{2} \times PB \times BC - \frac{1}{2} \times \left(\frac{1}{2} \times BC - 4\right) \times BC$

    解得$BC = 4$

    故选：C．'
