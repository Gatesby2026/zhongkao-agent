  question: '已知：如图，线段AB．

    求作：$\triangle ABC$，使得$AC = BC$，且$\angle ACB=30^{\circ}$．

    [图]

    作法：①分别以点A和点B为圆心，AB长为半径画弧，两弧在AB的上方交于点D，下方交于点E，作直线DE；

    ②以点D为圆心，AD长为半径画圆，交直线DE于点C，且点C在AB的上方；

    ③连接$AC, BC$．

