  question: '方程组$\begin{cases}

    x + y = -2, \\

    2x - y = 5

    \end{cases}$的解是________．'
  answer: $\left\{\begin{array}{l}x=1,\\y=-3.\end{array}\right.$
  solution: '由$\begin{cases}

    x + y = -2 \\

    2x - y = 5

    \end{cases}$，

    $① + ②$得：$3x=3$，

    解得：$x = 1$，

    把$x = 1$代入$1$得，$1+y=-2$，

    解得：$y = -3$，

    ∴方程组的解为：$\left\{\begin{array}{l}x=1\\y=-3\end{array}\right.$，

    故填：$\left\{\begin{array}{l}x=1\\y=-3\end{array}\right.$．'
