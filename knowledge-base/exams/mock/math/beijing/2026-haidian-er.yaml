  score: 6
  stem: '在平面直角坐标系$x O y$中，$A \left(\right. - a , m \left.\right)$，$B\left(3a−6,n\right)$是抛物线$y = a x^{2} - 2 a^{2} x \left(\right. a \neq 0 \left.\right)$上不重合的两点．

    （1）当$a = 1$时，比较$m$和$n$的大小，并说明理由；

    （2）记抛物线在点$A$，$B$之间的部分（含点$A$，$B$）为图形$G$，过抛物线上一点$P\left(a+2,t\right)$作直线$l$垂直于$y$轴．若直线$l$与图形$G$有且只有一个公共点，求$a$的取值范围．'
  answer: （1）$m < n$ （2）$- 1 < a < 0$ 或 $0 < a \leq 1$ 或 $2 \leq a < 4$
  solution: '（1）代入计算即可求解；

    （2）分$a > 0$和$a < 0$两种情况讨论，利用二次函数的性质求解即可．

    （1）

    解：当$a = 1$时，抛物线为$y = x^{2} - 2 x$，

    ∵$A \left(\right. - 1 , m \left.\right)$，$B \left(\right. - 3 , n \left.\right)$是抛物线$y = x^{2} - 2 x$上的点，

    ∴$m = 3$，$n = 1 5$，

    ∴$m < n$；

    （2）

    解：抛物线对称轴为$x = a$，

    ∵过抛物线上的点$P \left(\right. a + 2 , t \left.\right)$作直线$l \bot y$轴，$a + 2 > a$，

    ∴直线$l$与抛物线的另一个交点为点P关于$x = a$的对称点$P^{''} \left(\right. a - 2 , t \left.\right)$，

    若$a > 0$，则当$x \geq a$时，y随x的增大而增大，当$x \leq a$时，y随x的增大而减小，

    ①若$3 a - 6 < - a$，则$0 < a < \frac{3}{2}$，

    ∵$3 a - 6 < - a < a$，

    ∴当$3 a - 6 \leq x \leq - a$时，y随x的增大而减小，

    ∵直线$l$与图形G有且只有一个公共点，

    ∴$3 a - 6 \leq a - 2 \leq - a$，

    ∴$a \leq 1$，

    ∴$0 < a \leq 1$符合题意，

    ②若$- a < 3 a - 6 \leq a$，则$\frac{3}{2} < a \leq 3$，

    ∴当$- a \leq x \leq 3 a - 6$时，y随x的增大而减小，

    ∵直线$l$与图形G有且只有一个公共点，

    ∴$- a \leq a - 2 \leq 3 a - 6$，

    ∴$a \geq 2$，

    ∴$2 \leq a \leq 3$符合题意；

    ③若$3 a - 6 > a$，则$a > 3$，

    ∵$- a < a < 3 a - 6$，

    ∴当$- a \leq x \leq a$时，y随x的增大而减小

    当$a≤x≤3a−6$ 时，y随x的增大而增大，

    设点$B \left(\right. 3 a - 6 , n \left.\right)$关于$x = a$的对称点为$B^{''} \left(\right. - a + 6 , n \left.\right)$，

    则$−a<−a+6<a$ ，

    ∴$m > n$，

    ∵直线$l$与图形G有且只有一个公共点，

    ∴$−a≤a−2<−a+6$ ，

    ∴$1 \leq a < 4$，

    ∴$3 < a < 4$符合题意；

    若$a < 0$，则当$x \geq a$时，y随x的增大而减小，当$x \leq a$时，y随x的增大而增大，

    ∵$3a−6<a<−a$ ，

    ∴$3a−6≤x≤a$ 时，y随x的增大而增大，

    当$a \leq x \leq - a$时，y随x的增大而减小，

    设点$A \left(\right. - a , m \left.\right)$关于$x = a$的对称点为$A^{''} \left(\right. 3 a , m \left.\right)$，

    ∵$3a−6<3a<a$ ，

    ∴$n < m$，

    ∵直线$l$与图形G有且只有一个公共点，

    ∴$3 a - 6 \leq a - 2 < 3 a$，

    ∴$- 1 < a \leq 2$，

    ∴$- 1 < a < 0$符合题意，

    综上，a的取值范围是$- 1 < a < 0$或$0 < a \leq 1$或$2 \leq a < 4$．'
