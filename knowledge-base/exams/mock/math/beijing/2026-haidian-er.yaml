  stem: '如图，直线$y = k x + b \left(\right. k \langle 0 , b \rangle 0 \left.\right)$与$x$轴、$y$轴分别交于点$A$，$B$，以$O A$为对角线作菱形$O M A N$，且点$N$在第一象限，给出下面三个结论：


    ①当$k = - \frac{1}{2}$，$b = 2$时，菱形$O M A N$有无数个；

    ②当$b = 2$时，对于$k$的每一个确定的值，都存在菱形$O M A N$，使得该菱形的周长与$\triangle A O B$的周长相等；

    ③当点$N$在$A B$上时，若$A \left(\right. 1 0 - 2 b , 0 \left.\right)$，则菱形$O M A N$的面积有最大值．

    上述结论中，所有正确结论的序号是（     ）'
  options:
