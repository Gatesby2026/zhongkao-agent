  stem: '某地推出4种特色农产品，每种农产品货源充足，均为独立包装且不可拆分．各农产品每包的重量与价值如下表：

    | 农产品 | A | B | C | D |

    |---|---|---|---|---|

    | 重量（kg） | 7 | 12 | 8 | 5 |

    | 价值（元） | 60 | 100 | 58 | 45 |

    在某批农产品的销售中，根据客户需求，助农志愿者使用纸箱装运农产品，且每箱所装农产品的总重量不超过28kg．

    （1）若每箱只装同一种农产品，则一箱农产品的总价值最大是________元；

    （2）若每箱中每种农产品最多装$2$包，则一箱农产品的总价值最大是________元．'
  answer: ①. $2 4 0$    ②. $2 2 3$
  solution: '第一问，分别计算只装同一种农产品时，每箱最多可装的包数，计算对应总价值，比较得到最大值；第二问，根据每种农产品最多装2包的限制，列举所有符合总重量要求的组合，计算总价值后比较得到最大值．

    解：（1）对于每箱只装同一种农产品的情况：

    农产品A：总价值$4 \times 6 0 = 2 4 0$元；

    农产品B：总价值$2 \times 1 0 0 = 2 0 0$元；

    农产品C：总价值$3 \times 5 8 = 1 7 4$元；

    农产品D：总价值$5 \times 4 5 = 2 2 5$元；

    比较可知，一箱农产品的总价值最大为240元；

    （2）设装A，B，C，D的包数分别为a，b，c，d，满足$0 \leq a \leq 2$，$0 \leq b \leq 2$，$0 \leq c \leq 2$，$0 \leq d \leq 2$，a，b，c，d为非负整数，

    且$7 a + 1 2 b + 8 c + 5 d \leq 2 8$，

    总价值$V = 6 0 a + 1 0 0 b + 5 8 c + 4 5 d$，计算得：

    当$a = 2$，$b = 0$，$c = 1$，$d = 1$时，$7 \times 2 + 8 \times 1 + 5 \times 1 = 2 7 \leq 2 8$，$V = 2 \times 6 0 + 5 8 + 4 5 = 2 2 3$；

    当$a = 2$，$b = 1$，$c = 0$，$d = 0$时，$7 \times 2 + 1 2 \times 1 = 2 6 \leq 2 8$，$V = 2 \times 6 0 + 1 0 0 = 2 2 0$；

    当$a = 1$，$b = 0$，$c = 2$，$d = 1$时，$7 \times 1 + 8 \times 2 + 5 \times 1 = 2 8 \leq 2 8$，$V = 6 0 + 2 \times 5 8 + 4 5 = 2 2 1$；

    当$a = 2$，$b = 0$，$c = 0$，$d = 2$时，$7 \times 2 + 5 \times 2 = 2 4 \leq 2 8$，$V = 2 \times 6 0 + 2 \times 4 5 = 2 1 0$；

    其余符合重量限制的组合，总价值均小于223，因此第二问最大总价值为223元．'
