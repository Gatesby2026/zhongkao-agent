    ∴$M = \frac{1 6 0 - 1 2 2}{1 2 2} \times 1 0 0 % \approx 3 1 . 1 5 %$，

    ∵当$30%≤M<50%$ 时，可评定为经营效果良好并能被当地文旅部门优先推介．

    ∴王先生的民宿首次被评定为经营效果良好是第8个月．'
