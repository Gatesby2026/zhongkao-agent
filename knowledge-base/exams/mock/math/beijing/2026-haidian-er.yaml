    $c$．甲、乙两个片区采样点的固沙量的平均数、中位数如下表：

    | 片区 | 平均数 | 中位数 |

    |---|---|---|

    | 甲 | $7 4$ | $m$ |

    | 乙 | $7 6 . 3$ | $7 4$ |

    根据以上信息，回答下列问题：

    （1）①补全甲片区采样点的固沙量的频数分布直方图；

    ②表中$m$的值为________；

    （2）若固沙量满足$6 0 \leq t < 8 0$的监测点为“达标监测点”，估计乙片区的$2 4 0$个监测点中约有________个“达标监测点”；

    （3）将每个片区采样点的固沙量按从大到小排序，固沙量越大，排名越靠前．已知采样点$$，$$不在同一个片区且固沙量都是$7 5 ^{}$．若$$在其所在片区采样点中的排名比$$在其所在片区采样点中的排名更靠前，则$$是________片区的采样点（填“甲”或“乙”）；

    （4）为降低异常值对统计结果造成的偏差，科研团队采用剔除极值法：先剔除一组数据中的一个最大值和一个最小值，再对剩余数据计算平均值，以保障监测结果的稳定性．记乙片区采样点的固沙量的最大值为${t}_{1}{kg/m}^{2}$，最小值为${t}_{2}{kg/m}^{2}$，剔除极值后，乙片区采样点的固沙量的平均值为$76.5{kg/m}^{2}$．若$t_{2} = 4 2$，则$t_{1}$的值为________．'
  figure: 2026-haidian-er/figures/image314.png
  answer: （1）频数分布直方图见详解，$7 6 . 5$； （2）$1 5 6$； （3）乙；    （4）$1 0 7$．
  solution: '本题考查了频数分布直方图、中位数的计算、用样本估计总体以及平均数的应用，熟练掌握相关统计量的计算方法和直方图的解读是解答本题的关键．

    （1）①根据频数分布直方图中各组频数之和为$2 0$，补全甲片区采样点的固沙量的频数分布直方图；②根据中位数的定义，先确定中位数所在的组，再结合组内数据计算中位数；

    （2）先根据乙片区的频数分布直方图，确定“达标监测点”的频数，再用样本估计总体，计算乙片区$2 4 0$个监测点中“达标监测点”的数量；

    （3）结合甲、乙两个片区的中位数，分析固沙量为$7 5 ^{}$在两个片区中的排名情况，从而判断$A$所在的片区；

    （4）先根据乙片区的平均数求出$2 0$个数据的总和，再根据剔除极值后的平均数求出剩余$1 8$个数据的总和，最后根据原总和、剔除的最小值和剩余数据总和求出最大值．

    （1）

    解：①频数分布直方图如图所示，


    ②共抽取了$2 0$个监测点，中位数为第$1 0$个监测点和第$1 1$个监测点固沙量的平均值，

    $\because 1 + 3 + 3 = 7$，$1 + 3 + 3 + 8 = 1 5$，

    $\therefore$中位数在$7 0 \leq t < 8 0$这一组，由给出的数据排序得，中位数为$\frac{7 6 + 7 7}{2} = 7 6 . 5$，

    $\therefore m = 7 6 . 5$；

    （2）

    解：乙片区抽取的监测点中，“达标监测点”有$2 + 1 1 = 1 3$个，

    $\therefore 2 4 0 \times \frac{1 3}{2 0} = 1 5 6$个，

    答：乙片区的$2 4 0$个监测点中约有$1 5 6$个“达标监测点”；

    （3）

    解：甲片区：中位数为$7 6 . 5$，说明有$1 0$个数据$\geq 7 6 . 5$，$7 5$比$7 6 . 5$小，因此$7 5$在甲片区的排名在第$1 0$名之后（即名次靠后）；

    乙片区：中位数为$7 4$，说明有$1 0$个数据$\geq 7 4$，$7 5$比$7 4$大，因此$7 5$在乙片区的排名在第$1 0$名之前（即名次靠前）；

    （4）

    解：乙片区$2 0$个数据的平均数为$7 6 . 3$，因此总和为：$2 0 \times 7 6 . 3 = 1 5 2 6$

    剔除一个最大值$t_{1}$和一个最小值$t_{2} = 4 2$后，剩余$1 8$个数据的平均数为$7 6 . 5$，剩余数据总和为：$1 8 \times 7 6 . 5 = 1 3 7 7$，

    根据“原总和$-$剔除的两个数据$=$剩余数据总和”，可得：$1 5 2 6 - 4 2 - t_{1} = 1 3 7 7$，

    解得：$t_{1} 1 5 2 6 - 4 2 - 1 3 7 7 = 1 0 7$．'
