  stem: '在平面直角坐标系$x O y$中，函数$y = k x \left(\right. k \neq 0 \left.\right)$与$y = x + 2$的图象交于点$A \left(\right. 2 , m \left.\right)$．

    （1）求$k$，$m$的值；

    （2）过点$P \left(\right. n , 0 \left.\right)$作$x$轴的垂线，分别交函数$y = k x$与$y = x + 2$的图象于点$M$，$N$．

    ①当$n = - 2$时，求$M N$的长；

    ②当$M N \geq 2$时，直接写出$n$的取值范围．'
  answer: （1）$k = 2$，$m = 4$ （2）① $M N = 4$；② $n \leq 0$或$n \geq 4$
  solution: '（1）将$A \left(\right. 2 , m \left.\right)$代入$y = x + 2$，求得$m = 4$，即$A \left(\right. 2 , 4 \left.\right)$，再利用待定系数法求解即可；

    （2）①当$n = - 2$时，求得$M \left(\right. - 2 , - 4 \left.\right)$，$N \left(\right. - 2 , 0 \left.\right)$，再计算$M N$的长即可；

    ②由题意得$M \left(\right. n , 2 n \left.\right)$，$N \left(\right. n , n + 2 \left.\right)$，得到$\left|\right. n - 2 \left|\right. \geq 2$，据此求解即可．

    （1）

    解：∵$y = x + 2$的图象经过点$A \left(\right. 2 , m \left.\right)$，

    ∴$m = 2 + 2 = 4$，

    ∴$A \left(\right. 2 , 4 \left.\right)$，

    ∵函数$y = k x$的图象经过点$A \left(\right. 2 , 4 \left.\right)$，

    ∴$2 k = 4$，

    解得$k = 2$；

    （2）

    解：①由（1）函数$y = k x$的解析式为$y = 2 x$，

    当$n = - 2$时，$y = 2 \times \left(\right. - 2 \left.\right) = - 4$，

    ∴$M \left(\right. - 2 , - 4 \left.\right)$，

    当$n = - 2$时，$y = - 2 + 2 = 0$，

    ∴$N \left(\right. - 2 , 0 \left.\right)$，

    ∴$M N = 0 - \left(\right. - 4 \left.\right) = 4$，

    ②由题意得$M \left(\right. n , 2 n \left.\right)$，$N \left(\right. n , n + 2 \left.\right)$，$M N = \left|\right. 2 n - \left(\right. n + 2 \left.\right) \left|\right. = \left|\right. n - 2 \left|\right.
    \geq 2$，

    当$n - 2 \geq 0$即$n \geq 2$时，$n - 2 \geq 2$，解得$n \geq 4$；

    当$n - 2 < 0$即$n < 2$时，$2 - n \geq 2$，解得$n \leq 0$；

    综上，$n$的取值范围为$n \leq 0$或$n \geq 4$．'
