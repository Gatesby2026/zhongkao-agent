  stem: '如图，圆内接四边形$A B C D$的对角线$A C$，$B D$交于点$E$，$∠BAC+∠ADB=90°$ ，$\overset{⌢}{D A} = \overset{⌢}{D C}$．


    （1）求$\angle A B D$的大小；

    （2）过点$A$作圆的切线交$C B$的延长线于点$F$．若$tan∠ADB=\frac{2}{3}$，$B F = 2$，求$B D$的长．'
  figure: 2026-haidian-er/figures/image362.png
  answer: （1）$\angle A B D = 4 5 \circ$ （2）$\frac{1 5}{2}$
  solution: '（1）根据角度的和差关系以及同弧所对的圆周角相等即可求解；

    （2）根据角度转化可知$\angle A C B = \angle B A F = \angle A D B$，解直角三角形可知$A G , B G$,进而即可求解．

    （1）

    解：在圆内，∵同弧所对的圆周角相等，

    ∴$\angle A D B = \angle A C B$,

    ∵$∠BAC+∠ADB=90°$ ，

    ∴$\angle B A C + \angle A C B = 9 0 \circ$，

    ∴$\angle A B C = 9 0 \circ$,

    ∵$\overset{⌢}{D A} = \overset{⌢}{D C}$，

    ∴$\angle A B D = \angle C B D$,

    ∴$\angle A B D = 4 5 \circ$;

    （2）

    解：过点$A$作$A G \bot B D$,

    ∵$A F$为切线，

    ∴$\angle F A C = 9 0 \circ$，


    ∵$\angle B A C + \angle A C B = 9 0 \circ$，$\angle B A C + \angle B A F = 9 0 \circ$,

    ∴$\angle A C B = \angle B A F = \angle A D B$,

    ∵$tan∠ADB=\frac{2}{3}$，$B F = 2$，

    ∴$\angle B A F = \frac{2}{3} = \frac{B F}{A B}$,

    ∴$A B = 3$,

    ∴$A G = A B \cdot s i n \angle A B D = 3$,$B G = A B \cdot c o s \angle A B D = 3$,

    ∴$D G = \frac{A G}{t a n \angle A D B} = \frac{9}{2}$，

    ∴$B D = D G + B G = \frac{9}{2} + 3 = \frac{1 5}{2}$．'
