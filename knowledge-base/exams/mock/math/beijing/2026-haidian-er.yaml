- id: 27
  type: 解答
  score: 7
  stem: '在$\triangle A B C$中，$\angle B A C = 9 0 \circ$，$\angle A B C = \alpha$，点$D$在$B C$的延长线上，$E$是$C D$的中点，连接$E A$，将线段$E A$绕点$E$逆时针旋转$1 8 0 \circ - 2 \alpha$得到线段$E F$．


    （1）如图$1$，$\alpha = 4 5 \circ$，$C D = B C$，连接$C F$，求证：$C F \bot B C$；

    （2）如图$2$，连接$B F$，$D F$，直接写出$\angle B F D$的大小，并证明．'
  figure: 2026-haidian-er/figures/image467.png
  answer: （1）见详解    （2）$9 0 \circ$；见详解
  solution: '（1）过点$A$作$A H \bot B C$,由$\alpha = 4 5 \circ$可知$\triangle A B C$是等腰直角三角形，$\triangle A B H$是等腰直角三角形，进而可知$C E = A H$，证明$\triangle A H E \approx \triangle E C F$，即可求解；

    （2）取$B C$的中点$G$,连接$A G$,$A F$,根据两角对应相等可证$\triangle A B G \sim \triangle A F E$，根据相似三角形的性质可知$\frac{A B}{A G} = \frac{A F}{A E}$，进而根据两边对应成比例以及夹角相等可证$\triangle B A F \sim \triangle G A E$，设$B G = m , C
    E = n$，进而可知$\frac{A B}{B F} = \frac{B C}{B D} = \frac{m}{m + n}$,证明$\triangle A B C \sim \triangle F B D$，根据相似三角形的性质即可求解．

    （1）

    证明：过点$A$作$A H \bot B C$,


    ∵在$\triangle A B C$中，$\angle B A C = 9 0 \circ$，$\angle A B C = \alpha = 4 5 \circ$，

    ∴$\angle A C B = 4 5 \circ$,

    ∴$\triangle A B C$是等腰直角三角形，

    ∵$\angle A H B = 9 0 \circ = \angle A H C$,

    ∴$B H = C H$

    ∴$\angle B A H = 4 5 \circ$,

    ∴$\triangle A B H$是等腰直角三角形，

    ∴$A H = B H = C H$,

    ∵$C D = B C$，$E$是$C D$的中点，

    ∴$C E = \frac{1}{2} C D = A H$,

    ∵$\angle A E F = \angle A E H + \angle H E F = 9 0 \circ$,$\angle A E H + \angle H A E = 9 0 \circ$,

    ∴$\angle H E F = \angle H A E$,

    在$\triangle A H E$和$\triangle E C F$中，

    $\left\{AH=CE∠HEF=∠HAEAE=FE\right$,

    ∴$\triangle A H E \approx \triangle E C F \left(\right. \left.\right)$,

    ∴$\angle E C F = \angle A H C = 9 0 \circ$,

    ∴$C F \bot B C$，

    （2）

    证明：取$B C$的中点$G$,连接$A G$,$A F$,


    ∵$E A = E F$,$\angle A E F = 1 8 0 \circ - 2 \alpha$,

    ∴$∠EAF=∠EFA=α$ ,

    ∵$G$是$B C$的中点，$\angle B A C = 9 0 \circ$，

    ∴$A G = B G = C G$,

    ∵$\angle A B C = \alpha$，

    ∴$∠ABC=∠BAG=α$ ,$∠AGE=2α$

    ∴$\triangle A B G \sim \triangle A F E$,

    ∴$\frac{A B}{A G} = \frac{A F}{A E}$,

    ∵$∠BAG=∠EAF=α$ ,

    ∴$\angle B A F = \angle G A E$,

    ∴$\triangle B A F \sim \triangle G A E$,

    $∴∠ABF=∠AGE=2α$ ,

    ∴$\angle A B C = \angle F B C = \alpha$,

    ∴$\frac{A B}{B F} = \frac{A G}{G E}$,

    设$B G = m , C E = n$，

    ∴$BG=CG=AG=m$ ，$B C = 2 m$

    ∵$E$是$C D$的中点，

    ∴$C E = D E = n$，$C D = 2 n$，

    ∴$G E = m + n$，

    ∴$\frac{AB}{BF}=\frac{m}{m+n}$,

    ∴$\frac{BC}{BD}=\frac{2m}{2m+2n}=\frac{m}{m+n}=\frac{AB}{BF}$，

    ∴$\triangle A B C \sim \triangle F B D$,

    ∴$\angle B F D = \angle B A C = 9 0 \circ$．'
