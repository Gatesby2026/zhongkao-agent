  stem: 中国古代用“毫厘丝忽”表示极微细的事物，其中“毫”“厘”“丝”“忽”均为我国古代一种微小的长度计量单位．秦朝统一度量衡时，$1$丝约为$0 . 0 0 0 0 0 2 3 1$，则$5$丝用科学记数法可表示为（     ）
  options:
    A: $0 . 2 3 1 \times 1 0^{- 5}$
    B: $2 . 3 1 \times 1 0^{- 6}$
    C: $1 . 1 5 5 \times 1 0^{- 5}$
    D: $1 1 . 5 5 \times 1 0^{- 6}$
  answer: C
  solution: '先计算出5丝的长度，再按照科学记数法的规则改写即可，科学记数法表示较小数的形式为$a \times 1 0^{n}$，需满足$1 \leq \left|\right. a \left|\right. < 1 0$，$n$为整数．

    解：∵1丝长度约为$0 . 0 0 0 0 0 2 3 1$

    ∴5丝的长度为 $5 \times 0 . 0 0 0 0 0 2 3 1 = 0 . 0 0 0 0 1 1 5 5$

    将$0 . 0 0 0 0 1 1 5 5$改写为符合要求的科学记数法，得

    $0 . 0 0 0 0 1 1 5 5 = 1 . 1 5 5 \times 1 0^{- 5}$．'
