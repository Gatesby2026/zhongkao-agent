  stem: 小明用投影仪将平板电脑屏幕的画面投屏到墙上，画面形状保持不变．已知该平板电脑屏幕的画面是相邻两边长之比为$3$∶$2$的矩形．若墙上投影画面的短边长为$1 . 2$，则投影画面的长边长为（     ）
  options:
    A: $0 . 8$
    B: $1 . 8$
    C: $2$
    D: $2 . 4$
  answer: B
  solution: '投屏后形状不变，投影矩形与原屏幕矩形是相似图形，对应边成比例，根据原矩形边长比列比例式即可求出投影长边长．

    解：∵投屏后画面形状保持不变，

    ∴投影矩形与原屏幕矩形相似，对应边成比例，

    ∵原矩形相邻两边长之比为$3 : 2$，即长边$:$短边$= 3 : 2$，设投影长边长为$x$，

    可得$\frac{x}{1 . 2} = \frac{3}{2}$，

    解得$x = 1 . 8$，

    即投影画面长边长为$1 . 8$．'
