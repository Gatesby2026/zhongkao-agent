- id: 28
  type: 解答
  score: 7
  stem: '在平面直角坐标系$x O y$中，对于$\bigodot C$和$\bigodot C$外一点P，给出如下定义：若$\bigodot C$上存在两个不同的点A，B，使得$\angle A P B = \theta \left(\right. 0 \circ < \theta < 1 8 0 \circ \left.\right)$且$P A = k P B \left(\right.
    k > 0 \left.\right)$，则称点P是$\bigodot C$的“$\theta - k$关联点”．


    （1）如图，$\bigodot O$的半径为2．

    ①在点$P_{1} \left(\right. - 4 , 0 \left.\right)$，$P_{2} \left(\right. 0 , 5 \left.\right)$，$P_{3} \left(\right. 2 , 2 \left.\right)$中，$\bigodot O$的“$6 0 \circ - 1$关联点”是________；

    ②点P在直线$y = x$上，记点P的横坐标为$x_{P}$．若点P是$\bigodot O$的“$6 0 \circ - 2$关联点”，则$x_{P}$的取值范围是________；

    （2）已知点$M \left(\right. 0 , 2 \left.\right)$，$N \left(\right. 3 , 2 \left.\right)$，$T \left(\right. t , t \left.\right) \left(\right. t \neq 0 \left.\right)$，$\bigodot T$的半径为$\left|\right. t \left|\right.$．若线段$M
    N$上至少存在两个$\bigodot T$的“$1 2 0 \circ - 2$关联点”，直接写出t的取值范围．'
  figure: 2026-haidian-er/figures/image519.png
  answer: （1）①$P_{1}$，$P_{3}$；②$- \leq x_{P} < -$或$< x_{P} \leq$ （2）$\frac{- 5 - 3}{5} < t < \frac{- 2 - 4}{7}$或$\frac{1}{2} < t < \frac{- 5 + 3}{5}$
  solution: '（1）①根据“$\theta - k$关联点”的定义结合图象即可判断；

    ②根据题意作出对应的图形，利用解直角三角形，相似三角形的判定与性质得出点P的运动轨迹为圆环，并求出圆环的半径范围，最后根据点P在直线$y = x$上求出点P横坐标取值范围；

    （2）结合题意，先分析出$\bigodot T$的“$1 2 0 \circ - 2$”关联点，利用解直角三角形，相似三角形的判定与性质及勾股定理求出点P的运动轨迹为圆环，并得到圆环半径的取值范围，再分情况分析出圆环与线段$M N$的交点情况，得到其临界值，最终可求出t的取值范围．

    （1）

    解：①由题意知，对于$\bigodot O$的“$6 0 \circ - 1$关联点”，则$\triangle P A B$是等边三角形，

    如图，$P_{1}$，$P_{3}$能与$\bigodot O$上不同两点A，B生成等边三角形，


    ∵$P_{2}$与$\bigodot O$切线与y轴夹角小于$3 0 \circ$，无法构成等边三角形，

    ∴$\bigodot O$的“$6 0 \circ - 1$关联点”是$P_{1}$，$P_{3}$；

    ②由题意知，若点P是$\bigodot O$的“$6 0 \circ - 2$关联点”，即$\angle A P B = 6 0 \circ$，$P A = 2 P B$，

    ∴$\angle A B P = 9 0 \circ$，

    如图，在$\bigodot O$上任取两点A、B，作$\triangle A B P$，使得$\angle A P B = 6 0 \circ$，取$B \left(\right. 2 , 0 \left.\right)$，作$\triangle O B C$，使$\angle O B C = 9 0 \circ$，$\angle O C B = 6 0 \circ$，


    ∴$O A = O B = 2$，

    在$\triangle O B C$中，$c o s \angle C O B = c o s 3 0 \circ = \frac{O B}{O C} = \frac{}{2}$，

    ∴$O C = \frac{4}{3}$，

    易证得：$\triangle A B P \sim \triangle O B C$，

    ∴$\frac{O B}{A B} = \frac{B C}{B P}$，

    ∵$\angle A B P = \angle O B C = 9 0 \circ$，

    ∴$\angle O B A + \angle A B C = \angle A B C + \angle C B P$，

    ∴$\angle O B A = \angle C B P$，

    ∴$\triangle A O B \sim \triangle P C B$，

    ∴$\frac{C P}{O A} = \frac{P B}{A B} = \frac{1}{} = \frac{}{3} = t a n \angle P A B = t a n 3 0 \circ$，

    ∴$C P = \frac{2}{3}$，

    以点C为圆心，$C P$长为半径画圆，当点B固定，点A绕$\bigodot O$运动时，点P在优弧$\overset{⌢}{B D}$上，

    当弦$A B$在$\bigodot O$上运动时，点P所在的轨迹为阴影部分的圆环，内环半径为2，外环半径为$O C + C P = \frac{4}{3} + \frac{2}{3} = 2$，即$2 < r \leq 2$，

    若点P在直线$y = x$上，结合圆环半径，可得$- \leq x_{P} < -$或$< x_{P} \leq$．

    （2）

    解：对于$\bigodot T$的“$1 2 0 \circ - 2$关联点”，

    如图，任作$\bigodot T$，取弦$A B$，作$\triangle A B P$使得$P A = 2 P B$，$\angle A P B = 1 2 0 \circ$，作$A C \bot B P$交$B P$延长线于点C，


    设$B P = m$，则$A P = 2 m$，

    ∵$\angle A P B = 1 2 0 \circ$，

    ∴$\angle A P C = 1 8 0 \circ - \angle A P B = 6 0 \circ$，

    在$\triangle A C P$中，$\angle A P C = 6 0 \circ$，

    ∴$C P = \frac{1}{2} A P = m$，

    ∴$A C = = m$，

    在$\triangle A B C$中，$AB=\sqrt{A{C}^{2}+B{C}^{2}}=\sqrt{7}m$ ，

    作$\triangle T B Q$，使得$∠TQB=120°$ ，$QT=2QB$ ，

    易证得：$△ABP∽△TBQ$ ，

    ∴$\frac{PB}{QB}=\frac{AB}{TB}$，

    ∵$∠ABP=∠TBQ$ ，

    ∴$∠ABP+∠QBA=∠QBA+∠TBQ$ ，

    ∴$∠TBA=∠QBP$ ，

    ∴$△QBP∽△TBA$ ，

    ∵$A T = B T$，

    ∴$PQ=BQ=t$ ，

    ∴点P在以点Q为圆心，半径$r=PQ=t$ 的圆上运动，则$\sqrt{7}\left|t\right|<TP≤3\left|t\right|$，

    即点P的运动轨迹是一个圆环，

    ∵$M \left(\right. 0 , 2 \left.\right)$，$N \left(\right. 3 , 2 \left.\right)$，$T \left(\right. t , t \left.\right) \left(\right. t \neq 0 \left.\right)$，$\bigodot T$的半径为$\left|\right. t \left|\right.$，

    设点T沿$y = x$从上向下运动，

    此时分情况讨论临界点的情况：

    ①当点N在以T为圆心，$\left|\right. t \left|\right.$为半径的$\bigodot T$上时，则${\left(3−t\right)}^{2}+{\left(2−t\right)}^{2}={\left(\sqrt{7}t\right)}^{2}$，

    解得：$t=\frac{−5±3\sqrt{10}}{5}$；


    ②当线段$M N$与T为圆心，$3\left|t\right|$为半径的$\bigodot T$相切时，则$4 t = 2$，

    解得：$t = \frac{1}{2}$；


    ③当点M在以T为圆心，$3\left|t\right|$为半径的$\bigodot T$上时，则${t}^{2}+{\left(2−t\right)}^{2}={\left(3t\right)}^{2}$，

    解得：${t}_{1}=\frac{−2−4\sqrt{2}}{7}$，${t}_{2}=\frac{−2+4\sqrt{2}}{7}$（舍去），


    综上所述，t的取值范围是$\frac{- 5 - 3}{5} < t < \frac{- 2 - 4}{7}$或$\frac{1}{2} < t < \frac{- 5 + 3}{5}$．'
