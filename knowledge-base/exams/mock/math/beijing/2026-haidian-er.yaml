  answer: D
  solution: '①根据菱形的性质判断即可；②求得$\triangle A O B$的周长$l_{1}$：$2 - \frac{4}{k} < l_{1} < 4 - \frac{4}{k}$，菱形的周长$l_{2}$：$l_{2} = 4 O M < 4 O H = - \frac{4}{k}$，比较即可判断；③求得菱形$O M A N$的面积为$- b^{2} + 5 b$即可得到菱形$O
    M A N$的面积有最大值．

    解：①当$k = - \frac{1}{2}$，$b = 2$时，$y = - \frac{1}{2} x + 2$，

    令$y = 0$，$- \frac{1}{2} x + 2 = 0$，解得$x = 4$，

    ∴$A \left(\right. 4 , 0 \left.\right)$，

    以$O A$为对角线作菱形$O M A N$，且点$N$在第一象限，

    ∴$M N$在线段$O A$的垂直平分线上，


    ∴这样的菱形$O M A N$有无数个，说法正确；

    ②当$b = 2$时，$y = k x + 2$，

    ∴$A \left(\right. - \frac{2}{k} , 0 \left.\right)$，$B \left(\right. 0 , 2 \left.\right)$，

    ∴$O A = - \frac{2}{k}$，$O B = 2$，

    ∴$- \frac{2}{k} < A B < 2 - \frac{2}{k}$，

    ∴$\triangle A O B$的周长$l_{1}$：$2 - \frac{2}{k} - \frac{2}{k} < l_{1} < 2 - \frac{2}{k} + 2 - \frac{2}{k}$，即$2 - \frac{4}{k} < l_{1} < 4 - \frac{4}{k}$，

    菱形的周长$l_{2}$：$l_{2} = 4 O M < 4 O H = - \frac{4}{k}$，

    ∴对于$k$的每一个确定的值，都存在菱形$O M A N$，使得该菱形的周长与$\triangle A O B$的周长相等；

    ③∵$A \left(\right. 1 0 - 2 b , 0 \left.\right)$，∴$N \left(\right. 5 - b , \frac{b}{2} \left.\right)$，

    ∴菱形$O M A N$的面积$= \frac{O A \times M N}{2} = \frac{\left(\right. 1 0 - 2 b \left.\right) b}{2} = - b^{2} + 5 b$，

    ∵$b^{2} \geq 0$，

    ∴菱形$O M A N$的面积有最大值；

    综上，①②③都是正确的．'
