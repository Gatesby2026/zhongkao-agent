    $a$．甲、乙两个片区采样点的固沙量的频数分布直方图如下（数据分成$7$组：第$1$组$4 0 \leq t < 5 0$，第$2$组$5 0 \leq t < 6 0$，第$3$组$6 0 \leq t < 7 0$，第$4$组$7 0 \leq t < 8 0$，第$5$组$8 0 \leq t < 9 0$，第$6$组$9 0 \leq t < 1 0 0$，第$7$组$1 0 0 \leq
    t < 1 1 0$）；


    $b$．甲片区采样点的固沙量在$7 0 \leq t < 8 0$这一组的数据是：

