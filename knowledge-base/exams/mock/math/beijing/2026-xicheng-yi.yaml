  stem: '在△ABC中，∠BAC＝α，AB＝AC，CD⊥AB于点D，过点B作BM∥AC，P是线段DB上一点，连接CP，作∠CAQ＝∠APC，交射线BM于点Q．

    （1）如图1，当∠CAQ＝2α（36°＜α＜60°）时，求∠BCP的度数（用含α的式子表示）；

    （2）如图2，点E为AP中点，用等式表示DE与BQ的数量关系，并证明．'
  figure: 2026-xicheng-yi/figures/image16.png
  answer: （1）$∠BCP=\frac{5α}{2}-90°$；
  solution: '解：（1）∵AB＝AC，

    ∴∠ABC＝∠ACB．

    ∵∠BAC＝α，

    ∴$∠ABC=\frac{180°-∠BAC}{2}=90°-\frac{α}{2}$．

    ∵∠CAQ＝2α，∠CAQ＝∠APC，

    ∴$∠BCP=∠APC-∠ABC=2α-(90°-\frac{α}{2})=\frac{5α}{2}-90°$．

    （2）如图，在AD上取点N，使得DN＝DP，连接CN．

    ![](figures/image46.png)

    ∵CD⊥AB，

    ∴CP＝CN．

    ∴∠CNP＝∠APC．

    ∵∠CAQ＝∠APC，

    ∴∠CNP＝∠CAQ．

    ∵AC∥BM，

    ∴∠AQM＝∠CAQ．

    ∴∠AQM＝∠CNP．

    ∵∠CNA+CNP＝180°，∠AQB+∠AQM＝180°，

    ∴∠AQB＝∠CNA．

    在△CNA和△AQB中，

    $\left\{\begin{matrix} ∠CAB=∠ABM \\ ∠AQB=∠CNA \\ AB=AC \end{matrix}\right.$，

    ∴△CNA≌△AQB（AAS）．

    ∴AN＝BQ．

    ∵E是AP的中点，

    ∴AP＝2PE．

    ∵PN＝2PD，

    ∴AN＝AP﹣PN＝2PE﹣2PD＝2DE．

    ∴BQ＝2DE．'
