    （2）当a＝1，b＝2时，将二次函数y＝ax2﹣bx的图象记为C1，一次函数y＝kx（k＞0）的图象记为C2，过点P（t，0）作x轴的垂线分别交C1，C2于点M，N．当﹣1＜t＜3时，M点与N点的距离存在最大值，求k的取值范围．'
  answer: （1）b＝4a，在平面直角坐标系xOy中，已知二次函数y＝ax2﹣bx（a＞0）．
  solution: '解：（1）在平面直角坐标系xOy中，已知二次函数y＝ax2﹣bx（a＞0）．

    由题意可得：二次函数y＝ax2﹣bx图象的对称轴为x＝2，

    ∴$-\frac{-b}{2a}=2$，

    ∴b＝4a；

    （2）当a＝1，b＝2时，将二次函数y＝ax2﹣bx的图象记为C1，一次函数y＝kx（k＞0）的图象记为C2，过点P（t，0）作x轴的垂线分别交C1，C2于点M，N．

    当a＝1，b＝2时，二次函数为y＝x2﹣2x；

    设点M（t，y1），N（t，y2），则${y}_{1}={t}^{2}-2t$，y2＝kt（k＞0），

    解方程t2﹣2t＝kt，

    可得：t＝0，t2＝k+2，

    当t1＝0时，可得：y＝0，

    当t＝2时，可得：y＝t（k+2），

    ∴C1与C2的交点坐标为（0，0）和（k+2，t（k+2）），

    设M点与N点的距离为d，

    （ⅰ）如下图所示，

    当﹣1＜t≤0时，d＝t2﹣（2+k）t，

    ∵$\frac{2+k}{2}＞0$，

    ∴当﹣1＜t≤0时，d随t的增大而减小，

    当t＝0时，d＝0，

    当t＝﹣1时，d＝t2﹣（2+k）t＝k+3，

    ∴0≤d＜k+3；

    ![](figures/image41.png)

    （ⅱ）如下图所示，

    当0＜t≤k+2时，d＝﹣t2+（2+k）t，

    ∵当$0＜t≤\frac{k+2}{2}$时，d随t的增大而增大，

    当$\frac{k+2}{2}≤t≤k+2$时，d随t的增大而减小，

    ∴当$t=\frac{k+2}{2}$时，d的最大值为$d=-{t}^{2}+(2+k)t=-{(\frac{k+2}{2})}^{2}+(k+2)(\frac{k+2}{2})=\frac{{(k+2)}^{2}}{4}$；

    ![](figures/image42.png)

    （ⅲ）如下图所示，

    当t＞k+2时，d＝t2﹣（2+k）t，

    此时d随t的增大而增大，

    ∵﹣1＜t＜3，

    ∴令t＝3，则d＝3﹣3k，

    ∵（k+3）﹣（3﹣3k）＝4k＞0，

    ∴k+3＞3﹣3k，

    令$\frac{{(k+2)}^{2}}{4}=k+3$，

    解得：$k=2\sqrt{2}$

    依题意，得$\frac{k+2}{2}＜3$，

    解得：k＜4，

    ∴当﹣1＜t＜3时，d存在最大值，

    结合函数的图象，得$2\sqrt{2}≤k＜4$．

    ![](figures/image43.png)'
