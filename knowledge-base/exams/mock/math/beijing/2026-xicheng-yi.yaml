  stem: '对于点P，⊙C和直线l，若将⊙C绕点P逆时针旋转α（0°＜α＜180°）得到⊙C′，使得⊙C′与直线l相切，则称点P为⊙C和直线l的旋切点，当存在n个满足条件的α时，称该点为n阶旋切点，其中最小的α称为最小旋切角．

    在平面直角坐标系xOy中．

    （1）若⊙O的半径为1，直线l：x＝2，则在点A（﹣2，0），$B(\frac{1}{2}，-1)$，C（0，2）中，点　   　 是⊙O和直线l的旋切点，且为　   　 阶旋切点；

    （2）已知点T（t，0），⊙T的半径为2，直线m：y＝﹣4，若点（0，3）是⊙T和直线m的旋切点，则t的取值范围是　       　 ；

    （3）已知点K（﹣1，1），⊙K的半径为1，直线n：y＝x+b，点（0，2）是⊙K和直线n的2阶旋切点且最小旋切角不超过60°，直接写出b的取值范围．'
  answer: （1）C，2；
  solution: '解：（1）如图，

    ![](figures/image47.png)

    ∵0°＜α＜180°，

    ∴⊙O绕点A，B旋转α时，均无法与直线l：x＝2相切．

    当⊙O绕点C（0，2）逆时针旋转α时，可使圆心落在直线x＝1上，此时⊙O与x＝2相切．

    ∴存在两个满足条件的α．

    ∴n＝2，点C为2阶旋切点．

    故答案为：C，2；

    （2）如图，

    ![](figures/image48.png)

    ∵⊙T逆时针旋转后与y＝﹣4相切．

    ∴点T位于y轴左侧．

    ∵当圆心T''落在y＝﹣2时，⊙T与y＝﹣4相切．

    ∴LT''≥5∴LT≥5．

    ∴在Rt△OLT中，由勾股定理得，t≤﹣4．

    故答案为：t≤﹣4；

    （3）∵最小弦切角不超过60°，

    ∴将K绕点M逆时针旋转60°得到点N，△MKN为等边三角形

    ．以M为圆心，KM为半径作圆，K''在劣弧KN上移动．

    当K''由K向N移动时，

    ∵直线n与⊙K''相切，

    ∴直线n上下平移．

    当直线n与⊙K''在下方相切时，

    ![](figures/image49.png)

    n1与⊙K相切，

    此时$KO=K′O=\sqrt{2}$，KH＝1，

    ∴$OH=\sqrt{2}-1$，

    ∴${b}_{1}=(\sqrt{2}-1)⋅\sqrt{2}=2-\sqrt{2}$；

    n2与⊙N相切，M（0，2），

    ∴$KM=\sqrt{2}$，$EM=\frac{\sqrt{2}}{2}$，

    ∴$EN=\frac{\sqrt{6}}{2}$，GN$=\frac{\sqrt{6}}{2}-$$\frac{\sqrt{2}}{2}$，

    ∴GF$=\frac{\sqrt{6}}{2}-$$\frac{\sqrt{2}}{2}+$1，

    ∴GJ$=(\frac{\sqrt{6}}{2}-\frac{\sqrt{2}}{2}+1)⋅\sqrt{2}=\sqrt{3}-1+\sqrt{2}$．

    ∴${b}_{2}=1-(\sqrt{3}-1+\sqrt{2})=2-\sqrt{3}-\sqrt{2}$，

    ∴$2-\sqrt{3}-\sqrt{2}≤b＜2-\sqrt{2}$；

    ∵当直线n与⊙K''在上方相切时，

    ![](figures/image50.png)

    直线n3与⊙K相切，

    此时$OX=\sqrt{2}+1$，

    ∴${b}_{3}=(\sqrt{2}+1)\sqrt{2}=2+\sqrt{2}$．

    直线n4与⊙N相切，$GN=\frac{\sqrt{6}}{2}-\frac{\sqrt{2}}{2}$，

    ∴$YG=1-GN=1-\frac{\sqrt{6}}{2}+\frac{\sqrt{2}}{2}$．

    ∴${b}_{4}=(1-\frac{\sqrt{6}}{2}+\frac{\sqrt{2}}{2})\sqrt{2}+1=\sqrt{2}-\sqrt{3}+2$．

    ∴$2+\sqrt{2}-\sqrt{3}≤b＜2+\sqrt{2}$．

    综上$2+\sqrt{2}-\sqrt{3}≤b＜2+\sqrt{2}$或$2-\sqrt{3}-\sqrt{2}≤b＜2-\sqrt{2}$．'
