  question: '下图是某房屋的平面示意图．房主准备将客厅和卧室地面铺设木地板，厨房和卫生间地面铺设瓷砖．将房间地面全部铺设完预计需要花费10000元，其中包含安装费1270元．若每平方米木地板的瓷砖的价格之比是$5:3$，求每平方米木地板和瓷砖的价格．

    [图]'
  answer: 每平方米木地板的价格为150元，每平方米瓷砖的价格为90元．
  solution: '解：设每平方米木地板的价格为$5x$元，则每平方米瓷砖的价格为$3x$元．

    厨房面积：$2\times3=6m^{2}$，

    卫生间面积：$2\times3=6m^{2}$，

    客厅面积：$(8-4)\times3+6\times4=36\mathrm{cm}^{2}$，

    卧室面积：$5\times3=15\mathrm{m}^{2}$，

    由题意可得，$(6+6)\times3x+(36+15)\times5x=10000-1270$，

    解得$x = 30$，

    $\therefore 5x = 150$，$3x = 90$．

    答：每平方米木地板的价格为150元，每平方米瓷砖的价格为90元．'
