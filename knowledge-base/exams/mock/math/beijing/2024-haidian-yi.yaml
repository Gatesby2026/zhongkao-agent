  answer: B
  solution: '解：连接AC，OC，令AB，CD交于点E，

    ∵AB经过圆心O，CD是$\odot\odot$的一条弦，$CD \perp AB$，

    ∴$CE = BE$，$\angle AED = \angle BEC = 90^\circ$，

    则$AC = AD$，

    若选条件①，∵CD平分AB，

    ∴$AE = BE$，

    ∴$\triangle AED\cong\triangle BEC(SAS)$，

    ∴$AD = BC$，故①符合题意；

    [图]

    若选条件②，∵$OA = OC$，

    ∴$\angle OAC = \angle OCA$，

    ∵BC是$\odot\odot$的切线，

    ∴$OC \perp BC$，

    ∵$OB = \sqrt{3}OA$，则$OB = \sqrt{3}OC$，

    ∴$\cos\angle COE=\frac{OC}{OB}=\frac{\sqrt{3}}{3}$，

    设$OA = OC = r$，则$OB = \sqrt{3}r$，$OE - OC \cos \angle COE = \frac{\sqrt{3}}{4} r$

    ∴$BE=OB-OE=\sqrt{3}-\frac{\sqrt{3}}{3}r=\frac{2\sqrt{3}}{3}r$，$AE=OA+OE=r+\frac{\sqrt{3}}{3}r$，

    则$AE \neq BE$，

    ∴$AC \neq BC$，即$AD \neq BC$，故②不符合题意；

    若选条件③，∵$AD^{2}=AO\cdot AB$，即：$AC^{2}=AO\cdot AB$

    ∴$\frac{AC}{OA}=\frac{AB}{AC}$，

    又∵$\angle CAO = \angle BAC$

    ∴$\triangle CAO \sim \triangle BAC$，

    ∴$\angle B=\angle OCA$，

    又∵$\angl'
