  question: '商品成本影响售价，为避免因成本波动导致售价剧烈波动，需要控制售价的涨跌幅．下面给出了商品售价和成本（单位：元）的相关公式和部分信息：

    a．计算商品售价和成本涨跌幅的公式分别为：

    $\frac{当周售价-前周售价}{前周售价}\times100\%$，$\frac{成本涨跌幅=当前成本-前期成本}{前期成本}\times100\%$；

    b．规定当周售价涨跌幅为当周成本涨跌幅的一半；

    c．甲、乙两种商品成本与售价信息如下：

    甲商品的成本与售价信息表

    |  | 第一周 | 第二周 | 第三周 | 第四周 | 第五周 |

    | --- | --- | --- | --- | --- | --- |

    | 成本 | $25$ | $50$ | $25$ | $40$ | $20$ |

    | 售价 | $40$ | m | $45$ | n | p |

    乙商品的成本与售价统计图

    [图]

    根据以上信息，回答下列问题：

    （1）甲商品这五周成本的平均数为___________，中位数为___________；

    （2）表中m的值为____________，从第三周到第五周，甲商品第_______周的售价最高；

    （3）记乙商品这$40$周售价的方差为$S_{1}^{2}$，若将规定“当周售价涨跌幅为当周成本涨跌幅的一半”更改为“当周售价涨跌幅为当周成本涨跌幅的四分之一”，重新计算每周售价，记这$40$周新售价的方差为$S_{2}^{2}$，则$S_{1}^{2}$________$S_{2}^{2}$；（填“$\gt$”“$=$”或“$\gt$”）．'
  answer: （1）$32$，$25$ （2）$60$，四 （3）$\gt$
  solution: '【小问1详解】

    解：由题意知，成本从小到大依次排序为$20,25,25,40,50$；

    ∴甲商品这五周成本的平均数为$20 + 25 \times 2 + 40 + 50 = 32$，

    中位数为第3个位置的数即中位数是$25$，

    故答案为：$32$，$25$；

    【小问2详解】

    解：由题意知，第二周成本的涨跌幅为$\frac{50-25}{25}\times100\%=100\%$，

    ∴第二周售价的涨跌幅为$\frac{m}{40}\times100\%=100\%\times\frac{1}{2}$，

    解得，$m = 60$；

    同理，第四周成本的涨跌幅为$60\%$，第四周售价的涨跌幅为$\frac{n-45}{45}\times100\%=60\%\times\frac{1}{2}$，

    解得，$n=58.5$；

    第五周成本的涨跌幅为$-50\%$，第五周售价的涨跌幅为$p = \frac{58.5}{117} \times 100\% = -50\% \times \frac{1}{2}$，

    解得，$p = 43.875$；

    ∵$43.875<45<58.5$，

    ∴从第三周到第五周，甲商品第四周的售价最高，

    故答案$[公式]$：$60$，四；

    【小问3详解】

    解：由题意知，改规定前“当周售价涨跌幅为当周成本涨跌幅的一半”，改规定后“当周售价涨跌幅为当周成本涨跌幅的四分之一”，

    ∵$\frac{1}{2} > \frac{1}{4}$，

    ∴改规定后售价的波动比改规定前的售价波动小，

    ∴$S_{1}^{2}>S_{2}^{2}$，

    故答案为：$\gt$．'
