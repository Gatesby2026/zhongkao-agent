  question: '如图，在正方形$ABCD$中．点E，F，G分别在边CD，AD，BC上，$FD<CG$．若$FG = AE$，$\angle1=a$，则$\angle 2$的度数为_____（用含a的式子表示）．

    [图]'
  answer: $180^\circ-\alpha$##$-\alpha + 180^\circ$
  solution: '解：过点G作$GH \perp AD$于点H，如图所示：

    [图]

    ∵四边形$ABCD$为正方形，

    ∴$AB = BC = CD = AD$，$\angle C=\angle D=90^{\circ}$，$AB \parallel CD$，

    ∵$\angle GHD=\angle D=\angle C=90^{\circ}$，

    ∴四边形$CDHG$为矩形，

    ∴$GH = CD$，

    ∴$GH = AD$，

    ∵$FG = AE$，

    ∴$\mathrm{Rt}\triangle ADE\cong\mathrm{Rt}\triangle GHE(\mathrm{HL})$，

    ∴$\angle DAE = \angle HGF$，

    ∵$\angle HGF + \angle HFG = 90^\circ$，

    ∴$\angle DAE + \angle HFG = 90^\circ$，

    ∴$\angle AOF = 90^\circ$，

    ∴$\angle EOF=90^\circ$，

    ∵$AB \parallel CD$，

    ∴$\angle DEA=\angle I$，

    ∵$\angle DEA+\angle 2+\angle D+\angle EOF=360^{\circ}$，

    ∴$\angle 2=360^{\circ}-\angle 1-90^{\circ}-90^{\circ}=180^{\circ}-a$．

    故答案为：$180^\circ-\alpha$．'
