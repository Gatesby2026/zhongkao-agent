  question: '在平面直角坐标系xOy中，函数$y=kx+b(k\neq0)$的图象经过点$A(1,2)$和$B(0,1)$．

    （1）求该函数的解析式；

    （2）当$x<1$时．对于x的每一个值，函数$y = mx - 1 (m \neq 0)$的值小于函数$y=kx+b(k\neq0)$的值，直接写出m的取值范围．'
  answer: （1）函数的解析式为$y=x+1$ （2）$1 \leq m \leq 3$
  solution: '【小问1详解】

    解：把点$A(1,2)$和$B(0,1)$代入$y=kx+b$得：

    $\left\{\begin{array}{l}k+b=2\\b=1\end{array}\right.$，

    解得$\left\{\begin{array}{l}k=1\\b=1\end{array}\right.$，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$该函数的解析式为$y=x+1$；

    【小问2详解】

    解：将$(1,2)$代入$y = mx - 1$中，

    解得$m = 3$，

    此时函数解析式$[公式]$$y=3x-1$

    将$(1,0)$代入$y = mx - 1$中，

    解得$m = 1$，

    此时函数的解析式为$y=x-1$，

    如图，

    [图]

    由于当$x<1$时，对于x的每一个值，函数$y = mx - 1 (m \neq 0)$的值小于一次函数$y=x+1$的值，

    $\begin{tikzpicture}

    \fill (0,0) circle (2pt);

    \fill (-1,-1) circle (2pt);

    \fill (1,-1) circle (2pt);

    \end{tikzpicture}$根据图象可得直线$y = mx - 1$与直线$y=x+1$的交点的横坐标不小于1，

    $.1 \leq m \leq 3$．'
