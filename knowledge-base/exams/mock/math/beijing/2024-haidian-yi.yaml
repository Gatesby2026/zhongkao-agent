  question: '2019年11月，联合国教科文组织将每年的3月14日定为“国际数学日”，也被许多人称为“$\pi$节”．某校今年“$\pi$节”策划了五个活动，规则见下图：

    [图]

    小云参与了所有活动．

    （1）若小云只挑战成功一个，则挑战成功的活动名称为__________；

    （2）若小云共挑战成功两个，且她参与的第四个活动成功，则小云最终剩下的“$\pi$币”数量的所有可能取值为______．'
  answer: ①$[公式]$鲁班锁； ②.1，2，3
  solution: '解：∵小云参与了所有活动．

    ∴小云第一个挑战必定成功，

    ∵小云只挑战成功一个，

    ∴小云第一个挑战成功需要得到4个“$\pi$币”，

    ∴挑战成功的活动名称为鲁班锁；

    故答案为：鲁班锁；

    （2）∵小云共挑战成功两个，且她参与的第四个活动成功，

    ∴小云第一个挑战必定成功，且挑战成功的活动可能为华容道或魔方或鲁班锁，第二，三、五次挑战失败，

    若第一次挑战华容道，

    当第四次挑战24点或数独时，最终剩下的“$\pi$币”数量的取值为$3-|-1|+2-|-1|$；

    当第四次挑战魔方时，最终剩下的“$\pi$币”数量的取值为$3-|+4\times3-|-1|=2$；

    当第四次挑战鲁班锁时，最终剩下的“$\pi$币”数量的取值为$3-|x+4|-1=3$；

    若第一次挑战魔方，

    当第四次挑战24点或数独时，最终剩下的“$\pi$币”数量的取值为$3-|-1|+2-|-1|$；

    当第四次挑战华容道时，最终剩下的“$\pi$币”数量的取值为$3-|+4\times3-|-1|=2$；

    当第四次挑战鲁班锁时，最终剩下的“$\pi$币”数量的取值为$3-|x+4|-1=3$；

    若第一次挑战鲁班锁，

    当第四次挑战24点或数独时，最终剩下的“$\pi$币”数量的取值为$4-1-1+2-1-1=2$；

    当第四次挑战华容道或魔方时，最终剩下的“$\pi$币”数量的取值为$4-|1+3-|-1||=3$；

    综上所述，最终剩下的“$\pi$币”数量的所有可能取值为1，2，3．

    故答案为：1，2，3'
