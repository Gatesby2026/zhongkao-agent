    $s_{A}^{2} = \frac{1}{5} \times \left[\right. \left(\right. 1 5 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 5 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 5 - \frac{7 9}{5} \left.\right)^{2}
    + \left(\right. 1 7 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 7 - \frac{7 9}{5} \left.\right)^{2} \left]\right.$

    $= \frac{1}{5} \times \left(\right. 0 . 6 4 + 0 . 6 4 + 0 . 6 4 + 1 . 4 4 + 1 . 4 4 \left.\right)$

    $= \frac{1}{5} \times 4 . 8$

    $= 0 . 9 6$

    $s_{B}^{2} = \frac{1}{5} \times \left[\right. \left(\right. 1 4 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 5 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 6 - \frac{7 9}{5} \left.\right)^{2}
    + \left(\right. 1 6 - \frac{7 9}{5} \left.\right)^{2} + \left(\right. 1 8 - \frac{7 9}{5} \left.\right)^{2} \left]\right.$

    $= \frac{1}{5} \times \left(\right. 3 . 2 4 + 0 . 6 4 + 0 . 0 4 + 0 . 0 4 + 4 . 8 4 \left.\right)$

    $= \frac{1}{5} \times 8 . 8$

    $= 1 . 7 6$

    $s_{A}^{2} < s_{B}^{2}$

