    ∵$\angle D A C = 2 \angle B = 2 a$，

    ∴$\angle A C G = 9 0 \circ - a$，

    ∴$\angle A C G = \angle C G D$，

    $\therefore A C = A G$，

    ∵$A B = A C$，

    ∴$B G = 2 A C$，

    ∴$B D + E F = B D + D G = B G = 2 A C$．'
