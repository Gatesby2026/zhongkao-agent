- id: 16
  type: 填空
  score: 2
  stem: '某商店共有$a$种不同型号的口罩，每种型号的口罩都有红、白、蓝三种颜色，每种型号的红色口罩价格均为每包50元，白色口罩价格均为每包$m$元，蓝色口罩价格均为每包$n$元（$6 6 \leq m < n \leq 7 4$，且$m$，$n$均为整数）．甲、乙、丙三家公司各买一包每种型号的口罩，且对于同种型号的口罩，三家公司选择的颜色各不相同．结账时，甲、乙各自花费了1200元，丙花费了1400元．

    （1）若$m = 6 9$，$n = 7 1$，则$a$的值为________；

    （2）若丙购买的口罩包含三种颜色，则丙用于购买白色和蓝色的口罩最多一共花费________元．'
  answer: ①. $2 0$    ②. $1 3 5 0$
  solution: '根据题意，三家总花费等于所有口罩的总价，可得核心等式$a \left(\right. 5 0 + m + n \left.\right) = 3 8 0 0$ ，结合$m , n$的取值范围分析求解，第一问直接代入计算即可，第二问根据丙包含三种颜色的条件，将所求目标转化为找最小的正整数$x$，结合整数性质验证得到最大值．

    解：由题意，每个型号的三种颜色被甲、乙、丙各购买一包，因此所有口罩总售价等于三家总花费，即$a \left(\right. 5 0 + m + n \left.\right) = 1 2 0 0 \times 2 + 1 4 0 0 = 3 8 0 0$．

    （1）将$m = 6 9$，$n = 7 1$代入等式得：$a \left(\right. 5 0 + 6 9 + 7 1 \left.\right) = 3 8 0 0$，

    解得$a = 2 0$．

    （2）由$6 6 \leq m < n \leq 7 4$，且$m , n$为整数，可得：$1 8 3 \leq 5 0 + m + n \leq 1 9 7$，

    ∵$a = \frac{3 8 0 0}{5 0 + m + n}$是正整数，

    ∴$5 0 + m + n = 1 9 0$，即$n = 1 4 0 - m$，$a = 2 0$，

    设丙购买红色口罩$x$包，白色口罩$y$包，蓝色口罩$z$包，

    由题意得：$\left{\right. x + y + z = 2 0 & 5 0 x + m y + n z = 1 4 0 0$，且$x \geq 1 , y \geq 1 , z \geq 1$，均为正整数，

    ∴$m y + n z = 1 4 0 0 - 5 0 x$，

    ∴要使$m y + n z$最大，需取最小的$x$，即$x = 1$，

    当$x = 1$时，$y + z = 1 9$，即$z = 1 9 - y$，

    将$x = 1$，$z = 1 9 - y$代入$m y + n z = 1 4 0 0 - 5 0 x$得$m y + n \left(\right. 1 9 - y \left.\right) = 1 3 5 0$，

    将$n = 1 4 0 - m$代入得$m y + \left(\right. 1 4 0 - m \left.\right) \left(\right. 1 9 - y \left.\right) = 1 3 5 0$，

    ∴$y = \frac{1 9 m - 1 3 1 0}{2 m - 1 4 0} = \frac{\frac{1 9}{2} \left(\right. 2 m - 1 4 0 \left.\right) + 2 0}{2 m - 1 4 0} = \frac{1 9}{2} + \frac{1 0}{m - 7 0} = \frac{1}{2} \left(\right. 1 9 + \frac{2
    0}{m - 7 0} \left.\right)$，

    ∵$y$为正整数，

    ∴$1 9 + \frac{2 0}{m - 7 0}$须为偶数，

    ∴$\frac{2 0}{m - 7 0}$须是奇数，

    ∴$m - 7 0 = \pm 4$，或$m - 7 0 = \pm 2 0$，

    ∵$6 6 \leq m < n \leq 7 4$，

    ∴$m - 7 0 = - 4$，

    ∴$m = 6 6$，

    当$m = 6 6$时，$n = 1 4 0 - m = 7 4$，此时$y = \frac{1}{2} \left(\right. 1 9 + \frac{2 0}{6 6 - 7 0} \left.\right) = 7$，则$z = 1 9 - y = 1 2$，均为正整数，满足条件，此时$m y + n z = 6 6 \times 7 + 7 4 \times 1 2 = 1 3 5
    0$（元）；

    ∴丙用于购买白色和蓝色的口罩最多一共花费1350元．'
