  solution: '先设体验1次画糖人的费用为$x$元，体验1次剪纸的费用为$y$元，根据题干给出的等量关系列出二元一次方程组，求解得到单次费用后，计算本次活动所需总费用，再与总预算150元比较大小，即可得出结论．

