    ∴$\angle D C A = 1 8 0 \circ - \angle D - \angle C A D = 1 8 0 \circ - \left(\right. 9 0 \circ - \alpha \left.\right) - 2 \alpha = 9 0 \circ - \alpha = \angle D$，

