    （2）

    解：①$\bar{x_{A}} = \frac{1}{5} \times \left(\right. 1 5 + 1 5 + 1 5 + 1 7 + n \left.\right) = \frac{6 2 + n}{5}$，

    $\bar{x_{B}} = \frac{1}{5} \times \left(\right. 1 4 + 1 5 + 1 6 + 1 6 + 1 8 \left.\right) = \frac{7 9}{5}$，

