  stem: 已知$a - b - 4 = 0$且$a + b \neq 0$，求代数式$\frac{a + b}{2 a^{2} + a b - b \left(\right. a + 2 b \left.\right)}$的值．
  answer: $\frac{1}{8}$
  solution: '首先把分式化简，可得：原式$= \frac{1}{2 \left(\right. a - b \left.\right)}$，根据$a - b - 4 = 0$，可得：$a - b = 4$，把$a - b = 4$代入化简后的代数式求值即可．

    解：$\frac{a + b}{2 a^{2} + a b - b \left(\right. a + 2 b \left.\right)}$

    $= \frac{a + b}{2 a^{2} + a b - a b - 2 b^{2}}$

    $= \frac{a + b}{2 \left(\right. a^{2} - b^{2} \left.\right)}$

    $= \frac{a + b}{2 \left(\right. a - b \left.\right) \left(\right. a + b \left.\right)}$

    $= \frac{1}{2 \left(\right. a - b \left.\right)}$，

    $\because a - b - 4 = 0$，

    $\therefore a - b = 4$，

    原式$= \frac{1}{2 \left(\right. a - b \left.\right)} = \frac{1}{2 \times 4} = \frac{1}{8}$．'
