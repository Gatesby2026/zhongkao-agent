  question: '如图1，小球从左侧的斜坡滚下，沿着水平面继续滚动一段距离后停止，在这个过程中，小球的运动速度v（单位：m/s）与运动时间t（单位：s）的函数图象如图2所示，则该小球的运动路程y（单位：m）与运动时间t（单位：s）之间的函数图象大致是（）

    [图]

    A.[图]

    B.[图]

    C.[图]

    D.[图]'
  answer: C
  solution: '解：由题意可知当小球在斜坡上滚下时，设$V_{r}=k_{1}t\left(k_{1}>0\right)$，

    则$y=V_{1}t=kt^{2}$，

    ∴运动路程y是t的二次函数，图象开口向上，图象变化趋势是先缓后陡；

    当小球在水平面滚动时，设$V_{i}=k_{i}I\left(k_{i}<0\right)$，

    则$y = V_{\mathrm{f}} t = k_{\mathrm{f}} t^{2}$，

    ∴运动路程y是t的二次函数，图象开口向下，图象变化趋势是先陡后缓；

    故选C'
