- id: 16
  type: 填空
  score: 2
  question: 某京郊民宿有二人间、三人间、四人间三种客房供游客住宿，某旅游团有25位女士游客准备同时住这三种客房共8间，如果每间客房都要住满，请写出一种住宿方案__________；如果二人间、三人间、四人间三种客房的收费标准分别为300元/间、360元/间、400元/间，则最优惠的住宿方案是_________．
  answer: ①.二人间2间，三人间3间，四人间3间（答案不唯一）； ②.二人间3间，三人间1间，四人间4间．
  solution: '解：设二人间、三人间分别需要x间，y间，则四人间需要$(8-x-y)$间，则

    $2x+3y+4(8-x-y)=25$，

    整理得：$2x+y=7$，

    ∵x，y，$8-x-y$都为非负整数，

    ∴当$x=2$时，$y=3$，$8-x-y=3$，

    ∴可行的住宿方案为：二人间2间，三人间3间，四人间3间；

    设住宿总费用为：w元，而$y=7-2x$，则

    $w=300x+360y+400(8-x-y)$

    $=3200-100x-40y$

    $=3200-100x-40(7-2x)$

    $= 2920 - 20x$，

    ∵$-20 < 0$，

    ∴当x最大，w有最小值，

    ∵$2x+y=7$，x，y，$8-x-y$都为非负整数，

    ∴$x=3$时最大，

    此时$y = 1$，$8-x-y=4$；

    ∴最佳住宿方案为：二人间3间，三人间1间，四人间4间．

    故答案为：二人间2间，三人间3间，四人间3间（答案不唯一）；二人间3间，三人间1间，四人间4间．'
