  question: '在平面直角坐标系xOy中，函数$y=kx+b$$(k\neq0)$的图象经过点$(1,1)$，$(0,-1)$，且与x轴交于点A．

    （1）求该函数的解析式及点A的坐标；

    （2）当$x>\frac{1}{2}$时，对于x的每一个值，函数$y = -x + n$的值小于函数$y=kx+b$$(k\neq0)$的值，直接写出n的取值范围．'
  answer: （1）$y=2x-1$，$A\left(\frac{1}{2},0\right)$； （2）$n \leq \frac{1}{2}$．
  solution: '【小问1详解】

    将点$(1,1)$，$(0,-1)$代入$y=kx+b$，得

    $\left\{\begin{array}{l}k+b=1\\b=-1\end{array}\right.$，解得$\left\{\begin{array}{l}k=2\\b=-1\end{array}\right.$

    所以该函数的解析式为：$y=2x-1$

    令$y = 0$，$2x-1=0$，解得$x=\frac{1}{2}$，所以点$A\left(\frac{1}{2},0\right)$

    $[公式]$小问2详解】

    当$x=\frac{1}{2}$时$y=2x-1=0$，

    把$x=\frac{1}{2}$，$y = 0$代入$y = -x + n$得$n=\frac{1}{2}$，

    ∵当$x>\frac{1}{2}$时，对于x的每一个值，函数$y = -x + n$的值小于函数$y=kx+b$$(k\neq0)$的值，

    ∴$n \leq \frac{1}{2}$．'
