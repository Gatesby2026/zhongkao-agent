    B.$\frac{1}{2}$

    C.$\frac{2}{3}$

    D.$\frac{4}{9}$'
  answer: A
  solution: '解：根据题意，列出表格如下：

    |  | 白 1 | 白 2 | 黑 |

    | --- | --- | --- | --- |

    | 白 1 |  | 白 2 、白 1 | 黑、白 1 |

    | 白 2 | 白 1 、白 2 |  | 黑、白 2 |

    | 黑 | 白 1 、黑 | 白 2 、黑 |  |

    一共有6种等可能结果，其中摸出的两枚棋子颜色相同的有2种，

    所以摸出的两枚棋子颜色相同的概率是$\frac{2}{6}=\frac{1}{3}$．

