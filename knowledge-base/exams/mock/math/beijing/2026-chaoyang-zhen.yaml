    ∴∠BAE＝∠CAD；

    （2）结论：BC＝2FG．

    理由：如图，过点E作EJ⊥BC于点J．

    ∵AB＝AC，∠BAE＝∠CAD，AE＝AD，

    ∴△BAE≌△CAD（SAS），

    ∴BE＝CD，∠ABE＝∠ACD＝90°，

    ∵AB＝AC，

    ∴∠ABC＝∠ACB，

    ∵∠EBJ+∠ABC＝90°，∠ACB+∠DCG＝90°，

    ∴∠EBJ＝∠DCG，

    ∵DG⊥BC，EJ⊥BC，

    ∴∠BJE＝∠G＝90°，

    ∴△BJE≌△CGD（AAS），

    ∴BJ＝CG，EJ＝DG，

    ∴BC＝JG，

    ∵∠EJF＝∠G＝90°，EJ＝DG，∠EFJ＝∠DFG，

    ∴△EJF≌△DGF（AAS），

    ∴FJ＝FG，

    ∴FG$=\frac{1}{2}$JG$=\frac{1}{2}$BC，

    ∴BC＝2FG．'
