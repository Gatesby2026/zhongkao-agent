      下列材料介绍了学校 Work Experience Day（职业体验日）的四项特色体验活动信息。请根据人物的特长以及意愿，为他们匹配最适合的体验项目，并将图片所对应的选项（A、B、C、D）填在相应位置上。其中一个选项为多余选项。

      A. Nurse for a day — You will have the chance to work in the school health room and learn basic first-aid and daily care skills.
      B. Teacher for a day — You can experience a real classroom setting, help plan lessons, and lead small activities just like a real teacher.
      C. Firefighter for a day — You can join in school fire safety classes and group games, and learn to keep calm when dangerous things happen.
      D. Scientist for a day — You'll get to work in the school science lab, do easy tests and share your own ideas about different science facts.

      21. Leo: I stay calm when facing danger and enjoy group work. I wish to join in fire safety activities.
      22. Sam: I do well in many subjects and like staying with classmates. I really want to try real teaching work.
      23. Cathy: I am patient and good at looking after others. I hope to learn more about basic care work.

