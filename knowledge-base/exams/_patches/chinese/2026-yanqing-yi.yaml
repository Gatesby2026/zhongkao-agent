# 延庆区 2026 一模语文 patches —— OCR 把 Q21 题号识别为 Q24，导致：
#   - Q21 完全缺失（test page-08 line 4 实际是 Q21 但 OCR 给了 "24."）
#   - Q24 stem 是 Q21 的内容（"急忙/才"）但 solution 来自答案页真 Q24（《论沉得住气》）
#   - Q20 的 solution 末尾粘连了 Q21 的答案
#
# 这是 OCR 数字串字错乱（"21." → "24."），不是 parser bug，仅 patch 可修

questions:
  11:
    # 11.根据你的理解，在下面横线处填写恰当的内容。(3分) —— stem 明示 (3分)，
    # 但答案 body 短 + 无 (N分) 标 → 回退 chaoyang default 2 → 修正为 3
    score: 3

  20:
    # 清理 Q20 solution 末尾粘连的 Q21 内容
    solution: "①立意不能散；②以心相付，本色为文；③力戒矫揉造作，绝不无病呻吟"
    score: 3

  21:
    # 新建 Q21（从 test page-08 line 4-9 + answer page-12）。stem (2分) 是原题分值
    create: true
    type: "comprehension"
    section: "modern"
    stem: |-
      请从下面两句话中任选一句进行揣摩，回答括号里的问题。(2分)

      (1)我远远看到陈先生，便急忙迎上前去，紧紧握住他的手说："咱俩又坐到一块儿了！"陈先生谦逊地急忙起身，半开玩笑地说："你是管文化的，我归你管么。"（这里两个"急忙"分别有什么样的作用？）

      (2)陈老师打断我的话说："虽说题目是个文眼，但内容比题目更重要。要让人记得住内容，这才是最要紧的，这才算好文章。"（这里连用两个"才"字，有什么表达效果？）
    answer: ""
    solution: |-
      (1)第一个"急忙"表现"我"见到陈先生时的急切与热情；第二个"急忙"表现陈先生的谦逊有礼。
      (2)两个"才"字构成递进，强调内容对好文章的重要性，突出陈先生的观点，使表达更有力度。
    score: 2

  23:
    # OCR 把答案 body 里的 (4分) 误当 Q23 分值；stem 原题为 (3分)
    score: 3

  24:
    # Q24 stem 实为 Q21 内容（OCR 错乱），且原 Q24 stem 完全没 OCR 到 → 占位
    # solution "《论沉得住气》" 是 (三) 议论文 24-26 题的篇名标识，非答案
    stem: |-
      [OCR 漏识：原 Q24 stem 缺失，请对照原图 page-08 末段（议论文《论沉得住气》第 24 题）]
    solution: |-
      [OCR 错乱：答案页给的 "《论沉得住气》" 是文章标题而非 Q24 答案。请对照原图答案 page-12]
