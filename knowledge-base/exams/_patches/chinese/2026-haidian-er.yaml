  21:
    solution: "示例：三个\"一下\"，节奏紧凑，简洁有力。从\"陡然壁立\"到\"飞起来\"再到\"跌下去\"，生动描绘出冰排撞击、崩裂、翻腾的状态，渲染出开江场面迅猛与壮阔，表达作者对大自然力量的感叹与敬畏，同时也衬托出黑衣汉子在险境中救人的英勇无畏。"
  22:
    solution: "示例：第⑤段\"渺小\"这里指冰排上的人影车影形体微小，与疯狂暴虐的辽阔江面形成对比，体现出作者对身处险境人车的担忧，以及对大自然的敬畏之情。第⑱段\"渺小\"这里指人虽然在自然面前显得弱小，却能挑战自然，表达了作者对人敢于挑战自然的赞美。"
  23:
    solution: "示例：黑衣汉子不顾冰排凶险，纵身跳上冰排救人，直面狂暴自然毫不退缩，体现了他的英勇无畏；救人成功后，黑衣汉子默默离开，不张扬、不求回报，尽显淳朴本色；小冰排被大冰排摽往下游时，众人扑向冰排合力救助体现了人们的团结互助。"
