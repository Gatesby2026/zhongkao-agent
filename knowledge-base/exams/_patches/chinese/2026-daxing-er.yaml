  19:
    solution: "示例：①摒除杂念，关注自我 ②摆脱抵触情绪，积极做事 ③做适度的有氧运动"
  20:
    solution: "示例：①好奇/向往 ②夕阳下的流凌 ③岸边大石上"
  21:
    solution: "示例一：这句话运用拟人的修辞，从\"未屈服\"\"倔强\"把河水人格化，生动写出了黄河在严冬冰封之下依然坚持流淌的状态。表达了作者对黄河坚韧顽强，永不屈服的赞美。\n\n示例二：\"如同大地深沉的叹息\"运用比喻的修辞，生动写出了水声的低沉、浑厚。表达了作者对黄河顽强生命力的赞美。"
  22:
    solution: "示例：不矛盾。\"冰封\"指黄河表面被冰层覆盖，看似静止凝固，实则在默默积蓄力量；而\"奔流\"则指冰层下河水在\"倔强地涌动\"。因此，\"冰封\"是外在形态，\"奔流\"是内在精神。表现了黄河在严寒中内敛坚韧、蓄势待发的品格，也象征着民族不屈不挠、心怀希望的精神。"
  23:
    solution: "示例一：我认为\"黄河流凌\"这个题目好。\"黄河流凌\"点明了写作对象。表达了作者对黄河及中华民族坚贞不屈、自强不息精神的赞美。标题贯穿全文。标题中的\"黄河\"与文中\"母亲河\"\"故乡的黄河\"相照应。标题平实直白，与文章沉稳朴实的行文风格契合。\n\n示例二：我认为\"流凌之歌\"这个题目好。题目不仅点明了写作对象，而且与结尾\"低沉而永恒的水声\"\"奋进的战歌\"相呼应。\"歌\"字赞美了流凌顽强的生命力，民族不屈不挠、自强不息的精神，点明了文章主旨。"
