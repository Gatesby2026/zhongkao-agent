# Claude 兜底手修 patches — 朝阳区 2026 一模语文
# 在 OCR 跑完后由 chinese_paper.py 自动 apply（保持手修不被覆盖）
#
# patch schema:
#   passages.<id>.body_replace  : [{from: str, to: str}]  字符串替换
#   passages.<id>.body_append   : str                       追加到 body 末尾
#   passages.<id>.figure        : str                       关联 figure 相对路径
#   questions.<id>.stem         : str  完全替换 stem
#   questions.<id>.stem_append  : str  追加到 stem 末尾
#   questions.<id>.options      : dict 完全替换 options
#   questions.<id>.solution     : str  完全替换 solution

passages:
  base_资料二:
    body_replace:
      - from: "巍然盘(zhù)立"
        to: "巍然矗(zhù)立"
      - from: "马古思主义"
        to: "马克思主义"
      - from: "汲(ji)取"
        to: "汲(jí)取"

  non_continuous:
    # figure 字段已由 _auto_crop_figures_for_passages 自动生成（passage-non_continuous-figure.png），
    # 无需手工 patch。本节只追加图描述文字。
    body_append: |2-


      [图1: 2022-2024 年全国中小学生体质健康达标优良率]
      - 2022 年: 55.1%
      - 2023 年: 56.6%
      - 2024 年: (OCR 遮挡未识别，请参照原图)
      数据来源: 国家统计局、国家卫生健康委

questions:
  3:
    options:
      A: "矗(zhù)立"
      B: "登载(zǎi)"
      C: "赫(hè)然"
      D: "汲(jí)取"
    stem_append: "\n\n[注：选项中括号内为题目标注的拼音；本题考查字音判断]"

  4:
    stem: |-
      文段中的画线句存在问题，请你修改。(2分)

      [原画线句（资料二）: 步入楼内，让游客感到那个风云变幻的革命年代如在眼前。]
      [病句病因：成分赘余/主语缺失（多了一个"让"字使主语缺失）]
      [参考修改: 步入楼内，游客感到那个风云变幻的革命年代如在眼前。]

  13:
    options:
      A: "又何·间·焉 / 时时而·间·进 / 字里行·间·"
      B: "小惠未·遍· / 桃李·遍·天下 / 漫山·遍·野"
      C: "公与之·乘· / 车六七百·乘· / ·乘·胜追击"
      D: "公将·鼓·之 / 伯牙善·鼓·琴 / 京韵大·鼓·"
    stem_append: "\n\n[注：·X· 表示原文中该字下有加点标记]"

  16:
    stem: |-
      中小学语文教材中，有一些课文是名著选篇，其中不少经典人物形象给我们留下了深刻印象。读过整本书后，你会对这些人物有新的认识。从下面表格中选择一个人物，分别结合课文和整本书的内容，说说你对该人物的认识发生了怎样的变化。(100字左右)

      | 人物 | 课文 | 整本书 |
      |------|------|--------|
      | 孙悟空 | 《猴王出世》(五年级下册) | 《西游记》 |
      | 祥子 | 《他像一棵挺脱的树》(五年级下册) | 《骆驼祥子》 |
      | 杨志 | 《智取生辰纲》(九年级上册) | 《水浒传》 |
      | 范进 | 《范进中举》(九年级上册) | 《儒林外史》 |

  25:
    options:
      A: "第①段中的\"常常\"具有限定的作用，增强了文章语言的客观性。"
      B: "第③段中连用\"正是因为……才……\"，强调\"快\"是时代进步的动力。"
      C: "第⑤段中的画线句是举例论证，证明快中有稳的积淀，慢里有快的力量。"
      D: "第⑥段中的\"也\"表示递进关系，进一步证明快与慢是普通人生活的辩证法。"
    stem_append: "\n\n[原文加点词: 第①段\"·常常·\" / 第③段\"·正是因为……才·\" / 第⑥段\"·也·\"]\n[原文画线句: 第⑤段画线句（参照原图 page-09）]"
