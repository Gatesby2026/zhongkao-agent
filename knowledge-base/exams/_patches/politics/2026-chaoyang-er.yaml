    q_range: [21, 25]
    body: "本部分共5题，共40分。"
questions:
  # 主观题分值（源 docx 无 (N分) markers，allocator 默认 10 → 总分超）
  # 真值 21=8 / 22=6 / 23=8 / 24=10 / 25=8 = 40 分
  21:
    score: 8
  22:
    # R3: 重写 Q22 为纯肖像权题（剥离混入的民主井盖 material + 民主设问，
    # 加入缺失的肖像权设问 + 肖像权答案）。
    score: 6
    type: "材料分析"
    section: "第二部分"
    stem: |
      镜头有框，行为有界。

      近几年，北京不少景区里，随处可见精心装扮的游客，身边跟着专属摄影师边走边拍，格外引人注目。可当他们摆好造型准备拍摄时，常会遇到其他手持专业相机的人随意蹭拍。即便被拍游客再三拒绝，仍有人不以为然，还理直气壮地说"拍几张怎么了"，甚至还把这些照片发布在社交平台上，用来博取关注、引流圈粉。

      法律链接：
      第一千零一十八条 自然人享有肖像权……
      第一千零一十九条 ……未经肖像权人同意，不得制作、使用、公开肖像权人的肖像……
      ——《中华人民共和国民法典》

      结合材料，运用所学知识，对"蹭拍他人并将照片发布到社交平台"的行为进行评析。
    answer: ""
    solution: |
      ①该行为是错误（违法）的。
      ②自然人享有肖像权，未经肖像权人同意不得制作、使用、公开他人肖像。蹭拍并发布到社交平台侵犯了被拍者的肖像权，是缺乏法治意识、不尊重他人合法权益的表现。
      ③公民在行使自身权利时不得损害他人合法权益，要增强法治观念，依法行使权利。
      ④被侵权人可依法维护自身权益（如要求停止侵害、赔礼道歉、赔偿损失等）。
      ⑤我们要做尊法学法守法用法的公民，文明拍摄、合法使用他人肖像。
    knowledge_points:
      - "肖像权"
      - "公民基本权利"
      - "权利与义务"
      - "法治意识"
    module: "ruleOfLaw"
    difficulty: "中等"
    recommended_for: ["L0", "L1", "L2", "L3"]
