    stem: |-
      镜头有框，行为有界。

      近几年，北京不少景区里，随处可见精心装扮的游客，身边跟着专属摄影师边走边拍，格外引人注目。可当他们摆好造型准备拍摄时，常会遇到其他手持专业相机的人随意蹭拍。即便被拍游客再三拒绝，仍有人不以为然，还理直气壮地说"拍几张怎么了"，甚至还把这些照片发布在社交平台上，用来博取关注、引流圈粉。

      | 法律链接 第一千零一十八条 自然人享有肖像权…… 第一千零一十九条 ……未经肖像权人同意，不得制作、使用、公开肖像权人的肖像…… ——《中华人民共和国民法典》 |
      |---|

      结合材料，运用所学，请你对"蹭拍者"的言行进行评析，并提出合理建议。
    solution: |-
      示例："蹭拍者"的行为既不符合道德要求，也违反了法律规定。该行为是不尊重他人的表现，也涉嫌侵权。公民在行使自由和权利的时候，不得损害其他公民的合法自由和权利。建议"蹭拍者"增强法治意识，尊重他人的合法权利。

      详解：本题考查公民基本权利与法治社会。蹭拍者未经被拍游客同意拍摄并发布其肖像，违反《中华人民共和国民法典》第一千零一十九条关于肖像权的规定；公民在行使自由和权利时不得损害他人合法权利，建议增强法治意识、尊重他人合法权利。
