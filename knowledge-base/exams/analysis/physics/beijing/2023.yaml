# 2023年北京中考物理试卷分析
# 难度较2022年有所回升，科普阅读融入新能源/航天背景
year: 2023
region: 北京
subject: 物理
full_score: 70
duration_minutes: 90
total_questions: 23

structure:
  - section: 单项选择题
    question_range: "1-12"
    count: 12
    score_per_question: 2
    total_score: 24
  - section: 多项选择题
    question_range: "13-15"
    count: 3
    score_per_question: 2
    total_score: 6
  - section: 实验探究题
    question_range: "16-20"
    count: 5
    total_score: 28
  - section: 科普阅读题
    question_range: "21"
    count: 1
    total_score: 4
  - section: 计算题
    question_range: "22-23"
    count: 2
    total_score: 8

difficulty_distribution:
  easy:
    ratio: 0.43
    score: 30
    description: 基础概念和简单应用，课本原型题
  medium:
    ratio: 0.40
    score: 28
    description: 需要一定分析和推理，综合性有所增强
  hard:
    ratio: 0.17
    score: 12
    description: 难度回升，实验设计和计算综合题有挑战

domain_distribution:
  力学:
    ratio: 0.34
    score: 24
    key_topics: [力与运动, 压强, 浮力, 功和功率, 机械效率]
  电学:
    ratio: 0.36
    score: 25
    key_topics: [欧姆定律, 电功率, 电与磁, 串并联]
  热学:
    ratio: 0.13
    score: 9
    key_topics: [内能, 比热容, 物态变化]
  光学:
    ratio: 0.11
    score: 8
    key_topics: [凸透镜成像, 光的折射, 色散]
  声学:
    ratio: 0.06
    score: 4
    key_topics: [声速, 超声波应用]

questions:
  # ===== 单项选择题 =====
  - number: 1
    type: 单选
    score: 2
    difficulty: easy
    domain: 声学
    knowledge_point: 声音的利用
    description: 超声波在生活和科技中的应用
    common_error: 超声波与次声波的应用场景混淆

  - number: 2
    type: 单选
    score: 2
    difficulty: easy
    domain: 光学
    knowledge_point: 光的色散
    description: 彩虹成因及白光的组成
    common_error: 色散与光的混合概念混淆

  - number: 3
    type: 单选
    score: 2
    difficulty: easy
    domain: 热学
    knowledge_point: 物态变化
    description: 日常生活中各种物态变化的判断
    common_error: 液化与汽化条件判断错误

  - number: 4
    type: 单选
    score: 2
    difficulty: easy
    domain: 力学
    knowledge_point: 质量与密度
    description: 密度概念及简单计算
    common_error: 密度是物质属性，不随质量体积变化

  - number: 5
    type: 单选
    score: 2
    difficulty: easy
    domain: 电学
    knowledge_point: 电荷与电流方向
    description: 摩擦起电及电流方向的规定
    common_error: 电子移动方向与电流方向相反

  - number: 6
    type: 单选
    score: 2
    difficulty: easy
    domain: 力学
    knowledge_point: 牛顿第一定律
    description: 惯性在生活中的表现
    common_error: 力是维持运动的原因（错误前概念）

  - number: 7
    type: 单选
    score: 2
    difficulty: medium
    domain: 热学
    knowledge_point: 热机与能量转化
    description: 四冲程内燃机工作过程及能量转化
    common_error: 做功冲程与压缩冲程的能量转化方向搞反

  - number: 8
    type: 单选
    score: 2
    difficulty: medium
    domain: 电学
    knowledge_point: 电磁感应
    description: 发电机原理与电磁感应条件
    common_error: 闭合电路和磁通量变化缺一不可

  - number: 9
    type: 单选
    score: 2
    difficulty: medium
    domain: 力学
    knowledge_point: 大气压强
    description: 大气压在生活中的应用实例
    common_error: 吸盘原理中误认为是"吸力"

  - number: 10
    type: 单选
    score: 2
    difficulty: medium
    domain: 电学
    knowledge_point: 串并联电路特点
    description: 电压表电流表的使用及读数
    common_error: 电压表量程选错导致读数不准

  - number: 11
    type: 单选
    score: 2
    difficulty: medium
    domain: 光学
    knowledge_point: 凸透镜成像规律
    description: 照相机、投影仪、放大镜的成像条件
    common_error: u>2f与f<u<2f成像特点对应错

  - number: 12
    type: 单选
    score: 2
    difficulty: hard
    domain: 力学
    knowledge_point: 简单机械综合
    description: 杠杆和滑轮组的综合分析
    common_error: 动滑轮重力对机械效率影响的计算

  # ===== 多项选择题 =====
  - number: 13
    type: 多选
    score: 2
    difficulty: medium
    domain: 力学
    knowledge_point: 浮力综合
    description: 物体浮沉条件与液体密度的关系
    common_error: 漂浮时浮力等于重力但排开体积小于总体积

  - number: 14
    type: 多选
    score: 2
    difficulty: hard
    domain: 电学
    knowledge_point: 动态电路分析
    description: 滑动变阻器变化引起的电路各量变化
    common_error: 多步推理中某一步方向判断错误导致连锁错

  - number: 15
    type: 多选
    score: 2
    difficulty: hard
    domain: 电学
    knowledge_point: 电功率图像分析
    description: 根据P-I或U-I图像分析电路参数
    common_error: 图像斜率的物理意义理解不到位

  # ===== 实验探究题 =====
  - number: 16
    type: 实验探究
    score: 4
    difficulty: easy
    domain: 光学
    knowledge_point: 探究平面镜成像
    description: 用玻璃板替代平面镜探究像与物的关系
    key_steps: [用玻璃板便于确定像的位置, 等大蜡烛替代法, 测量像距物距]
    common_error: 未说明用玻璃板而非平面镜的原因

  - number: 17
    type: 实验探究
    score: 6
    difficulty: medium
    domain: 力学
    knowledge_point: 探究影响滑动摩擦力的因素
    description: 控制变量法探究压力和接触面粗糙程度对摩擦力的影响
    key_steps: [匀速直线拉动, 控制接触面不变改变压力, 控制压力不变改变粗糙程度]
    common_error: 未保持匀速直线运动导致弹簧测力计示数不等于摩擦力

  - number: 18
    type: 实验探究
    score: 6
    difficulty: medium
    domain: 电学
    knowledge_point: 探究串联电路电压规律
    description: 验证串联电路总电压等于各部分电压之和
    key_steps: [分别测各电阻两端电压, 测总电压, 多次实验换不同电阻]
    common_error: 只做一次实验就下结论

  - number: 19
    type: 实验探究
    score: 6
    difficulty: hard
    domain: 力学
    knowledge_point: 探究浮力大小的影响因素
    description: 探究浮力与排开液体体积和液体密度的关系
    key_steps: [弹簧测力计测浮力, 控制变量, 记录数据, 验证阿基米德原理]
    common_error: 物体浸没后继续下压浮力不再变化的理解

  - number: 20
    type: 实验探究
    score: 6
    difficulty: hard
    domain: 电学
    knowledge_point: 测量小灯泡电功率
    description: 多次测量不同电压下灯泡的实际功率
    key_steps: [电路连接, 调至额定电压, 改变电压测多组数据, 分析灯丝电阻变化]
    common_error: 灯泡电阻不恒定，不能用一组数据代表

  # ===== 科普阅读题 =====
  - number: 21
    type: 科普阅读
    score: 4
    difficulty: medium
    domain: 热学
    knowledge_point: 新能源与航天技术
    description: 阅读关于中国空间站太阳能电池板的材料，回答能量转化和热传递问题
    context: 融入航天科技背景，体现科技强国主题
    common_error: 真空中无法通过热传导和热对流散热的分析

  # ===== 计算题 =====
  - number: 22
    type: 计算
    score: 4
    difficulty: medium
    domain: 力学
    knowledge_point: 浮力与压强计算
    description: 物体在液体中受力分析及浮力计算
    formula: ["F浮=ρ液gV排", "p=ρgh", "F浮=G-F示"]
    common_error: 弹簧测力计示数与浮力和重力的关系

  - number: 23
    type: 计算
    score: 4
    difficulty: hard
    domain: 电学
    knowledge_point: 电功率综合计算
    description: 含变阻器的电路电功率计算与安全电流判断
    formula: ["P=UI", "U=IR", "P=I²R"]
    common_error: 忽略电流不能超过变阻器允许最大电流的限制

overall_analysis:
  avg_score_estimate: 53
  pass_rate_estimate: 0.85
  highlights:
    - 难度较2022年回升，体现"稳中有变"
    - 科普阅读融入航天/新能源等前沿科技背景
    - 实验探究题回归经典实验但提问更灵活
    - 多选题区分度高，是拉开分差的关键
    - 图像分析题增加，考查数据处理能力
  advice:
    - 加强图像分析能力，特别是U-I和P-I图像
    - 关注科技热点与物理知识的结合
    - 实验探究注重"为什么这样做"而非只记步骤
    - 多选题训练排除法，降低漏选概率
