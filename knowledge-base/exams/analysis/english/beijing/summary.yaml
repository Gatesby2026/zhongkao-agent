# ============================================================
# 北京中考英语笔试 2021-2025 五年真题 — 跨年汇总分析
# ============================================================
# 数据来源：逐年真题分析汇总
# 最后更新：2026-04-12
# 用途：为诊断算法和学习规划提供精确的考频数据支撑

years: [2021, 2022, 2023, 2024, 2025]
region: 北京市
subject: 英语

# ================================================================
#  一、题型-知识点对应规律（5年稳定性分析）
# ================================================================

question_pattern:

  单项选择:
    note: 2021-2023为12题，2024-2025压缩为10题，核心考点不变

    代词:
      frequency: 5/5
      difficulty: 基础
      typical_position: 第1题
      variants: [人称代词主格宾格, 物主代词, 反身代词]
      note: 每年第1题必考代词，送分题

    介词:
      frequency: 5/5
      difficulty: 基础
      typical_position: 第2题
      variants: [时间介词in/on/at, 地点介词, 方位介词, 方式介词with/by]
      note: 每年第2题必考介词

    比较级与最高级:
      frequency: 5/5
      difficulty: 基础
      typical_position: 第3~4题
      variants: [比较级+than, as...as同级比较, the+最高级+of/in, more+多音节adj]

    时态_基础:
      frequency: 5/5
      difficulty: 基础
      typical_position: 第4~5题
      variants: [一般过去时, 现在进行时, 一般将来时]
      note: 每年考1个基础时态，靠时间标志词判断

    情态动词:
      frequency: 5/5
      difficulty: 基础
      typical_position: 第5~6题
      variants: [can能力/许可, must/should义务建议, need必要性, may可能性]

    连词:
      frequency: 5/5
      difficulty: 基础~中档
      typical_position: 第6~7题
      variants: [because/so因果, but/although转折, and/or并列选择, not only...but also]

    时态_进阶:
      frequency: 5/5
      difficulty: 中档
      typical_position: 第7~8题
      variants: [现在完成时have done, 过去进行时was doing]
      note: 现在完成时考频最高(4/5)，常考for/since/already/yet

    被动语态:
      frequency: 5/5
      difficulty: 中档
      typical_position: 第8~9题
      variants: [一般现在时被动, 一般过去时被动, 含情态动词被动, 一般将来时被动]

    非谓语动词:
      frequency: 5/5
      difficulty: 中档
      typical_position: 第9~10题
      variants: [to do不定式作目的状语, to do作宾语, doing动名词作宾语]

    从句:
      frequency: 5/5
      difficulty: 中档
      typical_position: 第11~12题(旧) / 第10题(新)
      variants: [宾语从句, 状语从句if/when/so that, 定语从句who/that/which]
      note: 宾语从句考频最高(5/5)，2025年新增定语从句

  完形填空:
    note: 2021-2023为8题，2024-2025压缩为6题
    genre: 记叙文（5年不变）
    theme_pattern: 成长故事+正能量感悟
    word_count: 约200-250词
    typical_考查点:
      - { type: 动词辨析, frequency: 5/5 }
      - { type: 名词辨析, frequency: 5/5 }
      - { type: 形容词辨析(心理/情感), frequency: 5/5 }
      - { type: 副词/连词(逻辑关系), frequency: 5/5 }
      - { type: 动词短语, frequency: 4/5 }
      - { type: 主旨理解(末题), frequency: 5/5, note: 最后一题总考文章主旨 }

  阅读理解:
    note: 13题26分，5年结构完全不变，改革后占比升至43%
    A篇:
      genre: 应用文
      questions: 3题6分
      difficulty: 基础
      topics: [活动通知, 课程介绍, 广告, 社团招募]
      考查重点: [信息提取, 细节查找, 写作目的]

    B篇:
      genre: 说明文/记叙文
      questions: 4题8分
      difficulty: 基础~中档
      topics: [科技生活, 自然环保, 健康饮食, AI应用]
      考查重点: [细节理解, 词义猜测, 推理判断, 主旨大意]

    C篇:
      genre: 议论文
      questions: 3题6分
      difficulty: 中档~较难
      topics: [教育观点, 社会问题, 青少年成长, 思维方式]
      考查重点: [观点理解, 论据分析, 深层推理, 态度推断]

    D篇:
      genre: 还原句子
      questions: 3题6分
      difficulty: 中档~较难
      考查重点: [逻辑衔接, 代词指代, 段落结构, 信息补充]
      note: 区分度最大的阅读题型，需要篇章分析能力

  文段表达:
    note: 2021-2023为24分(10+14)，2024-2025为18分(8+10)
    第一篇_邮件回复:
      score: 10分(旧) / 8分(新)
      difficulty: 中档
      format: 回复外国朋友邮件
      typical_topics: [学习方法, 文化活动, 景点推荐, 校园生活]
      评分要点: [要点完整, 语言得体, 格式正确]

    第二篇_命题作文:
      score: 14分(旧) / 10分(新)
      difficulty: 较难
      format: 某英文网站征稿
      word_count: 50词以上
      评分要点: [观点明确, 条理清晰, 语言准确, 内容充实]

# ================================================================
#  二、知识点出现频次（5年统计）
# ================================================================

knowledge_point_frequency:

  # ----- 必考语法点（5/5年出现）-----
  every_year:
    - point: 人称代词/物主代词
      typical_position: 单选第1题
      score: 1分
      note: 连续5年第1题必考，绝对送分

    - point: 介词(时间/地点/方式)
      typical_position: 单选第2题
      score: 1分

    - point: 形容词比较级/最高级
      typical_position: 单选第3~4题
      score: 1分

    - point: 一般过去时
      typical_position: 单选第4~5题
      score: 1分
      note: 最常考的基础时态

    - point: 情态动词
      typical_position: 单选第5~6题
      score: 1分

    - point: 被动语态
      typical_position: 单选第8~9题
      score: 1分

    - point: 非谓语动词(to do/doing)
      typical_position: 单选第9~10题
      score: 1分

    - point: 宾语从句
      typical_position: 单选最后1~2题
      score: 1分
      note: 5年全部考到，语序+引导词是核心

    - point: 记叙文完形填空
      typical_position: 完形全部
      score: 6~8分
      note: 动词/名词/形容词辨析三大必考

    - point: 应用文阅读(A篇)
      typical_position: 阅读前3题
      score: 6分

    - point: 还原句子(D篇)
      typical_position: 阅读后3题
      score: 6分

    - point: 邮件回复写作
      typical_position: 文段表达第1篇
      score: 8~10分

    - point: 命题作文
      typical_position: 文段表达第2篇
      score: 10~14分

  # ----- 高频语法点（4/5年出现）-----
  high_frequency:
    - point: 现在完成时(have/has done)
      times: 4
      note: 常考for/since/already/yet搭配

    - point: 现在进行时(be doing)
      times: 4
      note: look/listen/now标志词

    - point: 连词(because/but/and/or)
      times: 5
      note: 每年必考，但具体连词有变化

    - point: 状语从句(if/when/so that)
      times: 4
      note: 2021-2024高频，2025被定语从句替代

  # ----- 中频（2~3/5年出现）-----
  medium_frequency:
    - point: 一般将来时(will/be going to)
      times: 2

    - point: 过去进行时(was/were doing)
      times: 2

    - point: 定语从句(who/that/which)
      times: 2
      note: 2025年首次在单选中出现，可能成为新趋势

    - point: 特殊疑问词(what/where/how)
      times: 3
      note: 2024改革后被压缩掉

# ================================================================
#  三、各分数段得分策略
# ================================================================

score_sources:

  "36分（及格·60分制）":
    note: 对应旧制42分及格线
    guaranteed_questions:
      - "单选前6题（6分）——代词/介词/比较级/时态/情态动词/连词"
      - "完形前3题（3分）——记叙文开头背景信息，难度低"
      - "阅读A篇3题（6分）——应用文信息提取，最易拿分"
      - "阅读B篇前2题（4分）——说明文细节理解"
    subtotal: 19分（确定）
    additional: "阅读D篇第1题(2分) + 邮件回复基本分(5分) + 其余零散 = 约17分"
    total: 约36分

  "48分（良好·60分制）":
    note: 对应旧制56分
    additional_on_top_of_36:
      - "单选后4题（4分）——时态进阶/被动/非谓语/从句"
      - "完形后3题（3分）"
      - "阅读B篇后2题（4分）"
      - "阅读C篇前2题（4分）"
      - "邮件回复高分（7分）"
    total: 约48分

  "54分（优秀·60分制）":
    note: 对应旧制63分
    additional_on_top_of_48:
      - "阅读C篇第3题（2分）"
      - "阅读D篇后2题（4分）"
      - "命题作文高分（8分）"
    total: 约54~56分

  "58+分（拔尖·60分制）":
    additional: "全部阅读满分 + 写作接近满分"
    note: 阅读零失误+写作语言地道是关键，极少数学生能达到

# ================================================================
#  四、五年写作题目汇总
# ================================================================

writing_topics:

  邮件回复:
    2021: { topic: 回复朋友关于学习中文方法的邮件, score: 10 }
    2022: { topic: 回复朋友关于准备学校运动会的邮件, score: 10 }
    2023: { topic: 回复朋友邮件介绍传统文化体验活动, score: 10 }
    2024: { topic: 回复朋友关于北京特色景点推荐的邮件, score: 8 }
    2025: { topic: 回复朋友关于参加中国文化节活动的邮件, score: 8 }
    规律: 话题围绕中外交流、校园生活、文化分享，格式固定

  命题作文:
    2021: { topic: 做一个有责任感的人, score: 14, theme: 责任 }
    2022: { topic: 劳动实践经历与感悟, score: 14, theme: 劳动 }
    2023: { topic: 自律的重要性与经历, score: 14, theme: 自律 }
    2024: { topic: 乐于助人的经历与感悟, score: 10, theme: 助人 }
    2025: { topic: 创新与实践的经历, score: 10, theme: 创新 }
    规律: |
      每年一个核心品质词——责任/劳动/自律/助人/创新
      套路固定：讲一个经历+谈感悟
      高频句型：I learned that.../It's important to.../From then on...

# ================================================================
#  五、命题趋势（5年演变）
# ================================================================

trends:
  structure_change: |
    2021-2023: 12单选+8完形+13阅读+2写作(10+14) = 70分
    2024-2025: 10单选+6完形+13阅读+2写作(8+10) = 60分
    阅读13题26分5年不变，改革后占比从37%升至43%
  difficulty_ratio: 基础约43% + 中档约37% + 较难约20%，5年高度稳定
  reading_emphasis: 阅读理解地位持续上升，是拉开差距的核心题型
  grammar_simplification: 单选从12→10题，但10大语法考点全部保留，每题对应一个语法点
  cloze_stable: 完形填空始终为记叙文，主题正能量，从8→6题但考查逻辑不变
  writing_practical: 邮件回复始终考应用文写作，命题作文始终围绕品质/成长话题
  topics_modernize: 阅读素材逐年更新——2024起出现AI相关话题
  values_integration: 每年融入社会主义核心价值观、传统文化、劳动教育等元素

# ================================================================
#  六、2024年改革影响分析
# ================================================================

reform_impact:

  分值变化:
    笔试: "70分 → 60分（减10分）"
    听说机考: "30分 → 40分（加10分）"
    总分不变: "100分"
    意义: 降低笔试比重，提升听说能力考查

  题量变化:
    单选: "12题 → 10题（减2题，砍掉疑问词和1个基础时态位）"
    完形: "8题 → 6题（减2题，篇幅缩短）"
    阅读: "13题不变（地位进一步强化）"
    写作: "24分(10+14) → 18分(8+10)（各减2和4分）"

  备考策略调整:
    听说机考:
      - 听说机考占40分，必须投入更多精力训练听力和口语
      - 建议每天15分钟听力+10分钟朗读/跟读
      - 机考模拟练习要从初二开始

    阅读理解:
      - 阅读占43%（26/60），是笔试最大得分源
      - 重点训练B篇说明文词义猜测和C篇议论文推理
      - D篇还原句子需要专项训练篇章分析能力
      - 建议每周3-4篇限时阅读训练

    语法复习:
      - 单选虽减至10题但考点不减，复习不能缩水
      - 重点：时态(一般过去/现在完成) + 被动语态 + 从句(宾语从句必考)
      - 定语从句是2025新趋势，需加强

    写作备考:
      - 邮件回复背好模板框架，确保格式分不丢
      - 命题作文积累"品质+经历+感悟"三段式结构
      - 分值降低但评分标准不降，要写精不写多
