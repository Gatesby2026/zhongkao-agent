# ------ 命题特点 ------
exam_features:
  - 双减后首年考试，整体难度适中，注重基础知识考查
  - 单选语法点覆盖：代词、介词、疑问词、比较级最高级、时态、语态、从句
  - 完形填空为记叙文，体现志愿服务主题，传递正能量
  - 阅读素材贴近生活，B篇记叙文取代往年说明文位置，降低难度
  - 写作话题涉及劳动教育，体现"五育并举"育人理念
  - 整体阅读量与往年持平，词汇难度略有下降
