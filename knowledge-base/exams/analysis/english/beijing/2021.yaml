  # ===== 文段表达 =====
  - id: 34
    type: 文段表达
    score: 10
    knowledge_points: [应用文写作, 邮件回复, 语言得体]
    module: 书面表达
    difficulty: 中档
    description: 回复邮件，就朋友询问的问题给出建议或分享经历，要求语言得体、要点完整
    topic: 回复朋友关于学习中文方法的邮件

  - id: 35
    type: 文段表达
    score: 14
    knowledge_points: [命题作文, 记叙文/议论文, 逻辑表达]
