  - id: 15
    type: 完形
    score: 1
    knowledge_points: [形容词辨析, 感情色彩]
    module: 完形填空
    difficulty: 中档
    description: 根据人物心理变化选择形容词

  - id: 16
    type: 完形
    score: 1
    knowledge_points: [动词短语, 固定搭配]
    module: 完形填空
    difficulty: 中档
    description: 动词短语辨析，结合语境选择

  - id: 17
    type: 完形
    score: 1
    knowledge_points: [副词辨析, 逻辑衔接]
    module: 完形填空
    difficulty: 中档
    description: 副词辨析，体现故事情节转折

  - id: 18
    type: 完形
    score: 1
    knowledge_points: [动词辨析, 语境推断]
    module: 完形填空
    difficulty: 基础
    description: 常见动词在语境中的辨析

  - id: 19
    type: 完形
    score: 1
    knowledge_points: [连词辨析, 逻辑关系]
    module: 完形填空
    difficulty: 中档
    description: 前后句因果/转折关系判断

  - id: 20
    type: 完形
    score: 1
    knowledge_points: [主旨推断, 文章中心]
    module: 完形填空
    difficulty: 中档
    description: 结尾处点题，考查对文章主旨的把握

  # ===== 阅读理解（每题2分）=====
  - id: 21
    type: 阅读A
    score: 2
    knowledge_points: [应用文阅读, 信息提取]
    module: 阅读理解
    difficulty: 基础
    description: 阅读A篇应用文（活动通知/广告），细节信息查找

  - id: 22
    type: 阅读A
    score: 2
    knowledge_points: [应用文阅读, 细节理解]
    module: 阅读理解
    difficulty: 基础
    description: 从活动信息中提取时间/地点/要求等细节

  - id: 23
    type: 阅读A
    score: 2
    knowledge_points: [应用文阅读, 细节理解]
