  - id: 28
    type: 阅读C
    score: 2
    knowledge_points: [议论文阅读, 观点理解]
    module: 阅读理解
    difficulty: 中档
    description: 议论文阅读，理解作者观点和论据

  - id: 29
    type: 阅读C
    score: 2
