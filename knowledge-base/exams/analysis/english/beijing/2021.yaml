    topic: "某英文网站征稿，题目围绕'做一个有责任感的人'，描述一次承担责任的经历及感悟"
    word_count: "50词以上"

# ------ 命题特点 ------
exam_features:
  - 单选语法覆盖全面：代词、介词、时态、语态、从句、非谓语均有涉及
  - 完形填空为记叙文，讲述成长故事，体现育人导向
  - 阅读理解A应用文+B说明文+C议论文+D还原句子，梯度明显
  - 文段表达贴近学生生活，注重实际交际能力
  - 试题素材体现社会主义核心价值观和中华优秀传统文化
