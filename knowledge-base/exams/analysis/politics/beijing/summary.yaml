# ============================================================
# 北京中考道德与法治 2021-2025 五年真题 — 跨年汇总分析
# ============================================================
# 数据来源：逐年真题分析汇总
# 最后更新：2026-04-12
# 用途：为诊断算法和学习规划提供精确的考频数据支撑
# 重要：本科目为开卷考试

years: [2021, 2022, 2023, 2024, 2025]
region: 北京市
subject: 道德与法治
exam_type: 开卷
full_score: 70  # 2026年起改为80分

# ================================================================
#  一、题型-知识点对应规律（5年稳定性分析）
# ================================================================

question_pattern:

  单选题:
    Q1:
      stable_topic: 年度核心时政热点
      frequency: 5/5
      difficulty: 基础
      note: 每年第1题都以当年最重大时政事件切入（建党百年/冬奥/二十大/新质生产力/建国75周年）

    Q2:
      stable_topic: 心理健康/自我认识
      frequency: 5/5
      difficulty: 基础
      note: 固定考查心理板块——自我认识、情绪管理、挫折应对

    Q3:
      stable_topic: 宪法基础知识
      frequency: 5/5
      difficulty: 基础
      note: 几乎每年考查宪法地位、公民基本权利或基本义务

    Q4:
      stable_topic: 道德品质/社会主义核心价值观
      frequency: 5/5
      difficulty: 基础
      note: 结合人物事迹或文化现象考查道德品质

    Q5:
      stable_topic: 法治核心概念（依法治国/依法维权）
      frequency: 5/5
      difficulty: 基础~中档
      note: 考查依法治国、依法行政或公民维权途径

    Q6:
      stable_topic: 经济发展/国家战略
      frequency: 5/5
      difficulty: 中档
      note: 共同富裕、高质量发展、经济制度等

    Q7:
      stable_topic: 政治制度（人大/政协）
      frequency: 5/5
      difficulty: 中档
      note: 交替考查人大制度和政协职能

    Q8:
      stable_topic: 道德修养（诚信/友善/家风）
      frequency: 5/5
      difficulty: 基础
      note: 贴近生活的道德品质考查

    Q9:
      stable_topic: 科技创新/创新驱动
      frequency: 5/5
      difficulty: 基础~中档
      note: 每年必考科技创新，常结合最新科技成就

    Q10:
      stable_topic: 未成年人保护/特别法律
      frequency: 5/5
      difficulty: 中档
      note: 未成年人保护法、预防犯罪法等专项法律

    Q11:
      stable_topic: 民族团结/国家统一/创新精神
      frequency: 5/5
      difficulty: 基础
      note: 民族团结、国家统一或科学家精神交替出现

    Q12:
      stable_topic: 生态文明/对外开放
      frequency: 5/5
      difficulty: 基础
      note: 绿色发展或对外开放交替出现

    Q13:
      stable_topic: 国际关系/全球治理
      frequency: 5/5
      difficulty: 中档
      note: 人类命运共同体、一带一路、全球治理等

  材料分析题:
    Q14:
      stable_topic: 国情/时政综合分析
      frequency: 5/5
      score: 8
      difficulty: 中档
      note: 以年度核心主题为素材的综合分析题

    Q15:
      stable_topic: 法治/民主制度深度分析
      frequency: 5/5
      score: 8
      difficulty: 中档
      note: 法治建设、民主制度的深入探讨

    Q16:
      stable_topic: 国情/道德深度论述
      frequency: 5/5
      score: 8
      difficulty: 较难
      note: 5年中难度最高的一道材料题，需要多角度综合论述

    Q17:
      stable_topic: 法律应用（生活法律情境）
      frequency: 5/5
      score: 6
      difficulty: 中档
      note: 贴近生活的法律案例分析——消费维权、网络安全、劳动保护

    Q18:
      stable_topic: 国情/生态/发展综合
      frequency: 5/5
      score: 8
      difficulty: 中档
      note: 生态文明、乡村振兴、社会发展等主题

    Q19:
      stable_topic: 青少年成长/理想信念
      frequency: 5/5
      score: 6
      difficulty: 较难
      note: 每年最后一题联系青少年自身，谈理想、责任、担当

# ================================================================
#  二、知识点出现频次（必考/高频/中频）
# ================================================================

knowledge_point_frequency:

  # ----- 必考（5/5年出现）-----
  every_year:
    - point: 宪法（地位/权利/义务）
      typical_position: 单选第3或第5题
      score: 2~4分
      note: 宪法知识每年必考，是法治板块基石

    - point: 社会主义核心价值观
      typical_position: 单选第4或第8题
      score: 2分
      note: 常结合人物事迹或社会现象

    - point: 科技创新/创新驱动发展
      typical_position: 单选第9题 + 材料分析
      score: 4~10分
      note: 每年必考且分值波动大，从选择到材料都可能出现

    - point: 人大制度/政协/民主制度
      typical_position: 单选第7题
      score: 2~8分
      note: 政治制度每年必考，材料分析中也常涉及

    - point: 未成年人保护相关法律
      typical_position: 单选第10题
      score: 2分
      note: 贴近学生生活，法律知识实用性强

    - point: 生态文明/绿色发展
      typical_position: 单选第12题 + 材料分析
      score: 2~8分
      note: 连续5年出现，从简单选择到深度分析

    - point: 人类命运共同体/国际合作
      typical_position: 单选第13题
      score: 2分
      note: 对外关系板块固定考点

    - point: 青少年成长与责任
      typical_position: 材料分析最后一题
      score: 6分
      note: 每年收尾题，联系学生自身谈理想担当

    - point: 心理健康/情绪管理/自我认识
      typical_position: 单选第2题
      score: 2分
      note: 位置固定、难度最低的送分题

  # ----- 高频（4/5年出现）-----
  high_frequency:
    - point: 民法典/民事权利
      times: 4
      typical_position: 单选或材料分析
      note: 2021年起民法典成为法治板块新热点

    - point: 共同富裕/收入分配
      times: 4
      typical_position: 单选第6题
      note: 2022年起成为经济板块核心考点

    - point: 文化自信/传统文化
      times: 4
      typical_position: 单选第4题或材料分析
      note: 2023年升级为材料分析题

    - point: 依法行政/法治政府
      times: 4
      typical_position: 单选第5题
      note: 法治板块稳定考点

    - point: 民族团结/民族区域自治
      times: 4
      typical_position: 单选第11题
      note: 近年增加"铸牢中华民族共同体意识"

  # ----- 中频（2~3/5年出现）-----
  medium_frequency:
    - point: 全过程人民民主
      times: 3
      note: 2022年首次出现后成为新增高频点

    - point: 校园欺凌/刑事责任年龄
      times: 2
      note: 贴近学生生活的法治热点

    - point: 劳动教育/劳动权
      times: 2
      note: 双减后新增的考查维度

    - point: 人工智能治理/科技伦理
      times: 2
      note: 2024-2025年新兴考点，预计持续升温

# ================================================================
#  三、各分数段得分策略（开卷考试特点）
# ================================================================

score_sources:

  "42分（及格线60%）":
    guaranteed_questions:
      - "单选1~4题（8分）——时政常识/心理/宪法/道德，基础送分"
      - "单选8~9题（4分）——道德修养/科技创新基础"
      - "单选11~12题（4分）——民族团结/生态文明基础"
      - "材料分析第17题第1问（3分）——法律情境基本分析"
      - "材料分析第19题第1问（3分）——青少年成长基本观点"
    subtotal: 约22分（确定拿到）
    additional: 其余单选通过翻书确认 + 材料分析基本要点 = 约20分
    total: 约42分
    open_book_tip: 基础题翻目录即可定位，无需逐页查找

  "52分（良好线~75%）":
    additional_on_top_of_42:
      - "单选5~7题全对（6分）——法治/经济/政治制度，翻书确认"
      - "单选10、13题（4分）——未成年人保护/国际关系"
      - "材料分析各题基本得分（约20分）——答出核心观点即可"
    total: 约52分
    open_book_tip: 材料分析答题时先写核心观点，再翻书补充教材原文

  "60分（优秀线~86%）":
    additional_on_top_of_52:
      - "单选全对或错1题（24~26分）"
      - "材料分析答题规范、要点全面（约34分）"
    total: 约58~62分
    open_book_tip: 高分关键是答题结构完整——观点+材料+分析，翻书补充法律条文原文

  "65+分（拔尖线~93%）":
    additional: "材料分析题论述深入、多角度、有层次，使用规范政治术语"
    note: 开卷考试65+需要真正理解而非翻书抄写，要做到逻辑清晰、表述精准
    open_book_tip: 翻书只用于确认细节（如法条编号），整体框架应烂熟于心

