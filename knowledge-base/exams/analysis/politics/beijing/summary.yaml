# ================================================================
#  六、开卷考试答题策略与翻书技巧
# ================================================================

open_book_strategy:

  core_principle: "开卷考试考的是理解和运用，不是记忆和抄写"

  exam_preparation:
    - strategy: 教材标签系统
      detail: |
        用彩色标签将教材分为5大板块：法治(红)、国情(蓝)、道德(绿)、时政(黄)、心理(橙)
        每个单元首页贴标签，写上核心知识点关键词
    - strategy: 知识框架笔记
      detail: |
        准备一份A4纸知识框架，按"是什么—为什么—怎么做"整理核心考点
        开考前快速浏览框架，建立整体知识地图
    - strategy: 法律条文速查表
      detail: |
        整理高频法律条文（宪法、民法典、未成年人保护法）的关键条款
        标注条文编号和核心内容，方便快速定位

  answering_technique:
    - step: 1. 审题定位（2分钟）
      detail: 读题后先判断属于哪个知识板块，在脑中锁定教材章节
    - step: 2. 先答后翻（核心原则）
      detail: |
        先凭理解写出核心观点和答题框架
        再翻书补充具体表述和法律条文原文
        切忌边看边抄——时间不够且答案缺乏逻辑
    - step: 3. 翻书补充（每题不超过3分钟）
      detail: |
        翻书只补充三类内容：①法律条文原文 ②政策文件准确表述 ③教材原话中的关键术语
        不要大段抄写教材，提取关键句即可
    - step: 4. 规范表述
      detail: |
        材料分析题答题格式："观点（教材语言）+ 材料分析（结合题目素材）+ 总结提升"
        使用政治学科术语，避免口语化表达

  time_allocation:
    单选题: "25~30分钟（每题约2分钟，含翻书确认）"
    材料分析题: "55~60分钟（每题约10分钟）"
    检查: "5分钟（重点检查单选涂卡）"

  common_mistakes:
    - mistake: 大段抄书
      correction: 开卷不等于抄书，阅卷看的是逻辑和要点，不是篇幅
    - mistake: 翻书时间过长
      correction: 每次翻书目标明确，找到就停，不要漫无目的翻
    - mistake: 只写教材原话不结合材料
      correction: 材料分析必须引用题目素材，否则扣一半以上分数
    - mistake: 忽视小问之间的逻辑递进
      correction: 材料题的2个小问通常有递进关系（是什么→怎么做）

# ================================================================
#  七、2026年改革预期（70→80分）
# ================================================================

reform_2026:
  score_change: "满分从70分调整为80分"
  exam_type: "仍为开卷考试"
  expected_changes:
    - aspect: 分值增加方向
      prediction: |
        预计材料分析题增加10分（从44分增至约54分），单选保持26分不变
        可能新增1道材料分析题（从6题变为7题）或现有题目加分
    - aspect: 难度预期
      prediction: |
        整体难度预计保持稳定
        新增分值可能集中在中档难度，不会大幅提高上限
    - aspect: 内容调整
      prediction: |
        法治板块可能增加比重，与"全面依法治国"深入推进相呼应
        人工智能治理、数据安全等新兴领域预计占比提升
    - aspect: 备考建议
      prediction: |
        材料分析答题能力更加重要——多练习多角度论述
        关注2025年下半年至2026年上半年的重大时政事件
        教材标签系统需更加精细，以应对可能增加的翻书需求
