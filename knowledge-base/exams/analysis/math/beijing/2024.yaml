  # ===== 填空题（每题2分）=====
  - id: 9
    type: 填空
    score: 2
    knowledge_points: [二次根式, 有意义的条件]
    module: 数与式
    difficulty: 基础
    description: 若√(9-x)在实数范围内有意义，求x的取值范围

  - id: 10
    type: 填空
    score: 2
    knowledge_points: [因式分解]
    module: 数与式
    difficulty: 基础
    description: 对代数式进行因式分解

  - id: 11
    type: 填空
    score: 2
    knowledge_points: [分式方程]
    module: 方程与不等式
    difficulty: 基础
