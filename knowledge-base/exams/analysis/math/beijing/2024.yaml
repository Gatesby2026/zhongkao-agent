# ------ 命题特点 ------
exam_features:
  - 保持稳中求进，注重四基（基础知识、基本技能、基本思想、基本活动经验）
  - 真实情境：北京数字经济算力中心、国六排放标准、AI设计水杯
  - 第28题新定义题全市平均仅0.9分，是标志性压轴题型
  - 解答题分值分布：5+5+5+6+6+5+5+6+5+6+7+7
