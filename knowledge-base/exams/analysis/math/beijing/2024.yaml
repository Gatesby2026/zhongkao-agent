# ============================================================
# 2024年北京中考数学真题 — 逐题分析
# ============================================================
# 数据来源：菁优网、北京中考在线、腾讯新闻专家点评
# 最后更新：2026-04-11
# 状态：基于多来源交叉验证

year: 2024
region: 北京市
subject: 数学
full_score: 100
duration_minutes: 120
total_questions: 28
structure: "8选择(16分) + 8填空(16分) + 12解答(68分)"

# 注：部分来源误传2024年满分为120分，经多方确认仍为100分

difficulty_distribution:
  基础: { questions: 13, score: 约42分, ratio: "42%" }
  中档: { questions: 12, score: 约37分, ratio: "37%" }
  压轴: { questions: 3, score: 约21分, ratio: "21%" }

domain_distribution:
  数与代数: { ratio: "约40%", questions: [3,4,6,9,10,11,12,17,18,19,21,22,26] }
  图形与几何: { ratio: "约35%", questions: [1,2,7,8,14,15,20,24,27,28] }
  统计与概率: { ratio: "约10%", questions: [5,13,23] }
  综合与实践: { ratio: "约10%", questions: [16,25] }

# ------ 逐题分析 ------
questions:

  # ===== 选择题（每题2分）=====
  - id: 1
    type: 选择
    score: 2
    knowledge_points: [轴对称图形, 中心对称图形]
    module: 几何基础
    difficulty: 基础
    description: 判断哪个图形既是轴对称图形又是中心对称图形

  - id: 2
    type: 选择
    score: 2
    knowledge_points: [对顶角, 邻补角]
    module: 几何基础
    difficulty: 基础
    description: 两条直线相交，已知某角度数，求相关角的度数

  - id: 3
    type: 选择
    score: 2
    knowledge_points: [实数, 数轴]
    module: 数与式
    difficulty: 基础
    description: 判断实数在数轴上的位置关系

  - id: 4
    type: 选择
    score: 2
    knowledge_points: [一元二次方程, 判别式]
    module: 方程与不等式
    difficulty: 基础
    description: 一元二次方程有两个相等实数根，用Δ=0求参数值

  - id: 5
    type: 选择
    score: 2
    knowledge_points: [概率, 古典概型, 放回抽样]
    module: 统计与概率
    difficulty: 基础
    description: 袋中红黄小球各一个，放回摸球两次，求两次都摸到红球的概率

  - id: 6
    type: 选择
    score: 2
    knowledge_points: [科学记数法, 幂的运算]
    module: 数与式
    difficulty: 基础
    description: 以北京数字经济算力中心为背景，考查科学记数法和幂的运算

  - id: 7
    type: 选择
    score: 2
    knowledge_points: [尺规作图, 三角形全等判定]
    module: 三角形
    difficulty: 中档
    description: '考查"作一个角等于已知角"的尺规作图依据（SSS/SAS等）'

  - id: 8
