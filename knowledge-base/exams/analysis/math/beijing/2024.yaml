    score: 2
    knowledge_points: [垂径定理, 圆周角]
    module: 圆
    difficulty: 中档
    description: 圆O的直径AB平分弦CD，已知角D=35度，求角C

  - id: 15
    type: 填空
    score: 2
    knowledge_points: [正方形, 面积计算, 垂线段]
    module: 四边形
    difficulty: 中档
