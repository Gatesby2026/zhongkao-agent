# ================================================================
#  版本管理说明
# ================================================================
version_management:
  principle: |
    教辅材料每年出新版（通常在前一年9-10月上市）。
    主要变化：新增最新年份真题、删除最旧年份真题、微调考点分布。
    章节主体结构通常保持80-90%不变。

  tracking_strategy: |
    1. catalog.yaml 只记录品牌/系列/当前版本的基础信息
    2. 章节级详细映射放在 workbooks/<brand>/<subject>-<series>-<year>-bj.yaml
    3. 版本差异用 changes_from_<year> 字段增量记录
    4. 当新版上市时，更新当年文件即可

  update_timeline:
    "每年9月": "新学年版教辅上市，更新 catalog.yaml"
    "每年7月": "中考结束后，确认当年真题是否已被教辅收录"
    "每年4月": "检查是否有考试改革影响教辅结构"

# ================================================================
#  综合选购建议
# ================================================================
purchase_guide:

  budget_plan:
    minimum: |
      只买2本：五三全练版 + 天利38套 ≈ 75元
      全练版覆盖一轮复习，天利覆盖考前模拟
    standard: |
      买4本：五三全练版 + 五三真题分类 + 万唯试题研究 + 天利38套 ≈ 160元
      全练版打基础 → 真题分类刷专项 → 万唯变式提高 → 天利模拟冲刺
    注意: "不要贪多！3-4本做精做透 > 买10本翻一遍"

  by_level:
    L0:
      must_buy: "五三·全练版（只做★题）"
      optional: "学霸笔记 或 五星学霸·同步辅导（辅助理解，二选一）"
      dont_buy: "天利38套、万唯逆袭卷（太难打击信心）"
    L1:
      must_buy: "五三·全练版"
      recommended: "万唯·试题研究"
      optional: "五星学霸·同步辅导（查漏补缺用）"
      dont_buy: "天利38套（还不到刷卷阶段）"
    L2:
      must_buy: "五三·真题分类训练"
      recommended: "万唯·试题研究 + 天利38套"
      dont_buy: "学霸笔记（太基础）"
    L3:
      must_buy: "天利38套 + 海淀/西城一模二模真题"
      recommended: "万唯·逆袭卷"
      focus: "不是买更多书，而是限时做精做透"

  by_phase:
    "初三上(9-12月)": "五三全练版（一轮复习）"
    "寒假(1月)": "五三全练版收尾 + 开始五三真题分类"
    "初三下(2-3月)": "五三真题分类 + 万唯试题研究（二轮复习）"
    "一模前后(4月)": "万唯试题研究重难点 + 开始做套卷"
    "冲刺期(5-6月)": "天利38套 / 万唯逆袭卷 + 各区模拟题"

  purchase_channels:
    - name: 京东自营
      note: "正版保证，搜索时加「北京版」关键词"
    - name: 当当网
