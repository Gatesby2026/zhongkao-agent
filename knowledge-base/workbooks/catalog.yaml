# 最后更新：2026-04-14
# 数据来源：公开出版信息 + 教师推荐 + 学生实际使用反馈
# 范围：北京中考 × 5 个文化课科目
# ============================================================

scope:
  region: 北京
  exam_year: 2026
  subjects: [数学, 语文, 英语, 物理, 道法]

# ================================================================
#  推荐等级说明
# ================================================================
# A级：主流公认有效，覆盖面广，放心推荐
# B级：质量好但适用场景较窄，需匹配学生水平和阶段
# C级：有一定价值但需确认后再推荐

