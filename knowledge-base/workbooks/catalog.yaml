# ================================================================
#  教辅与知识库模块的对应关系
# ================================================================
kb_module_mapping_note: |
  不同教辅的编排逻辑不同，与知识库模块的对应关系需要在
  详细的章节映射文件（workbooks/<brand>/）中建立。

  编排对比：
  - 五三全练版：按教材章节 → 对应 subjects/<科目>/curriculum.yaml
  - 万唯试题研究：按考点 → 对应 subjects/<科目>/beijing/weight-analysis.yaml
  - 全品复习方案：按知识模块 → 对应 diagnostics/<科目>/ 模块划分

  章节级映射需要实体书目录数据，待补充。
  优先级：五三数学 > 万唯数学 > 其他科目
