# ================================================================
#  分级使用建议
# ================================================================
usage_tips:

  L0:
    priority_chapters: [1, 2, 5]
    priority_lessons: [1, 2, 3, 7, 12, 22, 23, 24]
    strategy: "只看知识清单 + 只做★题"
    daily_plan: "每天1课时的★题（约20-30分钟，5-8题）"
    goal: "搞定实数+整式基础 + 统计概率送分题"
    skip: "跳过课时10(韦达)、18-21(二次函数及综合)、30(相似)的★★★题"

  L1:
    priority_chapters: [3, 4, 6]
    priority_lessons: [9, 10, 15, 17, 28, 29, 34, 35]
    strategy: "做★和★★题，★★★酌情尝试"
    daily_plan: "每天1课时的★+★★题（约40分钟，10-15题）"
    goal: "★★题正确率达到80%"
    focus: "一元二次方程 + 一次函数 + 全等三角形 + 平行四边形"

  L2:
    priority_chapters: [4, 6, 8]
    priority_lessons: [10, 18, 19, 20, 30, 37, 38, 41, 42]
    strategy: "全做，重点做★★★和标注的真题"
    daily_plan: "每天精做10-15题（含★★★），约60分钟"
    goal: "★★★题正确率达到60%"
    supplement: "配合五三真题分类训练做专项突破"

  L3:
    strategy: "全练版主要用于查漏补缺，重心转向真题套卷"
    use_for: "快速翻阅知识清单、回顾已遗忘的基础知识点"
    focus_lessons: [20, 21]
    supplement: "天利38套 + 海淀西城一模二模 限时训练"
