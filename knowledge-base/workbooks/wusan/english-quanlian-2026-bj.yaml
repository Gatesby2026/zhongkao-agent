#  数据质量标记
# ============================================================
data_confidence_notes: |
  基础章节结构（★-★★难度）：置信度 高（百度百科2008版与2026版结构相同）
  ★★★难题部分：置信度 中（2026版有新题，但结构不变）
  阅读还原（北京新增）：置信度 低（2024改革后新增，公开信息有限）
  建议：购买实体书2026北京版，对照核实专题顺序和页码
