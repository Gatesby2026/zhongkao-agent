# ============================================================
# 北京中考语文 — 考试规格说明
# ============================================================
# 数据来源：北京教育考试院、历年真题分析、教育媒体
# 最后更新：2026-04-12

subject: 语文
region: 北京市
year: 2026

# ------ 基本信息 ------
basic_info:
  full_score: 100
  duration_min: 150
  exam_type: 闭卷
  exam_date: "2026年6月24日上午 8:00-10:30"
  note: 语文是中考第一科，上午首场

# ------ 试卷结构 ------
# 基于2021-2025年北京卷结构（2026预计沿用）
paper_structure:
  total_questions: 约25题（含小题）

  sections:
    - type: 基础·运用
      total_score: 约15分
      question_count: 约7-8小题
      description: 字音字形、词语、病句、语句连贯、文学常识、古诗文默写、综合性学习
      sub_detail:
        - topic: 字音字形辨析
          score: 2分
          form: 选择题
        - topic: 词语/成语使用
          score: 2分
          form: 选择题
        - topic: 病句辨析或语句衔接
          score: 2分
          form: 选择题
        - topic: 文学常识/文化常识
          score: 2分
          form: 选择题或填空
        - topic: 古诗文默写
          score: 4分
          form: 填空题（理解性默写为主）
          note: 约4空，每空1分，错字不给分
        - topic: 综合性学习/语言运用
          score: 2-3分
          form: 主观题（信息概括/图文转换/口语交际等）

    - type: 古诗文阅读
      total_score: 约18分
      question_count: 约7-8小题
      description: 文言文阅读（课内+课外对比）+ 古诗词鉴赏
      sub_detail:
        - topic: 文言文阅读
          score: 10-12分
          form: 选择题+主观题
          details:
            - 实词解释（2分，选择或填空）
            - 虚词辨析（2分，选择题）
            - 句子翻译（2-4分，主观题）
            - 内容理解与分析（4分，主观题）
          note: 通常课内一篇+课外一篇对比阅读
        - topic: 古诗词鉴赏
          score: 6分
          form: 主观题为主
          details:
            - 诗歌内容/情感理解（2-3分）
            - 表现手法/语言赏析（3-4分）
          note: 通常考课内诗词，偶有课内外对比

    - type: 名著阅读
      total_score: 约5分
      question_count: 2-3小题
      description: 必读名著的人物、情节、主题、阅读方法等
      sub_detail:
        - topic: 名著基本信息与内容考查
          score: 2-3分
          form: 填空/选择/简答
        - topic: 名著深度理解与个性化阅读体验
          score: 2-3分
          form: 主观简答
          note: 近年趋向考查真实阅读体验，非死记硬背

    - type: 现代文阅读
      total_score: 约22分
      question_count: 约8-10小题
      description: 记叙文/散文必考 + 说明文或议论文（近年以说明文为主）
      sub_detail:
        - topic: 记叙文/散文阅读
          score: 12分
          form: 主观题为主
          details:
            - 内容梳理/情节概括（2-3分）
            - 词句含义/表达效果（2-3分）
            - 人物/手法分析（2-3分）
            - 主旨/情感理解（2-3分）
            - 开放探究题（2分）
          note: 记叙文/散文是北京卷区分度最高的单篇阅读
        - topic: 说明文/议论文阅读
          score: 5-7分
          form: 选择题+主观题
          details:
            - 信息筛选/说明方法辨析（2分）
            - 语言特点分析（2-3分）
            - 内容理解/观点分析（2分）
          note: 近年多考非连续性文本（多则材料+图表），说明文居多

    - type: 写作
      total_score: 40分
      question_count: 2选1
      description: 两道作文题任选其一（命题/半命题 + 想象/情境写作）
      sub_detail:
        - topic: 题目一（命题/半命题作文）
          score: 40分
          form: 记叙文为主
          note: 贴近学生生活实际，重视真情实感
        - topic: 题目二（想象/创意类作文）
          score: 40分
          form: 想象作文/情境写作
          note: 近年考过科幻想象、穿越对话等创意题目
      requirements:
        - 不少于600字
        - 不得出现真实校名/人名
        - 诗歌除外（一般要求写记叙文或议论文）

# ------ 难度分布 ------
difficulty_ratio:
  five_year_average:
    easy: 55       # 基础题约55%（约55分）
    medium: 30     # 中档题约30%（约30分）
    hard: 15       # 较难题约15%（约15分）
    note: 语文难度分布整体比数学平缓，区分度主要在阅读和写作

  difficulty_by_section:
    基础·运用: { easy_ratio: "约85%", note: "默写和基础题是送分区" }
    古诗文阅读: { easy_ratio: "约50%", note: "翻译和赏析有一定难度" }
    名著阅读: { easy_ratio: "约60%", note: "深度理解题有区分度" }
    现代文阅读: { easy_ratio: "约30%", note: "记叙文深层理解是难点" }
    写作: { easy_ratio: "约40%", note: "一类文和二类文之间差距大" }

# ------ 命题趋势（2022新课标后）------
trends:
  - name: 情境化与生活化
    description: 基础题更多嵌入真实语言情境（通知/演讲稿/解说词等）
  - name: 传统文化强化
    description: 古诗文比重稳定偏高，文化常识考查增多
  - name: 整本书阅读深化
    description: 名著阅读从识记走向理解，考查真实阅读体验与思考
  - name: 非连续性文本
    description: 现代文阅读中多则材料+图表的非连续性文本比重增加
  - name: 创意写作
    description: 作文题二的想象/创意类题目成为稳定设置
  - name: 跨学科融合
    description: 阅读材料可能涉及科技/历史/艺术等跨学科内容
  - name: 核心素养导向
    description: 考查从"知识记忆"转向"语言运用""思维品质""审美鉴赏"

# ------ 评分说明 ------
scoring_notes:
  - 选择题每题2分，错选不给分
  - 默写题每空1分，有错别字该空不给分
  - 文言文翻译按关键词采分，每个关键词0.5-1分
  - 现代文阅读主观题按要点给分，答出要点即得分，表述不准确酌情扣分
  - 作文评分分四等（一类36-40 / 二类30-35 / 三类24-29 / 四类24以下）
  - 作文卷面书写占隐性分值，整洁美观可上浮1-2分
  - 作文字数不足600字，每少50字扣1分
