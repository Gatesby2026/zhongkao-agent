# ============================================================
# 三、提分优先级排序
# ============================================================
improvement_priority:
  description: |
    根据分值权重、提分难度和投入产出比排序。
    开卷考试特点：知识点可以翻书查，但理解运用能力和答题技巧才是提分关键。

  ranking:
    - rank: 1
      area: 选择题正确率提升
      potential_gain: 4-8分
      difficulty: 低
      method: |
        选择题不需要翻书，靠日常积累和审题技巧。
        练习排除法，熟悉常见陷阱（偷换概念、绝对化表述）。
        这是最高性价比的提分点。

    - rank: 2
      area: 法治板块（宪法+公民权利+依法治国）
      potential_gain: 4-6分
      difficulty: 中
      method: |
        法治知识概念性强，容易混淆但也容易通过对比记忆掌握。
        重点突破：宪法地位、公民权利辨析、违法犯罪区分。
        制作对比表格贴在笔记本上。

    - rank: 3
      area: 材料分析题答题规范
      potential_gain: 6-10分
      difficulty: 中
      method: |
        掌握"知识点+材料分析"的答题模板。
        练习分点作答、使用教材术语。
        即使知识点找到了，表述不规范也会丢分。

    - rank: 4
      area: 时政热点积累
      potential_gain: 4-6分
      difficulty: 中
      method: |
        提前整理当年重大时政到笔记本。
        练习将时政与教材知识点建立联系。
        重点：两会、重大科技成就、国际关系。

    - rank: 5
      area: 国情板块（政治制度+国策+发展战略）
      potential_gain: 3-5分
      difficulty: 中
      method: |
        制度类知识概念辨析是选择题常考点。
        重点突破：根本制度vs基本制度、人大vs政协。

    - rank: 6
      area: 道德与品格板块
      potential_gain: 2-4分
      difficulty: 低
      method: |
        这部分贴近生活，理解难度低。
        重点掌握诚信、责任、规则三个核心概念。

    - rank: 7
      area: 综合探究题（压轴题）
      potential_gain: 3-5分
      difficulty: 高
      method: |
        需要跨板块综合运用知识。
        练习从多个角度（道德+法治+国情）分析同一问题。
        开放性设问要体现思辨能力。

    - rank: 8
      area: 心理健康板块
      potential_gain: 1-3分
      difficulty: 低
      method: |
        分值占比低，但难度也低，容易拿分。
        重点掌握情绪调节方法和人际交往原则。

# ============================================================
# 四、时政热点专项说明
# ============================================================
current_events_note:
  importance: |
    时政热点在道法考试中的渗透远超"时政板块"本身。
    选择题、时政分析题、综合探究题都可能以时政为背景材料。
    实际涉及时政的分值可能高达20-25分（含交叉部分）。

  focus_period: 2025年7月 - 2026年6月
  key_tracking_areas:
    - 全国两会（2026年3月）重点议题
    - 中央经济工作会议精神
    - 重大科技突破（航天、AI、新能源等）
    - 国际重大事件及中国立场
    - 民生领域新政策
    - 北京市重大发展举措

  preparation_advice:
    - 每月整理1次时政要点，写入笔记本
    - 每条时政关联2-3个教材知识点
    - 考前1个月集中梳理，做成快速查阅索引
    - 关注《时事》杂志（中学版）和官方时政学习材料
