# 北京中考 道德与法治 知识点权重分析
# 满分: 80分（2026年起）  考试形式: 开卷考试

subject: 道德与法治
region: 北京
target_year: 2026
full_score: 80

# ============================================================
# 一、模块权重总览
# ============================================================
module_weights:
  - module: 法治教育
    code: LAW
    weight: 0.30
    estimated_score: 24
    trend: 稳定偏高
    note: 北京中考法治板块始终占比最大，宪法和公民权利是核心

  - module: 国情教育
    code: NATION
    weight: 0.25
    estimated_score: 20
    trend: 稳中有升
    note: 国情与时政常结合出题，政治制度和发展战略考查频繁

  - module: 道德教育
    code: MORAL
    weight: 0.20
    estimated_score: 16
    trend: 稳定
    note: 主要在选择题和情境探究题中考查

  - module: 时政热点
    code: CURRENT
    weight: 0.15
    estimated_score: 12
    trend: 波动（取决于当年大事）
    note: 每年内容更新，与国情、法治板块交叉出题

  - module: 心理健康
    code: MENTAL
    weight: 0.10
    estimated_score: 8
    trend: 稳定偏低
    note: 主要在选择题中出现，偶尔在情境题中涉及

