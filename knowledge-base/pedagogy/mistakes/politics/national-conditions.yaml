# ============================================================
# 易错点：国情国策
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：道法是开卷考试，错误核心不是"不知道"而是"翻不到、写不准"

module: 国情国策
module_id: nationalConditions

mistakes:

  - id: NC-01
    name: 基本国情核心概念混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 3-5分
    description: |
      基本国情、主要矛盾、基本路线等核心表述容易混淆。
      常见错误：
      - 基本国情：我国仍处于并将长期处于社会主义初级阶段——漏掉"长期"
      - 主要矛盾：人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾
        ——写成旧表述"人民日益增长的物质文化需要同落后的社会生产之间的矛盾"
      - 基本路线的核心内容"一个中心、两个基本点"说不全
      开卷陷阱：这些表述在书上能找到，但原文很长，抄写时容易漏字改字
    exam_examples:
      - { year: 2022, qid: 12, description: "主要矛盾表述判断" }
      - { year: 2024, qid: 11, description: "基本国情与基本路线" }
    fix_method: |
      在教材对应页面用荧光笔标注关键表述，重点标注易漏关键词：
      - 基本国情："并将长期处于"不能漏
      - 主要矛盾："美好生活需要"不是"物质文化需要"
      - 基本路线："以经济建设为中心，坚持四项基本原则，坚持改革开放"
      做好书签，确保30秒内翻到这三个核心表述
      标准：默写三大核心表述，与教材原文逐字对照，零偏差

  - id: NC-02
    name: 制度名称和内容记错
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      我国的根本制度、基本制度、基本政治制度等名称和层级混淆。
      常见错误：
      - 根本制度是"社会主义制度"，不是"人民代表大会制度"
      - 根本政治制度是"人民代表大会制度"
      - 基本政治制度有三个：中共领导的多党合作和政治协商制度、
        民族区域自治制度、基层群众自治制度——常漏掉基层群众自治
      - 基本经济制度的表述不完整
    exam_examples:
      - { year: 2023, qid: 11, description: "我国基本制度体系" }
      - { year: 2025, qid: 12, description: "根本制度与基本制度辨析" }
    fix_method: |
      制度层级树（画在教材空白处）：
      根本制度：社会主义制度
      ├─ 根本政治制度：人民代表大会制度
      ├─ 基本政治制度：多党合作+民族区域自治+基层群众自治
      ├─ 基本经济制度：公有制为主体+多种分配方式+社会主义市场经济
      └─ 根本法：宪法
      注意"根本"和"基本"的区别，答题时必须翻书核对准确名称
      标准：画出完整的制度体系图，与教材核对无误

  - id: NC-03
    name: 新发展理念与具体措施答偏
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      新发展理念（创新、协调、绿色、开放、共享）是大题高频考点。
      常见错误：
      - 材料讲"区域协调发展"，答题却写成"创新发展"
      - 材料讲"精准扶贫"，答题写"绿色发展"而非"共享发展"
      - 五大理念和具体政策对不上号
      - 只写理念名称不展开，缺少对应措施的分析
      开卷难点：五大理念在教材中分散在多处，翻找费时
    exam_examples:
      - { year: 2023, qid: 24, description: "新发展理念材料分析" }
      - { year: 2024, qid: 23, description: "新发展理念与实践" }
      - { year: 2025, qid: 24, description: "五大理念综合运用" }
    fix_method: |
      五大理念速查卡（夹在教材对应章节）：
      - 创新：科技创新、制度创新、人才强国 → 关键词"科技""第一动力"
      - 协调：城乡/区域/经济社会协调 → 关键词"平衡""差距"
      - 绿色：生态文明、节能减排 → 关键词"环保""可持续"
      - 开放：对外开放、一带一路 → 关键词"国际""合作""进出口"
      - 共享：民生、公平、扶贫 → 关键词"人民""福祉""公平"
      答题时先圈材料关键词，再对应理念，最后翻书找原文
      标准：给10段材料，正确匹配对应理念并写出教材依据

  - id: NC-04
    name: '"为什么"和"怎么做"答混'
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 3-6分
    description: |
      这是道法大题最常见的失分原因。
      常见错误：
      - 题目问"为什么要保护环境"，却答"我们应该少开车、节约用水"（答成了怎么做）
      - 题目问"青少年应该怎么做"，却答"因为科技是第一生产力"（答成了为什么）
      - 一道大题中"原因+做法"两问混在一起答
      开卷考试中这不是知识问题而是审题问题，翻到了正确页面但答的方向错了
    exam_examples:
      - { year: 2022, qid: 23, description: "为什么+怎么做综合题" }
      - { year: 2023, qid: 25, description: "国情分析原因与对策" }
      - { year: 2024, qid: 24, description: "为什么要坚持改革开放" }
      - { year: 2025, qid: 25, description: "综合分析题" }
    fix_method: |
      审题第一步：圈出问题类型词
      - 看到"为什么/原因/意义/重要性"→答原因（是什么、有什么作用）
      - 看到"怎么做/如何/启示/建议"→答做法（应该怎样）
      答题模板：
      "为什么"类：①这是由__决定的；②有利于__；③__的需要
      "怎么做"类：①国家层面：__；②社会层面：__；③个人层面：__
      标准：做10道大题，每题先写出"本题问的是为什么/怎么做"再答题

  - id: NC-05
    name: 宪法地位和作用表述不准
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      宪法作为国家根本法的地位和作用是选择题常考内容。
      常见错误：
      - "宪法是国家的根本大法"——正确表述是"根本法"不是"根本大法"
      - 宪法与普通法律的区别说不清（内容、效力、制定修改程序）
      - "宪法是其他法律的立法基础和立法依据"表述不完整
      - 把"依法治国的核心是依宪治国"漏掉
    exam_examples:
      - { year: 2022, qid: 3, description: "宪法地位选择题" }
      - { year: 2024, qid: 4, description: "宪法与普通法律关系" }
    fix_method: |
      宪法三个"最"（在教材上标注）：
      1. 内容最重要：规定国家根本制度和根本任务
      2. 法律效力最高：其他法律不得与宪法相抵触
      3. 制定修改程序最严格：全国人大2/3以上多数通过
      注意用语规范："根本法"不加"大"字
      标准：做8道宪法地位相关选择题，全对

  - id: NC-06
    name: 民族政策和民族关系表述不全
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      民族政策相关内容在大题中偶尔出现，表述要求严格。
      常见错误：
      - "民族区域自治制度"漏写"区域"二字
      - 新型民族关系"平等团结互助和谐"漏掉"和谐"
      - 处理民族关系的基本原则"民族平等、民族团结、各民族共同繁荣"说不全
      - 把民族区域自治和"一国两制"搞混
    exam_examples:
      - { year: 2023, qid: 13, description: "民族政策选择题" }
      - { year: 2025, qid: 23, description: "民族团结材料分析" }
    fix_method: |
      民族知识"三个三"速记（写在教材民族章节页眉）：
      - 新型民族关系：平等、团结、互助、和谐（4个词不能少）
      - 基本原则：民族平等、民族团结、各民族共同繁荣（3个原则）
      - 基本制度：民族区域自治制度（注意"区域"二字）
      答题时翻书逐字核对，不要凭记忆默写
      标准：完整写出民族关系、基本原则、基本制度，与教材一致

by_level:
  L0:
    focus: [NC-01, NC-02, NC-05]
    message: "基本国情和制度名称是选择题必考，先在书上做好标签确保翻得快"
  L1:
    focus: [NC-01, NC-03, NC-04]
    message: "大题高频考新发展理念和为什么/怎么做，审题比翻书更重要"
  L2:
    focus: [NC-03, NC-04, NC-06]
    message: "冲高分靠答题方向精准和表述规范，每个关键词都要与教材原文一致"
