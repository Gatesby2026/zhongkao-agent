# ============================================================
# 易错点：名著阅读
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 说明：名著阅读约5分，分值不大但考查面广，需要真正读过原著

module: 名著阅读
module_id: masterpieceReading

mistakes:

  - id: MR-01
    name: 人物绰号张冠李戴
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      名著中人物众多，绰号/称号容易搞混：
      - 《水浒传》最严重：花和尚是鲁智深不是武松，豹子头是林冲不是杨志
      - 《西游记》中妖怪名号混淆：金角大王/银角大王的法宝搞混
      - 《骆驼祥子》中虎妞和小福子的性格特点搞反
      - 《朝花夕拾》中长妈妈、藤野先生等人物事迹张冠李戴
    exam_examples:
      - { year: 2022, qid: 7, description: "名著人物与绰号对应" }
      - { year: 2024, qid: 7, description: "名著人物辨析" }
    fix_method: |
      制作"人物名片"：
      1. 每部必考名著的主要人物（8-10个）各做一张卡片
      2. 卡片内容：姓名、绰号/称号、主要事迹（3件）、性格特点
      3. 重点名著：《水浒传》《西游记》《骆驼祥子》《朝花夕拾》
      4. 用表格对比容易搞混的人物
      标准：随机抽查20个人物绰号，全部对应正确

  - id: MR-02
    name: 情节与作品对应错误
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      把A书的情节安到B书上：
      - 把《西游记》"三打白骨精"和"三借芭蕉扇"的细节搞混
      - 把《水浒传》"武松打虎"的地点和"鲁提辖拳打镇关西"搞串
      - 把《钢铁是怎样炼成的》和《红星照耀中国》的情节混淆
      - 把鲁迅不同作品中的事件搞错归属
    exam_examples:
      - { year: 2023, qid: 7, description: "判断情节归属（四选一）" }
      - { year: 2024, qid: 8, description: "名著情节排序" }
    fix_method: |
      "故事线梳理法"：
      1. 每部名著画一条时间线，标注重大事件
      2. 重点记住每个经典情节的"五要素"：谁、在哪、做什么、为什么、结果
      3. 易混情节专项对比：列表对比两个相似情节的不同点
      4. 结合原著阅读，不要只看缩写版
      标准：做20道情节归属判断题，正确率>90%

  - id: MR-03
    name: 只背梗概答不出细节
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 1-2分
    description: |
      北京卷名著题越来越重视"真读"，不再考死记硬背：
      - 问"祥子第一次丢车的经过"，只能答"被兵抢了"，说不出具体细节
      - 问"孙悟空三借芭蕉扇"的过程，只能答"借了三次"，说不出每次的方法
      - 问"保尔修铁路时遇到什么困难"，只能答"很艰苦"，没有具体情节
      阅卷要求有具体情节支撑，泛泛而谈扣分
    exam_examples:
      - { year: 2023, qid: 8, description: "简述名著中某一具体情节" }
      - { year: 2024, qid: 8, description: "用具体情节说明人物性格" }
    fix_method: |
      "精读片段"策略：
      1. 每部名著精读5-8个核心章节（不是全书通读）
      2. 每个核心章节记住3个具体细节（对话、动作、环境）
      3. 练习"30秒复述"：不看书，用30秒讲出一个情节的完整经过
      北京必考名著精读清单：
      - 《骆驼祥子》：买车三起三落
      - 《西游记》：三打白骨精、三借芭蕉扇
      - 《水浒传》：鲁提辖拳打镇关西、林教头风雪山神庙
      标准：随机抽5个经典情节，每个能说出3个以上具体细节

  - id: MR-04
    name: 阅读感悟空泛
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 1分
    description: |
      开放性名著题要求写阅读感悟/推荐理由，学生常写成：
      - "这本书很好看，让我学到了很多"→空话
      - "主人公很勇敢，我们要向他学习"→套话
      - 脱离原著内容，写成空洞的议论文
      北京卷要求感悟必须结合具体内容
    exam_examples:
      - { year: 2022, qid: 8, description: "写名著推荐语" }
      - { year: 2024, qid: 8, description: "结合内容谈阅读感悟" }
    fix_method: |
      "具体事例+个人感悟"模式：
      1. 先写一个具体情节/细节（2-3句）
      2. 再写这个情节给你的感受/启发（2-3句）
      3. 避免大而空的话，聚焦一个小角度
      示例（差→好）：
      - 差："祥子很努力，我们要向他学习。"
      - 好："祥子省吃俭用三年买了第一辆车，连过年都舍不得休息。
        这种对梦想的执着让我想到自己遇到困难就想放弃，相比之下很惭愧。"
      标准：写5篇名著感悟，每篇都有具体情节支撑

by_level:
  L0:
    focus: [MR-01, MR-02]
    message: "先把人物和情节对应关系搞清楚，这是名著题的基本分"
  L1:
    focus: [MR-02, MR-03]
    message: "要能说出情节细节，不能只背梗概，精读核心章节是关键"
  L2:
    focus: [MR-03, MR-04]
    message: "名著题要拿满分，感悟必须有具体情节支撑，展现真正的阅读深度"
