# ============================================================
# 易错点：现代文阅读（记叙文+说明文/议论文）
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 说明：现代文阅读约22分，是语文拉分最大的模块，答题规范直接影响得分

module: 现代文阅读
module_id: modernReading

mistakes:

  - id: MO-01
    name: 记叙文词句赏析只翻译不分析
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      "赏析画线句子"是北京卷高频题型，学生常见问题：
      - 只把句子换个说法重述一遍，没有分析
      - 只说"写得很好""很生动"，没有具体说好在哪里
      - 忽略修辞手法或描写方法的判断
      阅卷标准：手法判断+具体分析+表达效果，三者缺一不可
    exam_examples:
      - { year: 2022, qid: 18, description: "赏析画线句子的表达效果" }
      - { year: 2024, qid: 18, description: "品味语言（赏析加点词/画线句）" }
    fix_method: |
      "三层赏析法"：
      1. 判断手法：修辞（比喻/拟人/排比）或描写（动作/神态/心理/环境）
      2. 具体分析：比喻→把什么比作什么；动作描写→哪个动词写出了什么
      3. 表达效果：生动写出了___（内容），表现了___（情感/性格/主题）
      易错提醒：
      - "生动形象"不是万能效果，要具体到写出了什么
      - 排比的效果是增强语势/强调，不要写"生动形象"
      标准：做10道赏析题，每道按三层写，对照答案检查

  - id: MO-02
    name: 答题要点不全
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      现代文阅读大题通常3-4分，需要多个要点：
      - 问"文章写了哪几件事"，只写了两件漏了一件
      - 问"人物形象特点"，只写一两个方面
      - 问"某段在文中的作用"，只答内容不答结构
      北京卷按要点采分，每个要点1分，漏一个扣一分
    exam_examples:
      - { year: 2023, qid: 17, description: "概括文章主要事件（4分）" }
      - { year: 2024, qid: 19, description: "分析人物形象（4分）" }
    fix_method: |
      "看分答题法"：
      1. 先看分值：4分题至少答4个要点（每点1分）
      2. 段落分析法：逐段找信息，防止遗漏
      3. 答题用分号或序号分隔要点，让阅卷老师一目了然
      常见题型要点数量：
      - 概括事件（4分）→至少3-4件事
      - 人物形象（4分）→至少3-4个特点
      - 段落作用（3分）→内容+结构+情感各1分
      标准：做真题大题时先预判要点数量，再逐一写出

  - id: MO-03
    name: 手法术语用错
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      答题时用错术语，阅卷直接扣分：
      - 把"对比"说成"比较"（比较不是文学术语）
      - 把"铺垫"说成"伏笔"（铺垫是明写，伏笔是暗写）
      - 把"借景抒情"说成"触景生情"（前者是手法，后者是创作过程）
      - 把"衬托"说成"对比"（衬托有主次，对比无主次）
      - 说明文中"举例子"说成"举例说明"
    exam_examples:
      - { year: 2023, qid: 18, description: "分析写作手法" }
      - { year: 2024, qid: 17, description: "说明方法辨析" }
    fix_method: |
      整理"易混术语对比表"：
      1. 铺垫vs伏笔：铺垫→正面渲染蓄势；伏笔→暗中交代，后文照应
      2. 对比vs衬托：对比→双方并列无主次；衬托→以宾衬主
      3. 借景抒情vs寓情于景：前者情景分写；后者情景交融
      4. 说明方法八种：举例子、列数字、打比方、作比较、
         分类别、下定义、作诠释、摹状貌
      标准：做术语辨析专项练习20题，正确率>90%

  - id: MO-04
    name: 开放题脱离文本
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 2-3分
    description: |
      北京卷现代文最后一题常为开放性题目（谈理解/感悟/联系实际）：
      - 完全脱离原文，写成独立的议论文
      - 只联系生活不回扣文章内容
      - 观点与文章主旨不一致甚至矛盾
      - 答题过于简短，一两句话就完了（通常4分题需要较充分的论述）
    exam_examples:
      - { year: 2022, qid: 20, description: "结合文章谈理解（开放题）" }
      - { year: 2024, qid: 20, description: "联系生活谈感悟" }
    fix_method: |
      "文本+观点+联系"三段式：
      1. 回扣文本：文中写了___/文中___这个细节让我印象深刻
      2. 提出观点：我认为___/这让我明白了___
      3. 联系实际：在生活中___/这对我的启发是___
      注意事项：
      - 第1步一定要有，这是得分的前提（阅卷看你有没有读懂文章）
      - 观点要与文章主旨一致，不能唱反调
      - 字数不少于80字（4分题的基本要求）
      标准：做5道开放题，每道都包含文本引用+个人观点+联系实际

  - id: MO-05
    name: 说明方法辨析混淆
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      北京卷非连续性文本/说明文常考说明方法辨析：
      - "打比方"和"作比较"分不清：打比方是比喻，作比较是两者对比
      - "下定义"和"作诠释"搞混：下定义用"是"字严格界定；作诠释是解释说明
      - "列数字"漏看：文中出现数据就是列数字，但学生经常忽略
      - 说明方法的作用答得太笼统，没有结合具体内容
    exam_examples:
      - { year: 2022, qid: 15, description: "辨别说明方法并分析作用" }
      - { year: 2023, qid: 16, description: "说明方法辨析" }
    fix_method: |
      说明方法"关键词识别法"：
      1. 看到"像、如同、仿佛"→打比方
      2. 看到"比、相比、而"（两事物）→作比较
      3. 看到具体数字→列数字
      4. 看到"例如、比如"→举例子
      5. 看到"是指、是"（严格定义）→下定义
      6. 看到解释性语句（非严格定义）→作诠释
      答作用的模板：
      "运用了___的说明方法，具体/准确/生动地说明了___（说明对象的特征）"
      标准：做15道说明方法辨析题，方法判断+作用分析都正确

by_level:
  L0:
    focus: [MO-01, MO-02, MO-05]
    message: "赏析题学会三层答题法，大题先看分值再定要点数量，说明方法记住关键词"
  L1:
    focus: [MO-02, MO-03, MO-04]
    message: "要点完整性是提分关键，术语要准确，开放题不能脱离文本"
  L2:
    focus: [MO-04, MO-03]
    message: "现代文阅读冲18分以上，开放题要有深度，术语运用精准"
