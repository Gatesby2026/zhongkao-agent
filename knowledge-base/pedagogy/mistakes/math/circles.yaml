# ============================================================
# 易错点：圆
# ============================================================
# 最后更新：2026-04-11

module: 圆
module_id: circles

mistakes:

  - id: CI-01
    name: 圆周角与圆心角关系搞混
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      核心定理：同弧上的圆周角 = 圆心角的一半。
      常见错误：
      1. 看到角就以为是圆心角（其实顶点在圆上是圆周角）
      2. 直径所对的圆周角=90°记住了，但反过来（圆周角=90°→弦是直径）不会用
      3. 同弧上圆周角相等——漏掉"同弧"条件
    exam_examples:
      - { year: 2022, qid: 15, description: "圆中的角度计算" }
      - { year: 2024, qid: 15, description: "圆周角定理" }
    fix_method: |
      三种角要分清：
      - 圆心角：顶点在圆心→等于弧的度数
      - 圆周角：顶点在圆上→等于弧的度数的一半
      - 弦切角：一边是切线→等于所夹弧的一半
      标准：画10个圆的图，标出角的种类并求值

  - id: CI-02
    name: 切线证明缺少关键步骤
    frequency: 极高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      证明一条直线是圆的切线，必须证两个条件：
      1. 过圆上的点（点在圆上）
      2. 垂直于过该点的半径（OA⊥l）
      常见错误：只证了垂直没证过圆上的点，或反过来。
      另一种方法：证明圆心到直线的距离等于半径（d=r）。
    exam_examples:
      - { year: 2021, qid: 24, description: "切线的证明" }
      - { year: 2023, qid: 24, description: "圆的切线证明" }
      - { year: 2025, qid: 24, description: "切线证明与计算" }
    fix_method: |
      切线证明两条路（选一条走到底）：
      路1："连半径，证垂直"——连接圆心与切点，证明半径⊥直线
      路2："算距离，等半径"——算d(O, l)=r
      ⚠️ 用路1时，如果"过圆上的点"这个条件不在已知中，必须先证点在圆上
      标准：做5年真题中所有切线证明题

  - id: CI-03
    name: 垂径定理使用条件不全
    frequency: 中
    affected_levels: [L1]
    typical_score_loss: 2-3分
    description: |
      垂径定理：垂直于弦的直径平分弦及弦所对的弧。
      前提：必须是"直径"且"垂直于弦"，两个条件缺一不可。
      常见错误：看到垂直就用，但忘了验证那条线是否过圆心。
    exam_examples:
      - { year: 2024, qid: 24, description: "垂径定理应用" }
    fix_method: |
      用垂径定理前检查清单：
      ☐ 这条线是直径吗？（过圆心）
      ☐ 它垂直于弦吗？
      两个都打勾才能用
      标准：做5道垂径定理题，每题标出用定理的两个条件

  - id: CI-04
    name: 弧长和扇形面积公式中角度单位搞错
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      弧长公式有两种形式：
      - 角度制：l = nπr/180（n是角度）
      - 弧度制：l = αr（中考不考弧度，但公式容易混）
      扇形面积：S = nπr²/360
      常见错误：n该用角度却代了弧长，或分母该写360写成180
    exam_examples:
      - { year: 2023, qid: 23, description: "扇形面积计算" }
    fix_method: |
      公式对照（中考只用角度制）：
      - 弧长：l = nπr/180
      - 扇形面积：S = nπr²/360 = lr/2
      记忆：弧长分母180，面积分母360（面积多一个r，所以分母多一倍）
      标准：做5道弧长/扇形面积题，公式不查表

by_level:
  L0:
    focus: [CI-01, CI-04]
    message: "先分清圆心角和圆周角，公式别记混"
  L1:
    focus: [CI-01, CI-02, CI-03]
    message: "切线证明是解答题必考，两条路选一条练熟"
  L2:
    focus: [CI-02]
    message: "切线证明写完整是保分关键"
