# ============================================================
# 易错点：函数（一次 + 反比例 + 二次函数）
# ============================================================
# 最后更新：2026-04-11
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：函数是中考分值最高的模块（16-22分），易错点直接影响总分

module: 函数
module_id: functions

mistakes:

  - id: FN-01
    name: 一次函数k和b的意义搞混
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      y=kx+b 中：
      - k 决定斜率（增减性）和倾斜方向，不是截距
      - b 决定与y轴的交点(0,b)，不是与x轴的交点
      常见错误：看到 b>0 说"图象过原点"
    exam_examples:
      - { year: 2022, qid: 4, description: "一次函数图象判断" }
      - { year: 2024, qid: 4, description: "函数图象与k、b关系" }
    fix_method: |
      画图记忆法：
      - k>0：直线"上坡"（从左下到右上）
      - k<0：直线"下坡"
      - b>0：直线穿过y轴正半轴上方
      - b=0：直线过原点（正比例函数）
      标准：给20个k、b的正负组合，判断图象过哪些象限，全对

  - id: FN-02
    name: 反比例函数k的符号与象限对应搞错
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      y=k/x：
      - k>0：图象在第一、三象限（都是正或都是负）
      - k<0：图象在第二、四象限
      常见错误：k>0时说"在第一、二象限"
    exam_examples:
      - { year: 2021, qid: 7, description: "反比例函数图象" }
      - { year: 2023, qid: 14, description: "反比例函数k的几何意义" }
      - { year: 2025, qid: 14, description: "反比例函数综合" }
    fix_method: |
      口诀："正一三，负二四"（k的正负→图象所在象限）
      理解记忆：k>0 时 x 和 y 同号（同正或同负→第一、三象限）
      标准：做5年真题中所有反比例函数题

  - id: FN-03
    name: 二次函数配方法出错
    frequency: 极高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      y=ax²+bx+c 配方成 y=a(x-h)²+k 时：
      1. 提a时只提了x²项前面的a，忘记b/a
      2. 加减的常数算错（凑完全平方后的调整项）
      3. 符号错误：y=x²-6x+5 配方为 y=(x-3)²-4，常写成 (x+3)² 或 -9+5=-4 算错
    exam_examples:
      - { year: 2022, qid: 22, description: "二次函数求顶点坐标" }
      - { year: 2024, qid: 22, description: "二次函数配方求最值" }
    fix_method: |
      配方标准流程（以 y=2x²-8x+5 为例）：
      1. 提a：y=2(x²-4x)+5
      2. 括号内凑完全平方：x²-4x = (x-2)²-4
      3. 代回：y=2[(x-2)²-4]+5 = 2(x-2)²-8+5 = 2(x-2)²-3
      4. 验证：顶点(2,-3)，对称轴x=2
      标准：做10道配方题，每题写完整步骤，全对

  - id: FN-04
    name: 二次函数图象判断a、b、c符号出错
    frequency: 极高
    affected_levels: [L1, L2]
    typical_score_loss: 2-4分
    description: |
      看图判断a、b、c的符号是选择题经典题型（几乎每年考）。
      常见混淆：
      - a决定开口方向（上正下负）✓ 大部分学生会
      - c是y轴截距（图象与y轴交点的纵坐标）容易忘
      - b的符号最难：对称轴 x=-b/(2a)，需要结合a的符号推出b的符号
      - 2a+b 的符号（对称轴与x=1的关系）更容易搞错
    exam_examples:
      - { year: 2021, qid: 8, description: "二次函数图象判断abc符号" }
      - { year: 2023, qid: 8, description: "抛物线图象综合判断" }
      - { year: 2025, qid: 8, description: "函数图象与系数" }
    fix_method: |
      "三看法"：
      1. 看开口→定a（上正下负）
      2. 看y轴交点→定c（交点在x轴上方c>0）
      3. 看对称轴→定b（对称轴x=-b/2a，左正右负时ab同号）
      高级：看x=1处的函数值→判断a+b+c的符号
      标准：做20道图象判断abc符号的选择题，正确率>90%

  - id: FN-05
    name: 待定系数法代入点坐标列错方程
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-5分
    description: |
      知道方法但执行出错：
      1. 点坐标(x,y)代入时x和y搞反
      2. 顶点坐标代入顶点式而非一般式时出错
      3. 联立方程组解错（计算失误）
    exam_examples:
      - { year: 2022, qid: 22, description: "求二次函数解析式" }
      - { year: 2024, qid: 22, description: "二次函数待定系数法" }
      - { year: 2025, qid: 22, description: "求函数解析式" }
    fix_method: |
      选择合适的设法：
      - 知3个点→设一般式 y=ax²+bx+c
      - 知顶点+1个点→设顶点式 y=a(x-h)²+k
      - 知两个x轴交点→设交点式 y=a(x-x₁)(x-x₂)
      代入后一定要验算：把点坐标回代检查
      标准：做5年真题Q22，每题验算

  - id: FN-06
    name: 函数图象与方程/不等式的关系理解不清
    frequency: 高
    affected_levels: [L1, L2]
    typical_score_loss: 3-5分
    description: |
      核心关系搞不清：
      - y=0 → 与x轴交点 → 方程的根
      - y>0 → 图象在x轴上方的部分 → 不等式的解集
      - 两函数图象的交点 → 联立方程组的解
      很多学生能做代数题但看到图象题就懵
    exam_examples:
      - { year: 2023, qid: 26, description: "函数图象与不等式" }
      - { year: 2025, qid: 26, description: "二次函数与方程综合" }
    fix_method: |
      建立"图象-代数"翻译能力：
      1. 在GeoGebra上画 y=x²-2x-3 的图象
      2. 标出与x轴交点→这就是 x²-2x-3=0 的解
      3. 图象在x轴下方的x范围→这就是 x²-2x-3<0 的解集
      标准：做10道"看图写不等式解集"的题，全对

  - id: FN-07
    name: 二次函数实际问题建模错误
    frequency: 中
    affected_levels: [L2]
    typical_score_loss: 3-5分
    description: |
      压轴题或大题中的建模环节：
      1. 设变量时自变量的取值范围搞错（定义域遗漏）
      2. 最值问题：对称轴不在定义域内时，最值在端点取到
      3. 面积/利润等实际问题建模时等量关系列错
    exam_examples:
      - { year: 2024, qid: 25, description: "二次函数实际应用（面积最值）" }
      - { year: 2025, qid: 25, description: "利润最大化问题" }
    fix_method: |
      建模三步：
      1. 设自变量x，明确取值范围（写出定义域）
      2. 用x表示目标量→得到函数关系式
      3. 求最值时先找对称轴，再看对称轴是否在定义域内
      ⚠️ 最值不一定在顶点！对称轴在定义域外时最值在端点取
      标准：做5道最值应用题，每题写出定义域

by_level:
  L0:
    focus: [FN-01, FN-02, FN-05]
    message: "先搞清楚k、b的意义和反比例函数象限，这是基础分"
  L1:
    focus: [FN-03, FN-04, FN-06]
    message: "配方法和图象判断abc是选填必考，函数-方程关系是提分关键"
  L2:
    focus: [FN-04, FN-06, FN-07]
    message: "图象综合判断和建模是冲90+的分水岭"
