# ============================================================
# 易错点：统计与概率
# ============================================================
# 最后更新：2026-04-11
# 说明：统计与概率约占12分，题型固定，是最容易拿满的模块

module: 统计与概率
module_id: statisticsAndProbability

mistakes:

  - id: SP-01
    name: 平均数/中位数/众数概念混淆
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      三个概念搞混：
      - 平均数：所有数据之和÷个数
      - 中位数：数据从小到大排列后，最中间的数（偶数个取中间两数的平均）
      - 众数：出现次数最多的数
      常见错误：
      1. 求中位数时没有先排序
      2. 偶数个数据的中位数忘记取平均
      3. 把众数当成了最大的数
    exam_examples:
      - { year: 2021, qid: 6, description: "求中位数和众数" }
      - { year: 2023, qid: 13, description: "统计量计算" }
      - { year: 2025, qid: 6, description: "平均数/中位数/众数" }
    fix_method: |
      做题三步：
      1. 先排序（从小到大写一遍）
      2. 众数：看谁出现最多
      3. 中位数：找中间（奇数个→正中间，偶数个→中间两个求平均）
      ⚠️ 平均数不需要排序，但中位数必须先排序！
      标准：做10道统计量计算题，全对

  - id: SP-02
    name: 方差计算公式用错
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 2-3分
    description: |
      方差 S² = [(x₁-x̄)²+(x₂-x̄)²+...+(xₙ-x̄)²] / n
      常见错误：
      1. 忘记平方（只算了 |xᵢ-x̄| 的和）
      2. 除以 n-1 而不是 n（中考用 n，不是 n-1）
      3. 方差越大→数据越分散，搞反成"越集中"
    exam_examples:
      - { year: 2022, qid: 23, description: "方差比较数据稳定性" }
      - { year: 2024, qid: 23, description: "统计综合（含方差）" }
    fix_method: |
      方差计算步骤：
      1. 算平均数 x̄
      2. 每个数据减平均数，再平方
      3. 所有平方和除以 n
      结论：方差越小→数据越稳定→选"更稳定的"
      标准：做5道方差题，计算和结论都对

  - id: SP-03
    name: 频率分布直方图读图错误
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      1. y轴是"频率/组距"而不是"频率"——面积才等于频率
      2. 频率 = 该组频数 / 总频数（不是该组频数本身）
      3. 从直方图中求中位数：要从左到右累加频率到0.5
      4. 众数在直方图中对应最高的矩形那一组的中间值
    exam_examples:
      - { year: 2023, qid: 23, description: "频率分布直方图" }
      - { year: 2025, qid: 23, description: "直方图读数据" }
    fix_method: |
      读直方图口诀：
      - 频率 = 矩形面积 = 纵轴×组距
      - 中位数：从左累加面积到0.5，对应的x值
      - 众数：最高矩形的中间值
      ⚠️ 所有矩形面积之和 = 1（检验用）
      标准：做5道直方图读图题

  - id: SP-04
    name: 概率题列举法遗漏情况
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 3-5分
    description: |
      用列表法或树状图列举所有等可能事件时遗漏：
      1. 有顺序的问题（如投两个骰子，(1,2)和(2,1)是两种不同结果）
      2. "至少""至多"的条件没有正确理解
      3. 列表法表格画错（行列混了）
    exam_examples:
      - { year: 2021, qid: 25, description: "树状图求概率" }
      - { year: 2023, qid: 25, description: "概率计算" }
      - { year: 2025, qid: 23, description: "列举法求概率" }
    fix_method: |
      推荐统一用树状图（比列表法不容易漏）：
      1. 第一步选择画第一层分支
      2. 每个分支下画第二层
      3. 数出所有"叶子"= 总样本数
      4. 数满足条件的"叶子"= 有利结果数
      5. 概率 = 有利结果数 / 总样本数
      标准：做5年真题概率解答题，树状图画完整

  - id: SP-05
    name: 加权平均数权重搞错
    frequency: 中
    affected_levels: [L1]
    typical_score_loss: 2-3分
    description: |
      加权平均数 = (x₁w₁+x₂w₂+...+xₙwₙ)/(w₁+w₂+...+wₙ)
      常见错误：
      1. 权重和数据搞反
      2. 权重之和不等于1时忘记除以总权重
      3. 用普通平均数代替加权平均数
    exam_examples:
      - { year: 2024, qid: 23, description: "加权平均数应用" }
    fix_method: |
      做题时先标出：哪些是数据，哪些是权重
      然后套公式：Σ(数据×权重) ÷ Σ权重
      标准：做5道加权平均数题

by_level:
  L0:
    focus: [SP-01, SP-04]
    message: "统计概率是最容易拿分的模块！中位数先排序，概率画树状图"
  L1:
    focus: [SP-01, SP-02, SP-03]
    message: "直方图读图和方差是常考点，做对就是稳稳的8-12分"
  L2:
    focus: [SP-03, SP-05]
    message: "直方图和加权平均数确保零失误，这是保底分"
