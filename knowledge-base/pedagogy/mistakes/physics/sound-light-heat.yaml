# ============================================================
# 易错点：声光热（声学 + 光学 + 热学）
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：声光热在北京中考物理约占10-12分，属于基础得分模块

module: 声光热
module_id: soundLightHeat

mistakes:

  - id: SLH-01
    name: 光反射与折射混淆
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      光的反射和折射是两种不同现象，学生常混淆：
      - 反射：光在同种介质中遇到界面返回（入射角=反射角）
      - 折射：光从一种介质进入另一种介质时偏折
      常见错误：把水中筷子"弯折"说成反射现象；
      把平面镜成像说成折射现象
    exam_examples:
      - { year: 2022, qid: 5, description: "光现象辨析选择题" }
      - { year: 2024, qid: 3, description: "生活中的光现象归类" }
    fix_method: |
      分类口诀："反回折穿"
      - 反射：光遇界面"弹回来"（镜子、水面倒影、黑板反光）
      - 折射：光"穿过去"但路径偏了（水中筷子弯、海市蜃楼、透镜）
      练习：列举20个生活光现象，逐一归类为反射或折射
      标准：做10道光现象辨析题全对

  - id: SLH-02
    name: 物态变化吸放热搞反
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 2-4分
    description: |
      六种物态变化的吸放热：
      - 吸热：熔化、汽化、升华
      - 放热：凝固、液化、凝华
      常见错误：
      1. "水蒸气液化放热"记成吸热
      2. 霜的形成（凝华）误判为凝固
      3. 衣柜中樟脑丸变小（升华）误判为汽化
    exam_examples:
      - { year: 2021, qid: 2, description: "物态变化判断" }
      - { year: 2023, qid: 3, description: "生活中物态变化及吸放热" }
      - { year: 2025, qid: 2, description: "物态变化与吸放热综合" }
    fix_method: |
      记忆法："固→液→气"方向全吸热，反方向全放热
      画物态变化六角图：
        固 ←→ 液 ←→ 气（→吸热，←放热）
        固 ←→ 气（升华吸热，凝华放热）
      重点区分：液化≠凝固，凝华≠液化
      标准：20道物态变化填空全对

  - id: SLH-03
    name: 凸透镜成像规律记混
    frequency: 极高
    affected_levels: [L0, L1, L2]
    typical_score_loss: 2-4分
    description: |
      凸透镜成像三种情况：
      - u>2f：倒立缩小实像（照相机）
      - f<u<2f：倒立放大实像（投影仪）
      - u<f：正立放大虚像（放大镜）
      常见错误：
      1. 物距和像的大小关系搞反
      2. 实像虚像混淆（u<f时仍说是实像）
      3. 物距变化时像的变化方向判断错误
    exam_examples:
      - { year: 2022, qid: 6, description: "凸透镜成像规律应用" }
      - { year: 2024, qid: 5, description: "凸透镜成像实验" }
    fix_method: |
      口诀："一倍焦距分虚实，二倍焦距分大小"
      动态规律："物近像远像变大"（物距减小→像距增大→像变大）
      对应器材记忆：
      - 照相机：物远像近像小
      - 投影仪：物近像远像大
      - 放大镜：物在焦点内
      标准：做凸透镜成像专题20题，正确率>95%

  - id: SLH-04
    name: 声音三特征(音调响度音色)混淆
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 2分
    description: |
      声音三个特征的物理含义：
      - 音调：声音的高低，由频率决定
      - 响度：声音的大小（强弱），由振幅决定
      - 音色：声音的品质特色，由发声体材质结构决定
      常见错误：
      1. "大声说话"理解为音调高（应为响度大）
      2. "女高音"理解为响度大（应为音调高）
      3. "听声辨人"的依据说成音调（应为音色）
    exam_examples:
      - { year: 2021, qid: 1, description: "声音特征辨析" }
      - { year: 2023, qid: 1, description: "声现象选择题" }
    fix_method: |
      关键词对应法：
      - 音调→"高低、尖细、粗"→频率（振动快慢）
      - 响度→"大小、强弱、轻、响"→振幅（用力大小、距离远近）
      - 音色→"辨别、区分、不同乐器"→材质结构
      练习：收集15个声音描述句子，逐一判断对应特征
      标准：声音特征辨析题10道全对

  - id: SLH-05
    name: 比热容概念理解偏差
    frequency: 中
    affected_levels: [L1, L2]
    typical_score_loss: 2分
    description: |
      比热容是物质本身的属性，常见错误理解：
      1. 认为比热容与质量有关（比热容是单位质量的属性）
      2. Q=cmΔt 中Δt搞成末温度而非温度变化量
      3. "水的比热容大"的实际意义理解不了：
         同质量同吸热，水升温少（冷却慢）
    exam_examples:
      - { year: 2022, qid: 14, description: "比热容概念与计算" }
      - { year: 2024, qid: 13, description: "比热容在生活中的应用" }
    fix_method: |
      理解核心：比热容大→"难伺候"（加热升温慢、散热降温也慢）
      公式Q=cmΔt拆解练习：
      - 吸热：Δt = 末温 - 初温（正值）
      - 放热：Δt = 初温 - 末温（正值）
      生活应用：为什么沿海地区昼夜温差小？（水比热容大）
      标准：比热容计算及概念题10道，正确率>90%

  - id: SLH-06
    name: 红外线紫外线特性搞反
    frequency: 中
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      红外线和紫外线的主要特性和应用混淆：
      - 红外线：热效应强（遥控器、热成像、烤箱）
      - 紫外线：化学效应强（杀菌消毒、验钞、使荧光物质发光）
      常见错误：把验钞说成红外线应用，把遥控器说成紫外线应用
    exam_examples:
      - { year: 2023, qid: 5, description: "电磁波与光谱应用" }
      - { year: 2025, qid: 4, description: "红外线紫外线应用辨析" }
    fix_method: |
      联想记忆：
      - 红外线→"红=热"→热效应→遥控、取暖、夜视
      - 紫外线→"紫=毒"→杀菌消毒→验钞、灭菌灯、防晒
      标准：红外紫外应用归类练习10道全对

by_level:
  L0:
    focus: [SLH-01, SLH-02, SLH-04]
    message: "先把光现象归类、物态变化吸放热、声音三特征搞清楚，这是选择题保底分"
  L1:
    focus: [SLH-02, SLH-03, SLH-05]
    message: "物态变化和凸透镜成像是必考点，比热容计算要练熟"
  L2:
    focus: [SLH-03, SLH-05, SLH-06]
    message: "凸透镜动态分析和比热容应用题是拉分点，确保不丢分"
