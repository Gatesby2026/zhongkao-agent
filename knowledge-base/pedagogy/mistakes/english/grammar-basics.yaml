# ============================================================
# 易错点：基础语法
# ============================================================
# 最后更新：2026-04-12
# 数据来源：北京中考真题阅卷反馈、教师访谈
# 重要：基础语法贯穿单选和写作，约影响6分

module: 基础语法
module_id: grammarBasics

mistakes:

  - id: GB-01
    name: 代词主格宾格混淆
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      主格（I/he/she/they）做主语，宾格（me/him/her/them）做宾语或介词后。
      常见错误：
      - "Me and him went to school." → 主语位置用了宾格
      - "between you and I" → 介词后应用宾格 me
      - "Please give it to she." → 介词 to 后应用 her
    exam_examples:
      - { year: 2023, qid: 单选1, description: "代词主格宾格辨析" }
      - { year: 2024, qid: 单选2, description: "人称代词用法" }
    fix_method: |
      判断口诀："做主用主，做宾用宾，介词后面必宾格"
      去掉并列检验法：
      - "Me and him went..." → 单独说 "Me went..." 明显错
      - 改为 "He and I went..." ✓
      标准：做20道代词填空题，正确率>95%

  - id: GB-02
    name: 介词in/on/at乱用
    frequency: 极高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      时间介词和地点介词混用是北京中考高频考点。
      时间：
      - in + 年/月/季节/早中晚（in 2024, in June, in winter, in the morning）
      - on + 具体某天/星期（on Monday, on June 1st, on a rainy day）
      - at + 时刻/固定搭配（at 8:00, at night, at noon）
      常见错误：in Monday, on the morning, at June
    exam_examples:
      - { year: 2022, qid: 单选3, description: "时间介词选择" }
      - { year: 2024, qid: 单选1, description: "介词in/on/at辨析" }
    fix_method: |
      记忆口诀："大in中on小at"
      - 大范围（年月季）→ in
      - 中范围（某天）→ on
      - 小范围（时刻）→ at
      特殊记忆：at night / at noon / at weekends
      标准：做30道介词填空，正确率>90%

  - id: GB-03
    name: 比较级最高级变化出错
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      形容词/副词的比较级和最高级变化规则记忆不牢。
      常见错误：
      - 双写辅音字母遗漏：big → biger（应为bigger）
      - 不规则变化记错：good → gooder（应为better）
      - 多音节词直接加-er：beautiful → beautifuler（应为more beautiful）
      - 最高级前漏掉the：He is tallest in the class.
    exam_examples:
      - { year: 2023, qid: 单选5, description: "形容词比较级" }
      - { year: 2024, qid: 完形, description: "比较级语境判断" }
    fix_method: |
      分三类记忆：
      1. 短词（1-2音节）：直接加-er/-est（注意双写规则）
      2. 长词（3音节+）：more/most + 原形
      3. 不规则：good-better-best, bad-worse-worst, many/much-more-most
      口诀："最高级前必有the，比较级后常有than"
      标准：默写20个常考词的三级变化，全对

  - id: GB-04
    name: 情态动词后不用原形
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1-2分
    description: |
      情态动词（can/could/must/should/may/might/will/would）后必须接动词原形。
      常见错误：
      - "He can plays basketball." → 应为 can play
      - "You should studying hard." → 应为 should study
      - "Must I to finish it?" → 应为 Must I finish
      北京中考常在单选或写作中考查
    exam_examples:
      - { year: 2022, qid: 单选4, description: "情态动词用法" }
      - { year: 2024, qid: 单选3, description: "情态动词+动词原形" }
    fix_method: |
      铁律："情态动词 + 动词原形，没有例外"
      检查方法：看到 can/must/should 等词后，动词必须是原形
      - 不加s，不加ing，不加ed，不加to
      易混辨析：have to 虽含 to 但整体是情态动词义
      标准：做15道情态动词题，零错误

  - id: GB-05
    name: 连词because和so重复使用
    frequency: 高
    affected_levels: [L0, L1]
    typical_score_loss: 1分
    description: |
      中文里"因为...所以..."可以连用，英文里 because 和 so 不能同时出现。
      常见错误：
      - "Because it rained, so we stayed home." → 二选一
      - 类似错误：although/though 和 but 重复使用
      这是北京中考写作扣分重灾区
    exam_examples:
      - { year: 2023, qid: 写作, description: "作文中因果连词重复扣分" }
      - { year: 2024, qid: 单选6, description: "连词辨析" }
    fix_method: |
      记住两组"死对头"，只能用一个：
      1. because ↔ so （因为/所以只能留一个）
      2. although/though ↔ but （虽然/但是只能留一个）
      改错练习：
      - Because it rained, so we stayed. → Because it rained, we stayed. ✓
      - Although he is young, but he works hard. → Although he is young, he works hard. ✓
      标准：写作自查时专门检查这两组连词

  - id: GB-06
    name: there be句型主谓不一致
    frequency: 中
    affected_levels: [L0]
    typical_score_loss: 1分
    description: |
      there be句型中be动词应和最近的名词保持一致（就近原则）。
      常见错误：
      - "There are a book and two pens." → 应为 There is（就近 a book）
      - "There is many students." → 应为 There are
      - there be和have混用："There have a park near my home."
    exam_examples:
      - { year: 2022, qid: 单选2, description: "there be就近原则" }
      - { year: 2024, qid: 写作, description: "作文中there be用错" }
    fix_method: |
      口诀："there be就近看，离be最近的名词定单复"
      区分 there be 和 have：
      - there be = 某地有（强调存在）
      - have/has = 某人有（强调拥有）
      标准：做10道there be填空 + 5道there be与have辨析题

by_level:
  L0:
    focus: [GB-01, GB-02, GB-04, GB-06]
    message: "先把代词、介词和情态动词的基本规则搞清楚，这是单选和写作的送分点"
  L1:
    focus: [GB-02, GB-03, GB-05]
    message: "介词细节、比较级变化和连词搭配是常见丢分点，写作中要特别注意"
  L2:
    focus: [GB-03, GB-05]
    message: "基础语法应该没问题，写作中注意比较级和连词细节不丢分"
