# ============================================================
# 学习路径：声光热（声学 + 光学 + 热学）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 说明：2026北京中考物理80分（2025及以前为70分），声光热约10-12分

module: 声光热
subject: 物理
region: 北京

# ================================================================
#  L0 → L1：建立声光热基本概念
# ================================================================
L0_to_L1:
  target: 掌握声光热的核心概念，能做课本基础题
  estimated_hours: 8-10
  prerequisite: 无

  steps:
    - order: 1
      topic: 声现象
      goal: 理解声音的产生、传播和三特性
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版八年级上册·第二章《声现象》
          how_to_use: |
            第1天：声音的产生和传播
            - 声音由物体振动产生
            - 声音的传播需要介质（固/液/气），真空不能传声
            - 声速：空气中约340m/s，固体>液体>气体
            - 做课本例题3题

            第2天：声音的三特性
            - 音调：振动频率决定（频率高→音调高）
            - 响度：振幅决定（振幅大→响度大）
            - 音色：发声体材料和结构决定（辨别不同乐器/人声）
            - 重点区分：音调≠响度（女高音≠大嗓门）
            - 噪声控制的三个途径：声源处/传播途中/人耳处
            - 做课本练习5题
        - type: 练习
          name: 五三物理·声现象基础
          how_to_use: 只做★题，每题标注考的是哪个特性
      pass_criteria:
        - 声音三特性能准确区分
        - 噪声控制三途径能举例说明
      common_pitfalls:
        - "音调和响度搞混：'声音高'可能指音调高也可能指响度大，要看语境"
        - "超声波和次声波：超声波频率>20000Hz，次声波频率<20Hz"

    - order: 2
      topic: 光现象与透镜
      goal: 掌握光的传播规律，凸透镜成像规律
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版八年级上册·第四章《光现象》+ 第五章《透镜及其应用》
          how_to_use: |
            第1天：光的直线传播与反射
            - 光在同种均匀介质中沿直线传播（应用：影子/日食/小孔成像）
            - 反射定律：入射角=反射角，法线是关键
            - 画5组反射光路图（注意法线/箭头/角度标注）

            第2天：光的折射
            - 光从一种介质斜射入另一种介质时传播方向改变
            - 空气→水/玻璃：折射角<入射角（光线向法线偏折）
            - 画5组折射光路图
            - 生活实例：筷子弯折/池底变浅/海市蜃楼

            第3天：凸透镜成像规律
            - 三条特殊光线（过光心/平行主光轴/过焦点）
            - 成像规律表格（背诵）：
              u>2f → 倒立缩小实像（照相机）
              u=2f → 倒立等大实像
              f<u<2f → 倒立放大实像（投影仪）
              u<f → 正立放大虚像（放大镜）
            - 口诀："一焦分虚实，二焦分大小；物近像远像变大"

            第4天：巩固练习
            - 凸透镜成像规律20题
            - 近视眼和远视眼的矫正（近视→凹透镜，远视→凸透镜）
        - type: 练习
          name: 五三物理·光学基础篇
          how_to_use: 做★和★★题，重点练凸透镜成像判断
      pass_criteria:
        - 能画规范的反射和折射光路图
        - 给出物距能判断凸透镜成像性质
        - 近视远视矫正方法正确
      common_pitfalls:
        - "反射和折射搞混：反射光线在同侧，折射光线在另一侧"
        - "凸透镜成像：物距在一倍焦距和二倍焦距之间成放大实像（不是缩小）"
        - "画光路图忘记画法线或忘记标箭头"

    - order: 3
      topic: 物态变化与热学
      goal: 掌握六种物态变化和热量计算
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版八年级上册·第三章《物态变化》+ 九年级·第十三章《内能》
          how_to_use: |
            第1天：六种物态变化
            - 制作表格：
              固→液：熔化（吸热）  液→固：凝固（放热）
              液→气：汽化（吸热）  气→液：液化（放热）
              固→气：升华（吸热）  气→固：凝华（放热）
            - 每种变化写3个生活实例
            - 口诀：吸热的三种（熔化/汽化/升华），放热的三种（凝固/液化/凝华）

            第2天：熔化凝固曲线 + 沸腾
            - 晶体有固定熔点（熔化时温度不变），非晶体没有
            - 读熔化曲线：找出熔化温度、熔化过程的时间段
            - 沸腾条件：达到沸点+继续吸热
            - 沸腾时温度不变（但继续吸热）

            第3天：比热容和热量计算
            - 比热容：c水=4.2×10³J/(kg·℃)，水的比热容最大
            - 热量公式：Q=cmΔt（Δt=末温-初温，取绝对值）
            - 做5题热量计算
        - type: 练习
          name: 五三物理·物态变化+热学
          how_to_use: 做★和★★题
      pass_criteria:
        - 六种物态变化及吸放热能脱口而出
        - Q=cmΔt 计算正确率≥80%
        - 能正确读熔化凝固曲线
      common_pitfalls:
        - "液化和汽化搞反：'白气'是液化（水蒸气→小水滴），不是汽化"
        - "Δt算错：Δt是温度变化量，不是某一个温度值"

# ================================================================
#  L1 → L2：消除易混淆点 + 中档题突破
# ================================================================
L1_to_L2:
  target: 声光热基础题稳拿分，中档题正确率85%以上
  estimated_hours: 8-10
  prerequisite: L1

  steps:
    - order: 1
      topic: 声音三特性辨析专项
      goal: 区分音调/响度/音色的考法，选择题秒解
      estimated_hours: 1.5
      resources:
        - type: 练习
          name: 万唯物理·声学专项
          how_to_use: |
            典型考法：
            - "引吭高歌"→响度大（声音大）
            - "女高音"→音调高（频率高）
            - "未见其人先闻其声"→音色（辨别声源）
            - "闻声识人"→音色
            做15题，追求每题15秒内判断
      pass_criteria:
        - 声音三特性判断正确率100%

    - order: 2
      topic: 凸透镜成像规律强化
      goal: 凸透镜成像题不丢分
      estimated_hours: 2.5
      resources:
        - type: 练习
          name: 五三物理·凸透镜成像专题
          how_to_use: |
            重点突破：
            1. 动态分析：物距增大→像距减小→像变小
            2. 特殊位置：u=f（不成像）、u=2f（等大实像）
            3. 实验题：蜡烛/凸透镜/光屏的调节方法
            4. 应用题：照相机（u>2f）、投影仪（f<u<2f）、放大镜（u<f）
            做20题
      pass_criteria:
        - 凸透镜成像题正确率≥95%
        - 动态变化分析准确

    - order: 3
      topic: 物态变化生活实例配对
      goal: 各种生活现象准确判断物态变化类型和吸放热
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯物理·物态变化专项
          how_to_use: |
            高频生活实例：
            - 冰棒冒"白气"→液化（空气中水蒸气遇冷）
            - 湿衣服变干→汽化（蒸发）
            - 霜/雾凇→凝华（水蒸气→固态）
            - 露水→液化（水蒸气→液态）
            - 冰雕变小→升华（固态→气态）
            - 樟脑丸变小→升华
            做20题配对练习
      pass_criteria:
        - 生活实例与物态变化配对正确率≥90%

    - order: 4
      topic: 热量计算 Q=cmΔt 专项
      goal: 计算准确，含比较题和图象题
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三物理·热量计算专题
          how_to_use: |
            三种题型：
            1. 直接计算：给m,c,Δt求Q
            2. 比较题：同质量不同物质吸收相同热量谁温度高
            3. 图象题：从Q-t或T-t图象读取信息
            各做5题
        - type: 真题
          name: 北京近5年中考第7题
          how_to_use: 逐题精做，关注热学图象分析
      pass_criteria:
        - Q=cmΔt 计算正确率≥95%
        - 热学图象题能正确读图和分析

# ================================================================
#  L2 → L3：满分冲刺
# ================================================================
L2_to_L3:
  target: 声光热相关题目满分
  estimated_hours: 5-8
  prerequisite: L2

  steps:
    - order: 1
      topic: 限时选择题训练
      goal: 4道声光热选择题4分钟内完成且全对
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考 + 海淀/西城一模二模
          how_to_use: |
            每次练4题（声/光/热/综合各一题），限时4分钟
            做完核对答案，标记错题
            错题归类：是知识点不熟还是审题失误
            共做10组（40题）
      pass_criteria:
        - 正确率≥95%，平均每题1分钟

    - order: 2
      topic: 热学综合题（第7题）攻坚
      goal: 热学综合选择题满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第7题 + 海淀/西城一模二模对应题
          how_to_use: |
            第7题常见考法：
            1. 比热容比较+热量计算
            2. 热平衡问题（Q吸=Q放）
            3. 温度-时间图象分析
            4. 与物态变化结合
            逐题精做，整理易错点
      pass_criteria:
        - 第7题类型题正确率100%

    - order: 3
      topic: 实验题中的声光热部分
      goal: 实验探究题中涉及声光热的部分满分
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考第17题（光学/声学实验）
          how_to_use: |
            常考实验：
            - 探究凸透镜成像规律
            - 探究光的反射定律
            - 探究水的沸腾
            - 探究平面镜成像特点
            逐题精做，关注实验步骤和注意事项
      pass_criteria:
        - 声光热相关实验题满分

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 声光热是基础分，早期打牢不费力
    by_level:
      L0: |
        按 L0→L1 完整路径走。声学→光学→热学按顺序来。
        每天30分钟，持续3-4周。不急，重理解不赶进度。
      L1: |
        L1→L2 正常推进。重点突破凸透镜成像和物态变化。
        每天25分钟，持续3周。
      L2: |
        每周做1组声光热选择题（4题限时4分钟），保持手感。
        重心可以转到力学和电学。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 声光热应该已经基本掌握，查漏补缺即可
    by_level:
      L0: |
        集中两周突击声光热。优先背物态变化和凸透镜成像。
        这10-12分是最容易提分的部分。
      L1: |
        做近5年真题的声光热部分，标记错题，针对性补弱。
        每周2小时，持续3-4周。
      L2: |
        每周1组限时训练即可，错题复盘。
        把时间留给力学和电学。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 声光热是必拿分，不能丢
    by_level:
      L0: |
        死记硬背也要记住：六种物态变化+凸透镜成像口诀。
        做近3年真题声光热选择题（共12题），反复做到全对。
      L1: |
        做近5年真题声光热全部（选择+实验），标记错题反复练。
        确保基础分不丢。
      L2: |
        模拟考试条件限时做声光热部分，追求满分。
        错题只看一遍，不花过多时间。
