# ============================================================
# 学习路径：电学（电路/欧姆定律/电功率/电磁）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 说明：2026北京中考物理80分（2025及以前为70分），电学约25-30分，与力学并列最高

module: 电学
subject: 物理
region: 北京

# ================================================================
#  L0 → L1：建立电路基本概念
# ================================================================
L0_to_L1:
  target: 能看懂电路图，掌握串并联特点，欧姆定律基础计算
  estimated_hours: 15-18
  prerequisite: 无

  steps:
    - order: 1
      topic: 电流和电路基础
      goal: 认识电路元件，掌握串并联电路特点
      estimated_hours: 5
      resources:
        - type: 教材
          name: 人教版九年级·第十五章《电流和电路》+ 第十六章《电压电阻》
          how_to_use: |
            第1天：电路基本概念
            - 电流的形成：正电荷定向移动的方向
            - 电路组成：电源+导线+开关+用电器
            - 通路/断路/短路的区别
            - 画出并记住10种电路元件符号

            第2天：串联和并联
            - 串联：逐个顺次连接，电流只有一条路径
            - 并联：并列连接，电流有多条路径
            - 判断方法：去掉一个用电器，另一个是否工作
            - 画10组串联电路图 + 10组并联电路图

            第3天：电流表和电压表
            - 电流表：串联在电路中，测量电流
            - 电压表：并联在被测元件两端，测量电压
            - 量程选择和分度值读数
            - 做实物图连线练习5题

            第4天：串联电路的电流电压规律
            - 电流处处相等：I=I₁=I₂
            - 电压之和等于总电压：U=U₁+U₂
            - 做5题

            第5天：并联电路的电流电压规律
            - 电压处处相等：U=U₁=U₂
            - 总电流等于各支路电流之和：I=I₁+I₂
            - 做5题
        - type: 练习
          name: 五三物理·电路基础篇
          how_to_use: 只做★题，每题画出完整电路图
      pass_criteria:
        - 看电路图能判断串联还是并联
        - 电流表电压表的接法正确
        - 串并联电流电压规律能背出
      common_pitfalls:
        - "电流表并联或电压表串联→短路/烧表"
        - "串联分电压，并联分电流（容易混反）"
        - "实物图连线时导线交叉或漏连"

    - order: 2
      topic: 欧姆定律
      goal: 掌握 I=U/R 及其变形，简单电路计算
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版九年级·第十七章《欧姆定律》
          how_to_use: |
            第1天：欧姆定律公式
            - I=U/R（电流=电压/电阻）
            - 变形：U=IR, R=U/I
            - 注意：I、U、R必须对应同一段电路
            - 做10题基础计算

            第2天：串联电路的欧姆定律
            - 总电阻 R=R₁+R₂（串联电阻越串越大）
            - 分压规律：U₁/U₂=R₁/R₂
            - 做5题

            第3天：并联电路的欧姆定律
            - 总电阻 1/R=1/R₁+1/R₂（并联电阻越并越小）
            - 分流规律：I₁/I₂=R₂/R₁
            - 做5题

            第4天：滑动变阻器
            - 原理：改变接入电路的电阻丝长度
            - 接法："一上一下"
            - 在电路中的作用：保护电路+改变电流/电压
            - 做5题
        - type: 练习
          name: 五三物理·欧姆定律基础
          how_to_use: 做★和★★题
      pass_criteria:
        - I=U/R 及变形公式运用正确
        - 串并联总电阻计算正确
      common_pitfalls:
        - "I、U、R不对应同一段电路（如用总电压除某个电阻求电流）"
        - "并联总电阻公式搞错（不是简单相加）"

    - order: 3
      topic: 电功率基础
      goal: 掌握 P=UI 及相关公式，理解额定功率
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版九年级·第十八章《电功率》
          how_to_use: |
            第1天：电功和电功率
            - 电功：W=UIt（单位：J）
            - 电功率：P=UI=W/t（单位：W）
            - 电能表读数：kW·h（度）
            - 1kW·h=3.6×10⁶J
            - 做5题

            第2天：电功率的三种公式
            - P=UI（通用公式）
            - P=I²R（已知电流和电阻时用→串联比较常用）
            - P=U²/R（已知电压和电阻时用→并联比较常用）
            - 做10题，体会哪种情况用哪个公式

            第3天：额定功率和实际功率
            - 额定功率：在额定电压下的功率
            - 实际功率：在实际电压下的功率
            - 灯泡标"220V 100W"：表示额定电压220V、额定功率100W
            - 做5题

            第4天：焦耳定律与安全用电
            - Q=I²Rt（焦耳定律）
            - 家庭电路：火线和零线，保险丝原理
            - 安全用电常识
            - 做5题
        - type: 练习
          name: 五三物理·电功率基础
          how_to_use: 做★和★★题
      pass_criteria:
        - P=UI 三种形式能根据条件正确选用
        - 额定功率和实际功率的区别清楚
      common_pitfalls:
        - "P=I²R用在并联（应该用P=U²/R更方便）"
        - "额定功率=灯泡的固定属性（错！功率随电压变化）"

    - order: 4
      topic: 电与磁
      goal: 理解电磁感应和电动机原理的区别
      estimated_hours: 2
      resources:
        - type: 教材
          name: 人教版九年级·第二十章《电与磁》
          how_to_use: |
            第1天：磁场基础
            - 磁体周围存在磁场，磁感线从N极出发到S极
            - 电流的磁效应（奥斯特实验）
            - 电磁铁原理

            第2天：两大核心原理
            - 电动机原理：通电导体在磁场中受力→电能→机械能
            - 发电机原理：电磁感应→机械能→电能
            - 记忆：电动机"电→动"，发电机"动→电"
            - 做5题
      pass_criteria:
        - 能区分电动机和发电机的原理和能量转化
      common_pitfalls:
        - "电动机和发电机原理搞混：一个是'力'，一个是'感应'"

# ================================================================
#  L1 → L2：电路规律灵活运用 + 实验题
# ================================================================
L1_to_L2:
  target: 电学中档题准确，实验探究题基本分稳拿
  estimated_hours: 12-15
  prerequisite: L1

  steps:
    - order: 1
      topic: 实物图连线专项
      goal: 按电路图连接实物图不出错
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯物理·实物图连线专题
          how_to_use: |
            连线步骤：
            1. 先连简单的那条回路（如从电源正极出发）
            2. 电流表串联、电压表并联
            3. 导线不能交叉
            4. 滑动变阻器"一上一下"接法
            做20题
      pass_criteria:
        - 实物图连线正确率≥95%

    - order: 2
      topic: 电功率三公式选用策略
      goal: 根据已知条件快速选择最优公式
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三物理·电功率公式选用专题
          how_to_use: |
            选择策略：
            - 已知U和I → P=UI
            - 已知I和R → P=I²R
            - 已知U和R → P=U²/R

            串联电路：I相同 → 用P=I²R比较功率 → P∝R
            并联电路：U相同 → 用P=U²/R比较功率 → P∝1/R

            做15题
      pass_criteria:
        - 公式选用正确率≥90%

    - order: 3
      topic: 电学实验：探究欧姆定律
      goal: 实验原理/步骤/数据处理/结论完整掌握
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版九年级·第十七章实验部分
          how_to_use: |
            实验1：探究电流与电压的关系（R不变）
            - 控制变量：电阻不变
            - 用滑动变阻器改变电阻两端电压
            - 结论：R一定时，I∝U

            实验2：探究电流与电阻的关系（U不变）
            - 控制变量：电阻两端电压不变
            - 换电阻后需调滑动变阻器保持电压不变
            - 结论：U一定时，I∝1/R

            关键考点：
            - 为什么换电阻后要调滑动变阻器？
            - 滑动变阻器应该怎么调（阻值增大还是减小）？
        - type: 真题
          name: 北京近5年中考第18题
          how_to_use: 逐题精做
      pass_criteria:
        - 实验步骤和原理能完整阐述
        - 实验关键操作的原因能解释

    - order: 4
      topic: 电学实验：测量电功率
      goal: 测量小灯泡电功率实验完整掌握
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯物理·测电功率实验专题
          how_to_use: |
            核心步骤：
            1. 按电路图连接实物
            2. 调节滑动变阻器使灯泡两端电压为额定值
            3. 记录电压表和电流表读数
            4. P=UI 计算
            5. 改变电压再测2次

            必考问题：
            - 灯泡不亮的故障分析
            - 灯泡在不同电压下亮度不同→实际功率不同
            做10题
      pass_criteria:
        - 实验故障分析准确
        - 多次测量的目的理解

    - order: 5
      topic: 电学计算题步骤训练
      goal: 第23题电学计算拿满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第23题
          how_to_use: |
            逐题精做，注意：
            1. 先画等效电路图（判断串联还是并联）
            2. 找出已知量（电源电压/额定值/电流/电阻）
            3. 严格按步骤：公式→代入→计算→单位
            4. 两种状态的题要分别列式

            每题限时5分钟
      pass_criteria:
        - 近5年第23题至少做对4题
        - 步骤规范不缺分

# ================================================================
#  L2 → L3：动态电路 + 综合计算攻坚
# ================================================================
L2_to_L3:
  target: 电学部分得分率90%以上
  estimated_hours: 10-15
  prerequisite: L2
  notes: 适合物理目标70+的学生

  steps:
    - order: 1
      topic: 动态电路分析专项
      goal: 滑动变阻器变化引起的电路变化分析又快又准
      estimated_hours: 4
      resources:
        - type: 练习
          name: 万唯物理·动态电路专题
          how_to_use: |
            分析模板（串联电路中R₂是滑动变阻器）：
            1. 判断R₂变大还是变小
            2. 总电阻 R总=R₁+R₂ 变大/变小
            3. 总电流 I=U/R总 变小/变大（电源电压U不变）
            4. R₁两端电压 U₁=IR₁ 变小/变大
            5. R₂两端电压 U₂=U-U₁ 变大/变小

            关键：一步一步推，不跳步！
            做20题
      pass_criteria:
        - 动态电路分析正确率≥90%

    - order: 2
      topic: 电功率综合计算
      goal: 两种工作状态/最大最小功率计算满分
      estimated_hours: 4
      resources:
        - type: 练习
          name: 五三物理·电功率综合专题
          how_to_use: |
            题型1：两种工作状态
            - 开关S₁闭合时是一种电路（如R₁单独工作）
            - 开关S₂也闭合时是另一种电路（如R₁R₂并联）
            - 分别分析两种状态的电流、电压、功率

            题型2：最大/最小功率
            - 滑动变阻器在最大/最小阻值时的功率
            - 灯泡的最大安全功率

            各做8题
      pass_criteria:
        - 两种状态计算正确率≥85%

    - order: 3
      topic: 电学多选题精选训练
      goal: 电学多选题（第14-15题）不丢分
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年+模拟题电学多选
          how_to_use: |
            策略：少选得1分，多选0分
            - 先排除明显错误选项
            - 不确定的选项宁可不选
            - 常见陷阱：
              ·额定功率和实际功率混淆
              ·串联并联特性套用错误
              ·电磁学定性判断过度推广
            做15题
      pass_criteria:
        - 多选题得分率≥80%

    - order: 4
      topic: 电学综合实验（第20题）攻坚
      goal: 电学综合探究题满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第20题
          how_to_use: |
            第20题难点：
            1. 实验方案设计（需要自己设计步骤）
            2. 数据分析（可能需要画图象或计算）
            3. 实验评价和改进
            4. 误差分析（偏大偏小及原因）

            逐题精做，每题限时12分钟
            重点关注最后一问（评价改进）的答题模板
      pass_criteria:
        - 第20题得分率≥80%

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 电学概念链条长，需要从基础一步步建立
    by_level:
      L0: |
        按 L0→L1 完整路径走。电路→欧姆定律→电功率→电磁。
        每天40分钟，持续6-8周。电路图必须手画，不能只看不练。
      L1: |
        L1→L2 正常推进。实物图连线→公式选用→实验→计算。
        每天35分钟，持续6-8周。
      L2: |
        开始做动态电路分析和综合计算。
        每周做3题综合题，积累题型。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 电学必须达到L2，否则丢分太多
    by_level:
      L0: |
        集中3周突击电学基础。优先攻欧姆定律（计算基础）。
        每天50分钟。如果串并联还分不清，要回头补。
      L1: |
        做近5年真题电学部分，标记错题。
        重点突破第23题计算（步骤分好拿）和第18题实验。
        每周3-4小时。
      L2: |
        动态电路分析+多选题限时训练。
        第20题综合实验逐题精练。
        每周3小时。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 电学基础分必拿，综合题量力而行
    by_level:
      L0: |
        背公式：I=U/R, P=UI, W=UIt
        做近3年真题第5,8题（基础选择）确保拿到4分。
        第23题第1问也要拿（写公式代入就有分）。
      L1: |
        近5年真题电学全部限时做。
        重点：第23题限时5分钟，前两问必拿。
        第18题实验探究前3问必做。
      L2: |
        限时模拟：电学部分（3道选择+2多选+2实验+1计算）限时25分钟。
        错题复盘。
