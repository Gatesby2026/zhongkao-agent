# ============================================================
# 学习路径：计算题专项（力学计算 + 电学计算）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 说明：2026北京中考物理80分（2025及以前为70分），计算题2道共8分
# 特点：分值不大但步骤分好拿，是最容易提分的题型之一

module: 计算题
subject: 物理
region: 北京

# ================================================================
#  L0 → L1：背熟公式 + 学会解题格式
# ================================================================
L0_to_L1:
  target: 记住核心公式，掌握计算题的书写格式，能做单步计算
  estimated_hours: 8-10
  prerequisite: 无

  steps:
    - order: 1
      topic: 核心公式背诵
      goal: 20个物理公式烂熟于心
      estimated_hours: 3
      resources:
        - type: 自制
          name: 物理公式卡片（20张）
          how_to_use: |
            第1天：力学公式（10张）
            - G=mg（重力）
            - p=F/S（固体压强）
            - p=ρgh（液体压强）
            - F浮=ρ液gV排（阿基米德原理）
            - F₁L₁=F₂L₂（杠杆平衡）
            - W=Fs（功）
            - P=W/t（功率）
            - η=W有用/W总（机械效率）
            - v=s/t（速度）
            - ρ=m/V（密度）

            第2天：电学公式（10张）
            - I=U/R（欧姆定律）
            - U=IR, R=U/I（变形）
            - P=UI（电功率）
            - P=I²R, P=U²/R（变形）
            - W=UIt（电功）
            - W=Pt（电功简化）
            - Q=I²Rt（焦耳定律）
            - Q=cmΔt（热量）
            - 串联：R=R₁+R₂
            - 并联：1/R=1/R₁+1/R₂

            每天早晚各默写一遍，持续一周
      pass_criteria:
        - 20个公式能不看卡片默写出来
        - 每个公式的物理量和单位能说清
      common_pitfalls:
        - "力学和电学的功率公式搞混：P=W/t（通用）vs P=Fv（力学）vs P=UI（电学）"

    - order: 2
      topic: 单位换算专项
      goal: 物理计算中的单位换算不出错
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯物理·单位换算专练
          how_to_use: |
            高频换算（必须烂熟）：
            - 长度：1m=100cm, 1km=1000m
            - 面积：1m²=10⁴cm²（1cm²=10⁻⁴m²）★最易出错
            - 体积：1m³=10⁶cm³, 1L=10⁻³m³, 1mL=1cm³
            - 质量：1kg=1000g, 1t=1000kg
            - 电流：1A=1000mA
            - 电能：1kW·h=3.6×10⁶J

            每种做5题，共30题
      pass_criteria:
        - 单位换算正确率≥90%
      common_pitfalls:
        - "面积换算：cm²→m² 不是除以100，是除以10000"
        - "体积换算：cm³→m³ 不是除以1000，是除以10⁶"

    - order: 3
      topic: 解题格式训练
      goal: 掌握北京中考计算题的标准书写格式
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版物理教材例题格式
          how_to_use: |
            标准格式（每道计算题都要这样写）：

            【解】
            （第1步：写公式）
            由题意知：F=G=mg
            （第2步：代入数据，带单位）
            F=2kg×10N/kg=20N
            （第3步：写下一个公式）
            p=F/S
            （第4步：代入数据）
            p=20N/0.01m²=2000Pa
            （第5步：答）
            答：压强为2000Pa。

            要点：
            - 每步都要写公式（不能直接列算式）
            - 代入时要带单位
            - 最终结果要有单位
            - 中间步骤不能跳

            按此格式重做10道已经会做的题
        - type: 真题
          name: 北京中考计算题评分标准参考
          how_to_use: |
            北京中考计算题评分规则：
            - 正确写出公式：1分
            - 正确代入数据：1分
            - 得出正确结果（含单位）：1分
            - 每小问独立评分

            即使结果错了，前面步骤正确仍给分
            即使结果对了，没写公式只给结果分（1分）
      pass_criteria:
        - 每道题都按标准格式书写
        - 不跳步、不缺公式、不缺单位

# ================================================================
#  L1 → L2：公式选用策略 + 两步计算
# ================================================================
L1_to_L2:
  target: 基础计算题满分，中档计算题能完成前两问
  estimated_hours: 6-8
  prerequisite: L1

  steps:
    - order: 1
      topic: 力学计算专项
      goal: 第22题力学计算前两问满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第22题
          how_to_use: |
            第22题常考题型：

            题型A：压强计算
            - 给出物体质量/底面积，求对桌面的压强
            - 关键：F=G=mg, p=F/S, S用物体底面积

            题型B：浮力+密度计算
            - 给出物体在水中的测力计读数，求浮力和密度
            - 关键：F浮=G-F示, ρ物=m/V

            题型C：功率/机械效率
            - 给出滑轮组数据，求有用功/总功/效率
            - 关键：W有=Gh, W总=Fs, η=W有/W总

            逐题精做，每题限时5分钟
            做完严格按评分标准给自己打分
        - type: 练习
          name: 五三物理·力学计算专题
          how_to_use: 做★★题15题
      pass_criteria:
        - 近5年第22题至少做对4题
        - 前两问正确率≥90%

    - order: 2
      topic: 电学计算专项
      goal: 第23题电学计算前两问满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第23题
          how_to_use: |
            第23题常考题型：

            题型A：串联电路计算
            - 灯泡+变阻器串联
            - 给出灯泡额定值和电源电压
            - 求：正常工作电流→变阻器阻值→变阻器功率

            题型B：两种工作状态
            - 开关不同状态→电路结构变化
            - 分别求两种状态下的电流/功率
            - 关键：先画等效电路图

            题型C：电功/电能计算
            - 给出工作时间，求消耗电能
            - W=Pt 或 W=UIt

            逐题精做，每题限时5分钟
            先画等效电路图再计算
        - type: 练习
          name: 五三物理·电学计算专题
          how_to_use: 做★★题15题
      pass_criteria:
        - 近5年第23题至少做对4题
        - 前两问正确率≥90%

    - order: 3
      topic: 常见错误类型自查
      goal: 识别自己的高频错误并纠正
      estimated_hours: 1.5
      resources:
        - type: 自制
          name: 计算题易错清单
          how_to_use: |
            逐项检查自己是否犯过：

            力学计算易错：
            □ 压强中受力面积取错（用桌面面积而非物体底面积）
            □ F≠G的情况忘记分析（如物体受拉力时）
            □ 面积cm²→m²换算错误
            □ 有用功和总功定义搞混

            电学计算易错：
            □ 额定电压和电源电压搞混
            □ 串联电路中用总电压除以某个电阻求电流
            □ 并联电路中各支路电压相等这一点忘记用
            □ 两种状态混在一起算

            通用易错：
            □ 没写公式直接算
            □ 代入数据不带单位
            □ 中间步骤跳步
            □ 最终结果没有单位
      pass_criteria:
        - 对照清单，每种错误都能识别并避免

# ================================================================
#  L2 → L3：综合计算 + 限时满分训练
# ================================================================
L2_to_L3:
  target: 计算题8分满分，每题5分钟内完成
  estimated_hours: 5-8
  prerequisite: L2

  steps:
    - order: 1
      topic: 两种工作状态对比计算
      goal: 电学中含两种电路状态的综合计算满分
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯物理·电学两种状态计算专题
          how_to_use: |
            典型题型：
            S₁闭合S₂断开 → R₁单独工作
            S₁S₂都闭合 → R₁R₂并联

            解题步骤：
            1. 分别画出两种状态的等效电路图
            2. 状态1：列出已知量，求电流/电压/功率
            3. 状态2：列出已知量（电源电压不变！），求对应量
            4. 可能还需要比较两种状态（如功率之比）

            做10题，每题限时6分钟
      pass_criteria:
        - 两种状态计算正确率≥90%

    - order: 2
      topic: 力学综合计算
      goal: 压强+浮力+密度联合计算满分
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三物理·力学综合计算
          how_to_use: |
            综合题型：
            - 物体放入液体→求浮力→求液面变化→求底部压强变化
            - 已知物体漂浮/沉底条件→求密度→求其他物理量

            做8题，每题限时6分钟
      pass_criteria:
        - 综合力学计算正确率≥85%

    - order: 3
      topic: 限时全真模拟
      goal: 两道计算题10分钟内完成且满分
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考+海淀/西城一模二模
          how_to_use: |
            模拟训练：
            - 每次做1道力学+1道电学（一组）
            - 限时10分钟
            - 写完整过程
            - 做完对答案并按评分标准打分

            做8组（16题），记录每组用时和得分
            目标：每组8分钟内完成，得分8/8
      pass_criteria:
        - 8组模拟平均得分≥7分（满分8分）
        - 平均用时≤10分钟

    - order: 4
      topic: 结果合理性检验
      goal: 做完后能快速判断结果是否合理
      estimated_hours: 1
      resources:
        - type: 自制
          name: 物理量合理范围速查表
          how_to_use: |
            做完计算后快速检查：
            - 压强：桌面上物体对桌面的压强通常几百到几千Pa
            - 浮力：不会超过物体的重力
            - 机械效率：不可能≥100%，通常60%-90%
            - 电流：家用电器通常0.1-10A
            - 电功率：灯泡几瓦到几百瓦
            - 电阻：通常几到几百欧姆

            如果算出的结果明显不合理，回头检查
      pass_criteria:
        - 能在30秒内判断结果是否在合理范围

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 计算题功底来自公式熟练度，随力学电学同步训练
    by_level:
      L0: |
        先背公式，每天默写10个。公式不熟计算题一个字都写不出来。
        同步学习力学/电学时就按标准格式写计算过程。
        每天15分钟（背公式10分钟+做1题5分钟）。
      L1: |
        力学和电学各做20题基础计算。
        每题严格按评分标准格式写。
        每天20分钟（做2题+检查格式）。
      L2: |
        开始做综合计算和两种状态题。
        每周做2组限时训练。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 计算题8分是最容易提分的题型
    by_level:
      L0: |
        如果公式还没背熟，这是最后的机会。
        每天背5个公式+做1题基础计算。
        至少要会写第22题和第23题的第1问（各1-2分）。
      L1: |
        做近5年真题第22、23题。
        每题精做：写完→对答案→按评分标准打分→找失分原因。
        每周2-3小时。
      L2: |
        两种状态计算专项突破。
        限时训练：一组计算题10分钟。
        每周2小时。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 计算题必须拿到6分以上
    by_level:
      L0: |
        至少记住：p=F/S, I=U/R, P=UI 这三个公式。
        做近3年真题第22、23题的第1问。
        即使后面不会，第1问写公式代入也能拿2分。
      L1: |
        近5年真题第22、23题限时做（每组10分钟）。
        前两问必拿，第三问量力而行。
        格式检查：公式→代入→结果→单位，缺一个补一个。
      L2: |
        模拟考试条件：两道计算题10分钟。
        做5组模拟，目标每组7-8分。
        注意：不要在计算题上花太多时间，留时间给实验大题。
