# ============================================================
# 学习路径：力学（力/运动/压强/浮力/简单机械）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 说明：2026北京中考物理80分（2025及以前为70分），力学约25-30分，是物理最高分值模块

module: 力学
subject: 物理
region: 北京

# ================================================================
#  L0 → L1：建立力学基本概念和公式体系
# ================================================================
L0_to_L1:
  target: 理解力学基本概念，能做课本基础题，公式能正确运用
  estimated_hours: 15-18
  prerequisite: 无

  steps:
    - order: 1
      topic: 力的概念与运动
      goal: 理解力的作用效果、牛顿第一定律、二力平衡
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版八年级下册·第七章《力》+ 第八章《运动和力》
          how_to_use: |
            第1天：力的基本概念
            - 力是物体对物体的作用，力的作用是相互的
            - 力的三要素：大小、方向、作用点
            - 力的作用效果：改变运动状态 或 使物体发生形变
            - 画10个力的示意图

            第2天：弹力和重力
            - 弹力：物体发生弹性形变时产生的力
            - 重力：G=mg, g=10N/kg
            - 重力方向竖直向下
            - 做5题重力计算

            第3天：牛顿第一定律与惯性
            - 一切物体在不受力时保持匀速直线运动或静止状态
            - 惯性是物体的固有属性，只与质量有关（与速度无关！）
            - 生活中的惯性实例5个

            第4天：二力平衡
            - 条件：同一物体、大小相等、方向相反、同一直线
            - 匀速直线运动或静止 → 受力平衡 → 合力为零
            - 受力分析练习10题
        - type: 练习
          name: 五三物理·力与运动基础
          how_to_use: 只做★题
      pass_criteria:
        - 能正确画力的示意图
        - 理解惯性与质量的关系
        - 二力平衡条件能脱口而出
      common_pitfalls:
        - "认为运动需要力来维持（错！力是改变运动状态的原因）"
        - "认为速度大惯性大（错！惯性只与质量有关）"
        - "忘记力的作用是相互的"

    - order: 2
      topic: 压强
      goal: 掌握固体压强和液体压强的计算
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版八年级下册·第九章《压强》
          how_to_use: |
            第1天：固体压强
            - 压强定义：p=F/S（单位面积上受到的压力）
            - 单位：Pa（帕斯卡），1Pa=1N/m²
            - 增大/减小压强的方法
            - 注意：F是压力不是重力（水平面上 F=G）
            - 做5题固体压强计算

            第2天：液体压强
            - p=ρgh（液体压强只与密度和深度有关，与容器形状无关）
            - h是液面到该点的竖直距离
            - 连通器原理
            - 做5题液体压强计算

            第3天：大气压强
            - 托里拆利实验：标准大气压=760mmHg≈1.013×10⁵Pa
            - 大气压随海拔升高而减小
            - 生活中的大气压实例（吸盘/吸管）

            第4天：综合练习
            - 固体+液体压强混合练习10题
            - 重点区分：固体用p=F/S, 液体用p=ρgh
        - type: 练习
          name: 五三物理·压强基础篇
          how_to_use: 做★和★★题
      pass_criteria:
        - p=F/S 和 p=ρgh 能正确选用
        - 液体压强中h的确定正确
      common_pitfalls:
        - "固体压强中把受力面积搞错（是受压面的面积，不是施压面）"
        - "液体压强中h不是容器的高度，是液面到该点的竖直深度"
        - "面积单位换算：1cm²=10⁻⁴m²，不是10⁻²"

    - order: 3
      topic: 浮力
      goal: 理解阿基米德原理，掌握浮沉条件
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版八年级下册·第十章《浮力》
          how_to_use: |
            第1天：浮力的概念
            - 浮力产生原因：液体对物体上下表面的压力差
            - 浮力方向：竖直向上
            - 称重法：F浮=G-F示

            第2天：阿基米德原理
            - F浮=ρ液gV排
            - V排是浸入液体的体积（不一定等于物体总体积！）
            - 浮沉条件：
              F浮>G → 上浮 → 最终漂浮（F浮=G）
              F浮=G → 悬浮
              F浮<G → 下沉
            - 做5题浮力计算

            第3天：浮力应用
            - 漂浮：F浮=G, V排<V物 → ρ物<ρ液
            - 密度计原理/轮船/潜水艇
            - 做5题浮沉条件判断
        - type: 练习
          name: 五三物理·浮力基础
          how_to_use: 做★题
      pass_criteria:
        - 阿基米德原理公式能正确运用
        - 浮沉条件判断正确
      common_pitfalls:
        - "V排≠V物（只有完全浸没时才相等）"
        - "沉底的物体也受浮力（只是重力>浮力）"

    - order: 4
      topic: 简单机械
      goal: 掌握杠杆平衡条件、滑轮组、功和功率
      estimated_hours: 4
      resources:
        - type: 教材
          name: 人教版八年级下册·第十二章《简单机械》+ 第十一章《功和机械能》
          how_to_use: |
            第1天：杠杆
            - 杠杆平衡条件：F₁L₁=F₂L₂
            - 力臂：从支点到力的作用线的垂直距离
            - 画力臂练习10题（力臂是垂直距离！）

            第2天：滑轮
            - 定滑轮：不省力但改变力的方向
            - 动滑轮：省一半力但不改变方向
            - 滑轮组：n段绳子承担，F=G/n（不计摩擦和滑轮重）

            第3天：功和功率
            - 功：W=Fs（力的方向与运动方向一致时）
            - 功率：P=W/t（单位时间做的功）
            - 有用功、总功、额外功
            - 机械效率：η=W有用/W总×100%

            第4天：综合练习
            - 滑轮组计算（含摩擦和滑轮重）
            - 机械效率计算5题
        - type: 练习
          name: 五三物理·简单机械基础
          how_to_use: 做★和★★题
      pass_criteria:
        - 杠杆平衡条件运用正确，力臂画法正确
        - 滑轮组绳子段数判断正确
        - 机械效率计算正确
      common_pitfalls:
        - "力臂画成从支点到力的作用点的连线（应该是垂直距离）"
        - "有用功和总功搞混：提升物体时有用功=Gh，不是Fs"
        - "机械效率不可能≥100%"

# ================================================================
#  L1 → L2：公式灵活运用 + 中档题突破
# ================================================================
L1_to_L2:
  target: 力学中档题准确，选择+实验+计算基础分稳拿
  estimated_hours: 12-15
  prerequisite: L1

  steps:
    - order: 1
      topic: 受力分析专项
      goal: 各种常见情境下的受力分析又快又准
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯物理·受力分析专题
          how_to_use: |
            训练模板：
            1. 确定研究对象
            2. 画重力（一定有）
            3. 找接触面→判断弹力和摩擦力
            4. 判断是否有浮力（在液体/气体中）
            5. 检查是否平衡（静止或匀速→合力为零）

            情境练习：
            - 水平面上静止/匀速拉动的物体
            - 斜面上的物体
            - 悬挂的物体
            - 浸在液体中的物体
            各做5题
      pass_criteria:
        - 常见情境受力分析正确率≥90%

    - order: 2
      topic: 压强变化分析题
      goal: 掌握切割/叠放/加水等压强变化问题
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三物理·压强综合专题
          how_to_use: |
            三类必练：
            类型1：柱体切割后压强变化
            - 竖切：F变S变，p=ρgh不变（液体思路）或p=F/S分析
            - 横切：看剩余部分的高度变化

            类型2：叠放问题
            - A放在B上，求B对桌面的压强
            - F=G_A+G_B, S=B的底面积

            类型3：液面变化问题
            - 向容器中加入/取出物体，液面升高/降低
            - 液体压强变化 → p=ρgh中h的变化

            各做5题
      pass_criteria:
        - 压强变化分析正确率≥85%

    - order: 3
      topic: 浮力四种方法综合
      goal: 根据题目条件选择最优的浮力求解方法
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯物理·浮力四种方法专题
          how_to_use: |
            四种方法及适用场景：
            1. 称重法：F浮=G-F示（有弹簧测力计数据时用）
            2. 阿基米德原理：F浮=ρ液gV排（已知液体密度和V排时用）
            3. 平衡法：漂浮/悬浮时 F浮=G（物体处于平衡状态时用）
            4. 压力差法：F浮=F下-F上（知道上下表面受力时用）

            各方法做5题，重点体会"什么条件用什么方法"
      pass_criteria:
        - 能根据已知条件选择最优方法
        - 浮力计算正确率≥90%

    - order: 4
      topic: 机械效率计算专项
      goal: 滑轮组和斜面的机械效率计算准确
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三物理·机械效率专题
          how_to_use: |
            滑轮组：
            - 有用功 W有=Gh（提升物体的功）
            - 总功 W总=Fs（拉力做的功）
            - 额外功 W额=W总-W有（克服摩擦和滑轮重做的功）
            - η=W有/W总=Gh/(Fs)
            做8题

            斜面：
            - 有用功 W有=Gh
            - 总功 W总=FL（沿斜面拉力×斜面长）
            - η=Gh/(FL)
            做5题
      pass_criteria:
        - 机械效率计算正确率≥90%
        - 能分析影响机械效率的因素

    - order: 5
      topic: 力学计算题步骤训练
      goal: 第22题力学计算拿满分
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考第22题
          how_to_use: |
            逐题精做，严格按步骤：
            1. 写出已知量（含单位）
            2. 写出公式
            3. 代入数据
            4. 计算结果（含单位）
            每题限时5分钟
      pass_criteria:
        - 近5年第22题至少做对4题
        - 步骤规范，不缺公式和单位

# ================================================================
#  L2 → L3：综合题和压轴选择攻坚
# ================================================================
L2_to_L3:
  target: 力学部分得分率90%以上，压轴选择题不丢分
  estimated_hours: 10-15
  prerequisite: L2
  notes: 适合物理目标70+的学生

  steps:
    - order: 1
      topic: 压强浮力综合题专项
      goal: 柱体问题/液面变化/密度判断等综合题满分
      estimated_hours: 4
      resources:
        - type: 练习
          name: 万唯物理·压强浮力综合专题
          how_to_use: |
            高难题型：
            1. 柱体放入液体：同时考压强变化和浮力
            2. 液面升降问题：物体放入/取出后液面变化→压强变化
            3. 密度比较题：利用浮沉条件和压强公式联合推理
            4. 弹簧+浮力：弹簧测力计挂物体浸入不同液体

            每类做5题，限时3分钟/题
      pass_criteria:
        - 综合题正确率≥85%

    - order: 2
      topic: 单选压轴题（第11-12题）限时训练
      goal: 力学压轴选择题稳拿分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第11-12题 + 海淀/西城一模二模
          how_to_use: |
            第11-12题常考：
            - 压强浮力综合判断
            - 机械效率变化分析
            - 力与运动综合（含图象分析）
            - 功率比较

            每题限时2分钟，做完对答案
            错题归类，找出薄弱知识点
            共做20题
      pass_criteria:
        - 压轴单选正确率≥80%

    - order: 3
      topic: 多选题精选训练
      goal: 力学多选题不丢分（少选得1分策略）
      estimated_hours: 2
      resources:
        - type: 练习
          name: 北京近5年+模拟题力学多选
          how_to_use: |
            多选题策略：
            - 确定的选，不确定的不选（少选得1分，多选0分）
            - 每个选项独立判断，不要受其他选项影响
            - 常见陷阱：偷换概念/条件不足/结论过度推广
            做15题
      pass_criteria:
        - 多选题得分率≥80%（至少拿1分）

    - order: 4
      topic: 力学实验探究满分训练
      goal: 第19题力学实验满分
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京近5年中考第19题
          how_to_use: |
            常考实验：
            - 探究杠杆平衡条件
            - 测量物质密度
            - 探究浮力大小与排开液体体积的关系
            - 探究影响滑动摩擦力的因素
            逐题精做，关注：
            1. 实验步骤是否完整
            2. 数据分析是否正确
            3. 误差分析和改进方案
      pass_criteria:
        - 力学实验题得分率≥90%

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 力学是物理最大的分值模块，必须从基础抓起
    by_level:
      L0: |
        按 L0→L1 完整路径走，力→压强→浮力→简单机械按顺序来。
        每天40分钟，持续6-8周。不能跳步，概念链条环环相扣。
      L1: |
        L1→L2 正常推进。受力分析→压强综合→浮力综合→机械效率。
        每天35分钟，持续6-8周。
      L2: |
        开始做第11-12题压轴选择和第22题计算。
        每周做3题综合题，积累题型。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 力学必须突破到L2，否则物理拿不到及格分
    by_level:
      L0: |
        集中3周突击力学基础。优先攻压强和浮力（分值最高）。
        每天50分钟，强化公式运用。
      L1: |
        做近5年真题力学部分，标记错题。
        重点突破第22题计算（步骤分好拿）。
        每周3-4小时。
      L2: |
        压轴选择+多选限时训练。
        第19题实验探究逐题精练。
        每周3小时。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 力学基础分必拿，综合题量力而行
    by_level:
      L0: |
        背公式：p=F/S, p=ρgh, F浮=ρ液gV排, W=Fs, η=W有/W总
        做近3年真题第4,6,9题（基础选择），确保拿到6分。
        第22题第1问也要拿（写公式代入就有分）。
      L1: |
        近5年真题力学全部限时做。
        重点：第22题限时5分钟，前两问必拿。
        第19题实验探究前3问必做。
      L2: |
        限时模拟：力学部分（5道选择+1多选+1实验+1计算）限时20分钟。
        错题复盘，关注是计算失误还是知识漏洞。
