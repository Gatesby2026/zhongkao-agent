# ============================================================
# 学习路径：写作（命题/半命题+想象写作）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：40分，占语文总分40%，是决定性板块

module: 写作
subject: 语文
region: 北京

# ================================================================
#  L0 → L1：写得出、写得满、不跑题
# ================================================================
L0_to_L1:
  target: 能写满600字的记叙文，基本不跑题，有简单的开头结尾
  estimated_hours: 20-25
  prerequisite: 无

  steps:
    - order: 1
      topic: 审题训练
      goal: 准确理解题目含义，确定写作方向
      estimated_hours: 3
      resources:
        - type: 练习
          name: 北京近10年中考作文题审题练习
          how_to_use: |
            审题三步法：
            1. 找关键词——题目中最重要的词是哪个
            2. 明确限制——时间/地点/人物/事件有什么要求
            3. 确定立意——可以从哪些角度切入

            审题示例：
            题目"那一刻，我长大了"
            → 关键词："那一刻"（瞬间性）+"长大"（成长/感悟）
            → 限制：第一人称，写一个具体时刻
            → 立意：通过一件事写出内心的成长

            题目"___让生活更美好"
            → 关键词："更美好"（变化/提升）
            → 限制：半命题，需要补充一个有意义的词
            → 立意：某个事物/品质对生活的积极影响

            每天分析1个作文题（只分析不写），写出审题笔记
            连续练15天
      pass_criteria:
        - 给出作文题能准确找到关键词和限制
        - 能确定至少2个合理的写作方向
      common_pitfalls:
        - "半命题作文补题太大：如'爱让生活更美好'——太笼统"
        - "忽略题目限制：如'那一刻'写成了'那段日子'"

    - order: 2
      topic: 素材积累（生活素材库建设）
      goal: 积累至少10个可用的写作素材
      estimated_hours: 5
      resources:
        - type: 练习
          name: 素材日记本
          how_to_use: |
            每天写100字"微日记"，记录一件小事：

            素材分类积累：
            【亲情类】父母的一个动作/一句话/一个表情
            【成长类】一次失败/一个发现/一个决定
            【校园类】老师的鼓励/同学的帮助/一堂课
            【社会类】街头见闻/志愿服务/公益活动
            【自然类】季节变化/天气现象/动植物观察

            每类至少积累2个素材
            每个素材记录：时间+地点+事件+我的感受

            替换老旧素材：
            "下雨天妈妈送伞" → 改为更真实具体的场景
            "考试失败后的鼓励" → 改为更独特的经历
      pass_criteria:
        - 素材库中有至少10个真实生活素材
        - 每个素材都有具体细节（不是空泛的概括）

    - order: 3
      topic: 基本结构训练（写得完整）
      goal: 文章有开头、发展、高潮、结尾，结构完整
      estimated_hours: 5
      resources:
        - type: 教材
          name: 人教版语文写作指导单元
          how_to_use: |
            最基础的文章结构——"四段式"：

            第一段：开头（50-80字）
            → 交代时间地点人物，或用景物描写引入
            → 不能太长！

            第二段：事件经过（200-300字）
            → 略写前因，为高潮做铺垫
            → 适当加入环境描写或心理描写

            第三段：高潮/转折（200-300字）【详写！】
            → 这是全文最重要的部分
            → 用动作描写+语言描写+心理描写+细节描写
            → 写出"那一刻"的具体画面

            第四段：结尾（50-80字）
            → 回扣题目，点明主题
            → 可以抒情，可以议论，不能太长

            训练方式：
            先列提纲（4段各写什么），然后再扩写成完整作文
            每周写1篇，每篇严格按结构来
      pass_criteria:
        - 作文有清晰的开头、经过、高潮、结尾
        - 字数达到600字以上
      common_pitfalls:
        - "开头写了200字还没进入正题"
        - "高潮部分一笔带过，该详的不详"

    - order: 4
      topic: 基础描写训练
      goal: 文中有至少2处描写（不全是干巴巴的叙述）
      estimated_hours: 5
      resources:
        - type: 教材
          name: 课内名家散文中的精彩描写段落
          how_to_use: |
            仿写训练（每天写1个描写片段，100字）：

            第1周——动作描写仿写
            范文：《背影》中父亲爬月台的动作描写
            要诀：连续使用3-5个动词，分解动作过程
            如："他蹲下身，伸出手，小心翼翼地捧起那只受伤的小鸟"

            第2周——环境描写仿写
            范文：《春》中的景物描写
            要诀：调动多种感官（视觉/听觉/嗅觉/触觉）
            如："秋风卷着落叶打着旋儿飘下来，空气中弥漫着桂花的甜香"

            第3周——心理描写仿写
            范文：考试前/比赛前的紧张心理
            要诀：用比喻和夸张表现内心感受
            如："我的心像一只小鹿在胸腔里横冲直撞，手心的汗几乎能拧出水来"

            第4周——语言描写和细节描写
            要诀：语言要符合人物身份，细节要具体真实
      pass_criteria:
        - 作文中至少有2处较好的描写段落
        - 描写能为文章增色（不是硬凑字数）

# ================================================================
#  L1 → L2：有亮点、有细节、有结构
# ================================================================
L1_to_L2:
  target: 作文达到二类文标准（32-36分）
  estimated_hours: 15-20
  prerequisite: L1

  steps:
    - order: 1
      topic: 素材升级——告别"三件套"
      goal: 选材新颖独特，来自真实生活
      estimated_hours: 3
      resources:
        - type: 练习
          name: 素材升级训练
          how_to_use: |
            老旧素材 → 升级方向：

            "下雨天妈妈送伞"
            → 深夜妈妈在台灯下给我缝书包肩带
            → 妈妈偷偷在我校服口袋里塞了一张纸条

            "考试失败老师鼓励"
            → 运动会上我跑最后一名但全班为我欢呼
            → 我画的画被老师贴在走廊，那是我第一次感到被认可

            "生病爸爸背我去医院"
            → 爸爸学做我爱吃的菜，做了三次才成功
            → 搬家时发现爸爸一直保存着我小时候的画

            选材原则：
            1. 真实——来自自己的生活（读者能感受到真实）
            2. 独特——别人写不出来的（不是所有人都有的经历）
            3. 以小见大——小事情见大道理
            4. 有画面感——读者能在脑海中浮现场景

            整理10个"独家素材"，每个写100字素材卡
      pass_criteria:
        - 10个素材都来自真实生活
        - 每个素材都有具体的时间、地点、细节

    - order: 2
      topic: 开头结尾专项训练
      goal: 开头引人入胜，结尾点题升华
      estimated_hours: 3
      resources:
        - type: 练习
          name: 开头结尾写法训练
          how_to_use: |
            五种好开头（每种练3个）：
            1. 环境描写开头："窗外的梧桐叶在秋风中瑟瑟摇摆……"
            2. 设悬念开头："那个旧书包，母亲至今仍挂在她的衣柜里。"
            3. 倒叙开头："站在领奖台上的那一刻，我的眼眶湿了。"
            4. 引用开头："'路漫漫其修远兮'——每当想起这句话……"
            5. 对话开头："'你真的决定了吗？'父亲放下筷子，认真地看着我。"

            四种好结尾（每种练3个）：
            1. 回扣开头（首尾呼应）
            2. 点题升华（揭示更深的道理）
            3. 留白结尾（意犹未尽）
            4. 抒情结尾（真情流露）

            每个开头和结尾控制在50-80字
      pass_criteria:
        - 能写出至少3种不同风格的开头
        - 结尾能点题且不空喊口号

    - order: 3
      topic: 结构设计——三种常用结构
      goal: 文章有设计感，不是从头到尾平铺直叙
      estimated_hours: 3
      resources:
        - type: 练习
          name: 文章结构设计训练
          how_to_use: |
            三种常用结构：

            【结构A：一线贯穿】
            用一个物件/一句话/一个场景作为线索贯穿全文
            如：以"那把旧钥匙"为线索，串联三个不同时期的故事

            【结构B：对比/转折】
            前半部分写一种状态，后半部分写变化后的状态
            如："从前的我……直到那一天……从此以后我……"

            【结构C：三个片段】
            选取三个典型场景/片段，用小标题或过渡句连接
            如：早晨—中午—傍晚 / 小学—初中—此刻

            每种结构写1篇完整作文（600字），体会不同结构的效果
      pass_criteria:
        - 能根据素材选择合适的结构
        - 文章有明显的结构设计感

    - order: 4
      topic: 描写升级——从"有"到"好"
      goal: 描写生动传神，有画面感和感染力
      estimated_hours: 4
      resources:
        - type: 练习
          name: 描写升级专项
          how_to_use: |
            升级技巧：

            【技巧1：慢镜头法——把瞬间拉长】
            原文："他把伞递给了我。"
            升级："他伸出左手，缓缓地将那把褪了色的蓝伞撑开，
            然后微微倾斜伞面，让更大的一半遮在我的头顶。"

            【技巧2：五感法——调动多种感官】
            原文："教室很安静。"
            升级："教室里静得只听见笔尖划过纸面的沙沙声和
            窗外蝉鸣的嘶嘶声，空气中弥漫着粉笔灰的干涩气味。"

            【技巧3：以景衬情——环境映照心情】
            开心时："阳光从云层缝隙中洒下来，树叶上的露珠折射出七彩的光"
            难过时："乌云压得很低，风卷起地上的纸片，操场上空无一人"

            每天改写1个段落（将100字平淡叙述改为200字生动描写）
      pass_criteria:
        - 描写段落有画面感
        - 能运用慢镜头法和五感法

    - order: 5
      topic: 想象写作专项
      goal: 想象作文合理有趣、有主题思考
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京近5年中考想象作文真题
          how_to_use: |
            想象写作三要素：
            1. 合理性——想象要有逻辑，不能天马行空
            2. 具体性——要有具体场景、人物、对话
            3. 主题性——想象为主题服务，不是为了炫技

            常见想象写作类型：
            A. 穿越类："假如你穿越到某个历史时期"
            B. 科幻类："2050年的一天/未来的学校"
            C. 变形类："假如我变成了一棵树/一只鸟"
            D. 续写类：给定开头或情境，续写故事

            每种类型写1篇（600字），重点练习：
            - 世界观设定要前后一致
            - 要有具体的生活细节（即使是想象中的世界）
            - 结尾要回归主题（对现实的思考/对人性的感悟）
      pass_criteria:
        - 想象合理有趣
        - 有明确的主题思想
      common_pitfalls:
        - "想象脱离逻辑，变成'流水账式白日梦'"
        - "只顾炫想象，忘了主题立意"

# ================================================================
#  L2 → L3：立意深刻、语言优美、一类文水平
# ================================================================
L2_to_L3:
  target: 作文达到一类文标准（36-40分）
  estimated_hours: 15-20
  prerequisite: L2
  notes: 一类文需要长期积累和反复修改，不能速成

  steps:
    - order: 1
      topic: 立意升格——从"浅"到"深"
      goal: 同一个素材能写出更深刻的主题
      estimated_hours: 4
      resources:
        - type: 练习
          name: 立意升格训练（10组）
          how_to_use: |
            立意三层次：
            第一层（表面）：写事 → "妈妈送我去学校"→ 母爱
            第二层（深入）：写理 → 母爱中的放手/成长中的独立
            第三层（升华）：写哲 → 爱的方式不止一种/每一次告别都是为了更好的出发

            训练方式：
            给出一个素材，依次写出三层立意
            然后选择最深刻的一层来写

            练习10组素材的立意升格
      pass_criteria:
        - 能为同一素材写出3层不同深度的立意
        - 实际写作时选择第二或第三层

    - order: 2
      topic: 语言锤炼——从"通顺"到"优美"
      goal: 文章语言有个人风格，读来回味无穷
      estimated_hours: 4
      resources:
        - type: 练习
          name: 语言升格改写训练
          how_to_use: |
            每天改写1个段落，从三个方面升级：

            1. 用词精准："走"→ 踱/挪/晃/蹒跚/健步
            2. 句式变化：长短句交替，增加节奏感
            3. 修辞点缀：恰当使用比喻/拟人，不堆砌

            范文语言积累：
            - 读汪曾祺/史铁生/迟子建等作家的散文
            - 每周摘抄5个精彩句子并仿写
            - 积累可以用在作文中的好句子

            每周精改1篇自己的旧作文（重点改语言）
      pass_criteria:
        - 语言有节奏感和画面感
        - 有2-3处让人眼前一亮的表达

    - order: 3
      topic: 范文研读与模仿
      goal: 学习一类文的写法，内化为自己的能力
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京中考一类文范文集（10篇）
          how_to_use: |
            研读方法：
            1. 第一遍通读，感受整体效果
            2. 第二遍分析：
               - 标注开头方式和结尾方式
               - 画出最精彩的描写段落
               - 分析详略安排和结构设计
               - 提炼立意角度
            3. 仿写：用同样的结构/手法写一篇不同题材的作文

            每周研读2篇+仿写1篇
      pass_criteria:
        - 能分析范文的优秀之处
        - 仿写作文质量明显提升

    - order: 4
      topic: 限时全真模拟
      goal: 50分钟内完成一篇高质量作文
      estimated_hours: 5
      resources:
        - type: 真题
          name: 北京近年中考+一模二模作文题
          how_to_use: |
            考试时间分配：
            5分钟审题+构思+列提纲
            40分钟写作
            5分钟检查修改

            模拟规则：
            - 不看任何参考资料
            - 严格限时50分钟
            - 写完后自评（或找老师批改）
            - 每次写完分析优缺点

            每周写1篇限时作文，持续5周
      pass_criteria:
        - 限时50分钟完成审题+构思+写作+检查
        - 作文评分稳定在36分以上

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 写作功底靠长期积累，阅读和写作两手抓
    by_level:
      L0: |
        每天写100字微日记（素材积累）。
        每周写1篇完整作文（600字），先保证写满不跑题。
        每天读1篇短文（课内课外均可），培养语感。
      L1: |
        每周写1篇作文+修改1次（重点练描写）。
        每天写1个描写片段（100字）。
        开始积累开头结尾的多种写法。
        素材库持续更新。
      L2: |
        每周写1篇作文+精改1篇旧作文。
        开始研读一类文范文。
        练习想象写作（每月2篇）。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 题型训练为主，形成稳定的写作模式
    by_level:
      L0: |
        集中训练审题（2周）+结构（2周）+描写（2周）。
        每两周写1篇完整作文。
        背3个万能素材（适用于多种题目）。
      L1: |
        做北京近5年中考作文题（5篇），熟悉出题风格。
        重点训练开头结尾和描写段落。
        准备2-3个"百搭素材"。
        想象写作也要练2-3篇。
      L2: |
        限时训练：每周1篇限时50分钟。
        研读范文：每周2篇一类文。
        立意升格和语言锤炼是重点。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 稳定发挥，准备好"百搭素材"
    by_level:
      L0: |
        准备3个万能素材，反复练习用不同题目套用。
        背2个好开头和2个好结尾。
        确保字数达到600字、不跑题。
        目标：28-30分。
      L1: |
        准备5个精品素材+3种开头结尾模式。
        做2篇限时作文保持手感。
        重点检查：是否有2处以上的描写段落。
        目标：32-35分。
      L2: |
        每周1篇限时作文，追求稳定发挥。
        考前一周：回顾自己的最佳作文，找回写作状态。
        准备好命题作文和想象作文各一套写作策略。
        目标：36-40分。
