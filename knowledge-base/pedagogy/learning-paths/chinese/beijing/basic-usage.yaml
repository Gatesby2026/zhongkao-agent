# ============================================================
# 学习路径：基础·运用（字词句/默写/综合学习/书法鉴赏）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 重要性：约15分，基础送分项，必须拿到12分以上

module: 基础运用
subject: 语文
region: 北京

# ================================================================
#  L0 → L1：字词积累和默写起步
# ================================================================
L0_to_L1:
  target: 常考易错字词正确率达到60%以上，能默写大部分必背篇目
  estimated_hours: 15-20
  prerequisite: 无

  steps:
    - order: 1
      topic: 字音字形基础积累
      goal: 掌握初中阶段200个高频易错字词的读音和写法
      estimated_hours: 6
      resources:
        - type: 教材
          name: 人教版语文七至九年级课后"读一读写一写"
          how_to_use: |
            第1周（每天30分钟）：
            - 七年级上下册的课后字词，每天背写10个
            - 用"看拼音写汉字"的方式自测
            - 重点关注多音字（如"处chǔ/chù""强qiáng/qiǎng/jiàng"）
            - 易错字标红，建立个人错字本

            第2周：
            - 八年级上下册的课后字词，方法同上
            - 每天复习前一天的10个+新学10个

            第3周：
            - 九年级上下册的课后字词
            - 整体回顾，重点攻克错字本上的字词
        - type: 练习
          name: 万唯·语文基础知识手册（字音字形部分）
          how_to_use: 做分类练习题，每天10题，错题抄三遍
      pass_criteria:
        - 200个高频字词听写正确率≥60%
        - 多音字能说出至少两个读音和对应词语
      common_pitfalls:
        - "形近字混淆：如'燥/躁/噪''辩/辨/辫'"
        - "多音字只记一个读音，忽略其他读音"

    - order: 2
      topic: 古诗文默写（61篇必背）
      goal: 能完成大部分必背篇目的背诵和默写
      estimated_hours: 6
      resources:
        - type: 教材
          name: 课标要求61篇必背古诗文
          how_to_use: |
            按难度分三批背诵：

            第1批（2周）——短篇古诗20首：
            - 五言绝句/七言绝句优先（如《登鹳雀楼》《望岳》等）
            - 每天背2首，当天默写，次日复查
            - 重点：不写错别字！"生"不写成"升"，"州"不写成"洲"

            第2批（2周）——七言律诗和长诗15首：
            - 如《春望》《过零丁洋》《行路难》等
            - 每天背1首+复习前一天

            第3批（2周）——文言文26篇关键段落：
            - 优先背诵名句所在段落（如《岳阳楼记》最后两段）
            - 长篇文只背考试常考的段落
        - type: 练习
          name: 五三·古诗文默写专项
          how_to_use: 每天做5道理解性默写题
      pass_criteria:
        - 61篇中至少能默写50篇的核心名句
        - 默写时错别字率低于10%
      common_pitfalls:
        - "会背但写不对：'缘'写成'原'，'暮'写成'幕'"
        - "理解性默写不会定位：不知道'蕴含哲理的句子'是哪一句"

    - order: 3
      topic: 病句辨析入门
      goal: 了解六大病句类型的基本特征
      estimated_hours: 2
      resources:
        - type: 教材
          name: 万唯·病句辨析专题
          how_to_use: |
            六大病句类型速记：
            1. 搭配不当："提高认识"对/"提高水平"对/"提高素质"错→应为"提升素质"
            2. 成分残缺：缺主语/缺宾语——"通过……使……"句型最常考
            3. 语序不当：定语/状语位置放错
            4. 重复赘余："大约……左右""许多莘莘学子"
            5. 表意不明："他的哥哥和妹妹的朋友"——谁的朋友？
            6. 不合逻辑："防止不再发生"

            每种类型做3题，先记住典型例句
      pass_criteria:
        - 能说出六大病句类型的名称
        - 给出典型病句能判断属于哪种类型

    - order: 4
      topic: 书法四体识别
      goal: 区分楷书、行书、隶书、篆书的基本特征
      estimated_hours: 1
      resources:
        - type: 教材
          name: 语文教材中的书法鉴赏内容
          how_to_use: |
            四体速记口诀：
            - 楷书：横平竖直，方正端庄（代表：颜真卿/柳公权/欧阳询）
            - 行书：行云流水，连笔自然（代表：王羲之《兰亭集序》）
            - 隶书：蚕头雁尾，一波三折（代表：《曹全碑》）
            - 篆书：圆转匀称，线条圆润（代表：小篆《泰山刻石》）

            看10幅书法作品图片，逐一判断字体
      pass_criteria:
        - 看到书法作品能说出属于哪种字体
        - 能说出每种字体的1-2个核心特征

# ================================================================
#  L1 → L2：查漏补缺和规范答题
# ================================================================
L1_to_L2:
  target: 基础运用板块得分率80%以上（12分/15分）
  estimated_hours: 10-12
  prerequisite: L1

  steps:
    - order: 1
      topic: 易错字词强化（个人弱项攻克）
      goal: 常考易错字词正确率达到85%以上
      estimated_hours: 3
      resources:
        - type: 练习
          name: 个人错字本+万唯易错字词专项
          how_to_use: |
            第1步：整理个人高频错字（从平时测试中收集）
            第2步：分类突破
            - 形近字组：每天练3组（如"融/隔""遗/遣"）
            - 多音字组：每天练3组（如"薄báo/bó/bò"）
            - 成语中的易错字：如"再接再厉"非"再接再励"
            第3步：每周做一次100字听写自测
      pass_criteria:
        - 易错字词正确率≥85%
        - 个人错字本上的字词全部过关

    - order: 2
      topic: 理解性默写专项
      goal: 理解性默写正确率85%以上
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三/万唯理解性默写专项（100题）
          how_to_use: |
            分类训练：
            - "写景名句"类：如"描写春天的句子""月夜思乡的句子"
            - "蕴含哲理"类：如"表达积极进取精神的句子"
            - "表达情感"类：如"表达忧国忧民的句子"
            每天练10题，错题标记并反复默写
      pass_criteria:
        - 100题正确率≥85%
        - 错别字率低于5%

    - order: 3
      topic: 病句辨析专项
      goal: 病句判断正确率80%以上
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三·病句辨析专题（30题）
          how_to_use: |
            三步解题法：
            1. 提取主干（主语+谓语+宾语），检查搭配
            2. 看标志词（"通过/使""防止/避免""大约/左右"）
            3. 整体通读，检查逻辑和语序

            每种类型精做5题，每题写出病因和修改方案
      pass_criteria:
        - 30题正确率≥80%
        - 能说出病因并给出修改方案

    - order: 4
      topic: 成语运用专项
      goal: 近义成语辨析正确率80%以上
      estimated_hours: 2
      resources:
        - type: 练习
          name: 万唯·成语运用专题
          how_to_use: |
            重点攻克三类易错：
            1. 望文生义型：如"万人空巷"不是街上没人
            2. 褒贬误用型：如"始作俑者"是贬义
            3. 近义混淆型：如"不以为然"vs"不以为意"

            背30个高频易错成语+做20道选择题
      pass_criteria:
        - 30个高频成语含义准确掌握
        - 选择题正确率≥80%

    - order: 5
      topic: 综合性学习答题模板
      goal: 综合性学习和语言运用题答题规范
      estimated_hours: 2
      resources:
        - type: 练习
          name: 北京近5年中考综合性学习真题
          how_to_use: |
            常见题型模板：
            1. 拟写宣传语/开场白：注意对象+目的+语言得体
            2. 活动设计：格式为"活动名称+活动内容+活动目的"
            3. 书法鉴赏：从字体特征+审美感受+文化内涵三方面作答
            4. 劝说/建议：称呼+理由+建议+期望

            逐题精做+对照满分答案找差距
      pass_criteria:
        - 综合性学习题能按模板规范作答
        - 得分率≥80%

# ================================================================
#  L2 → L3：速度和精准度提升
# ================================================================
L2_to_L3:
  target: 基础运用板块15分中得14-15分
  estimated_hours: 5-8
  prerequisite: L2
  notes: 基础运用满分对语文总分影响大，值得投入

  steps:
    - order: 1
      topic: 限时训练
      goal: 基础运用板块15分钟内高质量完成
      estimated_hours: 2
      resources:
        - type: 真题
          name: 北京近5年中考+海淀/西城一模二模基础运用部分
          how_to_use: |
            模拟考试条件：
            - 限时15分钟完成第1-5题
            - 先做有把握的，再攻难题
            - 默写题书写要工整
            - 做完检查一遍
      pass_criteria:
        - 限时15分钟得分率≥90%

    - order: 2
      topic: 易混成语50组精练
      goal: 近义成语辨析达到秒解水平
      estimated_hours: 2
      resources:
        - type: 练习
          name: 50组近义成语辨析卡片
          how_to_use: |
            每天背5组，用语境造句区分：
            如"不以为然"（不认为对）vs"不以为意"（不放在心上）
            "义不容辞"（道义上不允许推辞）vs"责无旁贷"（责任不能推卸）
            "耳濡目染"（经常听到看到，无形中受影响）vs"耳闻目睹"（亲耳听到亲眼看到）
      pass_criteria:
        - 50组成语能准确区分

    - order: 3
      topic: 书法鉴赏高分表达
      goal: 书法鉴赏题能写出专业且有文采的赏析
      estimated_hours: 2
      resources:
        - type: 练习
          name: 书法鉴赏答题语料积累
          how_to_use: |
            积累专业术语：
            - 楷书：端庄大气/法度严谨/骨力遒劲
            - 行书：气韵生动/潇洒流畅/刚柔相济
            - 隶书：古朴典雅/蚕头雁尾/波磔分明
            - 篆书：圆润匀净/线条流畅/古意盎然

            练习写5段完整的书法鉴赏短文（50-80字）
      pass_criteria:
        - 鉴赏用语专业规范
        - 能写出有文采的赏析段落

    - order: 4
      topic: 综合性学习高分策略
      goal: 综合性学习题拿满分
      estimated_hours: 2
      resources:
        - type: 真题
          name: 海淀/西城一模二模综合性学习满分答案
          how_to_use: |
            对比自己的答案和满分答案：
            - 内容完整性：是否遗漏要点
            - 语言得体性：是否符合特定场合/对象
            - 格式规范性：是否符合题目要求
            - 亮点加分：是否有修辞/对仗等语言亮点
      pass_criteria:
        - 综合性学习题得满分

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 基础运用靠积累，越早开始越扎实
    by_level:
      L0: |
        每天30分钟：10分钟背字词+10分钟默写古诗文+10分钟做练习题。
        坚持3个月，字词和默写就能过关。
        病句和成语先不急，字词和默写是基础中的基础。
      L1: |
        每天20分钟查漏补缺：5分钟复习错字+5分钟理解性默写+10分钟专项练习。
        病句和成语每周集中2小时专项突破。
        综合性学习随课堂练习即可。
      L2: |
        每周做一套基础运用限时训练即可维持水平。
        重点时间应投入到其他弱项板块。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 分项攻克，确保不丢冤枉分
    by_level:
      L0: |
        紧急补默写：集中2周背完核心30首古诗。
        字词每天背10个，用碎片时间复习。
        病句记住"通过/使"和"防止/避免"两个标志词即可。
      L1: |
        理解性默写每天5题，保持手感。
        成语易混组集中背诵。
        综合性学习做5套真题掌握答题模板。
      L2: |
        维持训练量：每周1-2次限时练习。
        重点关注书法鉴赏（近年北京卷热点）。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 回归基础，确保会的不丢分
    by_level:
      L0: |
        默写集中突击：每天默写3首，优先背诵高频考查篇目。
        字词只看错字本，不再扩大范围。
        基础运用目标：拿到8-10分。
      L1: |
        每天10分钟默写复习+5分钟字词巩固。
        做2套基础运用真题查漏补缺。
        目标：拿到12-13分。
      L2: |
        考前一周过一遍61篇默写。
        做1套限时训练保持手感。
        目标：拿到14-15分。
