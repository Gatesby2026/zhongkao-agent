# ============================================================
# 学习路径：圆
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11
# 地区：北京
# 注：原 quadrilaterals-and-circles.yaml 按 KB-MODULE-ID-SPEC 拆分而来

module: 圆
module_id: circles
subject: 数学
region: 北京

# ================================================================
#  L0 → L1
# ================================================================
L0_to_L1:
  target: 3大核心定理记牢
  estimated_hours: 6-8

  steps:
    - order: 1
      topic: 垂径定理
      goal: 能准确说出定理内容并在计算中使用
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本圆的垂径定理章节
          how_to_use: |
            垂径定理：垂直于弦的直径平分该弦及其所对的弧

            记忆方式：画图——圆中画一条弦，再从圆心作弦的垂线
            这条垂线（直径方向）把弦分成两段相等

            常用场景：已知弦长和半径求弦心距（或反过来）
            关系：r² = (弦长/2)² + 弦心距²

            做课本例题5题
        - type: 练习
          name: 五三·垂径定理计算题
          how_to_use: '练"弦长-半径-弦心距"互求（10题）'
      pass_criteria:
        - r²=(弦长/2)²+d² 的互求不出错
      common_pitfalls:
        - "弦长要除以2再用，直接用弦长平方是错的"

    - order: 2
      topic: 圆心角与圆周角
      goal: 圆周角定理及其推论熟练
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本圆周角章节
          how_to_use: |
            核心定理：
            1. 圆周角 = 对应圆心角的一半
            2. 同弧上的圆周角相等
            3. 直径所对的圆周角 = 90°（超级常用！）
            4. 90°的圆周角所对的弦是直径

            画5个图辅助理解，然后做课本例题
        - type: 练习
          name: 五三·圆周角定理计算题
          how_to_use: 做10题，含角度计算和推理
      pass_criteria:
        - '"直径→90°"能条件反射般使用'

    - order: 3
      topic: 切线的判定与性质
      goal: 会证明一条直线是切线，会用切线性质求角或求长
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本切线章节
          how_to_use: |
            切线性质：切线⊥过切点的半径

            切线证明两种方法：
            方法1（已知切点）：连接圆心和切点，证明这条半径⊥直线
            方法2（已知垂直）：证明垂足在圆上（即垂足到圆心距离=半径）

            做课本例题+课后题各3题
        - type: 练习
          name: 五三·切线专题基础篇
          how_to_use: 证明题做5题，计算题做5题
      pass_criteria:
        - 两种切线证明方法都会用
        - 利用切线性质求角度/线段长正确率≥80%

    - order: 4
      topic: 弧长与扇形面积
      goal: 公式记住，计算准确
      estimated_hours: 1.5
      resources:
        - type: 教材
          name: 课本弧长和扇形面积章节
          how_to_use: |
            弧长 l = nπr/180（n是圆心角度数）
            扇形面积 S = nπr²/360 = lr/2

            做8题计算题
      pass_criteria:
        - 弧长和扇形面积计算正确率≥90%

# ================================================================
#  L1 → L2
# ================================================================
L1_to_L2:
  target: 中考圆的解答题能独立完成
  estimated_hours: 5-6

  steps:
    - order: 1
      topic: 圆的综合解题训练
      goal: 定理的综合运用
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·圆综合题
          how_to_use: |
            中考圆的解答题常见模式：
            1. 证明某直线是切线（用方法1或方法2）
            2. 求某段弧长或扇形面积
            3. 与三角形结合（勾股定理+切线性质）

            做10题，每题写完整过程
        - type: 真题
          name: 北京近5年中考圆的解答题
          how_to_use: 逐题精做
      pass_criteria:
        - 中考真题正确率≥85%

# ================================================================
#  L2 → L3（与四边形共用一份"四边形+圆"限时刷题，见 quadrilaterals.yaml 同名阶段）
# ================================================================
L2_to_L3:
  target: 选择填空秒解，解答题准确
  estimated_hours: 4-5

  steps:
    - order: 1
      topic: 限时刷题（圆部分）
      goal: 速度和准确率同时提高
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京中考+一模 圆相关题汇编
          how_to_use: |
            把每套卷中圆的题目抽出来
            限时训练：选择填空每题1分钟，解答题每题8分钟
      pass_criteria:
        - 正确率≥90%

# ================================================================
#  时间维度策略
# ================================================================
# 圆：Q14(填空)/Q24(解答) ≈ 8分

time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    by_level:
      L0: |
        先记三大定理（垂径/圆周角/切线），画图辅助理解。
        时间分配：每天20分钟×3周。
      L1: |
        垂径定理应用 + 切线证明两种方法专练。
        时间分配：每天25分钟，持续4周。
      L2: |
        圆的综合题开始接触。每周做2道 Q24 的真题。

  mid_term:
    name: 强化期（距中考3-6个月）
    by_level:
      L0: |
        只记"直径所对圆周角=90°"，这一条就能做很多选择填空。
      L1: |
        集中练 Q24（近5年真题），每题限时10分钟。
        Q14 填空题刷一遍近5年真题。
      L2: |
        Q24 限时训练确保拿满。

  sprint:
    name: 冲刺期（距中考0-3个月）
    by_level:
      L0: |
        Q24 写出基本条件和第一步推理拿步骤分。
      L1: |
        Q14+Q24 的历年真题做两遍。
        圆的 Q24 第1问（通常是角度计算）务必拿到。
      L2: |
        模考中检验，发现问题针对性补。
        圆不是冲刺期重点，保持手感即可。
