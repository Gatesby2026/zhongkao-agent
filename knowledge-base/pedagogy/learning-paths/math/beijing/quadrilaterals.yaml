# ================================================================
#  L0 → L1
# ================================================================
L0_to_L1:
  target: 理清四种特殊四边形的关系，性质不再混淆
  estimated_hours: 6-8

  steps:
    - order: 1
      topic: 四边形家族关系梳理
      goal: '画出关系图，搞清"谁是谁的特殊情况"'
      estimated_hours: 2
      resources:
        - type: 教材
          name: 课本四边形章节
          how_to_use: |
            画一张关系图（核心！必须自己画一遍）：

            平行四边形
            ├── 矩形（平行四边形 + 一个直角）
            ├── 菱形（平行四边形 + 邻边相等）
            └── 正方形（矩形 + 邻边相等 = 菱形 + 一个直角）

            然后列一张对比表：
            ┌───────────┬──────┬──────┬──────────┬──────────┐
            │           │ 边   │ 角   │ 对角线    │ 面积     │
            ├───────────┼──────┼──────┼──────────┼──────────┤
            │平行四边形 │对边等│对角等│互相平分   │底×高     │
            │矩形       │对边等│都90° │互相平分且等│长×宽     │
            │菱形       │四边等│对角等│互相垂直平分│对角线乘积÷2│
            │正方形     │四边等│都90° │互相垂直平分且等│边²    │
            └───────────┴──────┴──────┴──────────┴──────────┘

            这张表默写3遍
        - type: 练习
          name: 五三·四边形性质基础题
          how_to_use: 做10题判断题（对/错判断各种性质描述）
      pass_criteria:
        - 能默写四种四边形的性质对比表
        - 判断题正确率≥85%

    - order: 2
      topic: 四边形的判定方法
      goal: 每种四边形的判定方法至少记住2-3种
      estimated_hours: 2.5
      resources:
        - type: 教材
          name: 课本四边形判定章节
          how_to_use: |
            重点记住：

            判定平行四边形（5种，记住最常用的3种）：
            1. 两组对边分别平行
            2. 两组对边分别相等
            3. 对角线互相平分

            从平行四边形升级：
            □ + 一个直角 → 矩形
            □ + 邻边相等 → 菱形
            □ + 对角线相等 → 矩形
            □ + 对角线互相垂直 → 菱形
        - type: 练习
          name: 五三·四边形判定题
          how_to_use: 每种判定做3题
      pass_criteria:
        - 每种四边形至少能说出2种判定方法

    - order: 3
      topic: 基础证明训练
      goal: '能写出"先证平行四边形，再升级"的两步证明'
      estimated_hours: 2
      resources:
        - type: 练习
          name: 五三·四边形证明基础篇
          how_to_use: |
            常见证明模式：
            1. 先证是平行四边形（找两组对边平行/相等/对角线互相平分）
            2. 再证是矩形/菱形/正方形（加一个额外条件）
            做8题
      pass_criteria:
        - 两步证明格式正确，正确率≥80%

# ================================================================
#  L1 → L2
# ================================================================
L1_to_L2:
  target: 中考四边形题型熟练
  estimated_hours: 4-5

  steps:
    - order: 1
      topic: 中点四边形 + 中考真题
      goal: 特殊构造（取中点连线）和中考常考题型掌握
      estimated_hours: 3
      resources:
        - type: 练习
          name: 五三·中点四边形+中考真题四边形部分
          how_to_use: |
            中点四边形结论：任意四边形各边中点连线构成平行四边形
            特殊情况：
            - 对角线相等 → 中点四边形是菱形
            - 对角线垂直 → 中点四边形是矩形
            做5题中点四边形 + 北京近5年中考四边形题
      pass_criteria:
        - 中考真题正确率≥85%

# ================================================================
#  L2 → L3（与圆共用一份"四边形+圆"限时刷题，见 circles.yaml 同名阶段）
# ================================================================
L2_to_L3:
  target: 选择填空秒解，解答题准确
  estimated_hours: 4-5

  steps:
    - order: 1
      topic: 限时刷题（四边形部分）
      goal: 速度和准确率同时提高
      estimated_hours: 3
      resources:
        - type: 真题
          name: 北京中考+一模 四边形相关题汇编
          how_to_use: |
            把每套卷中四边形的题目抽出来
            限时训练：选择填空每题1分钟，解答题每题8分钟
      pass_criteria:
        - 正确率≥90%

# ================================================================
#  时间维度策略
# ================================================================
# 四边形：Q3(多边形)/Q8(选择)/Q15(填空)/Q20-Q21(解答) ≈ 6-10分

time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    by_level:
      L0: |
        画"家族关系图"（平行四边形→矩形/菱形→正方形），列表对比性质。
        时间分配：每天20分钟×3周。
      L1: |
        判定方法实际运用，"证明是矩形/菱形/正方形"各做5题。
        时间分配：每天25分钟，持续4周。
      L2: |
        四边形综合题开始接触。每周做2道 Q20 的真题。

  mid_term:
    name: 强化期（距中考3-6个月）
    by_level:
      L0: |
        只记平行四边形的5种判定（最高频），放弃综合题。
        Q3(多边形内角和)：记住公式(n-2)×180°，稳拿2分。
      L1: |
        集中练 Q20/Q21 中出现的四边形证明（近5年真题）。
        Q15 填空题刷一遍近5年真题。
      L2: |
        Q20 限时训练确保拿满。Q15(正方形面积类)做到秒解。

  sprint:
    name: 冲刺期（距中考0-3个月）
    by_level:
      L0: |
        只确保 Q3(多边形内角和)能做对——记公式+做5题。
      L1: |
        Q15+Q20 的历年真题做两遍。
      L2: |
        模考中检验，发现问题针对性补。
        四边形不是冲刺期重点，保持手感即可。
