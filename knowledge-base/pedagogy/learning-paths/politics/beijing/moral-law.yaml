# ============================================================
# 学习路径：道德与法律（青春期/道德修养/法律基础/权利义务）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试 — 核心能力是翻书定位+规范作答
# 重要性：约20分，法律基础和权利义务是必考重点

module: 道德与法律
subject: 道德与法治
region: 北京

# ================================================================
#  L0 -> L1：熟悉教材结构，建立知识点定位能力
# ================================================================
L0_to_L1:
  target: 知道每个知识点在哪本书哪一课，能在2分钟内翻到
  estimated_hours: 8-10
  prerequisite: 无（开卷考试的底线是"能翻到"）

  steps:
    - order: 1
      topic: 教材目录通读与标记
      goal: 对6本教材的内容结构建立整体认知
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版道德与法治（七年级上下册、八年级上下册、九年级上下册）
          how_to_use: |
            第1天：七年级两本
            - 通读目录，每课标题旁写一句话总结"这课讲什么"
            - 重点标记：青春期（七上）、友谊与交往（七上）、生命教育（七上）
            - 在书脊上贴便签，写上"青春期""自我认知"等关键词

            第2天：八年级两本
            - 通读目录，重点标记：
              八上：权利与义务、人身权利、法律基础
              八下：宪法、公民权利、国家机构
            - 这两本是法律部分的核心，便签要标得更细

            第3天：九年级两本
            - 通读目录，重点标记：
              九上：民主与法治、文明与家园
              九下：世界与中国、走向未来
            - 九年级与国情国策重叠较多，此处重点关注法治部分
        - type: 工具
          name: 便签纸（4-5种颜色）+ 荧光笔
          how_to_use: |
            颜色分类建议：
            - 黄色便签：法律知识点
            - 绿色便签：道德修养
            - 蓝色便签：权利义务
            - 粉色便签：重要定义和关键表述
      pass_criteria:
        - 能不翻书说出每本教材大致讲什么内容
        - 听到"未成年人保护"能在10秒内说出"八年级上册"
      common_pitfalls:
        - "不要试图通读全文，目录+标题+小标题就够了"
        - "便签不要贴太多，每课最多1个，否则找不到"

    - order: 2
      topic: 法律基础核心知识点
      goal: 掌握违法犯罪区别、法律特征、未成年人保护等高频考点
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版八年级上册·第五单元（法律部分）
          how_to_use: |
            必须掌握的知识点（在教材上用荧光笔标出）：

            1. 法律的三个基本特征
               - 由国家制定或认可
               - 靠国家强制力保证实施
               - 对全体社会成员具有普遍约束力

            2. 违法行为的三种类型
               - 民事违法（违反民事法律）→ 民事责任
               - 行政违法（违反行政法律）→ 行政处罚
               - 刑事违法（犯罪）→ 刑罚

            3. 犯罪的三个基本特征
               - 严重社会危害性
               - 刑事违法性
               - 应受刑罚处罚性

            4. 未成年人保护（六大保护）
               - 家庭保护、学校保护、社会保护
               - 网络保护、政府保护、司法保护

            每天背一个知识点，背完默写，对照教材检查
        - type: 练习
          name: 五三道法·法律基础选择题
          how_to_use: 每天做5道选择题，错题在教材上找到对应知识点并标记
      pass_criteria:
        - 法律三大特征能脱口而出
        - 违法行为三种类型能准确区分
        - 六大保护能完整列出
      common_pitfalls:
        - "犯罪的三个特征容易和法律的三个特征搞混"
        - "六大保护中'网络保护'和'政府保护'是新增的，容易漏"

    - order: 3
      topic: 权利与义务基础
      goal: 知道公民基本权利和义务有哪些，理解两者的关系
      estimated_hours: 3
      resources:
        - type: 教材
          name: 人教版八年级下册·宪法与公民权利章节
          how_to_use: |
            核心知识点：

            1. 公民基本权利（四大类）
               - 政治权利和自由（选举权/被选举权/言论出版等）
               - 人身自由权利（人身自由/人格尊严/住宅/通信）
               - 社会经济权利（财产权/劳动权/物质帮助权）
               - 文化教育权利（受教育权/文化活动自由）

            2. 公民基本义务
               - 维护国家统一和民族团结
               - 遵守宪法和法律
               - 维护国家安全荣誉和利益
               - 服兵役和参加民兵组织
               - 依法纳税

            3. 权利和义务的关系
               - 相互依存、不可分割
               - 权利和义务在法律关系上是对等的
               - 公民既是权利的享有者也是义务的承担者

            在教材上用不同颜色标出权利和义务的内容
        - type: 练习
          name: 五三道法·权利义务选择题
          how_to_use: 做10道选择题，重点练习权利类型的判断
      pass_criteria:
        - 能说出公民基本权利的四大类
        - 能解释权利和义务的关系
        - 受教育权"既是权利又是义务"能准确表述

# ================================================================
#  L1 -> L2：翻书速度提升 + 答题规范化
# ================================================================
L1_to_L2:
  target: 翻书30秒内定位知识点，非选择题能规范分点作答
  estimated_hours: 8-10
  prerequisite: L1

  steps:
    - order: 1
      topic: 翻书速度专项训练
      goal: 听到关键词能在30秒内翻到教材对应页面
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 计时翻书训练
          how_to_use: |
            训练方式（每天15分钟，持续一周）：

            1. 准备关键词卡片20张（如"违法犯罪""受教育权""人身自由"等）
            2. 随机抽一张，计时翻书找到对应知识点
            3. 记录用时，目标从2分钟逐步缩短到30秒
            4. 连续3次在30秒内找到算过关

            翻书口诀："先想哪本书→翻目录→找便签→定位原文"
            不要从第一页开始翻，直接翻目录或看便签！
      pass_criteria:
        - 20个高频知识点翻书平均用时≤30秒
        - 不需要翻目录就能直接翻到的知识点≥10个

    - order: 2
      topic: 答题模板训练（道德与法律专项）
      goal: 掌握本模块常见题型的答题框架
      estimated_hours: 3
      resources:
        - type: 练习
          name: 万唯道法·非选择题答题技巧
          how_to_use: |
            本模块高频题型及模板：

            【题型1：为什么要遵守法律/为什么法律重要】
            模板：法律特征（三个）+ 法律作用（规范+保护）+ 反面论证

            【题型2：如何依法维权/如何保护自己】
            模板：增强法律意识 + 具体维权途径（协商/调解/仲裁/诉讼）+ 善用法律武器

            【题型3：权利与义务的关系分析】
            模板：权利和义务统一性 + 具体权利分析 + 具体义务分析 + 结合材料

            【题型4：道德修养的意义/做法】
            模板：个人层面 + 社会层面 + 国家层面 + 结合具体品质（诚信/友善等）

            每种题型做3道练习题，写完对照标准答案
      pass_criteria:
        - 看到设问能判断属于哪种题型
        - 每种题型的答题模板能背出来
        - 答案分点清晰且每点有教材术语支撑

    - order: 3
      topic: 真题实战训练
      goal: 用真题检验翻书+答题综合能力
      estimated_hours: 4
      resources:
        - type: 真题
          name: 北京近5年中考道法卷·法律与道德相关非选择题
          how_to_use: |
            训练方法：
            1. 每天做1道非选择题，限时6分钟（含翻书）
            2. 写完后对照评分标准自批
            3. 找出丢分原因：翻书慢？角度少？用语不规范？
            4. 把标准答案中自己没想到的角度抄到教材对应页旁边

            重点关注：
            - 2024年法治相关材料题
            - 2025年权利义务相关材料题
            - 注意评分标准中的"采分点"分布
        - type: 练习
          name: 五三道法·非选择题专练（法律部分）
          how_to_use: 精选10题限时训练
      pass_criteria:
        - 真题非选择题得分率≥70%
        - 每道题翻书时间≤1分钟
        - 答案至少包含3个不同角度
      common_pitfalls:
        - "不要把时间都花在翻书上，答题时间更重要"
        - "答案不需要和教材原文一模一样，但术语要准确"

# ================================================================
#  L2 -> L3：多角度全面分析 + 高效答题
# ================================================================
L2_to_L3:
  target: 非选择题答题全面规范，本模块得分率≥85%
  estimated_hours: 6-8
  prerequisite: L2
  notes: 适合目标70+（总分80）的学生

  steps:
    - order: 1
      topic: 角度穷举训练
      goal: 面对材料题能快速列出所有可分析的角度
      estimated_hours: 3
      resources:
        - type: 训练方法
          name: '"多一个角度"强化练习'
          how_to_use: |
            方法：拿到一道题，先快速写出能想到的所有角度，
            然后对照标准答案，找出自己遗漏的角度。

            角度检查清单（道德与法律模块）：
            □ 法律角度（法律特征/法治/依法治国）
            □ 权利角度（哪项权利/权利保障）
            □ 义务角度（公民义务/社会责任）
            □ 道德角度（道德品质/社会公德/传统美德）
            □ 个人角度（个人成长/素养提升）
            □ 社会角度（社会和谐/公平正义）
            □ 国家角度（法治国家/治理能力）

            每天做2道题，每题先用清单过一遍，再作答
      pass_criteria:
        - 每道题能找到4个以上分析角度
        - 对照标准答案遗漏不超过1个角度

    - order: 2
      topic: 答题语言规范化
      goal: 用教材术语替代口语化表述
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 对照修改训练
          how_to_use: |
            方法：先自己写答案，然后逐句对照教材原文修正。

            常见口语化表述 → 规范表述：
            "法律很重要" → "法律是治国之重器，法治是国家治理体系和治理能力的重要依托"
            "要遵守法律" → "树立法治意识，自觉做到学法尊法守法用法"
            "保护自己" → "运用法律武器维护自身合法权益"
            "做好事" → "践行社会主义核心价值观，弘扬社会正能量"

            每天修改2道题的答案，重点替换口语化表述
      pass_criteria:
        - 答案中不出现明显的口语化表述
        - 关键术语使用准确

    - order: 3
      topic: 限时全真模拟
      goal: 在考试条件下高效完成本模块题目
      estimated_hours: 3
      resources:
        - type: 真题
          name: 海淀/西城一模二模·道法卷
          how_to_use: |
            模拟考试条件：
            - 带6本教材（已做好便签标记）
            - 选择题25分钟 + 非选择题55分钟 + 检查10分钟
            - 非选择题中道德法律相关的题限时12分钟
            - 写完后对照评分标准自批，计算得分率

            重点复盘：
            - 翻书耗时是否超标？→ 优化便签标记
            - 角度是否遗漏？→ 回顾角度检查清单
            - 用语是否规范？→ 积累更多教材术语
      pass_criteria:
        - 道德与法律模块得分率≥85%
        - 非选择题每题用时≤6分钟（含翻书）
        - 选择题本模块全对

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 开卷考试的准备从"熟悉教材"开始
    by_level:
      L0: |
        第一优先级：通读6本教材目录，做好便签标记。
        每天30分钟：15分钟翻教材+15分钟做选择题。
        这个阶段不急着做非选择题。
      L1: |
        翻书速度训练每天10分钟，坚持一个月。
        开始接触答题模板，每周做2道非选择题。
        错题本记录"我没想到的角度"。
      L2: |
        每周做3道非选择题限时训练。
        积累教材术语，替换口语化表述。
        开始做海淀西城的期末考试题。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 翻书速度+答题模板双管齐下
    by_level:
      L0: |
        如果还是L0，集中攻选择题——翻书做选择比不翻强。
        每天做10道选择题（允许翻书），记住知识点在哪页。
        非选择题至少会写"是什么"的部分。
      L1: |
        翻书必须提速到30秒以内。
        四种答题模板必须背熟。
        每天做1道非选择题限时训练。
      L2: |
        真题+模拟题交替训练。
        重点练"多角度分析"——每题至少4个角度。
        开始计时做整张试卷。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 查漏补缺+限时模拟
    by_level:
      L0: |
        放弃深度理解，集中背诵10个最高频知识点。
        选择题能翻书做对就做对，目标拿到本模块选择题6分以上。
        非选择题写出相关知识点就有步骤分。
      L1: |
        整理一张A4"知识点速查表"带进考场。
        模拟考试条件做3套完整试卷。
        非选择题每题写3个角度保底。
      L2: |
        全真模拟，查漏补缺。
        回顾错题本中的"遗漏角度"。
        确保便签标记和速查表是最新的。
