# ============================================================
# 学习路径：材料分析答题技巧（审题/定位/组织语言/翻书技巧）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 地区：北京
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试 — 本模块是开卷考试的核心竞争力
# 重要性：贯穿全部非选择题40分，是得分效率的关键

module: 材料分析答题技巧
subject: 道德与法治
region: 北京

# ================================================================
#  L0 -> L1：建立基本的审题和答题意识
# ================================================================
L0_to_L1:
  target: 知道怎么读题、怎么翻书、怎么写答案（从"写不出来"到"能写几句"）
  estimated_hours: 6-8
  prerequisite: 至少有一个知识模块达到L0以上

  steps:
    - order: 1
      topic: 审题方法——先读设问再读材料
      goal: 建立正确的审题顺序和习惯
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 审题三步法训练
          how_to_use: |
            很多学生的习惯：先读材料→再看设问→回头重读材料
            正确的顺序：先读设问→圈关键词→带着问题读材料

            三步法：
            第1步：读设问（不读材料！）
            - 这道题问的是什么？（意义/原因/做法/认识）
            - 限定了哪个范围？（法律/国情/道德/权利）
            - 需要结合材料吗？（"结合材料"="必须引用材料信息"）

            第2步：圈关键词
            - 在设问中圈出限定词（如"运用法律知识""从权利角度"）
            - 在设问中圈出题型词（如"意义""原因""建议""认识"）

            第3步：带着问题读材料
            - 在材料中画出与设问相关的信息
            - 标注哪些材料信息对应哪个设问

            练习：拿5道真题，只做审题步骤（不写答案），
            标注关键词和题型，对照答案检验审题是否准确
      pass_criteria:
        - 拿到题目第一反应是看设问而不是读材料
        - 能准确识别题型（意义/原因/做法/认识）
        - 能圈出设问中的限定范围
      common_pitfalls:
        - "最大的错误是从头到尾读材料，读完忘了在问什么"
        - "不圈关键词就直接翻书，翻了半天不知道翻什么"

    - order: 2
      topic: 翻书基本技能——教材便签系统
      goal: 建立高效的教材标记系统，为翻书速度打基础
      estimated_hours: 2
      resources:
        - type: 工具
          name: 教材标记系统搭建
          how_to_use: |
            准备工作（考前必须完成）：

            1. 便签标记（每本书10-15个便签）
               - 书脊侧面贴，写上关键词
               - 便签露出书页约2cm，方便快速翻阅
               - 按主题用不同颜色区分

            2. 目录标注
               - 在目录页用荧光笔标出高频考点课次
               - 在课次旁写上常考题型（如"法律特征→选择题常考"）

            3. 正文标记
               - 重要定义用荧光笔框出
               - 重要表述旁画星号
               - 在页边空白处写"答题关键词"

            4. 速查表（A4纸）
               - 按主题整理高频知识点和教材页码
               - 夹在最常翻的那本教材首页
               - 考试时先看速查表再翻教材

            用3天时间把6本教材全部标记完成
      pass_criteria:
        - 6本教材都有便签标记
        - 速查表包含至少30个高频知识点和页码
        - 翻书时间从3分钟缩短到1分钟
      common_pitfalls:
        - "便签不要贴太多太密，否则找不到——每本书15个以内"
        - "速查表不要写太满，关键词+页码就够"

    - order: 3
      topic: 答题基本格式——分点作答
      goal: 从"一大段话"变成"分点有条理"
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 答题格式训练
          how_to_use: |
            基本格式要求：
            ① 必须分点（用①②③或(1)(2)(3)标号）
            ② 每点一行，不要挤在一起
            ③ 每点的结构："教材知识点 + 材料分析"
            ④ 先写最有把握的点

            示例对比：

            【差的答案】
            这样做很好因为可以让学生了解法律增强法律意识
            而且可以帮助学生成长还能促进社会和谐

            【好的答案】
            ①有利于增强学生的法治意识，引导学生自觉学法守法用法。
            （材料中的宪法宣传活动直接面向学生。）
            ②有利于保护未成年人合法权益，落实学校保护的要求。
            （通过法治教育帮助学生学会依法维权。）
            ③有利于推进依法治国，建设社会主义法治国家。
            （法治教育是法治社会建设的基础。）

            练习：拿3道已做过的题，把答案改写成规范格式
        - type: 练习
          name: 五三道法·非选择题基础训练
          how_to_use: 做5道简单非选择题，严格按格式要求作答
      pass_criteria:
        - 答案全部分点作答
        - 每点有教材术语支撑
        - 字迹清楚、条理分明

    - order: 4
      topic: 四种基本题型模板
      goal: 背熟四种题型的答题框架
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 题型模板背诵与应用
          how_to_use: |
            四种基本题型（必背）：

            【意义类】"有什么意义/作用/影响"
            框架：个人+社会+国家（或经济+政治+文化+生态）
            开头用词：有利于.../促进了.../推动了...

            【原因类】"为什么/原因/理由"
            框架：必要性（为什么要做）+重要性（做了有什么好处）+反面（不做会怎样）
            开头用词：因为.../这是由...决定的/...是...的需要

            【做法类】"怎么做/建议/措施"
            框架：国家+社会+学校+个人（分主体回答）
            开头用词：国家应.../社会要.../学校应.../青少年应...

            【认识类】"谈谈认识/看法/理解"
            框架：是什么+为什么+怎么做
            开头用词：这件事说明了.../我认为...因为.../我们应该...

            每种模板抄写3遍，然后各做1道练习题检验
      pass_criteria:
        - 四种题型的框架能脱口而出
        - 看到设问能在5秒内判断题型
      common_pitfalls:
        - "认识类最容易写跑偏——不要只写感想，必须有教材知识点支撑"
        - "做法类不要写太空泛的话如'努力学习'，要具体"

# ================================================================
#  L1 -> L2：翻书提速 + 角度全面 + 规范用语
# ================================================================
L1_to_L2:
  target: 翻书30秒定位，答题分点规范，非选择题得分率≥70%
  estimated_hours: 8-10
  prerequisite: L1 + 至少一个知识模块达L1以上

  steps:
    - order: 1
      topic: 翻书速度极限训练
      goal: 高频知识点30秒内翻到
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 翻书计时挑战
          how_to_use: |
            训练方式（每天15分钟，持续两周）：

            第一周：有便签辅助
            1. 准备30张关键词卡片
            2. 随机抽取→计时翻书→找到知识点
            3. 记录每次用时，目标逐步缩短
            4. 达标标准：30秒内找到

            第二周：减少便签依赖
            1. 撕掉一半便签
            2. 重复上述训练
            3. 目标：凭记忆+目录能在30秒内翻到

            翻书技巧：
            - 先判断哪本书→翻目录→定位章节→找具体段落
            - 常考的20个知识点应该记住在哪本书的大概哪个位置
            - 不要逐页翻，要"跳翻"（翻到大概位置再精确找）

            口诀："先想书→再翻页→看便签→找原文"
      pass_criteria:
        - 30个高频知识点平均翻书时间≤30秒
        - 至少15个知识点能直接翻到（不需要看目录）

    - order: 2
      topic: 答题角度全面性训练
      goal: 每道题至少3个不重复的角度
      estimated_hours: 3
      resources:
        - type: 训练方法
          name: '"角度清单法"'
          how_to_use: |
            方法：读完设问后，先不翻书，用角度清单过一遍

            通用角度清单：
            □ 个人角度（个人成长/素养/权利/义务）
            □ 社会角度（社会和谐/公平正义/文明风尚）
            □ 国家角度（国家发展/治理/制度/法治）
            □ 经济角度（发展/创新/开放/民生）
            □ 政治角度（民主/法治/制度/党的领导）
            □ 文化角度（文化自信/核心价值观/传统文化）
            □ 生态角度（绿色发展/生态文明/可持续）

            训练步骤：
            1. 读设问→判断题型
            2. 用角度清单逐一过：这道题可以从哪些角度答？
            3. 勾选3-5个适用角度
            4. 每个角度找对应教材知识点
            5. 写答案

            每天做2道题，坚持两周
        - type: 真题
          name: 北京近5年中考非选择题
          how_to_use: |
            逐题分析评分标准中的"采分点"：
            - 一共几个采分点？
            - 每个采分点对应什么角度？
            - 我遗漏了哪个角度？
            - 为什么会遗漏？（知识盲点还是思维盲点？）
      pass_criteria:
        - 每道题至少写出3个不重复的角度
        - 对照评分标准遗漏不超过1个角度
        - 答题前养成"过清单"的习惯

    - order: 3
      topic: 教材术语规范化训练
      goal: 答案中使用准确的教材语言而非口语
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 术语替换练习
          how_to_use: |
            高频术语积累（必须记住的教材原话）：

            法律类：
            - "法律是治国之重器"
            - "依法治国是治理国家的基本方略"
            - "树立法治意识，做知法守法用法的公民"

            发展类：
            - "创新是引领发展的第一动力"
            - "发展是解决我国一切问题的基础和关键"
            - "以人民为中心的发展思想"

            道德类：
            - "践行社会主义核心价值观"
            - "传承和弘扬中华传统美德"

            制度类：
            - "中国特色社会主义制度的最大优势是中国共产党领导"
            - "人民代表大会制度是我国的根本政治制度"

            训练方法：
            1. 先自己写答案
            2. 找出口语化表述
            3. 用教材术语替换
            4. 对照标准答案验证
      pass_criteria:
        - 答案中无明显口语化表述
        - 关键术语使用准确
        - 至少积累20条高频教材原话

    - order: 4
      topic: 考试时间管理训练
      goal: 90分钟内完成整张试卷且有时间检查
      estimated_hours: 3
      resources:
        - type: 训练方法
          name: 时间分配训练
          how_to_use: |
            推荐时间分配方案：

            选择题20题：25分钟
            - 不翻书，凭记忆做
            - 不确定的做标记，最后有时间再翻书确认
            - 目标：25分钟内完成，正确率≥85%

            非选择题6题：55分钟
            - 每题平均9分钟
            - 其中翻书1分钟 + 思考列提纲1分钟 + 作答6分钟 + 检查1分钟
            - 简单题控制在7分钟，留时间给难题

            检查：10分钟
            - 重点检查选择题中做了标记的题
            - 非选择题看有无遗漏角度
            - 检查答题卡是否涂完整

            训练方法：
            做3套完整试卷，每套都严格计时
            记录各部分实际用时，找到超时环节并优化
        - type: 真题
          name: 北京近3年中考真题（完整卷）
          how_to_use: 完全模拟考试条件，90分钟计时完成
      pass_criteria:
        - 90分钟内完成整张试卷
        - 非选择题每题不超过10分钟
        - 有至少5分钟检查时间

# ================================================================
#  L2 -> L3：高效精准 + 满分答题策略
# ================================================================
L2_to_L3:
  target: 非选择题得分率≥85%，答题高效精准
  estimated_hours: 6-8
  prerequisite: L2
  notes: 道法的L3不需要像数学那样"特别聪明"，需要的是"特别规范和全面"

  steps:
    - order: 1
      topic: 满分答案研究
      goal: 搞清楚"满分答案长什么样"
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 满分答案拆解
          how_to_use: |
            方法：找到近5年真题的标准答案/评分标准，逐题拆解

            分析维度：
            1. 一共几个采分点？采分点怎么分布？
            2. 每个采分点包含什么？（知识点+材料分析？纯知识点？）
            3. 用了什么术语？
            4. 答案的组织逻辑是什么？（按主体？按角度？按层次？）
            5. 答案的长度是多少？（通常每点1-2行）

            发现的规律写成"满分答案公式"：
            - 每题通常3-5个采分点
            - 每个采分点 = 教材术语（1句）+ 材料对应（1句）
            - 总字数通常100-200字/题
      pass_criteria:
        - 能说出满分答案的共同特征
        - 自己的答案结构向满分答案看齐

    - order: 2
      topic: 高效翻书策略
      goal: 从"翻到就行"提升到"翻书有策略"
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 翻书策略优化
          how_to_use: |
            高级翻书策略：

            1. 通读所有设问后再翻书
               - 先看6道非选择题的所有设问
               - 判断哪些题需要翻同一本书
               - 一次性翻完，避免反复换书

            2. 翻书只记页码，集中作答
               - 翻到知识点后在试卷上记"P128"
               - 所有题的知识点都定位完再开始写
               - 这样作答时不会被翻书打断思路

            3. 高频知识点脱离教材
               - 最常考的20个知识点应该不翻书也能写
               - 翻书只用于验证或查找不确定的点
               - 目标：一套卷只翻书3-4次

            4. 利用速查表
               - 速查表放在最方便的位置
               - 先查速查表→不够再翻教材
               - 速查表应该能覆盖80%的题目

            练习：做一套卷时记录翻书次数和总翻书时间
            目标：翻书总时间≤6分钟（整套卷）
      pass_criteria:
        - 整套卷翻书总时间≤6分钟
        - 翻书次数≤5次
        - 高频知识点不需要翻书

    - order: 3
      topic: '"多一个角度"强化'
      goal: 在已经能答3个角度的基础上，再多答1-2个
      estimated_hours: 2
      resources:
        - type: 训练方法
          name: 角度拓展训练
          how_to_use: |
            方法：写完答案后强迫自己再想一个角度

            角度拓展技巧：
            1. 换主体：已经写了个人角度？再想想社会/国家角度
            2. 换维度：已经写了经济角度？再想想政治/文化角度
            3. 想反面：已经写了"有利于..."？想想"不这样做会..."
            4. 想北京特色：有没有跟北京相关的角度？
            5. 想时政连接：有没有跟当前热点相关的角度？

            练习：拿10道已做过的题，每题补充1-2个角度
      pass_criteria:
        - 每道题能答出4-5个不重复的角度
        - 对照评分标准基本不遗漏

    - order: 4
      topic: 全真模拟与极限优化
      goal: 考试条件下稳定发挥
      estimated_hours: 2
      resources:
        - type: 真题
          name: 海淀/西城最新一模二模
          how_to_use: |
            极限模拟：
            - 完全模拟考试条件（90分钟+6本教材+速查表）
            - 做完后详细复盘：
              ① 选择题用了多长时间？有几题翻了书？
              ② 非选择题每题用时多少？翻了几次书？
              ③ 哪些角度遗漏了？为什么？
              ④ 用语有没有口语化？
              ⑤ 检查时间够不够？

            优化方向：
            - 选择题：争取20分钟内不翻书做完
            - 非选择题：每题控制在8分钟以内
            - 翻书：全卷翻书时间控制在5分钟以内
      pass_criteria:
        - 非选择题得分率≥85%（34/40分以上）
        - 整张试卷得分率≥85%（68/80分以上）
        - 有8-10分钟检查时间

# ================================================================
#  时间维度策略
# ================================================================
time_strategies:

  long_term:
    name: 长线期（距中考6-12个月）
    principle: 答题技巧需要长期训练，不能考前突击
    by_level:
      L0: |
        第一个月：搭建教材便签系统+学习审题三步法。
        第二个月起：每天做1道非选择题（不限时），重点练格式。
        不要急着练速度，先把格式和习惯练好。
      L1: |
        翻书速度训练每天10分钟。
        每周做3道非选择题，严格用模板答题。
        开始积累教材术语。
      L2: |
        每周做1套完整试卷（限时90分钟）。
        重点练"角度全面性"和"时间管理"。
        开始研究满分答案。

  mid_term:
    name: 强化期（距中考3-6个月）
    principle: 翻书速度和答题模板必须到位
    by_level:
      L0: |
        便签系统必须搭建完成。
        每天做1道非选择题（限时10分钟）。
        至少背熟两种题型模板（意义类+做法类）。
      L1: |
        翻书30秒达标。
        四种题型模板全部背熟。
        每天做1道限时非选择题 + 5道选择题。
      L2: |
        每周2套完整限时试卷。
        角度清单法形成条件反射。
        术语规范化：写完检查口语化表述。

  sprint:
    name: 冲刺期（距中考0-3个月）
    principle: 全真模拟+查漏补缺
    by_level:
      L0: |
        确保便签和速查表就位。
        选择题先做（能翻书就翻），非选择题至少分点写。
        写出知识点名称就有分，不要留空白。
      L1: |
        每周1套全真模拟。
        回顾错题中的"遗漏角度"和"口语化表述"。
        速查表更新到最新版本。
      L2: |
        全真模拟追求稳定性：连续3套≥85%。
        极限优化翻书时间。
        做完一套卷重点看"最后一道题"的质量（是否因赶时间而潦草）。
