# ============================================================
# 诊断标准：基础·运用（字词句/默写/综合学习/书法鉴赏）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12

module: 基础运用
subject: 语文
covers:
  - 字音字形（易错字词辨析）
  - 词语运用（成语/关联词/语境选词）
  - 语句衔接与病句辨析
  - 古诗文默写（理解性默写为主）
  - 综合性学习（语言实际运用/活动设计）
  - 书法鉴赏（楷/行/隶/篆识别与欣赏）
exam_weight: ★★（约15分，基础送分项）
typical_score: 约15分（北京中考第1-5题）
typical_questions: 选择2-3题 + 填空/简答2-3题

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 常见字词读写错误率高，默写几乎无法完成，不会辨析病句
    signals:
      - 常考200个易错字词正确率低于40%
      - 古诗文默写篇目大部分不会背
      - 病句类型完全分不清
      - 书法四体（楷行隶篆）无法区分
      - 成语望文生义，不理解实际含义
      - 综合性学习活动设计无从下手
    diagnostic_questions:
      - question: "下列词语中加点字注音全都正确的一项是——A.狭隘(ài) 粗犷(kuàng) B.应和(hè) 倔强(jué)"
        expected: "A正确；B中犷应为guǎng"
        L0_typical_error: "随意猜选，无法识别常见多音字和易错字"
      - question: "默写：山重水复疑无路，___________。（陆游《游山西村》）"
        expected: "柳暗花明又一村"
        L0_typical_error: "完全写不出或写错多个字"
      - question: "辨别下列书法作品属于哪种字体（给出楷书和隶书各一幅）"
        expected: "识别楷书的方正端庄、隶书的蚕头雁尾"
        L0_typical_error: "完全不了解书法字体特征"

  - id: L1
    name: 概念模糊
    description: 能认部分字词但易混淆，背过诗文但默写时常写错别字
    signals:
      - 常考易错字词正确率50%-70%
      - 能背诵大部分要求篇目，但默写时出现1-3个错别字
      - 知道病句大致类型但具体判断常出错
      - 书法四体能认出楷书和草书，行书和隶书区分不清
      - 成语使用题正确率约50%
      - 综合性学习能写出框架但表达不规范
    diagnostic_questions:
      - question: "下列词语书写有误的一项是——A.张灯结彩 B.锐不可挡 C.因地制宜 D.妇孺皆知"
        expected: "B有误，应为'锐不可当'"
        L1_typical_error: "对'当/挡'等形近字把握不准，犹豫不决"
      - question: "默写：不畏浮云遮望眼，___________。（王安石《登飞来峰》）"
        expected: "自缘身在最高层"
        L1_typical_error: "内容基本正确但'缘'写成'原'等错别字"
      - question: "下列句子中没有语病的一项（含搭配不当/成分残缺/语序不当/重复赘余各一项）"
        expected: "能排除明显的成分残缺，但搭配不当和语序不当容易混淆"
        L1_typical_error: "在两个选项之间犹豫，最终选错"

  - id: L2
    name: 基本熟练
    description: 字词默写基本过关，病句和成语判断较准确，综合性学习有条理
    signals:
      - 常考易错字词正确率80%以上
      - 理解性默写正确率85%以上，错别字极少
      - 六大病句类型能正确辨析
      - 书法四体识别准确，能简要说出特征
      - 成语运用题正确率80%以上
      - 综合性学习回答完整、表达规范
    diagnostic_questions:
      - question: "根据语境选择恰当的成语填空（含'不以为然/不以为意''义不容辞/责无旁贷'等易混组）"
        expected: "根据语境准确区分近义成语"
        L2_response: "正确选择，偶尔在特别细微的差异上犹豫"
      - question: "理解性默写：《次北固山下》中蕴含新旧交替哲理的句子"
        expected: "海日生残夜，江春入旧年"
        L2_response: "准确写出，无错别字"
      - question: "为学校'走进传统文化'活动拟写一段开场白（50字左右）"
        expected: "内容切题、语言得体、格式正确"
        L2_response: "能写出合格的开场白，但语言不够精彩"

  - id: L3
    name: 熟练精通
    description: 基础运用板块接近满分，答题快速准确
    signals:
      - 字音字形选择题秒解
      - 理解性默写满分，书写工整
      - 病句判断又快又准，能说出修改方法
      - 书法鉴赏能写出专业评语
      - 综合性学习回答既规范又有亮点
    pass_standard: 基础运用板块15分中得14-15分

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 1, topic: 字音字形, score: 2 }
      - { year: 2024, qid: 1, topic: 字音字形, score: 2 }
      - { year: 2023, qid: 3, topic: 古诗文默写, score: 4 }
    should_struggle:
      - { year: 2025, qid: 2, topic: 成语运用, score: 2 }
      - { year: 2024, qid: 4, topic: 病句辨析, score: 2 }

  L2:
    must_solve:
      - { year: 2025, qid: 1, topic: 字音字形, score: 2 }
      - { year: 2025, qid: 2, topic: 成语运用, score: 2 }
      - { year: 2025, qid: 3, topic: 古诗文默写, score: 5 }
      - { year: 2024, qid: 3, topic: 古诗文默写, score: 4 }
      - { year: 2024, qid: 4, topic: 病句辨析, score: 2 }
    should_struggle:
      - { year: 2025, qid: 5, topic: 综合性学习/书法鉴赏 }

  L3:
    must_solve:
      - { year: 2025, qid: 1-5, topic: 基础运用全部, score: 15 }
      - { year: 2024, qid: 1-5, topic: 基础运用全部, score: 15 }
    pass_standard: 基础运用板块得分率95%以上

# ------ 各子模块细分诊断 ------
sub_modules:

  字音字形:
    L0_signal: "常见易错字正确率低于40%"
    L1_signal: "能认大部分但形近字、多音字经常混淆"
    L2_signal: "正确率80%以上，偶尔在生僻词上出错"
    L3_signal: "秒解，正确率95%以上"
    key_diagnostic: "给出10组高频易错字词（如'脍炙人口/烩''栩栩如生/诩'），辨音辨形"

  古诗文默写:
    L0_signal: "大部分篇目不会背诵"
    L1_signal: "能背诵但默写时出现错别字"
    L2_signal: "理解性默写准确，极少错字"
    L3_signal: "默写满分且书写工整"
    key_diagnostic: "完成10道理解性默写（涵盖课标要求的61篇必背篇目）"

  病句辨析:
    L0_signal: "六大病句类型完全不了解"
    L1_signal: "知道类型但具体判断不准"
    L2_signal: "能准确辨析且说出修改方案"
    L3_signal: "秒判，能分析错误原因并规范修改"
    key_diagnostic: "给出4个句子判断哪个没有语病（含搭配不当/成分残缺/语序不当/表意不明各一）"

  综合性学习:
    L0_signal: "不知道怎么回答综合性学习题"
    L1_signal: "能写出大致内容但格式和表达不规范"
    L2_signal: "内容完整、格式规范"
    L3_signal: "回答既规范又有语言亮点"
    key_diagnostic: "为'读书节'活动设计一个环节并写出宣传语"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 字词积累和古诗文背诵
    estimated_hours: 15-20
    key_tasks:
      - 每天背10个易错字词（人教版课后"读一读写一写"）
      - 每天背诵并默写1篇古诗文（从短篇开始）
      - 学习六大病句类型的基本定义
      - 认识书法四体的基本特征

  L1_to_L2:
    focus: 查漏补缺和规范答题
    estimated_hours: 10-12
    key_tasks:
      - 整理个人易错字词本，反复巩固
      - 理解性默写专项训练（每天5题）
      - 病句辨析专项（分类练习各10题）
      - 综合性学习答题模板训练

  L2_to_L3:
    focus: 速度和精准度
    estimated_hours: 5-8
    key_tasks:
      - 限时训练（基础运用板块15分钟内完成）
      - 易混成语专项（50组近义成语辨析）
      - 书法鉴赏答题语言积累
      - 综合性学习高分答案赏析
