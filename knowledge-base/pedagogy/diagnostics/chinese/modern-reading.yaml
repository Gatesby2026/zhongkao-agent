# ============================================================
# 诊断标准：现代文阅读（记叙文+说明文/非连续性文本）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12

module: 现代文阅读
subject: 语文
covers:
  - 记叙文阅读（散文/小说，含情节/人物/主题/语言赏析）
  - 议论文阅读（论点/论据/论证方法）
  - 说明文阅读（说明对象/说明方法/说明顺序/语言准确性）
  - 非连续性文本阅读（图表/材料整合/信息提取）
exam_weight: ★★★（约22分，区分度最大的板块）
typical_score: 约22分（北京中考第14-21题左右）
typical_questions: 记叙文阅读约12分 + 议论/说明/非连文本约10分

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 读不懂文章主旨，不会分析表达手法，答题无章法
    signals:
      - 阅读速度慢，800字文章需要10分钟以上
      - 读完文章说不出中心思想
      - 不知道记叙文的常见考查题型
      - 说明方法（举例子/列数字/作比较/打比方）完全分不清
      - 议论文论点和论据分不清
      - 答题只能抄原文，不会组织自己的语言
      - 非连续性文本中的图表完全读不懂
    diagnostic_questions:
      - question: "阅读一篇600字记叙文后：文章写了一件什么事？用一句话概括"
        expected: "按'谁+做了什么+结果如何'格式概括"
        L0_typical_error: "无法概括，只能复述开头几句"
      - question: "文中画线句'窗外的梧桐叶在秋风中瑟瑟发抖'运用了什么修辞手法？有何作用？"
        expected: "拟人手法，赋予梧桐叶人的动作，烘托出萧瑟悲凉的氛围，暗示人物内心的凄凉"
        L0_typical_error: "不知道什么是修辞手法，或答'比喻'"
      - question: "说明文中'我国高铁运营里程约占全球的70%'用了什么说明方法？"
        expected: "列数字，准确说明我国高铁运营里程之长/占比之大"
        L0_typical_error: "完全不知道什么是说明方法"

  - id: L1
    name: 概念模糊
    description: 能读懂文章大意，知道部分题型但答题不规范、不完整
    signals:
      - 能概括文章大意但不够准确简练
      - 知道常见修辞手法但分析"作用"时空泛
      - 说明方法能说出名称但分析效果套话多
      - 议论文能找到中心论点但论证过程分析不清
      - 答题格式不规范，要点遗漏
      - 赏析题只说"好在哪里"说不出具体好在哪
      - 非连续性文本能提取单一信息但不会整合
    diagnostic_questions:
      - question: "记叙文中第③段在文中的作用是什么？（该段为过渡段）"
        expected: "承上启下，承接上文写……，引出下文写……，使文章结构紧凑"
        L1_typical_error: "只说'承上启下'四个字，不结合具体内容分析"
      - question: "赏析句子：'母亲的手像一把粗糙的锉刀，每一道纹路都刻满了岁月的痕迹'"
        expected: "运用比喻，将母亲的手比作锉刀，生动形象地写出母亲手的粗糙，表达对母亲辛劳的心疼"
        L1_typical_error: "能说出'比喻'但分析只写'写出了母亲很辛苦'"
      - question: "根据材料一（文字）和材料二（图表），概括我国新能源发展的两个特点"
        expected: "从文字和图表中各提取一个信息，综合概括"
        L1_typical_error: "只从一个材料中提取，忽略另一个"

  - id: L2
    name: 基本熟练
    description: 各类现代文阅读题型掌握，答题规范完整，得分率较高
    signals:
      - 记叙文六大题型（概括/赏析/含义/作用/人物/主题）都会答
      - 答题格式规范，要点齐全
      - 说明文和议论文的知识体系清晰
      - 非连续性文本能整合多个材料的信息
      - 能抓住关键词进行深层理解
      - 偶尔在"深层含义"和"开放性题"上丢分
    diagnostic_questions:
      - question: "文章结尾写道'那盏灯，一直亮着'，结合全文分析这句话的含义"
        expected: "表层义：灯一直亮着；深层义：象征亲人的爱/温暖/希望一直存在，点明文章主题"
        L2_response: "能分析表层和深层含义，答题规范"
      - question: "本文是如何运用对比手法来突出人物形象的？请举两个例子分析"
        expected: "找出文中两处对比，分别分析对比的双方和突出的效果"
        L2_response: "能找到并分析，偶尔第二个例子分析不够深入"
      - question: "议论文：第④段运用了什么论证方法？有什么作用？"
        expected: "举例论证/道理论证/对比论证/比喻论证+具体分析其证明的论点"
        L2_response: "判断准确，分析到位"

  - id: L3
    name: 熟练精通
    description: 现代文阅读接近满分，深层理解和开放性题目都能得高分
    signals:
      - 各类题型答题又快又准
      - 深层含义题和开放性题能从多角度深入分析
      - 语言赏析精准到位
      - 能准确把握作者写作意图和文章结构
      - 答题语言凝练有文采
    pass_standard: 现代文阅读板块22分中得19-22分

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 14, topic: 非连文本信息提取, score: 2 }
      - { year: 2024, qid: 14, topic: 说明文/非连文本选择, score: 2 }
      - { year: 2023, qid: 17, topic: 记叙文内容概括, score: 2 }
    should_struggle:
      - { year: 2025, qid: 18, topic: 记叙文句子赏析 }
      - { year: 2024, qid: 19, topic: 记叙文深层含义 }

  L2:
    must_solve:
      - { year: 2025, qid: 14-16, topic: 非连文本/说明文全部, score: 10 }
      - { year: 2025, qid: 17-19, topic: 记叙文前三题, score: 8 }
      - { year: 2024, qid: 14-16, topic: 非连文本/说明文全部, score: 10 }
      - { year: 2024, qid: 17-20, topic: 记叙文全部, score: 12 }
    should_struggle:
      - { year: 2025, qid: 20-21, topic: 记叙文深层分析和开放题 }

  L3:
    must_solve:
      - { year: 2025, qid: 14-21, topic: 现代文全部, score: 22 }
      - { year: 2024, qid: 14-21, topic: 现代文全部, score: 22 }
    pass_standard: 现代文阅读板块得分率85%以上

# ------ 各子模块细分诊断 ------
sub_modules:

  记叙文阅读:
    L0_signal: "读不懂文章主旨，不知道怎么答题"
    L1_signal: "能读懂但答题不规范、要点遗漏"
    L2_signal: "六大题型都会，答题规范完整"
    L3_signal: "深层理解和开放性题也能得高分"
    key_diagnostic: "阅读一篇800字散文，完成概括+赏析+含义三道题"

  说明文阅读:
    L0_signal: "说明方法和说明顺序完全不了解"
    L1_signal: "能说出说明方法名称但分析套话多"
    L2_signal: "说明方法/顺序/语言准确性分析到位"
    L3_signal: "秒解，分析精准"
    key_diagnostic: "辨析'举例子/列数字/作比较/打比方'并分析其效果"

  议论文阅读:
    L0_signal: "论点和论据分不清"
    L1_signal: "能找到中心论点但论证分析不清"
    L2_signal: "论证方法和论证思路分析准确"
    L3_signal: "能评价论证的严密性和逻辑性"
    key_diagnostic: "找出一篇议论文的中心论点，分析第③段的论证方法及作用"

  非连续性文本:
    L0_signal: "图表数据读不懂，不会整合信息"
    L1_signal: "能提取单一信息但不会跨材料整合"
    L2_signal: "能综合多个材料提取和整合信息"
    L3_signal: "信息整合快速准确，概括精练"
    key_diagnostic: "根据一段文字和一个柱状图，概括某现象的两个特点"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立阅读习惯和答题意识
    estimated_hours: 20-25
    key_tasks:
      - 每天读一篇600-800字的记叙文，练习一句话概括
      - 学习六大修辞手法及其"作用"答题模板
      - 学习四大说明方法的名称和基本效果
      - 议论文三要素（论点/论据/论证）基本概念
      - 每天做一道阅读理解题（从简单的开始）

  L1_to_L2:
    focus: 题型专项突破和答题规范化
    estimated_hours: 15-20
    key_tasks:
      - 记叙文六大题型逐个专项训练
      - 答题模板背诵和运用（手法+内容+情感/效果）
      - 说明文和议论文各做10篇真题
      - 非连续性文本信息整合训练
      - 每篇限时15分钟答题

  L2_to_L3:
    focus: 深层理解和精准表达
    estimated_hours: 10-12
    key_tasks:
      - 深层含义题和开放性题专项训练
      - 北京近5年中考现代文阅读真题限时精练
      - 高分答案赏析，学习精准表达
      - 限时训练（记叙文12分钟+说明/非连10分钟）
