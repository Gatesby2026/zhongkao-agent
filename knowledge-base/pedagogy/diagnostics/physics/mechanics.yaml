# ============================================================
# 诊断标准：力学（力/运动/压强/浮力/简单机械）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 说明：2026北京中考物理总分80分（2025及以前为70分）

module: 力学
subject: 物理
covers:
  - 力的概念（力的作用效果/力的三要素/力的示意图）
  - 运动和力（牛顿第一定律/二力平衡/惯性）
  - 压强（固体压强/液体压强/大气压强）
  - 浮力（阿基米德原理/物体浮沉条件）
  - 简单机械（杠杆/滑轮/功/功率/机械效率）
exam_weight: ★★★（分值最高的物理模块）
typical_score: 25-30分（单选4,6,9,11-12各2分 + 多选13×2分 + 实验19约6分 + 计算22约4分）
typical_questions: 单选5题(10分) + 多选1题(2分) + 实验探究1题(6分) + 计算1题(4分)

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 力学基本概念不清，公式记不住，受力分析完全不会
    signals:
      - 不理解力的作用是相互的
      - 分不清质量和重力
      - 不知道压强公式 p=F/S
      - 浮力概念模糊，不理解阿基米德原理
      - 杠杆平衡条件不会用
      - 受力分析画不出
    diagnostic_questions:
      - question: "一个人推墙，墙没动，墙对人有力吗？"
        expected: "有，力的作用是相互的，墙对人有反作用力"
        L0_typical_error: "认为墙没动所以墙不受力或墙没有力"
      - question: "一个物体放在水平桌面上静止不动，它受几个力？"
        expected: "两个力：重力和支持力，二力平衡"
        L0_typical_error: "只说重力，或说三个力（多了一个推力）"
      - question: "把一个物体放入水中，它沉下去了，它受浮力吗？"
        expected: "受浮力，只是重力大于浮力所以下沉"
        L0_typical_error: "认为沉下去就不受浮力"

  - id: L1
    name: 概念模糊
    description: 知道基本公式但不会灵活运用，简单计算能做但受力分析经常出错
    signals:
      - 知道 p=F/S 但不会分析变力或变面积的情况
      - 阿基米德原理公式知道但不会用（F浮=ρ液gV排）
      - 杠杆平衡条件能背但力臂画不对
      - 功和功率公式混淆
      - 机械效率的概念不清楚（有用功/总功分不清）
      - 惯性的理解有误（如认为速度大惯性大）
    diagnostic_questions:
      - question: "一个底面积为0.01m²、重20N的物体放在桌面上，对桌面的压强多大？"
        expected: "p=F/S=20/0.01=2000Pa"
        L1_typical_error: "公式对但单位换算出错，或把面积和力搞混"
      - question: "弹簧测力计挂着物体在空气中读数5N，浸没在水中读数3N，浮力多大？"
        expected: "F浮=G-F示=5-3=2N"
        L1_typical_error: "不知道用称重法求浮力，直接用阿基米德原理但缺少条件"
      - question: "匀速直线运动的物体，受到的合力是多少？"
        expected: "合力为零（二力平衡）"
        L1_typical_error: "认为匀速运动需要力来维持，合力不为零"
      - question: "如图，杠杆平衡，画出力F的力臂"
        expected: "从支点到力F的作用线的垂直距离"
        L1_typical_error: "画成从支点到力的作用点的连线（不是垂直距离）"

  - id: L2
    name: 基本熟练
    description: 基础力学题正确率高，中档题基本掌握，但压强浮力综合题和机械效率计算有困难
    signals:
      - 受力分析规范，常见情境能正确画力的示意图
      - 压强计算准确，液体压强 p=ρgh 运用熟练
      - 浮力计算的四种方法（称重法/阿基米德原理/平衡法/公式法）基本掌握
      - 简单机械的基础计算正确
      - 压强浮力综合题（如柱体切割/液面变化）有困难
      - 机械效率的变化分析（如斜面角度变化）不够熟练
    diagnostic_questions:
      - question: "底面积为S的圆柱形容器中，水深h，水的密度ρ。求水对容器底的压强和压力"
        expected: "p=ρgh, F=pS=ρghS"
        L2_response: "正确求解"
      - question: "用滑轮组将重600N的物体匀速提升2m，拉力200N，绳子自由端移动6m。求有用功、总功和机械效率"
        expected: "W有用=Gh=600×2=1200J, W总=Fs=200×6=1200J... 等等，W总=Fs=200×6=1200J，效率=100%？检查：应为W总=Fs=200×6=1200J，η=W有用/W总=1200/1200=100%——说明题目条件有问题或摩擦为零"
        L2_response: "能正确列式计算，但对结果的合理性判断可能不到位"
      - question: "一个物体漂浮在水面上，露出水面体积占总体积的1/4，求物体密度"
        expected: "漂浮时F浮=G，ρ水gV排=ρ物gV物，V排=3/4·V物，ρ物=3/4·ρ水=750kg/m³"
        L2_response: "正确求解"

  - id: L3
    name: 熟练精通
    description: 力学所有题型准确快速，压强浮力综合题和机械效率变化分析都能搞定
    signals:
      - 选择题秒解，多选题不丢分
      - 压强浮力综合题（柱体切割/液面升降/密度判断）熟练
      - 机械效率变化分析清晰
      - 力学计算题步骤规范，4分满分
      - 力学实验探究题（如探究杠杆平衡条件）满分
    pass_standard: 力学相关题目（约25-30分）得分率90%以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 4, topic: 力的概念基础, score: 2 }
      - { year: 2024, qid: 4, topic: 运动和力基础, score: 2 }
      - { year: 2023, qid: 6, topic: 简单机械基础, score: 2 }
    should_struggle:
      - { year: 2025, qid: 11, topic: 压强浮力综合选择 }
      - { year: 2024, qid: 22, topic: 力学计算 }

  L2:
    must_solve:
      - { year: 2025, qid: 6, topic: 压强基础, score: 2 }
      - { year: 2025, qid: 9, topic: 浮力判断, score: 2 }
      - { year: 2024, qid: 9, topic: 杠杆平衡, score: 2 }
      - { year: 2025, qid: 13, topic: 力学多选, score: 2 }
      - { year: 2025, qid: 19, topic: 力学实验探究, score: 6 }
    should_struggle:
      - { year: 2025, qid: 11, topic: 压强浮力综合选择（压轴单选） }
      - { year: 2025, qid: 12, topic: 机械效率综合（压轴单选） }

  L3:
    must_solve:
      - { year: 2025, qid: 11, topic: 压强浮力综合, score: 2 }
      - { year: 2025, qid: 12, topic: 力学压轴单选, score: 2 }
      - { year: 2025, qid: 22, topic: 力学计算, score: 4 }
      - { year: 2024, qid: 11, topic: 压强综合, score: 2 }
      - { year: 2024, qid: 12, topic: 力学压轴单选, score: 2 }
    pass_standard: 力学部分25-30分中拿到23分以上

# ------ 各子模块细分诊断 ------
sub_modules:

  力与运动:
    L0_signal: "不理解力的作用是相互的"
    L1_signal: "惯性理解有误，二力平衡条件不清"
    L2_signal: "受力分析规范，牛顿第一定律运用准确"
    L3_signal: "复杂情境中的受力分析又快又准"
    key_diagnostic: "汽车急刹车时人为什么会向前倾？"

  压强:
    L0_signal: "压强公式不会用"
    L1_signal: "固体压强会算但液体压强p=ρgh不熟"
    L2_signal: "固液气三种压强计算都会"
    L3_signal: "压强变化分析题（切割/叠放/液面变化）熟练"
    key_diagnostic: "正方体切去一半后对桌面压强如何变化？分竖切和横切两种情况"

  浮力:
    L0_signal: "不理解浮力产生的原因"
    L1_signal: "阿基米德原理公式知道但V排搞不清"
    L2_signal: "四种求浮力方法掌握，浮沉条件清楚"
    L3_signal: "压强浮力综合题（如物体放入后液面变化/压强变化）熟练"
    key_diagnostic: "冰块漂浮在水面上，冰完全融化后液面升高、降低还是不变？"

  简单机械:
    L0_signal: "杠杆平衡条件不会用"
    L1_signal: "力臂画不对，功和功率公式混淆"
    L2_signal: "基础计算正确，但机械效率变化分析有困难"
    L3_signal: "滑轮组绕线/机械效率/功率综合计算满分"
    key_diagnostic: "用同一个滑轮组提升不同重物，机械效率如何变化？为什么？"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立力学基本概念和公式体系
    estimated_hours: 15-18
    key_tasks:
      - 力的概念：画20个力的示意图，理解力的三要素
      - 运动和力：牛顿第一定律+惯性+二力平衡，做课本全部例题
      - 压强：p=F/S + p=ρgh，各做10题
      - 浮力：阿基米德原理专项，从称重法入手
      - 简单机械：杠杆平衡条件+力臂画法，每天练5题

  L1_to_L2:
    focus: 公式灵活运用 + 中档题突破
    estimated_hours: 12-15
    key_tasks:
      - 受力分析专项训练（各种情境画受力图）
      - 压强变化分析题（切割/叠放/加水）20题
      - 浮力四种方法对比训练
      - 机械效率计算专项（滑轮组/斜面）
      - 力学计算题步骤规范训练

  L2_to_L3:
    focus: 综合题和压轴选择攻坚
    estimated_hours: 10-15
    key_tasks:
      - 压强浮力综合题专项（柱体问题/液面变化问题）
      - 单选压轴题（第11-12题）限时训练
      - 多选题精选训练（力学多选不丢分策略）
      - 海淀西城一模二模力学压轴题精练
