# ============================================================
# 诊断标准：声光热（声学 + 光学 + 热学）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 说明：2026北京中考物理总分80分（2025及以前为70分）

module: 声光热
subject: 物理
covers:
  - 声现象（声音的产生/传播/特性/噪声）
  - 光现象（光的直线传播/反射/折射）
  - 透镜（凸透镜成像规律/近视远视矫正）
  - 物态变化（六种物态变化/吸放热/熔化凝固曲线）
  - 内能与热量（比热容/热量计算 Q=cmΔt）
exam_weight: ★★（基础分，丢分不应该）
typical_score: 10-12分（单选第1-3题各2分 + 单选第7题2分 + 实验探究可能涉及2-4分）
typical_questions: 单选1-3题（声光热各一题）+ 单选7题（热学计算或物态变化）

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 声光热基本概念混乱，物态变化分不清，光路图完全不会画
    signals:
      - 不知道声音是由振动产生的
      - 光的反射和折射分不清
      - 六种物态变化记不住（如汽化和液化搞混）
      - 不理解比热容的含义
      - 凸透镜和凹透镜分不清
    diagnostic_questions:
      - question: "真空中能传声吗？"
        expected: "不能，声音传播需要介质"
        L0_typical_error: "认为真空也能传声，或不知道什么是介质"
      - question: "筷子插入水中看起来向上弯折，这是什么现象？"
        expected: "光的折射"
        L0_typical_error: "说成光的反射或光的直线传播"
      - question: "冬天嘴里哈出的'白气'是什么物态变化？"
        expected: "液化（水蒸气遇冷液化成小水滴）"
        L0_typical_error: "说成汽化或升华"

  - id: L1
    name: 概念模糊
    description: 知道基本概念但容易混淆，简单题能做但稍变化就错
    signals:
      - 声音三特性（音调/响度/音色）容易混淆
      - 光的反射定律能背但画图时法线位置画错
      - 凸透镜成像规律记不全，u=2f和u=f的分界点搞混
      - 物态变化能说出名称但吸热放热判断不准
      - Q=cmΔt 公式知道但Δt经常算错（用错初末温度）
    diagnostic_questions:
      - question: "用大小不同的力敲同一个鼓，改变的是声音的什么？"
        expected: "响度（振幅变化影响响度）"
        L1_typical_error: "答成音调（混淆音调和响度）"
      - question: "物体放在凸透镜前15cm处，焦距为10cm，成什么像？"
        expected: "u>2f（15>20不对，15>10但15<20），f<u<2f，成倒立放大实像"
        L1_typical_error: "u和f的大小关系判断正确但成像特点记混"
      - question: "质量相同的水和食用油吸收相同热量，谁温度升高多？"
        expected: "食用油（比热容小，温度变化大）"
        L1_typical_error: "选水，因为觉得水的比热容大所以温度升高多"

  - id: L2
    name: 基本熟练
    description: 基础题稳拿分，中档题基本正确，但综合分析题有困难
    signals:
      - 声光热基础选择题正确率90%以上
      - 凸透镜成像规律掌握牢固，能解释照相机/投影仪/放大镜
      - Q=cmΔt 计算准确
      - 熔化凝固曲线能正确读图
      - 光路图画得规范（法线/角度/箭头）
      - 综合题（如光现象+透镜结合）偶尔出错
    diagnostic_questions:
      - question: "画出光从空气斜射入水中的折射光路图，并标注入射角和折射角"
        expected: "画出法线，入射角>折射角，光线向法线偏折"
        L2_response: "正确画出，角度关系正确"
      - question: "0℃的冰和0℃的水有什么区别？"
        expected: "状态不同（固/液），0℃的冰需要继续吸热才能变成0℃的水"
        L2_response: "能准确回答，理解熔化吸热但温度不变"
      - question: "用100℃的水蒸气和100℃的水烫伤哪个更严重？为什么？"
        expected: "水蒸气更严重，因为液化时还要额外放出热量"
        L2_response: "正确回答并能用物态变化解释"

  - id: L3
    name: 熟练精通
    description: 声光热满分水平，各类题型秒解，能综合运用解释实际现象
    signals:
      - 选择题30秒内完成且正确
      - 能用物理知识解释日常生活中的声光热现象
      - 实验探究题中涉及声光热的部分满分
      - 综合性选择题（如第7题涉及热量计算+图象分析）准确
    pass_standard: 声光热相关题目（约10-12分）得分率95%以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 1, topic: 声现象基础, score: 2 }
      - { year: 2024, qid: 2, topic: 光现象辨析, score: 2 }
      - { year: 2023, qid: 1, topic: 声音特性判断, score: 2 }
    should_struggle:
      - { year: 2024, qid: 7, topic: 热量计算与图象, score: 2 }

  L2:
    must_solve:
      - { year: 2025, qid: 2, topic: 光的折射现象, score: 2 }
      - { year: 2025, qid: 3, topic: 物态变化判断, score: 2 }
      - { year: 2025, qid: 7, topic: 比热容与热量计算, score: 2 }
      - { year: 2024, qid: 1, topic: 声现象, score: 2 }
      - { year: 2024, qid: 3, topic: 物态变化, score: 2 }

  L3:
    must_solve:
      - { year: 2025, qid: 1-3, topic: 声光热基础选择, score: 6, note: 全对且速度快 }
      - { year: 2025, qid: 7, topic: 热学综合, score: 2 }
      - { year: 2024, qid: 7, topic: 热学综合, score: 2 }
    pass_standard: 声光热相关题目满分

# ------ 各子模块细分诊断 ------
sub_modules:

  声学:
    L0_signal: "不知道声音产生的原因"
    L1_signal: "音调/响度/音色三特性混淆"
    L2_signal: "基础题全对，能区分超声波/次声波应用"
    L3_signal: "秒解，能分析实际场景中的声学问题"
    key_diagnostic: "吉他弦越细越紧，音调越高还是越低？为什么？"

  光学:
    L0_signal: "反射和折射分不清"
    L1_signal: "反射定律知道但光路图画不规范"
    L2_signal: "光路图规范，凸透镜成像规律熟练"
    L3_signal: "能综合分析多种光现象，实验设计能力强"
    key_diagnostic: "画出凸透镜成像光路图：当物距等于1.5倍焦距时"

  热学:
    L0_signal: "六种物态变化记不住"
    L1_signal: "物态变化会判断但吸热放热搞混"
    L2_signal: "Q=cmΔt计算准确，熔化曲线读图正确"
    L3_signal: "热量计算综合题（含图象分析）满分"
    key_diagnostic: "2kg的水从20℃加热到70℃，需要吸收多少热量？[c水=4.2×10³J/(kg·℃)]"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立声光热基本概念
    estimated_hours: 8-10
    key_tasks:
      - 声学：背诵声音产生/传播/三特性，做课本练习
      - 光学：画10组反射/折射光路图，记住反射定律
      - 热学：制作物态变化表格（六种变化+吸放热），每天默写

  L1_to_L2:
    focus: 消除易混淆点 + 凸透镜成像规律
    estimated_hours: 8-10
    key_tasks:
      - 凸透镜成像规律口诀记忆 + 20题专练
      - Q=cmΔt 计算专项（注意Δt的正确算法）
      - 物态变化生活实例配对（如霜→凝华→放热）

  L2_to_L3:
    focus: 综合题与实验题提速
    estimated_hours: 5-8
    key_tasks:
      - 限时训练：4道声光热选择题限时4分钟
      - 热学综合计算题（含图象分析）专项
      - 近5年真题声光热部分全刷
