# ============================================================
# 诊断标准：计算题专项（力学计算 + 电学计算）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 说明：2026北京中考物理总分80分（2025及以前为70分）
# 重点：计算题共2题8分，关注公式选用和步骤规范，是易得分也易丢分的题型

module: 计算题
subject: 物理
covers:
  - 力学计算（压强/浮力/功/功率/机械效率）
  - 电学计算（欧姆定律/电功率/电功/焦耳定律）
  - 解题规范（已知/求/解/答、公式代入、单位统一）
  - 综合计算（多步骤推理、两种工作状态对比）
exam_weight: ★★（分值不高但步骤分好拿）
typical_score: 8分（第22题力学计算4分 + 第23题电学计算4分）
typical_questions: |
  第22题(4分)：力学计算——通常考压强/浮力/功率/机械效率，2-3小问
  第23题(4分)：电学计算——通常考欧姆定律+电功率，含两种工作状态，2-3小问

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 物理公式记不住，不知道计算题应该怎么写步骤
    signals:
      - 基本公式记不住（如 p=F/S, P=W/t, P=UI）
      - 不知道物理计算题的解题格式（已知/求/解）
      - 单位不会换算（如cm²→m², mA→A）
      - 看到计算题直接放弃
    diagnostic_questions:
      - question: "写出压强的计算公式，并说明各物理量的含义和单位"
        expected: "p=F/S, p是压强(Pa), F是压力(N), S是受力面积(m²)"
        L0_typical_error: "写不出公式，或写出来但单位全错"
      - question: "一个电阻两端电压为6V，通过的电流为0.3A，电阻多大？"
        expected: "R=U/I=6V/0.3A=20Ω"
        L0_typical_error: "不知道用什么公式，或公式变形出错"
      - question: "100cm² = ___m²"
        expected: "0.01m²（100×10⁻⁴=0.01）"
        L0_typical_error: "写成1m²或0.1m²，面积单位换算出错"

  - id: L1
    name: 概念模糊
    description: 基本公式知道但选用不当，单步计算能做但多步推理链断裂
    signals:
      - 公式记住了但遇到具体题目不知道选哪个公式
      - 单步计算正确但两步以上的推理做不下去
      - 解题格式不规范（缺少公式、直接写数字、没有单位）
      - 力学和电学的公式混用
      - 不会从题目信息中提取已知量
    diagnostic_questions:
      - question: "一个物体重100N，底面积0.02m²，放在水平桌面上。求对桌面的压强"
        expected: "解：F=G=100N, S=0.02m², p=F/S=100/0.02=5000Pa"
        L1_typical_error: "公式对但格式不规范（没写F=G这一步），或计算出错"
      - question: "灯泡标有'6V 3W'，求灯泡正常工作时的电流和电阻"
        expected: "I=P/U=3/6=0.5A, R=U/I=6/0.5=12Ω（或R=U²/P=36/3=12Ω）"
        L1_typical_error: "第一问做对但第二问不知道用什么公式"
      - question: "用200N的力将500N的物体沿斜面匀速推上3m高的斜面（斜面长5m），求有用功和机械效率"
        expected: "W有用=Gh=500×3=1500J, W总=Fs=200×5=1000J...数据不对，检查题目合理性"
        L1_typical_error: "分不清有用功和总功的定义"

  - id: L2
    name: 基本熟练
    description: 基础计算题能拿满分，但综合计算题（含多种状态对比）有困难
    signals:
      - 单一公式计算准确，步骤规范
      - 力学计算：压强/浮力/功率/机械效率的单独计算都会
      - 电学计算：欧姆定律+电功率的基础计算准确
      - 解题格式基本规范（有公式、有代入、有单位）
      - 两种工作状态的对比计算（如滑动变阻器不同位置）有困难
      - 综合计算（如先求电阻再求功率再求电能）链条长时容易出错
      - 第二小问或第三小问容易丢分
    diagnostic_questions:
      - question: |
          一个底面积为0.05m²的柱形容器中装有水，水深0.2m。
          (1) 求水对容器底的压强
          (2) 求水对容器底的压力
        expected: |
          (1) p=ρgh=1000×10×0.2=2000Pa
          (2) F=pS=2000×0.05=100N
        L2_response: "正确求解，步骤规范"
      - question: |
          灯泡L标有"6V 3W"，与滑动变阻器R串联在9V电源上。
          (1) 灯泡正常发光时电流
          (2) 此时变阻器R的阻值
          (3) 变阻器R消耗的电功率
        expected: |
          (1) I=P额/U额=3/6=0.5A
          (2) U_R=U总-U_L=9-6=3V, R=U_R/I=3/0.5=6Ω
          (3) P_R=U_R×I=3×0.5=1.5W
        L2_response: "前两问正确，第三问可能忘记或计算出错"

  - id: L3
    name: 熟练精通
    description: 所有计算题满分，步骤规范、公式选用精准、计算无误
    signals:
      - 力学和电学计算题均能在5分钟内完成且满分
      - 两种工作状态的对比计算清晰准确
      - 综合计算（多步推理链）不断链
      - 解题步骤规范，每步都有公式、代入、单位
      - 能判断计算结果的合理性
    pass_standard: 计算题8分中拿到8分

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 22, topic: 力学计算第1问, score: 1 }
      - { year: 2025, qid: 23, topic: 电学计算第1问, score: 1 }
      - { year: 2024, qid: 22, topic: 力学计算第1问, score: 1 }
    should_struggle:
      - { year: 2025, qid: 22, topic: 力学计算第2-3问 }
      - { year: 2025, qid: 23, topic: 电学计算第2-3问 }

  L2:
    must_solve:
      - { year: 2025, qid: 22, topic: 力学计算, score: 4, note: 前两问必对 }
      - { year: 2025, qid: 23, topic: 电学计算, score: 4, note: 前两问必对 }
      - { year: 2024, qid: 22, topic: 力学计算, score: 4 }
      - { year: 2024, qid: 23, topic: 电学计算, score: 4 }
    should_struggle:
      - { year: 2025, qid: 23, topic: 电学计算第3问（两种状态对比） }

  L3:
    must_solve:
      - { year: 2025, qid: 22, topic: 力学计算满分, score: 4 }
      - { year: 2025, qid: 23, topic: 电学计算满分, score: 4 }
      - { year: 2024, qid: 22, topic: 力学计算满分, score: 4 }
      - { year: 2024, qid: 23, topic: 电学计算满分, score: 4 }
      - { year: 2023, qid: 22, topic: 力学计算满分, score: 4 }
    pass_standard: 计算题8分满分，且解题时间不超过10分钟

# ------ 各子模块细分诊断 ------
sub_modules:

  力学计算:
    L0_signal: "压强/浮力/功率公式记不住"
    L1_signal: "单步计算会但有用功总功分不清"
    L2_signal: "基础力学计算满分"
    L3_signal: "综合力学计算（压强+浮力+密度联合）满分"
    key_diagnostic: |
      一个底面积为100cm²、质量为2kg的圆柱体，竖直放在面积为1m²的水平桌面上。
      (1)求圆柱体对桌面的压力 (2)求圆柱体对桌面的压强
    typical_errors:
      - "用桌面面积而不是圆柱体底面积来算压强"
      - "面积单位没有换算成m²"
      - "压力直接用质量，忘记F=G=mg"

  电学计算:
    L0_signal: "P=UI不会变形使用"
    L1_signal: "单步计算对但多步推理断链"
    L2_signal: "基础电学计算满分"
    L3_signal: "两种工作状态对比计算准确"
    key_diagnostic: |
      如图电路，电源电压9V不变，R₁=10Ω，滑动变阻器R₂最大阻值20Ω。
      (1)当R₂=20Ω时，求电路中电流
      (2)当R₂调到某值时电流表示数0.5A，求此时R₂的阻值和R₂消耗的电功率
    typical_errors:
      - "串联电路总电阻等于各电阻之和这一步漏掉"
      - "求R₂时用总电压除以总电流再减R₁，推理链出错"
      - "电功率用P=UI但不知道U是R₂两端的分压"

  解题规范:
    L0_signal: "直接写数字，没有公式和单位"
    L1_signal: "有公式但代入过程省略"
    L2_signal: "步骤基本规范"
    L3_signal: "每步公式+代入+计算+单位，书写整洁"
    key_diagnostic: "看学生的计算题答题过程，检查是否每步都有公式、代入、结果和单位"
    grading_notes:
      - "北京中考计算题按步骤给分，公式1分+代入1分+结果1分"
      - "即使最终结果错误，前面步骤正确仍可得步骤分"
      - "没有公式直接写结果，即使对了也只给1分"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 背熟公式 + 学会解题格式
    estimated_hours: 8-10
    key_tasks:
      - 公式卡片：制作20张物理公式卡，每天默写
      - 解题格式训练：每道题严格按"已知→公式→代入→计算→单位→答"写
      - 单位换算专项（cm→m, cm²→m², g→kg, mA→A）
      - 单步计算练习：每种公式做5题

  L1_to_L2:
    focus: 公式选用策略 + 两步计算
    estimated_hours: 6-8
    key_tasks:
      - 力学计算：压强→压力→面积的关联计算
      - 电学计算：串联分压→求各电阻功率
      - 有用功/总功/机械效率的定义辨析+计算
      - 近5年真题第22、23题逐题精练

  L2_to_L3:
    focus: 综合计算 + 限时训练 + 步骤满分
    estimated_hours: 5-8
    key_tasks:
      - 两种状态对比计算专项（滑动变阻器两个位置）
      - 限时训练：每题5分钟，力学+电学各一题
      - 步骤规范自查清单（对照评分标准检查自己的答题）
      - 海淀西城一模二模计算题精练
