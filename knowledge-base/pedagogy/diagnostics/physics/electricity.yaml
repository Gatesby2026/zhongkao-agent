# ============================================================
# 诊断标准：电学（电路/欧姆定律/电功率/电磁）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 说明：2026北京中考物理总分80分（2025及以前为70分）

module: 电学
subject: 物理
covers:
  - 电流和电路（串并联/电流表电压表/电路图）
  - 欧姆定律（I=U/R/串并联电路特点）
  - 电功率（P=UI/额定功率/电能表/焦耳定律）
  - 电与磁（磁场/电磁感应/电动机/发电机）
  - 安全用电（家庭电路/触电/短路）
exam_weight: ★★★（与力学并列最高分值模块）
typical_score: 25-30分（单选5,8,10各2分 + 多选14-15各2分 + 实验18,20各约6分 + 计算23约4分）
typical_questions: 单选3题(6分) + 多选2题(4分) + 实验探究2题(12分) + 计算1题(4分)

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 电路基本概念不清，电路图看不懂，串并联分不清
    signals:
      - 看不懂电路图（不认识电路元件符号）
      - 串联和并联分不清
      - 不知道电流表和电压表的接法
      - 欧姆定律公式不会用
      - 不理解短路和断路的区别
    diagnostic_questions:
      - question: "电流表应该串联还是并联在电路中？"
        expected: "串联"
        L0_typical_error: "说并联，或不知道什么是串联并联"
      - question: "两个灯泡串联，一个灯泡坏了，另一个还亮吗？"
        expected: "不亮，串联电路一处断路全部不工作"
        L0_typical_error: "认为另一个还亮"
      - question: "导体的电阻与什么因素有关？"
        expected: "材料、长度、横截面积和温度"
        L0_typical_error: "说与电压或电流有关"

  - id: L1
    name: 概念模糊
    description: 能画简单电路图，知道欧姆定律但不会分析复杂电路
    signals:
      - 串并联电路的电流电压规律记混
      - 欧姆定律 I=U/R 能用但遇到串并联混合电路就不会
      - 电功率公式知道但 P=UI, P=I²R, P=U²/R 选用不当
      - 电磁感应和电动机原理搞混
      - 滑动变阻器的作用不理解
      - 实物图连线经常出错
    diagnostic_questions:
      - question: "串联电路中各处电流的关系是什么？"
        expected: "处处相等：I=I₁=I₂"
        L1_typical_error: "说成电流分配，与并联搞混"
      - question: "一个灯泡额定电压6V，额定功率3W，正常工作时电流多大？"
        expected: "I=P/U=3/6=0.5A"
        L1_typical_error: "公式选对但计算出错，或不知道'额定'的含义"
      - question: "闭合电路的一部分导体在磁场中做切割磁感线运动，这是什么现象？"
        expected: "电磁感应（发电机原理）"
        L1_typical_error: "说成电动机原理（搞混了电磁感应和通电导体在磁场中受力）"
      - question: "如图所示电路，当滑片P向右移动时，电流表和电压表读数如何变化？"
        expected: "需要分析滑动变阻器接入电路部分的阻值变化"
        L1_typical_error: "滑片移动方向与阻值变化关系判断错误"

  - id: L2
    name: 基本熟练
    description: 电学基础题和中档题正确率高，但动态电路分析和电功率综合计算有困难
    signals:
      - 电路图画得规范，实物图连线正确
      - 欧姆定律和电功率基础计算准确
      - 串并联电路的电流电压分配规律掌握
      - 实验探究题（如探究欧姆定律）基本会做
      - 动态电路分析（滑动变阻器变化引起的电流电压变化）偶尔出错
      - 电功率综合计算（含多个工作状态）有困难
      - 多选题中电学部分容易多选或漏选
    diagnostic_questions:
      - question: "电阻R₁=10Ω和R₂=20Ω串联，总电压6V，求各电阻两端电压"
        expected: "I=U/(R₁+R₂)=6/30=0.2A, U₁=IR₁=2V, U₂=IR₂=4V"
        L2_response: "正确求解"
      - question: "灯泡L标有'6V 3W'，与一个滑动变阻器串联在9V电源上，灯泡正常发光时变阻器阻值多大？"
        expected: "灯泡正常发光：I=P/U=3/6=0.5A, U变=9-6=3V, R变=U变/I=3/0.5=6Ω"
        L2_response: "正确求解"
      - question: "如图，R₁与R₂并联，滑动变阻器R₂增大时，电流表A、电压表V读数如何变化？"
        expected: "需要分析总电阻变化→总电流变化→分压变化→各支路变化"
        L2_typical_difficulty: "动态分析链条中某一步推理出错"

  - id: L3
    name: 熟练精通
    description: 电学满分水平，动态电路分析和电功率综合计算都能搞定
    signals:
      - 选择题（含多选）全对
      - 动态电路分析又快又准
      - 电功率综合计算（最大/最小功率、两种工作状态）满分
      - 电学实验探究题满分（含实验改进和误差分析）
      - 电学计算题步骤规范，4分满分
    pass_standard: 电学相关题目（约25-30分）得分率90%以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 5, topic: 电与磁基础, score: 2 }
      - { year: 2024, qid: 5, topic: 电路基础, score: 2 }
      - { year: 2023, qid: 5, topic: 安全用电, score: 2 }
    should_struggle:
      - { year: 2025, qid: 10, topic: 动态电路分析 }
      - { year: 2025, qid: 23, topic: 电学计算 }

  L2:
    must_solve:
      - { year: 2025, qid: 8, topic: 电功率基础, score: 2 }
      - { year: 2025, qid: 14, topic: 电学多选, score: 2 }
      - { year: 2025, qid: 18, topic: 电学实验探究, score: 6 }
      - { year: 2024, qid: 8, topic: 欧姆定律应用, score: 2 }
      - { year: 2024, qid: 18, topic: 电学实验, score: 6 }
    should_struggle:
      - { year: 2025, qid: 10, topic: 动态电路分析（压轴选择） }
      - { year: 2025, qid: 15, topic: 电功率多选 }
      - { year: 2025, qid: 23, topic: 电学计算（含两种工作状态） }

  L3:
    must_solve:
      - { year: 2025, qid: 10, topic: 动态电路, score: 2 }
      - { year: 2025, qid: 15, topic: 电功率多选, score: 2 }
      - { year: 2025, qid: 20, topic: 电学综合实验, score: 6 }
      - { year: 2025, qid: 23, topic: 电学计算, score: 4 }
      - { year: 2024, qid: 10, topic: 动态电路, score: 2 }
    pass_standard: 电学部分25-30分中拿到23分以上

# ------ 各子模块细分诊断 ------
sub_modules:

  电路基础:
    L0_signal: "串并联分不清，电路元件符号不认识"
    L1_signal: "能画简单电路图但实物图连线出错"
    L2_signal: "电路图和实物图互画准确"
    L3_signal: "复杂电路快速识别串并联关系"
    key_diagnostic: "画出两灯并联、电流表测干路电流、电压表测L1两端电压的电路图"

  欧姆定律:
    L0_signal: "I=U/R不会用"
    L1_signal: "简单计算会但串并联电路分析不会"
    L2_signal: "串并联电路计算准确"
    L3_signal: "动态电路分析（变阻器变化→电流电压变化）秒解"
    key_diagnostic: "R₁和R₂并联，R₁=10Ω，总电流0.6A，通过R₁电流0.4A，求R₂"

  电功率:
    L0_signal: "不知道P=UI"
    L1_signal: "基础公式会但额定功率和实际功率分不清"
    L2_signal: "基础电功率计算准确"
    L3_signal: "综合计算（两种状态/最大最小功率/电能表读数）满分"
    key_diagnostic: "灯泡'220V 100W'接在110V电路中，实际功率多大？"

  电与磁:
    L0_signal: "不知道电磁感应和电动机的区别"
    L1_signal: "原理知道但判断力/电流方向不会"
    L2_signal: "基础题全对"
    L3_signal: "电磁综合应用题准确"
    key_diagnostic: "发电机和电动机分别利用了什么原理？能量转化有什么不同？"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立电路基本概念，学会读电路图
    estimated_hours: 15-18
    key_tasks:
      - 电路元件符号默写（每天5个）
      - 串并联电路画图20组
      - 欧姆定律 I=U/R 基础计算30题
      - 电流表电压表的使用方法（量程/分度值/读数）

  L1_to_L2:
    focus: 串并联电路规律 + 电功率计算
    estimated_hours: 12-15
    key_tasks:
      - 串联电路：等电流分电压 → 专项20题
      - 并联电路：等电压分电流 → 专项20题
      - 电功率三公式选用策略训练
      - 实物图连线专项训练（按电路图连实物）

  L2_to_L3:
    focus: 动态电路 + 电功率综合计算
    estimated_hours: 10-15
    key_tasks:
      - 动态电路分析专项（滑动变阻器变化→推理链）20题
      - 电功率综合计算（两种工作状态/最大最小功率）15题
      - 电学多选题精选训练
      - 近5年真题电学部分全刷
