# ============================================================
# 诊断标准：实验探究专项
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 说明：2026北京中考物理总分80分（2025及以前为70分）
# 重点：实验探究是物理最高分值题型（5题共28分），必须重点突破

module: 实验探究
subject: 物理
covers:
  - 基础测量实验（密度/速度/电阻/电功率测量）
  - 探究性实验（控制变量法/实验方案设计）
  - 数据处理（表格/图象/计算/有效数字）
  - 误差分析（系统误差/偶然误差/改进方案）
  - 实验评价与改进（方案优化/安全注意事项）
exam_weight: ★★★★（全卷最高分值题型）
typical_score: 28分（5道实验探究题，16-20题）
typical_questions: |
  第16题(4分)：基础测量（如温度计/天平/量筒读数）
  第17题(4分)：光学或声学实验
  第18题(6分)：电学实验（如探究欧姆定律/测电阻/测电功率）
  第19题(6分)：力学实验（如探究杠杆平衡/测密度/探究浮力）
  第20题(8分)：综合探究（实验设计+数据分析+结论+评价改进）

# ------ 水平分级 ------
levels:

  - id: L0
    name: 零基础/严重薄弱
    description: 不知道什么是控制变量法，实验器材不认识，数据处理完全不会
    signals:
      - 不认识基本实验器材（天平/量筒/弹簧测力计/电流表/电压表）
      - 不理解控制变量法的含义
      - 不会读基本仪器的刻度（如温度计/量筒）
      - 不知道实验数据应该如何记录（表格设计）
      - 实验步骤写不出来
    diagnostic_questions:
      - question: "量筒读数时视线应该怎么放？"
        expected: "视线应与凹液面最低处相平"
        L0_typical_error: "不知道要看凹液面，或视线俯视/仰视"
      - question: "天平使用前应该做什么？"
        expected: "放在水平台上，游码归零，调节平衡螺母使天平平衡"
        L0_typical_error: "完全不知道天平的使用步骤"
      - question: "探究水的沸腾实验中，为什么要用酒精灯的外焰加热？"
        expected: "外焰温度最高，加热效率高"
        L0_typical_error: "不知道酒精灯火焰分层，或说用内焰"

  - id: L1
    name: 概念模糊
    description: 认识基本器材，知道控制变量法但运用不熟，数据处理经常出错
    signals:
      - 仪器读数基本正确但精度不够（忘记估读）
      - 知道控制变量法但实验设计中遗漏需控制的变量
      - 数据记录不规范（没有单位/有效数字不对）
      - 能填实验表格但不会从数据中得出结论
      - 实验操作步骤知道大概但顺序有误
      - 不会分析实验误差的来源
    diagnostic_questions:
      - question: "探究'压力的作用效果与哪些因素有关'，需要控制哪些变量？"
        expected: "研究压力影响时控制受力面积不变；研究受力面积影响时控制压力不变"
        L1_typical_error: "知道要控制变量但说不清具体控制哪个"
      - question: "用电压表和电流表测灯泡电阻，测了三次数据不同，为什么？"
        expected: "灯泡电阻随温度变化（灯丝是金属，温度越高电阻越大），不是实验误差"
        L1_typical_error: "认为是实验误差，要求平均"
      - question: "用弹簧测力计测量前需要做什么？"
        expected: "观察量程和分度值，校零"
        L1_typical_error: "知道校零但忘记看量程"

  - id: L2
    name: 基本熟练
    description: 常见实验能完整做出，数据处理基本正确，但实验改进和评价能力不足
    signals:
      - 8大必考实验的步骤和原理掌握
      - 控制变量法运用基本正确
      - 仪器读数规范（含估读）
      - 能从数据中得出正确结论
      - 实验方案设计基本完整
      - 误差分析只会说"操作不当"，不能指出具体来源
      - 实验改进方案写不好（如减小摩擦/提高精度的具体方法）
      - 第20题（综合探究）后两问有困难
    diagnostic_questions:
      - question: "测量小灯泡电功率的实验中，闭合开关灯不亮，电压表有示数，电流表无示数，原因是什么？"
        expected: "灯泡断路（开路），电压表测的是电源电压"
        L2_response: "能正确分析电路故障"
      - question: "探究杠杆平衡条件的实验中，为什么要让杠杆在水平位置平衡？"
        expected: "方便直接从杠杆上读出力臂长度（力臂就是支点到力的作用点的距离）"
        L2_response: "正确回答"
      - question: "某同学测量一个物体的密度，先测体积再测质量，这样做的误差是什么？"
        expected: "从水中取出物体时会沾水，导致测得质量偏大，密度偏大"
        L2_typical_difficulty: "能判断偏大偏小但原因分析不完整"

  - id: L3
    name: 熟练精通
    description: 实验题满分水平，实验设计/数据分析/误差分析/改进方案全面
    signals:
      - 所有必考实验原理和步骤烂熟于心
      - 实验故障分析准确（断路/短路/接触不良）
      - 误差分析能指出具体原因和影响方向（偏大/偏小）
      - 实验改进方案具体可操作
      - 第20题综合探究满分
      - 陌生实验情境也能用科学方法分析
    pass_standard: 实验探究28分中拿到25分以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 16, topic: 基础测量读数, score: 4 }
      - { year: 2024, qid: 16, topic: 基础测量, score: 4 }
    should_struggle:
      - { year: 2025, qid: 18, topic: 电学实验 }
      - { year: 2025, qid: 19, topic: 力学实验 }

  L2:
    must_solve:
      - { year: 2025, qid: 16, topic: 基础测量, score: 4 }
      - { year: 2025, qid: 17, topic: 光学/声学实验, score: 4 }
      - { year: 2025, qid: 18, topic: 电学实验, score: 6 }
      - { year: 2025, qid: 19, topic: 力学实验, score: 6 }
      - { year: 2024, qid: 17, topic: 光学实验, score: 4 }
      - { year: 2024, qid: 18, topic: 电学实验, score: 6 }
    should_struggle:
      - { year: 2025, qid: 20, topic: 综合探究（后两问） }
      - { year: 2024, qid: 20, topic: 综合探究（实验评价改进） }

  L3:
    must_solve:
      - { year: 2025, qid: 20, topic: 综合探究, score: 8 }
      - { year: 2024, qid: 20, topic: 综合探究, score: 8 }
      - { year: 2023, qid: 20, topic: 综合探究, score: 8 }
    pass_standard: 实验探究5题共28分中拿到25分以上

# ------ 八大必考实验细分诊断 ------
sub_modules:

  测量密度:
    L0_signal: "不会用天平和量筒"
    L1_signal: "会操作但步骤顺序有误（先测质量再测体积的原因不清楚）"
    L2_signal: "实验完整正确，但特殊方法（如只用天平测密度）不会"
    L3_signal: "各种变式（缺器材/特殊物体）都能设计方案"
    key_diagnostic: "只有天平、烧杯和水，如何测量一个小石块的密度？写出步骤"

  探究欧姆定律:
    L0_signal: "不知道电路怎么连"
    L1_signal: "电路会连但滑动变阻器的作用不理解"
    L2_signal: "实验原理和操作都会，但数据分析的图象画不好"
    L3_signal: "实验改进和误差分析准确"
    key_diagnostic: "为什么探究电流与电阻关系时，每换一个电阻都要调节滑动变阻器？"

  测量电功率:
    L0_signal: "额定功率和实际功率分不清"
    L1_signal: "知道方法但调节灯泡两端电压为额定值的操作不熟"
    L2_signal: "实验正确完成，但多次测量的原因说不清"
    L3_signal: "能分析各种故障现象和改进方案"
    key_diagnostic: "测量小灯泡电功率时，电压表示数偏小，应该怎么调节滑动变阻器？"

  探究杠杆平衡条件:
    L0_signal: "力臂的概念不清楚"
    L1_signal: "会挂钩码但斜拉弹簧测力计时力臂画不对"
    L2_signal: "标准实验完整正确"
    L3_signal: "多组数据验证+误差分析+不在水平位置平衡的变式处理"
    key_diagnostic: "杠杆不在水平位置平衡时也满足杠杆平衡条件吗？为什么实验要求水平？"

  探究凸透镜成像:
    L0_signal: "不知道什么是物距像距"
    L1_signal: "知道三种成像情况但u=2f和u=f的分界记混"
    L2_signal: "完整掌握成像规律，能解释照相机/投影仪/放大镜"
    L3_signal: "像随物距连续变化的动态分析准确"
    key_diagnostic: "蜡烛从远处向凸透镜靠近（不过焦点），像的大小和像距如何变化？"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 认识实验器材 + 学会控制变量法
    estimated_hours: 10-12
    key_tasks:
      - 画出并标注8种基本仪器（天平/量筒/弹簧测力计/温度计/电流表/电压表/滑动变阻器/凸透镜）
      - 控制变量法训练：给出实验目的，说出需要控制什么变量
      - 仪器读数专项训练（含估读）

  L1_to_L2:
    focus: 八大必考实验逐一过关
    estimated_hours: 12-15
    key_tasks:
      - 每个必考实验：原理→步骤→数据记录→结论，写完整实验报告
      - 实验故障分析专项（断路/短路/接触不良的判断）
      - 数据处理训练（画图象/求平均/读表格）

  L2_to_L3:
    focus: 实验评价与改进 + 综合探究攻坚
    estimated_hours: 8-12
    key_tasks:
      - 误差分析专项（分析偏大偏小的原因）
      - 实验改进方案训练（如何减小误差/提高精度）
      - 近5年北京中考第20题精练（综合探究题）
      - 海淀西城一模二模实验压轴题训练
