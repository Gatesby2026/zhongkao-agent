# ============================================================
# 诊断标准：三角形（全等 + 相似 + 勾股定理 + 三角函数）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 三角形
subject: 数学
covers:
  - 三角形基本性质（三边关系/内角和/外角）
  - 全等三角形（5种判定方法）
  - 等腰三角形/等边三角形
  - 勾股定理及其逆定理
  - 相似三角形（3种判定方法）
  - 锐角三角函数（sin/cos/tan + 解直角三角形）
exam_weight: ★★★
typical_score: 12-18分（北京中考）
typical_questions: 选择/填空各1-2题 + 解答证明题 + 压轴题中的几何部分

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 全等判定方法记不住，几何证明无从下手
    signals:
      - 5种全等判定（SSS/SAS/ASA/AAS/HL）记不全或混淆
      - 看到"证明△ABC≌△DEF"不知道找哪些条件
      - 勾股定理公式记得但不会用（特别是找不到直角）
      - 三角函数完全不会
      - 几何图形中找不到隐含条件（如公共边、对顶角）
    diagnostic_questions:
      - question: "如图，AB=CD, AD=CB，证明△ABD≌△CDB"
        expected: "AB=CD, AD=CB, BD=BD（公共边），SSS"
        L0_typical_error: "找不到公共边BD，或不知道用SSS"
      - question: "直角三角形两直角边分别为3和4，斜边长为？"
        expected: "√(9+16) = 5"
        L0_typical_error: "会公式但计算出错，或记成a²+b²=c而非a²+b²=c²"

  - id: L1
    name: 会背不会用
    description: 判定方法能背出来，但面对具体题目不知道选哪个、找哪些条件
    signals:
      - 5种判定方法能说出来，但做题时不知道选用哪个
      - 简单的全等证明（条件直接给出的）能做
      - 需要添加辅助线的题目无从下手
      - 等腰三角形"三线合一"知道但不会用
      - 勾股定理在标准直角三角形中会用，但在复合图形中找不到直角三角形
      - 三角函数定义知道，但30°/45°/60°的值记不熟
      - 相似三角形的判定不太会用
    diagnostic_questions:
      - question: "如图，∠A=∠D=90°, ∠1=∠2，证明AC=DF"
        expected: "先证∠ABC=∠DEF（利用∠1=∠2推导），再用AAS证全等"
        L1_typical_error: "知道要证全等但找不到第三个相等条件"
      - question: "在Rt△ABC中，∠C=90°，AC=5，BC=12，求sinA"
        expected: "sinA = BC/AB = 12/13（先求AB=13）"
        L1_typical_error: "sin/cos/tan的定义搞混（对边/邻边/斜边的关系）"
      - question: "如图，DE//BC，AD=2，DB=4，DE=3，求BC"
        expected: "△ADE∽△ABC，AD/AB=DE/BC，2/6=3/BC，BC=9"
        L1_typical_error: "比例关系列错，如用AD/DB=DE/BC"

  - id: L2
    name: 基本熟练
    description: 常规证明题能独立完成，但复杂图形和需要辅助线的题有困难
    signals:
      - 全等证明的常见题型（包括需要找隐含条件的）基本能做
      - 等腰三角形的性质和判定运用自如
      - 勾股定理能在各种场景下使用
      - 相似三角形的判定和比例计算基本正确
      - 三角函数能正确求值，解直角三角形的实际问题能做
      - 复杂几何综合（如需要多步推理、添加辅助线的）有困难
      - 动态几何中的三角形问题做不了
    diagnostic_questions:
      - question: "如图，在△ABC中，AB=AC，D是BC中点，E是AC上一点，且AE=AD，证明：DE是BC的垂直平分线的一部分（等价命题变换题）"
        expected: "利用等腰三角形和中点的多个性质综合推理"
        L2_response: "能完成主要推理步骤，但可能在严谨性上有瑕疵"

  - id: L3
    name: 熟练精通
    description: 各类三角形题目准确快速，能处理复杂的几何综合问题
    signals:
      - 全等/相似证明准确率95%以上，书写规范
      - 常见辅助线技巧（作高/延长/翻折/旋转构造）掌握
      - 几何综合题能快速找到切入点
      - 三角函数应用题（仰角俯角坡度）准确完成
      - 压轴几何题前两问必对
    pass_standard: 中考三角形相关题目得分率90%以上

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2022, qid: 20, topic: 三角形内角和证明, score: 5, note: 选辅助线方法证明 }
      - { year: 2024, qid: 7, topic: 尺规作图依据, score: 2, note: 全等判定方法选择 }
    should_struggle:
      - { year: 2025, qid: 20, topic: 三角形中位线+矩形, note: 需综合运用 }

  L2:
    must_solve:
      - { year: 2025, qid: 20, topic: 中位线+矩形判定, score: 6 }
      - { year: 2024, qid: 20, topic: 平行四边形+勾股定理, score: 6 }
      - { year: 2024, qid: 24, topic: 三角形相似, score: 6, note: 几何推理论证 }
      - { year: 2023, qid: 8, topic: 勾股定理图形关系, score: 2 }
    should_struggle:
      - { year: 2025, qid: 27, topic: 旋转+全等+相似, sub: "第3问" }
      - { year: 2024, qid: 27, topic: 全等+相似+旋转, sub: "第3问" }

  L3:
    must_solve:
      - { year: 2025, qid: 27, topic: 几何综合压轴, score: 7, note: 前两问必对 }
      - { year: 2024, qid: 27, topic: 几何综合压轴, score: 7, note: 前两问必对 }
      - { year: 2021, qid: 27, topic: 全等+相似+运动, score: 7 }
    pass_standard: Q20+Q24+Q27前两问 共约 17 分拿到 14 分以上

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: '记住方法 + 建立"找条件"的习惯'
    estimated_hours: 10-12
    key_tasks:
      - 每天默写5种全等判定方法（SSS/SAS/ASA/AAS/HL），连续一周
      - 做20道"条件已全部给出"的简单全等证明（培养书写格式）
      - 勾股定理公式+勾股数（3-4-5, 5-12-13, 8-15-17）记熟
      - 三角函数值表默写：sin30°=1/2, cos30°=√3/2, tan30°=√3/3 等

  L1_to_L2:
    focus: '学会"找隐含条件" + 相似三角形 + 三角函数应用'
    estimated_hours: 10-12
    key_tasks:
      - '"找隐含条件"专题训练（公共边/公共角/对顶角/互补互余）'
      - 相似三角形判定专练（AA/SAS/SSS各10题）
      - 比例线段计算专项
      - 解直角三角形应用题（仰角俯角实际问题）
      - 中考真题三角形证明题精练

  L2_to_L3:
    focus: 辅助线技巧 + 几何综合
    estimated_hours: 8-10
    key_tasks:
      - 常见辅助线类型总结（作高/延长线/取中点连线/旋转构造）
      - 几何综合题专练（全等+相似+勾股的综合运用）
      - 海淀西城一模几何解答题精练
      - 动态几何中的三角形问题入门
