# ============================================================
# 诊断标准：统计与概率
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-11

module: 统计与概率
subject: 数学
covers:
  - 数据的收集与整理（抽样调查/全面调查）
  - 统计图表（条形/折线/扇形/频率分布直方图）
  - 统计量（平均数/加权平均数/中位数/众数/方差）
  - 概率（等可能事件/列表法/树状图法）
exam_weight: ★★★（难度低但必考，性价比极高）
typical_score: 8-12分（北京中考）
typical_questions: 选择1题 + 填空1题 + 解答题1题（第18题左右）

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 统计量计算方法不清，概率概念模糊
    signals:
      - 平均数会算，但中位数和众数搞混
      - 不知道方差是什么、怎么算
      - 频率分布直方图看不懂
      - 概率计算完全不会（列表法/树状图法没学过或忘了）
      - '"抽样调查"和"全面调查"的区别说不清'
    diagnostic_questions:
      - question: "数据：2, 3, 5, 5, 7, 8, 8, 8, 10 的中位数和众数分别是？"
        expected: "中位数=7（第5个数），众数=8（出现3次最多）"
        L0_typical_error: "中位数算成平均数，或众数选成出现次数"
      - question: "同时掷两个骰子，点数之和为7的概率是？"
        expected: "列表法：总36种等可能，和为7的有6种，P=1/6"
        L0_typical_error: "不知道用列表法，直接猜测"

  - id: L1
    name: 概念清楚但不熟练
    description: 知道各统计量怎么算，但计算容易出错，概率的列举法不够系统
    signals:
      - 平均数/中位数/众数能区分，但中位数在偶数个数据时的处理不确定
      - 方差公式知道但计算容易出错（数字多时算得乱）
      - 频率分布直方图能读但补全图表有困难
      - 树状图能画但容易遗漏分支
      - 加权平均数的"权"理解不够（实际问题中不知道谁是权）
    diagnostic_questions:
      - question: "甲乙两组各5名同学成绩如下，甲：80,82,78,80,80；乙：76,80,84,80,80。哪组成绩更稳定？"
        expected: "两组平均数都是80，算方差：甲=1.6，乙=6.4，甲更稳定"
        L1_typical_error: "方差计算过程出错（平方展开或求和出错）"
      - question: "口袋里有2红1白球，随机取两次（不放回），画树状图求取到两个红球的概率"
        expected: "树状图：第一次3种可能，第二次各2种，共6种等可能，两红=2种，P=2/6=1/3"
        L1_typical_error: "树状图画漏分支，或放回/不放回搞混"

  - id: L2
    name: 基本熟练
    description: 常规统计概率题能做对，但复杂问题（多步概率/综合统计）偶尔出错
    signals:
      - 各统计量计算准确
      - 频率分布直方图能读、能补、能分析
      - 树状图和列表法运用熟练
      - 加权平均数的实际应用能处理
      - 2022新课标新增的四分位数和箱线图还不太熟
      - 统计与实际问题结合的开放性题目有时拿不到满分
    diagnostic_questions:
      - question: "某公司招聘，笔试、面试、实操成绩按3:3:4加权，小王三项分别为85、90、80，加权平均分是？"
        expected: "(85×3+90×3+80×4)/(3+3+4) = (255+270+320)/10 = 84.5"
        L2_response: "正确计算"

  - id: L3
    name: 熟练精通
    description: '统计概率题又快又准，属于"白送分"的模块'
    signals:
      - 所有题型准确率接近100%
      - 计算速度快，为其他题节省时间
      - 新课标新增内容（四分位数/箱线图）也已掌握
    pass_standard: 中考统计概率相关题目全对

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, qid: 4, topic: 古典概型·摸球, score: 2, note: "P(白)=1/6" }
      - { year: 2023, qid: 7, topic: 抛硬币概率, score: 2 }
      - { year: 2021, qid: 6, topic: 抛硬币一正一反, score: 2, note: 教材原题 }
      - { year: 2025, qid: 12, topic: 频率估计总体, score: 2, note: BMI数据 }
    should_struggle:
      - { year: 2025, qid: 23, topic: 统计分析·选运动员, note: 需综合比较 }

  L2:
    must_solve:
      - { year: 2025, qid: 4, topic: 概率, score: 2 }
      - { year: 2025, qid: 12, topic: 频率估计, score: 2 }
      - { year: 2025, qid: 23, topic: 统计分析, score: 5, note: 折线图+表格+排序 }
      - { year: 2024, qid: 23, topic: 众数中位数·演讲赛, score: 5 }
      - { year: 2023, qid: 23, topic: 方差·舞蹈队选人, score: 5 }
      - { year: 2022, qid: 13, topic: 众数·滑冰鞋, score: 2 }
      - { year: 2022, qid: 23, topic: 平均数方差·歌唱比赛, score: 6 }
    should_struggle:
      - { year: 2021, qid: 25, topic: 两城市邮政收入统计, note: 多图表信息综合 }

  L3:
    must_solve:
      - { year: 2025, qid: 23, score: 5 }
      - { year: 2024, qid: 23, score: 5 }
      - { year: 2022, qid: 23, score: 6 }
      - { year: 2021, qid: 25, topic: 统计应用, score: 5 }
    pass_standard: 概率选择(2分) + 统计填空(2分) + Q23(5-6分) = 9-10分全拿

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 搞清概念 + 学会列举法
    estimated_hours: 5-6
    key_tasks:
      - 平均数/中位数/众数的定义和区别，各做10题
      - 方差的计算公式抄写+练习（每天3题，连续5天）
      - 列表法和树状图各画10个（从最简单的开始）
      - 频率分布直方图的读图练习（看图回答问题）

  L1_to_L2:
    focus: 提高准确率 + 复杂题型
    estimated_hours: 4-5
    key_tasks:
      - 方差计算限时训练（每组3题10分钟，减少计算错误）
      - 加权平均数应用题专练
      - 树状图"不放回"vs"放回"对比练习
      - 频率分布直方图补图+分析专练
      - 中考真题统计概率部分精练

  L2_to_L3:
    focus: 新课标新增 + 查漏补缺
    estimated_hours: 2-3
    key_tasks:
      - 四分位数和箱线图专题学习
      - 统计开放性问题的答题模板整理
      - 确保零失误
    notes: 统计概率是最容易全拿分的模块，性价比极高
