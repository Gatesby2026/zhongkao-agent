# ============================================================
# 诊断标准：国情国策（基本国情/基本路线/发展理念/制度优势）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试（可带教材进考场）
# 题型结构：20道单选(40分) + 6道非选择题(40分)

module: 国情国策
subject: 道德与法治
covers:
  - 基本国情（社会主义初级阶段/主要矛盾/基本经济制度）
  - 基本路线（一个中心两个基本点/四项基本原则）
  - 新发展理念（创新/协调/绿色/开放/共享）
  - 制度优势（人民代表大会制度/民族区域自治/基层群众自治）
  - 中国特色社会主义道路/理论/制度/文化
exam_weight: 约20分（选择题8-10分 + 非选择题10-12分）
typical_questions: 选择题4-5题 + 非选择题1-2题（材料分析）
open_book_note: |
  国情国策是九年级上下册的核心内容，知识点集中但表述严谨。
  开卷考试中，这部分最容易"翻到但抄不对"——很多学生照搬教材
  原文却答不到采分点上。关键是理解逻辑而非死记硬背。

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 对我国基本国情和制度几乎不了解，政治术语陌生
    signals:
      - '不知道"社会主义初级阶段"是什么意思'
      - '分不清"基本经济制度"和"基本政治制度"'
      - '"一个中心两个基本点"完全说不出来'
      - 不理解人民代表大会制度和人大的区别
      - 教材九年级部分几乎没翻过
    diagnostic_questions:
      - question: "我国现阶段的主要矛盾是什么？"
        expected: "人民日益增长的美好生活需要和不平衡不充分的发展之间的矛盾"
        L0_typical_error: "完全答不出，或说成旧的表述'人民日益增长的物质文化需要'"
      - question: "我国的根本政治制度是什么？"
        expected: "人民代表大会制度"
        L0_typical_error: "说成'社会主义制度'或'共产党领导'"
      - question: "新发展理念包括哪些？"
        expected: "创新、协调、绿色、开放、共享"
        L0_typical_error: "只能说出一两个，或与其他概念混淆"

  - id: L1
    name: 概念模糊
    description: 听说过这些概念但容易混淆，翻书能找到但理解不深
    signals:
      - 基本国情能说个大概但措辞不准确
      - 各种制度（根本制度/根本政治制度/基本政治制度）分不清
      - 新发展理念能列出但不知道每个对应解决什么问题
      - 翻书能找到知识点但不理解其内在逻辑
      - 选择题容易被干扰项迷惑
    diagnostic_questions:
      - question: "根本制度、根本政治制度、基本政治制度分别是什么？"
        expected: "根本制度：社会主义制度；根本政治制度：人民代表大会制度；基本政治制度：中共领导的多党合作和政治协商制度、民族区域自治制度、基层群众自治制度"
        L1_typical_error: "三者混为一谈，或漏掉基层群众自治制度"
      - question: "'创新'发展理念解决的是什么问题？"
        expected: "解决发展动力问题，创新是引领发展的第一动力"
        L1_typical_error: "知道创新重要但说不出'解决发展动力问题'这个关键表述"
      - question: "为什么坚持以经济建设为中心？"
        expected: "经济建设是兴国之要，是解决我国一切问题的基础和关键"
        L1_typical_error: "能说到'发展经济'但用语不规范"

  - id: L2
    name: 基本熟练
    description: 知识体系基本建立，能翻书快速定位，但材料分析不够深入
    signals:
      - 选择题正确率80%以上
      - 各种制度体系能准确区分
      - 翻书30秒内找到相关知识点
      - 非选择题能答出主要知识点但角度不全
      - 材料和知识点的对应关系有时判断不准
    diagnostic_questions:
      - question: "材料：北京某社区开展居民议事会，讨论老旧小区改造方案... 运用国情国策知识分析"
        expected: "从基层群众自治制度+人民当家作主+共享发展理念等多角度分析"
        L2_response: "能答出基层自治和人民当家作主，但可能遗漏共享发展理念的角度"
      - question: "我国为什么要坚持公有制为主体、多种所有制经济共同发展？"
        expected: "由社会主义初级阶段的基本国情决定；公有制是社会主义经济制度的基础；非公有制是社会主义市场经济的重要组成部分"
        L2_response: "能答出基本国情和公有制地位，但对非公有制的表述可能不够准确"

  - id: L3
    name: 熟练精通
    description: 知识体系完整清晰，材料分析全面深入，答题规范高效
    signals:
      - 选择题秒答，正确率95%以上
      - 非选择题能多角度、分层次、有逻辑地作答
      - 教材术语运用准确，不会用口语化表述
      - 能将材料中的具体事例准确对应到教材知识点
      - 作答效率高，不浪费翻书时间
    pass_standard: 国情国策部分得分率90%以上（约18/20分）

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, topic: 新发展理念·选择题, score: 2 }
      - { year: 2024, topic: 基本经济制度·选择题, score: 2 }
      - { year: 2023, topic: 人民代表大会制度·选择题, score: 2 }
    should_struggle:
      - { year: 2025, topic: 制度优势·材料分析题 }

  L2:
    must_solve:
      - { year: 2025, topic: 制度优势·材料分析, score: 6 }
      - { year: 2024, topic: 发展理念·材料分析, score: 6 }
      - { year: 2023, topic: 国情国策综合·材料分析, score: 8 }
    should_struggle:
      - { year: 2025, topic: 综合性国情材料题·多角度多层次分析 }

  L3:
    must_solve:
      - { year: 2025, topic: 综合国情材料分析, score: 8 }
      - { year: 2024, topic: 综合国情材料分析, score: 8 }
    pass_standard: 本模块选择题全对 + 非选择题得分率≥85%

# ------ 各子模块细分诊断 ------
sub_modules:

  基本国情:
    L0_signal: "不知道我国处于社会主义初级阶段"
    L1_signal: "知道初级阶段但说不出主要矛盾的准确表述"
    L2_signal: "基本国情知识体系清晰，能结合材料分析"
    L3_signal: "能准确区分国情的各个层面并灵活运用"
    key_diagnostic: "我国社会主义初级阶段的基本国情是什么？主要矛盾是什么？"

  基本路线:
    L0_signal: "不知道'一个中心两个基本点'"
    L1_signal: "能背出来但不理解为什么这样定"
    L2_signal: "理解基本路线的内在逻辑"
    L3_signal: "能结合时事解释基本路线的现实意义"
    key_diagnostic: "党的基本路线的核心内容是什么？为什么以经济建设为中心？"

  发展理念:
    L0_signal: "五大发展理念说不全"
    L1_signal: "能列出但不知道各自解决什么问题"
    L2_signal: "五大理念及对应问题清晰"
    L3_signal: "能结合具体案例分析用了哪个发展理念"
    key_diagnostic: "新发展理念中'协调'解决的核心问题是什么？举例说明"

  制度优势:
    L0_signal: "各种制度名称混乱"
    L1_signal: "能区分但制度内涵说不清楚"
    L2_signal: "制度体系清晰，能分析制度优势"
    L3_signal: "能从制度视角深入分析社会现象"
    key_diagnostic: "人民代表大会制度和政治协商制度有什么区别？"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 建立国情国策基本知识框架
    estimated_hours: 8-10
    key_tasks:
      - 通读九年级上下册教材，重点标记制度名称和关键表述
      - 制作"制度体系一览表"（根本制度/根本政治制度/基本政治制度/基本经济制度）
      - 背诵新发展理念五个关键词及对应解决的问题
      - 每天做5道选择题，标注知识点来源

  L1_to_L2:
    focus: 深化理解 + 提高翻书定位精度
    estimated_hours: 8-10
    key_tasks:
      - 构建"知识树"：以基本国情为根，制度/路线/理念为枝
      - 翻书定位训练：听关键词→30秒内翻到教材对应页
      - 做近5年真题的国情国策非选择题，对照评分标准
      - 五三道法·国情国策专题训练

  L2_to_L3:
    focus: 多角度分析 + 精准用语
    estimated_hours: 6-8
    key_tasks:
      - 材料分析"角度穷举"训练：同一材料至少找3个知识点角度
      - 答题用语规范化：对照教材原文修正自己的表述
      - 海淀西城一模二模国情类大题限时精练
      - 易混概念辨析专项（根本制度vs根本政治制度等）
