# ============================================================
# 诊断标准：道德与法律（青春期/道德修养/法律基础/权利义务）
# ============================================================
# 状态：LLM生成初稿，待教师审核
# 最后更新：2026-04-12
# 科目说明：2026北京中考道德与法治总分80分（2021-2025为70分）
# 考试形式：开卷考试（可带教材进考场）
# 题型结构：20道单选(40分) + 6道非选择题(40分)

module: 道德与法律
subject: 道德与法治
covers:
  - 青春期心理与自我认知（七年级上下册）
  - 道德修养与品格塑造（尊重/诚信/友善/责任）
  - 法律基础（法律特征/违法犯罪/未成年人保护）
  - 公民权利与义务（宪法规定/人身权/财产权/受教育权）
exam_weight: 约20分（选择题8-10分 + 非选择题10-12分）
typical_questions: 选择题4-5题 + 非选择题1-2题（材料分析）
open_book_note: |
  开卷考试但本模块知识点分散在七八九年级共6本教材中，
  翻书定位是核心难点。L0学生最大问题不是"不会"而是"找不到"。

# ------ 水平分级 ------
levels:

  - id: L0
    name: 基础薄弱
    description: 教材内容几乎没印象，翻书也不知道翻哪本、哪一课
    signals:
      - 不清楚"违法"和"犯罪"的区别
      - 不知道未成年人保护法有哪四大保护
      - 权利和义务的关系说不清楚
      - 拿到材料题不知道该翻哪本书的哪一课
      - 教材目录完全不熟悉，翻书超过3分钟才能找到相关内容
    diagnostic_questions:
      - question: "违法和犯罪有什么区别？"
        expected: "违法包括民事违法、行政违法和刑事违法；犯罪特指严重违法（刑事违法），具有严重社会危害性、刑事违法性、应受刑罚处罚性"
        L0_typical_error: "认为违法就是犯罪，分不清三种违法行为"
      - question: "公民的基本权利有哪些？请举出三种"
        expected: "政治权利、人身自由权利、社会经济权利、文化教育权利等"
        L0_typical_error: "只能说出'选举权'，其他想不起来，也不知道翻哪本书"
      - question: "未成年人保护法规定了哪几种保护？"
        expected: "家庭保护、学校保护、社会保护、网络保护、政府保护、司法保护（六大保护）"
        L0_typical_error: "只知道有保护，说不出具体类型"

  - id: L1
    name: 概念模糊
    description: 知道大概内容但表述不准确，翻书能找到但速度慢
    signals:
      - 知道违法和犯罪不同但说不清具体区别
      - 权利义务能举例但不能用教材原话表述
      - 道德和法律的关系理解片面
      - 翻书能找到但需要1-2分钟，考试时间不够用
      - 非选择题答案不规范，口语化严重
    diagnostic_questions:
      - question: "道德和法律有什么关系？"
        expected: "道德和法律相辅相成：法律是最基本的道德，道德是法律的补充；法律靠国家强制力保证实施，道德靠舆论和自律"
        L1_typical_error: "知道两者有关系但表述不完整，如只说'法律比道德严格'"
      - question: "小明（15岁）在网上被人骗了500元，他可以通过哪些方式维权？"
        expected: "向父母求助、向公安机关报案、拨打12315、向法院起诉等，运用法律武器维护自身合法权益"
        L1_typical_error: "能说出报警，但不能系统列举维权途径，也不会引用教材知识点"
      - question: "什么是受教育权？它是权利还是义务？"
        expected: "受教育权既是公民的基本权利，也是公民的基本义务（权利和义务具有一致性）"
        L1_typical_error: "只说是权利，忘了也是义务"

  - id: L2
    name: 基本熟练
    description: 教材知识点基本掌握，翻书快速准确，但非选择题组织语言不够规范
    signals:
      - 选择题正确率80%以上
      - 翻书能在30秒内定位到相关知识点
      - 教材目录熟悉，知道每课讲什么
      - 非选择题能找到知识点但答题不够全面
      - 容易遗漏材料中的某个角度
    diagnostic_questions:
      - question: "材料：某中学举办'宪法晨读'活动... 请从权利与义务的角度分析该活动的意义"
        expected: "结合宪法意识+权利义务一致性+公民意识，至少三个角度，每个角度都有'教材原理+材料分析'"
        L2_response: "能答出两个角度，但第三个角度容易遗漏"
      - question: "区分：民事违法、行政违法、刑事违法各举一例，并说明承担的法律责任"
        expected: "民事违法-民事责任（赔偿）、行政违法-行政处罚（罚款拘留）、刑事违法-刑罚（主刑附加刑）"
        L2_response: "基本正确，但刑罚的主刑附加刑分类可能不完整"

  - id: L3
    name: 熟练精通
    description: 知识点烂熟于心，翻书极快，答题规范且全面
    signals:
      - 选择题正确率95%以上，基本不需要翻书
      - 非选择题能快速定位+规范作答
      - 答题模板运用熟练（是什么-为什么-怎么做）
      - 能从多角度分析材料，不遗漏
      - 作答语言规范，使用教材术语
    pass_standard: 道德与法律部分得分率90%以上（约18/20分）

# ------ 真题锚点（2021-2025 北京中考）------
exam_benchmarks:

  L1:
    must_solve:
      - { year: 2025, topic: 未成年人保护法·选择题, score: 2, note: 基础识记题 }
      - { year: 2024, topic: 公民基本权利·选择题, score: 2 }
      - { year: 2023, topic: 违法与犯罪的区别·选择题, score: 2 }
    should_struggle:
      - { year: 2025, topic: 权利义务关系·材料分析题 }
      - { year: 2024, topic: 法律保护·综合分析题 }

  L2:
    must_solve:
      - { year: 2025, topic: 权利义务·材料分析, score: 6, note: 翻书定位+规范作答 }
      - { year: 2024, topic: 道德修养·材料分析, score: 6 }
      - { year: 2023, topic: 法律基础·材料分析, score: 6 }
    should_struggle:
      - { year: 2025, topic: 综合性法治材料题·多角度分析 }

  L3:
    must_solve:
      - { year: 2025, topic: 综合材料分析题, score: 8, note: 多角度全面作答 }
      - { year: 2024, topic: 综合材料分析题, score: 8 }
    pass_standard: 本模块选择题全对 + 非选择题得分率≥85%

# ------ 各子模块细分诊断 ------
sub_modules:

  青春期与自我认知:
    L0_signal: "不知道教材中'认识自我'在哪一课"
    L1_signal: "知道要正确认识自己但说不出具体方法"
    L2_signal: "能结合材料分析青春期问题，翻书定位准确"
    L3_signal: "秒答，不需要翻书"
    key_diagnostic: "如何正确认识和评价自己？（至少答出三种方法）"

  道德修养:
    L0_signal: "诚信/尊重/友善等概念混为一谈"
    L1_signal: "能举例但不能用教材语言准确表述"
    L2_signal: "知识点准确，能结合材料分析"
    L3_signal: "多角度分析+教材术语规范表达"
    key_diagnostic: "为什么说诚信是一个人安身立命之本？"

  法律基础:
    L0_signal: "违法犯罪分不清，法律特征说不出"
    L1_signal: "知道区别但表述不准确"
    L2_signal: "三种违法行为及对应责任能准确区分"
    L3_signal: "能结合案例快速判断违法类型并分析"
    key_diagnostic: "法律的三个基本特征是什么？"

  权利与义务:
    L0_signal: "不知道宪法规定了哪些基本权利"
    L1_signal: "能列举部分权利但权利义务一致性说不清"
    L2_signal: "权利义务体系清晰，能结合材料分析"
    L3_signal: "快速多角度分析，语言规范"
    key_diagnostic: "为什么说权利和义务是统一的、不可分割的？"

# ------ 升级路径概要 ------
upgrade_paths:
  L0_to_L1:
    focus: 熟悉教材目录结构，建立知识点定位能力
    estimated_hours: 8-10
    key_tasks:
      - 用3天时间通读七八九年级6本教材的目录，做一份"知识点-课次"对照表
      - 每本书用便签/折角标记重点课次
      - 每天做5道基础选择题，错题标注对应课次
      - 背诵法律三大特征、违法犯罪区别、六大保护

  L1_to_L2:
    focus: 提高翻书速度 + 规范答题语言
    estimated_hours: 8-10
    key_tasks:
      - 翻书速度训练：随机出题→30秒内翻到对应知识点
      - 整理本模块答题模板（是什么-为什么-怎么做）
      - 做近5年真题中的相关非选择题，对照标准答案修正用语
      - 五三道法·法律基础专题精练

  L2_to_L3:
    focus: 多角度分析 + 答题全面性
    estimated_hours: 6-8
    key_tasks:
      - 材料分析题"角度清单"训练：读材料→列出所有可分析的角度→逐一作答
      - 限时训练：每道非选择题限时5分钟（含翻书时间）
      - 海淀西城一模二模真题精练
